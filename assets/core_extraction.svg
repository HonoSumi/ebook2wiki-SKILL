<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#F8FAFC" />
  <rect x="0" y="0" width="1280" height="6" fill="url(#headerBg)" />

  <path fill="#7C3AED" d="M65,60 H135 A15,15 0 0 1 150,75 V75 A15,15 0 0 1 135,90 H65 A15,15 0 0 1 50,75 V75 A15,15 0 0 1 65,60 Z" />
  <text x="100" y="80" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">步骤 3</text>
  <text x="170" y="80" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E293B">核心提取：串行处理</text>

  
  <text x="640" y="160" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" fill="#64748B">每个文本块依次通过 subagent 处理</text>
  <text x="640" y="195" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" fill="#64748B">一个完成后才启动下一个</text>

  
  <path fill="url(#accentLine)" d="M541.50,220 H738.50 A1.50,1.50 0 0 1 740,221.50 V221.50 A1.50,1.50 0 0 1 738.50,223 H541.50 A1.50,1.50 0 0 1 540,221.50 V221.50 A1.50,1.50 0 0 1 541.50,220 Z" />

  
  <text x="640" y="275" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="bold" fill="#7C3AED">"慢就是快"</text>
  <text x="640" y="310" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#475569">提取质量远比处理速度重要</text>

  
  <rect x="100" y="370" width="1080" height="2" fill="#E2E8F0" />
  <rect x="100" y="365" width="2" height="12" fill="#2563EB" />
  <rect x="1178" y="365" width="2" height="12" fill="#06B6D4" />

  
  <text x="180" y="420" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="bold" fill="#2563EB" fill-opacity="0.2">01</text>
  <text x="180" y="455" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">阅读文本块</text>
  <text x="180" y="480" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">全面理解内容</text>
  <line x1="330" y1="430" x2="330" y2="480" stroke="#E2E8F0" stroke-width="1" />

  <text x="460" y="420" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="bold" fill="#7C3AED" fill-opacity="0.2">02</text>
  <text x="460" y="455" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">识别知识条目</text>
  <text x="460" y="480" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">按六大类别筛选</text>
  <line x1="610" y1="430" x2="610" y2="480" stroke="#E2E8F0" stroke-width="1" />

  <text x="740" y="420" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="bold" fill="#06B6D4" fill-opacity="0.2">03</text>
  <text x="740" y="455" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">互联网检索</text>
  <text x="740" y="480" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">WebSearch 验证</text>
  <line x1="890" y1="430" x2="890" y2="480" stroke="#E2E8F0" stroke-width="1" />

  <text x="1020" y="420" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="bold" fill="#10B981" fill-opacity="0.2">04</text>
  <text x="1020" y="455" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">撰写并输出</text>
  <text x="1020" y="480" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748B">YAML 文件保存</text>

  
  <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" d="M152,530 H1128 A12,12 0 0 1 1140,542 V638 A12,12 0 0 1 1128,650 H152 A12,12 0 0 1 140,638 V542 A12,12 0 0 1 152,530 Z" />
  <text x="640" y="560" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E293B">串行处理原则</text>

  
  <g transform="translate(175.0, 582.0) scale(0.6666666666666666)" fill="none" stroke="#10B981" stroke-width="2">
    <path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
    <path d="M9 12l2 2l4 -4" />
  </g>
  <text x="200" y="595" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">每次只启动一个 subagent，禁止并行</text>

  
  <g transform="translate(540.0, 582.0) scale(0.6666666666666666)" fill="none" stroke="#10B981" stroke-width="2">
    <path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
    <path d="M9 12l2 2l4 -4" />
  </g>
  <text x="565" y="595" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">每完成一块即向用户汇报进度</text>

  
  <g transform="translate(175.0, 612.0) scale(0.6666666666666666)" fill="none" stroke="#10B981" stroke-width="2">
    <path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
    <path d="M9 12l2 2l4 -4" />
  </g>
  <text x="200" y="625" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">subagent 出错时重试该块，不跳过</text>

  
  <g transform="translate(540.0, 612.0) scale(0.6666666666666666)" fill="none" stroke="#10B981" stroke-width="2">
    <path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
    <path d="M9 12l2 2l4 -4" />
  </g>
  <text x="565" y="625" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">连续 3 次失败才跳过，并在最终报告中注明</text>

  <text x="1220" y="690" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#94A3B8">06</text>
</svg>