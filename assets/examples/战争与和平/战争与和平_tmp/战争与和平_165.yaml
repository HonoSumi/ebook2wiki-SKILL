- 名词: 新圣母修道院
  分类: 地点
  解释: |
    莫斯科著名修道院，位于莫斯科河畔，克里姆林宫西南约4公里处。1524年由莫斯科大公瓦西里三世为纪念收复斯摩棱斯克而建。该修道院是莫斯科巴洛克风格建筑的杰出代表，2004年被列入联合国教科文组织世界遗产名录。历史上曾作为皇家女性成员修道和囚禁之地，1812年拿破仑大军撤退时曾试图将其炸毁，所幸被修女及时拆除炸药而保全。苏联时期改为国家历史博物馆分馆，1994年重新恢复宗教功能。
  书中原文: |
    近处的新圣母修道院的圆顶欢快地闪光，那里的钟声也格外响亮。
  网络来源: |
    https://baike.baidu.com/item/%E6%96%B0%E5%9C%A3%E6%AF%8D%E4%BF%AE%E9%81%93%E9%99%A2/6278095
- 名词: 圣母诞生节
  分类: 习俗
  解释: |
    东正教十二大节日之一，纪念圣母玛利亚的诞生，日期为儒略历9月8日（公历9月20或21日）。据教会传统，圣母玛利亚的父母约雅敬和安娜年迈无子，虔诚祈祷后蒙上帝应允生下玛利亚。该节日被视为救恩历史的开端，是东正教礼仪新年中最早的重要节日之一，在俄罗斯东正教传统中占有重要地位。
  书中原文: |
    钟声使皮埃尔想起今天是礼拜，是圣母诞生节。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/%E4%B8%9C%E6%AD%A3%E6%95%99%E5%8D%81%E4%BA%8C%E5%A4%A7%E8%8A%82
- 名词: 伊凡大帝教堂钟楼
  分类: 地点
  解释: |
    全称为伊凡大帝钟楼，位于莫斯科克里姆林宫教堂广场，高81米，是克里姆林宫建筑群中最高的建筑。建于1505至1508年，由意大利建筑师博恩·弗里亚济设计，1600年由沙皇鲍里斯·戈杜诺夫加建至81米并覆金箔。1812年拿破仑撤军时法军试图将其炸毁，但主体部分奇迹般幸存，后于1814至1815年完全修复。钟楼现存二十余口16至17世纪的铜钟，南侧陈列着著名的钟王。
  书中原文: |
    克里姆林宫的一些钟楼和伊凡大帝教堂钟楼在远处闪着白光。
  网络来源: |
    https://baike.baidu.com/item/%E4%BC%8A%E5%87%A1%E5%A4%A7%E5%B8%9D%E9%92%9F%E6%A5%BC/5150359
