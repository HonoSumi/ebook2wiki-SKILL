- 名词: 历史决定论
  分类: 概念
  解释: 托尔斯泰在《战争与和平》中阐述的历史哲学观点，认为历史进程不受伟人意志支配，而是由无数普通人行动的合力决定的必然过程。他反对"伟人史观"，认为拿破仑等所谓英雄只是历史力量的标签。
  书中原文: "人类所能了解的，只是观察到蜜蜂的生活和别的生活现象相对应的关系而已。对历史人物的各族人民的目的，也应当这样看。"
  网络来源: "https://www.thepaper.cn/newsDetail_forward_31438218"

- 名词: 偶然与天才
  分类: 概念
  解释: 托尔斯泰在《战争与和平》中批判的一对历史解释概念。他认为"偶然"和"天才"并不表示实际存在的东西，而是人们无法理解历史事件终极原因时的托词——用"偶然"解释不明缘由的事件，用"天才"解释超出理解的行为。
  书中原文: "偶然和天才这两个词并不表示任何实际存在的东西，所以是不能下定义的。这两个词仅表示对现象的某种程度的理解。"
  网络来源: "https://m.thepaper.cn/newsDetail_forward_32412675"

- 名词: 无形的手
  分类: 概念
  解释: 托尔斯泰在《战争与和平》中使用的历史哲学隐喻，指支配历史进程的超越个人意志的必然性力量。拿破仑被流放后仍试图为自己的行为辩护，但托尔斯泰指出人们当作权势的东西不过是一只引导着他的无形的手——即历史必然性。
  书中原文: "人们当作权势的东西不是别的，而是一只引导着他的无形的手。"
  网络来源: "http://www.daanbar.com/detail/chapter/10825.html"

- 名词: 蜜蜂的目的论
  分类: 概念
  解释: 托尔斯泰在《战争与和平》尾声中使用的重要比喻。他用不同人（孩子、诗人、养蜂人、植物学家）对蜜蜂目的的各自理解，说明人类为现象赋予单一目的的做法是有限的——历史的终极目的无法被人的有限理性所把握。
  书中原文: "一只落在花上的蜜蜂，螫了一个小孩，于是，小孩怕蜜蜂，他就说，蜜蜂的目的是螫人。诗人欣赏钻入花蕊的蜜蜂，于是，他就说，蜜蜂的目的是吸取花香。"
  网络来源: "https://book.douban.com/annotation/40517605/"

- 名词: 自西向东运动
  分类: 事件
  解释: 托尔斯泰对拿破仑战争（1805—1812年）的历史概括。他认为法国大革命后西方势力多次向东挺进，不断壮大，最终到达莫斯科——这是自西向东的侵略运动，被托尔斯泰视为一种历史必然性的体现。
  书中原文: "西方势力在一八〇五、一八〇六、一八〇七、一八〇九几年中好几次向东挺进，不断地加强着，壮大着。"
  网络来源: "https://www.thepaper.cn/newsDetail_forward_31438218"

- 名词: 自东向西运动
  分类: 事件
  解释: 托尔斯泰对1812年卫国战争后俄军反攻欧洲的历史概括。俄军及其盟军从莫斯科向西追击拿破仑大军，最终攻占巴黎，推翻了拿破仑政权。托尔斯泰将此视为与先前自西向东运动相对称的相反历史运动。
  书中原文: "与前次自西而东的运动十分相像的自东而西的一次相反的运动发动了。"
  网络来源: "https://www.thepaper.cn/newsDetail_forward_31438218"

- 名词: 昂季安公爵
  分类: 人物
  解释: 昂季安公爵（路易·安托万·德·波旁-孔代，1772—1804），法国波旁王室成员。1804年被拿破仑派兵从巴登公国绑架回法国，经仓促军事审判后在文森城堡被枪决。这一事件震惊欧洲，成为拿破仑最具争议的行为之一，并加强了反法同盟的敌对情绪。
  书中原文: "偶然 使昂季安公爵落入他的手中，并意外地迫使他杀掉了公爵，这比采用别的任何方法都更有力地使一般人信服他有势就有权。"
  网络来源: "https://zh.wikipedia.org/zh/%E6%98%82%E5%90%89%E5%AE%89%E5%85%AC%E7%88%B5%E8%B7%AF%E6%98%93%C2%B7%E5%AE%89%E6%89%98%E4%B8%87"

- 名词: 保罗一世
  分类: 人物
  解释: 保罗一世（1754—1801），俄罗斯帝国沙皇，1796—1801年在位，叶卡捷琳娜二世之子，亚历山大一世之父。在位五年间推行《皇位继承法》等改革，外交上先加入反法同盟后转而与拿破仑结好。1801年在宫廷政变中被刺杀，其子亚历山大一世继位。
  书中原文: "偶然 使保罗一世情愿承认他的权力。"
  网络来源: "https://zh.wikipedia.org/wiki/%E4%BF%9D%E7%BD%97%E4%B8%80%E4%B8%96_(%E4%BF%84%E7%BD%97%E6%96%AF)"

- 名词: 蒂尔西特会谈
  分类: 事件
  解释: 1807年6—7月，法国皇帝拿破仑与俄国沙皇亚历山大一世在尼曼河中央木筏上举行的会晤，随后签订《蒂尔西特和约》。法俄结束战争并结盟，俄国加入大陆封锁体系，普鲁士遭受严厉惩罚。该会谈标志着拿破仑欧洲霸权的顶峰，但也埋下了法俄战争（1812年）的伏笔。
  书中原文: "奥斯特利茨战役、蒂尔西特会谈和埃尔富特会议等，作好了准备。"
  网络来源: "https://zh.wikipedia.org/wiki/%E6%8F%90%E5%B0%94%E8%A5%BF%E7%89%B9%E6%9D%A1%E7%BA%A6"

- 名词: 埃尔富特会议
  分类: 事件
  解释: 1808年9—10月，拿破仑与亚历山大一世在德国埃尔福特举行的高峰会晤，旨在确认《蒂尔西特和约》的法俄联盟。会议重申了法俄同盟，但法国外长塔列朗暗中背叛拿破仑，劝亚历山大抵制其扩张野心。这是两位皇帝最后一次会晤，此后法俄关系迅速恶化。
  书中原文: "奥斯特利茨战役、蒂尔西特会谈和埃尔富特会议等，作好了准备。"
  网络来源: "https://zh.wikipedia.org/zh-hans/%E5%9F%83%E5%B0%94%E7%A6%8F%E7%89%B9%E4%BC%9A%E8%AE%AE"

- 名词: 罗斯托夫伯爵之死
  分类: 事件
  解释: 《战争与和平》中伊利亚·安德烈伊奇·罗斯托夫伯爵于1813年去世的情节。在经历了莫斯科大火、安德烈公爵之死、幼子彼佳战死等一系列打击后，他为女儿娜塔莎操办完婚事便病倒，临终痛哭请求宽恕荡尽家产的罪过，平静离世。他的死标志着罗斯托夫家族旧时代的终结。
  书中原文: "领过圣餐，行过涂敷礼后，他安静地死去了，第二天，在罗斯托夫家租来的住宅里，挤满了前来向死者最后致意的熟人们。"
  网络来源: "https://www.guxuo.com/wgwx/ZPJ/test/zzyh/338.htm"

- 名词: 罗斯托夫家产负债
  分类: 事件
  解释: 《战争与和平》中老罗斯托夫伯爵死后暴露的家族财务危机。负债总额比家产多一倍，债主纷纷上门逼债。尼古拉·罗斯托夫拒绝放弃继承，接受遗产并承担还债义务，以半价拍卖产业、向妹夫皮埃尔借三万卢布后仍有一半债务未清，被迫脱下军服去莫斯科做文官维持生计。
  书中原文: "负债的总数比家产大一倍。"
  网络来源: "https://baijiahao.baidu.com/s?id=1724538227749143767"
