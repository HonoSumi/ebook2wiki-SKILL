- 名词: 良心指导者
  分类: 人物
  解释: 指为海伦·库拉金娜进行宗教指导的天主教或东正教神父，在小说中被海伦利用来为自己的离婚和改嫁计划寻求宗教上的合法性。
  书中原文: 这位良心指导者发表了如下的议论："您不了解您所做所为的意义，就发誓矢忠一个男人……这样就犯了亵渎神圣罪。"
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 真宗教概念
  分类: 概念
  解释: 海伦声称自己皈依了"真正的宗教"，借此认为不再受原有婚姻的宗教约束。这是她为自己离婚改嫁制造借口的策略性言论，反映了当时俄国上流社会中宗教被工具化的现象。
  书中原文: 我既然信了真正的宗教，我就不能受虚伪的宗教的约束了。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 亵渎神圣罪
  分类: 概念
  解释: 良心指导者指责海伦犯下的宗教罪行，指她在一个不相信婚姻宗教意义的情况下结婚并发誓忠诚，然后违背誓言的行为。
  书中原文: 您不了解您所做所为的意义，就发誓矢忠一个男人，而那个男人不相信结婚的宗教的意义就结了婚，这样就犯了亵渎神圣罪。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 轻罪与死罪
  分类: 概念
  解释: 良心指导者在讨论海伦的罪过时提出的两种罪孽分类，轻罪指无恶意的行为，死罪指严重的不可饶恕的罪行。他认为海伦的行为属于轻罪。
  书中原文: 是轻罪，还是死罪？是轻罪，因为您的行为并无恶意。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 哥伦布与鸡蛋典故
  分类: 概念
  解释: 海伦向良心指导者直言自己信了真正的宗教就不再受旧宗教约束，指导者对此大为惊奇，认为其绕过难题的方法如同哥伦布竖鸡蛋的典故——看似困难的问题被巧妙简单地解决。
  书中原文: 良心指导者对单刀直入地向他提出哥伦布与鸡蛋之类的问题，大为惊奇。
  网络来源: https://zh.wikipedia.org/wiki/哥伦布竖鸡蛋

- 名词: 海伦两个求爱者
  分类: 人物
  解释: 指同时向海伦求婚的两位上流社会人物——一位年轻亲王和一位年老的大官。海伦在二人之间徘徊，借以制造舆论，使社交界讨论她应该嫁给谁而非能否离婚再嫁的问题。
  书中原文: 亲王和那个大官都向她求婚，两个人她都爱，她不愿让任何一个感到痛苦。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 天真娇憨策略
  分类: 概念
  解释: 海伦在上流社会中刻意表现的天真无邪的姿态，用来掩盖她有计划的离婚改嫁图谋。作者指出她毫无害羞或掩饰的痕迹，借此影响他人的判断。
  书中原文: 她带着一派天真娇憨的神情对她的一些亲密的朋友说……亲王和那个大官都向她求婚，两个人她都爱。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 上流社会改嫁舆论
  分类: 事件
  解释: 海伦刻意在彼得堡上流社会制造的舆论导向，使人们讨论她应该嫁给哪个追求者，而非质疑她有夫之妇改嫁的合法性。这一策略反映了19世纪初俄国贵族圈的虚伪道德标准。
  书中原文: 流言不是说海伦要和她丈夫离婚……而是传播了这样的流言，说不幸的可爱的海伦正在徘徊歧路，不知道应当嫁给两个人中的哪一个。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 卷袖筒动作
  分类: 习俗
  解释: 玛丽亚·德米特里耶夫娜·阿赫罗西莫娃的标志性动作，在公开斥责海伦时卷起宽大的袖筒，做出威吓姿势。这一动作体现了她直率强势的性格和蔑视上流社会虚伪规矩的态度。
  书中原文: 玛丽亚·德米特里耶夫娜在说这些话时，习惯地摆出威吓的姿势，卷起宽大的袖筒，严厉地环顾四周，走了过去。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 比利宾的分析
  分类: 事件
  解释: 外交官比利宾以冷静理性的口吻分析海伦两个追求者的利弊：嫁给年轻亲王会失去与老伯爵联姻的机会并得罪宫廷，嫁给老伯爵则可以待其去世后以显贵遗孀身份再嫁亲王。
  书中原文: 如果您嫁给那个亲王……那您就永远失去做另一个人的太太的机会，而且会惹得宫廷不满意。如果嫁给老伯爵，您就可以娱悦他的晚年，然后……那个亲王就可以不降低身份要您这个显贵的遗孀了。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 血统关系影响婚姻
  分类: 概念
  解释: 比利宾在分析海伦的婚姻选择时提到宫廷涉及血统关系，暗示海伦如果嫁给年轻亲王会影响库拉金家族与宫廷的现有血缘和政治纽带。
  书中原文: 您知道，这儿牵涉着血统关系。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 库拉金公爵夫人反对
  分类: 事件
  解释: 海伦的母亲库拉金公爵夫人因嫉妒女儿且对婚姻圣礼的坚守，向神父请教《福音书》中关于离婚和再嫁的经文，以此为依据反对女儿的改嫁计划，但最终被海伦轻松驳倒。
  书中原文: 她就这个问题请教一位俄国神父：在丈夫还活着的时候能否离婚和再嫁，神父告诉她，这是不许可的。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 神父的宽恕权
  分类: 概念
  解释: 海伦反驳母亲时引用的宗教论点，声称神父有权宽恕罪过，因此离婚和再嫁可以通过宗教渠道获得合法性，不必严格拘泥于《福音书》的字面规定。
  书中原文: 咳，妈妈，您怎么不明白，神父有权宽恕……
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 海伦写给皮埃尔的信
  分类: 事件
  解释: 1812年八月初，海伦在确信皮埃尔深爱自己的前提下写信给在前线的丈夫，通知他打算嫁给某人（以NN代称），声称自己皈依了唯一真正的宗教，并请他办理离婚手续。
  书中原文: 她给她丈夫写了一封信……通知他，她打算嫁给NN，还说她信了唯一真正的宗教，并请他履行离婚所必要的一切手续。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 离婚必要手续
  分类: 概念
  解释: 19世纪初俄国贵族离婚所需的法律和宗教程序，包括获得教会批准、办理相关法律文件等。海伦在信中要求皮埃尔配合办理这些手续，皮埃尔此时正在波罗金诺战场上。
  书中原文: 请他履行离婚所必要的一切手续，送信人将告诉他应办的手续。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 波罗金诺战后场景
  分类: 事件
  解释: 波罗金诺战役结束后，皮埃尔离开拉耶夫斯基炮垒，沿着山谷随伤兵队伍前行，目睹遍地鲜血、呻吟和死亡，内心受到巨大冲击，一心想逃离战争恐怖的印象。
  书中原文: 皮埃尔又一次从拉耶夫斯基的炮垒跑下来，同一群伤兵沿着山谷向克尼亚济科沃村走去，走到救护站，他看见血，听到喊叫和呻吟，就连忙混进士兵群里，继续往前走。
  网络来源: https://zh.wikipedia.org/wiki/波罗金诺战役

- 名词: 皮埃尔离开炮垒
  分类: 事件
  解释: 波罗金诺战役临近结束时，皮埃尔离开拉耶夫斯基炮垒，试图逃离战场上的恐怖景象。这是他在这场战役中精神转折的开始，从参与观察者变为寻求逃避的受创者。
  书中原文: 皮埃尔又一次从拉耶夫斯基的炮垒跑下来，同一群伤兵沿着山谷向克尼亚济科沃村走去。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 皮埃尔混进士兵群
  分类: 事件
  解释: 皮埃尔在目睹救护站的血腥场景后，出于对战争恐怖的逃避本能，主动混入普通士兵的队伍中行走，试图在集体中找到安全感。
  书中原文: 他看见血，听到喊叫和呻吟，就连忙混进士兵群里，继续往前走。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 莫扎伊斯克大道行军
  分类: 事件
  解释: 皮埃尔在波罗金诺战役后沿莫扎伊斯克大道行走，虽已离开战场但周围依然可见伤员、血迹和军大衣，空气中弥漫尘土和闷热。他走了约三俄里后在路边坐下休息。
  书中原文: 沿着莫扎伊斯克大道走了约摸三俄里，皮埃尔在路边坐下。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 士兵与皮埃尔分享食物
  分类: 事件
  解释: 半夜时分，三名士兵在路边点燃篝火煮面糊糊，邀请皮埃尔一起吃。皮埃尔尝到了从未吃过的最好吃的东西。士兵们询问他的身份，他自称是民兵军官，与部队失散。
  书中原文: 那三个士兵边吃边谈，并不理会皮埃尔。……"好，你想吃就吃吧，尝尝我们的面糊糊！"头一个士兵说，他把木勺舔干净，递给皮埃尔。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 面糊糊
  分类: 物件
  解释: 俄军士兵在野外用锅煮的简单食物，用面包干和腌肥肉加水煮成糊状。皮埃尔在波罗金诺战后与士兵共享此食，觉得从未吃过这么好吃的东西。
  书中原文: 把面包干掰碎放到锅里，还放一点腌肥肉。……皮埃尔坐近火堆，开始吃锅里的面糊糊，他觉得，他从来没吃过这么好吃的东西。
  网络来源: https://zh.wikipedia.org/wiki/俄式面糊

- 名词: 腌肥肉
  分类: 物件
  解释: 俄军士兵携带的传统军粮之一，用盐腌制的猪肥肉，耐储存且提供高热量。士兵们在煮面糊糊时加入腌肥肉以增加风味和营养。
  书中原文: 把面包干掰碎放到锅里，还放一点腌肥肉。
  网络来源: https://zh.wikipedia.org/wiki/萨洛_(食品)

- 名词: 皮埃尔自称民兵军官
  分类: 事件
  解释: 皮埃尔为拉近与士兵的距离，主动降低自己的社会身份，自称是民兵军官，与部队失散。实际上他是别祖霍夫伯爵，属于俄国最富有的贵族之一。
  书中原文: '"我？我？……"皮埃尔说，他觉得必须尽可能降低自己的社会地位，为跟士兵更接近，更为他们所了解，"说实在的，我是民兵军官，不过我的弟兄们不在这儿；我来参加战斗，跟自己的人失掉了联络。'
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 彼得·基里洛维奇
  分类: 人物
  解释: 皮埃尔的本名和父名（即彼得·基里洛维奇·别祖霍夫）。他在士兵询问名字时报出了自己的名字和父名，士兵们此后便以此称呼他，体现了士兵对他的接纳。
  书中原文: '"叫什么名字？""彼得·基里洛维奇。""那好啦，彼得·基里洛维奇，咱们一道走，我们领你去。'
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 摸黑进城莫扎伊斯克
  分类: 事件
  解释: 皮埃尔与三名士兵一起在黑暗中步行向莫扎伊斯克城进发，爬陡峭山路，直到鸡叫时才接近城门。途中皮埃尔几乎失魂落魄，忘记了客栈的位置。
  书中原文: 士兵们和皮埃尔一起摸黑向莫扎伊斯克走去。当他们走近莫扎伊斯克，爬陡峭的山路进城的时候，鸡已经叫了。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 马夫寻主
  分类: 事件
  解释: 皮埃尔的马夫在城里寻找他未果后返回客栈，在莫扎伊斯克半山腰遇见黑暗中戴白帽子的皮埃尔，认出主人，得知主人竟步行归来，大为惊讶。
  书中原文: 在半山腰碰见他的马夫……"大人，"他急匆匆地说，"我们还以为没指望了呢。您干吗步行啊？"
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 客栈过夜
  分类: 事件
  解释: 皮埃尔回到莫扎伊斯克的客栈后发现已无空房，只得在院中的马车里蒙头睡觉。但刚一入睡就被战场记忆中的枪声、呻吟、血腥和火药味惊醒，内心充满死的恐惧。
  书中原文: 客栈已经没有空房了，全占满了。皮埃尔穿过院子，把头蒙起来睡在他的马车里。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 战后创伤记忆
  分类: 概念
  解释: 皮埃尔在波罗金诺战役后出现的创伤后应激反应，包括幻觉般重现战场的枪声、炮声、呻吟和血腥味，伴随对死亡的强烈恐惧，体现战争对士兵心灵的深度伤害。
  书中原文: 皮埃尔头刚挨着枕头，就觉得睡着了；可是忽然间，几乎与现实一样清楚，响起了砰砰的射击声、呻吟声、喊叫声、炮弹的落地声，闻到了血腥和火药味，于是他感到恐怖和死的畏惧。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 繁星点点的晴空
  分类: 概念
  解释: 皮埃尔在黑暗的棚屋里被鸽子拍翅声惊醒后仰望天空所见到的景象，象征着历经战火后和平与宁静的回归。这一意象在托尔斯泰笔下常用来表达精神觉醒和宇宙永恒的主题。
  书中原文: 在两间灰暗的棚屋之间，可以看见繁星点点的晴空。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 和平的客栈气味
  分类: 概念
  解释: 皮埃尔在战争创伤后感受到的日常生活的安宁气息，包括干草、马粪和焦油的气味，这些平凡的味道在此刻带给他欢愉感，与战场的血腥和火药味形成鲜明对比。
  书中原文: 满院子散发着和平的、此刻使皮埃尔感到欢愉的、强烈的客栈气味，以及干草、马粪和焦油的气味。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 波罗金诺战场上的皮埃尔
  分类: 事件
  解释: 皮埃尔在波罗金诺战役中的经历全貌，包括他在拉耶夫斯基炮垒观战、目睹惨烈伤亡、徒步离开战场、与士兵分享食物、夜晚在客栈受创伤记忆困扰等系列情节。
  书中原文: 皮埃尔现在一心只想一件事，那就是赶快从这一天他所感受的可怕的印象中逃出来，回到日常生活的环境。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 海伦改嫁事件
  分类: 事件
  解释: 《战争与和平》中的一条重要情节线。海伦·库拉金娜在丈夫皮埃尔尚在战场前线时，利用宗教辩论、社交舆论和家族关系策划改嫁，写信要求皮埃尔办理离婚手续，展现了上流社会的道德虚伪。
  书中原文: 她给她丈夫写了一封信（她相信她丈夫非常爱她）通知他，她打算嫁给NN，还说她信了唯一真正的宗教，并请他履行离婚所必要的一切手续。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 轻罪
  分类: 概念
  解释: 基督教教义中的罪孽等级分类之一，指并非出于恶意所犯的、可以通过忏悔或善行弥补的较轻罪过。良心指导者认为海伦违背婚姻誓言的行为属于轻罪。
  书中原文: 是轻罪，还是死罪？是轻罪，因为您的行为并无恶意。
  网络来源: https://zh.wikipedia.org/wiki/七宗罪

- 名词: 死罪
  分类: 概念
  解释: 基督教教义中最严重的罪孽等级，指使人灵魂死亡、需要特殊忏悔和赦免的重大罪行。在讨论海伦的婚姻问题时作为与轻罪对比的极端情形被提及。
  书中原文: 是轻罪，还是死罪？是轻罪，因为您的行为并无恶意。
  网络来源: https://zh.wikipedia.org/wiki/七宗罪

- 名词: 神学争辩
  分类: 概念
  解释: 良心指导者与海伦之间就婚姻圣礼、誓言约束力和改嫁合法性展开的宗教辩论。海伦以敏捷的思维和巧妙的言辞在辩论中占据上风，将复杂的神学问题简化为信仰转变问题。
  书中原文: 良心指导者……开始反驳他的圣女的论断。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 理论大厦
  分类: 概念
  解释: 良心指导者经过深思熟虑构建起来的复杂神学理论体系。海伦以简单直接的问题突破了这个复杂的理论架构，使指导者感到惊奇但又无法放弃自己的体系。
  书中原文: 但是他不能放弃他绞尽脑汁建筑起来的理论大厦。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 单刀直入
  分类: 概念
  解释: 海伦向良心指导者坦率表达自己观点的直接方式，她声称因皈依真正宗教而不受旧宗教约束，这种直截了当的断言令习惯复杂神学论证的指导者大为意外。
  书中原文: 良心指导者对单刀直入地向他提出哥伦布与鸡蛋之类的问题，大为惊奇。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 挑逗醋意
  分类: 概念
  解释: 海伦为上流社会筹备改嫁舆论而使用的社交策略之一，通过挑逗那位年老的大官的醋意，促使他产生占有欲，从而推动求婚进程。
  书中原文: 她挑逗那个显贵的老头的醋意，把她对另一个求爱者说过的话告诉他。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 求爱者
  分类: 人物
  解释: 指向海伦求婚的两位上流社会人物——一位年轻亲王和一位年老的大官。海伦利用二人同时追求自己的局面在社交界散布自己面临选择的舆论。
  书中原文: 把她对另一个求爱者说过的话告诉他。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 徘徊歧路
  分类: 概念
  解释: 彼得堡上流社会传播的关于海伦处境的说法，称她正在两条道路之间犹豫不决，不知应嫁给两位追求者中的哪一位。这一舆论刻意掩盖了她在丈夫尚在时计划改嫁的事实。
  书中原文: 不幸的可爱的海伦正在徘徊歧路，不知道应当嫁给两个人中的哪一个。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 亵渎婚姻圣礼
  分类: 概念
  解释: 一些思想保守的人对海伦在丈夫尚在世时就计划改嫁的行为的定性，认为这严重冒犯了基督教婚姻圣礼的神圣性。
  书中原文: 他们认为这种意图亵渎了婚姻的圣礼。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 思想保守的人
  分类: 人物
  解释: 彼得堡上流社会中仍坚守传统婚姻道德观念的少数人，他们不认同海伦在丈夫在世时改嫁的计划，但在舆论压力下选择保持沉默。
  书中原文: 的确也有些思想保守的人不能理解这样的问题，他们认为这种意图亵渎了婚姻的圣礼；不过这种人不多，而且他们默不作声。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 公然违反公论
  分类: 事件
  解释: 玛丽亚·德米特里耶夫娜·阿赫罗西莫娃公开挑战上流社会关于海伦改嫁的普遍舆论。她是彼得堡唯一敢于在公开场合直言不讳批评海伦行为的贵族妇女。
  书中原文: 只有那年夏天来彼得堡看儿子的玛丽亚·德米特里耶夫娜·阿赫罗西莫娃敢于公然违反公论，表示自己的意见。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 粗声粗气
  分类: 概念
  解释: 玛丽亚·德米特里耶夫娜·阿赫罗西莫娃在舞会上当众斥责海伦时的说话方式，体现她直率、粗犷、不畏权贵的性格特点。
  书中原文: 在周围一片沉默气氛中，她粗声粗气地对她说……
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 掩藏激动的心情
  分类: 概念
  解释: 瓦西里公爵在向女儿海伦表示支持时的神态描写。他努力掩饰内心的激动，简短地表达了对女儿的支持后便匆匆走开，体现了父女之间微妙的关系。
  书中原文: 他总是掩藏着老是激动的心情，把他的腮帮贴了贴女儿的腮帮，就走开了。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 聪明绝顶的人
  分类: 概念
  解释: 作者对比利宾的形容，说明他在上流社会中以智慧和机智著称。比利宾是海伦的密友，以其冷静理性的分析和俏皮话闻名，被描述为永远不会坠入情网的旁观者。
  书中原文: 永远保持聪明绝顶的人名声的比利宾是海伦无私的朋友。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 无私的朋友
  分类: 概念
  解释: 文中对比利宾与海伦关系的定性，指比利宾不像海伦的其他追求者那样怀有浪漫意图，而是以纯粹朋友身份提供建议的海伦的亲密男性友人。
  书中原文: 永远保持聪明绝顶的人名声的比利宾是海伦无私的朋友。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 直呼其姓
  分类: 习俗
  解释: 19世纪俄国上流社会中的一种社交习惯，关系亲密的人之间可以直接称呼对方的姓氏而不加爵位或尊称。海伦对比利宾直呼其姓，表明二人关系非同一般。
  书中原文: 像比利宾这样的朋友，海伦总是直呼其姓。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 屈起一个指头
  分类: 习俗
  解释: 比利宾在分析海伦两位追求者时的标志性手势，每提到一个就弯曲一个手指，体现了他条理分明、善于分析的性格特点。
  书中原文: '"如果您嫁给那个亲王……"他屈起一个指头。'
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 娱悦晚年
  分类: 概念
  解释: 比利宾分析中提到的嫁给老伯爵的好处之一，即陪伴老伯爵度过晚年，待其去世后可以显贵遗孀身份再嫁年轻亲王，实现利益最大化。
  书中原文: 如果嫁给老伯爵，您就可以娱悦他的晚年。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 降低身份
  分类: 概念
  解释: 比利宾分析中提到的社交后果，指如果海伦先嫁给了年轻亲王，那位老伯爵娶她就会降低身份；反过来如果她先嫁给老伯爵再做遗孀，亲王娶她就不算降低身份。
  书中原文: 那个亲王就可以不降低身份要您这个显贵的遗孀了。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 显贵的遗孀
  分类: 概念
  解释: 比利宾为海伦描绘的理想身份规划，即先嫁给老伯爵，待其去世后成为贵族遗孀，这样年轻亲王就可以体面地娶她而不影响身份地位。
  书中原文: 那个亲王就可以不降低身份要您这个显贵的遗孀了。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 容光焕发
  分类: 概念
  解释: 海伦听到比利宾的分析后的反应描写，表明她对这一建议极为满意，也体现她的肤浅和虚荣。
  书中原文: '"……这才是一个真正的朋友！"海伦容光焕发，又一次碰了碰比利宾的衣袖。'
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 不可争辩的论据
  分类: 概念
  解释: 库拉金公爵夫人自以为找到的反对女儿改嫁的宗教论据，即神父引用的《福音书》中否定丈夫活着时再婚可能性的经文。
  书中原文: 公爵夫人自以为有了这些无可争辩的论据作武器。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 无可争辩的论据
  分类: 概念
  解释: 库拉金公爵夫人从神父处获得的《福音书》证据，她自以为这些论据无可辩驳，但海伦轻松地用神父有宽恕权的理由将其驳回。
  书中原文: 公爵夫人自以为有了这些无可争辩的论据作武器，一大早就坐着车去找女儿。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 一去不复返的青春时代
  分类: 概念
  解释: 库拉金公爵夫人在被女儿驳倒后的感慨，她开始认同海伦的观点并感叹自己年轻时不懂这些道理，反映了旧一代贵族道德观念在新一代实用主义面前的崩溃。
  书中原文: 她是对的；怎么我们在一去不复返的青春时代就不懂得这个呢？这是多么简单呀。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 混进士兵群里
  分类: 事件
  解释: 皮埃尔在波罗金诺战役后急于逃离血腥场景的行为，他混入普通士兵的行列中行走，试图在匿名和集体中获得安全感。
  书中原文: 他看见血，听到喊叫和呻吟，就连忙混进士兵群里，继续往前走。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 日常生活的环境
  分类: 概念
  解释: 皮埃尔在经历战争恐怖后内心极度渴望回归的熟悉、安宁的日常生活状态。他认为只有在日常环境中才能理解自己所看到和经历的一切。
  书中原文: 皮埃尔现在一心只想一件事，那就是赶快从这一天他所感受的可怕的印象中逃出来，回到日常生活的环境。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 淡漠的面孔
  分类: 概念
  解释: 皮埃尔在离开战场的路上看到的伤兵和平民的面部表情，这些面孔因过度痛苦而显得淡漠，反映了战争对人的精神状态的摧残。
  书中原文: 仍然是那些痛苦的、疲乏的、有时淡漠得出奇的面孔。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 军大衣
  分类: 物件
  解释: 19世纪俄军士兵的标准冬季军服，在小说中作为战争场景的标志性视觉元素反复出现。此处皮埃尔在逃离战场时沿途不断看到穿军大衣的身影。
  书中原文: 仍然是那些痛苦的、疲乏的、有时淡漠得出奇的面孔，仍然是那些血，那些军大衣。
  网络来源: https://zh.wikipedia.org/wiki/俄军大衣

- 名词: 暮色
  分类: 概念
  解释: 波罗金诺战役结束后的傍晚时分，天色渐暗，炮声平息，战场逐渐沉入宁静与黑暗，象征着战争惨烈的白昼结束和战后沉思的开始。
  书中原文: 暮色降临大地，隆隆的炮声平息下来。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 篝火
  分类: 物件
  解释: 士兵们在夜晚点燃的火堆，用来取暖和煮食。在皮埃尔精神恍惚的夜晚，士兵们在他身旁点燃篝火煮面糊糊，火光成为黑暗中的温暖和安慰的象征。
  书中原文: 半夜，有三个士兵拖来一些干树枝，在他身旁停下，点起火来。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 干树枝
  分类: 物件
  解释: 士兵们用来生火的柴火，他们在路边收集干树枝点燃篝火煮食。
  书中原文: 半夜，有三个士兵拖来一些干树枝，在他身旁停下，点起火来。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 面包干
  分类: 物件
  解释: 俄军士兵携带的干粮之一，即经过干燥处理的面包块，耐储存且便于携带。士兵们将其掰碎放入锅中煮成面糊糊。
  书中原文: 把面包干掰碎放到锅里，还放一点腌肥肉。
  网络来源: https://zh.wikipedia.org/wiki/俄军军粮

- 名词: 木勺
  分类: 物件
  解释: 士兵们使用的简陋餐具。士兵在把勺子递给皮埃尔之前先舔干净，体现了士兵之间的质朴和互助精神，也暗示了当时俄军物资的匮乏。
  书中原文: 他把木勺舔干净，递给皮埃尔。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 降低社会地位
  分类: 概念
  解释: 皮埃尔为融入士兵群体而刻意隐瞒贵族身份的举动。他自称民兵军官而非伯爵，认为只有这样才能被普通士兵接受和理解。
  书中原文: 他觉得必须尽可能降低自己的社会地位，为跟士兵更接近，更为他们所了解。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 民兵军官
  分类: 人物
  解释: 皮埃尔在向士兵介绍自己时编造的身份，俄国在1812年战争期间征召了大量民兵，民兵军官的地位低于正规军军官，更接近普通士兵。
  书中原文: 说实在的，我是民兵军官，不过我的弟兄们不在这儿。
  网络来源: https://zh.wikipedia.org/wiki/1812年俄法战争

- 名词: 鸡叫了
  分类: 概念
  解释: 黎明时分的标志性声音，暗示皮埃尔和士兵们在黑暗中行走了一整夜，直到黎明才抵达莫扎伊斯克城。
  书中原文: 当他们走近莫扎伊斯克，爬陡峭的山路进城的时候，鸡已经叫了。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 失魂落魄
  分类: 概念
  解释: 皮埃尔在波罗金诺战役后的精神状态描述，他因战争创伤而精神恍惚，甚至忘记了自己客栈的位置和步行回城的路径，处于半无意识的状态。
  书中原文: 他已经失魂落魄了。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 发白的帽子
  分类: 物件
  解释: 皮埃尔在黑暗中戴的浅色帽子，使他的马夫在半山腰的黑暗中能够认出他来。这一细节体现了贵族服饰在战时环境中的不协调。
  书中原文: 在半山腰碰见他的马夫……看见黑暗中发白的帽子，认出了皮埃尔。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 抓住衣兜
  分类: 概念
  解释: 皮埃尔在与士兵分别后本能地想掏钱酬谢士兵，但内心有个声音阻止了他。这一细节体现皮埃尔在战争经历的触动下，开始反思贵族与平民之间的金钱关系。
  书中原文: '"应当给他们点什么！"皮埃尔抓住衣兜想道。"不，不必啦。"仿佛有一个声音对他说。'
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 头蒙起来
  分类: 概念
  解释: 皮埃尔在客栈马车中睡觉时将头蒙在大衣下的动作，反映了他试图用物理方式隔绝战争记忆和世界喧嚣的心理需求。
  书中原文: 皮埃尔穿过院子，把头蒙起来睡在他的马车里。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 砰砰的射击声
  分类: 概念
  解释: 皮埃尔在创伤记忆中反复听到的战场声响，即使入睡后仍在脑海中不断回响，体现了战争造成的心理创伤。
  书中原文: 忽然间，几乎与现实一样清楚，响起了砰砰的射击声、呻吟声、喊叫声、炮弹的落地声。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 血腥和火药味
  分类: 概念
  解释: 皮埃尔在战后创伤记忆中反复体验到的战场嗅觉记忆，与客栈中和平的干草和马粪味形成强烈对比，象征战争暴力和日常生活之间的对立。
  书中原文: 闻到了血腥和火药味，于是他感到恐怖和死的畏惧。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 死的畏惧
  分类: 概念
  解释: 皮埃尔在波罗金诺战役后体验到的对死亡的强烈恐惧。尽管他之前一直渴望理解战争，但亲身经历后死亡的真实性给他带来了深刻的精神冲击。
  书中原文: 于是他感到恐怖和死的畏惧。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 踏着泥浆
  分类: 概念
  解释: 客栈勤务兵在大门口活动的细节描写，反映了俄罗斯秋季雨后泥泞的环境特点，与战场上血腥泥泞的土地形成呼应。
  书中原文: 只有一个勤务兵在大门口一边踏着泥浆，一边和店东谈话。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 店东
  分类: 人物
  解释: 莫扎伊斯克客栈的老板，在夜晚与勤务兵交谈，代表着皮埃尔渴望回归的日常生活的平凡一角。
  书中原文: 只有一个勤务兵在大门口一边踏着泥浆，一边和店东谈话。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 干草马粪和焦油的气味
  分类: 概念
  解释: 客栈院子中散发的混合气味，皮埃尔在经历战场的血腥之后，对这些平凡的农场气息感到格外欢愉和安慰。
  书中原文: 满院子散发着和平的、此刻使皮埃尔感到欢愉的、强烈的客栈气味，以及干草、马粪和焦油的气味。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 灰暗的棚屋
  分类: 物件
  解释: 客栈院子中两间简陋的棚屋，在夜色中呈灰暗色调，皮埃尔躺在马车中仰望棚屋之间的夜空，看到了繁星。
  书中原文: 在两间灰暗的棚屋之间，可以看见繁星点点的晴空。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 鸽子拍打翅膀
  分类: 概念
  解释: 皮埃尔在马车中坐起来时惊动棚屋顶上的鸽子，鸽子拍翅的声音打破了夜的寂静，也打破了皮埃尔噩梦般的幻觉。
  书中原文: 有一些鸽子被他坐起来的响声惊动了，拍打着翅膀。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 拉耶夫斯基炮垒
  分类: 地点
  解释: 波罗金诺战役中俄军中央阵地的关键防御工事，以指挥官拉耶夫斯基将军命名。皮埃尔在此处目睹了战役最激烈的战斗场面。这是全书战争描写的核心场景之一。
  书中原文: 皮埃尔又一次从拉耶夫斯基的炮垒跑下来，同一群伤兵沿着山谷向克尼亚济科沃村走去。
  网络来源: https://zh.wikipedia.org/wiki/拉耶夫斯基多面堡

- 名词: 克尼亚济科沃村
  分类: 地点
  解释: 波罗金诺战场附近的小村庄，皮埃尔离开拉耶夫斯基炮垒后沿着山谷向此村方向行走，途中经过救护站，目睹了战争的惨烈后果。
  书中原文: 皮埃尔又一次从拉耶夫斯基的炮垒跑下来，同一群伤兵沿着山谷向克尼亚济科沃村走去。
  网络来源: https://zh.wikipedia.org/wiki/波罗金诺战役

- 名词: 皮埃尔波罗金诺经历
  分类: 事件
  解释: 皮埃尔在波罗金诺战役中的完整经历，从他在拉耶夫斯基炮垒观战到战后徒步离开、与士兵共食、深夜受创伤记忆困扰的系列心理和物理旅程。这是皮埃尔精神转折的关键节点。
  书中原文: 皮埃尔现在一心只想一件事，那就是赶快从这一天他所感受的可怕的印象中逃出来。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 皮埃尔与士兵同食
  分类: 事件
  解释: 皮埃尔在战后的深夜与三名俄军士兵共享面糊糊的场景，通过这一平民化的接触，皮埃尔体验到了从未有过的简单快乐和与普通人的亲近感。
  书中原文: 皮埃尔坐近火堆，开始吃锅里的面糊糊，他觉得，他从来没吃过这么好吃的东西。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 士兵面糊糊
  分类: 物件
  解释: 俄军士兵在野外用面包干、腌肥肉和水煮成的简单食物。皮埃尔尝过后认为这是他从未吃过的美味，反映了战争环境下极端简单的食物也能带来满足感。
  书中原文: 皮埃尔坐近火堆，开始吃锅里的面糊糊，他觉得，他从来没吃过这么好吃的东西。
  网络来源: https://zh.wikipedia.org/wiki/俄式面糊

- 名词: NN指代
  分类: 概念
  解释: 托尔斯泰在小说中使用的写作手法，用NN代替海伦打算嫁的那个人物的名字。这种省略手法在19世纪俄国文学中常见，有避讳或暗示的作用。
  书中原文: 她打算嫁给NN。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: NN
  分类: 概念
  解释: 海伦在给皮埃尔的信中用来指代她的新追求者的隐名写法，托尔斯泰未明确写出此人的具体身份，可能是基于真实历史人物的避讳或小说叙事的需要。
  书中原文: 她打算嫁给NN。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 波罗金诺战役后的皮埃尔
  分类: 人物
  解释: 经历波罗金诺战役后的皮埃尔·别祖霍夫，其精神状态发生了深刻变化。他从一个对战争抱有好奇心的旁观者变成了被战争现实深深震撼的创伤者，为后续的精神觉醒和人生转变奠定基础。
  书中原文: 皮埃尔现在一心只想一件事，那就是赶快从这一天他所感受的可怕的印象中逃出来，回到日常生活的环境。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 海伦的离婚信
  分类: 事件
  解释: 1812年八月初海伦写给丈夫皮埃尔的正式信件，通知皮埃尔她打算嫁别人、已改信真正宗教、要求皮埃尔办理离婚手续。这封信送到时皮埃尔正在波罗金诺战场上。
  书中原文: 她给她丈夫写了一封信……通知他，她打算嫁给NN，还说她信了唯一真正的宗教，并请他履行离婚所必要的一切手续。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平

- 名词: 皮埃尔在波罗金诺
  分类: 事件
  解释: 皮埃尔以非军人身份出现在波罗金诺战役现场，他最初以好奇和观察者的心态来到战场，但战争的残酷现实彻底改变了他的认知，使他经历了从理论兴趣到切身体验的转变。
  书中原文: 皮埃尔又一次从拉耶夫斯基的炮垒跑下来……他看见血，听到喊叫和呻吟，就连忙混进士兵群里，继续往前走。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平
