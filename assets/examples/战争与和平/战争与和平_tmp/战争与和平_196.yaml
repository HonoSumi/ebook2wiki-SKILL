- 名词: 拉奥孔
  分类: 概念
  解释: "希腊神话中的特洛伊城祭司，因识破希腊人的木马计并警告特洛伊人而触怒雅典娜，最终与两个儿子被巨蟒缠死。西方文化中拉奥孔象征说出真相却不被相信的悲剧先知，其雕像是古希腊雕塑的杰作。文中尼古拉的戒指上刻有拉奥孔头像，作为他承诺不再动武的提醒物。"
  书中原文: "尼古拉，你什么时候把头像打碎了？她望着他戴着拉奥孔头像戒指的手说。让我永远提醒我吧。他指着打碎的戒指说。"
  网络来源: https://zh.wikipedia.org/wiki/%E6%8B%89%E5%A5%A5%E5%AD%94

- 名词: 谎花
  分类: 概念
  解释: "植物学术语，指只开花不结果的花(如南瓜、黄瓜等的雄花)，亦称徒花。在文学中用作比喻，形容徒有外表而无实际结果的人或事物。娜塔莎用谎花比喻索尼娅——美丽善良但如不结果的花一样，在爱情和人生中无所归属。"
  书中原文: "她就像草莓上开的一朵谎花，不结果子，你知道吗？我有时候可怜她，可有时候又觉得她不会像我们一样感觉到。"
  网络来源: https://baike.baidu.com/item/%E5%BE%92%E8%8A%B1

- 名词: 马特维·叶尔米什
  分类: 人物
  解释: "《战争与和平》中的次要人物，尼古拉·罗斯托夫庄园上的富裕农民。尼古拉常在妻子玛丽亚面前谈起马特维·叶尔米什一家人如何勤劳能干——整夜运庄稼，别人尚未收割时他们已把禾捆垛好。这个角色体现了托尔斯泰笔下理想化的朴实勤劳的俄国农民形象。"
  书中原文: "当他兴高采烈地谈起富裕农户马特维·叶尔米什和他家里的人整夜运庄稼，别人还没有收割，他已经把禾捆垛起来了的时候。"
  网络来源: https://zh.wikipedia.org/zh/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 安德留沙
  分类: 人物
  解释: "《战争与和平》中尼古拉·罗斯托夫与玛丽亚公爵小姐的长子，全名安德烈·尼古拉耶维奇·罗斯托夫，昵称安德留沙。名字继承自舅舅安德烈·博尔孔斯基公爵。在尾声部分，玛丽亚写育儿日记记录安德留沙的成长，是个活泼任性、对母亲充满依恋的孩子。"
  书中原文: "她的大孩子安德留沙学她的样，踮着脚尖跟着她。安德留沙在门口喊道：爸爸，妈妈在这儿站着呢。"
  网络来源: https://zh.wikipedia.org/zh/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 贵族选举
  分类: 习俗
  解释: "俄国贵族自治制度的核心组成部分，自1785年《贵族特权敕书》确立，贵族通过省、县两级贵族会议选举首席贵族并参与地方治理。在《战争与和平》时代，贵族选举是尼古拉·罗斯托夫等乡居贵族的重要社交和政治活动，也是托尔斯泰描写俄国贵族生活的重要背景。"
  书中原文: "他知道自己得脱下短棉袄，换上常礼服，穿上尖头窄皮靴，坐车到他新建成的教堂去，然后接待贺客，请他们用点心，谈论贵族选举和年景。"
  网络来源: https://wapbaike.baidu.com/item/%E8%B4%B5%E6%97%8F%E4%BC%9A%E8%AE%AE/55440963
