- 名词: 塔鲁丁诺战役
  分类: 事件
  解释: 1812年10月18日，俄军在塔鲁丁诺村附近突袭法军缪拉部队的战役，是俄军从战略防御转入战略反攻的转折点。
  书中原文: 费力最小、混乱最大、损失微不足道的整个战役所得到的最大结果，就是使退却转为进攻，暴露出法国人的弱点，对拿破仑军队的即将逃跑予以推动。
  网络来源: https://www.britannica.com/print/article/74349

- 名词: 莫斯科河战役
  分类: 事件
  解释: 即博罗季诺战役（法语称Bataille de la Moskova），1812年9月7日拿破仑与库图佐夫在莫斯科以西博罗季诺村进行的大会战，是19世纪前最血腥的单日战役。
  书中原文: 拿破仑在莫斯科河获得辉煌的胜利之后，进入了莫斯科；胜利是无可怀疑的，因为战场是属于法国人的。
  网络来源: https://baike.baidu.com/item/%E5%8D%9A%E7%BD%97%E5%AD%A3%E8%AF%BA

- 名词: 塞巴斯蒂安尼
  分类: 人物
  解释: 奥拉斯·塞巴斯蒂亚尼（Horace Sébastiani，1771-1851），法国军人、外交官、政治家，科西嘉人，拿破仑的同乡与支持者，1812年征俄期间指挥第2骑兵军，后获法国元帅衔。
  书中原文: 刚进莫斯科，拿破仑就严令塞巴斯蒂安尼将军注意俄国军队的行动，向各条道路派出兵团，命令缪拉寻找库图佐夫。
  网络来源: https://zh.m.wikipedia.org/zh-cn/%E5%A5%A5%E6%8B%89%E6%96%AF%C2%B7%E5%A1%9E%E5%B7%B4%E6%96%AF%E8%92%82%E4%BA%9A%E5%B0%BC

- 名词: 雅科夫列夫
  分类: 人物
  解释: 伊万·阿列克谢耶维奇·雅科夫列夫（Иван Алексеевич Яковлев，1767-1846），俄国贵族、近卫军上尉，著名作家赫尔岑的父亲。1812年拿破仑占领莫斯科期间被召见，受命携带拿破仑的信件前往彼得堡递交沙皇亚历山大一世。
  书中原文: 拿破仑把那个遭到抢劫、服装破烂、不知怎样才能逃出莫斯科的雅科夫列夫叫来，向他详细说明他的全部政策和宽大为怀，并且写了一封给亚历山大皇帝的信……然后就打发雅科夫列夫去彼得堡。
  网络来源: https://www.britannica.com/biography/Aleksandr-Ivanovich-Herzen

- 名词: 图托尔明
  分类: 人物
  解释: 伊万·阿列克谢耶维奇·图托尔明（Иван Акинфиевич Тутолмин，1752-1836），俄国慈善家，莫斯科帝国教育之家（育幼院）总监。1812年法军占领莫斯科期间组织孤儿疏散，被拿破仑召见并派往彼得堡进行和谈试探。
  书中原文: 他又向图托尔明详细讲了他的想法和宽大政策，他又把这个老头子派往彼得堡去进行谈判。
  网络来源: https://bakhtiniada.ru/kazanmedj/article/view/2353

- 名词: 圣瓦西里大教堂
  分类: 地点
  解释: 又称瓦西里升天教堂，位于莫斯科红场南端，1555-1561年由伊凡雷帝为纪念征服喀山汗国而下令建造，以九个彩色洋葱头圆顶闻名，是俄罗斯最著名的地标建筑。
  书中原文: 为了克里姆林宫设防而夷平清真寺（拿破仑这样称圣瓦西里大教堂）
  网络来源: https://wapbaike.baidu.com/item/%E7%93%A6%E8%A5%BF%E9%87%8C%E5%8D%87%E5%A4%A9%E6%95%99%E5%A0%82/6400960
