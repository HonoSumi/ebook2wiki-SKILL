- 名词: 火的洗礼
  分类: 概念
  解释: 军事术语，指士兵第一次参加实战的经历。原为基督教用语，后引申为军人初次上战场接受战火考验。
  书中原文: 祝贺您，伯爵，火的洗礼。
  网络来源: https://zh.wiktionary.org/wiki/炮火的洗禮

- 名词: 胸墙
  分类: 物件
  解释: 用泥土或石头筑成的防护墙，筑在战壕前方用于抵挡枪弹和弹片，是野战工事中常见的防御结构。
  书中原文: 战壕里设有十尊大炮，这时正伸出胸墙的炮眼发射。
  网络来源: https://www.zdic.net/hant/胸墙

- 名词: 火药
  分类: 物件
  解释: 一种爆炸性粉末，由硫磺、木炭和硝石混合制成，是当时火炮发射炮弹的推进剂，也是军事上重要的火器装药。
  书中原文: 装着炮、转炮、拿着口袋和火药不断在炮垒里从他身边跑过的士兵。
  网络来源: https://baike.baidu.com/item/火药

- 名词: 炮眼
  分类: 物件
  解释: 掩蔽工事上专为火炮开设的射击口，呈向外扩大的斜面，使火炮可以在胸墙掩护下向目标射击。
  书中原文: 战壕里设有十尊大炮，这时正伸出胸墙的炮眼发射。
  网络来源: https://baike.baidu.com/item/炮眼

- 名词: 大多面堡
  分类: 地点
  解释: 法国人对波罗金诺战役中拉耶夫斯基炮垒的称呼。多面堡是一种多边形的野战防御工事，四周挖有战壕并筑有土墙。
  书中原文: 法国人称它为大多面堡，致命的多面堡，中央多面堡。
  网络来源: https://www.163.com/dy/article/FI4MCPR705435IFC.html

- 名词: 致命的多面堡
  分类: 地点
  解释: 法国人对波罗金诺战役中拉耶夫斯基炮垒的称呼之一，因该阵地争夺极其惨烈、死伤无数而得名。
  书中原文: 法国人称它为大多面堡，致命的多面堡，中央多面堡。
  网络来源: https://www.163.com/dy/article/FI4MCPR705435IFC.html

- 名词: 中央多面堡
  分类: 地点
  解释: 法国人对波罗金诺战役中拉耶夫斯基炮垒的称呼之一，因该炮垒位于俄军防线中央而得名。
  书中原文: 法国人称它为大多面堡，致命的多面堡，中央多面堡。
  网络来源: https://www.163.com/dy/article/FI4MCPR705435IFC.html

- 名词: 土岗炮垒
  分类: 地点
  解释: 俄国人对波罗金诺战役中拉耶夫斯基炮垒的称呼，因该炮垒建在库尔干纳亚高地（土岗）之上而得名，是俄军中央防线的关键支撑点。
  书中原文: 俄国人称之为土岗炮垒，或者叫拉耶夫斯基炮垒。
  网络来源: https://www.163.com/dy/article/FI4MCPR705435IFC.html

- 名词: 第六兵团
  分类: 概念
  解释: 1812年俄法战争中俄国第六步兵军，由多赫图罗夫将军指挥，在波罗金诺战役中负责中央防线的防御，后接替受伤的巴格拉季翁指挥左翼部队。
  书中原文: 他们在硝烟中经过第六兵团，向前移动了的大炮在后面震耳欲聋地射击着。
  网络来源: https://baike.baidu.com/item/德米特里·谢尔盖耶维奇·多赫图罗夫/9381154
