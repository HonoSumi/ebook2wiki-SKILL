- 名词: 安德烈公爵
  分类: 人物
  解释: 全名安德烈·博尔孔斯基公爵，托尔斯泰《战争与和平》的核心人物之一，博尔孔斯基家族长子。性格孤傲正直、才华横溢，两次投身战场，最终在波罗金诺战役中重伤去世。
  书中原文: 安德烈公爵在观看一副他以前没见过的金色大镜框，镜框里装着博尔孔斯基公爵家的谱系图
  网络来源: https://baike.baidu.com/item/%E5%AE%89%E5%BE%B7%E7%83%88%C2%B7%E5%8D%9A%E5%B0%94%E5%AD%94%E6%96%AF%E5%9F%BA/55647709

- 名词: 玛丽亚公爵小姐
  分类: 人物
  解释: 全名玛丽亚·博尔孔斯卡娅，安德烈公爵的妹妹，博尔孔斯基家族成员。性格虔诚善良、隐忍坚强，深受宗教影响，后来嫁给尼古拉·罗斯托夫。
  书中原文: 玛丽亚公爵小姐惊异地看了哥哥一眼。她不懂他笑什么。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/9134429

- 名词: 老公爵
  分类: 人物
  解释: 全名尼古拉·安德烈耶维奇·博尔孔斯基公爵，安德烈和玛丽亚的父亲，退役陆军元帅。性格严苛专制、极度遵循秩序，信奉"工作和智慧"为美德，隐居童山庄园，最终在1812年战争期间去世。
  书中原文: 老公爵像平时一样迅速而快活地走进来，好像故意用他那匆忙的样子来跟家中的严格秩序作个对比似的。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/9134429

- 名词: 小公爵夫人
  分类: 人物
  解释: 全名丽莎·博尔孔斯卡娅（丽莎韦塔·卡尔洛夫娜），安德烈公爵的妻子，被称为"小公爵夫人"。活泼可爱，喜爱社交，怀孕期间留守童山，后难产而死，成为安德烈人生转折的重要触发点。
  书中原文: 小公爵夫人没听见或者不愿意听他的话。她默不作声，有点局促不安。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/9134429

- 名词: 米哈伊尔·伊万诺维奇
  分类: 人物
  解释: 博尔孔斯基老公爵家中的建筑师，受到老公爵破例优待，可以同桌吃饭。老公爵常以他为例子教导女儿"人人平等"，并喜欢在饭桌上与他谈论战争和政治话题。
  书中原文: 米哈伊尔·伊万诺维奇一点也不记得"咱们"什么时候说过波拿巴这类话，不过他懂得，公爵是利用他来引出得意的话题。
  网络来源: https://www.williamlong.info/xiaoshuo/archives/477.html

- 名词: 布里安小姐
  分类: 人物
  解释: 玛丽亚公爵小姐的法国女伴，全名Mademoiselle Bourienne。寄居在博尔孔斯基家族中担任陪伴和朗读工作。性格轻佻、有野心，曾对阿纳托利·库拉金产生幻想，在法军逼近时一度劝说玛丽亚不要离开庄园。
  书中原文: 只有布里安小姐……
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/9134429

- 名词: 波将金
  分类: 人物
  解释: 全名格里戈里·亚历山德罗维奇·波将金，俄国政治家、军事家、陆军元帅，叶卡捷琳娜二世最著名的情人和核心谋士。主导将克里米亚并入俄国版图，建有黑海舰队。"波将金村"成为弄虚作假的代名词。
  书中原文: 只不过因为没有波将金或苏沃洛夫一类人跟他对抗罢了。
  网络来源: https://baike.baidu.com/item/%E6%B3%A2%E5%B0%86%E9%87%91/6362170

- 名词: 莫罗
  分类: 人物
  解释: 全名让·维克多·马里·莫罗，法国大革命战争时期的杰出将领。以霍恩林登战役大胜著称，与拿破仑由合作走向对立，被流放美国。后在第六次反法同盟中参战，于德累斯顿战役中阵亡。
  书中原文: 其实，就是苏沃洛夫不是也陷入莫罗的圈套脱不了身吗？
  网络来源: https://zh.wikipedia.org/zh-hk/%E8%AE%A9%C2%B7%E7%BB%B4%E5%85%8B%E6%89%98%C2%B7%E9%A9%AC%E9%87%8C%C2%B7%E8%8E%AB%E7%BD%97

- 名词: 腓特烈
  分类: 人物
  解释: 即腓特烈大帝（腓特烈二世），1740年至1786年在位的普鲁士国王，霍亨索伦王朝著名君主。杰出的军事统帅和开明专制君主，发动西里西亚战争，参与七年战争，将普鲁士提升为欧洲强国。
  书中原文: 只有两个人：腓特烈和苏沃洛夫……
  网络来源: https://baike.baidu.com/item/%E8%85%93%E7%89%B9%E7%83%88%E5%A4%A7%E5%B8%9D/16002678

- 名词: 帕伦
  分类: 人物
  解释: 全名彼得·路德维希·冯·德·帕伦伯爵，俄罗斯帝国骑兵上将，出身波罗的海德意志贵族。曾任库尔兰总督，以策划刺杀沙皇保罗一世（1801年）而闻名。
  书中原文: 德意志人帕伦奉命到美国纽约找法国人莫罗去了
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/9134429

- 名词: 留里克
  分类: 人物
  解释: 瓦良格人首领，俄罗斯留里克王朝的创立者，诺夫哥罗德大公。据《往年纪事》记载，862年应邀率领亲兵来到诺夫哥罗德建立政权，其后继者奥列格建立基辅罗斯，开启了俄罗斯第一个王朝。
  书中原文: 这一定是留里克的后裔，也就是博尔孔斯基家的祖先。
  网络来源: https://baike.baidu.com/item/%E7%95%99%E9%87%8C%E5%85%8B/9658683

- 名词: 阿普拉克辛娜伯爵夫人
  分类: 人物
  解释: 托尔斯泰《战争与和平》中的极次要背景角色，在上流社会的谈话中被提及，属于营造时代氛围、展现贵族社交网络的背景人物，并无直接登场。
  书中原文: 可怜的阿普拉克辛娜伯爵夫人死了丈夫，眼泪都哭干了，可怜的人儿。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/9134429

- 名词: 斯特恩
  分类: 人物
  解释: 全名劳伦斯·斯特恩，18世纪英国小说家、牧师，感伤主义文学代表人物。代表作《项狄传》以打破传统叙事规则著称，被誉为意识流小说鼻祖，对后世文学影响深远。
  书中原文: 正如斯特恩所说，"我们爱那些给过我们好处的人，远不如爱那些受过我们好处的人。"
  网络来源: https://baike.baidu.com/item/%E5%8A%B3%E4%BC%A6%E6%96%AF%C2%B7%E6%96%AF%E7%89%B9%E6%81%A9/10990184

- 名词: 奥恰科夫
  分类: 地点
  解释: 乌克兰南部城市（现名奥恰基夫），位于第聂伯河口与布格河交汇处，历史上是战略要地。俄土战争期间（1788年）波将金和苏沃洛夫率俄军攻占该奥斯曼要塞，后根据《雅西条约》割让给俄罗斯帝国。
  书中原文: 是从奥恰科夫城下带回来的。
  网络来源: https://baike.baidu.com/item/%E5%A5%A5%E6%81%B0%E5%9F%BA%E5%A4%AB/1482923

- 名词: 谱系图
  分类: 物件
  解释: 也称家谱图、世系图，以图表形式记录家族世代传承关系的文献。在中国与正史、方志并称史学三大支柱；在俄国贵族家庭中，谱系图常被悬挂展示以彰显家族荣耀与血统渊源。
  书中原文: 镜框里装着博尔孔斯基公爵家的谱系图
  网络来源: https://baike.baidu.com/item/%E8%B0%B1%E7%89%92%E5%AD%A6/3445401

- 名词: 腊肠烧酒军事参议院
  分类: 事件
  解释: 原文指Hofkriegsrat（霍夫克里格斯拉特），即哈布斯堡君主国的帝国战争委员会（宫廷军事参议院），1556年至1848年间的中央军事行政机构。"腊肠烧酒"是托尔斯泰借老公爵之口对该奥地利机构的讥讽蔑称。
  书中原文: 可是宫廷的腊肠烧酒军事参议院掣他的肘。
  网络来源: https://zh.wikipedia.org/wiki/%E5%B8%9D%E5%9B%BD%E6%88%98%E4%BA%89%E5%A7%94%E5%91%98%E4%BC%9A
