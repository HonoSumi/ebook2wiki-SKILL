- 名词: 蒂尔西特会面
  分类: 事件
  解释: |
    蒂尔西特会面（1807年6月25日—7月7日）是拿破仑与俄国沙皇亚历山大一世在普鲁士蒂尔西特（今俄罗斯苏维埃茨克）涅曼河上木筏中举行的历史性会晤。双方进行了多次单独密谈（史称"蒂尔西特的秘密"），最终签订《蒂尔西特和约》：俄国加入大陆封锁体系对英断交，未失领土且获得比亚韦斯托克地区；普鲁士丧失一半以上领土，军队裁至4万人并赔款1.545亿法郎。此次会面标志着第四次反法同盟瓦解，拿破仑欧陆霸权达到巅峰。
  书中原文: |
    六月十三日，法、俄两国的皇帝在蒂尔西特会见。鲍里斯·德鲁别茨科伊向他所跟随的要人请求把他列入驻蒂尔西特的侍从。
    鲍里斯是两位皇帝在涅曼会见的少数目击者之一；他看见带花字头的木筏，看见拿破仑在对岸从法国近卫军面前走过，看见亚历山大皇帝在涅曼河岸上一家小酒店里坐着等待拿破仑的时候，他那心事重重的脸色；看见两位皇帝上了船，拿破仑的船首先靠拢木筏，他快步走上前去迎接亚历山大，把手伸给他，于是两人一起进入大帐篷。
  网络来源: |
    https://baike.baidu.com/item/%E6%8F%90%E5%B0%94%E8%A5%BF%E7%89%B9%E5%92%8C%E7%BA%A6/1614069

- 名词: 蒂尔西特
  分类: 地点
  解释: |
    蒂尔西特（Tilsit，1946年后改称苏维埃茨克/Sovetsk），位于涅曼河南岸，今属俄罗斯加里宁格勒州，与立陶宛边境城市隔河相望。1288年条顿骑士团在此建城堡，1552年获城市权。1807年因《蒂尔西特和约》而闻名于世——拿破仑与亚历山大一世在此会晤并签约。1871年成为德意志帝国一部分，1945年被苏军攻占后改名。城市以蒂尔西特奶酪（Tilsiter）亦闻名于世。
  书中原文: |
    六月十三日，法、俄两国的皇帝在蒂尔西特会见。鲍里斯·德鲁别茨科伊向他所跟随的要人请求把他列入驻蒂尔西特的侍从。……因为当时皇帝的侍从不多，对于希望仕途顺利的人来说，在两国皇帝会见期间能亲临蒂尔西特现场，是一件非常重要的事情，而鲍里斯竟然来到了蒂尔西特，所以他感到他的地位从此就完全稳固了。
  网络来源: |
    https://baike.baidu.com/item/%E8%8B%8F%E7%BB%B4%E5%9F%83%E8%8C%A8%E5%85%8B/8007076

- 名词: 涅曼河
  分类: 地点
  解释: |
    涅曼河（立陶宛语Nemunas，俄语Неман，德语Memel），东欧平原西部重要河流，发源于白俄罗斯明斯克西南约50公里，流经白俄罗斯、立陶宛和俄罗斯加里宁格勒州，全长937公里，流域面积约9.82万平方公里，经库尔斯潟湖注入波罗的海。二战前涅曼河曾是德语区东部界限（德国国歌"von der Maas bis an die Memel"即指此河）。1807年拿破仑与亚历山大一世在河上木筏会晤签订蒂尔西特和约；1812年拿破仑率军渡河入侵俄国。
  书中原文: |
    鲍里斯是两位皇帝在涅曼会见的少数目击者之一；他看见带花字头的木筏，看见拿破仑在对岸从法国近卫军面前走过，看见亚历山大皇帝在涅曼河岸上一家小酒店里坐着等待拿破仑的时候，他那心事重重的脸色；看见两位皇帝上了船，拿破仑的船首先靠拢木筏，他快步走上前去迎接亚历山大，把手伸给他，于是两人一起进入大帐篷。
  网络来源: |
    https://baike.baidu.com/item/%E5%B0%BC%E6%9B%BC%E6%B2%B3/4469972

- 名词: 莫利坦
  分类: 地点
  解释: |
    莫利坦（Moliten/Molliten），东普鲁士的一个小城镇（今属俄罗斯加里宁格勒州或波兰北部地区）。在《战争与和平》中，骠骑兵杰尼索夫少校在1807年战役期间于此地受伤，随后被送往普鲁士某镇的军医院治疗。该地在中文译本中音译为"莫利坦"，英文原版作Moliten。1807年俄军在东普鲁士与拿破仑军队作战，莫利坦是杰尼索夫受伤的历史事件发生地。
  书中原文: |
    "杰尼索夫少校，"罗斯托夫又说一遍，"他是在莫利坦受的伤。"
  网络来源: |
    http://www.8ge.net/dubook/%E5%90%8D%E8%91%97%C2%B7%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/95.htm

- 名词: 伤寒医院
  分类: 物件
  解释: |
    19世纪欧洲战争中的战地伤寒医院，条件极为恶劣。医院多设在简易砖房内，门窗残缺、卫生极差、缺乏基本药品和护理人员。伤寒（斑疹伤寒）通过虱子传播，在拥挤肮脏的军营和医院中极易爆发。拿破仑1812年侵俄战争中就有数十万士兵死于斑疹伤寒。书中描写了罗斯托夫探访的医院：伤病员躺在地板稻草上，腐肉和病院气味弥漫，死亡率极高，医生自己也说"谁进来谁就是找死"。
  书中原文: |
    医院是一所砖房，医院的围墙木板被拆得残缺不全，一部分门窗和玻璃被毁坏。扎着绷带、面色苍白、身体浮肿的士兵有的在散步，有的坐在院子里晒太阳。
    "伤寒，老兄。谁进来，谁就是找死。只有我和马克耶夫（他指了指医助）在这儿磨蹭。我们当大夫的同行在这儿已经死了五六个了。新来的人要不了一个星期就完蛋大吉，"医生带着得意的神情说。
    伤病员头顶着墙睡成两排，屋中间留下走道。他们大多数昏迷，不省人事……所有的人都同样的表情——祈求帮助，谴责和羡慕别人的健康。
  网络来源: |
    https://www.fx361.com/page/2019/0216/6372723.shtml

- 名词: 军需官失窃案
  分类: 事件
  解释: |
    军需官失窃案是《战争与和平》中杰尼索夫少校在1807年战役期间卷入的司法事件。因部队补给短缺，杰尼索夫冲动之下用暴力手段夺取了军需官运送的粮食，被军需官告上军事法庭。杰尼索夫拒绝认罪求饶，坚称自己"为皇上、为祖国服务，没有盗窃"，是自己揭发了真正的窃贼。他的战友图申和病友劝说其向皇上呈递赦免请求书，杰尼索夫最终勉强同意。罗斯托夫带着这份申诉书前往蒂尔西特，意图利用两国皇帝会面的时机为好友求情。
  书中原文: |
    当罗斯托夫问起案情时，他立刻从枕头底下拿出军事法庭的公文和他对公文的答复草稿。他一开始念他的草稿，就来精神了，他特别叫罗斯托夫注意他在草稿中对自己的敌人的讽刺语句。
    "要我去求皇上！"他说，他本来想说得像以前那样，激昂有劲，但令人听来却是不必要的急躁，"请求什么？如果我是强盗，那么我会求饶的，可是，审判我是因为我把强盗揭出来了。就让他们审判吧，我谁也不怕；我勤勤恳恳为皇上、为祖国服务，没有盗窃！"
    杰尼索夫读了一个多小时，才读完他那篇措词辛辣的呈文……
    "看来，鞭子是打不断斧背的。"他说，他离开窗口，把一个大信封交给罗斯托夫。这是军法检察官拟的给皇上的呈文，其中并没有军需处的责任，只是请求赦免。
  网络来源: |
    https://book.qq.com/book-read/52511345/36
