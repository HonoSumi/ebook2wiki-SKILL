- 名词: 伊利亚·安德烈伊奇伯爵
  分类: 人物
  解释: 罗斯托夫家族家长，善良热情但经营不善，面临破产仍沉迷牌局。原型为托尔斯泰的祖父伊利亚·托尔斯泰，是尼古拉、娜塔莎、薇拉和彼佳的父亲。他明知家道中落却无法改变生活方式，打牌时故意输钱给邻座。1813年在接连遭受打击后精神崩溃，临终痛哭请求宽恕荡尽家产之罪。
  书中原文: 伯爵经管他的家产，犹如在巨大的捕兽网里挣扎，他极力不相信他陷入网里，然而他一步步地越陷越深，感到既无力把捆住他的网冲破，也不能小心地、耐心地把它解开。||伯爵的威斯特和波士顿牌局仍然不可缺少，他让大家都能看见他的牌，每天让邻人赢去数百卢布，而邻人把同伊利亚·安德烈伊奇伯爵斗牌看作一项最好的收入。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 伯爵夫人
  分类: 人物
  解释: 罗斯托夫伯爵夫人，慈爱但焦虑的母亲，为改善家境想给尼古拉找有钱媳妇。15岁结婚，育有12个孩子。她善良但世俗，对没有陪嫁的索尼娅与尼古拉亲近感到恼怒。1812年战争中对幼子彼佳表现出近乎病态的爱怜。丈夫去世后她逐渐精神恍惚。
  书中原文: 好心的伯爵夫人觉得，她的孩子们要受穷，这不是伯爵的罪过，因为他只能像他现在这样做人，连他自己也由于意识到他和孩子们的破产而感到痛苦（虽然他瞒着这一点），她在寻求挽救的办法。从她这个妇女的观点来看，办法只有一条，就是给尼古拉娶一房有钱的媳妇。||好几次，伯爵夫人含着眼泪对儿子说，现在她的两个女儿都有了主了，她唯一的愿望就是希望看见他成亲。
  网络来源: https://baijiahao.baidu.com/s?id=1732521875652580603

- 名词: 尼古拉
  分类: 人物
  解释: 罗斯托夫家长子，重情义的骠骑兵军官，因爱穷表妹索尼娅而拒绝母亲安排的与朱莉的婚事。他单纯善良、崇尚武勇，对沙皇亚历山大一世怀有近乎宗教般的崇拜。老伯爵去世后他承担了比遗产多一倍的债务，成为精明能干的庄园主。政治保守，坚决反对变革。
  书中原文: 可是，妈妈，如果我爱上没有财产的姑娘，难道您要我为了财产而牺牲感情和名誉吗？他问母亲，他一心只想表现自己的高尚情操，不了解他这样问多么伤母亲的心。||是的，也许我是在爱一个穷苦的姑娘，尼古拉自言自语，怎么，我真的要为财产而牺牲爱情和名誉吗？真奇怪，妈妈怎么对我说出这样的话。难道就因为索尼娅穷，我就不能爱她？就不能报答她那忠实的、一往情深的爱情？
  网络来源: https://baijiahao.baidu.com/s?id=1732521875652580603

- 名词: 娜塔莎
  分类: 人物
  解释: 罗斯托夫家次女，与安德烈公爵订婚，因长期分离而陷入忧郁焦躁，是全书女主角。托尔斯泰笔下她充满生命力和热情，父亲叫她火药，母亲称她哥萨克。她经历了与安德烈公爵的热恋订婚、被阿纳托尔诱惑私奔、1812年战争中照料伤兵、战后嫁给皮埃尔成为贤妻良母。
  书中原文: 娜塔莎依旧爱她的未婚夫，依旧为这一爱情而感到欣慰，对一切生活的欢乐依旧易于感受；可是和他离别的第四个月末尾，一阵阵无法排遣的忧郁开始袭上她的心头。她可怜自己，可怜她不为任何人而虚度年华，而这正是她觉得自己完全能够爱人和被人爱的大好年华。||妈妈，我要他。凭什么就这样把我毁掉，妈妈？她的声音突然中断了，泪水涌出来。
  网络来源: https://baike.baidu.com/item/%E5%A8%9C%E5%A1%94%E8%8E%8E%C2%B7%E7%BD%97%E6%96%AF%E6%89%98%E5%A8%83/15143141

- 名词: 索尼娅
  分类: 人物
  解释: 罗斯托夫家的穷侄女，爱慕尼古拉，性格温顺善良、忠贞不渝。父母双亡后由罗斯托夫家收养，与尼古拉青梅竹马。娜塔莎称她为一朵草莓上不结果实的谎花，美丽却没有收获。尼古拉最终娶了玛丽亚公爵小姐后，索尼娅终身未嫁，默默操持家务。
  书中原文: 最使这位仁慈的伯爵夫人恼火的是，这个可怜的黑眼睛侄女是这么温顺，这么善良，对她的恩人是这么由衷地感激，她对尼古拉的爱情是这么忠贞不渝和富于自我牺牲精神，简直对她无可指责。
  网络来源: https://www.fx361.com/page/2022/0219/10054105.shtml

- 名词: 朱莉·卡拉金娜
  分类: 人物
  解释: 莫斯科富有的未婚姑娘，伯爵夫人为尼古拉选中的配偶，后嫁给鲍里斯·德鲁别茨基。兄弟相继去世后继承巨额财产。托尔斯泰描写她27岁、并不漂亮，总是装出一副对一切失望的矫揉造作姿态。她利用财富迫使鲍里斯说出爱她的话，代表了上流社会世故物质的贵族女性典型。
  书中原文: 这个配偶就是朱莉·卡拉金娜，她的父母都是高尚的好人，她从小罗斯托夫家的人就认识她，现在由于她的最后一个兄弟的死，她已经成为富有的未婚姑娘了。||伯爵夫人直接给莫斯科的卡拉金娜写信，向她提出她们两家子女的婚事，并且接到对方令人满意的回答。卡拉金娜说，她本人是同意的，但问题全看她女儿的意思了。卡拉金娜邀请尼古拉去莫斯科。
  网络来源: https://book.douban.com/annotation/109812678/

- 名词: 安德烈公爵
  分类: 人物
  解释: 娜塔莎的未婚夫，博尔孔斯基公爵之子，在罗马养伤推迟回国。他是全书核心男主之一，孤傲正直，对上流社会的虚伪深恶痛绝。经历了奥斯特利茨战役重伤、妻子难产去世后的消沉、与娜塔莎订婚又解除、波罗金诺战役身负重伤，弥留之际领悟爱是生命的真谛。
  书中原文: 安德烈公爵从罗马寄来第四封信，信中说，如果不是他的伤口在温暖的气候中突然裂开，他的行期不得不推延到明年初春的话，他早已在回国的途中了。
  网络来源: https://baike.baidu.com/item/%E5%AE%89%E5%BE%B7%E7%83%88%C2%B7%E5%8D%9A%E5%B0%94%E5%AD%94%E6%96%AF%E5%9F%BA/55647709

- 名词: 彼佳
  分类: 人物
  解释: 罗斯托夫家幼子，天真活泼，在准备晚上放的焰火。全名彼得·伊里奇·罗斯托夫，充满青春活力、热血冲动。狂热崇拜沙皇亚历山大一世，渴望为国效力。在1812年战争后期的一次游击战中冲锋时被敌军击中阵亡，给罗斯托夫家族带来巨大悲痛。
  书中原文: 她的弟弟彼佳也在楼上：他和专门伺候他的仆人正在准备晚上放的焰火。||彼佳跑到她跟前，转身把背朝着她。她跳上去，双手搂着他的脖子，他背着她一纵一纵地往前跑。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 娜斯塔西娅·伊万诺夫娜
  分类: 人物
  解释: 罗斯托夫家的小丑，身穿敞胸女上衣，说话诙谐无忌。在俄国贵族家庭中常有养着小丑或食客的传统，他们多为破落贵族或家奴出身，以插科打诨供主人取乐。当娜塔莎问她会生什么时，她以跳蚤、蜻蜓、蝈蝈玩笑作答。
  书中原文: 小丑娜斯塔西娅·伊万诺夫娜哭丧着脸同两个老太婆坐在窗口。||纳斯塔西娅·伊万诺夫娜，我会生个什么？她问那个身穿敞胸女上衣迎面走来的小丑。你生个跳蚤、蜻蜓、蝈蝈。小丑答道。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 约格尔
  分类: 人物
  解释: 罗斯托夫家的舞蹈教师，在节日为年轻人举办舞会。在当时的莫斯科贵族家庭中舞蹈教师是重要的社交教育角色。他与妻子住在罗斯托夫家楼上，与两位女教师共同生活，讨论在莫斯科还是敖德萨生活更便宜这类话题。
  书中原文: 她撒开腿，登登地快步跑上楼梯去找约格尔，他和妻子住在楼上。约格尔那儿坐着两位女教师，桌上摆着几盘葡萄干、核桃和杏仁。两位女教师在谈论在哪里生活比较便宜，在莫斯科还是在敖德萨。
  网络来源: https://www.yunshuwu.cn/chap/8618.html

- 名词: 肖斯小姐
  分类: 人物
  解释: 罗斯托夫家的女家庭教师。在19世纪俄国贵族家庭中聘请法籍或德籍女教师教授子女外语和礼仪十分普遍。当娜塔莎因思念安德烈公爵而心神不宁随口说马达加斯加岛时，肖斯小姐问她说了什么，娜塔莎不回答便离去。
  书中原文: 马达加斯加岛，她很快地说了一句，马—达—加斯—加。她一个个音节清楚地重说一遍，她不回答肖斯小姐问她说的什么，就走出屋去。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 福卡
  分类: 人物
  解释: 罗斯托夫家管餐室的仆人，被托尔斯泰描写为全家脾气最坏的人。娜塔莎喜欢拿他试自己的权威，福卡虽然表面上皱眉质疑，最终仍会服从。反映了罗斯托夫家宽松的主仆关系——仆人们对娜塔莎的使唤再没有比执行命令那么乐意的了。
  书中原文: 管餐室的福卡是全家脾气最坏的人，娜塔莎喜欢拿他试试她的权威。他对她的话不敢相信，走向前去问个究竟。唉呀，我的好小姐！福卡假装对娜塔莎皱着眉头，说。||全家没有一个人像娜塔莎这样打发这么多的人和交代这么多的事了。她看见人不支使他们做点什么就不甘心。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 莫斯科
  分类: 地点
  解释: 朱莉·卡拉金娜的居住地，伯爵夫人邀请尼古拉前去提亲的城市。19世纪初的莫斯科是俄国贵族社交生活的重要中心，与彼得堡的官方宫廷氛围不同，莫斯科的贵族生活更为传统、悠闲和家族化。罗斯托夫家族就定居在莫斯科。
  书中原文: 伯爵夫人直接给莫斯科的卡拉金娜写信，向她提出她们两家子女的婚事，并且接到对方令人满意的回答。卡拉金娜说，她本人是同意的，但问题全看她女儿的意思了。卡拉金娜邀请尼古拉去莫斯科。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 罗马
  分类: 地点
  解释: 安德烈公爵在意大利养伤的城市。19世纪初属于拿破仑统治下的意大利王国。托尔斯泰安排安德烈在罗马养伤客观上造成了他与娜塔莎的长期分离，为后来娜塔莎被阿纳托尔诱惑埋下伏笔。
  书中原文: 安德烈公爵从罗马寄来第四封信，信中说，如果不是他的伤口在温暖的气候中突然裂开，他的行期不得不推延到明年初春的话，他早已在回国的途中了。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 彼得堡
  分类: 地点
  解释: 俄罗斯帝国首都（今圣彼得堡），娜塔莎曾与安德烈公爵一起听歌剧的地方。18世纪初由彼得大帝建立。在小说中彼得堡是上流社会社交生活的中心，与莫斯科的传统贵族氛围不同，彼得堡更欧化、更官方。
  书中原文: 她走进大厅，拿起吉他，坐在柜子后面黑暗的角落里，开始拨弄低音弦，弹她在彼得堡同安德烈公爵一起听过的歌剧中的乐句。在旁人听来，她弹的没有任何意义，但是这些音响在她的想象中唤起了一连串的回忆。
  网络来源: https://zh.wikipedia.org/wiki/%E5%9C%A3%E5%BD%BC%E5%BE%97%E5%A0%A1

- 名词: 敖德萨
  分类: 地点
  解释: 乌克兰黑海沿岸的重要港口城市，18世纪末由叶卡捷琳娜二世建立。19世纪初敖德萨迅速发展成为俄国重要的贸易港口和多元文化城市。在小说中仅作为女教师讨论生活费用时提及的城市。
  书中原文: 约格尔那儿坐着两位女教师，桌上摆着几盘葡萄干、核桃和杏仁。两位女教师在谈论在哪里生活比较便宜，在莫斯科还是在敖德萨。
  网络来源: https://zh.wikipedia.org/wiki/%E6%95%96%E5%BE%B7%E8%90%A8

- 名词: 马达加斯加岛
  分类: 地点
  解释: 娜塔莎无聊时随口说出的远方地名。非洲东南部的世界第四大岛。娜塔莎因想念安德烈公爵而心神不宁，在约格尔房间随口说出马达加斯加岛，一个音节一个音节地重复，然后径自离去。反映了她想逃离当下环境的潜意识。
  书中原文: 马达加斯加岛，她很快地说了一句，马—达—加斯—加。她一个个音节清楚地重说一遍，她不回答肖斯小姐问她说的什么，就走出屋去。
  网络来源: https://zh.wikipedia.org/wiki/%E9%A9%AC%E8%BE%BE%E5%8A%A0%E6%96%AF%E5%8A%A0

- 名词: 威斯特牌
  分类: 物件
  解释: 伯爵常玩的纸牌游戏之一，桥牌的前身。一种起源于英国的经典四人扑克牌游戏，18至19世纪在欧洲贵族中极为流行。伯爵打威斯特牌时故意让对手看见自己的牌，每天输给邻人数百卢布。
  书中原文: 伯爵的威斯特和波士顿牌局仍然不可缺少，他让大家都能看见他的牌，每天让邻人赢去数百卢布，而邻人把同伊利亚·安德烈伊奇伯爵斗牌看作一项最好的收入。
  网络来源: https://baike.baidu.com/item/%E6%83%A0%E6%96%AF%E7%89%B9/10859511

- 名词: 波士顿牌局
  分类: 物件
  解释: 伯爵常玩的源自美国的纸牌游戏。在18世纪末至19世纪流行于欧洲上流社会。玩法比威斯特牌更为复杂，在俄国贵族中很受欢迎。伯爵同时玩威斯特和波士顿两种牌，每天输钱给邻座。
  书中原文: 伯爵的威斯特和波士顿牌局仍然不可缺少，他让大家都能看见他的牌，每天让邻人赢去数百卢布，而邻人把同伊利亚·安德烈伊奇伯爵斗牌看作一项最好的收入。
  网络来源: https://en.wikipedia.org/wiki/Boston_(card_game)

- 名词: 吉他
  分类: 物件
  解释: 娜塔莎弹奏以排解忧郁的乐器。在19世纪俄国贵族家庭中吉他是常见乐器，尤其受到年轻女性喜爱。娜塔莎弹奏与安德烈公爵一起听过的歌剧乐句，琴声承载着她对爱情的思念和对往事的回忆。托尔斯泰以细腻笔触描写了娜塔莎弹吉他时的心理活动。
  书中原文: 她走进大厅，拿起吉他，坐在柜子后面黑暗的角落里，开始拨弄低音弦，弹她在彼得堡同安德烈公爵一起听过的歌剧中的乐句。在旁人听来，她弹的没有任何意义，但是这些音响在她的想象中唤起了一连串的回忆。她坐在柜子后面，眼睛注视着从餐室门缝射进来的一道阳光，她一边听自己弹琴，一边回忆。她完全陷入往事的回忆中了。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 焰火
  分类: 物件
  解释: 彼佳正在准备圣诞节期间的节日用品。在19世纪俄国贵族圣诞节庆祝活动中焰火是常见的娱乐项目。罗斯托夫家的圣诞节气氛平淡，但孩子们仍然自娱自乐——彼佳和仆人正在准备晚上放的焰火，展现了年轻人的活力。
  书中原文: 她的弟弟彼佳也在楼上：他和专门伺候他的仆人正在准备晚上放的焰火。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 木偶
  分类: 物件
  解释: 尼古拉回忆中童年时曾经想送给娜塔莎的玩具。在娜塔莎与尼古拉谈论童年记忆时，尼古拉回忆起有一次娜塔莎因被惩罚独自哭泣，他想拿木偶去安慰她却不好意思。这件小事成了兄妹俩共同的温馨童年记忆。
  书中原文: 我记得，尼古拉说，我记得后来我到你跟前，想安慰你，可是你知道，我不好意思。我们太可笑了。当时我有一个木偶玩具，我想送给你。你记得吗？
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 圣诞节
  分类: 事件
  解释: 本书情节发生的时间背景，节日气氛与娜塔莎的忧郁形成对比。东正教最重要的节日之一，在俄国从12月25日延续到主显节。贵族家庭中有午前祈祷、穿新衣等传统。这年圣诞节罗斯托夫家气氛并不愉快，托尔斯泰以严寒和星光渲染节日氛围，与人物内心的苦闷形成对照。
  书中原文: 圣诞节到了，除了摆摆样子的午前祈祷，除了邻人和家奴们的郑重而无味的祝贺，除了穿戴各种新衣服，此外再没有一点庆祝这个节日的特别的东西了，然而平静无风、零下二十度的严寒、白天耀眼的阳光和夜晚隆冬的星光，都给人一种需要庆祝这个节日的感觉。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 尼古拉婚事安排
  分类: 事件
  解释: 伯爵夫人为改善家境试图促成尼古拉与朱莉·卡拉金娜的婚姻。伯爵夫人直接写信向卡拉金娜提亲，对方表示同意但需看女儿意愿。然而尼古拉深爱穷表妹索尼娅，拒绝为财产牺牲爱情。母子冲突以尼古拉的坚持和伯爵夫人的哭泣告终。反映了贵族婚姻中爱情与财产的典型矛盾。
  书中原文: 她觉得这是最后的希望，如果尼古拉拒绝她给他物色的配偶，那就永远失去改善境遇的机会了。这个配偶就是朱莉·卡拉金娜，她的父母都是高尚的好人，她从小罗斯托夫家的人就认识她，现在由于她的最后一个兄弟的死，她已经成为富有的未婚姑娘了。||伯爵夫人直接给莫斯科的卡拉金娜写信，向她提出她们两家子女的婚事，并且接到对方令人满意的回答。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 娜塔莎回忆往事
  分类: 事件
  解释: 娜塔莎弹吉他时陷入对安德烈公爵和童年往事的回忆。她弹起与安德烈公爵一起听过的歌剧乐句，注意到索尼娅拿杯子走过餐室的场景和从前一模一样，产生既视感。随后她与尼古拉、索尼娅回忆起童年关于黑人的奇妙记忆和滚鸡蛋的游戏。展现了娜塔莎敏感细腻的内心世界。
  书中原文: 她走进大厅，拿起吉他，坐在柜子后面黑暗的角落里，开始拨弄低音弦，弹她在彼得堡同安德烈公爵一起听过的歌剧中的乐句。在旁人听来，她弹的没有任何意义，但是这些音响在她的想象中唤起了一连串的回忆。她坐在柜子后面，眼睛注视着从餐室门缝射进来的一道阳光，她一边听自己弹琴，一边回忆。她完全陷入往事的回忆中了。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 贵族破产
  分类: 概念
  解释: 伊利亚·安德烈伊奇伯爵经营不善、家产日渐耗尽的社会现象。19世纪初许多旧式俄国贵族家庭因不善经营和无法适应新的经济形势而走向衰落。罗斯托夫伯爵辞去首席贵族职位后仍维持奢华生活方式。托尔斯泰用捕兽网比喻描绘伯爵的困境，与小说的新贵崛起形成对照。
  书中原文: 伯爵经管他的家产，犹如在巨大的捕兽网里挣扎，他极力不相信他陷入网里，然而他一步步地越陷越深，感到既无力把捆住他的网冲破，也不能小心地、耐心地把它解开。
  网络来源: https://wenku.baidu.com/view/e504ddde2fc58bd63186bceb19e8b8f67c1cefd8.html

- 名词: 爱情与财富的冲突
  分类: 概念
  解释: 尼古拉面临的选择：为财富娶朱莉，还是为爱情娶穷索尼娅。在尼古拉的婚事上这一冲突表现得尤为直白——母亲要求他为家族利益娶富有的朱莉，而他深爱没有陪嫁的索尼娅。这一冲突在俄国19世纪贵族社会中具有普遍性，婚姻本质上是财产和地位的结合，个人情感往往被牺牲。
  书中原文: 可是，妈妈，如果我爱上没有财产的姑娘，难道您要我为了财产而牺牲感情和名誉吗？他问母亲，他一心只想表现自己的高尚情操，不了解他这样问多么伤母亲的心。||是的，也许我是在爱一个穷苦的姑娘，尼古拉自言自语，怎么，我真的要为财产而牺牲爱情和名誉吗？难道就因为索尼娅穷，我就不能爱她？
  网络来源: https://wenku.baidu.com/view/e504ddde2fc58bd63186bceb19e8b8f67c1cefd8.html

- 名词: 牺牲
  分类: 概念
  解释: 尼古拉与母亲之间的双向牺牲悖论。尼古拉声称可以为母亲牺牲一切甚至爱情，伯爵夫人则不愿让儿子牺牲，宁愿自己为儿子牺牲。尼古拉的牺牲宣言更像青春期的浪漫冲动，伯爵夫人的牺牲则是母亲本能的自我否定。托尔斯泰揭示了爱与责任之间的复杂关系。
  书中原文: 妈妈，别哭，您只要告诉我，您希望这样办，您知道，我可以为了您的安宁献出全部的生命，献出一切，尼古拉说，为了您，我可以牺牲一切，甚至牺牲我的爱情。||但是伯爵夫人不愿这样提问题：她不愿儿子做出牺牲，宁愿自己为儿子牺牲。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 等待的煎熬
  分类: 概念
  解释: 娜塔莎因安德烈公爵长期未归而感到的忧郁和焦躁。订婚后的第四个月娜塔莎开始被无法排遣的忧郁笼罩，感到自己在虚度年华，这正是她完全能够爱人和被人爱的大好年华。圣诞节期间焦躁达到顶峰，她对着母亲哭喊我要他。这种等待的煎熬是娜塔莎后来被阿纳托尔诱惑的远因。
  书中原文: 娜塔莎依旧爱她的未婚夫，依旧为这一爱情而感到欣慰，对一切生活的欢乐依旧易于感受；可是和他离别的第四个月末尾，一阵阵无法排遣的忧郁开始袭上她的心头。她可怜自己，可怜她不为任何人而虚度年华，而这正是她觉得自己完全能够爱人和被人爱的大好年华。||妈妈，我要他。凭什么就这样把我毁掉，妈妈？她的声音突然中断了，泪水涌出来。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 童年记忆
  分类: 概念
  解释: 尼古拉和娜塔莎回忆黑人、滚鸡蛋等童年趣事，感叹时光流逝。这些回忆带有梦幻般的朦胧色彩，连人物自己也分不清那真的是一个黑人还是做梦。托尔斯泰通过这些温馨的童年片段勾勒出罗斯托夫家孩子们共享的情感纽带，与娜塔莎当前的忧郁形成对照。
  书中原文: 你可记得，娜塔莎带着沉思的微笑说，很早很早以前，我们还很小的时候，叔叔叫我们到书房去，那是个旧房间，很暗——我们一进去，那儿忽然出现一个……||黑人，尼古拉带着高兴的微笑接过去说，怎么会不记得啊？直到现在我也不知道，那真的是一个黑人呢，还是我们在做梦，或者是人们这样对我们讲的。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 圣诞节
  分类: 习俗
  解释: 俄国东正教节日，贵族家中有午前祈祷、穿新衣等传统。圣诞节节期从12月25日到主显节1月6日。贵族流行化装出游、乘坐三驾雪橇在雪原上飞驰、举办舞会等。小说中罗斯托夫家的圣诞节氛围并不热烈，暗示了家庭内部的不愉快气氛。
  书中原文: 圣诞节到了，除了摆摆样子的午前祈祷，除了邻人和家奴们的郑重而无味的祝贺，除了穿戴各种新衣服，此外再没有一点庆祝这个节日的特别的东西了，然而平静无风、零下二十度的严寒、白天耀眼的阳光和夜晚隆冬的星光，都给人一种需要庆祝这个节日的感觉。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 提亲
  分类: 习俗
  解释: 伯爵夫人写信给卡拉金娜提亲，对方表示同意但需看女儿意愿。19世纪俄国贵族婚姻通常由男方家长向女方家长正式提出婚事，商议嫁妆、财产等条件。这次由女方主动发起。卡拉金娜的回复体现了贵族婚姻的典型程序——本人同意但要看女儿意见。邀请尼古拉去莫斯科是为了创造年轻人相互了解的机会。
  书中原文: 伯爵夫人直接给莫斯科的卡拉金娜写信，向她提出她们两家子女的婚事，并且接到对方令人满意的回答。卡拉金娜说，她本人是同意的，但问题全看她女儿的意思了。卡拉金娜邀请尼古拉去莫斯科。
  网络来源: https://wenku.baidu.com/view/e504ddde2fc58bd63186bceb19e8b8f67c1cefd8.html

- 名词: 牌局赌博
  分类: 习俗
  解释: 伊利亚·安德烈伊奇伯爵每日与邻人打牌输钱，邻人视赢伯爵的钱为可靠收入。打牌在19世纪俄国贵族社交生活中不仅是娱乐，更是社交和人情往来的重要方式。伯爵故意输钱给邻座实际上是一种隐性的接济和人情投资，反映了伯爵性格中慷慨软弱的一面和俄国贵族的消费文化。
  书中原文: 伯爵的威斯特和波士顿牌局仍然不可缺少，他让大家都能看见他的牌，每天让邻人赢去数百卢布，而邻人把同伊利亚·安德烈伊奇伯爵斗牌看作一项最好的收入。
  网络来源: https://www.yunshuwu.cn/chap/8608.html
