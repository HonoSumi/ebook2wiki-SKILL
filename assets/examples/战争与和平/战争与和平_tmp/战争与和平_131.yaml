  分类: 概念
  解释: 皮埃尔在决定参军后体验到的特殊心理状态，认为与某种更高的价值相比，财富、舒适甚至生命本身都是可以抛弃的虚妄之物，牺牲本身带给他一种新鲜的快乐。
  书中原文: 构成人们的幸福的一切——生活的舒适、财富，甚至生命本身，比起某种东西来，都是弃之为快的虚妄的东西……牺牲本身对于他是一种新鲜的快乐感情。
  网络来源: 战争与和平原著，第三卷第一部

- 名词: 佩尔胡什科夫换马站
  分类: 地点
  解释: 佩尔胡什科夫村设有驿马的换乘站，皮埃尔在此换马时听说了舍瓦尔金诺战役的消息。
  书中原文: 当夜在佩尔胡什科夫换马的时候，皮埃尔听说那天傍晚打了一场大仗。
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 莫扎伊斯克客栈
  分类: 地点
  解释: 莫扎伊斯克城内的旅店，皮埃尔到达时已住满军官。
  书中原文: 莫扎伊斯克所有的房屋都驻了兵，皮埃尔的马夫和车夫在这儿的客栈迎接他，客栈也没有空房间：都住满了军官。
  网络来源: 战争与和平原著，第三卷第一部

- 名词: 莫斯科不能留
  分类: 概念
  解释: 皮埃尔目击法国厨子受刑后产生的强烈心理决定，认为莫斯科已不可停留，必须立即去前线参战。
  书中原文: 皮埃尔在看到那个受刑的法国人和围着行刑台的人群以后，就下了最后的决心，他再也不能留在莫斯科了，他今天就要去参军
  网络来源: 战争与和平原著，第三卷第一部

- 名词: 尼古拉·拉斯托普钦
  分类: 人物
  解释: 即拉斯托普钦伯爵，1812年莫斯科总督，负责莫斯科的防务和秩序。沙皇亚历山大一世曾致信他关于列比赫气球的制造和使用。
  书中原文: 关于这个气球，皇上曾给拉斯托普钦伯爵写了如下的信
  网络来源: https://baike.baidu.com/item/%E6%8B%89%E6%96%AF%E6%89%98%E6%99%AE%E6%AC%BD/64518943

- 名词: 总督拉斯托普钦
  分类: 人物
  解释: 即莫斯科总督拉斯托普钦伯爵，在1812年战争期间负责莫斯科的防务、民团组织和撤退事宜。
  书中原文: 皇上曾给拉斯托普钦伯爵写了如下的信
  网络来源: 战争与和平原著，第三卷第一部

- 名词: 气球制造者列比赫
  分类: 人物
  解释: 德国人列比赫，受俄国聘请制造大型载人热气球，计划用于对法作战。沙皇对此高度重视并亲自过问。
  书中原文: 一旦列比赫准备就绪，您就组织一批聪明可靠的人作吊篮的乘员，并派一名信使到库图佐夫那儿关照他。
  网络来源: 战争与和平原著，第三卷第一部

- 名词: 米洛拉多维奇民军
  分类: 事件
  解释: 米洛拉多维奇将军率领的民军部队，在波罗金诺战役前未能及时赶到前线。托尔斯泰将此列为俄军未能在有利阵地设防的原因之一。
  书中原文: 还因为带领民军的米洛拉多维奇还没有赶到
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 民军未赶到
  分类: 事件
  解释: 米洛拉多维奇将军所辖民军部队未能及时在波罗金诺战役前与主力会合，影响了俄军的阵地选择和兵力部署。
  书中原文: 还因为带领民军的米洛拉多维奇还没有赶到
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 谢苗诺夫斯科耶平原
  分类: 地点
  解释: 谢苗诺夫斯科耶村周边的开阔平原，是波罗金诺战役中俄法两军交战的核心区域之一。
  书中原文: 移到乌季察、谢苗诺夫斯科耶和波罗金诺之间的平原上
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 拿破仑停止前进
  分类: 事件
  解释: 托尔斯泰指出，拿破仑在占领斯摩棱斯克后曾有意停止进军，因为他意识到拉长战线的危险，但最终历史的进程迫使他继续前进并发动了波罗金诺战役。
  书中原文: 拿破仑的史学家亲口说，他在占领了斯摩棱斯克之后就想停止前进，他知道拉长战线的危险
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 库图佐夫应战
  分类: 事件
  解释: 库图佐夫明知在不利条件下应战可能导致莫斯科失守，但仍然决定在波罗金诺迎战拿破仑军队的决策。
  书中原文: 库图佐夫也似乎同样应当明白，冒着损失四分之一军队的危险应战，他准会失掉莫斯科
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 古代英雄史诗
  分类: 概念
  解释: 托尔斯泰引用古希腊罗马的英雄史诗传统，认为这种以伟人英雄为中心的历史叙事已不适用于理解19世纪的战争。
  书中原文: 古人留给我们许多英雄史诗的典范，其中的英雄人物乃是历史的全部趣味
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 现代历史意义
  分类: 概念
  解释: 托尔斯泰对历史写作的反思，认为现代历史已不能再用英雄史诗的模式来理解，需要新的历史观。
  书中原文: 这类历史对于我们人类的时代是没有意义的。
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 俄军没有阵地
  分类: 概念
  解释: 托尔斯泰的核心论点之一：在波罗金诺战役前俄军实际上并没有一个预设的、构筑了工事的完备阵地，而是在仓促中选择了几乎没有防御工事的地点应战。
  书中原文: 俄军不但没有设防，而且在一八一二年八月二十五日以前，从未想到在这个地点会打一大仗。
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 战壕未完成
  分类: 事件
  解释: 俄军在波罗金诺战役前仅用一天时间（8月25日）匆忙挖掘战壕，但到26日战役开始时这些工事远未完成。
  书中原文: 二十五日开始挖的那些战壕，到二十六日也没完成
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 六千士兵守多面堡
  分类: 事件
  解释: 俄军在舍瓦尔金诺多面堡投入约六千兵力防守，牺牲巨大，托尔斯泰认为这种投入与多面堡的战术价值不成比例。
  书中原文: 为什么要消耗一切力量，损失六千人，把它守到二十四日深夜呢？
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 巴克莱和巴格拉季翁
  分类: 人物
  解释: 俄军两位重要将领，巴克莱·德·托利和巴格拉季翁。在舍瓦尔金诺战役时两人都认为舍瓦尔金诺多面堡是俄军阵地的左翼而非前哨。
  书中原文: 直到二十五日，巴克莱·德·托利和巴格拉季翁还相信舍瓦尔金诺多面堡是阵地的左翼
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 二十五日才挖战壕
  分类: 事件
  解释: 俄军到8月25日，即波罗金诺战役前一天，才开始在阵地上挖掘战壕，说明该阵地并非预先选定的设防阵地。
  书中原文: 二十五日开始挖的那些战壕，到二十六日也没完成
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 设防的阵地的虚构
  分类: 概念
  解释: 托尔斯泰揭露的官方史学对波罗金诺战役的歪曲，即声称俄军在预先选定的筑有工事的阵地上进行了有准备的会战。
  书中原文: 在很久以后，可以自由地写波罗金诺战役报告的时候，才捏造出那一套奇谈怪论
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 科洛恰成锐角
  分类: 概念
  解释: 科洛恰河与斯摩棱斯克大路并非成直角相交，而是呈锐角，这一地理细节影响了俄军阵地的选择和法军的迂回。
  书中原文: 沿科洛恰选定了一个阵地，那条河穿过大路是成锐角，而不是成直角
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 阵地左翼右翼中心
  分类: 概念
  解释: 俄军最初在波罗金诺的阵地布局：左翼在舍瓦尔金诺，右翼在诺沃耶村，中心在波罗金诺。
  书中原文: 左翼是在舍瓦尔金诺，右翼靠近诺沃耶村，中心在波罗金诺
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 拿破仑骑马到瓦卢耶瓦
  分类: 事件
  解释: 1812年8月24日，拿破仑亲自骑马到瓦卢耶瓦高地视察俄军阵地，但托尔斯泰指出他实际上并未看到所谓的俄国阵地。
  书中原文: 拿破仑二十四日骑马来到瓦卢耶瓦，他没有看见（史书上说他看见了）从乌季察到波罗金诺的俄国阵地
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 俄军中计失左翼
  分类: 事件
  解释: 拿破仑意外将法军主力转移到科洛恰河对岸，直接攻击舍瓦尔金诺多面堡，导致俄军左翼阵地失守。
  书中原文: 出乎俄国人意料，拿破仑把他的军队移过科洛恰河。这么一来，俄国人已经来不及迎接大会战，只好把他们本来要据守的左翼阵地撤掉
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 仓促选择新阵地
  分类: 事件
  解释: 俄军在舍瓦尔金诺多面堡失守后，被迫在乌季察至波罗金诺之间匆忙选择了一个几乎没有工事的新阵地。
  书中原文: 不得不把左翼往后撤，随便选一个地方匆忙地构筑工事
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 从右方调向左方
  分类: 事件
  解释: 波罗金诺战役开始后，俄军因左翼被法军猛攻，不得不从兵力本就薄弱的右翼抽调部队增援左翼。
  书中原文: 不得不把军队从右方调向左方
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 兵力仅对方一半
  分类: 概念
  解释: 托尔斯泰指出，由于左翼失守和战线的拉长，俄军在波罗金诺战役实际交战中能以对抗法军的兵力只有对方的一半。
  书中原文: 俄国仅有对方一半的兵力以抵抗法军对我们左翼的进攻
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 不分胜负的战斗
  分类: 概念
  解释: 官方史学对波罗金诺战役的描述用语，托尔斯泰认为在俄军兵力只有法军一半、阵地几无防御的情况下能坚持十小时不分胜负已是奇迹。
  书中原文: 不仅战斗十小时和打一场不分胜负的战斗不可想象，就是坚持三小时而不使军队完全崩溃和逃跑也是不可想象的。
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 坚持三小时不崩溃
  分类: 概念
  解释: 托尔斯泰认为俄军在兵力对比悬殊、阵地不设防的条件下能坚持三小时而不崩溃已是不可思议的成就。
  书中原文: 就是坚持三小时而不使军队完全崩溃和逃跑也是不可想象的。
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 军事将领错误
  分类: 概念
  解释: 托尔斯泰指出波罗金诺战役的官方记述试图掩饰俄军将领在阵地选择、兵力部署等方面的失误。
  书中原文: 极力掩饰我们军事将领们的错误
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 贬低人民光荣
  分类: 概念
  解释: 托尔斯泰批评官方史学为了掩饰将领错误而歪曲事实，反而贬低了俄国军队和人民在波罗金诺战役中表现出的英勇和牺牲。
  书中原文: 极力掩饰我们军事将领们的错误，从而贬低俄国军队和人民的光荣
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 波罗金诺真相
  分类: 概念
  解释: 托尔斯泰通过细致考证揭示的波罗金诺战役真实情况：俄军并未在预设阵地作战，兵力远不止稍弱于法军，而是以一半兵力在几乎没有防御工事的开阔地带迎战。
  书中原文: 波罗金诺战役完全不像人们描写的那样
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 托尔斯泰对波罗金诺的考证
  分类: 概念
  解释: 托尔斯泰在《战争与和平》中对波罗金诺战役进行的详细军事历史考证，一方面基于史料，另一方面基于他对战场地理的第一手调查，揭示了官方记述与实际情况的差距。
  书中原文: 任何愿意深入研究事情真相的人，都能很容易弄清楚这一点。
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 真实的波罗金诺战场
  分类: 概念
  解释: 托尔斯泰描绘的波罗金诺战场的实际面貌：一片开阔的几乎没有防御工事的平原，俄军以劣势兵力仓促应战，与官方史书中的描述截然不同。
  书中原文: 在一个开阔的、几乎没有防御工事的地带，兵力比法军少一半的情况下迎接波罗金诺战役
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 拿破仑的失误
  分类: 概念
  解释: 托尔斯泰对拿破仑在波罗金诺战役中决策的分析，指出拿破仑发动这场战役从战略上看是不明智的，导致法军损失四分之一兵力且拉长了战线。
  书中原文: 拿破仑还是发动了这次战役，而库图佐夫也奋起应战了。
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 库图佐夫的失误
  分类: 概念
  解释: 托尔斯泰指出从理性上讲库图佐夫不应在不利条件下应战，但他和拿破仑一样都是受历史必然性驱使的不由自主的活动家。
  书中原文: 库图佐夫和拿破仑发动和应接波罗金诺战役，他们这样做都是不由自主和毫无意义的。
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 史学家捏造
  分类: 概念
  解释: 托尔斯泰批评后世史学家为维护统帅形象而歪曲波罗金诺战役的事实，将一场混乱仓促的遭遇战描述为有计划的会战。
  书中原文: 在很久以后，可以自由地写波罗金诺战役报告的时候，才捏造出那一套奇谈怪论
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 总司令错误的辩护
  分类: 概念
  解释: 托尔斯泰指出官方史书为不会犯错误的总司令辩护，将舍瓦尔金诺多面堡重新解释为前哨而非左翼阵地，以掩盖俄军指挥的失误。
  书中原文: 为一个人不会犯错误的总司令辩护，说舍瓦尔金诺多面堡是个前哨
  网络来源: 战争与和平原著，第三卷第二部

- 名词: 外传战报的虚构
  分类: 概念
  解释: 官方战报和后世历史著作中对波罗金诺战役的虚假描述，包括俄军预先设防、兵力相近等不实之词。
  书中原文: 所有史学家是这样描绘的
  网络来源: 战争与和平原著，第三卷第二部
