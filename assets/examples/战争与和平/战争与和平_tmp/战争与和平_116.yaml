- 名词: 拿破仑入侵俄国
  分类: 事件
  解释: 1812年6月，拿破仑率领约61万大军渡过涅曼河对俄国发动的入侵战争。俄国称其为"1812年卫国战争"。由于俄军实施焦土政策和坚壁清野的战略，法军虽然在博罗季诺战役后进入莫斯科，但最终因补给断绝和严冬被迫撤退，六十万大军几乎全军覆没。这场战争是欧洲历史的转折点，也是《战争与和平》的核心历史背景。
  书中原文: "传单上说，拿破仑在秋季前要占领俄国两座都城；关于皇帝明天将要莅临的谈论——所有这一切，又以新的力量在皮埃尔心中唤起激动和有所期待的感情"
  网络来源: https://baike.baidu.com/item/法俄战争/1915711

- 名词: 告俄国民众书
  分类: 物件
  解释: 1812年7月6日（俄历）俄国沙皇亚历山大一世在波洛茨克营地签署的一份重要宣言，由国务秘书希什科夫起草，正式向全体俄罗斯人民宣告法国入侵的消息，号召全民以"一致和普遍的起义"抗击侵略者，组建地方民兵保卫祖国。在小说中，拉斯托普钦伯爵将这份刚印好的宣言交给皮埃尔，后由索尼娅在罗斯托夫家朗读。
  书中原文: "拉斯托普钦伯爵把刚印好的皇帝《告莫斯科民众书》、刚发给军队的几项命令和他的最新的告示交给皮埃尔"
  网络来源: https://cn.nbpublish.com/library_read_article.php?id=64714

- 名词: 戈利岑家族
  分类: 人物
  解释: 俄罗斯历史上最显赫的贵族世家之一，源于立陶宛大公国格迪米纳斯后裔，家名意为"铁手套"。家族在俄罗斯政治、军事、外交史上影响深远，出过多位陆军元帅、大使和内阁总理。在《战争与和平》中，戈利岑公爵请俄国教师学俄语的情节，反映了1812年战争期间俄国社会反法情绪高涨、贵族中倡导使用俄语代替法语的时代背景。
  书中原文: "戈利岑公爵请了一位俄国教师，在学俄语呢——在街上讲法语成了危险的事情了"
  网络来源: https://baike.baidu.com/item/戈利岑家族/24317104

- 名词: 拉祖莫夫斯基家族
  分类: 人物
  解释: 俄罗斯著名贵族世家，原为扎波罗热哥萨克出身。家族崛起始于阿列克谢·拉祖莫夫斯基，他因嗓音优美被带入宫廷，后成为伊丽莎白女皇的情夫乃至秘密配偶，被称为"夜间的皇帝"。其弟基里尔曾任乌克兰最后一位盖特曼和俄罗斯科学院院长。家族在文化史上以赞助贝多芬创作《拉祖莫夫斯基弦乐四重奏》而闻名。
  书中原文: "伯爵夫人在拉祖莫夫斯基家做礼拜，听到了新的祷文。祷文好极了"
  网络来源: https://baike.baidu.com/item/阿列克谢·拉祖莫夫斯基/53450196

- 名词: 罗斯托夫家族
  分类: 人物
  解释: 《战争与和平》中的核心虚构家族之一，是托尔斯泰笔下宗法制庄园贵族的典型代表。家族成员包括热情好客但不善理财的老伯爵伊利亞·安德烈耶維奇、长子尼古拉（后成为军人并继承家业）、次女娜塔莎（小说的女一号，后嫁给皮埃尔）、幼子彼佳（在战争中牺牲）以及寄居的孤女索尼娅。该家族以淳朴热情、爱国忠诚著称，与冷漠自私的宫廷贵族形成鲜明对比。
  书中原文: "罗斯托夫家的仆人欢欢喜喜地跑过来给他脱斗篷，接过手杖和帽子"
  网络来源: https://zh.wikipedia.org/zh-hant/战争与和平人物列表
