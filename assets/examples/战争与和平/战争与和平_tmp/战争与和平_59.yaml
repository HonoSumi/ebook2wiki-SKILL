- 名词: 约格尔
  分类: 人物
  解释: 彼得·安德烈伊奇·约格尔（Пётр Андреевич Йогель），18-19世纪莫斯科著名的舞蹈教师，出身德国移民家庭。他是莫斯科上流社会贵族的舞蹈启蒙老师，常在家中举办舞会，其舞会被认为是莫斯科最欢乐的舞会。在《战争与和平》中，他是娜塔莎·罗斯托娃、尼古拉·罗斯托夫等人的舞蹈老师，娜塔莎是他最优秀的学生。
  书中原文: 在那年冬天始终笼罩着他们家庭的这种气氛，现在在多洛霍夫求婚和约格尔的舞会之后，有如大雷雨之前的空气，在索尼娅和娜塔莎身上更加浓厚了。
  网络来源: 约格尔（Yogel/Йогель）是历史上真实存在的莫斯科舞蹈教师，1760-1855年，长期教授贵族子女社交舞，其舞会在当时的莫斯科社交圈极受欢迎。

- 名词: 红桃七
  分类: 物件
  解释: 扑克牌中的一张，花色为红心、点数为七。在小说描述的赌博场景中，这是尼古拉·罗斯托夫迫切希望抽到的牌，寄托了他翻本的希望。当红桃七出现在第一张时，他反而因此输到无力偿付的地步。在俄罗斯纸牌游戏中，"七"在确定王牌花色时起关键作用。
  书中原文: 他所要的红桃七竟然出现在整副牌的第一张。他已经输到无力偿付的地步。
  网络来源: 在俄罗斯传统纸牌游戏杜拉克（Дурак）中，底牌花色决定王牌花色，数字七在王牌确定中起关键作用。

- 名词: 船歌
  分类: 概念
  解释: 船歌（Barcarolle，源自意大利语"barca"意为船），起源于意大利威尼斯的一种音乐体裁，最初为贡多拉船工所唱的歌曲，后发展为声乐曲和器乐曲。通常采用6/8或12/8拍，营造均匀晃动的节奏感，模仿船桨划水的律动。著名作品包括奥芬巴赫《霍夫曼船歌》、门德尔松《威尼斯船歌》等。
  书中原文: 索尼娅坐在琴旁，正在弹杰尼索夫特别喜爱的一首船歌的前奏。
  网络来源: 船歌（Barcarolle）是起源于意大利威尼斯的音乐体裁，常用6/8或12/8拍，模仿船桨划水律动。

- 名词: 四万三千卢布
  分类: 概念
  解释: 尼古拉·罗斯托夫在多洛霍夫设局的赌局中输掉的巨额赌债数目。多洛霍夫故意将此定为最终目标，因其数字43恰好是他自己的年龄与索尼娅年龄之和。在19世纪初的俄国，这笔钱相当于中等贵族家庭4-14年的全部收入，足以摧毁一个贵族家庭。罗斯托夫家因此加速破产，被迫变卖祖产。
  书中原文: 欠账达到四万三千这个注定的数目。多洛霍夫把牌一扣，推到一边，拿起粉笔迅速地画出清晰粗重的笔迹，不断摁断粉笔头儿，结算罗斯托夫的欠账。
  网络来源: 19世纪初俄国纸卢布严重贬值，四万三千卢布在当时相当于普通工人约119年的工资，或可购买约661头牛，是一笔足以摧毁贵族家庭的巨款。
