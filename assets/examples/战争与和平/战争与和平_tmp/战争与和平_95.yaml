- 名词: '皮埃尔·别祖霍夫'
  分类: '人物'
  解释: '小说核心男主角之一，老别祖霍夫伯爵的私生子，继承巨额遗产后成为莫斯科首富。身材高大肥胖，性格单纯善良、热爱思考但意志软弱。经历了继承遗产、被迫与海伦结婚、加入共济会、亲历1812年战争、被法军俘虏等重大事件，最终与娜塔莎·罗斯托娃结婚，获得精神觉醒与幸福归宿。'
  书中原文: '皮埃尔脸上露出天真的惊奇，向拉斯托普钦看了看，他不明白为什么文辞不好就使他不安。'
  网络来源: 'https://baike.baidu.com/item/%E7%9A%AE%E5%9F%83%E5%B0%94%C2%B7%E5%88%AB%E7%A5%96%E9%9C%8D%E5%A4%AB/53725822'

- 名词: '鲍里斯·德鲁别茨科伊'
  分类: '人物'
  解释: '出身名门但家道中落的年轻贵族，母亲安娜·米哈伊洛夫娜为他四处奔走谋求前程。精明世故、善于攀附权贵，在彼得堡和莫斯科的上流社会中步步高升。他一心想找有钱的未婚妻，在玛丽亚公爵小姐和朱莉·卡拉金娜之间犹豫不决，最终与朱莉结婚获取巨额财富。'
  书中原文: '鲍里斯想找一个有钱的姑娘结婚，在彼得堡未能如愿，他怀着这同样的目的来到莫斯科。在莫斯科，鲍里斯在朱莉和玛丽亚公爵小姐这两个最有钱的姑娘之间犹豫不决。'
  网络来源: 'https://book.douban.com/review/15253782/'

- 名词: '尼古拉·安德烈伊奇·博尔孔斯基公爵'
  分类: '人物'
  解释: '博尔孔斯基家族族长，陆军上将出身，社交界绰号"普鲁士王"。性格严苛守秩序，信奉"行动和智慧"为美德。深居童山庄园，对女儿玛丽亚公爵小姐管教极严甚至暴戾，但内心深处深爱子女。极端憎恶拿破仑·波拿巴，具有强烈的爱国主义立场。安德烈公爵和玛丽亚公爵小姐的父亲。'
  书中原文: '尼古拉·安德烈伊奇公爵像一名听取汇报的首席法官似的倾听着，仅仅偶尔无言地或者只言片语地表明，他对向他汇报的事情知道了。'
  网络来源: 'https://wapbaike.baidu.com/item/%e5%ae%89%e5%be%b7%e7%83%88%c2%b7%e5%8d%9a%e5%b0%94%e5%ad%94%e6%96%af%e5%9f%ba/55647709'

- 名词: '玛丽亚公爵小姐'
  分类: '人物'
  解释: '全名玛丽亚·尼古拉耶芙娜·博尔孔斯卡娅，老公爵的女儿、安德烈公爵的妹妹。虔诚的东正教信徒，信奉"博爱和自我牺牲"的人生哲学。长期遭受父亲的精神折磨但从不怨恨，隐忍宽容。外貌不美但内心丰富善良，有一双美丽的眼睛。最终与尼古拉·罗斯托夫结婚，获得幸福家庭生活。'
  书中原文: '玛丽亚公爵小姐坐在客厅里听老人们闲谈和评论，她完全不理解她所听到的；她老在想，客人们是否看出了她父亲对她敌视的态度。'
  网络来源: 'https://book.douban.com/annotation/102710897/'

- 名词: '拉斯托普钦伯爵'
  分类: '人物'
  解释: '莫斯科卫戍司令（总督），历史人物在小说中的艺术再现。性格暴躁易怒、专横独断，充满爱国热情但脱离人民。在1812年战争期间担任莫斯科行政长官，曾将无辜青年韦列夏金交给暴民打死以转移人民愤怒。在博尔孔斯基家宴会上激烈批评俄国贵族对法国文化的盲目崇拜。'
  书中原文: '"波拿巴对待欧洲就像海盗对待已经掳到手的船一样，"拉斯托普钦伯爵说，重复他已经说过几遍的话，"各国君主的长期忍耐，也许是晕头转向，简直令人惊奇。"'
  网络来源: 'https://book.douban.com/annotation/100336314/'

- 名词: '安德烈公爵'
  分类: '人物'
  解释: '全名安德烈·博尔孔斯基，小说核心男主角之一。孤傲正直，反感上流社会的虚伪，追求理想和功名。初登场时担任库图佐夫的副官，参加奥斯特利茨战役身负重伤后对战争荣耀幻灭。后与娜塔莎·罗斯托娃订婚，因娜塔莎被阿纳托利诱惑而解除婚约。1812年再度参战，在博罗季诺战役中受重伤，临终前与娜塔莎和解。'
  书中原文: '关于罗斯托夫家的事，您听到什么吗？……我听说他们不久就要来这儿了。我也天天盼安德烈回来。我希望他们在这儿见面。'
  网络来源: 'https://wapbaike.baidu.com/item/%e5%ae%89%e5%be%b7%e7%83%88%c2%b7%e5%8d%9a%e5%b0%94%e5%ad%94%e6%96%af%e5%9f%ba/55647709'

- 名词: '朱莉·卡拉金娜'
  分类: '人物'
  解释: '莫斯科贵族卡拉金家族的女儿，兄弟去世后成为巨额财富的唯一继承人，年龄约二十七岁。容貌并不美丽，以矫揉造作的忧郁姿态闻名，实则沉迷舞会、时髦服装和社交娱乐。鲍里斯·德鲁别茨科伊在她和玛丽亚公爵小姐之间犹豫后，最终因她的巨额陪嫁（奔萨省领地和下城森林）而向她求婚。'
  书中原文: '朱莉二十七岁了。自从她的兄弟们死后，她成为巨富。她现在变得简直难看了；但是她以为她不仅依然美丽，而且比以前更迷人了。'
  网络来源: 'https://book.douban.com/annotation/109812678/'

- 名词: '洛普欣'
  分类: '人物'
  解释: '一位公爵，属于老博尔孔斯基公爵的贵族社交圈。在老博尔孔斯基公爵家的命名日宴会上与侄儿一同出席，属于衬托时代背景和贵族社交氛围的背景角色，非贯穿全书的核心人物。'
  书中原文: '洛普欣和老将军偶尔参加一下谈话。'
  网络来源: 'http://datongshuhua.cn/page101?article_id=416&pagenum=28'

- 名词: '梅蒂维埃'
  分类: '人物'
  解释: '在莫斯科行医的法国医生，身材魁梧、眉清目秀，被认为医道高明，出入上流社会。老博尔孔斯基公爵在命名日那天突然大发雷霆将其驱逐，骂他是"法国间谍、拿破仑的走狗"。这一情节生动展现了1812年战争前夕俄国贵族中反法情绪的蔓延。'
  书中原文: '你们知道梅蒂维埃吧？今天我把他从我这里赶了出去。他到这儿来，竟然让他进来见我，尽管我吩咐过不让任何人进来。'
  网络来源: 'https://williamlong.info/xiaoshuo/archives/357.html'

- 名词: '拿破仑·波拿巴'
  分类: '人物'
  解释: '法国皇帝，欧洲历史上的著名军事家和政治家。在小说中是重要的历史背景人物，贯穿全书。1812年率大军入侵俄国，成为小说战争叙事线的核心推动力。书中俄国贵族对他的态度两极分化：有人崇拜（如青年皮埃尔），有人憎恶（如老博尔孔斯基公爵）。'
  书中原文: '"波拿巴对待欧洲就像海盗对待已经掳到手的船一样，"拉斯托普钦伯爵说。'
  网络来源: 'https://zh.wikipedia.org/zh-mo/%E6%88%B0%E7%88%AD%E8%88%87%E5%92%8C%E5%B9%B3'

- 名词: '奥尔登堡大公'
  分类: '人物'
  解释: '奥尔登堡公国的统治者，俄国沙皇亚历山大一世的亲戚（其妹夫）。1810年拿破仑吞并了奥尔登堡公国，这一行为直接冒犯了沙皇亚历山大一世，成为俄法关系破裂的重要导火索之一，也是小说中众多人物反复讨论的政治事件。'
  书中原文: '"奥尔登堡大公以坚强的毅力和镇静忍受他的不幸。" 鲍里斯说，他毕恭毕敬地参加了谈话。'
  网络来源: 'https://yunshuwu.cn/chap/8636.html'

- 名词: '罗斯托夫家'
  分类: '人物'
  解释: '小说四大贵族家族之一，以热情好客、淳朴真诚著称。家族成员包括老伯爵伊利亚·安德烈耶维奇、伯爵夫人、长子尼古拉、次女娜塔莎（小说女一号）、幼子彼佳以及养女索尼娅。与博尔孔斯基家族通过安德烈公爵与娜塔莎的婚事而联结。'
  书中原文: '"关于罗斯托夫家的事，您听到什么吗？……我听说他们不久就要来这儿了。我也天天盼安德烈回来。"'
  网络来源: 'https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8'

- 名词: '莫斯科'
  分类: '地点'
  解释: '俄国古都，小说中最重要的故事场景之一。罗斯托夫家族和博尔孔斯基家族（老公爵时期）居住于此。1812年拿破仑入侵时被法军占领并发生大火。莫斯科的上流社会与彼得堡宫廷形成鲜明对比，更传统、更热情、更具俄罗斯本色。'
  书中原文: '在莫斯科，鲍里斯在朱莉和玛丽亚公爵小姐这两个最有钱的姑娘之间犹豫不决。'
  网络来源: 'https://zh.wikipedia.org/zh-mo/%E6%88%B0%E7%88%AD%E8%88%87%E5%92%8C%E5%B9%B3'

- 名词: '彼得堡'
  分类: '地点'
  解释: '俄国首都（1712-1918年），小说中宫廷和上流社会沙龙的所在地。安娜·帕夫洛夫娜的沙龙是彼得堡社交界的重要舞台。与莫斯科的传统氛围不同，彼得堡更接近欧洲宫廷文化，是政治中心和官僚贵族聚集地。'
  书中原文: '"看来耍笔杆子的比比皆是，"老公爵说，"彼得堡人人都在写，不仅写照会，而且写法律。"'
  网络来源: 'https://zh.wikipedia.org/zh-mo/%E6%88%B0%E7%88%AD%E8%88%87%E5%92%8C%E5%B9%B3'

- 名词: '童山'
  分类: '地点'
  解释: '博尔孔斯基家族的庄园，俄文原名"Лысые Горы"（秃山），位于斯摩棱斯克以东约六十俄里处。老公爵被保罗皇帝放逐后便在此深居简出，过着极其规律、严谨的生活。既是博尔孔斯基家族的生活场景，也象征着旧式俄国贵族的秩序与精神世界。'
  书中原文: '他们这样把大公们搬来搬去，就像我把农奴从童山搬到博古恰罗沃和梁赞的庄园那样。'
  网络来源: 'https://book.douban.com/annotation/141070021/'

- 名词: '博古恰罗沃'
  分类: '地点'
  解释: '安德烈·博尔孔斯基公爵的领地之一。安德烈在1807-1809年和平时期大部分时间居住于此，在此进行了俄国最早的农奴制改革试验：解放三百名农奴为自由农民、用代役租制取代徭役租制等。'
  书中原文: '他们这样把大公们搬来搬去，就像我把农奴从童山搬到博古恰罗沃和梁赞的庄园那样。'
  网络来源: 'https://wenku.baidu.com/view/415d9dcdbaf3f90f76c66137ee06eff9aef84924'

- 名词: '梁赞'
  分类: '地点'
  解释: '俄国中部城市和省份，安德烈公爵儿子的田庄所在地。安德烈在1809年前往梁赞的旅途中，在林中见到著名的老橡树，引发对人生的深刻感慨。他还在此地拜访了当地首席贵族罗斯托夫家，第一次遇到娜塔莎·罗斯托娃。'
  书中原文: '他们这样把大公们搬来搬去，就像我把农奴从童山搬到博古恰罗沃和梁赞的庄园那样。'
  网络来源: 'https://book.douban.com/annotation/90855043/'

- 名词: '奥尔登堡'
  分类: '地点'
  解释: '位于德国西北部的一个公国，奥尔登堡大公的领地。1810年被拿破仑吞并，因大公与俄国沙皇亚历山大一世的亲戚关系，成为俄法关系破裂的重要导火索。书中人物多次讨论这一事件及其政治影响。'
  书中原文: '有人提议用别的领地来换奥尔登堡公国……他们这样把大公们搬来搬去，就像我把农奴从童山搬到博古恰罗沃和梁赞的庄园那样。'
  网络来源: 'https://yunshuwu.cn/chap/8636.html'

- 名词: '巴黎'
  分类: '地点'
  解释: '法国首都，欧洲文化和时尚的中心。在小说中，巴黎是俄国贵族心向往之的文化圣地，被视为"天堂"。拉斯托普钦伯爵讽刺俄国贵族说"我们的神灵是法国人，我们的天堂是巴黎"，深刻揭示了俄国上流社会对法国文化的崇拜。'
  书中原文: '"公爵，我们怎么好跟法国人打仗啊！……我们的神灵是法国人，我们的天堂是巴黎。"'
  网络来源: 'https://zh.wikipedia.org/zh-mo/%E6%88%B0%E7%88%AD%E8%88%87%E5%92%8C%E5%B9%B3'

- 名词: '法国'
  分类: '地点'
  解释: '拿破仑统治下的法兰西帝国，19世纪初欧洲最强大的国家。在《战争与和平》中，法国既是俄国的文化楷模（语言、时尚、思想），又是俄国的战场敌人。这一矛盾深刻体现了当时俄国社会的撕裂。'
  书中原文: '"服装是法国的，思想是法国的，感情是法国的！"'
  网络来源: 'https://zh.wikipedia.org/zh-mo/%E6%88%B0%E7%88%AD%E8%88%87%E5%92%8C%E5%B9%B3'

- 名词: '欧洲'
  分类: '地点'
  解释: '小说中政治与军事角逐的大舞台。拿破仑战争波及整个欧洲大陆，俄国在亲欧与反欧之间摇摆。老博尔孔斯基公爵主张俄国应将政策放在东方而非干预欧洲事务，反映了当时俄国关于"西化还是本土化"的争论。'
  书中原文: '只要我们向日耳曼人仍然寻求联盟，干预欧洲的事务……那么，我们同波拿巴的战争就会是不幸的。'
  网络来源: 'https://zh.wikipedia.org/zh-mo/%E6%88%B0%E7%88%AD%E8%88%87%E5%92%8C%E5%B9%B3'

- 名词: '东方'
  分类: '地点'
  解释: '小说中老博尔孔斯基公爵所主张的俄国战略方向。他主张俄国应将整个政策放在东方，对法国只需陈兵边界实行强硬政策即可，体现了当时俄国政坛关于外交战略方向的分歧。'
  书中原文: '我们整个政策应当放在东方，至于对付波拿巴，只要陈兵边界，实行强硬的政策，使他永远不敢像一八〇七年那样跨过俄国边界，也就够了。'
  网络来源: 'https://zh.wikipedia.org/zh-mo/%E6%88%B0%E7%88%AD%E8%88%87%E5%92%8C%E5%B9%B3'

- 名词: '香槟酒'
  分类: '物件'
  解释: '法国香槟地区出产的起泡葡萄酒，在19世纪俄国贵族宴会中不可或缺的象征性饮品。常用于祝酒仪式：为沙皇、为英雄、为家族健康举杯。在博尔孔斯基家，热菜之后斟上香槟酒为老公爵祝寿。'
  书中原文: '在热菜之后，斟上了香槟酒。客人们从位子上站起来向老公爵祝寿。'
  网络来源: 'https://williamlong.info/xiaoshuo/archives/400.html'

- 名词: '蒂尔西特和约'
  分类: '物件'
  解释: '1807年6月由俄国沙皇亚历山大一世与法国皇帝拿破仑一世在普鲁士蒂尔西特签订的和约，结束了法国与俄国、普鲁士之间的战争。和约后两国皇帝互换勋章，俄法关系短暂缓和。老博尔孔斯基公爵认为该和约将俄国牵连进了欧洲事务，主张不应再犯类似错误。'
  书中原文: '蒂尔西特和约已经把我们牵连到欧洲的事务里了。'
  网络来源: 'https://williamlong.info/xiaoshuo/archives/400.html'

- 名词: '拿破仑侵占奥尔登堡公国'
  分类: '事件'
  解释: '1810年拿破仑吞并了奥尔登堡公国，因奥尔登堡大公是俄国沙皇亚历山大一世的亲戚（其妹夫），此事件直接冒犯了沙皇，成为俄法关系破裂的重要导火索。小说中拉斯托普钦伯爵和鲍里斯等人在博尔孔斯基家宴会上就此事件展开热烈讨论。'
  书中原文: '吃饭的时候，谈话涉及最近的政治新闻：关于拿破仑侵占奥尔登堡大公的领土以及俄国递交欧洲各国的反对拿破仑的照会。'
  网络来源: 'https://yunshuwu.cn/chap/8636.html'

- 名词: '彼得堡检阅'
  分类: '事件'
  解释: '小说中提及的彼得堡军事检阅事件。新任法国公使在检阅时对俄军掷弹兵师和分列式表现出不屑态度，称"在法国没有人注意这类小事"，沙皇当时一言不发，此后在下次检阅时不再理睬公使。这一事件生动展现了1811年俄法外交关系的紧张。'
  书中原文: '"诸位有没有听说前不久彼得堡检阅的事？新任的法国公使太不像话！"'
  网络来源: 'https://book.qq.com/book-read/909748/4'

- 名词: '安德烈公爵的婚事'
  分类: '事件'
  解释: '安德烈公爵与娜塔莎·罗斯托娃的婚事是小说重要情节线。安德烈向娜塔莎求婚后，其父老博尔孔斯基公爵因嫌娜塔莎"年龄小、不富有"而强烈反对，要求推迟一年。安德烈被迫接受为期一年的缓冲期出国，期间娜塔莎受阿纳托利诱惑而悔婚，婚事告吹。'
  书中原文: '她一个劲地说……她没有什么苦恼，除了他已经知道的那桩苦恼，就是安德烈公爵的婚事可能引起父子的争吵。'
  网络来源: 'https://book.douban.com/annotation/141308294/'

- 名词: '俄国递交反对拿破仑的照会'
  分类: '事件'
  解释: '1811年左右俄国就拿破仑侵占奥尔登堡公国向欧洲各国递交的外交照会。小说中拉斯托普钦伯爵批评这份照会"文辞之坏令人吃惊"，皮埃尔则天真地认为内容有力比文辞更重要。反映了俄法战争前夕的外交交锋。'
  书中原文: '"我读过我国对奥尔登堡事件的抗议，那个照会文辞之坏令人吃惊。"拉斯托普钦伯爵说。"伯爵，如果照会的内容是有力的，文辞的好坏有什么关系？"皮埃尔说。'
  网络来源: 'https://book.qq.com/book-read/32055497/4'

- 名词: '上流社会'
  分类: '概念'
  解释: '19世纪初俄国贵族社会的核心社交圈层，以彼得堡和莫斯科为中心。安娜·帕夫洛夫娜的沙龙是其典型代表。表面上谈论文化艺术和政治，实质是权力和利益的交易所。托尔斯泰通过对其虚伪、自私和浅薄的描写，深刻批判了这个阶层的道德空虚。'
  书中原文: '公爵家并不是所谓"上流社会"，然而这个在莫斯科默默无闻的小圈子，受到它的接待却是莫大的荣幸。'
  网络来源: 'https://book.qq.com/book-read/38131447/2'

- 名词: '法国崇拜'
  分类: '概念'
  解释: '19世纪初俄国贵族阶层对法国文化、语言、时尚和思想的盲目崇拜现象。法语是贵族间的通用语，巴黎被视为文化天堂。拉斯托普钦伯爵在宴会上激烈批评这一现象，甚至说要取"彼得大帝的手杖"教训年轻一代。托尔斯泰以此批判上流社会的虚伪和"俄罗斯灵魂"的迷失。'
  书中原文: '"服装是法国的，思想是法国的，感情是法国的！您掐着梅蒂维埃的脖子把他赶出去，因为他是法国人，是坏蛋，可是我们的太太小姐却匍匐在他的脚下在他后面爬行。"'
  网络来源: 'https://wenwen.sogou.com/z/q765313657.htm'

- 名词: '政治联姻'
  分类: '概念'
  解释: '19世纪俄国贵族社会中以财富、地位和家族利益为驱动的婚姻模式。小说中最典型的例子是皮埃尔被迫娶海伦（库拉金公爵觊觎其遗产）、鲍里斯追求朱莉（觊觎其陪嫁），以及阿纳托利追求玛丽亚公爵小姐未遂。托尔斯泰深刻批判了这种将婚姻当作交易的功利主义。'
  书中原文: '因为我观察过：年轻人通常老请假来莫斯科，其目的就是来找有钱的未婚妻。'
  网络来源: 'https://book.qq.com/book-read/932189/3'

- 名词: '父权冲突'
  分类: '概念'
  解释: '小说中博尔孔斯基家族父与子、父与女之间的权力与情感冲突。老博尔孔斯基公爵专制严厉，对儿女使用独裁式的管教方式。安德烈为逃避家庭束缚而参军，其与娜塔莎的婚事遭父亲反对。玛丽亚长期承受父亲的精神折磨。冲突背后是深沉的亲情，体现了旧式贵族家庭的复杂伦理。'
  书中原文: '他看了看她，眼神冰冷而且愤怒，他把刚刮过的皱巴巴的腮帮子向她伸过去。他脸上全部的表情对她说，早晨谈的话他并没忘，他的决定依然有效。'
  网络来源: 'https://www.ruiwen.com/news/38193.htm'

- 名词: '命名日'
  分类: '习俗'
  解释: '俄国东正教传统中纪念同名的守护圣徒的节日，比生日更受重视。在小说中既是重要社交场合（如老博尔孔斯基公爵的命名日宴会有洛普欣、拉斯托普钦等人出席，罗斯托夫家的命名日有80份餐具的盛大宴会），也是展示家族地位和维系社交网络的重要时机。'
  书中原文: '在热菜之后，斟上了香槟酒。客人们从位子上站起来向老公爵祝寿。玛丽亚公爵小姐也走到他面前。'
  网络来源: 'https://williamlong.info/xiaoshuo/archives/494.html'

- 名词: '祝寿'
  分类: '习俗'
  解释: '俄国贵族在命名日或生日时举行的祝酒仪式。客人们从位子上站起，斟上香槟酒，向寿星表达祝福。在《战争与和平》中，老博尔孔斯基公爵的命名日宴会上便举行了这样的祝寿仪式，随后客人们到客厅喝咖啡继续交谈。'
  书中原文: '在热菜之后，斟上了香槟酒。客人们从位子上站起来向老公爵祝寿。'
  网络来源: 'https://www.yunshuwu.cn/chap/8479.html'

- 名词: '吻脸颊'
  分类: '习俗'
  解释: '19世纪俄国贵族常见的社交礼节，表示友谊、尊重和亲密。在三重吻习俗中，交替亲吻双颊三次。男性贵族之间久别重逢时会拥抱并互吻脸颊，女性好友相遇时拥抱亲吻面颊，长辈吻晚辈以示疼爱。小说中多次出现此礼节。'
  书中原文: '他握着他的手，把腮帮子伸给他吻。其他人也跟着拉斯托普钦站起来。'
  网络来源: 'https://rusmuseumvrm.ru/data/collections/painting/19_20/zh-5645/index.php?lang=en'
