- 名词: 彼佳
  分类: 人物
  解释: 彼得·伊里奇·罗斯托夫（Petya Rostov）的昵称，罗斯托夫伯爵的小儿子，天真热情、满怀爱国激情的少年，后来在1812年战争中英勇牺牲。
  书中原文: 彼佳抱着他的大腿。"还没亲亲我呢！"他喊道。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 薇拉
  分类: 人物
  解释: 薇拉·伊利尼奇娜·罗斯托娃（Vera Rostova），罗斯托夫伯爵的长女，性格刻板、爱管闲事，与活泼的弟弟妹妹们格格不入，后来嫁给军官别尔格。
  书中原文: 真是，多么奇怪，薇拉趁大家都沉默的时刻，说："索尼娅和尼古连卡现在见面时像两个陌生人似的称呼起'您'来了。"
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 老伯爵罗斯托夫
  分类: 人物
  解释: 伊利亚·安德烈耶维奇·罗斯托夫伯爵（Ilya Andreyevich Rostov），罗斯托夫家族家长，善良好客、慷慨大方但挥霍无度、不善理财，在接连遭受打击后于1813年去世。
  书中原文: 欢迎。我知道，我知道，伯爵抱着杰尼索夫亲吻，说，尼古卢什卡来信说过……娜塔莎，薇拉，这就是那个杰尼索夫。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 老伯爵夫人罗斯托娃
  分类: 人物
  解释: 纳塔利娅·罗斯托娃伯爵夫人（Countess Natalya Rostova），娘家姓申申娜，罗斯托夫伯爵之妻，是一位慈爱、温柔但体弱的贵族母亲，生了十二个孩子。
  书中原文: 老伯爵夫人坐在他身旁握着他的手不放，时时地亲吻它；其余的人聚在他周围，生怕放过他的每个动作、每句话、每一瞥。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 迪波尔
  分类: 人物
  解释: 路易·安托万·迪波尔（Louis Antoine Duport，1781-1853），法国杰出的芭蕾舞演员和编舞家，曾在巴黎、维也纳和圣彼得堡演出，被娜塔莎称为"大名鼎鼎的舞蹈家"。
  书中原文: 大名鼎鼎的迪波尔，舞蹈家，你没看见吗？那你就不了解了。你看我的。
  网络来源: https://en.wikipedia.org/wiki/Louis_Duport

- 名词: 卡缅斯基元帅
  分类: 人物
  解释: 米哈伊尔·费奥多托维奇·卡缅斯基（Mikhail Fedotovich Kamensky，1738-1809），俄国元帅、伯爵，参加过七年战争和俄土战争，1806年曾任俄军总司令，后因年迈指挥失利被解职。
  书中原文: 他在阿尔哈罗夫家舞会上指挥玛祖卡舞，和卡缅斯基元帅谈战争问题，常到英国俱乐部去。
  网络来源: https://wapbaike.baidu.com/item/米哈伊尔·费奥多罗维奇·卡缅斯基/7303182

- 名词: 亚历山大·帕夫洛维奇皇帝
  分类: 人物
  解释: 亚历山大一世·帕夫洛维奇（Alexander I Pavlovich，1777-1825），俄罗斯帝国皇帝，在位期间经历了与拿破仑的多场战争，最终领导俄国击败拿破仑，被视为"欧洲的救星"。
  书中原文: 他也完全有当时莫斯科人们对亚历山大·帕夫洛维奇皇帝的普遍崇拜，当时莫斯科人称他是"天使的化身"。
  网络来源: https://zh.wikipedia.org/wiki/%E4%BA%9A%E5%8E%86%E5%B1%B1%E5%A4%A7%E4%B8%80%E4%B8%96

- 名词: 英国俱乐部
  分类: 地点
  解释: 19世纪莫斯科著名的贵族社交场所（Английский клуб），虽名为"英国俱乐部"但成员主要是俄国贵族，是上流社会聚会、谈论政治和社交的重要场所。
  书中原文: 至于赛马、去英国俱乐部、和杰尼索夫狂饮，到某处去——这是另一回事：这对一个骁勇的骠骑兵是合乎身份的。
  网络来源: https://www.rbth.com/articles/2009/12/01/011209_expats.html

- 名词: 圣乔治勋章
  分类: 物件
  解释: 俄罗斯帝国最高军事勋章，1769年由叶卡捷琳娜二世设立，分为四级，授予作战勇敢的军官和将军，绶带为三黑两黄相间的圣乔治丝带。
  书中原文: 现在他是披着银丝镶边的披肩、戴着圣乔治勋章的骠骑军中尉。
  网络来源: https://baike.baidu.com/item/圣乔治勋章/702116

- 名词: 玛祖卡舞
  分类: 习俗
  解释: 起源于16世纪波兰玛佐夫舍地区的三拍子民间舞蹈，18世纪风靡全欧洲宫廷和上层社会舞会，舞步豪迈潇洒、节奏鲜明，男舞者占主导地位。
  书中原文: 他在阿尔哈罗夫家舞会上指挥玛祖卡舞，和卡缅斯基元帅谈战争问题。
  网络来源: https://baike.baidu.com/item/玛祖卡/411248

- 名词: 骑军中尉
  分类: 概念
  解释: 俄罗斯帝国骑兵军衔，俄语为Поручик（Poruchik），属于彼得大帝《官阶表》第XI等（1765年后），相当于步兵中尉，在骑兵连中担任副连长或连长职务。
  书中原文: 熟人们把他看做英俊的骠骑军中尉，跳舞的能手，莫斯科最优秀的未婚青年。
  网络来源: https://zh.wikipedia.org/wiki/%E4%BF%84%E7%BD%97%E6%96%AF%E5%86%9B%E8%A1%94%E5%8F%B2

- 名词: 行屈膝礼
  分类: 习俗
  解释: 西方传统女性问候礼仪（curtsey），双手拉起裙子两侧张开，膝部微屈，含笑低头，与男性的鞠躬礼相对应，多用于宫廷和正式社交场合。
  书中原文: 索尼娅正转着圈子，想鼓起连衣裙行屈膝礼。
  网络来源: https://baike.baidu.com/item/屈膝礼

- 名词: 铁尺烫臂
  分类: 事件
  解释: 娜塔莎·罗斯托娃幼年时为向索尼娅证明友谊和爱，将铁尺烧红后烫在自己手臂上留下伤疤，体现了她性格中的冲动、真挚与热烈。
  书中原文: 这是我为了证明我爱她才烧伤的。就是把铁尺在火上烧红，往这儿一按。
  网络来源: https://bkso.baidu.com/item/娜塔莎·罗斯托娃/15143141

- 名词: 骑兵外衣
  分类: 物件
  解释: 19世纪俄罗斯骠骑兵军官穿着的华丽制服外套，饰有平行穗带和毛皮镶边，通常色彩鲜艳，是骠骑兵身份的标志性服装。
  书中原文: 娜塔莎扳下哥哥的头，在他脸上亲了又亲，然后跳开，扯着他的骑兵外衣大襟。
  网络来源: https://baike.baidu.com/item/骠骑兵/1556131

- 名词: 佩刀
  分类: 物件
  解释: 俄罗斯帝国骑兵装备的军刀，19世纪主要以M1881式恰西克（沙什卡）为代表，刀身微弯、无护手盘，是骑兵的标志性冷兵器。
  书中原文: 在前面的房间里，地上横七竖八地摆满了佩刀、皮包、图囊、打开的提箱、脏靴子。
  网络来源: https://baike.baidu.com/item/俄式大军刀

- 名词: 绶带
  分类: 物件
  解释: 俄罗斯帝国军事勋章上佩戴的彩色丝带，不同勋章有特定颜色，如圣乔治勋章为三黑两黄相间，用以标识勋章的等级和类别。
  书中原文: 她抬不起头来，一个劲地把脸贴到他的骑兵制服的冰冷绶带上。
  网络来源: https://baike.baidu.com/item/圣乔治勋章/702116

- 名词: 走马
  分类: 物件
  解释: 指经过专门训练的快步马，19世纪俄罗斯贵族喜爱培育和驾驭走马，最著名的品种为奥尔洛夫快步马，是贵族身份和地位的象征。
  书中原文: 尼古卢什卡因而弄到个人专用的走马和最时髦的马裤。
  网络来源: https://www.sohu.com/a/192401770_734705

- 名词: 林荫路
  分类: 地点
  解释: 指莫斯科的林荫环路（Бульварное кольцо），尤指特维尔大道等，是19世纪莫斯科贵族散步、社交和展示身份的重要公共场所。
  书中原文: 在林荫路他有一个相识的女人，晚上常到她家里去。
  网络来源: https://zh.wikipedia.org/wiki/%E7%89%B9%E7%BB%B4%E5%B0%94%E5%A4%A7%E9%81%93

- 名词: 天使的化身
  分类: 概念
  解释: 19世纪初莫斯科民众对亚历山大一世皇帝的尊称，源于亚历山大纪念柱顶端天使雕像以沙皇面容为原型，象征其神圣、理想主义的统治者形象。
  书中原文: 他也完全有当时莫斯科人们对亚历山大·帕夫洛维奇皇帝的普遍崇拜，当时莫斯科人称他是"天使的化身"。
  网络来源: https://baike.baidu.com/item/亚历山大纪念柱/17688424
