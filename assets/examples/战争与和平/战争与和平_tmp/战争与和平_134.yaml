- 名词: 克劳塞维兹
  分类: 人物
  解释: 卡尔·冯·克劳塞维茨（Carl von Clausewitz，1780—1831），普鲁士军事理论家和军事史学家，著有《战争论》。1812年拿破仑征俄期间辞去普鲁士军职，转投俄军服务，参加了博罗季诺战役。托尔斯泰在小说中让其作为背景人物出现，借安德烈公爵之口讽刺其抽象理性的战争理论，以衬托俄国人基于情感和士气的战争观。
  书中原文: '安德烈公爵往那边一看，认出是沃尔佐根和克劳塞维兹，一个哥萨克跟随着。他们一边谈话，一边走近来，皮埃尔和安德烈公爵无意中听到以下的几句话："战争应当移到广阔的地带，这个意见我十分赞赏。"'
  网络来源: https://en.wikipedia.org/wiki/Carl_von_Clausewitz

- 名词: 士气
  分类: 概念
  解释: 士兵的战斗意志和集体精神状态。托尔斯泰通过安德烈公爵之口提出，战争的胜负不取决于阵地、武装或数量，而取决于每个士兵的士气——即谁下定决心去争取胜利，谁就能胜利。这一观念是托尔斯泰战争哲学的核心之一，强调精神因素而非理性部署的决定性作用。
  书中原文: '"胜利从来不取决于将来，也不取决于阵地，也不取决于武装，甚至不取决于数量；特别是不取决于阵地。" "那么取决于什么呢？" "取决于士气——我的，他的，"他指着季莫欣说，"以及每个士兵的士气。"'
  网络来源: https://en.wikipedia.org/wiki/War_and_Peace

- 名词: 莫扎伊斯克
  分类: 地点
  解释: 俄罗斯莫斯科州西部城镇，位于莫斯科以西约110公里，是通往莫斯科的西部门户。1812年拿破仑征俄期间，著名的博罗季诺战役（俄称"莫扎伊斯克战役"）就发生在其西郊约13公里处。皮埃尔在小说中正是从莫扎伊斯克山下到前线观看战斗，并在此过程中领悟了这场战争的意义。
  书中原文: '"从莫扎伊斯克山下来这一整天使皮埃尔不安的那个问题，现在他觉得十分清楚了，完全解决了。他懂得了这场战争和当前的战役的全部意义和重要性。"'
  网络来源: https://en.wikipedia.org/wiki/Mozhaysk

- 名词: 朱莉·德鲁别茨卡娅
  分类: 人物
  解释: 小说中的次要角色，莫斯科贵族富家女，玛丽亚公爵小姐的闺中密友和笔友。她因兄弟去世继承巨额遗产，以矫揉造作的感伤风格著称。后与追逐财富的鲍里斯·德鲁别茨科伊结婚，是托尔斯泰讽刺俄国上层社会虚伪婚姻的典型代表。
  书中原文: '"他们都到了。是朱莉·德鲁别茨卡娅告诉我的。我去看过他们，但是没有遇见。他们到莫斯科近郊的庄园去了。"'
  网络来源: https://www.litcharts.com/lit/war-and-peace/characters

- 名词: 斯文齐亚内
  分类: 地点
  解释: 立陶宛东部城镇（今Švenčionys），历史上属维尔纳省。1812年拿破仑征俄期间，俄军在撤退途中经过此地。安德烈公爵在谈话中提及此地，以说明俄国军队在巴克莱·德·托利指挥下撤退时严格执行焦土政策、禁止劫掠地方，而库图佐夫上任后改变了这一做法。
  书中原文: '"我们从斯文齐亚内撤退时，连一根树枝、一根干草或者什么的，都不敢动。我们走后，他得了，不是这样吗，大人？"'
  网络来源: https://en.wikipedia.org/wiki/%C5%A0ven%C4%8Dionys
