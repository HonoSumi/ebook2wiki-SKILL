- 名词: 谢苗诺娃
  分类: 人物
  解释: 叶卡捷琳娜·谢苗诺娃（1786-1849），19世纪初俄国著名戏剧女演员，以表演古典悲剧闻名于圣彼得堡帝国剧院，深受普希金等同时代文人推崇。
  书中原文: 听说谢苗诺娃的演技无与伦比
  网络来源: 叶卡捷琳娜·谢苗诺娃是19世纪俄国杰出的戏剧女演员，活跃于圣彼得堡帝国剧院，以表演古典悲剧闻名，是普希金、格里鲍耶陀夫等同时代文人所推崇的艺术家。

- 名词: 化装赛会
  分类: 习俗
  解释: 化装赛会即假面舞会或化妆舞会，是俄国贵族阶层流行的社交娱乐活动，参与者身着奇装异服或佩戴面具。俄国历史上最著名的化装舞会是1903年冬宫化装舞会，也是罗曼诺夫王朝最后一场盛大舞会。
  书中原文: 我们举办一次化装赛会；您最好能够参加
  网络来源: 化装舞会是俄国贵族社交的重要形式，1903年冬宫化装舞会是罗曼诺夫王朝最后一场盛大舞会，参与者穿着17世纪俄罗斯传统服饰，反映了当时的"俄罗斯复兴"思潮。
