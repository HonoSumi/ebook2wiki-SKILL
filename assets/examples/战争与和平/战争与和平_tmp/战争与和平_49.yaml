- 名词: 米哈伊尔·库图佐夫
  分类: 人物
  解释: 米哈伊尔·伊拉里奥诺维奇·库图佐夫（1745-1813），俄罗斯帝国陆军元帅，1812年卫国战争中击败拿破仑大军的俄军总司令。在1805年奥斯特利茨战役中担任俄奥联军总司令，因战略分歧遭沙皇反对而战败。以"北方的老狐狸"之称闻名，擅长保存实力、诱敌深入的战略。
  书中原文: 安德烈公爵用肉眼看见离库图佐夫站的地方不到五百步的右下方，密集的法国纵队正冲上来迎击阿普舍龙团的士兵。
  网络来源: https://zh.wikipedia.org/zh-sg/%E7%B1%B3%E5%93%88%E4%BC%8A%E5%B0%94%C2%B7%E5%BA%93%E5%9B%BE%E4%BD%90%E5%A4%AB

- 名词: 乌瓦罗夫
  分类: 人物
  解释: 费奥多尔·彼得罗维奇·乌瓦罗夫（1769-1824），俄罗斯帝国骑兵上将。1812年卫国战争中指挥第1预备骑兵军，参加了博罗季诺战役、维亚济马战役等。1805年奥斯特利茨战役中指挥俄军骑兵部队。战后担任沙皇亚历山大一世侍从武官，1821年任近卫军军长。
  书中原文: 驰过乌瓦罗夫的骑兵团，他已经清晰地听见前面的炮声和枪声。
  网络来源: http://ed.mdict.net/k2037186.html

- 名词: 阿普舍龙团
  分类: 物件
  解释: 阿普舍龙步兵团（81st Apsheron Infantry Regiment），俄罗斯帝国著名步兵团，1724年成立，以阿普舍龙半岛命名。参加了七年战争、伊兹梅尔要塞攻防战、1812年卫国战争和高加索征服。在库讷斯多夫战役中血战获红色绑腿特殊荣誉。托尔斯泰在《战争与和平》中单独提及该团。
  书中原文: 密集的法国纵队正冲上来迎击阿普舍龙团的士兵。
  网络来源: https://www.christies.com.cn/zh-cn/lot/lot-4993171

- 名词: 普拉茨高地
  分类: 地点
  解释: 普拉茨高地（Pratzen Heights，也译作普拉岑高地），位于奥斯特利茨战场中央的战略制高点。在1805年奥斯特利茨战役中，拿破仑故意放弃该高地诱敌，随后命苏尔特元帅率军夺回，将俄奥联军拦腰截断，成为战役转折点。控制此高地即可俯瞰整个战场。
  书中原文: 从普拉茨高地前面的山坡上传来阵阵步枪的排射声，时而夹着稠密的大炮声。
  网络来源: https://baike.sogou.com/v8067.htm

- 名词: 法军
  分类: 概念
  解释: 法军即法国军队，在拿破仑战争时期（1803-1815）指法兰西第一帝国的军事力量，由拿破仑一世统帅。拿破仑建立的大军团（Grande Armee）被认为是当时欧洲最强大的军事力量，以纵队突击、散兵战术和大炮集群为特色。在奥斯特利茨战役中击败俄奥联军。
  书中原文: 这是法国人！原以为法军远离我们两俄里以外，可是他们忽然意外地出现在我们眼前。
  网络来源: https://zhuanlan.zhihu.com/p/27950154

- 名词: 俄军
  分类: 概念
  解释: 俄罗斯帝国陆军，由彼得大帝于1721年创立，至1917年俄国革命解散。在拿破仑战争时期经历了奥斯特利茨战败到1812年击败拿破仑大军的历程。主要名将包括苏沃洛夫、库图佐夫、巴格拉季翁等。实行征兵制，以坚韧顽强的步兵著称。
  书中原文: 在较高的地方，站着俄国步兵，他们不向前去支援炮兵，也不随着人流后退。
  网络来源: https://zh.wikipedia.org/zh-sg/%E4%BF%84%E7%BE%85%E6%96%AF%E5%B8%9D%E5%9C%8B%E9%99%B8%E8%BB%8D

- 名词: 近卫重骑兵
  分类: 概念
  解释: 俄罗斯帝国近卫重骑兵，是沙皇精锐骑兵部队，包括近卫骑兵团（Kavalergarde）和骑马禁军团等。装备白色制服、胸甲和骑枪，只招收贵族子弟。在1805年奥斯特利茨战役中对法军发起过英勇但伤亡惨重的冲锋。
  书中原文: 这是我们的近卫重骑兵正去迎战向他们驰来的法国骑兵。
  网络来源: https://bbs.napolun.com/forum.php?mod=viewthread&tid=22885

- 名词: 枪骑兵
  分类: 概念
  解释: 枪骑兵（Lancer/Uhlan），18-19世纪欧洲骑兵类型，以长矛为主要武器，同时使用马刀。起源于波兰，普鲁士和俄国称其为乌兰（Uhlan）。在拿破仑战争中执行冲锋、侦察、追击等任务。俄军在整个拿破仑时代一直保有枪骑兵部队。
  书中原文: 有几个骑兵迎面驰来。这是我们的枪骑兵，队形混乱，是从进攻中撤下来的。
  网络来源: https://baike.baidu.com/item/%E6%9E%AA%E9%AA%91%E5%85%B5

- 名词: 军旗
  分类: 物件
  解释: 军旗是军队的标志性旗帜，象征部队的荣誉、勇敢和光荣。在拿破仑战争时期，军旗是团级部队的核心象征，引导士兵冲锋陷阵，丢失军旗被视为莫大的耻辱。安德烈公爵在奥斯特利茨战场抓起倒下的军旗带领士兵冲锋。
  书中原文: 军旗摇摇晃晃往下倒，邻近的几个士兵用枪支住了它。
  网络来源: https://military.people.com.cn/BIG5/n1/2025/0801/c1011-40534444.html

- 名词: 探帚
  分类: 物件
  解释: 探帚是火炮清理工具，也称炮刷或海绵杆，为一根长木杆末端装羊羔皮或猪鬃刷头。发射后蘸水伸入炮膛清刷，熄灭残留火星并降温，是装填流程中最重要的安全步骤。拿破仑战争时期与推弹杆做成一体，简称炮膛探帚。
  书中原文: 他拖着炮膛探帚的一头，一个法国兵拖着另一头互相争夺。
  网络来源: https://npshistory.com/series/interpretive/3/is3e.htm

- 名词: 炮膛探帚
  分类: 物件
  解释: 炮膛探帚即探帚、炮刷，是拿破仑战争时期火炮装填工具之一。长木杆一端装羊羔皮刷头，发射后蘸水清理炮膛以熄灭火星。通常与推弹杆一体，一端为探帚，另一端为推弹杆。探帚手是炮组关键岗位。
  书中原文: 他拖着炮膛探帚的一头，一个法国兵拖着另一头互相争夺。
  网络来源: https://npshistory.com/series/interpretive/3/is3e.htm

- 名词: 传令兵
  分类: 概念
  解释: 传令兵是军队中负责传递命令和情报的通信兵，在拿破仑战争时期主要以骑兵形式编入各级作战单位。由于当时缺乏无线电通信，传令兵是战场上最主要的通信手段，其效率和可靠性直接影响战役成败。近代参谋制度建立后逐步取代单纯传令兵模式。
  书中原文: 他担任了最勇敢的将军的传令兵。
  网络来源: https://bbs.napolun.com/thread-37266-1-1.html

- 名词: 排射
  分类: 概念
  解释: 排射（Fire by Rank），拿破仑战争时期步兵射击战术之一，以排为单位轮流射击以形成连续火力。线列步兵通常排成二至三排横队，各排交替射击、装填，维持不间断的弹幕。与全队齐射相比，排射能提供更持久的压制火力。
  书中原文: 从普拉茨高地前面的山坡上传来阵阵步枪的排射声，时而夹着稠密的大炮声。
  网络来源: https://bbs.napolun.com/forum.php?mod=viewthread&tid=21952
