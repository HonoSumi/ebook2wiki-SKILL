- 名词: "尼古拉·罗斯托夫"
  分类: "人物"
  解释: "尼古拉·罗斯托夫是罗斯托夫家族长子，娜塔莎的哥哥，一位正直热情的骠骑兵军官。他对沙皇亚历山大一世怀有宗教般的热爱。父亲去世后家道中落，他毅然退役承担债务。最终与玛丽亚·博尔孔斯卡娅结婚，成为一位精明务实的庄园主，代表了托尔斯泰笔下完美的俄国宗法制贵族形象。"
  书中原文: "尼古拉都不离索尼娅的身边，并且对她完全另眼相看。他觉得，多亏这个软木炭小胡子，他今天才第一次完全认识索尼娅。……他不断地端详，当他认出仍然和先前一样而又不一样的索尼娅，而且想起那混合着亲吻感觉的软木炭气味的时候，他望了望后退的地面和繁星灿烂的天空，深深呼吸着严寒的空气，觉得自己又进入仙境了。"
  网络来源: "https://www.vrrw.net/hstj/9010.html"

- 名词: "娜塔莎·罗斯托娃"
  分类: "人物"
  解释: "娜塔莎·罗斯托娃是《战争与和平》的女主角，罗斯托夫伯爵的次女。托尔斯泰以妻子索菲亚和其妹妹为原型，视她为「生命和幸福的化身」。她从天真活泼的少女，经历与安德烈的爱情、受阿纳托尔诱惑私奔失败的波折，在1812年战争中照料伤兵而成长，最终与皮埃尔结婚成为贤妻良母。"
  书中原文: "娜塔莎，梅柳科娃家的年轻人的宠儿，同她们一起消失在后面的房间里了，在这儿，姑娘们赤裸的手臂从半开着的门缝里接过男仆递来她们所要的软木炭、各种长衫和男人的衣裳。……「我非常快活，非常快活！我真的在生你的气呢。你对她太坏了，不过这话我没跟你说。这是一颗怎样的心啊，尼古拉，我太高兴了！」"
  网络来源: "https://baike.baidu.com/item/娜塔莎·罗斯托娃/15143141"

- 名词: "索尼娅（索菲娅·亚历山德罗夫娜）"
  分类: "人物"
  解释: "索尼娅是老罗斯托夫伯爵的外甥女，娜塔莎的表姐兼密友，与尼古拉青梅竹马相恋。她曾拒绝多洛霍夫的求婚，忠诚于尼古拉。但在小说的结局中，尼古拉最终娶了玛丽亚公爵小姐，索尼娅未能获得圆满的爱情，是一个温柔善良、具有自我牺牲精神的悲剧性人物。"
  书中原文: "索尼娅穿过走廊向仓库走去。尼古拉说他觉得太热，急忙走出大门。……她把皮袄披在头上，看了尼古拉一眼。……她走到离他只有两步远的地方才看见他；他穿着女人衣裳，头发乱蓬蓬的，面带幸福的、索尼娅从未见过的微笑。她赶快跑到他身边。"
  网络来源: "https://zhuanlan.zhihu.com/p/667982112"

- 名词: "佩拉格娅·丹尼洛夫娜"
  分类: "人物"
  解释: "佩拉格娅·丹尼洛夫娜·梅柳科娃是一位居住在罗斯托夫家附近的遗孀，性格开朗慈祥，是一群女儿的母亲。在圣诞期间她热情地接待罗斯托夫一家来做客，主持了热闹的化装舞会和集体游戏，在晚餐时还讲述占卜故事，是小说中一个生动有趣的次要人物。"
  书中原文: "佩拉格娅·丹尼洛夫娜吩咐给客人腾地方，为主仆们准备吃的，然后她不摘眼镜，忍着笑，在假面人中间走来走去，离近端详他们的脸，一个人她也不认识。……她用手帕捂着脸，由于忍不住老年人和蔼的笑，整个肥大的身子都颤动起来。"
  网络来源: "https://yunshuwu.cn/chap/8611.html"

- 名词: "季姆勒"
  分类: "人物"
  解释: "季姆勒（爱德华·卡尔雷奇）是一位乐师（音乐家），与妻子一同寄居在罗斯托夫伯爵家中，是长期居住在罗斯托夫家的众多「食客」之一。在梅柳科娃家的圣诞化装舞会上，他化装成小丑（丑角），带头跳舞，以舞姿优美被称赞。"
  书中原文: "小丑季姆勒和老太婆尼古拉带头跳起舞来。……她不仅不认识罗斯托夫和季姆勒，甚至连自己的女儿，连她们穿的她丈夫的长衫和礼服也认不得。……「爱德华·卡尔雷奇多漂亮！我认不出了。跳得多么好！」"
  网络来源: "https://www.nunubook.com/waiguo/6143/254305.html"

- 名词: "尼古拉（化装舞会中的骠骑兵）"
  分类: "人物"
  解释: "此处指化装舞会上扮骠骑兵的年轻人，实际上是娜塔莎·罗斯托娃所扮（而非指尼古拉·罗斯托夫）。文本中众人欢呼「骠骑兵，骠骑兵」称赞的是装扮成骠骑兵的娜塔莎，她穿上男装后「简直像男孩子」，展现了圣诞化装舞会中性别反串的欢乐气氛。"
  书中原文: "化装的人，遮着脸，改变了声音，向女主人请安行礼，然后在室内散开来。……「哈—哈—哈！……骠骑兵，骠骑兵！简直像男孩子，看那两条腿！……」"
  网络来源: "https://www.williamlong.info/xiaoshuo/archives/362.html"

- 名词: "爱德华·卡尔雷奇"
  分类: "人物"
  解释: "爱德华·卡尔雷奇即季姆勒（Dimmler），是罗斯托夫家中的德国裔乐师。卡尔雷奇（Карлович）是俄语父名，意为「卡尔之子」。「爱德华·卡尔雷奇」是他的全称，在化装舞会中他被称赞装扮清秀、舞跳得好。"
  书中原文: "「啊，认不出了！是娜塔莎吗！你瞧，她像谁！真的，她的确像一个人。爱德华·卡尔雷奇多漂亮！我认不出了。跳得多么好！啊，我的老天，切尔克斯人扮得真像……」"
  网络来源: "http://en.enun.cn/html/2008-02/42933.shtml"

- 名词: "路易莎·伊万诺夫娜"
  分类: "人物"
  解释: "路易莎·伊万诺夫娜（又称肖斯小姐 / Miss Schoss）是罗斯托夫伯爵家的德籍家庭女教师，负责教育罗斯托夫家的女孩们。她性格循规蹈矩、谨慎温和，在罗斯托夫家不拘小节的热闹氛围中扮演「规矩」的象征。她陪同姑娘们参加梅柳科娃家的圣诞聚会并一起乘雪橇返回。"
  书中原文: "「路易莎·伊万诺夫娜，我可以去吗？」索尼娅问。……从佩拉格娅·丹尼洛夫娜那儿回来时，一向眼尖，对什么都留心的娜塔莎，把坐位作了一番安排：路易莎·伊万诺夫娜和她，还有季姆勒，坐一只雪橇。"
  网络来源: "http://bcc.blcu.edu.cn/show/1172511766_8_12_-1_-1/0"

- 名词: "杜尼亚莎"
  分类: "人物"
  解释: "杜尼亚莎是娜塔莎·罗斯托娃的贴身使女（女仆），忠心耿耿，服务周到。在娜塔莎和索尼娅进行镜卜占卜时，她帮忙摆放镜子并在一旁观看，表现出对占卜传统的熟悉和笃信。在小说其他章节中她也在罗斯托夫家的重要场合出现。"
  书中原文: "在娜塔莎的桌上，杜尼亚莎还在昨天就准备了两面镜子放在那儿。……「不许笑，小姐。」杜尼亚莎说。……「这一回，索菲娅·亚历山德罗夫娜一定看得见，」杜尼亚莎悄悄说，「您老笑。」……「你看，我不是说过吗。」杜尼亚莎扶着镜子说。"
  网络来源: "http://www.8ge.net/dubook/名著·战争与和平/239.htm"

- 名词: "安德烈公爵"
  分类: "人物"
  解释: "安德烈·博尔孔斯基公爵是《战争与和平》的核心男主角之一，理性深沉、追求精神超越。他与娜塔莎相爱并订婚，但因父亲反对需等待一年。在娜塔莎受阿纳托尔诱惑私奔失败后婚约解除。1812年战争中他身受重伤，在娜塔莎的照料下去世。镜卜中索尼娅谎称看见了他。"
  书中原文: "娜塔莎说，她对索尼娅的安慰一言不发，在床上躺下，吹灭蜡烛后，仍然长久地睁着眼睛，一动不动地躺在床上，望着寒冷的月光照进结冰的窗户。……「安德烈躺着？他病了？」娜塔莎吃惊地、目不转睛地瞪着女友问。"
  网络来源: "https://www.vrrw.net/hstj/9010.html"

- 名词: "梅柳科娃家的女儿们"
  分类: "人物"
  解释: "梅柳科娃家的女儿们是佩拉格娅·丹尼洛夫娜的一群女儿，人数众多。在圣诞夜化装舞会前她们在安静地滴蜡油占卜，随后兴高采烈地参与化装活动，与娜塔莎等人一起用软木炭画胡子、换男装。她们在晚餐时好奇地听老姑娘讲澡堂算卦的故事，展现了俄国贵族少女的日常生活。"
  书中原文: "四周围着一群女儿，她尽量设法不使女儿们烦闷。当前厅响起来客的脚步声和说话声的时候，女儿们正在安静地滴蜡烛油，然后观看凝结的各种形状的影子。……「那是为什么？」梅柳科娃的长女问道。……「您讲一讲，那位小姐遇到了什么？」梅柳科娃的二女儿说。"
  网络来源: "https://yunshuwu.cn/chap/8611.html"

- 名词: "老姑娘"
  分类: "人物"
  解释: "老姑娘是一位住在梅柳科娃家中的年长未婚女性（老处女），在圣诞晚餐时讲述了一个关于澡堂算卦遇鬼的恐怖故事——一位少女在澡堂摆好公鸡和餐具，引来军官鬼魂共餐，少女吓得以手掩面，直到使女们赶来才得救。这个故事反映了俄国圣诞占卜传统中神秘恐怖的一面。"
  书中原文: "「不行，在澡堂里算卦，那太可怕了！」吃晚饭的时候，一位住在梅柳科娃家的老姑娘说。……「事情是这样的，一位小姐到澡堂去了，」老姑娘说，「她带去一只公鸡，两份餐具——准备得应有尽有，她在那儿坐下来。坐着坐着，忽然听见车响……一辆雪橇叮叮当当地驶来了；她听见有人来了。」"
  网络来源: "https://yunshuwu.cn/chap/8611.html"

- 名词: "尼基塔"
  分类: "人物"
  解释: "尼基塔是梅柳科娃家的男仆，在化装舞会上被女主人招呼搬动桌子以便腾出空间跳舞做游戏。他是俄国贵族家庭中众多无名仆役之一，在这个片段中体现了贵族家庭中主仆关系的日常运作。"
  书中原文: "「把桌子搬开，尼基塔，万尼亚。我们刚才还安静地坐着不动呢！」"
  网络来源: "https://yunshuwu.cn/chap/8611.html"

- 名词: "万尼亚"
  分类: "人物"
  解释: "万尼亚是梅柳科娃家的男仆，与尼基塔一同被女主人呼来搬桌子。在俄国贵族家庭中，像万尼亚这样的仆人是家庭日常生活运转不可或缺的一部分，但在文学作品中通常只在需要时才被提及名字。"
  书中原文: "「把桌子搬开，尼基塔，万尼亚。我们刚才还安静地坐着不动呢！」"
  网络来源: "https://yunshuwu.cn/chap/8611.html"

- 名词: "梅柳科娃家"
  分类: "地点"
  解释: "梅柳科娃家是佩拉格娅·丹尼洛夫娜·梅柳科娃的庄园宅邸，位于罗斯托夫家附近（邻近庄园）。圣诞节期间罗斯托夫一家化装后乘雪橇前来拜访，举行热闹的化装舞会、集体游戏和丰盛的晚餐。宅内有客厅、大厅、后门廊、仓库等空间，是小说中圣诞欢庆场景的核心舞台。"
  书中原文: "怀的宽大外衣，坐在客厅里，四周围着一群女儿，她尽量设法不使女儿们烦闷。当前厅响起来客的脚步声和说话声的时候，女儿们正在安静地滴蜡烛油，然后观看凝结的各种形状的影子。……「不，我去；佩拉格娅·丹尼洛夫娜，让我去吧，我要去。」索尼娅说。"
  网络来源: "https://yunshuwu.cn/chap/8611.html"

- 名词: "澡堂"
  分类: "地点"
  解释: "澡堂（俄式蒸汽浴房，баня）在俄国民间传统中被视为阴阳交界之处，是少女圣诞占卜的重要场所。相传在深夜独自进入黑暗的澡堂，散开头发、卸下首饰，摆放公鸡和餐具，即可召来未来丈夫的鬼魂形象。这一传统融合了古斯拉夫多神教与东正教信仰，被认为是「不洁之地」因而通灵。"
  书中原文: "「不行，在澡堂里算卦，那太可怕了！」吃晚饭的时候，一位住在梅柳科娃家的老姑娘说。……「事情是这样的，一位小姐到澡堂去了，她带去一只公鸡，两份餐具——准备得应有尽有，她在那儿坐下来。」"
  网络来源: "https://ru.hujiang.com/new/p299477/"

- 名词: "仓库"
  分类: "地点"
  解释: "仓库（粮仓，амбар）是俄国乡村少女圣诞占卜的又一重要场所。占卜方式是在深夜独自前往仓库侧耳静听内部传出的声音：若听到装粮的沙沙声则为吉兆（预示丰裕的婚姻），若听到敲打声则为凶兆。在小说中索尼娅勇敢地前往仓库听音，而尼古拉在月光下的小路上等候她，两人在此场景中感情升华。"
  书中原文: "「现在就可以去试试，到仓库里去听声音。你如果听到敲敲打打的响声，就不好，听到装粮的声音，就是吉兆；有时也有……」……人们告诉索尼娅仓库在哪儿，她应当怎样站在那儿静听，然后递给她一件皮袄。她把皮袄披在头上，看了尼古拉一眼。"
  网络来源: "https://yunshuwu.cn/chap/8611.html"

- 名词: "圣诞化装舞会"
  分类: "事件"
  解释: "圣诞化装舞会是俄国圣诞节期间贵族家庭非常流行的庆祝活动，源自异教时期的假面传统（ряженые / mummers）。人们装扮成骠骑兵、巫婆、小丑、狗熊等角色，戴上面具或用软木炭画胡子眉毛以掩盖身份，走家串户、跳舞游戏。人们相信圣诞后八天魔鬼游荡，装扮成魔鬼的样子可以欺骗吓走它们。"
  书中原文: "骠骑兵、老太太、巫婆、小丑、狗熊，在前厅清清嗓子，擦掉脸上冻结的霜，然后进入人们急忙点起蜡烛的大厅。小丑季姆勒和老太婆尼古拉带头跳起舞来。被吵吵嚷嚷的孩子们围起来的化装的人，遮着脸，改变了声音，向女主人请安行礼，然后在室内散开来。"
  网络来源: "http://tsrus.cn/wenhua/2024/01/03/678953"

- 名词: "澡堂算卦"
  分类: "事件"
  解释: "澡堂算卦是俄国少女圣诞占卜中最恐怖的一种方式。少女深夜独入澡堂，散开头发不戴首饰，摆放两份餐具和一只公鸡，邀请「未婚夫」共餐。据说会有鬼魂（未来丈夫的形象）出现共食。若少女害怕捂脸，鬼魂会将她抱起。需撑到鸡叫时鬼魂才会消失。这个故事在小说中由梅柳科娃家的老姑娘讲述。"
  书中原文: "「事情是这样的，一位小姐到澡堂去了，」老姑娘说，「她带去一只公鸡，两份餐具——准备得应有尽有，她在那儿坐下来。坐着坐着，忽然听见车响……一辆雪橇叮叮当当地驶来了；她听见有人来了。他进来了，完全和人一样，军官打扮，他来了，就在她身旁坐下，拿起餐具吃饭。」"
  网络来源: "https://ru.hujiang.com/new/p299477/"

- 名词: "仓库听音占卜"
  分类: "事件"
  解释: "仓库听音占卜是俄国少女圣诞占卜的一种方式，通过听觉来预测吉凶。少女在深夜独自前往仓库（粮仓）外静听内部传出的声音：听到装粮的沙沙声或「走、出发」这类话语预示近期结婚（吉兆），听到敲打声或「坐下、别急」等话语则预示不顺。在小说中索尼娅勇敢前往，而尼古拉追出在月光下等候她。"
  书中原文: "「现在就可以去试试，到仓库里去听声音。你如果听到敲敲打打的响声，就不好，听到装粮的声音，就是吉兆；有时也有……」……索尼娅穿过走廊向仓库走去。尼古拉说他觉得太热，急忙走出大门。室外仍然是凝然不动的严寒，仍然是明月当空，只是更亮了。"
  网络来源: "https://astronko.ru/en/im-a-cosmetologist/rozhdestvenskie-gadaniya-na-budushchee-suzhenogo-i-sudbu-v-noch-pered-prazdnikom.html"

- 名词: "尼古拉与索尼娅定情"
  分类: "事件"
  解释: "这是尼古拉与索尼娅情感发展的高潮场景。在圣诞化装舞会的月光之夜，尼古拉在索尼娅前往仓库占卜的路上等候她，在覆盖白雪的小路上与她相会。他看到化了装的索尼娅「完全换了一个人，可仍然是原来的样子」，在月光下吻了她，决心永不分离。这是小说中最浪漫优美的场景之一。"
  书中原文: "他把两手探进蒙着她的头的皮袄下面，搂着她，把她紧贴着自己，吻她那带着小胡子和散发着焦炭气味的嘴唇。索尼娅吻他嘴唇的正中间，抽出两只小手托住他的面颊。……「索尼娅！……尼古拉！……」他们只说了这两句。他们跑到仓库里，回来时各走各的门廊。"
  网络来源: "https://yunshuwu.cn/chap/8611.html"

- 名词: "娜塔莎镜卜"
  分类: "事件"
  解释: "镜卜（гадание на зеркалах）是俄国圣诞占卜中最著名也最恐怖的方式。少女深夜在黑暗房间中将两面镜子相对而立形成无尽镜像隧道，点燃蜡烛凝视镜中，念咒请未婚夫出现共进晚餐。据说能从镜中看到未来丈夫的面容或棺材等预兆。娜塔莎和索尼娅回到家中后对镜占卜，索尼娅谎称看见了安德烈。"
  书中原文: "「坐下，娜塔莎，也许你能看见他。」索尼娅说。娜塔莎把几支蜡烛点着，坐下来。……她长久地坐在那儿望着两面镜子里一串渐渐远去的蜡烛，她设想（根据她所听到的故事构思），在最后汇合成一个模糊的方形的烛光中，时而看见棺材，时而看见他——安德烈公爵。"
  网络来源: "https://ru.hujiang.com/new/p299477/"

- 名词: "雪橇返程"
  分类: "事件"
  解释: "圣诞聚会结束后，一行人乘雪橇返回罗斯托夫家。娜塔莎特意安排座位让索尼娅和尼古拉同乘一橇。在月光照耀的雪夜中，尼古拉不断端详索尼娅，中途还跳到娜塔莎的雪橇上与她交谈关于索尼娅的决定。寒冷的月光、吱吱作响的雪地和繁星灿烂的天空构成了美妙的冬夜氛围。"
  书中原文: "从佩拉格娅·丹尼洛夫娜那儿回来时，一向眼尖，对什么都留心的娜塔莎，把坐位作了一番安排：路易莎·伊万诺夫娜和她，还有季姆勒，坐一只雪橇，索尼娅同尼古拉以及女仆们坐在一起。……在中途，尼古拉把缰绳交给车夫，他暂时跑到娜塔莎的雪橇上，站在弯托梁上。"
  网络来源: "https://yunshuwu.cn/chap/8611.html"

- 名词: "软木炭画胡子"
  分类: "概念"
  解释: "软木炭画胡子是俄国圣诞化装传统中的一种简易化妆手法。人们用烧焦的软木塞（burnt cork）作为炭笔，在脸上涂抹画假胡子和眉毛以掩盖真实面目。这比戴面具更轻便自然，且带有独特的焦炭气味。在小说中娜塔莎、索尼娅等姑娘都用软木炭画了小胡子，连尼古拉也被索尼娅的小胡子所吸引。"
  书中原文: "姑娘们赤裸的手臂从半开着的门缝里接过男仆递来她们所要的软木炭、各种长衫和男人的衣裳。……在流汗的、火热的、快活的脸上，软木炭画的胡子和眉毛都模糊了。……吻她那带着小胡子和散发着焦炭气味的嘴唇。"
  网络来源: "https://rusmuseumvrm.ru/data/collections/painting/19_20/zh_1419/?lang=en"

- 名词: "镜卜"
  分类: "概念"
  解释: "镜卜是俄国最著名的少女圣诞占卜方式。做法是在深夜将两面镜子相对摆放形成无限反射的镜像隧道，点燃蜡烛，散开头发，凝视镜中念咒请未婚夫现身。这一仪式被认为非常危险——若看到影像后不及时念咒驱散，鬼魂可能从镜中出来伤人。镜卜是古斯拉夫多神教占卜传统的一部分。"
  书中原文: "在娜塔莎的桌上，杜尼亚莎还在昨天就准备了两面镜子放在那儿。……娜塔莎在索尼娅和使女帮助下，把镜子摆好；她面孔的表情严肃起来，不再说话了。她长久地坐在那儿望着两面镜子里一串渐渐远去的蜡烛……时而看见棺材，时而看见他——安德烈公爵。"
  网络来源: "https://www.rbth.com/articles/2013/01/06/predicting_the_future_on_orthodox_christmas_21677.html"

- 名词: "集体游戏"
  分类: "概念"
  解释: "集体游戏是俄国圣诞聚会中常见的传统娱乐活动，主仆共同参与。戒指游戏（传递戒指猜在谁手）、绳子游戏（翻花绳或拉绳比赛）和卢布游戏（传递钱币）等都是简单而热闹的室内游戏。这些游戏打破了主仆界限，所有人围成大圆圈一起玩，体现了圣诞节的全民同乐精神。"
  书中原文: "在跳过俄罗斯民间舞和环舞之后，佩拉格娅·丹尼洛夫娜叫全体家奴和主人在一起拉一个大圆圈；叫人拿来一只戒指、一条绳和一个卢布，做集体游戏。……不论是做戒指、绳子或者卢布的游戏，还是像现在这样谈话，尼古拉都不离索尼娅的身边。"
  网络来源: "https://yunshuwu.cn/chap/8611.html"

- 名词: "圣诞化装活动"
  分类: "习俗"
  解释: "圣诞化装活动（ряженые / Святки）是俄国从圣诞节（1月7日）到主显节（1月19日）期间的传统习俗。人们装扮成各种角色挨家挨户拜访、跳舞、游戏。这一传统可追溯到古斯拉夫异教时期，最初人们戴动物面具（山羊、牛、马）进行表演，后来发展为更丰富的角色扮演。东正教传入后，这一习俗与圣诞节相融合延续至今。"
  书中原文: "骠骑兵、老太太、巫婆、小丑、狗熊，在前厅清清嗓子，擦掉脸上冻结的霜，然后进入人们急忙点起蜡烛的大厅。……在跳过俄罗斯民间舞和环舞之后，佩拉格娅·丹尼洛夫娜叫全体家奴和主人在一起拉一个大圆圈；叫人拿来一只戒指、一条绳和一个卢布，做集体游戏。"
  网络来源: "http://tsrus.cn/wenhua/2024/01/03/678953"

- 名词: "少女圣诞占卜"
  分类: "习俗"
  解释: "少女圣诞占卜是俄国圣诞节节期（Святки）的重要传统习俗，源自多神教时代。占卜方式多样：镜卜（看未来丈夫面容）、仓库听音（听吉凶预兆）、澡堂设宴（召鬼魂）、扔靴子（定方向）、融蜡（看形状）、烧线（比谁先嫁）、问名字等。核心规则：午夜进行、散头发、去首饰、不系腰带、只用烛光。这些习俗至今在俄罗斯乡村仍有流传。"
  书中原文: "索尼娅穿过走廊向仓库走去。……娜塔莎在索尼娅和使女帮助下，把镜子摆好；她面孔的表情严肃起来，不再说话了。她长久地坐在那儿望着两面镜子里一串渐渐远去的蜡烛……「为什么别人能看见，我什么也看不见？」她说。"
  网络来源: "https://ru.hujiang.com/new/p299477/"

- 名词: "乘雪橇访友"
  分类: "习俗"
  解释: "乘雪橇访友是俄国冬季贵族社交的重要方式。冬季道路被冰雪覆盖，雪橇比马车更平稳快捷。贵族们在冬季从庄园乘雪橇到邻近庄园拜访聚会，车内铺熊皮毯保暖。雪橇的豪华程度直接彰显主人的社会地位。圣诞节期间是访友社交的高峰期，贵族家庭频繁往来，举办舞会宴会直到四旬斋前。"
  书中原文: "从佩拉格娅·丹尼洛夫娜那儿回来时，一向眼尖，对什么都留心的娜塔莎，把坐位作了一番安排：路易莎·伊万诺夫娜和她，还有季姆勒，坐一只雪橇，索尼娅同尼古拉以及女仆们坐在一起。在回去的路上，尼古拉已经不再拼命赶马，而是平稳地行驶了。"
  网络来源: "http://tsrus.cn/lishi/2024/12/17/681997"
