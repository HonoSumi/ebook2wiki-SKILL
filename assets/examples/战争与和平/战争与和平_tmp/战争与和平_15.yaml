- 名词: 别祖霍夫伯爵
  分类: 人物
  解释: |
    基里尔·弗拉季米罗维奇·别祖霍夫伯爵，是《战争与和平》中四大贵族家族之一别祖霍夫家族的家长。他是叶卡捷琳娜女皇时代的重臣，拥有巨额财富，在上流社会极有威信。他生前风流倜傥，有多名私生子，主人公皮埃尔·别祖霍夫便是其一。在小说第一部中，老伯爵病危，引发了一场围绕遗嘱和遗产的激烈争夺。最终他将全部财产和爵位留给了私生子皮埃尔，不久后病逝。
  书中原文: |
    他的头，前额和颧骨特别宽大，一张嘴秀美而肉感，眼神严峻而冰冷，这一切并不因将要死亡而变样，跟三个月前伯爵准许皮埃尔去彼得堡时，完全一样。
  网络来源: |
    https://www.zhihu.com/question/442616727/answer/1712387397

- 名词: 安娜·米哈伊洛夫娜
  分类: 人物
  解释: |
    安娜·米哈伊洛夫娜·德鲁别茨卡娅公爵夫人，是《战争与和平》中的重要配角。她出身没落贵族，是一名寡妇，与罗斯托夫伯爵家关系密切，长期寄居在罗斯托夫家。她为人精明强干、善于钻营，最大的特点是"为母则刚"——为独子鲍里斯的前程不惜放下所有尊严、四处奔走托关系。在老别祖霍夫伯爵病危之际，她积极参与遗产争夺，保护了遗嘱，确保皮埃尔继承遗产，后来也借此为鲍里斯谋得了照顾。
  书中原文: |
    安娜·米哈伊洛夫娜跳过去，又挡住她的去路……安娜·米哈伊洛夫娜立即弯下腰，捡起那件被大家争夺的东西，就往卧室里跑。
  网络来源: |
    https://www.thepaper.cn/newsDetail_forward_6556999

- 名词: 瓦西里公爵
  分类: 人物
  解释: |
    瓦西里·谢尔盖耶维奇·库拉金公爵，是《战争与和平》中四大贵族家族之一库拉金家族的家长。他是彼得堡上流社会的重要人物，经常出入宫廷和社交沙龙。他贪婪、虚伪、自私、精于算计，是托尔斯泰笔下贵族阶层堕落与虚伪的典型代表。在别祖霍夫伯爵病危时，他表面关心实则觊觎财产，一度与侄女卡季什联手企图阻止私生子皮埃尔继承遗产。遗产落空后，他又将女儿海伦嫁给皮埃尔以间接获取财富。
  书中原文: |
    瓦西里公爵摇摇晃晃地走到皮埃尔坐的沙发前，一只手捂着眼睛，倒在沙发上。皮埃尔看见他的脸发白，下巴颏抖动着，像发疟疾似的。
  网络来源: |
    https://www.vrrw.net/hstj/9003.html

- 名词: 卡季什
  分类: 人物
  解释: |
    卡季什是卡捷琳娜·谢苗诺夫娜·马蒙托娃公爵小姐的法语昵称（Catiche），她是老别祖霍夫伯爵的侄女，也是皮埃尔·别祖霍夫的表妹。在小说第一部中，她是遗产争夺战中的关键反面角色：作为老伯爵的侄女，她本被视为直系继承人之一，但老伯爵却立遗嘱将全部遗产留给私生子皮埃尔。她与瓦西里公爵联手，企图销毁遗嘱，但被安娜·米哈伊洛夫娜阻止。她性格凶恶、易怒，争夺失败后对皮埃尔满怀愤恨。
  书中原文: |
    "可恶的女人！"大公爵小姐喊道，突然向安娜·米哈伊洛夫娜扑过去，抢那个公事包。……她一见皮埃尔，脸上就露出不可遏止的愤恨。"好哇，您现在高兴了，"她说，"您正希望有这一天呢。"
  网络来源: |
    https://www.douban.com/note/782879971/

- 名词: 鲍里斯
  分类: 人物
  解释: |
    鲍里斯·德鲁别茨科伊，是德鲁别茨卡娅公爵夫人安娜·米哈伊洛夫娜的独子，在《战争与和平》中与皮埃尔、安德烈、尼古拉并列为重要青年人物。他幼年在罗斯托夫家长大，后在其母的钻营下调入谢苗诺夫团近卫队担任准尉。他精明世故、善于钻营，有着强烈的向上爬的欲望，在蒂尔西特和约期间设法陪同两位皇帝会面，在拿破仑面前灵活改口称其为"皇帝拿破仑"，从而获得赏识。他后来娶了富家女，跻身上层社会。
  书中原文: |
    "亲爱的，我以后也许会告诉您的，如果不是我在那儿，天晓得会发生什么事。您知道，叔父前两天答应过我照顾鲍里斯，但是他已经来不及了。我的朋友，我希望您来完成父亲的心愿。"
  网络来源: |
    https://book.douban.com/annotation/141505903/

- 名词: 罗斯托夫家
  分类: 人物
  解释: |
    罗斯托夫家族是《战争与和平》中的四大贵族家族之一，与博尔孔斯基家族、别祖霍夫家族、库拉金家族并列。家长是伊利亚·安德烈耶维奇伯爵，妻子是纳塔利娅·罗斯托娃伯爵夫人。子女包括长女薇拉、长子尼古拉、次女娜塔莎（全书的标志性女主角）、幼子彼佳。另有寄养的外甥女索尼娅。家族住在莫斯科波瓦尔大街，待人热情好客，性格淳朴善良、重情重义，与库拉金家族的虚伪堕落形成鲜明对比。家族经历了俄法战争、莫斯科大火、幼子战死、家道中落等磨难，最终尼古拉与玛丽亚公爵小姐结婚挽救了家族经济。
  书中原文: |
    安娜·米哈伊洛夫娜和皮埃尔谈过话，就坐车回罗斯托夫家安歇去了。次日早晨醒来，她对罗斯托夫家里的人和所有认识的人详详细细讲述了别祖霍夫伯爵去世的经过。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 临终圣礼
  分类: 习俗
  解释: |
    临终圣礼又称病人傅油圣事（旧称终傅），是东正教七件圣礼之一。在东正教传统中，神父将祝圣过的橄榄油涂抹在病人的额头、五官、手脚等处，同时诵念祈祷经文，求主赦免病人经由感官所犯的罪过，赐予属灵的安慰。它通常与告解礼和圣体血一同施行，使病人在灵魂上做好准备面对死亡。在《战争与和平》中，老别祖霍夫伯爵临终前领受了这一圣礼，文中的"做了这样隆重的圣礼"即指此仪式。
  书中原文: |
    唱诗声停止了，只听见一位神父恭恭敬敬地祝贺病人领了圣礼。……"但是，我的公爵，"安娜·米哈伊洛夫娜说，"在做了这样隆重的圣礼之后，让他安静一会儿吧。"
  网络来源: |
    https://baike.baidu.com/item/%E7%97%85%E4%BA%BA%E5%82%85%E6%B2%B9%E5%9C%A3%E4%BA%8B
