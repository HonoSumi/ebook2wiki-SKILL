- 名词: 奥普战争
  分类: 事件
  解释: |
    1866年普鲁士与奥地利之间的战争，又称普奥战争。托尔斯泰在《战争与和平》尾声中以此为例说明自由意志与必然性的关系，指出时人认为是俾斯麦的狡狯所致，但随着时间推移必然性法则愈加明显。托尔斯泰于奥普战争同年（1866年）撰写此书。
  书中原文: |
    "我们觉得，奥普战争[16]无疑是俾斯麦的诡诈以及其他诸如此类的事产生的后果。"
  网络来源: |
    http://bcc.blcu.edu.cn/show/700972505_15_15_73_75/4
    https://read.lmeee.com/reader/b8jn63/2b8ftb8

- 名词: 十字军
  分类: 事件
  解释: |
    11至13世纪西欧天主教国家对地中海东岸发起的系列宗教战争。托尔斯泰以其为例论证历史哲学：对于遥远的历史事件，人们不再认为是个别人意志的产物，而是看到必然性法则。十字军在欧洲编年史家笔下曾被视为某些人意志的产物，但后代观察者已认识到其历史必然性。
  书中原文: |
    "我们已经把十字军看作占有确定位置的事件，没有这个事件，欧洲的近代史就不可想象，虽然在十字军的编年史家看来，这个事件不过是某些人的意志的产物。"
  网络来源: |
    https://book.douban.com/people/hilaryzx/annotation/25973245/
    https://www.guxuo.com/wgwx/ZPJ/test/zzyh/358.htm

- 名词: 阿提拉
  分类: 人物
  解释: |
    匈奴王（约406-453年），曾率游牧民族大举入侵欧洲，被称为"上帝之鞭"。托尔斯泰在《战争与和平》中以阿提拉为例论证历史哲学：关于各民族的迁徙，已无人认为欧洲的复兴取决于阿提拉的任意作为，历史对象越远，造成事件之人的自由意志就越可疑。
  书中原文: |
    "至于各民族的迁徙，今天已经没有人会认为欧洲的复兴决定于阿提拉[17]的任意作为。我们所观察的历史对象越远，造成事件的那些人的自由意志就越可疑，必然性的法则也就越明显。"
  网络来源: |
    https://www.zhihu.com/question/442616727/answer/1712387397
    https://www.meipian.cn/5k90xxkr

- 名词: 野蛮人入侵
  分类: 事件
  解释: |
    古代游牧民族对欧洲文明地区的大规模入侵，主要指公元4至6世纪民族大迁徙时期。托尔斯泰在《战争与和平》中将民族迁徙和野蛮人入侵并提，作为论证自由与必然性关系的宏观历史案例：从长远视角看，人们越来越倾向于将这些事件视为必然性法则的产物。
  书中原文: |
    "不论我们所谈的是民族的迁徙和野蛮人的入侵，还是拿破仑三世的命令，还是某一个人一小时前从几个方向中选出一个散步的方向的行动，我们都看不出丝毫的矛盾。"
  网络来源: |
    https://www.guxuo.com/wgwx/ZPJ/test/zzyh/358.htm
    https://book.douban.com/people/hilaryzx/annotation/25973245/

- 名词: 无责任能力
  分类: 概念
  解释: |
    刑法学术语，指行为人因未达刑事责任年龄（不满14周岁）或精神障碍（不能辨认或控制自己行为）而不具有刑事责任能力。托尔斯泰在《战争与和平》中指出，一切法典所承认的无责任能力和减罪情形建立在三类根据之上：人与外部世界的关系、时间距离、对行为原因的了解程度。
  书中原文: |
    "一切法典所承认的无责任能力和减罪的情形，就完全建立在这三点根据上面。责任的大小，要看我们对受审查的那个人所处的环境认识的多少，要看完成那行为和进行审查相距多少时间，还要看我们对行为的原因了解的程度。"
  网络来源: |
    https://www.guozunlaw.com/news-27594.html
    https://article.chinalawinfo.com/Space/SpaceArticleDetail.aspx?AID=124211

- 名词: 减罪情形
  分类: 概念
  解释: |
    刑法中减轻或免除刑事责任的各种法定情形。托尔斯泰在《战争与和平》哲学论述中以此为例说明对行为原因的了解越深入，必然性成分越大，自由意志成分越小。法典中的责任能力认定，取决于环境认识多少、时间距离长短、原因了解程度。
  书中原文: |
    "一切法典所承认的无责任能力和减罪的情形，就完全建立在这三点根据上面。责任的大小，要看我们对受审查的那个人所处的环境认识的多少，要看完成那行为和进行审查相距多少时间，还要看我们对行为的原因了解的程度。"
  网络来源: |
    http://zzzy.hunancourt.gov.cn/article/detail/2016/11/id/2351468.shtml
    http://www.xjchangji.jcy.gov.cn/jwgk/202011/t20201118_3040981.shtml

- 名词: 三类根据
  分类: 概念
  解释: |
    托尔斯泰在《战争与和平》中提出的影响自由与必然性观念增减的三个维度：(一)人与外部世界的关系（空间维度），(二)人与时间的关系（时间维度），(三)人与引起行动的原因的关系（因果维度）。自由与必然性观念的增减取决于此三类根据。
  书中原文: |
    "我们关于自由和必然性观念的增减，一无例外地取决以下三类根据：一、完成行为的人与外部世界的关系，二、他与时间的关系，三、他与引起行动的原因的关系。"
  网络来源: |
    https://pages.haomooc.com/index.php?s=book&c=extend&id=9756
    https://www.douban.com/note/864969071/

- 名词: 反比例关系
  分类: 概念
  解释: |
    托尔斯泰提出的自由与必然性的关系法则：在任何行动中自由越多必然性就越少，必然性越多自由就越少，两者的关系总是成反比。自由与必然性孰多孰少取决于考察行动时所持的观点，但两者的反比例关系恒定不变。
  书中原文: |
    "自由比必然性是多还是少，这要看在考察行动时所用的观点而定；但是两者的关系总是反比例的关系。"
  网络来源: |
    https://williamlong.info/xiaoshuo/archives/143.html
    https://book.douban.com/review/9055678/

- 名词: 空间上的自由
  分类: 概念
  解释: |
    托尔斯泰论证的一个哲学命题：人永远无法获得空间上自由的观念。人的任何行动都受周围环境和自身身体的制约（如举臂只能向障碍最少的方向）。要想象一个人完全自由，就必须想象他超出空间以外，而这不可能。
  书中原文: |
    "不论我们怎样想象一个人如何不受外部世界的影响，我们永远得不到在空间上自由的概念。人的任何一个行动都不可避免地受他自己的身体和他周围的事物的制约。"
  网络来源: |
    https://en.wikisource.org/wiki/War_and_Peace_(Tolstoy)/Second_Epilogue/Chapter_10
    https://williamlong.info/xiaoshuo/archives/141.html

- 名词: 时间上的自由
  分类: 概念
  解释: |
    托尔斯泰论证的哲学命题：无论怎样缩短判断与行动之间的时间距离，也无法获得时间上自由的观念。因为时间一去不复返，在过去的那一时刻只能做一个动作。要想象行动是自由的，就必须把它想象成超出时间以外，这是不可能的。
  书中原文: |
    "不论我们使判断的时间怎样接近行动的时间，我们仍然得不到时间上的自由概念。因为，假如我考察一秒钟以前完成的一种行为，我仍然认为那行为是不自由的，因为它是与完成它的那时刻分不开的。"
  网络来源: |
    https://en.wikisource.org/wiki/War_and_Peace_(Tolstoy)/Second_Epilogue/Chapter_10
    https://pages.haomooc.com/index.php?s=book&c=extend&id=9756

- 名词: 完全自由
  分类: 概念
  解释: |
    托尔斯泰认为完全自由不可想象。要设想完全自由，必须把人想象成不受外部世界影响、超出时间以外、与任何原因无关的存在。完全自由需要三个不可能条件：超越空间、超越时间、无原因。满足这些条件的存在已经不是人了。
  书中原文: |
    "即使设想一个完全不受一切影响的人，只考察他现在这一瞬间的行动，假定他这行动不是由任何原因引起的，认为必然性的残余小得等于零，我们也得不出人有完全自由的概念，因为不受外部世界的影响、超出时间以外，与原因毫无关系的生物，已经不能算是人了。"
  网络来源: |
    https://en.wikisource.org/wiki/War_and_Peace_(Tolstoy)/Second_Epilogue/Chapter_10
    https://book.douban.com/review/9055678/

- 名词: 完全必然性
  分类: 概念
  解释: |
    托尔斯泰认为完全必然性同样不可想象：空间条件无穷无尽永无法穷尽，时间期限有限而时间无限，因果锁链无穷无尽。要得出完全必然性必须知道无限的空间条件、无限长的时间和全部原因，这是不可能的。完全的必然性同样否定了人的概念。
  书中原文: |
    "一、不论我们怎样增加我们对于人所处的空间的条件的知识，这种知识永远是无穷尽的……因此，既然不能确定所有的条件，不能确定人所受到的一切影响，那就不会有完全的必然性……二、不论我们怎样延长我们考察的现象和判断那现象之间的期限，而这期限是有限的，时间是无限的，因此，在这方面也决不会有完全的必然性。三、不论行动的原因这条锁链怎样容易了解，我们也永远不会了解全部的锁链，因为它是无穷无尽的。"
  网络来源: |
    https://en.wikisource.org/wiki/War_and_Peace_(Tolstoy)/Second_Epilogue/Chapter_10
    https://book.douban.com/review/9055678/

- 名词: 无穷因果关系
  分类: 概念
  解释: |
    托尔斯泰论述的因果观：因果锁链是无穷无尽的，人的每一行动既是以往现象的结果又是以后现象的原因。理性的第一要求是假设和探求原因。历史应放弃原因的概念转向寻求法则，如同天文学从托勒密体系发展到牛顿体系，历史学也应从追问原因转向发现规律。
  书中原文: |
    "理性所必然要求的无穷无尽的因果关系，而且为我们所理解的每一现象（因而是人的每一个行动），作为以往现象的结果和以后现象的原因，应当有它确定的地位。"
  网络来源: |
    https://williamlong.info/xiaoshuo/archives/141.html
    https://book.douban.com/annotation/91078532/

- 名词: 必然与自由
  分类: 概念
  解释: |
    托尔斯泰《战争与和平》尾声的核心哲学命题。自由是内容，必然是形式，两者结合才能得出关于人类生活的明确概念。自由是生命的本质，必然是理性的法则。历史研究的任务是把已知的称为必然性法则，把未知的称为自由意志。这一思想构成托尔斯泰反英雄史观的理论基础。
  书中原文: |
    "我们总是把这种活动理解为部分人的自由意志和部分必然性法则的产物。"
  网络来源: |
    https://www.douban.com/note/864969071/
    https://www.sg.pku.edu.cn/wzsy/xyxw/1325803.htm
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html
