- 名词: 舍瓦尔金诺土岗
  分类: 地点
  解释: 位于波罗金诺战场西南部的一座五角形防御多面堡（棱堡），1812年9月5日（俄历8月24日）法俄两军在此发生前哨战，俄军损失约5000人后放弃该堡，但赢得了构筑主阵地工事的时间。
  书中原文: 他连忙离开战场，回到了舍瓦尔金诺土岗。他坐在折椅上，脸姜黄而且浮肿，心情沉重，眼睛混浊，鼻子通红，声音沙哑，他不由得耷拉着眼皮，倾听射击的声音。
  网络来源: 舍瓦尔金诺土岗是波罗金诺战役的前哨阵地，俄军在此阻击法军达一天之久，为主阵地争取了防御准备时间。

- 名词: 鞑靼人
  分类: 概念
  解释: 俄罗斯联邦人口最多的少数民族，主要分布在伏尔加河流域的鞑靼斯坦共和国，属突厥语族，多信仰伊斯兰教逊尼派，在19世纪的沙俄军队中常见鞑靼人参军。
  书中原文: 最近的台子上坐着一个鞑靼人，从扔在旁边的制服看来，大概是一个哥萨克。四个士兵扶着他。一个戴眼镜的医生正在肌肉发达的栗色背脊上切除什么东西。
  网络来源: 鞑靼人是俄罗斯最大的少数民族，人口约650万，在沙俄时期常被征召入伍，在1812年卫国战争中许多鞑靼人作为哥萨克骑兵参战。

- 名词: 神圣同盟
  分类: 事件
  解释: 1815年9月26日由俄国沙皇亚历山大一世发起，俄国、奥地利、普鲁士三国在巴黎签署的同盟条约，宣称以基督教教义为治国准则，旨在维护维也纳会议建立的封建统治秩序，镇压欧洲革命运动。
  书中原文: 在这些大问题都得到满意解决，到处都安定下来之后，我也就有我的国会和我的神圣同盟了。这些理想是他们从我这里窃取的。
  网络来源: 神圣同盟是拿破仑战败后欧洲封建君主结成的反革命联盟，由俄皇亚历山大一世倡议，奥皇弗兰茨一世和普王腓特烈·威廉三世签署，后被梅特涅实际操纵。

- 名词: 卡利什
  分类: 地点
  解释: 波兰最古老的城市之一，位于波兰中部大波兰省，1793年瓜分波兰后被普鲁士吞并，1806年拿破仑击败普鲁士后将其划入华沙公国，1813年普俄在此签订反拿破仑的卡利什条约。
  书中原文: 在抵达维尔纳的时候，它只剩五万人了，到了卡利什，就不到一万八千人了。
  网络来源: 卡利什是波兰历史名城，1813年2月13日俄军在此击败法军残部，同年2月28日普鲁士与俄国签订卡利什条约，标志着第六次反法同盟正式形成。

- 名词: 克尼亚济科沃
  分类: 地点
  解释: 波罗金诺战场附近的一个村庄或地点，法军在此部署炮兵对俄军阵地进行火力打击，是波罗金诺战役中的战术位置之一。
  书中原文: 当他在谢苗诺夫斯科耶高地时，炮兵司令向他建议，调几个炮兵连到这些高地上，对聚在克尼亚济科沃前面的俄国军队加强火力。
  网络来源: 克尼亚济科沃是波罗金诺战役中法军炮兵阵地的重要参照地点，法军在此集中炮火轰击俄军防线。

- 名词: 达维多夫老爷
  分类: 人物
  解释: 波罗金诺战场土地的所有者，托尔斯泰以此指代当地的俄国贵族地主，其田地和农奴的草地在波罗金诺战役中被用作战场。
  书中原文: 几万名死人，以各种姿势，穿着各种服装，躺在属于达维多夫老爷家和皇室农奴的田地和草地上。
  网络来源: 达维多夫是俄国常见的姓氏，此处指代当地贵族地主。值得注意的是，历史中的杰尼斯·达维多夫是1812年战争中的著名游击战英雄，是托尔斯泰笔下杰尼索夫的原型。

- 名词: 巴伐利亚人
  分类: 概念
  解释: 德意志民族的重要分支之一，源自古老的日耳曼部族，1806年拿破仑将其升格为巴伐利亚王国，在1812年侵俄战争中巴伐利亚作为拿破仑的莱茵邦联成员出兵参加了对俄远征。
  书中原文: 渡过维斯杜拉河的四十万人中，有一半是奥地利人、普鲁士人、撒克逊人、波兰人、巴伐利亚人、符腾堡人、梅克伦堡人、西班牙人、意大利人和那不勒斯人。
  网络来源: 巴伐利亚在拿破仑战争期间是莱茵邦联成员，被迫向拿破仑提供军队，在1812年侵俄战争中损失惨重，约三万巴伐利亚士兵仅有数千人幸存。

- 名词: 符腾堡人
  分类: 概念
  解释: 德意志民族中士瓦本（施瓦本）人的一支，来自德国西南部的符腾堡地区，1806年拿破仑将其升格为符腾堡王国，在1812年侵俄战争中作为拿破仑的盟友派兵参战。
  书中原文: 渡过维斯杜拉河的四十万人中，有一半是奥地利人、普鲁士人、撒克逊人、波兰人、巴伐利亚人、符腾堡人、梅克伦堡人、西班牙人、意大利人和那不勒斯人。
  网络来源: 符腾堡在拿破仑时期加入莱茵邦联，其军队编入拿破仑的大军团参加了1812年对俄战争，在撤退中几乎全军覆没。

- 名词: 梅克伦堡人
  分类: 概念
  解释: 来自德国东北部梅克伦堡地区的德意志人，该地区历史上分为梅克伦堡-什未林和梅克伦堡-施特雷利茨两个公国，拿破仑时期加入莱茵邦联，参与了1812年侵俄战争。
  书中原文: 渡过维斯杜拉河的四十万人中，有一半是奥地利人、普鲁士人、撒克逊人、波兰人、巴伐利亚人、符腾堡人、梅克伦堡人、西班牙人、意大利人和那不勒斯人。
  网络来源: 梅克伦堡两公国于1808年加入莱茵邦联，在拿破仑征俄战争中提供了约数千人的辅助部队，后来在1813年率先退出莱茵邦联转向反法同盟。

- 名词: 皮德蒙特人
  分类: 概念
  解释: 意大利皮埃蒙特地区的居民，皮埃蒙特位于意大利西北部，以都灵为中心，在拿破仑时期被法国吞并，其士兵被征入拿破仑的帝国军队参加了对俄远征。
  书中原文: 实在说来，在帝国军队里，有三分之一的荷兰人、比利时人、莱茵河两岸的居民、皮德蒙特人、瑞士人、日内瓦人、托斯卡纳人、罗马人、三十二师以及不来梅和汉堡等地的人。
  网络来源: 皮埃蒙特在1798年被拿破仑法军占领，1802年被正式并入法国，其居民被征入法军参加各次战役，包括1812年的侵俄战争。

- 名词: 托斯卡纳人
  分类: 概念
  解释: 意大利托斯卡纳地区的居民，托斯卡纳首府为文艺复兴重镇佛罗伦萨，1807年被拿破仑控制并入法兰西帝国，其士兵被编入法军参加了1812年对俄远征。
  书中原文: 实在说来，在帝国军队里，有三分之一的荷兰人、比利时人、莱茵河两岸的居民、皮德蒙特人、瑞士人、日内瓦人、托斯卡纳人、罗马人、三十二师以及不来梅和汉堡等地的人。
  网络来源: 托斯卡纳大公国原为奥地利哈布斯堡家族控制，1807年被拿破仑征服，后并入法兰西帝国，其军队被编入拿破仑的大军团参加侵俄战争。

- 名词: 日内瓦人
  分类: 概念
  解释: 瑞士日内瓦的居民，日内瓦原为独立的城市共和国，1798年被拿破仑法军吞并入法国，1815年维也纳会议后加入瑞士联邦，成为瑞士的第22个州。
  书中原文: 实在说来，在帝国军队里，有三分之一的荷兰人、比利时人、莱茵河两岸的居民、皮德蒙特人、瑞士人、日内瓦人、托斯卡纳人、罗马人、三十二师以及不来梅和汉堡等地的人。
  网络来源: 日内瓦共和国在1798年被拿破仑吞并，日内瓦男子被征入法军，参加了1812年侵俄战争，战后日内瓦于1815年加入瑞士联邦，并促成了瑞士永久中立地位的确立。

- 名词: 不来梅
  分类: 地点
  解释: 德国北部威悉河畔的港口城市，历史上为汉萨同盟核心成员，全称"自由汉萨城市不来梅"，1811年被拿破仑吞并入法兰西帝国，1815年维也纳会议后恢复独立城市地位。
  书中原文: 实在说来，在帝国军队里，有三分之一的荷兰人、比利时人、莱茵河两岸的居民、皮德蒙特人、瑞士人、日内瓦人、托斯卡纳人、罗马人、三十二师以及不来梅和汉堡等地的人。
  网络来源: 不来梅是德国最小的联邦州（城市州），拿破仑时期被并入法国，其实行的大陆封锁政策严重打击了不来梅的海外贸易。

- 名词: 汉堡
  分类: 地点
  解释: 德国北部易北河畔的最大港口城市，全称"汉堡汉萨自由市"，历史上是汉萨同盟的核心成员，1810年被拿破仑吞并入法兰西帝国，大陆封锁政策使其贸易遭受毁灭性打击。
  书中原文: 实在说来，在帝国军队里，有三分之一的荷兰人、比利时人、莱茵河两岸的居民、皮德蒙特人、瑞士人、日内瓦人、托斯卡纳人、罗马人、三十二师以及不来梅和汉堡等地的人。
  网络来源: 汉堡是德国最重要的港口城市和联邦州，拿破仑占领时期（1806-1814）实行大陆封锁政策禁止对英贸易，使汉堡经济遭受重创。1815年维也纳会议后恢复独立地位。
