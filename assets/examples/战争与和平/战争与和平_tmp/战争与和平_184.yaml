- 名词: 梅季希
  分类: 地点
  解释: |
    梅季希（Мытищи / Mytishchi）是俄罗斯莫斯科州的一座城市，位于莫斯科东北约19公里处的亚乌扎河畔。该城建城于15世纪，18世纪叶卡捷琳娜二世在此修建了俄罗斯第一条供水系统向克里姆林宫送水，1925年正式设市。在《战争与和平》中，安德烈公爵在波罗底诺战役负伤后曾辗转经过梅季希，娜塔莎在此地照料过他。托尔斯泰以梅季希作为娜塔莎追忆安德烈临终时光的重要地点。
  书中原文: |
    她又看见他在梅季希、在特罗伊茨、在雅罗斯拉夫尔时候的样子。
  网络来源: |
    https://baike.baidu.com/item/%E6%A2%85%E5%AD%A3%E5%B8%8C/3626361
- 名词: 卡拉巴赫
  分类: 地点
  解释: |
    卡拉巴赫（Qarabağ / Karabakh）是南高加索的一个地理和历史区域，位于今阿塞拜疆境内。名称源自突厥语和波斯语，意为"黑色的花园"。该地区以山地地形为主，自古以出产优质马匹闻名。卡拉巴赫马是当地古老马种，以金栗色毛皮、速度和耐力著称。在《战争与和平》中，书中脚注说明"卡拉巴赫是阿塞拜疆的一个地区，以产名马著称"，呼应了彼佳·罗斯托夫将自己的乌克兰种马亲昵称为"卡拉巴赫马"这一细节，反映了当时俄国贵族对高加索名马的推崇。
  书中原文: |
    卡拉巴赫是阿塞拜疆的一个地区，以产名马著称。
  网络来源: |
    https://baike.baidu.com/item/%E7%BA%B3%E6%88%88%E5%B0%94%E8%AF%BA-%E5%8D%A1%E6%8B%89%E5%B7%B4%E8%B5%AB
- 名词: 人民战争
  分类: 概念
  解释: |
    人民战争是托尔斯泰在《战争与和平》中提出的核心历史哲学概念。托尔斯泰认为，1812年俄法战争的真正决定性力量并非将军们的战略计划，而是千百万俄国人民自发的抵抗意志。他提出著名的"人民战争的巨棒"意象，形容这种力量"不考虑任何人的兴趣和规则"，自发而不可抗拒地打击侵略者。托尔斯泰借此否定"英雄史观"，强调人民群众才是历史的真正创造者，战争的胜负取决于士气与民心而非统帅决策。这一思想贯穿了小说的第四卷和尾声部分。
  书中原文: |
    人民的目的只有一个：把侵略者从自己的国土上清除出去。这个目的达到了……第二，这个目的的达到，是靠消灭敌人的人民战争
  网络来源: |
    https://paper.cntheory.com/html/2022-05/16/nw.D110000xxsb_20220516_1-A3.htm
