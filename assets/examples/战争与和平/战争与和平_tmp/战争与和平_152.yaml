- 名词: 伊格纳特
  分类: 人物
  解释: 罗斯托夫伯爵家的男仆，一个年轻的小厮，在莫斯科撤退前夕被玛夫拉·库兹米尼什娜支使去为老爷爷烧茶。
  书中原文: 伊格纳特整了整腰带，收敛起笑容，恭顺地垂下眼睛，连忙走出去。
  网络来源: https://zh.wikipedia.org/zh-cn/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 雅乌兹桥
  分类: 地点
  解释: 莫斯科雅乌扎河（Yauza River）上的一座桥，位于莫斯科河入口上游附近。在1812年莫斯科撤退期间，一名前来投奔罗斯托夫伯爵的青年军官从此处跑过，前往追赶他的团队。
  书中原文: 那个军官仿佛在嘲笑自己，嘴角含笑直摇头，他在空空荡荡的大街上朝着雅乌兹桥几乎是跑着去追赶他的团队。
  网络来源: https://en.wikipedia.org/wiki/List_of_bridges_in_Moscow

- 名词: 瓦尔瓦尔卡大街
  分类: 地点
  解释: 莫斯科最古老的街道之一，位于基泰戈罗德（Kitai-gorod）地区，紧邻克里姆林宫。街名来源于圣瓦尔瓦拉教堂。苏联时期曾更名为斯捷潘·拉辛街。在1812年，这条街上有一座未竣工的楼房，下层是酒馆，成为平民聚众喧闹的场所。
  书中原文: 在瓦尔瓦尔卡大街有一座未竣工的楼房，下层是酒馆，从那里传出醉汉的喊叫和歌声。
  网络来源: https://cn.wtcf.org.cn/destination/2014-07/29/c_31915.html

- 名词: 马罗谢卡街
  分类: 地点
  解释: 莫斯科中央行政区的一条古老街道，连接伊林斯基门广场与波克罗夫卡街。名称源于"小俄罗斯"（Malorossiya）的变体，因17世纪该街设有"小俄罗斯大院"而得名。在1812年，街角有一所挂着靴匠招牌的大房子。
  书中原文: 马罗谢卡街拐角，有一所挂着一块靴匠招牌、关着护窗板的大房子，对面站着二十几个穿工作服和破烂长外衣、面容消瘦而且疲倦的无精打采的靴匠。
  网络来源: https://all-andorra.com/maroseyka-street/

- 名词: 中国城
  分类: 地点
  解释: 又称"基泰戈罗德"（Kitai-gorod），莫斯科历史最悠久的街区之一，紧邻红场和克里姆林宫东北侧。名称与中国人无关，更可能源于古俄语"кита"（编织物/篱笆），指该地早期以木杆和泥土构筑的防御工事。16至20世纪是莫斯科最重要的商业金融中心。
  书中原文: 在中国城的城墙附近，有一小群人围着一个身穿厚呢大衣、手拿文件的人。
  网络来源: https://zh.wikipedia.org/wiki/%E4%B8%AD%E5%9C%8B%E5%9F%8E_(%E8%8E%AB%E6%96%AF%E7%A7%91)

- 名词: 卢比扬卡大街
  分类: 地点
  解释: 莫斯科中心城区的一条重要街道，连接卢比扬卡广场与斯列坚卡门广场。名称源于1480年伊凡三世安置诺夫哥罗德俘虏的居住区。1926至1990年曾名"捷尔任斯基街"。街上的卢比扬卡大楼先后为全俄保险公司、契卡、克格勃和联邦安全局（FSB）所在地，是政治镇压的象征。
  书中原文: 追赶警察局长的人群喧哗着向卢比扬卡大街跑去。
  网络来源: https://en.m.wikipedia.org/wiki/Great_Lubyanka_Street

- 名词: 罗戈日城门
  分类: 地点
  解释: 莫斯科东郊的历史区域和城门旧址，即罗戈日城门广场（Rogozhskaya Zastava），位于塔甘卡区。16世纪末作为莫斯科东郊的驿站车夫聚居地建立，因罗戈日（今诺金斯克）而得名。18世纪起成为东正教旧礼仪派的精神中心。在1812年，该城门是通往梁赞大路的出口之一。
  书中原文: 团队现在该到罗戈日城门了。
  网络来源: https://en.wikipedia.org/wiki/Ploshchad_Ilicha

- 名词: 烧毁货船
  分类: 事件
  解释: 1812年9月莫斯科撤退前夕，莫斯科总督拉斯托普钦伯爵下令烧毁停泊在莫斯科河上的货船，以免落入法军之手。警察局长被派往执行这一任务，他趁机捞取私利。这一行动是焦土政策的一部分，旨在断绝法军占领莫斯科后的物资补给。
  书中原文: 这位警察局长今天出行，是奉伯爵的指示前往烧毁货船的，他趁机捞了一把，这时钱正揣在他的腰包里。
  网络来源: https://www.britannica.com/biography/Fyodor-Vasilyevich-Graf-Rostopchin

- 名词: 八月三十一日告示
  分类: 事件
  解释: 1812年8月31日（儒略历）莫斯科总督拉斯托普钦伯爵发布的告示（传单），旨在号召莫斯科居民协助军队维持治安、消灭匪徒。告示以民间口语风格写成，包含"我要回来吃中饭，然后我们就干起来"等通俗措辞，在莫斯科即将沦陷前的紧张气氛中被当众宣读，但民众对其简单粗浅的措辞感到困惑。
  书中原文: 那个穿厚呢大衣的人在读八月三十一日的告示……"明天一早我就去见公爵阁下，"他读道，"和他商量，行动起来，协助军队消灭那些匪徒；我们也要把他们……消灭干净，叫那些不速之客都见鬼去吧；我要回来吃中饭，然后我们就干起来，一定要干，干到底，把匪徒消灭光。"
  网络来源: https://www.marxists.org/archive/tolstoy/1869/war-and-peace/book-11-chapter-5.html

- 名词: 二十五卢布钞票
  分类: 物件
  解释: 十九世纪初俄国流通的二十五卢布面额纸币，在当时是一笔不小的款项。在小说中，罗斯托夫家的女管家玛夫拉·库兹米尼什娜出于同情，将自己积攒的一张二十五卢布钞票赠予一名前来求助的青年军官，显示出普通俄国人在战争危难时刻的慷慨与善良。
  书中原文: 在离军官几步远的地方，她打开手帕，从里面拿出一张雪白的二十五卢布的钞票，匆匆地递给他。
  网络来源: https://zh.wikipedia.org/zh-cn/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 穿厚呢大衣的小职员
  分类: 人物
  解释: 1812年莫斯科撤退前夕在街头宣读拉斯托普钦伯爵告示的普通文职人员，身份低微。当他被群众围住要求宣读告示时有些窘迫，读到最后几句关于"回来吃中饭"的措辞时，他和听众都感到这样的官方语言过于简单粗浅，与民众激昂的情绪不相称。
  书中原文: 那个穿厚呢大衣的人在读八月三十一日的告示。人们围住他时，他有点窘，但是在挤到他跟前的高个儿小伙子的要求下，他开始读告示，声音有点发抖。
  网络来源: https://www.marxists.org/archive/tolstoy/1869/war-and-peace/book-11-chapter-5.html

- 名词: 高个儿小伙子
  分类: 人物
  解释: 1812年莫斯科撤退前夕在酒馆一带出现的一名平民青年领袖，淡黄色头发，穿青灰色长外衣。他带领工人们在酒馆饮酒作乐，卷入与铁匠的斗殴，随后又带领人群追赶酒馆老板，成为街头群众运动的鼓动者。托尔斯泰通过这一形象展示了战争前夕莫斯科底层民众的骚动与不安。
  书中原文: 其中有一个高个儿小伙子，淡黄色头发，穿一件干净的青灰色长外衣，高出众人之上地站在那儿。如果没有那紧闭着的不断活动的薄嘴唇和浑浊、阴沉、呆滞的眼睛，他那张生着秀气的笔直鼻梁的脸，本来算是漂亮的。
  网络来源: https://zh.wikipedia.org/zh-cn/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 警察局长
  分类: 人物
  解释: 1812年莫斯科撤退前夕负责执行拉斯托普钦伯爵命令的警官，被派往烧毁货船以防落入法军之手，趁机中饱私囊。在街头面对聚众骚乱的人群时，他以"伯爵会给你们指示"搪塞，随后惊慌逃离。托尔斯泰通过这一形象揭露了沙俄官僚在战争中的腐败和渎职。
  书中原文: 这位警察局长今天出行，是奉伯爵的指示前往烧毁货船的，他趁机捞了一把，这时钱正揣在他的腰包里。看见向他拥来的人群，他吩咐车夫停下来。
  网络来源: https://www.britannica.com/biography/Fyodor-Vasilyevich-Graf-Rostopchin
