- 名词: 拉斯托普钦传单
  分类: 物件
  解释: 1812年拿破仑大军逼近莫斯科时，莫斯科总督拉斯托普钦散发的宣传性传单，内容通俗诙谐，充满民间俚语，用以动员民众、鼓舞士气。传单上画有酒馆和小市民卡尔普什卡·奇吉林的形象，以粗话痛骂法国人，同时也发布关于撤离、武装民众等官方信息，在莫斯科被广泛传阅。
  书中原文: "拉斯托普钦散发一种传单，上方画着一个酒馆、一个酒保、一个莫斯科小市民卡尔普什卡·奇吉林"
  网络来源: https://www.marxists.org/archive/tolstoy/1869/war-and-peace/book-10-chapter-17.htm

- 名词: 卡尔普什卡·奇吉林
  分类: 人物
  解释: 拉斯托普钦传单中塑造的莫斯科小市民形象，一名后备兵，听说拿破仑要进攻莫斯科后，在酒馆借酒痛骂法国人，走到鹰形招牌下对民众发表讲话。这一形象代表了普通俄国百姓对法国入侵者的愤怒与蔑视，是战时爱国宣传的民间符号。
  书中原文: "一个莫斯科小市民卡尔普什卡·奇吉林（这个奇吉林曾当过后备兵，他多贪了几杯，听说波拿巴要进攻莫斯科，发起火来，用脏话痛骂所有的法国佬）"
  网络来源: https://www.marxists.org/archive/tolstoy/1869/war-and-peace/book-10-chapter-17.htm

- 名词: 瓦西里·利沃维奇·普希金
  分类: 人物
  解释: 俄国诗人（1766—1830），著名诗人亚历山大·普希金的伯父，被称为普希金的"诗父"。擅长轻诗歌和讽刺诗，代表作《危险的邻居》。他曾旅居巴黎，是狂热的藏书家，其藏书在1812年莫斯科大火中被焚毁。在莫斯科文学圈中以限韵诗闻名。
  书中原文: "这张传单跟瓦西里·利沃维奇·普希金的限韵诗一样被人们诵读和讨论。"
  网络来源: https://en.wikipedia.org/wiki/Vasily_Pushkin

- 名词: 列比赫
  分类: 人物
  解释: 弗朗茨·列比赫（Franz Leppich），德国发明家，约1775年生。1812年向沙皇亚历山大一世提出建造可控军用飞艇的方案，在莫斯科郊外沃罗佐沃村建造长57米的梨形大气球，设计搭载40名桨手驱动，从空中投掷炸弹轰炸法军。但因技术缺陷，气球仅能升空十余米，最终失败，项目耗资达25万卢布以上。
  书中原文: "一天，皮埃尔出门散散心，到沃罗佐沃村去看列比赫制造的用来消灭敌人的大气球"
  网络来源: https://en.topwar.ru/100279-bombovoz-dlya-kutuzova.html

- 名词: 沃罗佐沃村
  分类: 地点
  解释: 莫斯科郊外的村庄，距莫斯科约7公里。1812年德国发明家列比赫在这里秘密建造军用大气球，由莫斯科总督拉斯托普钦监督。皮埃尔曾在法军逼近莫斯科前专程前往查看气球的建造进展。这一地点在《战争与和平》中作为列比赫大气球项目的所在地出现。
  书中原文: "一天，皮埃尔出门散散心，到沃罗佐沃村去看列比赫制造的用来消灭敌人的大气球"
  网络来源: https://www.rbth.com/defence/2014/08/11/taking_war_into_the_skies_the_age_of_the_airship_38919.html

- 名词: 白采尔科维
  分类: 地点
  解释: 乌克兰基辅州城市，位于罗斯河畔，距基辅约80公里，意为"白色教堂"。始建于1032年。在1812年俄法战争期间，奥博连斯基的哥萨克部队驻扎于此进行整编。尼古拉·罗斯托夫的弟弟彼佳加入了这支部队，罗斯托夫一家因此留在莫斯科等待彼佳的消息。
  书中原文: "他参加了奥博连斯基的哥萨克部队，到白采尔科维去了。在那儿整编为团队。"
  网络来源: https://baike.baidu.com/item/%E7%99%BD%E9%87%87%E5%B0%94%E7%A7%91%E7%BB%B4

- 名词: 尼日尼(下诺夫哥罗德)
  分类: 地点
  解释: 俄罗斯城市，全名下诺夫哥罗德（Нижний Новгород），位于奥卡河与伏尔加河交汇处，意为"下游的新城"。1812年法军占领莫斯科期间，大量莫斯科贵族和文人逃往此处避难，成为战时文化中心。在小说中，拉斯托普钦用帆船将法国人和外国人经水路解送到此地。
  书中原文: "用帆船把外国人解送到尼日尼"
  网络来源: https://baike.baidu.com/item/%E4%B8%8B%E8%AF%BA%E5%A4%AB%E5%93%A5%E7%BD%97%E5%BE%B7

- 名词: 维特根施泰因伯爵
  分类: 人物
  解释: 彼得·赫里斯季安诺维奇·维特根施泰因（1769—1843），俄国伯爵、陆军元帅。1812年俄法战争中率第1步兵军负责保卫圣彼得堡的北线，在波洛茨克战役中击败法军元帅乌迪诺和圣西尔，阻止了法军向圣彼得堡的进军。库图佐夫去世后曾短暂担任俄军总司令。
  书中原文: "我们的大本营是在维亚济马，维特根施泰因伯爵打败了法国人"
  网络来源: https://en.wikipedia.org/wiki/Ludwig_Adolf_Peter_zu_Sayn-Wittgenstein

- 名词: 哈伦的船
  分类: 概念
  解释: 出自《一千零一夜》的典故，指阿拔斯王朝哈里发哈伦·拉希德（Harun al-Rashid）微服私访时在底格里斯河遇船的故事。拉斯托普钦遣送外国人时用了双关俏皮话，借用这个典故告诫外国人"当心别让船变成冥河渡船"，暗示此去可能一去不返，背景是哈伦故事中老翁的渡船引出假哈里发的秘密。
  书中原文: "当心别让它变成哈伦的船"
  网络来源: https://baike.baidu.com/item/%E5%93%88%E4%BC%A6%C2%B7%E6%8B%89%E5%B8%8C%E5%BE%B7

- 名词: 贞德
  分类: 人物
  解释: 圣女贞德（Jeanne d'Arc，1412—1431），法国民族英雄，百年战争期间带领法军对抗英军，后被俘被处以火刑。在小说中，朱莉用贞德自比，表示自己离开莫斯科并非因为勇敢无畏，不是像贞德那样的女英雄，解释了贵族们纷纷撤离莫斯科的普遍心态。
  书中原文: "我走是因为……因为大家都走，还因为我不是贞德，也不是亚马孙人。"
  网络来源: https://baike.baidu.com/item/%E8%B4%9E%E5%BE%B7

- 名词: 大气球
  分类: 物件
  解释: 指1812年德国发明家列比赫在莫斯科郊外为俄军建造的实验性军用飞艇，长57米，设计载40人投掷炸弹。这是人类早期航空史上最大的航空器之一，也是最早的半硬式飞艇。但因技术缺陷未能实战使用，法军逼近莫斯科后被疏散。小说中皮埃尔曾前往观看。
  书中原文: "一天，皮埃尔出门散散心，到沃罗佐沃村去看列比赫制造的用来消灭敌人的大气球"
  网络来源: https://www.rbth.com/defence/2014/08/11/taking_war_into_the_skies_the_age_of_the_airship_38919.html

- 名词: 捐献委员会
  分类: 物件
  解释: 1812年战争期间莫斯科设立的捐款收集机构。在朱莉的告别晚会上，社交圈规定只许说俄语，说法语者须缴纳罚款，罚款即交给捐献委员会作为战争捐款。这反映了当时莫斯科上流社会高涨的爱国情绪和抵制法国文化的风气。
  书中原文: "在朱莉的社交圈子里，也跟莫斯科许多社交圈子一样，规定只许说俄语，说法语要受罚，罚款交给捐献委员会。"
  网络来源: https://www.marxists.org/archive/tolstoy/1869/war-and-peace/book-10-chapter-17.htm

- 名词: 军火库
  分类: 物件
  解释: 1812年战争期间莫斯科的武器储备设施。拉斯托普钦在传单中宣布军火库为愿意武装的居民准备了军刀、手枪、长枪等武器，以廉价出售，号召莫斯科居民武装起来保卫城市。这一举措反映了战争危急时刻俄国官方动员民众参战的努力。
  书中原文: "军火库为他们准备了武器：军刀、手枪、长枪，这些武器将廉价卖给居民。"
  网络来源: https://www.marxists.org/archive/tolstoy/1869/war-and-peace/book-10-chapter-17.htm

- 名词: 牌阵
  分类: 习俗
  解释: 俄罗斯传统纸牌占卜方式，通过摆放纸牌并根据牌面组合来预测吉凶。小说中皮埃尔在是否参军的问题上犹豫不决，便用摆牌阵来自我决策：预先设定如果牌阵摆通就去参军。这种占卜行为体现了19世纪俄国贵族阶层中流行的占卜习俗和心理暗示。
  书中原文: "他从桌上拿起一副牌，开始摆起牌阵来。"
  网络来源: https://www.marxists.org/archive/tolstoy/1869/war-and-peace/book-10-chapter-17.htm

- 名词: 浪漫曲
  分类: 概念
  解释: 一种抒情声乐作品体裁，以诗歌为歌词，以钢琴或乐器伴奏，旋律优美、情感细腻。19世纪在俄国贵族阶层中非常流行。小说中朱莉提到娜塔莎在阿尔哈罗夫家唱了一支浪漫曲，暗示娜塔莎经历安德烈出走后情绪已经恢复。
  书中原文: "她唱了一支浪漫曲。"
  网络来源: https://baike.baidu.com/item/%E6%B5%AA%E6%BC%AB%E6%9B%B2

- 名词: 民军
  分类: 概念
  解释: 即ополчение，指1812年俄法战争中由非正规军人（农民、市民等）组成的临时武装力量。在小说中，身穿民军服装的年轻人在朱莉的晚会上出现，是莫斯科上流社会青年踊跃参军的缩影。民军在俄军撤退和反攻中发挥了重要的兵员补充和辅助作战作用。
  书中原文: "一个身穿民军服装的年轻人说，朱莉称他为'我的骑士'"
  网络来源: https://baike.baidu.com/item/%E4%BF%84%E6%B3%951812%E5%B9%B4%E6%88%98%E4%BA%89

- 名词: 鹰形招牌
  分类: 物件
  解释: 19世纪俄国酒馆（кабак）门外的标志性招牌，上面绘制双头鹰图案，象征沙皇俄国。拉斯托普钦传单中描述小市民卡尔普什卡·奇吉林在酒馆喝醉后，走出酒馆来到鹰形招牌下对聚集的民众发表抨击拿破仑的讲话。鹰形招牌是当时俄国街头的典型视觉符号。
  书中原文: "他走出酒馆，在鹰形的招牌下面，开始对聚在那儿的民众讲起话来"
  网络来源: https://www.marxists.org/archive/tolstoy/1869/war-and-peace/book-10-chapter-17.htm
