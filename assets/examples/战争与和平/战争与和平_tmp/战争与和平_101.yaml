- 名词: 赫沃斯季科夫
  分类: 人物
  解释: 列夫·托尔斯泰小说《战争与和平》中的极小配角。原为小官吏，后专门为多洛霍夫的赌局跑腿充当帮手。在阿纳托利·库拉金策划拐走娜塔莎·罗斯托娃的计划中，作为证婚人之一出现。
  书中原文: 两个证婚人坐在一进门的房间喝茶，——其中一个名叫赫沃斯季科夫。这个退职的小官吏是专为多洛霍夫的赌局跑腿的
  网络来源: https://yunshuwu.cn/chap/8629.html

- 名词: 马卡林
  分类: 人物
  解释: 列夫·托尔斯泰小说《战争与和平》中的小配角，退役骠骑兵，性格温和软弱，对阿纳托利·库拉金抱有无限的敬爱和盲目崇拜。在阿纳托利策划拐走娜塔莎的计划中作为证婚人之一出现，绰号"马卡尔卡"。
  书中原文: 另一个是退役的骠骑兵马卡林，这个和善而且软弱的人对库拉金抱有无限的敬爱。
  网络来源: https://yunshuwu.cn/chap/8629.html

- 名词: 卡缅卡村
  分类: 地点
  解释: 俄语Каменка，意为"石村"，是俄罗斯及东欧地区极为常见的地名。在《战争与和平》中，指离莫斯科约六十俄里的一个村庄，阿纳托利·库拉金计划在此处与被免职的司祭为他和娜塔莎举行秘密婚礼。
  书中原文: 把她拉到离莫斯科六十俄里的卡缅卡村，那里有一个被免职的司祭给他们举行婚礼
  网络来源: https://zh.wikipedia.org/zh-tw/%E5%8D%A1%E7%B7%AC%E5%8D%A1

- 名词: 华沙大路
  分类: 地点
  解释: 又称华沙公路（Варшавское шоссе），是19世纪沙俄时期连接莫斯科与华沙的重要战略道路。在铁路普及前，是俄罗斯帝国西部方向的主要陆路交通线之一，具有重要的军事和交通意义。《战争与和平》中阿纳托利计划经此路逃往国外。
  书中原文: 在卡缅卡村备有换乘的马匹，再把他们送到华沙大路，然后再乘驿车逃往国外。
  网络来源: https://en.wikipedia.org/wiki/Varshavskoye_Highway

- 名词: 驿马使用证
  分类: 物件
  解释: 俄语подорожная（podorozhnaya），帝俄时期铁路普及前，证明旅客有权在驿道上使用国家驿马站的马匹的官方旅行证件。证件上注明持有人姓名、路线和官阶，官阶高低决定可配给的马匹数量。
  书中原文: 阿纳托利有护照，有驿马使用证，有从他妹妹那儿拿来的一万卢布
  网络来源: https://zh.wiktionary.org/zh-hant/%D0%BF%D0%BE%D0%B4%D0%BE%D1%80%D0%BE%D0%B6%D0%BD%D0%B0%D1%8F

- 名词: 被免职的司祭
  分类: 概念
  解释: 指被东正教会正式剥夺神职身份的司祭，即被革除教籍或罢黜神职的神职人员。在《战争与和平》中，阿纳托利·库拉金找来的是一名被免职的司祭为他和娜塔莎的秘密婚礼主持仪式，反映出其计划的非法性和隐秘性。
  书中原文: 那里有一个被免职的司祭给他们举行婚礼，在卡缅卡村备有换乘的马匹
  网络来源: https://baike.baidu.com/item/%E5%BD%BC%E5%BE%97%E7%BD%97%E7%BB%B4%E5%A5%87%C2%B7%E9%98%BF%E7%93%A6%E5%BA%93%E5%A7%86/22883178
