- 名词: 玛丽亚·路易莎皇后
  分类: 人物
  解释: 奥地利公主，神圣罗马帝国皇帝弗朗茨二世之女，1810年嫁给拿破仑一世成为法兰西皇后。拿破仑为获取哈布斯堡家族的政治支持而与她联姻，她为拿破仑生下独子罗马王。在拿破仑战败后被盟军安排成为帕尔马公爵夫人。
  书中原文: 温情地拥抱玛丽亚·路易莎皇后，据他的历史学家说，她和他离别时，似乎依依不舍
  网络来源: 根据历史资料，玛丽亚·路易莎（1791–1847）为拿破仑的第二任妻子，1810年通过政治联姻与拿破仑成婚，生拿破仑二世。

- 名词: 贝蒂埃
  分类: 人物
  解释: 路易·亚历山大·贝蒂埃，法国元帅和拿破仑的参谋长，以卓越的组织和参谋能力著称。他自1796年意大利战役起担任拿破仑参谋长，负责军队调动、后勤和命令传达，对拿破仑军事体系至关重要。
  书中原文: 这位穿灰色常礼服的小个子站起来，唤来贝蒂埃，同他一起在河岸上来回踱步，给他发指示
  网络来源: 依据军事史记载，路易·亚历山大·贝蒂埃（1753–1815）是拿破仑最信任的参谋长，被封为纳沙泰尔亲王和瓦格拉姆亲王。

- 名词: 巴拉舍夫
  分类: 人物
  解释: 亚历山大·德米特里耶维奇·巴拉舍夫，俄国将军、亚历山大一世的亲信侍从武官，曾任彼得堡警察总监和陆军大臣。1812年拿破仑入侵前夕，他被皇帝派去给拿破仑送信，成为关键的外交信使。
  书中原文: 鲍里斯看见皇帝的亲信之一——侍从武官巴拉舍夫向皇帝走去，违背宫廷的礼法
  网络来源: 根据俄国历史记载，巴拉舍夫（1770–1837）在1812年战争中扮演重要角色，负责向拿破仑递交亚历山大一世的书信。

- 名词: 希什科夫
  分类: 人物
  解释: 亚历山大·谢苗诺维奇·希什科夫，俄国海军上将、国务秘书和保守派文学家。他以反对卡拉姆津的语言改革而闻名，1812年战争期间担任国务秘书，为亚历山大一世起草重要文告和军事命令。
  书中原文: 凌晨两点钟，派人召来秘书希什科夫，叫他给军队写一道命令，并给大元帅萨尔特科夫公爵下一道上谕
  网络来源: 根据俄国文学史和军事史记载，希什科夫（1754–1841）曾任俄国科学院院长，是俄国保守民族主义的重要代表。

- 名词: 萨尔特科夫公爵
  分类: 人物
  解释: 尼古拉·伊万诺维奇·萨尔特科夫，俄国陆军元帅，曾任陆军院院长和国务会议主席。他是保罗一世和亚历山大一世时期的元老重臣，在1812年战争期间名义上担任大元帅职务。
  书中原文: 给大元帅萨尔特科夫公爵下一道上谕，他要求在命令中一定把"只要有一个武装的法国人留在俄国的土地上，决不讲和"这句话加进去
  网络来源: 据俄国军事史记载，萨尔特科夫（1736–1816）是叶卡捷琳娜二世时期的资深将领，晚年主持陆军院工作。

- 名词: 洛里斯东
  分类: 人物
  解释: 雅克·洛里斯东，法国将军和外交官，拿破仑的侍从武官，1811年被任命为法国驻圣彼得堡大使。他是拿破仑战争期间重要的外交人物，曾试图在1812年战争爆发前调解法俄矛盾。
  书中原文: 洛里斯东在谈到这次进犯时，引通牒的话对我说，自从库拉金公爵申请护照的时候起，陛下就认为您和我已经进入战争状态了
  网络来源: 据拿破仑战争外交史记载，洛里斯东（1768–1828）曾任法国驻俄国大使，后被封为法国元帅。

- 名词: 巴萨诺公爵
  分类: 人物
  解释: 于格-贝尔纳·马雷，巴萨诺公爵，法国外交大臣和政治家。他是拿破仑最忠诚的幕僚之一，长期担任外交大臣，负责执行拿破仑的大陆封锁政策和外交事务。
  书中原文: 巴萨诺公爵拒发护照所持的种种理由，使我万万想不到，我国大使申请护照这一行动竟成为入侵的借口
  网络来源: 据法国近代史记载，马雷（1763–1839）自1811年起担任拿破仑的外交大臣，被封为巴萨诺公爵，是拿破仑外交体系的核心人物。

- 名词: 亚历山大·马其顿
  分类: 人物
  解释: 即亚历山大大帝（公元前356–前323），马其顿国王，世界古代史上最著名的军事征服者之一。他建立了地跨欧亚非三大洲的亚历山大帝国，其远征到达中亚和印度河流域，本书中提到他进入西徐亚（斯基泰）地区。
  书中原文: 莫斯科圣城就在草原的中央，它是正像亚历山大·马其顿进入的西徐亚那样国家的首都
  网络来源: 根据世界古代史，亚历山大大帝在公元前329–前327年远征中亚，进入锡尔河以北的斯基泰（西徐亚）地区。

- 名词: 维尔纳
  分类: 地点
  解释: 今立陶宛首都维尔纽斯，当时属俄罗斯帝国。1812年拿破仑入侵前夕，俄国亚历山大一世在此设立大本营进行军队检阅和战争准备。维尔纳是拿破仑进军莫斯科途中的重要战略城市。
  书中原文: 俄国皇帝这时在维尔纳检阅军队和演习，已经住了一个多月了。对于人人都料到的战争，仍然毫无准备
  网络来源: 根据1812年俄法战争史，亚历山大一世自1812年4月起驻跸维尔纳，直至6月法军渡涅曼河后撤离。

- 名词: 科夫诺
  分类: 地点
  解释: 今立陶宛考纳斯，涅曼河畔重要城市。1812年拿破仑大军渡过涅曼河后第一个攻占的俄国城市，法军在此设立指挥部和后勤基地。
  书中原文: 他驰过用船搭的浮桥，到对岸后，向左急转弯，然后朝着科夫诺方向飞奔
  网络来源: 根据拿破仑战争地理记载，科夫诺（Kaunas）位于涅曼河与维利亚河交汇处，是1812年法军入侵俄国的门户。

- 名词: 柯尼斯堡
  分类: 地点
  解释: 今俄罗斯加里宁格勒，原东普鲁士首府，历史上为普鲁士王国重要城市和港口。拿破仑在进军俄国途中经过此城，该地也是蒂尔西特和约的谈判背景地之一。
  书中原文: 沿着经过波森、托伦、但泽和柯尼斯堡等城的大道进发
  网络来源: 据欧洲历史地理记载，柯尼斯堡（Konigsberg）在十八至十九世纪是普鲁士东部文化中心，著名哲学家康德的故乡。

- 名词: 但泽
  分类: 地点
  解释: 今波兰格但斯克，波罗的海沿岸重要港口城市。拿破仑时期但泽为自由市，受法国控制，是拿破仑战争期间法军重要的后勤补给港和海军基地。
  书中原文: 沿着经过波森、托伦、但泽和柯尼斯堡等城的大道进发
  网络来源: 据拿破仑时期欧洲政治史，但泽于1807年被法军占领后成为自由市，是法国在波罗的海地区的战略据点。

- 名词: 波森
  分类: 地点
  解释: 今波兰波兹南，历史上属普鲁士王国。拿破仑战争期间，波森是法军向俄国进军途中的重要补给站和集结点。
  书中原文: 沿着经过波森、托伦、但泽和柯尼斯堡等城的大道进发
  网络来源: 据十九世纪欧洲历史，波森在第二次瓜分波兰后并入普鲁士，1812年拿破仑大军由此向东进军俄国。

- 名词: 托伦
  分类: 地点
  解释: 今波兰托伦，维斯瓦河畔历史名城，哥白尼的故乡。拿破仑战争期间，托伦是法军进军俄国途中的重要据点，拿破仑曾在此驻军和建立后勤基地。
  书中原文: 沿着经过波森、托伦、但泽和柯尼斯堡等城的大道进发
  网络来源: 据波兰历史记载，托伦在1793年第二次瓜分波兰后归属普鲁士，是拿破仑东征路线上的重要城市。

- 名词: 维利亚河
  分类: 地点
  解释: 东欧河流，今称内里斯河，发源于白俄罗斯，流经立陶宛在科夫诺（考纳斯）附近汇入涅曼河。1812年拿破仑大军渡涅曼河后，在维利亚河畔遇到波兰枪骑兵的渡河事件。
  书中原文: 他驰到宽阔的维利亚河，就在驻扎河岸的波兰枪骑兵团附近停住了
  网络来源: 据东欧地理资料，维利亚河（Viliya，立陶宛语称Neris）全长约510公里，是涅曼河的主要支流之一。

- 名词: 西徐亚
  分类: 地点
  解释: 古希腊人对黑海以北欧亚草原游牧民族及其所居地区的称呼，即斯基泰（Scythia）。本书以亚历山大·马其顿进入西徐亚的历史类比拿破仑入侵俄国草原，暗示俄国如西徐亚般辽阔难征服。
  书中原文: 莫斯科圣城就在草原的中央，它是正像亚历山大·马其顿进入的西徐亚那样国家的首都
  网络来源: 据世界古代史，西徐亚（斯基泰）在公元前七至前三世纪活跃于黑海北岸至中亚草原，是古希腊文献中著名的游牧文明。

- 名词: 波兰枪骑兵
  分类: 概念
  解释: 波兰枪骑兵是拿破仑时期波兰军团的精英骑兵部队，以长矛（枪）为主要武器，兼具轻骑兵的机动性和重骑兵的冲击力。波兰枪骑兵在拿破仑战争中表现极为英勇，尤其是近卫波兰枪骑兵团以多次冲锋闻名。
  书中原文: 他驰到宽阔的维利亚河，就在驻扎河岸的波兰枪骑兵团附近停住了
  网络来源: 据拿破仑战争军事史记载，波兰枪骑兵（Polish Lancers/Uhlans）是拿破仑最精锐的骑兵部队之一，其战术和制服对后世欧洲骑兵影响深远。

- 名词: 莫斯科维亚
  分类: 地点
  解释: 莫斯科维亚是西欧人对俄罗斯（尤其是莫斯科公国及沙皇俄国）的古称，源自莫斯科公国。19世纪上半叶仍被西欧用作俄国的代称，尤其在拿破仑战争期间的宣传和文献中常用，带有一定的异域色彩。
  书中原文: 他早就形成一种信念：在世界任何地方，从非洲到莫斯科维亚草原，只要他在场，毫无例外地使人大大吃惊
  网络来源: 据欧洲历史语言学，"莫斯科维亚"（Muscovy/Moscovie）一词源自莫斯科公国，十六至十八世纪为西欧对俄国的主要称呼，至十九世纪渐被"俄罗斯"取代。
