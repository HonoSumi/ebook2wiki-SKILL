- 名词: 神亲
  分类: 习俗
  解释: 俄国东正教传统中的云游朝圣者，被认为与神亲近的流浪修行者。在小说中指玛丽亚公爵小姐庇护和接待的东正教巡礼者，他们四处朝拜圣地、修道院，被民间视为"神的人"。
  书中原文: "这是玛丽亚的神亲，安德烈公爵说，这是她唯一不服从父亲的事：他吩咐把这些巡礼者赶走，可是她还是接待他们。"
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9491

- 名词: 赫尔德
  分类: 人物
  解释: 约翰·戈特弗里德·赫尔德（Johann Gottfried Herder，1744—1803），德国哲学家、神学家，启蒙运动时期的重要思想家。其"存在之链"宇宙观认为宇宙从低级到高级存在连续的等级阶梯，人类是其中的一个环节。托尔斯泰借皮埃尔之口引用了赫尔德的理论。
  书中原文: "是的，这是赫尔德的学说，安德烈公爵说，可是，亲爱的，使我确切相信的不是这个，而是生和死。"
  网络来源: https://book.douban.com/annotation/146961630/

- 名词: 贵族长
  分类: 概念
  解释: 俄国帝政时期各省或县贵族阶层选举产生的代表，负责管理贵族事务、主持贵族会议、代表贵族与沙皇政府沟通。小说中安德烈公爵曾拒绝担任此职。
  书中原文: "蒙本地区的贵族抬举，选我当贵族长，我好歹推辞掉了。他们不能了解，我没有做这种事的才能。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/9134429

- 名词: 后备军
  分类: 概念
  解释: 俄国1812年战争期间组建的预备军事力量，由退役军官和临时征召人员组成，负责后勤支援、训练新兵等任务。小说中老公爵被任命为第三军区后备军总司令。
  书中原文: "现在又有后备军的事。家父是第三军区总司令，在他手下做事，这是我避免服役的唯一方法。"
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9619

- 名词: 来世
  分类: 概念
  解释: 死后灵魂继续存在的世界，即彼岸世界。在小说中，皮埃尔与安德烈公爵围绕来世是否存在展开深刻哲学辩论，安德烈从丧妻之痛中感悟到来世的必然性。
  书中原文: "您相信来世吗？他问。相信来世吗？安德烈公爵重复一遍，但是皮埃尔不让他说下去，他认为他重复这句话就是作了否定的回答。"
  网络来源: https://www.chinawriter.com.cn/n1/2019/0529/c404090-31107931.html

- 名词: 斯摩棱斯克
  分类: 地点
  解释: 俄罗斯西部重要古城，位于第聂伯河畔，是通往莫斯科的要道。1812年俄法战争中，俄军在此与拿破仑大军激战后弃城焚毁，成为战争转折的关键节点。
  书中原文: "即使波拿巴打到跟前，打到斯摩棱斯克，威胁童山，我也不在俄国军队服役。"
  网络来源: https://zhuanlan.zhihu.com/p/37500966

- 名词: 巡礼者
  分类: 人物
  解释: 指东正教传统中四处朝拜圣地、修道院的宗教信徒，即朝圣者。在俄国文化中，巡礼者被视为具有宗教虔诚的修行者。小说中老公爵命令把他们赶走，而玛丽亚公爵小姐则坚持接待。
  书中原文: "他吩咐把这些巡礼者赶走，可是她还是接待他们。"
  网络来源: http://yunshuwu.cn/chap/8566.html

- 名词: 长明灯
  分类: 物件
  解释: 东正教传统中在圣像前常年点燃的小油灯，象征基督是世界之光以及信徒对上帝燃烧的爱。在小说中出现在玛丽亚公爵小姐房间的神龛前。
  书中原文: "玛丽亚公爵小姐看见他们进来，果然不好意思，脸涨得通红。她的房间很舒适，神龛前面点着长明灯。"
  网络来源: https://wap.cnki.net/touch/web/Journal/Article/JMSJ201706036.html

- 名词: 基督
  分类: 概念
  解释: 基督教的核心人物，上帝之子，在小说中被皮埃尔引用为共济会教义的基础。共济会被描述为不受国家和宗教束缚的基督教教义。
  书中原文: "共济会是不受国家和宗教束缚的基督教教义，是平等、友好、博爱的教义。"
  网络来源: https://www.sohu.com/a/379645120_801422

- 名词: 博爱
  分类: 概念
  解释: 共济会三大核心理念之一，指超越血缘、国界和宗教的人类普遍之爱。在小说中，皮埃尔向安德烈公爵介绍共济会时将其列为基本教义。
  书中原文: "共济会是不受国家和宗教束缚的基督教教义，是平等、友好、博爱的教义。"
  网络来源: https://book.douban.com/annotation/12029472/

- 名词: 平等
  分类: 概念
  解释: 共济会核心理念之一，指人在上帝面前和道德意义上的平等。皮埃尔认为共济会是以行善为宗旨的博爱和平等的组织。
  书中原文: "共济会是不受国家和宗教束缚的基督教教义，是平等、友好、博爱的教义。"
  网络来源: https://book.douban.com/annotation/12029472/

- 名词: 善
  分类: 概念
  解释: 道德哲学的核心范畴，与"真"并列构成人生最高价值。在小说中，皮埃尔认为人生的最大幸福就在于追求善和真，而安德烈则说自己看不见人世间善和真的王国。
  书中原文: "如果有上帝，有来世，那么就有善和真；人生的最大幸福就在于追求善和真。"
  网络来源: https://www.163.com/dy/article/FU7PF7DF0543LPNW.html

- 名词: 真
  分类: 概念
  解释: 指客观真理和终极实在，与"善"并列构成人生最高价值。皮埃尔认为善和真的王国存在于宇宙之中，而非仅在人世间。
  书中原文: "如果有上帝，有来世，那么就有善和真；人生的最大幸福就在于追求善和真。"
  网络来源: https://www.163.com/dy/article/FU7PF7DF0543LPNW.html

- 名词: 灵魂
  分类: 概念
  解释: 人的精神本质，在托尔斯泰笔下被视为永恒存在、不会消灭的精神实体。皮埃尔认为灵魂是宇宙和谐整体的一部分，过去存在、现在存在、将来也永远存在。
  书中原文: "难道我在自己的灵魂中没有感觉到我是这个巨大而和谐的整体的一部分吗？难道我没有感觉到我是在这作为上帝化身的许许多多的生物之中从最低级生物到最高级生物中间的一个环节，一个阶梯吗？"
  网络来源: https://m.fx361.com/news/2016/1226/435346.html

- 名词: 永恒
  分类: 概念
  解释: 超越时间的无限存在状态。小说中安德烈公爵在奥斯特利茨战役后第一次看见了那个崇高的永恒的天空，象征他对生命终极意义的感悟。
  书中原文: "在奥斯特利茨战役后，他第一次又看见了他躺在奥斯特利茨战场上看见的那个崇高的永恒的天空，那种久已沉睡在他心中的美好的感情，忽然欢乐地、青春焕发地在他心灵中苏醒了。"
  网络来源: https://wap.cnki.net/touch/web/Journal/Article/MDAN201618017.html

- 名词: 良心
  分类: 概念
  解释: 人的内在道德判断力和自我约束力。在小说中，安德烈公爵认为比起身体的痛苦，人的尊严、良心的宁静和纯洁才是更值得珍惜的东西。
  书中原文: "由此可见，我惋惜的是什么——是人的尊严，良心的宁静、纯洁，而不是背脊和脑袋，这些东西不管你怎样抽，怎样剃，仍然是背脊和脑袋。"
  网络来源: https://www.jianshu.com/p/8ec09626f5bd

- 名词: 西伯利亚
  分类: 地点
  解释: 俄罗斯东部广袤地区，历史上是沙俄政府流放犯人和政治犯的主要地点。在小说中，安德烈公爵讨论农奴制时提及被流放到西伯利亚的农奴。
  书中原文: "如果他们遭到殴打，鞭笞，被流放到西伯利亚，我想，这对他们并没有什么不好。在西伯利亚他们过着同样的牛马生活，身上的伤疤长好了，他们仍然和过去一样幸福。"
  网络来源: https://m.douban.com/book/annotation/121815314

- 名词: 宇宙
  分类: 概念
  解释: 包含一切存在物的整体。在托尔斯泰笔下，宇宙是一个巨大而和谐的有机整体，存在一个真理的王国，人类只是其中的一部分。皮埃尔用宇宙观来论证灵魂不朽。
  书中原文: "可是在宇宙中，在整个宇宙中，有一个真理的王国，我们现在是尘世的儿女，但从永恒来看，我们是整个宇宙的儿女。"
  网络来源: https://book.douban.com/annotation/146961630/

- 名词: 阶梯
  分类: 概念
  解释: 指从低级生命到高级生命层层递进的宇宙等级秩序，源于西方哲学中的"存在之链"概念。皮埃尔借此论证人类之上还有更高级的存在，灵魂不会消灭。
  书中原文: "从最低级生物到最高级生物中间的一个环节，一个阶梯。如果我看见，确实看见从植物到人这部梯子，为什么我要设想这部梯子从我这里中断，而不是通向更远更远的地方呢？"
  网络来源: https://book.douban.com/annotation/146961630/

- 名词: 渡船
  分类: 物件
  解释: 用于渡河的船只。在小说中，安德烈公爵和皮埃尔在前往童山途中乘坐渡船过河，并在船上展开了全书最重要的哲学对话，成为安德烈精神新生的转折点。
  书中原文: "他们来到一条涨水的河边，得摆渡过河。在安置马车和马匹的时候，他们上了渡船。"
  网络来源: https://book.douban.com/subject/1833033/blockquotes?sort=score&start=1700

- 名词: 书吏
  分类: 人物
  解释: 俄国帝政时期衙门中的低级文职人员，负责文书抄写、登记等杂务。在小说中指尤赫诺夫地方的一个书记官，因盗窃后备军物资被老公爵下令绞死。
  书中原文: "把尤赫诺夫的一个书记官绞死的，安德烈公爵微笑着说，我所以要服役，就是因为除了我，再没有能够影响他的人。"
  网络来源: https://www.encyclopediaofukraine.com/display.asp?linkpath=pages/T/A/TableofRanks.htm

- 名词: 绞死
  分类: 事件
  解释: 以绞索勒颈致死的刑罚方式。在小说中指老公爵以总司令身份下令处决盗窃后备军物资的书记官，体现了老保尔康斯基公爵严厉无情的性格和掌握生杀大权的威势。
  书中原文: "把尤赫诺夫的一个书记官绞死的，安德烈公爵微笑着说。"
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9490

- 名词: 改良
  分类: 概念
  解释: 指对农业生产和管理方式的改进。小说中安德烈公爵在退隐乡间期间致力于庄园管理改革，向皮埃尔介绍他在园田管理方面的改良措施。
  书中原文: "他指着田地，向皮埃尔讲他在园田管理方面的改良。"
  网络来源: https://www.douban.com/note/494554747/

- 名词: 无神论者
  分类: 概念
  解释: 不相信神或超自然力量存在的人。在小说中，安德烈公爵在经历战争和丧妻之痛后一度持无神论观点，后来在与皮埃尔的哲学对话中开始动摇。
  书中原文: "况且他知道安德烈公爵早先就是无神论者。"
  网络来源: https://yunshuwu.cn/chap/8565.html

- 名词: 深渊
  分类: 概念
  解释: 比喻死亡带来的终极虚无和不可知之境。安德烈公爵用深渊来形象地描述面对所爱之人突然消失时的那种震惊与困惑，由此推导出对来世的信仰。
  书中原文: "当一个人和你手挽手在人生的旅途中行进的时候，这个人忽然在那里消失不见了，到乌有之乡去了，而你自己却站在这深渊前面往那里张望，我就曾经张望过。"
  网络来源: https://yunshuwu.cn/chap/8565.html

- 名词: 真理
  分类: 概念
  解释: 终极实在和绝对正确的道理。在小说中，皮埃尔认为在人世间只有虚伪和罪恶，但在整个宇宙中存在着一个真理的王国，人类是通向这个真理王国的一个环节。
  书中原文: "在这个世界，正是在这个世界，没有真理，只有虚伪和罪恶。可是在宇宙中，在整个宇宙中，有一个真理的王国。"
  网络来源: https://www.163.com/dy/article/FU7PF7DF0543LPNW.html

- 名词: 幸福
  分类: 概念
  解释: 人生的终极满足状态。在小说中，皮埃尔认为人生的最大幸福在于追求善和真，即道德完善和追求真理。这一观点体现了托尔斯泰的幸福观。
  书中原文: "如果有上帝，有来世，那么就有善和真；人生的最大幸福就在于追求善和真。"
  网络来源: https://m.zhangyue.com/readbook/10193695/2?p2=108272

- 名词: 夕阳
  分类: 物件
  解释: 傍晚落山的太阳。在小说中，夕阳意象出现在渡船场景中，安德烈公爵眺望沐浴着落日余晖的河水，夕阳的红光与苍茫的河水辉映，烘托出哲学对话的深邃意境。
  书中原文: "安德烈公爵倚着栏杆，默默地向前眺望沐浴着落日余晖的泛滥的河水。太阳已经沉没了一半，傍晚的寒气降临了。"
  网络来源: https://www.newxue.com/baike/12719091516648.html

- 名词: 寂静
  分类: 概念
  解释: 没有声音的安静状态。在小说中，皮埃尔说完关于来世和信仰的长篇论述后，四周一片寂静，只有波浪轻轻拍打着船底，仿佛在附和皮埃尔的话。
  书中原文: "皮埃尔停住不说了。四周一片寂静。渡船早已靠岸，只有波浪轻轻拍打着船底。"
  网络来源: https://www.newxue.com/baike/12719091516648.html

- 名词: 觉醒
  分类: 概念
  解释: 精神上的苏醒和新生。在小说中指安德烈公爵在与皮埃尔的渡船对话后，内心久已沉睡的美好感情重新苏醒，标志着他在精神上进入了一个新纪元。
  书中原文: "那种久已沉睡在他心中的美好的感情，忽然欢乐地、青春焕发地在他心灵中苏醒了。同皮埃尔的会见，在安德烈公爵的生活中展开一个新的纪元。"
  网络来源: https://www.meipian.cn/5lyd9998
