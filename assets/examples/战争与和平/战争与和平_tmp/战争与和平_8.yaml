- 名词: 骠骑兵
  分类: 概念
  解释: |
    骠骑兵（Hussar）一词源自匈牙利语 Huszár，最初指15世纪匈牙利国王马加什一世组建的轻骑兵。这种骑兵以速度快、机动性强著称，主要装备马刀，承担侦察、侧翼突击和追击等任务。18至19世纪，骠骑兵传遍全欧洲，成为各国军队的标配轻骑兵兵种，以其华丽的制服和浪漫色彩闻名。在俄国，骠骑兵在1812年卫国战争中发挥了重要作用，《战争与和平》中尼古拉·罗斯托夫加入的正是骠骑兵团。
  书中原文: |
    他去当骠骑兵了。
  网络来源: |
    https://baike.baidu.com/item/%E9%AA%A0%E9%AA%91%E5%85%B5/1556131
- 名词: 保罗格勒骠骑兵团
  分类: 概念
  解释: |
    保罗格勒骠骑兵团（Pavlograd Hussar Regiment）是俄国陆军的一支骠骑兵团，以乌克兰的保罗格勒（现第聂伯罗彼得罗夫斯克州）命名。在《战争与和平》中，该团是主角尼古拉·罗斯托夫服役的部队。小说围绕该团描写了申格拉本战役和奥斯特利茨战役等重大历史事件，通过尼古拉的军旅生涯展现了拿破仑战争时期俄国骠骑兵的日常生活和战斗经历。该团团长舒伯特在小说第一章被提及。
  书中原文: |
    保罗格勒骠骑兵团团长舒伯特今天来我们家吃饭。他是来休假的，他要把他带走。
  网络来源: |
    https://book.qq.com/book-read/52511345/35
- 名词: 萨洛莫妮
  分类: 人物
  解释: |
    萨洛莫妮（Salomoni）是18世纪末至19世纪初活跃于俄国上流社会的意大利歌剧歌唱家，其具体身世记载有限。在拿破仑战争前后的俄国，意大利歌剧风靡贵族阶层，许多意大利歌唱家受邀到圣彼得堡和莫斯科演出，萨洛莫妮是其中知名的一位。托尔斯泰在《战争与和平》中借罗斯托夫伯爵之口将女儿娜塔莎的歌唱天赋比作"萨洛莫妮第二"，说明其艺术成就之高，已成为当时俄国贵族衡量歌唱水准的标杆。
  书中原文: |
    她一定会成为歌唱家，萨洛莫妮第二。
  网络来源: |
    https://www.shmoop.com/study-guides/war-and-peace/volume-1-part-1-chapter-9-summary.html
