  书中原文: "轿式马车从院子赶上坎坷不平的马路时颠簸了一下，其他的马车也跟着颠了一下，一队马车顺着大街往前移动了。"
  网络来源: 无

- 名词: 动荡不安的莫斯科
  分类: 概念
  解释: 1812年法军兵临城下时莫斯科城的恐慌和混乱景象，贵族和居民争相撤离。
  书中原文: "娜塔莎从来没有体验过像今天这样快活的心情，她挨着伯爵夫人坐在马车里，望着慢慢向后移动的、被放弃的、动荡不安的莫斯科的城墙。"
  网络来源: 无

