- 名词: 闭门祈祷
  分类: 习俗
  解释: 俄国东正教家庭在重要行动前关闭房门聚在一起静默祈祷的宗教仪式。
  书中原文: "伯爵、彼佳、肖斯太太、玛夫拉·库兹米尼什娜、瓦西里奇，都来到客厅，把门关上，大家坐下来，默不作声，谁也不看谁，就这样坐了一会儿。"
  网络来源: 无

- 名词: 出征前祈祷
  分类: 习俗
  解释: 俄国人在出远门或长途旅行前进行的宗教祈祷仪式，祈求旅途平安。
  书中原文: "伯爵夫人已经换了旅行的服装，披着披巾，戴着帽子，神色疲倦地在客厅里走来走去，等候家里的人在出发前聚在一起闭门祈祷。"
  网络来源: 无

- 名词: 留下的仆人
  分类: 人物
  解释: 罗斯托夫家撤离莫斯科时留守宅邸的仆人，包括老仆瓦西里奇和女管家玛夫拉·库兹米尼什娜等人。
  书中原文: "留在莫斯科的人们在马车两旁步行着给他们送行。"
  网络来源: 无

- 名词: 行前告别
  分类: 习俗
  解释: 俄国贵族家庭出远门前主人与留下的人告别的传统，包括拥抱、吻肩等仪式。
  书中原文: "然后伯爵开始拥抱留在莫斯科的玛夫拉·库兹米尼什娜和瓦西里奇，当他们抓住他的手，吻他的肩时，他轻轻地拍他们的背，说一些含糊不清的、亲切的安慰话。"
  网络来源: 无

- 名词: 忘记带东西
  分类: 概念
  解释: 出门前常见的忙乱情景，总有些物品被遗漏或放错地方，需要反复检查整理。
  书中原文: "就像临行前常有的情形，有许多东西忘记带，或者放的不是地方，两个随从在敞开的车门和车梯两旁站了很久，准备侍候伯爵夫人上车……"
  网络来源: 无

- 名词: 出发命令
  分类: 概念
