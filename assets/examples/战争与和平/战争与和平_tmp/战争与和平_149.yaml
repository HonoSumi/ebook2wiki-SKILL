  书中原文: "不过，我可以告诉您，爸爸，八月二十六日那天的大战，我军所表现的、或者说所显示的那样——那种英勇气概，那种俄罗斯军队所表现的真正古代英雄的勇敢，简直找不到适当的字眼来形容……"
  网络来源: 无

