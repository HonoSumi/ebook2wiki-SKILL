- 名词: 拉莫将军
  分类: 人物
  解释: 法国将军，在1812年拿破仑入侵俄国期间出现在博古恰罗沃地区。他发布文告晓谕当地居民不得离家逃走，声称法国当局将给予保护。布里安小姐将此文告转交给玛丽亚公爵小姐，引发了玛丽亚公爵小姐对屈尊接受法国保护的愤怒与羞耻。拉莫将军在小说中作为法国占领军的代表性人物出现，象征着侵略者对俄国贵族尊严的践踏。
  书中原文: 布里安小姐从手提包里取出一张不是用普通俄国纸印的法国将军拉莫的文告，上面晓谕居民不得离家逃走，法国当局将给予他们应有的保护，她把文告递给公爵小姐。
  网络来源: https://www.britannica.com/topic/Bolkonsky-family

- 名词: 博尔孔斯基家族
  分类: 人物
  解释: 托尔斯泰《战争与和平》中的核心贵族家族之一，是俄国旧式贵族精神的象征。家族成员包括老一代的尼古拉·安德烈伊奇·博尔孔斯基公爵（前朝高级将领，性格严厉倔强），长子安德烈·博尔孔斯基公爵（小说核心男主角，孤傲正直，历经战争与爱情的磨难后精神觉醒），以及女儿玛丽亚·博尔孔斯卡娅公爵小姐（善良虔诚，最终与尼古拉·罗斯托夫结婚）。家族以正直爱国、保持古风为特征，在1812年战争期间表现出强烈的爱国精神和民族尊严。
  书中原文: 要让尼古拉·安德烈伊奇·博尔孔斯基公爵的女儿去求拉莫将军先生给予她保护，并且接受他的恩惠，那怎么行！
  网络来源: https://www.britannica.com/topic/Bolkonsky-family

- 名词: 维亚济马集市
  分类: 地点
  解释: 俄国斯摩棱斯克州维亚济马城的传统集市。维亚济马位于莫斯科通往斯摩棱斯克及波兰的重要商道上，自14世纪起发展成为重要的贸易中心。当地以亚麻、蜂蜜、蜂蜡、皮革和纺织品交易闻名。在《战争与和平》中，博古恰罗沃的村长德龙每年去赶维亚济马集市，给玛丽亚公爵小姐带回特制的甜饼。这一细节反映了19世纪初俄国乡村的经济生活以及地主与农民之间的关系。
  书中原文: 德龙努什卡，他每年去赶维亚济马集市的时候，每次都给她带来一种特制的甜饼，面带笑容交给她。
  网络来源: https://en.wikisource.org/wiki/1911_Encyclop%C3%A6dia_Britannica/Vyazma
