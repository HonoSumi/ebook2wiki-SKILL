- 名词: 多洛霍夫
  分类: 人物
  解释: |
    费奥多尔·多洛霍夫是托尔斯泰《战争与和平》中的关键配角，谢苗诺夫团的年轻军官，彼得堡上流社会中赫赫有名的赌徒、决斗家和浪子。他中等身材，鬈发，生着一对明亮的蓝眼睛，约摸二十五岁左右。他性格极为复杂矛盾：表面上是冷酷残忍的恶棍，与皮埃尔的妻子海伦有染，引诱尼古拉·罗斯托夫赌博输掉巨款，协助阿纳托利策划诱拐娜塔莎；但内心却深藏真情，对母亲和驼背的姐姐极为孝顺，真心爱上贫穷的索尼娅。他什么赌博都来得，几乎每赌必赢，不论喝多少酒都从不失去清醒头脑。在1812年卫国战争中，他在战场上立功赎罪，成为游击队领袖。
  书中原文: |
    多洛霍夫，谢苗诺夫团的军官，有名的赌徒和决斗家，同阿纳托利住在一起。多洛霍夫中等身材，鬈发，生着一对明亮的蓝眼睛，约摸二十五岁左右。库拉金和多洛霍夫在当时彼得堡浪子酒徒之中都是鼎鼎大名的人物。
  网络来源: |
    https://baijiahao.baidu.com/s?id=1731592317075738308

- 名词: 阿纳托利·库拉金
  分类: 人物
  解释: |
    阿纳托利·库拉金是托尔斯泰《战争与和平》中库拉金家族的重要成员，瓦西里·库拉金公爵的小儿子，海伦的哥哥。他外表俊美，但品行不端，是小说中俄国堕落贵族的典型代表。他一年要花掉父亲数万卢布，频繁出入赌场酒场，与损友多洛霍夫一起胡作非为。他曾为钱财去童山庄园向玛丽亚公爵小姐提亲，却又同时勾搭伴读小姐。在娜塔莎·罗斯托娃已与安德烈公爵订婚后，他疯狂追求娜塔莎并策划私奔，私奔计划败露后逃跑。在1812年波罗金诺战役中，他受了重伤被截掉一条腿，结局悲惨。
  书中原文: |
    皮埃尔住在瓦西里·库拉金公爵家，他和公爵的儿子阿纳托利厮混，过着放荡的生活，就是为了使阿纳托利改邪归正，他们希望他能和安德烈公爵的妹妹结婚。库拉金和多洛霍夫在当时彼得堡浪子酒徒之中都是鼎鼎大名的人物。
  网络来源: |
    https://zhuanlan.zhihu.com/p/495064846

- 名词: 白夜
  分类: 概念
  解释: |
    白夜是指在高纬度地区（约北/南纬48°34'以上），太阳落到地平线以下但角度很小，由于大气对太阳光的折射和散射作用，整夜天空并不完全变黑的自然现象。黄昏尚未过去，黎明就已接踵而来。北半球出现在夏至前后，纬度越高白夜持续期越长，天空也越亮。白夜不同于极昼：极昼是太阳一直在地平线以上，仅出现在极圈以内；白夜是太阳已落下但天空依然明亮，范围可低至48°34'。俄罗斯圣彼得堡（北纬约60°）的白夜现象尤为著名，每年夏季举办"白夜节"。
  书中原文: |
    这时正是彼得堡六月的白夜。
  网络来源: |
    https://wapbaike.baidu.com/item/%E7%99%BD%E5%A4%9C/75095

- 名词: 骠骑兵
  分类: 物件
  解释: |
    骠骑兵（Hussars）是15世纪起源于匈牙利和波兰的一种轻骑兵兵种，16至18世纪盛行于欧洲各国军队。其名称一说源自匈牙利语"húsz"（二十）加"ár"（俸禄）。骠骑兵以高机动性著称，擅长侦察、突袭、包抄等战术，主要武器为马刀（弯刀）和卡宾枪。标志性服饰包括胸前有横向饰带的贴身阿提拉夹克和斜披的斗篷披风。法国骠骑兵在拿破仑时期达到极盛，俄罗斯骠骑兵在1812年战争中发展了游击战术。19世纪中叶后随着军事技术进步，骠骑兵逐渐退出历史舞台。
  书中原文: |
    一个瘦削的、非常年轻的、那天晚上输了钱的近卫骠骑兵军官，爬到窗台上，探头朝下望了望。
  网络来源: |
    https://baike.baidu.com/item/%E9%AA%A0%E9%AA%91%E5%85%B5/1556131

- 名词: 谢苗诺夫团
  分类: 物件
  解释: |
    谢苗诺夫团是俄罗斯历史上最著名的近卫步兵团之一，与普列奥布拉任斯基团并称为沙俄近卫军的两大奠基性部队。1683年由彼得大帝从谢苗诺夫村的贵族子弟和孩童中组建"少年军团"发展而来。1700年在北方战争纳尔瓦战役中表现极为悍勇，被彼得大帝授予近卫军地位。该团在罗曼诺夫王朝的多次政变中扮演了决定性角色，包括1801年参与推翻保罗一世拥立亚历山大一世，1825年部分军官参与十二月党人起义。1820年曾因团长虐待士兵而爆发哗变。2013年在当代俄罗斯得以重建。
  书中原文: |
    多洛霍夫，谢苗诺夫团的军官，有名的赌徒和决斗家，同阿纳托利住在一起。
  网络来源: |
    https://baike.baidu.com/item/%E8%B0%A2%E8%8B%97%E8%AF%BA%E5%A4%AB%E5%9B%A2%E8%B5%B7%E4%B9%89/56375099
