- 名词: 让莉夫人
  分类: 人物
  解释: |
    让莉夫人（Madame de Genlis，1746—1830），本名斯特凡妮·费莉西泰·杜克雷·德·圣奥班，法国作家、教育家。她是18世纪末至19世纪初法国最多产的女作家之一，撰写了一百多部作品，涵盖教育论著、历史小说、戏剧和回忆录。她以创新教育方法闻名，曾担任法国未来国王路易-菲利普的家庭教师，是法国历史上第一位被任命为王子"男性教师"的女性。她的作品在欧洲广为流传，影响了简·奥斯汀、玛丽亚·埃奇沃思等英国作家。其代表作包括《阿黛尔与泰奥多尔》《青年人的戏剧》等。她的十卷本《回忆录》是研究18世纪法国社会历史的重要资料。
  书中原文: |
    你永远不会理解，因为你从来没有爱过任何人，你没心没肝，你不过是让莉夫人（这是尼古拉给薇拉起的非常难堪的绰号），你最大的乐趣就是惹得别人不愉快。
