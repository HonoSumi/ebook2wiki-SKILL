- 名词: 皮埃尔
  分类: 人物
  解释: |
    皮埃尔·别祖霍夫（Pierre Bezukhov），托尔斯泰《战争与和平》的核心男主角之一，老别祖霍夫伯爵的私生子，后继承爵位成为莫斯科首富。他身材高大肥胖，善良正直、热爱思考但意志薄弱，带有俄国文学中典型的"多余人"气息。经历了与海伦的不幸婚姻、加入共济会、博罗季诺战役、被法军俘虏等历程，最终在平凡生活中找到生命真谛，与娜塔莎结婚，投身十二月党人运动。
  书中原文: |
    "我？我？我怎么跟您说呢，"皮埃尔突然说，他站起来开始在屋里来回踱步，"我经常这么想……这个姑娘是一个瑰宝，珍奇的瑰宝……是一个不可多得的姑娘……亲爱的朋友，我劝您不要空想，不要怀疑，您就结婚，结婚，结婚……我相信，再没有谁比您幸福了。"
  网络来源: |
    https://baike.baidu.com/item/%E7%9A%AE%E5%9F%83%E5%B0%94%C2%B7%E5%88%AB%E7%A5%96%E9%9C%8D%E5%A4%AB/53725822

- 名词: 娜塔莎
  分类: 人物
  解释: |
    娜塔莉娅·伊里尼奇娜·罗斯托娃（Natasha Rostova），托尔斯泰《战争与和平》的女主角，罗斯托夫伯爵的次女。她被托尔斯泰视为"生命和幸福的化身"，性格热情活泼、天真浪漫。她经历了与安德烈公爵订婚、被阿纳托利诱惑、战争中成长等历程，最终与皮埃尔结婚，成为贤妻良母。本篇中安德烈公爵向她求婚，但因父亲要求推迟婚期而陷入等待的煎熬。
  书中原文: |
    娜塔莎觉得，早在奥特拉德诺耶第一次看见安德烈公爵的时候，就爱上他了。她早就看中（她坚信她早就看中）的人，正是这个人，现在他又和她相逢了，而且，对她并非无意，这么一个奇异的、意外的幸福仿佛把她惊呆了。
  网络来源: |
    https://baike.baidu.com/item/%E5%A8%9C%E5%A1%94%E8%8E%8E%C2%B7%E7%BD%97%E6%96%AF%E6%89%98%E5%A8%83/15143141

- 名词: 安德烈公爵
  分类: 人物
  解释: |
    安德烈·博尔孔斯基公爵（Prince Andrei Bolkonsky），托尔斯泰《战争与和平》的核心男主角之一，博尔孔斯基家族继承人，库图佐夫的副官。他性格孤傲正直、才智过人，追求功名却经历幻灭。在奥斯特利茨战役中身负重伤，目睹天空后对名誉感到虚无。妻子丽莎难产去世后陷入消沉，后被娜塔莎的活力唤醒。本篇中他向皮埃尔表白对娜塔莎的爱情，但父亲要求婚期推迟一年。
  书中原文: |
    "如果有人对我说，我会这么一往情深，我简直不相信，"安德烈公爵说，"我从前的感情完全不是这样的。对我来说，整个世界分成两部分：一部分有她，那儿全是幸福、希望、光明；另一部分没有她，那儿全是苦闷和黑暗……"
  网络来源: |
    https://baike.baidu.com/item/%E5%AE%89%E5%BE%B7%E7%83%88%C2%B7%E5%8D%9A%E5%B0%94%E5%AD%94%E6%96%AF%E5%9F%BA/55647709

- 名词: 薇拉
  分类: 人物
  解释: |
    薇拉·伊利尼奇娜·罗斯托娃（Vera Rostova），罗斯托夫家的长女，娜塔莎的姐姐。她性格冷静理性和甚至有些刻板，与活泼热情的娜塔莎形成鲜明对比。她嫁给德国血统的军官贝格，两人都是务实精于算计之人。本篇中她在晚会上与安德烈公爵谈论娜塔莎的爱情观，问他娜塔莎能否忠贞不渝，安德烈以讥讽回应。
  书中原文: |
    "您以为如何？"薇拉带着讥诮的微笑说，"公爵，您洞察一切，一眼就把人看透了。您对娜塔莎有什么看法？她对待自己的爱情能否始终不渝，能否像其他女人（薇拉指她自己）那样，一旦爱上一个人，就永远忠于他？我认为那样才是真正的爱情。您的看法如何，公爵？"
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 索尼娅
  分类: 人物
  解释: |
    索尼娅（全名索菲娅·亚历山德罗夫娜，Sonya Rostova），罗斯托夫伯爵夫人的外甥女，父母双亡后从小被罗斯托夫家收养。她温柔善良、富有牺牲精神，深爱着表哥尼古拉·罗斯托夫。然而因没有嫁妆，老伯爵夫人不断施压要求她解除与尼古拉的婚约。最终尼古拉娶了富有的玛丽亚公爵小姐，索尼娅孤独终老，被娜塔莎形容为"不结果子的谎花"。
  书中原文: |
    索尼娅怕离开娜塔莎，可是，又怕妨碍她和安德烈公爵在一起。
  网络来源: |
    https://www.bbc.co.uk/programmes/profiles/146BRwfxDJsRMF3G11kVqm2/sonya-rostova

- 名词: 鲍里斯
  分类: 人物
  解释: |
    鲍里斯·德鲁别茨科伊（Boris Drubetskoy），安娜·米哈伊洛夫娜的独生子，罗斯托夫家的远亲。他从小与尼古拉·罗斯托夫一起长大，曾是娜塔莎的少年恋人。他野心勃勃、精于算计、擅长攀附权贵，属于"上流社会的莫尔恰林"式人物。本篇中薇拉提到他对娜塔莎的童年爱情。
  书中原文: |
    娜塔莎在一边同索尼娅和鲍里斯谈话。薇拉嘴角噙着微妙的微笑，在同安德烈公爵谈着什么。
  网络来源: |
    https://www.bbc.co.uk/programmes/profiles/14DdP3xCtRTz6PhNFRjmfDL/boris-drubetskoy

- 名词: 贝格
  分类: 人物
  解释: |
    阿道夫·贝格（Alphonse Karlovich Berg），日耳曼裔俄国军官，后升任上校，娶了罗斯托夫家的长女薇拉为妻。他是托尔斯泰笔下典型的"新贵"和"向上爬的人"——精于钻营、虚荣功利、在国难当头时仍斤斤计较个人利益。本篇中他请皮埃尔参加关于西班牙问题的争论，认为晚会缺少高谈阔论就不够成功。
  书中原文: |
    贝格很得意，很幸福。喜悦的笑容始终挂在脸上。晚会很成功，跟他所见到的别的晚会完全一样。样样都很相像。小姐太太们的悄声私语、玩牌、牌桌上提高嗓门的将军、茶炊，甚至点心，都很相像；只有一样不足，缺少他在晚会上常见的，而且希望摹仿的一件事。那就是，缺少男客们的高谈阔论和对某些重大而睿智的问题的争论。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 伊利亚·安德烈伊奇
  分类: 人物
  解释: |
    伊利亚·安德烈耶维奇·罗斯托夫伯爵（Count Ilya Rostov），罗斯托夫家的家长，娜塔莎的父亲。他为人善良热情、好客慷慨，但不善理财、挥霍无度，导致家族逐渐走向破产。在小说结尾他去世时家中负债比家产大一倍。本篇中他邀请安德烈公爵到家中吃午饭，安德烈公爵在他家消磨了整整一天。
  书中原文: |
    第二天，安德烈公爵应伊利亚·安德烈伊奇邀请，到罗斯托夫家吃午饭，并且在他们那里消磨了整整一天。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 老伯爵夫人
  分类: 人物
  解释: |
    纳塔利娅·罗斯托娃伯爵夫人（Countess Rostova），罗斯托夫伯爵的妻子，娜塔莎的母亲。她是一位慈爱善良的母亲，但面对家族日益恶化的经济状况也深感忧虑。本篇中她担忧女儿与安德烈公爵的婚事，夜晚与娜塔莎谈心，安慰她并说"姻缘是天定的"。
  书中原文: |
    "没有，亲爱的，连我也怕，"母亲说，"睡去吧。" / "我反正睡不着，睡觉是多么愚蠢的事！妈妈，妈妈，这种事我从来没遇见过！"她说，由于意识到自己内心的感情而惊奇和心慌，"我们哪想得到啊！……"
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 老公爵
  分类: 人物
  解释: |
    尼古拉·安德烈耶维奇·博尔孔斯基公爵（Old Prince Bolkonsky），博尔孔斯基家族的族长，安德烈公爵的父亲，玛丽亚公爵小姐的父亲。他是叶卡捷琳娜二世时代的老派贵族，为人严苛专制、精明能干，崇尚"工作和智慧"。极端蔑视拿破仑。本篇中他要求安德烈的婚期推迟一年，以考验儿子和未婚妻的感情是否经得起时间的考验。
  书中原文: |
    "第一，这桩婚事，从门第、家产和声望方面看，并不美满。第二，安德烈公爵已经不年轻了，而且健康欠佳（老头子特别强调这一点），可是她非常年轻。第三，把唯一的儿子配给一个黄毛丫头，令人于心不忍。第四，最后一点，……我求你把婚期推迟一年……然后，如果爱情、情欲、决心，等等，等等，真是大得不得了，那你就结婚吧。这是我最后的嘱咐，注意，最后的……"
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 海伦
  分类: 人物
  解释: |
    海伦·瓦西里耶夫娜·库拉金娜（Helene Bezukhova），瓦西里·库拉金公爵之女，皮埃尔的妻子。她是彼得堡上流社会的宠儿，以惊人的美貌和社交魅力著称，但内心空洞、自私自利、贪图财富与地位。她与哥哥阿纳托利共同诱惑娜塔莎，间接导致娜塔莎与安德烈公爵婚约破裂。本篇中她在举办盛大招待会，与一位亲王过从甚密，皮埃尔因此心情沉重。
  书中原文: |
    这一天，海伦·瓦西里耶夫娜伯爵夫人举行隆重的招待会，出席招待会的有法国大使、不久前才成为伯爵夫人常客的亲王，以及许多名媛和绅士。皮埃尔住在楼下，他穿过大厅时，他那副心事重重、淡漠灰暗的神情使所有的客人吃惊。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 将军
  分类: 人物
  解释: |
    《战争与和平》中在罗斯托夫家晚会上与皮埃尔打牌、后又与上校争论西班牙问题的将军，属于社交场合的次要人物，体现了当时贵族聚会的日常消遣场景。
  书中原文: |
    打完了六圈，将军站起来说，这样玩法没意思，皮埃尔也乐得随意活动一下。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 上校
  分类: 人物
  解释: |
    《战争与和平》中在罗斯托夫家晚会上与将军争论西班牙问题的上校，属于社交场合的次要人物。
  书中原文: |
    这时贝格走到皮埃尔面前，再三请他参加将军和上校之间关于西班牙问题的争论。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 法国大使
  分类: 人物
  解释: |
    出席海伦·瓦西里耶夫娜伯爵夫人盛大招待会的法国大使。当时拿破仑战争期间，俄法之间既有战争又有外交往来，法国大使仍是彼得堡社交界的重要人物。
  书中原文: |
    这一天，海伦·瓦西里耶夫娜伯爵夫人举行隆重的招待会，出席招待会的有法国大使、不久前才成为伯爵夫人常客的亲王，以及许多名媛和绅士。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 亲王
  分类: 人物
  解释: |
    海伦的新常客，与海伦过从甚密的贵族亲王。海伦在上流社会中以其美貌和社交手腕吸引了众多追求者，皮埃尔因此深感痛苦和嫉妒。
  书中原文: |
    在亲王和他的妻子过从甚密以后，皮埃尔突然被任命为宫中侍从，从此他在交际场所总觉得心情沉重，抬不起头来。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 罗斯托夫家
  分类: 地点
  解释: |
    莫斯科的罗斯托夫伯爵府邸，罗斯托夫家族在莫斯科的住所。罗斯托夫家以热情好客闻名，经常举办宴会、晚会和家庭聚会。本篇中安德烈公爵在此与娜塔莎相恋，参加了牌局和家庭晚餐。
  书中原文: |
    全家都知道他是为谁而来的，他也不加掩饰，整天都尽可能和娜塔莎在一起。不仅娜塔莎心慌意乱，同时又那么兴奋和感到幸福，而且，全家对将要发生重大的事也怀着恐惧。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 皮埃尔家
  分类: 地点
  解释: |
    皮埃尔·别祖霍夫在莫斯科的宅邸。皮埃尔继承了别祖霍夫家族的巨额财产后成为莫斯科最富有的贵族之一，其宅邸豪华宽敞。本篇中安德烈公爵深夜到访，在这间"烟雾弥漫的斗室"中向皮埃尔倾诉对娜塔莎的爱情。
  书中原文: |
    十一点多钟，皮埃尔走出伯爵夫人的房间，到楼上，坐在烟雾弥漫的斗室的桌旁，身穿一件破旧的睡衣，抄写苏格兰共济会记录原件，这时有一个人走进他的房间。这个人是安德烈公爵。
  网络来源: |
    https://baike.baidu.com/item/%E7%9A%AE%E5%9F%83%E5%B0%94%C2%B7%E5%88%AB%E7%A5%96%E9%9C%8D%E5%A4%AB/53725822

- 名词: 奥特拉德诺耶
  分类: 地点
  解释: |
    奥特拉德诺耶（Otradnoye），罗斯托夫家的乡村庄园，俄语原意为"快乐之地"。该庄园是《战争与和平》中最重要场景之一，安德烈公爵在此第一次见到娜塔莎，并在月夜听到娜塔莎对索尼娅感叹夜色的美丽，从此爱上了她。本篇中娜塔莎回忆初次在此见到安德烈公爵的情景。
  书中原文: |
    娜塔莎觉得，早在奥特拉德诺耶第一次看见安德烈公爵的时候，就爱上他了。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 彼得堡
  分类: 地点
  解释: |
    俄罗斯帝国首都（1703—1918），又称圣彼得堡，位于涅瓦河注入芬兰湾处。由彼得大帝1703年建立，是俄国政治、文化和外交中心。《战争与和平》中大量场景发生在彼得堡的宫廷和社交沙龙中。本篇中安德烈公爵在向父亲请求婚事、获得一年推迟的同意后，三个星期后回到彼得堡。
  书中原文: |
    安德烈公爵在他最后那一晚离开罗斯托夫家以后，过了三个星期又回到彼得堡。
  网络来源: |
    https://baike.baidu.com/item/%E5%9C%A3%E5%BD%BC%E5%BE%97%E5%A0%A1

- 名词: 爱情图
  分类: 物件
  解释: |
    当时在俄国贵族社交圈中流行的爱情寓意游戏图或爱情主题的图册。薇拉借以影射鲍里斯对娜塔莎的爱慕之情，体现当时贵族年轻人之间以游戏方式表达爱情的社交风尚。
  书中原文: |
    "您知道，伯爵，"她对皮埃尔说，"甚至我们可爱的表弟鲍里斯，咱们说句心里话，也深深地陷入温柔乡里……"她是指当时流行的爱情图。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 共济会记录
  分类: 物件
  解释: |
    共济会（Freemasonry）的苏格兰记录原件，属于共济会的内部文件。共济会是一个以道德自我完善为宗旨的秘密结社，起源于欧洲。皮埃尔在精神迷茫时期加入共济会后，曾担任彼得堡共济会的首长，在深夜抄写共济会记录以逃避现实的痛苦。
  书中原文: |
    十一点多钟，皮埃尔走出伯爵夫人的房间，到楼上，坐在烟雾弥漫的斗室的桌旁，身穿一件破旧的睡衣，抄写苏格兰共济会记录原件，这时有一个人走进他的房间。
  网络来源: |
    https://baike.baidu.com/item/%E5%85%B1%E6%B5%8E%E4%BC%9A

- 名词: 纪念册
  分类: 物件
  解释: |
    娜塔莎的纪念册（album），供亲友题诗、作画留念的册子。这是19世纪俄国贵族小姐中常见的风尚，安德烈公爵在纪念册上为娜塔莎题诗，作为表达情意的含蓄方式。
  书中原文: |
    "他还跟你说什么来着？一首什么诗？你念一念……"母亲忧心忡忡地说，她是问安德烈公爵写在娜塔莎纪念册上的一首诗。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 薇拉与安德烈的谈话
  分类: 事件
  解释: |
    在罗斯托夫家的晚会上，薇拉主动与安德烈公爵谈论爱情话题，问他对妹妹娜塔莎的看法——娜塔莎能否忠贞不渝。安德烈以讥讽回应说"一个女人越是不惹人爱，她就越忠贞不渝"，并借鲍里斯的童年爱情来掩饰自己的窘态。这场谈话展现了薇拉自以为是的外交手腕和安德烈公爵内心对娜塔莎的关注。
  书中原文: |
    薇拉看出安德烈公爵对娜塔莎很注意，她认为在晚会上，在真正的晚会上，对于爱情的微妙暗示是不可缺少的，等安德烈公爵独自一人的时候，她立刻抓住机会同他先谈一般的爱情，进而谈到她的妹妹。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 安德烈向皮埃尔表白爱情
  分类: 事件
  解释: |
    安德烈公爵深夜到皮埃尔家，向他倾诉对娜塔莎的爱情。安德烈说他把世界分成两部分——有娜塔莎的地方全是幸福和光明，没有她的地方全是苦闷和黑暗。他决心无论如何要和娜塔莎结婚，包括争取父亲同意。这是小说中安德烈公爵感情最外露的时刻之一，展现了他从消沉到重获生命热情的转变。
  书中原文: |
    "喂，亲爱的，"他说，"昨天我本来想跟你说的，今天就是为这来找你。我从来没有经验过这种事情。我在恋爱啦，亲爱的朋友。"
  网络来源: |
    https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 安德烈向父亲请求婚事
  分类: 事件
  解释: |
    安德烈公爵在向皮埃尔表白的第二天，前往父亲居住的庄园，向老博尔孔斯基公爵请求同意他与娜塔莎的婚事。老公爵以门第不匹配、年龄差距大、把儿子配给"黄毛丫头"于心不忍等理由反对，最终以"推迟一年"作为条件。安德烈理解父亲的意图——要么感情经不住考验，要么父亲在这期间去世。
  书中原文: |
    婚事必须得到父亲的同意，因此，安德烈公爵第二天就去见父亲。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 婚期推迟一年
  分类: 事件
  解释: |
    老博尔孔斯基公爵要求安德烈公爵将婚期推迟一年，作为同意婚事的条件。他要求安德烈出国走一趟、养养身体，并给妹妹找一位德国家庭教师。安德烈清楚父亲希望这段感情经不住时间考验、或者父亲自己在此期间去世。他最终决定服从父亲的意志：订婚但推迟一年结婚。
  书中原文: |
    安德烈公爵清楚地看到，老头子希望他的感情或者他的未来的未婚妻的感情经不住一年的考验，或者他本人——老公爵，在这期间死去，于是，他决定服从父亲的意志：订婚，然后推迟一年结婚。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 娜塔莎三周的等待
  分类: 事件
  解释: |
    安德烈公爵在罗斯托夫家最后一晚离开后过了三个星期没有露面（他去父亲那里请求婚事了）。娜塔莎不知道安德烈去做什么，陷入焦虑和绝望，整天百无聊赖、无精打采，晚上背着人哭泣，觉得所有人都知道她被抛弃了。最后她跑到母亲那里哭诉，像受罚的小孩子一样流泪。
  书中原文: |
    这样过了三个星期。娜塔莎什么地方也不想去，她整天像个影子似的，百无聊赖，无精打采，白天在各屋里闲荡，晚上背着人哭泣，也不到母亲那儿去了。她时常红脸，发脾气。她觉得人人都知道她的失望，笑她，可怜她。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 海伦的盛大招待会
  分类: 事件
  解释: |
    海伦·瓦西里耶夫娜伯爵夫人（皮埃尔的妻子）在莫斯科举办的隆重社交招待会，出席者包括法国大使、一位与她过从甚密的亲王以及众多名媛绅士。这场招待会与安德烈向皮埃尔表白的场景同时发生，皮埃尔心情沉重地穿过大厅抄写共济会记录，以此逃避现实。
  书中原文: |
    这一天，海伦·瓦西里耶夫娜伯爵夫人举行隆重的招待会，出席招待会的有法国大使、不久前才成为伯爵夫人常客的亲王，以及许多名媛和绅士。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 关于西班牙问题的争论
  分类: 事件
  解释: |
    在罗斯托夫家的晚会上，将军与上校之间就拿破仑战争中的西班牙局势展开争论。贝格认为这种"高谈阔论"是成功晚会的标志，特意拉皮埃尔参加。西班牙问题即拿破仑入侵西班牙引发的半岛战争（1808—1814），当时俄法关系复杂，西班牙问题是俄国贵族关注的热点之一。
  书中原文: |
    这时贝格走到皮埃尔面前，再三请他参加将军和上校之间关于西班牙问题的争论。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/%E5%8D%8A%E5%B2%9B%E6%88%98%E4%BA%89

- 名词: 共济会
  分类: 概念
  解释: |
    共济会（Freemasonry），起源于中世纪的秘密结社，以道德自我完善、兄弟友爱和慈善为宗旨，使用象征性仪式和符号。在《战争与和平》中，共济会是皮埃尔精神探索的重要阶段。他在迷茫期加入共济会，希望通过道德自我修养改变生活，后因发现会员们并非真心实践教义而失望。
  书中原文: |
    不论是对自己的妻子，还是对娜塔莎和安德烈公爵，他都一律极力避免去想。同永恒比起来，他又觉得一切都微不足道，他心中又提出一个问题："为了什么？"于是日日夜夜他都在强迫自己埋头做共济会的工作，希望借此驱逐恶魔的来临。
  网络来源: |
    https://baike.baidu.com/item/%E5%85%B1%E6%B5%8E%E4%BC%9A

- 名词: 姻缘天定
  分类: 概念
  解释: |
    中国传统文化中婚姻由上天注定的观念，在《战争与和平》中老伯爵夫人对娜塔莎说"姻缘是天定的"来安慰她。这反映了俄罗斯东正教文化中也存在类似的宿命论婚姻观，即认为人的婚姻是由上帝安排的命运。
  书中原文: |
    "妈妈，续弦是不是怪丢人的？" / "别说啦，娜塔莎。祈祷上帝吧。姻缘是天定的。"
  网络来源: |
    https://baike.baidu.com/item/%E5%A9%9A%E7%BC%98

- 名词: 门第观念
  分类: 概念
  解释: |
    19世纪俄国贵族社会严格的门第等级观念。老博尔孔斯基公爵认为娜塔莎虽然出身贵族（罗斯托夫家族），但门第不够高、家产不够厚，与博尔孔斯基家族不相匹配。这种视婚姻为家族联盟、讲究门当户对的观念是当时俄国贵族社会的普遍现象，也是安德烈与娜塔莎婚事的主要障碍。
  书中原文: |
    第一，这桩婚事，从门第、家产和声望方面看，并不美满。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 表亲联姻
  分类: 概念
  解释: |
    俄国贵族社会中表兄妹之间通婚的习俗。在《战争与和平》中，薇拉说"表亲表亲，天然联亲"，以此影射娜塔莎和鲍里斯（表兄妹）之间的童年爱情。在19世纪俄国乃至欧洲贵族阶层，表亲联姻是常见且被社会接受的现象，有助于维护家族财产和血统。
  书中原文: |
    "是的。您知道，表兄妹相处，往往会闹恋爱的。表亲表亲，天然联亲。您说是吧？"
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E8%A1%A8%E4%BA%B2%E8%81%94%E5%A7%BB

- 名词: 续弦
  分类: 概念
  解释: |
    指男子丧妻后再娶。在《战争与和平》中，安德烈公爵的妻子丽莎在生下儿子尼古连卡后难产去世，他因此成为鳏夫。当安德烈向娜塔莎求婚时，娜塔莎问母亲"续弦是不是怪丢人的？"，反映出当时社会对续弦可能存在的负面看法——即认为续弦对女性而言不够体面。
  书中原文: |
    "妈妈，续弦是不是怪丢人的？" / "别说啦，娜塔莎。祈祷上帝吧。姻缘是天定的。"
  网络来源: |
    https://baike.baidu.com/item/%E7%BB%AD%E5%BC%A6

- 名词: 疑心病
  分类: 概念
  解释: |
    指皮埃尔因妻子不忠和社交压力而产生的抑郁焦虑情绪。皮埃尔在得知海伦与亲王过从甚密后，感觉自己快要得疑心病了，对人生感到虚幻和灰暗，拼命通过共济会工作来与心理病魔作斗争。这体现了托尔斯泰对人物心理状态的细腻刻画。
  书中原文: |
    自从那次舞会后，皮埃尔感觉自己快要得疑心病了，他拼命跟病魔斗争。在亲王和他的妻子过从甚密以后，皮埃尔突然被任命为宫中侍从，从此他在交际场所总觉得心情沉重，抬不起头来。
  网络来源: |
    https://baike.baidu.com/item/%E7%96%91%E5%BF%83%E7%97%85
