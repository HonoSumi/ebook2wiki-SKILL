- 名词: 别祖霍夫伯爵
  分类: 人物
  解释: |
    小说《战争与和平》中的重要贵族人物。全名基里尔·弗拉基米罗维奇·别祖霍夫（Кирилл Владимирович Безухов），是叶卡捷琳娜时代的达官要人，拥有巨额财富。他是私生子皮埃尔的父亲，临终前立下遗嘱将全部财产留给皮埃尔，并请求沙皇承认其为嫡子。他在小说开篇不久即因第六次中风发作而去世，围绕其遗产的争夺是全书开篇阶段的核心情节之一。
  书中原文: |
    当罗斯托夫家大厅里，在乐师们因疲倦而胡乱演奏的音乐伴奏下正跳第六节英格兰舞、劳累的仆人和厨师正准备晚餐的时候，别祖霍夫伯爵第六次发作了中风病。医生宣布复元无望，已经给病人做了默祷和圣餐礼，而且做了终敷礼的准备。
  网络来源: |
    https://baijiahao.baidu.com/s?id=1789163145538957064

- 名词: 瓦西里公爵
  分类: 人物
  解释: |
    小说《战争与和平》中的反面贵族角色。全名瓦西里·谢尔盖耶维奇·库拉金公爵（Василий Сергеевич Курагин），是库拉金家族的家长。他贪婪自私、虚伪善变、精于钻营。在老别祖霍夫伯爵病危时，他守在病榻旁企图争夺遗产，试图说服大公爵小姐卡季什找出遗嘱加以销毁。他也是皮埃尔的妻子海伦和花花公子阿纳托利的父亲，代表了19世纪初俄国上流社会堕落贵族的典型。
  书中原文: |
    这时，瓦西里公爵推开了大公爵小姐的房门。屋里半明半暗，圣像前只点着两盏小油灯。"怎么样，亲爱的？"瓦西里公爵说，他握起大公爵小姐的手，习惯地往下一按。
  网络来源: |
    https://zhuanlan.zhihu.com/p/495064846

- 名词: 卡捷琳娜·谢苗诺夫娜
  分类: 人物
  解释: |
    小说《战争与和平》中的角色，别祖霍夫家的大公爵小姐。她是老别祖霍夫伯爵的侄女，小名卡季什（Катишь），是三姐妹中的大姐。在老伯爵临终之际，她与瓦西里公爵密谋争夺遗嘱，企图阻止私生子皮埃尔继承财产。她性格强硬、情绪化，认为安娜·米哈伊洛夫娜是幕后主使，最终在遗产争夺中败给皮埃尔，未能如愿。
  书中原文: |
    "可是，卡季什，这是明摆着的事啊。到那时候，他就成为全部遗产的唯一合法继承人了，你们连自己的一份也得不到。"大公爵小姐用疑问的目光看了看瓦西里公爵，但他弄不清她是在考虑他对她说的话呢，还是只是这样看着他……
  网络来源: |
    https://blog.csdn.net/qq_37687649/article/details/117660892

- 名词: 安娜·米哈伊洛夫娜
  分类: 人物
  解释: |
    小说《战争与和平》中的配角，全名安娜·米哈伊洛夫娜·德鲁别茨卡娅（Анна Михайловна Друбецкая）。她是一位没落贵族出身的公爵夫人，将全部希望寄托在独生子鲍里斯的前程上，为此不惜四处奔走钻营。她是别祖霍夫伯爵的远房亲戚，在伯爵临终时暗中帮助皮埃尔，成功让皮埃尔继承遗产。卡捷琳娜·谢苗诺夫娜痛恨她，称她为"卑鄙、无耻的女人"。她是托尔斯泰笔下坚韧而精于算计的贵族母亲形象。
  书中原文: |
    "就是您的被保护人，您的亲爱的安娜·米哈伊洛夫娜，这种卑鄙、无耻的女人，给我当使唤丫头我都不要。"
  网络来源: |
    https://pages.haomooc.com/index.php?s=book&c=extend&id=9404

- 名词: 罗兰医生
  分类: 人物
  解释: |
    小说《战争与和平》中的小角色，法文名为Dr. Lorrain。他是老别祖霍夫伯爵临终时的主治医生，在伯爵的宅邸中守候病情。托尔斯泰描写他姿态优雅地坐在叶卡捷琳娜女皇画像下面，能"确切了解并预言病人的情况"并因此感到满足。他预测伯爵将在当晚去世，体现了托尔斯泰在刻画死亡场景时对旁观者各怀心思的细腻描写。
  书中原文: |
    二公爵小姐从病人卧室走出来，眼睛哭红了，她在罗兰医生旁边坐下。罗兰医生用臂肘支在桌上，姿态优雅地坐在叶卡捷琳娜女皇画像下面。
  网络来源: |
    https://online.flipbuilder.com/eeqi/leca/files/basic-html/page155.html

- 名词: 罗斯托夫伯爵
  分类: 人物
  解释: |
    小说《战争与和平》中的角色，全名伊利亚·安德烈伊奇·罗斯托夫伯爵（Илья Андреевич Ростов）。他是罗斯托夫家族的家长，娜塔莎、尼古拉、薇拉和彼佳的父亲。他性格善良、热情好客、慷慨大方，但缺乏理财头脑，经营产业不善，导致家族逐渐走向破产。他的原型是托尔斯泰的祖父伊利亚·托尔斯泰。在本章中，他在家中举办舞会，并亲自跳了丹尼拉·库波尔舞蹈。
  书中原文: |
    "咱们当年就是这样跳舞的，亲爱的。"伯爵说。
  网络来源: |
    https://zh.wikipedia.org/wiki/战争与和平人物列表

- 名词: 玛丽亚·德米特里耶夫娜
  分类: 人物
  解释: |
    小说《战争与和平》中的重要配角，全名玛丽亚·德米特里耶夫娜·阿赫罗西莫娃（Марья Дмитриевна Ахросимова），娜塔莎·罗斯托娃的教母。她在社交界以直言无忌、心地豪爽著称，绰号"可怕的龙"（le terrible dragon）。她任何时候都讲俄语，在贵族崇尚法语的背景下尤显独特。她被书中描述为"连皇族都知道她"，"大家都毫无例外地尊敬她和害怕她"。
  书中原文: |
    "《丹尼拉·库波尔》就是这样跳！"玛丽亚·德米特里耶夫娜呼哧呼哧喘着气，卷起袖子，一面说。
  网络来源: |
    https://yunshuwu.cn/chap/8487.html

- 名词: 德米特里·奥努夫里伊奇
  分类: 人物
  解释: |
    小说《战争与和平》中的小角色，身份是别祖霍夫伯爵家的家庭法律顾问。瓦西里公爵为了说服卡捷琳娜·谢苗诺夫娜接受皮埃尔为合法继承人的事实，引用了他的法律意见作为依据。他虽然出场极少，但在遗产继承的冲突中起到了为情节提供法律依据的重要作用。
  书中原文: |
    "我刚才和德米特里·奥努夫里伊奇（这人是家庭法律顾问）谈过，他也是这样说。"瓦西里公爵说。
  网络来源: |
    http://bcc.blcu.edu.cn/show/1172096806_5_7_-1_-1/0

- 名词: 卜列格怀表
  分类: 物件
  解释: |
    即宝玑（Breguet）怀表，当时俄国贵族使用的瑞士顶级奢侈钟表。宝玑由亚伯拉罕-路易·宝玑（Abraham-Louis Breguet）于1775年在巴黎创立，被誉为"现代制表之父"，发明了陀飞轮、宝玑游丝、自动上链等重大技术。宝玑表在19世纪的俄国贵族中极为流行，是身份和品位的象征，普希金、巴尔扎克等作家也常在作品中提及。
  书中原文: |
    医生看了看卜列格怀表。
  网络来源: |
    https://zh.m.wikipedia.org/zh/宝玑

- 名词: 终敷礼
  分类: 习俗
  解释: |
    东正教七大圣事之一，又称终傅或病人傅油圣事，俄语称为Елеосвящение。指在信徒临终之际，由教士将祝圣过的橄榄油涂抹在信徒面部并诵念祈祷经文，目的是帮助信徒忍受痛苦、赦免罪过，使其安心见上帝。它的圣经依据来自《雅各伯书》5章14-15节。在本章中，医生已为别祖霍夫伯爵做了终敷礼的准备，表明他的生命已到弥留之际。
  书中原文: |
    医生宣布复元无望，已经给病人做了默祷和圣餐礼，而且做了终敷礼的准备。
  网络来源: |
    https://baike.baidu.com/item/终傅/0

- 名词: 圣餐礼
  分类: 习俗
  解释: |
    基督教最重要的圣事之一，东正教称圣体血或感恩礼（Eucharist），源于希腊语"感谢"之意。根据《圣经》记载，耶稣在最后晚餐中拿起饼和酒祝祷后分给门徒，说"这是我的身体"和"这是我的血"。东正教相信饼和酒经过祝圣后真实地转化为基督的身体和宝血。圣餐礼是东正教敬拜和生命核心，被称为"事奉圣礼"（Divine Liturgy）。
  书中原文: |
    医生宣布复元无望，已经给病人做了默祷和圣餐礼，而且做了终敷礼的准备。
  网络来源: |
    https://baike.baidu.com/item/圣餐/1013498

- 名词: 英格兰舞
  分类: 习俗
  解释: |
    即英格兰乡村舞（English Country Dance），起源于16世纪英格兰的民间社交舞蹈。在伊丽莎白一世时期进入宫廷，1651年经约翰·普莱福德（John Playford）出版《英格兰舞蹈大全》而系统化。舞者成对排列，主要有轮舞型、双纵队型和几何图案型三种队形。该舞蹈在17至19世纪传遍欧洲大陆和美洲，影响了法国的行列舞和美国的方舞。在19世纪俄国贵族舞会上极为流行。
  书中原文: |
    当罗斯托夫家大厅里，在乐师们因疲倦而胡乱演奏的音乐伴奏下正跳第六节英格兰舞、劳累的仆人和厨师正准备晚餐的时候，别祖霍夫伯爵第六次发作了中风病。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/乡村舞

- 名词: 丹尼拉·库波尔
  分类: 习俗
  解释: |
    19世纪俄国贵族舞会中流行的一种英国对舞（contradance），在俄语中被本土化称为"丹尼拉·库波尔"（Данила Купер）。其名称来源于一位名叫库珀（Cooper）的英国作曲家。在《战争与和平》中，老罗斯托夫伯爵与玛丽亚·德米特里耶夫娜共舞这一段，是小说中极为著名的欢乐场景，体现了托尔斯泰对旧式俄国贵族生活的深情描绘。
  书中原文: |
    "《丹尼拉·库波尔》就是这样跳！"玛丽亚·德米特里耶夫娜呼哧呼哧喘着气，卷起袖子，一面说。
  网络来源: |
    https://groups.google.com/g/Russian-folk-dance/c/6U8Nyge9y7k

- 名词: 私生子
  分类: 概念
  解释: |
    指非婚生子女。在19世纪沙俄法律中，私生子的法律地位极为不利：无权继承父亲的财产和姓氏，被剥夺了大多数合法权利。根据1902年沙俄法律，私生子虽可证明生父身份并获得抚养费，但禁止生父认领，且无继承权。小说中皮埃尔正是私生子，这正是大公爵小姐卡季什试图否定他继承权的法律依据——她反复强调"私生子没有继承权"。私生子能否继承遗产是小说明线情节的一大悬念。
  书中原文: |
    "竟有这样的事！"大公爵小姐打断他的话，冷笑着，眼睛的表情并没有改变，"我是个妇道人家，在您看来，我们都是愚蠢的。但是，据我所知，私生子没有继承权……私生子。"
  网络来源: |
    https://baike.baidu.com/item/罗斯法典/8411466

- 名词: 遗嘱
  分类: 概念
  解释: |
    指财产所有人生前对其遗产进行处分的法律文件。在19世纪俄国贵族社会中，遗嘱继承优先于法定继承，但私生子无权继承父亲财产，除非得到沙皇特别恩准。小说中老别祖霍夫伯爵已立下遗嘱将全部财产留给私生子皮埃尔，并写信请求沙皇承认皮埃尔为嫡子。大公爵小姐和瓦西里公爵企图销毁遗嘱阻止皮埃尔继承，围绕遗嘱的明争暗斗构成了小说开篇的重要戏剧冲突。
  书中原文: |
    "去年冬天伯爵已经立下遗嘱，把他的全部财产并没有留给咱们直系继承人，都留给皮埃尔了。"
  网络来源: |
    https://www.faxin.cn/lib/flwx/FlqkContent.aspx?gid=F97801

- 名词: 中风
  分类: 事件
  解释: |
    医学上指脑血管意外（apoplexy/stroke），中医病名"中风"，西医称"apoplexy"，指因脑部血管破裂或堵塞引起的突发性神经系统疾病。小说中老别祖霍夫伯爵已是第六次发作中风，德国医生评论"从来没有犯了三次中风还能活过来的"，暗示其病情的致命性。19世纪的欧洲医学中，中风常通过放血、酒石类药物等方法治疗，医生的诊断和预言在小说中承担了预示死亡的重要叙事功能。
  书中原文: |
    从来没有犯了三次中风还能活过来的。他本来是个精力多么充沛的男子汉啊！这笔遗产将来留给谁呢？
  网络来源: |
    https://news.medlive.cn/neuro/info-progress/show-59516_100.html

- 名词: 圣像
  分类: 物件
  解释: |
    基督教（尤其是东正教）中对耶稣基督、圣母、圣徒和天使的神圣画像，希腊语称εικων（icon）。在东正教传统中，圣像被视为"朝向另一世界的窗口"，被用于礼拜和祈祷活动。圣像画有严格的规范：平面化、非写实、金色背景象征神圣荣耀。东正教相信圣像与所描绘的原型有神秘的联系，通过圣像可以向上帝祈祷。圣像在俄国贵族家庭的卧室中常见，小说中别祖霍夫公爵小姐的房间内便在圣像前点着小油灯。
  书中原文: |
    屋里半明半暗，圣像前只点着两盏小油灯。神香和鲜花散发着馨香。
  网络来源: |
    https://baike.baidu.com/item/圣像/57206978
