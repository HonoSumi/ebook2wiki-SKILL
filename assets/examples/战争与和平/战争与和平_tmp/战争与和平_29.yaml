- 名词: '比利宾'
  分类: '人物'
  解释: '俄国作家列夫·托尔斯泰小说《战争与和平》中的人物，一位在维也纳任职的俄国外交官，是安德烈公爵的好友。他精于辞令、机智幽默，善于编造俏皮话，对政治局势有冷静敏锐的洞察力，但性格上略显玩世不恭和冷漠。'
  书中原文: '"别开玩笑了，比利宾。"博尔孔斯基说。 / "亲爱的，您是英雄。" 比利宾说。'
  网络来源: 'https://pages.haomooc.com/index.php?s=book&c=extend&id=9432'

- 名词: '魏罗特尔'
  分类: '人物'
  解释: '奥地利将军，在1805年第三次反法同盟战争中接替阵亡的施米特担任俄奥联军的参谋长。他在奥斯特里茨战役前制定了联军的进攻计划，该计划遭到库图佐夫反对，但获得沙皇亚历山大一世支持，最终导致联军惨败。'
  书中原文: '"库图佐夫跟巴格拉季翁和魏罗特尔一起在一家农舍里。魏罗特尔是接替阵亡的施米特的奥地利将军。"'
  网络来源: 'https://m.zhangyue.com/readbook/11536013/18.html'

- 名词: '施米特'
  分类: '人物'
  解释: '约翰·海因里希·冯·施密特（Johann Heinrich von Schmitt，1743—1805），神圣罗马帝国中将，哈布斯堡王朝最成功的参谋长之一。在1805年迪恩施泰因战役（克雷姆斯战役）中率军出击时被友军误击阵亡。'
  书中原文: '"魏罗特尔是接替阵亡的施米特的奥地利将军。"'
  网络来源: 'https://zh.wikipedia.org/zh-tw/%E7%BA%A6%E7%BF%B0%C2%B7%E6%B5%B7%E5%9B%A0%E9%87%8C%E5%B8%8C%C2%B7%E5%86%AF%C2%B7%E6%96%BD%E5%AF%86%E7%89%B9'

- 名词: '布吕恩'
  分类: '地点'
  解释: '德语Brünn的音译，今捷克城市布尔诺（Brno），历史上属摩拉维亚地区。在拿破仑战争期间，1805年奥斯特里茨战役前，拿破仑曾在此组织防御并集结兵力，是重要的战略枢纽。'
  书中原文: '"在布吕恩的全体宫廷人员都在收拾行李，笨重的物件已经送到奥尔米茨。"'
  网络来源: 'https://baijiahao.baidu.com/s?id=1607646889397959165'

- 名词: '奥尔米茨'
  分类: '地点'
  解释: '德语Olmütz的音译，今捷克城市奥洛穆茨（Olomouc）。在1805年拿破仑战争中，俄奥联军在此集结并驻扎，沙皇亚历山大一世和奥地利皇帝弗朗茨二世在此决定主动出击与拿破仑决战，最终导致奥斯特里茨战役的惨败。'
  书中原文: '"据说是到奥尔米茨。奥尔米茨是个不错的城市。"'
  网络来源: 'https://www.qulishi.com/news/201411/20996.html'

- 名词: '克雷姆斯'
  分类: '地点'
  解释: '奥地利多瑙河畔的城市克雷姆斯（Krems an der Donau），位于维也纳上游约73公里。1805年11月，库图佐夫率领俄奥联军在此渡过多瑙河并炸毁桥梁，随后在此附近与法军爆发了克雷姆斯战役（迪恩施泰因战役）。'
  书中原文: '"连他自己也不知去哪儿才能找到部队，又担心在去克雷姆斯的路上被法军俘获。"'
  网络来源: 'https://en.wikipedia.org/?curid=4799438'

- 名词: '茨奈姆'
  分类: '地点'
  解释: '德语Znaim的音译，今捷克城市兹诺伊莫（Znojmo），位于维也纳以北约80公里。1809年拿破仑战争中，法军与奥地利军队在此激战，随后签署了《茨奈姆停战协议》，事实上结束了第五次反法同盟的战事。'
  书中原文: '"咱们要在茨奈姆过夜。"'
  网络来源: 'https://zh.wikipedia.org/zh-hant/%E5%85%B9%E5%A5%88%E5%A7%86%E5%81%9C%E6%88%98%E5%8D%8F%E8%AE%AE'

- 名词: '克雷姆斯战役'
  分类: '事件'
  解释: '1805年11月11日发生在奥地利克雷姆斯附近迪恩施泰因的战役，也称迪恩施泰因战役。俄奥联军在库图佐夫指挥下设伏围攻法军莫蒂埃元帅的部队，法军损失惨重。此战挫败了拿破仑围歼库图佐夫部的计划，使俄军得以安全撤退至奥尔米茨。'
  书中原文: '"他带着几分讥笑的神情问起安德烈公爵会见奥地利皇帝的详情，关于克雷姆斯战役在宫廷听到什么反应，还问到几个他们都认识的女人。"'
  网络来源: 'https://en.wikipedia.org/wiki/Battle_of_Durrenstein'

- 名词: '掷弹兵'
  分类: '物件'
  解释: '17世纪中叶出现的欧洲陆军兵科，最初指能投掷手榴弹的精锐步兵。到拿破仑时代，手榴弹虽已退出战场，但掷弹兵称号保留为精锐重步兵的代名词，以身材高大、训练有素著称。在俄国军队中，掷弹兵团被视为精锐部队。'
  书中原文: '"基辅掷弹兵团队，波多尔斯克团队。"'
  网络来源: 'https://baike.baidu.com/item/%E6%8E%B7%E5%BC%B9%E5%85%B5%E8%BF%9B%E8%A1%8C%E6%9B%B2/9245686'
