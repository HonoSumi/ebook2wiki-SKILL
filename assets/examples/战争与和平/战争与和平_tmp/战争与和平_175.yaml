- 名词: 行刑
  分类: 事件
  解释: 指拿破仑军队占领莫斯科后，法军对俄国"纵火犯"嫌疑人的公开处决。皮埃尔在莫斯科被法军逮捕后，目睹了法军处决俄国平民的残酷场面，这一经历给他带来巨大的精神冲击。
  书中原文: "皮埃尔觉得，行刑时曾经使他惊慌失措的、在俘虏期间不再觉察到的命运的力量，现在又掌握住他的生存了。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 灵魂的不朽
  分类: 概念
  解释: 皮埃尔在法军俘虏营中产生的重要哲学领悟。在被命运力量压迫的极端处境下，皮埃尔认识到外在力量可以囚禁他的身体，但无法触及他内在不朽的灵魂。这一思想体现了托尔斯泰对生命本质的思考。
  书中原文: "他们俘虏了谁，我吗？俘虏我，就是俘虏我不朽的灵魂！哈，哈，哈！……哈，哈，哈！"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 命运的力量
  分类: 概念
  解释: 在《战争与和平》中，命运的力量是贯穿始终的哲学主题之一。皮埃尔在行刑后和俘虏期间体会到一种不可抗拒的命运力量正在主宰他的生存，但同时也发现灵魂的内在力量可以与之抗衡。
  书中原文: "皮埃尔觉得，行刑时曾经使他惊慌失措的、在俘虏期间不再觉察到的命运的力量，现在又掌握住他的生存了。他不寒而栗；但是他觉得，随着命运力量对他压力的增大，那不受命运约束的他灵魂中的生命力就越发增长和巩固。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 自由与约束
  分类: 概念
  解释: 托尔斯泰在《战争与和平》中探讨的核心哲学命题之一。皮埃尔在被俘期间领悟到：外在环境的约束越强，内在灵魂的自由反而越发强大。这一辩证关系的思考体现了托尔斯泰的宿命论与自由意志并存的哲学观。
  书中原文: "随着命运力量对他压力的增大，那不受命运约束的他灵魂中的生命力就越发增长和巩固。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 库图佐夫的战略
  分类: 概念
  解释: 俄国元帅库图佐夫在1812年战争中坚持的核心军事思想，即"忍耐和时间是无敌勇士"。他反对冒险进攻，主张保存实力、拖延时间，让法军在俄国腹地自行消耗。这一战略最终导致拿破仑大军在冬季撤退中覆灭。
  书中原文: "他们应当明白，发动进攻，我们只有失败。忍耐和时间，是我的无敌勇士！"
  网络来源: https://baike.baidu.com/item/%E7%B1%B3%E5%93%88%E4%BC%8A%E5%B0%94%C2%B7%E4%BC%8A%E6%8B%89%E9%87%8C%E5%A5%A5%E8%AF%BA%E7%BB%B4%E5%A5%87%C2%B7%E5%BA%93%E5%9B%BE%E4%BD%90%E5%A4%AB

- 名词: 拿破仑的和谈建议
  分类: 事件
  解释: 1812年10月，拿破仑占领莫斯科后陷入困境，派军使向库图佐夫送去和谈信件。此前拿破仑已派洛里斯顿伯爵前去求和，但均被库图佐夫拒绝。库图佐夫认为和谈根本谈不上，坚持继续战争。
  书中原文: "十月初，又有一个军使带着拿破仑建议和谈的信来见库图佐夫，诡称信是从莫斯科发出的，而当时拿破仑已经到了离库图佐夫前面不远的旧卡卢日斯卡雅大路。"
  网络来源: https://baike.baidu.com/item/%E7%B1%B3%E5%93%88%E4%BC%8A%E5%B0%94%C2%B7%E4%BC%8A%E6%8B%89%E9%87%8C%E5%A5%A5%E8%AF%BA%E7%BB%B4%E5%A5%87%C2%B7%E5%BA%93%E5%9B%BE%E4%BD%90%E5%A4%AB

- 名词: 旧卡卢日斯卡雅大路
  分类: 地点
  解释: 通往卡卢加城的古老道路，位于莫斯科西南方向。1812年拿破仑从莫斯科撤退时试图通过此路向卡卢加方向撤退，以寻找未被战争破坏的补给区。但在小雅罗斯拉维茨战役后被俄军截断，迫使法军改道斯摩棱斯克大道。
  书中原文: "而当时拿破仑已经到了离库图佐夫前面不远的旧卡卢日斯卡雅大路。"
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%B0%8F%E9%9B%85%E7%BD%97%E6%96%AF%E6%8B%89%E9%9F%A6%E8%8C%A8%E6%88%98%E5%BD%B9

- 名词: 塔鲁丁诺战役
  分类: 事件
  解释: 1812年10月18日（俄历10月6日），俄军在塔鲁丁诺对法军缪拉部队发动突袭的战役。这是俄军退出莫斯科后的首次主动进攻，取得了胜利，迫使拿破仑加速从莫斯科撤退，标志着俄法战争战略转折点的到来。
  书中原文: "士兵和军官又要求行动了。参谋部的将军们一想起在塔鲁丁诺轻易地就打了一个胜仗，就很兴奋，都在库图佐夫面前坚决主张执行多洛霍夫的建议。"
  网络来源: https://en.wikipedia.org/wiki/Battle_of_Tarutino

- 名词: 多洛霍夫游击队
  分类: 物件
  解释: 指《战争与和平》中费奥多尔·多洛霍夫指挥的俄军敌后游击支队。在塔鲁丁诺左侧一带活动，曾送来关于福明斯克出现布鲁西埃师的重要情报。多洛霍夫是小说中勇敢而冷酷的军官，在1812年战争期间担任游击队指挥官。
  书中原文: "在塔鲁丁诺左边一带行动的多洛霍夫的游击队送来一份报告，说在福明斯克出现布鲁西埃师的部队，这个师和其他部队失掉联系，很容易予以歼灭。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 福明斯克
  分类: 地点
  解释: 俄罗斯卡卢加州的一个村庄，位于莫斯科西南方向。在1812年俄法战争中，法军布鲁西埃师曾驻扎于此。后来发现法军全部主力（包括拿破仑本人）均已转移到该地，改变了俄军对形势的判断。
  书中原文: "说在福明斯克出现布鲁西埃师的部队，这个师和其他部队失掉联系，很容易予以歼灭。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 布鲁西埃师
  分类: 物件
  解释: 拿破仑大军的一个师，由布吕耶尔（Bruyère）将军指挥，隶属于南苏蒂将军第1骑兵军。在1812年战争期间，该师驻扎在福明斯克，与其他法军部队失掉联系，被俄军游击队发现后成为攻击目标。
  书中原文: "说在福明斯克出现布鲁西埃师的部队，这个师和其他部队失掉联系，很容易予以歼灭。"
  网络来源: https://en.wikipedia.org/wiki/Jean_Pierre_Joseph_Brugui%C3%A8re

- 名词: 斯摩棱斯克保卫战
  分类: 事件
  解释: 1812年8月16日至18日，拿破仑率约17.5万法军进攻斯摩棱斯克，巴克莱·德·托利率约13万俄军防守。俄军在多赫图罗夫等人指挥下顽强抵抗两天后有序撤退，保存了有生力量。虽然城市被法军占领，但俄军主力未被歼灭。
  书中原文: "他患着寒热病，率两万人奔赴斯摩棱斯克，抗击拿破仑全部军队来保卫那个城市。在斯摩棱斯克，在莫洛霍夫斯基城门，他在寒热病发作时刚刚昏睡过去，攻城的炮声把他惊醒了，斯摩棱斯克坚守了整整一天。"
  网络来源: https://zh.wikipedia.org/zh-cn/%E6%96%AF%E6%91%A9%E6%A3%B1%E6%96%AF%E5%85%8B%E6%88%98%E5%BD%B9_(1812%E5%B9%B4)

- 名词: 小雅罗斯拉维茨战役
  分类: 事件
  解释: 1812年10月24日发生在莫斯科西南120公里处的关键战役。俄军在多赫图罗夫和拉耶夫斯基指挥下，与法军欧仁·博阿尔内所部激战，小镇八次易手。虽然法军最终占领小镇，但俄军成功迫使拿破仑放弃向卡卢加撤退，转而沿已被破坏的斯摩棱斯克大道退却，导致法军随后覆灭。
  书中原文: "又是多赫图罗夫被派到福明斯克，从那里又到小雅罗斯拉维茨，在那里同法国人打了最后一仗，显然，法国人的灭亡也就是从那里开始的。"
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%B0%8F%E9%9B%85%E7%BD%97%E6%96%AF%E6%8B%89%E9%9F%A6%E8%8C%A8%E6%88%98%E5%BD%B9

- 名词: 阿里斯托沃村
  分类: 地点
  解释: 俄罗斯卡卢加州的一个村庄，位于莫斯科西南方向。1812年俄法战争期间，多赫图罗夫将军在率军前往福明斯克途中在此停留过夜，正是在这里他接到了谢斯拉温等游击队送来的重要情报。
  书中原文: "十月十日，多赫图罗夫在去福明斯克的途中，在阿里斯托沃村停下来，准备正确地执行所接受的命令。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 菲格纳游击队
  分类: 物件
  解释: 由亚历山大·菲格纳（Alexander Figner）上校指挥的俄军游击支队。菲格纳以擅长伪装、间谍活动而闻名，常穿着法军制服潜入敌后侦察。1812年间他的游击支队隶属于多赫图罗夫将军指挥，与多洛霍夫、谢斯拉温游击队协同行动。
  书中原文: "当时多赫图罗夫所指挥的除了多洛霍夫游击队，只有菲格纳和谢斯拉温两支不大的游击队。"
  网络来源: https://zh.wikipedia.org/zh-cn/A.S.Figner

- 名词: 谢斯拉温游击队
  分类: 物件
  解释: 由亚历山大·谢斯拉温（Alexander Seslavin）指挥的俄军"飞行支队"（游击支队）。他主要采用正面作战方式区别于菲格纳的伏击战术。1812年10月11日，谢斯拉温抓获一名法国近卫军俘虏，从而发现了法军主力已抵达福明斯克的关键情报。
  书中原文: "十月十一日晚，谢斯拉温带一名法国近卫军俘虏到阿里斯托沃村来见司令官。俘虏说，那天进入福明斯克的军队，是整个大军的前卫，拿破仑就在里面。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 博尔霍维季诺夫
  分类: 人物
  解释: 《战争与和平》中的一名俄国军官，被多赫图罗夫将军选派为信使，在深夜冒着泥泞道路骑马狂奔三十俄里（约32公里），从阿里斯托沃村到列塔舍夫卡俄军总司令部传递重要军事情报。托尔斯泰对其深夜赶路的场景有细腻描写。
  书中原文: "为此选派一名精干的军官博尔霍维季诺夫，他除了把书面报告递上去，还要口头把全部情况说清楚。夜里十一点多钟，博尔霍维季诺夫接受了书面报告和口头指示，就带一名哥萨克和几匹替换的马，向总部驰去了。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 列塔舍夫卡
  分类: 地点
  解释: 俄罗斯的一个村庄，1812年俄法战争期间，俄军总司令部曾设于此。博尔霍维季诺夫从阿里斯托沃村出发，在泥泞道路上骑行一个半小时，于凌晨一点多钟到达列塔舍夫卡，在一座农舍中找到了值勤将军科诺夫尼岑。
  书中原文: "博尔霍维季诺夫换了两次马，在胶粘的泥路上一个半小时跑了三十俄里，凌晨一点多钟来到列塔舍夫卡。他在篱笆上挂着'总司令部'牌子的农舍前下了马。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 青苹果的比喻
  分类: 概念
  解释: 库图佐夫在深夜沉思时使用的著名比喻，表达其战略哲学。他认为不宜过早与法军进行决战，就像不应采摘未成熟的苹果一样——青苹果被摘下既毁了果实又毁了树。应等待时机成熟，让法军在内部消耗中自行崩溃。
  书中原文: "他知道，苹果还青的时候，不要去摘它。熟了的时候，它自然会掉下来，而摘下青的，既毁了苹果又毁了树，而且还酸掉你的牙。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 和谈
  分类: 概念
  解释: 1812年拿破仑占领莫斯科后，陷入缺乏补给和冬季将至的困境，三次试图与俄国进行和平谈判。拿破仑先后派洛里斯顿伯爵等使节向库图佐夫和沙皇亚历山大一世求和，但均遭拒绝。库图佐夫坚持"和谈根本谈不上"，继续执行消耗战略。
  书中原文: "库图佐夫对这封信的答复和对洛里斯顿带来的第一封信的答复一样：他说，和谈根本谈不上。"
  网络来源: https://baike.baidu.com/item/%E7%B1%B3%E5%93%88%E4%BC%8A%E5%B0%94%C2%B7%E4%BC%8A%E6%8B%89%E9%87%8C%E5%A5%A5%E8%AF%BA%E7%BB%B4%E5%A5%87%C2%B7%E5%BA%93%E5%9B%BE%E4%BD%90%E5%A4%AB

- 名词: 值勤将军
  分类: 概念
  解释: 俄军总司令部中的高级职务，负责处理日常军务和紧急情报。小说中由彼得·科诺夫尼岑担任此职。他恪尽职守，总是敞着门睡觉以便任何信使都能叫醒他，在战斗时亲临前线冒着炮火指挥。
  书中原文: "自从被任命为值勤将军，他总是敞着门睡觉，吩咐每一个来人都可以叫醒他，在战斗的时候，他总是冒着炮火，库图佐夫为此责备他，不敢派遣他。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 总司令部
  分类: 物件
  解释: 俄军在1812年战争中的最高统帅部，当时设在列塔舍夫卡村的一所农舍中。门口挂着"总司令部"的牌子。库图佐夫作为总司令在此居住和办公，值勤将军科诺夫尼岑及其副官谢尔比宁也在同一农舍中。
  书中原文: "他在篱笆上挂着'总司令部'牌子的农舍前下了马，把马丢下就走进昏暗的农舍的过厅。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 信使
  分类: 概念
  解释: 在19世纪战争中传递军事情报和命令的军官。由于没有无线电通讯，紧急军情必须由信使骑马传递。小说中的博尔霍维季诺夫就是典型例子，他在深夜冒着泥泞道路骑行三十俄里传送重要情报。
  书中原文: "快让我去见值勤的将军！有重要的事！他在黑暗中对一个正在起身的哧哼着鼻子的人说。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 法军前卫
  分类: 物件
  解释: 法军行军时部署在主力前方的先头部队，负责侦察、警戒和开路。谢斯拉温抓获的一名法国近卫军俘虏供称：进入福明斯克的军队是整个大军的前卫，拿破仑本人就在其中。
  书中原文: "俘虏说，那天进入福明斯克的军队，是整个大军的前卫，拿破仑就在里面，全部军队离开莫斯科已经第五天了。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 新卡卢日斯卡雅大路
  分类: 地点
  解释: 通往卡卢加的一条新道路。1812年10月，拿破仑的法国军队在塔鲁丁诺战役后，突然向左转向新卡卢日斯卡雅大路，试图从西南方向突破俄军防线向卡卢加撤退，从而避开已被战火破坏的斯摩棱斯克大道。
  书中原文: "好像得了癫痫抽风似的，来到缪拉的阵地，似乎准备打一仗，可是忽然无缘无故地向左转到新卡卢日斯卡雅大路，进入原先只有布鲁西埃驻扎的福明斯克。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 法军全部军队
  分类: 物件
  解释: 指多赫图罗夫及其部下发现的一个军事事实：原先以为福明斯克只有布鲁西埃一个师，实际上拿破仑的全部军队都在那里。法军已全部离开莫斯科，沿一条意想不到的路线（旧卡卢日斯卡雅大路）运动。
  书中原文: "这些情报显然表明，原先认为那儿只有一个师，现在发现全部法军都在那里，他们从莫斯科出来后，走一条意想不到的路线——走旧卡卢日斯卡雅大路。"
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 缪拉阵地
  分类: 地点
  解释: 指拿破仑的元帅缪拉（Joachim Murat）率领法军驻扎的阵地。缪拉是那不勒斯国王、拿破仑的妹夫，在1812年战争中指挥法军骑兵。塔鲁丁诺战役后，全部法国军队曾来到缪拉的阵地，随后转向新卡卢日斯卡雅大路。
  书中原文: "全部法国军队，好像得了癫痫抽风似的，来到缪拉的阵地，似乎准备打一仗，可是忽然无缘无故地向左转到新卡卢日斯卡雅大路。"
  网络来源: https://baike.baidu.com/item/%E7%BA%A6%E9%98%BF%E5%B8%8C%E5%A7%86%C2%B7%E7%BC%AA%E6%8B%89

- 名词: 叶尔莫洛夫
  分类: 人物
  解释: 阿列克谢·彼得罗维奇·叶尔莫洛夫（1777-1861），俄国步兵上将、炮兵上将。1812年俄法战争期间担任西第1集团军参谋长，在博罗季诺战役中成功指挥反攻夺回拉耶夫斯基炮垒。在小雅罗斯拉维茨战役中主张便宜行事，但被多赫图罗夫坚持等候命令的做法所制约。
  书中原文: "叶尔莫洛夫想便宜行事，但是多赫图罗夫坚持他必须等勋座的命令。于是决定给总部送一份报告。"
  网络来源: https://zh.wikipedia.org/zh-cn/%E9%98%BF%E5%88%97%E5%85%8B%E8%B0%A2%C2%B7%E5%BD%BC%E5%BE%97%E7%BD%97%E7%BB%B4%E5%A5%87%C2%B7%E5%8F%B6%E5%B0%94%E8%8E%AB%E6%B4%9B%E5%A4%AB
