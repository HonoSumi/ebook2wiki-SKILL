- 名词: 胸墙
  分类: 物件
  解释: 炮垒前方用泥土堆筑的矮墙，士兵依托其进行射击和躲避敌方火力，是19世纪野战防御工事的基本组成部分。
  书中原文: 有几个士兵聚在胸墙后面观看前面发生了什么事。
  网络来源: https://bbs.napolun.com/thread-24485-1-1.html

- 名词: 弹药箱
  分类: 物件
  解释: 战场上存放和运输炮弹、火药等弹药补给品的木制箱子，是炮兵作战中不可或缺的物资装备。
  书中原文: 快跑步到后备队去取弹药箱！
  网络来源: https://bbs.napolun.com/forum.php?mod=viewthread&tid=40322

- 名词: 卡缅卡河
  分类: 地点
  解释: 波罗金诺战场南部的一条小河，南北流向汇入科洛恰河，位于俄军左翼阵地附近，构成战场天然屏障。
  书中原文: 原先在炮垒前面矮林里和在卡缅卡河沿岸的士兵撤退了。
  网络来源: https://www.wikiwand.com/zh/articles/%E5%8D%9A%E7%BD%97%E5%AD%A3%E8%AF%BA%E6%88%98%E5%BD%B9

- 名词: 冲沟
  分类: 地点
  解释: 战场地形中自然形成的深沟，在波罗金诺战役中成为军队前进的天然障碍和防御屏障，双方曾沿冲沟两侧反复争夺。
  书中原文: 他们一进入冲沟，凸角堡上的大炮和步枪一齐发射。
  网络来源: https://news.ifeng.com/c/7yJ8b1hhLgm

- 名词: 硝烟
  分类: 概念
  解释: 火药爆炸燃烧后产生的浓密烟雾，在战场上大量弥漫遮蔽视线，使指挥官无法准确观察战况，是19世纪火器战争的典型战场景象。
  书中原文: 被浓烟遮住的太阳升得更高了，在前面，特别是在谢苗诺夫斯科耶村的左方，有什么东西在烟雾里沸腾着。
  网络来源: https://baijiahao.baidu.com/s?id=1770209202244916713

- 名词: 担架队
  分类: 概念
  解释: 由民兵组成的战场伤员运输队伍，使用简易担架将伤员从火线抬往后方救护站，是19世纪战场医疗救护体系的重要组成部分。
  书中原文: 皮埃尔跑下了土岗，无目的地朝着那撤离战场的成群担架队走去。
  网络来源: https://historymedjournal.com/index.php/medicine/article/view/155

- 名词: 乌拉
  分类: 习俗
  解释: 俄语"Ура"的音译，俄军冲锋时的战斗呐喊，用于激励士气和震慑敌人，也用于阅兵和庆典场合表达欢呼，在俄军中有数百年传统。
  书中原文: 我们的队伍喊着"乌拉"追赶法国人。
  网络来源: https://zh.wikipedia.org/zh-cn/%E7%83%8F%E6%8B%89%EF%BC%81
