- 名词: 尼古拉·罗斯托夫
  分类: 人物
  解释: |
    罗斯托夫家的长子，骠骑兵军官。性格单纯热血，崇尚军旅生活，有着浓郁的俄罗斯气质。
    从热血骠骑兵成长为务实能干的庄园主。曾因好赌被多洛霍夫设局输掉巨款，之后逐渐成熟。
    战争结束后退役回家背负债务，最终与玛丽亚公爵小姐结婚，成为精明能干的庄园主还清债务。
  书中原文: >
    尼古拉跟着第一辆雪橇也出发了；后面咯咯吱吱响起了其余的雪橇。先是在狭窄的路上小跑。
    在经过花园时，光秃秃的树影常常横断道路，遮住明亮的月光，但是一走出垣墙，整个浴在
    月光中一动不动的雪原，钻石似的发出淡蓝色的闪光，向四外伸展开来。
  网络来源: https://baijiahao.baidu.com/s?id=1732521875652580603

- 名词: 娜塔莎·罗斯托娃
  分类: 人物
  解释: |
    罗斯托夫家的小女儿，小说的女主角。全名娜塔莉娅·伊里尼奇娜·罗斯托娃。
    托尔斯泰称她为生命和幸福的化身。充满生命活力与热情，爱好唱歌跳舞。
    与安德烈公爵订婚，后被阿纳托利·库拉金诱惑险些私奔导致婚约破裂。
    1812年战争中照料伤兵，在莫斯科大火期间照料重伤的安德烈公爵。
    战后与皮埃尔·别祖霍夫结婚，从活泼少女蜕变为贤妻良母。
  书中原文: >
    娜塔莎首先发出圣诞节狂欢的调子，狂欢互相传染着，越来越高涨……她虽说不想唱，
    可是她长久以来和以后很久都没有像这天晚上唱得这么好。
  网络来源: https://baike.baidu.com/item/娜塔莎·罗斯托娃/15143141

- 名词: 索尼娅
  分类: 人物
  解释: |
    罗斯托夫伯爵夫人的侄女，全名索菲娅·亚历山德罗夫娜。父母双亡后被伯爵家收养。
    与尼古拉青梅竹马相恋并互许承诺，但因没有嫁妆无法结合。
    主动写信解除婚约以成全尼古拉与玛丽亚的婚事，留在罗斯托夫家操持家务，
    成为自我牺牲与成全他人的象征。
  书中原文: >
    索尼娅照例插不上话，虽然他们有着共同的回忆。索尼娅的化装最好。
    她的小胡子和眉毛对她非常合适。大家都说她很好看，她今天特别活跃和精神饱满。
  网络来源: https://baijiahao.baidu.com/s?id=1732521875652580603

- 名词: 彼佳·罗斯托夫
  分类: 人物
  解释: |
    罗斯托夫家最小的孩子，全名彼得·伊里奇·罗斯托夫。天真热情，渴望参军报国。
    在莫斯科挤进人群看沙皇亚历山大一世，抢皇帝撒下的饼干。执意从军被父母拒绝后
    把自己锁在屋里痛哭。在1812年战争中加入杰尼索夫的游击队，善待法国小鼓手樊尚。
    在一次夜袭中英勇战死，是书中最为令人心痛的青春陨落角色之一。
  书中原文: >
    娜塔莎还没唱完，欢天喜地的十四岁的彼佳跑来喊道，化装跳舞的人来了。
    娜塔莎突然停住了。"傻瓜！"她呵斥弟弟，然后跑到椅子跟前，倒在上面放声大哭。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平人物列表

- 名词: 伊利亚·安德烈伊奇伯爵
  分类: 人物
  解释: |
    罗斯托夫家的家长，全名伊利亚·安德烈伊奇·罗斯托夫伯爵。曾任本县首席贵族。
    为人慷慨善良、热情好客，但不善理财，导致家族经济日渐衰落。喜欢听女儿娜塔莎唱歌，
    性格乐观随和。在书房与管家米坚卡谈话时听到女儿歌声，像贪玩的小学生般赶快做完功课。
    人物原型为列夫·托尔斯泰的祖父伊利亚·托尔斯泰。
  书中原文: >
    伊利亚·安德烈伊奇伯爵在书房里正和管家米坚卡谈话，听见歌声，他像一个贪玩的小学生，
    赶快做完功课，给管家胡乱交代几项命令，就默不作声了。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平人物列表

- 名词: 老伯爵夫人
  分类: 人物
  解释: |
    罗斯托夫伯爵的妻子，娜塔莎的母亲，全名纳塔利娅·罗斯托娃伯爵夫人。
    母性敏感，担心娜塔莎身上有太多太多的东西将使她得不到幸福。
    在女儿唱歌时含着又幸福又忧郁的微笑，眼睛里噙着泪水，不时摇头，
    想起女儿与安德烈公爵的婚事中令人担心之处。
  书中原文: >
    老伯爵夫人坐在那儿含着又幸福又忧郁的微笑，眼睛里噙着泪水，不时地摇摇头。
    她在想娜塔莎，想自己的青春，想娜塔莎和安德烈公爵的婚事——在这桩婚事中
    有点不自然和叫人担心的东西。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平人物列表

- 名词: 季姆勒
  分类: 人物
  解释: |
    罗斯托夫家寄居的德国籍音乐教师，全名爱德华·卡尔雷奇·季姆勒（Herr Dimmler）。
    携妻子一同住在伯爵家，擅长弹奏竖琴和古钢琴。伯爵夫人请他弹奏菲尔德《夜曲》时，
    他闭目谛听娜塔莎的歌声并赞叹为欧洲水平的才能。圣诞节化装舞会中化装成小丑。
  书中原文: >
    他们在起居室正谈着的时候，季姆勒进来了，他走到放在墙角的竖琴跟前，
    取下覆盖的绒布，竖琴发出不悦耳的声响。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 爱德华·卡尔雷奇
  分类: 人物
  解释: |
    季姆勒的名字和父称。罗斯托夫家称他为爱德华·卡尔雷奇，即德国音乐教师季姆勒。
    老伯爵夫人从客厅发话请爱德华·卡尔雷奇弹奏她最喜爱的菲尔德先生的《夜曲》。
  书中原文: >
    爱德华·卡尔雷奇，请您给弹一支我最喜爱的菲尔德先生的《夜曲》吧。
    老伯爵夫人从客厅里发话了。
  网络来源: https://yunshuwu.cn/chap/8608.html

- 名词: 米坚卡
  分类: 人物
  解释: |
    罗斯托夫伯爵家的管家（总管）。利用伯爵的善良忠厚，长期侵吞伯爵家产。
    尼古拉返乡查账后发现此事，愤怒地抓住米坚卡的脖子将他扔出门外。
    但老伯爵念其在本家做了二十多年事，并未将他赶走，尼古拉因此意志消沉。
    米坚卡的形象反映了罗斯托夫家族在经济上的衰落和老伯爵的宽厚软弱。
  书中原文: >
    伊利亚·安德烈伊奇伯爵在书房里正和管家米坚卡谈话……米坚卡也默默地听着，
    面带微笑站在伯爵面前。
  网络来源: https://book.douban.com/annotation/141420265/

- 名词: 佩拉格娅·丹尼洛夫娜·梅柳科娃
  分类: 人物
  解释: |
    住在罗斯托夫家附近约四俄里处的寡妇遗孀，有几个不同年龄的孩子和家庭教师。
    性格慈祥开朗、精力充沛。圣诞节期间罗斯托夫家的年轻人化装后到她家聚会，
    在此举办了热闹的化装舞会。尼古拉与索尼娅正是在梅柳科娃家的这个夜晚感情升温。
  书中原文: >
    佩拉格娅·丹尼洛夫娜·梅柳科娃是个肥胖高大，精力充沛的女人，她戴眼镜，
    穿一件敞着怀的宽大外衣，坐在客厅里，四周围着一群女儿。
  网络来源: https://yunshuwu.cn/chap/8611.html

- 名词: 肖斯小姐
  分类: 人物
  解释: |
    罗斯托夫伯爵家的家庭女教师，全名路易莎·伊万诺夫娜·肖斯（Mademoiselle Schoss）。
    负责教育家中的小姐们。性格胆怯羞怯，为人谨慎保守。
    在圣诞节活动中索尼娅极力劝说她同意小姐们去梅柳科娃家，最终陪同出游。
  书中原文: >
    决定伊利亚·安德烈伊奇不去，如果路易莎·伊万诺夫娜（肖斯小姐）去，
    那么小姐们就可以去梅柳科娃家。平时怯弱、害羞的索尼娅比谁都坚决地
    劝说路易莎·伊万诺夫娜不要拒绝她们的请求。
  网络来源: http://bcc.blcu.edu.cn/show/1172511766_8_12_-1_-1/0

- 名词: 路易莎·伊万诺夫娜
  分类: 人物
  解释: |
    即肖斯小姐的全名和父称。罗斯托夫家的法国或德国籍家庭女教师。
    在圣诞出游计划中，索尼娅极力劝说她同意陪同前往梅柳科娃家。
  书中原文: >
    平时怯弱、害羞的索尼娅比谁都坚决地劝说路易莎·伊万诺夫娜不要拒绝她们的请求。
  网络来源: http://bcc.blcu.edu.cn/show/1172511766_8_12_-1_-1/0

- 名词: 安德烈公爵
  分类: 人物
  解释: |
    小说的男主角之一，全名安德烈·博尔孔斯基公爵。博尔孔斯基家族长子。
    孤傲正直，才华出众，厌恶上流社会虚伪。在奥斯特利茨战役中重伤，
    仰望天空对功名产生幻灭。妻子丽莎难产去世后意志消沉。
    与娜塔莎订婚后被解除婚约。在1812年波罗底诺战役中再次重伤，
    最终在娜塔莎照料下领悟爱与宽恕而离世。
  书中原文: >
    老伯爵夫人……在想娜塔莎，想自己的青春，想娜塔莎和安德烈公爵的婚事——
    在这桩婚事中有点不自然和叫人担心的东西。
  网络来源: https://baike.baidu.com/item/安德烈·博尔孔斯基/55647709

- 名词: 波利娅
  分类: 人物
  解释: |
    罗斯托夫家的使女（侍女）。俄语名波利娅是佩拉格娅（或波琳娜）的昵称。
    在故事中负责通报家事，向娜塔莎报告公鸡拿来了。
  书中原文: >
    "小姐，公鸡拿来了。"那个使女悄悄地说。"不要了，波利娅，告诉他们拿走吧。"娜塔莎说。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平人物列表

- 名词: 帕金塔
  分类: 人物
  解释: |
    老伯爵伊利亚·安德烈伊奇戏谑称呼的人物。伯爵听闻要化装去梅柳科娃家时兴奋地说
    "我要好好逗逗帕金塔"，可能指梅柳科娃家的某位成员或仆从。
  书中原文: >
    "对，好主意，"兴高采烈的老伯爵附和说，"我马上就化装，也跟你们去一趟。
    我要好好逗逗帕金塔。"
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 罗斯托夫家
  分类: 地点
  解释: |
    罗斯托夫伯爵家族在莫斯科的宅邸，包含前厅、大厅、起居室、客厅、书房等多个房间。
    是小说中罗斯托夫家族日常生活的核心场所，也是圣诞节化装舞会出发的地点。
    在起居室中娜塔莎、尼古拉和索尼娅回忆往事、谈论哲学，季姆勒在此弹竖琴。
  书中原文: >
    他们在起居室正谈着的时候，季姆勒进来了，他走到放在墙角的竖琴跟前，
    取下覆盖的绒布，竖琴发出不悦耳的声响。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 梅柳科娃家
  分类: 地点
  解释: |
    佩拉格娅·丹尼洛夫娜·梅柳科娃的庄园，距罗斯托夫家约四俄里。
    圣诞节当晚罗斯托夫家的年轻人化装后到此聚会，在此举办了热闹的假面舞会。
    尼古拉与索尼娅在此夜晚感情升温。
  书中原文: >
    果然是梅柳科娃的庄子，女仆们和男仆们手持蜡烛欢欢喜喜跑到大门口。
  网络来源: https://yunshuwu.cn/chap/8611.html

- 名词: 梅柳科娃庄子
  分类: 地点
  解释: |
    即梅柳科娃家的庄园，佩拉格娅·丹尼洛夫娜·梅柳科娃的宅邸。
    尼古拉在前往梅柳科娃家的路上辨认着方向，在月光下的雪原中驰骋。
  书中原文: >
    "我们现在是驶向梅柳科娃家吗？这就是梅柳科娃的庄子吗？"
  网络来源: https://yunshuwu.cn/chap/8611.html

- 名词: 科索伊草地
  分类: 地点
  解释: |
    罗斯托夫家庄园附近的一片草地。尼古拉在乘雪橇行驶途中辨认地形的参照地点。
    月光下雪原一片银白，使他不确定自己到了什么地方。
  书中原文: >
    "是科索伊草地吧。不对，这儿是我从未到过的新地方。这不是科索伊草地，
    也不是焦姆金山，天知道这是什么地方！"
  网络来源: https://yunshuwu.cn/chap/8611.html

- 名词: 焦姆金山
  分类: 地点
  解释: |
    罗斯托夫家附近的地名。尼古拉在圣诞节夜晚雪橇行驶途中辨认方位时提及。
    他在月光下的雪原上驰骋，发现既不是科索伊草地也不是焦姆金山，
    感到自己进入了一个新奇的仙境。
  书中原文: >
    "这不是科索伊草地，也不是焦姆金山，天知道这是什么地方！"
  网络来源: https://yunshuwu.cn/chap/8611.html

- 名词: 前厅
  分类: 地点
  解释: |
    罗斯托夫家入口处的厅堂。化装的家奴们（扮成狗熊、土耳其人、店主等）
    最初在此聚集，胆怯地挤在一起，然后才涌入大厅。
  书中原文: >
    他们带来了冷气和喜悦，刚到的时候，都胆怯地挤在前厅；然后在互相的背后
    躲躲藏藏涌进了大厅。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 大厅
  分类: 地点
  解释: |
    罗斯托夫家举行聚会和活动的大厅。假面舞会在此举行，化装的人们在此唱歌、
    跳舞、跳环舞、做圣诞游戏。娜塔莎在此选了个共鸣最好的地点站到大厅中央唱歌。
    伊利亚·安德烈伊奇伯爵眉开眼笑地坐在大厅里赞赏跳假面舞的人们。
  书中原文: >
    娜塔莎选了个共鸣最好的地点，站到大厅中央，开始唱母亲最喜爱的歌。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 起居室
  分类: 地点
  解释: |
    罗斯托夫家的起居室。娜塔莎、尼古拉和索尼娅在此回忆往事、谈论哲学和梦。
    季姆勒在此弹竖琴并加入年轻人的谈话。室内较暗，但满月的银辉穿过大窗户泻到地板上。
  书中原文: >
    他们在起居室正谈着的时候，季姆勒进来了，他走到放在墙角的竖琴跟前，
    取下覆盖的绒布，竖琴发出不悦耳的声响。室内很暗，特别是他们坐的沙发那儿更暗，
    然而满月的银辉穿过大窗户泻到地板上。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 客厅
  分类: 地点
  解释: |
    罗斯托夫家的客厅。老伯爵夫人在这里请季姆勒弹奏她最喜爱的菲尔德《夜曲》，
    也在女儿唱歌时在此聆听落泪。
  书中原文: >
    "爱德华·卡尔雷奇，请您给弹一支我最喜爱的菲尔德先生的《夜曲》吧。"
    老伯爵夫人从客厅里发话了。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 竖琴
  分类: 物件
  解释: |
    放置在罗斯托夫家起居室角落的一种大型弹拨乐器。季姆勒经常演奏竖琴，
    当取下覆盖的绒布时竖琴发出不悦耳的声响。竖琴在19世纪俄罗斯贵族中十分流行，
    是贵族女性修养的重要组成部分。
  书中原文: >
    季姆勒进来了，他走到放在墙角的竖琴跟前，取下覆盖的绒布，竖琴发出不悦耳的声响。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 古钢琴
  分类: 物件
  解释: |
    19世纪俄国贵族家庭常见的键盘乐器（击弦古钢琴或早期钢琴）。
    娜塔莎唱歌时尼古拉在古钢琴旁坐下为她伴奏。
    古钢琴在当时的贵族家庭音乐会中扮演重要角色。
  书中原文: >
    娜塔莎站了起来，尼古拉在古钢琴旁坐下。像一向那样，娜塔莎选了个共鸣最好的地点，
    站到大厅中央，开始唱母亲最喜爱的歌。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 三驾雪橇
  分类: 物件
  解释: |
    俄罗斯传统交通工具（троика，三套马车），由三匹马呈扇形同时牵引的雪橇。
    中间的马驾辕小跑，两侧的马大跑，最高时速可达45-50公里。
    起源于18世纪中叶，用于在漫长邮路上运送邮件和旅客。文化象征意义深厚，
    果戈理在《死魂灵》中用它比喻飞驰的俄罗斯。现已成为俄罗斯文化标志。
  书中原文: >
    四辆带着大小铃铛的三驾雪橇向门廊驶来，橇板的铁刃咯咯吱吱地滑过冰冻的雪地。
  网络来源: https://chejiahao.autohome.com.cn/info/15492589

- 名词: 奥尔洛夫的走马
  分类: 物件
  解释: |
    俄罗斯最著名的马种——奥尔洛夫快步马（Orlov Trotter），由阿列克谢·奥尔洛夫伯爵
    在18世纪培育而成。以快步轻驾赛马闻名，青灰色为主，性情温驯活泼、耐力持久。
    是斯拉夫民族自主繁育的第一个优良马种，被视为俄罗斯国家的象征和民族骄傲。
    在《战争与和平》中是老伯爵的雪橇驾辕用马。
  书中原文: >
    两辆雪橇是日常使用的，第三辆是老伯爵的，用奥尔洛夫的走马驾辕。
  网络来源: https://baike.baidu.com/item/奥尔洛夫快步马/2079816

- 名词: 紫貂围巾
  分类: 物件
  解释: |
    用紫貂皮制成的围巾。紫貂皮是俄罗斯最珍贵的皮草，褐中带银，自古是贵族身份的象征。
    在供暖技术不成熟的年代，皮草既是奢侈品也是应对极寒的生活必需品。
    索尼娅在雪橇上以紫貂围巾遮面，在月光下显得格外动人。
  书中原文: >
    从紫貂围巾下露出一张完全变了样的可爱的面孔，眉毛和小胡子都是黑的，
    在月光下看去是那么近，又那么远。
  网络来源: https://www.sohu.com/a/286315448_99959729

- 名词: 骠骑兵斗篷
  分类: 物件
  解释: |
    俄罗斯骠骑兵的标志性服饰（mentik/pelisse），为披挂在左肩的斗篷式短外衣，
    镶有毛皮装饰，胸前三排纽扣。灰色呢子制成，军官用灰色毛皮，士兵用白色毛皮。
    在圣诞节夜晚化装舞会中，尼古拉身穿老太太服装外罩骠骑兵斗篷站在雪橇中间。
  书中原文: >
    尼古拉身穿老太太服装，外罩一件束着腰带的骠骑兵斗篷，握着缰绳站在雪橇中间。
  网络来源: https://www.sohu.com/a/278527391_826831

- 名词: 假面/化装服饰
  分类: 物件
  解释: |
    圣诞节假面舞会的装扮服饰。年轻人化装成穿箍骨裙的老太太（尼古拉）、
    土耳其女郎（彼佳）、小丑（季姆勒）、骠骑兵（娜塔莎）等角色，
    以及用软木炭画小胡子和眉毛的切尔克斯人（索尼娅）。
    这种化装传统源于俄罗斯圣诞节期间的假面游行活动。
  书中原文: >
    穿箍骨裙的老太太——这是尼古拉，土耳其女郎是彼佳，小丑是季姆勒，
    骠骑兵是娜塔莎，还有一个用软木炭画的小胡子和眉毛的切尔克斯人，这是索尼娅。
  网络来源: https://travel.faqs.tw/俄罗斯的圣诞节怎么过-1486731761

- 名词: 蜡烛
  分类: 物件
  解释: |
    19世纪俄罗斯贵族家庭室内照明用具。在圣诞节场景中，娜塔莎把蜡烛移到别处
    以制造暗光氛围。梅柳科娃家的女仆和男仆手持蜡烛跑出大门迎接来客。
    梅柳科娃家的女儿们在安静地滴蜡烛油占卜。
  书中原文: >
    娜塔莎踮着脚尖悄悄走到桌旁，把蜡烛移到别处，又走回去静静地坐回原位。
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 圣诞节化装舞会
  分类: 事件
  解释: |
    罗斯托夫家在圣诞节期间举办的假面化装舞会。家奴们化装成狗熊、土耳其人、
    店主、太太等角色，有的可怕有的可笑。他们先是在前厅胆怯地挤在一起，
    然后涌进大厅唱歌、跳舞、跳环舞、做圣诞游戏。之后年轻人又前往梅柳科娃家
    继续狂欢。这是小说中最具喜庆氛围的场景之一。
  书中原文: >
    家奴们化装成狗熊、土耳其人、店主、太太等等，有的可怕，有的可笑，
    他们带来了冷气和喜悦……先是有点拘束，然后就越来越快活、越和谐地唱歌，
    跳舞，跳环舞，做圣诞游戏。
  网络来源: https://travel.faqs.tw/俄罗斯的圣诞节怎么过-1486731761

- 名词: 雪橇出游
  分类: 事件
  解释: |
    圣诞节夜晚罗斯托夫家的年轻人乘坐四辆三驾雪橇前往梅柳科娃家的冬季出游。
    月光下雪橇在广阔的雪原上飞驰，马匹在冰冻的雪地上奔跑，充满欢乐与浪漫气氛。
    这是小说中著名的冬季场景之一，展现了19世纪俄国贵族冬季社交生活。
  书中原文: >
    四辆带着大小铃铛的三驾雪橇向门廊驶来，橇板的铁刃咯咯吱吱地滑过冰冻的雪地……
    他们从一个山坡上滑下去，驶到河边草地上宽广的大路。
  网络来源: https://yunshuwu.cn/chap/8611.html

- 名词: 唱夜曲
  分类: 事件
  解释: |
    娜塔莎在母亲伯爵夫人的请求下站到大厅中央唱歌。她这天晚上唱得格外好，
    季姆勒闭目欣赏赞叹为欧洲水平的才能，说她的嗓音柔和、圆润、有力。
    尼古拉目不转睛地望着妹妹和她共同呼吸。老伯爵夫人含着又幸福又忧郁的泪水聆听。
    伯爵在书房中听见歌声也停下工作默不作声。
  书中原文: >
    娜塔莎选了个共鸣最好的地点，站到大厅中央，开始唱母亲最喜爱的歌。
    她虽说不想唱，可是她长久以来和以后很久都没有像这天晚上唱得这么好。
  网络来源: https://yunshuwu.cn/chap/8608.html

- 名词: 滴蜡烛油占卜
  分类: 事件
  解释: |
    俄罗斯圣诞节传统占卜方式（гадания）。将熔化的蜡烛蜡滴入冷水中，
    蜡在水中凝固成各种形状，然后根据蜡的形状解读命运。
    常见形状有房子（预示成家）、戒指（预示婚姻）、人爬山（预示事业突破）等。
    在圣诞节至主显节之间的冬夜进行，尤其受未婚女子欢迎。
    梅柳科娃家的女儿们正在安静地滴蜡烛油，然后观看凝结的各种形状的影子。
  书中原文: >
    女儿们正在安静地滴蜡烛油，然后观看凝结的各种形状的影子。
  网络来源: https://destiny.to/ubbthreads/ubbthreads.php/topics/1401808

- 名词: 轮回论
  分类: 概念
  解释: |
    灵魂转世的哲学学说（metempsychosis）。索尼娅在谈话中提及埃及人相信灵魂从前
    附在牲畜身上，将来又回到牲畜身上。娜塔莎则提出灵魂不朽和天使转世的个人理解。
    托尔斯泰在创作《战争与和平》期间深受赫尔德和叔本华关于再生（palingenesis）
    思想的影响，认为人死后在下一世重生为更完善的存在。
  书中原文: >
    "这是轮回论，"索尼娅说，她一向用功读书，而且什么都记得，"埃及人相信，
    我们的灵魂从前是附在牲畜身上的，将来又回到牲畜身上。"
  网络来源: https://searchworks.stanford.edu/articles/edsdoj__edsdoj.93aab5981144f5d96fa381e51ea12e9

- 名词: 灵魂不朽
  分类: 概念
  解释: |
    灵魂永恒不灭的哲学概念。娜塔莎在圣诞节夜晚的谈话中自信地宣称灵魂是不朽的、
    自己是永生的，以前也活过，永恒地活着。这一观念贯穿托尔斯泰的创作思想，
    他深受赫尔德和叔本华关于个体不朽和来世重生思想的影响。
    托尔斯泰最终认为爱与对爱的回归是超越死亡与轮回的终极意义。
  书中原文: >
    "要知道灵魂是不朽的……所以我才是永生的，那也就是说，我以前也活过，
    永恒、永恒地活着。"
  网络来源: https://doaj.org/article/d93aab5981144f5d96fa381e51ea12e9

- 名词: 永恒
  分类: 概念
  解释: |
    无尽的时间概念。季姆勒说很难想象永恒是什么样子，娜塔莎则反驳认为永恒
    并不难想象：现在有今天，将来有明天，永远不会完结，过去有昨天有前天。
    她以日常的时间体验来理解永恒的无限延伸，体现了托尔斯泰笔下人物
    对生命意义的朴素思考。
  书中原文: >
    "永恒有什么难以想象的？"娜塔莎说，"现在有今天，将来有明天，永远不会完结，
    过去有昨天，有前天……"
  网络来源: https://www.yunshuwu.cn/chap/8608.html

- 名词: 诗意回忆
  分类: 概念
  解释: |
    少年时代梦幻与现实融合在一起的遥远印象，带着莫名的喜悦轻轻笑着的回忆方式。
    与忧郁的老年人的回忆相对，属于充满生命力和美感的青春记忆。
    娜塔莎和尼古拉在圣诞节夜晚回忆童年往事时怀有这种诗意的情感。
  书中原文: >
    不是忧郁的老年人的回忆，而是富有诗意的少年时代的回忆——那些梦幻和现实
    融合在一起的遥远的印象，他们怀着莫名的喜悦轻轻地笑着。
  网络来源: https://m.fx361.com/news/2011/1013/11553277.html

- 名词: 圣诞节假面舞会
  分类: 习俗
  解释: |
    俄罗斯圣诞节传统习俗（Святки/神周）。在圣诞节至主显节之间的节日期间，
    人们化装成动物（牛、羊、熊、马）、老人、吉普赛人等角色，
    挨家挨户唱颂歌（kolyadki）、跳舞、演短剧。这种扮装活动象征将一年的辛劳解放，
    兼具驱邪和狂欢的双重含义。源于基督教与斯拉夫异教传统的融合。
    在《战争与和平》中罗斯托夫家化装后前往梅柳科娃家聚会。
  书中原文: >
    穿箍骨裙的老太太——这是尼古拉，土耳其女郎是彼佳，小丑是季姆勒，
    骠骑兵是娜塔莎，还有一个用软木炭画的小胡子和眉毛的切尔克斯人，这是索尼娅。
  网络来源: https://travel.faqs.tw/俄罗斯的圣诞节怎么过-1486731761

- 名词: 三驾雪橇兜风
  分类: 习俗
  解释: |
    俄罗斯冬季传统娱乐活动。三匹马呈扇形牵引雪橇在雪地飞驰，曾是主要交通工具，
    也是节日庆典中的重要项目。在19世纪是贵族青年冬季社交的重要方式。
    如今在俄罗斯节日庆典中，乘坐装饰华丽的三套马车兜风仍是深受欢迎的
    传统娱乐项目。
  书中原文: >
    四辆带着大小铃铛的三驾雪橇向门廊驶来，橇板的铁刃咯咯吱吱地滑过冰冻的雪地。
  网络来源: https://circlesquaredblog.com/2020/our-journey/troika-ride-russia

- 名词: 圣诞游戏
  分类: 习俗
  解释: |
    俄罗斯圣诞节期间的各类传统游戏（святочные игры）。包括环舞（хоровод）、
    唱歌、传戒指、猜谜等。在罗斯托夫家的圣诞聚会中，化装的人们先有点拘束，
    然后越来越快活地唱歌、跳舞、跳环舞、做圣诞游戏。
    这些游戏是俄罗斯圣诞节文化活动的重要组成部分。
  书中原文: >
    先是有点拘束，然后就越来越快活、越和谐地唱歌，跳舞，跳环舞，做圣诞游戏。
  网络来源: https://travel.faqs.tw/俄罗斯的圣诞节怎么过-1486731761

- 名词: 滴蜡烛油占卜
  分类: 习俗
  解释: |
    俄罗斯传统圣诞占卜习俗之一（Восковая гадания / Candle Wax Divination）。
    将熔化后的蜡滴入冷水中，蜡凝固成各种形状，未婚女子据此解读命运。
    戒指状预示婚姻将至，房子状预示成家，人爬山状预示事业突破。
    在圣诞节至主显节之间的冬夜进行。这一习俗在俄罗斯年轻女性中非常流行，
    源于前基督教时期的斯拉夫异教传统。
  书中原文: >
    女儿们正在安静地滴蜡烛油，然后观看凝结的各种形状的影子。
  网络来源: https://destiny.to/ubbthreads/ubbthreads.php/topics/1401808
