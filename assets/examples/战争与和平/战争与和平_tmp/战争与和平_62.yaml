- 名词: 维拉尔斯基
  分类: 人物
  解释: 波兰伯爵，皮埃尔加入共济会的引荐人（保人）。他带领皮埃尔前往共济会分会大厦，蒙上他的眼睛，引导他经历入会仪式的全部考验环节。
  书中原文: 在这之后不大一会儿，来暗室见皮埃尔的，已经不是先前那个训导师，而是保证人维拉尔斯基，皮埃尔是由声音里听出来的。又问他意志是否坚决，皮埃尔回答说："是的，是的，我同意。"
  网络来源: https://book.qq.com/book-read/32055495/23

- 名词: 斯莫利亚尼诺夫
  分类: 人物
  解释: 共济会训导师，负责皮埃尔入会前的教导与考验。他向皮埃尔阐述共济会的三大宗旨及七项美德，指导他完成入会的各项仪式环节。
  书中原文: 皮埃尔走得更近一点，认出训导师原来是一个名叫斯莫利亚尼诺夫的熟人，他一想到训导师是熟人，就感到受了侮辱。
  网络来源: http://bcc.blcu.edu.cn/show/1172357541_0_0_7_8/0

- 名词: 奥西普·阿列克谢耶维奇
  分类: 人物
  解释: 皮埃尔的精神导师，资深共济会员。他在驿站偶遇皮埃尔并指引其走上道德修养之路，是促使皮埃尔加入共济会的关键人物。
  书中原文: 使他最高兴的是他终于走上革新的、积极的、合乎道德的生活道路，这是他自从遇见奥西普·阿列克谢耶维奇就朝思暮想的。
  网络来源: http://yunshuwu.cn/chap/8556.html

- 名词: 训导师
  分类: 概念
  解释: 共济会中负责指导新入会者（求道者）的导师角色，负责传授教义、主持考验、解释符号象征，引导新会员完成入会启蒙仪式。
  书中原文: 皮埃尔屏着呼吸，怀着跳动的心，向训导师（对求道者安排入会事宜的共济会员，称为训导师）跟前移动过去。
  网络来源: https://zh.wikipedia.org/zh-hans/%E5%85%B1%E6%B5%8E%E4%BC%9A

- 名词: 求道者
  分类: 概念
  解释: 共济会入会仪式中对候选人的称呼之一，象征寻求真理与启蒙的人。在仪式巡礼中此称号随槌子和宝剑声交替使用。
  书中原文: 在巡礼中，皮埃尔注意到，人们时而叫他求道者，时而叫他受难者，时而叫他请愿者，每次叫他，槌子和宝剑都敲出各种不同的响声。
  网络来源: https://m.zww.cn/baike/ebook/1/393169/393175_8.htm

- 名词: 受难者
  分类: 概念
  解释: 共济会入会仪式中对候选人的称呼之一，象征经历考验与磨难的人，表示入会者正在经历精神上的试炼与牺牲。
  书中原文: 在巡礼中，皮埃尔注意到，人们时而叫他求道者，时而叫他受难者，时而叫他请愿者，每次叫他，槌子和宝剑都敲出各种不同的响声。
  网络来源: https://m.zww.cn/baike/ebook/1/393169/393175_8.htm

- 名词: 请愿者
  分类: 概念
  解释: 共济会入会仪式中对候选人的称呼之一，象征恳求加入与接纳的人，表达入会者渴望获得组织接纳的心情。
  书中原文: 在巡礼中，皮埃尔注意到，人们时而叫他求道者，时而叫他受难者，时而叫他请愿者，每次叫他，槌子和宝剑都敲出各种不同的响声。
  网络来源: https://m.zww.cn/baike/ebook/1/393169/393175_8.htm

- 名词: 蒙眼仪式
  分类: 习俗
  解释: 共济会入会仪式的核心环节。候选人被蒙住眼睛，象征处于蒙昧无知状态，经历考验后揭去眼罩，象征从黑暗走向光明的精神启蒙。
  书中原文: 维拉尔斯基从柜子里取出一条手绢蒙上皮埃尔的眼睛，在他脑后打个结子，头发怪疼地夹进结子里。然后，维拉尔斯基拉他弯下腰，吻了吻他，搀起他的手，领他到什么地方去。
  网络来源: https://www.mplus.com.tw/article/3942

- 名词: 骷髅头
  分类: 物件
  解释: 共济会仪式中的象征物之一，代表对死亡的思考和崇尚。在暗室中放置于桌上点燃油灯，提醒入会者思考生命无常与死亡的真谛。
  书中原文: 皮埃尔走近一看，一张黑色桌子上放着一盏油灯和一本打开的书。书是《福音书》；盛着油灯的白色东西是一个带窟窿和牙齿的骷髅。
  网络来源: https://tieba.baidu.com/p/2810557222

- 名词: 棺材
  分类: 物件
  解释: 共济会仪式中的象征物之一，代表死亡与重生。皮埃尔在暗室中看到的盛着骨头的木匣子，象征旧我的死亡和新我的诞生。
  书中原文: 皮埃尔念了《福音书》的头几句后，绕过桌子，看见一个盛满东西的敞口的大木匣子。这是盛着骨头的棺材。
  网络来源: https://tieba.baidu.com/p/2810557222

- 名词: 油灯
  分类: 物件
  解释: 共济会暗室中的微弱光源，象征从黑暗走向光明的过渡状态，代表初步的启蒙和微弱的真理之光。
  书中原文: 屋里漆黑漆黑的：只有一个地方有一件白色的东西，里面点着油灯。皮埃尔走近一看，一张黑色桌子上放着一盏油灯和一本打开的书。
  网络来源: https://podtail.com/it/podcast/13e2241e/--117/

- 名词: 圆规
  分类: 物件
  解释: 共济会的重要象征物，与方矩共同组成共济会的核心标志。圆规象征精神、道德和自我约束，提醒会员在追求中找到平衡。
  书中原文: 然后人们拿起他的右手放在一个东西上面，叫他用左手拿着圆规按在左胸上，吩咐他复述别人念的忠于会章的誓词。
  网络来源: https://zh-yue.m.wikipedia.org/wiki/%E7%BE%8E%E7%94%9F%E6%9C%83

- 名词: 七美德
  分类: 概念
  解释: 共济会要求会员培养的七项美德，与所罗门神殿的七级台阶数目对应，包括谦虚、服从、品行端正、爱人类、勇敢、慷慨、爱死亡。
  书中原文: 这七条美德是：1）谦虚，保守本会的秘密，2）服从本会最高地位的人，3）品行端正，4）爱人类，5）勇敢，6）慷慨，7）爱死亡。
  网络来源: https://book.douban.com/annotation/12029472/

- 名词: 谦虚
  分类: 概念
  解释: 共济会七美德之首，要求会员保守本会的秘密，不炫耀知识，以谦逊的态度对待真理与教义的学习。
  书中原文: 这七条美德是：1）谦虚，保守本会的秘密，2）服从本会最高地位的人，3）品行端正，4）爱人类，5）勇敢，6）慷慨，7）爱死亡。
  网络来源: https://book.douban.com/annotation/12029472/

- 名词: 服从
  分类: 概念
  解释: 共济会七美德之二，要求会员服从本会最高地位的人，将个人意志服从于组织的权威和不容置疑的真理。
  书中原文: 皮埃尔扳着指头回忆其余五条美德，在心中默念着：勇敢、慷慨、品行端正、爱人类、特别是服从，他甚至觉得，服从简直不是美德，而是幸福。
  网络来源: https://book.douban.com/annotation/12029472/

- 名词: 品行端正
  分类: 概念
  解释: 共济会七美德之三，要求会员行为端正、品德高尚，在日常生活中践行道德规范，作为其他会员的榜样。
  书中原文: 皮埃尔扳着指头回忆其余五条美德，在心中默念着：勇敢、慷慨、品行端正、爱人类、特别是服从，他甚至觉得，服从简直不是美德，而是幸福。
  网络来源: https://book.douban.com/annotation/12029472/

- 名词: 爱人类
  分类: 概念
  解释: 共济会七美德之四，要求会员热爱全人类，将博爱精神贯彻于行动之中，这是共济会改造全人类宗旨的道德基础。
  书中原文: 训导师所提的那个重要的秘密，虽然引起他的好奇心，但是他不认为是实质的东西；第二个目的，自我净化和完善，也不怎么引起他的注意，因为此刻他觉得自己已经从过去的罪恶中改正过来，一心只想行善。
  网络来源: https://book.douban.com/annotation/12029472/

- 名词: 勇敢
  分类: 概念
  解释: 共济会七美德之五，要求会员在面对考验和困难时无所畏惧，有勇气坚持真理、维护正义，在精神修行道路上坚定不移。
  书中原文: 皮埃尔扳着指头回忆其余五条美德，在心中默念着：勇敢、慷慨、品行端正、爱人类、特别是服从，他甚至觉得，服从简直不是美德，而是幸福。
  网络来源: https://book.douban.com/annotation/12029472/

- 名词: 慷慨
  分类: 概念
  解释: 共济会七美德之六，要求会员慷慨大方，为入会仪式需交出所有贵重物品（表、钱、戒指等），象征对世俗财物的超脱。
  书中原文: 皮埃尔连忙拿出钱包、表，从肥胖的手指上脱结婚戒指，脱了好大一会儿。做完这件事以后，共济会员说："为了表示服从，请您把衣服脱下来。"
  网络来源: https://book.douban.com/annotation/12029472/

- 名词: 爱死亡
  分类: 概念
  解释: 共济会七美德之七，要求会员时刻想着死亡，视死亡为朋友而非敌人，认为死亡能将疲倦的灵魂从现世生活解脱出来引入安宁的境界。
  书中原文: |
    "第七条，"训导师说，"要时刻想着死亡，努力做到使自己觉得死亡不再是可怕的敌人，而是朋友……它能把因修德而疲倦的灵魂从灾难的现世生活解脱出来，把它引入幸福和安宁的境界。"
  网络来源: https://book.douban.com/annotation/12029472/

- 名词: 黑暗与光明
  分类: 概念
  解释: 共济会入会仪式中象征从蒙昧到启蒙的核心主题。蒙眼代表黑暗（无知），揭眼代表光明（真理），过程象征人从无信仰的黑暗走向上帝之光的觉醒。
  书中原文: |
    "您这个不信光的真理和看不见光的人，来这儿的目的是什么？您想向我们要什么？想要至高的智慧、德行、教导吗？"
  网络来源: https://tieba.baidu.com/p/2810557222

- 名词: 秘密
  分类: 概念
  解释: 共济会第一个主要宗旨所涉及的古老秘密，从远古传至后代，关系到人类命运。此秘密需经过长期自我净化才能领悟和运用。
  书中原文: 本会第一个主要的宗旨，为本会所奠定而且非人力所能推翻的本会的总基础，就是保存而且传给后代一种重要的秘密……由远古、甚至从开天辟地第一个人一直传给我们，也许关系到人类命运的秘密。
  网络来源: https://book.douban.com/annotation/12029472/

- 名词: 自我净化
  分类: 概念
  解释: 共济会的第二个主要宗旨，通过修炼会员的内心，净化和启发理智，使其具备领悟秘密的能力，是达到精神完善的必要过程。
  书中原文: 我们有第二个目的，就是尽可能地修炼我们的会员，叫他们革心洗面，净化和启发他们的理智，这样使他们具有领悟这个秘密的能力。
  网络来源: http://fb.newdu.com/book/s445.html

- 名词: 从善
  分类: 概念
  解释: 皮埃尔加入共济会后的人生转向，从过去的放荡生活转向行善的道德追求。他想象自己向有罪和不幸的人说教，从压迫者手中拯救受难者。
  书中原文: 他想象那些也像他两星期前那样的人们，他在心中默默地向他们作从善的说教。他想象那些受他的言行帮助的有罪的和不幸的人们；想象那些压迫者，他从这些压迫者手中把受难者拯救出来。
  网络来源: https://book.qq.com/book-read/32055495/32

- 名词: 共济会入会仪式
  分类: 习俗
  解释: 皮埃尔经历的共济会入会全过程，包括蒙眼巡行、交出财物、脱衣露体、剑抵胸膛、宣誓、骷髅棺材教诲等系列象征性考验，标志从旧我到新生的转变。
  书中原文: 人们领着他从屋里走进走廊，转弯抹角，忽前忽后，最后走到支会的门口。维拉尔斯基咳嗽几声，作为回答他的是用槌子按照共济会的规矩敲打几下，门在他面前打开了。
  网络来源: https://m.sohu.com/n/488035366/

- 名词: 所罗门神殿
  分类: 概念
  解释: 共济会象征体系的核心建筑意象。共济会以所罗门神殿的石匠为源头传说，七美德对应神殿的七级台阶，会员建造内在神殿象征精神完善。
  书中原文: 半小时后，训导师回来了，向申请入会者传达与所罗门神殿阶梯数目相当的七条美德。
  网络来源: https://crypticmasons.org/the-spiritual-anatomy-of-man-and-king-solomons-temple

- 名词: Symbols
  分类: 概念
  解释: 共济会用符号阐明教义的传统。训导师解释符号是不受感情影响的事物名称，具有类似象征的性质。共济会通过骷髅、棺材、福音书、圆规、围裙、铲子等多种符号传递道德教诲。
  书中原文: |
    "本会仿效古代会社用符号阐明教义。"训导师说，"符号是一种不受感情影响的事物名称，它具有类似象征的性质。"
  网络来源: https://zh.wikipedia.org/zh-hans/%E5%85%B1%E6%B5%8E%E4%BC%9A
