- 名词: 米绍上校
  分类: 人物
  解释: |
    法国人，服务于俄国军队的上校军官，在1812年拿破仑侵俄战争期间担任库图佐夫元帅与沙皇亚历山大一世之间的专使。他不会说俄语，但自称"身为外国人，却有一颗俄国心"。他最著名的使命是在莫斯科失守后向沙皇报告这一噩耗，并以其巧妙的外交辞令激励沙皇继续抗战。
  书中原文: |
    这天早晨，米绍上校陪同皇帝视察德里萨工事，他向皇帝证明说，普弗尔所构筑的这个防御阵地，被认为是空前的战术杰作，它可以致拿破仑于死地，其实，这个阵地毫无意义，是俄国军队的坟墓。
  网络来源: |
    米绍上校在1812年战争中担任沙皇与库图佐夫之间的信使，以巧妙的外交辞令著称。他在向沙皇报告莫斯科失守时，激励了亚历山大一世做出继续抗战的著名誓言。

- 名词: 切尔内绍夫
  分类: 人物
  解释: |
    亚历山大·伊万诺维奇·切尔内绍夫，俄国军事将领、外交官和情报官，在1812年战争期间担任沙皇亚历山大一世的侍从武官长。他曾在1808至1812年间以军事外交代表身份驻巴黎，实际上是沙皇安插在拿破仑身边的高级间谍，成功获取了法军对俄作战计划的核心情报。后官至战争大臣和国务会议主席。
  书中原文: |
    切尔内绍夫在一进门的房间里，坐在窗口看法国小说。这个房间从前大概是个大厅；屋里还有一架风琴，风琴上堆着一些地毯，墙角放着贝尼格森的副官的行军床。
  网络来源: |
    切尔内绍夫（1785-1857）是沙俄军事家、外交官，1812年前驻巴黎期间建立情报网，获取法军动员计划。后任战争大臣、国务会议主席，封公爵。

- 名词: 保罗西侯爵
  分类: 人物
  解释: |
    菲利波·保卢奇，意大利籍侯爵，拿破仑战争期间先后效力于撒丁王国、奥地利、法国，最终加入俄罗斯军队。在1812年俄国卫国战争初期曾任陆军参谋长，是沙皇亚历山大一世的重要军事顾问。他以直言不讳著称，曾当面批评普弗尔的德里萨阵地计划，称其设计者只有两个地方好去：疯人院和绞刑架。
  书中原文: |
    "至于那个建议构筑德里萨阵地的人，"保罗西说，这时皇帝已经走上台阶，看见安德烈公爵，打量了一下他所不熟识的面孔。"陛下，"保罗西仿佛按捺不住，不顾一切地继续说，"至于那个建议构筑德里萨阵地的人，我看他只有两个地方好去：一个是疯人院，一个是绞刑架。"
  网络来源: |
    保罗西侯爵（1779-1849），意大利贵族，1812年效力俄军，曾任格鲁吉亚总督和利沃尼亚总督，以直率敢言著称。

- 名词: 阿姆菲尔德将军
  分类: 人物
  解释: |
    古斯塔夫·毛里茨·阿姆菲尔特，芬兰裔瑞典将军、外交官，后效力于俄罗斯帝国。在1812年战争中担任沙皇亚历山大一世的军事顾问。他曾任瑞典在波美拉尼亚的军队总司令，后因政治流亡俄国。他对确保芬兰大公国的自治地位有重要贡献，并说服亚历山大一世将芬兰首都从图尔库迁至赫尔辛基。
  书中原文: |
    首先发言的是阿姆菲尔德将军，他出人意外地提出一个完全新的、毫无道理的方案——在通往彼得堡和莫斯科的大路旁侧构筑阵地，他认为应当在那儿集结军队等待敌人，这样才能摆脱目前的困境。
  网络来源: |
    阿姆菲尔特（1757-1814），芬兰裔瑞典将军、外交官，后效力沙皇亚历山大一世。推动芬兰自治，参与1812年俄军防御计划制定。

- 名词: 托尔
  分类: 人物
  解释: |
    卡尔·威廉·冯·托尔，波罗的海德意志贵族出身的俄国步兵上将，1812年卫国战争期间担任俄军第一军团军务总监，后任库图佐夫司令部代理联合集团军军务总监。他以勤恳踏实的实地勘察著称，曾亲自一天行军一百俄里进行侦察。参与斯摩棱斯克军事会议力主进攻，后因库列夫恰大捷获封伯爵。
  书中原文: |
    年轻的上校托尔比别人都热烈地反对瑞典将军的意见，在争论的当儿，他从衣兜里掏出写满字迹的笔记本，请求让他念一遍。托尔从长篇大论的笔记中提出一个与阿姆菲尔德和普弗尔完全不同的作战计划。
  网络来源: |
    托尔（1777-1842），俄国步兵上将，1812年任俄军总军需官，以勤勉勘察地形著称。参加过奥斯特利茨战役、莱比锡会战，后任交通部长、国务会议成员。

- 名词: 施泰因伯爵
  分类: 人物
  解释: |
    海因里希·弗里德里希·卡尔·冯·施泰因帝国男爵，普鲁士民族主义政治家、改革家，曾任普鲁士首相。1807年领导普鲁士改革，废除农奴制度、推行地方自治。因被拿破仑通缉而流亡俄国。1812年在圣彼得堡成为沙皇亚历山大一世的重要顾问，是劝说沙皇拒绝与拿破仑媾和的主要力量之一。
  书中原文: |
    被邀请出席这次非正式会议的有：瑞典将军阿姆菲尔德，侍从武官沃尔佐根，温岑格罗德——就是拿破仑称之为法国逃亡者的那个人，米绍，托尔，完全不是军人的施泰因伯爵，最后是普弗尔本人，安德烈公爵听说，他是一切事情的主脑。
  网络来源: |
    施泰因（1757-1831），普鲁士政治改革家，1807年任首相推行农奴解放和自治改革，被拿破仑通缉后流亡俄国，1812年任沙皇顾问，影响俄国对法政策。

- 名词: 彼得·米哈伊洛维奇·沃尔孔斯基公爵
  分类: 人物
  解释: |
    俄国公爵、陆军元帅，1812年卫国战争期间担任沙皇亚历山大一世的参谋长，被认为是俄军总参谋部的奠基人。他主持了德里萨的军事会议，转达沙皇的问题并听取各方意见。曾参加奥斯特利茨战役表现英勇，后创立军需官学校和总参谋部图书馆，1843年晋升陆军元帅，并担任帝国宫廷与财产大臣。
  书中原文: |
    彼得·米哈伊洛维奇·沃尔孔斯基公爵担任类似皇帝的参谋长的职务。他带着一卷地图从书房出来，走进客厅，把地图摊在桌上，转达了几个问题，想听听与会诸位对这些问题的意见。
  网络来源: |
    沃尔孔斯基（1776-1852），俄国陆军元帅，1812年任沙皇参谋长，俄军总参谋部奠基人。创办军需官学校、军事地形测绘库和总参谋部图书馆，后任宫廷大臣。

- 名词: 德里萨阵地
  分类: 地点
  解释: |
    1812年卫国战争初期俄军在德里萨城（今白俄罗斯上德文斯克）西北部西德维纳河左岸河曲处构筑的筑垒阵地。由普鲁士将军普弗尔设计，按其迂回运动理论构建，曾被认为是空前的战术杰作。实际上由于法军兵力绝对优势，该阵地被证明毫无意义，俄军于1812年7月2日将其弃守东撤。
  书中原文: |
    这天早晨，米绍上校陪同皇帝视察德里萨工事，他向皇帝证明说，普弗尔所构筑的这个防御阵地，被认为是空前的战术杰作，它可以致拿破仑于死地，其实，这个阵地毫无意义，是俄国军队的坟墓。
  网络来源: |
    德里萨阵地是1812年普弗尔设计的筑垒兵营，位于西德维纳河畔的德里萨城附近。因不符合实际战况，俄军被迫弃守东撤，成为脱离实际的军事理论的象征。

- 名词: 一八〇六年普法战争
  分类: 事件
  解释: |
    1806年10月拿破仑法国与普鲁士王国之间的战争，以耶拿-奥尔施泰特双重会战为决定性战役。拿破仑在耶拿击败霍恩洛厄亲王部，达武元帅在奥尔施泰特以少胜多击败普军主力。普鲁士在六周内被征服，被迫签订《提尔西特和约》，割让一半领土。此战暴露了普鲁士线式战术的落后，催生了沙恩霍斯特等人的军事改革。
  书中原文: |
    一八〇六年，普弗尔是在耶拿和奥尔施泰特两地结束战斗的那场战争的计划拟定人之一；但是他从那场战争的结局中一点也没看出他的理论的错误。相反，在他看来，没有照他的理论去做，是失败的唯一原因。
  网络来源: |
    1806年10月14日拿破仑在耶拿和奥尔施泰特双线击溃普军，六周内征服普鲁士。此战导致普鲁士军事改革，并深刻影响了欧洲格局。

- 名词: 迂回运动论
  分类: 概念
  解释: |
    普鲁士军事理论家普弗尔从腓特烈大帝战争史中总结出的一套军事理论，强调通过侧翼迂回运动来击败敌军。普弗尔认为这一理论是绝对正确的军事科学，任何实际战争中的失败都是因为没有严格按照该理论执行。托尔斯泰通过这一概念讽刺了脱离实际的教条主义军事思想。
  书中原文: |
    他有他的科学——他从腓特烈大帝战争史得出的迂回运动论，他所看到的现代战争史中的种种事例，他觉得那些都是毫无意义、野蛮、杂乱无章的冲突，作战的双方都犯了无数的错误，以致那些战争都不能称之为战争：它们不符合理论，不能作为研究的对象。
  网络来源: |
    迂回运动论是普弗尔从腓特烈大帝战史中总结的侧翼迂回理论，被视为绝对军事科学。托尔斯泰在《战争与和平》中以此批判脱离现实的教条主义军事思想。

- 名词: 米绍
  分类: 人物
  解释: |
    即米绍上校，法国人，服务于俄国军队的上校军官，在1812年拿破仑侵俄战争期间担任库图佐夫元帅与沙皇亚历山大一世之间的专使。详见"米绍上校"词条。
  书中原文: |
    被邀请出席这次非正式会议的有：瑞典将军阿姆菲尔德，侍从武官沃尔佐根，温岑格罗德——就是拿破仑称之为法国逃亡者的那个人，米绍，托尔，完全不是军人的施泰因伯爵，最后是普弗尔本人，安德烈公爵听说，他是一切事情的主脑。
  网络来源: |
    同"米绍上校"。米绍是1812年战争中服务于俄军的法国籍上校，担任沙皇与军队之间的信使。
