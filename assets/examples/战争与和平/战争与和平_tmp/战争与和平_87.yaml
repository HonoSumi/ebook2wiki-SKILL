- 名词: 丹尼洛
  分类: 人物
  解释: |
    丹尼洛是列夫·托尔斯泰《战争与和平》中罗斯托夫家的猎犬手首领（狩猎总管），留着长发，腰插短刀，手持皮鞭，负责管理罗斯托夫家的猎犬队伍。他狩猎技艺高超、勇敢果断，在猎狼行动中纵身扑到狼背上，死死揪住狼的耳朵，最终成功活捉大狼。在主人面前保持谦卑，不善言辞但流露出孩子般温顺而愉快的微笑。
  书中原文: |
    丹尼洛吹响了追狼的低沉号角；另外一群猎犬加入了头三只猎犬……丹尼洛时而低沉、时而尖厉的呼号最突出。他的声音仿佛充满了整个森林，而且冲出森林以外，在田野远处回响。
  网络来源: |
    https://m.zhangyue.com/readbook/10193695/14.html
- 名词: 谢苗
  分类: 人物
  解释: |
    谢苗是《战争与和平》中罗斯托夫伯爵的马夫兼猎手，在狩猎场景中作为伯爵身边的随行人员出现。他熟悉猎犬和狩猎事务，管理伯爵身旁的猎犬，在追狼过程中一直提醒伯爵注意狼的方向。他性格沉稳老练，当伯爵放走了狼惊慌失措时，他早已绕道去拦截逃窜的狼。
  书中原文: |
    谢苗松了口气，俯下身来整理一下被小公狗弄乱了的皮带；伯爵也松了口气，瞅见手中的鼻烟壶，打开来捏了一撮鼻烟。"回来！"谢苗对跑出林外的小狗喊道。……但是，谢苗已经不在那儿了：他正绕着灌木林奔驰，不让狼跑进森林里去。
  网络来源: |
    https://www.yunshuwu.cn/chap/8603.html
- 名词: 米季卡
  分类: 人物
  解释: |
    米季卡是《战争与和平》中罗斯托夫家的猎手/车夫，在狩猎场景中负责与伯爵配合堵截狼。他在追狼过程中眼疾手快，最先发现狼的踪迹，用帽子指向同伴示意狼的方向。在后来的章节中，他还以弹奏巴拉莱卡琴的形象出现，展现出俄罗斯民间艺术的一面。
  书中原文: |
    伯爵向四外张望，看见米季卡在他右边，他瞪着两眼盯着伯爵，举起帽子，向他指着另一侧的前方。"当心！"他大喊一声，听得出他早就憋着要喊出来。他放开猎犬，策马向伯爵这边驰来。
  网络来源: |
    https://www.26reads.com/library/91222-war-and-peace/3/4/7
- 名词: 纳斯塔西娅·伊万诺夫娜
  分类: 人物
  解释: |
    纳斯塔西娅·伊万诺夫娜是《战争与和平》中罗斯托夫家的侍从丑角（小丑/弄臣），属于庄园中的食客阶层。她穿着女短棉袄，常常带着悲伤的面容，在书中以滑稽戏谑的形象出现。在狩猎场景中她随行捡拾鼻烟壶，在后来的圣诞节场景中更以丑角身份与娜塔莎对话，烘托出罗斯托夫家富有生活气息的庄园氛围。
  书中原文: |
    伯爵打了一个哆嗦，把鼻烟壶失落了。纳斯塔西娅·伊万诺夫娜下马去捡鼻烟壶。
  网络来源: |
    http://bcc.blcu.edu.cn/show/700377792_1_4_-1_-1/4
- 名词: 大叔
  分类: 人物
  解释: |
    大叔全名米哈伊尔·尼卡诺雷奇，是《战争与和平》中尼古拉·罗斯托夫和娜塔莎·罗斯托娃的叔叔，属于罗斯托夫家族的旁系亲属。他是一位老派的贵族猎人，性格直率、固执而富有乡土气息，对自己的猎犬怀有深厚感情。在狩猎场景中，他的红毛公犬鲁加伊最终捕获了一只灰兔，令他极为自豪。他与侄子侄女关系亲密，展现俄罗斯乡村贵族生活的质朴一面。
  书中原文: |
    大叔的一个猎手在狼的前头斜刺里驰来，他的几只狗又拦住了狼。又把它包围起来。尼古拉、他的马夫、大叔和他的猎手，围着狼打转……右首灌木丛上方隐约露出的大叔的帽子。
  网络来源: |
    https://book.qq.com/book-read/27775529/7
- 名词: 伊拉金
  分类: 人物
  解释: |
    伊拉金是《战争与和平》中与罗斯托夫家族相邻的地主猎人，热衷狩猎。起初因在属于罗斯托夫家狩猎范围的地点狩猎而引起尼古拉·罗斯托夫的敌意，但二人见面后伊拉金以礼相待，主动示好并邀请尼古拉到自己的狩猎场狩猎，二人由此化解矛盾。他有一只以三户奴仆换来的名贵红花斑母犬叶尔扎，体现当时贵族对猎犬的珍视。
  书中原文: |
    "这是伊拉金的猎手和咱们的人干起来了。"尼古拉的马夫说。……"米哈伊尔·尼卡诺雷奇，您怎么？"他把脸转向大叔，问道。
  网络来源: |
    http://bcc.blcu.edu.cn/show/700364770_3_6_-1_-1/4
- 名词: 卡拉伊
  分类: 人物
  解释: |
    卡拉伊是《战争与和平》中尼古拉·罗斯托夫的一只老公猎犬（猎狼犬），毛色灰白，身上常有纠结成团的狗毛垂挂。它年纪虽老但经验丰富、勇猛顽强，是尼古拉最信赖的猎犬。在猎狼行动中，卡拉伊在关键时刻截住老狼，死死咬住狼的喉咙将其拖入沟中，最终使猎人们能够活捉大狼，成为全场的英雄。
  书中原文: |
    就让卡拉伊扑过去，当着在那边守候的大叔的面，狠命地咬着它的喉咙不放。……卡拉伊使出全身力气，尽可能伸长身子，眼睛盯着那狼，挺费劲地奔到狼身旁，准备截住它。……卡拉伊箝住了它的喉咙。
  网络来源: |
    https://www.yunshuwu.cn/chap/8605.html
- 名词: 米尔卡
  分类: 人物
  解释: |
    米尔卡是《战争与和平》中尼古拉·罗斯托夫的一只黑毛白花、臀部宽大的母猎犬，尼古拉亲昵地称她为"米卢什卡"。她速度极快，在猎狼时第一个追上狼，但狼向她斜视一眼后她便被震慑而停住。在后来的猎兔比赛中，她与伊拉金的母犬叶尔扎展开激烈竞争，但最终输给了大叔的红毛公犬鲁加伊。
  书中原文: |
    第一个追上那只狼的是黑毛白花、臀部肥大的米尔卡，它逐渐接近那只野兽了。更近了，更近了……眼看就要追上。但是，那只狼向它微微斜了斜眼，米尔卡不像平素那样更加一把劲儿，而是忽然翘起尾巴，两只前脚撑着地停住了。
  网络来源: |
    https://pages.haomooc.com/index.php?s=book&c=extend&id=9531
- 名词: 柳比姆
  分类: 人物
  解释: |
    柳比姆是《战争与和平》中尼古拉·罗斯托夫的一只红毛猎犬，在俄语中意为"亲爱的"。它勇猛迅猛，在追狼过程中从米尔卡后面窜出，箭也似地向狼扑去，咬住了狼的后腿，但在狼反击的一瞬间惊慌跳到旁边。它是罗斯托夫猎犬群中重要的成员之一。
  书中原文: |
    红毛柳比姆从米尔卡后面窜出来，箭也似地向狼扑去，咬住了它的后腿，但是，就在那一瞬间，它惊慌地跳到旁边去了。
  网络来源: |
    https://pages.haomooc.com/index.php?s=book&c=extend&id=9531
- 名词: 沃尔托恩
  分类: 人物
  解释: |
    沃尔托恩是《战争与和平》中罗斯托夫家的一只猎狐犬，尼古拉·罗斯托夫非常熟悉它的叫声。在狩猎场景中，当猎犬被撒入幼林丛生的山谷后，沃尔托恩最先发出时断时续的嗥叫，其他猎犬随即响应，开启了追狐狸的行动。它是一只在狩猎中负责追踪和示踪的关键猎犬。
  书中原文: |
    尼古拉听见他所熟悉的名叫沃尔托恩的猎犬时断时续的嗥叫；别的狗跟着它叫，追逐声时起时落。
  网络来源: |
    https://pages.haomooc.com/index.php?s=book&c=extend&id=9531
- 名词: 孤林
  分类: 地点
  解释: |
    孤林是《战争与和平》狩猎场景中的重要地理位置，指秋收后田野间成片独立的树林。八月底，树林在秋播作物的黑土田地和麦庄之间犹如绿色的孤林，到秋天则变为金黄和鲜红。狼和狐狸等猎物常常藏匿在这些孤林之中，猎人们围绕孤林布局围猎，等待野兽从林中跑出。
  书中原文: |
    这时尼古拉·罗斯托夫正在他的位置上守候着野兽。根据猎犬追狼的吠声时远时近，根据他所熟悉的猎犬的音调，根据猎犬手们呼号声时远时近而且逐渐提高，他可以感觉到那座孤林中发生的一切。他知道，孤林里有小狼和老狼。
  网络来源: |
    https://www.yunshuwu.cn/chap/8605.html
- 名词: 伐林区
  分类: 地点
  解释: |
    伐林区在《战争与和平》中指的是森林中已被砍伐的区域，有时也指禁伐区。在狩猎场景中，这是狼被猎犬追逐时试图逃往的逃生路线——一旦狼跑进茂密的伐林区，猎犬将难以追击。猎手们的重要任务就是赶在狼之前截断通往伐林区的道路。丹尼洛正是通过迂回到伐林区方向才成功切断了狼的去路。
  书中原文: |
    每当狼打起精神，又向可以救它命的伐林区移动，他们就策马赶上去。……丹尼洛催动了他的枣红马，不是朝着狼、而是一直向伐林区驰去，正如卡拉伊那样，切断狼的去路。
  网络来源: |
    https://www.yunshuwu.cn/chap/8605.html
- 名词: 麦田
  分类: 地点
  解释: |
    麦田是《战争与和平》狩猎场景中狐狸被追逐后出现的区域。尼古拉·罗斯托夫站在一片禾茬地中望见对面的麦田，猎犬追着狐狸从孤林经过山谷分叉向麦田追去，狐狸最终在麦田里被猎犬围住。麦田是狩猎场景中开阔地形的一部分，猎人可以在此观察猎物动向。
  书中原文: |
    尼古拉对面是一片麦田，那儿有一个他的猎手独自在榛树丛薮后面的洼地上站着。……他时时刻刻期待狐狸从那边麦田出现。
  网络来源: |
    https://yunshuwu.cn/chap/8606.html
- 名词: 山谷
  分类: 地点
  解释: |
    山谷是《战争与和平》狩猎场景中的一处地形，指草木茂密的低洼地带。猎犬在追捕狐狸时沿着山谷的一个分叉向麦田追去，猎犬手们也沿着山谷边沿奔跑。山谷是猎物可能藏身和逃窜的路线之一，也是猎人们布置围猎的重要地形参照。
  书中原文: |
    片刻之后，从孤林里发出追狐狸的呼号，整队猎犬合在一起，离开尼古拉，沿着山谷的一个分叉向麦田追去。他看见几个戴红帽子的猎犬手沿着草木茂密的山谷边沿奔跑。
  网络来源: |
    https://yunshuwu.cn/chap/8606.html
- 名词: 溪谷
  分类: 地点
  解释: |
    溪谷是《战争与和平》狩猎场景中的一种地形特征，指林边被水冲塌的小型沟壑。尼古拉·罗斯托夫在守候野兽时，以溪谷作为参照物之一来观察周围环境。狼在逃跑时也曾在溪谷中被卡拉伊追赶上并滚入其中纠缠搏斗。
  书中原文: |
    在半小时中间，罗斯托夫上千次地用焦急不安的目光望着林边（那里有一片白杨幼林，中间矗立着两棵稀奇古怪的大橡树），望着边缘被水冲塌的溪谷，望着右首灌木丛上方隐约露出的大叔的帽子。
  网络来源: |
    https://www.yunshuwu.cn/chap/8605.html
- 名词: 榛树丛薮
  分类: 地点
  解释: |
    榛树丛薮是《战争与和平》狩猎场景中的一种灌木地形，由榛树密集生长而成。猎犬手们在榛树丛薮后面的洼地上守候猎物，而丹尼洛正是从分开的榛树丛薮中纵马驰出的。这种茂密的灌木丛是狩猎场景中俄国乡间地貌的典型特征，既是猎物的藏身处，也是猎人们穿行其中的障碍。
  书中原文: |
    在猎犬之后，榛树丛薮分开了，丹尼洛那匹栗色的、由于出汗皮毛变黑了的马驰了出来。丹尼洛骑在长长的马背上缩作一团，俯向前方，他没有戴帽子，满头乱蓬蓬的白发，通红的脸汗淋淋的。
  网络来源: |
    https://www.yunshuwu.cn/chap/8605.html
- 名词: 白杨幼林
  分类: 地点
  解释: |
    白杨幼林是《战争与和平》狩猎场景中的一处植被景观，指由年轻白杨树组成的林带。在尼古拉·罗斯托夫守候野兽的位置，有一片白杨幼林，中间矗立着两棵稀奇古怪的大橡树，成为他判断视野方向的参照物之一。这类风景描写体现了托尔斯泰对俄国乡村自然景色的细腻刻画。
  书中原文: |
    在半小时中间，罗斯托夫上千次地用焦急不安的目光望着林边（那里有一片白杨幼林，中间矗立着两棵稀奇古怪的大橡树），望着边缘被水冲塌的溪谷，望着右首灌木丛上方隐约露出的大叔的帽子。
  网络来源: |
    https://www.yunshuwu.cn/chap/8605.html
- 名词: 号角
  分类: 物件
  解释: |
    号角是《战争与和平》狩猎场景中猎人使用的信号工具，由金属或兽角制成，能发出低沉或尖厉的声音。丹尼洛吹响追狼的低沉号角以指挥猎犬；在猎手之间发生冲突时，号角也被用作斗殴的信号。号角是19世纪俄国贵族狩猎中不可或缺的通信工具，不同音调和节奏代表不同的指令。
  书中原文: |
    后，丹尼洛吹响了追狼的低沉号角；另外一群猎犬加入了头三只猎犬，可以听见猎犬响亮的吼叫夹杂着追狼的特别的吠声。……那儿吹响了号角——发出斗殴的信号。
  网络来源: |
    http://bcc.blcu.edu.cn/show/1172492799_1_1_5_6/0
- 名词: 鞭子
  分类: 物件
  解释: |
    鞭子是《战争与和平》中猎手们使用的狩猎工具，用短柄连接皮条制成，用以驱策马匹和指挥猎犬。丹尼洛在追狼时用短柄鞭子拍打枣红马收得紧紧的两肋；丹尼洛也曾举起鞭子指向放走狼的伯爵威吓。鞭子是俄国贵族狩猎中猎手身份的标志之一。
  书中原文: |
    丹尼洛不声不响地骑着马，左手握着出鞘的匕首，仿佛用连枷打禾似的，用他那短柄鞭子拍打枣红马收得紧紧的两肋。……"嘿……！"他举起鞭子指着伯爵威吓道。
  网络来源: |
    https://www.yunshuwu.cn/chap/8605.html
- 名词: 匕首
  分类: 物件
  解释: |
    匕首是《战争与和平》中猎手使用的短刀利器，用于在活捉野兽后处理猎物。丹尼洛在追狼时左手握着出鞘的匕首，随时准备在关键时刻使用。匕首是19世纪俄国贵族猎人的标准装备之一，与鞭子、号角共同构成猎手的典型形象。
  书中原文: |
    丹尼洛不声不响地骑着马，左手握着出鞘的匕首，仿佛用连枷打禾似的，用他那短柄鞭子拍打枣红马收得紧紧的两肋。
  网络来源: |
    https://www.yunshuwu.cn/chap/8605.html
- 名词: 鞍桥
  分类: 物件
  解释: |
    鞍桥是《战争与和平》中马鞍的前部弓形隆起部分，猎人在马上骑行时用于稳定身体和借力。在猎狼场景中，当尼古拉·罗斯托夫看到卡拉伊咬住狼的喉咙时，他抓住鞍桥准备下马去刺狼。鞍桥是马具的重要组成部分，在狩猎和骑行中为骑手提供支撑。
  书中原文: |
    他已经抓住鞍桥准备下马刺那只狼了，这时狼突然从一群狗中间抬起头来，两只前腿搭着沟沿。
  网络来源: |
    https://www.yunshuwu.cn/chap/8605.html
- 名词: 追狼
  分类: 事件
  解释: |
    追狼是《战争与和平》狩猎场景中的核心事件，指罗斯托夫家族在奥特拉德诺耶庄园附近组织的大规模猎狼行动。猎人们布置围猎阵型，放出成群猎犬追逐躲藏在孤林中的狼。这次追狼行动涉及伯爵、尼古拉、丹尼洛、大叔等多方猎人，经过数轮激烈的追逐和搏斗，最终由丹尼洛飞身扑到狼背上将其活捉。
  书中原文: |
    后，丹尼洛吹响了追狼的低沉号角；另外一群猎犬加入了头三只猎犬，可以听见猎犬响亮的吼叫夹杂着追狼的特别的吠声。猎手们已经不是"嗖嗖"地撺掇，而是喊"乌溜——溜"，丹尼洛时而低沉、时而尖厉的呼号最突出。
  网络来源: |
    https://m.zhangyue.com/readbook/10193695/14.html
- 名词: 猎狐
  分类: 事件
  解释: |
    猎狐是《战争与和平》狩猎场景中的另一项狩猎活动，在猎狼之后进行。中午时分，猎犬被撒入幼林丛生的山谷，沃尔托恩最先发现狐狸踪迹并发出嗥叫，整队猎犬合在一起向麦田方向追逐。狐狸在麦田中被猎犬围困，但因伊拉金的猎手介入引发冲突，狐狸的归属成为争议焦点。
  书中原文: |
    片刻之后，从孤林里发出追狐狸的呼号，整队猎犬合在一起，离开尼古拉，沿着山谷的一个分叉向麦田追去。他看见几个戴红帽子的猎犬手沿着草木茂密的山谷边沿奔跑，甚至还看见狗，他时时刻刻期待狐狸从那边麦田出现。
  网络来源: |
    https://yunshuwu.cn/chap/8606.html
- 名词: 猎手斗殴
  分类: 事件
  解释: |
    猎手斗殴是《战争与和平》狩猎场景中发生的冲突事件。在猎狐过程中，罗斯托夫家的猎手与邻家地主伊拉金的猎手因争夺猎获的狐狸发生肢体冲突。尼古拉的马夫报告说"伊拉金的猎手和咱们的人干起来了"，号角被吹响发出斗殴的信号。这场冲突最终因尼古拉与伊拉金的当面对话而化解，后者主动表示友好。
  书中原文: |
    "这是伊拉金的猎手和咱们的人干起来了。"尼古拉的马夫说。尼古拉派马夫去把妹妹和彼佳叫来，他缓缓驰到猎手集合猎犬的地点。有几个猎手向出事地点奔驰。……那儿吹响了号角——发出斗殴的信号。
  网络来源: |
    https://yunshuwu.cn/chap/8606.html
- 名词: 俄国贵族狩猎
  分类: 概念
  解释: |
    俄国贵族狩猎是19世纪俄罗斯贵族社会中极具代表性的传统活动，尤其在1861年农奴制改革前达到鼎盛。大规模狩猎常使用超过100只猎犬和20匹马，耗费巨大，是贵族身份和财富的象征。托尔斯泰在《战争与和平》中以罗斯托夫家族的狩猎场景集中展现了这一文化，包括猎犬驯养、围猎战术、号角信号、猎物处理（活捉狼并用棍子横插狼嘴）等完整流程。狩猎活动也是贵族社交和解矛盾的场所。
  书中原文: |
    伯爵想起他放走了那只狼和为此跟丹尼洛的冲突。……"不过，老弟，你发火了。"伯爵说。丹尼洛什么也没说，只是羞怯地微微一笑，那是孩子般温顺而愉快的微笑。
  网络来源: |
    https://baike.baidu.com/item/%E4%BF%84%E7%BD%97%E6%96%AF%E7%8C%8E%E7%8B%BC%E7%8A%AC/10908630
- 名词: 活捉狼
  分类: 习俗
  解释: |
    活捉狼是19世纪俄国贵族狩猎中的一项传统习俗和技巧。猎犬将狼制服后，猎人上前用一根结实的短棍横插在狼嘴里（卡在上下颚之间），使狼无法合拢咬合，再绑上狼的嘴和四肢，将狼活着驮回庄园。这种"物理口枷"方法既保证了猎人的安全，又保留了活狼作为战利品。托尔斯泰在《战争与和平》中详细描写了这一过程。
  书中原文: |
    "用不着，咱们捆住它的嘴。"于是，他换了个姿势，一只脚踩着狼的脖子，用一根棍子横插在狼嘴里，绑上，好像给它戴上皮嚼子，然后绑上它的腿，丹尼洛把狼来回滚了两滚。
  网络来源: |
    https://baike.baidu.com/item/%E4%BF%84%E7%BD%97%E6%96%AF%E7%8C%8E%E7%8B%BC%E7%8A%AC/10908630
- 名词: 猎犬追猎
  分类: 习俗
  解释: |
    猎犬追猎是俄国贵族狩猎的核心方式，依靠训练有素的猎犬群追逐和制服猎物。猎犬分为不同类型的品种：视觉型猎狼犬（如波索尔/俄罗斯猎狼犬）依靠速度追逐和扑倒猎物，嗅觉型猎狐犬则通过嗥叫追踪和示踪。在《战争与和平》的狩猎场景中，罗斯托夫家的猎犬群分工协作——先由一批猎犬搜索追踪，再由主力猎犬围堵和撕咬，最后由最强壮的猎犬（如卡拉伊）实施致命一击。
  书中原文: |
    根据猎犬追狼的吠声时远时近，根据他所熟悉的猎犬的音调，根据猎犬手们呼号声时远时近而且逐渐提高，他可以感觉到那座孤林中发生的一切。他知道，孤林里有小狼和老狼；他知道，猎犬已经分成两队，正在什么地方追捕，在什么地方出了差错。
  网络来源: |
    https://baike.baidu.com/item/%E8%8B%8F%E4%BF%84%E7%89%A7%E7%BE%8A%E7%8A%AC
