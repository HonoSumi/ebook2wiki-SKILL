- 名词: 斯塔埃尔夫人
  分类: 人物
  解释: |
    斯塔埃尔夫人（Madame de Staël，1766—1817），原名日尔曼娜·内克尔，法国著名作家、文艺理论家，浪漫主义文学的重要代表人物。她是法国大革命前后欧洲文化界的重要人物，在巴黎和瑞士科佩的沙龙成为欧洲思想交流中心。她因反对拿破仑统治而被流放，著有《黛菲妮》《珂丽娜》《论德国》等作品。在《战争与和平》中，库图佐夫在塔鲁丁诺战役期间曾与她通信。
  书中原文: |
    他和参谋人员谈话，他从塔鲁丁诺给斯塔埃尔夫人写信，读小说，颁发奖章，与彼得堡通信，等等，都是属于日常例行事务。
  网络来源: |
    https://en.wikipedia.org/wiki/Madame_de_Stael

- 名词: 穆顿
  分类: 人物
  解释: |
    穆顿（Georges Mouton，1770—1838），全名乔治·穆东，法国将军，后晋封洛博伯爵，1831年获封法国元帅。他出身平民，从列兵升至元帅，以勇猛和直言不讳著称。拿破仑曾称他为"雄狮"（Mon Mouton est un lion）。在1812年俄法战争的小雅罗斯拉维茨军事会议上，他直言不讳地指出只有尽快逃跑一条出路，成为法军决定全面撤退的转折点。
  书中原文: |
    正因为这样，在小雅罗斯拉维茨会议上，那些将军们装模作样地讨论，发表了各种意见，老实憨直的军人穆顿说出了大家心里的话——只有尽快逃跑，他这个最后的意见一下子堵住了大家的嘴，没有一个人，甚至拿破仑，都说不出什么来反对这个大家都意识到的真理。
  网络来源: |
    https://en.wikipedia.org/wiki/Georges_Mouton,_Comte_de_Lobau
    https://www.napoleon.org/en/history-of-the-two-empires/biographies/mouton-georges-comte-and-general/

- 名词: 梅德内
  分类: 地点
  解释: |
    梅德内（Medyn / Медынь），又译作梅丁，是俄罗斯卡卢加州的一个城市，位于梅德内河畔，距卡卢加西北约62公里。在1812年俄法战争中，此地发生了关键性的梅德内战斗（1812年10月13日）：俄军伊洛瓦伊斯基率领的哥萨克部队击败了波尼亚托夫斯基指挥的法军前卫，迫使拿破仑无法经由梅德内—叶利尼亚的富饶路线向南撤退，只能沿已被焚毁的斯摩棱斯克旧道西撤，从而注定了法军覆灭的命运。
  书中原文: |
    库图佐夫甚至想到拿破仑的军队可能退回梅德内和尤赫诺夫；但是他未能预见那件已经成为事实的事，那就是拿破仑在离开莫斯科的头十一天疯狂地、抽风似地、不停歇地逃窜。
  网络来源: |
    https://encyclopedia2.thefreedictionary.com/Medyn

- 名词: 尤赫诺夫
  分类: 地点
  解释: |
    尤赫诺夫（Yukhnov / Юхнов），俄罗斯卡卢加州西部城镇，尤赫诺夫斯基区行政中心，位于库纳瓦河畔，自1410年即有记载，1777年正式建市。在1812年俄法战争中，该地区是著名俄军游击队指挥官丹尼斯·达维多夫（托尔斯泰《战争与和平》中杰尼索夫的原型）的游击活动基地，其游击队从这里出发打击拿破仑军队的补给线和后方部队。库图佐夫在莫斯科被占领后曾推测拿破仑军队可能经尤赫诺夫方向撤退。
  书中原文: |
    库图佐夫甚至想到拿破仑的军队可能退回梅德内和尤赫诺夫；但是他未能预见那件已经成为事实的事，那就是拿破仑在离开莫斯科的头十一天疯狂地、抽风似地、不停歇地逃窜。
  网络来源: |
    https://baike.baidu.com/item/%E5%B0%A4%E8%B5%AB%E8%AB%BE%E5%A4%AB/7706810

- 名词: 网开三面
  分类: 概念
  解释: |
    "网开三面"（原文直译为"金桥"，意为"给败军留一条逃跑的路"），是《战争与和平》中库图佐夫的核心战略思想之一。典出《史记·殷本纪》商汤"网开三面"的典故，在西方军事术语中称"golden bridge"（金桥），克劳塞维茨《战争论》中亦有论述。其涵义是：不要将败军逼入绝境，而应留一条生路，避免其困兽犹斗，从而以最小的代价促使敌军溃退。在拿破仑法军从莫斯科撤退后，库图佐夫坚决反对俄军将领们发起进攻的主张，而是主张"网开三面"，保存俄军实力，让行将灭亡的敌人自行溃灭。
  书中原文: |
    只有库图佐夫一个人全力（凡是总司令的力量都不大）反对进攻。他不能对他们说我们现在说的话；何必去厮杀，何必封锁大路，使自己的人受损失，残酷地斩尽杀绝不幸的人？既然从莫斯科到维亚济马不战而失掉了三分之一的军队，又何必多此一举呢？他对他们说了一些从他老年人的智慧中引出的他们能够懂得的话，他跟他们讲"网开三面"，可是他们讥笑他，中伤他，他们暴跳如雷，火冒三丈，在被打死的野兽面前逞威风。
  网络来源: |
    https://m.zhangyue.com/readbook/12516377/47.html
