- 名词: 随军小贩
  分类: 人物
  解释: 跟随军队移动、向士兵出售食品饮料烟草等生活用品的平民商人。在19世纪欧洲军队中普遍存在，在俄军后勤补给不足时承担了重要的信贷和供应功能。
  书中原文: "只有随军小贩敢做生意，不过他们卖的都是抢来的东西。"
  网络来源: https://m.zhangyue.com/readbook/11536013/17.html

- 名词: 受伤的野兽比喻
  分类: 概念
  解释: 托尔斯泰在《战争与和平》中使用的核心意象，将拿破仑军队比喻为受伤的野兽——在莫斯科陷入绝境后盲目挣扎，最终加速覆灭，体现了作者的历史观：战争胜负不取决于统帅天才，而取决于历史必然性。
  书中原文: "整个军队的景况，犹如一头受伤的野兽的景况，感到自己行将灭亡，但不知怎么办。"
  网络来源: https://book.douban.com/annotation/147707482/

- 名词: 卡拉塔耶夫缝衬衫
  分类: 事件
  解释: 皮埃尔被俘期间，农民士兵普拉东·卡拉塔耶夫用法国人发给俘虏的麻布，在简陋条件下为一名法国士兵缝制衬衫，展现了超越敌我的善良淳朴，是托尔斯泰笔下"人民智慧"的象征。
  书中原文: "诺言是事业的亲兄弟。说星期五做好，就星期五做好。"
  网络来源: https://www.banceo.com/article/38792.html

- 名词: 皮埃尔的精神觉醒
  分类: 事件
  解释: 皮埃尔·别祖霍夫在被法军俘虏期间，经历了目睹行刑的信仰崩塌、与卡拉塔耶夫的相遇以及极端困苦中的领悟，最终找到内心宁静与精神自由，完成了从迷茫贵族到精神觉醒者的转变。
  书中原文: "正是在这一阵子，他得到了过去曾经追求而追求不到的宁静和满足。"
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9668

- 名词: 皮埃尔的光脚板
  分类: 概念
  解释: 皮埃尔被俘后赤足的意象，象征贵族身份的剥离和回归人的本真状态，体现托尔斯泰的哲学命题：痛苦有界限、自由有界限，当人失去外在一切时反而能触及内心最真实的自由。
  书中原文: "他光着脚板。"
  网络来源: https://book.douban.com/annotation/18196373/

- 名词: 死的恐怖
  分类: 概念
  解释: 皮埃尔目睹法军行刑后经历的存在主义震撼，导致其对世界、信仰的全盘崩溃，但也正是通过直面死亡恐惧，他最终获得了精神的觉醒与内心的和谐。
  书中原文: "只有通过死的恐怖、通过艰难困苦和通过他在卡拉塔耶夫身上所懂得的东西才得到这种宁静和内心的和谐。"
  网络来源: https://yunshuwu.cn/chap/8759.html

- 名词: 内心的和谐
  分类: 概念
  解释: 皮埃尔一生所追求的精神状态，曾通过慈善、共济会、爱情和理性思索均未获得，最终在被俘期间通过卡拉塔耶夫的朴素智慧领悟——真正的和谐不来自外在追求，而来自接纳生命本真。
  书中原文: "他长期以来在自己的生活中从各方面寻求这种宁静、内心的和谐"
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9704

- 名词: 包脚布
  分类: 物件
  解释: 俄罗斯军队的传统裹脚布（портянки），始于彼得大帝时期从荷兰军队学来，用布料包裹双脚再穿军靴，比袜子更耐穿保暖。2012年底俄军才彻底废除这一传统。
  书中原文: "我们可以做一副很好的包脚布。"
  网络来源: https://m.hujiang.com/ru/p448504/

- 名词: 阿佐尔
  分类: 物件
  解释: 与皮埃尔和卡拉塔耶夫同住在棚子里的一只小狗，没有固定主人，也没有固定名字：法国人叫它阿佐尔，其他人叫它费姆加尔卡、小灰子或薇薇。象征着战争中的无主生命和朴素生活的生机。
  书中原文: "法国人叫它阿佐尔，那个爱讲故事的士兵叫它费姆加尔卡，卡拉塔耶夫和其他的人叫它小灰子，有时叫它薇薇。"
  网络来源: https://pages.haomooc.com/index.php?c=extend&id=9683&s=book

- 名词: 基里尔先生
  分类: 人物
  解释: 法军俘虏对皮埃尔的称呼。皮埃尔的父名为"基里洛维奇"，法国人不熟悉俄国的父名制度，将其简称为"基里尔先生"（Monsieur Kiril），反映了跨文化互动中的语言趣味。
  书中原文: "多么好的太阳，嗯，基里尔先生（法国人都这样叫他），简直是春天。"
  网络来源: https://www.jianshu.com/p/8ec09626f5bd

- 名词: 俄国夏天扯不到一起
  分类: 概念
  解释: 卡拉塔耶夫的朴素箴言，皮埃尔反复默念以慰藉自己。意为抽象概念（国家、战争、政治）与具体生活感受不可混为一谈，表达了一种顺应天命的朴素哲学。
  书中原文: "俄国、夏天——扯不到一起。"
  网络来源: http://fb.newdu.com/book/s622.html

- 名词: 卡拉塔耶夫的谚语
  分类: 概念
  解释: 普拉东·卡拉塔耶夫的语言充满民间谚语，如"受苦一时，活命一世""运气就像拖网里的水""没有工具连虱子都抓不住"等。托尔斯泰借此表现俄国农民的朴素智慧。
  书中原文: "两袖清风，慷慨大方；腰缠万贯，吝啬小鬼。"
  网络来源: https://qushici.com/wenxue/baike/21677.html

- 名词: 行刑恐惧
  分类: 事件
  解释: 皮埃尔被法军俘虏后亲眼目睹对俄国平民的处决，造成精神崩溃——他心中支撑一切的"强大弹簧"断裂，对世界、良心、灵魂和上帝的信仰全部破灭，这是其精神转变的起点。
  书中原文: "在行刑时他所感受的可怕的时刻"
  网络来源: https://book.douban.com/annotation/122769137/

- 名词: 索科洛夫
  分类: 人物
  解释: 《战争与和平》中一名病重的俄国俘虏士兵，患痢疾身体极度虚弱。皮埃尔曾试图为他向法军班长求情，但最终他被法军遗弃在莫斯科。体现了战争中被忽视的底层士兵的悲惨命运。
  书中原文: "皮埃尔告诉他应当照管一下那个士兵。班长让皮埃尔尽管放心，他说有流动医院和常设医院，都会照管病人的"
  网络来源: https://www.williamlong.info/xiaoshuo/archives/213.html

- 名词: 托马斯(法军士兵)
  分类: 人物
  解释: 《战争与和平》中的一名法国士兵，曾向法军班长提到皮埃尔"是个有教养的人、会说法语、是落魄的俄国贵族"，促成了法军班长对皮埃尔的照顾。
  书中原文: "您知道，托马斯前些时候对我说：基里尔是个有教养的人，他会说法语；他是落魄的俄国贵族，但他是个人物。"
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=286

- 名词: 普拉托什
  分类: 人物
  解释: 法国士兵对普拉东·卡拉塔耶夫的法语昵称。将俄语名字"普拉东"（Platon）加上法语后缀"-oche"改造而成，带有亲切意味，反映了法军士兵与俄国俘虏之间朴素友好的人际关系。
  书中原文: "他问皮埃尔，给他缝衬衫的士兵普拉托什可在这个棚子里。"
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=286

- 名词: 法军发给俘虏布料
  分类: 事件
  解释: 法军占领莫斯科期间，曾获得一批皮料和麻布，分发给被俘的俄国士兵，让他们自己缝制靴子和衬衫。卡拉塔耶夫借此为一名法国士兵缝制了衬衫。
  书中原文: "一个星期前，法国人得到一批皮料和麻布，发给俘虏缝制靴子和衬衫。"
  网络来源: https://m.zww.cn/baike/ebook/1/393169/393183_13.htm

- 名词: 秋高气爽(战争与和平)
  分类: 概念
  解释: 托尔斯泰笔下的莫斯科秋景，以麻雀山为视角展现莫斯科在秋日阳光下的壮丽全景。这种明净的秋光既是人物内心变化的背景，也是作品"和平"主题的重要意象。
  书中原文: "一连几天风和日丽，早晨有薄霜，正是所谓秋高气爽季节。"
  网络来源: http://bcc.blcu.edu.cn/show/700804667_11_11_47_49/4

- 名词: 无人放牧的牲口比喻
  分类: 概念
  解释: 托尔斯泰将进入莫斯科后的法军比作无人看管的牲口，踩踏脚下可赖以生存的饲料而无意义地消耗，最终走向灭亡，以此批判拿破仑军事决策的荒谬和历史必然性。
  书中原文: "这支军队就像无人放牧的牲口，践踏脚下可以使他们免于饿死的饲料"
  网络来源: https://book.douban.com/people/249920559/annotation/33436193/

- 名词: 辎重队被劫持
  分类: 事件
  解释: 法军驻留莫斯科期间，其辎重队在斯摩棱斯克大路上被俄军劫持；塔鲁丁诺战役后法军惊慌失措，被迫沿旧路撤退，辎重损失惨重。
  书中原文: "这支军队只是在辎重队在斯摩棱斯克大路上被劫持，塔鲁丁诺发生战斗突然惊慌失措时才逃走的。"
  网络来源: https://wtxy.net/book/story.php?id=1050

- 名词: 两袖清风慷慨大方腰缠万贯吝啬小鬼
  分类: 概念
  解释: 卡拉塔耶夫在把布头还给法国兵后所引用的俄国谚语，意为贫穷的人往往慷慨，富有的人反而吝啬。法国兵虽然自身穷困仍归还布头，印证了这一道理。
  书中原文: "两袖清风，慷慨大方；腰缠万贯，吝啬小鬼。"
  网络来源: https://www.banceo.com/article/38792.html

- 名词: 诺言是事业的亲兄弟
  分类: 概念
  解释: 卡拉塔耶夫的谚语，意为答应别人的事就要像对待亲兄弟一样认真完成。他说星期五做好衬衫就如期完成，体现了俄国农民的诚实守信品性。
  书中原文: "诺言是事业的亲兄弟。说星期五做好，就星期五做好。"
  网络来源: https://m.zww.cn/baike/ebook/1/393169/393183_13.htm

- 名词: 皮埃尔拒绝搬到军官棚
  分类: 事件
  解释: 法军提出将皮埃尔从条件差的士兵棚转到条件较好的军官棚，但他拒绝离开，留在普通士兵中间。这象征他的精神转变——放弃贵族特权，从平民生活中获得真正的内心和谐。
  书中原文: "虽然法国人提出要把他从士兵棚子转到军官棚子里，但是他仍然留在他第一天进的那个棚子。"
  网络来源: https://www.williamlong.info/xiaoshuo/archives/214.html

- 名词: 常设医院(战争与和平)
  分类: 概念
  解释: 法军沿补给线设立的固定后方医院，主要设在斯摩棱斯克、维尔纳等大型据点。实际条件极差，传染病（斑疹伤寒、痢疾）大规模流行，病患死亡率极高，是法军俄征溃败的重要因素之一。
  书中原文: "有流动医院和常设医院，都会照管病人的"
  网络来源: https://wtxy.net/book/story.php?id=1032
