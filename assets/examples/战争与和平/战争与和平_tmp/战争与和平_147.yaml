- 名词: 玛夫拉·库兹米尼什娜
  分类: 人物
  解释: 托尔斯泰小说《战争与和平》中的次要角色，罗斯托夫伯爵家的女管家，一位忠诚慈祥的老仆人。在莫斯科撤退前夕，她协助娜塔莎将受伤士兵安置到罗斯托夫家的院子里，并在主人离开后留守空宅，曾将自己的积蓄25卢布送给一位素不相识的青年军官。
  书中原文: "曾做过女管家的玛夫拉·库兹米尼什娜老太婆，从站在门口的人群里出来，走到一辆带椴皮席篷的大车跟前，跟一个躺在车上的面色苍白的青年军官谈话。"
  网络来源: https://read.lmeee.com/reader/b8jn63/2b5egx0

- 名词: 霍夫曼药水
  分类: 物件
  解释: 18世纪德国哈雷大学医生兼化学家弗里德里希·霍夫曼发明的一种药用酊剂，由一份乙醚和三份酒精混合而成，又称复方醚醑。19世纪在欧洲和俄罗斯被广泛用作止痛、镇静、抗痉挛及治疗神经紧张的常用家庭药品。在小说中，罗斯托夫伯爵夫人头痛时使用此药。
  书中原文: "娜塔莎跑回家里，踮着脚尖走进卧室半掩着的门，屋里有一股醋酸味和霍夫曼药水味。"
  网络来源: https://en.m.wikipedia.org/wiki/Compound_spirit_of_ether

- 名词: 奥博连斯基哥萨克团
  分类: 物件
  解释: 1812年战争期间由瓦西里·彼得罗维奇·奥博连斯基公爵组建并指挥的哥萨克骑兵团。在《战争与和平》中，小儿子彼佳·罗斯托夫最初加入该团，前往白采尔科维集结，后因母亲担忧而被调往别祖霍夫团。
  书中原文: "自从彼佳参加奥博连斯基哥萨克团，开拔到该团成立的地方——白采尔科维城以后，伯爵夫人感到心慌意乱。"
  网络来源: https://en.wikipedia.org/wiki/Vasily_Obolensky

- 名词: 多罗戈米洛夫城门
  分类: 地点
  解释: 莫斯科古城墙上的城门之一，位于莫斯科河畔的多罗戈米洛沃地区，是通往斯摩棱斯克和欧洲方向的主要通道。在1812年拿破仑入侵莫斯科时，法军先头部队正是通过此城门进入莫斯科的。
  书中原文: "每天都从多罗戈米洛夫城门运进几千名波罗金诺战役的伤员，从另外一些门运出几千辆满载着居民和财物的大车。"
  网络来源: https://www.163.com/dy/article/FEMMCF8E05435IFC.html

- 名词: 别祖霍夫团
  分类: 物件
  解释: 《战争与和平》中1812年战争期间在莫斯科近郊整编的一个步兵团，以别祖霍夫家族命名。彼佳·罗斯托夫为安抚母亲而从奥博连斯基哥萨克团调至此团，罗斯托夫伯爵以为该团不会参加战斗，但实际上该团后来仍投入了战斗。
  书中原文: "他把彼佳从奥博连斯基团调到在莫斯科近郊整编的别祖霍夫团。"
  网络来源: https://yunshuwu.cn/chap/8709.html

- 名词: 菲利会议
  分类: 事件
  解释: 1812年9月13日（俄历9月1日）在莫斯科郊外菲利村由俄军总司令库图佐夫主持召开的军事会议。会议核心议题是是否在莫斯科城下与法军再战。多数将领主张撤退，库图佐夫最终单方面决定放弃莫斯科以保存俄军有生力量，这一决定成为1812年卫国战争反败为胜的关键转折点。
  书中原文: "但是，人们不过是这样说说罢了，而实际上，那些走的人和留下的人，嘴里虽不说，但都感觉到（虽然决定放弃莫斯科的菲利会议还没举行），莫斯科一定要放弃，得赶快离开，保全自己的财物。"
  网络来源: https://rusmuseumvrm.ru/data/collections/painting/19_20/kivshenko_a._d._voenniy_sovet_v_filyah_v_1812_godu._1880._zh-4176/?lang=en
