- 名词: 法国军官
  分类: 人物
  解释: 1812年拿破仑军队占领莫斯科时，一名来到皮埃尔藏身的巴兹杰耶夫宅邸征用法军军官。他高个子、英武俊秀，态度和蔼，用俄语向屋中众人打招呼。在后续章节中揭示名叫朗巴，第十三轻骑兵团上尉，因波罗金诺战役负伤，后与皮埃尔共进晚餐并彻夜交谈。
  书中原文: 来了两个人。一个是军官，高个儿，英武俊秀，另一个显然是士兵或者勤务兵，又矮又瘦，两眼下陷，晒得黝黑，神情呆滞。那个军官拄着棍子，微跛着向前走来。
  网络来源: https://www.williamlong.info/xiaoshuo/archives/247.html

- 名词: 德国大学生刺杀拿破仑
  分类: 事件
  解释: 1809年10月，18岁的德国青年弗里德里希·斯塔普斯在维也纳美泉宫外企图用餐刀刺杀拿破仑的历史事件。斯塔普斯被逮捕后坦然承认刺杀意图，被行刑队枪决，成为早期德意志民族主义的殉道者。
  书中原文: 皮埃尔知道一八〇九年一名德国大学生在维也纳谋杀波拿巴的详细经过，也知道那个学生被枪毙了。
  网络来源: https://en.wikipedia.org/wiki/Friedrich_Staps

- 名词: 农民外衣
  分类: 物件
  解释: 俄国农民穿着的粗布外套，皮埃尔为了隐姓埋名留在莫斯科执行刺杀拿破仑的计划而特意购买。这种外衣用粗糙土布制成，样式朴素，能使穿戴者混入平民之中不被认出贵族身份。
  书中原文: 皮埃尔买了农民的外衣后（买农民外衣的目的完全是为了参加人民保卫莫斯科的战斗），遇见了罗斯托夫家里的人，娜塔莎对他说：您留下来吗？啊，这太好了！
  网络来源: https://russkayarech.ru/en/archive/2024-4/20-33

- 名词: 共济会手抄本
  分类: 物件
  解释: 皮埃尔的共济会导师约瑟夫·阿列克谢耶维奇·巴兹杰耶夫遗留下来的共济会神秘教义手抄文本，包含共济会的象征符号、教义阐释和精神修行指导。皮埃尔在莫斯科沦陷前夕试图集中精力研读这些手抄本以寻求精神慰藉和命运指引，但终究无法静心。
  书中原文: 皮埃尔好几次想集中注意力看共济会的手抄本，但是都没办到
  网络来源: https://williamlong.info/xiaoshuo/archives/249.html

- 名词: 法军进入莫斯科
  分类: 事件
  解释: 1812年9月14日拿破仑大军在波罗金诺战役后进占莫斯科。莫斯科已是空城，大部分居民随俄军撤离。法军进城后纪律迅速涣散，士兵四散掠夺民宅，随后莫斯科爆发大火烧毁全城约四分之三建筑，拿破仑被迫于10月撤退，这一事件成为拿破仑侵俄战争由胜转衰的关键转折点。
  书中原文: 就在进城的那天，法国司令官们发出一道又一道命令，禁止军队在城里乱跑，严禁对居民施以暴力和抢劫，宣布当天晚上要总点名；尽管采取了许多措施，曾经作为军队成员的人们，仍然不断散入那座富足的、拥有各种设备和大量物资的空城。
  网络来源: https://wapbaike.baidu.com/item/俄法1812年战争/1935378

- 名词: 面包和盐
  分类: 习俗
  解释: 俄罗斯民族迎接贵客的最高传统礼仪，源自古代斯拉夫文化。主人用绣花毛巾托着一块圆面包，面包中央嵌一小碟盐，客人需掰下一块面包蘸盐吃掉，象征双方成为朋友。面包代表富裕与丰收，盐在中世纪价格昂贵，献盐是极为尊重的表示。这一传统至今仍用于外交和婚礼等重要场合。
  书中原文: 莫斯科的居民没有捧着面包和盐以及钥匙向法国人献礼，而是弃城逃走了。
  网络来源: https://www.news.cn/world/2023-02/24/c_1129394641.htm

- 名词: 献钥匙
  分类: 习俗
  解释: 中世纪欧洲城市投降的传统仪式，战败方将城门钥匙交给战胜方，象征统治权转移和投降的正式性。若城市在攻陷前选择投降并举行献钥匙仪式，战胜方须恪守礼仪不得烧杀掠夺。现代已演变为外交礼节，城市向贵宾赠送象征性金钥匙表示最高敬意。
  书中原文: 莫斯科的居民没有捧着面包和盐以及钥匙向法国人献礼，而是弃城逃走了。
  网络来源: https://baike.baidu.com/item/金钥匙/5992

- 名词: 马卡尔·阿列克谢伊奇
  分类: 人物
  解释: 战争与和平中的次要角色，是皮埃尔的共济会导师约瑟夫·阿列克谢耶维奇·巴兹杰耶夫的弟弟。他嗜酒如命、神志不太清醒，住在已故兄长的宅邸中。法军进入莫斯科时，他趁皮埃尔不备抓起手枪跑向走廊企图袭击法国人，被仆人格拉西姆和看门人拦住。
  书中原文: 皮埃尔站在房中间暗自思索的时候，房门开了，门槛上出现了马卡尔·阿列克谢耶维奇，他那一向胆怯的样子完全变了。他敞着长衫。脸通红，样子很难看。他显然喝醉了。
  网络来源: https://wpchaptersummaries.org/2020/10/03/book-11-chptr-28-pv-pg-901/
