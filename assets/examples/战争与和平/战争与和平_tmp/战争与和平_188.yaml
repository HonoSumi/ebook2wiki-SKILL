- 名词: 康士坦丁·帕夫洛维奇大公
  分类: 人物
  解释: 俄罗斯帝国大公，沙皇保罗一世次子、亚历山大一世之弟。参加过奥斯特里茨战役等拿破仑战争，1812年俄法战争期间曾因妨碍军务被库图佐夫调离军队，后返回通知沙皇对作战缓慢的不满。1825年主动放弃皇位继承权。
  书中原文: 把贝尼格森打发走之后，接着康士坦丁·帕夫洛维奇大公来到了军队，他在战争初期参过战，后来被库图佐夫调离了军队。现在大公来到军队，通知库图佐夫说，皇上不满意我军战绩不佳、行动缓慢，皇上打算日内到军队中来。
  网络来源: https://baike.baidu.com/item/%E5%BA%B7%E6%96%AF%E5%9D%A6%E4%B8%81%C2%B7%E5%B7%B4%E7%94%AB%E6%B4%9B%E7%BB%B4%E5%A5%87%E5%A4%A7%E5%85%AC/6474035

- 名词: 别列济纳战役
  分类: 事件
  解释: 1812年11月26-29日拿破仑法军从莫斯科撤退时强渡别列济纳河的战役。法军遭受俄军三路夹攻，损失约2.5-4万人，虽然主力勉强脱困，但骑兵和炮兵几乎完全丧失，标志着拿破仑征俄的彻底失败。库图佐夫在战后因此役向沙皇告发了贝尼格森。
  书中原文: 只有一次，在别列济纳战役以后，他发了脾气，给单独向皇帝打报告的贝尼格森写了如下一封信。
  网络来源: https://baike.baidu.com/item/%E5%88%AB%E5%88%97%E6%B4%A5%E7%BA%B3%E6%B2%B3%E6%88%98%E5%BD%B9/9201177

- 名词: 阿拉克契耶夫
  分类: 人物
  解释: 阿列克谢·阿拉克契耶夫，俄国炮兵上将、亚历山大一世的军事顾问。1815年后以铁腕手段控制内政，推行军屯制，其统治时期被称为"阿拉克契耶夫时期"。在文本中他是1812年随亚历山大一世前往维尔纳的侍从之一。
  书中原文: 皇帝率领着侍从——托尔斯泰伯爵、沃尔孔斯基公爵、阿拉克契耶夫等等，十二月七日离开彼得堡，十二月十一日来到维尔纳，坐着旅行雪橇直接驰往城堡。
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E5%88%97%E5%85%8B%E8%B0%A2%C2%B7%E5%AE%89%E5%BE%B7%E7%83%88%E8%80%B6%E7%BB%B4%E5%A5%87%C2%B7%E9%98%BF%E6%8B%89%E5%85%8B%E5%88%87%E8%80%B6%E5%A4%AB/9453636

- 名词: 一级圣乔治勋章
  分类: 物件
  解释: 俄罗斯帝国最高级别军事勋章，由叶卡捷琳娜二世于1769年设立，一级仅授予取得非凡战略成就的最高级别将军。库图佐夫在维尔纳被亚历山大一世授予此勋章，但皇帝对其不满的情绪人尽皆知。
  书中原文: 他突然好像省悟过来，在他胖脸上闪过一丝几乎看不出的笑容，他恭敬地、低低地俯下身来拿起那件东西。那是一级圣乔治勋章。
  网络来源: https://baike.baidu.com/item/%E5%9C%A3%E4%B9%94%E6%B2%BB%E5%8B%8B%E7%AB%A0/702116

- 名词: 叶卡捷琳娜时代
  分类: 概念
  解释: 叶卡捷琳娜二世（1762-1796年在位）统治俄国的时期，是俄国贵族的"黄金时代"和农奴制鼎盛时期，期间俄国大幅扩张领土、推行开明专制、文化繁荣。文本中库图佐夫在亚历山大一世面前遵循该时代老习惯，将缴获军旗投掷在皇帝脚下。
  书中原文: 库图佐夫遵照叶卡捷琳娜时代的老习惯，吩咐把缴获的军旗投掷在皇帝的脚下，皇帝不愉快地皱了皱眉头，嘴里咕噜着，有人听到他说"老滑稽演员"。
  网络来源: https://baike.baidu.com/item/%E5%8F%B6%E5%8D%A1%E6%8D%B7%E7%90%B3%E5%A8%9C%E4%BA%8C%E4%B8%96/316089

- 名词: 奥廖尔
  分类: 地点
  解释: 俄罗斯奥廖尔州首府，位于莫斯科以南约382公里奥卡河畔，1566年由伊凡雷帝建为要塞。被称为"俄罗斯第三大文学之都"，是屠格涅夫、蒲宁等文学家的故乡。皮埃尔被释放后来到该城养病三个月。
  书中原文: 从俘虏中被释放以后，他来到奥廖尔，到后第三天，他打算去基辅，但是他病了，在奥廖尔躺了三个月；据医生说，他的病是胆热引起的。
  网络来源: https://baike.baidu.com/item/%E5%A5%A5%E5%BB%96%E5%B0%94/8684334

- 名词: 卡拉塔耶夫
  分类: 人物
  解释: 《战争与和平》中的农民士兵，全名普拉东·卡拉塔耶夫。他是皮埃尔在战俘营中结识的难友，象征着俄罗斯民间的纯朴智慧与善良。他不执着于个人得失，与万物和衷共济。托尔斯泰用"圆"的意象描绘他，代表和谐与完整。
  书中原文: 他在被俘期间认识到，卡拉塔耶夫心目中的上帝比共济会员们所承认的造物主更伟大，更无限，更高深。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/21180
