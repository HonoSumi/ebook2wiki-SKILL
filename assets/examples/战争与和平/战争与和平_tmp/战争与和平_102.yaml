- 名词: 巴拉加
  分类: 人物
  解释: 托尔斯泰《战争与和平》中的配角，莫斯科著名的三驾马车车夫，服务于阿纳托利·库拉金和多洛霍夫已有六年。二十七岁，淡褐色头发、红脸膛、粗脖子、矮个子、翘鼻子、小眼放光。他热爱每小时十八俄里的疯狂驰骋，曾多次在夜晚驱车往返于特韦尔和莫斯科之间，帮助阿纳托利和多洛霍夫逃脱追捕、载着茨冈女郎兜风。虽经常挨打受骂、累死马匹，但视二人为真正的老爷，忠心侍奉，不收取固定车资，只在困顿时才向他们借钱。

  书中原文: 巴拉加是著名的三驾马车车夫，他认识多洛霍夫和阿纳托利用他的三驾马车伺候他们已经有六个年头了。
  网络来源: https://book.douban.com/annotation/102659744/

- 名词: 玛特廖莎·马特维耶夫娜
  分类: 人物
  解释: 托尔斯泰《战争与和平》中的茨冈（吉普赛）姑娘，在多洛霍夫府上侍奉。容貌俊俏、瘦削、面色苍白，有一双乌黑闪亮的眼睛和泛着灰蓝色的卷曲黑发，披红色围巾。在阿纳托利·库拉金策划诱拐娜塔莎·罗斯托娃之前，多洛霍夫命她取来貂皮大衣用来裹住出逃的娜塔莎。阿纳托利临行前与她亲吻告别，她以茨冈口音祝福他。

  书中原文: 一个俊俏、瘦削、面色苍白的茨冈姑娘，眼睛又黑又亮，乌黑的鬈发泛着灰蓝色，披着红围巾，手臂上搭着一件貂皮大衣，跑了出来。
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=152

- 名词: 三驾马车
  分类: 物件
  解释: 俄语称"тройка"（troika），俄罗斯传统的三马并排牵引的交通工具。出现于18世纪中叶，最初用于邮政运输。中间辕马小步快跑，两侧边马全速疾驰，时速可达50公里，比欧洲两马牵引更稳定高效。在俄罗斯文化中具有重要的象征意义：果戈理在《死魂灵》中将其升华为俄罗斯民族精神的象征，柴可夫斯基在《四季》中以《十一月·三驾马车》为之谱曲。近代引申为政治经济领域三人领导或三个驱动因素的专有名词。

  书中原文: 门前停着两辆三马雪橇，两名慓悍的车夫勒住马。巴拉加坐上前面的雪橇，高高抬起臂肘，不慌不忙地整理缰绳。
  网络来源: https://zh.wikipedia.org/wiki/%E4%B8%89%E9%A9%BE%E9%A6%AC%E8%BB%8A
