- 名词: 谢苗诺娃
  分类: 人物
  解释: |
    叶卡捷琳娜·谢苗诺夫娜·谢苗诺娃（1786—1849），俄国19世纪著名的悲剧女演员，后封为加加林公爵夫人。她毕业于圣彼得堡戏剧学校，以美貌、深沉嗓音和富有激情的表演著称，是莎士比亚、拉辛、席勒戏剧的主要诠释者。普希金曾在诗中赞美她的演技。她与同时期的法国女演员玛格丽特·乔治在俄国舞台上存在著名竞争关系。
  书中原文: |
    听说谢苗诺娃的演技无与伦比，伊利亚·安德烈伊奇说，彼得·基里洛维奇伯爵从来没忘记我们。他在这儿吗？
  网络来源: |
    https://en.wikipedia.org/?curid=16749273

- 名词: 弗兹德维仁卡街
  分类: 地点
  解释: |
    沃兹德维任卡大街（俄语：Воздвиженка），亦译作弗兹德维仁卡街，是莫斯科最古老的街道之一，位于市中心阿尔巴特区，东起亚历山大公园（克里姆林宫附近），西接阿尔巴特广场。得名于1450年在此建立的荣举十字圣架修道院。该街9号的沃尔孔斯基府邸是《战争与和平》中老博尔孔斯基公爵莫斯科宅第的原型。1812年拿破仑攻陷莫斯科时修道院被焚毁，但街名保留。1934年后曾改称共产国际大街、加里宁大街，1991年后恢复旧名。
  书中原文: |
    他们驱车来到弗兹德维仁卡街一座阴郁、古老的宅第门前下了车，走进门厅。
  网络来源: |
