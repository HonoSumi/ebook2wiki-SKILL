- 名词: 马克将军
  分类: 人物
  解释: 卡尔·马克·冯·莱贝里希（Karl Mack von Leiberich，1752-1828），神圣罗马帝国（奥地利）将领，在拿破仑战争中担任奥军实际司令官。1805年乌尔姆战役中率奥军向拿破仑投降。
  书中原文: "站在您面前的是不幸的马克。"
  网络来源: https://wapbaike.baidu.com/item/%E9%A9%AC%E5%85%8B%C2%B7%E5%86%AF%C2%B7%E8%8E%B1%E8%B4%9D%E9%87%8C%E5%B8%8C

- 名词: 科兹洛夫斯基
  分类: 人物
  解释: 托尔斯泰《战争与和平》中库图佐夫总司令部的值班副官，负责接待和文书工作，在司令部接待室值班时曾阻拦径直闯入的马克将军。
  书中原文: "什么事，公爵？科兹洛夫斯基问。"
  网络来源: https://www.banceo.com/article/38255.html

- 名词: 涅斯维茨基
  分类: 人物
  解释: 托尔斯泰《战争与和平》中俄军参谋部军官，拥有公爵头衔。性格开朗幽默，体格肥胖，好美食美酒，是安德烈公爵在军中的同僚。
  书中原文: "你怎么一脸的不高兴？涅斯维茨基看见安德烈公爵面色苍白，眼睛发亮，便问道。"
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=68

- 名词: 热尔科夫
  分类: 人物
  解释: 托尔斯泰《战争与和平》中的俄国军官（副官），性格轻浮爱开玩笑。在马克将军战败的消息传来时戏谑祝贺，遭安德烈公爵愤怒斥责。后在申格拉本战役中因怯懦未传达撤退命令。
  书中原文: "我荣幸地庆贺马克将军驾到，庆贺他平安无事，只不过这儿碰伤了一点。"
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=46

- 名词: 玛丽亚·特雷西娅
  分类: 人物
  解释: 玛丽亚·特蕾西娅（Maria Theresia，1717-1780），哈布斯堡家族史上唯一的女性统治者，奥地利女大公、匈牙利女王、波希米亚女王。在位四十年推行开明专制改革，被称为"奥地利国母"。
  书中原文: "脖子上挂着一枚玛丽亚·特雷西娅勋章"
  网络来源: https://zh.wikipedia.org/wiki/%E7%91%AA%E9%BA%97%E5%A9%AD%E7%89%B9%E8%95%BE%E8%8C%9C%E9%9B%85

- 名词: 杰尼索夫大尉
  分类: 人物
  解释: 全名瓦西里·费奥多罗维奇·杰尼索夫，外号瓦西卡·杰尼索夫。托尔斯泰《战争与和平》中保罗格勒骠骑兵团的骑兵大尉、骑兵连长，与尼古拉·罗斯托夫同住。性格豪爽直率、好赌爱酒。后期成为游击队指挥官。
  书中原文: "骑兵连长杰尼索夫大尉，他是以瓦西卡·杰尼索夫这个名字闻名整个骑兵师。"
  网络来源: https://book.qq.com/book-read/52511345/35

- 名词: 施特劳赫
  分类: 人物
  解释: 托尔斯泰《战争与和平》中的奥地利将军，驻库图佐夫司令部专管俄国军队的粮食供应。在小说走廊场景中与奥地利军事参议院议员一同出场。
  书中原文: "另一位奥地利将军施特劳赫和奥地利军事参议院议员，他们都是昨天刚到，那位奥地利将军是驻在库图佐夫司令部专管俄国军队的给养的。"
  网络来源: https://www.jianshu.com/p/1b2ddd1f0480

- 名词: 邦达连科
  分类: 人物
  解释: 托尔斯泰《战争与和平》中的骠骑兵，负责为尼古拉·罗斯托夫照料马匹。原文称其为"霍霍尔"（旧时俄罗斯人对乌克兰人的俗称），因罗斯托夫给酒钱慷慨而殷勤伺候。
  书中原文: "喂，邦达连科，亲爱的朋友，遛遛马，朋友。"
  网络来源: https://book.qq.com/book-read/52511345/35

- 名词: 拉夫鲁什卡
  分类: 人物
  解释: 托尔斯泰《战争与和平》中杰尼索夫大尉的勤务兵/仆人，全团有名的滑头鬼。机灵狡猾而胆大，敢于在老爷情绪不好时走近，是杰尼索夫的贴身军仆。
  书中原文: "他问杰尼索夫的仆人拉夫鲁什卡——他是全团有名的滑头鬼。"
  网络来源: https://yunshuwu.cn/chap/8568.html

- 名词: 莱希河
  分类: 地点
  解释: 中欧河流，多瑙河右岸支流，全长263公里，发源于奥地利蒂罗尔州阿尔卑斯山脉，流经奥地利和德国巴伐利亚州。1805年拿破仑战争中为法奥对峙的重要防线。
  书中原文: "如敌人渡莱希河，我军定能予以击溃。"
  网络来源: https://wapbaike.baidu.com/item/%E8%8E%B1%E5%B8%8C%E6%B2%B3

- 名词: 乌尔姆
  分类: 地点
  解释: 德国巴登-符腾堡州城市，位于多瑙河畔，人口约12.6万。爱因斯坦出生地，拥有世界最高教堂尖塔（161.5米）。1805年乌尔姆战役中奥军在此向拿破仑投降。
  书中原文: "由于乌尔姆被我占领，多瑙河两岸有利形势已在我军控制之下"
  网络来源: https://zh.wikipedia.org/zh-hk/%E4%B9%8C%E5%B0%94%E5%A7%86

- 名词: 多瑙河
  分类: 地点
  解释: 欧洲第二长河，全长约2850公里，发源于德国黑林山，自西向东流经10个国家，注入黑海。干流流经国家数量居世界之首，是中东欧重要的国际航道。
  书中原文: "多瑙河两岸有利形势已在我军控制之下"
  网络来源: https://wapbaike.baidu.com/item/%E5%A4%9A%E7%91%99%E6%B2%B3/183208

- 名词: 扎尔策涅克
  分类: 地点
  解释: 托尔斯泰《战争与和平》中保罗格勒骠骑兵团驻扎的德意志村庄，位于布劳瑙（Braunau）附近约两英里处。尼古拉·罗斯托夫所在的骑兵连驻扎于此。
  书中原文: "保罗格勒骠骑兵团在离布劳瑙两英里的地方驻防。士官生尼古拉·罗斯托夫所在的骑兵连驻扎在一个名叫扎尔策涅克的德意志村庄里。"
  网络来源: https://www.jianshu.com/p/1b2ddd1f0480

- 名词: 玛丽亚·特雷西娅勋章
  分类: 物件
  解释: 全称玛丽亚·特蕾西亚军事勋章（Militär-Maria-Theresien-Orden），1757年由奥地利女大公玛丽亚·特蕾西亚设立，为奥匈帝国最高军事荣誉勋章，历史上仅颁布1241次。授予有杰出军事功绩的军官。
  书中原文: "脖子上挂着一枚玛丽亚·特雷西娅勋章"
  网络来源: https://baike.baidu.com/item/%E7%8E%9B%E4%B8%BD%E4%BA%9A%C2%B7%E7%89%B9%E8%95%BE%E8%8E%8E%E5%86%9B%E4%BA%8B%E5%8B%8B%E7%AB%A0/62700861

- 名词: 士官生
  分类: 概念
  解释: 俄语кадет，源自法语cadet，指俄国贵族军事学校学生，毕业后成为军官。沙俄时期士官生制度旨在培养忠诚于沙皇的贵族军事精英，招收13至18岁世袭贵族子弟，1732年建立第一所武备学校。
  书中原文: "士官生尼古拉·罗斯托夫所在的骑兵连驻扎在一个名叫扎尔策涅克的德意志村庄里。"
  网络来源: https://wapbaike.baidu.com/item/%E5%A3%AB%E5%AE%98%E7%94%9F/7613376

- 名词: 乌尔姆战役
  分类: 事件
  解释: 1805年9月25日至10月20日拿破仑率法军在乌尔姆围歼奥军的战役。拿破仑以大规模迂回战略包围奥军，迫使马克将军率约2.3万人投降，奥军总计被俘约6万人。为拿破仑战争中的经典战略范例。
  书中原文: "先前传闻奥军溃败和全军在乌尔姆城下投敌的消息已经得到证实。"
  网络来源: https://zh.wikipedia.org/zh-my/%E7%83%8F%E7%88%BE%E5%A7%86%E6%88%B0%E5%BD%B9
