- 名词: 英国俱乐部
  分类: 地点
  解释: 莫斯科英国俱乐部成立于1771年，最初为在俄英国商人社交场所，后发展为俄国贵族精英的绅士俱乐部。拿破仑战争时期是莫斯科上流社会的政治与社交中心，托尔斯泰在《战争与和平》中详细描写了俱乐部为巴格拉季翁公爵举办的盛大宴会。
  书中原文: 三月初，老伯爵伊利亚·安德烈伊奇主持筹办在英国俱乐部欢宴巴格拉季翁公爵的筵席。
  网络来源: 莫斯科英国俱乐部1770年建立，是19世纪俄国贵族最重要的社交场所之一，位于特维尔大街21号，现为俄罗斯现代史博物馆。

- 名词: 伊利亚·安德烈伊奇·罗斯托夫
  分类: 人物
  解释: 罗斯托夫家族的族长，伯爵，性格慷慨好客、热情随和，但不善理财。原型是托尔斯泰的祖父伊利亚·托尔斯泰。他是娜塔莎·罗斯托娃的父亲，在小说中担任梁赞省首席贵族。
  书中原文: 老伯爵伊利亚·安德烈伊奇主持筹办在英国俱乐部欢宴巴格拉季翁公爵的筵席。
  网络来源: 伊利亚·安德烈伊奇·罗斯托夫是《战争与和平》中罗斯托夫家族的家长，伯爵，以好客慷慨著称，原型为托尔斯泰的祖父。

- 名词: 拉斯托普钦伯爵
  分类: 人物
  解释: 费奥多尔·瓦西里耶维奇·罗斯托普钦伯爵（1763-1826），1812年拿破仑入侵时期担任莫斯科军事总督。以组织莫斯科大火、实施焦土政策著称，在《战争与和平》中被托尔斯泰刻画为不理解历史大势而徒劳挣扎的人物。
  书中原文: 那些指导谈话方向的人们，如：拉斯托普钦伯爵、尤里·弗拉基米罗维奇·多尔戈鲁基公爵、瓦卢耶夫、马尔科夫伯爵、维亚泽姆斯基公爵等，都不在俱乐部露面。
  网络来源: 拉斯托普钦伯爵是1812年莫斯科军事总督，被普遍认为是莫斯科大火的策划者，采取了焦土战略以阻止拿破仑法军过冬。

- 名词: 伏尔泰
  分类: 人物
  解释: 伏尔泰（1694-1778），本名弗朗索瓦-马利·阿鲁埃，法国启蒙运动的旗手和领袖，被誉为"法兰西思想之王"。主张开明君主制、自由平等、抨击天主教会，代表作有《哲学通信》《老实人》《路易十四时代》等。
  书中原文: 如果没有巴格拉季翁，也要捏造一个出来。滑稽家申申摹仿伏尔泰的话，说。
  网络来源: 伏尔泰是18世纪法国启蒙运动领袖，思想家、哲学家、文学家，主张自由平等和理性主义，影响深远。

- 名词: 瓦卢耶夫
  分类: 人物
  解释: 彼得·瓦卢耶夫（ Piotr Valuev），俄国贵族和宫廷人物，在《战争与和平》中作为莫斯科上流社会的舆论领袖之一出现，参与英国俱乐部的社交活动，讨论奥斯特利茨战役后的政治局势。
  书中原文: 瓦卢耶夫机密地谈论乌瓦罗夫从彼得堡派来探听莫斯科人对于奥斯特利茨战役的意见。
  网络来源: 瓦卢耶夫是《战争与和平》中出现的俄国贵族人物，属于莫斯科英国俱乐部中有影响力的社交圈成员。

- 名词: 纳雷什金
  分类: 人物
  解释: 纳雷什金家族是俄国历史上著名的贵族世家，与罗曼诺夫王朝有联姻关系（彼得大帝之母即出身此家族）。在《战争与和平》中纳雷什金作为英国俱乐部的重要成员出现，在欢迎巴格拉季翁的宴会上被安排在主宾旁边的首席座位。
  书中原文: 在第三个圈子里，纳雷什金在讲苏沃洛夫在一次奥地利军事委员会会议上回敬奥地利将军们的蠢话时，像公鸡似的叫起来。
  网络来源: 纳雷什金家族是俄国显赫的贵族世家，与罗曼诺夫王朝关系密切，彼得大帝之母纳塔利娅·纳雷什金娜即出自该家族。

- 名词: 博尔孔斯基公爵
  分类: 人物
  解释: 安德烈·博尔孔斯基公爵，《战争与和平》男主角之一，博尔孔斯基家族长子。为人孤傲正直、厌恶上流社会虚伪。参加奥斯特利茨战役时身负重伤，后与娜塔莎订婚但被取消，最终在波罗底诺战役中重伤去世。
  书中原文: 没有人谈博尔孔斯基，只有深知他的人惋惜他，说他这么年轻就死了，把怀孕的妻子撇给怪脾气的父亲。
  网络来源: 安德烈·博尔孔斯基公爵是《战争与和平》核心男主角之一，代表追求理想与意义的俄国贵族青年形象。

- 名词: 费奥克蒂斯特
  分类: 人物
  解释: 莫斯科英国俱乐部的首席大厨师，受罗斯托夫伯爵委托筹备欢迎巴格拉季翁公爵的盛大宴会。托尔斯泰通过他与伯爵商议菜单的细节，展现了19世纪初俄国贵族宴会的奢华排场。
  书中原文: 伯爵穿着睡衣在大厅里走来走去，吩咐俱乐部主管和有名的俱乐部大厨师费奥克蒂斯特为欢迎巴格拉季翁公爵的酒席置办龙须菜、鲜黄瓜、草莓、小牛肉和鲜鱼。
  网络来源: 费奥克蒂斯特是《战争与和平》中英国俱乐部的首席厨师，负责为巴格拉季翁公爵的欢迎宴会筹备菜肴。

- 名词: 茨冈人
  分类: 概念
  解释: 俄语中对罗姆人（吉普赛人）的称呼，源自拜占庭希腊语。茨冈人在俄罗斯历史上以歌舞表演著称，深受贵族喜爱。在《战争与和平》描写的时代，茨冈歌舞团是俄国贵族宴会和庆典中常见的娱乐项目。
  书中原文: 还得来一个唱歌班，乐队我有，把那个茨冈人叫来，行不行？你们当兵的喜欢这玩艺儿。
  网络来源: 茨冈人是俄语中对罗姆人的传统称呼，在俄罗斯文化中以音乐舞蹈闻名，普希金曾创作叙事长诗《茨冈》。

- 名词: 英国俱乐部会员
  分类: 概念
  解释: 19世纪莫斯科英国俱乐部的会员身份是俄国贵族社会地位的重要象征。会员主要为有爵位的贵族、高级文官和军官。当时俄国贵族青年的人生三大志向之一就是成为英国俱乐部会员，可见其社会影响力。
  书中原文: 次日，三月三日，中午一点多钟，二百五十位英国俱乐部会员和五十位客人在等待贵宾、奥地利远征英雄巴格拉季翁公爵来赴宴。
  网络来源: 莫斯科英国俱乐部会员身份是19世纪俄国贵族社会地位的标志，首批会员以有爵位的贵族为主，后也包括商界巨子。

- 名词: 玛丽亚·伊万诺夫娜
  分类: 人物
  解释: 多洛霍夫的母亲，在《战争与和平》中是一位深爱儿子的母亲形象。她盲目地为儿子辩护，认为儿子心灵高尚纯洁，是别祖霍夫事件中的受害者。多洛霍夫冷酷的外表下唯有对母亲怀有深厚的感情。
  书中原文: 玛丽亚·伊万诺夫娜的儿子多洛霍夫，她神秘地低声说，据说，完全使她的名誉扫地。
  网络来源: 玛丽亚·伊万诺夫娜是多洛霍夫的母亲，在小说中展现了对儿子深刻的母爱和盲目的袒护。

- 名词: 奥尔洛夫伯爵
  分类: 人物
  解释: 格里戈里·格里戈里耶维奇·奥尔洛夫伯爵（1734-1783），俄国炮兵军官，叶卡捷琳娜二世的情夫和1762年宫廷政变的核心推手。后曾任莫斯科市长，1771年成功控制莫斯科鼠疫。因献"奥尔洛夫钻石"给女皇而闻名。
  书中原文: 你在那儿找到茨冈人伊柳什卡，就是那个曾经在奥尔洛夫伯爵家跳舞的，你记得吧，穿白色哥萨克服的，你把他拖来见我。
  网络来源: 奥尔洛夫伯爵是叶卡捷琳娜二世时期的重要人物，参与1762年政变拥立女皇，后因抗击莫斯科鼠疫而受表彰。

- 名词: 维亚泽姆斯基公爵
  分类: 人物
  解释: 彼得·安德烈耶维奇·维亚泽姆斯基公爵（1792-1878），俄国诗人，俄国诗歌黄金时代的代表人物之一。与普希金交往密切，亲历1812年波罗底诺战役。后因托尔斯泰在《战争与和平》中对战役的描写不准确而与之发生文学论战。
  书中原文: 那些指导谈话方向的人们，如：拉斯托普钦伯爵、尤里·弗拉基米罗维奇·多尔戈鲁基公爵、瓦卢耶夫、马尔科夫伯爵、维亚泽姆斯基公爵等，都不在俱乐部露面。
  网络来源: 维亚泽姆斯基公爵是19世纪俄国诗人，普希金的挚友，亲历波罗底诺战役，后因对《战争与和平》中战役描写的争议与托尔斯泰发生论战。

- 名词: 宫廷生活
  分类: 概念
  解释: 19世纪沙俄宫廷生活以圣彼得堡皇宫为中心，围绕皇室成员展开，包括宫廷礼仪、舞会、接见等正式活动。宫廷贵族与庄园贵族形成对照，前者生活奢华、与皇室关系密切，后者更多居住在乡间领地。在《战争与和平》中宫廷生活常与政治阴谋和人事关系相连。
  书中原文: 没有人谈论库图佐夫，有些人低声骂他，说他是宫廷里的轻浮家伙和老色鬼。
  网络来源: 19世纪沙俄宫廷生活围绕皇室展开，宫廷贵族参与舞会、接见和礼仪活动，与乡间庄园贵族的生活方式形成鲜明对比。

- 名词: 莫斯科上流社会
  分类: 概念
  解释: 19世纪莫斯科上流社会由贵族、高级军官和富商组成，以英国俱乐部、贵族会议厅和私人沙龙为主要社交场所。1812年战争前夕，莫斯科上流社会通过宴会、舞会和牌局交流政治信息，形成独特的舆论场。托尔斯泰在《战争与和平》中对此有大量生动描写。
  书中原文: 莫斯科各个角落都在讲着同样的话。这些原因就是：奥地利人的背信弃义，军粮供应太差，波兰人普热贝舍夫斯基和法国人朗热隆的背叛，库图佐夫的无能，以及（小声地谈论）皇上由于年轻缺乏经验而信任卑鄙小人。
  网络来源: 19世纪莫斯科上流社会以贵族为核心，通过英国俱乐部、私人沙龙和舞会进行社交，是俄国政治舆论的重要阵地。

- 名词: 奥斯特利茨撤退
  分类: 事件
  解释: 1805年12月2日奥斯特利茨战役（三皇会战）后俄军的撤退行动。战役中拿破仑击败俄奥联军，俄军损失惨重。巴格拉季翁公爵在撤退中表现卓越，率领的纵队保持井然有序，并一整天击退两倍兵力的敌人，因此成为莫斯科的战争英雄。
  书中原文: 巴格拉季翁之所以被选为英雄，还由于他在莫斯科没有人事关系，是一个陌生人。欢迎他，也就是欢迎战斗的、普通的、没有人事关系和阴谋诡计的、引起人们回忆苏沃洛夫远征意大利的俄国军人。此外，给他这样的荣誉，是对库图佐夫表示不欢迎和不赞成的最好办法。
  网络来源: 奥斯特利茨战役中俄军溃败后被迫撤退，巴格拉季翁因在撤退中保持军队秩序而成为英雄，托尔斯泰在《战争与和平》中以此展示莫斯科舆论对库图佐夫的不满。
