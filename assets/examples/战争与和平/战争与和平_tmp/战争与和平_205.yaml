- 名词: 自由意志
  分类: 概念
  解释: |
    托尔斯泰认为自由意志是人通过内在意识体验到的自我决定能力，理性无法完全解释。人只能意识到意志是自由的，但服从必然性法则。
  书中原文: |
    一个人有了意愿，也就是意识到他的意志，他才知道自己是活着的。但是，当人意识到构成他生命实质的意志时，他只能意识到它是自由的。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 必然性
  分类: 概念
  解释: |
    托尔斯泰认为从外部观察，人的行为服从普遍的必然法则，如同自然规律一样不可抗拒。必然性与自由意志构成人类思想史的根本矛盾。
  书中原文: |
    如果把人当作观察的对象来看待，不论从什么观点——神学的、历史的、道德的、哲学的——我们都发现人正如一切存在的东西一样，必须服从普遍的必然法则。
  网络来源: |
    https://book.douban.com/review/8462033/

- 名词: 历史法则
  分类: 概念
  解释: |
    托尔斯泰认为历史法则如同自然法则一样客观存在，战争或革命的发生是人的天性使然，是一种不可追问终极原因的法则。
  书中原文: |
    历史事件也是一样。战争或革命为什么会发生？我们不知道；我们只知道，为了进行某种行动，人们结成一定的集体，他们都参加了那个集体；我们说，人的天性就是这样，这是一种法则。
  网络来源: |
    https://www.thepaper.cn/newsDetail_forward_31438218

- 名词: 意志自由
  分类: 概念
  解释: |
    托尔斯泰探讨的人是否能凭意志随意行动的问题。他认为假如每个人的意志都是自由的，全部历史就会成为互不连贯的偶然事件。
  书中原文: |
    假如每个人的意志都是自由的，就是说，假如每个人都可以随意行动，全部历史就要成为一系列互不连贯的偶然事件了。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 道德责任
  分类: 概念
  解释: |
    托尔斯泰指出为历史事件所作的种种辩解（如为了国家荣誉、自由平等）的功能是消除制造事件者的道德责任。
  书中原文: |
    这些辩解是为了消除那些制造事件的人们的道德责任。这些临时的目的犹如清扫前面轨道的刷子，也是为人们的道德责任清道的。
  网络来源: |
    https://www.chinawriter.com.cn/n1/2021/0330/c404092-32064349.html

- 名词: 集体行动
  分类: 概念
  解释: |
    托尔斯泰认为历史是由所有参加事件的人的集体活动共同推动的。任何集体行动都能在国家统一、爱国主义等名义下找到辩解。
  书中原文: |
    有什么集体行动不能从国家统一、爱国主义、欧洲均势，或文明上找到辩解的呢？
  网络来源: |
    https://book.douban.com/review/15442050/

- 名词: 自我意识
  分类: 概念
  解释: |
    托尔斯泰认为自我意识是独立于理性的认识来源，人通过理性观察自己，但只有通过意识才认识自己。没有自我意识则任何理性运用都不可思议。
  书中原文: |
    如果没有自我意识，任何观察和理性的运用都是不可思议的。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 意识的自由
  分类: 概念
  解释: |
    托尔斯泰认为人通过意识直接感受到自己是自由的，这种意识完全独立于理性，不依赖自我认识的任何来源。
  书中原文: |
    这种意识是完全独立的，不依赖理性的自我认识的来源。人通过理性来观察自己；但是只有通过意识他才认识自己。
  网络来源: |
    https://book.douban.com/review/8462033/

- 名词: 权力定义
  分类: 概念
  解释: |
    托尔斯泰定义权力为某个人与别人的关系——对正在进行的集体行动越多发表意见、预言和辩解的人，越少参加行动。
  书中原文: |
    权力是某一个人与别的人们的关系，在这种关系中，这个人对正在进行的集体行动越多发表意见、预言和辩解，他就越少参加行动。
  网络来源: |
    https://www.wtxy.net/book/story.php?id=1100

- 名词: 历史因果关系
  分类: 概念
  解释: |
    托尔斯泰认为原因的概念不能用在历史现象上，追根溯源只会达到无限循环，应当像自然科学一样接受法则本身。
  书中原文: |
    原因的概念不能用在我们所考察的现象上。分析到最后，我们就可以达到无限的循环，达到人类智慧在一切思维领域所达到的极限。
  网络来源: |
    https://kasmana.people.charleston.edu/MATHFICT/mfview.php?callnumber=mf117

- 名词: 必然性法则
  分类: 概念
  解释: |
    托尔斯泰认为假如有支配人类行动的法则，自由意志就不能存在。但自由意识使人不承认这一法则的绝对性，形成根本矛盾。
  书中原文: |
    假如只要有一个支配人类行动的法则，自由意志就不能存在，因为人类的意志必须服从那个法则。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 意志与理性
  分类: 概念
  解释: |
    托尔斯泰区分意志与理性：理性只能从外部观察人，而意志通过内在意识被认识。人通过理性观察自己，但只有通过意识才认识自己。
  书中原文: |
    人通过理性来观察自己；但是只有通过意识他才认识自己。如果没有自我意识，任何观察和理性的运用都是不可思议的。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 自由的概念
  分类: 概念
  解释: |
    托尔斯泰认为自由的概念在理性看来是没有意义的矛盾，但意识不属于理性。自由的概念只能在意识中被体验，无法被理性论证。
  书中原文: |
    假如理性认为自由的概念是一种没有意义的矛盾，好像在同一条件下进行两种不同动作的可能性一样，那只能证明意识不属于理性。
  网络来源: |
    https://book.douban.com/review/8462033/

- 名词: 罪恶的概念
  分类: 概念
  解释: |
    托尔斯泰指出罪恶的概念是从人类自由意识中产生的。既然人是全知全能全善的上帝所造，罪恶从何而来成为神学根本问题。
  书中原文: |
    人是全能、全善、全知的上帝的创造物。罪恶（罪恶的概念是由人类的自由的意识中产生的）是什么呢？这是神学的问题。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 神学
  分类: 概念
  解释: |
    托尔斯泰以神学作为探讨自由意志问题的一个视角：在上帝全知全能全善的前提下，解释罪恶概念的起源。
  书中原文: |
    人是全能、全善、全知的上帝的创造物。罪恶（罪恶的概念是由人类的自由的意识中产生的）是什么呢？这是神学的问题。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 法学
  分类: 概念
  解释: |
    托尔斯泰以法学作为探讨自由意志与必然性问题的视角之一，涉及社会责任概念与统计学法则的关系。
  书中原文: |
    人的行动属于用统计学表示的普遍的不变法则。人类对社会的责任（这一概念也是从自由的意识中产生的）是什么呢？这是法学的问题。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 伦理学
  分类: 概念
  解释: |
    托尔斯泰以伦理学作为探讨自由意志问题的视角，涉及良心是什么以及善恶认识的来源。
  书中原文: |
    良心是什么，从自由的意识中产生出来的行为的善恶认识是什么？这是伦理学的问题。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 历史问题
  分类: 概念
  解释: |
    托尔斯泰提出历史的根本问题：应当把各民族和人类的过去看作自由行动的产物还是不自由行动的产物，即历史是否为必然性所支配。
  书中原文: |
    应当怎样看待各民族和人类的过去生活呢——作为人们自由行动的产物呢，还是作为人们不自由行动的产物呢？这是历史的问题。
  网络来源: |
    https://book.douban.com/review/15442050/

- 名词: 脑筋的分泌物
  分类: 概念
  解释: |
    托尔斯泰引用并批判当时唯物主义观点——理性和意志不过是大脑分泌的产物。他认为这只能解释问题的一个方面，无法解决自由意识问题。
  书中原文: |
    理性和意志不过是脑筋的分泌物（sécrétion），遵循一般的法则，人可能是在那无人知道的时代从低级动物发展起来的。
  网络来源: |
    https://www.douban.com/note/130984465/

- 名词: 比较生理学
  分类: 概念
  解释: |
    托尔斯泰批评用比较生理学解决自由意志与必然性问题的做法，认为从动物身上只能观察到筋肉和神经活动，无法观察到人的意识。
  书中原文: |
    从青蛙、兔子和猴子身上，我们只能观察到筋肉和神经活动，但是从人身上，我们既能观察到筋肉活动和神经活动，也能观察到意识。
  网络来源: |
    https://www.douban.com/note/130984465/

- 名词: 比较动物学
  分类: 概念
  解释: |
    托尔斯泰批评比较动物学用进化论解释自由意志问题，认为人从猴子变来与用土做成同样可理解，都无助于解决自由意志与必然性的矛盾。
  书中原文: |
    假如人是在无人知道的时代从猴子变来的，这与说他是在某个时期用一把土做成的，是同样可以理解的。
  网络来源: |
    https://www.douban.com/note/130984465/

- 名词: 实验和论证
  分类: 概念
  解释: |
    托尔斯泰认为实验和论证可以证明人服从必然性法则，但人类从不服从这些结论，因为自由意识不可被理性反驳。
  书中原文: |
    一系列的实验和论证对他表明，他内心感觉的那种完全的自由是不可能的，他的每一动作都取决于他的肌体，他的性格，以及影响他的动机；但是人类从来不服从这些实验和论证的结论。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 自由意识
  分类: 概念
  解释: |
    托尔斯泰认为自由意识是不可动摇、不可否认、不受实验或论证所支配的独立来源，没有它就不能有任何关于人的观念。
  书中原文: |
    这种不可动摇、不可否认、不受实验或论证所支配的自由的意识，为所有思想家所承认，毫无例外为每个人所感到，没有它就不能有任何关于人的观念的自由的意识。
  网络来源: |
    https://book.douban.com/review/8462033/

- 名词: 无限循环
  分类: 概念
  解释: |
    托尔斯泰指出人类智慧在一切思维领域最终都达到无限循环，如电生热、热生电、原子相吸、原子相拒，历史分析也是如此。
  书中原文: |
    分析到最后，我们就可以达到无限的循环，达到人类智慧在一切思维领域所达到的极限，假如它不玩弄它所研究的对象的话。电生热，热生电。原子相吸，原子相拒。
  网络来源: |
    https://kasmana.people.charleston.edu/MATHFICT/mfview.php?callnumber=mf117

- 名词: 因果概念
  分类: 概念
  解释: |
    托尔斯泰认为原因概念不适用于历史现象，因为追根溯源只会达到无限循环。应当像自然科学一样放弃原因概念，寻找规律本身。
  书中原文: |
    原因的概念不能用在我们所考察的现象上。分析到最后，我们就可以达到无限的循环。
  网络来源: |
    https://kasmana.people.charleston.edu/MATHFICT/mfview.php?callnumber=mf117

- 名词: 历史人物与群众
  分类: 概念
  解释: |
    托尔斯泰认为历史人物与群众不可分割。表面看命令决定事件，实则是事件决定命令。历史人物的意志以事件为转移。
  书中原文: |
    一考察事件本身和包括历史人物在内的群众之间的关系，我们就发现历史人物以及他们的命令是以事件为转移的。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 船与波浪的比喻
  分类: 概念
  解释: |
    托尔斯泰用船与波浪比喻历史人物与历史运动的关系。船上的人以为波浪自己移动并指导船，实则是船的运动引起波浪。
  书中原文: |
    一只船不论朝哪个方向移动，在它面前总可以看出被它所划开的波浪。船上的人觉得，这些波浪的流动是唯一看得见的运动。只有时时刻刻仔细观察那波浪的运动，并且把波浪的运动跟船的运动作比较，我们才明白，波浪每时每刻的运动都是由于船的运动引起的。
  网络来源: |
    https://book.douban.com/review/5982086/

- 名词: 意志表现
  分类: 概念
  解释: |
    托尔斯泰认为史学家只考察历史人物的意志表现（以命令方式与事件相关联），便误以为事件以命令为转移，实则相反。
  书中原文: |
    史学家们只考察历史人物的意志表现——它以命令的方式与事件相关联，于是便认为事件是以命令为转移的。但是，一考察事件本身和包括历史人物在内的群众之间的关系，我们就发现历史人物以及他们的命令是以事件为转移的。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 必然的法则
  分类: 概念
  解释: |
    托尔斯泰认为支配人类行动的法则与自由意志不可并存。如果承认必然性法则，则自由意志不可能存在，但人的意识又拒绝接受。
  书中原文: |
    假如只要有一个支配人类行动的法则，自由意志就不能存在，因为人类的意志必须服从那个法则。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 自然法则与历史法则
  分类: 概念
  解释: |
    托尔斯泰将历史法则与自然法则类比。如同不能追问电为何生热、原子为何相吸一样，历史事件的原因也不可追问，只能承认是法则。
  书中原文: |
    谈到热、电或原子的最简单的作用，我们不能说为什么会发生这些作用，我们说，这些现象的性质就是这样，这是它们的法则。历史事件也是一样。
  网络来源: |
    https://www.thepaper.cn/newsDetail_forward_31438218

- 名词: 人类生活的全部
  分类: 概念
  解释: |
    托尔斯泰认为必须把人类生活作为整体来考察，人从整体上看服从决定生活的法则，但个体的人又似乎是自由的。
  书中原文: |
    联系人类的全部生活来看，人是服从决定这种生活的法则的。但是，孤立地来看那同一个人他似乎是自由的。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 服从权力
  分类: 概念
  解释: |
    托尔斯泰认为从物质方面看，服从权力的那些人是事件的原因。权力不是事件的原因，而是事件的结果。
  书中原文: |
    从精神方面看，权力是事件的原因；从物质方面看，服从权力的那些人是事件的原因。
  网络来源: |
    https://www.wtxy.net/book/story.php?id=1100

- 名词: 人民的运动
  分类: 概念
  解释: |
    托尔斯泰认为民族的运动不是由权力或智力活动引起的，而是由所有参加事件的人的活动引起的。直接参与者最多的人责任最少。
  书中原文: |
    各民族的运动不是由权力引起的，不是由智力活动引起的，甚至也不是如史学家们所想的那样，由两者的结合引起的，而是由所有参加事件的人的活动引起的。
  网络来源: |
    https://book.douban.com/review/15442050/

- 名词: 力量造成民族的运动
  分类: 概念
  解释: |
    托尔斯泰提出的两个核心历史问题之一：什么是推动民族运动的力量？他的回答是全体参与者的活动，而非权力或智力。
  书中原文: |
    是什么力量造成民族的运动？各民族的运动不是由权力引起的，不是由智力活动引起的，而是由所有参加事件的人的活动引起的。
  网络来源: |
    https://book.douban.com/review/15442050/

- 名词: 精神方面看权力
  分类: 概念
  解释: |
    托尔斯泰认为从精神方面看权力被认作事件的原因，但精神活动离不开物质活动，事件原因在两者的结合上。
  书中原文: |
    从精神方面看，权力是事件的原因；从物质方面看，服从权力的那些人是事件的原因。但是，因为没有物质的活动，精神的活动就不可思议。
  网络来源: |
    https://www.wtxy.net/book/story.php?id=1100

- 名词: 历史事件的原因
  分类: 概念
  解释: |
    托尔斯泰认为历史事件的原因既不在权力也不在服从者，而在两者的结合上。原因概念本身不适用于历史现象。
  书中原文: |
    事件的原因既不在前者，也不在后者，而是在两者的结合上。或者，换句话说，原因的概念不能用在我们所考察的现象上。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 历史规律
  分类: 概念
  解释: |
    托尔斯泰认为战争或革命发生的原因不可知，我们只能承认人的天性决定了人们会结成集体进行行动，这就是一种历史规律。
  书中原文: |
    战争或革命为什么会发生？我们不知道；我们只知道，为了进行某种行动，人们结成一定的集体，他们都参加了那个集体；我们说，人的天性就是这样，这是一种法则。
  网络来源: |
    https://www.thepaper.cn/newsDetail_forward_31438218

- 名词: 理性的运用
  分类: 概念
  解释: |
    托尔斯泰认为理性运用以自我意识为前提。人必须先意识到自己是活着的，才能理解、观察和推理。
  书中原文: |
    要想理解、观察和推理，人首先必须意识到自己是活着的。一个人有了意愿，也就是意识到他的意志，他才知道自己是活着的。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 灰泥匠的比喻
  分类: 概念
  解释: |
    托尔斯泰用灰泥匠比喻那些越界的博物学家——他们本应粉刷一面墙，却趁总监工不在乱刷了窗子、神像和脚手架，以为一切光滑整齐。
  书中原文: |
    自以为能解决这个问题的博物学家和他们的信徒，正如这样一些灰泥匠：本来指定他们粉刷教堂的一面墙壁，可是他们趁着总监工不在，在一阵热情发作下，粉刷了窗子、神像、脚手架，以及还未加扶壁的墙壁。
  网络来源: |
    https://book.douban.com/review/5982086/

- 名词: 灵魂与自由不存在
  分类: 概念
  解释: |
    托尔斯泰引述并批判机械唯物主义观点——认为灵魂和自由不存在，人的生活只是筋肉运动的表现，受制于神经活动。
  书中原文: |
    灵魂和自由不存在，因为人的生活是筋肉运动的表现，而筋肉运动取决于神经的活动；灵魂和自由意志并不存在，因为在远古时代我们是由猴子变来的。
  网络来源: |
    https://www.douban.com/note/130984465/

- 名词: 意志自由问题
  分类: 概念
  解释: |
    托尔斯泰认为意志自由问题自古以来就占据最卓越的人类头脑，历史的所有矛盾和含糊都源于这个问题没有得到解决。
  书中原文: |
    关于意志自由的问题存在着这样的矛盾，这个问题自古以来就占据了最卓越的人类头脑，自古以来就有人把它的全部重大意义提出来了。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 历史研究
  分类: 概念
  解释: |
    托尔斯泰认为历史研究的对象不是人的意志本身，而是我们关于意志的观念。历史考察人对生活的观念中自由与必然的结合。
  书中原文: |
    历史研究的对象不是人的意志本身，而是我们关于它的观念。历史考察人对生活的观念，这两种矛盾的结合已经在人对生活的观念中实现了。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 历史作为科学
  分类: 概念
  解释: |
    托尔斯泰认为历史在解决自由意志与必然性问题上比其他学科有优势，因为它不涉及自由意志的实质，只涉及意志在过去的实际表现。
  书中原文: |
    在解决自由意志和必然性的问题上，历史比其他知识部门有一个优点：对于历史，这个问题不涉及人类自由意志的实质，只涉及这种意志在过去和一定条件下的表现。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 人的行动法则
  分类: 概念
  解释: |
    托尔斯泰探讨的核心悖论：如果存在支配人类行动的法则，则自由意志不存在。但人的意识体验到的自由又否认这一法则的绝对性。
  书中原文: |
    假如只要有一个支配人类行动的法则，自由意志就不能存在，因为人类的意志必须服从那个法则。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 统计学法则
  分类: 概念
  解释: |
    托尔斯泰指出人的行动属于统计学表示的普遍不变法则，这是法学问题的基础——社会责任概念建立在此之上。
  书中原文: |
    人的行动属于用统计学表示的普遍的不变法则。人类对社会的责任（这一概念也是从自由的意识中产生的）是什么呢？这是法学的问题。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html

- 名词: 全知全能全善的上帝
  分类: 概念
  解释: |
    托尔斯泰以基督教神学的上帝概念为出发点引出神学问题：既然上帝全知全能全善，为什么会有罪恶？这只能从自由意识来解释。
  书中原文: |
    人是全能、全善、全知的上帝的创造物。罪恶（罪恶的概念是由人类的自由的意识中产生的）是什么呢？这是神学的问题。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/epilogue-2-chapter-9.html
