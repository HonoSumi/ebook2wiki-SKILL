- 名词: 萨瓦里
  分类: 人物
  解释: 安尼·让·马里·雷尼·萨瓦里，拿破仑麾下的法国将军、外交官，曾任警务大臣，1805年奥斯特利茨战役前受拿破仑派遣与沙皇亚历山大一世谈判。
  书中原文: 一个打着军使小旗求见俄国皇帝的法国军官从前哨被送到维绍城。这个军官名叫萨瓦里。皇上刚刚入睡，因此萨瓦里只得等候。
  网络来源: https://www.britannica.com/biography/Anne-Jean-Marie-Rene-Savary-duc-de-Rovigo

- 名词: 多尔戈鲁科夫
  分类: 人物
  解释: 彼得·彼得罗维奇·多尔戈鲁科夫，俄国公爵、将军，亚历山大一世的副官长，1805年奥斯特利茨战役前作为沙皇代表与拿破仑谈判，因傲慢态度和主战立场被认为对奥斯特里茨惨败负有责任。
  书中原文: 传闻萨瓦里前来的使命是关于亚历山大皇帝和拿破仑会见的建议。使全军感到高兴和骄傲的是，俄皇拒绝亲自会见，由维绍战役的胜利者多尔戈鲁科夫公爵代表陛下和萨瓦里一起前去与拿破仑谈判。
  网络来源: https://en.m.wikipedia.org/wiki/Peter_Petrovich_Dolgorukov_(general,_born_1777)

- 名词: 恰尔托里日斯基
  分类: 人物
  解释: 亚当·耶日·恰尔托雷斯基，波兰贵族、俄国政治家，1804-1806年任俄罗斯帝国外交大臣，亚历山大一世的亲密顾问，第三次反法同盟的组织者之一。
  书中原文: 罗斯托夫看见皇帝的眼睛充满了泪水，听见他在走开的时候用法语对恰尔托里日斯基说：'战争是一件多么可怕的事，多么可怕的事！'
  网络来源: https://www.britannica.com/biography/Adam-Jerzy-Prince-Czartoryski

- 名词: 温普芬
  分类: 人物
  解释: 马克西米利安·冯·温普芬男爵，奥地利元帅，毕业于维也纳新城军事学院，参加过奥斯特里茨战役、阿斯佩恩-埃斯灵战役，一生八次负伤，曾任奥地利军队总参谋长。
  书中原文: 除了你们的库图佐夫，所有纵队的长官没有一个俄国人。这些长官是：温普芬将军大人、朗热隆伯爵、利希滕施泰因公爵、霍恩洛厄公爵以及普尔什……普尔什……一串波兰名字。
  网络来源: https://en.wikipedia.org/wiki/Maximilian_von_Wimpffen

- 名词: 朗热隆
  分类: 人物
  解释: 路易·亚历山大·安德罗·德·朗热隆伯爵，法国贵族出身，美国独立战争老兵，后加入俄军，参加奥斯特里茨战役、1812年卫国战争、莱比锡战役，曾任新罗西斯克总督。
  书中原文: 除了你们的库图佐夫，所有纵队的长官没有一个俄国人。这些长官是：温普芬将军大人、朗热隆伯爵、利希滕施泰因公爵、霍恩洛厄公爵以及普尔什……普尔什……一串波兰名字。
  网络来源: https://www.napoleon.org/en/history-of-the-two-empires/biographies/langeron-count-louis-alexandre-andrault-de/

- 名词: 利希滕施泰因
  分类: 人物
  解释: 约翰一世·冯·利希滕施泰因，奥地利元帅，拿破仑战争期间奥地利的重要军事指挥官，被拿破仑视为最有能力的对手之一，1805年和1809年代表奥地利进行和谈，其军事成就促成列支敦士登公国获得主权。
  书中原文: 除了你们的库图佐夫，所有纵队的长官没有一个俄国人。这些长官是：温普芬将军大人、朗热隆伯爵、利希滕施泰因公爵、霍恩洛厄公爵以及普尔什……普尔什……一串波兰名字。
  网络来源: https://www.liechtensteincollections.at/en/princes/prince-johann-i-von-liechtenstein

- 名词: 霍恩洛厄
  分类: 人物
  解释: 路德维希·阿洛伊斯·霍恩洛厄-瓦尔登堡-巴滕施泰因亲王，先后服务于奥地利和法国军队，在阿斯佩恩-埃斯林战役和瓦格拉姆战役中指挥奥地利第IV军的一个师，后成为法国元帅。
  书中原文: 除了你们的库图佐夫，所有纵队的长官没有一个俄国人。这些长官是：温普芬将军大人、朗热隆伯爵、利希滕施泰因公爵、霍恩洛厄公爵以及普尔什……普尔什……一串波兰名字。
  网络来源: https://en.wikipedia.org/wiki/Louis_Aloysius,_Prince_of_Hohenlohe-Waldenburg-Bartenstein

- 名词: 米洛拉多维奇
  分类: 人物
  解释: 米哈伊尔·安德烈耶维奇·米洛拉多维奇，俄国步兵上将，拿破仑战争中的杰出将领，参加奥斯特里茨战役、博罗季诺战役，追击拿破仑大军直至巴黎，曾任圣彼得堡军事总督，1825年十二月党人起义中被刺杀。
  书中原文: 现在已经有两个俄国人了：米洛拉多维奇和多赫图罗夫，本来还有第三个阿拉克切耶夫伯爵的，不过他这人的神经太脆弱了。
  网络来源: https://wapbaike.baidu.com/item/米哈伊尔·安德烈伊奇·米罗拉多维奇/5814311

- 名词: 阿拉克切耶夫
  分类: 人物
  解释: 阿列克谢·安德烈耶维奇·阿拉克切耶夫，俄国伯爵、炮兵上将，亚历山大一世的首席军事顾问，曾任陆军大臣，推行严酷的军垦制度，其统治时期被称为阿拉克切耶夫暴政时期。
  书中原文: 现在已经有两个俄国人了：米洛拉多维奇和多赫图罗夫，本来还有第三个阿拉克切耶夫伯爵的，不过他这人的神经太脆弱了。
  网络来源: https://www.britannica.com/biography/Aleksey-Andreyevich-Graf-Arakcheyev

- 名词: 维利埃
  分类: 人物
  解释: 詹姆斯·怀利（James Wylie），苏格兰裔医生，俄国沙皇亚历山大一世的御医，随军参加拿破仑战争，在《战争与和平》中译作维利埃。
  书中原文: 御医维利埃数次应召前去探视。大本营和附近的军队传闻圣体欠安。据侍从们说，他不吃东西，那一夜睡得不好。
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=57

- 名词: 托尔斯泰伯爵
  分类: 人物
  解释: 伊万·马特维耶维奇·托尔斯泰伯爵，俄国宫廷官员，亚历山大一世时期的内务大臣，在《战争与和平》中库图佐夫向他转达了对奥斯特里茨战役将失败的判断。
  书中原文: 库图佐夫来到皇帝大本营，在沙皇那里待了一会儿，然后去访内务大臣托尔斯泰伯爵。……我看要吃败仗，我把这话告诉了托尔斯泰伯爵，请他转告皇上。
  网络来源: https://en.wikipedia.org/wiki/Ivan_Matveyevich_Tolstoy

- 名词: 维绍
  分类: 地点
  解释: 维绍（德语Wischau，今捷克城市维什科夫Vyškov），位于摩拉维亚地区，1805年拿破仑战争期间俄奥联军与法军的前哨交战地，沙皇亚历山大一世和奥地利皇帝弗朗茨二世曾在此会晤。
  书中原文: 在维绍这个德意志小城中，罗斯托夫又一次看见了皇上。在城里一处广场上，在皇上未到来之前这里曾发生相当激烈的交锋。
  网络来源: https://www.morava-napoleonska.cz/en/localities/vyskov-nekdejsi-moravske-versailles/

- 名词: 维绍战役
  分类: 事件
  解释: 1805年11月25日发生在摩拉维亚维绍的前哨战斗，俄军巴格拉季昂指挥约24000人以优势兵力击退法军约1400人，俄军轻取胜利导致联军过度自信，直接影响了奥斯特里茨战役前的决策。
  书中原文: 这一场仅仅俘虏法国一个骑兵连的战役，被看作是一次大败法军的辉煌胜利，因此，皇帝和全军，特别是在战场上硝烟还未散的时候，都相信法国人打败了，被迫退却了。
  网络来源: https://kids.kiddle.co/Battle_of_Wischau

- 名词: 三皇大战
  分类: 事件
  解释: 即奥斯特利茨战役，1805年12月2日发生在摩拉维亚奥斯特利茨，法兰西帝国皇帝拿破仑对阵俄罗斯沙皇亚历山大一世和神圣罗马帝国皇帝弗朗茨二世，拿破仑以少胜多取得辉煌胜利，第三次反法同盟瓦解。
  书中原文: 其结果仅仅是奥斯特利茨战役，即所谓三皇大战的失败，也就是世界历史的时针在人类历史的表盘上缓慢的移动。
  网络来源: https://wapbaike.baidu.com/item/奥斯特里茨战役/3246733

- 名词: 军事会议
  分类: 概念
  解释: 战争中由高级将领和指挥官参加的会议，讨论作战计划和战略部署。在奥斯特里茨战役前夕，库图佐夫主持召开了军事会议，魏罗特尔在会上宣读了作战计划。
  书中原文: 在军事会议上听到他的意见了，只要他说得有道理，会听他的。但是现在正是波拿巴最怕会战的时候，不能再迟延，再等待了。
  网络来源: https://zh.wikipedia.org/zh-hans/战役

- 名词: 侧翼迂回
  分类: 概念
  解释: 军事战术的一种，指军队避开敌军正面，从侧面或后方发动攻击，以实现分割包围或出其不意的打击效果。拿破仑战争中的经典战术，在奥斯特利茨战役中被成功运用。
  书中原文: 于是多尔戈鲁科夫公爵讲起魏罗特尔的侧翼迂回计划，他讲得匆忙而且含糊不清。
  网络来源: https://baike.baidu.com/item/迂回战术/1851280

- 名词: 军使
  分类: 概念
  解释: 奉交战一方命令，赴敌方接洽事务的使者，相当于休战使者或军事特使。其人身安全受交战惯例保护，即两国交兵不斩来使。
  书中原文: 一个打着军使小旗求见俄国皇帝的法国军官从前哨被送到维绍城。这个军官名叫萨瓦里。
  网络来源: https://www.zdic.net/hans/军使

- 名词: 会战
  分类: 概念
  解释: 战争双方主力或战区主力之间的决战，通常指大规模、决定性的交战。拿破仑时代会战大多持续一天，如奥斯特利茨会战、莱比锡会战等。
  书中原文: 现在正是波拿巴最怕会战的时候，不能再迟延，再等待了。
  网络来源: https://zh.wikipedia.org/zh-hans/战役

- 名词: 大本营
  分类: 概念
  解释: 战时军队的最高统帅部或最高指挥部，即战争期间皇帝和高级将领所在的指挥部所在地，负责统筹全局、发布作战指令。
  书中原文: 大本营和附近的军队传闻圣体欠安。……皇帝大本营从早晨开始的集中活动，好像大钟楼的中心主轮发动的第一个活动，给以后的一切活动以动力。
  网络来源: https://wapbaike.baidu.com/item/大本营/15876401
