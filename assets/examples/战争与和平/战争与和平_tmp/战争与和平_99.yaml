- 名词: 夏尔姆夫人
  分类: 人物
  解释: 19世纪初莫斯科一家服务于贵族阶层的女装时装店的店主，娜塔莎·罗斯托娃经常光顾其店铺定制时装。在小说中，夏尔姆夫人时装店反映了当时俄国贵族社会对巴黎时尚的追随与崇拜。
  书中原文: "玛丽亚·德米特里耶夫娜走后，夏尔姆夫人时装店的一个女裁缝来罗斯托夫家，娜塔莎关上客厅隔壁的房间，开始在那儿试新衣服"
  网络来源: 夏尔姆夫人是托尔斯泰《战争与和平》中莫斯科的一家女装时装店，服务于当时的贵族阶层。海伦访问罗斯托夫家时，与时装师交谈，并建议娜塔莎做一件和她一样的巴黎新式连衣裙。
- 名词: 特韦尔
  分类: 地点
  解释: 俄罗斯古城，位于莫斯科西北约167公里处伏尔加河上游，现为特维尔州首府。建于1135年，曾是与莫斯科公国争夺俄罗斯中心地位的特维尔大公国都城。1931年至1990年间曾更名为加里宁。
  书中原文: "丈夫不在家，他到特韦尔去了，不然我就叫他来请你们了。"
  网络来源: 特韦尔（Тверь / Tver），也译作特维尔，是俄罗斯联邦特维尔州首府，建于1135年。位于莫斯科西北约167公里，伏尔加河上游。历史上曾是特维尔大公国的都城。
- 名词: 圣母升天堂
  分类: 地点
  解释: 莫斯科的东正教教堂，玛丽亚·德米特里耶夫娜·阿赫罗西莫娃所属的教区教堂。在莫斯科有多座以圣母升天命名的教堂，其中最著名的是克里姆林宫内的圣母升天大教堂（乌斯宾斯基大教堂），历代沙皇在此加冕。
  书中原文: "星期天早晨，玛丽亚·德米特里耶夫娜请客人们到她所属的教区圣母升天堂去做午前祈祷。"
  网络来源: 圣母升天堂（圣母升天大教堂，Успенский Собор）位于莫斯科，是俄罗斯最重要的东正教教堂之一。1475-1479年由意大利建筑师菲奥拉万蒂建造，是历代沙皇加冕地和莫斯科都主教安葬地。
- 名词: 马格达林
  分类: 人物
  解释: 即抹大拉的马利亚（Mary Magdalene），《圣经·新约》中耶稣的重要女性门徒。耶稣曾从她身上赶出七个鬼，她见证耶稣被钉十字架和复活，是第一个看见复活耶稣并向门徒传报消息的人，被称为"使徒中的使徒"。
  书中原文: "花天酒地的公子哥儿，这些男马格达林们，正如女马格达林们一样，都有一种自以为无罪的隐密感觉，所以有这种感觉，是因为有得到原谅的希望。"
  网络来源: 抹大拉的马利亚（Mary Magdalene）在四部福音书中均有记载。她被耶稣赶出七个鬼后追随耶稣，用财物供给耶稣和门徒，见证耶稣受难、埋葬与复活，是第一个看见复活耶稣并传报喜讯的人。
