- 名词: 吉洪·谢尔巴特
  分类: 人物
  解释: |
    列夫·托尔斯泰《战争与和平》中杰尼索夫游击队的一名农民侦察员。本名吉洪，绰号"谢尔巴特"（俄语意为"豁子"），因牙齿有豁口而得名。原为格扎特附近波克罗夫斯科耶村的农民，杰尼索夫开始打游击时加入队伍。起初只做生篝火、挑水、剥马皮等粗活，后来因表现出色被编入哥萨克队伍，成为队里最有用的人，占有特殊而独一无二的地位。他不喜欢骑马，总是步行但从不落后于骑兵。武器是一支短火枪、一支长矛和一把斧头——他用斧头就像狼用牙齿一样灵活，既能劈木柴也能雕木勺。每当有特别困难的任务时，大家都会说"他这鬼东西不会有什么事的，健壮得像一匹大骟马"。吉洪是托尔斯泰笔下"人民战争"思想的典型代表，体现了普通农民在1812年卫国战争中自发参与反抗拿破仑入侵的英雄形象，与代表顺从与智慧的普拉东·卡拉塔耶夫形成鲜明对比。
  书中原文: |
    吉洪一只手搔着背，另一只手搔着头，忽然，他那麻脸拉长了，堆起一副傻笑，露出一只有豁口的牙（因此人们管谢尔巴特叫"豁子"）。
  网络来源: |
    https://book.douban.com/annotation/141770010/

- 名词: 樊尚·博斯
  分类: 人物
  解释: |
    列夫·托尔斯泰《战争与和平》中的一个次要角色，被俄军俘虏的法国少年小鼓手。法文名Vincent Bosse，俄军中将其名字叫得走了音：哥萨克叫他"韦辛尼"（Весенний，意为"春天的"），农民和士兵叫他"韦辛纳"。在杰尼索夫游击队营地中被俘后，杰尼索夫吩咐给他伏特加酒和羊肉，还打算让他穿上俄国式长衣，不随其他俘虏送走而是留在队里。彼佳·罗斯托夫对他格外同情和友善，握着他的手说"不要怕，不会把您怎么样的"，还想给他钱但又犹豫是否合适。樊尚·博斯是托尔斯泰虚构的文学角色，并非真实历史人物。他的出现象征着战争中的无辜者，尤其是被卷入大国冲突的普通人和孩子，体现了托尔斯泰对战争非人性化本质的批判以及对超越国界的人道主义与同情心的思考。
  书中原文: |
    "是啊，可怜的小家伙，"杰尼索夫说，他显然不认为这个提醒有什么可害羞的，"把他叫来。他叫樊尚·博斯。叫他来吧。"
  网络来源: |
    https://movie.douban.com/subject/1297822/comments?status=P

- 名词: 维亚济马战役
  分类: 事件
  解释: |
    1812年11月3日发生于俄罗斯西部城市维亚济马（莫斯科以西约200公里）的一场战役，是拿破仑从莫斯科撤退期间的重要战斗之一。交战双方为法兰西第一帝国（拿破仑）与俄罗斯帝国（库图佐夫）。由博阿尔内和达武指挥的法军后卫军团与库图佐夫所率俄军的前卫部队在维亚济马发生激战，法军最终被俄军赶出维亚济马。法军伤亡约6000人，俄军伤亡约2000人。该战役属于俄法战争总撤退阶段的重要战斗序列之一（塔鲁季诺之战→小雅罗斯拉夫韦茨之战→第二次波拉茨克之战→恰什尼基之战→维亚济马之战→斯摩利亚尼之战→克拉斯内战役→别列津纳河战役）。2021年2月，法俄两国在维亚济马联合安葬了126名在战役中阵亡的军人遗骸（含3名少年鼓手），库图佐夫和缪拉的后代出席仪式。
  书中原文: |
    自从他升为军官，特别是他到作战部队，参加过维亚济马战役后，彼佳为他已经是成年人而高兴，经常处在幸福、激越的状态中，并且经常兴高采烈地忙碌着，不放过任何一个从事真正的英雄事业的机会。
  网络来源: |
    https://baike.baidu.com/item/%E7%BB%B4%E4%BA%9A%E6%B5%8E%E9%A9%AC%E4%B9%8B%E6%88%98/23130039

- 名词: 俄罗斯游击队
  分类: 概念
  解释: |
    1812年俄法战争（俄国卫国战争）期间，俄罗斯帝国在后方和敌后开展的非正规军事行动。其特点是贵族军官主导——许多游击队长本身就是贵族军官，如杰尼斯·达维多夫被誉为游击运动的发起者和组织者之一。达维多夫换上农民服装、蓄大胡子、挂圣尼古拉小圣像以赢得农民信任，最初带领130名哥萨克士兵起家，袭击法军补给线和通讯设施。女农民瓦西丽莎·科任娜也组织了农民游击队。库图佐夫担任总司令后积极组织游击运动，用正规部队加强游击队，使其与正规军协同作战。游击队的主要战略作用包括：骚扰法军补给线、提供法军动向情报、消耗法军士气。1812年俄国游击战的性质是国家行为而非完全自发，沙皇政府有意识地派出军官到敌后组织游击活动，与西班牙半岛战争中的民众游击战形成对比。托尔斯泰在《战争与和平》中大量描写了这一时期游击战的场景，杰尼索夫和多洛霍夫的游击队即为小说中的典型代表。
  书中原文: |
    派去的那个军官在路上碰见杰尼索夫，带来消息说，多洛霍夫本人马上就到，他那方面一切都顺利。
  网络来源: |
    https://baike.baidu.com/item/%E6%9D%B0%E5%B0%BC%E6%96%AF%C2%B7%E7%93%A6%E8%A5%BF%E9%87%8C%E8%80%B6%E7%BB%B4%E5%A5%87%C2%B7%E8%BE%BE%E7%BB%B4%E5%A4%9A%E5%A4%AB/15062394
