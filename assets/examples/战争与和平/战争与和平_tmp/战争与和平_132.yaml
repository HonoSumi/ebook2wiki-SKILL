- 名词: 莫扎伊斯克
  分类: 地点
  解释: 俄罗斯莫斯科州西部的一座城镇，位于莫斯科以西约110公里处，1231年首次见于史书记载。1812年拿破仑入侵俄国期间，博罗季诺战役即发生在该城附近，是俄军保卫莫斯科的重要防线。
  书中原文: 由于某种不可捉摸的联想，他突然很生动地想起莫扎伊斯克山坡，载着伤兵的车子，教堂的钟声，太阳的斜晖，以及骑兵们的歌声。
  网络来源: https://zh.wikipedia.org/zh-sg/%E8%8E%AB%E6%89%8E%E4%BC%8A%E6%96%AF%E5%85%8B

- 名词: 塔塔里诺沃
  分类: 地点
  解释: 博罗季诺战场附近的一个村庄，俄军总司令库图佐夫在博罗季诺战役期间的驻地，其前线指挥部设于此地，皮埃尔曾在此寻找库图佐夫未果。
  书中原文: 在道路的左边有一所地主的住宅，那儿停着几辆马车、带篷的大车、一些勤务兵和哨兵。勋座就住在那儿。
  网络来源: https://baike.baidu.com/item/%E5%A1%94%E5%A1%94%E9%87%8C%E8%AF%BA%E6%B2%83

- 名词: 戈尔基
  分类: 地点
  解释: 博罗季诺战场附近的一个村庄，位于波罗金诺村附近的高地上。皮埃尔在寻找战场时经过此村，在这里第一次见到了头戴十字架帽、身穿白衬衫的农民民军在修筑工事。
  书中原文: 皮埃尔坐上车继续往前走，向戈尔基进发。
  网络来源: https://baike.baidu.com/item/%E6%88%88%E5%B0%94%E5%9F%BA/10859511

- 名词: 舍瓦尔金诺
  分类: 地点
  解释: 博罗季诺战场西南方向的一个村庄，以舍瓦尔金诺多面堡闻名。1812年9月5日，此处发生了博罗季诺会战的前哨战，俄军在此构筑的五角形防御工事经过激战后被法军攻占，为俄军主力修筑主阵地赢得了时间。
  书中原文: 这是舍瓦尔金诺多面堡。昨天是我们的，现在是他(拿破仑)的了。
  网络来源: https://baike.baidu.com/item/%E8%88%8D%E7%93%A6%E5%B0%94%E9%87%91%E8%AF%BA

- 名词: 谢苗诺夫斯科耶
  分类: 地点
  解释: 博罗季诺战场上的一个村庄，位于波罗金诺村左侧。在博罗季诺战役中，该村成为俄军左翼防线的核心区域，村庄在战火中被烧毁，冒烟的废墟成为战场景象的一部分。
  书中原文: 左边地势比较平坦，有长着庄稼的田地，那里可以看见一座被烧掉的冒烟的村子——谢苗诺夫斯科耶村。
  网络来源: https://baike.baidu.com/item/%E8%B0%A2%E8%8B%97%E8%AF%BA%E5%A4%AB%E6%96%AF%E7%A7%91%E8%80%B6

- 名词: 瓦卢耶瓦
  分类: 地点
  解释: 博罗季诺战场附近的一个村庄，位于斯摩棱斯克大路沿线。1812年博罗季诺战役前，拿破仑军队驻扎在该村，成为法军的前沿指挥所。
  书中原文: 一直伸展到从六俄里外可以看见的瓦卢耶瓦村（现在拿破仑就在那儿驻扎）。
  网络来源: https://baike.baidu.com/item/%E7%93%A6%E5%8D%A2%E8%80%B6%E7%93%A6

- 名词: 科洛恰河
  分类: 地点
  解释: 莫斯科河的一条支流，流经博罗季诺战场。在博罗季诺战役中，该河构成了俄军防线前方的天然屏障，法军需渡河才能攻击俄军阵地。
  书中原文: 右边，沿科洛恰河和莫斯科河流域，是峡谷纵横的山地。
  网络来源: https://baike.baidu.com/item/%E7%A7%91%E6%B4%9B%E6%81%B0%E6%B2%B3

- 名词: 莫斯科河
  分类: 地点
  解释: 俄罗斯欧洲部分的一条重要河流，流经莫斯科市和莫斯科州，全长约502公里。在博罗季诺战场，莫斯科河构成了俄军右翼防线的天然依托。
  书中原文: 我们的右翼就在那儿，那儿是莫斯科河，那儿我们有三个多面堡，修筑得非常坚固。
  网络来源: https://baike.baidu.com/item/%E8%8E%AB%E6%96%AF%E7%A7%91%E6%B2%B3

- 名词: 拉耶夫斯基土岗
  分类: 地点
  解释: 博罗季诺战场中央库尔干山丘上的一座棱堡，以俄军第7步兵军军长尼古拉·拉耶夫斯基中将命名。该棱堡配备18门火炮，是俄军防线的核心关键点，成为博罗季诺战役中争夺最激烈的阵地之一，具有极高的军事历史意义。
  书中原文: 我们的中心在波罗金诺，就在那儿，那儿是科洛恰河渡口……而这儿，他指着拉耶夫斯基土岗。
  网络来源: https://baike.baidu.com/item/%E6%8B%89%E8%80%B6%E5%A4%AB%E6%96%AF%E5%9F%BA%E5%9C%9F%E5%B2%97

- 名词: 斯摩棱斯克大路
  分类: 地点
  解释: 连接莫斯科和斯摩棱斯克的一条古道，是19世纪初俄国西部最重要的交通干线之一。1812年拿破仑入侵俄国时，法军主力沿此路向莫斯科推进，博罗季诺战场即位于该路沿线。
  书中原文: 斯摩棱斯克大路从左上方穿过圆剧场，经过一座坐落在土岗前下方五百来步有白色教堂的村子蜿蜒曲折地伸展着。
  网络来源: https://baike.baidu.com/item/%E6%96%AF%E6%91%A9%E6%A3%B1%E6%96%AF%E5%85%8B%E5%A4%A7%E8%B7%AF

- 名词: 科洛恰修道院
  分类: 地点
  解释: 位于科洛恰河畔的一座东正教修道院，靠近博罗季诺战场。在博罗季诺战役前，皮埃尔从高处远眺时看到了该修道院的十字架和钟楼在阳光下闪光。
  书中原文: 在那座白桦和枞树的森林里，在大路的右边，科洛恰修道院的十字架和钟楼远远地在太阳下闪光。
  网络来源: https://baike.baidu.com/item/%E7%A7%91%E6%B4%9B%E6%81%B0%E4%BF%AE%E9%81%93%E9%99%A2

- 名词: 别祖博沃
  分类: 地点
  解释: 博罗季诺战场附近的一个村庄，位于科洛恰河和莫斯科河流域的峡谷之间，从博罗季诺战场的高地上可以远眺该村。
  书中原文: 在峡谷中间，从远处可以看见别祖博沃村和扎哈林诺村。
  网络来源: https://baike.baidu.com/item/%E5%88%AB%E7%A5%96%E5%8D%9A%E6%B2%83

- 名词: 扎哈林诺
  分类: 地点
  解释: 博罗季诺战场附近的一个村庄，与别祖博沃村相邻，位于战场右侧科洛恰河流域的峡谷地带。
  书中原文: 在峡谷中间，从远处可以看见别祖博沃村和扎哈林诺村。
  网络来源: https://baike.baidu.com/item/%E6%89%8E%E5%93%88%E6%9E%97%E8%AF%BA

- 名词: 斯摩棱斯克圣母
  分类: 物件
  解释: 又称斯摩棱斯克圣母像或霍德格特利亚圣母像，是俄罗斯东正教最受尊崇的圣像之一，属于拜占庭霍德格特利亚类型。传说由福音书作者圣路加亲绘。1812年法军入侵时，该圣像随俄军从斯摩棱斯克撤出并跟随军队行动，被称为俄国西部边疆的守护者。
  书中原文: 斯摩棱斯克圣母。这是从斯摩棱斯克运出并且从此就跟着军队的圣像。
  网络来源: https://baike.baidu.com/item/%E6%96%AF%E6%91%A9%E6%A3%B1%E6%96%AF%E5%85%8B%E5%9C%A3%E6%AF%8D%E5%83%8F

- 名词: 伊韦尔圣母
  分类: 物件
  解释: 又称伊韦尔圣母像或门房圣母，源自希腊阿索斯山伊韦尔修道院的著名东正教圣像，属于霍德格特利亚类型。传说由圣路加亲绘，在圣像破坏运动时期被士兵刺伤后流血。1648年复制品被迎至莫斯科，供奉于红场伊韦尔小堂，是莫斯科最受尊崇的圣像之一。
  书中原文: 圣母来了！保护神！伊韦尔圣母！
  网络来源: https://baike.baidu.com/item/%E4%BC%8A%E9%9F%A6%E5%B0%94%E5%9C%A3%E6%AF%8D

- 名词: 高筒僧帽
  分类: 物件
  解释: 东正教神职人员（主教或高级僧侣）在礼仪中所佩戴的一种高耸的筒状礼帽，是东正教僧侣法衣的重要组成部分，象征着信仰的高升和属灵的权威。
  书中原文: 在尘土飞扬的路上行进着的一营人后面，是穿着法衣的神甫们——一个戴着高筒僧帽的小老头、一群僧侣和唱诗班。
  网络来源: https://baike.baidu.com/item/%E5%83%A7%E5%B8%BD

- 名词: 手提香炉
  分类: 物件
  解释: 东正教礼仪中使用的一种手持式香炉，通常由金属制成，内焚香料，带有链条或手柄，在祈祷和宗教游行时用于熏香。它是东正教礼拜中象征祈祷上升天庭的重要礼仪用具。
  书中原文: 圣像抬到山上就停了下来；用一大块布托着圣像的人们换了班，读经员重新点起手提香炉，祈祷开始了。
  网络来源: https://baike.baidu.com/item/%E9%A6%99%E7%82%89

- 名词: 多面堡
  分类: 概念
  解释: 一种星形或多边形的野战防御工事，通常用泥土和木材构筑，四面有凸出的棱角以消除射击死角。在19世纪欧洲战争中广泛使用，博罗季诺战场俄军修筑了大量多面堡作为防线的核心支撑点。
  书中原文: 这是舍瓦尔金诺多面堡。昨天是我们的，现在是他(拿破仑)的了。
  网络来源: https://baike.baidu.com/item/%E5%A4%9A%E9%9D%A2%E5%A0%A1
