- 名词: 罗斯托夫
  分类: 人物
  解释: >
    尼古拉·伊里奇·罗斯托夫，小说核心人物之一，保罗格勒骠骑兵团的年轻士官生
    （后晋升军官），出身莫斯科贵族家庭，性格正直勇敢但冲动，重视荣誉。
  书中原文: >
    "不管谁说我撒谎，我都不答应！"罗斯托夫大声喊道，
    "他说我撒谎，我也说他撒谎。"
  网络来源: >
    罗斯托夫是托尔斯泰《战争与和平》中四大家族之一罗斯托夫家族的长子，
    在保罗格勒骠骑兵团服役，经历了从热血青年到成熟稳重一家之主的成长弧光。

- 名词: 基尔斯坚
  分类: 人物
  解释: >
    保罗格勒骠骑兵团的骑兵上尉，身材高大、头发斑白、满脸皱纹的资深军官，
    曾两次因决斗被降为士兵又两次复职，重团队荣誉，是年轻军官的导师式人物。
  书中原文: >
    "这个骑兵上尉基尔斯坚曾经两次因决斗而降为士兵，而两次都复了原职。"
  网络来源: >
    基尔斯坚（Kirsten）是《战争与和平》中保罗格勒团的资深骑兵上尉，
    在罗斯托夫与团长的冲突中扮演调解者角色，强调团队荣誉高于个人自尊。

- 名词: 杰尼索夫
  分类: 人物
  解释: >
    瓦西里·费奥多罗维奇·杰尼索夫，保罗格勒骠骑兵团的骑兵连指挥官（大尉），
    罗斯托夫的亲密战友和榜样，性格豪爽热情，重情重义。
  书中原文: >
    "杰尼索夫咬着胡子，神色阴郁地听着，看来他是不想参与这场谈话的。"
  网络来源: >
    杰尼索夫是《战争与和平》中的重要配角，后来曾向娜塔莎求婚被拒，
    在1812年战争中成为游击队指挥官。人物原型部分取材于诗人兼游击队员杰尼斯·达维多夫。

- 名词: 波格丹内奇
  分类: 人物
  解释: >
    保罗格勒骠骑兵团的团长（团指挥官），是一位正直勇敢但爱记仇的老上校，
    在军官中享有威望。
  书中原文: >
    "您在军官们面前对团长说这种下流勾当，"骑兵上尉继续说，
    "波格丹内奇（团长的名字）制止了您。"
  网络来源: >
    波格丹内奇（Bogdanich）是保罗格勒骠骑兵团的团长，
    在小说中与罗斯托夫发生冲突。军官们评价他是正直勇敢的老上校但也爱记仇。

- 名词: 热尔科夫
  分类: 人物
  解释: >
    俄军中的一名副官/传令军官，性格懦弱、虚荣、善于逢迎，
    在申格拉本战役中曾因恐惧而未能传达命令，是托尔斯泰塑造的反面军官典型。
  书中原文: >
    "热尔科夫走进屋来。……进军，诸位。马克被俘，全军投降了。"
  网络来源: >
    热尔科夫（Zherkov）是库图佐夫和巴格拉季翁手下的一名副官，
    在申格拉本战役中临阵脱逃未传达撤退命令，战后却撒谎邀功，
    代表俄军中贪生怕死的投机军官。

- 名词: 涅斯维茨基
  分类: 人物
  解释: >
    涅斯维茨基公爵，俄军总司令部的侍从军官（校官），体格沉重，
    性格随和爱开玩笑，好美食，乐于与人分享，经常作为传令军官往返于司令部与前线之间。
  书中原文: >
    "跟随涅斯维茨基的哥萨克兵把行囊和水壶递过来，
    于是涅斯维茨基请军官们吃油炸包子和真正的茴香甜酒。"
  网络来源: >
    涅斯维茨基（Nesvitsky）是《战争与和平》中的配角军官，随库图佐夫服役。
    他也是英国俱乐部的老成员，起到连接战争场面与和平生活的桥梁作用。

- 名词: 库图佐夫
  分类: 人物
  解释: >
    米哈伊尔·伊拉里奥诺维奇·库图佐夫，俄国陆军元帅，
    1805年俄奥联军总司令，在第三次反法同盟战争中指挥俄军对拿破仑作战，
    以战略退却保存实力而闻名。
  书中原文: >
    "库图佐夫向维也纳方向退却，一路破坏身后的桥梁
    （因河上布劳瑙城的桥和特劳恩河上林茨城的桥）。"
  网络来源: >
    库图佐夫（1745-1813）是俄国杰出军事家，
    1812年卫国战争中击败拿破仑的俄军总司令，
    被誉为独眼将军和北方的老狐狸。1805年奥斯特里茨战役后一度被解职。

- 名词: 马克
  分类: 人物
  解释: >
    卡尔·马克·冯·莱贝里希，奥地利骑兵元帅，
    1805年乌尔姆战役中率奥地利军队向拿破仑投降，导致俄军陷入孤军作战的困境。
  书中原文: >
    "进军，诸位。马克被俘，全军投降了。"
  网络来源: >
    马克（Karl Mack von Leiberich，1752-1828）是奥地利骑兵元帅，
    1805年乌尔姆战役中因被拿破仑的战略迂回包围而率2.3万奥军投降。
    战后被送上军事法庭，判两年徒刑。

- 名词: 维也纳
  分类: 地点
  解释: >
    奥地利首都，位于多瑙河畔，1805年拿破仑战争期间是俄军战略退却的方向目标之一，
    同年11月被法军占领。
  书中原文: >
    "库图佐夫向维也纳方向退却，一路破坏身后的桥梁"
  网络来源: >
    维也纳是奥地利首都和最大城市，位于多瑙河畔，
    1805年拿破仑在乌尔姆战役和奥斯特里茨战役后于11月12日占领维也纳，
    迫使奥地利退出第三次反法同盟。

- 名词: 因河
  分类: 地点
  解释: >
    多瑙河右岸主要支流，发源于瑞士阿尔卑斯山，流经奥地利和德国，
    在帕绍注入多瑙河，全长约510公里。
  书中原文: >
    "一路破坏身后的桥梁（因河上布劳瑙城的桥和特劳恩河上林茨城的桥）。"
  网络来源: >
    因河（Inn River）是多瑙河的重要支流，流经瑞士、奥地利、德国三国。
    因河畔的因斯布鲁克（Innsbruck）意为因河上的桥。

- 名词: 布劳瑙
  分类: 地点
  解释: >
    因河畔布劳瑙，奥地利上奥地利州的城市，位于奥德边境因河畔，
    1805年俄军在此扎营并向维也纳方向退却的起点。
  书中原文: >
    "因河上布劳瑙城的桥"
  网络来源: >
    布劳瑙（Braunau am Inn）是奥地利最古老的城市之一（1260年获城市特权），
    位于奥德边境的因河畔城市。

- 名词: 特劳恩河
  分类: 地点
  解释: >
    多瑙河右岸支流，全长153公里，发源于施泰尔马克州的托特斯山，
    流经萨尔茨卡默古特地区，在奥地利林茨附近汇入多瑙河。
  书中原文: >
    "特劳恩河上林茨城的桥"
  网络来源: >
    特劳恩河（Traun）是奥地利上奥地利州的主要河流之一，
    流经哈尔施塔特湖和特劳恩湖，河道上建有超过15座水电站。

- 名词: 林茨
  分类: 地点
  解释: >
    奥地利第三大城市、上奥地利州首府，位于多瑙河与其支流特劳恩河交汇处，
    多瑙河上游最大河港，重要的工业与交通枢纽。
  书中原文: >
    "特劳恩河上林茨城的桥"
  网络来源: >
    林茨（Linz）是奥地利重工业中心，世界500强企业奥钢联总部所在地。
    2009年被选为欧洲文化之都。

- 名词: 恩斯河
  分类: 地点
  解释: >
    多瑙河南岸支流，全长254公里，奥地利境内最长的河流，
    发源于萨尔茨堡州的拉德施塔特陶恩山区，在毛特豪森注入多瑙河。
  书中原文: >
    "十月二十三日，俄军抢渡恩斯河。"
  网络来源: >
    恩斯河（Enns River）完全流经奥地利境内，穿越著名的Gesaeuse峡谷。
    历史上是下奥地利州与上奥地利州的界河。

- 名词: 恩斯城
  分类: 地点
  解释: >
    恩斯河畔的城市，被认为是奥地利最古老的城市（1212年获城市特许状），
    位于恩斯河与多瑙河交汇处附近，是重要的历史贸易枢纽。
  书中原文: >
    "当天中午，俄军的辎重队、炮队和士兵纵队分两路从桥上通过恩斯城。"
  网络来源: >
    恩斯（Enns）被认为是奥地利最古老的城市，保存有1212年的原始城市特许状。
    历史上曾是罗马军营Lauriacum所在地。

- 名词: 多瑙河
  分类: 地点
  解释: >
    欧洲第二长河（全长约2850公里），发源于德国黑森林，流经10个国家后注入黑海。
    维也纳、林茨等城市均位于多瑙河畔。
  书中原文: >
    "还能看见多瑙河湾的船只和小岛，为恩斯河和多瑙河的汇流所环绕的一座花园城堡"
  网络来源: >
    多瑙河是欧洲重要的国际河流，流经德国、奥地利、斯洛伐克、匈牙利等10国。
    在《战争与和平》中，多瑙河是俄法两军争夺的重要地理屏障。

- 名词: 保罗格勒团
  分类: 概念
  解释: >
    保罗格勒骠骑兵团，小说中尼古拉·罗斯托夫服役的骑兵部队，
    基尔斯坚、杰尼索夫等军官均隶属该团，以其团队荣誉为核心凝聚力。
  书中原文: >
    您不在乎人家说，保罗格勒团的军官中有小偷！我们可不是无所谓的。
  网络来源: >
    保罗格勒骠骑兵团（Pavlograd Hussar Regiment）是《战争与和平》中虚构的
    俄国骠骑兵部队，罗斯托夫、杰尼索夫等人物均隶属该团。
    历史上存在过保罗格勒骠骑兵团。

- 名词: 团旗
  分类: 概念
  解释: >
    俄国军队中代表团队荣誉与身份的军旗，被视为军人的荣誉和光荣的象征，
    丢失军旗被视为极大的耻辱，保卫团旗是军人的神圣职责。
  书中原文: >
    "我在实际行动中做给你们看，团旗的荣誉对于我也同样……
    不管怎么说，反正是我的错！"
  网络来源: >
    俄军军旗起源于军事传统，是部队的集结点和荣誉象征。
    圣乔治旗是俄军中最高荣誉的旗帜。
    在俄军传统中，若部队丢失军旗将面临被解散的处分。

- 名词: 决斗
  分类: 习俗
  解释: >
    19世纪俄国贵族社会中解决荣誉争端的传统方式，通常使用手枪，有严格规则。
    基尔斯坚曾两次因决斗被降为士兵。
  书中原文: >
    "这个骑兵上尉基尔斯坚曾经两次因决斗而降为士兵，而两次都复了原职。"
  网络来源: >
    决斗随彼得大帝欧化改革传入俄国，在19世纪盛行于贵族阶层。
    普希金、莱蒙托夫等著名作家均死于决斗。
    俄国决斗多用手枪，距离近、规则残酷。

- 名词: 茴香甜酒
  分类: 物件
  解释: >
    俄语称为анисовка（anisovka），一种以茴香调味的传统俄罗斯烈酒
    （茴香伏特加），类似于法国的茴香利口酒，是19世纪俄国军官喜爱的饮品之一。
  书中原文: >
    "涅斯维茨基请军官们吃油炸包子和真正的茴香甜酒。"
  网络来源: >
    茴香酒（анисовка）是俄罗斯传统茴香伏特加，以茴香籽调味。
    在俄罗斯传统饮品中与伏特加、香槟并列，19世纪流行于军队和贵族社交场合。

- 名词: 库图佐夫战略退却
  分类: 事件
  解释: >
    1805年10月，库图佐夫在得知奥地利马克将军在乌尔姆投降后，
    为避免被拿破仑优势兵力围歼，率俄军从布劳瑙向维也纳方向实施战略性退却，
    沿途破坏桥梁以阻滞法军追击。
  书中原文: >
    "库图佐夫向维也纳方向退却，一路破坏身后的桥梁
    （因河上布劳瑙城的桥和特劳恩河上林茨城的桥）。
    十月二十三日，俄军抢渡恩斯河。"
  网络来源: >
    库图佐夫1805年战略退却（布劳瑙-奥尔米茨退却）
    被誉为战略机动的出色典范，载入俄国军事学术史册。
    通过一系列后卫阻击战保全了俄军主力。
