- 名词: 阿格拉菲娜·伊万诺夫娜·别洛娃
  分类: 人物
  解释: |
    列夫·托尔斯泰长篇小说《战争与和平》中的次要人物，罗斯托夫家在奥特拉德诺耶的女邻居，一位虔诚的东正教信徒。在娜塔莎因与安德烈公爵解除婚约而精神崩溃后，她来到莫斯科朝拜圣徒，建议娜塔莎进行严格的斋戒祈祷，并每天凌晨三点陪她去教堂参加晨祷、晚祷和弥撒，持续整整一周，对娜塔莎的精神康复起到了关键的引导作用。
  书中原文: |
    刚过圣彼得斋戒日，罗斯托夫家在奥特拉德诺耶的女邻居阿格拉菲娜·伊万诺夫娜·别洛娃来莫斯科朝拜这儿的圣徒们。她建议娜塔莎斋戒祈祷，娜塔莎当即高兴地接受了这个主意。
  网络来源: |
    https://www.litcharts.com/lit/war-and-peace/volume-3-part-1-chapters-16-18
- 名词: 肖斯太太
  分类: 人物
  解释: |
    列夫·托尔斯泰长篇小说《战争与和平》中的次要人物，全名路易萨·伊万诺夫娜·肖斯（Madame Schoss），罗斯托夫伯爵家中的家庭教师兼女伴，长期住在罗斯托夫宅邸中。在娜塔莎生病期间，她喜好收集药瓶药盒等小玩艺儿；后在莫斯科大撤离前夕，她的房间被用来安置身受重伤的安德烈·博尔孔斯基公爵，成为娜塔莎与安德烈重逢的关键空间。
  书中原文: |
    虽然服了大量的药丸、药水和药粉，爱好小玩艺儿的肖斯太太收集了一大批盛药的小瓶和小盒，虽然缺少已经习惯了的乡村生活，但是青春占了上风：娜塔莎的悲伤开始蒙上一层日常生活的印象，已经不那么痛苦地揪她的心了，渐渐地成为过去了，娜塔莎身体渐渐好起来。
  网络来源: |
    https://pages.haomooc.com/index.php?s=book&c=extend&id=9636
- 名词: 穆德罗夫
  分类: 人物
  解释: |
    马特维·雅科夫列维奇·穆德罗夫（Матвей Яковлевич Мудров，1776—1831），19世纪俄罗斯著名内科医生、医学教育改革者，俄罗斯临床学派的奠基人之一。1800年毕业于莫斯科大学医学系，曾赴德、奥、法进修。他是俄罗斯第一个采用科学问诊方法和撰写病历的医生，倡导"治人而非治病"的个体化治疗理念，也是军事卫生学的奠基人之一。在《战争与和平》中作为当时莫斯科的名医被提及。
  书中原文: |
    假如他不能详细讲一讲梅蒂维埃和费勒如何不懂医道，弗里茨如何高明，而穆德罗夫如何诊断得更好；——假如他没能办到这一切，他对爱女的病怎么能够忍受下去呢？
  网络来源: |
    https://medet.rsmu.press/archive/2026/1/7/content?lang=en
- 名词: 伊林
  分类: 人物
  解释: |
    列夫·托尔斯泰长篇小说《战争与和平》中的次要人物，俄军骠骑兵少尉，年仅约十六岁，与尼古拉·罗斯托夫同属一个骑兵连。他年轻活泼、乐观开朗，在奥斯特罗夫纳战役中与罗斯托夫并肩作战。罗斯托夫在战后心神不宁时，首先想到伊林是否安然无恙，可见二人关系亲近。伊林的角色主要用于衬托尼古拉·罗斯托夫从初上战场的恐惧中成长为成熟军官的过程。
  书中原文: |
    "是什么使我苦恼呢？"他在离开将军时问自己，"是为伊林吗？不是，他安然无恙。我做了什么丢脸的事吗？不是，完全不是那回事！——另有一种类似后悔的东西使他痛苦。——是了，是了，是为那个下巴有一个小酒窝的法国军官。"
  网络来源: |
    https://williamlong.info/xiaoshuo/archives/324.html
- 名词: 奥斯特罗夫纳战役
  分类: 事件
  解释: |
    1812年7月25日至26日发生在俄国奥斯特罗夫纳村（今白俄罗斯维捷布斯克附近）的一场后卫战，是拿破仑入侵俄国期间的重要战役。俄军第四军在奥斯特曼—托尔斯泰将军指挥下阻击法军缪拉亲王和南苏蒂将军率领的部队。俄军以顽强抵抗为巴克莱·德·托利争取了时间，具有重要战略意义。此役在托尔斯泰的《战争与和平》中被提及，是尼古拉·罗斯托夫获圣乔治十字勋章并晋升指挥官的战役。
  书中原文: |
    在奥斯特罗夫纳战役之后，他首先被提升，把一营骠骑兵交给他指挥，在需要勇敢的军官的时候，他受到了信任。
  网络来源: |
    https://www.historyofwar.org/articles/battles_ostrovno.html
- 名词: 圣彼得斋戒日
  分类: 习俗
  解释: |
    又称使徒斋期、彼得保罗斋期（俄文：Петров пост），东正教四大斋期之一，为纪念圣彼得和圣保罗两位首座使徒而设。斋期从正教会诸圣节（复活节后第八主日）后的周一持续至使徒月29日（约公历6月28/29日），长度因复活节日期浮动而每年不同，短则数日，长可达六周。期间禁止红肉、禽肉、蛋奶等，鱼、油、酒在某些日子允许。在《战争与和平》中，这一斋期的到来成为娜塔莎精神转折的契机。
  书中原文: |
    刚过圣彼得斋戒日，罗斯托夫家在奥特拉德诺耶的女邻居阿格拉菲娜·伊万诺夫娜·别洛娃来莫斯科朝拜这儿的圣徒们。她建议娜塔莎斋戒祈祷，娜塔莎当即高兴地接受了这个主意。
  网络来源: |
    https://azbyka.ru/chinaorthodox/zhengjiaohuide-zhaiqi.html
- 名词: 斋戒祈祷
  分类: 习俗
  解释: |
    东正教重要的宗教实践，指在斋戒期间配合以祈祷的灵修方式，是东正教信徒预备迎接重要瞻礼、净化心灵的主要途径。斋戒不仅是饮食上的节制（禁肉蛋奶等），更强调以祈祷、忏悔、施舍辅助的全面灵性操练。在《战争与和平》中，娜塔莎经别洛娃建议后进行严格的一周斋戒祈祷，每天前往教堂参加晨祷、晚祷和弥撒，成为她精神康复的重要转折点。
  书中原文: |
    她建议娜塔莎斋戒祈祷，娜塔莎当即高兴地接受了这个主意。娜塔莎不顾医生禁止一大早外出，坚持要斋戒祈祷，而且不像罗斯托夫家里通常那样做的，只是在家里做三次祈祷就算完事，而是要像阿格拉菲娜·伊万诺夫娜那样，要整个星期每天都不错过晚祷、弥撒和晨祷。
  网络来源: |
    https://azbyka.ru/chinaorthodox/zhengjiaohuide-zhaiqi.html
- 名词: 领圣体
  分类: 概念
  解释: |
    东正教七件圣事之一，又称圣餐礼、事奉圣礼（Divine Liturgy）。东正教信奉经过祝圣的饼和酒真实地转变为基督的身体和宝血（变体说），使用发酵面饼，以同一圣勺将体血混合后送至信徒口中。领圣体前需严格守斋，是东正教信徒与神合一、获得恩典的最重要途径。在《战争与和平》中，娜塔莎经过一周斋戒祈祷后领圣体，感受到前所未有的心气平和与精神新生。
  书中原文: |
    领圣体，或者像阿格拉菲娜·伊万诺夫娜喜欢说的"领圣餐"，在娜塔莎心目中其幸福是那么伟大，她甚至觉得她活不到那极乐的礼拜日。
  网络来源: |
    https://zh.wikipedia.org/zh-sg/%E5%9C%A3%E4%BD%93
- 名词: 忏悔祷告
  分类: 习俗
  解释: |
    东正教的重要宗教实践，又称告解圣事、和好圣事，是东正教七件圣事之一。其神学基础源于《约翰福音》20:22-23，信徒向神父告明罪过，祈求神的宽恕，被称为"以泪水而行的洗礼"（第二次洗礼）。忏悔不仅是悔罪，更是与神和教会重修旧好。在《战争与和平》中，娜塔莎在斋戒祈祷期间最全神贯注于忏悔祷告，从中获得了深刻的谦卑感和精神解脱。
  书中原文: |
    最能使她全神贯注的是忏悔的祷告。大清早回家时，只碰见去上工的泥瓦匠，扫街的清道夫，回到家里，所有的人还在睡觉，这时她体验到一种前所未有的感情，她觉得有可能改正错误和有可能过一种纯洁、幸福的新生活。
  网络来源: |
    https://azbyka.ru/chinaorthodox/zhengjiaohuide-chanhui-huigai.html
- 名词: 阿尔巴特药房
  分类: 地点
  解释: |
    莫斯科阿尔巴特街上的老牌药房，在19世纪初是莫斯科知名的药店之一。在托尔斯泰的《战争与和平》中，罗斯托夫家为给生病的娜塔莎买药，派车夫专程前往阿尔巴特药房，花费一卢布七十戈比购买用精美盒子包装的药粉和药丸，反映了当时莫斯科贵族家庭求医问药的日常生活以及阿尔巴特街作为莫斯科商业中心的地位。
  书中原文: |
    医生对娜塔莎是有益的，因为他们亲吻和抚摩她的疼痛，他们使人相信：只要车夫到阿尔巴特药房去一趟，花一卢布七十戈比买一点用好看的盒子包装的药粉和药丸，只要每隔两小时——一定不多也不少，用开水服下那些药，准会药到病除。
  网络来源: |
    https://www.litcharts.com/lit/war-and-peace/volume-3-part-1-chapters-16-18
