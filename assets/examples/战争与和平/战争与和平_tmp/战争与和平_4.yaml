- 名词: 拿破仑
  分类: 人物
  解释: |
    拿破仑·波拿巴（1769—1821），法兰西第一帝国皇帝，杰出的军事家和政治家。生于科西嘉岛阿雅克肖，1799年发动雾月政变掌握政权，1804年在巴黎加冕称帝。他颁布《拿破仑法典》，多次打败反法同盟，鼎盛时期控制欧洲大部。1812年远征俄国失败，1814年退位被流放厄尔巴岛，1815年百日王朝复辟后在滑铁卢战败，被流放至圣赫勒拿岛病逝。
  书中原文: |
    只有拿破仑善于理解革命，战胜革命，因此，为了全体的利益，他不能因可惜一个人的生命而趑趄不前。
  网络来源: |
    https://www.worldhistory.org/trans/zh/1-21844/

- 名词: 库图佐夫
  分类: 人物
  解释: |
    米哈伊尔·伊拉里奥诺维奇·库图佐夫（1745—1813），俄罗斯帝国元帅，杰出的军事家。曾在两次俄土战争中身负重伤失去右眼，被称为"独眼将军"。1812年拿破仑入侵俄国时临危受命出任俄军总司令，在博罗季诺战役中重创法军，后实施焦土战略放弃莫斯科，最终迫使法军惨败撤退，被誉为"拿破仑的克星"。托尔斯泰在《战争与和平》中对其有深入刻画。
  书中原文: |
    您和米哈伊尔·伊拉里奥诺维奇·库图佐夫很要好，请您把鲍里斯举荐给他当副官。
  网络来源: |
    https://zh.wikipedia.org/zh/米哈伊尔·伊拉里奥诺维奇·库图佐夫

- 名词: 路易十六
  分类: 人物
  解释: |
    路易十六（1754—1793），法国波旁王朝末代国王，1774年至1792年在位。性格善良但优柔寡断，酷爱制锁而有"锁匠国王"之称。面对财政危机推行改革受阻，1789年被迫召开三级会议，引发法国大革命。1791年出逃瓦雷讷失败，1793年被国民公会议处叛国罪，在巴黎革命广场被送上断头台处死，是法国历史上唯一被处决的国王。
  书中原文: |
    各国元首！他们为路易十六做了什么？为皇后、为伊丽莎白公主做了什么？什么都没做。
  网络来源: |
    https://baike.baidu.com/item/路易十六/455224

- 名词: 亚历山大皇帝
  分类: 人物
  解释: |
    亚历山大一世·巴甫洛维奇（1777—1825），俄罗斯帝国皇帝，1801年至1825年在位。在拿破仑战争中扮演关键角色，1812年俄法战争后率领反法联军攻入巴黎，成为"欧洲的救世主"。战后组建神圣同盟，是当时欧洲最具影响力的君主之一。性格神秘矛盾，被称为"北方斯芬克斯"，晚年有诈死隐居为修士的传说。
  书中原文: |
    亚历山大皇帝宣布，他要让法国人自己选择自己的政体。
  网络来源: |
    https://zh.wikipedia.org/wiki/亚历山大一世_(俄国)

- 名词: 伊丽莎白公主
  分类: 人物
  解释: |
    伊丽莎白·菲利普·玛丽·埃莱娜·德·波旁（1764—1794），法国公主，路易十六的亲妹妹，尊称"伊丽莎白夫人"。法国大革命期间拒绝逃亡，坚持陪伴兄嫂一家，被囚禁于汤普尔宫。1794年5月10日被革命法庭判处死刑，在巴黎协和广场被处决，以虔诚和勇敢著称，被天主教会尊为殉道者。
  书中原文: |
    各国元首！他们为路易十六做了什么？为皇后、为伊丽莎白公主做了什么？什么都没做。
  网络来源: |
    https://baike.baidu.com/item/伊丽莎白·菲利普·玛丽·埃莱娜·德·波旁/24507767

- 名词: 昂吉安公爵
  分类: 人物
  解释: |
    昂吉安公爵路易·安托万（1772—1804），法国波旁王室成员，孔代亲王的独子。1804年，拿破仑怀疑其参与暗杀阴谋，派兵越过国境从德国巴登公国将其绑架回法国，经仓促军事审判后在文森城堡护城河被枪决。此事件在欧洲引起巨大震动，促使英国和俄罗斯对法宣战，成为第三次反法同盟的导火索之一。
  书中原文: |
    处死昂吉安公爵，拿破仑说，对国家有其必要性。拿破仑不怕由他一个人负全责，我认为这正是他精神伟大之处。
  网络来源: |
    https://zh.m.wikipedia.org/wiki/昂吉安公爵

- 名词: 孔德
  分类: 概念
  解释: |
    孔德即孔代亲王（Prince de Condé），是法国波旁王朝的重要旁系分支，法国历史上最显赫的贵族世家之一，名称来源于香槟地区的孔代领地。第一代孔代亲王路易一世于1557年受封。该家族出过多位著名人物，包括被誉为"大孔代"的军事天才路易二世。孔代家族于1830年绝嗣。书中伊波利特公爵用针在桌上画了孔德家族的徽章图案。
  书中原文: |
    伊波利特手持长柄眼镜对子爵瞅了半天，在听到这些话时，他突然朝娇小的公爵夫人转过全身，向她要了一根针，用它在桌上画孔德的徽章给她看。
  网络来源: |
    https://zh.wikipedia.org/wiki/孔代亲王

- 名词: 波旁王朝
  分类: 概念
  解释: |
    波旁王朝是欧洲历史上著名的跨国王朝，起源于法国中部的波旁地区，为卡佩王朝的旁系分支。自1589年亨利四世即位开始统治法国，历经路易十三、路易十四（太阳王）、路易十五、路易十六等君主。1792年在法国大革命中被推翻，1814年拿破仑倒台后复辟，1830年七月革命后被彻底推翻。此外还统治过西班牙、那不勒斯等地。
  书中原文: |
    是因为波旁王朝逃避革命，使人民陷于无政府状态。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/波旁王朝

- 名词: 雾月十八日
  分类: 事件
  解释: |
    雾月十八日（1799年11月9—10日），即法国共和历雾月18日的政变，是拿破仑·波拿巴夺取政权的关键事件。拿破仑在巴黎大资产阶级和银行家支持下，以武力推翻督政府，成立执政府，自任第一执政。此次政变标志着法国大革命的结束和拿破仑军事独裁的开始，为1804年法兰西第一帝国的建立铺平了道路。
  书中原文: |
    我请问，先生怎样解释雾月十八日呢？难道这不是欺骗吗？这是骗局，丝毫不像伟大人物的行为。
  网络来源: |
    https://zh.wikipedia.org/zh-my/雾月政变

- 名词: 米兰的加冕礼
  分类: 事件
  解释: |
    1805年5月26日拿破仑在米兰大教堂加冕为意大利国王的历史事件。拿破仑佩戴伦巴第铁王冠，自戴王冠并宣称"上帝赐我以王冠，谁要碰它，谁就倒霉"。此次加冕标志着拿破仑帝国的扩张和意大利北部被纳入法兰西帝国体系，建立意大利王国（1805—1814），由拿破仑任国王、其继子欧仁·德·博阿尔内任总督。
  书中原文: |
    最近，《米兰的加冕礼》那幕喜剧，您觉得怎么样？
  网络来源: |
    https://baike.baidu.com/item/意大利王国/64550210

- 名词: 《民约论》
  分类: 概念
  解释: |
    《民约论》即《社会契约论》，全称《社会契约论或政治权利原理》，是法国启蒙思想家让-雅克·卢梭1762年出版的政治哲学著作。该书提出"主权在民"和"公意"思想，认为国家的主权属于人民，政府只是主权者的执行人。被誉为现代民主制度的基石，深刻影响了法国大革命和美国《独立宣言》。
  书中原文: |
    《民约论》。子爵露出温和的微笑，说。
  网络来源: |
    https://zh.wikipedia.org/zh/民约论

- 名词: 雅各宾党人
  分类: 概念
  解释: |
    雅各宾派是法国大革命时期最激进的革命政治团体，因在巴黎圣奥诺雷街的雅各宾修道院集会而得名。主要领导人物包括罗伯斯庇尔、丹东、马拉等。1793年推翻吉伦特派后建立雅各宾专政，实行恐怖统治，通过总动员令保卫革命成果。1794年7月热月政变后倒台，同年11月俱乐部被封。代表了法国大革命中最激进的民主派力量。
  书中原文: |
    子爵虽然和他初次见面，可是已经看出，这个雅各宾党人完全不像他的话那样可怕。
  网络来源: |
    https://zh.wikipedia.org/zh/雅各宾派

- 名词: 阿尔科拉桥
  分类: 地点
  解释: |
    阿尔科拉桥位于意大利北部维罗纳东南约25公里的阿尔科拉村，是1796年11月15日至17日阿尔科拉战役的发生地。在这场战役中，年轻的拿破仑将军亲自举起军旗冲上桥头督战，鼓舞法军击溃奥地利军队，展现了其非凡的勇气和军事天才。此役是拿破仑早期军事生涯的经典战役之一，巩固了法军对意大利北部的控制。
  书中原文: |
    在阿尔科拉桥上的拿破仑是个伟人，在雅法医院里向鼠疫患者伸出手来的拿破仑也是个伟人。
  网络来源: |
    https://baike.baidu.com/item/阿尔柯拉战役/5169784

- 名词: 雅法
  分类: 地点
  解释: |
    雅法（Jaffa）是以色列地中海沿岸的古老海港城市，拥有四千多年历史，今与特拉维夫合并为特拉维夫-雅法，是世界文化遗产。1799年拿破仑远征埃及期间攻占雅法，下令处决了数千名战俘。书中提到的"雅法医院"事件，是指拿破仑在雅法探望鼠疫士兵并伸出手抚慰患者的著名历史场景，被法国画家格罗创作成名画《拿破仑探望雅法鼠疫患者》。
  书中原文: |
    在雅法医院里向鼠疫患者伸出手来的拿破仑也是个伟人。
  网络来源: |
    https://cn.wtcf.org.cn/destination/2014-10/21/c_30218.html

- 名词: 热那亚
  分类: 地点
  解释: |
    热那亚（Genova）是意大利西北部利古里亚大区首府，意大利第一大港，著名航海家哥伦布的故乡。中世纪曾建立强大的热那亚共和国，是地中海四大海上共和国之一，与威尼斯、比萨齐名，殖民地遍布地中海和黑海。1797年被拿破仑占领，1805年成为拿破仑意大利王国的一部分。书中提及拿破仑统治时期热那亚向法国请愿一事。
  书中原文: |
    热那亚和卢加各族人民向波拿巴先生请愿。
  网络来源: |
    https://baike.baidu.com/item/热那亚/84809

- 名词: 卢加
  分类: 地点
  解释: |
    卢加（Lucca）是意大利托斯卡纳大区的一座历史名城，以保存完好的文艺复兴时期城墙和丝绸贸易闻名。古罗马时期即为重要城镇，公元前56年凯撒、庞培和克拉苏在此举行"卢加会议"。中世纪成为意大利第二大独立城邦。1805年被拿破仑占领，交由妹妹埃莉莎·波拿巴管理。是著名歌剧作曲家普契尼的故乡。
  书中原文: |
    热那亚和卢加各族人民向波拿巴先生请愿。
  网络来源: |
    https://zh.wikipedia.org/wiki/卢卡
