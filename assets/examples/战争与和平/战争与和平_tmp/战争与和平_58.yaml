- 名词: 尼古拉
  分类: 人物
  解释: 全名尼古拉·伊里奇·罗斯托夫，罗斯托夫伯爵家的长子，单纯善良、崇尚荣誉的贵族青年军官。在申格拉本战役中初次参战，后被多洛霍夫设局赌博输掉巨款，最终与玛丽亚公爵小姐结婚，成为精明的庄园主。他是小说中最能体现俄国宗法制贵族精神的人物之一。
  书中原文: 儿来得及！我已经答应阿尔哈罗夫了，他们那儿有晚会。尼古拉说。
  网络来源: https://baijiahao.baidu.com/s?id=1732521875652580603

- 名词: 约格尔
  分类: 人物
  解释: 莫斯科的舞蹈教师，举办莫斯科最快乐的舞会。以和蔼可亲、满场飞舞、按艺人规矩行礼为特点，向所有客人收取学费。他的舞会没有男女主人，只有纯粹为了跳舞和寻欢作乐而来的人。娜塔莎是他引以为傲的高材生。
  书中原文: 约格尔的舞会是莫斯科最快乐的舞会。做母亲的看着自己的大孩子们跳着刚学会的舞步，都这么说。
  网络来源: http://newxue.com/baike/12719091416631.html

- 名词: 阿尔哈罗夫
  分类: 人物
  解释: 小说中提及的俄国贵族姓氏，其家族在莫斯科举办舞会和社交聚会。尼古拉曾答应参加阿尔哈罗夫家的晚会，阿纳托利·库拉金也曾邀请娜塔莎去阿尔哈罗夫家参加化装赛会，是莫斯科上流社会的重要社交场所之一。
  书中原文: 儿来得及！我已经答应阿尔哈罗夫了，他们那儿有晚会。尼古拉说。
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9464

- 名词: 老伯爵夫人
  分类: 人物
  解释: 全名纳塔利娅·罗斯托娃，娘家姓申申娜，伊利亚·安德烈耶维奇·罗斯托夫伯爵之妻。四十五岁上下，长着东方型的瘦削脸盘，生育了十二个儿女，动作和言谈迟缓但令人肃然起敬。她代表旧式俄国贵族母亲的慈爱与守旧形象。
  书中原文: 从老伯爵夫人和上流社会的观点看来，是不应拒绝他的。
  网络来源: https://zh.wikipedia.org/zh/战争与和平人物列表

- 名词: 瓦西里·德米特里奇
  分类: 人物
  解释: 即瓦西里·德米特里奇·杰尼索夫，尼古拉·罗斯托夫的战友和挚友，豪爽勇敢的骠骑兵军官。以跳波兰玛祖卡舞的才艺闻名，曾在波兰以舞技出名。在罗斯托夫家中以娜塔莎的"骑士"自居，对她怀有爱慕之情。娜塔莎用"小仙女，爱要我怎么就怎么"说服他跳舞。
  书中原文: 请，瓦西里·德米特里奇，娜塔莎说，咱们跳一圈，请吧。
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9473

- 名词: 瓦夏
  分类: 人物
  解释: 杰尼索夫的昵称，由他的名字瓦西里衍生而来。尼古拉·罗斯托夫在亲密场合用此称呼叫他。在舞会上娜塔莎邀请杰尼索夫跳舞时，尼古拉也用"得了，得了，瓦夏"来帮妹妹说服他。
  书中原文: 得了，得了，瓦夏。尼古拉说。
  网络来源: https://en.m.wikisource.org/wiki/Page:War_and_Peace.djvu/432

- 名词: 索菲
  分类: 人物
  解释: 索菲娅·亚历山德罗夫娜的法语称呼形式，即索尼娅。罗斯托夫家的寄养孤女，与尼古拉青梅竹马并深爱他。她拒绝了多洛霍夫的求婚，因为心中只有尼古拉。性格温顺隐忍，最终牺牲自己成全尼古拉的婚姻，终身未嫁。
  书中原文: 索菲，他说，开始有点怯生生的，后来就越来越胆大了，如果你准备拒绝一个不仅出类拔萃，而且对你有益的配偶。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平人物列表

- 名词: 伊柳什卡
  分类: 人物
  解释: 吉普赛人歌唱队的领唱或乐师。多洛霍夫在英吉利饭店设宴话别时提到"一会儿伊柳什卡带着歌唱队也要来"，表明他是当时莫斯科贵族宴会上常见的吉普赛艺人，为赌博和宴饮场合助兴。
  书中原文: 我这就散完牌，一会儿伊柳什卡带着歌唱队也要来。
  网络来源: https://marxists.incn.su/archive/tolstoy/1856/two-hussars/chapter-8.html

- 名词: 戈尔恰科夫
  分类: 人物
  解释: 俄国著名的贵族家族，在小说中戈尔恰科夫公爵家的两位美貌小姐在约格尔的舞会上物色到未婚夫并结了婚，使该舞会因而更加出名。历史上著名的戈尔恰科夫包括19世纪俄国外交大臣亚历山大·米哈伊洛维奇·戈尔恰科夫公爵。
  书中原文: 戈尔恰科夫家的两位美貌的公爵小姐物色到未婚夫，而且结了婚，这个舞会因而更加出名了。
  网络来源: http://yunshuwu.cn/chap/8549.html

- 名词: 英吉利饭店
  分类: 地点
  解释: 19世纪莫斯科真实存在的著名酒店，位于莫斯科市中心，是上流社会聚会、赌博和举办宴会的热门场所。多洛霍夫在向索尼娅求婚被拒后在此包租最阔绰的房间设宴话别并设赌局，引诱尼古拉·罗斯托夫赌博并使他输掉巨款。
  书中原文: 即来英吉利饭店一晤。罗斯托夫在剧院里同家里人和杰尼索夫看完戏，在约定的日子九点多钟就前往英吉利饭店。
  网络来源: https://www.banceo.com/article/38305.html

- 名词: 舞会
  分类: 事件
  解释: 19世纪俄国贵族社会最重要的社交活动，是联姻、展示财富地位、政治博弈的重要场所。小说中描写了多种舞会：约格尔的快乐舞会、新年盛大舞会、宫廷晚会等。娜塔莎从进入舞会就陷入恋爱状态，"不是爱上某一个特定的人，而是爱所有的人"。
  书中原文: 约格尔的舞会是莫斯科最快乐的舞会。做母亲的看着自己的大孩子们跳着刚学会的舞步，都这么说。
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9474

- 名词: 披巾舞
  分类: 习俗
  解释: 法语音译为pas de châle，一种源自法国的披肩/纱巾舞，19世纪俄国贵族女性学习的一种欧式舞蹈。在约格尔的舞会上，优秀的学生有时会被安排表演披巾舞。娜塔莎舞姿优美，曾是表演披巾舞最好的学生之一。
  书中原文: 有时优秀的学生甚至跳披巾舞，娜塔莎舞姿优美，是她们之中最好的一个。
  网络来源: https://www.meipian.cn/5celdjbx

- 名词: 波兰玛祖卡舞
  分类: 习俗
  解释: 即玛祖卡舞（Mazurka），波兰传统民间舞蹈，起源于马佐夫舍地区。节奏为3/4拍，重音可落在第二或第三拍，舞步包括旋转、跺脚、碰击马刺等。19世纪在俄国贵族舞会上极为流行。杰尼索夫以跳此舞的才艺闻名，与娜塔莎的共舞成为舞会高潮。
  书中原文: 这全然不是那回事，他说，这算什么波兰玛祖卡舞哇？可是她跳得好极了。
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9474

- 名词: 赌博
  分类: 事件
  解释: 19世纪俄国贵族中盛行的恶习，纸牌赌博尤其流行。小说中多洛霍夫是赌博高手，认为"只有傻瓜才靠运气赌博"，强调要有把握地玩。他设局引诱尼古拉·罗斯托夫，在英吉利饭店连续杀牌，使罗斯托夫欠下八百卢布的巨债，反映了贵族社会奢靡腐化的一面。
  书中原文: 只有傻瓜才靠运气赌博。多洛霍夫曾经这样说。
  网络来源: http://tsrus.cn/lishi/2021/05/12/672159

- 名词: 散牌
  分类: 习俗
  解释: 19世纪俄国贵族中流行的纸牌赌博游戏，类似于庄家与闲家对赌的形式。多洛霍夫在英吉利饭店中做庄散牌，桌上摆着金币和纸币，他专注地分牌、杀牌，以冷静而残酷的方式连续赢下罗斯托夫的牌，体现了赌博游戏的紧张氛围。
  书中原文: 多洛霍夫在做庄散牌。在索尼娅拒绝求婚后，尼古拉还没有和他见过面。
  网络来源: https://sfk-mn.ru/en/24flsk322.html

- 名词: 纸币
  分类: 物件
  解释: 18-19世纪俄国流通的纸卢布。1769年叶卡捷琳娜二世首次发行纸币，以铜币为抵押。19世纪初纸币贬值严重，纸卢布与银卢布的比价大幅波动。小说中多洛霍夫赌桌上同时摆着金币和纸币，反映了当时两种货币并行的流通状况。
  书中原文: 桌上摆着金币和纸币，多洛霍夫在做庄散牌。
  网络来源: http://euroasia.cssn.cn/kycg/elsls/201905/t20190510_4878680.shtml

- 名词: 香槟
  分类: 物件
  解释: 法国香槟区出产的起泡葡萄酒，19世纪俄国贵族宴饮中不可或缺的身份象征。俄国是当时法国香槟的世界第二大消费国，沙皇亚历山大一世尤其钟爱凯歌香槟。小说中多洛霍夫在赌博时不断叫侍者送来香槟，营造奢靡放纵的氛围。
  书中原文: 他们继续赌下去，侍者不断送来香槟。
  网络来源: http://tsrus.cn/lishi/2023/01/13/676403

- 名词: 陪嫁
  分类: 概念
  解释: 俄国贵族女性出嫁时带往夫家的财产，包括现金、田庄和农奴。嫁妆的多少直接决定贵族婚姻的经济基础，归丈夫支配管理。索尼娅因为没有陪嫁而被罗斯托夫伯爵夫人反对婚事，尼古拉的母亲认为儿子娶她会"导致罗斯托夫伯爵家的灭亡"。
  书中原文: 对于没有陪嫁的孤女索尼娅来说，多洛霍夫是个合适、而且在某些方面是个出色的配偶。
  网络来源: https://book.douban.com/annotation/141385836/

- 名词: 孤女
  分类: 概念
  解释: 指失去父母的女性孤儿。在19世纪俄国贵族社会中，孤女处于极其不利的地位，因为没有家族财产和嫁妆。索尼娅作为罗斯托夫家收养的孤女，寄人篱下，只能通过自我牺牲来体现尊严。她拒绝多洛霍夫求婚时被尼古拉认为是不明智的选择。
  书中原文: 对于没有陪嫁的孤女索尼娅来说，多洛霍夫是个合适、而且在某些方面是个出色的配偶。
  网络来源: https://m.douban.com/book/review/2995476/

- 名词: 伯爵小姐
  分类: 概念
  解释: 俄国贵族头衔，指伯爵的女儿（未婚女性）。娜塔莎·罗斯托娃作为罗斯托夫伯爵的女儿，被尊称为伯爵小姐。在社交场合中，人们用此头衔称呼她，如杰尼索夫说"娜塔莎伯爵小姐"。婚后她嫁给皮埃尔·别祖霍夫，头衔变为伯爵夫人。
  书中原文: 娜塔莎伯爵小姐。杰尼索夫回答说。
  网络来源: https://bkso.baidu.com/item/娜塔莎·罗斯托娃/15143141

- 名词: 俱乐部
  分类: 地点
  解释: 指莫斯科英国俱乐部，1771年成立的贵族社交组织，19世纪成为莫斯科上流社会最重要的社交场所之一。会员采用无记名投票制，拥有庞大的图书馆和全俄罗斯餐饮水平最高的餐厅。小说中多洛霍夫在俱乐部筵席上看皮埃尔时的冷酷目光被多次提及。
  书中原文: 那目光就像在俱乐部筵席上看皮埃尔时的目光一样。
  网络来源: https://www.rbth.com/travel/2013/07/25/walk_through_british_history_28371
