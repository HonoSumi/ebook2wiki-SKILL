- 名词: 伊波利特·库拉金
  分类: 人物
  解释: 伊波利特·库拉金公爵是托尔斯泰《战争与和平》中库拉金家族的一员，父亲瓦西里·库拉金公爵，妹妹海伦（别祖霍娃伯爵夫人）。他是俄国公使馆的秘书，性格低能呆板，在社交圈中扮演丑角角色，说话装腔作势，常用晦涩混乱的政治论述引人发笑。
  书中原文: |
    伊波利特在安乐椅里往前探着身子说：普鲁士国王！说完就大笑不止。所有的人都转脸看他。普鲁士国王？伊波利特问道，又笑起来，然后平静地、一本正经地靠到椅背上。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/60901908

- 名词: 老博尔孔斯基公爵
  分类: 人物
  解释: 尼古拉·安德烈耶维奇·博尔孔斯基公爵，沙俄陆军上将，社交界诨名普鲁士王。保罗皇帝时期被流放到乡下，退居童山庄园。性格严厉倔强、孤傲正直，认为人类的恶习只有无所事事和迷信，美德只有行动和智慧。是安德烈公爵和玛丽亚公爵小姐的父亲。
  书中原文: |
    一八〇五年以来，老博尔孔斯基公爵、安德烈公爵和玛丽亚公爵小姐的生活有了很大的变化。一八〇六年老公爵被任命担任当时俄国八个后备军总司令中的一个。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/60901908

- 名词: 尼古拉·博尔孔斯基（小尼古卢什卡）
  分类: 人物
  解释: 小尼古拉·安德烈耶维奇·博尔孔斯基，昵称小尼古卢什卡，是安德烈·博尔孔斯基公爵与已故妻子丽莎（小公爵夫人）的儿子。祖父老博尔孔斯基公爵叫他尼古拉小公爵，由保姆萨维什娜和奶母照料，姑姑玛丽亚公爵小姐视其为生活中最大的欢乐之一。
  书中原文: |
    尼古拉小公爵和乳母以及保姆萨维什娜，住在去世的公爵夫人的房间，玛丽亚公爵小姐大部分时间都是在育婴室度过的，尽可能负起小侄儿的母亲的责任。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/60901908

- 名词: 贝尼格森
  分类: 人物
  解释: 莱温·奥古斯特·冯·本尼希森（Levin August von Bennigsen，1745-1826），德裔俄罗斯帝国骑兵上将。在拿破仑战争期间担任俄军主要统帅，1807年指挥俄普联军在普鲁士-艾劳战役中与拿破仑交战，双方均损失惨重未分胜负。
  书中原文: |
    顷由信使传来极大喜讯，但愿不是谎报。贝尼格森在普鲁士-艾劳大败波拿巴。彼得堡万众欢腾，犒赏不断送往前方。贝尼格森虽系日耳曼人，我也祝贺他。
  网络来源: https://baike.baidu.com/item/%E5%9F%83%E5%8A%B3%E6%88%98%E5%BD%B9/9757832

- 名词: 童山庄园
  分类: 地点
  解释: 童山（俄语：Лысые Горы，意为秃山）是博尔孔斯基公爵家族的世袭庄园，位于斯摩棱斯克以东约六十俄里。老博尔孔斯基公爵被流放后一直深居于此，与女儿玛丽亚公爵小姐同住。庄园是小说中博尔孔斯基家族的核心场景，象征着旧式俄国贵族家庭的传统与秩序。
  书中原文: |
    在童山教堂的圣坛旁边，小公爵夫人墓地上方，有一座小礼拜堂，里面有一块从意大利运来的大理石纪念碑，上面雕着一个展翅欲飞的天使。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/60901908

- 名词: 博古恰罗沃庄园
  分类: 地点
  解释: 博古恰罗沃（Богучарово）是安德烈·博尔孔斯基公爵在奥斯特利茨战役受伤、妻子难产去世后分到的庄园，位于离童山四十俄里处。安德烈公爵在此隐居反思，进行农事改革（解放农奴、改徭役为代役租），并与皮埃尔展开关于人生意义的深刻辩论。
  书中原文: |
    安德烈公爵回来不久，老公爵就把离童山四十俄里的一大片庄园分给儿子。一来由于童山牵连着悲痛的回忆，再者因为安德烈公爵有时受不了父亲的脾气，还因为他需要有一个僻静独处的环境，安德烈公爵就利用博古恰罗沃村兴建房屋，大部分时间都在这里度过。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/60901908

- 名词: 普鲁士-艾劳战役
  分类: 事件
  解释: 普鲁士-艾劳战役（Battle of Eylau，又称埃劳战役）发生于1807年2月7日至8日，是拿破仑战争中的一场关键战役。拿破仑率法军在东普鲁士艾劳与贝尼格森指挥的俄普联军激战，双方在暴风雪中损失惨重（各约1.5万-2.5万人），未分胜负，是拿破仑登基以来第一场未能取得决定性胜利的硬仗。
  书中原文: |
    贝尼格森在普鲁士-艾劳大败波拿巴。彼得堡万众欢腾，犒赏不断送往前方。……据说波拿巴溃不成军。
  网络来源: https://baike.baidu.com/item/%E5%9F%83%E5%8A%B3%E6%88%98%E5%BD%B9/9757832

- 名词: 腓特烈大帝
  分类: 人物
  解释: 腓特烈大帝（腓特烈二世，1712-1786），普鲁士国王（1740-1786在位），霍亨索伦王朝最著名的君主。军事天才，创斜线式战术，通过西里西亚战争和七年战争使普鲁士跃升欧洲第五大强国。开明专制代表，推行法律改革、全民教育、宗教宽容，与伏尔泰交往密切，建造无忧宫。
  书中原文: |
    她开始讲不信神的波拿巴在波茨坦盗窃腓特烈大帝的宝剑的事。
  网络来源: https://baike.baidu.com/item/%E8%85%93%E7%89%B9%E7%83%88%E4%BA%8C%E4%B8%96/17302932

- 名词: 波拿巴（拿破仑）
  分类: 人物
  解释: 拿破仑·波拿巴（Napoleon Bonaparte，1769-1821），法兰西第一帝国皇帝。生于科西嘉，法国大革命中崛起，1799年雾月政变成为第一执政，1804年加冕称帝。颁布《拿破仑法典》，数次击败反法同盟，巅峰时控制西欧大部分地区。1812年远征俄国惨败，1814年退位，1815年滑铁卢战败后被流放圣赫勒拿岛。
  书中原文: |
    战火蔓延起来，战场渐渐接近俄国边境。到处可以听见咒骂人类公敌波拿巴的声音；在乡村征集民兵和新兵，从前线传来互相矛盾的消息。
  网络来源: https://baike.baidu.com/item/%E6%8B%BF%E7%A0%B4%E5%B4%99%C2%B7%E6%B3%A2%E6%8B%BF%E5%B7%B4/173319

- 名词: 汉德里科夫
  分类: 人物
  解释: 汉德里科夫是《战争与和平》中一个非常次要的配角，身份是科尔切瓦（特维尔省的一个县城）的地方长官。在小说中被老博尔孔斯基公爵在信中斥责办事不力，因未能及时将补充人员和粮食送到前方而受到严厉批评。
  书中原文: |
    一个叫什么汉德里科夫的科尔切瓦区长官，不知在做什么：至今未将补充人员和粮食送来。你火速驰马前往，告诉他，在一周内一切备齐，不然我要他的脑袋。
  网络来源: https://zh.wikipedia.org/zh-hans/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 萨维什娜
  分类: 人物
  解释: 萨维什娜是博尔孔斯基家族的保姆，负责照顾安德烈公爵去世后留下的幼子尼古拉（小尼古卢什卡）。她是托尔斯泰笔下典型的俄国旧式忠诚仆人形象，与小尼古拉的奶母共同照料孩子，也是玛丽亚公爵小姐的亲密陪伴者。
  书中原文: |
    尼古拉小公爵和乳母以及保姆萨维什娜，住在去世的公爵夫人的房间，玛丽亚公爵小姐大部分时间都是在育婴室度过的，尽可能负起小侄儿的母亲的责任。
  网络来源: https://zh.wikipedia.org/zh-hans/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 卡尔·伊万内奇
  分类: 人物
  解释: 卡尔·伊万内奇是《战争与和平》中博尔孔斯基家族的家庭医生或看护，负责照顾安德烈公爵的儿子小尼古拉。在小尼古拉生病发烧时，玛丽亚公爵小姐引用他的医嘱说睡眠比什么都宝贵，但安德烈公爵因焦虑而暴躁地反驳。该角色也出现在托尔斯泰自传三部曲《童年·少年·青年》中，是主人公的德国家庭教师。
  书中原文: |
    还是那样，看在上帝份上，等一等吧。卡尔·伊万内奇常说，睡眠比什么都宝贵。玛丽亚公爵小姐叹息着低声说。安德烈公爵走到婴儿跟前，摸摸他的额头。他仍在发烧。您和您的卡尔·伊万内奇都见鬼去吧！
  网络来源: https://zh.wikipedia.org/zh-hans/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 彼得鲁沙
  分类: 人物
  解释: 彼得鲁沙是《战争与和平》中博尔孔斯基家族的仆人兼信差。在小说中他被派往城里取回公文和信件，返回童山庄园后将老博尔孔斯基公爵的信件和公文封套交给安德烈公爵。此外，彼得鲁沙也是主人公皮埃尔·别祖霍夫（本名彼得）的小名爱称。
  书中原文: |
    仆人拿着信在小公爵书房里没有找到他，于是来到玛丽亚公爵小姐的房间；但他也不在那儿。仆人听说公爵到育婴室去了。彼得鲁沙带来老爷的公文。女仆小声说。安德烈公爵走出去。
  网络来源: https://zh.wikipedia.org/zh-hans/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 带皇上肖像的鼻烟壶
  分类: 物件
  解释: 鼻烟壶是19世纪初俄国上流社会社交场合常见的物品，带有皇上（沙皇）肖像的鼻烟壶更是特殊的赏赐品。在小说中，贵族们争论这种鼻烟壶究竟是奖赏还是赠品，反映了宫廷赏赐制度和贵族社交文化。肖像鼻烟壶常由细密肖像画家制作，兼具艺术价值和荣誉象征。
  书中原文: |
    去年NN.得到一个带有皇上肖像的鼻烟壶。才智出众的人说为什么SS.不能得到同样的赏赐呢？对不起，带有皇上肖像的鼻烟壶，那是奖赏，不是奖章，外交官说，毋宁说是赠品。有这种例子，施瓦岑贝格得过赏赐。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/60901908

- 名词: 普鲁士国王
  分类: 人物
  解释: 小说中提到的普鲁士国王指腓特烈·威廉三世（Friedrich Wilhelm III，1770-1840），1797年至1840年在位。他在拿破仑战争期间领导普鲁士，经历了1806年耶拿战役惨败、王国沦为法国附庸的屈辱，后通过施泰因-哈登堡改革振兴国力，1813年倒戈加入反法同盟，最终在维也纳会议上恢复大国地位。
  书中原文: |
    普鲁士国王！伊波利特说完就大笑不止。……我们为普鲁士国王打仗是徒劳无益的。安娜·帕夫洛夫娜说，我们是为正义而战，而不是为普鲁士国王。
  网络来源: https://baike.baidu.com/item/%E8%85%93%E7%89%B9%E7%83%88%C2%B7%E5%A8%81%E5%BB%89%E4%B8%89%E4%B8%96

- 名词: 科尔切瓦
  分类: 地点
  解释: 科尔切瓦（俄语：Корчева）是俄罗斯特维尔州伏尔加河畔的一座历史古城，1781年获得城市地位，曾是科尔切瓦县的行政中心。在《战争与和平》中，老博尔孔斯基公爵在信中斥责该区长官汉德里科夫办事不力。1936-1937年因修建伊万科沃水库该城被废弃淹没。
  书中原文: |
    一个叫什么汉德里科夫的科尔切瓦区长官，不知在做什么：至今未将补充人员和粮食送来。你火速驰马前往，告诉他，在一周内一切备齐，不然我要他的脑袋。
  网络来源: https://en.wikipedia.org/wiki/Korcheva

- 名词: 格洛高
  分类: 地点
  解释: 格洛高（Glogau，今波兰格沃古夫/Głogów）是西里西亚地区的重要要塞城市，历史上长期属于普鲁士。在《战争与和平》中，鲍里斯向安娜·帕夫洛夫娜的沙龙客人讲述他在格洛高的旅行以及所见的普鲁士军队情况。该城在拿破仑战争期间是普鲁士的重要驻防地。
  书中原文: |
    很自然地谈到普鲁士的情况，安娜·帕夫洛夫娜请鲍里斯讲讲他在格洛高的旅行以及他所见到的普鲁士军队的情况。鲍里斯从容不迫，操着一口纯正的法语讲了很多很多军队和宫廷有趣的细节。
  网络来源: https://baike.baidu.com/item/%E6%A0%BC%E6%B2%83%E5%8F%A4%E5%A4%AB/4562094
