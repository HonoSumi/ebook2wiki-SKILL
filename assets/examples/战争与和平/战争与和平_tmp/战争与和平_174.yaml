- 名词: 哈莫夫尼克区
  分类: 地点
  解释: 哈莫夫尼克区（俄语：Хамовники）是莫斯科市中心的一个历史区，位于莫斯科河左岸。名称源自16世纪在此定居的织工（"哈姆"意为粗布）。该区在1812年莫斯科大火中少数未被完全烧毁，保留了大量历史建筑。列夫·托尔斯泰曾在此居住并创作《复活》等作品。
  书中原文: 在经过哈莫夫尼克区（莫斯科少数未烧毁的区之一）一所教堂时，这群俘虏忽然全都闪到一旁，发出惊恐和憎恶的喊声。
  网络来源: https://zh.wikipedia.org/wiki/%E5%93%88%E8%8E%AB%E5%A4%AB%E5%B0%BC%E5%9F%BA%E5%8D%80

- 名词: 克里米亚浅滩
  分类: 地点
  解释: 克里米亚浅滩（俄语：Крымский брод）是莫斯科河上一处古老的渡口，位于今克里米亚大桥（花园环线）所在地。因历史上克里米亚汗国驻莫斯科代表处设于附近而得名，是连接莫斯科与南方领土的贸易路线起点。今天该处已建起克里米亚大桥。
  书中原文: 俘虏所在的达乌部队从克里米亚浅滩过河，一部分已经进入卡卢日斯卡雅大街。
  网络来源: https://travelwaiting.com/17252720-crimean-bridge-in-moscow

- 名词: 卡缅内桥
  分类: 地点
  解释: 卡缅内桥（俄语：Большой Каменный мост，大石桥）是横跨莫斯科河的一座钢拱桥，位于莫斯科克里姆林宫西端。它是莫斯科第一座永久性石桥，始建于1682年（最初名"诸圣桥"），后在1938年重建为现代化桥梁。莫斯科旧谚语"比石桥还贵"形容其造价之高。
  书中原文: 后面在河岸上通过卡缅内桥的是内伊的部队和车队。
  网络来源: https://en.wikipedia.org/wiki/Bolshoi_Kamennyi_Bridge

- 名词: 涅斯库奇内
  分类: 地点
  解释: 涅斯库奇内（俄语：Нескучное/Нескучный сад，意为"不无聊的"）是莫斯科河畔的一处历史园林区，原为18世纪贵族庄园，1830年代被尼古拉一世收购改建为皇家寓所。今为高尔基中央文化休闲公园的一部分，内有亚历山德林斯基宫（现俄罗斯科学院主席团所在地）。
  书中原文: 右边，卡卢日斯卡雅大路经过涅斯库奇内转弯的地方，无穷无尽的部队和车队一直伸展到远方。
  网络来源: https://en.wikipedia.org/wiki/Neskuchny_Garden

- 名词: 索科洛夫
  分类: 人物
  解释: 索科洛夫是《战争与和平》中一个短暂的配角，为一名患赤痢的俄军士兵。在1812年法军从莫斯科撤退、押送战俘离城时，他因病重无法行动被遗弃在棚子里。皮埃尔曾试图为他求情，但未成功。这个角色体现了战争对底层士兵的残酷和普通人在历史洪流中的无力。
  书中原文: 那个生病的士兵索科洛夫，面色苍白、瘦削、眼圈乌青，只有他没有穿衣服和靴子，在原来的地方坐着，两只瘦得鼓出的眼睛疑问地望着不注意他的同伴们，他发出均匀的低声呻吟。
  网络来源: http://newxue.com/baike/12719092706843.html

- 名词: 奥尔登卡大路
  分类: 地点
  解释: 奥尔登卡大路（俄语：Большая Ордынка）是莫斯科河南岸（замоскворечье）地区的一条古老街道，全长约1.73公里，北起莫斯科河大桥，南至花园环路。其名称源于俄语"Орда"（金帐汗国），历史上曾是莫斯科通往金帐汗国的必经之路，为商人和手工业者聚居区。
  书中原文: 内伊的先头部队已经走出了奥尔登卡大路的时候，而博加尔涅的车队还没有走出莫斯科进入卡卢日斯卡雅大路。
  网络来源: https://mypacer.com/zh-hans/routes/110777/%e8%8e%ab%e6%96%af%e7%a7%91-%e5%81%a5%e8%b5%b0-%e5%b0%8f%e8%b7%af-%e4%bf%84%e7%bd%97%e6%96%af
