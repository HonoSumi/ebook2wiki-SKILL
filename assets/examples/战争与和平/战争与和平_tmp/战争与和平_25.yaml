- 名词: "涅斯维茨基"
  分类: "人物"
  解释: "列夫·托尔斯泰长篇小说《战争与和平》中的次要人物，涅斯维茨基公爵，俄国军官（校官），同时也是莫斯科英国俱乐部的老成员。在1805年对法战争中参与军事活动，是俄国贵族阶层的代表。"
  书中原文: "涅斯维茨基像所有桥上的人一样，当两个妇女坐车走过时，也目不转睛地望着她们。"
  网络来源: "https://book.qq.com/book-read/32055495/6"

- 名词: "瓦西卡·杰尼索夫"
  分类: "人物"
  解释: "全名瓦西里·费奥多罗维奇·杰尼索夫，托尔斯泰《战争与和平》中保罗格勒骠骑兵团的骑兵大尉（后晋升为将军）。性格豪爽直率、暴躁易怒但重情重义，是尼古拉·罗斯托夫的密友与连长。在1812年卫国战争中指挥游击队。小说中其外貌特征为身材矮小、红润面庞、乌黑发亮的眼睛和蓬散的黑胡须。"
  书中原文: "离他十五步远，隔着一堆活的物体——移动着的步兵，他看见了面孔通红、头发又黑又乱、军帽歪到脑后、骠悍地斜披着披肩的瓦西卡·杰尼索夫。"
  网络来源: "https://book.qq.com/book-read/52511345/35"

- 名词: "罗斯托夫"
  分类: "人物"
  解释: "全名尼古拉·伊里奇·罗斯托夫，托尔斯泰《战争与和平》中罗斯托夫家族的核心人物之一。起初以士官生身份在保罗格勒骠骑兵团服役，后成长为军官。性格忠诚于沙皇和传统，天然信守贵族秩序。感情线先与表妹索尼娅相恋，后因家庭债务问题最终与玛丽亚公爵小姐结婚。原型为托尔斯泰的父亲尼古拉·伊里奇·托尔斯泰。"
  书中原文: "罗斯托夫站在左翼，骑着他那匹腿有点毛病的骏马「白嘴鸦」，露出幸福的神情，就像一个被叫到大庭广众面前应试的小学生，相信自己准有把握取得优等成绩似的。"
  网络来源: "https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8"

- 名词: "捷利亚宁"
  分类: "人物"
  解释: "托尔斯泰《战争与和平》中的配角，身份为骑兵连司务长。是一个令人反感的人物，性格贪财虚伪怯懦。最突出的情节是偷窃了连长杰尼索夫的钱包并被罗斯托夫揭发。是军队中道德败坏的缩影，与小说中勇敢正直的主要人物形成鲜明对比。"
  书中原文: "虽然为捷利亚宁的事发生冲突以后，这是他们第一次见面。"
  网络来源: "http://bcc.blcu.edu.cn/show/700018878_10_14_-1_-1/4"

- 名词: "巴格拉季翁"
  分类: "人物"
  解释: "彼得·伊万诺维奇·巴格拉季昂（1765-1812），拿破仑战争时期俄罗斯帝国最著名的少壮派将领，陆军上将、亲王。出身于格鲁吉亚巴格拉季昂王族。1805年申格拉本战役率6000人阻击3万法军，1812年博罗季诺战役中指挥俄军左翼，遭炮击负致命伤后因坏疽去世。二战期间苏联将1944年白俄罗斯攻势命名为巴格拉季昂行动以纪念他。"
  书中原文: "他设法在巴格拉季翁手下谋得一个传令官的差事。"
  网络来源: "https://baike.baidu.com/item/%E5%BD%BC%E5%BE%97%C2%B7%E4%BC%8A%E4%B8%87%E8%AF%BA%E7%BB%B4%E5%A5%87%C2%B7%E5%B7%B4%E6%A0%BC%E6%8B%89%E5%AD%A3%E6%98%82"

- 名词: "热尔科夫"
  分类: "人物"
  解释: "托尔斯泰《战争与和平》中的次要但极具特色的人物，俄国军官/副官，常以侍从丑角形象出现。性格胆小怕死、玩世不恭、缺乏责任感。在申格拉本战役中，巴格拉季翁派他去左翼传达撤退命令，他却因恐惧没有前往前线，导致左翼部队指挥混乱。安德烈公爵曾因其轻浮态度而勃然大怒。是反面军人形象的典型代表。"
  书中原文: "保罗格勒团的人所熟悉的、肩头高高耸起的热尔科夫的身影向团长驰来。"
  网络来源: "https://www.williamlong.info/xiaoshuo/archives/457.html"

- 名词: "卡尔·波格丹内奇·舒伯特"
  分类: "人物"
  解释: "托尔斯泰《战争与和平》中的虚构人物，姓氏表明其具有德国血统。军衔为上校（团长），担任保罗格勒骠骑兵团团长。在捷利亚宁偷窃事件中，舒伯特上校为了保护整个骑兵团的声誉和团结，公开指责年轻的尼古拉·罗斯托夫说谎，体现了军队内部荣誉观念与现实处境的复杂关系。"
  书中原文: "团长卡尔·波格丹内奇·舒伯特骑着马向杰尼索夫的骑兵连走去。"
  网络来源: "https://book.douban.com/annotation/55891076/"

- 名词: "基尔斯坚"
  分类: "人物"
  解释: "托尔斯泰《战争与和平》中保罗格勒骠骑兵团的骑兵上尉（骑兵大尉参谋）。特征为身材高大、头发灰白、留着浓密胡髭、面容布满皱纹、声音低沉。曾两次因决斗被降级为士兵但两次都恢复了原职。在捷利亚宁事件中扮演调解者和长辈的角色，劝说罗斯托夫以维护兵团荣誉为重。"
  书中原文: "他纵马到基尔斯坚跟前。这个上尉骑着一匹老实的宽背母马向前跨出一大步迎着杰尼索夫。长胡子上尉跟平时一样严肃，只是眼睛比平时更亮。"
  网络来源: "https://book.qq.com/book-read/52511345/36"

- 名词: "米罗诺夫"
  分类: "人物"
  解释: "托尔斯泰《战争与和平》中保罗格勒骠骑兵团的士官生。在恩斯河桥场景中，因每次听见炮弹飞过都弯下身子而被连长杰尼索夫训斥。属于小说中的边缘配角。"
  书中原文: "士官生米罗诺夫每次听见炮弹飞过都弯下身子。"
  网络来源: "https://www.yunshuwu.cn/chap/8503.html"

- 名词: "恩斯河"
  分类: "地点"
  解释: "奥地利境内多瑙河的一条支流。在托尔斯泰《战争与和平》中，托尔斯泰详细描写了俄军在库图佐夫率领下向维也纳撤退时，于1805年10月23日横渡恩斯河的场面。小说中描写了俄军后卫部队烧毁恩斯河桥以避免法军追击的情节，是小说战争线的重要场景之一。"
  书中原文: "涅斯维茨基正往桥下看恩斯河的流水，忽然听见一种他觉得异样的声音。"
  网络来源: "https://www.yunshuwu.cn/chap/8503.html"

- 名词: "多瑙河"
  分类: "地点"
  解释: "欧洲第二长河，仅次于伏尔加河。发源于德国西南部黑林山，注入黑海，全长约2850公里，是世界上干流流经国家最多的河流（共10个国家）。流经德国、奥地利、斯洛伐克、匈牙利、克罗地亚、塞尔维亚、保加利亚、罗马尼亚、摩尔多瓦、乌克兰。在《战争与和平》中是俄军对法战争的重要地理背景。"
  书中原文: "灿烂的阳光照耀着多瑙河和周围黑色的群山。"
  网络来源: "https://baike.baidu.com/item/%E5%A4%9A%E7%91%99%E6%B2%B3"

- 名词: "保罗格勒团"
  分类: "事件"
  解释: "保罗格勒骠骑兵团，1784年组建的俄国骠骑兵团。在托尔斯泰《战争与和平》中是尼古拉·罗斯托夫和瓦西卡·杰尼索夫所属部队，是小说战争线的重要背景。该团在1805年申格拉本战役中表现英勇，获每个中队两面军旗的特殊荣誉。"
  书中原文: "保罗格勒团的两个骑兵连过桥以后，一前一后向山上撤退。"
  网络来源: "https://book.qq.com/book-read/52511345/35"

- 名词: "士官生"
  分类: "概念"
  解释: "俄国帝国时期的军事教育制度产物，指在武备学校或容克学院接受军事教育的学生，毕业后可成为军官。1730年俄国建立了第一所少年军校。士官生制度历经沙俄帝国创立、米柳京改革、苏联废除与重建、俄罗斯联邦复兴的曲折历程。"
  书中原文: "谁在那儿哈腰鞠躬？士官生米罗诺夫！那样不好！您看我！"
  网络来源: "https://baike.baidu.com/item/%E5%86%9B%E4%BA%8B%E4%B8%AD%E5%AD%A6/23084561"

- 名词: "骑兵连"
  分类: "概念"
  解释: "骑兵部队的基本战术单位，由若干骑兵排构成。拿破仑战争时期，俄国骠骑兵团下辖若干骑兵连（中队），每连约120-150人。在《战争与和平》中，杰尼索夫担任保罗格勒骠骑兵团一个骑兵连的连长，率领其连队在恩斯河桥头执行阻击和后撤任务。"
  书中原文: "骑兵连过不去。瓦西卡·杰尼索夫凶狠地露出雪白的牙齿，用马刺刺着他那匹乌黑的贝杜英骏马，大声喊叫着。"
  网络来源: "https://www.whb.cn/zhuzhan/whh/20200403/338108.html"

- 名词: "贝杜英"
  分类: "物件"
  解释: "托尔斯泰《战争与和平》中瓦西卡·杰尼索夫的战马名字。俄语原文为Бедуин，意为贝都因人（沙漠游牧民族）。小说中描写贝杜英为乌黑色的骏马，在恩斯河桥上撞到刺刀时耳朵直哆嗦、嘶叫着、从马衔铁喷射白沫。后来杰尼索夫将这匹马卖给了尼古拉·罗斯托夫。"
  书中原文: "瓦西卡·杰尼索夫凶狠地露出雪白的牙齿，用马刺刺着他那匹乌黑的贝杜英骏马，大声喊叫着。那匹马撞到刺刀上，耳朵直哆嗦，嘶叫着，从马衔铁喷射着白沫，摇响铃铛，跺响桥板。"
  网络来源: "https://www.yunshuwu.cn/chap/8525.html"

- 名词: "白嘴鸦"
  分类: "物件"
  解释: "托尔斯泰《战争与和平》中尼古拉·罗斯托夫的坐骑名字。俄语原文为Грачик，意为白嘴鸦/秃鼻乌鸦（一种乌鸦科的鸟类）。原是捷利亚宁中尉卖给罗斯托夫的一匹刚能骑的幼马，花了700卢布。在战斗中白嘴鸦被击中，前腿流血倒在地上，压住了罗斯托夫的一条腿。"
  书中原文: "罗斯托夫站在左翼，骑着他那匹腿有点毛病的骏马白嘴鸦。"
  网络来源: "http://datongshuhua.cn/page101?article_id=413&pagenum=38"

- 名词: "霰弹"
  分类: "概念"
  解释: "拿破仑战争时期野战火炮使用的近距离杀伤弹药。弹体外观呈圆筒状，外壳为薄铁皮，内部装填若干枚铁质或铅质小弹丸，不含火药。发射时铁皮桶在出炮口瞬间裂开，小弹丸飞出形成圆锥状弹幕，对密集目标造成大面积杀伤。有效射程约300-400米，是陆军野战炮兵的近距离终极杀手锏。"
  书中原文: "快点动手吧，不然敌人就要推进大炮发射霰弹了。"
  网络来源: "https://zh.wikipedia.org/zh-my/%E8%91%A1%E8%90%84%E5%BC%B9"

- 名词: "波德诺文斯克庙会"
  分类: "习俗"
  解释: "19世纪莫斯科诺文斯基林荫道附近举办的大型民间集市和游乐活动，尤其在复活节等节庆期间非常热闹。在《战争与和平》中，步兵看着衣着光鲜的骠骑兵从身边走过，讽刺地说他们只适合去赶庙会当摆设，而不是真正上战场打仗。"
  书中原文: "小伙子穿得倒漂亮！就等着逛波德诺文斯克庙会！"
  网络来源: "http://bcc.blcu.edu.cn/show/57161729_2_4_-1_-1/1"

- 名词: "德国灌肠"
  分类: "习俗"
  解释: "拿破仑战争时期俄国士兵给德国人起的绰号/外号，带有轻蔑和嘲弄的语气。在《战争与和平》中，俄国士兵看到一户德国家庭驾着马车逃难时，用这个绰号称呼他们。反映了当时俄国普通士兵对外国人的态度以及民族刻板印象。不同译本也作德国香肠。"
  书中原文: "瞧，德国灌肠也逃难了！"
  网络来源: "https://book.douban.com/subject/33439314/blockquotes"

- 名词: "巴格拉季昂"
  分类: "人物"
  解释: "即巴格拉季翁，彼得·伊万诺维奇·巴格拉季昂（1765-1812），俄国陆军上将，出身格鲁吉亚王族。在《战争与和平》中为巴格拉季翁公爵，热尔科夫在其手下担任传令官。此处为小说中巴格拉季昂公爵手下传令官前去传令的情节。"
  书中原文: "他设法在巴格拉季翁手下谋得一个传令官的差事。"
  网络来源: "https://baike.baidu.com/item/%E5%BD%BC%E5%BE%97%C2%B7%E4%BC%8A%E4%B8%87%E8%AF%BA%E7%BB%B4%E5%A5%87%C2%B7%E5%B7%B4%E6%A0%BC%E6%8B%89%E5%AD%A3%E6%98%82"
