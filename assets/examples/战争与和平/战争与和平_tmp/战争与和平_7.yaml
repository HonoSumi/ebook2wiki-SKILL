- 名词: 谢苗诺夫团
  分类: 物件
  解释: |
    谢苗诺夫团（Семёновский полк），全称谢苗诺夫斯科耶近卫团，是俄罗斯帝国最著名的近卫步兵团之一，与普列奥布拉任斯基团齐名。由彼得大帝在17世纪末于莫斯科郊外的谢苗诺夫斯科耶村以"少年兵团"形式创立，后发展成为帝国精锐近卫军。该团在罗曼诺夫王朝多次政变中扮演关键角色（如1725年支持叶卡捷琳娜一世登基、1741年支持伊丽莎白政变、1762年支持叶卡捷琳娜二世政变），被称为"罗曼诺夫王朝的裁决者"。拿破仑战争期间参加了博罗季诺会战等重大战役。1820年因团长施瓦茨推行残酷体罚引发全团兵变，被亚历山大一世下令解散重组。著名人物苏沃洛夫、亚历山大一世、图哈切夫斯基等曾与该团有关联。
  书中原文: |
    他被破格委任在近卫军谢苗诺夫团当一名准尉。
  网络来源: |
    https://baike.baidu.com/item/谢苗诺夫团起义/56375099
- 名词: 命名日
  分类: 习俗
  解释: |
    命名日（Именины）是东正教（及天主教）国家的一种文化传统，源自基督教圣徒纪念日。每个人根据自己所取的名字对应一位基督教圣徒，该圣徒的纪念日即为该人的"命名日"。在俄罗斯，命名日有时比生日更受重视，亲朋好友会送贺卡、礼物或举办庆祝餐会。东正教教会月历中每一天都纪念一位或多位圣徒，因此不同的名字对应不同的日期。这一传统在19世纪俄国贵族社会中十分普遍，是社交生活中的重要日子。
  书中原文: |
    罗斯托夫家里有两个娜塔莉娅——母亲和小女儿——过命名日。
  网络来源: |
    https://zh.wikipedia.org/wiki/命名日
- 名词: 波瓦尔大街
  分类: 地点
  解释: |
    波瓦尔大街（Поварская улица，Povarskaya Street）是俄罗斯莫斯科市中心的一条古老街道，东起阿尔巴特广场，西至花园环路库德林广场，长约1公里。街名源自俄语"повар"（厨师），17世纪时这里曾是莫斯科宫廷厨师的聚居区。18世纪彼得大帝迁都圣彼得堡后，贵族再次占据此地，使其成为上流街区。街上有大量19世纪末至20世纪初的莫斯科新艺术运动风格豪宅，现多国大使馆设于此，被称为莫斯科的"使馆街"。其中52号建筑（多尔戈鲁科夫庄园）是托尔斯泰《战争与和平》中罗斯托夫庄园的原型。1924年至1991年间曾更名为伏罗夫斯克街。
  书中原文: |
    从早晨起，波瓦尔大街上那座莫斯科全城闻名的罗斯托娃伯爵夫人的大宅子门前，载着贺客的马车就来来往往，络绎不绝。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/波瓦尔街
- 名词: 莫伊卡河
  分类: 地点
  解释: |
    莫伊卡河（Мойка，Moika River）是俄罗斯圣彼得堡市中心一条环绕城区的人工河道，全长约5公里，最大宽度40米，最大深度3.2米。发源于夏园附近的丰坦卡河，流经战神广场、涅瓦大街，最终注入涅瓦河。河名源自英格里亚语"Muya"，意为"泥泞"。18世纪彼得大帝下令加固河岸，1798至1811年间用红色花岗岩贴面建造河堤。沿河汇聚了大量著名建筑，包括斯特罗加诺夫宫、尤苏波夫宫、圣以撒大教堂、普希金故居博物馆（12号）等。河上现有15座富于艺术性的桥梁，以不同颜色涂装著称，其中最宽的是宽达97米的蓝桥。
  书中原文: |
    他们逮住警察分局局长，把他跟狗熊背对背捆到一起，扔到莫伊卡河里。
  网络来源: |
    https://baike.baidu.com/item/莫伊卡河/10568624
