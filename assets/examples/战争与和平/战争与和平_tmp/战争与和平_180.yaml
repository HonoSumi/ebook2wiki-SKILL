- 名词: 利哈乔夫
  分类: 人物
  解释: |
    利哈乔夫（Likhachyov）是托尔斯泰《战争与和平》中的配角，一名哥萨克士兵，隶属于杰尼索夫领导的游击队。在小说中，他在战前夜为彼佳·罗斯托夫磨佩刀，被彼佳视为"世上最善良、最勇敢、最奇特、最美好、还不为人认识的人"，体现了托尔斯泰笔下普通士兵的人性光辉和哥萨克在1812年卫国战争中的形象。
  书中原文: |
    大车下面坐着哥萨克利哈乔夫，正给他磨佩刀，右边一大片黑糊糊的东西是看林小屋，左手下边一小片通红的亮光，是即将燃尽的篝火
  网络来源: |
    https://book.douban.com/subject/5945451/blockquotes?sort=score&start=140
- 名词: 赋格曲
  分类: 概念
  解释: |
    赋格曲（Fugue，源自拉丁语"Fuga"，意为遁走/追逐）是复调音乐的重要体裁，核心特征为各声部在不同音高上相继进入、相互模仿追逐。在巴洛克时期由J.S.巴赫推向巅峰（如《平均律钢琴曲集》）。典型结构包括呈示部（主题与答题）、发展部（间插段与密接和应）和再现部。在《战争与和平》中，彼佳在战前夜的半梦半醒中"听见一个很和谐的乐队在演奏一种不知名的、既庄严又悦耳的赞美歌"，托尔斯泰用赋格曲的复调结构比喻彼佳纷繁交错的意识流。
  书中原文: |
    演奏的是赋格曲，虽然彼佳一点也不懂得什么叫赋格曲。每种乐器，有时像提琴，有时像小号——但是比提琴和小号更好听，更纯净，——每种乐器都是各奏各的，在还没有奏完一个旋律的时候，就和同时演奏的另一种乐器，然后同第三、第四种乐器汇合起来，所有的乐器都合成一个，然后又分开，又合起来
  网络来源: |
    https://baike.baidu.com/item/%E8%B5%8B%E6%A0%BC%E6%9B%B2/1226372
- 名词: 第六团枪骑兵
  分类: 物件
  解释: |
    第六枪骑兵团（6e Régiment de Chevau-Légers Lanciers）是拿破仑时代的法国轻枪骑兵团，1811年由原第29龙骑兵团改编而成。编制4个骑兵中队，制服为深绿色军服配红色衣领/袖口（团徽色），装备长约2.75米的长枪、马刀和手枪。该团参与了1812年俄罗斯战役、1813年德意志战役等。在《战争与和平》中，多洛霍夫和彼佳乔装侦察时假称自己是第六团枪骑兵。
  书中原文: |
    "第六团枪骑兵。" 多洛霍夫说，既不放慢也不加快马的步子。桥上站着哨兵的黑影。
  网络来源: |
    https://www.wikiwand.com/en/articles/6e_r%C3%A9giment_de_chevau-l%C3%A9gers_lanciers
- 名词: 卡拉巴赫马
  分类: 物件
  解释: |
    卡拉巴赫马（Karabakh Horse）是南高加索地区的古老马品种，原产于阿塞拜疆卡拉巴赫山区。融合了阿拉伯马、阿哈尔捷金马（汗血宝马）等血统，以闪亮的金色毛色闻名，速度惊人（1公里约1分09秒），耐力卓越。在《战争与和平》中，彼佳将他的乌克兰种马亲昵地称为"卡拉巴赫马"，反映了当时俄国贵族对高加索名马的推崇与少年对战斗英雄气概的向往。
  书中原文: |
    黑暗中彼佳认出他的马，虽然它是乌克兰种，但是他却叫它卡拉巴赫马，于是他向那匹马走去。"喂，卡拉巴赫，明天咱们就要上阵了。"他说，闻闻它的鼻孔，吻吻它。
  网络来源: |
    https://baike.baidu.com/item/%E5%8D%A1%E6%8B%89%E5%B7%B4%E8%B5%AB%E9%A9%AC/19712848
- 名词: 韦辛尼
  分类: 人物
  解释: |
    韦辛尼是《战争与和平》中的小配角，一名被俄军俘虏的法国少年鼓手。其本名是樊尚·博斯（Vincent Bosse），俄国哥萨克士兵用俄语俗称叫他"韦辛尼"（俄语对Vincent的变音/昵称，意含"春天般的"）。在杰尼索夫游击队营地中，他被好心收留，受惊后安睡在过厅里。彼佳在战前夜关切地询问这个孩子，体现了战争中对立个体之间尚存的人性温暖。
  书中原文: |
    "那个孩子怎么样？""韦辛尼吗？他在过厅里躺着呢。受惊以后困乏了。他现在可高兴呢。"
  网络来源: |
    https://baijiahao.baidu.com/s?id=1739287912989920785
- 名词: 高筒军帽
  分类: 物件
  解释: |
    高筒军帽（Shako，沙科帽）是18世纪末至19世纪欧洲军队广泛使用的高筒圆柱形军用帽，帽顶通常收窄，前方饰有金属徽章（鹰徽、团号等）。其名称源自匈牙利语"csákó"，最早为匈牙利骠骑兵制服的一部分。拿破仑时代法军Shako由厚重毛毡和皮革制成，高约18-19厘米，帽檐可遮阳，兼具防护与辨识功能。在《战争与和平》中，多洛霍夫和彼佳为乔装侦察而穿上法国军大衣和高筒军帽。
  书中原文: |
    彼佳和多洛霍夫穿上法国军大衣和高筒军帽，就朝杰尼索夫从那儿观察敌人营盘的林间小道驰去
  网络来源: |
    https://en.wikipedia.org/wiki/Shako
- 名词: 法国军大衣
  分类: 物件
  解释: |
    法国军大衣（Greatcoat，法文：capote/redingote）是拿破仑时代法军的标配外衣。拿破仑本人常年穿着标志性的灰色"redingote"长大衣。普通士兵的大衣官方规定为米色，实际色调多样，不穿时卷起系在背包上。军官大衣通常为蓝色。在《战争与和平》中，多洛霍夫和彼佳正是利用两套法国军大衣（连同高筒军帽）乔装成法军军官，混入敌营成功完成侦察任务。
  书中原文: |
    叫我的哥萨克把驮囊拿来！我有两套军服。彼佳和多洛霍夫穿上法国军大衣和高筒军帽，就朝杰尼索夫从那儿观察敌人营盘的林间小道驰去，在一片漆黑中走出树林，来到洼地。
  网络来源: |
    https://www.napoleon.org/en/history-of-the-two-empires/objects/napoleons-grey-greatcoat-redingote/
- 名词: 法国烟斗
  分类: 物件
  解释: |
    法国烟斗在拿破仑时代主要以海泡石、陶瓷和陶土为材质，上流社会使用精雕细刻的海泡石烟斗，普通士兵使用陶土或黄杨木烟斗。石楠木（briar）烟斗的传说与拿破仑的出生地科西嘉有关，但实际普及是在拿破仑去世后的1820年代。法国的圣克洛德地区自那时起成为世界烟斗制造中心之一。在《战争与和平》中，多洛霍夫掏出法国烟斗抽烟，以掩盖身份、争取时间观察敌营虚实。
  书中原文: |
    他从衣袋里掏出法国烟斗，抽起烟来，问那些军官前面的路上会不会有受哥萨克袭击的危险
  网络来源: |
    https://baijiahao.baidu.com/s?id=1632582662462019102
- 名词: 看林小屋
  分类: 物件
  解释: |
    看林小屋（俄语：сторожка / домик лесника）是森林看守人居住的小木屋。在《战争与和平》中，杰尼索夫游击队以此作为临时指挥部和营地。这是小说中最动人的场景之一——彼佳在战前夜的半梦半醒中，将看林小屋幻想为"直通地心的洞穴"，篝火变成"庞然怪物的眼睛"，展现出托尔斯泰对少年心理的深刻描写，被认为是文学史上早期的意识流手法。
  书中原文: |
    彼佳回到看林小屋，在过厅里碰见杰尼索夫。……右边一大片黑糊糊的东西是看林小屋，但也许是一个通到地心深处的洞穴……他是在神仙的世界里，那里一切都是可能的。
  网络来源: |
    https://book.douban.com/subject/10572926/blockquotes?sort=score&start=1840
- 名词: 通条
  分类: 物件
  解释: |
    通条（Ramrod）是前装枪械时代用于从枪口装填火药和弹丸的长条铁棍，也用于清洁枪管、清除火药残渣。在前膛枪（火绳枪、燧发枪）时代，通条是士兵必备的装填工具。在现代后膛枪中，通条转为清洁保养工具。法语中通条称为"baguette"。在《战争与和平》中，一名法国士兵跪在篝火旁用通条搅和煮食物的锅，是战场生活的生动细节。
  书中原文: |
    一个头戴尖顶帽、身穿青灰色大衣、被火照得亮堂堂的士兵跪在那儿，用通条搅和着锅里的东西
  网络来源: |
    https://baike.baidu.com/item/%E9%80%9A%E6%9D%A1/6338351
- 名词: 磨刀石
  分类: 物件
  解释: |
    磨刀石（Whetstone/Sharpening Stone）是用于磨砺刀具刃口的石制工具，在中国已有两千多年历史。《山海经》中称细者为"砥"、粗者为"砺"。传统磨刀石分粗面（定型）和细面（抛光），使用时加水润滑。在《战争与和平》中，哥萨克利哈乔夫在大车下为彼佳磨佩刀，"霍霍"的磨刀声与水滴声、马嘶声交织，成为彼佳战前夜半梦半醒中幻听音乐的一部分。
  书中原文: |
    利哈乔夫站起来，在驮囊里摸索了一阵，不大工夫，彼佳就听见钢在磨刀石上发出霍霍的声音。"霍哧，霍，霍哧，霍……"被磨的佩刀在呼啸。
  网络来源: |
    https://baike.baidu.com/item/%E8%8B%8D%E5%B1%B1%E7%A3%A8%E5%88%80%E7%9F%B3/7540671
- 名词: 法国营盘
  分类: 地点
  解释: |
    法国营盘指拿破仑大军在1812年俄法战争期间的野战营地/军营。在《战争与和平》中，多洛霍夫和彼佳乔装成法军军官潜入法国营盘进行侦察。小说中对此有细腻描写：篝火旁的士兵谈话声、煮锅里的食物、军官们的警惕与怀疑——托尔斯泰通过这个侦察视角展现了敌营的日常图景。俄军游击队利用侦察获取的情报（兵力、俘虏位置等）决定次日的进攻方案。
  书中原文: |
    彼佳和多洛霍夫穿上法国军大衣和高筒军帽，就朝杰尼索夫从那儿观察敌人营盘的林间小道驰去……多洛霍夫沿着大路往前走，从路两旁篝火那儿传来法国人的谈话声
  网络来源: |
    https://book1.haoshuku.com/book/94aa0d/0e77f1/
