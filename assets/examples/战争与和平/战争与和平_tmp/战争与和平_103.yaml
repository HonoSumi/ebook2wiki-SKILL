- 名词: 马卡林
  分类: 人物
  解释: 马卡林（昵称马卡尔卡）是《战争与和平》中的次要角色，一名退役骠骑兵，性格温和软弱，对阿纳托利·库拉金怀有无限热爱，是其后来的忠实追随者。在阿纳托利计划诱拐娜塔莎时，他被多洛霍夫选为假结婚的证婚人之一。
  书中原文: "在两匹灰色的走马拉着的雪橇里，坐着阿纳托利和他那位形影不离的朋友马卡林。"
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9554

- 名词: 特韦尔林荫道
  分类: 地点
  解释: 特韦尔林荫道（特维尔大道）是莫斯科市中心最古老的林荫大道，属于莫斯科林荫环路的一部分，北起尼基茨基大道，南至普希金广场。建成于1796年，是19世纪莫斯科贵族上流社会散步聚会的著名场所。在《战争与和平》中，皮埃尔正是在此被阿纳托利·库拉金呼唤。
  书中原文: "在特韦尔林荫道上有人呼唤他。"
  网络来源: https://zh.wikipedia.org/zh-hans/%E7%89%B9%E7%BB%B4%E5%B0%94%E5%A4%A7%E9%81%93

- 名词: 科莫涅诺家
  分类: 地点
  解释: 科莫涅诺家是19世纪莫斯科的一个社交场所或私人宅邸，具体指一位名叫科莫涅诺（Кomoneno）的人的宅第。在《战争与和平》中，皮埃尔为寻找阿纳托利·库拉金而驱车前往此处，是当时莫斯科贵族纨绔子弟常去的消遣地点之一。
  书中原文: "滑雪场、茨冈女人的家、科莫涅诺家——都没有他。"
  网络来源: https://www.guxuo.com/wgwx/ZPJ/test/zzyh/161.htm

- 名词: 滑雪场
  分类: 地点
  解释: 滑雪场是19世纪莫斯科冬季在莫斯科河沿岸或城市广场搭建的临时木制滑雪坡道（俄语на горах），供贵族和平民冬季乘雪橇滑行娱乐。这些坡道高达数丈，装饰有彩灯旗帜，是莫斯科冬季社交生活的重要场所，常与茨冈人表演、酒馆并列，为纨绔子弟常去的消遣之地。
  书中原文: "滑雪场、茨冈女人的家、科莫涅诺家——都没有他。"
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9558

- 名词: 阿赫罗西莫娃家
  分类: 地点
  解释: 阿赫罗西莫娃家是莫斯科贵族玛丽亚·德米特里耶夫娜·阿赫罗西莫娃的宅邸，位于莫斯科旧马厩街。她是娜塔莎·罗斯托娃的教母，在罗斯托夫家迁居莫斯科期间热情接待他们暂住，并在娜塔莎险些与阿纳托利·库拉金私奔的关键事件中扮演了重要角色——她及时发现并阻止了私奔，随后召见皮埃尔商议对策。
  书中原文: "在阿赫罗西莫娃的前厅，仆人一面给皮埃尔脱皮大衣，一面说玛丽亚·德米特里耶夫娜请他到她的卧室里去。"
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9544
