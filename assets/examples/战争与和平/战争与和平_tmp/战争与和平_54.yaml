- 名词: 伊利亚·安德烈伊奇伯爵
  分类: 人物
  解释: 《战争与和平》中罗斯托夫家族的一家之主，心地善良、慷慨好客但不善理财的贵族。原型为托尔斯泰的祖父伊利亚·托尔斯泰。他是尼古拉·罗斯托夫和娜塔莎·罗斯托娃的父亲，曾担任县首席贵族，因挥霍无度家道中落。
  书中原文: 伊利亚·安德烈伊奇伯爵又从人群中挤出客厅，过了一会儿，他和另一个委员进来，托着一个大银盘递给巴格拉季翁公爵。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 海伦·别祖霍娃
  分类: 人物
  解释: 全名海伦·瓦西里耶夫娜·别祖霍娃（原姓库拉金娜），皮埃尔·别祖霍夫的妻子，以惊人的美貌著称，在上流社会交际圈中如鱼得水。与多洛霍夫的暧昧关系导致皮埃尔与之决斗，最终夫妻决裂。
  书中原文: 那位在莫斯科的公爵小姐曾向他暗示多洛霍夫和他妻子的关系密切，还有，今天早晨他接到一封匿名的冷嘲热讽的信，信中说他戴着眼镜看不清楚，他的妻子和多洛霍夫的关系只有对他一个人才是秘密。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 别克列绍夫
  分类: 人物
  解释: 《战争与和平》中作为背景出现的俄国贵族，在与巴格拉季翁的宴会上被安排与纳雷什金一同坐在首席左右两侧。其名字与亚历山大一世的名字相同，因此被安排在主宾席侧位以呼应皇上的圣讳。
  书中原文: 人们让巴格拉季翁在首席落座，首席左右坐的是名字都叫亚历山大的两个人——别克列绍夫和纳雷什金，其用意与皇上的圣讳有关。
  网络来源: https://www.diancangwang.cn/waiguomingzhu/3b72d7f3da8d/7a6e97f8f483.html

- 名词: 纳雷什金
  分类: 人物
  解释: 《战争与和平》中作为背景出现的俄国贵族。纳雷什金家族是俄罗斯历史上的著名贵族世家，彼得大帝的母亲就出自该家族。在欢迎巴格拉季翁的宴会上，纳雷什金因名字与亚历山大一世相同而被安排在首席贵宾席。
  书中原文: 人们让巴格拉季翁在首席落座，首席左右坐的是名字都叫亚历山大的两个人——别克列绍夫和纳雷什金，其用意与皇上的圣讳有关。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 阿普拉克辛
  分类: 人物
  解释: 《战争与和平》中出现的俄国贵族姓氏，阿普拉克辛家族是俄罗斯古老的贵族家族。在欢迎巴格拉季翁的宴会上，阿普拉克辛作为被干杯致敬的众多贵族之一出现。
  书中原文: 为别克列绍夫、纳雷什金、乌瓦罗夫、多尔戈鲁科夫、阿普拉克辛、瓦卢耶夫等人的健康，为委员们的健康，为主办人的健康，为俱乐部全体会员的健康，为全体来宾的健康，都干了杯。
  网络来源: https://en.wikipedia.org/wiki/List_of_War_and_Peace_characters

- 名词: 瓦卢耶夫
  分类: 人物
  解释: 《战争与和平》中作为背景出现的俄国贵族姓氏。在欢迎巴格拉季翁的宴会上，瓦卢耶夫与其他贵族一同被举杯致敬。有译本中指此为地名（瓦卢耶瓦），但在本段语境中为人物。
  书中原文: 为别克列绍夫、纳雷什金、乌瓦罗夫、多尔戈鲁科夫、阿普拉克辛、瓦卢耶夫等人的健康，为委员们的健康，为主办人的健康，为俱乐部全体会员的健康，为全体来宾的健康，都干了杯。
  网络来源: https://en.wikipedia.org/wiki/List_of_War_and_Peace_characters

- 名词: 索科尔尼克森林
  分类: 地点
  解释: 莫斯科郊外的森林，是《战争与和平》中皮埃尔·别祖霍夫与多洛霍夫决斗的地点。位于莫斯科东北部，在19世纪是郊区林地，常用于决斗等户外活动。如今是莫斯科市内的索科尔尼基公园。
  书中原文: 那么明天在索科尔尼克森林见吧。多洛霍夫和罗斯托夫在俱乐部门廊分手时，说。
  网络来源: https://tieba.baidu.com/p/7095580047

- 名词: 副手
  分类: 概念
  解释: 决斗中的见证人和助手，负责安排决斗条件、监督规则执行、尝试调解。在皮埃尔与多洛霍夫的决斗中，皮埃尔的副手是涅斯维茨基，多洛霍夫的副手是尼古拉·罗斯托夫。副手通常先尝试和解，和解不成才主持决斗。
  书中原文: 罗斯托夫不顾杰尼索夫劝告他不要参与这件事，他仍然同意做多洛霍夫的副手，散席后和别祖霍夫的副手涅斯维茨基谈妥了决斗的条件。
  网络来源: https://baijiahao.baidu.com/s?id=1731592317075738308

- 名词: 波兰舞曲
  分类: 概念
  解释: 又称波洛奈兹，一种起源于波兰的三拍子庄重舞曲，节奏稳健舒缓，在19世纪欧洲贵族舞会中常作为开场舞曲。在《战争与和平》中出现在英国俱乐部宴会上和皇家舞会中，是俄国上流社会的重要音乐元素。
  书中原文: 门敞开了，从餐厅传来波兰舞曲的鸣响：胜利的欢声如雷动，欢乐吧，勇敢的俄罗斯。
  网络来源: https://t.icesmall.cn/book/5/575/118.html

- 名词: 茨冈
  分类: 概念
  解释: 俄语中吉普赛人的音译，指罗姆人。在19世纪俄国，茨冈歌手和乐师常在贵族宴会、俱乐部中表演歌舞，是当时上流社会娱乐文化的一部分。《战争与和平》中多处出现茨冈人唱歌的场景。
  书中原文: 罗斯托夫和多洛霍夫以及杰尼索夫留在俱乐部里听茨冈和歌手们唱歌，一直坐到深夜。
  网络来源: https://wapbaike.baidu.com/item/%E8%8C%A8%E5%86%88/2287533

- 名词: 莫斯科英国俱乐部
  分类: 地点
  解释: 成立于1772年的俄国贵族俱乐部，位于莫斯科，是19世纪上流社会的重要社交场所。在《战争与和平》中，欢迎巴格拉季翁的盛大午宴即在此举行，是贵族们表达爱国热情、举办宴会和社交活动的重要舞台。
  书中原文: 为主办人的健康，为俱乐部全体会员的健康，为全体来宾的健康，都干了杯，最后，单独为筵席筹办人伊利亚·安德烈伊奇伯爵的健康干杯。
  网络来源: https://newxue.com/baike/12719092186758.html
