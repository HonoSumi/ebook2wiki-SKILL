- 名词: 韦列夏金
  分类: 人物
  解释: 小说中的莫斯科老商人，在石桥附近经营一家小饭馆。其子因被指撰写并散发拿破仑的布告（传单）而被逮捕，韦列夏金本人为此前来向总督拉斯托普钦求情。其子后被交付法庭审判，判了苦役。历史上韦列夏金事件是莫斯科弃守前夕的真实事件，被处决的是商人儿子，托尔斯泰将其写入小说中。
  书中原文: '他呀，是一个商人，饭馆的老板、韦列夏金就是他。'
  网络来源: https://book.douban.com/annotation/133985827/

- 名词: 加夫里洛·伊凡内奇
  分类: 人物
  解释: 莫斯科总督拉斯托普钦伯爵手下负责调查案件的官员。在拿破仑布告传播案中，他奉命追查，查出该布告曾经过六十三人之手。
  书中原文: '加夫里洛·伊凡内奇查出，那篇宣言经过六十三人的手。'
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 瓦西里奇科夫
  分类: 人物
  解释: 俄国将军，1812年法军逼近莫斯科时，曾与哥萨克统领普拉托夫一同会见莫斯科总督拉斯托普钦，报告莫斯科已无法防守、必须放弃的消息。历史原型为伊拉里翁·瓦西里耶维奇·瓦西里奇科夫（1776-1847），1812年任俄军第12步兵师师长，参加了博罗季诺战役，后升任骑兵上将及内阁委员会主席。
  书中原文: '已经见过伯爵的瓦西里奇科夫和普拉托夫对他说，据守莫斯科已经不可能，莫斯科要放弃了。'
  网络来源: https://www.prlib.ru/en/node/359018

- 名词: 索科尔尼茨别墅
  分类: 地点
  解释: 莫斯科索科尔尼基地区的一座郊外庄园别墅，是1812年莫斯科总督拉斯托普钦伯爵的郊外住所。法军逼近莫斯科时，拉斯托普钦当天早晨从这座别墅赶回城中处理政务。
  书中原文: '拉斯托普钦伯爵这天早晨才从郊外索科尔尼茨别墅回到城里。'
  网络来源: http://t.icesmall.cn/book/5/575/235.html

- 名词: 石桥
  分类: 地点
  解释: 指莫斯科的大石桥（Большой Каменный мост），横跨莫斯科河，是莫斯科最古老的石造桥梁，建于17世纪末。小说中韦列夏金在石桥旁边开设小饭馆。大石桥历史上是莫斯科的重要地标，1858年旧桥被拆除后重建。
  书中原文: '他父亲在石桥旁边开了一家小饭馆'
  网络来源: https://en.wikipedia.org/wiki/Bolshoi_Kamenny_Bridge

- 名词: 伊韦尔圣母像
  分类: 物件
  解释: 东正教极受尊崇的圣母像之一，源自希腊阿索斯山的伊韦尔修道院。1648年传入俄罗斯后被安置在莫斯科红场入口处的伊韦尔小礼拜堂内，被视为莫斯科城的守护圣像。旧时俄人进入红场前有在此像前脱帽亲吻的习俗。小说中拉斯托普钦在传单中宣布要将此像抬到叶卡捷琳娜医院为伤兵祈福。
  书中原文: '明天午饭后，我要把伊韦尔圣母像抬到叶卡捷琳娜医院给伤兵治病。'
  网络来源: https://www.catholicculture.org/culture/library/view.cfm?RecNum=3201

- 名词: 叶卡捷琳娜医院
  分类: 地点
  解释: 莫斯科以女皇叶卡捷琳娜二世命名的医院，是19世纪莫斯科重要的医疗机构，与莫斯科大学医学院关系密切。小说中莫斯科总督拉斯托普钦在传单中宣布计划将伊韦尔圣母像抬到该医院为伤兵治病祈福。
  书中原文: '明天午饭后，我要把伊韦尔圣母像抬到叶卡捷琳娜医院给伤兵治病。'
  网络来源: https://pubmed.ncbi.nlm.nih.gov/13450178/

- 名词: 汉堡日报
  分类: 物件
  解释: 19世纪德国汉堡出版的德文报纸，很可能是《汉堡消息报》（Hamburger Nachrichten，1792年创刊）。小说中拉斯托普钦伯爵以这份报纸为证，指出韦列夏金之子撰写的布告实际是翻译自外文报纸的内容，而非其原创。
  书中原文: "他从桌上拿起一份《汉堡日报》'这就是它。不是你写的，是翻译的，而且翻得很糟，因为你这个傻瓜根本不懂法语。'"
  网络来源: https://catalog.crl.edu/Record/838e90f1-8996-5667-81c4-1a9997601c2c

- 名词: 所罗门圣殿
  分类: 概念
  解释: 古代以色列国王所罗门在耶路撒冷建造的第一圣殿，是共济会最核心的象征来源，代表人类精神修行的终极隐喻。小说中拉斯托普钦伯爵用此词讽刺共济会员，指责他们假借建设所罗门圣殿之名而行破坏俄国之实。
  书中原文: '对那些假借建设所罗门圣殿而却极力破坏自己祖国圣殿的人也要这样办。'
  网络来源: https://crypticmasons.org/the-spiritual-anatomy-of-man-and-king-solomons-temple
