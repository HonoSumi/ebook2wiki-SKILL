- 名词: 鲍里斯·德鲁别茨科伊
  分类: 人物
  解释: 安娜·米哈伊洛夫娜的独生子，罗斯托夫家的亲戚和童年朋友。凭与别祖霍娃伯爵夫人的亲密关系在社交界地位辉煌，又凭重要人物保护在军界地位显赫。他决心与彼得堡最富有的姑娘结婚，为前程克制对娜塔莎的感情，但频繁访问罗斯托夫家，使娜塔莎陷入情感困惑。
  书中原文: "凭着他和别祖霍娃伯爵夫人的亲密关系，他在社交界地位辉煌，又凭着一位完全信任他的重要人物的保护，他在军界也是地位显赫，他已经胸有成竹：要与彼得堡最富有的姑娘结婚，实现这个计划完全不成问题。"
  网络来源: https://blog.sina.cn/dpool/blog/s/blog_4b562b280102wsbu.html

- 名词: 娜塔莎·罗斯托娃
  分类: 人物
  解释: 罗斯托夫伯爵的次女，小说女主角，初登场时13岁。托尔斯泰心中的"生命和幸福的化身"。本节中刚满十六岁，与童年追求者鲍里斯重逢后展现少女的娇羞活泼。她与母亲夜谈鲍里斯的事，用独特感受描述人物（称鲍里斯"窄得像饭厅里的钟"，皮埃尔是"蓝的，深蓝中带红的颜色"）。她将首次参加大型舞会，为此整日忙碌。
  书中原文: "娜塔莎十六岁了……她脸上那副特别严肃，特别专注的神情，使伯爵夫人吃惊。"
  网络来源: https://baike.baidu.com/item/娜塔莎·罗斯托娃/15143141

- 名词: 罗斯托夫伯爵夫人
  分类: 人物
  解释: 娜塔莎的母亲，慈爱而务实的贵族妇人。深知鲍里斯家世清寒，明确告诉娜塔莎不能与鲍里斯结婚。与娜塔莎有亲密母女关系，娜塔莎夜间来访谈心的场景是二人最大的乐趣。随后她与鲍里斯谈话，使其不再来访。
  书中原文: "你要知道，你是不能同他结婚的。因为他年轻，因为他穷，因为他是一个亲戚……因为你自己并不爱他。"
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=111

- 名词: 伊利亚·安德烈伊奇·罗斯托夫伯爵
  分类: 人物
  解释: 罗斯托夫家的男主人，娜塔莎的父亲。热心善良但不善理财的莫斯科贵族。本节中他未直接出场，仅听到他在门外问话。
  书中原文: "我的伯爵夫人哪，你还没睡吗？"
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=111

- 名词: 索尼娅·罗斯托娃
  分类: 人物
  解释: 罗斯托夫伯爵夫人的外甥女，自幼父母双亡被罗斯托夫家收养。托尔斯泰形容她"像一只可爱的小猫"。深爱着表哥尼古拉·罗斯托夫，一生忠诚但命运堪怜。本节中她协助娜塔莎准备舞会着装。
  书中原文: "索尼娅？她望着拖一根大辫子、蜷着身子睡觉的小猫儿，想道，'不，她哪里会了解！她是个有品德的姑娘。她爱上了尼古拉，再也不想别的了。'"
  网络来源: https://www.bbc.co.uk/programmes/profiles/146BRwfxDJsRMF3G11kVqm2/sonya-rostova

- 名词: 玛丽亚·伊格纳季耶夫娜·佩龙斯卡娅
  分类: 人物
  解释: 罗斯托夫伯爵夫人的朋友和亲戚，前朝（叶卡捷琳娜女皇时代）宫中女官，人长得又黄又瘦。担任罗斯托夫家在彼得堡上层社交界的引路人，指导他们参加上流社交活动。住在道利达花园附近。
  书中原文: "陪同罗斯托夫一家赴舞会的是玛丽亚·伊格纳季耶夫娜·佩龙斯卡娅，她是伯爵夫人的朋友和亲戚，人长得又黄又瘦，是前朝的宫中女官，现在外省人罗斯托夫一家在彼得堡上层社交界的活动，就是由她来指导。"
  网络来源: https://www.douban.com/location/drama/review/16138452/

- 名词: 海伦·别祖霍娃
  分类: 人物
  解释: 彼得堡第一美人，皮埃尔·别祖霍夫的妻子，社交界女王。外表极美但内心空虚，典型的上流社会交际花。鲍里斯凭借与她的亲密关系在上流社会获得显赫地位。
  书中原文: "凭着他和别祖霍娃伯爵夫人的亲密关系，他在社交界地位辉煌。"
  网络来源: https://blog.sina.com.cn/s/blog_633b67d70102yyd7.html

- 名词: 皮埃尔·别祖霍夫
  分类: 人物
  解释: 老别祖霍夫伯爵的私生子，俄国最富有的人之一，共济会员。在本节中娜塔莎用独特的感受描述他："他是蓝的，深蓝中带红的颜色，而且他是四方形的。"他后来成为娜塔莎的丈夫。
  书中原文: "别祖霍夫——他是蓝的，深蓝中带红的颜色，而且他是四方形的。"
  网络来源: https://baike.baidu.com/item/皮埃尔·别祖霍夫/53725822

- 名词: 尼古拉·罗斯托夫
  分类: 人物
  解释: 罗斯托夫伯爵家的大儿子，骠骑兵军官，娜塔莎的哥哥。热情忠诚、崇尚荣誉。索尼娅深爱着他。娜塔莎在谈论鲍里斯时说"要是尼古拉就会懂得"。
  书中原文: "要是尼古拉就会懂得……"
  网络来源: https://www.vrrw.net/hstj/9010.html

- 名词: 基里拉·马特维奇
  分类: 人物
  解释: 伯爵夫人的表兄，在伯爵夫人给娜塔莎讲自己年少故事时被提及。娜塔莎知道此人但认为"他是个老头子"。这个细节展现了伯爵夫人试图用自身经历来教导女儿。
  书中原文: "我给你讲讲我自己的故事，我有一个表兄……我知道——基里拉·马特维奇，不过他是个老头子。"
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=117

- 名词: 杜尼亚莎
  分类: 人物
  解释: 罗斯托夫家的女仆。娜塔莎在准备睡觉时叫她吹灭蜡烛。这是小说中的一个小角色。
  书中原文: "她叫杜尼亚莎把蜡烛熄灭，还没等杜尼亚莎走出房间，她已经进入另一个更幸福的幻境。"
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=117

- 名词: 彼得堡
  分类: 地点
  解释: 俄罗斯帝国首都（圣彼得堡），19世纪初俄国贵族社会的中心。罗斯托夫一家到此不久。彼得堡的上流社交界与莫斯科不同，对外省人更为挑剔。本节中的新年舞会在彼得堡英吉利滨海街的大臣府第举行。
  书中原文: "罗斯托夫来到彼得堡后，鲍里斯就去拜望他们。"
  网络来源: https://www.211cn.ca/book/war-and-peace/

- 名词: 英吉利滨海街
  分类: 地点
  解释: 圣彼得堡涅瓦河畔最著名的滨河大道之一，18世纪因英国商人聚居而得名。贵族豪宅云集的高贵街区。本节中叶卡捷琳娜时代的大臣在此拥有府第，举办1810年除夕新年舞会，外交使团和皇帝均出席。
  书中原文: "在英吉利滨海街上，那位大臣的著名府第被无数灯火照得通明。"
  网络来源: https://tmatic.travel/en/view/activity/grand-petersburg-along-the-english-embankment-up-to-the-blue-bridge_KF4qGGn/en

- 名词: 道利达花园
  分类: 地点
  解释: 圣彼得堡中央区的著名公园，面积约21.1公顷，因叶卡捷琳娜二世赠予波将金公爵的道利达宫而得名。罗斯托夫一家与佩龙斯卡娅约定晚上十点到道利达花园接她，然后前往舞会。
  书中原文: "罗斯托夫家的人应当在晚上十点钟到道利达花园去找那位女官。"
  网络来源: https://www.visit-petersburg.ru/en/leisure/places/tp-196735-tavricheskiy-sad/

- 名词: 1810年新年舞会
  分类: 事件
  解释: 1810年新年前夕（除夕），一位叶卡捷琳娜时代的大臣在英吉利滨海街的府第举行的盛大舞会。外交使团和皇帝都将出席。这是娜塔莎·罗斯托娃有生以来第一次参加大型舞会，她为此整日处于忙乱的狂热状态中。罗斯托夫一家由佩龙斯卡娅陪同赴会。
  书中原文: "一八一〇年新年前夕，除夕，一位叶卡捷琳娜时代的大臣家里举行舞会。外交使团和皇帝都将参加这次舞会。"
  网络来源: https://esl-bits.eu/ESL.English.Learning.Audiobooks/WarAndPeace/Book6/14/text.html

- 名词: 伯爵夫人与鲍里斯的谈话
  分类: 事件
  解释: 在娜塔莎与母亲夜谈鲍里斯之事后，伯爵夫人第二天把鲍里斯请到家里谈话。谈话的结果是鲍里斯从此再也不来罗斯托夫家了。这次谈话终结了鲍里斯与娜塔莎的童年关系，也体现了伯爵夫人对女儿前途的务实考量。
  书中原文: "第二天伯爵夫人把鲍里斯请到家里，同他谈了一次话，从此他再也不来罗斯托夫家了。"
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=117

- 名词: 共济会员
  分类: 概念
  解释: 共济会（Freemasonry）是18-19世纪在俄国贵族中盛行的秘密结社，强调兄弟情谊、互助与道德修养。皮埃尔·别祖霍夫是共济会员。托尔斯泰在小说中通过皮埃尔加入共济会并最终幻灭的经历，探讨了宗教信仰与精神追求的主题。
  书中原文: "'不，他是共济会员，我知道了。他太好了，深蓝透红，怎么给您解释呢……'"
  网络来源: https://baike.baidu.com/item/皮埃尔·别祖霍夫/53725822

- 名词: 希腊式发型
  分类: 概念
  解释: 19世纪初俄国贵族女性中流行的发型风格（à la grecque），受新古典主义影响，模仿古希腊女神雕像。特点是头发高高盘起，前额留有松散卷发或波浪。本节中为出席新年舞会，小姐们的发型要梳成希腊式的。
  书中原文: "发型要梳成希腊式的。"
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=117

- 名词: 俄国贵族舞会习俗
  分类: 习俗
  解释: 19世纪初俄国上流社会最重要的社交活动。舞会通常在冬季举行，需提前三周发出邀请。女士穿高腰帝国式长裙、透花丝袜、白缎鞋，佩戴玫瑰花；男士穿制服和勋章。发型流行希腊式。舞会流程包括波兰舞、华尔兹、玛祖卡舞和科蒂荣舞。
  书中原文: "脚、手、脖子、耳朵，都已经按照舞会的要求特别仔细地洗过，喷过香水，搽过香粉；已经穿上透花丝袜和带蝴蝶结的白缎鞋，头发也差不多梳好了。"
  网络来源: https://visit-petersburg.ru/zh/route/tp-166-balnaya-zhizn-stolitsy-rossiyskoy-imperii/

- 名词: 除夕舞会礼仪
  分类: 习俗
  解释: 俄国贵族在除夕新年期间举办和参加舞会的传统礼仪。除夕至新年是举办舞会的高峰期。赴会需乘坐马车，穿最正式的礼服。女士内穿粉红色绸衬裙，外罩薄纱白裙衫，胸襟佩戴玫瑰，梳希腊式发型。外省人在彼得堡需有宫中女官指导才能融入上流社交圈。
  书中原文: "罗斯托夫家为了这次舞会曾有许多议论和准备，也曾有许多忧虑，担心接不到请帖，衣服不齐备，什么地方没有照应有的那样安排好。"
  网络来源: https://visit-petersburg.ru/zh/route/tp-166-balnaya-zhizn-stolitsy-rossiyskoy-imperii/
