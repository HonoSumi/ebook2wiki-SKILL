- 名词: 安德烈公爵(博尔孔斯基)
  分类: 人物
  解释: 安德烈·博尔孔斯基公爵是《战争与和平》的男主角之一，博尔孔斯基家族长子。他才智超群、孤傲正直，厌恶上流社会虚伪。本卷中他在彼得堡结识斯佩兰斯基并出任军事条例委员会委员。一生经历追求荣誉与幻灭、爱情与背叛、献身与超脱三个阶段，临终领悟"爱是生命"的真谛。托尔斯泰通过安德烈与皮埃尔分写自己理性与感性的两个侧面。
  书中原文: 安德烈公爵住在彼得堡的初期，觉得自己在独居生活所形成的一些想法，完全被彼得堡的身边琐事弄模糊了。……斯佩兰斯基给安德烈公爵留下了强烈的印象。安德烈公爵认为可鄙的渺小人物是那么多，他那么希望在某个人身上发现他所追求的至美至善的活的理想人物，因此他轻易就相信，他在斯佩兰斯基身上找到了一个十分有理性、有道德的理想人物。
  网络来源: https://baike.baidu.com/item/安德烈·博尔孔斯基/55647709

- 名词: 斯佩兰斯基
  分类: 人物
  解释: 米哈伊尔·米哈伊洛维奇·斯佩兰斯基（1772-1839），俄国亚历山大一世时期最伟大的改革家，被誉为"俄国自由主义之父"。出身乡村牧师家庭，靠卓越才能成为帝国重臣。1808年起主持改革，提出三权分立的国家法典草案，设立国务会议，推行文官考试制度。1812年因保守派陷害被流放，1826年由尼古拉一世召回主持法典编纂。托尔斯泰刻画了他冷静理性、崇尚智慧力量的特点。
  书中原文: 他在他身上看见了一个富于理智、思想周密、才智广博的人，他以全部的精力和顽强的意志取得权力和利用这个权力专门为俄国谋福利。……斯佩兰斯基的目光——它冰冷、清澈、使人看不透他的灵魂，此外还有那双白净滑腻的手……还有使安德烈公爵吃惊而且不愉快的是他发现斯佩兰斯基对人过份藐视，以及他在论证自己的意见时所使用的方法之繁多。
  网络来源: https://zh.wikipedia.org/zh-sg/米哈伊爾·米哈伊洛維奇·斯佩兰斯基

- 名词: 皮埃尔(别祖霍夫)
  分类: 人物
  解释: 皮埃尔·别祖霍夫是《战争与和平》的核心男主角之一，老别祖霍夫伯爵的私生子，继承巨额遗产成为莫斯科首富。他善良、单纯、热爱思考但意志薄弱。本卷中他担任彼得堡共济会首领，对俄国共济会日益形式化的状况不满，赴国外领受高级秘诀，回国后在支会发表激进演说遭反对。皮埃尔的精神探索贯穿全书，最终在1812年战争和战俘营中领悟生命真谛。
  书中原文: 皮埃尔终日忙乱，在纸醉金迷的生活中过了一年，才开始觉得，他越是想在共济会这块土地上站稳，他脚下这块土地就越是往下沉。……皮埃尔开始对自己所做的事感到不满。……因此，年底皮埃尔到国外去领受共济会的高级秘诀去了。……一八〇九年夏，皮埃尔回到彼得堡。
  网络来源: https://baike.baidu.com/item/皮埃尔·别祖霍夫/53725822

- 名词: 约瑟夫·阿列克谢耶维奇
  分类: 人物
  解释: 约瑟夫·阿列克谢耶维奇（奥西普·阿列克谢耶维奇·巴兹杰耶夫）是《战争与和平》中的资深共济会会员，皮埃尔的精神导师。他辞去彼得堡支会事务后在莫斯科深居简出，潜心研究共济会的奥秘教义（三位一体称号、硫磺-水银-盐三元素、所罗门圣殿的象征等）。皮埃尔将他归入最受尊敬的第一类会员——不参加世俗活动、专门研究神秘教理的人。
  书中原文: 约瑟夫·阿列克谢耶维奇不在彼得堡。（他近来推掉彼得堡支会的事务，在莫斯科深居简出。）……皮埃尔尊重这类会友，他认为大多数老会员以及约瑟夫·阿列克谢耶维奇本人都属于这类会友，但是他和他们的趣味不相投。他的心思不放在共济会的神秘方面。
  网络来源: https://book.douban.com/people/47231085/annotation/2253381/

- 名词: 维拉尔斯基
  分类: 人物
  解释: 维拉尔斯基是《战争与和平》中的一位波兰伯爵，共济会会员。他曾在彼得堡引荐皮埃尔加入共济会，担任入会保证人，带蒙住眼睛的皮埃尔经历共济会入会仪式。皮埃尔将会员分为四类，将维拉尔斯基归入第三类——只注重表面形式和仪式、不关心教义内容的会员。这一分类反映了皮埃尔对俄国共济会日益形式化的不满。
  书中原文: 他归入第三类的会员（这类会员最多），认为共济会无非是表面的形式和仪式，并不关心它的内容和意义。维拉尔斯基，甚至主要支会的教头都属这一类。
  网络来源: https://www.williamlong.info/xiaoshuo/archives/417.html

- 名词: 马格尼茨基
  分类: 人物
  解释: 米哈伊尔·列昂季耶维奇·马格尼茨基（1778-1855），亚历山大一世时期的俄国官员，斯佩兰斯基的亲密同僚，担任军事条令编辑委员会主席。他与斯佩兰斯基合作推动法律和行政改革，后于1819-1826年担任喀山学区督学，以极端保守的宗教教育政策闻名。在小说中，斯佩兰斯基向安德烈公爵提及将与马格尼茨基商议其职务安排。
  书中原文: '如果您肯赏光在星期三来看我，他又加添一句，我和马格尼茨基商量一下，把您可能感到兴趣的事情通知您，此外，咱们还可以更详细地谈谈。'
  网络来源: https://en.wikipedia.org/wiki/Mikhail_Magnitsky

- 名词: 科丘别伊
  分类: 人物
  解释: 维克托·帕夫洛维奇·科丘别伊伯爵（1768-1834），俄国大国务活动家，亚历山大一世的密友与核心顾问之一。他是亚历山大一世即位前"年轻朋友"圈子成员，1802年出任首任内务部部长，是内务部建部方案的首创者。在小说中，安德烈公爵正是在科丘别伊家中初次见到斯佩兰斯基。
  书中原文: 星期三，斯佩兰斯基在自己家中单独接见了博尔孔斯基，跟他亲切地谈了很久，这次会见也同在科丘别伊家初次见面一样，斯佩兰斯基给安德烈公爵留下了强烈的印象。
  网络来源: https://baike.baidu.com/item/维克托·帕夫洛维奇·科丘别伊

- 名词: 罗森坎普夫
  分类: 人物
  解释: 古斯塔夫·罗森坎普夫（1762-1832），俄国法学家和法律编纂专家，出身波罗的海德意志贵族家庭，1804-1826年间担任俄国法典编纂委员会的实际负责人。他以欧洲大陆法典为蓝本对俄国法律体系进行系统化整理，其工作长期被斯佩兰斯基的光环所掩盖。在小说中，斯佩兰斯基以讽刺口吻评价其工作"只是在法律条文上贴标签"。
  书中原文: 博尔孔斯基在他那儿度过的第一个晚上，在谈到法典编纂委员会时，斯佩兰斯基带着讽刺的口吻对安德烈公爵说，委员会成立了一百五十年，花了数百万卢布，结果一事无成，只是罗森坎普夫在各种不同的法律条文上贴一些标签而已。
  网络来源: https://gepris.dfg.de/gepris/projekt/270035948

- 名词: 波拿巴(拿破仑)
  分类: 人物
  解释: 拿破仑·波拿巴（1769-1821），法兰西第一帝国皇帝，是《战争与和平》中重要的历史人物。小说描写了奥斯特利茨战役中安德烈受伤后仰望天空感到拿破仑渺小、蒂尔西特会面等经典场景。本卷文本中，托尔斯泰以安德烈曾对拿破仑的崇拜之情作比，描写他对斯佩兰斯基产生的同样狂热的敬佩，暗示斯佩兰斯基成为安德烈心中新的"英雄偶像"。
  书中原文: 在与斯佩兰斯基认识的初期，安德烈公爵对他发生了狂热的敬佩，正像他曾经对波拿巴产生的感情一样。
  网络来源: https://www.211cn.ca/book/war-and-peace/?c=100

- 名词: 彼得堡
  分类: 地点
  解释: 彼得堡（圣彼得堡）是俄罗斯帝国首都，由彼得大帝于1703年建立，1712-1918年间作为首都，被称为"面向西方的窗口"。19世纪初的彼得堡是俄国政治、文化和社交中心。在《战争与和平》中，彼得堡是安德烈公爵与斯佩兰斯基交往、皮埃尔参与共济会活动的核心舞台，代表了官僚体制、改革运动与上流社会交织的复杂空间。
  书中原文: 安德烈公爵住在彼得堡的初期，觉得自己在独居生活所形成的一些想法，完全被彼得堡的身边琐事弄模糊了。……皮埃尔巡视了庄园以后，回到彼得堡，他不由自主地当上了彼得堡共济会的首领。
  网络来源: https://baike.baidu.com/item/圣彼得堡/23736752

- 名词: 莫斯科
  分类: 地点
  解释: 莫斯科是俄罗斯的古都，19世纪初仍是俄国传统文化和贵族生活的中心。与代表官方和西化的彼得堡相比，莫斯科在《战争与和平》中常被描绘为更传统、更俄罗斯化的空间，是罗斯托夫家族和别祖霍夫家族的居住地。在本卷文本中，约瑟夫·阿列克谢耶维奇从彼得堡退居莫斯科深居简出，代表了共济会中拒绝世俗事务、专注精神修行的倾向。
  书中原文: 约瑟夫·阿列克谢耶维奇不在彼得堡。（他近来推掉彼得堡支会的事务，在莫斯科深居简出。）
  网络来源: https://baike.baidu.com/item/莫斯科

- 名词: 拿破仑法典
  分类: 物件
  解释: 《拿破仑法典》（Code Napoléon），即1804年颁布的《法国民法典》，是资本主义国家最早的一部民法典，被誉为大陆法系开山经典。法典共2281条，确立了自由平等、私有财产神圣不可侵犯、契约自由和过错责任四大原则。在小说中，斯佩兰斯基要求安德烈公爵参照《拿破仑法典》编纂俄国民法，反映了俄国改革派以西方法制为蓝本推动法律现代化。
  书中原文: 按照斯佩兰斯基的请求，他着手编纂民法第一部分，并且参照《拿破仑法典》和《查士丁尼法典》，草拟"人权"章节的条文。
  网络来源: https://baike.baidu.com/item/拿破仑法典/28872

- 名词: 查士丁尼法典
  分类: 物件
  解释: 《查士丁尼法典》（Codex Justinianus）是东罗马帝国皇帝查士丁尼一世于529年颁布的法典汇编，与《学说汇纂》《法学阶梯》《新律》共同构成《民法大全》，是罗马法的集大成之作。法典共12卷，涵盖教会法、私法、刑法和行政法，是世界史上内容最丰富、体系最完善、对后世影响最广泛的古代法律。
  书中原文: 按照斯佩兰斯基的请求，他着手编纂民法第一部分，并且参照《拿破仑法典》和《查士丁尼法典》，草拟"人权"章节的条文。
  网络来源: https://baike.baidu.com/item/查士丁尼法典

- 名词: 斯佩兰斯基接见安德烈公爵
  分类: 事件
  解释: 本事件发生在1808-1809年间的彼得堡，斯佩兰斯基在自己家中单独接见安德烈公爵并长谈。此前安德烈公爵已在科丘别伊家中与他初次见面。长谈中斯佩兰斯基向安德烈展示了他理性主义的治国理念和对法律改革的宏大构想。随后安德烈被任命为军事条例委员会委员和法典编纂委员会科长，开始参照拿破仑法典和查士丁尼法典起草人权章节。
  书中原文: 星期三，斯佩兰斯基在自己家中单独接见了博尔孔斯基，跟他亲切地谈了很久，这次会见也同在科丘别伊家初次见面一样，斯佩兰斯基给安德烈公爵留下了强烈的印象。……这第一次和斯佩兰斯基长谈，更加强了安德烈公爵第一次会见他时的感觉。他在他身上看见了一个富于理智、思想周密、才智广博的人。
  网络来源: https://www.douban.com/people/vitanuova/status/4110216378/

- 名词: 皮埃尔共济会演讲
  分类: 事件
  解释: 1809年夏，皮埃尔从国外领受共济会高级秘诀回到彼得堡后，在二级支会庄严大会上发表激进演说。他提倡共济会应积极行动——扫除偏见、教育青年、建立普遍的道德权威。演讲引起支会分裂，教头指责皮埃尔有"光明教倾向"并拒绝其建议。此事标志着皮埃尔对俄国共济会的彻底幻灭，他开始认识到共济会形式主义的本质。
  书中原文: 确定召开一次二级支会的庄严大会，皮埃尔答应在会上把他从共济会最高领袖那里带来的东西传授给共济会的会友。会议室坐满了人。做完例行的仪式后，皮埃尔站起来演说了。……这篇演讲在支会里不仅产生了强烈的印象，而且引起了骚动。大多数会员认为这篇演讲有危险的光明教倾向，大家对演讲的冷淡，使皮埃尔感到吃惊。
  网络来源: http://yunshuwu.cn/chap/8556.html

- 名词: 法典编纂委员会
  分类: 事件
  解释: 俄国法典编纂委员会是亚历山大一世时期设立的重要立法机构（1804-1826），最初由罗森坎普夫负责，以欧洲大陆法典为蓝本对俄国法律进行系统化整理。斯佩兰斯基后来介入并主导改革，1810年推动设立国务会议。在小说中，斯佩兰斯基对该委员会的工作成效持讽刺态度，随后邀请安德烈公爵加入以推动实质性的法律编纂工作。
  书中原文: 博尔孔斯基在他那儿度过的第一个晚上，在谈到法典编纂委员会时，斯佩兰斯基带着讽刺的口吻对安德烈公爵说，委员会成立了一百五十年，花了数百万卢布，结果一事无成，只是罗森坎普夫在各种不同的法律条文上贴一些标签而已。
  网络来源: https://gepris.dfg.de/gepris/projekt/270035948

- 名词: 军事条例委员会
  分类: 事件
  解释: 军事条例委员会是斯佩兰斯基改革时期设立的军事法制机构，由马格尼茨基担任主席，负责俄国军事条例的修订和编纂工作。在小说中，安德烈公爵被斯佩兰斯基任命为该委员会委员，同时兼任法典编纂委员会科长。这体现了斯佩兰斯基笼络和任用有才能的贵族青年参与改革的策略，也反映了安德烈从军队转向政界的转型。
  书中原文: 一个星期后，安德烈公爵就任军事条例委员会委员，而且完全出乎他的意料，做了法典编纂委员会一个科的科长。
  网络来源: https://www.marxists.org/archive/tolstoy/1869/war-and-peace/book-6-chapter-4.html

- 名词: 共济会
  分类: 概念
  解释: 共济会（Freemasonry）起源于中世纪的石匠行会，1717年在英国正式形成现代组织，18世纪传入俄国，在贵族和知识分子中影响广泛。它以"自由、平等、博爱"为口号，推崇理性和道德修养，使用分规、曲尺、法典等象征符号和等级制入会仪式。在《战争与和平》中，共济会是皮埃尔精神探索的重要阶段，他对俄国共济会日益形式化的不满促使他赴国外寻求更高秘诀。
  书中原文: 皮埃尔巡视了庄园以后，回到彼得堡，他不由自主地当上了彼得堡共济会的首领。他安排会友的宴会和丧礼，征收新会员，忙于联系各个支会和寻求真正的会约。……他把所认识的会友分作四类：……皮埃尔开始对自己所做的事感到不满。……有时觉得它完全建立在形式上。
  网络来源: https://baike.baidu.com/item/共济会

- 名词: 光明教
  分类: 概念
  解释: 光明教即光明会（Illuminati），1776年由亚当·魏斯豪普特在德国巴伐利亚创立的启蒙运动秘密社团，主张以理性取代迷信，反对集权政府。1785年被巴伐利亚政府镇压后消亡。光明会与共济会成员部分交叉，两者的关系在阴谋论中被混淆和夸大。在小说中，皮埃尔的激进演讲被保守会员指责为"光明教倾向"，反映了俄国共济会内部对激进改革的恐惧。
  书中原文: 这篇演讲在支会里不仅产生了强烈的印象，而且引起了骚动。大多数会员认为这篇演讲有危险的光明教倾向，大家对演讲的冷淡，使皮埃尔感到吃惊。
  网络来源: https://zh.wikipedia.org/wiki/光明会

- 名词: 玄学论证法
  分类: 概念
  解释: 玄学论证法即形而上学论证方法，指通过纯思辨方式探讨超验本体问题的哲学方法。斯佩兰斯基在小说中善于将具体问题提升到玄学层面，给空间、时间、思想等抽象概念下定义，然后推出具体结论。这种论证方式反映了19世纪初欧洲理性主义哲学传统对俄国知识分子的深刻影响，托尔斯泰通过这一细节刻画了斯佩兰斯基抽象思维和理性万能信仰的特点。
  书中原文: 他时而站在实干家的立场非难梦想家，时而作为一个讽刺家辛辣地嘲笑他的反对派，时而论点谨严，时而忽然上升到玄学领域（最后这个论证方法是他特别常用的）。他把问题提到玄学的高度，给空间、时间、思想下定义，由这里得出反驳的论点，然后又回到争论的问题上。
  网络来源: https://book.douban.com/annotation/122331455/

- 名词: 人权章节
  分类: 概念
  解释: 人权章节指《拿破仑法典》第一编"人法"中关于民事权利的规定。第8条明确规定"所有法国人都享有民事权利"，确立了法律面前人人平等的原则。在小说中，斯佩兰斯基要求安德烈公爵起草俄国民法中对应的人权章节，体现了19世纪初俄国改革派试图将法国启蒙思想引入俄国法律体系的努力，反映了俄国法制现代化过程中对西方法典的借鉴和移植。
  书中原文: 按照斯佩兰斯基的请求，他着手编纂民法第一部分，并且参照《拿破仑法典》和《查士丁尼法典》，草拟"人权"章节的条文。
  网络来源: https://bjgy.bjcourt.gov.cn/article/detail/2003/05/id/819739.shtml

- 名词: 形式主义
  分类: 概念
  解释: 形式主义在哲学上指脱离实际内容、盲目追求外在形式的思维方法。在共济会语境中，形式主义表现为只注重表面仪式和社交活动，而忽视真正的道德修养和精神追求。皮埃尔将只关注形式和仪式的会员归入第三类和第四类，认为这些人进共济会只是为了结交达官贵人。这一批判反映了托尔斯泰对宗教形式主义的普遍反思。
  书中原文: 皮埃尔开始对自己所做的事感到不满。至少就他在这里所见到的共济会来说，他有时觉得它完全建立在形式上。他并不想怀疑共济会本身，只是怀疑俄国的共济会走错了路，背离了它原来的教义。
  网络来源: https://zgjjjc.ccdi.gov.cn/bqml/bqxx/201901/t20190122_187509.html

- 名词: 理性主义信仰
  分类: 概念
  解释: 理性主义信仰是启蒙运动的核心精神，主张一切事物都应接受理性法庭的审判，相信人类理性能够认识和改造世界。在18-19世纪的欧洲，这种信念表现为对理性万能的崇拜。托尔斯泰在小说中刻画斯佩兰斯基时突出了他对"智慧的力量和合理性"的绝对信念，以及坚信思想可以完美表达一切的理性自信，与托尔斯泰更重视直觉和生命体验的哲学倾向形成对比。
  书中原文: 总之，使安德烈公爵惊奇的斯佩兰斯基的智力特征，是对智慧的力量和合理性有着无庸置疑和不可动摇的信念。显然，斯佩兰斯基的头脑里永远不会进入那种在安德烈公爵看来极平常的思想：反正你不能把你所想的一切尽力表达出来，也永远不会发生这样的怀疑：我所想的一切以及我所信仰的一切是不是乱弹琴？
  网络来源: http://www.philosophy.org.cn/zxts/wgzx/qmydsqdzxhkdzx/201507/t20150713_2726091.shtml

- 名词: 共济会仪式
  分类: 习俗
  解释: 共济会仪式是共济会活动的核心组成部分，包括入会仪式、晋级仪式和例会仪典。入会时候选人需蒙眼、交出金属物品、经历象征性考验、宣读重誓并学习秘密标识和握手礼。共济会使用"三重伟大之光"（法典、方矩、圆规）等象征物，分为入门学徒、副手和大师三个等级。在小说中，皮埃尔认为这些仪式已沦为表面形式，背离了共济会的精神内核。
  书中原文: 做完例行的仪式后，皮埃尔站起来演说了。……他归入第三类的会员（这类会员最多），认为共济会无非是表面的形式和仪式，并不关心它的内容和意义。
  网络来源: https://www.mplus.com.tw/article/3942

- 名词: 法国式鞠躬
  分类: 习俗
  解释: 法国式鞠躬是18-19世纪法国宫廷和贵族社会通行的正式问候礼节，根植于中世纪骑士文化和宫廷礼仪。典型姿势为左手扶右胸，右手脱帽，身体轻微前躬同时点头致意。法国式鞠躬在18-19世纪的俄国上流社会极为流行，被视为教养和风度的标志，反映了法国文化对俄国贵族的深刻影响。在小说中，斯佩兰斯基以此姿势告别，展现了他的优雅风度与法国化的教养。
  书中原文: 他合上眼睛，按照法国方式鞠躬告别，尽可能不引人注意，离开了大厅。
  网络来源: https://www.cctv.com/abroad/special/C10590/20030612/100751.shtml
