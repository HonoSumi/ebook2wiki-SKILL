- 名词: 俄国农民
  分类: 概念
  解释: 托尔斯泰在《战争与和平》中塑造的俄国农民形象，是承载"人民的思想"的核心载体。尼古拉·罗斯托夫虽然嘴上抱怨"咱们俄国农民真没办法"，却用整个心灵热爱农民及其风俗习惯，并认为农业经营的核心在于农民而非工具或技术。托尔斯泰通过农民的视角衡量一切，将农民理想化为道德高尚、精神纯净的民族精神象征。
  书中原文: 他却是用整个心灵爱"咱们俄国农民"，爱他们的风俗习惯，正因为这样，他才能了解和吸取唯一富有成效的经营方法和方式。
  网络来源: https://elischolar.library.yale.edu/yurj/vol1/iss1/29/

- 名词: 农业经营
  分类: 概念
  解释: 尼古拉·罗斯托夫在婚后（1814年后）迁居童山，专心投入庄园管理而形成的经营理念。他反对流行的英国式新方法，不办工厂、不种贵重作物，认为农业的核心不是氮氧粪肥或犁，而是农业劳动者。他先向农民学习，了解其需要和价值观，再以公平严格的方式管理，对待自己的田地和农民的田地一视同仁。这种务实而尊重农民的经营方式使他在数年内还清债务、重整家业。
  书中原文: 在管理庄园中主要的事物不是土壤和空气中的氮气和氧气，不是特别的犁和粪肥，而是使氮气、氧气、粪肥、犁起作用的那个主要的工具——也就是农业劳动者。
  网络来源: https://book.qq.com/book-read/27775529/7
