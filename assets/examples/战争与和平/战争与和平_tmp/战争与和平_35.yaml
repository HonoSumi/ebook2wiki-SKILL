- 名词: 图申
  分类: 人物
  解释: 托尔斯泰《战争与和平》中俄军炮兵上尉，身材矮小瘦弱、其貌不扬，在申格拉本战役中以仅剩的四门大炮独自奋战，为俄军主力争取撤退时间。性格朴实善良、坚韧忠诚，是托尔斯泰笔下"平凡英雄"的典型代表。
  书中原文: 安德烈公爵用生硬的声音打破了沉默，"您派我去图申上尉的炮兵连。我到了那儿，发现三分之二的人和马匹被打死，两门大炮被打坏，什么掩护部队也没有。"
  网络来源: https://baijiahao.baidu.com/s?id=1665309293571912083

- 名词: 海伦
  分类: 人物
  解释: 叶莲娜·瓦西里耶夫娜·库拉金娜，简称海伦，瓦西里公爵之女，彼得堡上流社会社交明星。绝色美人但放荡虚荣，在父亲安排下嫁给继承巨额遗产的皮埃尔，后与多洛霍夫偷情导致皮埃尔与多洛霍夫决斗，最终在两难抉择中抱病而终。是托尔斯泰笔下虚伪、贪婪与道德堕落的贵族女性典型。
  书中原文: 他在宴席间、在舞会上、而且多半是在瓦西里公爵家里——在公爵肥胖的妻子和美人儿海伦的圈子里，消磨掉全部的时间。
  网络来源: https://zhuanlan.zhihu.com/p/71424249

- 名词: 安娜·帕夫洛夫娜·舍列尔
  分类: 人物
  解释: 太后玛丽亚·费奥多罗夫娜的宫廷女官和亲信，小说中第一个出场的人物。1805年7月在彼得堡举办沙龙晚会，全书主要人物在此悉数登场。善于周旋于上流社会，具有廷臣的机敏灵活，强烈反拿破仑，拥护亚历山大皇帝。托尔斯泰形容她像一台晚会的"机器"。
  书中原文: 安娜·帕夫洛夫娜·舍列尔，也像其他一切人一样，对皮埃尔的态度也发生了社会上对他的看法所发生的那种变化。
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9398

- 名词: 阿纳托利
  分类: 人物
  解释: 阿纳托利·库拉金，瓦西里公爵的小儿子，库拉金家族的纨绔子弟代表。长相俊美但放荡不羁，频繁出入赌场酒场，毫无道德感，曾在波兰被迫娶一地主女儿后遗弃妻子。追求已与安德烈公爵订婚的娜塔莎·罗斯托娃并策划拐走她，成为小说重要转折点。最后在波罗金诺战役中重伤截肢。
  书中原文: 近卫军出征去了，多洛霍夫降为士兵，阿纳托利在外省军队里，安德烈公爵在国外。
  网络来源: https://zhuanlan.zhihu.com/p/495064846

- 名词: 大公爵小姐
  分类: 人物
  解释: 俄语Великая Княжна，俄罗斯帝国时期沙皇/皇帝未出嫁的女儿或女性皇室成员的称号。在小说中指别祖霍夫伯爵的侄女们，即老伯爵死后住在别祖霍夫家的三位公爵小姐，其中最大的那位身材修长、发型如洋娃娃，最年幼的生有黑痣。
  书中原文: 那个身腰修长、头发梳得像洋娃娃似的最凶的大公爵小姐，在葬礼完毕以后，走到皮埃尔的房间。
  网络来源: https://m.douban.com/note/855631756/

- 名词: 梁赞
  分类: 地点
  解释: 俄罗斯梁赞州首府，位于莫斯科东南约180-202公里的奥卡河畔，1095年首次见于史籍。14世纪初成为梁赞公国都城，1521年并入俄罗斯帝国。工业以机械制造和炼油为主，也是俄国生理学家巴甫洛夫和诗人叶赛宁的故乡。
  书中原文: 从梁赞寄来一笔款子，我收到后就留下了：反正你不需要钱用。咱们以后会算清的。
  网络来源: https://baike.baidu.com/item/%E6%A2%81%E8%B5%9E/12000676

- 名词: 布尔诺
  分类: 地点
  解释: 捷克第二大城市，南摩拉维亚州首府，1243年建市。位于捷克东南部斯夫拉特卡河与斯维塔瓦河交汇处。是捷克宪法法院、最高法院所在地，工业重镇和交通枢纽。遗传学家孟德尔在此完成豌豆实验，作家米兰·昆德拉和数学家哥德尔也出生于此。历史上德语称Brünn（布吕恩）。
  书中原文: "[19] 布吕恩即今捷克境内的布尔诺。"
  网络来源: https://baike.baidu.com/item/%E5%B8%83%E5%B0%94%E8%AF%BA/1830115

- 名词: 布鲁诺沃
  分类: 地点
  解释: 即布劳瑙（Braunau），奥地利的一座要塞城市，是《战争与和平》中俄军进驻奥地利时库图佐夫的总部所在地。小说第一卷第二部描写了俄军步兵团在布劳瑙附近驻扎及接受总司令检阅的场景。"布鲁诺沃"是俄语化名称，中译本中亦直接译为"布劳瑙"。
  书中原文: "[4] 布鲁诺沃即布劳瑙，是俄国化了的名称。"
  网络来源: http://www.8ge.net/bookyuedu/%e5%90%8d%e8%91%97%c2%b7%e6%88%98%e4%ba%89%e4%b8%8e%e5%92%8c%e5%b9%b3/26.htm

- 名词: 坎波福米奥
  分类: 地点
  解释: 意大利东北部弗留利-威尼斯朱利亚大区乌迪内省的一个村庄，今名坎波福尔米多（Campoformido）。因1797年法奥在此签订《坎波福米奥和约》而闻名于世，该条约结束了第一次反法同盟战争，标志着拿破仑在意大利战场的最终胜利。
  书中原文: "[22] 坎波福米奥为意大利一村庄，一七九七年法奥曾在此签订和约。"
  网络来源: https://zh.wikipedia.org/zh-sg/%E5%9D%8E%E6%B3%A2%E7%A6%8F%E7%88%BE%E7%B1%B3%E5%A5%A7%E6%A2%9D%E7%B4%84

- 名词: 圣赫勒拿岛
  分类: 地点
  解释: 大西洋上一座面积约121平方公里的火山岛，隶属于英国，距非洲西海岸约1950公里。因拿破仑一世1815年滑铁卢战役失败后被流放至此直至1821年去世而闻名于世。其遗体最初葬于岛上，1840年被迎回巴黎荣军院安葬。
  书中原文: "[27] 拿破仑在圣赫勒拿岛时曾说：\"有几营俄国军队表现了大无畏的精神。\"——作者注"
  网络来源: https://baike.baidu.com/item/%E5%9C%A3%E8%B5%AB%E5%8B%92%E6%8B%BF%E5%B2%9B

- 名词: 土伦战役
  分类: 事件
  解释: 1793年9月至12月法国南部土伦港发生的战役，是拿破仑·波拿巴的成名之战。时年24岁的拿破仑以炮兵少校身份被任命为攻城炮兵指挥官，提出攻占"小直布罗陀"控制港口的作战计划并成功收复土伦。战后拿破仑被破格提升为炮兵准将，从此登上历史舞台。
  书中原文: "[25] 一七九三年二十三岁的拿破仑指挥土伦战役，第一次获得胜利，从此声名大震。"
  网络来源: https://baike.baidu.com/item/%E5%9C%9F%E4%BC%A6%E6%88%98%E5%BD%B9

- 名词: 坎波福米奥和约
  分类: 事件
  解释: 1797年10月17日法国与奥地利在意大利坎波福米奥签订的条约，由拿破仑·波拿巴代表法国签署。条约结束了第一次反法同盟战争，奥地利割让奥属尼德兰和莱茵河左岸给法国，威尼斯共和国被法奥瓜分。该条约标志着拿破仑意大利战场的最终胜利。
  书中原文: "[22] 坎波福米奥为意大利一村庄，一七九七年法奥曾在此签订和约。"
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%9D%8E%E4%BC%AF%E7%A6%8F%E7%B1%B3%E5%A5%A5%E6%9D%A1%E7%BA%A6

- 名词: 俄土战争
  分类: 事件
  解释: 17世纪至20世纪间俄罗斯帝国与奥斯曼土耳其帝国为争夺高加索、巴尔干半岛、克里米亚和黑海沿岸而进行的一系列战争，断断续续长达241年，是欧洲历史上最长的战争系列之一。小说中提及的伊兹梅尔战役即1787-1792年第六次俄土战争中的重要战役。
  书中原文: "[2] 伊兹梅尔战役指一七八七至一七九一年俄土战争中的一次战役。"
  网络来源: https://zh.wikipedia.org/zh-my/%E4%BF%84%E5%9C%9F%E6%88%98%E4%BA%89

- 名词: 宫内侍从
  分类: 概念
  解释: 俄罗斯帝国宫廷官制中的头衔，源于彼得大帝1722年颁布的《官秩表》。俄语称камергер（Kamerger）或камер-юнкер，相当于西欧宫廷的Chamberlain。负责宫廷礼仪、接待等事务。在小说中瓦西里公爵为皮埃尔谋得此职位，相当于五等文官级别。
  书中原文: 一定要这个年轻人和他一同去彼得堡，并且在他家里住下。为了使皮埃尔娶自己的女儿所必须做的一切，瓦西里公爵都做到了。
  网络来源: https://bbs.napolun.com/thread-40356-1-11.html

- 名词: 五等文官
  分类: 概念
  解释: 俄罗斯帝国官秩表（1722年由彼得大帝颁布）中的第五级文官，属于高级官员阶层（1-5级）。1-5级为统治阶层，五等文官可出任中央政府副部长、重要部门长官或地方副省长级别职位，晋升需沙皇本人裁夺并拥有世袭贵族地位。
  书中原文: 给他张罗一个相当于五等文官的宫内侍从的职位，一定要这个年轻人和他一同去彼得堡，并且在他家里住下。
  网络来源: https://www.zhihu.com/question/51327160/answer/2525354025

- 名词: 外交使团
  分类: 概念
  解释: 一国派往另一国或国际组织执行外交任务的官方代表团。在小说中指俄罗斯帝国对外交涉的外交机构或驻外使馆体系。瓦西里公爵通过大臣举荐，为皮埃尔在外交使团中谋求职位，意味着皮埃尔将步入外交官生涯。
  书中原文: 我曾向大臣举荐过你，他在外交使团里给你补了个缺，你当上宫内侍从了。今后在你面前展开了外交的前程。
  网络来源: https://zh.wikipedia.org/zh-hans/%E5%A4%A7%E5%87%BA%E4%BD%BF

- 名词: 炮兵连
  分类: 概念
  解释: 俄语称батарея，俄罗斯帝国军队中炮兵的基本战术单位，相当于步兵的"连"。在拿破仑战争时期俄军每个步兵师配属一个野战炮兵旅，旅下辖若干炮兵连，分为重炮连（装备重型加农炮/榴弹炮）、轻炮连（装备轻型野战炮）和骑炮连（配属骑兵）等类型。
  书中原文: 您派我去图申上尉的炮兵连。我到了那儿，发现三分之二的人和马匹被打死，两门大炮被打坏，什么掩护部队也没有。
  网络来源: https://bbs.napolun.com/thread-37562-1-1.html

- 名词: 代役租金
  分类: 概念
  解释: 俄语称оброк，俄国农奴制下农奴用实物或货币代替劳役向地主缴纳的封建地租形式。起源于13世纪，18世纪后半期至19世纪中叶广泛实行。非黑土区工商业发达地区代役租占优势，农民人身依附关系相对松动。小说中瓦西里公爵扣下了从梁赞庄园寄来的几千卢布代役租金。
  书中原文: 瓦西里公爵所说的"从梁赞寄来一笔款子"，是几千卢布的代役租金，被瓦西里公爵扣下了。
  网络来源: http://euroasia.cssn.cn/kycg/elsls/201905/t20190510_4878676.shtml

- 名词: 狄俄尼索斯
  分类: 概念
  解释: 古希腊神话中的酒神，奥林匹斯十二主神之一，对应罗马神话中的巴克斯。宙斯与塞墨勒之子，掌管葡萄酒、农业、戏剧和宗教狂热。古希腊悲剧起源于对狄俄尼索斯的祭祀庆典。尼采在《悲剧的诞生》中提出"酒神精神"与"日神精神"的二元对立。
  书中原文: "[3] 巴克斯是罗马神话中的酒神，相当于希腊神话中的狄俄尼索斯。"
  网络来源: https://baike.baidu.com/item/%E7%8B%84%E4%BF%84%E5%B0%BC%E7%B4%A2%E6%96%AF/1494985

- 名词: 梯也尔
  分类: 人物
  解释: 路易-阿道夫·梯也尔（1797-1877），法国政治家和历史学家。著有《法国大革命史》（10卷）和《执政府与帝国史》（20卷）。历任七月王朝首相、法兰西第三共和国首任总统（1871-1873）。因残酷镇压巴黎公社而极具争议。在《战争与和平》中被托尔斯泰引用其对俄军英勇表现的评述。
  书中原文: "[27] 梯也尔在提到这次进攻时说：\"俄国人表现得很英勇，这在战争中是少见的，两队步兵互相顽强地厮杀，在决战之前，谁也不肯让步。\"——作者注"
  网络来源: https://baike.baidu.com/item/%E8%B7%AF%E6%98%93-%E9%98%BF%E9%81%93%E5%A4%AB%C2%B7%E6%A2%AF%E4%B9%9F%E5%B0%94

- 名词: 霍霍尔
  分类: 习俗
  解释: 俄语Хохол，本指乌克兰哥萨克人的传统发型——将大部分头发剃光，只在头顶或脑后留下一小绺头发（乌克兰语称"楚布"或"奥塞莱代茨"）。后成为俄罗斯人对乌克兰人的带轻蔑意味的绰号。在列宾名画《扎波罗热哥萨克给苏丹的信》中有清晰描绘。
  书中原文: "[9] \"霍霍尔\"本指头上的一小撮蓬毛，旧时乌克兰人留这种发式，因此成为乌克兰人的绰号，带轻蔑意味。"
  网络来源: https://zh.wikipedia.org/zh-cn/%E9%9C%8D%E9%9C%8D%E5%B0%94
