- 名词: 彼得·基里雷奇
  分类: 人物
  解释: 皮埃尔·别祖霍夫的俄语父名尊称（Пётр Кириллович），俄国贵族社会中对皮埃尔的正式称呼。娜塔莎在莫斯科撤退途中遇见穿车夫长褂的皮埃尔时以此称呼他。
  书中原文: "彼得·基里雷奇，来啊！我们认出您了！真巧！"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十七章

- 名词: 索菲娅·丹尼洛夫娜
  分类: 人物
  解释: 共济会员约瑟夫·阿列克谢耶维奇·巴兹杰耶夫的遗孀。法军逼近莫斯科时，她带着孩子前往托尔若克乡下避难，临行前吩咐仆人照看好已故丈夫的书房和图书。
  书中原文: "目前的局势很紧，索菲娅·丹尼洛夫娜带着孩子到托尔若克乡下去了，大人。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十七章

- 名词: 格拉西姆
  分类: 人物
  解释: 巴兹杰耶夫家的老仆人，面黄无须，身材矮小。五年前曾在托尔若克伴随约瑟夫·阿列克谢耶维奇，为人忠厚沉稳。皮埃尔躲进巴兹杰耶夫空宅时，他负责照料，并协助皮埃尔弄来农民服装和手枪。
  书中原文: "格拉西姆，就是那个五年前皮埃尔在托尔若克见过的、同约瑟夫·阿列克谢耶维奇在一道、面黄无须的小老头应声而出。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十八章

- 名词: 马卡尔·阿列克谢耶维奇
  分类: 人物
  解释: 约瑟夫·阿列克谢耶维奇·巴兹杰耶夫的兄弟，身材高大、秃顶、红鼻子，是一个半疯的嗜酒老人。皮埃尔住在巴兹杰耶夫家时，他屡次好奇地来到书房门口窥视，但又害羞地匆匆走开。
  书中原文: "皮埃尔知道马卡尔·阿列克谢耶维奇是约瑟夫·阿列克谢耶维奇半疯的兄弟，是一个嗜酒如命的人。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十八章

- 名词: 库德林诺
  分类: 地点
  解释: 莫斯科西部的一个历史街区，位于花园环路一带。1812年莫斯科大撤退时，罗斯托夫家的车队经过此地，与从尼基茨卡雅、普雷斯尼亚、波德诺文斯克街方向汇入的其他车队并排行进。
  书中原文: "在库德林诺，从尼基茨卡雅、普雷斯尼亚、波德诺文斯克街，发出几支与罗斯托夫家的车队相似的车队。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十七章；莫斯科城市历史资料

- 名词: 尼基茨卡雅
  分类: 地点
  解释: 莫斯科的一条主要街道（Никитская улица），以附近的尼基塔修道院得名，通往莫斯科市中心。1812年莫斯科大撤退时是居民撤离的重要通道之一。
  书中原文: "在库德林诺，从尼基茨卡雅、普雷斯尼亚、波德诺文斯克街，发出几支与罗斯托夫家的车队相似的车队。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十七章

- 名词: 普雷斯尼亚
  分类: 地点
  解释: 莫斯科西部的一个历史街区（Пресня），位于普雷斯尼亚河畔，今属莫斯科中央行政区。1812年莫斯科大撤退时该区居民纷纷驱车撤离。
  书中原文: "在库德林诺，从尼基茨卡雅、普雷斯尼亚、波德诺文斯克街，发出几支与罗斯托夫家的车队相似的车队。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十七章

- 名词: 波德诺文斯克街
  分类: 地点
  解释: 莫斯科的一条街道（Подновинская улица），位于库德林诺附近。1812年莫斯科撤退时，该街道的居民车队与罗斯托夫家的车队在花园街一带汇合。
  书中原文: "在库德林诺，从尼基茨卡雅、普雷斯尼亚、波德诺文斯克街，发出几支与罗斯托夫家的车队相似的车队。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十七章

- 名词: 花园街
  分类: 地点
  解释: 莫斯科的重要环形街道（Садовая улица），属于花园环线的一部分。1812年莫斯科撤退期间，多条街道的车队在此汇合，形成拥挤的撤离人流。
  书中原文: "来到花园街，两列大车和马车并排向前行进。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十七章

- 名词: 苏哈列夫塔楼
  分类: 地点
  解释: 莫斯科的一座著名历史塔楼（Сухарева башня），高63米，1695至1701年由彼得大帝下令建造，曾设有俄国第一所数学与航海学校及天文台。1934年被斯大林下令拆除。在小说中，罗斯托夫家的车队绕经此塔楼时，娜塔莎认出了穿车夫长褂的皮埃尔。
  书中原文: "绕过苏哈列夫塔楼时，娜塔莎好奇地、迅速地观看坐车和徒步的行人，她突然惊喜地叫起来。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十七章；俄罗斯国家历史博物馆资料

- 名词: 梅先大街
  分类: 地点
  解释: 莫斯科的一条历史街道（Мещанская улица，今和平大街部分路段），意为"市民街"。1812年大撤退时，从这条街驶来的大车和马车阻碍了罗斯托夫家车队的停靠。
  书中原文: "因为从梅先大街又驶来一些大车和马车，向罗斯托夫家的车吆喝，叫他们走动起来。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十七章

- 名词: 三山城门
  分类: 地点
  解释: 莫斯科西郊的历史城门（Трёхгорная застава），通向三山地区。1812年战争期间曾有传闻说俄军将在三山城门外与法军决战，莫斯科居民曾聚集于此准备参战。
  书中原文: "车夫告诉他，今天克里姆林宫在发放武器，明天老百姓全赶到三山城门外，那儿将有一场大战。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十八章；莫斯科历史地理资料

- 名词: 主教塘大街
  分类: 地点
  解释: 莫斯科的一条古老街道（улица Патриаршие Пруды），位于主教塘（Патриаршие пруды）附近。巴兹杰耶夫的遗孀在此处的住宅是皮埃尔藏身的地点，他在这里找到了共济会导师的图书和手稿。
  书中原文: "他雇了他遇到的第一辆马车，吩咐车夫赶到主教塘大街，巴兹杰耶夫的遗孀就住在那儿。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十八章

- 名词: 多罗戈米洛夫桥
  分类: 地点
  解释: 莫斯科西郊横跨莫斯科河的一座桥梁（Дорогомиловский мост），位于多罗戈米洛夫区，是从西面进入莫斯科的重要通道。1812年9月1日至2日夜间，俄军经此桥撤出莫斯科，桥上发生严重拥堵。
  书中原文: "夜间行军的部队不慌不忙，他们缓慢地、庄重地行进着；但是黎明时分，行进的部队来到多罗戈米洛夫桥头……"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十九章；莫斯科桥梁历史资料

- 名词: 多罗戈米洛夫郊区
  分类: 地点
  解释: 莫斯科西郊的一个历史区域（Дорогомилово），位于莫斯科河右岸，邻近多罗戈米洛夫桥。1812年9月2日上午俄军后卫部队最后撤离此地，法军前锋随即进入该区。
  书中原文: "九月二日上午将近十点钟，广阔的多罗戈米洛夫郊区只剩下后卫部队。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十九章

- 名词: 梁赞大路
  分类: 地点
  解释: 莫斯科通往东南方梁赞城（Рязань）的主要道路。库图佐夫在1812年9月1日夜下令俄军经此路撤退，采取迂回机动的方式摆脱法军追击。
  书中原文: "库图佐夫发出命令：俄国军队经由莫斯科向梁赞大路撤退。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十九章

- 名词: 克里姆林宫
  分类: 地点
  解释: 莫斯科中心的历史城堡群（Московский Кремль），俄国历代沙皇的皇宫所在地，内有教堂、宫殿、钟楼等建筑群。1812年战争期间，克里姆林宫曾向平民发放武器，后遭法军占领和部分破坏。
  书中原文: "车夫告诉他，今天克里姆林宫在发放武器，明天老百姓全赶到三山城门外，那儿将有一场大战。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十八章；莫斯科克里姆林宫博物馆资料

- 名词: 苏格兰教律
  分类: 概念
  解释: 共济会苏格兰礼（Scottish Rite）的教律文献，共济会高级仪式体系中的经典文本。皮埃尔在巴兹杰耶夫的书房中找到了附有恩师注释的《苏格兰教律》真本，将其视为珍贵的共济会圣物，并沉浸在对教义的沉思中。
  书中原文: "他在蒙上一层尘土的书桌旁坐下，把手稿摆在面前，时而打开、时而合上，终于把手稿推开，用手托着头，沉思起来。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十八章；共济会苏格兰礼历史资料

- 名词: 莫斯科大撤退
  分类: 事件
  解释: 1812年9月14日（俄历9月2日）俄军与莫斯科居民大规模撤离的历史事件。库图佐夫在波罗金诺战役后为保存实力做出弃城决策，俄军经多罗戈米洛夫桥撤往梁赞方向，大量平民随军离开，导致拿破仑进入莫斯科时面对的几乎是一座空城。
  书中原文: "库图佐夫发出命令：俄国军队经由莫斯科向梁赞大路撤退。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十九章；俄罗斯1812年卫国战争史

- 名词: 车夫长褂
  分类: 物件
  解释: 19世纪俄国马车夫常穿的一种长身外套，粗布制成，形似长袍。皮埃尔为隐藏贵族身份、混入平民中执行刺杀拿破仑的计划，特意让格拉西姆弄来一件车夫长褂换上，结果被娜塔莎在街上认出。
  书中原文: "皮埃尔穿上格拉西姆弄来的、蒸洗过的车夫的长衫，跟格拉西姆一起到苏哈列夫塔楼去买手枪的路上，遇见了罗斯托夫一家人。"
  网络来源: 托尔斯泰《战争与和平》第三卷第三部第十八至十九章；19世纪俄国服饰资料
