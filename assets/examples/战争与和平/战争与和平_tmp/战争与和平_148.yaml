- 名词: 玛夫拉·库兹米尼什娜
  分类: 人物
  解释: 罗斯托夫伯爵家的女管家，一位善良忠厚的老太婆。在莫斯科撤退前夕，她受娜塔莎之托安排伤员入院，并将受伤的安德烈·博尔孔斯基公爵迎进罗斯托夫家的院子安置。
  书中原文: 玛夫拉·库兹米尼什娜叫我来的，运来了一些伤员，都是军官，您答应吗？……玛夫拉·库兹米尼什娜把伤员让进罗斯托夫家的院子。她认为这个伤员准是个非常重要的人物。
  网络来源: https://read.lmeee.com/reader/b8jn63/2b5egx0

- 名词: 拉斯托普钦
  分类: 人物
  解释: 费奥多尔·瓦西里耶维奇·拉斯托普钦（1763-1826），1812年拿破仑入侵俄国时任莫斯科总督。他在小说中发布传单号召民众保卫莫斯科，在法军逼近时其命令矛盾混乱，托尔斯泰通过这个人物批判了英雄史观。
  书中原文: 拉斯托普钦在他的传单里虽然说两三天内要发出号令，但是已经有了确实的命令，明天全体居民就拿着武器前赴三山
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9627

- 名词: 克里姆林宫
  分类: 地点
  解释: 位于莫斯科市中心的著名城堡建筑群，俄国的政治和宗教中心。文中提到老百姓在克里姆林宫领枪支准备抵抗法军。
  书中原文: 今天老百姓都在克里姆林宫领枪支
  网络来源: https://baike.baidu.com/item/%E5%85%8B%E9%87%8C%E5%A7%86%E6%9E%97%E5%AE%AB

- 名词: 肉商街
  分类: 地点
  解释: 莫斯科的一条历史街道，因集中肉铺而得名。文中肖斯太太经过时看到酒店里有醉汉闹事的混乱场面。
  书中原文: 在肉商街一家酒店见到的情景
  网络来源: https://wapbaike.baidu.com/item/%E4%BF%84%E6%B3%951812%E5%B9%B4%E6%88%98%E4%BA%89/1935378

- 名词: 戈贝兰地毯
  分类: 物件
  解释: 法国戈贝兰皇家工坊生产的贵重挂毯和地毯，以精美的编织工艺和绘画性设计闻名，是欧洲宫廷和贵族收藏的奢侈品。罗斯托夫家收藏有这种贵重地毯。
  书中原文: 伯爵家里有贵重的戈贝兰地毯
  网络来源: https://www.britannica.com/topic/Gobelin-family

- 名词: 波斯地毯
  分类: 物件
  解释: 产自波斯（今伊朗）的传统手工编织地毯，以精美的花纹图案和高质量著称，历来是欧洲贵族收藏的贵重物品。
  书中原文: 伯爵家里有贵重的戈贝兰地毯和波斯地毯
  网络来源: https://baike.baidu.com/item/%E6%B3%A2%E6%96%AF%E5%9C%B0%E6%AF%AF

- 名词: 萨克森瓷器
  分类: 物件
  解释: 指德国萨克森地区迈森（Meissen）工坊生产的硬质瓷器，是欧洲最早成功烧制的硬质瓷器，被誉为"白色黄金"，价值昂贵。罗斯托夫家将其作为高级餐具使用。
  书中原文: 这个放到地毯里。她是说萨克森的盘子
  网络来源: https://zh.wikipedia.org/zh-cn/%E6%A2%85%E6%A3%AE%E7%93%B7%E5%99%A8

- 名词: 弗拉基米尔勋章
  分类: 物件
  解释: 俄罗斯帝国勋章，1782年由女皇叶卡捷琳娜二世设立，共分四级，授予文武官员以表彰战功或其他功绩，获颁者可享受世袭贵族权利。文中贝格上校佩戴此勋章。
  书中原文: 已经是挂着两枚勋章（弗拉基米尔和安娜勋章）的上校
  网络来源: https://baike.baidu.com/item/%E4%BF%84%E5%9B%BD%E5%8B%8B%E7%AB%A0

- 名词: 安娜勋章
  分类: 物件
  解释: 俄罗斯帝国勋章，1735年由石勒苏益格-荷尔斯泰因公爵卡尔·腓特烈为纪念妻子安娜·彼得罗夫娜而设立，1797年纳入俄国勋章体系，分四级，表彰文武官员。文中贝格上校佩戴此勋章。
  书中原文: 已经是挂着两枚勋章（弗拉基米尔和安娜勋章）的上校
  网络来源: https://www.wikiwand.com/zh/articles/Order_of_Saint_Anna

- 名词: 莫斯科大撤退
  分类: 事件
  解释: 1812年拿破仑军队逼近莫斯科时，俄军统帅库图佐夫决定放弃莫斯科以保存实力，俄军和大部分居民撤离的历史事件。俄军坚壁清野，最终导致法军在莫斯科空城中补给耗尽而惨败撤退。
  书中原文: 看样子，谁也不明白莫斯科将会怎么样。这一天的物价也标志着时局。武器、黄金、车马不断涨价，而纸币和城市的用品则不断跌价
  网络来源: https://wapbaike.baidu.com/item/%E4%BF%84%E6%B3%951812%E5%B9%B4%E6%88%98%E4%BA%89/1935378

- 名词: 罗斯托夫家撤离莫斯科
  分类: 事件
  解释: 1812年法军逼近莫斯科时，罗斯托夫伯爵一家匆忙收拾贵重物品准备撤离的过程。其间娜塔莎说服父母腾出马车运送伤员，体现了罗斯托夫家族在国难当头时的善良与慷慨。
  书中原文: 罗斯托夫一家人兴高采烈地忙着包扎东西，做动身的准备。
  网络来源: https://read.lmeee.com/reader/b8jn63/2b5egx0

- 名词: 玛特廖娜·季莫费耶夫娜
  分类: 人物
  解释: 罗斯托夫伯爵夫人做姑娘时的侍女，在故事中已成为伯爵夫人身边掌管事务的贴身女仆，负责向伯爵夫人汇报家中情况和执行夫人的指令。
  书中原文: 曾作过伯爵夫人的侍女、现时为她执行宪兵司令职务的玛特廖娜·季莫费耶夫娜
  网络来源: https://book.douban.com/annotation/133985827/

- 名词: 瓦西里奇
  分类: 人物
  解释: 罗斯托夫伯爵家的管家（餐厅侍者兼管家），负责指挥仆人收拾行装、安排车辆等事务，是伯爵信赖的老仆。
  书中原文: 瓦西里奇，都准备好了吗？……管家站在台阶旁跟一个老勤务兵和一个胳膊绑着绷带、面色苍白的青年军官谈话
  网络来源: https://read.lmeee.com/reader/b8jn63/2b5egx0
