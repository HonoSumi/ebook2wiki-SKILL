- 名词: 塔鲁丁诺
  分类: 地点
  解释: |
    俄罗斯卡卢加州的一个村庄，位于莫斯科以南约80公里处。1812年俄法战争中具有重要战略意义的地点。俄军在波罗金诺战役后放弃莫斯科，撤退至塔鲁丁诺附近扎营，切断了拿破仑通往俄国南部粮食产区的路线。俄军在塔鲁丁诺休整一个月后力量对比发生转变，并于1812年10月18日（俄历10月6日）在此击败缪拉率领的法军，史称塔鲁丁诺战役，这是拿破仑侵俄战争的一个重要转折点。
  书中原文: |
    军队由于无数千差万别的力量互相作用的结果到达塔鲁丁诺后，人们才自信地说，他们本来就是这样想的，早就预见到这一点了。
  网络来源: |
    https://en.wikipedia.org/wiki/Battle_of_Tarutino
- 名词: 洛里斯顿
  分类: 人物
  解释: |
    雅克·亚历山大·伯纳德·劳，洛里斯顿侯爵（Jacques Alexandre Bernard Law, marquis de Lauriston，1768—1828），法国军官、外交官、法国元帅。拿破仑战争期间的重要将领，曾任拿破仑的副官和驻俄罗斯大使。1811年担任驻俄大使期间，负责与沙皇亚历山大一世的外交沟通。1812年拿破仑入侵俄国失败后，被派往库图佐夫军营求和谈判，反映了法军行将灭亡的困境。其名字刻在巴黎凯旋门上。
  书中原文: |
    法国军队这只受伤的野兽的呻吟，是洛里斯顿被派到库图佐夫的营地求和，这是它行将灭亡的一个暴露。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E9%9B%85%E5%85%8B%C2%B7%E5%8A%B3%E9%87%8C%E6%96%AF%E9%A1%BF
- 名词: 卡卢加
  分类: 地点
  解释: |
    俄罗斯欧洲部分中部城市，卡卢加州首府，位于奥卡河畔，西南距莫斯科约188公里。始建于14世纪，历史上曾是莫斯科公国西南边境的重要边防堡垒。在1812年俄法战争中具有关键战略意义——卡卢加省是俄军给养的主要存放地，粮秣充足，库图佐夫率军转移到塔鲁丁诺的决策在很大程度上是为了靠近卡卢加的物资补给线。卡卢加也是苏联航天之父齐奥尔科夫斯基长期居住和工作的地方，被誉为俄罗斯的"航天摇篮"。
  书中原文: |
    军队给养主要集中在奥卡河沿岸的图拉和卡卢加省，如果向下城撤退，给养存放地就要被宽阔的奥卡河隔断，而初冬季节河运是不通的。
  网络来源: |
    https://baike.baidu.com/item/%E5%8D%A1%E5%8D%A2%E5%8A%A0/8251070
- 名词: 托尔班琴
  分类: 物件
  解释: |
    乌克兰拨弦乐器，又称乌克兰西奥伯琴，约1700年出现。融合了巴洛克鲁特琴和索尔特里琴的特点，琴弦数量25至60根不等，在高音一侧有额外的短高音弦（prystrunky）。制作昂贵，演奏技术难度高，被视为乌克兰贵族的乐器。在《战争与和平》中出现在军官在前哨线外举办的舞会上，与士兵舞曲一同响起，展现了当时俄国贵族军官对乌克兰民间音乐文化的接纳。
  书中原文: |
    "在草地上……在草地上！"呼哨声和托尔班琴琴声伴着舞曲，时不时地被喊叫声淹没。
  网络来源: |
    https://www.encyclopediaofukraine.com/display.asp?linkpath=pages%5CT%5CO%5CTorbanIT.htm
- 名词: 奥卡河
  分类: 地点
  解释: |
    俄罗斯欧洲部分的主要河流，伏尔加河右岸最大支流，长约1500公里，流域面积约24.5万平方公里。发源于中俄罗斯丘陵，流经奥廖尔、卡卢加、科洛姆纳、梁赞等重要城市，在下诺夫哥罗德注入伏尔加河。莫斯科河是其左岸支流之一，因此奥卡河水系对莫斯科地区至关重要。1812年俄法战争中，奥卡河成为俄军给养运输的关键地理屏障——向下城撤退会被宽阔的奥卡河隔断补给线，这是促使俄军转向南进的重要因素。
  书中原文: |
    军队给养主要集中在奥卡河沿岸的图拉和卡卢加省，如果向下城撤退，给养存放地就要被宽阔的奥卡河隔断，而初冬季节河运是不通的。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E5%A5%A5%E5%8D%A1%E6%B2%B3
- 名词: 波多尔斯克
  分类: 地点
  解释: |
    俄罗斯莫斯科州城市，位于莫斯科以南约30公里处的帕赫拉河畔。起源于18世纪莫斯科丹尼洛夫修道院管辖下的波多尔村，1781年正式获得城市地位。在1812年俄法战争中，俄军渡过帕赫拉河向图拉大路进发时，曾计划在波多尔斯克停留休整，但最终因战局变化继续向南转移至塔鲁丁诺。苏联时期成为重要工业中心，设有俄罗斯国防部中央档案馆。
  书中原文: |
    神速地渡过帕赫拉河向图拉大路进发的时候，俄军的司令官们打算在波多尔斯克停下来，并没有考虑塔鲁丁诺阵地。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E6%B3%A2%E5%A4%9A%E5%88%A9%E6%96%AF%E5%85%8B
- 名词: 谢尔普霍夫
  分类: 地点
  解释: |
    俄罗斯莫斯科州城市，位于莫斯科以南约99公里处的奥卡河畔，建城于1339年。历史上长期作为莫斯科公国南部的军事要塞，拱卫莫斯科免受南方侵袭。在1812年俄法战争中，法军曾分出一支部队攻占谢尔普霍夫，威胁图拉的兵工厂和莫斯科以南的交通线，引起俄军统帅部的极大忧虑。城内保留大量16至19世纪的修道院和教堂等历史建筑。
  书中原文: |
    谢尔普霍夫已经被敌人一支部队占领，图拉及其著名的、为军队不可缺少的兵工厂也面临危机。
  网络来源: |
    https://baike.baidu.com/item/%E8%B0%A2%E5%B0%94%E6%99%AE%E9%9C%8D%E5%A4%AB/3083444
- 名词: 兰斯科伊
  分类: 人物
  解释: |
    米哈伊尔·兰斯科伊（Mikhail Lanskoy，约1787—1836），俄国将军，1812年俄法战争期间参与后勤供应工作。在菲利的军事会议后，曾以管理粮秣官员的身份向库图佐夫报告军队给养主要集中在奥卡河沿岸的图拉和卡卢加省，指出若向下城撤退则会被宽阔的奥卡河隔断给养运输线。这一报告成为俄军放弃直趋下城的想法、转而向图拉和卡卢加方向转移的关键因素之一，对俄军著名的侧翼进军决策起到了重要影响。
  书中原文: |
    兰斯科伊向总司令报告说，军队给养主要集中在奥卡河沿岸的图拉和卡卢加省，如果向下城撤退，给养存放地就要被宽阔的奥卡河隔断，而初冬季节河运是不通的。
  网络来源: |
    https://rusmuseumvrm.ru/data/collections/drawings/r_13128/?lang=en
