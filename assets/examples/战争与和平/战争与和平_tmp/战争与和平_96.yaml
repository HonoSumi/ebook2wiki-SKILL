- 名词: 可怜的丽莎
  分类: 物件
  解释: |
    俄国作家尼古拉·米哈伊洛维奇·卡拉姆津创作于1792年的感伤主义中篇小说，被视为俄国感伤主义文学的奠基之作。小说讲述农家姑娘丽莎爱上贵族青年埃拉斯特，最终被抛弃后投湖自尽的悲剧故事，体现了"连农妇也懂得爱人"的人文关怀。
  书中原文: |
    鲍里斯给她朗诵《可怜的丽莎》[6]，好几次中断了朗诵，因为他激动得透不过气来。
  网络来源: |
    https://baike.baidu.com/item/%E5%8F%AF%E6%80%9C%E7%9A%84%E4%B8%BD%E8%8E%8E/22631705

- 名词: 奔萨
  分类: 地点
  解释: |
    俄罗斯欧洲部分中南部城市，奔萨州首府，位于伏尔加河支流苏拉河畔，距莫斯科约625公里。1663年建为防御要塞，18世纪发展为区域行政中心。是俄国文学评论家别林斯基和诗人莱蒙托夫的故乡。
  书中原文: |
    陪送奔萨省两处田庄和下城森林。
  网络来源: |
    https://baike.baidu.com/item/%E5%A5%94%E8%90%A8/2449392

- 名词: 伊韦尔小教堂
  分类: 地点
  解释: |
    位于莫斯科红场入口处复活门旁的东正教小教堂，供奉来自希腊阿索斯山伊维尔修道院的伊维尔圣母显灵圣像。历代沙皇进入克里姆林宫前必在此祈祷，是莫斯科重要的宗教和历史地标。苏联时期被拆除，1994-1996年重建。
  书中原文: |
    明天我带她们去伊韦尔小教堂，然后顺便到奥贝尔-夏尔姆时装店去一趟。
  网络来源: |
    https://zh.wikipedia.org/zh-hk/%E4%BC%8A%E4%BC%AF%E5%88%A9%E4%BA%9E%E9%96%80%E5%92%8C%E7%A6%AE%E6%8B%9C%E5%A0%82

- 名词: 奥贝尔-夏尔姆
  分类: 物件
  解释: |
    19世纪莫斯科的一家法国时装店，店主为奥贝尔-夏尔姆太太（Madame Aubert-Chalmet）。托尔斯泰在《战争与和平》中以谐音双关暗示其"厚颜无耻"（Over-Shameless），反映当时俄国贵族崇尚法国时尚的文化风气。
  书中原文: |
    然后顺便到奥贝尔-夏尔姆时装店去一趟。
  网络来源: |
    未检索到网络资料

- 名词: 监护委员会
  分类: 概念
  解释: |
    俄罗斯帝国时期的官方慈善监护机构，隶属于 Empress Maria 慈善教育机构管理局（Ведомство учреждений императрицы Марии），管理孤儿院、寡妇与孤儿财产托管、慈善救助等事务，被视为秩序井然、安全可靠的象征。
  书中原文: |
    在我这儿就像在监护委员会一样安全。
  网络来源: |
    https://library.bgc.bard.edu/articles/edsdoj__edsdoj.10629b1068de477b92b2b9d1b549dbfa
