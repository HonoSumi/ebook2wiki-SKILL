- 名词: 图申
  分类: 人物
  解释: 列夫·托尔斯泰《战争与和平》中的炮兵上尉，身材矮小、动作笨拙，但在申格拉本战役中表现出非凡的勇气和指挥才能。他带领四门大炮独自奋战，击退法军多次进攻，为俄军主力撤退赢得了宝贵时间。是托尔斯泰笔下"朴素英雄主义"的典型代表。
  书中原文: 小个子图申，动作无力而且笨拙，他不断要求勤务兵为了这一炮再装一袋烟，他一边往前跑，一边从烟袋锅里撒着火星，把小手搭在脑门上观望法国人。
  网络来源: https://baijiahao.baidu.com/s?id=1665309293571912083

- 名词: 邦达尔丘克
  分类: 人物
  解释: 列夫·托尔斯泰《战争与和平》中的一个次要角色，保罗格勒骠骑兵团的一名骠骑兵。在申格拉本战役的骑兵冲锋中，他从后面追上受伤的尼古拉·罗斯托夫，骑马从他身旁绕过。是一个用于丰富战争场景真实感的次要人物。
  书中原文: 一个熟识的骠骑兵邦达尔丘克从后面追上来，气愤地看了看他。邦达尔丘克的马向旁边一闪，从他身旁绕了过去。
  网络来源: https://www.processon.com/view/6110d9796376891eb94f5f24

- 名词: 尼基琴科
  分类: 人物
  解释: 列夫·托尔斯泰《战争与和平》中的一个次要角色，保罗格勒骠骑兵团的一名士兵。在申格拉本战役中，他在骑兵冲锋时奔驰在尼古拉·罗斯托夫的前面，后来从罗斯托夫身边离开。是一个用于丰富战争场景真实感的次要人物。
  书中原文: 在前面驰骋的士兵尼基琴科离开了他，罗斯托夫如在梦中似的，觉得他仍然风驰电掣地奔驰，同时又觉得停留原地不动。
  网络来源: https://www.bilibili.com/video/BV1gb411L75K/

- 名词: 埃科诺莫夫
  分类: 人物
  解释: 列夫·托尔斯泰《战争与和平》中的一个次要角色，俄军少校。在申格拉本战役结束后，他与团长一同站在桥边检视撤退的连队。是小说中用于丰富军事指挥体系背景的次要军官角色。
  书中原文: 团长和埃科诺莫夫少校站在桥边，从他们面前走过撤退的连队。
  网络来源: https://www.processon.com/view/6110d9796376891eb94f5f24

- 名词: 申格拉本
  分类: 地点
  解释: 奥地利境内的一座村庄（德文名Schöngrabern），1805年11月俄法战争期间在此爆发了申格拉本战役。俄军指挥官巴格拉季翁公爵率领约4000-7300人的部队在此阻击法军缪拉元帅率领的优势兵力，成功掩护库图佐夫率领的俄军主力撤退。这场战役是《战争与和平》第一卷第二部的核心战争场景。
  书中原文: 巴格拉季翁公爵走后不久，图申就把申格拉本村轰得起火了。
  网络来源: https://bbs.napolun.com/thread-27924-1-7.html

- 名词: 高筒帽
  分类: 物件
  解释: 拿破仑战争时期法国军队佩戴的平顶高筒军帽，法文称为Shako。特点为高筒圆柱形，配有帽檐，顶部常有羽饰或绒球，正面饰有金属徽章。1800年起成为法军制式头饰，取代了之前的双角帽。材质由厚重的毡和皮革制成，具有一定的防护作用。
  书中原文: 在这些人前面跑着的一个人，戴着奇怪的高筒帽，穿着蓝大衣，晒得黑黑的，长着鹰钩鼻。
  网络来源: https://en.wikipedia.org/wiki/Shako

- 名词: 蓝大衣
  分类: 物件
  解释: 拿破仑战争时期法国军队的标准军服外套，以深蓝色为主色调。拿破仑时代的法国陆军制服以蓝色为主色，搭配白色衬底和红色衣领袖口，设计华丽。这种蓝色军服传统一直延续到第一次世界大战时期。
  书中原文: 在这些人前面跑着的一个人，戴着奇怪的高筒帽，穿着蓝大衣，晒得黑黑的，长着鹰钩鼻。
  网络来源: https://www.zhihu.com/question/28148838/answer/2009761136

- 名词: 生与死的线
  分类: 概念
  解释: 托尔斯泰在《战争与和平》中创造的哲学意象，指战场上将敌对双方分隔开的那条无形的心理界限。这条线既是物理空间上的战线，也是心理上已知与未知、生与死之间的分界线。越过这条线意味着面对不可知的死亡威胁，体现了托尔斯泰对战争心理的深刻洞察。
  书中原文: 中间横着一条不可知和恐怖的可怕的线，好像是一条生与死的线，把敌我双方分隔开来。
  网络来源: https://m.zhangyue.com/readbook/12516377/41.html

- 名词: 士气动摇
  分类: 概念
  解释: 军事术语，指军队在作战过程中因遭受重大打击或面临危险而产生恐惧、犹豫、混乱等心理状态，导致战斗意志下降和组织纪律松弛的现象。士气是决定战争胜负的关键因素之一，动摇的士气可能引发溃败，而坚定的士气可以帮助部队克服不利局面。
  书中原文: 现在到了决定胜负的士气动摇的时刻：这些溃乱的士兵是听从指挥员的话呢，还是不理会他继续往前跑。
  网络来源: https://wap.cnki.net/touch/web/Journal/Article/XLKX200701029.html

- 名词: 老鹰捉小鸡
  分类: 习俗
  解释: 中国传统的民间儿童游戏，起源于民间，广泛流行于全国。一人扮演"老鹰"，一人扮演"鸡妈妈"，其余人扮演"小鸡"排成纵队躲在鸡妈妈身后。老鹰需设法抓住小鸡，鸡妈妈则张开双臂保护。游戏中需要奔跑和躲闪，锻炼儿童的反应能力和团队合作精神。在本章中用作比喻罗斯托夫逃跑时的速度。
  书中原文: 他迅速地逃过田埂，使用他在玩老鹰捉小鸡时所使用的奔跑速度，在田野上狂奔，不时扭转着他那苍白、善良、年轻的脸，一股恐惧的冷气掠过他的背脊。
  网络来源: https://baike.baidu.com/item/%E8%80%81%E9%B9%B0%E6%8D%89%E5%B0%8F%E9%B8%A1/8487235

- 名词: 炮兵连
  分类: 概念
  解释: 炮兵的基本作战单位，拿破仑战争时期通常配备6-8门火炮及约120名炮手，由一名上尉指挥。在《战争与和平》中，图申上尉指挥的炮兵连在申格拉本战役中以四门孤立无援的大炮顽强抵抗法军，用霰弹击退法军多次进攻，成为战役中的关键力量。
  书中原文: 图申的炮兵连被遗忘了，直到战事将要结束，而中央阵地的炮声仍然轰轰隆隆，巴格拉季翁公爵才派值勤校官到那里。
  网络来源: https://www.zhihu.com/question/619494178

- 名词: 军刀
  分类: 物件
  解释: 骑兵和军官使用的一种单刃或双刃的冷兵器，适合劈砍和刺杀。在拿破仑战争时期，军刀是骑兵的主要武器，重骑兵多使用直刃长剑用于刺击，轻骑兵（如骠骑兵）多使用弧刃马刀用于砍击。军刀也是军官身份和权威的象征。
  书中原文: 他手中握着军官的军刀。这个士兵面色苍白，一对蓝眼睛大胆地望着团长的脸，而嘴角却含着微笑。
  网络来源: https://zhuanlan.zhihu.com/p/28720215

- 名词: 刺刀
  分类: 物件
  解释: 安装在步枪枪管前端的冷兵器，用于近距离白刃战。在拿破仑战争时期，套筒式刺刀（Socket Bayonet）是主流类型。刺刀虽然在战场上实际造成的伤亡比例不高，但其心理威慑力极大，密集的刺刀冲锋往往能使敌军士气崩溃而溃退。
  书中原文: '我受了刺刀伤不下火线。请您记住，大人。'
  网络来源: https://bbs.napolun.com/thread-30011-1-4.html

- 名词: 战利品
  分类: 概念
  解释: 作战时从敌方缴获的武器、装备、旗帜等物品。在军事传统中，战利品既是个人战功的证明，也是军队战果的实物证据。在《战争与和平》中，多洛霍夫将从法军缴获的军刀和子弹盒作为战利品向团长展示，以证明自己的战功。
  书中原文: '大人，这是两件战利品，多洛霍夫指着法国军刀和子弹盒，说我俘虏了一个军官。我拦住了逃跑的连队。'
  网络来源: https://wapbaike.baidu.com/item/%E6%88%98%E5%88%A9%E5%93%81/9986802

- 名词: 后援部队
  分类: 概念
  解释: 军事术语，指在作战序列中处于后方、负责提供支援和接应的部队。后援部队的任务包括增援前线作战部队、补充兵力损耗、保障后勤补给以及在必要时接应撤退部队。在战场上，后援部队的及时到达往往能扭转战局。
  书中原文: 后援部队已经赶到，逃兵都停住了脚步。团长和埃科诺莫夫少校站在桥边，从他们面前走过撤退的连队。
  网络来源: https://www.zdic.net:443/hant/%e5%be%8c%e6%8f%b4

- 名词: 被俘
  分类: 事件
  解释: 军人在战争中被敌方俘虏成为战俘的状态。根据1949年《日内瓦第三公约》，战俘享有受到人道待遇、获得充足饮食和医疗照顾、与家人通信等基本权利。在《战争与和平》中，罗斯托夫目睹一名俄国骠骑兵被法军俘虏，随后自己也陷入即将被俘的恐惧中。
  书中原文: 在后面的戴高筒帽的人们中间，有一个俄国骠骑兵。人们捉住他的胳膊，后面有人牵着他的马。"这一定是我们的人被俘了……"
  网络来源: https://www.icrc.org/zh/law-and-policy/protected-persons-prisoners-war-and-detainees

- 名词: 撤退
  分类: 事件
  解释: 军事术语，指军队放弃所占领的阵地或地区，有组织地向后转移的作战行动。撤退是防御的继续，也是一种兵力机动方式，核心目的在于保存力量、争取主动、待机破敌。在《战争与和平》的申格拉本战役中，俄军完成阻击任务后组织撤退，炮兵连奉命尽速撤离战场。
  书中原文: 巴格拉季翁公爵才派值勤校官到那里，接着又把安德烈公爵派了去，命令炮兵连尽速撤退。
  网络来源: https://baike.baidu.com/item/%E6%92%A4%E9%80%80/11043018

- 名词: 冲锋
  分类: 事件
  解释: 军事战术术语，指战斗人员以最快速度向敌人推进，试图进行决定性近距离战斗的进攻机动。在拿破仑战争时期，骑兵冲锋是典型的战术手段，骑兵排成密集队形以马刀或长矛向敌军发起冲击，利用马匹的动能和速度突破敌阵。冲锋是历史上许多战斗的关键时刻。
  书中原文: 他觉得享受一下冲锋的快乐的时机终于来到，这种快乐，他从骠骑兵同事们那里曾经多次听说过。
  网络来源: https://zh.wikipedia.org/zh-my/%E8%A1%9D%E9%8B%92
