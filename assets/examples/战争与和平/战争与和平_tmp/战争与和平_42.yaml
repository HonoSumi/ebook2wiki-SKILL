- 名词: 鲍里斯·德鲁别茨科伊
  分类: 人物
  解释: 托尔斯泰《战争与和平》中的人物，全名鲍里斯·德鲁别茨科伊，是安娜·米哈伊洛夫娜·德鲁别茨卡娅公爵夫人的独生子。出身没落名门贵族，自幼在罗斯托夫家长大，与尼古拉·罗斯托夫是童年好友。他精明世故、善于钻营，一心结交权贵谋求军职攀升，是小说中贵族社会投机者的典型代表。后娶富有的女继承人朱莉·卡拉金娜为妻。
  书中原文: 鲍里斯·德鲁别茨科伊是罗斯托夫的童年朋友，近卫军军官。鲍里斯以他特有的精细用又白又细的手把小卒摞成小金字塔形，他望着贝格的脸，等待对手走棋，看来他是在想那盘棋，因为他向来只想他正在做的事情。
  网络来源: https://book.douban.com/review/15253782/
- 名词: 巴格拉季翁公爵
  分类: 人物
  解释: 托尔斯泰《战争与和平》中的人物，原型为历史人物彼得·伊万诺维奇·巴格拉季昂（1765-1812），出身格鲁吉亚王族，是拿破仑战争时期俄国著名将领。小说中他被塑造为沉稳、勇猛而寡言的统帅形象，以自身存在赋予部下信心和勇气，体现了托尔斯泰对理想统帅的理解。1805年申格拉本战役中以少胜多掩护俄军主力撤退。
  书中原文: 在父母的信中，附有一封致巴格拉季翁公爵的介绍信，这是老伯爵夫人依照安娜·米哈伊洛夫娜的忠告，托熟人弄来寄给儿子的。
  网络来源: https://baike.baidu.com/item/彼得·伊万诺维奇·巴格拉季昂
- 名词: 副官
  分类: 概念
  解释: 军队中各级指挥官身边协助处理日常军务、传达命令、管理内务和文书的助手职务。在俄国军队中，副官（адъютант）最早出现在17世纪下半叶，1716年《陆军条令》正式确立此职位。分为高级副官、团级副官、营级副官等，是高级军官的直属助理，相当于长官的秘书兼传令官。
  书中原文: 昨天我才托一个熟人——库图佐夫的副官博尔孔斯基把信转给你。他没想到他这么快就把信送到了。
  网络来源: https://zh.wiktionary.org/zh-hans/адъютант
- 名词: 连长
  分类: 概念
  解释: 军队中连一级编制的最高指挥员，负责组织连队的日常训练、管理、作战指挥，是连接上级指挥部与基层士兵的桥梁。连通常由3至6个排组成，人数约80至150人。在19世纪俄国军队中，连长通常由上尉或中尉担任，是军队基层的核心指挥官。
  书中原文: 在行军中取得连长职务的贝格，由于他的勤勉和细心，已经博得长官的信任，他在处理自己的钱财方面也很有办法。
  网络来源: https://baike.sogou.com/v116324.htm
- 名词: 伊兹梅尔团
  分类: 地点
  解释: 全称伊兹梅尔近卫军团（Измайловский лейб-гвардии полк），俄罗斯帝国近卫军中第三支成立的步兵近卫团，1730年由女皇安娜·伊万诺夫娜下令组建，以莫斯科郊外的皇家庄园伊兹梅洛沃村命名。参与了拿破仑战争等多次重大战役，在1812年卫国战争中表现出色，被授予圣乔治军旗。该团在圣彼得堡的营房建筑群至今仍是著名历史地标。
  书中原文: 他驰到伊兹梅尔团营地时，心里想，他要使鲍里斯和他的同事看见他这副久经沙场的战斗的骠骑兵的神气大吃一惊。
  网络来源: https://encspb.ru/object/2855704851
- 名词: 圣乔治十字勋章
  分类: 物件
  解释: 俄罗斯帝国最重要的军事英勇勋章之一，1807年由沙皇亚历山大一世设立，专门授予在战斗中表现英勇的士兵、士官和下级军官。勋章为十字架形状，正面为圣乔治骑马屠龙图案，绶带为橙黑相间（象征硝烟与火焰）。分四个等级（一二级金质、三四级银质），获得者享有终身养老金。1917年十月革命后被废除，1992年俄罗斯联邦恢复。
  书中原文: 罗斯托夫没有回答，他抖了抖系在军服滚绦上的士兵圣乔治十字勋章，指了指他那扎着绷带的胳膊，微笑着看了看贝格。
  网络来源: https://baike.baidu.com/item/乔治十字勋章/19341970
- 名词: 引进信
  分类: 习俗
  解释: 即介绍信，是19世纪俄国贵族社会中一种重要的社交文书。通过有影响力的熟人撰写的推荐信，年轻贵族可以在军队或宫廷中获得更好的职位和机会。在当时的俄国社会，拥有有力的人脉关系往往比个人能力更为重要，引进信是上流社会网络运作的关键工具之一。
  书中原文: 在父母的信中，附有一封致巴格拉季翁公爵的介绍信，这是老伯爵夫人依照安娜·米哈伊洛夫娜的忠告，托熟人弄来寄给儿子的。老伯爵夫人嘱咐他务必送到地方，好好利用它。
  网络来源: https://drouot.com/zh/l/30981484
- 名词: 加夫里洛
  分类: 人物
  解释: 《战争与和平》中的仆人角色，属于罗斯托夫家的下人。在本书第42章中，他是被尼古拉·罗斯托夫派去买酒的老仆。此外书中还有另一位同名的加夫里洛，是玛丽亚·德米特里耶夫娜·阿赫罗西莫娃的跟班，身材魁梧，曾在阿纳托利·库拉金企图诱拐娜塔莎的关键情节中阻拦对方。
  书中原文: 派加夫里洛打酒去吧！好，咱们喝他一杯！
  网络来源: https://book.douban.com/review/15253782/
- 名词: 皇太子
  分类: 概念
  解释: 俄国对沙皇王位继承人的称谓。1721年彼得大帝改称皇帝后，原泛称所有皇子的"察列维奇（Царевич）"逐渐停用，1797年保罗一世通过继承法正式以"沙皇太子（Цесаревич）"作为继承人的专属头衔。在《战争与和平》所描写的拿破仑战争时期，俄国皇太子即未来的亚历山大一世（当时为保罗一世之子），在军中具有重要影响力。
  书中原文: 你知道，皇太子骑着马经常跟着我们的团，因此我们到处得到方便，占尽了便宜。
  网络来源: https://zh.m.wikipedia.org/wiki/察列维奇
