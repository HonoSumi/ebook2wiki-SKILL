- 名词: 娜塔莎·罗斯托娃
  分类: 人物
  解释: 托尔斯泰《战争与和平》女主角，罗斯托夫伯爵次女，全名娜塔莉娅·伊里尼奇娜·罗斯托娃。热情活泼、天真浪漫，从天真少女历经爱情甜蜜与背叛、战争残酷，最终蜕变为贤妻良母。
  书中原文: 娜塔莎满怀喜悦地望着那张熟悉的皮埃尔的面孔，也就是佩龙斯卡娅称为插科打诨的小丑的面孔，她知道皮埃尔在人群中是在找她们，特别是在找她。皮埃尔答应她来参加舞会，并且给她介绍舞伴。
  网络来源: https://baike.baidu.com/item/娜塔莎·罗斯托娃/15143141
- 名词: 索尼娅
  分类: 人物
  解释: 罗斯托夫伯爵夫人的侄女，自幼父母双亡被罗斯托夫家收养。深爱表哥尼古拉·罗斯托夫，但因无陪嫁最终放弃爱情，成全尼古拉与玛丽亚的婚姻，成为全书最令人同情的角色之一。
  书中原文: 索尼娅关上门。一分钟后，让伯爵进来了。他穿着蓝色燕尾服，长袜浅鞋，喷了香水，擦了头油。
  网络来源: https://blog.sina.com.cn/s/blog_633b67d70102yyd7.html
- 名词: 伊利亚·罗斯托夫伯爵
  分类: 人物
  解释: 罗斯托夫家族一家之主，梁赞省首席贵族。慷慨好客、热情善良，但不善理财导致家族败落。1813年病逝，身后留下巨额债务。原型为托尔斯泰的祖父。
  书中原文: “嗬，爸爸，你真漂亮，美极了！”娜塔莎说，她正站在屋子中间整理薄纱的褶儿。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平人物列表
- 名词: 罗斯托夫伯爵夫人
  分类: 人物
  解释: 娜塔莎之母，具有东方型瘦削面孔。慈爱温柔，与丈夫共同养育四子，但家族经济状况日益困顿。对子女充满关爱。
  书中原文: 伯爵夫人身穿天鹅绒裙衫，头戴圆筒帽，迈着轻盈的脚步，羞羞怯怯地走了进来。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平人物列表
- 名词: 佩龙斯卡娅
  分类: 人物
  解释: 玛丽亚·伊格纳季耶夫娜·佩龙斯卡娅，宫廷女官，罗斯托夫伯爵夫人的友人。虽又老又丑，但充当罗斯托夫家在彼得堡上流社会的引路人，在舞会上为娜塔莎解说贵宾身份。
  书中原文: 佩龙斯卡娅告诉伯爵夫人舞会中一些最重要人物的姓名。“那位是荷兰大使，看见吗？就是那个白头发的。”佩龙斯卡娅指着那个满头灰白鬈发的小老头，说。
  网络来源: https://www.banceo.com/article/38429.html
- 名词: 海伦·别祖霍娃
  分类: 人物
  解释: 全名海伦·瓦西里耶夫娜·别祖霍娃，库拉金公爵之女，皮埃尔的前妻。彼得堡社交界第一美人，外表极美但内心空洞、道德堕落，与多人有暧昧关系。最终病死，使皮埃尔获得自由。
  书中原文: “瞧，她来了，彼得堡的皇后，别祖霍娃伯爵夫人。”她指着刚走进来的海伦，说。
  网络来源: https://www.yunshuwu.cn/chap/8583.html
- 名词: 皮埃尔·别祖霍夫
  分类: 人物
  解释: 小说核心男主角之一，老别祖霍夫伯爵的私生子，后继承巨额财产。善良纯真、热爱思考，经历不幸婚姻、共济会探索、战争洗礼后，最终与娜塔莎结婚，找到人生真谛。
  书中原文: 皮埃尔一摇一摆地拖着他那肥胖的身躯穿过人群，就像从闹市的人群中穿过似的，漫不经心、和蔼可亲地时而向左，时而向右不住地点头。
  网络来源: https://baike.baidu.com/item/皮埃尔·别祖霍夫/53725822
- 名词: 安德烈·博尔孔斯基
  分类: 人物
  解释: 小说核心男主角之一，沙俄公爵，博尔孔斯基家族长子。孤傲正直、才华出众，反感上流社会虚伪。经历奥斯特里茨战役重伤、妻子难产去世、与娜塔莎订婚又解除、波罗底诺战役重伤后安然离世。
  书中原文: 娜塔莎立刻认出那个身材不高、穿白制服的年轻人：这是博尔孔斯基，她觉得他年轻多了，快活多了，而且漂亮多了。
  网络来源: https://baike.baidu.com/item/安德烈·博尔孔斯基/55647709
- 名词: 阿纳托利·库拉金
  分类: 人物
  解释: 瓦西里·库拉金公爵之子，海伦之弟。俊美放荡、毫无道德感，引诱已与安德烈订婚的娜塔莎私奔，几乎毁其名誉。波罗底诺战役中重伤截肢，以悲剧收场。
  书中原文: “这是别祖霍娃的哥哥，阿纳托利·库拉金。”她指着一个美男子——骑卫军的军官，说。这个青年军官从她们面前走过，昂首阔步，眼睛越过太太小姐们向别的地方望过去。
  网络来源: https://zhuanlan.zhihu.com/p/495064846
- 名词: 鲍里斯·德鲁别茨科伊
  分类: 人物
  解释: 德鲁别茨卡娅公爵夫人之子，从小在罗斯托夫家长大。精明务实、野心勃勃，善于利用人际关系向上爬，成为库图佐夫副官。娶有钱妻子，是典型的功利主义者。
  书中原文: 鲍里斯两次从她们面前走过，每次都回避她们。
  网络来源: https://pages.haomooc.com/index.php?s=book&c=extend&id=9401
- 名词: 皇帝亚历山大一世
  分类: 人物
  解释: 俄国罗曼诺夫王朝沙皇（1777-1825）。年轻俊美、温和有魅力，既有改革理想又优柔寡断。领导俄国打赢1812年卫国战争，最终打败拿破仑。
  书中原文: 皇帝走得很快，不住地向左右两边点头，仿佛极力想尽快度过这最初见面的时刻。
  网络来源: https://baijiahao.baidu.com/s?id=1763432501277702043
- 名词: 玛丽亚·安东诺夫娜·纳雷什金娜
  分类: 人物
  解释: 沙皇亚历山大一世的情妇，真实历史人物（1779-1854）。在宫廷舞会中紧随沙皇之后出场，显示其在宫廷中的显赫地位。
  书中原文: 他后面跟着男主人和玛丽亚·安东诺夫娜·纳雷什金娜，再后面是大使们、大臣们，以及各兵种的将军们。
  网络来源: http://t.icesmall.cn/book/5/575/118.html
- 名词: 斯佩兰斯基
  分类: 人物
  解释: 米哈伊尔·米哈伊洛维奇·斯佩兰斯基（1772-1839），俄国真实历史政治改革家。出身寒微，凭借才华升至国务大臣，主持改革方案。在小说中安德烈公爵曾一度崇拜他，后对理性主义感到幻灭。
  书中原文: “投了斯佩兰斯基的缘，正在拟一个什么草案。您瞧他对小姐太太的态度！”
  网络来源: https://www.yunshuwu.cn/chap/8580.html
- 名词: 科兰库尔
  分类: 人物
  解释: 阿尔芒·德·科兰库尔（1773-1827），法国贵族侯爵，1807-1811年任法国驻彼得堡公使。拿破仑忠实追随者，在小说中是亲拿破仑派系的领导者之一。
  书中原文: 在伯爵夫人问到科兰库尔是什么人时，她回答说，“您瞧，样子像皇帝似的。”
  网络来源: https://www.yunshuwu.cn/chap/8583.html
- 名词: 贝格
  分类: 人物
  解释: 阿道夫·贝格（别名阿尔方斯），德国裔军官，娶罗斯托夫家长女薇拉为妻。极度功利虚荣、精于算计。莫斯科大撤退时为搬运家具向岳父讨要马车，是托尔斯泰笔下的讽刺典型。
  书中原文: 不跳舞的贝格和他的妻子走到她们面前。
  网络来源: https://www.yunshuwu.cn/chap/8594.html
- 名词: 薇拉·罗斯托娃
  分类: 人物
  解释: 罗斯托夫伯爵长女，全名薇拉·伊利尼奇娜·罗斯托娃。性格冷静理智、严肃做作，与活泼的妹妹娜塔莎形成鲜明对比。后嫁给军官贝格，两人在虚荣自大方面堪称天作之合。
  书中原文: 薇拉向她谈她的绿色裙衫，娜塔莎不听她的，也不看她。
  网络来源: https://zh.wikipedia.org/zh-hant/战争与和平人物列表
- 名词: 玛夫鲁莎
  分类: 人物
  解释: 罗斯托夫家女仆，在娜塔莎准备首次舞会时参与缝改裙衫。属于小说中的小人物，是19世纪初俄国贵族家庭仆人群像的一部分。
  书中原文: “玛夫鲁莎，快点，亲爱的！”
  网络来源: http://bcc.blcu.edu.cn/show/1172446814_0_3_-1_-1/0
- 名词: 杜尼亚莎
  分类: 人物
  解释: 罗斯托夫家年轻女仆，果断能干，在娜塔莎准备首次舞会时跪在地板上为其缝改裙衫。属于小说中的小人物。
  书中原文: 果断的杜尼亚莎说，她取下别在胸前短褂上的针，又跪在地板上工作起来。
  网络来源: http://bcc.blcu.edu.cn/show/1172446814_0_3_-1_-1/0
- 名词: 罗斯托夫家
  分类: 人物
  解释: 小说四大家族之一，托尔斯泰美化的宗法制庄园贵族典型。家族充满欢乐和生气，保持淳朴热情真挚的品质。成员包括伯爵夫妇、长子尼古拉、次子彼佳、长女薇拉、次女娜塔莎及养女索尼娅。
  书中原文: 罗斯托夫一家人也称赞一番她的审美眼光和装束，然后，她们留意着自己的梳妆和衣服，十一点钟坐上各自的马车出发了。
  网络来源: https://zh.wikipedia.org/zh-hant/战争与和平人物列表
- 名词: 道利达花园
  分类: 地点
  解释: 俄语Таврический сад的音译，位于圣彼得堡，毗邻塔夫利宫。罗斯托夫家在前往参加舞会前先到此接佩龙斯卡娅，小说中为彼得堡上流社会活动的重要背景地点。
  书中原文: 十点半就应当到舞场，可是娜塔莎还要穿衣裳，还要去道利达花园。
  网络来源: https://zh.wikipedia.org/zh-hant/战争与和平人物列表
- 名词: 彼得堡
  分类: 地点
  解释: 俄罗斯帝国首都圣彼得堡，小说中上流社会舞会、宫廷社交的主要舞台。娜塔莎的首次盛大舞会即在彼得堡举行。
  书中原文: 她才知道在这又湿又冷的空气中，在颠簸着的马车里的拥挤和幽暗中，她才第一次生动地想象在那舞会上，在烛火辉煌的大厅里，等待她的是什么：音乐，鲜花，跳舞，皇帝，全彼得堡最出色的青年。
  网络来源: https://zh.wikipedia.org/wiki/战争与和平人物列表
- 名词: 奥特拉德诺耶
  分类: 地点
  解释: 罗斯托夫家族的乡间庄园，俄语意为“愉悦之地”。娜塔莎成长的地方，安德烈公爵在此第一次见到她，著名的“月光之夜”场景即发生于此。
  书中原文: “您可记得，他在奥特拉德诺耶咱们家住过一夜。”
  网络来源: https://www.douban.com/note/635691370/
- 名词: 娜塔莎的首次舞会
  分类: 事件
  解释: 小说经典场景之一，1810年除夕彼得堡盛大宫廷舞会。娜塔莎从激动准备到舞会上紧张等待舞伴，最终与安德烈公爵相识共舞，成为两人爱情故事的起点。
  书中原文: 在这又湿又冷的空气中，在颠簸着的马车里的拥挤和幽暗中，她才第一次生动地想象在那舞会上，在烛火辉煌的大厅里，等待她的是什么：音乐，鲜花，跳舞，皇帝，全彼得堡最出色的青年。
  网络来源: https://book.douban.com/review/16125321/
- 名词: 舞会裙
  分类: 物件
  解释: 19世纪初俄国贵族女性参加舞会时穿着的正式礼服。以薄纱、丝绸等轻质面料制成，多为白色。娜塔莎的舞会裙因太长而由数名女仆紧急缝改，体现舞会准备的忙乱与隆重。
  书中原文: 娜塔莎开始穿衣服了。“等等，等等，爸爸，别进来！”她对推开门的爸爸喊道，整个脸都遮在轻烟似的白纱裙后面。
  网络来源: https://armoury-chamber.kreml.ru/zh-CN/exposure/view/vitrina-45-nachalo-svetskiy-kostyum-v-rossii-xviii---nachala-xx-vekov/
- 名词: 大头针
  分类: 物件
  解释: 俄罗斯传统缝纫工具，在小说中娜塔莎和女仆们用大头针别绸带、缝裙衫。是19世纪俄国贵族家庭日常针线活必备之物。
  书中原文: 中间，把大头针吱吱作响地别进最后一条绸带上，她那纤细的手指按得生疼。
  网络来源: http://bcc.blcu.edu.cn/show/1172446814_0_3_-1_-1/0
- 名词: 波兰舞
  分类: 习俗
  解释: 波兰舞曲（Polonaise），19世纪俄国上流社会舞会的开场舞蹈。源于波兰民间舞蹈，被俄国贵族高度仪式化，具有庄重隆重的性质，是展示身份与地位的重要环节。
  书中原文: 人们闪开一条路，皇帝满脸笑容，挽着女主人的手，没有踏着音乐的节拍，从客厅走出来。
  网络来源: https://www.encspb.ru/object/2804016236
- 名词: 屈膝礼
  分类: 习俗
  解释: 西方文化中女性专属的传统问候礼节，与男性的鞠躬对应。行礼时屈膝颔首，双手可提起裙摆。在19世纪欧洲宫廷舞会中，女性向王室成员行深度屈膝礼是正式社交礼仪的核心组成部分。
  书中原文: 两个姑娘都穿白裙衫，在乌黑的头发上都戴同样的玫瑰花，都行着同样的屈膝礼。
  网络来源: https://baike.baidu.com/item/屈膝礼/3990445
- 名词: 上流社会舞会
  分类: 概念
  解释: 18-20世纪初圣彼得堡上流社会最主要的社交娱乐活动。有固定舞序（波兰舞开场，继以华尔兹、玛祖卡等），是贵族展示身份、联姻交际的核心场合。
  书中原文: 她才知道在这又湿又冷的空气中，在颠簸着的马车里的拥挤和幽暗中，她才第一次生动地想象在那舞会上，在烛火辉煌的大厅里，等待她的是什么。
  网络来源: https://www.encspb.ru/object/2804016236
- 名词: 陪嫁
  分类: 习俗
  解释: 俄国贵族女性出嫁时从家族带走的财产，包括现金、家具、珠宝、衣物等。陪嫁的多少直接决定女性在婚姻市场中的地位。索尼娅因无陪嫁而被迫放弃与尼古拉的爱情，是陪嫁制度在小说中的典型体现。
  书中原文: “这是一个百万陪嫁的待字闺中的姑娘，”佩龙斯卡娅说，“您瞧那些想当未婚夫的人。”
  网络来源: https://www.russianhistorymuseum.org/2026/03/18/dowry-a-rare-document/
- 名词: 共济会
  分类: 概念
  解释: 起源于欧洲的秘密结社组织，主张道德自我完善与兄弟友爱。18世纪传入俄国，在上层贵族中广泛传播。小说中皮埃尔曾加入共济会寻求人生意义，但最终失望。亚历山大一世于1822年下令禁止。
  书中原文: “您瞧这位戴眼镜的肥佬，是世界共济会的会员，”佩龙斯卡娅指着别祖霍夫，说。
  网络来源: http://www.163.com/dy/article/E5NJPH6E0521F1RT.html
