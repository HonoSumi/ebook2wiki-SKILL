- 名词: 尼古拉·罗斯托夫
  分类: 人物
  解释: 小伯爵，罗斯托夫家的长子，年轻的热血贵族，热衷打猎和军旅生活，在家族财务问题上表现决断。
  书中原文: |
    他想，“怎么押注，我早就内行，至于什么转账，我一窍不通。”他对自己说，从此他不再过问家务。他怀着极大的兴趣热衷于对他说来还是新鲜的事情——犬猎，老伯爵置办了大规模的狩猎设备。
  网络来源: |
    尼古拉·罗斯托夫是典型的俄罗斯宗法制贵族青年，单纯、尚武、忠于传统。他大学辍学当骠骑兵，参加申格拉本战役、奥斯特利茨战役和波罗金诺战役。父亲去世后承担全部债务，后与玛丽亚公爵小姐结婚，成为精明能干的庄园主。他是托尔斯泰笔下"最俄罗斯"的人物代表之一。
- 名词: 伊利亚·安德烈伊奇·罗斯托夫
  分类: 人物
  解释: 罗斯托夫家的老伯爵，善良好客但不善理财，置办大规模狩猎设备供儿子管理。
  书中原文: |
    老伯爵一向拥有大规模的狩猎设备，现在都交给儿子管理。伊利亚·安德烈伊奇伯爵虽然不是一个热衷的猎手，但是，他对打猎规则倒记得烂熟。伊利亚·安德烈伊奇由于饮酒和行路，面色发红，眼睛蒙上了一层湿润，显得特别光亮，他裹紧了皮袄，坐在马鞍上，那样子有如准备出外游玩的儿童。
  网络来源: |
    老伯爵性格善良、好客、慷慨，但家道中落，辞去首席贵族职位后仍开销巨大。1813年娜塔莎与皮埃尔结婚后不久去世，临终前请求宽恕他荡尽家产的罪过。人物原型为托尔斯泰的祖父伊利亚·托尔斯泰。
- 名词: 娜塔莎·罗斯托娃
  分类: 人物
  解释: 罗斯托夫家的次女，活泼好动，热情充满生命力，坚持参加狩猎，骑术精湛。
  书中原文: |
    娜塔莎快步走进来，她还没有梳头洗脸，也没有更换衣裳，裹着保姆的一条大围巾。娜塔莎矫健、自信地骑在黑色的阿拉伯马上，一只手熟练地、毫不费力地把马勒住。娜塔莎说，"我们会待在我们自己的地方，决不乱动。"
  网络来源: |
    娜塔莎是《战争与和平》的女主角，托尔斯泰笔下"生命和幸福的化身"。她从13岁天真少女成长为战争中坚毅的女性，曾与安德烈·博尔孔茨基订婚，后被阿纳托尔诱惑导致婚约破裂。战后与皮埃尔·别祖霍夫结婚，成为贤妻良母。著名改编影视饰演者包括奥黛丽·赫本（1956年）。
- 名词: 彼佳·罗斯托夫
  分类: 人物
  解释: 罗斯托夫家的幼子，年幼活泼，跟随哥哥姐姐参加打猎。
  书中原文: |
    彼佳跟着她跑进来。"俄军不怕万重关，我们去打猎！"彼佳喊道。彼佳在笑什么，他在鞭打他骑的马，不住地拽缰绳。
  网络来源: |
    彼佳是罗斯托夫家最小的孩子，性格热情活泼。在1812年战争中瞒着父母参军，最终在战斗中被流弹击中身亡，成为罗斯托夫家族在战争中最大的悲剧之一。
- 名词: 伯爵夫人
  分类: 人物
  解释: 罗斯托夫家主母，心地善良但对家族财务忧虑，持有安娜·米哈伊洛夫娜的期票。
  书中原文: |
    伯爵夫人把儿子叫来，对他说，她有一张安娜·米哈伊洛夫娜的二千卢布的期票，问尼古拉怎么办。他把期票撕得粉碎，他这个行为使老伯爵夫人流着欢喜的眼泪大哭起来。
  网络来源: |
    纳塔利娅·罗斯托娃伯爵夫人（原姓申申娜）是罗斯托夫家族的贤妻良母，人物原型为托尔斯泰的祖母。她主要关心子女的幸福和家族的延续，在家庭生活中扮演传统的贵族母亲角色。
- 名词: 安娜·米哈伊洛夫娜
  分类: 人物
  解释: 一位没落贵族公爵夫人，经济拮据，与罗斯托夫家有交情，持有其期票。
  书中原文: |
    伯爵夫人把儿子叫来，对他说，她有一张安娜·米哈伊洛夫娜的二千卢布的期票，问尼古拉怎么办。尼古拉答道，"我不喜欢安娜·米哈伊洛夫娜，也不喜欢鲍里斯，但是他们对咱们不错，而且很穷。"
  网络来源: |
    安娜·米哈伊洛夫娜·德鲁别茨卡娅公爵夫人出身名门但家道中落，寡居带着独子鲍里斯。她一切行动的核心是为儿子谋求前程，不惜放下自尊奔走于上流社会。曾在安娜·帕夫洛夫娜的晚会上堵住瓦西里公爵为儿子求情，成功使鲍里斯调入近卫军。
- 名词: 鲍里斯
  分类: 人物
  解释: 安娜·米哈伊洛夫娜之子，罗斯托夫家的熟人。
  书中原文: |
    尼古拉答道，"我不喜欢安娜·米哈伊洛夫娜，也不喜欢鲍里斯，但是他们对咱们不错，而且很穷。"
  网络来源: |
    鲍里斯·德鲁别茨科伊出身没落名门，精于钻营攀附，善于与要人搞好关系。从小在罗斯托夫家长大，长大后成为谢苗诺夫军团准尉。后娶富家女成为富翁。俄国评论家皮萨列夫称其为"上流社会的莫尔恰林"。
- 名词: 丹尼洛
  分类: 人物
  解释: 罗斯托夫家的猎手长和驯犬长，经验丰富，对主人保持表面恭顺实则独立的特殊态度。
  书中原文: |
    从墙角走出猎手长和驯犬长丹尼洛，他满脸皱纹，头发灰白，留着乌克兰式的茶壶盖发型，手中拿着短柄长鞭，带着只有猎人才有的独立自主和藐视一切的表情。他在主人面前脱下切尔克斯高顶帽，轻蔑地望着他。这种轻蔑的态度并没有使主人觉得受辱：尼古拉知道，这个蔑视一切、高出一切的丹尼洛，仍然是他的奴仆和猎人。
  网络来源: |
    丹尼洛是托尔斯泰笔下最生动的仆人形象之一。在著名的猎狼场景中，当狼快要逃入森林时，丹尼洛策马冲出，用整个身体压住狼，揪住狼的耳朵，最终成功活捉大狼。他代表了忠诚仆人与独立灵魂的双重形象。
- 名词: 大叔
  分类: 人物
  解释: 罗斯托夫家的远亲乡邻，不富裕的邻人，口头禅"没得说哇"，参与联合猎狼。
  书中原文: |
    大叔说（这是住在邻村的罗斯托夫家一门不富裕的远亲），"我就知道，你在家坐不住了，今天出猎是好日子。没得说哇！"两家的猎犬合成一队，大叔和尼古拉并马而行。大叔不以为然地回头看了看彼佳和娜塔莎。他不喜欢把儿戏和打猎的正经事混在一起。
  网络来源: |
    大叔（米哈伊尔·尼卡诺雷奇）是罗斯托夫家的远亲，一位精力充沛、胡髭斑白、五官端正的老人。他善良朴实，富有生活智慧，在后续情节中收留娜塔莎和尼古拉。著名的"娜塔莎之舞"就发生在大叔的乡村木屋里。
- 名词: 乌瓦尔卡
  分类: 人物
  解释: 罗斯托夫家的猎手，被派去打探狼窝情况。
  书中原文: |
    丹尼洛说，"天蒙蒙亮，我就派乌瓦尔卡去打探打探，他说，母狼搬家了，搬到奥特拉德诺耶禁伐区，在那儿嚎叫呢。"
  网络来源: |
    乌瓦尔卡是罗斯托夫家狩猎队伍中的一名猎手，负责提前侦察猎物的动向。在小说中他角色虽小，但反映了俄国贵族大规模狩猎时细致的准备工作——先派人侦察猎物行踪，再制定狩猎方案。
- 名词: 谢苗·切克马尔
  分类: 人物
  解释: 老伯爵身边的老跟班骑手，与伯爵相处三十年，动作已不灵活但熟悉狩猎。
  书中原文: |
    他身旁站着一个名叫谢苗·切克马尔的跟班，是一个老骑手，但动作已经不灵活了。切克马尔牵着三只像主人和马一样肥壮的凶猛猎犬。瘦得两腮下陷的切克马尔，把该做的事做完，不住地打量跟他和睦相处三十年的主人。
  网络来源: |
    谢苗·切克马尔（英文版作Simon Chekmar）是伊利亚·罗斯托夫伯爵的贴身侍从和马夫，了解主人的心思，知道如何讨主人欢心。他代表旧式俄国贵族庄园中与主人相处数十年的忠仆形象。
- 名词: 米季卡
  分类: 人物
  解释: 伯爵的马夫，不要命的骑手和狂热的猎手。
  书中原文: |
    百步开外的空地上，站着伯爵的马夫米季卡，此人是一个不要命的骑手和狂热的猎手。
  网络来源: |
    米季卡是罗斯托夫家狩猎队伍中的年轻仆人，作为马夫负责看守猎犬和协助狩猎。他是俄国贵族庄园仆从群像中的一员，衬托出罗斯托夫家狩猎排场的讲究。
- 名词: 纳斯塔西娅·伊万诺夫娜
  分类: 人物
  解释: 罗斯托夫家中的小丑（弄臣），胡须花白，身穿肥大的女长衣，头戴尖顶帽。
  书中原文: |
    此人胡须花白，身穿肥大的女长衣，头戴尖顶帽。这是名叫纳斯塔西娅·伊万诺夫娜的小丑。"喂，纳斯塔西娅·伊万诺夫娜，"伯爵对他挤挤眼，悄悄地说，"你要是把野兽惊走，丹尼洛可饶不了你。"
  网络来源: |
    纳斯塔西娅·伊万诺夫娜是罗斯托夫家中的侍从丑角（弄臣），常穿着女装逗乐。她代表了罗斯托夫家传统的、近乎田园式的贵族生活氛围。在后续情节中，娜塔莎经历感情创伤后曾说所有男人在她眼中如同纳斯塔西娅·伊万诺夫娜一样毫无吸引力。
- 名词: 米尔卡
  分类: 物件
  解释: 罗斯托夫家的母猎犬，黑毛白花，对主人非常亲热。
  书中原文: |
    那只黑毛白花、肥臀、两只又黑又大的眼睛突出、名叫米尔卡的母狗，一看见主人就站起来，向后伸直了腰，像野兔似的伏下前腿，然后突然跳将起来，直冲他的鼻子和耳朵舔去。
  网络来源: |
    米尔卡是罗斯托夫家的猎犬之一，在打猎场景中多次出现。托尔斯泰以细致笔触描绘了米尔卡的形态和举动，使其成为小说中最令人印象深刻的猎犬形象之一。
- 名词: 卡拉伊
  分类: 物件
  解释: 罗斯托夫家的老公狗，皮毛蓬乱而丑陋，因独力擒一只大狼而出名。
  书中原文: |
    卡拉伊是一只丑陋的、皮毛蓬乱的老公狗，由于独力擒一只大狼而出名。"卡拉伊，准备！"他呼唤了一声，作为对大叔嘱咐的回答。
  网络来源: |
    卡拉伊是罗斯托夫家猎犬中最受尊重的老犬，以擅长猎狼著称。在打猎场景中，它和其他猎犬一起参与了围捕大狼的经典场面。
- 名词: 特鲁尼拉
  分类: 物件
  解释: 娜塔莎心爱的猎犬。
  书中原文: |
    "尼古连卡，特鲁尼拉这只狗多可爱！它认得我。"娜塔莎在夸她那只心爱的猎犬。"首先，特鲁尼拉根本不是狗，而是猎犬。"尼古拉想。
  网络来源: |
    特鲁尼拉是娜塔莎特别喜爱的一只猎犬。尼古拉内心纠正说它是"猎犬"而非一般意义上的"狗"，暗示了猎犬在俄国贵族狩猎文化中的专业分工意识。
- 名词: 维夫梁卡
  分类: 物件
  解释: 老伯爵骑的栗色骟马，保养得膘肥毛滑，性格老实善良。
  书中原文: |
    老伯爵骑的是一匹名叫维夫梁卡的栗色骟马，由伯爵的马夫牵着。伊利亚·安德烈伊奇伯爵跨上那匹跟他一样保养得膘肥毛滑、老实善良、毛色斑白的维夫梁卡骏马。
  网络来源: |
    维夫梁卡是老伯爵的坐骑，托尔斯泰用拟人化的笔触描写它"像主人一样"老实善良、保养良好，生动映衬了老伯爵本人养尊处优的生活状态。
- 名词: 吉里尔奇克
  分类: 人物
  解释: 大叔的猎手。
  书中原文: |
    大叔说，"我的吉尔奇克说，伊拉金家带着猎队正在科尔尼克扎队呢。"
  网络来源: |
    吉里尔奇克（英译Gilchik）是大叔（米哈伊尔·尼卡诺雷奇）的猎手，负责侦察邻近地主的狩猎动态。他报告伊拉金家的猎队在科尔尼克活动，促使尼古拉和大叔决定联合行动。
- 名词: 奥特拉德诺耶
  分类: 地点
  解释: 罗斯托夫家的庄园所在地，附近有禁伐区森林，是狩猎活动的主要场地。
  书中原文: |
    丹尼洛说，"母狼搬家了，搬到奥特拉德诺耶禁伐区，在那儿嚎叫呢。"大队人马刚走出菜园，就沿着通往奥特拉德诺耶森林的大路和田野散开。离开奥特拉德诺耶禁伐区的那片绿洲只有百十来俄丈远了。
  网络来源: |
    奥特拉德诺耶（俄语意为"愉悦之地"）是罗斯托夫家族的庄园。出现财务危机后罗斯托夫家从莫斯科搬至此地。小说中著名的"月夜对话"场景就发生在这里——安德烈公爵听到娜塔莎和索尼娅在窗边的对话，重新燃起对生活的热爱。
- 名词: 利亚多夫斯克高地
  分类: 地点
  解释: 尼古拉在狩猎中把守的地点。
  书中原文: |
    "尼古拉沙在哪儿？在利亚多夫斯克高地吧？"伯爵低声问。"一直往利亚多夫斯克高地追去了。"谢苗说。
  网络来源: |
    利亚多夫斯克高地是奥特拉德诺耶禁伐区附近的狩猎地点之一，是猎狼时猎手们分配把守的关键位置。尼古拉·罗斯托夫被指定守在这里等待狼群经过。
- 名词: 扎罗夫草地
  分类: 地点
  解释: 娜塔莎和彼佳在狩猎中停留的地方。
  书中原文: |
    "她和彼得·伊利奇停在扎罗夫草地附近，"谢苗微笑着说。
  网络来源: |
    扎罗夫草地是奥特拉德诺耶附近的一处开阔草地，猎狼时被指定为娜塔莎和彼佳的守候位置。谢苗向伯爵称赞娜塔莎虽是女流但打猎技术了不起。
- 名词: 科尔尼克
  分类: 地点
  解释: 邻近地主伊拉金家扎队驻营的猎场。
  书中原文: |
    大叔说，"伊拉金家带着猎队正在科尔尼克扎队呢。"
  网络来源: |
    科尔尼克是奥特拉德诺耶附近的一处森林猎场，邻近地主伊拉金家的猎队在此扎营打猎。大叔将此消息告知尼古拉，促使他们决定抢先占领禁伐区，防止伊拉金家夺走猎物。
- 名词: 橡树林
  分类: 地点
  解释: 罗斯托夫家狩猎远征的起点，有一个未受惊扰的狼窝。
  书中原文: |
    猎手全体会议决定让狗休息三天，九月十六日进行一次远征，从橡树林开始，因为那儿有一个未受惊扰的狼窝。
  网络来源: |
    橡树林是罗斯托夫家狩猎远征的起点，此处有未被惊扰的狼窝。在俄国传统狩猎中，秋季是猎狼的最佳季节，橡树林中的狼窝代表最宝贵的狩猎资源。
- 名词: 禁伐区
  分类: 地点
  解释: 奥特拉德诺耶附近的森林保护区，母狼带仔迁居之处。
  书中原文: |
    母狼搬家了，搬到奥特拉德诺耶禁伐区，在那儿嚎叫呢。（所谓搬家，是说他们俩都知道的那只母狼带着狼仔迁到奥特拉德诺耶森林，离家两俄里远一处不大的林子。）"赶快占领禁伐区，我的吉尔奇克说，伊拉金家带着猎队正在科尔尼克扎队呢。"
  网络来源: |
    禁伐区是俄国贵族庄园中划定为狩猎专用的森林保护区，禁止日常砍伐和干扰，以保护野生动物资源。母狼带着狼仔迁入此处为狩猎提供了绝佳机会，也成为多户地主争夺的焦点。
- 名词: 期票
  分类: 物件
  解释: 安娜·米哈伊洛夫娜欠伯爵夫人的二千卢布票据，被尼古拉撕毁。
  书中原文: |
    伯爵夫人把儿子叫来，对他说，她有一张安娜·米哈伊洛夫娜的二千卢布的期票，问尼古拉怎么办。于是他把期票撕得粉碎，他这个行为使老伯爵夫人流着欢喜的眼泪大哭起来。
  网络来源: |
    期票是19世纪俄国贵族之间常见的信用票据，债务人承诺在指定日期向债权人支付一定金额。安娜·米哈伊洛夫娜作为没落贵族，用期票方式向罗斯托夫家借款。尼古拉撕毁期票的行为体现了他慷慨重义、轻视金钱的贵族品格。
- 名词: 切尔克斯高顶帽
  分类: 物件
  解释: 丹尼洛所戴的传统高加索毛皮高帽。
  书中原文: |
    他在主人面前脱下切尔克斯高顶帽，轻蔑地望着他。
  网络来源: |
    切尔克斯高顶帽（俄语称"帕帕哈"）是高加索地区和哥萨克的传统毛皮高帽，圆柱形以羊皮制成。谚语说"戴帽子不是为了保暖，而是为了荣誉"。这种帽子后被哥萨克采用，成为哥萨克制服的一部分。
- 名词: 短柄长鞭
  分类: 物件
  解释: 丹尼洛手持的狩猎工具，用于驾驭猎犬和马匹。
  书中原文: |
    从墙角走出猎手长和驯犬长丹尼洛，手中拿着短柄长鞭。
  网络来源: |
    短柄长鞭是俄国猎人和哥萨克骑兵的经典随身工具，通常以皮革编制，鞭柄短而鞭梢长，便于在马背上灵活使用。它既是驾驭猎犬的工具，也是猎人的身份标志。
- 名词: 皮袄
  分类: 物件
  解释: 老伯爵所穿的御寒外套，在初冬打猎时保暖。
  书中原文: |
    他抻了抻皮袄，装备好猎具，跨上那匹维夫梁卡骏马。伊利亚·安德烈伊奇裹紧了皮袄，坐在马鞍上，那样子有如准备出外游玩的儿童。
  网络来源: |
    皮袄是19世纪俄国贵族冬季传统服饰，多用羊皮或狐皮制成。在初冬的户外打猎活动中，皮袄是必不可少的御寒装备。老伯爵裹紧皮袄的画面生动暗示了他虽年迈但兴致勃勃的愉快心情。
- 名词: 鼻烟壶
  分类: 物件
  解释: 老伯爵使用的随身物件，用于装鼻烟。
  书中原文: |
    他一边说，一边掀起皮袄的底襟，把鼻烟壶掏出来。
  网络来源: |
    鼻烟壶是19世纪俄国贵族绅士的典型随身物件，用珐琅、金银或硬木制成。吸鼻烟是当时上层社会的社交习惯之一，老伯爵在狩猎间隙掏鼻烟壶的细节展现了他的贵族生活习惯和从容心态。
- 名词: 银杯
  分类: 物件
  解释: 伯爵打猎前饮酒的容器。
  书中原文: |
    伯爵照老习惯在打猎前喝一银杯猎人露酒，吃点小菜。
  网络来源: |
    银杯是俄国贵族家庭中的常见饮具，在狩猎前用银杯饮用特制的"猎人露酒"是老伯爵遵循的传统。这种仪式性的饮酒体现了俄国贵族狩猎文化中的固定程序。
- 名词: 波尔多红葡萄酒
  分类: 物件
  解释: 伯爵打猎前饮用的佐餐葡萄酒，产自法国波尔多地区。
  书中原文: |
    伯爵照老习惯在打猎前喝一银杯猎人露酒，吃点小菜，喝半瓶他所喜爱的波尔多红葡萄酒。
  网络来源: |
    波尔多红葡萄酒是19世纪俄国贵族餐桌上的常见进口酒品。俄国上流社会深受法国文化影响，饮用法国葡萄酒是贵族身份的象征。老伯爵在打猎前饮用波尔多红酒，体现了他养尊处优的生活习惯。
- 名词: 顿河马
  分类: 物件
  解释: 尼古拉骑的马种，以耐力著称的俄罗斯本土马种，与哥萨克骑兵紧密相连。
  书中原文: |
    他骑上那匹枣红顿河马，对他的那群猎犬打着呼哨，穿过打谷场，向通往奥特拉德诺耶禁伐区出发了。
  网络来源: |
    顿河马原产于俄罗斯顿河流域，是哥萨克骑兵的经典战马，以金栗色毛和惊人耐力著称。1812年拿破仑战争中，6万名哥萨克骑兵骑顿河马追击法军直至巴黎。被誉为"金色禁卫"，曾参与培育伊犁马等多个中国马种。
- 名词: 栗色骟马
  分类: 物件
  解释: 老伯爵骑的马，名叫维夫梁卡，性格老实善良、保养良好。
  书中原文: |
    老伯爵骑的是一匹名叫维夫梁卡的栗色骟马，由伯爵的马夫牵着。
  网络来源: |
    骟马是经过阉割的公马，性格温顺稳重，适合年长或缺乏经验的骑手。老伯爵选择栗色骟马，与其年龄和不太热衷打猎的性格相符。托尔斯泰将马的温顺老实与主人形象做类比，增添了文学趣味。
- 名词: 阿拉伯马
  分类: 物件
  解释: 娜塔莎骑的黑色骏马，以纯种阿拉伯马的矫健和灵敏著称。
  书中原文: |
    娜塔莎矫健、自信地骑在黑色的阿拉伯马上，一只手熟练地、毫不费力地把马勒住。
  网络来源: |
    阿拉伯马是最古老和最纯正的马种之一，以其耐力、速度和优美的外形闻名于世。19世纪俄国贵族常进口纯种阿拉伯马作为骑乘用马。娜塔莎骑黑色阿拉伯马的描写，展现了她高超的骑术和活泼自信的性格。
- 名词: 猎犬
  分类: 物件
  解释: 狩猎用的狗，依靠嗅觉追踪猎物。罗斯托夫家共有五十四只。
  书中原文: |
    猎犬总共五十四只，由六名猎犬手带领。那条长腿猎犬，在花园小径上看见主人，拱起脊背，箭也似的向台阶冲去，翘起尾巴，蹭尼古拉的腿。
  网络来源: |
    俄国的猎犬（гончие）主要依靠嗅觉在密林中追踪猎物，通过吠叫向猎人报告位置并将猎物赶出森林到开阔地。拥有五十四只猎犬是当时巨大财富的体现。
- 名词: 狼犬
  分类: 物件
  解释: 狩猎大型猎物（狼）的专用犬种，视觉猎犬，速度极快。
  书中原文: |
    不算主人，有八名狼犬手，驱赶着四十只狼犬，连同主人的猎犬，大约出动了一百三十只狗，二十名骑马的猎人，向田野进发。
  网络来源: |
    俄国狼犬（Borzoi/苏俄猎狼犬）是沙皇和贵族钟爱的视觉猎犬，依靠极快的速度和敏锐的视觉追捕狼。它们在开阔地以成对方式出击，咬住狼的脖子直到主人赶到。用Borzoi猎狼是沙俄贵族身份的象征，每年饲养费用极其昂贵。
- 名词: 犬猎
  分类: 事件
  解释: 罗斯托夫家组织的规模宏大的狩猎活动，出动约一百三十只狗和二十名骑手。
  书中原文: |
    猎犬总共五十四只，由六名猎犬手带领。不算主人，有八名狼犬手，驱赶着四十只狼犬，连同主人的猎犬，大约出动了一百三十只狗，二十名骑马的猎人，向田野进发。
  网络来源: |
    在19世纪俄国，不用武器的犬猎是上层社会最钟爱的娱乐活动之一。罗斯托夫家出动一百三十只狗和二十名骑手的规模在当时的贵族中属于相当宏大。每年狩猎花费约1500卢布（相当于陆军上校年薪的一半）。犬猎在1861年农奴制改革后逐渐衰落。
- 名词: 九月十五日出猎
  分类: 事件
  解释: 罗斯托夫家在初冬组织的猎狼远征，从橡树林出发，是本章的核心事件。
  书中原文: |
    九月十五日，小罗斯托夫清早起来，穿着睡衣向窗外一望。一小时后，全副猎队来到门廊台阶前面。
  网络来源: |
    九月十五日是俄国初冬狩猎的理想时节，此时地面被冻硬但未积雪，便于猎犬追踪。罗斯托夫家的猎队在此日出猎，经历了侦察狼窝、联合大叔、各就各位、围捕大狼的完整狩猎过程，是《战争与和平》中最精彩的和平生活场景之一。
- 名词: 母狼搬家
  分类: 事件
  解释: 母狼带狼仔从原窝迁至奥特拉德诺耶禁伐区，成为狩猎的直接目标。
  书中原文: |
    丹尼洛说，"母狼搬家了，搬到奥特拉德诺耶禁伐区，在那儿嚎叫呢。"（所谓搬家，是说他们俩都知道的那只母狼带着狼仔迁到奥特拉德诺耶森林，离家两俄里远一处不大的林子。）
  网络来源: |
    母狼搬家是猎人的术语，指母狼带着幼崽迁移巢穴。狼在秋季会寻找更安全的地点过冬，母狼带着狼仔的巢穴对猎人来说是最有价值的猎物目标。发现狼窝的位置是整个狩猎行动的决策依据。
- 名词: 分股合猎
  分类: 习俗
  解释: 相邻地主将猎犬合成一队联合狩猎的习俗，以扩大围猎范围和捕获成功率。
  书中原文: |
    两家的猎犬合成一队，大叔和尼古拉并马而行。（尼古拉说）"怎么样，咱们合了吧？""合起来……"
  网络来源: |
    分股合猎（将两家的猎犬合并）是19世纪俄国贵族狩猎中的常见做法。相邻地主通过联合狩猎不仅可以扩大围猎范围，还能增进邻里关系。大叔和尼古拉的联合代表了俄国乡村贵族之间的协作传统。
- 名词: 打猎前饮酒
  分类: 习俗
  解释: 老伯爵按老习惯在打猎前喝银杯猎人露酒和半瓶波尔多葡萄酒的习惯。
  书中原文: |
    伯爵照老习惯在打猎前喝一银杯猎人露酒，吃点小菜，喝半瓶他所喜爱的波尔多红葡萄酒。
  网络来源: |
    俄国贵族在狩猎前饮酒既是为御寒，也是传统仪式。猎人露酒是一种特制的药草浸泡烈酒，有驱寒活血作用。波尔多红酒的饮用反映了19世纪俄国贵族对法国饮食文化的崇尚。这一习俗将狩猎气氛推向高潮。
- 名词: 禁猎期休整
  分类: 习俗
  解释: 让猎犬休息三天再出猎的传统做法，以保证猎犬的体力和状态。
  书中原文: |
    热衷打猎的年轻猎手罗斯托夫的猎犬，不仅跑得掉了膘，而且腿子也跑累了，猎手全体会议决定让狗休息三天，九月十六日进行一次远征。
  网络来源: |
    在俄国贵族犬猎中，猎犬的体力和状态是狩猎成功的关键。狩猎前让猎犬休息数日、停止喂食（空腹出猎以保持敏捷）是标准的传统做法。尼古拉特意吩咐"先别给狗喂食"，表明他对狩猎规矩的认真态度。
- 名词: 主仆打猎规矩
  分类: 习俗
  解释: 猎人对主人保持表面恭顺实则独立的特殊主仆关系，在狩猎场上仆人拥有专业权威。
  书中原文: |
    他在主人面前脱下切尔克斯高顶帽，轻蔑地望着他。这种轻蔑的态度并没有使主人觉得受辱：尼古拉知道，这个蔑视一切、高出一切的丹尼洛，仍然是他的奴仆和猎人。丹尼洛本来就觉得他待在屋里不合适，很别扭，现在又要和小姐打交道，这在他简直不可想象。他垂下眼皮赶快退了出去。
  网络来源: |
    俄国贵族狩猎中存在着特殊的主仆关系——在日常生活中仆人服从主人，但在狩猎场上猎人的专业经验凌驾于主人之上。丹尼洛在书房里小心翼翼以免碰坏家具，但到了猎场上却以专业知识自信地主宰一切。这种微妙的权力转换体现了托尔斯泰对俄国等级社会的深刻观察。
