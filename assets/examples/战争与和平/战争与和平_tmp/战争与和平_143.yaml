- 名词: 菲利
  分类: 地点
  解释: 原为莫斯科西郊的一个村庄，位于莫斯科河与波克隆山之间。1812年9月13日（俄历9月1日），俄军总司令库图佐夫在此村的一座农舍中召开军事会议，决定放弃莫斯科以保存军力。菲利因此成为俄国历史上著名的地点。该村1935年并入莫斯科市区。
  书中原文: 在离莫斯科多罗戈米尔城门六俄里的波克隆山上，库图佐夫下了马车，坐在路边一张条凳上。……俄国军队从波罗金诺撤退后，在菲利附近驻下。
  网络来源: https://en.wikipedia.org/wiki/Fili_(Moscow)

- 名词: 波克隆山
  分类: 地点
  解释: 莫斯科西部的一座山丘，海拔171.5米，曾是莫斯科最高自然点之一。历史上所有从西方进入莫斯科的人都要在此向首都行礼致敬，故得名"俯首山"。1812年库图佐夫曾在此山路边条凳上听取将领们关于放弃莫斯科的意见。现为莫斯科胜利公园和卫国战争中央博物馆所在地。
  书中原文: 在离莫斯科多罗戈米尔城门六俄里的波克隆山上，库图佐夫下了马车，坐在路边一张条凳上。一大群将军们聚在他周围。
  网络来源: https://en.wikipedia.org/wiki/Poklonnaya_Hill

- 名词: 多罗戈米尔城门
  分类: 地点
  解释: 莫斯科西部的城门，位于多罗戈米洛沃区，是莫斯科纪念1812年卫国战争胜利的城门建筑。最初于1814年为庆祝击败拿破仑而建木制凯旋门，后于1834年改建为石制城门，1936年被拆除，1968年异地重建为莫斯科凯旋门。
  书中原文: 在离莫斯科多罗戈米尔城门六俄里的波克隆山上，库图佐夫下了马车，坐在路边一张条凳上。
  网络来源: https://en.wikipedia.org/wiki/Triumphal_Arch_of_Moscow

- 名词: 卡卢日斯卡雅大路
  分类: 地点
  解释: 连接莫斯科与西南方向城市卡卢加的古道，分为老卡卢加路和新卡卢加路。在1812年俄法战争中具有决定性战略意义：拿破仑从莫斯科撤退时试图沿此路向西南突围，但库图佐夫在小雅罗斯拉维茨战役中封锁了此路，迫使法军沿已被摧毁的旧斯摩棱斯克路撤退，最终导致法军覆灭。
  书中原文: 他们向卡卢日斯卡雅大路窜去，除了在小雅罗斯拉维茨城下打了一个胜仗外，他们没打过一场大仗，就以更高的速度逃回斯摩棱斯克。
  网络来源: https://en.wikipedia.org/wiki/Battle_of_Maloyaroslavets

- 名词: 安德烈·萨沃斯季亚诺夫
  分类: 人物
  解释: 菲利村的一位农民，他的农舍被用作1812年俄军军事会议的会场。他是库图佐夫召开决定莫斯科命运的重要会议时借住的屋主。他的孙女玛拉莎在炕炉上目睹了会议过程。
  书中原文: 下午两点钟，在农民安德烈·萨沃斯季亚诺夫家一间宽敞、比较好的小屋里举行军事会议。这个农民一大家子人——男男女女，还有孩子，都挤进小过厅对面一间堆放杂物的屋子里。
  网络来源: https://en.wikipedia.org/wiki/Council_at_Fili

- 名词: 玛拉莎
  分类: 人物
  解释: 菲利村农民安德烈·萨沃斯季亚诺夫的六岁孙女。在1812年俄军于菲利村举行的军事会议上，她留在屋内的炕炉上，以儿童的视角观察了库图佐夫和诸位将军的会议过程，成为这一历史时刻的独特见证者。
  书中原文: 只有安德烈的六岁孙女玛拉莎留在那间大屋的炕炉上，勋座抚爱她，吃茶时给她一块糖。玛拉莎从炕炉上羞怯而欢喜地瞧着一个个走进来的将军们的脸。
  网络来源: https://en.wikipedia.org/wiki/Council_at_Fili

- 名词: 克罗萨
  分类: 人物
  解释: 一名在俄军服务的法国人，穿着西班牙军服，曾参与萨拉曼卡战役。在库图佐夫听取将领意见时，他向在场的人讲述萨拉曼卡战役的经过，并和一位在俄军服务的德国亲王议论萨拉戈萨城的保卫战，建议莫斯科也可以效仿萨拉戈萨进行防御。
  书中原文: 又有一些人谈论萨拉曼卡战役，一个刚刚来到的、穿着西班牙军服的法国人克罗萨讲述了战役的经过。这个法国人和一个在俄国军队服务的德国亲王正在议论萨拉戈萨城的保卫战，认为莫斯科也可以如法炮制。
  网络来源: https://en.wikipedia.org/wiki/Battle_of_Salamanca

- 名词: 萨拉戈萨
  分类: 地点
  解释: 西班牙第五大城市，阿拉贡自治区首府，位于埃布罗河畔，拥有两千多年历史。在拿破仑战争期间，萨拉戈萨在1808至1809年经历了两次惨烈的围城战，以顽强的抵抗闻名全欧洲，被称为"不破之城"。该城守军在帕拉福领导下进行了你死我活的巷战。
  书中原文: 这个法国人和一个在俄国军队服务的德国亲王正在议论萨拉戈萨城的保卫战，认为莫斯科也可以如法炮制。
  网络来源: https://baike.baidu.com/item/萨拉戈萨/84970

- 名词: 小雅罗斯拉维茨
  分类: 地点
  解释: 俄罗斯卡卢加州的一座城市，位于卢扎河畔，莫斯科西南约121公里。1812年10月24日在此发生重要战役，拿破仑试图沿卡卢日斯卡雅大路向南撤退，但遭俄军顽强阻击，小镇多次易手，最终库图佐夫封锁了南进道路，迫使法军转向已被摧毁的旧路撤退，成为1812年战争转折点之一。
  书中原文: 他们向卡卢日斯卡雅大路窜去，除了在小雅罗斯拉维茨城下打了一个胜仗外，他们没打过一场大仗，就以更高的速度逃回斯摩棱斯克。
  网络来源: https://en.wikipedia.org/wiki/Battle_of_Maloyaroslavets

- 名词: 麻雀山
  分类: 地点
  解释: 莫斯科西南部的一座山丘，位于莫斯科河南岸，最高处约220米，是莫斯科市的制高点。原名得自1451年一位名叫Vorobey（俄语意为"麻雀"）的牧师所在的村庄。苏联时期曾改名为列宁山，1999年恢复原名。莫斯科大学主楼即建于此山之上。
  书中原文: 如果保卫战失败，就把罪责推给库图佐夫，因为他不战就带着军队退到麻雀山，如果成功，就归功于他个人。
  网络来源: https://baike.baidu.com/item/麻雀山/2184674

- 名词: 菲利军事会议
  分类: 事件
  解释: 1812年9月13日（俄历9月1日）在莫斯科以西菲利村农民安德烈·萨沃斯季亚诺夫家中召开的俄军高级将领会议。由库图佐夫主持，议题是是否在莫斯科城下与拿破仑再战。巴克莱·德·托利主张撤退，贝尼格森主张保卫莫斯科。库图佐夫最终决定放弃莫斯科以保存军队实力，为最终反攻奠定基础。
  书中原文: 在离莫斯科多罗戈米尔城门六俄里的波克隆山上，库图佐夫下了马车……下午两点钟，在农民安德烈·萨沃斯季亚诺夫家一间宽敞、比较好的小屋里举行军事会议。
  网络来源: https://en.wikipedia.org/wiki/Council_at_Fili

- 名词: 放弃莫斯科
  分类: 事件
  解释: 1812年9月13日俄军总司令库图佐夫在菲利军事会议上做出的重大战略决策。当时俄军在波罗金诺战役后损失惨重，无力保卫莫斯科。库图佐夫决定不战而放弃莫斯科，以保存俄军主力，争取休整和补充预备队的时间。这一决定在当时引起极大争议，但最终被证明是击败拿破仑的关键决策。
  书中原文: 莫斯科必须放弃，军队必须撤退，这道命令必须发出。发出这道可怕的命令就等于交出军队的指挥权。
  网络来源: https://en.wikipedia.org/wiki/Council_at_Fili

- 名词: 法军占领莫斯科
  分类: 事件
  解释: 1812年9月14日，拿破仑率法国军队进入莫斯科，此时莫斯科已是一座空城，大部分居民随俄军撤离。法军占领莫斯科后仅停留了五个星期，期间莫斯科发生大火，法军补给严重不足，最终于10月19日开始撤退，标志着拿破仑侵俄战争由盛转衰的转折点。
  书中原文: 俄国人退了一百二十俄里——退过了莫斯科，法国人到达莫斯科，在那儿停下来。此后一连五星期没有战事。法国人在原地不动。他们就像一只受了致命伤的野兽，流着鲜血，在舔它的伤口。
  网络来源: https://en.wikipedia.org/wiki/French_invasion_of_Russia

- 名词: 萨拉曼卡
  分类: 地点
  解释: 西班牙西部古城，萨拉曼卡省首府，以萨拉曼卡大学（1218年建校，西班牙最古老大学）闻名于世。1988年被列为世界文化遗产。在拿破仑半岛战争中，1812年7月22日威灵顿公爵在此击败法军马尔蒙元帅，取得半岛战争中的关键胜利，即萨拉曼卡战役。
  书中原文: 又有一些人谈论萨拉曼卡战役，一个刚刚来到的、穿着西班牙军服的法国人克罗萨讲述了战役的经过。
  网络来源: https://baike.baidu.com/item/萨拉曼卡/901755

- 名词: 萨拉戈萨保卫战
  分类: 事件
  解释: 西班牙独立战争期间萨拉戈萨城抵抗法军入侵的两次围城战（1808年6至8月第一次围城，1808年12月至1809年2月第二次围城）。守将帕拉福率军民顽强抵抗，第二次围城战中法军逐屋争夺，巷战极其惨烈，全城约五万五千居民仅剩一万五千人。此役被视为19世纪最残酷的围城战之一。
  书中原文: 这个法国人和一个在俄国军队服务的德国亲王正在议论萨拉戈萨城的保卫战，认为莫斯科也可以如法炮制。
  网络来源: https://en.wikipedia.org/wiki/Siege_of_Zaragoza_(1808)

- 名词: 别列济纳河
  分类: 地点
  解释: 白俄罗斯境内的一条河流，发源于明斯克高地，全长613公里，注入第聂伯河。1812年11月26至29日，拿破仑大军从莫斯科撤退至此，遭俄军三面包围，法军工兵在冰水中抢建浮桥渡河，场面极其惨烈。法军在此损失惨重，"别列济纳"在法语中成为"惨败"的代名词。
  书中原文: 他们向卡卢日斯卡雅大路窜去，除了在小雅罗斯拉维茨城下打了一个胜仗外，他们没打过一场大仗，就以更高的速度逃回斯摩棱斯克，再从斯摩棱斯克逃往维尔纳，逃往别列济纳河，向更远的地方逃走了。
  网络来源: https://baike.baidu.com/item/别列津纳河/3656184
