- 名词: 安德留沙
  分类: 人物
  解释: 安德留沙（Андрюша）是俄语名字安德烈（Андрей）的爱称/昵称，在《战争与和平》中指尼古拉·罗斯托夫和玛丽亚伯爵夫人的长子安德烈·尼古拉耶维奇·罗斯托夫。该角色出现在小说尾声部分，由母亲在日记中记述其教育情况，包括起床穿衣时的任性与固执。
  书中原文: "今天大儿子安德留沙睡醒觉不肯穿衣服，路易小姐让人来找我。"
  网络来源: https://zh.wikipedia.org/zh/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 路易小姐
  分类: 人物
  解释: 路易小姐（Mademoiselle Louis）是《战争与和平》中罗斯托夫家的法国家庭女教师，负责教养尼古拉和玛丽亚的孩子们。在小说尾声部分，她出现在玛丽亚伯爵夫人的育儿日记中，在安德留沙不肯穿衣服时派人向玛丽亚求助。
  书中原文: "今天大儿子安德留沙睡醒觉不肯穿衣服，路易小姐让人来找我。"
  网络来源: https://zh.wikipedia.org/zh/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 伊利亚·米特罗凡内奇
  分类: 人物
  解释: 伊利亚·米特罗凡内奇是《战争与和平》中尼古拉·罗斯托夫在坦波夫省田庄的管家。在小说尾声部分，他向尼古拉汇报有人出价八万卢布购买森林的消息，反映了尼古拉婚后精心经营田产、努力改善家庭经济状况的情节。
  书中原文: "今天伊利亚·米特罗凡内奇（他的管家）从坦波夫乡下回来说，已经有人出八万卢布要买那片林子了。"
  网络来源: http://yunshuwu.cn/chap/8814.html

- 名词: 道德联盟
  分类: 概念
  解释: 道德联盟（Tugendbund，德语意为"美德联盟"）是1808年6月在普鲁士柯尼斯堡成立的准共济会性质的秘密爱国社团，由自由派贵族和知识分子组成。其宗旨是在拿破仑战争惨败后复兴普鲁士民族精神，推动道德与教育改革，最终解放德国领土。在《战争与和平》尾声部分，皮埃尔向尼古拉等人介绍德意志道德联盟及其政治改革主张，引发了一场关于爱国与革命的思想争论。
  书中原文: "完全不是你想象的那样，这就是德意志的道德联盟以及我的建议。"
  网络来源: https://en.wikipedia.org/wiki/Tugendbund

- 名词: 坦波夫
  分类: 地点
  解释: 坦波夫（Тамбов）是俄罗斯欧洲部分中部的城市和省份（坦波夫省），位于莫斯科东南约480公里，沃罗涅日河左岸。坦波夫省成立于1796年，是俄罗斯帝国重要的农业产区和粮食出口地。在《战争与和平》中，罗斯托夫家在坦波夫乡下拥有田庄，管家定期从该地向尼古拉汇报田庄事务。
  书中原文: "今天伊利亚·米特罗凡内奇（他的管家）从坦波夫乡下回来说，已经有人出八万卢布要买那片林子了。"
  网络来源: https://baike.baidu.com/item/%E5%9D%A6%E6%B3%A2%E5%A4%AB%E7%9C%81/6030321
