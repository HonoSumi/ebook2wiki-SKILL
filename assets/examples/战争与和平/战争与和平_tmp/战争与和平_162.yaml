- 名词: 狄安娜
  分类: 人物
  解释: |
    罗马神话中的月亮女神、狩猎女神，对应希腊神话中的阿尔忒弥斯。她是朱庇特与拉托娜之女，太阳神阿波罗的孪生姐妹，罗马十二主神之一，以美丽、贞洁和善射著称，被视为纯洁与自然的化身。
  书中原文: |
    一个迷人的仙女。她的眼睛蓝莹莹的，嘴，像红珊瑚，雪白雪白的……腰肢，像狄安娜的……
  网络来源: |
    https://zh.wikipedia.org/zh-mo/%E7%8B%84%E5%AE%89%E5%A8%9C
- 名词: 智慧树
  分类: 概念
  解释: |
    出自《圣经·旧约·创世记》，又称知善恶树、分辨善恶树。上帝将亚当和夏娃安置在伊甸园中，吩咐他们不可吃智慧树上的果子。夏娃受蛇诱惑吃了禁果并给了亚当，两人因此被逐出伊甸园，在基督教教义中被视为人类原罪的起源。
  书中原文: |
    禁吃智慧树的果子这个戒条，在历史事件中表现得最为明显。
  网络来源: |
    https://zh.wikipedia.org/zh-tw/%E7%9F%A5%E5%96%84%E6%81%B6%E6%A0%91
