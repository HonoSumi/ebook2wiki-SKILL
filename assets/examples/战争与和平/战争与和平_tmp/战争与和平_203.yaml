- 名词: 保克尔
  分类: 人物
  解释: |
    亨利·托马斯·巴克尔（Henry Thomas Buckle，1821—1862），又译保克尔，英国实证主义史学家，代表作《英国文明史》。他主张人类社会和自然界一样受客观规律支配，反对英雄史观，认为历史研究应当从历史事实中提炼普遍规律，被视为新史学的先驱。其思想对19世纪后半期的科学史学产生了深远影响。
  书中原文: |
    这个概念是掌握现在所记述的历史材料的唯一的把柄，谁要是折断这个把柄，像保克尔那样，而又不懂得研究历史材料的另外方法，谁就只能使自己失去研究历史材料的唯一方法。
  网络来源: |
    https://baike.baidu.com/item/%E4%BA%A8%E5%88%A9%C2%B7%E6%89%98%E9%A9%AC%E6%96%AF%C2%B7%E5%B7%B4%E5%85%8B%E5%B0%94/22869070

- 名词: 路德
  分类: 人物
  解释: |
    马丁·路德（Martin Luther，1483—1546），16世纪德国宗教改革运动的发起者，新教路德宗的奠基人。1517年他在维滕贝格教堂门前张贴《九十五条论纲》，公开质疑赎罪券的效力，成为宗教改革的导火线。他提出"因信称义"的核心神学思想，主张人得救只凭对上帝的虔诚信仰，而非依靠善功或教会的权威；并将《圣经》翻译成德文，对德意志民族语言和文化的发展产生了深远影响。
  书中原文: |
    只要历史所写的是个别的人物，不管这些个别的人是凯撒，是亚历山大，是路德，还是伏尔泰，而不是参加事件的所有的人——毫无例外的所有的人的历史，就不能不把迫使别人向着一定目标活动的力量归于个别的人。
  网络来源: |
    https://baike.baidu.com/item/%E9%A9%AC%E4%B8%81%C2%B7%E8%B7%AF%E5%BE%B7/216493

- 名词: 路易十一
  分类: 人物
  解释: |
    路易十一（Louis XI，1423—1483），法国瓦卢瓦王朝国王（1461—1483年在位），绰号"万能蜘蛛"。他以精于外交谋略和权术著称，通过联合瑞士和洛林对抗勃艮第，在大胆的查理战死后吞并勃艮第公国大部分领土，又兼并安茹、曼恩、普罗旺斯等地，基本完成了法兰西的统一，为法国君主专制制度奠定了基础。
  书中原文: |
    这种权力不可能建立在精神的优越上，因为，暂且不谈拿破仑之流的英雄人物，关于这类人物的道德品质的评价众说纷纭，历史向我们表明，统治千百万人的路易十一和梅特涅在精神上都没有任何特殊的优越性，相反，他们多半在精神方面比他们所统治的千百万人中的任何一个都差得多。
  网络来源: |
    https://baike.baidu.com/item/%E8%B7%AF%E6%98%93%E5%8D%81%E4%B8%80/2934950

- 名词: 赫拉克勒斯
  分类: 人物
  解释: |
    赫拉克勒斯（Heracles），希腊神话中最伟大的英雄，主神宙斯与凡间女子阿尔克墨涅之子，天生神力。因赫拉的诅咒在疯狂中杀害了自己的孩子，为赎罪完成了著名的"十二项伟业"，包括杀死涅墨亚狮子、斩杀九头蛇许德拉、清扫奥革阿斯的牛棚等。死后被众神接纳成为神，升为武仙座。在罗马神话中对应赫丘利（Hercules），他的名字已成为"大力士"的同义词。
  书中原文: |
    这种权力不可能是一个强者对一个弱者在体力上占优势的那种直接的权力——运用体力或以体力相威胁的那种优势，例如赫拉克勒斯的权力；它也不可能建立在精神上的优势，就像一些历史家的天真想法，他们说，历史上的大人物都是英雄，即赋有特殊的精神和智慧，以及赋有所谓天才的人们。
  网络来源: |
    https://baike.baidu.com/item/%E8%B5%AB%E6%8B%89%E5%85%8B%E5%8B%92%E6%96%AF/80186

- 名词: 拿破仑三世
  分类: 人物
  解释: |
    拿破仑三世（Napoléon III，1808—1873），全名夏尔-路易-拿破仑·波拿巴，拿破仑一世的侄子，法兰西第二共和国总统（1848—1851）和法兰西第二帝国皇帝（1852—1870）。他先后于1836年和1840年两次密谋政变失败被捕，1846年成功越狱。1848年凭借拿破仑一世的名望当选总统，1852年称帝。在位期间大力推动工业革命和巴黎城市改造，但1870年在普法战争的色当会战中惨败被俘，第二帝国覆亡。他是法国历史上最后一位君主。
  书中原文: |
    假如权力是移交给统治者的群众意志的总和，那么，布加乔夫是不是群众意志的代表？假如不是，那么为什么拿破仑一世是代表呢？为什么拿破仑三世在布伦被俘的时候是一个罪犯，后来被他捕起来的那些人又成了罪犯呢？
  网络来源: |
    https://baike.baidu.com/item/%E6%8B%BF%E7%A0%B4%E4%BB%91%E4%B8%89%E4%B8%96/2202647

- 名词: 查理一世
  分类: 人物
  解释: |
    查理一世（Charles I，1600—1649），斯图亚特王朝的英格兰、苏格兰和爱尔兰国王（1625—1649年在位）。他奉行"君权神授"理念，与议会矛盾尖锐，1629年解散议会，开始了长达11年的个人专制统治。1642年英国内战爆发，1646年被议会军击败后被俘。1649年以"暴君、叛国者、杀人犯和人民公敌"的罪名被公开处死，成为英国历史上唯一被公开处死的国王，也是欧洲史上第一个被公开处死的君主。
  书中原文: |
    假如移交权力的条件在于人民的财富、自由和教育，为什么路易十四和伊凡四世都得到了善终，而路易十六和查理一世却被人民送上断头台？
  网络来源: |
    https://baike.baidu.com/item/%E6%9F%A5%E7%90%86%E4%B8%80%E4%B8%96/3752337

- 名词: 路易十八
  分类: 人物
  解释: |
    路易十八（Louis XVIII，1755—1824），法国波旁王朝国王（1814—1824年在位），路易十六之弟。法国大革命爆发后流亡国外，拿破仑战败退位后于1814年回国即位，颁布《1814年宪章》，实行君主立宪制。1815年拿破仑"百日王朝"期间再度流亡，滑铁卢战败后第二次复辟。统治期间相对温和，致力于调和旧贵族与新兴资产阶级的矛盾，但晚年受制于极端保王派。
  书中原文: |
    那意志的总和一连几个世纪掌握在某一些统治者及其继承人的手里，然后突然在五十年间就移交给国民议会，移交给执政府，移交给拿破仑，移交给亚历山大，移交给路易十八，再度移交给拿破仑，移交给查理十世，移交给路易·菲力普，移交给共和政府，移交给拿破仑三世。
  网络来源: |
    https://baike.baidu.com/item/%E8%B7%AF%E6%98%93%E5%8D%81%E5%85%AB/3799809

- 名词: 查理十世
  分类: 人物
  解释: |
    查理十世（Charles X，1757—1836），法国波旁王朝末代国王（1824—1830年在位），路易十五之孙，路易十八之弟。即位前长期称阿图瓦伯爵，是极端保王派的领袖。在位期间推行极端保守政策，加强天主教统治地位，压制新闻和出版自由。1830年颁布四道敕令解散议会、限制选举权，触发七月革命，被迫退位流亡英国。他是法国波旁王朝实际上的末代国王。
  书中原文: |
    那意志的总和一连几个世纪掌握在某一些统治者及其继承人的手里，然后突然在五十年间就移交给国民议会，移交给执政府，移交给拿破仑，移交给亚历山大，移交给路易十八，再度移交给拿破仑，移交给查理十世，移交给路易·菲力普，移交给共和政府，移交给拿破仑三世。
  网络来源: |
    https://baike.baidu.com/item/%E6%9F%A5%E7%90%86%E5%8D%81%E4%B8%96/4553262

- 名词: 路易·菲力普
  分类: 人物
  解释: |
    路易·菲力普（Louis Philippe I，1773—1850），法国奥尔良王朝（七月王朝）唯一一位国王（1830—1848年在位），波旁王朝旁支奥尔良家族成员。1830年七月革命后接替查理十世登基，接受君主立宪制，代表金融大资产阶级利益，被戏称为"手拿雨伞的资产阶级国王"。1848年二月革命中逊位，流亡英国。他是法国历史上最后一位国王（此后只有皇帝拿破仑三世）。
  书中原文: |
    那意志的总和一连几个世纪掌握在某一些统治者及其继承人的手里，然后突然在五十年间就移交给国民议会，移交给执政府，移交给拿破仑，移交给亚历山大，移交给路易十八，再度移交给拿破仑，移交给查理十世，移交给路易·菲力普，移交给共和政府，移交给拿破仑三世。
  网络来源: |
    https://baike.baidu.com/item/%E8%B7%AF%E6%98%93%C2%B7%E8%8F%B2%E5%88%A9%E6%99%AE%E4%B8%80%E4%B8%96/22825292

- 名词: 狄德罗
  分类: 人物
  解释: |
    德尼·狄德罗（Denis Diderot，1713—1784），法国启蒙思想家、唯物主义哲学家、文学家，"百科全书派"的核心领袖，与伏尔泰、卢梭并称为法国启蒙运动的"三大领袖"。他历时21年主编完成28卷《百科全书》（后增补至35卷），以启蒙思想反封建、反教会，为法国大革命作了舆论准备。主要著作包括《哲学思想录》《论盲人书简》《拉摩的侄儿》《修女》等，提出"美在关系"的美学学说。
  书中原文: |
    十八世纪末西方各民族的骚动和他们的东进，能用路易十四、十五和十六、他们的情妇们和大臣们的活动来说明吗？能用拿破仑、卢梭、狄德罗、博马舍和别的人们的生活来说明吗？
  网络来源: |
    https://baike.baidu.com/item/%E5%BE%B7%E5%B0%BC%C2%B7%E7%8B%84%E5%BE%B7%E7%BD%97/8028129

- 名词: 博马舍
  分类: 人物
  解释: |
    皮埃尔-奥古斯坦·卡隆·德·博马舍（Pierre-Augustin Caron de Beaumarchais，1732—1799），法国启蒙运动时期杰出的剧作家，被公认为继莫里哀之后法国最伟大的喜剧家。代表作"费加罗三部曲"包括《塞维利亚的理发师》《费加罗的婚礼》《有罪的母亲》，以平民战胜贵族为主题，辛辣讽刺封建特权阶层。《费加罗的婚礼》曾遭禁演六年，被视为法国大革命前夕的"革命宣言"，后被莫扎特改编为同名歌剧，成为歌剧史上的巅峰之作。
  书中原文: |
    十八世纪末西方各民族的骚动和他们的东进，能用路易十四、十五和十六、他们的情妇们和大臣们的活动来说明吗？能用拿破仑、卢梭、狄德罗、博马舍和别的人们的生活来说明吗？
  网络来源: |
    https://baike.baidu.com/item/%E7%9A%AE%E5%9F%83%E5%B0%94%C2%B7%E5%8D%9A%E9%A9%AC%E8%88%8D

- 名词: 库尔布斯基
  分类: 人物
  解释: |
    安德烈·米哈伊洛维奇·库尔布斯基（Andrei Kurbsky，1528—1583），俄国贵族、军事统帅和作家，出身于留里克王朝分支。曾为伊凡四世（伊凡雷帝）的重臣，在喀山围城战中立有战功。1564年因失宠叛逃至立陶宛，成为俄国历史上最早的政治流亡者之一。流亡期间与伊凡四世保持十余年书信往来，相互激烈批判，这些信件是16世纪俄国政论文学的经典，也是研究伊凡四世统治的重要史料。
  书中原文: |
    俄国人民东进到喀山和西伯利亚，能用伊凡四世病态的性格和他同库尔布斯基的通信来说明吗？
  网络来源: |
    https://baike.baidu.com/item/%E5%AE%89%E5%BE%B7%E7%83%88%C2%B7%E5%BA%93%E5%B0%94%E5%B8%83%E6%96%AF%E5%9F%BA/12002927

- 名词: 莱茵联邦
  分类: 事件
  解释: |
    莱茵联邦（1806—1813），又称莱茵邦联，是拿破仑在德意志中西部建立的卫星政治实体。1806年7月16个德意志邦国宣布脱离神圣罗马帝国，组成莱茵联邦，拿破仑自任"联邦保护人"。该联邦直接导致神圣罗马帝国于1806年8月灭亡。鼎盛时期包含39个邦国，面积约32万平方公里，人口约1460万，在德意志地区推广了《拿破仑法典》和资产阶级改革。1813年莱比锡战役拿破仑战败后解体。
  书中原文: |
    莱茵联邦的意志在一八〇八年移交给拿破仑了吗？一八〇九年，当我们的军队联合法国人去打奥国人的时候，俄国人民的意志移交给拿破仑了吗？
  网络来源: |
    https://baike.baidu.com/item/%E8%8E%B1%E8%8C%B5%E9%82%A6%E8%81%94

- 名词: 群众意志
  分类: 概念
  解释: |
    托尔斯泰在《战争与和平》历史哲学部分提出的核心概念。他认为权力并非来自英雄人物个人，而是"群众意志的总和"，群众以明示或默许的方式将权力移交给统治者。这一观点构成了托尔斯泰"人民的思想"的基石，直接否定了英雄创造历史的传统史观，强调历史由无数普通人的意志和行动共同推动，是托尔斯泰历史哲学中最重要的理论范畴。
  书中原文: |
    权力是群众意志的总和，群众或以明显的表达或以默然的许诺把权力交给他们所选出的统治者。
  网络来源: |
    http://www.chinawriter.com.cn/n1/2018/1021/c404091-30353269.html

- 名词: 世界通史家
  分类: 概念
  解释: |
    托尔斯泰在《战争与和平》尾声中批判的对象之一。他批评"世界通史家"虽然表面上放弃用"权力"概念解释历史，但每迈一步仍得求助于权力概念；他们在回答"权力是什么"这个历史主要问题时矛盾百出。托尔斯泰认为，不回答人类主要问题的世界通史家，不过是供大学和爱读正经书本的读者中间流通的无价值的硬币，无法真正解释历史的运动规律。
  书中原文: |
    用权力概念解释历史现象的必然性，由世界通史家和文化史家本身表示的最为明显，因为他们虽然表面放弃权力这个概念，而每迈一步都得求助于它。
  网络来源: |
    https://www.aisixiang.com/data/109478.html

- 名词: 文化史家
  分类: 概念
  解释: |
    托尔斯泰在《战争与和平》尾声中批判的对象之一。他批评"文化史家"回避"权力是什么"这个历史的主要问题，说了一些文不对题的话。托尔斯泰将历史科学比作流通的货币，认为传记和各民族史专著如纸币，而世界通史家和文化史家如以轻金属铸成的硬币——只能叮当作响而没有真正的价值。他们无法回答推动各民族运动的力量究竟是什么这一根本问题。
  书中原文: |
    世界通史家和文化史家正像那种人——他认识到纸币的缺点，决定用比黄金轻的金属铸成硬币以代替纸币。那种硬币的确叮当作响，但也只是叮当作响而已。
  网络来源: |
    http://www.chinawriter.com.cn/n1/2018/1021/c404091-30353269.html
