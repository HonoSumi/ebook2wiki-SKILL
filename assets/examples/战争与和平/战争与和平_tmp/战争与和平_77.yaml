- 名词: 约瑟夫·阿列克谢耶维奇
  分类: 人物
  解释: 约瑟夫·阿列克谢耶维奇·巴兹杰耶夫（Осип Алексеевич Баздеев），《战争与和平》中皮埃尔的共济会导师和精神引路人。在小说第二卷中，皮埃尔在前往彼得堡途中于托尔若克驿站与他相遇，他被皮埃尔的"道德上的疑惑和不幸"打动，向皮埃尔宣讲共济会教义，并亲自介绍皮埃尔加入共济会。此后两人保持通信，约瑟夫·阿列克谢耶维奇持续以书信指导皮埃尔的灵性修行。在本书第77段皮埃尔的日记中，频繁出现约瑟夫·阿列克谢耶维奇的身影，包括他们在梦中和现实中的对话。
  书中原文: 我梦见约瑟夫·阿列克谢耶维奇坐在我家里，我很高兴，想款待他。仿佛我没完没了地同旁人闲谈，我忽然想起他可能对这不高兴，我想亲近他，拥抱他。但是一接近他，我看见他的脸变样了，变得年轻了，他对我低声讲本会的教义，声音轻得我听不清楚。然后我们都从屋里出来，于是发生了一件怪事。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/48850

- 名词: 多洛霍夫
  分类: 人物
  解释: 费奥多尔·伊万诺维奇·多洛霍夫（Фёдор Иванович Долохов），《战争与和平》中的重要配角，谢苗诺夫团的军官。他出身并不富有，但以大胆、冷酷、擅长决斗而闻名。他曾与皮埃尔因海伦·别祖霍娃发生争执并进行决斗（重伤皮埃尔），也曾与尼古拉·罗斯托夫因牌局产生巨大债务纠葛。他性格极端，兼具勇敢和残忍，是一个复杂的"反英雄"形象。在本书第77段中，皮埃尔的日记提及多洛霍夫在莫斯科遇到他，祝他"身心安泰"，但皮埃尔并未回应，并为此感到内疚。
  书中原文: 在决斗后，多洛霍夫先生在莫斯科碰到我，他对我说，他祝我身心安泰，虽然太太不在这里。当时我没有理他。现在我回忆起那次会见的细节，我在心中对他说出最恶毒的话和最刻薄的回答。
  网络来源: https://baike.baidu.com/item/%E5%A4%9A%E6%B4%9B%E9%9C%8D%E5%A4%AB

- 名词: 鲍里斯·德鲁别茨科伊
  分类: 人物
  解释: 鲍里斯·德鲁别茨科伊（Борис Друбецкой），《战争与和平》中德鲁别茨基家的独子，安娜·米哈伊洛夫娜的儿子。他出身没落贵族，起初与罗斯托夫家关系密切，与娜塔莎有过青梅竹马的恋情。他参军后善于钻营，通过结交权贵在军中步步高升。在本书第77段中，皮埃尔的日记提到鲍里斯来访讲述冒险故事，皮埃尔因不耐烦而对他态度粗暴，事后深感懊悔。在小说后文中鲍里斯再次出现在罗斯托夫家访客之列。
  书中原文: 后来鲍里斯·德鲁别茨科伊来了，讲了一些冒险故事。从他一进门，我就不高兴他的来访，我对他说了不中听的话。他顶了我一句。我火了，对他说了一大堆不愉快的甚至粗暴的话。
  网络来源: https://baike.baidu.com/item/%E9%B2%8D%E9%87%8C%E6%96%AF%C2%B7%E5%BE%B7%E9%B2%81%E5%88%AB%E8%8C%A8%E7%A7%91%E4%BC%8A

- 名词: 贝格
  分类: 人物
  解释: 阿尔方斯·卡尔洛维奇·贝格（Альфонс Карлович Берг），《战争与和平》中利沃尼亚德意志裔贵族军官，后升任近卫军大尉。他以精明算计、务实钻营著称。在奥斯特利茨战役中右手受伤，在芬兰战争中拾得榴弹碎片向长官报功，因此获得多枚勋章。他在彼得堡兼任数份肥差，社会地位稳步上升。在本书第77段中，贝格向薇拉·罗斯托娃求婚，并亲自登门与老伯爵讨价还价确定陪嫁数额。托尔斯泰通过贝格这个人物讽刺了将婚姻视作商业交易的市侩观念。
  书中原文: 贝格把他在奥斯特利茨战役受伤的右手给每个人看，用左手扶握着完全无用的军刀，他这样做倒也没有白费。他是那么执著而且意味深长地对每个人讲这件事，人人都认为他做得对，做得好，而贝格由于奥斯特利茨战役得到两枚勋章。
  网络来源: https://baike.baidu.com/item/%E8%B4%9D%E6%A0%BC/48850

- 名词: 薇拉·罗斯托娃
  分类: 人物
  解释: 薇拉·伊里尼奇娜·罗斯托娃（Вера Ильинична Ростова），《战争与和平》中罗斯托夫伯爵的长女。她长得美丽聪明但性格理性冷静、缺乏热情，与热情奔放的妹妹娜塔莎形成鲜明对比。她嫁给了贝格，婚后与贝格一起过着务实、体面的生活。在本书第77段中，贝格正式向她求婚，她已24岁，在此之前从未有人向她求婚，家人因经济困难而急于促成婚事。
  书中原文: 薇拉已经二十四岁了，到处都露过面，虽然她的确长得好看而且通情达理，但是从来没有人向她求过婚。所以就同意了。
  网络来源: https://baike.baidu.com/item/%E8%96%AA%E8%96%AA%C2%B7%E7%BD%97%E6%96%AF%E6%89%98%E5%A7%91%E5%A8%98

- 名词: 娜塔莎·罗斯托娃
  分类: 人物
  解释: 娜塔莉亚·伊里尼奇娜·罗斯托娃（Наталья Ильинична Ростова），昵称娜塔莎，是《战争与和平》的核心女主人公之一，罗斯托夫伯爵的次女。她天真活泼、富有激情和音乐天赋，是小说的灵魂人物。小说开始时她年仅十三岁，在本书第77段中已满十六岁。四年前她曾与鲍里斯·德鲁别茨科伊有过纯真的亲吻和誓言，此时她内心仍在纠结那个誓言是否还有约束力，而鲍里斯似乎有意回避她。小说中娜塔莎经历了与安德烈公爵的订婚、与阿纳托利·库拉金的私奔风波、战争期间的成长，最终与皮埃尔结婚。
  书中原文: 娜塔莎十六岁了，这是一八〇九年，也就是四年前和鲍里斯亲吻之后她扳着指头数到的这一年。从那时起，她一次也没见过鲍里斯。在索尼娅和母亲面前谈起鲍里斯的时候，她像谈久已过去的事，满不在意地说，从前的一切都是孩提的事，不值得一提，早就忘记了。
  网络来源: https://baike.baidu.com/item/%E5%A8%9C%E5%A1%94%E8%8E%8E%C2%B7%E4%BC%8A%E5%8E%BB%E5%86%85%E5%83%A5%E7%BA%B3%E8%80%B6%E5%A4%AB%E5%A8%9C%C2%B7%E7%BD%97%E6%96%AF%E6%89%98%E5%A7%91%E5%A8%98

- 名词: 尼古拉·罗斯托夫
  分类: 人物
  解释: 尼古拉·伊里奇·罗斯托夫（Николай Ильич Ростов），《战争与和平》中罗斯托夫伯爵的长子。他热情冲动、重视荣誉，是一名骠骑兵军官。在小说中经历了申格拉本和奥斯特利茨战役的洗礼，从热血青年逐渐成熟。他在牌桌上输给多洛霍夫四万三千卢布，后来在1812年战争中表现出色。因父亲去世后家道中落，他承担起还债和照顾家庭的重任。在本书第77段中，他选择留在团队当一名小军官以节省开支。
  书中原文: 虽然尼古拉·罗斯托夫拿定主意在默默无闻的团队继续当一名小军官，花费比较节省，但是在奥特拉德诺耶过的是那样的生活，特别是米坚卡那样处理事情，弄得债务逐年不断增加。
  网络来源: https://baike.baidu.com/item/%E5%B0%BC%E5%8F%A4%E6%8B%89%C2%B7%E4%BC%8A%E9%87%8C%E5%A5%87%C2%B7%E7%BD%97%E6%96%AF%E6%89%98%E5%A4%AB

- 名词: 皮埃尔·别祖霍夫
  分类: 人物
  解释: 皮埃尔·别祖霍夫（Пьер Безухов），《战争与和平》的核心男主人公之一，别祖霍夫老伯爵的私生子，后继承巨额遗产成为俄国最富有的人之一。他性格善良真诚但意志软弱，先后经历了与海伦的不幸婚姻、与多洛霍夫的决斗、加入共济会寻求精神寄托、在1812年战争中被法军俘虏并与普拉东·卡拉达耶夫相遇等重大事件，最终与娜塔莎结婚，实现了精神上的成熟。在本书第77段中，皮埃尔的日记展示了他作为共济会成员的内省与灵性修行。
  书中原文: 中，万有是统一体，要从其总体和生活中认识它。三位一体，是物质的三元素——硫磺、水银和盐。硫磺具有油与火的性质；它以其火力与盐相结合，便引起盐的强烈欲望，由于有了这种欲望就吸引水银，捉住它不放，于是共同生出每件其他物体。
  网络来源: https://baike.baidu.com/item/%E7%9A%AE%E5%9F%83%E5%B0%94%C2%B7%E5%88%AB%E7%A5%96%E9%9C%8D%E5%A4%AB

- 名词: 老伯爵(罗斯托夫伯爵)
  分类: 人物
  解释: 伊利亚·安德烈耶维奇·罗斯托夫伯爵（Граф Илья Андреевич Ростов），《战争与和平》中罗斯托夫家族的一家之主。他为人慷慨好客、善良宽厚，但生性散漫、不善理财，导致家道中落。他在莫斯科和彼得堡都广交朋友，餐桌上总坐满各色宾客。在本书第77段中，他带着全家迁居彼得堡谋事，面对贝格的求婚，他既拿不出陪嫁田庄也没有现款，在贝格的步步紧逼下尴尬地许诺八万卢布期票加两万现款。他是小说中旧式俄国贵族慷慨而没落的典型代表。
  书中原文: 老伯爵显然觉得，唯一的办法就是担任一份公差，于是他就到彼得堡去谋事；如他所说，一面谋事，一面最后一次让姑娘们寻寻开心。
  网络来源: https://baike.baidu.com/item/%E4%BC%8A%E5%88%A9%E4%BA%9A%C2%B7%E5%AE%89%E5%BE%B7%E5%88%97%E8%80%B6%E5%A4%AB%E9%87%8C%E5%A5%87%C2%B7%E7%BD%97%E6%96%AF%E6%89%98%E5%A4%AB

- 名词: 老伯爵夫人(罗斯托夫伯爵夫人)
  分类: 人物
  解释: 罗斯托夫伯爵夫人（Графиня Ростова），《战争与和平》中伊利亚·安德烈耶维奇·罗斯托夫伯爵的妻子，娜塔莎、尼古拉、薇拉、彼佳的母亲。她是一位慈爱而感性的母亲，对孩子们的幸福极为关心，但面对家道中落无能为力。在本书第77段中，她对鲍里斯·德鲁别茨科伊的冷淡态度感到伤感，念叨"如今都不把老朋友记在心上了"。
  书中原文: 如今都不把老朋友记在心上了。"一提起鲍里斯，老伯爵夫人就这么说。
  网络来源: https://baike.baidu.com/item/%E7%BD%97%E6%96%AF%E6%89%98%E5%A4%AB%E4%BC%AF%E7%88%B5%E5%A4%AB%E4%BA%BA

- 名词: 索尼娅(罗斯托夫家养女)
  分类: 人物
  解释: 索尼娅·亚历山德罗夫娜（Соня Александровна），《战争与和平》中罗斯托夫家的养女，是伯爵夫人的外甥女。她温柔忠诚、沉静无私，深爱尼古拉·罗斯托夫，却因没有陪嫁而无法与他结婚。她的自我牺牲性格贯穿全书，她终身未嫁，在尼古拉与玛丽亚公爵小姐结婚后仍生活在罗斯托夫家照顾孩子。在本书第77段中，当娜塔莎谈到鲍里斯时，索尼娅在旁。
  书中原文: 在索尼娅和母亲面前谈起鲍里斯的时候，她像谈久已过去的事，满不在意地说，从前的一切都是孩提的事，不值得一提，早就忘记了。
  网络来源: https://baike.baidu.com/item/%E7%B4%A2%E5%B0%BC%E5%A8%85/48850

- 名词: 安娜·米哈伊洛夫娜(德鲁别茨卡娅)
  分类: 人物
  解释: 安娜·米哈伊洛夫娜·德鲁别茨卡娅（Анна Михайловна Друбецкая），《战争与和平》中鲍里斯·德鲁别茨科伊的母亲。她出身古老的公爵家族但已没落，为了儿子的前程四处奔走，善于钻营。在小说开头她成功为儿子在近卫军中谋得职位。在本书第77段中，她近来很少去罗斯托夫家，似乎特别端起架子，一提起儿子的成就就眉飞色舞。她对鲍里斯在彼得堡的社交晋升起到了重要的推手作用。
  书中原文: 安娜·米哈伊洛夫娜近来很少去罗斯托夫家，她好像特别拿起架子来了，她一谈起儿子的好处和他那光辉的前程，就眉飞色舞，感激不尽。
  网络来源: https://baike.baidu.com/item/%E5%AE%89%E5%A8%9C%C2%B7%E7%B1%B3%E5%93%88%E4%BC%8A%E6%B4%9B%E5%A4%AB%E5%A8%9C

- 名词: 米坚卡
  分类: 人物
  解释: 米坚卡（Митенька），俄语名德米特里的昵称，《战争与和平》中罗斯托夫伯爵家的管家。他精明狡猾，利用老伯爵宽厚善良、不善理财的弱点，多年侵吞伯爵家产，账目混乱不堪。尼古拉·罗斯托夫回家后曾抓住他的脖子将他拖出庄园。但老伯爵仍信任他，认为他"本性善良"，体现了老伯爵的管理无能和旧式贵族庄园的没落。在本书第77段中，米坚卡处理事务的方式导致罗斯托夫家债务逐年增加。
  书中原文: 在奥特拉德诺耶过的是那样的生活，特别是米坚卡那样处理事情，弄得债务逐年不断增加。
  网络来源: https://www.zhangyue.com/readbook/10193695/13.html

- 名词: 佩龙斯卡娅
  分类: 人物
  解释: 玛丽亚·伊格纳季耶夫娜·佩龙斯卡娅（Марья Игнатьевна Перонская），《战争与和平》中罗斯托夫伯爵夫人的亲戚和友人，一位衰老的宫廷女官。她熟悉彼得堡上流社会的规则，为初来乍到的罗斯托夫家充当社交引路人。在小说后文中，她陪同罗斯托夫一家参加盛大舞会，一一指点介绍宾客身份。在本书第77段中，她出现在罗斯托夫家彼得堡家宴的宾客名单中。
  书中原文: 罗斯托夫家在彼得堡也像在莫斯科一样好客，他们的餐桌上坐着各式各样的人物：奥特拉德诺耶的邻人，境况欠佳的老地主及其女儿们、宫廷女官佩龙斯卡娅、皮埃尔·别祖霍夫，以及在彼得堡当差的县邮局局长的儿子，等等。
  网络来源: http://www.8ge.net/bookyuedu/%E5%90%8D%E8%91%97%C2%B7%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/244.htm

- 名词: 奥特拉德诺耶
  分类: 地点
  解释: 奥特拉德诺耶（Отрадное），《战争与和平》中罗斯托夫家族在乡下的庄园，意为"欢乐之地"。位于莫斯科附近，是罗斯托夫家主要的乡村住所。小说中许多温馨的家庭场景发生于此，包括狩猎、圣诞节化装舞会等。娜塔莎曾在此地的月夜里与索尼娅倾诉心事，安德烈公爵也曾在此听到娜塔莎的歌声而深受触动。在本书第77段中，罗斯托夫家在此住了两年后迁居彼得堡。
  书中原文: 罗斯托夫家在乡下住了两年，在这期间，他们的经济状况并不见好转。
  网络来源: https://baike.baidu.com/item/%E5%A5%A5%E7%89%B9%E6%8B%89%E5%BE%B7%E8%AF%BA%E8%80%B6

- 名词: 彼得堡
  分类: 地点
  解释: 彼得堡（Петербург，今圣彼得堡），俄罗斯帝国的首都，位于涅瓦河口、芬兰湾东岸，由彼得大帝于1703年建立。在《战争与和平》的时代背景中，彼得堡是俄国政治、军事和上流社会生活的中心，皇宫、政府机构、外交使团均设于此。小说中安娜·帕夫洛夫娜·舍列尔的沙龙、罗斯托夫家与贝格等人的社交活动均在此展开。在本书第77段中，罗斯托夫家迁居彼得堡谋事。
  书中原文: 罗斯托夫家到彼得堡不久，贝格就向薇拉求婚，他的求婚被接受了。
  网络来源: https://baike.baidu.com/item/%E5%9C%A3%E5%BD%BC%E5%BE%97%E5%A0%A1

- 名词: 莫斯科
  分类: 地点
  解释: 莫斯科（Москва），俄罗斯的古都，19世纪初俄国的文化和社会中心。与彼得堡的官方严肃氛围不同，莫斯科更代表俄国传统贵族的生活方式和人情世故。《战争与和平》的开篇和许多重要场景均发生在莫斯科（如罗斯托夫家的命名日舞会、皮埃尔继承遗产、别祖霍夫老伯爵之死、1812年莫斯科大火等）。在本书第77段中，罗斯托夫家在莫斯科属于上流社会，但在彼得堡却被视为外省人。
  书中原文: 罗斯托夫家虽然在莫斯科属于上流社会，其实他们并不知道也不考虑他们是属于哪个社会，可是在彼得堡他们的交游相当庞杂而且不固定。
  网络来源: https://baike.baidu.com/item/%E8%8E%AB%E6%96%AF%E7%A7%91

- 名词: 梁赞
  分类: 地点
  解释: 梁赞（Рязань），俄罗斯欧洲部分中部的一座历史名城，梁赞省的首府，位于莫斯科东南约190公里处的奥卡河畔。在《战争与和平》中，梁赞省有罗斯托夫家族的田庄，老伯爵原计划将梁赞田庄作为女儿薇拉的陪嫁，但因经济窘迫而无法兑现。
  书中原文: 伯爵有时想把梁赞的田庄给薇拉，有时想卖掉森林，有时又想贷款。
  网络来源: https://baike.baidu.com/item/%E6%A2%81%E8%B5%9E

- 名词: 利沃尼亚
  分类: 地点
  解释: 利沃尼亚（Livonia，又译立窝尼亚），波罗的海东岸的历史地区，大致涵盖今爱沙尼亚和拉脱维亚的大部分领土。1721年大北方战争后并入俄罗斯帝国，称利夫兰省。该地区上层社会以德意志裔贵族为主。在《战争与和平》中，贝格的父亲是"利沃尼亚地方无名小贵族的儿子"，属于波罗的海德意志裔贵族阶层，其社会经济地位低于俄罗斯世袭贵族。
  书中原文: 一个利沃尼亚地方无名小贵族的儿子，竟然向罗斯托娃伯爵小姐求婚，起初未免令人奇怪。
  网络来源: https://zh.wikipedia.org/wiki/%E5%88%A9%E6%B2%83%E5%B0%BC%E4%BA%9A

- 名词: 贝格向薇拉求婚
  分类: 事件
  解释: 《战争与和平》第二卷第三部中的重要情节。贝格——一位利沃尼亚德意志裔的俄军军官——在彼得堡向罗斯托夫家长女薇拉求婚。他在莫斯科剧院初见薇拉时就已下定决心娶她，四年后衡量双方经济条件成熟后正式提出。尽管贝格出身不高，罗斯托夫家在经济窘迫和薇拉年已二十四岁未嫁的现实下接受了这门婚事。陪嫁谈判成为小说中经典的讽刺段落。
  书中原文: 四年前，在莫斯科一家剧院里，贝格碰见一个也是德意志籍的同事，他向这位同事指着薇拉·罗斯托娃用德语说："她将要做我的妻子。"从那时起，他就下决心要娶她。现在在彼得堡，他衡量一下罗斯托夫家的和自己的经济地位，他认为时机到了，于是提出了求婚。
  网络来源: https://book.douban.com/annotation/141385836/

- 名词: 奥斯特利茨战役
  分类: 事件
  解释: 奥斯特利茨战役（Battle of Austerlitz），又称三皇会战，发生于1805年12月2日（俄历11月20日），地点在今捷克境内的奥斯特利茨（Austerlitz，今斯拉夫科夫）。拿破仑一世指挥的法军击败了俄国沙皇亚历山大一世和奥地利皇帝弗朗茨二世率领的俄奥联军。这是拿破仑军事生涯中最辉煌的胜利之一。在《战争与和平》中，这场战役是小说的核心军事事件之一，安德烈公爵在此身受重伤，目睹了"奥斯特利茨的天空"，经历了精神上的重大转折。
  书中原文: 贝格把他在奥斯特利茨战役受伤的右手给每个人看，用左手扶握着完全无用的军刀，他这样做倒也没有白费。他是那么执著而且意味深长地对每个人讲这件事，人人都认为他做得对，做得好，而贝格由于奥斯特利茨战役得到两枚勋章。
  网络来源: https://baike.baidu.com/item/%E5%A5%A5%E6%96%AF%E7%89%B9%E5%88%A9%E8%8C%A8%E6%88%98%E5%BD%B9

- 名词: 芬兰战争(一八〇八至一八〇九)
  分类: 事件
  解释: 芬兰战争（1808年2月-1809年9月），是俄罗斯帝国与瑞典王国之间为争夺芬兰控制权而爆发的战争。俄国在《提尔西特和约》后与法国结盟，要求瑞典加入大陆封锁体系遭拒后发动进攻。俄军穿越冰海进行奇袭，最终迫使瑞典割让芬兰及阿兰群岛，芬兰成为俄罗斯帝国内的芬兰大公国。《战争与和平》中贝格在芬兰战争中拾起榴弹碎片向长官报功，因而再获两枚勋章。
  书中原文: 在芬兰战争中，他也立了功。榴弹打死了总司令身边的一名副官，他拾起一块榴弹碎片，拿着去见他的长官。也像在奥斯特利茨战役之后一样，他对每个人都讲这件事，讲得冗长而且不厌其烦，使得每个人都相信应当那样做，——于是他因为参加芬兰战争又得到两枚勋章。
  网络来源: https://baike.baidu.com/item/%E8%8A%AC%E5%85%B0%E6%88%98%E4%BA%89

- 名词: 罗斯托夫家迁居彼得堡
  分类: 事件
  解释: 《战争与和平》第二卷第三部中的重要转折点。罗斯托夫家在奥特拉德诺耶乡下住了两年后，由于经济状况持续恶化，老伯爵决定带着全家迁居彼得堡谋求公差。这次迁居使罗斯托夫家重新进入上流社会圈子，直接促成了贝格向薇拉的求婚、娜塔莎与鲍里斯的重逢以及娜塔莎在彼得堡大型舞会上与安德烈公爵的相识等一系列后续情节。
  书中原文: 虽然尼古拉·罗斯托夫拿定主意在默默无闻的团队继续当一名小军官，花费比较节省，但是在奥特拉德诺耶过的是那样的生活，特别是米坚卡那样处理事情，弄得债务逐年不断增加。老伯爵显然觉得，唯一的办法就是担任一份公差，于是他就到彼得堡去谋事；如他所说，一面谋事，一面最后一次让姑娘们寻寻开心。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 共济会
  分类: 概念
  解释: 共济会（Freemasonry），起源于中世纪的石匠行会，18世纪发展为全球性的兄弟会组织，强调道德修养、兄弟友爱和理性启蒙。在《战争与和平》中，皮埃尔在精神空虚时加入共济会，约瑟夫·阿列克谢耶维奇·巴兹杰耶夫是他的入会介绍人和精神导师。皮埃尔通过共济会寻求生命的意义，尝试在自己的田庄上进行改革（解放农奴、建立学校和医院），但最终因共济会内部的腐败和形式主义而失望。共济会的教义——博爱、自我净化、美德修行——是理解皮埃尔精神成长的重要线索。
  书中原文: 今天我回想本会的教义，想起会友的三大敌人：骄傲、意志薄弱和谬误。这些错误中最大的错误是，把个人独立的行为当作与兄弟会无关的事。我认为真理高于一切。在会友中，我最爱那些年长的会友，特别是约瑟夫·阿列克谢耶维奇。我赞成他的看法。
  网络来源: https://baike.baidu.com/item/%E5%85%B1%E6%B5%8E%E4%BC%9A

- 名词: 雅歌
  分类: 概念
  解释: 雅歌（Song of Songs / Song of Solomon），《圣经·旧约》中的一卷诗歌书，传统上认为由所罗门王所作。全书以男女对唱的情诗形式表达爱情的坚贞与美好，是圣经中最短的卷之一，也是极独特的一卷——书中几乎不涉及宗教术语。在《战争与和平》皮埃尔的日记中，他梦见自己翻阅一本画册，"画的都是灵魂跟它爱人的恋爱故事"，其中一幅美丽的少女画像象征《雅歌》，体现了皮埃尔在共济会修行中对纯净精神之爱的追求和对肉欲诱惑的挣扎。
  书中原文: 我仿佛看见书里有一幅美丽的少女画像，她穿着透明的衣衫，身体也是透明的，正在向云端飞翔。我知道这个少女不过是《雅歌》的象征。我一面看这些图画，一面觉得我正在做坏事，可是我的眼睛离不开这些图画。
  网络来源: https://baike.baidu.com/item/%E9%9B%85%E6%AD%8C/10483493

- 名词: 三位一体(物质)
  分类: 概念
  解释: 炼金术中的"神圣三元素"（Tria Prima）理论，由文艺复兴时期著名炼金术士帕拉塞尔苏斯（Paracelsus）正式确立。该理论认为世间万物皆由三种基本元素——硫磺（代表灵魂、活性、可燃性）、水银（代表精神、流动性、挥发性）和盐（代表肉体、固态、稳定性）——以不同比例组合而成。在《战争与和平》第77段皮埃尔的共济会日记中，皮埃尔以此为框架阐述共济会的宇宙观，将物质的三位一体与精神的三位一体相类比，体现了共济会教义中的神秘主义哲学。
  书中原文: 三位一体，是物质的三元素——硫磺、水银和盐。硫磺具有油与火的性质；它以其火力与盐相结合，便引起盐的强烈欲望，由于有了这种欲望就吸引水银，捉住它不放，于是共同生出每件其他物体。
  网络来源: https://baike.baidu.com/item/%E7%A5%9E%E5%9C%A3%E4%B8%89%E5%85%83%E7%B4%A0/17521082

- 名词: 陪嫁(嫁妆)
  分类: 概念
  解释: 陪嫁（Приданое / Dowry），指女子出嫁时娘家随嫁的财产，包括现金、田庄、农奴、珠宝等。在19世纪俄国贵族社会中，陪嫁是婚姻中极为重要的经济安排，直接影响女儿能否嫁入好人家。在《战争与和平》中，罗斯托夫家为每个女儿预备了带有三百农奴的庄子作为陪嫁，但因家道中落而无法兑现。贝格与老伯爵之间关于陪嫁数额的讨价还价成为托尔斯泰讽刺婚姻物质化的经典段落。
  书中原文: 当女儿出生时，给每个女儿都预备了带有三百农奴庄子的陪嫁；可是现在一处庄子已经卖掉了，另一处抵押出去了，并且已经过了赎回的期限，也非卖掉不可，因此陪送田庄就不可能了。又没有现钱。
  网络来源: https://baike.baidu.com/item/%E5%AB%81%E5%A6%86

- 名词: 求婚与陪嫁谈判
  分类: 习俗
  解释: 19世纪俄国贵族阶层中，求婚不仅是感情之事，更是严肃的经济谈判。男方需衡量女方的陪嫁和社交关系，女方家庭需评估男方的官职和收入。在《战争与和平》第77段中，贝格在婚期前一周亲自登门向老伯爵询问陪嫁数额，在伯爵含糊其辞时直言若拿不到一定现款就"不得不退婚"，最终敲定两万现款加六万期票——这一细节生动展现了当时贵族婚姻中赤裸裸的经济算计，是托尔斯泰批判贵族社会虚伪婚姻观的经典笔法。
  书中原文: 伯爵，请您考虑一下，这是因为：如果我没有一定的资产来维持我妻子的生活，现在就贸然结婚，那我的行为就太可鄙了……"最后谈的结果，伯爵想做得大大方方，不愿意再听到什么新的要求，就答应给八万卢布的期票。贝格温和地笑笑，吻了吻伯爵的肩膀，他说他非常感谢，但是，如果拿不到三万现款，他现在无论如何不能安排新的生活。
  网络来源: https://book.douban.com/annotation/141385836/
