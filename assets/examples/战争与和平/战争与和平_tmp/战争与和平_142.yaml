- 名词: 阿奇里斯
  分类: 人物
  解释: 古希腊神话中的英雄，特洛伊战争中最著名的希腊勇士。母亲海洋女神忒提斯曾将其浸入冥河水，使其全身刀枪不入，唯脚跟未浸成为致命弱点（阿喀琉斯之踵）。在本书中以"阿奇里斯追乌龟"典故出现。
  书中原文: 古代有一个著名的"诡辩"，说的是阿奇里斯永远追不上乌龟，虽然他比乌龟走得快十倍
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E5%9F%BA%E9%87%8C%E6%96%AF

- 名词: 阿奇里斯悖论
  分类: 概念
  解释: 又称芝诺悖论，古希腊哲学家芝诺（约公元前490—前430年）提出的关于运动的哲学悖论。论证阿奇里斯（希腊跑得最快的人）永远追不上乌龟：每当阿奇里斯到达乌龟所在位置时，乌龟都已向前移动了一段距离，如此无限细分。该悖论揭示了连续与离散的矛盾，推动了极限理论和微积分的发展。
  书中原文: 古代有一个著名的"诡辩"，说的是阿奇里斯永远追不上乌龟，虽然他比乌龟走得快十倍：阿奇里斯走完他和乌龟之间的距离时，乌龟在他前面就爬了那个距离的十分之一；阿奇里斯走完这十分之一的距离时，乌龟又爬了那个距离的百分之一，如此类推，永无止境。
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E5%9F%BA%E9%87%8C%E6%96%AF%E6%82%96%E8%AE%BA/5831144

- 名词: 历史的微分
  分类: 概念
  解释: 托尔斯泰在《战争与和平》第三部中提出的历史哲学概念。借用微积分中"微分"的比喻，主张将历史分解为无限小的观察单位——即每一个人的共同倾向和细微行为——通过对这些无限小单位的综合（积分）来发现历史的真正规律，反对传统史学聚焦帝王将相的"伟人史观"。
  书中原文: 只有采取无限小的观察单位——历史的微分，也就是人的共同倾向，并且运用积分的方法（就是得出这些无限小的总和），我们才有希望了解历史的规律。
  网络来源: https://book.douban.com/annotation/109673535/

- 名词: 历史的规律
  分类: 概念
  解释: 托尔斯泰在《战争与和平》中探讨的核心哲学命题。托尔斯泰认为历史并非由拿破仑、亚历山大一世等帝王将相的意志决定，而是由无数普通人的细微行为和共同倾向累积而成，主张通过研究"历史的微分"来发现历史运动的客观规律。
  书中原文: 只有采取无限小的观察单位——历史的微分，也就是人的共同倾向，并且运用积分的方法（就是得出这些无限小的总和），我们才有希望了解历史的规律。
  网络来源: https://www.thepaper.cn/newsDetail_forward_31438218

- 名词: 拉封丹
  分类: 人物
  解释: 让·德·拉封丹（1621—1695），法国古典文学代表作家，以《寓言诗》（Fables）闻名于世，被誉为"法国的荷马"。另著有《故事集》（Contes et nouvelles en vers），其中《约康德》一篇因内容大胆被认为有伤风化。
  书中原文: 《约康德》是法国作家拉封丹所作《故事集》中的一篇，内容被认为有伤风化。
  网络来源: https://baike.baidu.com/item/%E6%8B%89%E5%B0%81%E4%B8%B9/1497385

- 名词: 《约康德》
  分类: 物件
  解释: 法国寓言诗人拉封丹所著《故事集》（Contes et nouvelles en vers）中的第一篇韵文故事，法文名Joconde。改编自意大利诗人阿里奥斯托《疯狂的罗兰》（Orlando Furioso），主题涉及婚姻不忠，在17世纪被认为有伤风化，1675年起曾被审查和禁止。
  书中原文: 《约康德》是法国作家拉封丹所作《故事集》中的一篇，内容被认为有伤风化。
  网络来源: https://www.oxfordreference.com/display/10.1093/oi/authority.20110803100021373

- 名词: 西徐亚人
  分类: 概念
  解释: 即斯基泰人（Scythians），公元前8世纪至公元3世纪活跃于东欧大草原至中亚的古代游牧民族，属印欧语系东伊朗语支，以骑射著称，是最早建立游牧帝国的民族之一。在本书中指代"野蛮人的战争"——即1812年卫国战争被视为野蛮人之间的战争。
  书中原文: 西徐亚，参见本书第689页注②。这里意思是说这次战争是野蛮人的战争。
  网络来源: https://baike.baidu.com/item/%E6%96%AF%E5%9F%BA%E6%B3%B0%E4%BA%BA/9003296

- 名词: 三十二师
  分类: 物件
  解释: 指拿破仑军队中由达乌（路易·达乌）元帅指挥的第32步兵师，该师士兵多数从德意志北部的汉堡、不来梅等汉萨城市招募而来，属于拿破仑控制下的德意志附庸国部队。
  书中原文: 三十二师指达乌元帅指挥的师，其中士兵多半从汉堡、不来梅等地招募来的。
  网络来源: https://bbs.napolun.com/forum.php?mod=viewthread&tid=37426

- 名词: 哈伦
  分类: 人物
  解释: 亦译作卡戎（Charon），希腊神话中冥王哈迪斯的船夫，负责将亡魂渡过冥河斯堤克斯（Styx）送往冥界。古希腊人常在死者口中放置一枚钱币（奥波勒斯）作为渡河费用。
  书中原文: 希腊神话中哈伦是渡亡魂去冥府的神。
  网络来源: https://baike.baidu.com/item/%E5%8D%A1%E6%88%8E/3630526

- 名词: 洛迪战役
  分类: 事件
  解释: 1796年5月10日拿破仑在意大利洛迪镇击败奥地利军队的战役。拿破仑亲率掷弹兵强攻阿达河上的狭长木桥，以惨烈代价取胜。此役被拿破仑本人视为其功名心的起点，之后他相信自己是非凡人物，将干一番伟大事业。
  书中原文: 这是拿破仑发动的一些有名的战争。洛迪和马伦戈在意大利，一八〇〇年拿破仑在那里打败奥国人。
  网络来源: https://baike.baidu.com/item/%E6%B4%9B%E8%BF%AA%E4%B9%8B%E6%88%98

- 名词: 马伦戈战役
  分类: 事件
  解释: 1800年6月14日拿破仑在意大利亚历山德里亚附近的马伦戈村击败奥地利军队的决定性战役。拿破仑翻越阿尔卑斯山大圣伯纳德山口出其不意进入意大利，在首战不利的情况下因德赛将军率援军折返而实现惊天逆转，巩固了其第一执政的地位。
  书中原文: 这是拿破仑发动的一些有名的战争。洛迪和马伦戈在意大利，一八〇〇年拿破仑在那里打败奥国人。
  网络来源: https://baike.baidu.com/item/%E9%A9%AC%E4%BC%A6%E6%88%88%E6%88%98%E5%BD%B9/3248844

- 名词: 瓦格拉木战役
  分类: 事件
  解释: 1809年7月5—6日拿破仑在维也纳东北瓦格拉姆村击败奥地利卡尔大公的会战，是第五次反法同盟的决定性战役。双方投入约30万兵力、1000门火炮，为当时欧洲史上规模最大的战役。法军惨胜，奥军随后求和并签订《申布伦条约》。
  书中原文: 瓦格拉木是维也纳附近的一个村子，一八〇九年他在那里打败奥国人。
  网络来源: https://baike.baidu.com/item/%E7%93%A6%E6%A0%BC%E6%8B%89%E5%A7%86%E6%88%98%E5%BD%B9/3249008

- 名词: 十二种语言的欧洲人
  分类: 概念
  解释: 托尔斯泰对1812年入侵俄国的拿破仑大军的描述。这支"大军"（Grande Armee）约60万人，包含法国人、德意志各邦人、波兰人、意大利人、荷兰人、瑞士人、西班牙人等多个民族，操多种语言，因此被称为"十二种语言的入侵"。
  书中原文: 操着十二种语言的欧洲人侵入俄国。
  网络来源: https://en.topwar.ru/174179-dvunadesjat-jazykov-kto-voeval-protiv-rossii-v-armii-napoleona.html
