- 名词: 巴拉舍夫
  分类: 人物
  解释: 亚历山大·德米特里耶维奇·巴拉舍夫（1770-1837），俄国侍从武官、步兵上将。1812年拿破仑入侵前夕，奉沙皇亚历山大一世之命出使拿破仑在维尔纳的军营，递交和平信函，是俄法战争前最后一位俄国使臣。
  书中原文: "巴拉舍夫恢复过来，又开始说话。他说，亚历山大皇帝不认为库拉金申请护照一事就是构成战争的充足理由，库拉金这样做是他独断专行，并未得到皇上的同意。"
  网络来源: https://baike.baidu.com/item/%E5%B7%B4%E6%8B%89%E8%88%8D%E5%A4%AB

- 名词: 萨尔特科夫
  分类: 人物
  解释: 尼古拉·伊万诺维奇·萨尔蒂科夫（1736-1816），俄国陆军元帅、伯爵，亚历山大一世时期的元老重臣，曾任陆军院院长、国务会议主席。1812年战争爆发时，沙皇通过他发布战争动员上谕。
  书中原文: "他想起亚历山大皇帝没有写进信里的那句话，但是他命令一定要把那句话插进给萨尔特科夫的上谕里面。"
  网络来源: https://baike.baidu.com/item/%E8%90%A8%E5%B0%94%E8%92%82%E7%A7%91%E5%A4%AB/10602911

- 名词: 奥德河
  分类: 地点
  解释: 中欧主要河流，发源于捷克，流经波兰和德国，注入波罗的海。拿破仑战争期间，奥德河曾是法军东进的重要军事分界线，多次出现在和约与停战谈判中。
  书中原文: "正如两个月前要求我撤到奥德河和维斯杜拉河以西，你们就可以同意谈判。"
  网络来源: https://baike.baidu.com/item/%E5%A5%A5%E5%BE%B7%E6%B2%B3

- 名词: 瓦拉几亚
  分类: 地点
  解释: 罗马尼亚南部历史区域，位于多瑙河下游与喀尔巴阡山脉之间。14世纪建立瓦拉几亚公国，19世纪与摩尔达维亚合并为罗马尼亚。拿破仑战争期间，该地区为奥斯曼帝国控制下的附属公国，是俄土争夺之地。
  书中原文: "我知道你们没有得到摩尔达维亚和瓦拉几亚，就同土耳其缔结了和约。"
  网络来源: https://baike.baidu.com/item/%E7%93%A6%E6%8B%89%E5%87%A0%E4%BA%9A

- 名词: 施泰因
  分类: 人物
  解释: 海因里希·弗里德里希·卡尔·冯·施泰因男爵（1757-1831），普鲁士著名政治家和改革家。1807年任普鲁士首席大臣，推行废除农奴制、城市自治等改革（史称施泰因-哈登贝格改革）。因密谋反拿破仑遭通缉，逃亡俄国担任沙皇顾问。
  书中原文: "像施泰因、阿姆菲尔德、贝尼格森、温岑格罗德之流的人物，他都弄到身边。施泰因是一个被逐出祖国的叛徒。"
  网络来源: https://baike.baidu.com/item/%E6%96%BD%E6%B3%B0%E5%9B%A0/10703311

- 名词: 阿姆菲尔德
  分类: 人物
  解释: 古斯塔夫·莫里茨·阿姆菲尔德伯爵（1757-1814），瑞典-芬兰贵族，政治家与外交家。早年深得瑞典国王古斯塔夫三世信任，后因政治斗争流亡俄国，成为亚历山大一世的重要顾问，参与策划俄国抗法防御战略，并促成芬兰大公国在俄帝国内的自治地位。
  书中原文: "像施泰因、阿姆菲尔德、贝尼格森、温岑格罗德之流的人物，他都弄到身边。阿姆菲尔德是一个好色之徒和阴谋家。"
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E5%A7%86%E8%8F%B2%E5%B0%94%E5%BE%B7

- 名词: 巴克雷
  分类: 人物
  解释: 米哈伊尔·波格丹诺维奇·巴克莱·德·托利（1761-1818），俄国陆军元帅、亲王。1810-1813年任俄国战争大臣，1812年拿破仑侵俄期间任西部第一军团司令，提出并实施焦土战略和战略撤退。因撤退策略遭朝野误解，后由库图佐夫接替总司令职务。1813年重新指挥联军参与莱比锡战役，1814年攻入巴黎。
  书中原文: "据说巴克雷最能干；可是，就他的初步活动来看，我不认为那样。他们在干什么，这些朝臣都在干什么啊！"
  网络来源: https://baike.baidu.com/item/%E5%B7%B4%E5%85%8B%E9%9B%B7%C2%B7%E5%BE%B7%C2%B7%E6%89%98%E5%88%A9

- 名词: 维尔纳
  分类: 地点
  解释: 今立陶宛首都维尔纽斯（Vilnius），历史上也称维尔纳。1812年拿破仑入侵俄国时，法军首先攻占该城，拿破仑在此设立指挥部并接见俄国使臣巴拉舍夫。立陶宛历史名城，曾是波兰立陶宛联邦的重要城市。
  书中原文: "战役已经开始一个星期了，你们连维尔纳都守不住。你们被切成两半，被赶出波兰各省。"
  网络来源: https://baike.baidu.com/item/%E7%BB%B4%E5%B0%94%E7%BA%B3/10702828

- 名词: 德维纳河
  分类: 地点
  解释: 又称西德维纳河或道加瓦河，东欧主要河流，发源于俄罗斯瓦尔代高地，流经白俄罗斯和拉脱维亚，注入波罗的海。拿破仑战争中，该河是俄军的重要战略防线，普弗尔的"德里萨大营"即位于该河畔。
  书中原文: "我一定把你们赶过德维纳河，赶过德聂伯河，我一定恢复那个阻挡你们的障碍物。"
  网络来源: https://baike.baidu.com/item/%E8%A5%BF%E5%BE%B7%E7%BB%B4%E7%BA%B3%E6%B2%B3

- 名词: 德聂伯河
  分类: 地点
  解释: 东欧最大的河流之一，发源于俄罗斯瓦尔代高地，流经白俄罗斯、乌克兰，注入黑海。在拿破仑战争中，该河是俄国纵深防御的重要地理屏障，也是拿破仑东征的战略目标线之一。
  书中原文: "我一定把你们赶过德维纳河，赶过德聂伯河，我一定恢复那个阻挡你们的障碍物。"
  网络来源: https://baike.baidu.com/item/%E7%AC%AC%E6%8A%80%E4%BC%AF%E6%B2%B3

- 名词: 贝蒂埃
  分类: 人物
  解释: 路易-亚历山大·贝尔蒂埃（1753-1815），拿破仑帝国元帅、首席参谋长。以卓越的参谋组织能力著称，跟随拿破仑参加几乎所有重大战役（奥斯特利茨、耶拿、瓦格拉姆等），是拿破仑最信任的军事助手之一。
  书中原文: "赴宴的还有贝歇尔、科兰库尔和贝蒂埃。"
  网络来源: https://baike.baidu.com/item/%E8%B4%9D%E5%B0%94%E8%92%82%E5%9F%83/10703373

- 名词: 杜伦
  分类: 人物
  解释: 热罗-克里斯托夫-米歇尔·迪罗克（1772-1813），拿破仑的亲密战友，弗里乌尔公爵，曾任拿破仑宫廷大元帅，负责皇帝安全、皇宫管理及典礼组织。从土伦围城战起追随拿破仑，参与雾月政变、奥斯特利茨战役等，多次执行外交使命。1813年包岑战役后次日阵亡。
  书中原文: "令巴拉舍夫惊奇的是，他竟然从杜伦那儿接到当天皇帝的宴请。"
  网络来源: https://baike.baidu.com/item/%E8%BF%AA%E7%BD%97%E5%85%8B

- 名词: 柏尔纳道特
  分类: 人物
  解释: 让-巴蒂斯特·贝尔纳多特（1763-1844），法国元帅，蓬特-科沃亲王。1810年被选为瑞典王储，改名卡尔·约翰。1812年领导瑞典加入反法同盟，在莱比锡战役中指挥北路联军对抗拿破仑。1818年加冕为瑞典国王卡尔十四世·约翰，开创至今仍在统治的贝尔纳多特王朝。
  书中原文: "他们废掉了他，换了一个叫柏尔纳道特的，他立刻发了疯，因为作为瑞典人，只有疯子才跟俄国联盟。"
  网络来源: https://baike.baidu.com/item/%E8%B4%9D%E5%B0%94%E7%BA%B3%E5%A4%9A%E7%89%B9

- 名词: 多瑙河
  分类: 地点
  解释: 欧洲第二长河，发源于德国黑森林，流经中欧和东欧多个国家，注入黑海。拿破仑战争时期，多瑙河沿岸的奥地利、匈牙利等地是法军与反法同盟军多次交战的重要战场。
  书中原文: "他可以把俄罗斯从波的尼亚湾扩展到多瑙河口。就是叶卡捷琳娜大帝也不过如此。"
  网络来源: https://baike.baidu.com/item/%E5%A4%9A%E7%91%99%E6%B2%B3

- 名词: 波的尼亚湾
  分类: 地点
  解释: 波罗的海北部海湾，位于瑞典东海岸和芬兰西海岸之间。拿破仑战争时期，俄国于1809年通过冰封该海湾的奇袭迫使瑞典割让芬兰，使俄国版图扩展到波的尼亚湾沿岸。
  书中原文: "仅仅在一个朝代，他就可以把俄罗斯从波的尼亚湾扩展到多瑙河口。"
  网络来源: https://baike.baidu.com/item/%E6%B3%A2%E7%9A%84%E5%B0%BC%E4%BA%9A%E6%B9%BE

- 名词: 普弗尔
  分类: 人物
  解释: 卡尔·路德维希·奥古斯特·冯·普富尔（1757-1826），普鲁士将军，1806年耶拿战役后转入俄军，成为沙皇亚历山大一世的军事顾问。他制定了1812年抗法战略的"德里萨大营计划"，但因计划存在严重缺陷（低估法军兵力、营地位置不佳）而未能实施。
  书中原文: "普弗尔提出建议，阿姆菲尔德争论不休，贝尼格森来回研究，负有作战使命的巴克雷拿不定主意，一拖再拖。"
  网络来源: https://baike.baidu.com/item/%E6%99%AE%E5%AF%8C%E5%B0%94/10859599

- 名词: 贝歇尔
  分类: 人物
  解释: 让-巴蒂斯特·贝西埃（1768-1813），拿破仑帝国元帅。长期指挥近卫军骑兵，跟随拿破仑参加马伦戈、奥斯特利茨、耶拿、瓦格拉姆等重大战役，以勇猛忠诚著称。1813年5月在吕岑战役前侦察时阵亡。
  书中原文: "赴宴的还有贝歇尔、科兰库尔和贝蒂埃。"
  网络来源: https://baike.baidu.com/item/%E8%B4%9D%E8%A5%BF%E5%9F%83
