- 名词: 克拉斯诺耶
  分类: 地点
  解释: |
    克拉斯诺耶（Krasny，亦译克拉斯内）是俄罗斯斯摩棱斯克州的一个城镇，位于斯摩棱斯克西南约50公里处。1812年11月15-18日，法军主力在此地与俄军发生激战，史称克拉斯诺耶战役。法军五个梯队被俄军各个击破，损失惨重，其中内伊元帅的部队几乎全军覆没，仅剩约900人突围。此战法军死伤约6000-10000人，被俘约20000-26000人。
  书中原文: |
    法国人出乎意外地看见了敌人，慌乱了，由于出乎意外而吓得愣了片刻，然后扔下在后面追随着的同伴，又继续逃跑。在这儿，法军各个部队，先是总督的，然后达乌的、然后是内伊的，一个跟着一个，好像从俄军的队列中通过，一连走了三天。他们各不相顾，抛掉一切沉重的东西，抛掉大炮和一半的人，他们只在夜间逃跑，向右绕着半圆形以躲开俄国人。俄军已经有一半的人死掉了，但是他们为达到那个无愧于人民的目的，做了能够做的和应当做的一切。
  网络来源: |
    https://baike.baidu.com/item/克拉斯内战役/63131877
    https://en.wikipedia.org/wiki/Battle_of_Krasnoi

- 名词: 奥尔沙
  分类: 地点
  解释: |
    奥尔沙（Orsha）是白俄罗斯维捷布斯克州的一座城市，位于第聂伯河畔，距斯摩棱斯克以西约130公里。1812年拿破仑征俄战争中，奥尔沙是法军撤退途中的重要战略枢纽。拿破仑在此短暂停留收拢溃兵，内伊元帅以残部约千人逃至此地与主力会合。法军由此继续向维尔纳方向溃逃。
  书中原文: |
    内伊走在最后，他走在最后是因为他要炸毁对任何人都没有妨碍的斯摩棱斯克城墙……内伊带领的那个兵团本来有一万人，跑到奥尔沙拿破仑那儿，只剩下一千人了，他抛弃所有的人和所有的大炮，夜间穿过树林偷偷渡过德聂伯河。从奥尔沙沿着通往维尔纳的大路继续逃跑，还是那样，和追击的军队又玩起捉迷藏游戏来了。
  网络来源: |
    https://www.britannica.com/event/Napoleonic-Wars/The-retreat-from-Moscow
    https://en.wikipedia.org/wiki/Orsha

- 名词: 奇恰戈夫
  分类: 人物
  解释: |
    帕维尔·瓦西里耶维奇·奇恰戈夫（1767-1849），俄国海军上将，1807年任海军大臣，1812年卫国战争中出任俄国第三集团军（多瑙河集团军）司令。在别列津纳河战役中负责拦截拿破仑退路，因被法军佯动迷惑、未能与维特根施泰因部紧密配合，导致拿破仑主力逃脱，战后备受批评。1813年退役，侨居意大利和法国，1849年在巴黎去世。
  书中原文: |
    史学家回答这些问题说，所以会有这种事，是因为库图佐夫、托尔马索夫、奇恰戈夫，以及某某、某某，没有执行某种、某种策略。要奇恰戈夫、库图佐夫和维特根施泰因及时在指定的地点会师，其可能性小得几乎等于零，库图佐夫正是这样想的，他在接到这个计划时就说过，远距离的牵制作战是不会带来所希望的结果的。
  网络来源: |
    https://baike.baidu.com/item/帕维尔·瓦西里耶维奇·奇恰戈夫
    https://zh.wikipedia.org/wiki/帕维尔·奇恰戈夫

- 名词: 梅斯特
  分类: 人物
  解释: |
    约瑟夫·德·梅斯特（1753-1821），萨瓦公国出身的哲学家、外交家，欧洲保守主义思想奠基人之一，与伯克并称。1792年法国占领萨瓦后流亡，1803-1817年任撒丁王国驻俄罗斯大使，在圣彼得堡居留14年。代表作《论法国》《论教皇》《圣彼得堡之夜》等，主张君主专制与教权至上，批判启蒙理性主义，对波德莱尔、孔德等后世思想家影响深远。
  书中原文: |
    要想俘虏皇帝、国王和公爵们是没有意义的，当时最老练的外交家（如梅斯特等人）已经认识到，这帮人当了俘虏会给俄国人的行动带来极大的困难。
  网络来源: |
    https://baike.baidu.com/item/约瑟夫·德·迈斯特/932580
    https://www.britannica.com/biography/Joseph-de-Maistre

- 名词: 埃克木尔王
  分类: 人物
  解释: |
    埃克木尔王（Prince d'Eckmühl，亦译埃克米尔亲王）是拿破仑赐予元帅路易·尼古拉·达武（1770-1823）的贵族头衔，源自1809年埃克米尔战役的胜利。达武是拿破仑帝国最杰出的元帅之一，绰号"钢铁元帅"，以治军严明、战术精湛著称，是拿破仑时代唯一未尝败绩的元帅。1804年以34岁之龄晋升帝国元帅，百日王朝期间任陆军大臣。
  书中原文: |
    他和他周围的人仍然保持着一向的习惯：拟命令，发公函，写报告，做每日报表；彼此称呼"陛下、贤弟、埃克木尔王、那不勒斯王"等等。但是这些命令和报告不过是纸上谈兵，并没有照办，因为不可能办到，他们虽然以陛下、殿下和贤弟相称，但是他们已经感觉到，他们不过是由于作恶多端现在正得到报应的丑恶的可怜虫。
  网络来源: |
    https://baike.baidu.com/item/路易·尼古拉·达武
    https://zh.wikipedia.org/wiki/路易·尼古拉·达武
