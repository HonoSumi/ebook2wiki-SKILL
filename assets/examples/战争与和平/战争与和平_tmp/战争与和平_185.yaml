- 名词: 克拉斯诺耶
  分类: 地点
  解释: 克拉斯诺耶（俄语意为"红色的"）是俄罗斯斯摩棱斯克州的一个城镇，在1812年俄法战争中具有重要历史地位。法军从莫斯科大撤退期间，这里发生了著名的克拉斯诺耶战役（1812年11月15—18日）。
  书中原文: "在克拉斯诺耶就发生这样的情况，他们在这个地方想找到法国人的三个纵队中的一个纵队，碰上了带领一万六千人的拿破仑本人，虽然库图佐夫千方百计避免那次毁灭性的遭遇战以保存自己军队的实力，然而疲惫不堪的俄国军队在克拉斯诺耶仍然一连三天屠杀筋疲力尽、溃不成军的法国人。"
  网络来源: https://wapbaike.baidu.com/item/克拉斯内战役/63131877

- 名词: 克拉斯诺耶战役
  分类: 事件
  解释: 克拉斯诺耶战役是1812年俄法战争中法军从莫斯科大撤退期间的一场关键战役，发生于1812年11月15—18日。俄军总司令库图佐夫率主力平行追击撤退的法军，试图在克拉斯诺耶附近截断并分段击溃法军。战役中俄军重创法军达武、欧仁等军团，俘虏大量法军并缴获达武的元帅杖。但由于库图佐夫谨慎的保守策略，法军主力（含拿破仑近卫军）得以继续向西撤退。
  书中原文: "在克拉斯诺耶捉到两万六千名俘虏，并得到几百门大炮和一根据称是'元帅杖'的棍子，于是人们在争论都是哪些人立了功，大家对这一仗都很满意，但是非常遗憾的是没有捉到拿破仑，哪怕一个什么英雄或者元帅也没有捉到。"
  网络来源: https://wapbaike.baidu.com/item/克拉斯内战役/63131877

- 名词: 符腾堡的叶夫根尼亲王
  分类: 人物
  解释: 符腾堡的叶夫根尼亲王（1788—1857），俄罗斯帝国步兵上将，沙皇保罗一世的侄子。1812年拿破仑入侵俄国期间，他担任第4步兵师师长，隶属于巴克雷·德·托利的第一西方军团。他参与了斯摩棱斯克战役、博罗季诺战役、塔鲁季诺战役、克拉斯诺耶战役等。在克拉斯诺耶战役中，他率部从山上向溃退的法国部队射击，但要求增援时援军未能及时赶到。他后来在1813—1814年的第六次反法同盟战争中继续参战。
  书中原文: "托尔拟了一项部署：第一纵队向某地前进，等等。照例，结果都不是按照部署做的。符腾堡的叶夫根尼亲王从山上射击山下成群跑过去的法国人，他要求增援，但是援军没有来。"
  网络来源: https://en.wikipedia.org/wiki/Duke_Eugen_of_W%C3%BCrttemberg_(1788%E2%80%931857)

- 名词: 元帅杖
  分类: 物件
  解释: 元帅杖是法国元帅的权杖，是元帅身份和权威的象征。在1812年克拉斯诺耶战役中，拿破仑麾下最著名的元帅之一——路易·尼古拉·达武的元帅杖被俄军缴获。据传该元帅杖现陈列于俄罗斯国家历史博物馆。托尔斯泰在《战争与和平》中将其描述为"一根据称是'元帅杖'的棍子"，以此讽刺战争中对战利品和虚名的追逐。
  书中原文: "在克拉斯诺耶捉到两万六千名俘虏，并得到几百门大炮和一根据称是'元帅杖'的棍子，于是人们在争论都是哪些人立了功，大家对这一仗都很满意，但是非常遗憾的是没有捉到拿破仑，哪怕一个什么英雄或者元帅也没有捉到，他们为此互相责备，特别是责备库图佐夫。"
  网络来源: https://wapbaike.baidu.com/item/克拉斯内战役/63131877
