- 名词: 皮埃尔
  分类: 人物
  解释: |
    皮埃尔·别祖霍夫，托尔斯泰《战争与和平》中的核心男主角之一，别祖霍夫家族的继承人。他善良单纯、热爱思考但意志薄弱，经历了从放浪贵族到精神探索者再到内心觉醒者的思想转变，最终与娜塔莎结婚，投身十二月党人运动。
  书中原文: |
    另一位主人公皮埃尔也鄙弃上流社会。他一方面聪明热情，善良老实，有时甚至带点傻气，另一方面又懒散、软弱，甚至放荡，但追求理想生活的努力却始终不懈。
  网络来源: |
