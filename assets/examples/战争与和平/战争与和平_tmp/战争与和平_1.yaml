  分类: 地点
  解释: |
    国立西北联合大学，1937年七七事变后由国立北平大学、国立北平师范大学、国立北洋工学院迁至陕西合组而成。初名西安临时大学，后迁至汉中并改称西北联合大学。1939年分拆为西北大学、西北工学院、西北农学院等五所院校，奠定了西北高等教育格局。
  书中原文: |
    1939年于西北联合大学俄文商业系毕业。
  网络来源: |
    https://baike.baidu.com/item/%E5%9B%BD%E7%AB%8B%E8%A5%BF%E5%8C%97%E8%81%94%E5%90%88%E5%A4%A7%E5%AD%A6/8051790
- 名词: 克里米亚战争
  分类: 事件
  解释: |
    1853至1856年间在欧洲爆发的大规模国际战争，主战场在黑海沿岸的克里米亚半岛。俄国对抗奥斯曼帝国、英国、法国和撒丁王国联军。俄军战败后签订《巴黎和约》，黑海中立化。此战被视为第一次现代化战争，南丁格尔在此期间奠定了现代护理制度。
  书中原文: |
    一八五一年赴高加索从军，后来参加克里米亚战争中的塞瓦斯托波尔保卫战，一八五六年退伍。
  网络来源: |
    https://baike.baidu.com/item/%E5%85%8B%E9%87%8C%E7%B1%B3%E4%BA%9A%E6%88%98%E4%BA%89/1614163
- 名词: 塞瓦斯托波尔保卫战
  分类: 事件
  解释: |
    克里米亚战争期间最重要战役，1854年9月至1855年9月英法联军围攻俄国黑海舰队基地塞瓦斯托波尔，历时349天。俄军最终被迫撤出并自沉战舰。此战是19世纪规模最大的要塞攻防战之一，首次大规模运用堑壕战等近代战争形式。
  书中原文: |
    一八五一年赴高加索从军，后来参加克里米亚战争中的塞瓦斯托波尔保卫战，一八五六年退伍。
  网络来源: |
    https://baike.baidu.com/item/%E5%A1%9E%E7%93%A6%E6%96%AF%E6%89%98%E6%B3%A2%E5%B0%94%E6%88%98%E5%BD%B9/12506592
- 名词: 波罗底诺会战
  分类: 事件
  解释: |
    1812年9月7日拿破仑侵俄战争中规模最大的会战，发生在莫斯科以西约124公里的博罗季诺村附近。法俄双方共投入约25万军队，总伤亡达7万人。法军虽攻占阵地但未能歼灭俄军主力，成为拿破仑侵俄战争的转折点。旧译"波罗底诺会战"，今多称"博罗季诺战役"。
  书中原文: |
    它包括俄奥联军同法军在奥斯特利茨的会战、法军入侵俄国、波罗底诺会战、莫斯科大火、拿破仑军队溃退等。
  网络来源: |
    https://baike.baidu.com/item/%E5%8D%9A%E7%BD%97%E5%AD%A3%E8%AF%BA%E6%88%98%E5%BD%B9/10997853
- 名词: 莫斯科大火
  分类: 事件
  解释: |
    1812年9月14日拿破仑军队占领莫斯科后发生的大火灾，城市四分之三遭到毁灭。起火原因存在争议，主流观点认为是俄军统帅罗斯托普钦伯爵下令执行焦土政策。大火摧毁了法军粮草装备，迫使拿破仑在10月撤军，成为拿破仑帝国由盛转衰的关键转折点。
  书中原文: |
    它包括俄奥联军同法军在奥斯特利茨的会战、法军入侵俄国、波罗底诺会战、莫斯科大火、拿破仑军队溃退等。
  网络来源: |
    https://baike.baidu.com/item/%E8%8E%AB%E6%96%AF%E7%A7%91%E5%A4%A7%E7%81%AB(1812)/62624373
- 名词: 俄法战争
  分类: 事件
  解释: |
    即1812年俄法战争，又称俄国卫国战争，1812年6月拿破仑率领约60万大军入侵俄国。俄军采取诱敌深入、坚壁清野的策略，经博罗季诺战役后放弃莫斯科并纵火烧城。法军在严冬中撤退，几乎全军覆没。此战打破了拿破仑不可战胜的神话。
  书中原文: |
    《战争与和平》（1866—1869）描写1812年俄法战争的全过程，以当时四大贵族家庭的人物活动为线索。
  网络来源: |
    https://baike.baidu.com/item/%E4%BF%84%E6%B3%951812%E5%B9%B4%E6%88%98%E4%BA%89/1935378
- 名词: 十二月党人
  分类: 事件
  解释: |
    1825年12月14日在俄国彼得堡发动武装起义的贵族革命家，反对沙皇专制制度和农奴制度。起义在枢密院广场被尼古拉一世血腥镇压，五位领袖被绞死，121名军官被流放西伯利亚。列宁将其起义视为俄国革命运动的开端。
  书中原文: |
    小说起初的构思就是写"十二月党人"。然而十二月党人都是当年参加一八一二年卫国战争的爱国的贵族志士。
  网络来源: |
    https://baike.baidu.com/item/%E5%8D%81%E4%BA%8C%E6%9C%88%E5%85%9A%E4%BA%BA/10998795
- 名词: 农奴制改革
  分类: 事件
  解释: |
    俄国1861年农奴制改革，1861年3月3日沙皇亚历山大二世批准废除农奴制度的法令。农奴获得人身自由和公民权，但需支付高额赎金购买份地。改革为俄国资本主义发展提供了劳动力和资金，是俄国历史上的重大转折点，但保留了大量封建残余。
  书中原文: |
    一八六一年俄国"农奴制改革"以后，面对动荡不安的局势，托尔斯泰在思想上紧张地探索社会的出路。
  网络来源: |
    https://baike.baidu.com/item/%E4%BF%84%E5%9B%BD%E5%86%9C%E5%A5%B4%E5%88%B6%E6%94%B9%E9%9D%A9/3179547
- 名词: 安娜·卡列宁娜
  分类: 物件
  解释: |
    列夫·托尔斯泰创作于1873至1877年的现实主义长篇小说。小说采用双线叙事结构，讲述了贵族妇女安娜追求爱情幸福却被迫卧轨自杀的悲剧，以及庄园主列文探索生命意义的历程。以"幸福的家庭都是相似的，不幸的家庭各有各的不幸"为开篇名句。
  书中原文: |
    代表作有《战争与和平》《安娜·卡列宁娜》《复活》等。
  网络来源: |
    https://baike.baidu.com/item/%E5%AE%89%E5%A8%9C%C2%B7%E5%8D%A1%E5%88%97%E5%B0%BC%E5%A8%9C/61262512
- 名词: 复活
  分类: 物件
  解释: |
    列夫·托尔斯泰创作于1889至1899年的最后一部长篇小说，历时十年六易其稿。小说以贵族青年聂赫留朵夫和农奴私生女玛丝洛娃的命运纠葛为主线，深刻抨击了法庭、监狱和官办教会的黑暗，体现了托尔斯泰的道德自我完善和不以暴力抗恶的思想。
  书中原文: |
    代表作有《战争与和平》《安娜·卡列宁娜》《复活》等。
  网络来源: |
    https://baike.baidu.com/item/%E5%A4%8D%E6%B4%BB/2644412
- 名词: 杜布罗夫斯基
  分类: 物件
  解释: |
    俄国诗人普希金创作于1832年的中篇小说，1841年作者去世后出版。主人公杜布罗夫斯基因父亲受陷害而死，集结农奴落草为寇、劫富济贫，却因爱上仇人的女儿而宽恕仇人。小说揭示了农奴制度的黑暗。旧译《复仇艳遇》。
  书中原文: |
    译著有托尔斯泰的《战争与和平》《杜布罗夫斯基》《哈吉穆拉特》、高尔基的《童年》等。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E6%9D%9C%E5%B8%83%E7%BD%97%E5%A4%AB%E6%96%AF%E5%9F%BA
- 名词: 哈吉穆拉特
  分类: 物件
  解释: |
    列夫·托尔斯泰创作于1896至1904年的中篇小说，1912年作为遗作发表。小说以19世纪高加索战争为背景，取材于车臣抗俄领袖哈吉穆拉特的真实历史事件，描写他因与沙米里矛盾激化而投靠俄军、最终被害的故事。被评论家称为托尔斯泰最好的作品之一。
  书中原文: |
    译著有托尔斯泰的《战争与和平》《杜布罗夫斯基》《哈吉穆拉特》、高尔基的《童年》等。
  网络来源: |
    https://baike.baidu.com/item/%E5%93%88%E5%90%89%E7%A9%86%E6%8B%89%E7%89%B9/57403672
- 名词: 人民文学出版社
  分类: 物件
  解释: |
    1951年3月成立于北京的国家级专业文学出版机构，是新中国成立最早、历史最长、规模最大的文学出版社。首任社长冯雪峰，社址位于北京市朝内大街166号。出版了中外文学经典名著，包括"名著名译丛书"等系列丛书。
  书中原文: |
    出版发行 人民文学出版社 / 人民文学出版社 2015年1月
  网络来源: |
    https://zh.wikipedia.org/zh-hans/%E4%BA%BA%E6%B0%91%E6%96%87%E5%AD%A6%E5%87%BA%E7%89%88%E7%A4%BE
- 名词: 敌基督
  分类: 概念
  解释: |
    基督教末世论中的重要概念，意为反对基督者，特指以假冒基督的方式来反对基督的势力。该词出现在《约翰一书》中。在《战争与和平》的开篇，安娜·帕夫洛夫娜用此词指称拿破仑，将他视为基督教的敌人和一切惨祸的制造者。
  书中原文: |
    "如果您还对我说我们没有战争，如果您还袒护这个敌基督（是的，我认为他是敌基督）的一切卑劣行为和他造成的一切惨祸，那么我就不再理您了。"
  网络来源: |
    https://zh.wikipedia.org/wiki/%E6%95%8C%E5%9F%BA%E7%9D%A3
- 名词: 福音书
  分类: 概念
  解释: |
    基督教《圣经·新约》中记载耶稣生平与教导的四卷书，即《马太福音》《马可福音》《路加福音》《约翰福音》。福音原意为"好消息"。在《战争与和平》中，安德烈公爵在临终前接受《福音书》的教导，体现了托尔斯泰寄希望于宗教救世的思想。
  书中原文: |
    作者让安德烈在临终前接受了《福音书》的教导，寄希望于宗教救世的威力。
  网络来源: |
    https://baike.baidu.com/item/%E7%A6%8F%E9%9F%B3%E4%B9%A6/274944
- 名词: 宿命论
  分类: 概念
  解释: |
    认为事物的变化发展和人的命运由天命或命运预先决定、人对此无能为力的思想理论。在《战争与和平》中，托尔斯泰让皮埃尔接受了普拉东·卡拉达耶夫的宿命论思想影响，相信顺从天命、净化道德和爱一切人是改革社会的良策。
  书中原文: |
    又让皮埃尔接受一位俄国士兵普拉东·卡拉达耶夫的宿命论思想的影响，相信顺从天命、净化道德、爱一切人和积极行善是改革社会的良策。
  网络来源: |
    https://baike.baidu.com/item/%E5%AE%BF%E5%91%BD%E8%AE%BA/1517639
- 名词: 勿抗恶
  分类: 概念
  解释: |
    托尔斯泰主义的核心主张之一，全称为"勿以暴力抗恶"（непротивление злу насилием），主张暴力只会催生更多暴力，应以理性和爱来消除罪恶。这一思想对甘地的非暴力不合作运动产生了深远影响。在小说中体现为普拉东·卡拉达耶夫的听天由命和逆来顺受。
  书中原文: |
    作者甚至把普拉东的听天由命、逆来顺受、"勿抗恶"作为美德来欣赏。这些，无疑都是作品中的消极因素。
  网络来源: |
    https://baike.baidu.com/item/%E6%89%98%E5%B0%94%E6%96%AF%E6%B3%B0%E4%B8%BB%E4%B9%89
- 名词: 批判现实主义
  分类: 概念
  解释: |
    19世纪在欧洲形成的文艺思潮和创作方法，以真实揭露社会现实、批判资本主义制度矛盾为特征。高尔基正式提出这一术语。代表作家包括巴尔扎克、司汤达、狄更斯、托尔斯泰等。托尔斯泰被公认为俄国批判现实主义文学最杰出的代表。
  书中原文: |
    列夫·托尔斯泰（1828—1910）俄国伟大的批判现实主义作家、思想家。
  网络来源: |
    https://baike.baidu.com/item/%E6%89%B9%E5%88%A4%E7%8E%B0%E5%AE%9E%E4%B8%BB%E4%B9%89/193216
