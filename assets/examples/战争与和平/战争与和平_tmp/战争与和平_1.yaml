- 名词: 刘辽逸
  分类: 人物
  解释: |
    刘辽逸（1915—2001），原名刘长菘，安徽濉溪人，中国著名俄苏文学翻译家，人民文学出版社译审。他以翻译托尔斯泰的《战争与和平》而闻名，还译有《哈吉穆拉特》《杜布罗夫斯基》及高尔基作品等，1994年获鲁迅文学奖全国优秀文学翻译彩虹奖荣誉奖。
  书中原文: |
    刘辽逸 （1915—2001），原名刘长菘，安徽濉溪人，曾用名长松。1939年于西北联合大学俄文商业系毕业。1943年在桂林开始从事俄苏文学译介工作。译著有托尔斯泰的《战争与和平》《杜布罗夫斯基》《哈吉穆拉特》、高尔基的《童年》等。
  网络来源: |
    https://zh.wikipedia.org/zh-sg/%E5%88%98%E8%BE%BD%E9%80%B8
- 名词: 李明滨
  分类: 人物
  解释: |
    李明滨（1933年出生），台湾新北市淡水区人，著名俄语和俄国文学专家，北京大学俄罗斯语言文学系教授、博士生导师。研究方向为中俄比较文学和俄罗斯国情学，曾获俄罗斯联邦政府普希金奖章和马克西姆·高尔基奖。
  书中原文: |
    李明滨 一九九一年八月十二日
