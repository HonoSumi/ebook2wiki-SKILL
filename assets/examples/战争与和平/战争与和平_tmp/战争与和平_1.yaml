    意大利托斯卡纳大区卢卡省省会，位于意大利中部，以保存完好的文艺复兴时期城墙和丝绸贸易历史闻名。1805年被拿破仑占领并交由他的姐姐管理。著名歌剧作曲家普契尼的故乡。中文历史文献中常译作"卢加"或"卢卡"。
