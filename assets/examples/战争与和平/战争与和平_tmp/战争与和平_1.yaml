- 名词: 波拿巴
  分类: 人物
  解释: |
    波拿巴是拿破仑·波拿巴的姓氏，源自意大利的欧洲贵族家族，1529年迁居科西嘉岛。拿破仑·波拿巴（1769—1821）在1804年建立法兰西第一帝国，使该家族达到鼎盛。在《战争与和平》的语境中，波拿巴即指拿破仑。
  书中原文: |
    "好啊，公爵，热那亚和卢加成为波拿巴家的领地了。"
