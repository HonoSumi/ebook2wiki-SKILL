    意大利北部利古里亚大区首府，位于利古里亚海热那亚湾北岸，是意大利最大港口。中世纪曾建立热那亚共和国，是强大的海洋共和国之一，与威尼斯、比萨等竞争地中海贸易霸权。著名航海家哥伦布诞生于此。
