- 名词: 娜塔莎
  分类: 人物
  解释: |
    娜塔莎·罗斯托娃，托尔斯泰《战争与和平》中的女主角，罗斯托夫伯爵的次女。她是生命和幸福的化身，性格热情活泼、天真浪漫。经历了与安德烈订婚、被阿纳托利诱惑、战争中成长等历程，最终与皮埃尔结婚，成为贤妻良母。
  书中原文: |
    但他性格刚强，皮埃尔的友谊和规劝，加上娜塔莎的爱情，使他的心情出现了转机。
  网络来源: |
