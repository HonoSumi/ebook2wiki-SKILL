- 名词: 列夫·托尔斯泰
  分类: 人物
  解释: |
    俄国伟大的批判现实主义作家、思想家，1828年出生于图拉省的亚斯纳亚波利亚纳庄园，1910年去世。代表作有《战争与和平》《安娜·卡列宁娜》《复活》等，对世界文学产生了巨大影响。
  书中原文: |
    列夫·托尔斯泰（1828—1910）俄国伟大的批判现实主义作家、思想家。他的作品包括文学、宗教、哲学、美学、政论等著作，反映了俄国社会的一个时代，对世界文学产生了巨大影响。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E5%88%97%E5%A4%AB%C2%B7%E6%89%98%E5%B0%94%E6%96%AF%E6%B3%B0
- 名词: 库图佐夫
  分类: 人物
  解释: |
    米哈伊尔·伊拉里奥诺维奇·库图佐夫，俄罗斯帝国元帅，1745年出生，1813年去世。1812年俄法战争中担任俄军总司令，通过博罗季诺战役和放弃莫斯科的焦土策略最终击败拿破仑大军，是俄罗斯民族英雄。
  书中原文: |
    作者描写了历史上的真实人物拿破仑、库图佐夫以及沙皇亚历山大一世，也写出了人们的理想和鼓舞人心的目标，歌颂了俄国人同仇敌忾的抗敌精神和震惊世界的伟大胜利。
  网络来源: |
    https://zh.wikipedia.org/zh/%E7%B1%B3%E5%93%88%E4%BC%8A%E5%B0%94%C2%B7%E4%BC%8A%E6%8B%89%E9%87%8C%E5%A5%A5%E8%AF%BA%E7%BB%B4%E5%A5%87%C2%B7%E5%BA%93%E5%9B%BE%E4%BD%90%E5%A4%AB
- 名词: 亚历山大一世
  分类: 人物
  解释: |
    俄罗斯帝国第十位皇帝，1777年出生，1825年去世，1801年至1825年在位。他在拿破仑战争中领导反法同盟击败拿破仑，被尊称为"欧洲的救世主"。其统治前期推行自由主义改革，后期趋于保守。
  书中原文: |
    作者描写了历史上的真实人物拿破仑、库图佐夫以及沙皇亚历山大一世，也写出了人们的理想和鼓舞人心的目标，歌颂了俄国人同仇敌忾的抗敌精神和震惊世界的伟大胜利。
