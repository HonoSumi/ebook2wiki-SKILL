- 名词: 玛丽亚·费奥多罗夫娜
  分类: 人物
  解释: |
    玛丽亚·费奥多罗夫娜（1759—1828），原名符腾堡的索菲·多萝西亚，俄罗斯帝国皇后，沙皇保罗一世之妻。她是亚历山大一世和尼古拉一世的母亲，在保罗一世遇刺后成为俄罗斯首位皇太后，管理全国慈善机构，对儿子们保持很大影响力。
  书中原文: |
    一八〇五年七月，大名鼎鼎的安娜·帕夫洛夫娜·舍列尔——玛丽亚·费奥多罗夫娜皇后的女官和亲信，在迎接第一个来赴晚会的达官要人瓦西里公爵时这样说。
