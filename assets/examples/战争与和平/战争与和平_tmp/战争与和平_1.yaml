- 名词: 屠格涅夫
  分类: 人物
  解释: |
    伊万·谢尔盖耶维奇·屠格涅夫，俄国现实主义小说家、诗人、剧作家，1818年出生，1883年去世。代表作有《猎人笔记》《父与子》《罗亭》《贵族之家》等，与托尔斯泰、陀思妥耶夫斯基并称为俄国文学三大巨匠。
  书中原文: |
    屠格涅夫当时就称它是"一部集叙事诗、历史小说和风习志之大成的、独树一帜的、多方面的作品"。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E4%BC%8A%E4%B8%87%C2%B7%E5%B1%A0%E6%A0%BC%E6%B6%85%E5%A4%AB
- 名词: 福楼拜
  分类: 人物
  解释: |
    古斯塔夫·福楼拜，法国现实主义文学大师，1821年出生，1880年去世。代表作《包法利夫人》被视为现代小说的奠基之作。他强调"恰当的字"的写作理念，对后世文学影响深远。
  书中原文: |
    法国作家福楼拜折服于作者的神笔，惊呼"这是莎士比亚，是莎士比亚！"
