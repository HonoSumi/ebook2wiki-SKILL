- 名词: 诺沃西利采夫
  分类: 人物
  解释: |
    尼古拉·尼古拉耶维奇·诺沃西利采夫（1761—1838），俄国政治家，沙皇亚历山大一世"非官方委员会"核心成员之一，历任圣彼得堡科学院院长、波兰会议王国沙皇全权代表、国务会议主席等职。他曾为俄罗斯帝国起草宪法草案。
  书中原文: |
    "不要折磨我了。告诉我，对于诺沃西利采夫的紧急报告做了什么决定？您全都知道。"
  网络来源: |
    https://www.britannica.com/biography/Nikolay-Nikolayevich-Count-Novosiltsev
- 名词: 安德烈·博尔孔斯基
  分类: 人物
  解释: |
    托尔斯泰《战争与和平》中的核心男主角之一，博尔孔斯基家族继承人，库图佐夫的副官。他性格孤傲正直，追求功名却经历幻灭，在1812年战争中受重伤去世。他在临终前领悟到爱与宽恕的真谛，是小说中最具悲剧色彩和精神成长弧光的角色。
  书中原文: |
    以主人公之一安德烈·博尔孔斯基为例，他的性格既复杂又不断发展。开头他显得矜持高傲，不同凡俗。
