- 名词: "理性"
  分类: "概念"
  解释: "理性是人类通过逻辑推理、分析判断认识世界和指导行为的能力。康德区分理论理性与实践理性，认为理论理性有限；黑格尔则将理性提升为绝对的精神运动，认为其能通过辩证法自我实现。"
  书中原文: "理性说：一、空间及赋予它本身可见性的各种形式——物质，是无限的，否则是不可想象的。二、时间是没有刹那间休息的无限的运动，否则是不可想象的。三、原因和结果的联系没有起始也不可能有终结。"
  网络来源: "https://baike.baidu.com/item/%E7%90%86%E6%80%A7"

- 名词: "意识"
  分类: "概念"
  解释: "意识是人对自己心灵中所发生之事的知觉，是哲学核心概念。在《战争与和平》中，托尔斯泰将意识视为意志自由的基础，意识说'只有我一个，一切存在都不过是我'。"
  书中原文: "意识说：一、只有我一个，一切存在都不过是我；因此，我包括空间。二、我用现在静止的一刹那来测量流动的时间。三、我是站在原因之外的。"
  网络来源: "https://baike.baidu.com/item/%E6%84%8F%E8%AF%86"

- 名词: "空间"
  分类: "概念"
  解释: "空间是物质存在的广延性，与时间一同构成人类感知和认识世界的基本形式。托尔斯泰将其作为理性认识世界的三要素之一。"
  书中原文: "理性说：一、空间及赋予它本身可见性的各种形式——物质，是无限的，否则是不可想象的。"
  网络来源: "https://baike.baidu.com/item/%E7%A9%BA%E9%97%B4"

- 名词: "时间"
  分类: "概念"
  解释: "时间是物质运动变化的持续性表现，哲学和物理学的基本范畴。托尔斯泰认为理性视时间为没有刹那间休息的无限运动。"
  书中原文: "理性说：二、时间是没有刹那间休息的无限的运动，否则是不可想象的。"
  网络来源: "https://baike.baidu.com/item/%E6%97%B6%E9%97%B4"

- 名词: "原因"
  分类: "概念"
  解释: "原因是引起某一现象的现象，与结果构成因果关系。因果律是理性认识世界的基本法则之一。托尔斯泰指出历史的研究应从寻求原因转向寻求法则。"
  书中原文: "理性说：三、原因和结果的联系没有起始也不可能有终结。"
  网络来源: "https://baike.baidu.com/item/%E5%8E%9F%E5%9B%A0"

- 名词: "万有引力法则"
  分类: "概念"
  解释: "万有引力法则是牛顿于1687年在《自然哲学的数学原理》中提出的物理定律：任意两个质点间引力与质量乘积成正比、与距离平方成反比。托尔斯泰以此为例说明对必然性法则的认识过程。"
  书中原文: "正如人人都感觉到、而其自身却无法理解的万有引力一样，我们对它所服从的必然性法则知道多少（从一切物体都有重量这个起码的知识，到牛顿的定律），我们就对它了解多少。"
  网络来源: "https://baike.baidu.com/item/%E4%B8%87%E6%9C%89%E5%BC%95%E5%8A%9B%E5%AE%9A%E5%BE%8B"

- 名词: "形而上学"
  分类: "概念"
  解释: "形而上学是哲学核心分支，研究超越经验的终极实在与根本原理。亚里士多德称之为第一哲学。托尔斯泰认为自由意志本身是形而上学研究的对象。"
  书中原文: "人的自由意志在空间、时间和因果关系中的表现，形成历史的研究对象；而自由意志本身是形而上学研究的对象。"
  网络来源: "https://baike.baidu.com/item/%E5%BD%A2%E8%80%8C%E4%B8%8A%E5%AD%A6"

- 名词: "天文学"
  分类: "概念"
  解释: "天文学是研究宇宙空间天体、宇宙结构和发展的自然科学，六大基础学科之一。托尔斯泰以天文学史上的哥白尼体系与托勒密体系范式转换为类比，说明历史学同样需要新观点。"
  书中原文: "正如在天文学上，承认地球运行的困难在于否定地球不动而行星运动的直接感觉，在历史上，承认个人服从空间、时间和因果关系的法则的困难，在于否定我们个人的独立性的直接感觉。"
  网络来源: "https://baike.baidu.com/item/%E5%A4%A9%E6%96%87%E5%AD%A6"

- 名词: "统计学"
  分类: "概念"
  解释: "统计学是基于概率论建立数学模型，通过收集、整理、分析数据并进行推断的科学。托尔斯泰指出出生率、犯罪率等社会现象服从统计学法则。"
  书中原文: "自从有人说出和证明，出生率或犯罪率服从数学法则，一定的地理的和政治经济的条件决定这种或那种管理形式，人口和土地的一定关系造成民族的迁徙，从此，历史所依据的基础就从根本上被摧毁了。"
  网络来源: "https://baike.baidu.com/item/%E7%BB%9F%E8%AE%A1%E5%AD%A6"

- 名词: "地理学"
  分类: "概念"
  解释: "地理学是研究地球表层自然要素与人文要素相互作用及其形成演化特征的学科体系，具有综合性与区域性特点。托尔斯泰将其列为推翻旧历史观的新兴科学之一。"
  书中原文: "旧的历史与完全违反它的原理的统计学、地理学、政治经济学、比较语言学和地质学的法则仍然被人研究着。"
  网络来源: "https://baike.baidu.com/item/%E5%9C%B0%E7%90%86%E5%AD%A6"

- 名词: "政治经济学"
  分类: "概念"
  解释: "政治经济学是研究社会财富生产、分配、交换和消费过程中社会生产关系及其运动规律的科学。古典政治经济学以斯密、李嘉图为代表，马克思在此基础上创立剩余价值论。"
  书中原文: "旧的历史与完全违反它的原理的统计学、地理学、政治经济学、比较语言学和地质学的法则仍然被人研究着。"
  网络来源: "https://baike.baidu.com/item/%E6%94%BF%E6%B2%BB%E7%BB%8F%E6%B5%8E%E5%AD%A6"

- 名词: "比较语言学"
  分类: "概念"
  解释: "比较语言学是历史语言学的分支，通过比较不同语言的语音、词汇、语法系统来确定语言间的历史亲缘关系并重构祖语。1786年威廉·琼斯指出梵语与拉丁语、希腊语的系统对应关系为其开端。"
  书中原文: "旧的历史与完全违反它的原理的统计学、地理学、政治经济学、比较语言学和地质学的法则仍然被人研究着。"
  网络来源: "https://baike.baidu.com/item/%E6%AF%94%E8%BE%83%E8%AF%AD%E8%A8%80%E5%AD%A6"

- 名词: "地质学"
  分类: "概念"
  解释: "地质学是研究地球的物质组成、内部构造、各圈层相互作用及演变历史的自然科学，主要分支包括矿物学、岩石学、构造地质学、地史学等。"
  书中原文: "旧的历史与完全违反它的原理的统计学、地理学、政治经济学、比较语言学和地质学的法则仍然被人研究着。"
  网络来源: "https://baike.baidu.com/item/%E5%9C%B0%E8%B4%A8%E5%AD%A6"

- 名词: "托勒美"
  分类: "人物"
  解释: "克罗狄斯·托勒密（约90—168年），古希腊天文学家、地理学家，创立托勒密地心体系（天动说），在《天文学大成》中系统提出地球静止于宇宙中心的理论。该体系统治西方天文学约1400年。"
  书中原文: "托勒美是古希腊学者、天文学家和地理学家，创立天动说。"
  网络来源: "https://baike.baidu.com/item/%E6%89%98%E5%8B%92%E5%AF%86%E4%BD%93%E7%B3%BB/696010"

- 名词: "哥白尼"
  分类: "人物"
  解释: "尼古拉·哥白尼（1473—1543），波兰天文学家，日心说创立者。1543年出版《天体运行论》，提出太阳为宇宙中心，推翻了统治西方一千多年的托勒密地心说，开启了近代科学革命。"
  书中原文: "自从哥白尼体系被发现和被证实以后，仅仅承认运转的不是太阳而是地球这一事实，就足以破除古人的全部宇宙观了。"
  网络来源: "https://baike.baidu.com/item/%E5%93%A5%E7%99%BD%E5%B0%BC"

- 名词: "哥白尼体系"
  分类: "概念"
  解释: "哥白尼体系（日心说）由哥白尼在1543年《天体运行论》中提出：太阳位于宇宙中心静止不动，地球每日自转并绕太阳公转，行星逆行是相对运动产生的视觉错觉。"
  书中原文: "自从哥白尼体系被发现和被证实以后，仅仅承认运转的不是太阳而是地球这一事实，就足以破除古人的全部宇宙观了。"
  网络来源: "https://baike.baidu.com/item/%E5%93%A5%E7%99%BD%E5%B0%BC%E4%BD%93%E7%B3%BB/12719064"

- 名词: "托勒美天动说"
  分类: "概念"
  解释: "托勒密地心体系（天动说）是公元2世纪托勒密在《天文学大成》中提出的宇宙模型，主张地球静止于宇宙中心，日月行星绕地球运行，引入本轮-均轮理论解释行星逆行。"
  书中原文: "就在哥白尼体系被发现以后，托勒美的天动说还被研究了很长时间。"
  网络来源: "https://baike.baidu.com/item/%E6%89%98%E5%8B%92%E5%AF%86%E4%BD%93%E7%B3%BB/696010"

- 名词: "牛顿"
  分类: "人物"
  解释: "艾萨克·牛顿（1643—1727），英国物理学家、数学家，经典力学创始人。1687年出版《自然哲学的数学原理》，提出万有引力定律和三大运动定律，统一了天上与地上的力学，被誉为现代科学之父。"
  书中原文: "正如人人都感觉到、而其自身却无法理解的万有引力一样，我们对它所服从的必然性法则知道多少（从一切物体都有重量这个起码的知识，到牛顿的定律），我们就对它了解多少。"
  网络来源: "https://baike.baidu.com/item/%E7%89%9B%E9%A1%BF"

- 名词: "凯普勒"
  分类: "人物"
  解释: "约翰内斯·开普勒（1571—1630），德国天文学家，发现行星运动三大定律（椭圆轨道定律、面积定律、周期定律），被称天空立法者。其定律为牛顿万有引力定律奠定了关键基础。"
  书中原文: "假如有一个天体自由运行，那么凯普勒和牛顿的定律就不再存在了，任何天体运行的观念也不再存在了。"
  网络来源: "https://baike.baidu.com/item/%E5%BC%80%E6%99%AE%E5%8B%92"

- 名词: "安德烈·库尔布斯基"
  分类: "人物"
  解释: "安德烈·库尔布斯基亲王（1528—1583），俄国贵族、军事统帅，留里克王朝后裔。曾为伊凡四世重臣，1564年叛逃立陶宛。以与伊凡四世的长篇书信论战闻名。"
  书中原文: "安德烈·库尔布斯基公爵是伊凡四世手下的主要贵族之一。他逃亡立陶宛，从那里写信给伊凡，责备他的残酷、虚伪和专断。"
  网络来源: "https://baike.baidu.com/item/%E5%AE%89%E5%BE%B7%E7%83%88%C2%B7%E5%BA%93%E5%B0%94%E5%B8%83%E6%96%AF%E5%9F%BA/12002927"

- 名词: "伊凡四世"
  分类: "人物"
  解释: "伊凡四世·瓦西里耶维奇（1530—1584），别称伊凡雷帝，俄国首位沙皇（1547年加冕）。推行特辖制加强中央集权，灭亡喀山汗国和阿斯特拉罕汗国使俄国版图大幅扩张。以极端残暴著称。"
  书中原文: "安德烈·库尔布斯基公爵是伊凡四世手下的主要贵族之一。他逃亡立陶宛，从那里写信给伊凡，责备他的残酷、虚伪和专断。伊凡回信，根据上帝的法则为他自己辩护。"
  网络来源: "https://baike.baidu.com/item/%E4%BC%8A%E5%87%A1%E5%9B%9B%E4%B8%96/1082096"

- 名词: "彼得修道士"
  分类: "人物"
  解释: "隐士彼得（约1050—1115），法国亚眠人，天主教司铎、苦修隐士，第一次十字军东征的重要布道者，平民十字军的领袖。1096年率数万平民东征，队伍在奇维托特战役中被塞尔柱土耳其人全歼。"
  书中原文: "彼得是一名法国修道士，禁欲主义者，据传说，第一次十字军是由他鼓动起来的。"
  网络来源: "https://baike.baidu.com/item/%E9%9A%90%E5%A3%AB%E5%BD%BC%E5%BE%97"

- 名词: "马克西米连"
  分类: "人物"
  解释: "马克西米连一世（1832—1867），奥地利哈布斯堡家族成员，1864至1867年任墨西哥皇帝。在法国拿破仑三世支持下建立墨西哥第二帝国，推行自由派改革。1867年被胡亚雷斯的共和军俘虏并枪决。"
  书中原文: "一八六四年，在法军支持下，马克西米连取得了墨西哥王位。"
  网络来源: "https://baike.baidu.com/item/%E9%A9%AC%E8%A5%BF%E7%B1%B3%E8%BF%9E%E8%AF%BA%E4%B8%80%E4%B8%96/9665240"

- 名词: "阿提拉"
  分类: "人物"
  解释: "阿提拉（约406—453），匈奴王，称号上帝之鞭。434年起统治匈奴帝国，445年成为唯一统治者。多次入侵东罗马和西罗马帝国，451年沙隆战役被击败。453年暴毙，帝国随即瓦解。"
  书中原文: "阿提拉是匈奴族首领（406—453），在他的时代，匈奴部族联盟极为强盛。"
  网络来源: "https://baike.baidu.com/item/%E9%98%BF%E6%8F%90%E6%8B%89/5024"

- 名词: "约书亚"
  分类: "人物"
  解释: "约书亚（嫩的儿子），《旧约圣经》中的重要人物，摩西的继任者，带领以色列人进入迦南应许之地。主要事迹包括过约旦河、攻陷耶利哥城、分地给十二支派。相传曾祈求日月停留以助战。"
  书中原文: "见《圣经·旧约·约书亚记》。"
  网络来源: "https://baike.baidu.com/item/%E7%BA%A6%E4%B9%A6%E4%BA%9A"
