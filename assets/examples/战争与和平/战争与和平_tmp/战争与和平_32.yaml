- 名词: 图申
  分类: 人物
  解释: 托尔斯泰《战争与和平》中的配角，一名炮兵上尉。身材瘦小、其貌不扬，但性格善良憨厚。在申格拉本战役中指挥四门大炮独自奋战，向法军驻守的申格拉本村发射燃烧弹，成功阻止法军前进，是托尔斯泰笔下"平凡英雄"的典型代表。
  书中原文: 至于图申和掩护他的一个营，却被遗忘了。被遗忘的图申炮队在中央炮击申格拉本村，使它起火，阻止了法军的前进。
  网络来源: https://baijiahao.baidu.com/s?id=1665309293571912083

- 名词: 申格拉本
  分类: 地点
  解释: 申格拉本（Schöngrabern）位于今奥地利下奥地利州，是1805年11月16日申格拉本战役（又称霍拉布伦战役）的发生地。此战中俄军巴格拉季翁部约5000-7300人阻击法军缪拉元帅约3万人的部队，成功掩护库图佐夫主力撤退。
  书中原文: 被遗忘的图申炮队在中央炮击申格拉本村，使它起火，阻止了法军的前进。
  网络来源: https://bbs.napolun.com/thread-27924-1-7.html

- 名词: 第六猎骑兵团
  分类: 物件
  解释: 法国第6猎骑兵团（6e Régiment de Chasseurs à Cheval）是法兰西第一帝国的一支轻骑兵部队，组建于1779年。猎骑兵主要负责侦察、追击、侧翼掩护和快速机动等任务。在申格拉本战役中该团两营人被调至前线支援。
  书中原文: 命令他把方才他们从旁走过的第六猎骑兵团的两个营从山上调来。第六猎骑兵团的进攻，掩护了右翼的撤退。
  网络来源: https://www.napoleon.org/en/history-of-the-two-empires/objects/the-cent-jours-standard-eagle-of-the-6e-regiment-des-chasseurs-a-cheval/

- 名词: 亚速步兵团
  分类: 物件
  解释: 亚速步兵团（Азовский пехотный полк）是俄罗斯帝国陆军的一个步兵团，1805年时隶属库图佐夫的多瑙河军团。在申格拉本战役中与波多尔斯克步兵团、保罗格勒骠骑兵团共同组成左翼部队，后因指挥混乱陷入困境。
  书中原文: 由亚速和波多尔斯克两个步兵团以及保罗格勒骠骑兵团组成的左翼，受到法军拉纳所统率的优势兵力的进攻和迂回而陷于混乱。
  网络来源: https://www.wikiwand.com/en/articles/12th_Infantry_Division_(Russian_Empire)

- 名词: 波多尔斯克步兵团
  分类: 物件
  解释: 波多尔斯克步兵团（Подольский пехотный полк）是俄罗斯帝国陆军的一个步兵团，1798年组建，最初为海军步兵性质。1811年更名为波多尔斯克步兵团。在申格拉本战役中该团与亚速步兵团并肩作战，构成俄军左翼。
  书中原文: 由亚速和波多尔斯克两个步兵团以及保罗格勒骠骑兵团组成的左翼，受到法军拉纳所统率的优势兵力的进攻和迂回而陷于混乱。
  网络来源: https://en.president.gospmr.org/press-sluzhba/novosti/vadim-krasnoseljskiy-prinyal-uchastie-v-polkovom-prazdnike-55-go-podoljskogo-pehotnogo-polka.html

- 名词: 方阵
  分类: 概念
  解释: 方阵（Infantry Square）是拿破仑战争时期步兵用于对抗骑兵冲锋的防御阵形。士兵四面朝外排列成密集方形，消除侧翼和后方弱点。主要分为空心方阵（经典形式，中间留空保护旗手和伤员）和实心方阵。缺点是火力覆盖面积小、机动性差。
  书中原文: 安德烈公爵骑马走到一群士兵跟前，心中想道，"这不能算是散兵线，因为他们挤作一团！不能算是进攻，因为他们待在那儿不动。也不能算是方阵，因为他们站得不对。"
  网络来源: https://baike.baidu.com/item/%E8%90%A5%E6%96%B9%E9%98%B5/6649512

- 名词: 炮兵
  分类: 概念
  解释: 炮兵是拿破仑战争中最重要的兵种之一，以火炮为主要武器。俄军在1805年拥有约400-600门火炮。炮兵可在步兵和骑兵射程之外攻击敌人，是决定战役胜负的关键力量。在申格拉本战役中，图申上尉的炮兵连在中央阵地的炮击阻止了法军前进。
  书中原文: 被遗忘的图申炮队在中央炮击申格拉本村，使它起火，阻止了法军的前进。
  网络来源: https://book.qq.com/book-read/34921779/31?g_f=5000001
