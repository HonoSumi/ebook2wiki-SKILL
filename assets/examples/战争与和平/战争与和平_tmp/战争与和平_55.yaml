- 名词: 手枪
  分类: 物件
  解释: 19世纪初俄国决斗中使用的单发燧发手枪，是当时贵族决斗的标准武器。决斗双方各持一把，在副手口令下前进至界线发射。
  书中原文: "拿起手枪，在喊到'三'时，双方向前走。皮埃尔向前伸出握住手枪的右手，仿佛害怕这支手枪会把自己打死似的。"
  网络来源: https://www.zhihu.com/question/525436490

- 名词: 雪橇
  分类: 物件
  解释: 19世纪俄国冬季最重要的交通工具，由马拉行于雪地之上。贵族使用的雪橇分三驾、双套等类型，是身份象征。小说中用于冬季出行和运送受伤者。
  书中原文: "罗斯托夫和杰尼索夫护送受伤的多洛霍夫。多洛霍夫躺在雪橇里，闭住眼睛不言不语。"
  网络来源: https://www.163.com/dy/article/JK346LCD05504DOQ.html

- 名词: 大理石板
  分类: 物件
  解释: 皮埃尔书房桌上的大理石台板，在皮埃尔与海伦激烈争吵中被皮埃尔抄起作为武器威胁海伦，象征皮埃尔长期压抑的愤怒彻底爆发。
  书中原文: "皮埃尔从沙发上跳起来，踉踉跄跄地向她冲过去。从桌上抄起一块大理石板，用连他自己都想不到的力量，迈出一个箭步，向她抡将起来。"
  网络来源: http://datongshuhua.cn/page101?article_id=414&pagenum=58

- 名词: 情夫
  分类: 概念
  解释: 指与有夫之妇保持不正当性关系的男性。在本卷中指多洛霍夫与皮埃尔的妻子海伦之间的通奸关系，是导致皮埃尔与多洛霍夫决斗的直接原因。
  书中原文: "我打死了情夫，是的，我打死了妻子的情夫。说多洛霍夫是我的情夫，她用法语说，以突出这个词的粗野含意。"
  网络来源: https://tieba.baidu.com/p/7095580047

- 名词: 荡妇
  分类: 概念
  解释: 皮埃尔在内心独白中对妻子海伦的道德评判，认为她缺乏任何高尚的爱好和愿望、生活放荡。该词反映了当时俄国贵族社会对女性出轨行为的严厉道德审判。
  书中原文: "原来全部的谜底就在于她是一个荡妇这个可怕的字眼：我对自己说出这个可怕的字眼，于是一切都迎刃而解了！"
  网络来源: https://www.bilibili.com/opus/364783009952456195

- 名词: 别祖霍夫
  分类: 人物
  解释: 俄国贵族姓氏，小说《战争与和平》四大家族之一。老伯爵基里尔·弗拉季米罗维奇·别祖霍夫是叶卡捷琳娜女皇时代的权贵，拥有巨额财富；其私生子皮埃尔继承爵位与家产后成为小说核心男主角之一。
  书中原文: "他待在他父亲老伯爵别祖霍夫去世的那间特大的书房里。"
  网络来源: https://baike.baidu.com/item/%E7%9A%AE%E5%9F%83%E5%B0%94%C2%B7%E5%88%AB%E7%A5%96%E9%9C%8D%E5%A4%AB/53725822

- 名词: 罗伯斯庇尔
  分类: 人物
  解释: 法国大革命时期雅各宾派领袖，1793-1794年实行恐怖统治，1794年热月政变后被处死。皮埃尔在决斗后的内心独白中以罗伯斯庇尔和路易十六为例，思考历史评判的相对性。
  书中原文: "后来罗伯斯庇尔因为专制而被处死。谁是谁非？无所谓是非。"
  网络来源: https://baijiahao.baidu.com/s?id=1671347894401724268

- 名词: 莫里哀
  分类: 人物
  解释: 17世纪法国古典主义喜剧大师，代表作有《吝啬鬼》《伪君子》等。皮埃尔在痛苦自责时想起莫里哀喜剧《吝啬鬼》中的台词"为什么要上那条船呢？"，以此来嘲弄自己的愚蠢选择。
  书中原文: "他忽然想起莫里哀的一句台词：为什么要上那条船呢？于是他嘲笑起自己来了。"
  网络来源: https://book.douban.com/subject/1019817/blockquotes

- 名词: 书房
  分类: 物件
  解释: 老别祖霍夫伯爵生前的大书房，位于莫斯科的别祖霍夫宅邸。皮埃尔在决斗后独自留宿于此，经历了深刻的精神反思与内心风暴，它是小说中承载人物心理转折的关键空间。
  书中原文: "在决斗后的第二天夜里，他像往常那样，没有到卧室去，就待在他父亲老伯爵别祖霍夫去世的那间特大的书房里。"
  网络来源: https://www.yunshuwu.cn/chap/8543.html

- 名词: 名誉
  分类: 概念
  解释: 19世纪俄国贵族社会核心价值观念，决斗文化的精神基础。贵族视名誉高于生命，当名誉受辱时以决斗作为终极解决手段。皮埃尔虽厌恶暴力，但在社会舆论和荣誉法则压力下仍向多洛霍夫提出决斗。
  书中原文: "名誉扫地吗？生活不幸吗？唉，全是扯淡。丢脸也罢，光荣也罢，全是相对的，一切都以我为转移。"
  网络来源: https://wap.cnki.net/touch/web/Journal/Article/WXJL201202068.html

- 名词: 副手
  分类: 概念
  解释: 决斗中协助当事人安排事宜、保障公平的见证人。职责包括传递挑战书、协商武器与距离、确保双方遵守规则。小说中皮埃尔的副手是涅斯维茨基，多洛霍夫的副手是罗斯托夫，杰尼索夫担任指挥。
  书中原文: "敌对双方站在相距四十来步的空地两边，副手们在潮湿的深雪上步量距离。"
  网络来源: https://www.gradesaver.com/war-and-peace/study-guide/summary-volume-ii-part-1

- 名词: 大俄罗斯田产
  分类: 概念
  解释: 指位于俄罗斯欧洲部分核心地带（非边疆或新征服地区）的贵族领地，是别祖霍夫家族财富的主体。皮埃尔与海伦分居时将占家产大半的大俄罗斯田产管理权交给海伦，象征他彻底放弃物质纠葛。
  书中原文: "皮埃尔把占他家产大半的全部大俄罗斯田产的管理权都交给了妻子，他独自一人到彼得堡去了。"
  网络来源: https://zhuanlan.zhihu.com/p/495064846
