- 名词: 皮埃尔救女孩
  分类: 事件
  解释: 《战争与和平》中皮埃尔·别祖霍夫在莫斯科大火期间从一幢燃烧的大房子中救出一个三岁女孩的情节。皮埃尔原本被压抑的思绪在大火中解脱，变得年轻快活，他冲入火场寻人，在花园长凳下发现女孩并抱起她逃离。
  书中原文: 皮埃尔高兴得喘不上气来，向女孩跑过去想抱她。可是那个生瘰疬病、样子像母亲、长得不好看的女孩，一见生人，大叫一声拔腿就跑。皮埃尔总算抓住她，把她抱起来
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 脸上有黑痣的法国人
  分类: 人物
  解释: 《战争与和平》中一个帮助皮埃尔寻救火灾中女孩的法国士兵，黑眼睛、小个子，脸上有一颗黑痣，只穿一件衬衫。他告诉皮埃尔听见花园中有孩子哭声，并带路前往，随后表示"总得讲点人情"，跑回同伴处。
  书中原文: 一分钟后，那个黑眼睛、小个子、脸上有一颗黑痣只穿一件衬衫的法国人，果然从一层楼窗口跑出来，拍了拍皮埃尔的肩膀，和他一同向花园跑去。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 亚美尼亚美人
  分类: 人物
  解释: 《战争与和平》中在莫斯科大火期间出现的一个亚美尼亚家庭中的年轻女子，被作者形容为东方美的化身。她有清秀弯弯的黑眉、毫无表情的美丽长脸、柔嫩红润的肌肤，身着富丽缎子长衫，头扎鲜艳紫色头巾。她在法国兵抢劫时遭到侵害。
  书中原文: 在皮埃尔看来，那个十分年轻的女人是东方美的化身，她生有一对清秀的、弯弯的黑眉，她那毫无表情的美丽的、长长的脸，非常柔嫩和红润。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 法国兵抢劫亚美尼亚人
  分类: 事件
  解释: 《战争与和平》中莫斯科大火期间，两名法国士兵抢劫一户亚美尼亚人家的场景。矮个法国兵抢走老人的靴子，高个穿女外衣的法国兵则侵害亚美尼亚年轻女子，扯下她的项链。皮埃尔见状冲上去将法国兵打倒。
  书中原文: 那个穿灰外套、没穿靴子的小个子法国兵走到亚美尼亚人跟前，说了句什么，一下子抓住老人的腿，那老人就连忙脱靴子。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 皮埃尔被捕
  分类: 事件
  解释: 《战争与和平》中皮埃尔因攻击抢劫亚美尼亚人的法国士兵而被法军枪骑兵巡逻队逮捕的情节。皮埃尔在盛怒之下力气大增，将法国兵撂倒并拳打，随后一队枪骑兵赶到将他包围，搜身后绑起带走。
  书中原文: 他只记得他在打一个人，人家也在打他，最后他觉得他的双手被绑起来，他周围站着一群法国兵，在搜他的身。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 枪骑兵巡逻队
  分类: 物件
  解释: 拿破仑军队中的一支骑兵巡逻队，负责在莫斯科街头维持秩序、制止抢劫和捉拿纵火嫌疑犯。由一名中尉军官带领，配有翻译。在小说中逮捕了皮埃尔及其他俄国嫌疑犯。
  书中原文: 正在这时，从街角出现一队骑马的枪骑兵巡逻队。枪骑兵快步驰到皮埃尔和法国兵跟前，把他们围了起来。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 祖波夫土围子
  分类: 地点
  解释: 莫斯科的一处地点，在1812年法军占领莫斯科期间被用作拘留所。俄语音译为祖波夫的土城地区，位于莫斯科花园环路沿线，原是旧莫斯科外围土墙防御工事的一部分。小说中皮埃尔和其他嫌疑犯被关押于此。
  书中原文: 当他们都被带到祖波夫土围子（那儿设有拘留所）过夜时，皮埃尔在严格的看守下被单独监禁起来。
  网络来源: 小说中的莫斯科地点，原莫斯科土城（Земляной город）防御工事区域，现为莫斯科花园环路沿线。

- 名词: 迪罗涅尔
  分类: 人物
  解释: 《战争与和平》中提到的法国军官，负责指挥在莫斯科街道巡逻、制止抢劫和捉拿纵火犯的巡逻队。他的巡逻队在莫斯科城中抓获了多名俄国嫌疑犯，包括皮埃尔。
  书中原文: 这支法国巡逻队是奉迪罗涅尔的命令到莫斯科各街道制止抢劫、特别是捉拿纵火犯的许多巡逻队之一
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 纵火犯
  分类: 概念
  解释: 法军对莫斯科大火归咎于俄国人蓄意纵火而追捕的罪名。法国高级军官一致认为莫斯科大火是俄国人故意放火，派出多支巡逻队搜捕纵火嫌疑犯。皮埃尔因此被怀疑为纵火犯。历史学界对纵火责任至今无定论，一般认为多方因素共同导致。
  书中原文: 奉迪罗涅尔的命令到莫斯科各街道制止抢劫、特别是捉拿纵火犯的许多巡逻队之一，据法国高级军官提出的一致意见，认为有放火的人。
  网络来源: 1812年莫斯科大火的历史争议，法国指控俄方蓄意纵火，俄方指责法军行为不当引发火灾。

- 名词: 俄国嫌疑犯
  分类: 概念
  解释: 指1812年法军占领莫斯科期间被巡逻队逮捕的俄国平民，被怀疑为纵火犯或抵抗者。小说中巡逻队抓了五名俄国嫌疑犯，包括小店主、中学生、农民、家奴以及抢劫犯，其中皮埃尔被认为最可疑。
  书中原文: 这支巡逻队巡逻了几条街道，又抓了五名俄国嫌疑犯：一个小店主，两个中学生，一个农民和一个家奴，另外抓了几个抢劫犯。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 小店主
  分类: 人物
  解释: 被法军巡逻队逮捕的俄国嫌疑犯之一，属于莫斯科城中经营小商铺的平民阶层。在小说中他与中学生、农民、家奴等人一同被法军怀疑为纵火犯。
  书中原文: 又抓了五名俄国嫌疑犯：一个小店主，两个中学生，一个农民和一个家奴
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 中学生
  分类: 人物
  解释: 被法军巡逻队逮捕的俄国嫌疑犯之一。两名中学生与其他平民一同被法军带走，关押在祖波夫土围子。
  书中原文: 又抓了五名俄国嫌疑犯：一个小店主，两个中学生，一个农民和一个家奴
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 单独监禁
  分类: 概念
  解释: 法军将皮埃尔与其他囚犯隔离关押的监禁方式。由于皮埃尔在所有嫌疑犯中最为可疑，他被单独关押在祖波夫土围子的拘留所中，受到严格看守。
  书中原文: 而在所有嫌疑犯中，皮埃尔最可疑。当他们都被带到祖波夫土围子（那儿设有拘留所）过夜时，皮埃尔在严格的看守下被单独监禁起来。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 安菲罗夫家
  分类: 人物
  解释: 《战争与和平》中提到的莫斯科一户人家，在莫斯科大火期间遭遇混乱。人群中的助祭和麻脸女人讨论皮埃尔所寻小孩是否属于安菲罗夫家，最终被认为安菲罗夫家一早就已撤离。
  书中原文: 这一定是安菲罗夫家的，天主保佑，天主保佑。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 玛丽亚·尼古拉耶夫娜
  分类: 人物
  解释: 《战争与和平》中莫斯科大火期间群众提及的一位妇女，被推测可能是皮埃尔所救女孩的母亲。一个家奴指出玛丽亚·尼古拉耶夫娜是位太太，而皮埃尔描述的是普通女人。
  书中原文: 这不是玛丽亚·尼古拉耶夫娜家的，就是伊万诺夫家的。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 伊万诺夫家
  分类: 人物
  解释: 《战争与和平》中莫斯科大火期间群众提及的一户人家，被猜测可能是皮埃尔所救女孩所属的家庭。
  书中原文: 这不是玛丽亚·尼古拉耶夫娜家的，就是伊万诺夫家的。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 麻脸女人
  分类: 人物
  解释: 《战争与和平》中莫斯科大火期间出现在人群中的一个妇女，脸上有麻子。她与年老的助祭交谈，帮忙辨认皮埃尔所救女孩的家庭，后来皮埃尔将女孩交给她照看。
  书中原文: 一个年老的助祭对一个麻脸的女人说
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 法国店员翻译
  分类: 人物
  解释: 《战争与和平》中在法军枪骑兵巡逻队中担任翻译的人，原是一家莫斯科商店的法国店员，穿着俄国平民衣服。他用法语与皮埃尔交谈，认出皮埃尔不像普通老百姓。
  书中原文: 从队列里出来一个骑着马、穿俄国平民衣服的小个子。看他的衣着，听他的口音，皮埃尔立刻认出他是一家莫斯科商店的法国店员。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 格鲁津斯基花园
  分类: 地点
  解释: 《战争与和平》中莫斯科波瓦尔大街拐角处的一处花园。皮埃尔抱着救出的女孩跑回此处时，发现这里已挤满了人和从屋里搬出来的家什，还有穿着形形色色服装的士兵。
  书中原文: 当皮埃尔抱着女孩穿过院子和小巷，跑回波瓦尔大街拐角格鲁津斯基花园时，他一下子认不出刚从那儿去找女孩的地方了
  网络来源: 《战争与和平》原著中的莫斯科地点，位于波瓦尔大街。

- 名词: 鲁缅采夫派
  分类: 概念
  解释: 1812年前后俄国宫廷中的政治派别，以外交大臣尼古拉·彼得罗维奇·鲁缅采夫为首。主张俄国在欧洲冲突中保持中立，扩大与各国的商业关系，属于亲法外交路线。在小说中该派与亲法派、玛丽亚·费奥多罗夫娜派、皇太子派等进行激烈斗争。
  书中原文: 鲁缅采夫派、亲法派、玛丽亚·费奥多罗夫娜派、皇太子派，以及其他各派，正在进行空前激烈的复杂的斗争
  网络来源: 1812年俄国宫廷外交派系，鲁缅采夫（Н.П. Румянцев）时任外交大臣，主张"自由之手"政策。

- 名词: 亲法派
  分类: 概念
  解释: 1812年前后俄国宫廷中主张与法国保持友好关系的政治派别。在小说中该派与鲁缅采夫派、玛丽亚·费奥多罗夫娜派、皇太子派等同时存在，共同构成彼得堡上层社会复杂的政治斗争格局。
  书中原文: 鲁缅采夫派、亲法派、玛丽亚·费奥多罗夫娜派、皇太子派，以及其他各派，正在进行空前激烈的复杂的斗争
  网络来源: 1812年拿破仑入侵前夕俄国宫廷内的外交路线分歧，亲法派主张维持与法国的同盟关系。

- 名词: 皇太子派
  分类: 概念
  解释: 1812年前后俄国宫廷中以皇太子康斯坦丁·帕夫洛维奇大公为首的政治派别。皇太子康斯坦丁是亚历山大一世的弟弟，该派在宫廷政治中与其他派系争夺影响力。小说中描写各派斗争激烈但日常生活如故。
  书中原文: 鲁缅采夫派、亲法派、玛丽亚·费奥多罗夫娜派、皇太子派，以及其他各派，正在进行空前激烈的复杂的斗争
  网络来源: 1812年俄国宫廷政治中的派系之一，皇太子康斯坦丁·帕夫洛维奇大公是保罗一世之子、亚历山大一世之弟。

- 名词: 伊丽莎白·阿列克谢耶夫娜皇后
  分类: 人物
  解释: 俄罗斯帝国沙皇亚历山大一世的皇后，原名巴登的路易丝公主（1779-1826）。1793年与亚历山大结婚，1801年加冕为皇后。在1812年卫国战争期间，被问及疏散命令时，她以爱国精神回答说不能给国家机关下命令，她个人将是最后一个离开彼得堡的人。
  书中原文: 但是当人们向伊丽莎白·阿列克谢耶夫娜皇后请示命令的时候，她以她特有的俄罗斯爱国精神回答说，她不能给国家机关下命令，因为这是皇帝的事；至于她个人所能做到的，那就是她将是最后一个离开彼得堡的人。
  网络来源: 伊丽莎白·阿列克谢耶夫娜（巴登的路易丝），亚历山大一世皇后，1779-1826。

- 名词: 喀山疏散
  分类: 事件
  解释: 1812年拿破仑入侵俄国期间，俄国皇室将部分机构东撤至伏尔加河流域城市喀山的行动。玛丽亚·费奥多罗夫娜皇后命令她管辖的慈善机关和教育机关疏散到喀山，机构物品已包装停当。
  书中原文: 玛丽亚·费奥多罗夫娜皇后只关心她所管辖的慈善机关和教育机关，她命令这些机关疏散到喀山，这些机构的东西都已包装停当。
  网络来源: 1812年俄国卫国战争期间，俄国宫廷将部分机构东迁至喀山，喀山位于莫斯科以东约800公里。

- 名词: 慈善机关和教育机关
  分类: 概念
  解释: 指玛丽亚·费奥多罗夫娜皇后所管辖的俄国皇室慈善与教育机构体系。皇后在战争期间下令将这些机构疏散到喀山，体现了俄国皇室在1812年战争中的应对措施。
  书中原文: 玛丽亚·费奥多罗夫娜皇后只关心她所管辖的慈善机关和教育机关，她命令这些机关疏散到喀山
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 法国剧院
  分类: 地点
  解释: 1812年战争期间彼得堡仍在正常演出的法国剧院。在小说中作为彼得堡上层社会生活如常的象征，与莫斯科的灾难形成鲜明对比。尽管战争形势严峻，彼得堡的法国剧院、舞会晚会等依然如故。
  书中原文: 皇帝早朝依然如故，跳舞晚会依然如故，法国剧院依然如故
  网络来源: 19世纪初彼得堡的法国剧院，是俄国贵族社会文化生活的重要组成部分。

- 名词: 宫廷党派斗争
  分类: 概念
  解释: 1812年拿破仑入侵前后俄国彼得堡宫廷内部各政治派系之间的权力和路线斗争。涉及鲁缅采夫派、亲法派、玛丽亚·费奥多罗夫娜派、皇太子派等多个派系，斗争空前激烈复杂，但宫廷日常生活表面仍平静如常。
  书中原文: 鲁缅采夫派、亲法派、玛丽亚·费奥多罗夫娜派、皇太子派，以及其他各派，正在进行空前激烈的复杂的斗争，宫廷吃闲饭的官僚们，照例是在一旁呐喊助威。
  网络来源: 19世纪初俄国宫廷政治的特点，各派系围绕外交路线和权力分配进行激烈斗争。

- 名词: 皮埃尔打法国兵
  分类: 事件
  解释: 《战争与和平》中皮埃尔见亚美尼亚女子被法军士兵侵害，在狂怒中出手攻击法国兵的情节。皮埃尔在盛怒之下力气大增，将拔短剑的法国兵扑倒并拳打，周围俄国百姓发出喝彩声，但随后被赶来的枪骑兵巡逻队逮捕。
  书中原文: 法国兵还没来得及拔出短剑，他已经向他扑过去，把他撂倒，用拳头捶他。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 穿女外衣的法国兵
  分类: 人物
  解释: 《战争与和平》中趁火打劫的法国士兵之一，个子细高、驼背、头发淡黄、精瘦、动作迟钝、一脸白痴相。他穿一件厚呢女外衣和蓝裤子，一双又大又破的骑兵长靴，是侵害亚美尼亚美女的主要施暴者。
  书中原文: 那个穿女外衣的高个子匪兵已经把亚美尼亚女人脖子上的项链扯了下来，那个年轻女人两手抱着脖子尖声大叫。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 亚美尼亚老人
  分类: 人物
  解释: 《战争与和平》中莫斯科大火期间出现的一个亚美尼亚人家庭的户主，穿新皮袄和新靴子，具有漂亮的东方脸型。法国兵抢劫时抓住他的腿强行脱下他的靴子，老人抽抽搭搭地哭诉。
  书中原文: 他不由得注意到一个格鲁吉亚人或亚美尼亚人家庭，这家人里面有一个穿新皮袄和新靴子、具有漂亮的东方脸型的老人
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 金器
  分类: 物件
  解释: 法国士兵从莫斯科燃烧的大房子中掠夺的贵重物品之一。几个法国人在大房子窗口将满盛金器的抽屉往下扔，另一些站在下面的士兵向扔下的抽屉走过来争抢。
  书中原文: 看见大房子窗口里有几个法国人，正在把满盛金器的抽屉往下扔。另一些站在下面的士兵向扔下的抽屉走过来。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 短剑
  分类: 物件
  解释: 法军士兵使用的近战武器。在小说中，负责抢劫亚美尼亚人的法国兵被皮埃尔扔出去后，其同伴扔掉靴子拔出短剑向皮埃尔走来，但被皮埃尔抢先扑倒。
  书中原文: 但是他的同伴扔掉靴子，拔出一柄短剑，气势汹汹地向他走过来。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 骑兵长靴
  分类: 物件
  解释: 法国骑兵配备的长筒靴。在小说中，一个穿女外衣的高个子法国兵穿有一双又大又破的骑兵长靴，另一个没穿靴子的矮个法国兵则抢走了亚美尼亚老人的靴子。
  书中原文: 一双又大又破的骑兵长靴。那个穿灰外套、没穿靴子的小个子法国兵走到亚美尼亚人跟前，说了句什么，一下子抓住老人的腿，那老人就连忙脱靴子。
  网络来源: 《战争与和平》原著第四册第一部第一章

- 名词: 项链
  分类: 物件
  解释: 亚美尼亚年轻女子佩戴的饰品，被穿女外衣的高个法国兵抢夺。法国兵扯下项链后，年轻女子两手抱着脖子尖声大叫。这是触发皮埃尔出手攻击法国兵的导火索。
  书中原文: 那个穿女外衣的高个子匪兵已经把亚美尼亚女人脖子上的项链扯了下来，那个年轻女人两手抱着脖子尖声大叫。
  网络来源: 《战争与和平》原著第四册第一部第一章
