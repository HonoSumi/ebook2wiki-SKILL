- 名词: 炮王
  分类: 物件
  解释: 位于莫斯科克里姆林宫内的大型青铜火炮，由俄国铸炮师安德烈·乔赫夫于1586年铸造。口径890毫米，重约40吨，是世界上口径最大的火炮之一。炮身饰有沙皇骑马像浮雕，配有1835年铸造的装饰性铸铁炮架。现陈列于克里姆林宫伊万诺夫广场，虽名为"炮王"但从未用于实战。
  书中原文: "于是助祭把面色苍白、呼吸困难的彼佳带到炮王那儿。"
  网络来源: https://wapbaike.baidu.com/item/%E7%82%AE%E7%8E%8B/2799134

- 名词: 斯洛博达宫
  分类: 地点
  解释: 莫斯科的一处历史宫殿建筑，位于列福尔托沃区。最初为18世纪中期巴洛克风格的私家庄园，后经建筑大师马特维·卡扎科夫和贾科莫·夸伦吉重建为古典主义风格。1812年拿破仑入侵期间，亚历山大一世在此召开贵族和商人联席会议，号召组织民团抗击法军。该建筑现为莫斯科国立鲍曼技术大学主楼。
  书中原文: "两天后，十五日早晨，斯洛博达宫门前停着无数的马车。"
  网络来源: https://almavest.ru/en/archive/744/2003

- 名词: 民团
  分类: 事件
  解释: 1812年俄法战争期间，俄国根据亚历山大一世皇帝于1812年7月6日颁布的诏令组建的临时民兵武装（俄语：Народное ополчение）。征募范围涵盖16个中部省份，人数超过30万。贵族捐献钱粮装备，农奴和市民志愿服役。民团参加了斯摩棱斯克战役、波罗底诺会战等重要战斗，是抗击拿破仑入侵的重要力量。托尔斯泰在书中描写了莫斯科贵族在斯洛博达宫集会上讨论组建民团的争论场面。
  书中原文: "斯摩棱斯克人向皇上建议组织民团。难道斯摩棱斯克人的话对于我们就是命令？"
  网络来源: https://encyclopedia2.thefreedictionary.com/_/mdict.aspx?h=1&word=People%27s+Volunteer+Corps+in+the+Patriotic+War+of+1812

- 名词: 三级会议
  分类: 概念
  解释: 法国旧制度时期的全国性等级代表会议，由国王不定期召集，分为教士（第一等级）、贵族（第二等级）和平民（第三等级）三个等级。1302年由腓力四世首次召开，1789年路易十六为应对财政危机召开的末次会议中，第三等级自行组成国民议会，直接引发了法国大革命。该制度在1789年后被废除。皮埃尔在斯洛博达宫集会中将其与法国大革命和民约论联系起来。
  书中原文: "这次不平常的集会，不仅有贵族，而且也有商人参加——包括三级会议各阶层"
  网络来源: https://wapbaike.baidu.com/item/%E4%B8%89%E7%BA%A7%E4%BC%9A%E8%AE%AE

- 名词: 克瓦斯
  分类: 物件
  解释: 盛行于俄罗斯、乌克兰、白俄罗斯等东欧国家的传统低酒精度发酵饮料。以黑麦面包干为原料，加水和糖经自然发酵制成，酒精含量通常不超过1.2%，口感酸甜，带少量气泡。因其营养价值常被称为"液体面包"，与德国啤酒、美国可乐、保加利亚布扎并称世界四大民族饮品。在19世纪俄国街头常见小贩叫卖克瓦斯。
  书中原文: "小贩出现了，叫卖克瓦斯、糖饼和彼佳特别爱吃的罂粟糖饼"
  网络来源: https://zh.wikipedia.org/zh-tw/%E5%85%8B%E7%93%A6%E6%96%AF

- 名词: 告民众书
  分类: 事件
  解释: 1812年拿破仑入侵俄国后，沙皇亚历山大一世于1812年7月6日（俄历）向全国颁布的告民众宣言。宣言通知民众法军入侵的消息，号召贵族、商人及全体人民团结起来，组建地方民团保卫祖国。该宣言随即被送往莫斯科，在斯洛博达宫召开的贵族和商人联席会议上宣读，反响热烈，直接推动了各地民团的组建，标志着俄国"人民战争"的开始。
  书中原文: "他在《告民众书》中看到一句话，说皇上返回首都是为了同民众共商国事的"
  网络来源: https://cir.nii.ac.jp/crid/1390001206056279040

- 名词: 圣母升天大教堂
  分类: 地点
  解释: 位于莫斯科克里姆林宫教堂广场北侧，是俄罗斯历史上最重要的东正教教堂。现存建筑由意大利建筑师亚里士多德·菲奥拉万蒂于1475-1479年为伊凡三世建造，以弗拉基米尔的同名教堂为蓝本，融合意大利文艺复兴风格。白色石墙配五个金色圆顶。自1547年伊凡四世起历代沙皇在此加冕，也是俄罗斯东正教都主教和牧首的安葬地。1812年亚历山大皇帝曾在此参加联合祈祷礼拜。
  书中原文: "皇帝从宫里正向圣母升天大教堂走去"
  网络来源: https://assumption-cathedral.kreml.ru/zh-CN/history/view/khramy-predshestvenniki-uspenskogo-sobora/
