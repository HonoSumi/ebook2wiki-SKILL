- 名词: 冯·托尔
  分类: 人物
  解释: 卡尔·威廉·冯·托尔伯爵（Karl Wilhelm von Toll，1777-1842），波罗的海德意志贵族，俄罗斯帝国步兵上将。在1805年奥斯特利茨战役中担任上尉军官，曾帮助沙皇亚历山大一世越过沟渠。后升任总军需官，在1812年卫国战争中发挥了关键作用，参与选定博罗季诺战场，指挥莫斯科撤退。1833年担任交通大臣。
  书中原文: 正当罗斯托夫这样想，悲哀地离开皇上的时候，冯·托尔上尉偶然来到这里，他看见皇上，就一直驰到他跟前，为他效劳，帮助他走过沟渠。
  网络来源: https://ipfs.io/ipfs/bafybeiemxf5abjwjbikoz4mc3a3dla6ual3jsgpdr4cjr3oz3evfyavhwq/wiki/Karl_Wilhelm_von_Toll.html

- 名词: 普热贝舍夫斯基
  分类: 人物
  解释: 伊格纳齐·普热贝舍夫斯基（Ignacy Przybyszewski，约1755-？），波兰裔俄国陆军中将。原为波兰军官，1793年转投俄军。在1805年奥斯特利茨战役中指挥俄奥联军第三纵队，奉命进攻法军据守的索科尔尼采村，一度攻占该村，但随后被法军包围，纵队大部分投降，本人被法军俘虏。
  书中原文: 普热贝舍夫斯基和他的兵团放下了武器。
  网络来源: https://military-history.fandom.com/wiki/Karl_Wilhelm_von_Toll

- 名词: 伊利亚·伊万诺维奇
  分类: 人物
  解释: 俄国沙皇亚历山大一世的专属马车夫，御用驭手。在1805年奥斯特利茨战役失败后，他驾着四匹黑马拉的轿式马车载着沙皇从战场疾驰撤退。罗斯托夫在混乱中认出他和马车，从而得知沙皇已离开前沿的消息。
  书中原文: 我现在连御马和车夫伊利亚·伊万诺维奇都认得。好像，他除了给皇上赶车，不给第二个人赶车。
  网络来源: 托尔斯泰《战争与和平》原著人物

- 名词: 普拉茨高地
  分类: 地点
  解释: 即普拉岑高地（Pratzen Heights），位于今捷克境内普拉茨村附近，是1805年奥斯特利茨战役中决定胜负的关键制高点。拿破仑故意放弃该高地诱敌深入，待联军主力南移后命苏尔特元帅率军夺回，随后以火炮居高临下轰击联军，将其分割包围，获得决定性胜利。
  书中原文: 这一切在法国炮队从普拉茨高地上射出的炮弹凄厉的声音伴奏下，发出嗡嗡的响声，乱哄哄地移动着。
  网络来源: https://baike.baidu.com/item/奥斯特里茨战役/3246733

- 名词: 奥格斯特堤坝
  分类: 地点
  解释: 奥斯特利茨战役中位于奥格斯特村附近的堤坝和水塘区域。战役后期溃败的俄奥联军拥挤在此狭窄堤岸上遭受法军炮击，死伤惨重。多洛霍夫曾试图从冰面上逃生。此处描绘了战役中最惨烈的画面之一。
  书中原文: 在这狭窄的奥格斯特堤岸上，——多少年来，头戴尖顶小帽的老磨房主，曾坐在这里安闲地垂钓...而现在，在这条窄窄的堤岸上，被死亡吓得面无人色的人们拥挤在大车和炮车之间、马蹄下面和车轮之间，互相倾轧着，死亡着。
  网络来源: https://www.163.com/dy/article/DVQ4VLKO0523R73H.html

- 名词: 霍斯蒂拉德克
  分类: 地点
  解释: 捷克村庄（Hostěrádky），位于奥斯特利茨战场附近。1805年奥斯特利茨战役后，溃退的俄军在此稍作集结，秩序有所恢复。罗斯托夫曾到此寻找库图佐夫和沙皇亚历山大一世的下落。
  书中原文: 那个军官指着霍斯蒂拉德克村，说完就往前走了。
  网络来源: https://www.muni.cz/en/research/publications/391292

- 名词: 三皇会战
  分类: 事件
  解释: 即奥斯特利茨战役（Battle of Austerlitz），1805年12月2日发生于摩拉维亚奥斯特利茨村附近。法兰西帝国皇帝拿破仑·波拿巴、俄罗斯帝国沙皇亚历山大一世和神圣罗马帝国皇帝弗朗茨二世三位君主亲临战场，故得名。拿破仑以约7.3万法军击败约8.7万俄奥联军，瓦解了第三次反法同盟，成为其军事生涯中最辉煌的胜利之一。
  书中原文: 下午五时，全线都吃了败仗。一百多尊大炮落到法国人手里。
  网络来源: https://zh.m.wikipedia.org/wiki/三皇会战

- 名词: 传令官
  分类: 概念
  解释: 古代军队中负责传达上级命令的军吏或士兵。在缺乏现代通信手段的战场上，传令官依靠口头传话、旗帜信号等方式在指挥系统之间传递军令，是维系指挥体系运转的关键角色。在俄军中相当于传令兵或副官（адъютант）。
  书中原文: 但是他们看见有一个传令官走过，就对准他射了几发炮弹。
  网络来源: https://www.zdic.net/hans/传令兵

- 名词: 后卫
  分类: 概念
  解释: 军事术语，指行军时在主力部队后方负责掩护、警戒的部队，核心任务是在部队撤退时阻断敌军追击，保障主力安全转移。后卫部队通常依托关隘、桥梁等地形建立防线，通过小规模战斗迟滞敌军推进，为主力争取脱离时间。
  书中原文: 在后卫，多赫图罗夫和别的人，集合了几个营的兵力，正在狙击追击我们的法国骑兵。
  网络来源: https://baike.baidu.com/item/殿军/5979733

- 名词: 普拉茨村
  分类: 地点
  解释: 今捷克境内的普拉茨（Prace）村，位于奥斯特利茨（今斯拉夫科夫）附近，是1805年奥斯特利茨战役的核心战场。该村附近的普拉茨高地是战役中双方争夺的战略制高点。俄奥联军最初驻守该高地，后因沙皇调兵南下而被法军夺占，导致战局逆转。
  书中原文: 罗斯托夫奉命到普拉茨村附近寻找库图佐夫和皇上，但是这里不但找不到他们，甚至连一个长官都没有，有的只是成群的、乱糟糟的各种军队。
  网络来源: https://baijiahao.baidu.com/s?id=1817300182097957191

- 名词: 奥格斯特村
  分类: 地点
  解释: 奥斯特利茨战役中的村庄，位于战场南侧靠近水塘区域。战役后期溃败的俄奥联军残部（朗热隆和多赫图罗夫部）在此地池塘和堤坝附近拥挤溃退，遭受法军猛烈炮击，损失惨重。该处是战役最惨烈的场景之一。
  书中原文: 朗热隆和多赫图罗夫的残部，混乱地挤在奥格斯特村池塘边和堤坝上。
  网络来源: 托尔斯泰《战争与和平》中译本地名
