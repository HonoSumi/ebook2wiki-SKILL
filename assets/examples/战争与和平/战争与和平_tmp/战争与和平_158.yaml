- 名词: 梅季希村
  分类: 地点
  解释: 梅季希村（俄语：Мытищи）是莫斯科附近的一个村庄，距莫斯科约二十俄里（约21公里）。在1812年俄法战争期间，罗斯托夫家撤离莫斯科后在当晚在此停留住宿。重伤的安德烈公爵也被安置在梅季希村的一间农舍中，娜塔莎在深夜偷偷前去探望他。小说中还提到"小梅季希村"与"大梅季希村"之分。
  书中原文: 但是在梅季希村，伤者亲自要求把他抬出马车，并且要喝茶。
  网络来源: https://www.guxuo.com/wgwx/ZPJ/test/zzyh/255.htm
- 名词: 脂油蜡烛
  分类: 物件
  解释: 脂油蜡烛是用动物油脂（如牛脂、羊脂）制成的蜡烛，是19世纪俄国普通家庭和农舍的主要照明工具。与昂贵的蜜蜡蜡烛不同，脂油蜡烛价格低廉但燃烧时冒黑烟且有气味。在小说中，安德烈公爵养伤的小屋里点着一支脂油蜡烛，烛花结成大烛花，昏暗中娜塔莎借此微光看到了安德烈。
  书中原文: 在后面角落里，在床旁（床上躺着一个人）条凳上点着一支结着一个大烛花的脂油蜡烛。
  网络来源: https://www.sohu.com/a/311476059_612578
- 名词: 爱的幸福
  分类: 概念
  解释: 安德烈公爵在波罗金诺战役受重伤后，在梅季希村的农舍中反思人生时领悟到的一种全新幸福观。他认为爱的幸福是一种超越物质力量的、纯粹精神的幸福，是与他人不可分割的幸福，体现了托尔斯泰笔下主人公对世俗欲望的超越和对神圣之爱的体悟。这是安德烈公爵在临近死亡时的精神升华——从对娜塔莎的个人之爱升华为包容一切的博爱。
  书中原文: 一种超越物质的力量，不受外界物质影响的幸福，一种纯粹精神的幸福，爱的幸福！人人都可以懂得它，但是只有上帝才能认识它和制定它。
  网络来源: https://m.douban.com/book/review/12911037/
- 名词: 精神的幸福
  分类: 概念
  解释: 安德烈公爵在重伤濒危状态下领悟到的哲学概念，指一种不受外界物质条件影响的、纯粹内在的幸福。这是托尔斯泰借安德烈之口表达的重要哲学思想——幸福的源泉在于人自身，不在于外在的物质、功名或情欲满足。精神的幸福超越了世俗的得失，建立在对生命本质的理解和对一切人的博爱之上。
  书中原文: 在我面前展现一种新的幸福，一种与人不可分的幸福……一种超越物质的力量，不受外界物质影响的幸福，一种纯粹精神的幸福，爱的幸福！
  网络来源: https://wapbaike.baidu.com/tashuo/browse/content?id=0c64d05c9ac7214118d96e06
