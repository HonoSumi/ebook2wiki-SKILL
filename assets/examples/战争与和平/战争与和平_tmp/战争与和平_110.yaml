- 名词: 巴克雷·德·托利
  分类: 人物
  解释: 米哈伊尔·波格丹诺维奇·巴克雷·德·托利（1761—1818），俄罗斯帝国陆军元帅、亲王，苏格兰裔。1810年起任俄国陆军大臣，进行重要军事改革。1812年俄法战争中任第一西军团司令，提出并实施焦土战术和战略撤退，后因舆论压力被库图佐夫接替指挥权。他是历史上仅有的四位获得全部四级圣乔治勋章的将领之一。
  书中原文: 安德烈公爵在德里萨河岸找到他受命到其部下任职的巴克雷·德·托利。他板着面孔很客气地接待博尔孔斯基，他操着德语的口音说，他将奏明皇上再确定他的职务，暂时请他留在他的司令部。
  网络来源: https://zh.wikipedia.org/zh-hans/%E7%B1%B3%E5%93%88%E4%BC%8A%E5%B0%94%C2%B7%E5%B7%B4%E5%85%8B%E8%8E%B1-%E5%BE%B7%E6%89%98%E5%88%A9

- 名词: 托尔马索夫
  分类: 人物
  解释: 亚历山大·彼得罗维奇·托尔马索夫（1752—1819），俄罗斯帝国骑兵上将，伯爵。1812年俄法战争中任第三西军团司令，在科布林战役中取得俄军首次重大胜利，俘虏近2500名敌军。后接替阵亡的巴格拉季翁指挥第二军团，参与小雅罗斯拉维茨等战役。库图佐夫去世后曾代理俄军总司令。
  书中原文: 军队就分成三个军：第一军由巴克雷·德·托利统率，第二军由巴格拉季翁统率，第三军由托尔马索夫统率。
  网络来源: https://baike.baidu.com/item/%E4%BA%9A%E5%8E%86%E5%B1%B1%E5%A4%A7%C2%B7%E5%BD%BC%E5%BE%97%E7%BD%97%E7%BB%B4%E5%A5%87%C2%B7%E6%89%98%E5%B0%94%E9%A9%AC%E7%B4%A2%E5%A4%AB/5914905

- 名词: 普弗尔
  分类: 人物
  解释: 卡尔·路德维希·奥古斯特·冯·普弗尔（1757—1826），普鲁士军事理论家，少将。1811年受沙皇亚历山大一世之邀为俄国制定防御拿破仑入侵的"德里萨计划"，主张在西德维纳河畔修筑要塞阵地拖住法军主力，另以第二军团侧翼骚扰。因计划严重脱离实际而失败，战争中后期担任驻荷兰大使。
  书中原文: 普弗尔在那儿是因为他拟定了反对拿破仑的作战计划，并且使亚历山大相信这个计划是适当的，因此他在掌管全部的军事。
  网络来源: https://www.napoleon.org/en/history-of-the-two-empires/biographies/pfuhl-karl-ludwig-august/

- 名词: 沃尔佐根
  分类: 人物
  解释: 路德维希·冯·沃尔佐根（1773—1845），普鲁士男爵，军事理论家。1807年加入俄军任参谋军官，1812年任职于巴克雷·德·托利的司令部。他是普鲁士军事理论家比洛和沙恩霍斯特学派的重要人物，其战略思想（诱敌深入、断敌补给）对俄军1812年撤退策略有重要影响。
  书中原文: 和普弗尔一道的有一个沃尔佐根，他比普弗尔本人能用更明了易懂的方式表达普弗尔的思想。
  网络来源: https://en.wikipedia.org/wiki/Ludwig_von_Wolzogen

- 名词: 阿姆菲尔德
  分类: 人物
  解释: 古斯塔夫·毛里茨·阿姆费尔特（1757—1814），瑞典—芬兰贵族，伯爵，步兵上将。早年效力瑞典王室，1808年俄瑞战争后于1811年转投俄国，被沙皇亚历山大一世聘为军事顾问，曾任芬兰事务委员会主席和俄国国务会议成员。在俄军总司令部中以自信敢言的将军著称。
  书中原文: 阿姆菲尔德是拿破仑的死敌，而且是一位极为自信的将军，相信他经常能影响亚历山大。
  网络来源: https://en.wikipedia.org/wiki/Gustaf_Mauritz_Armfelt

- 名词: 保罗西
  分类: 人物
  解释: 菲利波·保卢奇（1779—1849），意大利侯爵，先后效力于撒丁王国、奥地利、意大利王国和俄罗斯帝国。1807年加入俄军，获上校衔。1812年拿破仑入侵前夕被召至圣彼得堡任俄军参谋长，因巴克莱反对而改任利沃尼亚总督。以敢于直言和果断著称。
  书中原文: 侍从武官长保罗西——撒丁亡命者。
  网络来源: https://en.wikipedia.org/wiki/Filippo_Paulucci

- 名词: 施泰因
  分类: 人物
  解释: 海因里希·弗里德里希·卡尔·冯·施泰因男爵（1757—1831），普鲁士民族主义政治家、改革家，1807年曾任普鲁士首相。因推行废奴、自治等改革遭拿破仑敌视，被迫流亡。1812年受邀至圣彼得堡任沙皇亚历山大一世的政治顾问，专责德意志事务，力劝沙皇拒绝和谈并追击拿破仑，促成1813年普俄同盟。
  书中原文: 施泰因——前普鲁士大臣。
  网络来源: https://wapbaike.baidu.com/item/%E6%96%BD%E6%B3%B0%E5%9B%A0%E7%94%B7%E7%88%B5/10249919

- 名词: 德里萨
  分类: 地点
  解释: 今白俄罗斯上德文斯克（Verkhnedvinsk），位于西德维纳河畔。1812年俄法战争前夕，沙皇亚历山大一世下令在此修筑德里萨筑垒兵营，由普弗尔设计，旨在作为俄军第一军团抵御拿破仑主力的防御阵地。因设计缺陷和工程未完工，俄军抵达后不久即放弃向腹地撤退。
  书中原文: 皇帝所在的第一军在德里萨设了防御工事；第二军在撤退，日夜兼程与第一军会师。
  网络来源: https://encyclopedia2.thefreedictionary.com/_/mdict.aspx?h=1&word=Drissa+Camp

- 名词: 维尔纳
  分类: 地点
  解释: 今立陶宛首都维尔纽斯（Vilnius），历史上先后属波兰—立陶宛联邦和俄罗斯帝国（称维尔纳）。1812年俄法战争初期，沙皇亚历山大一世驻扎于此，将俄军分成三个军团。拿破仑大军入侵时俄军主动放弃维尔纳向腹地撤退。
  书中原文: 皇帝还在维尔纳的时候，军队就分成三个军。
  网络来源: https://baike.baidu.com/item/%E7%BB%B4%E5%B0%94%E7%BA%B3/13003819

- 名词: 维捷布斯克
  分类: 地点
  解释: 今白俄罗斯东北部城市，位于西德维纳河畔。1812年俄法战争中，俄军在撤退途中放弃了维捷布斯克。法军占领维捷布斯克后拿破仑曾在此停留，犹豫是否继续深入俄国腹地。
  书中原文: 我们放弃了维尔纳，放弃了维捷布斯克，我们还要放弃德里萨。
  网络来源: https://baike.baidu.com/item/%E7%BB%B4%E6%8D%B7%E5%B8%83%E6%96%AF%E5%85%8B/35619506

- 名词: 第一军
  分类: 概念
  解释: 1812年俄法战争初期俄国部署在西部边境的三支军团之一，又称第一西军团，由巴克雷·德·托利统率，兵力约10.4万人，是俄军主力。驻扎于德里萨附近，后沿斯摩棱斯克—莫斯科方向撤退。
  书中原文: 军队就分成三个军：第一军由巴克雷·德·托利统率，第二军由巴格拉季翁统率，第三军由托尔马索夫统率。
  网络来源: https://baike.baidu.com/item/%E5%8F%82%E8%80%83%E8%B5%84%E6%96%99/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 第二军
  分类: 概念
  解释: 1812年俄法战争中俄国第二西军团，由巴格拉季翁将军统率。初期部署于俄国西南部，任务是与第一军团会合。拿破仑企图将第一、第二军团分割歼灭，但巴格拉季翁成功率军撤至斯摩棱斯克与巴克雷会师。
  书中原文: 第二军由巴格拉季翁统率。
  网络来源: https://baike.baidu.com/item/%E5%8F%82%E8%80%83%E8%B5%84%E6%96%99/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 第三军
  分类: 概念
  解释: 1812年俄法战争中俄国第三西军团，由托尔马索夫骑兵上将统率，兵力约4.3万人，部署于俄国南部，负责掩护基辅方向并牵制法军南翼（奥地利军和萨克森军）。托尔马索夫率该军在科布林取得了俄军1812年首次重大胜利。
  书中原文: 第三军由托尔马索夫统率。
  网络来源: https://baike.baidu.com/item/%E5%8F%82%E8%80%83%E8%B5%84%E6%96%99/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 皇帝行辕参谋部
  分类: 概念
  解释: 1812年俄法战争初期随沙皇亚历山大一世驻扎于军队的随行参谋机构，与正式的御前总指挥参谋部不同。亚历山大一世虽未以总司令名义指挥军队，但通过行辕参谋部实际号令全军，包括多名将军、侍从武官、外交官和外国顾问。
  书中原文: 也没有御前总指挥参谋部，只有一个皇帝行辕参谋部。跟随他的是皇帝行辕参谋长——掌管军需的将军博尔孔斯基公爵，还有其他几名将军和侍从武官、外交官以及一大批外国人，但这不是军队的参谋部。
  网络来源: https://baike.baidu.com/item/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 德里萨营地
  分类: 概念
  解释: 1812年俄法战争前夕在西德维纳河畔德里萨修筑的筑垒兵营，按普弗尔方案设计，模仿英国在伊比利亚半岛的托里什韦德拉什防线，旨在作为俄军第一军团的防御阵地牵制法军主力。因选址不当、工事未完工、容易被敌分割包围，俄军抵达后不久即放弃。
  书中原文: 这一派主张按照普弗尔的方案保住德里萨营地，但要改变其他各军的行动路线。
  网络来源: https://encyclopedia2.thefreedictionary.com/_/mdict.aspx?h=1&word=Drissa+Camp

- 名词: 运动战
  分类: 概念
  解释: 军事战术概念，指军队在广阔战场上通过高度机动性的行军和转移来寻求有利战机，而非固守阵地或正面决战。19世纪初普鲁士军事学派（如普弗尔、比洛等）的理论核心之一。在《战争与和平》中，运动战与迂回战被并列为普弗尔军事理论的基本法则。
  书中原文: 他们相信有一门军事科学，这种科学有其不变的法则，如运动战、迂回战等等法则。
  网络来源: https://baike.baidu.com/item/%E8%BF%90%E5%8A%A8%E6%88%98

- 名词: 迂回战
  分类: 概念
  解释: 军事战术概念，指军队通过绕行敌军侧翼或后方，切断其补给线和退路，以迫使敌军放弃防御阵地或在不利条件下进行决战。19世纪普鲁士军事学派的核心理论之一。
  书中原文: 他们相信有一门军事科学，这种科学有其不变的法则，如运动战、迂回战等等法则。
  网络来源: https://baike.baidu.com/item/%E8%BF%82%E5%9B%9E%E6%88%98%E6%9C%AF

- 名词: 俄军总司令部
  分类: 概念
  解释: 1812年俄法战争期间俄国军队的最高指挥机构。总司令部设在第一军团所在的德里萨附近。由于沙皇亚历山大一世随军驻扎但未以总司令名义统军，军队指挥体系复杂，多条指挥链并存，各派系将领争执不断，造成指挥混乱。
  书中原文: 六月底，安德烈公爵来到总司令部。皇帝所在的第一军在德里萨设了防御工事。
  网络来源: https://baike.baidu.com/item/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 贝尼格森派
  分类: 概念
  解释: 1812年俄法战争期间以列昂季·贝尼格森伯爵为首的俄国军方派系。贝尼格森曾在1807年艾劳会战中与拿破仑大战，拥有丰富经验。此派反对巴克雷·德·托利的撤退战略，主张与法军正面交战，认为只有贝尼格森有能力指挥全军。
  书中原文: 第六派——贝尼格森派却恰恰相反，这一派说，不管怎么说，再没有比贝尼格森更能干、更有经验的人了。
  网络来源: https://baike.baidu.com/item/%E5%88%97%E6%98%82%E5%AD%A3%C2%B7%E8%B4%9D%E5%B0%BC%E6%A0%BC%E6%A3%AE

- 名词: 宫廷侍臣派
  分类: 概念
  解释: 1812年俄法战争期间沙皇亚历山大一世身边以阿拉克切耶夫为代表的调和派。他们没有坚定的军事信念，主张折中普弗尔的理论派与巴格拉季翁的民族主义进攻派，既承认普弗尔计划的科学性又同意听取实战派意见，实则以确保自身地位为首要目标。
  书中原文: 最得皇上信任的第三派，是那些调和于两派之间的宫廷侍臣们。这一派大多数不是军人，阿拉克切耶夫就属于这一派。
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E6%8B%89%E5%85%8B%E5%88%87%E8%80%B6%E5%A4%AB

- 名词: 巴克莱派
  分类: 概念
  解释: 1812年俄法战争期间支持巴克雷·德·托利的军事派系。他们推崇巴克雷在战前加强军队组织、秩序和作战能力的功绩，认为他使俄军未受重大损失就撤退到德里萨，坚持必须维持统一的指挥权，反对以贝尼格森取代巴克雷。
  书中原文: 第五派是巴克莱·德·托利的忠实信徒，他们与其说把巴克莱看做一个人，不如说把他看做陆军大臣和总司令。
  网络来源: https://baike.baidu.com/item/%E5%B7%B4%E5%85%8B%E8%8E%B1%C2%B7%E5%BE%B7%C2%B7%E6%89%98%E5%88%A9/54356098

- 名词: 第一派(普弗尔派)
  分类: 概念
  解释: 1812年俄法战争期间以普鲁士军事理论家普弗尔为首的德裔军事理论家派别。他们信奉军事科学的不变法则（运动战、迂回战等），主张严格按预定计划撤退到腹地，指责任何偏离为野蛮或不学无术。代表人物包括沃尔佐根、温岑格罗德等。
  书中原文: 第一派是普弗尔及其追随者，一些军事理论家，他们相信有一门军事科学，这种科学有其不变的法则，如运动战、迂回战等等法则。
  网络来源: https://baike.baidu.com/item/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 第二派(民族主义派)
  分类: 概念
  解释: 1812年俄法战争期间以巴格拉季翁、叶尔莫洛夫为代表的俄国民族主义进攻派。他们主张不受计划约束，立即攻入波兰与法军决战，反对撤退。言辞激烈，带有强烈的民族主义情绪，缅怀苏沃洛夫传统，认为撤退只会挫伤士气。
  书中原文: 这派人在维尔纳的时候就要求攻入波兰，要求不受任何预定计划的约束。这一派的代表除了是大胆行动的代表以外，还是民族主义的代表，因此在辩论中变得更偏激了。他们都是俄罗斯人：巴格拉季翁，刚提高声望的叶尔莫洛夫和别的人。
  网络来源: https://baike.baidu.com/item/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 第三派(折中派)
  分类: 概念
  解释: 1812年俄法战争期间沙皇亚历山大一世最信任的宫廷朝臣派，以阿拉克切耶夫为代表。他们认可普弗尔的理论学识，但同时认为理论家有片面性，主张折中理论派和实战派意见。其典型主张是按普弗尔方案保住德里萨营地但调整其他军行动路线。
  书中原文: 最得皇上信任的第三派，是那些调和于两派之间的宫廷侍臣们。他们说，毫无疑问，战争要求最深思熟虑的计划和渊博的科学知识，在这方面普弗尔是一个英才；但是同时不能不承认，理论家往往有其片面性。
  网络来源: https://baike.baidu.com/item/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 第四派(皇太子派)
  分类: 概念
  解释: 1812年俄法战争期间以皇太子康斯坦丁·帕夫洛维奇大公为首的失败主义派别。此派因亲历奥斯特利茨战役的惨败而对拿破仑心存畏惧，主张尽快媾和以免被彻底击溃。他们认为继续战争只会带来耻辱和毁灭，应趁俄军尚未被赶出彼得堡时立即谈判。
  书中原文: 第四派最著名的代表是大公皇太子。他们怕拿破仑，领教过他的力量，也认识自己的弱点，他们直率地说出这一点。他们说：除了悲哀、耻辱和毁灭之外，什么结果也得不到！
  网络来源: https://baike.baidu.com/item/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 第五派(巴克莱信徒派)
  分类: 概念
  解释: 1812年俄法战争期间全力支持巴克雷·德·托利担任总司令的派别。他们认为巴克雷正派、精明强干，是当前不可替代的统帅，主张将全权交给他统一指挥。他们赞扬巴克雷将俄军未受损失撤至德里萨的功绩，反对用贝尼格森替换他。
  书中原文: 第五派是巴克莱·德·托利的忠实信徒。他们说：不管他是什么吧，但是他是一个正直的、精明强干的人，没有比他更好的人了。把实权交给他吧。
  网络来源: https://baike.baidu.com/item/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 第六派(贝尼格森派)
  分类: 概念
  解释: 1812年俄法战争期间支持贝尼格森伯爵取代巴克雷的派别。他们指责撤退到德里萨是可耻的失败，认为贝尼格森是唯一能在当时指挥俄军的将领，因为他在1807年艾劳会战中展现出对抗拿破仑的能力，且得到拿破仑本人的公允评价。
  书中原文: 第六派——贝尼格森派却恰恰相反，这一派说，不管怎么说，再没有比贝尼格森更能干、更有经验的人了。错误犯得越多越好，至少可以快点使大家明白，这样下去是不行的。
  网络来源: https://baike.baidu.com/item/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 第七派(皇帝崇拜派)
  分类: 概念
  解释: 1812年俄法战争期间一群狂热崇拜沙皇亚历山大一世的年轻将军和侍从武官。他们不仅视亚历山大为皇帝，更将其作为一个人来无私崇拜，认为皇帝具备人类所有优秀品质。他们希望亚历山大放弃谦虚态度，公开宣布担任全军统帅以鼓舞士气。
  书中原文: 属于第七派的都是皇帝身边的人物。他们是一些将军和侍从武官，他们热情地忠于皇上，衷心地、无私地崇拜他，他们在他身上不仅看出一切美德，而且看出人类所有的一切优秀品质。
  网络来源: https://baike.baidu.com/item/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 第八派(钻营派)
  分类: 概念
  解释: 1812年俄法战争期间俄军总司令部中人数最多的派别，约占九十九分之一。此派不关心战略和战争胜负，一心谋求个人利益和享乐。他们利用错综复杂的政治环境捞取好处，包括投机取巧表态、向沙皇邀功、索取津贴、设法引起皇帝注意等。
  书中原文: 第八派人数最多，其数量之大与其他各派相比，相当九十九对一。这一派既不赞成和平，也不赞成战争，既不赞成进攻，也不赞成在德里萨和在任何地方设防，他们只谋求一件事，一件最重要的事：为自己谋求最大的利益和欢乐。
  网络来源: https://baike.baidu.com/item/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 军事理论家
  分类: 概念
  解释: 指信奉军事科学具有不变法则的理论派军官，以普弗尔为代表。他们在1812年俄法战争中主张严格按预定方案作战，反对根据战场实况灵活应变。托尔斯泰在书中借安德烈公爵的思考对这一派的理论进行了批判，认为战争中深思熟虑的计划没有任何意义。
  书中原文: 第一派是普弗尔及其追随者，一些军事理论家，他们相信有一门军事科学，这种科学有其不变的法则，如运动战、迂回战等等法则。
  网络来源: https://baike.baidu.com/item/%E5%86%9B%E4%BA%8B%E7%90%86%E8%AE%BA

- 名词: 民族主义派
  分类: 概念
  解释: 1812年俄法战争期间以巴格拉季翁、叶尔莫洛夫为代表的俄国主战派。他们具有强烈的民族主义情绪，反对德裔军事理论家的撤退计划，主张立即攻入波兰、与拿破仑决战。此派被誉为"大胆行动的代表"，但也在辩论中变得偏激。
  书中原文: 这派人在维尔纳的时候就要求攻入波兰，要求不受任何预定计划的约束。这一派除了是大胆行动的代表以外，还是民族主义的代表。
  网络来源: https://baike.baidu.com/item/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89

- 名词: 御前总指挥参谋部
  分类: 概念
  解释: 1812年俄法战争期间未曾正式设立的机构。尽管沙皇亚历山大一世驻于第一军并实际号令全军，但他并未以总司令名义统军，也未设立正式的御前总指挥参谋部，只有皇帝行辕参谋部。这种模糊的指挥架构造成了各派系争斗、指挥混乱的局面。
  书中原文: 皇帝驻在第一军，但并不是以总司令的名义。据通令声称，皇帝不指挥军队，皇帝只是驻在军队。此外，也没有御前总指挥参谋部，只有一个皇帝行辕参谋部。
  网络来源: https://baike.baidu.com/item/1812%E5%B9%B4%E4%BF%84%E5%9B%BD%E5%8D%AB%E5%9B%BD%E6%88%98%E4%BA%89
