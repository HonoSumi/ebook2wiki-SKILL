- 名词: 安德烈公爵
  分类: 人物
  解释: >-
    安德烈·博尔孔斯基公爵，托尔斯泰《战争与和平》核心男主角之一。沙俄公爵，博尔孔斯基家族长子。
    初登场时26岁，相貌清秀冷峻，性格孤傲正直，不随流俗。1805年担任库图佐夫将军副官上前线，
    奥斯特里茨战役重伤后顿悟功名虚无。妻子丽莎难产去世后意志消沉，
    1809年遇见娜塔莎·罗斯托娃后重新燃起生活希望。1812年卫国战争再度参战，
    波罗底诺战役重伤后与娜塔莎重逢，在陪伴下安然离世。
  书中原文: >-
    安德烈公爵在服役期间——大部分时间是当副官，见过很多大人物的接待室，各种类型的接待室，
    他都很清楚。阿拉克切耶夫伯爵的接待室是非常特殊的。在阿拉克切耶夫伯爵接待室里，在等待召见
    的不重要的人物的脸上，有一种羞愧和卑顺的表情；在大官的脸上，共同的表情是侷促不安，
    但为了掩饰这种侷促不安，却装作满不在乎，装作嘲笑自己，嘲笑自己的处境和嘲笑他们所等待召见的人。
  网络来源: https://baike.baidu.com/item/%E5%AE%89%E5%BE%B7%E7%83%88%C2%B7%E5%8D%9A%E5%B0%94%E5%AD%94%E6%96%AF%E5%9F%BA/55647709

- 名词: 阿拉克切耶夫伯爵
  分类: 人物
  解释: >-
    阿列克谢·安德烈耶维奇·阿拉克切耶夫伯爵（1769-1834），俄国陆军大臣（1808-1810年），
    亚历山大一世宠臣。炮兵上将，推行了"1805年体系"炮兵改革。1808-1809年俄瑞战争中率军
    跨过冰冻的芬兰湾进攻奥兰群岛。1812年拿破仑入侵期间担任皇帝首席军事顾问。
    1825年后辞去所有职务隐退。其统治时期被称为"阿拉克切耶夫щина"（阿拉克切耶夫时期），
    以铁腕统治著称，俄语中成为"军警暴虐制度"的代名词。
  书中原文: >-
    安德烈公爵不认识阿拉克切耶夫，也从未见过他，但就他所知道的有关他的一切，并引不起他
    对此人的尊重。"他是陆军大臣，是皇帝陛下的心腹；至于他个人的品质，可以不用管他；
    既然责成他审议我的草案，那么就是说，只有他能通过我的草案。"
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E5%88%97%E5%85%8B%E8%B0%A2%C2%B7%E5%AE%89%E5%BE%B7%E7%83%88%E8%80%B6%E7%BB%B4%E5%A5%87%C2%B7%E9%98%BF%E6%8B%89%E5%85%8B%E5%88%87%E8%80%B6%E5%A4%AB/9453636

- 名词: 斯佩兰斯基
  分类: 人物
  解释: >-
    米哈伊尔·米哈伊洛维奇·斯佩兰斯基（1772-1839），俄国国务大臣、改革家，
    亚历山大一世时期最重要的政治家之一。出身卑微的科学院学生，后成为皇帝近臣。
    1808年随亚历山大一世参加埃尔富特会议，与拿破仑直接会谈，拿破仑称其为"俄国唯一头脑精明的人"。
    1809年主导宪政改革，提出《国家法典草案》，设计了四级杜马制度和国务会议。
    1810年推动成立国务会议。因改革触犯贵族利益，1812年被以"法国间谍"罪名流放。
    被后世誉为"俄国自由主义之父"。
  书中原文: >-
    这个人个子高高的，秃顶，头发淡黄，四十来岁，前额宽阔，长长的脸，面色白得出奇。
    这位刚进来的人穿一身蓝色燕尾服，脖颈上挂一个十字架，左胸佩一枚金星勋章。
    这就是斯佩兰斯基，国务大臣，皇帝耳目，他在埃尔富特伴驾时，曾不止一次地与拿破仑会见和谈话。
    斯佩兰斯基并不像进入大庭广众的人们那样，不自觉地把目光从一个人的脸移到另一个人的脸，
    他也不急于说话。他说起话来声音很低，满怀着大家都在听他说话的信心，他只望着谈话对手的面孔。
  网络来源: https://baike.baidu.com/item/%E7%B1%B3%E5%93%88%E4%BC%8A%E5%B0%94%C2%B7%E7%B1%B3%E5%93%88%E4%BC%8A%E6%B4%9B%E7%BB%B4%E5%A5%87%C2%B7%E6%96%AF%E4%BD%A9%E5%85%B0%E6%96%AF%E5%9F%BA/6847636

- 名词: 科丘别伊伯爵
  分类: 人物
  解释: >-
    维克托·帕夫洛维奇·科丘别伊伯爵（1768-1834），俄国著名外交官和政治家，
    曾任内务大臣和国务会议主席。亚历山大一世时期"秘密委员会"核心成员之一，
    参与推动俄国早期自由化改革。出身乌克兰哥萨克贵族世家（科丘别伊家族为哥萨克酋长国贵族世家）。
    在《战争与和平》中，他在家中举办社交晚会，将安德烈引见给斯佩兰斯基。
  书中原文: >-
    谒见阿拉克切耶夫伯爵的第二天，安德烈公爵晚上在科丘别伊伯爵家做客。他把谒见西拉·安德烈伊奇
    的经过告诉了科丘别伊伯爵（科丘别伊也那样称呼阿拉克切耶夫，也带着安德烈公爵在陆军大臣
    接待室里所听到的那种含蓄的嘲讽意味）。
  网络来源: https://zh.wikipedia.org/wiki/%E7%A7%91%E4%B8%98%E5%88%AB%E4%BC%8A

- 名词: 马格尼茨基
  分类: 人物
  解释: >-
    俄国陆军条例委员会（军事条令委员会）主任，斯佩兰斯基的好友。在《战争与和平》中，
    斯佩兰斯基主动提出将安德烈公爵引荐给马格尼茨基，因为马格尼茨基主管陆军条例委员会，
    而安德烈公爵当时正关注军事改革和条例制定事宜。
  书中原文: >-
    "陆军条例委员会主任马格尼茨基先生是我的好朋友，"他说，他把每个音节每个字都说得很清楚，
    "如果您愿意，我可以介绍您见见他。（他停了一下）我希望您会发现他是一个富于同情心的人，
    他乐意促进一切合理的事情。"
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 普里亚尼奇尼科夫
  分类: 人物
  解释: >-
    一位老官员的下属，六十岁，被用作反对俄国官阶考试制度的例子。在《战争与和平》中，
    一位叶卡捷琳娜女皇时代的老头子以普里亚尼奇尼科夫为例，质疑考试制度是否适用于
    年长的有经验官员。
  书中原文: >-
    "比如，我手下有一个叫普里亚尼奇尼科夫的，是一个正人君子，金不换的好人，
    可是他已经六十岁了，难道也得去考试？……"
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 老元帅
  分类: 人物
  解释: >-
    安德烈父亲（老博尔孔斯基公爵）的朋友，一位老元帅。在《战争与和平》中，
    他帮助安德烈公爵将军事法规草案呈递给皇上。
  书中原文: >-
    关于草案的事他告诉了一位老元帅——他父亲的朋友。元帅约了一个时间，和蔼地接见了他，
    答应将此事奏明皇上。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 西拉·安德烈伊奇
  分类: 人物
  解释: >-
    阿拉克切耶夫伯爵的绰号（西拉·安德烈伊奇），含有嘲讽意味。在《战争与和平》中，
    彼得堡社交界人士以此称呼阿拉克切耶夫，表达对其统治风格的不满和讽刺。
  书中原文: >-
    安德烈公爵听见"西拉·安德烈伊奇"这个绰号和"老头子要剋人的"这句话，
    老头子是指阿拉克切耶夫伯爵。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 拿破仑
  分类: 人物
  解释: >-
    拿破仑·波拿巴（1769-1821），法兰西第一帝国皇帝，伟大的军事家和政治家。
    在位期间通过一系列战争征服欧洲大陆大部。1807年与俄国签订《蒂尔西特条约》，
    1808年与亚历山大一世在埃尔富特会晤。斯佩兰斯基在埃尔富特与拿破仑会见谈话，
    拿破仑称其为"俄国唯一头脑精明的人"。
  书中原文: >-
    这就是斯佩兰斯基，国务大臣，皇帝耳目，他在埃尔富特伴驾时，曾不止一次地与拿破仑会见和谈话。
  网络来源: https://baike.baidu.com/item/%E6%8B%BF%E7%A0%B4%E4%BB%91/93221

- 名词: 孟德斯鸠
  分类: 人物
  解释: >-
    查理·路易·孟德斯鸠（1689-1755），法国启蒙思想家、法学家，代表作《论法的精神》（1748年）。
    提出著名的三权分立学说和政体分类理论：共和政体以品德为原则、君主政体以荣誉为原则、
    专制政体以恐惧为原则。认为君主政体无需人民具备政治品德，荣誉代替品德成为推动力。
    在《战争与和平》中，安德烈公爵自称是孟德斯鸠的崇拜者。
  书中原文: >-
    "我是孟德斯鸠的崇拜者，"安德烈公爵说，"他的思想是君主政体的基础是荣誉，
    我觉得这是无可怀疑的。在我看来，贵族的某些权利和特权是支持这种荣誉感的手段。"
  网络来源: https://baike.baidu.com/item/%E5%AD%9F%E5%BE%B7%E6%96%AF%E9%B8%A0/157358

- 名词: 彼得堡
  分类: 地点
  解释: >-
    圣彼得堡，俄罗斯帝国首都（1712-1918年），由彼得大帝于1703年建立。
    19世纪初为俄国政治、文化、社交中心。在1809年，这里正在酝酿大规模的改革运动，
    由斯佩兰斯基主导。安德烈公爵在此活动，出入各种社交场合和权贵府邸。
  书中原文: >-
    他这时在彼得堡的心情，就好像在战斗前夕所感受的一样，有一种不安的好奇心折磨着他，
    不可抗拒地驱使他到最高统治阶层中去，那里所做的一切关系着千百万人未来的命运。
  网络来源: https://baike.baidu.com/item/%E5%9C%A3%E5%BD%BC%E5%BE%97%E5%A0%A1/80628

- 名词: 阿拉克切耶夫伯爵接待室
  分类: 地点
  解释: >-
    阿拉克切耶夫伯爵的接待室，以气氛特殊著称。在《战争与和平》中，安德烈公爵在此等候召见时，
    观察到等待召见的人们脸上有羞愧、卑顺和恐惧的表情；大官们则侷促不安，装作满不在乎。
    门一打开，所有人的脸上都集中为一个表情——恐惧。
  书中原文: >-
    阿拉克切耶夫伯爵的接待室是非常特殊的。在阿拉克切耶夫伯爵接待室里，在等待召见的不重要的人物的
    脸上，有一种羞愧和卑顺的表情；在大官的脸上，共同的表情是侷促不安，但为了掩饰这种侷促不安，
    却装作满不在乎，装作嘲笑自己，嘲笑自己的处境和嘲笑他们所等待召见的人。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 陆军大臣办公室
  分类: 地点
  解释: >-
    阿拉克切耶夫伯爵的办公室，朴素整洁。在《战争与和平》中，安德烈公爵在此被召见。
    阿拉克切耶夫坐在桌旁，身材瘦长，头发剪短，绿褐色眼睛上紧锁眉头，通红的鼻子耷拉着。
  书中原文: >-
    安德烈公爵进入一间朴素整洁的办公室，看见桌旁坐着一个四十来岁的人，腰身长长的，
    脑袋也是长长的，头发剪得很短，皱纹很深，绿褐色的眼睛上面是紧锁着的眉头，通红的鼻子耷拉着。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 科丘别伊伯爵家
  分类: 地点
  解释: >-
    科丘别伊伯爵在彼得堡的府邸，是上流社会社交场所。在《战争与和平》中，
    安德烈公爵在此参加晚会，被科丘别伊引见给斯佩兰斯基，二人进行了关于荣誉与特权的深入讨论。
  书中原文: >-
    科丘别伊伯爵没有说完，就站起来，搀起安德烈公爵的手，向一个走进来的人迎上去。
    这个人个子高高的，秃顶，头发淡黄，四十来岁，前额宽阔，长长的脸，面色白得出奇。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 埃尔富特
  分类: 地点
  解释: >-
    德国城市埃尔富特。1808年9月27日至10月14日在此举行埃尔富特会议（Congress of Erfurt），
    是法国皇帝拿破仑一世与俄国沙皇亚历山大一世的重要会晤。拿破仑试图确认法俄联盟，
    但法国外长塔列朗暗中提醒亚历山大抵制拿破仑野心。斯佩兰斯基随亚历山大一世参加会议，
    与拿破仑直接会谈。
  书中原文: >-
    这就是斯佩兰斯基，国务大臣，皇帝耳目，他在埃尔富特伴驾时，曾不止一次地与拿破仑会见和谈话。
  网络来源: https://zh.wikipedia.org/wiki/%E5%9F%83%E5%B0%94%E7%A6%8F%E7%89%B9%E4%BC%9A%E8%AE%AE

- 名词: 军事法规草案
  分类: 物件
  解释: >-
    安德烈公爵编写的军事改革草案，意图改革俄国陆军条例。安德烈将此草案呈递给皇帝，
    皇帝批转给陆军大臣阿拉克切耶夫审议。阿拉克切耶夫在草案上用铅笔批注
    "毫无根据抄袭法国军事法典不必要放弃陆军条例"，然后送交陆军条例委员会。
  书中原文: >-
    "让我想想，亲爱的先生，那个草案嘛，我看过，"阿拉克切耶夫打断他的话，只是头几句话他
    说得亲切，接着他又不看他的脸，腔调越来越变得唠叨而且轻蔑，"您提出新的军事法规？
    新法规多得很，连旧的都没人执行。如今都在写法规，写比做容易。"
    公文纸上用铅笔从这一头到另一头写了一行字，这行字没有大写字母，没有标点，拼写错误：
    "毫无根据抄袭法国军事法典不必要放弃陆军条例。"
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 金星勋章
  分类: 物件
  解释: >-
    斯佩兰斯基左胸佩戴的勋章，金星勋章为俄罗斯帝国高级勋章之一。
    在《战争与和平》中，它是斯佩兰斯基出场时的重要外貌特征之一。
  书中原文: >-
    这位刚进来的人穿一身蓝色燕尾服，脖颈上挂一个十字架，左胸佩一枚金星勋章。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 蓝色燕尾服
  分类: 物件
  解释: >-
    斯佩兰斯基在科丘别伊伯爵家晚会上穿着的服装。在《战争与和平》中，
    他穿着蓝色燕尾服，脖颈挂十字架，左胸佩金星勋章，面色白得出奇。
  书中原文: >-
    这位刚进来的人穿一身蓝色燕尾服，脖颈上挂一个十字架，左胸佩一枚金星勋章。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 陆军条例
  分类: 物件
  解释: >-
    俄国现行的陆军军事法规。阿拉克切耶夫认为不应当放弃现有的陆军条例，
    批评安德烈公爵的草案是"毫无根据抄袭法国军事法典不必要放弃陆军条例"。
    当时还有专门的陆军条例委员会负责审议军事法规事务。
  书中原文: >-
    公文纸上用铅笔从这一头到另一头写了一行字，这行字没有大写字母，没有标点，拼写错误：
    "毫无根据抄袭法国军事法典不必要放弃陆军条例。"
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 荣誉团
  分类: 物件
  解释: >-
    法国荣誉军团勋章（Légion d'honneur），由拿破仑于1802年5月19日创立，
    是法国最高荣誉勋位。拿破仑以此取代旧贵族爵位体系，奖励对国家有功的军人和平民。
    十字章为五臂马耳他十字，绶带为红色，格言"Honneur et Patrie"（荣誉与祖国）。
    在《战争与和平》中，斯佩兰斯基引用荣誉团制度来类比他的观点。
  书中原文: >-
    "这个维持荣誉、维持竞赛原动力的制度，类似伟大的拿破仑皇帝的荣誉团，
    对公务不惟无害，而且有益，不过不是一个阶层或宫廷内的特权罢了。"
  网络来源: https://baike.baidu.com/item/%E6%B3%95%E5%9B%BD%E8%8D%A3%E8%AA%89%E5%86%9B%E5%9B%A2%E5%8B%8B%E7%AB%A0

- 名词: 安德烈谒见阿拉克切耶夫
  分类: 事件
  解释: >-
    安德烈公爵奉旨拜见陆军大臣阿拉克切耶夫伯爵，呈递其编写的军事法规草案。
    阿拉克切耶夫态度轻蔑，称草案"毫无根据抄袭法国军事法典"，在草案上批注否定意见后
    送交陆军条例委员会，并推荐安德烈担任委员（无薪俸）。这次会面展现了
    阿拉克切耶夫的冷酷傲慢和俄国官僚体系的僵化。
  书中原文: >-
    "我在您的草案上签署了意见，已经送交委员会了。我不赞成，"阿拉克切耶夫说，
    他站起来从写字台上拿起一份文件，"这就是。"他递给安德烈公爵。公文纸上用铅笔
    从这一头到另一头写了一行字，这行字没有大写字母，没有标点，拼写错误：
    "毫无根据抄袭法国军事法典不必要放弃陆军条例。"
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 安德烈遇见斯佩兰斯基
  分类: 事件
  解释: >-
    在科丘别伊伯爵家的晚会上，科丘别伊将安德烈公爵引见给斯佩兰斯基。
    斯佩兰斯基对安德烈早有耳闻（因其解放农奴和接受宫中官阶新法令），
    二人进行了关于荣誉、贵族特权与君主政体基础的深入讨论。
    安德烈引用孟德斯鸠理论，认为荣誉是君主政体的基础，
    斯佩兰斯基则认为荣誉是不做违反道德行为的消极概念。
  书中原文: >-
    科丘别伊略略叙述了一下阿拉克切耶夫接见博尔孔斯基的情形，斯佩兰斯基的笑容更开展了。
    "陆军条例委员会主任马格尼茨基先生是我的好朋友，"他说……"我早就知道您：第一，
    是由于您在处理您的农奴问题方面给我们做出了第一个范例，希望有更多的人遵循这个范例；
    第二，关于宫中官阶的新法令曾引起很多闲言碎语，而您并不因此把自己看作受了委屈的侍从。"
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 一八〇九年彼得堡改革运动
  分类: 事件
  解释: >-
    1809年在彼得堡酝酿的大规模政治改革运动，由斯佩兰斯基主导。
    涉及军事法规改革、官阶制度改革、考试制度建立、宪法草案制定等多方面变革。
    斯佩兰斯基于1809年完成了《国家法典草案》，设计了四级杜马制度和国务会议。
    同年还颁布了关于宫廷贵族称号和官衔考核的法令。
    这场改革因触动贵族利益遭到强烈反对，1812年斯佩兰斯基被流放后改革流产。
  书中原文: >-
    他感觉到，在一八〇九这一年，在彼得堡这个地方，正在酝酿一场大规模的国内战争，
    这场战争的总指挥是他所不认识的、颇为神秘的、在他心目中认为很有天才的人——斯佩兰斯基。
    对于他只有模糊概念的革新运动及其主要活动家斯佩兰斯基引起他强烈的兴趣，
    陆军法规问题很快就在他的意识中退居次要地位了。
  网络来源: https://baike.baidu.com/item/%E4%BA%9A%E5%8E%86%E5%B1%B1%E5%A4%A7%E4%B8%80%E4%B8%96%E6%94%B9%E9%9D%A9/22883223

- 名词: 安德烈解放农奴
  分类: 事件
  解释: >-
    安德烈公爵解放了自己领地上的农奴，这在19世纪初的俄国是具有进步意义的行为。
    亚历山大一世时期虽然颁布了1803年《自由农民法令》，但效果有限。
    安德烈的行为使他获得开明人士的名声，受到革新派的欢迎和尊重。
    斯佩兰斯基特别提到此事，称其为"第一个范例"。
  书中原文: >-
    革新派欢迎他，拉拢他，第一，因为他以睿智和非常博学著称，第二，因为他解放了他的农奴，
    使他得到开明人士的名声。……"我早就知道您：第一，是由于您在处理您的农奴问题方面
    给我们做出了第一个范例，希望有更多的人遵循这个范例。"
  网络来源: https://baike.baidu.com/item/%E4%BA%9A%E5%8E%86%E5%B1%B1%E5%A4%A7%E4%B8%80%E4%B8%96%E6%94%B9%E9%9D%A9/22883223

- 名词: 宫中官阶新法令
  分类: 事件
  解释: >-
    亚历山大一世时期颁布的关于宫中官阶的新法令，要求贵族从低级官衔开始服务，
    而非依靠出身直接获得高位。这在俄国贵族中引起争议，许多人感到受了委屈。
    安德烈公爵因服从该法令、从低级官衔开始服务而受到斯佩兰斯基的赞赏。
    该法令是彼得大帝《官秩表》传统的延续，旨在限制门阀制度、鼓励功绩晋升。
  书中原文: >-
    "第二，关于宫中官阶的新法令曾引起很多闲言碎语，而您并不因此把自己看作受了委屈的侍从。"
    "是的，"安德烈公爵说，"家父不愿意我利用这个特权，我是从低级官衔开始服务的。"
  网络来源: https://baike.baidu.com/item/%E5%AE%98%E8%81%8C%E7%AD%89%E7%BA%A7%E8%A1%A8

- 名词: 军事法规改革
  分类: 概念
  解释: >-
    安德烈公爵提出的军事改革主张，意图编写新的军事法规以取代旧的陆军条例。
    安德烈认为俄军现行条例需要改革，但阿拉克切耶夫持否定态度，认为
    "新法规多得很，连旧的都没人执行"，批评其草案"毫无根据抄袭法国军事法典"。
    19世纪俄国军事改革最终在1860-1870年代由米柳金完成。
  书中原文: >-
    "您提出新的军事法规？新法规多得很，连旧的都没人执行。如今都在写法规，写比做容易。"
    "我在您的草案上签署了意见，已经送交委员会了。我不赞成。"
    公文纸上用铅笔写了一行字："毫无根据抄袭法国军事法典不必要放弃陆军条例。"
  网络来源: https://zh.wikipedia.org/wiki/%E7%B1%B3%E6%9F%B3%E9%87%91%E5%86%9B%E4%BA%8B%E6%94%B9%E9%9D%A9

- 名词: 农奴解放
  分类: 概念
  解释: >-
    19世纪初俄国社会的重要议题。亚历山大一世时期虽有1803年《自由农民法令》
    （准许地主自愿给农奴自由，须缴纳高额赎金），但效果十分有限。
    安德烈公爵解放自己农奴的行为在当时属于进步范例。
    俄国农奴制的真正废除要到1861年亚历山大二世时期。
  书中原文: >-
    "哦，公爵，是您解放了自己的农奴呀？"一个叶卡捷琳娜女皇时代的老头子轻蔑地向博尔孔斯基
    转过身来，说。"那是一处无利可图的小田庄。"博尔孔斯基极力把事情说得无足轻重，
    免得徒然惹那个老头子恼火。"您是害怕落后。"老头望着科丘别伊说。
  网络来源: https://baike.baidu.com/item/%E5%86%9C%E5%A5%B4%E5%88%B6%E6%94%B9%E9%9D%A9/5946865

- 名词: 考试制度
  分类: 概念
  解释: >-
    亚历山大一世时期斯佩兰斯基改革中提出的官员考试晋升制度。
    规定高级官员晋升须通过考试或具备大学资格，旨在提高官僚机构效率。
    在《战争与和平》中，一位老官员质疑六十岁的下属是否也需要参加考试。
    这一制度在俄国贵族中引发争议。
  书中原文: >-
    "有一样我不明白，"老头继续说，"如果他们都解放了，那么谁来种地啊？
    草拟法律倒容易，管理起来就困难了。譬如现在吧，我问您，伯爵，如果人人都得经过考试，
    那么谁来当各部门的首长啊？""由考试及格的担任，我想。"科丘别伊大腿跷到二腿上，环顾四周，说。
  网络来源: https://baike.baidu.com/item/%E4%BA%9A%E5%8E%86%E5%B1%B1%E5%A4%A7%E4%B8%80%E4%B8%96%E6%94%B9%E9%9D%A9/22883223

- 名词: 荣誉与特权
  分类: 概念
  解释: >-
    安德烈公爵与斯佩兰斯基辩论的核心议题。安德烈引用孟德斯鸠"君主政体的基础是荣誉"理论，
    认为贵族的权利和特权是支持荣誉感的手段。斯佩兰斯基则认为荣誉是不做违反道德行为的消极概念，
    或者是为获得荣誉奖赏而进行竞赛的原动力，而非某个阶层或宫廷的特权。
    这场辩论反映了19世纪初俄国关于贵族地位和改革方向的深层分歧。
  书中原文: >-
    "我是孟德斯鸠的崇拜者，"安德烈公爵说，"他的思想是君主政体的基础是荣誉，
    我觉得这是无可怀疑的。在我看来，贵族的某些权利和特权是支持这种荣誉感的手段。"
    笑容从斯佩兰斯基白净的脸上消失了，这么一来，他的相貌倒好看得多了。
    "如果您从这个角度看问题，"他开口说……荣誉不可能支持不利于服务的特权，
    荣誉是不做违反道德行为的消极概念，不然就是为了获得荣誉奖赏而进行竞赛的一种原动力。
  网络来源: https://zh.wikipedia.org/wiki/%E8%AE%BA%E6%B3%95%E7%9A%84%E7%B2%BE%E7%A5%9E

- 名词: 君主政体的基础是荣誉
  分类: 概念
  解释: >-
    孟德斯鸠在《论法的精神》中提出的政体理论。孟德斯鸠将政体分为三类：
    共和政体以品德为原则、君主政体以荣誉为原则、专制政体以恐惧为原则。
    荣誉在君主国代替了政治品德，每个人和每个阶层的"成见"（追求出人头地、虚荣与自尊）
    推动着君主政体的运转。安德烈公爵在辩论中引用此理论为贵族特权辩护。
  书中原文: >-
    "我是孟德斯鸠的崇拜者，"安德烈公爵说，"他的思想是君主政体的基础是荣誉，
    我觉得这是无可怀疑的。在我看来，贵族的某些权利和特权是支持这种荣誉感的手段。"
  网络来源: https://baike.baidu.com/item/%E8%AE%BA%E6%B3%95%E7%9A%84%E7%B2%BE%E7%A5%9E/62653284

- 名词: 俄国宫廷官阶制度
  分类: 习俗
  解释: >-
    彼得大帝于1722年颁布的《官秩表》（Табель о рангах），将官职分为军职、文职和宫廷职
    三大类，每类14个等级。打破了过去以门第出身决定官职高低的旧规，代之以量才施用。
    非贵族出身者升到八等即可获得世袭贵族身份。该制度沿用至1917年十月革命后才被废除。
    在《战争与和平》中，新法令要求从低级官衔开始服务，老博尔孔斯基公爵支持这一改革。
  书中原文: >-
    "关于宫中官阶的新法令曾引起很多闲言碎语，而您并不因此把自己看作受了委屈的侍从。"
    "是的，"安德烈公爵说，"家父不愿意我利用这个特权，我是从低级官衔开始服务的。"
  网络来源: https://baike.baidu.com/item/%E5%AE%98%E8%81%8C%E7%AD%89%E7%BA%A7%E8%A1%A8

- 名词: 接待室等候礼仪
  分类: 习俗
  解释: >-
    19世纪初俄国权贵接待室的社交习俗。在《战争与和平》中，阿拉克切耶夫伯爵的接待室
    极具特色：不重要的人物脸上有羞愧和卑顺的表情；大官们则侷促不安，装作满不在乎；
    人们交头接耳、窃窃私语；门一打开，所有人的脸上都集中为同一个表情——恐惧。
    这反映了阿拉克切耶夫统治下的恐怖氛围。
  书中原文: >-
    在阿拉克切耶夫伯爵接待室里，在等待召见的不重要的人物的脸上，有一种羞愧和卑顺的表情；
    在大官的脸上，共同的表情是侷促不安，但为了掩饰这种侷促不安，却装作满不在乎，
    装作嘲笑自己，嘲笑自己的处境和嘲笑他们所等待召见的人。有些人沉思着走来走去，
    有些人交头接耳，哈哈大笑……可是门一打开，所有人的脸上刹那间集中为一个表情——恐惧。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3
