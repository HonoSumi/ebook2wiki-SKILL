- 名词: 西斯蒙第
  分类: 人物
  解释: 让·沙尔·列奥纳尔·德·西斯蒙第（1773—1842），瑞士历史学家和经济学家，法国古典政治经济学的完成者，小资产阶级政治经济学的创始人，经济浪漫主义鼻祖。著有《政治经济学新原理》《意大利共和国史》《法兰西人史》等，第一个论证了资本主义制度下经济危机的必然性。
  书中原文: 不把他所买的西斯蒙第、卢梭、孟德斯鸠的著作读完，决不再买新书
  网络来源: https://zh.wikipedia.org/zh/让·沙尔·列奥纳尔·德·西斯蒙第

- 名词: 谢尔盖公爵
  分类: 人物
  解释: 皮埃尔·别祖霍夫在彼得堡社交圈中提及的人物，被皮埃尔评价为"好人，很聪明"，出现在皮埃尔阐述其"积极行善"思想的对话中。该人物在小说中着墨不多，可能是上流社会中倾向进步的贵族代表。
  书中原文: 我说：好善者都携起手来，我们的旗帜是——积极行善。谢尔盖公爵是个好人，很聪明。
  网络来源: https://baike.baidu.com/item/战争与和平

- 名词: 德塞尔
  分类: 人物
  解释: 小尼古拉·博尔孔斯基（尼古连卡）的瑞士家庭教师。在尾声第一部中，德塞尔陪伴尼古连卡就寝，在尼古连卡做噩梦后关切地询问其健康状况。他是一位尽职尽责的家庭教师，也在小说第三卷中与玛丽亚公爵小姐谈论战况。
  书中原文: 德塞尔高高地枕着四个枕头睡着了
  网络来源: https://baike.baidu.com/item/战争与和平

- 名词: 普鲁塔赫
  分类: 人物
  解释: 普鲁塔克（约公元46—120年），罗马帝国时代的希腊作家、哲学家和历史学家，被誉为西方传记文学之父。代表作《希腊罗马名人传》采用希腊与罗马名人对照合传的形式，对后世文学和史学影响深远，曾受莎士比亚、蒙田等人推崇。
  书中原文: 他梦见自己跟皮埃尔头戴普鲁塔赫著作中的那种头盔。
  网络来源: https://baike.baidu.com/item/普鲁塔克

- 名词: 穆齐·塞服拉
  分类: 人物
  解释: 盖乌斯·穆齐乌斯·斯凯沃拉，古罗马传说中的英雄。公元前6世纪末伊特鲁里亚国王波塞纳围攻罗马时，穆齐潜入敌营刺杀国王未遂，被捕后为证明勇气将右手伸入火盆灼烧而面不改色。国王为其勇气所感，与罗马议和。穆齐因此得绰号Scaevola（左撇子）。
  书中原文: 穆齐·塞服拉烧掉了自己的手，可我生活中为什么就遇不到这种事呢？
  网络来源: https://baike.baidu.com/item/盖乌斯·穆齐乌斯·斯凯沃拉

- 名词: 戈利津
  分类: 人物
  解释: 亚历山大·尼古拉耶维奇·戈利津公爵（1773—1844），俄罗斯帝国公爵，曾任东正教最高宗教会议首席检察官，1812至1824年担任俄罗斯圣经会首任主席。深受神秘主义和跨宗派基督教合一运动影响，主张将圣经翻译成现代俄语，是亚历山大一世时期宗教自由主义思潮的重要代表。
  书中原文: 圣经会于一八一二年由戈利津建立，具有政治势力，后因戈利津失势，于一八二六年被尼古拉一世封闭。
  网络来源: https://baike.baidu.com/item/亚历山大·戈利津

- 名词: 朱丽安·克律德涅夫人
  分类: 人物
  解释: 芭芭拉·朱丽安·冯·克律德涅男爵夫人（1764—1824），出生于里加的波罗的海德意志贵族后裔，经历了从社交名流到小说家再到神秘主义者的转变。1815年成为沙皇亚历山大一世的精神导师，影响其起草《神圣同盟》宣言。其神秘主义思想是敬虔主义与末世预言的结合。
  书中原文: 朱丽安·克律德涅夫人出生在里加，醉心于神秘主义，亚历山大一世一度受过她的影响，后失宠。
  网络来源: https://www.britannica.com/biography/Barbara-Juliane-Freifrau-von-Krudener

- 名词: 基邦
  分类: 人物
  解释: 托尔斯泰在历史哲学论述中将其与保克尔并列为现代史学家的代表。很可能是弗朗索瓦·基佐（Francois Guizot，1787至1874，法国历史学家、政治家，著有《欧洲文明史》）或爱德华·吉本（Edward Gibbon，1737至1794，英国历史学家，著有《罗马帝国衰亡史》）。
  书中原文: 从基邦到保克尔的现代史学家，虽然他们好像有所分歧，但这两个古老的、无法避免的原则仍然是他们的全部著作的基础。
  网络来源: https://baike.baidu.com/item/弗朗索瓦·基佐

- 名词: 保克尔
  分类: 人物
  解释: 亨利·托马斯·巴克尔（Henry Thomas Buckle，1821至1862），英国历史学家，实证主义史学代表人物。著有《英国文明史》，主张人类社会如同自然界一样受规律支配，历史可以成为一门科学。将文明分为欧洲文明与非欧洲文明两大类型。其著作对中国近代新史学思潮产生过直接影响。
  书中原文: 从基邦到保克尔的现代史学家
  网络来源: https://baike.baidu.com/item/亨利·托马斯·巴克尔
