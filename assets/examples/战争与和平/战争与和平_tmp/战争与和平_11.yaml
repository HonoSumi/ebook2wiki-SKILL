- 名词: 玛丽亚·德米特里耶夫娜·阿赫罗西莫娃
  分类: 人物
  解释: |
    托尔斯泰《战争与和平》中的配角，年约五十岁的老太太，身材高大肥胖，为人耿介、胸襟坦荡，社交界绰号叫"恐龙"（le terrible dragon）。她在上流社会中以直言不讳著称，整个莫斯科和彼得堡无人不晓，连皇室也知道她，人人都敬重而又惧怕她。她是娜塔莎·罗斯托娃的教母，对娜塔莎极为宠爱，称为"哥萨克"；也曾当面训斥皮埃尔将警察局长绑在熊背上的荒唐行为。她代表了传统俄罗斯贵族中正直、朴实、不受上流社会虚伪风气影响的品格。
  书中原文: |
    大家都在等候玛丽亚·德米特里耶夫娜·阿赫罗西莫娃，她在社交界绰号叫恐龙，这位妇女所以赫赫有名不是由于财富或地位，而是因为她为人耿介，胸襟坦荡。提起玛丽亚·德米特里耶夫娜，整个莫斯科和彼得堡无人不晓，连皇家贵族也知道她。
  网络来源: |
    https://book.douban.com/annotation/141047429/

- 名词: 申申
  分类: 人物
  解释: |
    《战争与和平》中罗斯托娃伯爵夫人的堂兄，莫斯科交际场中绰号"毒舌"。他是一位上了年纪的文官，举止不拘小节，说话夹杂俄语和法语，以机智幽默、略带讽刺的言谈见长。在罗斯托夫家的晚宴上，他对俄国对法宣战持怀疑态度，引用谚语调侃战争，质疑苏沃洛夫也被打败过，与主张血战到底的上校形成鲜明对比，代表了对拿破仑战争持怀疑态度的俄国贵族声音。
  书中原文: |
    这位是老鳏夫申申，伯爵夫人的堂兄，莫斯科交际场中都叫他"毒舌"。跟对方谈话，露出一副屈尊俯就的样子。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 贝格
  分类: 人物
  解释: |
    《战争与和平》中谢苗诺夫团的军官，全名阿尔方斯·卡尔雷奇·贝格（阿道夫·贝格），出身利沃尼亚的德国裔贵族家庭。他说话精确沉着，只关心与自己直接相关的事务，具有极强的事务性利己主义。他精于算计，在军饷问题上滔滔不绝，讲述调到近卫军后收入从二百卢布增加到二百三十卢布。后与罗斯托夫家长女薇拉结婚，在1812年法军逼近莫斯科时仍只顾搬运自己的家具，是托尔斯泰讽刺和否定的对象，代表了精于钻营、冷漠务实的德国裔军官阶层。
  书中原文: |
    他是谢苗诺夫团的军官贝格中尉，和鲍里斯一起到团部入伍的就是他，娜塔莎在挑逗薇拉（伯爵夫人的大女儿）时戏称他为她的未婚夫。
  网络来源: |
    https://www.processon.com/view/61b1cb09f346fb6a6f198ba4

- 名词: 朱莉·卡拉金娜
  分类: 人物
  解释: |
    《战争与和平》中莫斯科贵族卡拉金之女，在兄弟相继去世后继承庞大遗产，成为莫斯科最富有的未婚女子之一。她喜欢摆出一副忧郁、失望的姿态，但这并不妨碍她寻欢作乐、举办舞会和晚会。鲍里斯·德鲁别茨基为钱财追求她，最终在得知阿纳托利·库拉金也在追求她后担心失去嫁妆而下定决心求婚。她与玛丽亚公爵小姐有书信往来。托尔斯泰通过这个角色讽刺了俄国上层社会基于物质利益的婚姻关系。
  书中原文: |
    面带微笑的朱莉·卡拉金娜和尼古拉一起入席。
  网络来源: |
    http://www.newxue.com/baike/12719091836701.html

- 名词: 苏沃洛夫
  分类: 人物
  解释: |
    亚历山大·瓦西里耶维奇·苏沃洛夫（1730—1800），俄罗斯帝国伟大的军事家、军事理论家，俄罗斯军事学术的奠基人之一。他一生指挥60余场战役从未遭遇重大失败，被誉为"常胜将军"。曾任俄罗斯帝国大元帅，获封雷姆尼克伯爵、意大利公爵。他的军事著作《制胜的科学》提出了"观察、快速、猛攻"三大战术原则，注重士兵素质与士气。他培养出库图佐夫、巴格拉季昂等杰出将领。苏联时期设立了苏沃洛夫勋章和苏沃洛夫军事学校。在本书中，申申引用苏沃洛夫在瑞士战败的例子质疑俄国对法战争的前景。
  书中原文: |
    "即使是苏沃洛夫 [37] 又该如何——连他也被打得一败涂地，我们苏沃洛夫式的英雄好汉们如今安在？我问问您。"
  网络来源: |
    https://baike.baidu.com/item/%E4%BA%9A%E5%8E%86%E5%B1%B1%E5%A4%A7%C2%B7%E7%93%A6%E8%A5%BF%E9%87%8C%E8%80%B6%E7%BB%B4%E5%A5%87%C2%B7%E8%8B%8F%E6%B2%83%E6%B4%9B%E5%A4%AB/5924860

- 名词: 琥珀烟嘴
  分类: 物件
  解释: |
    19世纪俄国上流社会盛行的吸烟用具，以波罗的海琥珀制成烟嘴部分，常配以黄金、珐琅甚至钻石装饰，是贵族身份与品位的象征。俄国拥有全球90%以上的琥珀储量，琥珀自古被视为珍宝。法贝热（Fabergé）和奥夫钦尼科夫（Ovchinnikov）等著名宫廷珠宝工匠都制作过精美的琥珀烟嘴。在《战争与和平》中，申申嘴里噙着琥珀烟嘴吸烟，反映了当时贵族社交场合的典型风貌。
  书中原文: |
    他盘腿坐在沙发上，像在自己家里一样随便，嘴角深深地噙着一支琥珀烟嘴，眯起眼睛，忽断忽续地吸烟。
  网络来源: |
    https://www.sothebys.com/en/auctions/ecatalogue/2013/russian-works-of-art-and-silver-n08981/lot.68.html

- 名词: 土耳其烟斗
  分类: 物件
  解释: |
    又称Chibouk（土耳其语çubuk，意为"木棒"），是一种烟杆极长的土耳其式烟斗，烟杆通常长达1.2至1.5米，烟锅为陶制。在19世纪的俄国贵族中极为流行，沙皇亚历山大一世曾亲自提倡长杆土耳其烟斗，使之与土耳其式长沙发一起成为俄国贵族书房的标配陈设。普希金在《叶甫盖尼·奥涅金》中也有"一只来自伊斯坦布尔的琥珀烟斗"的经典描写。在《战争与和平》中，罗斯托夫伯爵在书房中收藏土耳其烟斗，并向男客展示。
  书中原文: |
    伯爵把男客领到书房，请他们欣赏他收藏的土耳其烟斗。
  网络来源: |
    https://www.wikiwand.com/en/Chibouk

- 名词: 甲鱼汤
  分类: 物件
  解释: |
    英式甲鱼汤（English Turtle Soup），源自欧洲的贵族料理，在19世纪传入俄国宫廷，成为重大国宴上的高级珍馐。沙皇尼古拉二世1896年加冕典礼宴会和1913年的皇室晚宴中均有这道菜。其做法是：将甲鱼在牛肉汤中煮熟后切块，加入小牛肉、火腿边角料煎炒，配以香料和香草，炖煮后以马德拉或里斯本葡萄酒调味。在《战争与和平》中，皮埃尔在罗斯托夫家的宴席上从两道汤中选定了甲鱼汤，体现当时贵族宴会的饮食风尚。
  书中原文: |
    从两道汤中他所选定的甲鱼汤和馅饼，到松鸡，他没有放过任何一道菜。
  网络来源: |
    https://expositions.nlr.ru/ve/RA7410/petersburg-cuisine

- 名词: 诏书
  分类: 事件
  解释: |
    指俄国皇帝颁布的敕令或宣战文告（俄语称манифест，即"宣言"）。在《战争与和平》的故事背景1805年，沙皇亚历山大一世发布了宣战诏书，宣布派兵出征以"在歐洲奠定和平的巩固基础"，由此开启了俄国参加第三次反法同盟的战争。小说中客人们在书房讨论的正是这道刚刚颁发的宣战诏书，上校凭其记忆复述了诏书的引言部分。诏书在俄国帝国政治中具有神圣的法律效力，由皇帝签署后在全国宣读。
  书中原文: |
    书房里烟雾腾腾，人们正在谈论诏书中已经宣布的战争，谈论征兵。还没有人看到敕令，但是大家都知道已经颁发了。
  网络来源: |
    https://book.qq.com/book-read/35458936/29

- 名词: 毒舌
  分类: 概念
  解释: |
    在《战争与和平》中特指申申（Shinshin）的社交绰号。俄语社交文化中盛行以绰号（прозвище）评价人物的特点，这种绰号往往一针见血、带有讽刺意味。"毒舌"意为说话尖酸刻薄、善于讽刺挖苦之人。申申在莫斯科交际场中以机智幽默的谈吐和善于冷嘲热讽著称，这个绰号恰如其分地反映了他说话的特点——在粗俗的俄国话中夹杂法语句子，常引谚语调侃他人，令人无从辩驳。俄国的绰号文化非常普遍，从校园到社交圈随处可见，常以人或性格特征命名。
  书中原文: |
    这位是老鳏夫申申，伯爵夫人的堂兄，莫斯科交际场中都叫他"毒舌"。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8

- 名词: 哥萨克
  分类: 概念
  解释: |
    在《战争与和平》中，玛丽亚·德米特里耶夫娜称娜塔莎·罗斯托娃为"哥萨克"，作为表达亲昵和喜爱的昵称。哥萨克（俄语Казак）本指东欧草原上的自由骑手群体，以勇猛善战、崇尚自由、不受拘束著称。用"哥萨克"来称呼娜塔莎，生动体现她活泼好动、精力充沛、不受传统淑女礼仪约束的天性——像一匹自由奔放的小野马。这个昵称是小说中人物个性化的语言特征，也反映了哥萨克在俄国文化中的象征意义（自由、勇猛、野性）。
  书中原文: |
    "怎么样，我的哥萨克好吗？（玛丽亚·德米特里耶夫娜管娜塔莎叫哥萨克。）"
  网络来源: |
    https://zhuanlan.zhihu.com/p/496193242
