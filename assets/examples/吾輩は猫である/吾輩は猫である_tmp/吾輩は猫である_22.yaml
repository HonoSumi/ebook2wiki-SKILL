- 名词: 偕老同穴
  分类: 概念·观念
  解释: |
    成语，意为夫妻共同生活到老，死后同葬一个墓穴，形容夫妻恩爱、生死与共。"偕老"出自《诗经·邶风·击鼓》"执子之手，与子偕老"，"同穴"出自《诗经·王风·大车》"谷则异室，死则同穴"。在日本，此词也指一种深海玻璃海绵（Euplectella，又称维纳斯花篮），因其体腔内常有一雌一雄俪虾相伴终生，被用作婚礼定情信物，寓意白头偕老。
  书中原文: |
    主人が偕老同穴を契った夫人の脳天の真中には真丸な大きな禿がある。
  网络来源: https://zh.wiktionary.org/zh-hant/%E5%81%95%E8%80%81%E5%90%8C%E7%A9%B4
- 名词: 御灯明皿
  分类: 物件·工艺
  解释: |
    日本佛坛（仏壇）中用于供奉灯明（蜡烛或油灯）的器皿，多为陶磁或金属制。灯明在佛教中象征智慧之光，能破除无明黑暗。据佛经记载，供奉灯明有肉眼不坏、天眼通、智慧明等十种功德。御灯明皿是"灯明皿"的敬称，大英博物馆收藏有日本中世时期的陶制灯明皿（1185-1603年），反映了其作为重要佛具的历史。
  书中原文: |
    彼の家伝来の仏壇に幾世となく飾り付けられたる御灯明皿である。
  网络来源: https://www.britishmuseum.org/collection/object/A_OA-774-a-d
- 名词: 真鍮
  分类: 物件·工艺
  解释: |
    日文称"真鍮（しんちゅう）"，中文称黄铜，是铜与锌的合金。呈金黄色，具有良好的延展性和耐腐蚀性，广泛用于佛像、佛具、装饰品及工业材料。日本从庆长年间（1596-1615年）开始大量使用真鍮制作佛具和生活用品。中国早在宋代就掌握了用炉甘石（菱锌矿）与铜共熔制造黄铜的技术，明代《天工开物》详细记载了金属锌的提取工艺。
  书中原文: |
    その厨子の中にはいつでも真鍮の灯明皿がぶら下って、その灯明皿には昼でもぼんやりした灯がついていた事を記憶している。
  网络来源: https://baike.baidu.com/item/%E9%8D%AE
- 名词: 観音様
  分类: 人物
  解释: |
    观世音菩萨（梵语Avalokiteśvara）的日本称呼，意为"观察世间音声、救度众生苦难"的菩萨。佛教中以其大慈大悲、千处祈求千处应而著称。日本的观音信仰始于飞鸟时代（592-710年），圣德太子建立法隆寺供奉救世观音。日本有"百观音巡礼"传统，包括西国三十三所、坂东三十三所、秩父三十四所。观音的使者被视为鸽子（鳩），作品中提到"観音様の鳩"即源于此。
  书中原文: |
    観音様の鳩の事を思い出す。観音様の鳩と細君の禿とは何等の関係もないようであるが、主人の頭では二つの間に密接な聯想がある。
  网络来源: https://zh.wikipedia.org/wiki/%E8%A7%80%E4%B8%96%E9%9F%B3%E8%8F%A9%E8%90%A8
- 名词: 髷
  分类: 习俗·仪式
  解释: |
    日语中指盘在头顶或脑后的传统发髻。日本传统发型统称"日本髪"，髷是其核心元素。男性最著名的是"丁髷"（Chonmage），源于战国时代武士佩戴头盔时剃去头顶（月代）的实用需要；女性则有島田髷、丸髷、桃割髷等多种样式。江户时代是日本发型的黄金时期，发型与社会身份、年龄、婚姻状况密切相关。明治时代1871年"散发脱刀令"后逐渐被西式发型取代，但相扑力士和歌舞伎演员至今仍保留传统髷。
  书中原文: |
    女は髷に結うと、ここが釣れますから誰でも禿げるんですわ。
  网络来源: https://www.517japan.com/viewnews-26515.html
- 名词: 鈴木藤十郎
  分类: 人物
  解释: |
    夏目漱石《我是猫》中的登场人物。苦沙弥先生的旧友，后成为实业家金田的得力助手（"股肱"）。性格圆滑世故、唯利是图，信奉"极乐主义"和"三缺术"（缺义理、缺人情、缺廉耻），替金田监视苦沙弥的一举一动。作为旧学友，铃木代表明治时期被拜金主义腐蚀的知识分子形象，与清贫固执的苦沙弥形成鲜明对比，是漱石批判金钱至上社会的反面角色。
  书中原文: |
    何のために鈴木藤十郎君の名刺を後架まで持って行ったのかなおさら説明に苦しむ。
  网络来源: https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/60895828
- 名词: 臥竜窟
  分类: 地点
  解释: |
    《我是猫》中主人公苦沙弥先生住宅的书斋名，由猫（叙事者）以调侃口吻命名。"臥竜"即卧龙，暗指苦沙弥怀才不遇、如卧龙般蛰伏。原作中苦沙弥住所附近有一家名为"群鶴館"的旅馆，猫便戏谑地将主人居所称为"臥竜窟"以对应。实际上只是寒酸小屋，反映了猫叙事者的幽默讽刺——名号虽响亮，实则一文不值，以此嘲讽知识分子的自命不凡与现实寒酸之间的反差。
  书中原文: |
    鈴木君がペンペン草を目的に苦沙弥先生の臥竜窟を尋ねあてたと見える。
  网络来源: https://www.jianshu.com/p/d7c3195edcbc
- 名词: 木菴
  分类: 人物
  解释: |
    木菴（1611-1684），即木庵性瑫，明末清初中国福建出身的高僧，日本黄檗宗第二祖。13岁出家，师从隐元隆琦，1655年东渡日本，1664年继任京都黄檗山万福寺住持。在江户创建瑞圣寺，奠定关东黄檗宗基础。与隐元隆琦、即非如一并称"黄檗三笔"，书法以刚劲有力的"黄檗流"著称，擅长在画作上题写赞语。1881年被明治天皇追谥为"慧明国师"。
  书中原文: |
    床に掛けた花開万国春とある木菴の贋物や、京製の安青磁に活けた彼岸桜などを一々順番に点検した。
  网络来源: https://zh.m.wikipedia.org/zh-mo/%E6%9C%A8%E5%BA%B5%E6%80%A7%E7%91%AB
- 名词: 贋物
  分类: 概念·观念
  解释: |
    即赝品、伪造品，指以假充真的仿造物品，尤指书画、文物、古董等领域伪造名家作品的行为。日语亦作"贋作（がんさく）"或"偽物（にせもの）"。汉语"赝"字读yàn，形声字从贝雁声，本义为假货。《韩非子·说林下》中便有"贋鼎"（假鼎）的典故。作品中"木菴の贋物"指挂于壁龛（床の間）中的一幅假冒木菴手笔的书法画轴，暗示主人虽自诩风雅，实则收藏伪作而不自知，具有讽刺意味。
  书中原文: |
    床に掛けた花開万国春とある木菴の贋物や、京製の安青磁に活けた彼岸桜などを一々順番に点検した。
  网络来源: https://www.zdic.net/hans/%E8%B5%9D%E5%93%81
- 名词: 青磁
  分类: 物件·工艺
  解释: |
    青瓷，胎体上施以含有铁分的青色釉药并在还原焰中烧成的陶瓷器总称。起源于中国，宋代龙泉窑青瓷达到顶峰。日本从室町时代大量进口中国青瓷作为日用器皿和茶道具，后于江户时代开始在国内各窑口仿制并发展出日本特色的青瓷。作品中"京製の安青磁"指京都烧制的廉价青瓷花瓶，用于插彼岸樱，反映了明治时期知识阶层简朴的审美趣味。
  书中原文: |
    京製の安青磁に活けた彼岸桜などを一々順番に点検した。
  网络来源: https://digital.ceramics.ntpc.gov.tw/zh-tw/Collection/2_29.htm
- 名词: 股肱
  分类: 概念·观念
  解释: |
    汉语成语"股肱之臣"的略称。"股"指大腿，"肱"指手臂，合喻辅佐君主的得力重臣。源自《尚书·益稷》"臣作朕股肱耳目"。后泛指领导者身边最信任、最能干的助手。作品中金田将铃木藤十郎收为"股肱"，派其监视苦沙弥的一举一动，讽刺了明治实业家利用旧友关系进行商业情报搜集的行径。此词在日文中也广泛用于表示心腹、左右手。
  书中原文: |
    金田君の股肱たる鈴木藤十郎その人もこの二尺四方の真中に鎮座まします猫大明神を如何ともする事が出来ぬのである。
  网络来源: https://baike.baidu.com/item/%E8%82%A1%E8%82%B1%E5%BF%83%E8%85%B9
- 名词: 猫大明神
  分类: 习俗·仪式
  解释: |
    被奉为神明的猫，即"猫神"。日本民间信仰中猫被视为具有灵性的动物，可保佑商业繁荣（招财猫）、渔业丰收（田代岛猫神社）等。著名的猫神信仰包括和歌山贵志川线的"小玉大明神"（猫站长）、德岛阿南市的"阿松大权现"（日本三大怪猫传说之一）、高知箕越猫神社等。作品中猫（吾辈）被来访的铃木藤十郎视为无法驱赶的"猫大明神"，因顾及体面不敢与猫争抢座垫，幽默地刻画了猫与人间微妙的体面之争。
  书中原文: |
    金田君の股肱たる鈴木藤十郎その人もこの二尺四方の真中に鎮座まします猫大明神を如何ともする事が出来ぬのである。
  网络来源: https://baijiahao.baidu.com/s?id=1817124376515289872
- 名词: 太平楽
  分类: 概念·观念
  解释: |
    日语词汇，原为日本雅乐（唐乐）曲名，用于即位大礼等隆重场合演奏，伴随四人舞。因雅乐从容悠扬的印象，词义演变为形容人优哉游哉、不负责任地说无关痛痒的话。常用搭配"太平楽を並べる"，意为"说风凉话"或"发表不负责任的乐观言论"。作品中苦沙弥在实业家铃木面前大谈"太平楽"，讽刺知识分子的清谈与实业的现实之间的鸿沟。
  书中原文: |
    実業家を前に控えて太平楽を並べる。
  网络来源: https://fumeikai.com/jc/%E5%A4%AA%E5%B9%B3%E6%A5%BD
