- 名词: 宝生流
  分类: 习俗
  解释: 日本能乐五大流派之一，以独特唱腔和沉稳功架闻名。源自猿乐，江户时代受德川纲吉庇护，现传至第20代宗家宝生和英。
  书中原文: 寒月君は自若として宝生流に気燄を吐いて見せる。
  网络来源: https://baike.baidu.com/item/%E8%83%BD%E5%89%A7%E6%B5%81%E6%B4%BE/1619390

- 名词: 卒塔婆小町
  分类: 事件
  解释: 能剧剧目，属四番目物，"七小町"之一。写老年沦落为乞丐的小野小町与高野山僧进行佛法问答，展现无常观与狂乱的深草少将怨灵附体故事。
  书中原文: ことによると卒塔婆小町のように行き倒れになるかも知れない
  网络来源: https://baike.baidu.com/

- 名词: 金米糖
  分类: 物件
  解释: 日本传统砂糖菓子，呈星形，表面有突起小角。1546年由葡萄牙传教士传入，葡语"confeito"是其语源，京都绿寿庵清水为日本唯一金平糖专门店。
  书中原文: 人間に文明の角が生えて、金米糖のようにいらいらするからさ
  网络来源: https://baike.baidu.com/item/%E9%87%91%E5%B9%B3%E7%B3%96/7990598

- 名词: 見性成仏
  分类: 概念
  解释: 禅宗核心教义，意为彻见自己本具的佛性而即时成佛。出自达摩"直指人心，见性成佛"之宗旨，强调不假外求、顿悟自性。
  书中原文: 僕の自覚心と名づけるのは独仙君の方で云う、見性成仏とか、自己は天地と同一体だとか云う悟道の類ではない。
  网络来源: https://www.zdic.net/hant/%E8%A6%8B%E6%80%A7%E6%88%90%E4%BD%9B

- 名词: 応無所住而生其心
  分类: 概念
  解释: 《金刚般若波罗蜜经》名句。意为不执着于六尘（色声香味触法）而生清净心，体现般若智慧与方便慈悲合一之境界。六祖慧能闻此句大悟。
  书中原文: だから応無所住而生其心と云うのは大事な言葉だ、そう云う境界に至らんと人間は苦しくてならん
  网络来源: https://baike.baidu.com/

- 名词: ヘンレー
  分类: 人物
  解释: 威廉·欧内斯特·亨利（William Ernest Henley, 1849-1903），英国维多利亚时代诗人、批评家、编辑。代表作《Invictus》以"我是我命运的主宰"闻名，与史蒂文森为挚友。
  书中原文: ヘンレーと云う人がスチーヴンソンを評して彼は鏡のかかった部屋に入って、鏡の前を通る毎に自己の影を写して見なければ気が済まぬほど瞬時も自己を忘るる事の出来ない人だと評した
  网络来源: https://www.britannica.com/biography/William-Ernest-Henley

- 名词: ベーコン
  分类: 人物
  解释: 弗朗西斯·培根（Francis Bacon, 1561-1626），英国文艺复兴时期哲学家、散文家、科学家。经验论与归纳法创始人，名言"知识就是力量"（Knowledge is power）的作者。
  书中原文: ベーコンの言葉に自然の力に従って始めて自然に勝つとあるが
  网络来源: https://baike.baidu.com/

- 名词: フヶンガー・ボール
  分类: 物件
  解释: 即Finger bowl（フィンガーボール），19世纪西洋正式宴会中用于餐间清洗手指的小玻璃碗，常盛香水或清水，为当时正式餐桌必备器具。
  书中原文: 聯隊長が突然下士官の健康を祝すと云いながら、やはりフヶンガー・ボールの水を一息に飲み干したそうだ
  网络来源: https://baike.baidu.com/
