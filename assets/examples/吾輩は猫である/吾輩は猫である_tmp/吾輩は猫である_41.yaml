- 名词: 大町桂月
  分类: 人物
  解释: |
    日本明治至大正时期活跃的诗人、文学评论家、随笔家、纪行文作家（1869-1925）。本名大町芳卫，号桂月。土佐国（现高知县）出身，毕业于东京帝国大学国文科。进入博文馆后为《太阳》《文艺俱乐部》等杂志撰写评论，与高山樗牛齐名，被誉为硬派评论家。终生热爱美酒与旅行，被誉为"酒仙"和"铁脚旅人"。北海道的层云峡、羽衣瀑布等知名景点均由他命名。
  书中原文: |
    「なに苦しくってもこれから少し稽古するんだ。大町桂月が飲めと云った」
    「桂月は現今一流の批評家だ。それが飲めと云うのだからいいに極っているさ」
  网络来源: https://baike.baidu.com/item/%E5%A4%A7%E7%94%BA%E6%A1%82%E6%9C%88
- 名词: 御台場
  分类: 地点
  解释: |
    东京湾内的人工岛群，原为江户时代末期幕府为防御外敌而修筑的炮台。1853年美国佩里舰队"黑船来航"后，幕府委托江川英龙在品川海域建造了11座炮台（实际完成5座）。二战后经填海造陆发展为东京临海副都心。现为东京著名观光区，拥有彩虹大桥、富士电视台总部、大型购物中心等设施。其中第三号台场被保留为"台场公园"。
  书中原文: |
    これは何と称する肴か知らんが、何でも昨日あたり御台場近辺でやられたに相違ない。
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%8F%B0%E5%9C%BA
- 名词: 太政大臣
  分类: 概念·观念
  解释: |
    日本律令制度下的最高官位，相当于宰相。定员一人，位阶为正一位或从一位。别称"则阙"（养老律令规定无合适人选则空缺），是非常设荣誉职位。701年大宝律令正式确立，但长期空缺。历史上平清盛、丰臣秀吉、德川家康等著名人物也曾担任。1885年明治政府实施内阁制，太政大臣被内阁总理大臣取代，末任为三条实美。
  书中原文: |
    「ええ、前の関白太政大臣でしょう」
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%A4%AA%E6%94%BF%E5%A4%A7%E8%87%A3
- 名词: 関白
  分类: 概念·观念
  解释: |
    日本律令制下的令外官，是天皇成年后的最高辅政大臣。源自中国《汉书》"诸事皆先关白光，然后奏天子"，意为所有大事先禀报关白再上奏天皇。857年藤原良房开创外戚专权；887年藤原基经正式就任首任关白，形成"摄关政治"。平安时代藤原道长时期达到鼎盛，后由五摄家（近卫、九条、二条、一条、鹰司）轮流担任。丰臣秀吉曾打破藤原氏垄断就任关白。
  书中原文: |
    「ええ、前の関白太政大臣でしょう」
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%85%B3%E7%99%BD
- 名词: 娑婆
  分类: 概念·观念
  解释: |
    佛教用语，梵语Saha（音译"娑婆"）意为"堪忍"（耐忍）。指我们生活的现实世界，即"娑婆世界"。该世界充满劫浊、见浊、烦恼浊、众生浊、命浊等"五浊"，众生沉溺于贪瞋痴三毒中却仍能忍耐。佛教认为此世界苦难深重但也是修行成道的场所。日本俗语中「娑婆」也泛指社会、人世，与"极乐净土"相对。
  书中原文: |
    普通の人類の生息する娑婆へ出たのだ、文明に必要なる着物をきるのだ。
  网络来源: https://baike.baidu.com/item/%E5%A8%91%E5%A9%86%E4%B8%96%E7%95%8C
- 名词: 天麩羅
  分类: 物件·工艺
  解释: |
    日本代表性油炸料理，用面粉、鸡蛋调成薄糊裹上鱼虾或蔬菜炸至金黄。16世纪由葡萄牙传教士带入日本（长崎），最初为"南蛮料理"。名称由江户时代剧作家山東京传所创："天"指天竺（印度）表示外来，"麩"指小麦粉面衣，"羅"指薄薄外衣。江户时代中期菜籽油普及后成为庶民美食，与握寿司并称"江户前料理"代表。吃时蘸酱油与萝卜泥调汁。
  书中原文: |
    天麩羅を食えば必ず下痢する事になる。月給をもらえば必ず出勤する事になる。
  网络来源: https://baike.baidu.com/item/%E5%A4%A9%E5%A6%87%E7%BD%97
- 名词: ニーチェ
  分类: 人物
  解释: |
    弗里德里希·尼采（Friedrich Nietzsche，1844-1900），19世纪德国哲学家。24岁成为巴塞尔大学古典语文学教授。核心著作《查拉图斯特拉如是说》提出"超人"（Übermensch）、"权力意志"、"永恒轮回"等概念。以"上帝死了"的宣言震撼西方思想界，主张"重估一切价值"，批判基督教传统道德与理性主义。其思想深刻影响了存在主义、后现代主义等哲学流派。
  书中原文: |
    超人だ。ニーチェのいわゆる超人だ。魔中の大王だ。化物の頭梁だ。
  网络来源: https://baike.baidu.com/item/%E5%B0%BC%E9%87%87
- 名词: 柘榴口
  分类: 物件·工艺
  解释: |
    日本江户时代钱汤（公共澡堂）浴槽周围所设的低矮出入口。汤槽四周以板围起，仅留高约1米的小口作为出入口，入浴者须弯身屈膝才能通过，以保持浴槽内温度、防止蒸汽外泄。名称由来源说有二：一为"身を屈めて入る"的音转；二因其形似石榴（柘榴）开口。明治时代以后随着新式钱汤兴起，1885年左右逐渐废止。
  书中原文: |
    狭い柘榴口に一寸の余地もないくらいに化物が取りついて、毛のある脛と、毛のない股と入り乱れて動いている。
  网络来源: https://baike.baidu.com/item/%E6%9F%98%E6%A6%B4%E5%8F%A3
- 名词: 感投詞
  分类: 概念·观念
  解释: |
    日语品词之一，又称感动词或感叹词。指表示感叹、呼唤、应答等语气，无活用变化的独立词。与其他词无语法连接关系，通常单独使用。例如"まあ""もしもし""はい""いいえ"等。现代日语语法中常归入"感动词"（感叹词一类）。日语中感投词的研究可追溯到本居宣长的词论，后在明治语法学中被确立为独立的品词类别。
  书中原文: |
    「今鳴いた、にゃあと云う声は感投詞か、副詞か何だか知ってるか」
  网络来源: https://baike.baidu.com/item/%E6%84%9F%E5%8A%A8%E8%AF%8D
