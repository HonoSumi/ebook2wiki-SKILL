- 名词: 庚申山
  分类: 地点
  解释: 夏目漱石《我是猫》中登场人物寒月前往拉小提琴的山。位于群马县与栃木县交界处的足尾山地，是一处实存的山峰。
  书中原文: 右へ右へと爪先上がりに庚申山へ差しかかってくると、東嶺寺の鐘がボーンと毛布を通して、耳を通して、頭の中へ響き渡った。
  网络来源: https://book.qq.com/book-detail/34053915

- 名词: 無絃の素琴
  分类: 概念
  解释: 没有弦的琴。源自中国东晋诗人陶渊明的典故——他拥有一张无弦琴，每当饮酒便抚弄以寄心意，并说"但识琴中趣，何劳弦上声"。比喻不拘泥于形式、追求事物本质精神的境界。
  书中原文: 君は無絃の素琴を弾ずる連中だから困らない方なんだが、寒月君のは、きいきいぴいぴい近所合壁へ聞えるのだから大に困ってるところだ。
  网络来源: https://baike.baidu.com/item/素琴/2174851

- 名词: 大死一番乾坤新
  分类: 概念
  解释: 禅宗的修行用语。意为彻底打破自我执著与妄念（大死一番），之后天地一新、豁然开悟（乾坤新）。强调"大死"之后的"大活"——不是虚无而是佛性的新生。
  书中原文: 「大死一番乾坤新なり」と独仙君は目くばせをする。
  网络来源: https://books.masterhsingyun.org/ArticleDetail/artcle3553

- 名词: 露地の白牛
  分类: 概念
  解释: 出自《法华经·譬喻品》"火宅之喻"的禅宗用语。"露地"指脱离烦恼火宅后的清净之地，"白牛"象征清净佛性与一乘真理。喻指经过修行调伏后，心性完全清净自在的悟道境界。
  书中原文: 「伺わなくても露地の白牛を見ればすぐ分るはずだが」と、何だか通じない事を云う。
  网络来源: https://books.masterhsingyun.org/ArticleDetail/artcle7651

- 名词: サンドラ・ベロニ
  分类: 物件
  解释: 英国维多利亚时代小说家乔治·梅瑞狄斯（George Meredith, 1828-1909）创作的小说。原名《Emilia in England》（1864），1887年修订后改题为《Sandra Belloni》。作品描写一位富有音乐才华的女性的故事。
  书中原文: 僕は男子のサンドラ・ベロニが東方君子の邦に出現するところかと思って、今が今まで真面目に拝聴していたんだよ。
  网络来源: https://gutenberg.org/cache/epub/4420/pg4420-images.html

- 名词: コンノート殿下
  分类: 人物
  解释: 指英国王子阿瑟·弗雷德里克·帕特里克·阿尔伯特（Arthur Frederick Patrick Albert, 1883-1938），维多利亚女王之孙，初代康诺特公爵阿瑟王子的儿子。1906年曾作为日英同盟使节访问日本，向明治天皇授予嘉德勋章。
  书中原文: 紛然雑然糅然としてあたかもコンノート殿下歓迎の当時における都人士狂乱の態度を以て脳裏をかけ廻る。
  网络来源: https://en.wikipedia.org/wiki/Prince_Arthur_of_Connaught

- 名词: 嫦娥
  分类: 人物
  解释: 中国古代神话中的月宫女神。传说她因偷食西王母的不死之药而飞升月宫。最早记载于战国《归藏》及西汉《淮南子》。唐代以后文人将其塑造为美丽孤寂的月神形象。
  书中原文: 惜しい事に向うは月中の嫦娥を驚ろかし、君は古沼の怪狸におどろかされたので、際どいところで滑稽と崇高の大差を来たした。
  网络来源: https://baike.baidu.com/item/嫦娥

- 名词: 万朝
  分类: 物件
  解释: 即《万朝报》（よろずちょうほう），日本明治时期极具影响力的报纸。1892年由黑岩泪香创办，以"简单、明了、痛快"为编辑方针，大量刊登社会新闻和揭丑报道。1940年与《东京每夕新闻》合并后停刊。
  书中原文: 現に万朝なぞでは花聟花嫁と云う表題で両君の写真を紙上に掲ぐるの栄はいつだろう、いつだろうって、うるさく僕のところへ聞きにくるくらいだ。
  网络来源: https://baike.baidu.com/item/黑岩泪香

- 名词: 鬼窟裏
  分类: 概念
  解释: 禅宗用语，指幽鬼栖息的黑暗洞穴。比喻依赖概念思维、分别妄想的迷妄状态，或执着于形式坐禅、误将空寂当作悟境的错误修行状态。禅宗严厉批判"向鬼窟里作活计"。
  书中原文: 「好漢この鬼窟裏に向って生計を営む。惜しい事だ」と独仙君は嘆息した。
  网络来源: https://zh.m.wikisource.org/wiki/佛學大辭典/鬼窟裡

- 名词: 大平
  分类: 地点
  解释: 《我是猫》中庚申山上的一处平地，位于山的南侧。文中描述那里有约百坪的平地，中央有一块八叠席大小的岩石，可俯瞰城下景色。
  书中原文: これから秋の夜長をたった一人、山道八丁を大平と云う所まで登るのだが、平生なら臆病な僕の事だから、恐しくってたまらないところだけれども、一心不乱となると不思議なもので。
  网络来源: http://bcc.blcu.edu.cn/show/1211685643_5_5_9_10/0

- 名词: 東嶺寺
  分类: 地点
  解释: 《我是猫》中庚申山附近的一座寺院。寒月登山途中听到该寺钟声，钟声透过毛毯传入耳中。具体原型未详，可能为虚构的寺名。
  书中原文: 右へ右へと爪先上がりに庚申山へ差しかかってくると、東嶺寺の鐘がボーンと毛布を通して、耳を通して、頭の中へ響き渡った。
  网络来源: https://book.qq.com/book-detail/34053915

- 名词: 鵜の沼
  分类: 地点
  解释: 《我是猫》中庚申山附近的一个池塘，位于大平平地北侧。池边环绕着粗大的樟树，周围人烟稀少，只有一间采樟脑的小屋。
  书中原文: 北側は鵜の沼と云う池つづきで、池のまわりは三抱えもあろうと云う樟ばかりだ。
  网络来源: https://book.qq.com/book-detail/34053915

- 名词: 鴛鴦歌
  分类: 物件
  解释: 以鸳鸯（雌雄相伴不离的水鸟）为主题的情歌或诗篇。在东瀛文化中，鸳鸯是夫妻恩爱、忠贞不渝的象征。"鴛鴦歌"指赞美爱情或婚姻的诗歌作品。
  书中原文: 東風君なぞはすでに鴛鴦歌と云う一大長篇を作って、三箇月前から待ってるんだが、寒月君が博士にならないばかりで、せっかくの傑作も宝の持ち腐れになりそうで心配でたまらないそうだ。
  网络来源: https://baike.baidu.com/item/鸳鸯
