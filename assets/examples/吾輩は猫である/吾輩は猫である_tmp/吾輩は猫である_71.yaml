- 名词: タマス・ナッシ
  分类: 人物
  解释: 托马斯·纳什（Thomas Nashe，1567-1601），英国伊丽莎白时代作家、讽刺文学家，剑桥大学毕业，属于"大学才子"团体。其代表作《不幸运的旅人》被认为是英国最早的流浪汉小说。
  书中原文: 「タマス・ナッシと云って十六世紀の著書だ」
  网络来源: https://www.britannica.com/biography/Thomas-Nashe

- 名词: アリストートル
  分类: 人物
  解释: 亚里士多德（Aristotle，前384-前322），古希腊哲学家、科学家，柏拉图的学生、亚历山大大帝的老师。其著作涵盖物理学、形而上学、诗学、政治学、伦理学等多个领域，是西方哲学奠基人之一。
  书中原文: 「アリストートル曰く女はどうせ碌でなしなれば、嫁をとるなら、大きな嫁より小さな嫁をとるべし。大きな碌でなしより、小さな碌でなしの方が災少なし」
  网络来源: https://plato.stanford.edu/entries/aristotle/

- 名词: ダイオジニス
  分类: 人物
  解释: 第欧根尼（Diogenes of Sinope，约前412-前323），古希腊犬儒学派哲学家，以极端简朴的生活方式和尖锐讽刺著称。传说他住在一个木桶里，曾提着灯笼在雅典街头寻找"真正的人"。
  书中原文: 「或る人問う、妻を娶るいずれの時においてすべきか。ダイオジニス答えて曰く青年は未だし、老年はすでに遅し」
  网络来源: https://www.britannica.com/biography/Diogenes-Greek-philosopher

- 名词: ピサゴラス
  分类: 人物
  解释: 毕达哥拉斯（Pythagoras，约前570-前495），古希腊数学家、哲学家，以勾股定理闻名。他创立的毕达哥拉斯学派认为数是万物的本原，对后世数学和哲学产生了深远影响。
  书中原文: 「ピサゴラス曰く天下に三の恐るべきものあり曰く火、曰く水、曰く女」
  网络来源: https://www.britannica.com/biography/Pythagoras

- 名词: ソクラチス
  分类: 人物
  解释: 苏格拉底（Socrates，前469-前399），古希腊哲学家，西方哲学奠基人之一。他以"苏格拉底式问答法"著称，强调通过提问引导人们思考并发现真理。因腐蚀青年罪被雅典法庭判处死刑。
  书中原文: 「ソクラチスは婦女子を御するは人間の最大難事と云えり」
  网络来源: https://plato.stanford.edu/entries/socrates/

- 名词: デモスセニス
  分类: 人物
  解释: 德摩斯梯尼（Demosthenes，前384-前322），古希腊最著名的演说家、政治家。以《斥腓力演说》闻名，曾领导雅典抵抗马其顿国王腓力二世的扩张。
  书中原文: 「デモスセニス曰く人もしその敵を苦しめんとせば、わが女を敵に与うるより策の得たるはあらず。家庭の風波に日となく夜となく彼を困憊起つあたわざるに至らしむるを得ればなりと」
  网络来源: https://www.britannica.com/biography/Demosthenes-Greek-statesman-and-orator

- 名词: セネカ
  分类: 人物
  解释: 塞内卡（Lucius Annaeus Seneca，约前4-65），古罗马斯多葛派哲学家、政治家、剧作家，曾任尼禄皇帝的导师。其哲学著作以道德哲学、伦理学为主，主张理性节制、顺应自然。
  书中原文: 「セネカは婦女と無学をもって世界における二大厄とし」
  网络来源: https://plato.stanford.edu/entries/seneca/

- 名词: マーカス・オーレリアス
  分类: 人物
  解释: 马可·奥勒留（Marcus Aurelius，121-180），罗马帝国五贤帝之一，斯多葛派哲学家，著有《沉思录》。在位期间经历多次战争和瘟疫，被认为是罗马最伟大的皇帝之一。
  书中原文: 「マーカス・オーレリアスは女子は制御し難き点において船舶に似たりと云い」
  网络来源: https://plato.stanford.edu/entries/marcus-aurelius/

- 名词: プロータス
  分类: 人物
  解释: 普劳图斯（Titus Maccius Plautus，约前254-前184），古罗马著名喜剧作家，其作品多改编自希腊新喜剧，以生动的对话和幽默的情节著称，代表作有《一坛金子》《孪生兄弟》等，对后世欧洲喜剧影响深远。
  书中原文: 「プロータスが女子が綺羅を飾るの性癖をもってその天稟の醜を蔽うの陋策にもとづくものとせり」
  网络来源: https://www.britannica.com/biography/Plautus

- 名词: ヴァレリアス
  分类: 人物
  解释: 瓦莱里乌斯·马克西穆斯（Valerius Maximus，活跃于公元1世纪），罗马作家、历史学家，著有《著名言行录》（Factorum et Dictorum Memorabilium），收录大量古希腊罗马的趣闻逸事和名人语录，是后世了解古代世界的重要资料。
  书中原文: 「ヴァレリアスかつて書をその友某におくって告げて曰く天下に何事も女子の忍んでなし得ざるものあらず。願わくは皇天憐を垂れて、君をして彼等の術中に陥らしむるなかれと」
  网络来源: https://www.britannica.com/biography/Valerius-Maximus

- 名词: 三々九度
  分类: 习俗
  解释: 日本神前式婚礼中最重要的仪式之一，又称"三献之仪"。新郎新妇使用大、中、小三种酒杯交替饮三次清酒，每杯分三口饮尽（共九口），故名"三三九度"。象征天地人和，夫妻结缘。
  书中原文: 「シャンパンの三々九度や春の宵。――なに仲人は鈴木の藤さんだって？」
  网络来源: https://jplearner.com/archives/5107

- 名词: 太陽
  分类: 物件
  解释: 《太阳》是日本明治至大正时期（1895-1928）由博文馆发行的最大规模综合杂志，共531卷。内容涵盖政治、经济、文学、艺术、民俗等领域。夏目漱石等众多明治文人在此发表过作品，是近代日本重要的文化刊物。
  书中原文: 「すぐ活版にして方々へくばります。太陽へも出してもらいます」
  网络来源: https://apps.lib.nfu.edu.tw/?q=node/501

- 名词: 一竿風月
  分类: 概念
  解释: 出自中国南宋诗人陆游的诗句。原文为"回首壮游真昨梦，一竿风月老南湖"（《感旧》），意为手持钓竿、沐浴风月、悠然度日。在《吾辈是猫》中化身"独仙"角色的悠闲隐逸之语，表达超然物外的隐士情怀。
  书中原文: 「一竿風月閑生計、人釣白蘋紅蓼間」
  网络来源: https://www.gushiji.cc/shangxi/5b330730_4.html

- 名词: 埃及煙草
  分类: 物件
  解释: 指埃及产的高级香烟，19世纪末至20世纪初风靡全球的奢侈品。当时埃及香烟使用土耳其烟叶制作，由希腊移民企业家在埃及设厂生产，将产品出口到欧洲、美国和日本。明治时期的日本，埃及香烟被视为高级舶来品。
  书中原文: 「吸口に金箔のついた埃及煙草を出して、すぱすぱ吸い出した」
  网络来源: https://en.wikipedia.org/wiki/Egyptian_cigarette_industry

- 名词: 振袖
  分类: 物件
  解释: 日本未婚女性穿着的最高级别礼服和服，特征是袖子极长（中振袖约90-98cm，大振袖约110-120cm）。通常在成人式、婚礼（新娘装）等隆重场合穿着，是和服中最华丽的一种。
  书中原文: 「袴を穿いてるがある。振袖がある。高島田がある。ことごとく妙齢の女子ばかりである」
  网络来源: https://wapbaike.baidu.com/item/%E6%8C%AF%E8%A2%96/10089514

- 名词: 媒酌人
  分类: 概念
  解释: 日本结婚仪式中为新人牵线搭桥并担任婚礼见证人的角色。传统上由双方有社会地位的长辈担任，在婚礼上进行"媒酌致辞"，介绍两家结缘经过。明治至昭和前期，无媒人的婚姻甚至被视为不合法的"野合"。
  书中原文: 「僕かね、是非行くよ。出来るなら媒酌人たるの栄を得たいくらいのものだ」
  网络来源: https://ca-link.cn/books/item-72557.html

- 名词: 一夫多妻主義
  分类: 概念
  解释: 一夫多妻制，指一个男性同时拥有多个女性配偶的制度。日本明治初期曾沿袭江户时代的妾室制度，在法律上承认一夫多妻。直到1882年才为迎合西方文明标准在法律上废除纳妾，但明治民法中的"家制度"仍保留了实质上的多妻空间。
  书中原文: 「みんなですか、それはあまり慾張りたい。君一夫多妻主義ですか」
  网络来源: https://www.chinawriter.com.cn/n1/2022/0303/c404090-32364081.html

- 名词: ナッシ
  分类: 人物
  解释: 托马斯·纳什（Thomas Nashe）的简称。同"タマス・ナッシ"。16世纪英国伊丽莎白时代的讽刺文学作家，著有《不幸运的旅人》等作品。
  书中原文: 「今のはね、御主人の御考ではないですよ。十六世紀のナッシ君の説ですから御安心なさい」
  网络来源: https://www.britannica.com/biography/Thomas-Nashe
