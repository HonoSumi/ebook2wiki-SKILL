- 名词: 天狗
  分类: 概念·观念
  解释: |
    天狗（てんぐ），日本最具代表性的妖怪之一。最初源于中国《山海经》中像狸猫的吉兽，
    传入日本后演变为红脸长鼻、背生双翼、身着修验僧服的山妖形象。天狗分为大天狗（鼻高天狗）
    和鸦天狗等多个等级，居住在深山之中，拥有飞行、幻术等神通。天狗传说与修验道文化密切相关，
    著名的传说包括鞍马天狗教授源义经剑术、崇德天皇怨灵化为大天狗等。
    日语中「天狗になる」指得意忘形、骄傲自大。
    作品中苦沙弥的《大和魂》碑文中将大和魂比作天狗，借以讽刺其虚无缥缈的本质。
  书中原文: |
    大和魂はそれ天狗の類か
  网络来源: |
    https://baike.baidu.com/item/%E5%A4%A9%E7%8B%97/102022

- 名词: 無事是貴人
  分类: 概念·观念
  解释: |
    無事是貴人（ぶじこれきじん），著名的禅语，出自唐代临济宗祖师临济义玄的语录《临济录》。
    禅宗语境中「無事」并非指平安无事，而是指放下一切追求心（求佛、求悟、求道之心）、
    停止造作、保持平常心的状态；「貴人」则指觉悟者、佛本身。
    整句意为：不再向外追逐、内心安然自在的人，才是真正尊贵的人。
    作品中猫叙述者讽刺那些以「無事是貴人」为借口、终日无所事事、以闲散为荣的明治绅士，
    批评他们把坐着腐烂的屁股不离开坐垫视为"老爷的荣誉"，反映了漱石对当时日本社会
    消极保守风气的不满。
  书中原文: |
    無事是貴人とか称えて、懐手をして座布団から腐れかかった尻を離さざるをもって旦那の名誉と脂下って暮した
  网络来源: |
    https://baike.baidu.com/item/%E6%97%A0%E4%BA%8B%E6%98%AF%E8%B4%B5%E4%BA%BA

- 名词: つくつく法師
  分类: 物件·工艺
  解释: |
    つくつく法師（ツクツクボウシ），学名 Meimuna opalifera，蝉科寒蝉属的一种，
    中文称寒蝉或法师蝉。体长约4.5厘米，体色暗黄绿色带黑色斑纹，背上有W字形纹路。
    因其鸣叫声如「ツクツクオーシ」而得名。与其他夏蝉不同，它在晚夏至秋季（7月—10月）
    鸣叫，被视为宣告秋日来临的风物诗，在俳句中作为秋季的季语使用。
    作品中猫叙述者在初秋的庭园中听到梧桐树上つくつく法師的叫声，营造出夏末秋初的季节感，
    与后续猫开始进行「运动」的叙述形成对照。
  书中原文: |
    梧桐の緑を綴る間から西に傾く日が斑らに洩れて、幹にはつくつく法師が懸命にないている
  网络来源: |
    https://baike.baidu.com/item/%E6%B3%95%E5%B8%88%E8%9D%89/2494574

- 名词: 海水浴
  分类: 习俗·仪式
  解释: |
    海水浴，指在海水中浸泡、游泳以求健康或娱乐的活动。在日本，海水浴作为医疗手段
    于明治时期由西方传入，此前仅有部分地区（如爱知大野）有「潮湯治」的传统。
    1881年（明治14年）德国医学书籍将海水浴概念正式引入日本，初代陆军军医总监松本顺
    在神奈川大磯开设海水浴场并大力推广。1882年三重县二见浦被指定为日本首个公营海水浴场。
    作品中猫叙述者以独特的逻辑论证海水浴的功效：鱼因为一直在海水里游泳所以从来不生病，
    因此海水浴对人类也必然有益，以此讽刺明治时期盲目追捧西洋传来的健康法。
  书中原文: |
    海水浴の功能はしかく魚に取って顕著である。魚に取って顕著である以上は人間に取っても顕著でなくてはならん
  网络来源: |
    https://baike.baidu.com/item/%E6%B5%B7%E6%B0%B4%E6%B5%B4

- 名词: 神経衰弱
  分类: 概念·观念
  解释: |
    神経衰弱（しんけいすいじゃく，neurasthenia），19世纪后期至20世纪初流行的医学诊断概念，
    由美国神经学家乔治·米勒·比尔德于1869年提出。明治时期随西洋医学传入日本后，
    被视作「文明病」——因近代化的精神压力而导致的神经疲劳状态。
    在日本知识阶层中尤其盛行，夏目漱石本人留学英国期间也曾患神经衰弱，
    谷崎润一郎等作家亦深受其影响。作品中猫叙述者将神经衰弱与鼠疫、肺结核并列为
    「从西洋传染到神国（日本）的近世疾病」，以讽刺明治时期日本人盲目将各种西洋概念
    当作时髦的流行病来接受的社会风气。
  书中原文: |
    西洋から神国へ伝染しした輓近の病気で、やはりペスト、肺病、神経衰弱の一族と心得ていいくらいだ
  网络来源: |
    https://baike.baidu.com/item/%E7%A5%9E%E7%BB%8F%E8%A1%B0%E5%BC%B1

- 名词: ドクトル・リチャード・ラッセル
  分类: 人物
  解释: |
    理查德·拉塞尔博士（Richard Russell，1687—1759），18世纪英国医生，
    海水疗法（thalassotherapy）的先驱。1750年出版拉丁文论文《De Tabe Glandulari》
    （关于腺病及海水使用的论文），主张海水饮用和海水浴对腺病、黄疸、麻风病、
    坏血病等有疗效。他移居当时还是小渔村的布莱顿（Brighton）实践海水疗法，
    吸引英国各地患者前来，使布莱顿从渔村发展为著名的海水浴疗养胜地，
    被称为「将布莱顿变成海滨度假地的人」。作品中猫叙述者引用拉塞尔在1750年
    宣称「跳入布莱顿海水即可四百四病即刻痊愈」的广告，以夸张的推销口吻
    来讽喻明治时期对西洋健康法的盲目崇拜。
  书中原文: |
    一七五〇年にドクトル・リチャード・ラッセルがブライトンの海水に飛込めば四百四病即席全快と大袈裟な広告を出した
  网络来源: |
    https://en.wikipedia.org/wiki/Richard_Russell_(doctor)

- 名词: ブライトン
  分类: 地点
  解释: |
    布莱顿（Brighton），英国英格兰东萨塞克斯郡的海滨城市，位于伦敦以南约80公里，
    乘火车约1小时可达，被称为「伦敦的海边」。18世纪中叶前只是一个小渔村
    （旧名Brighthelmstone），1750年代因医生理查德·拉塞尔在此推广海水疗法而
    开始作为疗养地发展。1783年威尔士亲王（后来的乔治四世）首次访问后成为
    王室御用的高级度假地，并兴建了著名的东方风格宫殿「英皇阁」（Royal Pavilion）。
    1841年铁路开通后更成为大众旅游胜地。作品中猫叙述者引用拉塞尔在布莱顿
    推广海水浴的历史事件，作为其论证海水浴功效的例证。
  书中原文: |
    一七五〇年にドクトル・リチャード・ラッセルがブライトンの海水に飛込めば四百四病即席全快と大袈裟な広告を出した
  网络来源: |
    https://baike.baidu.com/item/%E5%B8%83%E8%8E%B1%E9%A1%BF/2524591

- 名词: 鎌倉
  分类: 地点
  解释: |
    镰仓（鎌倉／かまくら），日本神奈川县的城市，三面环山一面临海，
    与奈良、京都并列为日本三大古都。1192年源赖朝在此建立日本第一个武家政权
    ——镰仓幕府（至1333年）。拥有鹤冈八幡宫、高德院镰仓大佛、建长寺等众多历史遗迹。
    明治时期起镰仓也成为著名的海水浴场和避暑胜地，深受文人墨客喜爱。
    作品中猫叙述者表示「猫类一旦时机成熟，都打算去镰仓（避暑/海水浴）」，
    以此说明猫也向往人类的海水浴时尚。
  书中原文: |
    猫といえども相当の時機が到着すれば、みんな鎌倉あたりへ出掛けるつもりでいる。但し今はいけない。物には時機がある
  网络来源: |
    https://baike.baidu.com/item/%E9%95%B0%E4%BB%93%E5%B8%82

- 名词: 築地
  分类: 地点
  解释: |
    筑地（築地／つきじ），东京都中央区的地名，濒临东京湾。原为江户时代明历大火（1657年）
    后为重建本愿寺而填海造地的区域，「築地」即「填筑的土地」之意。幕末设有军舰操练所，
    明治初期曾设外国人居留地，福泽谕吉的兰学塾（庆应义塾前身）也在此发祥。
    1935年筑地市场开张后成为世界知名的海鲜批发市场，被誉为「东京的厨房」，
    2018年场内批发功能搬迁至丰洲，但场外市场仍保留至今。
    作品中叙述者提到自家猫被主人扔到筑地去，讽刺了苦沙弥对外声称要把猫「丢弃到筑地」
    的威胁性管教方式。
  书中原文: |
    今日のように築地へ打っちゃられに行った猫が無事に帰宅せん間は無暗に飛び込む訳には行かん
  网络来源: |
    https://baike.baidu.com/item/%E7%AD%91%E5%9C%B0/3939953

- 名词: 四百四病
  分类: 概念·观念
  解释: |
    四百四病（しひゃくしびょう），佛教医学概念，指人体由四大（地·水·火·风）构成，
    每一大不调则生101种病，四大合计404种病，泛指一切疾病。
    典出《正法念处经》《维摩诘经》等佛教经典。在日本民间「四百四病」也作为
    「万病」「所有疾病」的惯用表达，有谚语「四百四病に風邪が勝る」（诸病之中感冒最甚）。
    作品中猫叙述者引用拉塞尔「跳入布莱顿海水即可四百四病即刻痊愈」的夸张广告语，
    以此讽刺明治时期人们对西洋医疗法的过度迷信。
  书中原文: |
    一七五〇年にドクトル・リチャード・ラッセルがブライトンの海水に飛込めば四百四病即席全快と大袈裟な広告を出した
  网络来源: |
    https://baike.baidu.com/item/%E5%9B%9B%E7%99%BE%E5%9B%9B%E7%97%85
