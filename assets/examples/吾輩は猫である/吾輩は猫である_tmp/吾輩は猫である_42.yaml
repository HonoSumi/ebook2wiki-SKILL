- 名词: 桂月
  分类: 人物
  解释: |
    大町桂月（おおまち けいげつ，1869—1925），日本明治至大正时期的诗人、评论家、随笔家。本名大町芳卫，出生于土佐国高知（今高知县）。毕业于东京帝国大学文科大学国文科，在校期间即以能文善写著称。毕业后进入博文馆，为《太阳》《文艺俱乐部》《帝国文学》等杂志撰写文艺时评，与高山樗牛并称"硬派评论家"。一生热爱酒与旅行，著作多达200余册，曾命名北海道的层云峡、羽衣瀑布等景点。大雪山系有以其命名的山峰"桂月岳"。
  书中原文: |
    「桂月って何です」さすがの桂月も細君に逢っては一文の価値もない。「桂月は現今一流の批評家だ。それが飲めと云うのだからいいに極っているさ」
  网络来源: https://zh.m.wikiquote.org/zh-hans/%E5%A4%A7%E7%94%BA%E6%A1%82%E6%9C%88

- 名词: 落雲館
  分类: 地点
  解释: |
    夏目漱石长篇小说《我是猫》中虚构的私立中学名称。位于苦沙弥先生住宅北侧空地对面，其学生频繁侵入空地喧哗、唱歌、踢球，成为苦沙弥的烦恼之源。作品中对该校学生以"君子"反讽，讽刺明治教育之实态。其现实原型被认为是位于东京都文京区的郁文馆中学（现郁文馆高等学校），夏目漱石曾居住在该校隔壁，亲身经历了学生喧闹的困扰。
  书中原文: |
    落雲館と称する私立の中学校――八百の君子をいやが上に君子に養成するために毎月二円の月謝を徴集する学校である。名前が落雲館だから風流な君子ばかりかと思うと、それがそもそもの間違になる。
  网络来源: https://www.jikei.cn/news/620.html

- 名词: 群鶴館
  分类: 地点
  解释: |
    夏目漱石《我是猫》中虚构的廉价寄宿屋（安下宿）名称。位于苦沙弥先生住宅的南侧，透过扁柏林间隙可见其廉价屋顶。漱石以"群鹤馆"这一风雅名称与实际的简陋形成反差，与"卧龙窟""落云馆"等一并构成名称与实质不符的讽刺手法。文中"群鹤馆に鹤の下りざるごとく"（如同群鹤馆无鹤降临）等句强化了这种嘲讽效果。
  书中原文: |
    群鶴館という、名前だけ立派な安下宿の安屋根が遠慮なく見えるから、しかく先生を想像するのにはよほど骨の折れるのは無論である。その信用すべからざる事は群鶴館に鶴の下りざるごとく、臥竜窟に猫がいるようなものである。
  网络来源: https://www.my285.pro/wgwx/cpxs/wsm/066.htm

- 名词: 女媧氏
  分类: 人物
  解释: |
    女娲（女媧氏），中国上古神话中的创世女神、人类始祖。传说中她人首蛇身，以黄土造人、炼五色石补天、断鳌足以立四极、积芦灰以止洪水，并创立婚姻制度、发明笙簧等乐器。被尊为"娲皇""女希氏"，位列三皇之一。在《我是猫》中，苦沙弥先生屡次驱赶落云馆学生却无效，作者以"女娲氏的时代起预期就与实际不符"来反讽其徒劳。
  书中原文: |
    このくらいやかましく云ったらもうよかろうと主人は思っていたそうだ。ところが実際は女媧氏の時代から予期と違うもので、主人はまた失敗した。
  网络来源: https://zh.wikipedia.org/zh-hans/%E5%A5%B3%E5%A8%B2

- 名词: 梁上の君子
  分类: 概念·观念
  解释: |
    汉语成语，字面意为"房梁上的君子"，实为窃贼、小偷的婉称与雅称。出自《后汉书·陈寔传》：东汉时岁荒民饥，有盗贼潜入陈寔家中躲在梁上，陈寔发现后并未直接呵斥，而是召集子孙训诫"人不可不自勉，不善之人未必本恶，习以性成，遂至于此，梁上君子者是矣"。盗贼听后惭惧下地谢罪。后以"梁上君子"作为窃贼的代称。在《我是猫》中，作者借该词讽刺世道连窃贼也堪称"君子"。
  书中原文: |
    梁上の君子などと云って泥棒さえ君子と云う世の中である。但しこの場合における君子は決して警察の厄介になるような君子ではない。
  网络来源: https://baike.baidu.com/item/%E6%A2%81%E4%B8%8A%E5%90%9B%E5%AD%90/62171

- 名词: 折助
  分类: 人物
  解释: |
    日本江户时代武家宅邸中服役的下级男仆（下男），又称"小者"。负责杂役、跑腿等各类粗活，是武士家中身份最低的男性用人。明治维新后，这一阶层随着武家制度的解体而消失。在《我是猫》中，苦沙弥家的女主人将落云馆学生粗鄙的口语（おめえ、知らねえ）比作维新前沿途"折助""云助""三助"等下层职业的专门用语，以讽刺所谓教育君子的语言竟与贱民无异。
  书中原文: |
    御維新前は折助と雲助と三助の専門的知識に属していたそうだが、二十世紀になってから教育ある君子の学ぶ唯一の言語であるそうだ。
  网络来源: https://koolearn.com/japdict/wd_21186.html

- 名词: 雲助
  分类: 人物
  解释: |
    日本江户时代在宿场町和街道上从事搬运与运输的下层劳动者。主要工作包括抬轿子（驾笼かき）、搬运旅客行李、协助渡河等。因其"如云般来去无踪"而得名。常被视为无赖、粗暴之徒聚集的群体，亦成为无赖汉的代名词。明治以降随着交通方式的近代化逐渐消失。在《我是猫》第五章与第八章中，被用作下层粗鄙阶层的代表性职业之一，用以反讽所谓"教育君子"的口语粗俗。
  书中原文: |
    御維新前は折助と雲助と三助の専門的知識に属していたそうだが、二十世紀になってから教育ある君子の学ぶ唯一の言語であるそうだ。
  网络来源: https://jlearn.net/dictionary/%E9%9B%B2%E5%8A%A9

- 名词: 三助
  分类: 人物
  解释: |
    日本江户时代在钱汤（公共浴场）工作的男性服务员。主要职责为烧热水、为客人搓洗身体、管理客人的个人木桶以及浴场的清扫。在江户后期，部分三助提供越界服务，成为幕府风纪整顿的对象。该职业是江户庶民文化中极具特色的下层职业形象，在川柳和滑稽本中多有出现。明治后随社会变革逐渐消失。在《我是猫》中与"折助""云助"并列为粗鄙职业的代表。
  书中原文: |
    御維新前は折助と雲助と三助の専門的知識に属していたそうだが、二十世紀になってから教育ある君子の学ぶ唯一の言語であるそうだ。
  网络来源: https://dict.asia/jc/%E4%B8%89%E5%8A%A9

- 名词: 処士
  分类: 概念·观念
  解释: |
    日语词汇，读作"しょし"，指有才学而隐居不仕之人，即隐士、在野之人。源自中国儒家思想，《论语》等典籍中已有记载。在日本，平安时代以降成为仕官しない武士或知识分子的雅称，江户时代常用来指浪人或民间学者。与"隐者"的区别在于：処士强调有能力却主动不出仕的主体性选择，隐者则侧重远离世俗的消极遁世。在《我是猫》中，作者以"江湖の処士"描绘苦沙弥先生的隐居生活状态，带有自嘲的意味。
  书中原文: |
    椽側から拝見すると、向うは茂った森で、ここに往む先生は野中の一軒家に、無名の猫を友にして日月を送る江湖の処士であるかのごとき感がある。
  网络来源: https://zh.wiktionary.org/zh-hans/%E5%87%A6%E5%A3%AB

- 名词: 玉を抱いて罪あり
  分类: 概念·观念
  解释: |
    日本古语，出自中国《左传·桓公十年》的"匹夫无罪，怀璧其罪"。意为一个人本身并无过错，却因拥有珍贵的宝玉（或才能、财富）而招来罪过与灾祸。故事讲述春秋时虞国虞叔获美玉，虞公前来索取，虞叔为避祸献玉，但虞公贪得无厌又索要宝剑，虞叔最终起兵反抗。在《我是猫》中，苦沙弥先生自嘲家中空地虽长有可做木屐的优质桐木，却因是租房而无法砍伐利用，形成了一语双关的讽刺。
  书中原文: |
    玉を抱いて罪ありと云う古語があるそうだが、これは桐を生やして銭なしと云ってもしかるべきもので、いわゆる宝の持ち腐れである。
  网络来源: https://baike.baidu.com/item/%E6%80%80%E7%92%A7%E5%85%B6%E7%BD%AA/6124

- 名词: 珍譚
  分类: 概念·观念
  解释: |
    日语词汇，读作"ちんたん"，由"珍"（珍奇）与"譚"（故事、谈话）组成，意为"珍奇的故事""奇谈"。与"珍談（ちんだん）"同义，但使用了更文雅的"譚"字。在《我是猫》中，作者以"珍譚"自称即将讲述的空地骚动故事，带有自嘲与戏谑的语气。
  书中原文: |
    本題に戻ってこの空地が騒動の種であると云う珍譚を紹介仕るが、決して主人にいってはいけない。これぎりの話しである。
  网络来源: https://jlearn.net/dictionary/%E7%8F%8D%E8%AB%87

- 名词: 乱杭
  分类: 物件·工艺
  解释: |
    日本传统防御设施，指将一端削尖的木桩斜向钉入地面，用以阻止敌人或马匹进攻的障碍物。在城郭防御中，常布置于城门两侧、虎口及环壕周围，与"逆茂木"等配合使用构成多重防线。起源于弥生时代的环壕集落防御，后广泛应用于战国时期的城郭与野战筑城。在《我是猫》中，苦沙弥先生因家境清贫，自嘲其家周围完全不需要此类防备设施。
  书中原文: |
    吹き通しも夏はせいせいして心持ちがいいものだ、不用心だって金のないところに盗難のあるはずはない。だから主人の家に、あらゆる塀、垣、乃至は乱杭、逆茂木の類は全く不要である。
  网络来源: https://www.yoshinogari.jp/ch/introduction/restore/moat-encircled-village/

- 名词: 逆茂木
  分类: 物件·工艺
  解释: |
    日本传统防御设施，将树枝一端削尖后斜向埋入地面形成的障碍物，与"乱杭"同属拒马类设施。又称"鹿砦（ろくさい）"，英文称abatis。其尖锐枝条朝向敌人行进方向，有效阻止骑兵冲击和步兵突入。战国时代（如四万十川合战、姫路城防御）及江户时代城郭中广泛应用。在《我是猫》中，列举乱杭与逆茂木以强调苦沙弥先生家徒四壁无需防盗的窘境，暗含嘲讽。
  书中原文: |
    吹き通しも夏はせいせいして心持ちがいいものだ、不用心だって金のないところに盗難のあるはずはない。だから主人の家に、あらゆる塀、垣、乃至は乱杭、逆茂木の類は全く不要である。
  网络来源: https://www.pttweb.cc/bbs/Japandrama/M.1425484082.A.8EB
