- 名词: 蟷螂
  分类: 生物·自然
  解释: |
    蟷螂（かまきり），即螳螂，日本常见的昆虫，秋季季语。在夏目漱石《我是猫》第七章中，猫详细描述了自己捕食螳螂的"运动"过程：从试探性地用爪子碰触、等待螳螂反击，到以"七擒七纵"的战术反复捉放，最终吃掉。猫将螳螂拟人化为"蟷螂君"，讽刺其看似威猛（举着镰刀般的前足）实则不堪一击的窘态——翅膀只是"装饰用"，像人类的英语、法语、德语一样毫无实用价值。这段描写是漱石借猫之眼讽刺人类社会虚伪外强中干的典型笔法。
  书中原文: |
    これだけ参ると眼識のある蟷螂なら必ず逃げ出す。それを我無洒落に向ってくるのはよほど無教育な野蛮的蟷螂である。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/56131448

- 名词: 蟬
  分类: 生物·自然
  解释: |
    蟬（せみ），即蝉，日本夏季最具代表性的昆虫，深植于日本文学与美学之中。在俳句中属于夏季季语。蝉的生命短暂（成虫仅存活约三周），在日本文化中常与"无常观"相联系。松尾芭蕉的名句"閑さや岩にしみ入る蝉の声"广为人知。在《我是猫》中，猫继螳螂狩猎之后开始"蝉取运动"，描述了捉蝉的各种技巧与困难——蝉会飞、会撒尿、且不同种类有不同的习性。猫还幽默地提出学术问题："おしいつくつく"究竟是何种叫法，嘲讽了人类的学究习气。
  书中原文: |
    蟷螂狩りに次いで蟬取りと云う運動をやる。単に蟬と云ったところが同じ物ばかりではない。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/56131448

- 名词: 油蟬
  分类: 生物·自然
  解释: |
    油蟬（アブラゼミ / Aburazemi），日本最常见的蝉种，学名 Graptopsaltria nigrofuscata。翅不透明呈褐色，因翅面如涂油而得名。体长55-60mm，鸣声为"ジージージー…"的高音。7-9月活动，分布日本全国，适应力强，在城市和山区均可见。在《我是猫》中，猫评价"油蟬はしつこくて行かん"（油蝉太执拗不好办）。
  书中原文: |
    油蟬はしつこくて行かん。
  网络来源: |
    https://en.wikipedia.org/wiki/Graptopsaltria_nigrofuscata

- 名词: みんみん
  分类: 生物·自然
  解释: |
    みんみん（ミンミンゼミ / Minminzemi），即鸣鸣蝉，学名 Hyalessa maculaticollis。翅透明，前翅有烟褐色斑点，体长约30-36mm，体色黑底有青绿色斑点。鸣声为"ミーンミンミンミンミー…"，因叫声得名。7月下旬至8月活动，分布日本本州中部以南、中国、朝鲜半岛等地。在《我是猫》中，猫评价"みんみんは横風で困る"（鸣鸣蝉耍刁钻难对付）。
  书中原文: |
    みんみんは横風で困る。
  网络来源: |
    https://www.inaturalist.org/taxa/359390-Hyalessa-maculaticollis

- 名词: つくつくぼうし
  分类: 生物·自然
  解释: |
    つくつくぼうし（ツクツクボウシ / Tsukutsukuboushi），学名 Meimuna opalifera，日本秋季代表蝉种。体长约40-46mm，翅透明，体色为橄榄绿与黑色斑纹。鸣声为"ツクツクボーシ…"，是夏末秋初的标志性声音，常被视为"夏之终曲"。在《我是猫》中，猫将之称为"おしいつくつく"（为该蝉的方言或古称变体），描述其"夏の末にならないと出て来ない"，捕食它最有意思。猫还以调侃的口吻提出疑问：应该叫"おしいつくつく"还是"つくつくおしい"，以此讽刺人类咬文嚼字的学究态度。
  书中原文: |
    ただ取って面白いのはおしいつくつくである。これは夏の末にならないと出て来ない。
  网络来源: |
    https://en.wikipedia.org/wiki/Meimuna_opalifera

- 名词: 青桐
  分类: 生物·自然
  解释: |
    青桐（あおぎり），即梧桐，学名 Firmiana simplex，落叶乔木，原产于中国和日本。树皮青绿色光滑不裂，叶大呈心形掌状3-5裂。在中国文化中，梧桐是祥瑞之树——"家有梧桐树，引来金凤凰"，也是"一叶知秋"典故的来源。在《我是猫》中，猫描写蝉最喜欢聚集在青桐上，其叶子像团扇一样大且茂密得"枝がまるで見えないくらい"，给猫的捕蝉行动带来了很大困难。
  书中原文: |
    蟬のもっとも集注するのは青桐である。漢名を梧桐と号するそうだ。
  网络来源: |
    https://baike.baidu.com/item/%E6%A2%A7%E6%A1%90%E6%9C%A8/66752199

- 名词: 七擒七縦
  分类: 事件·典故
  解释: |
    七擒七纵，出自三国时期蜀汉丞相诸葛亮南征时七次擒获又七次释放孟获的典故。据《三国志》裴松之注引《汉晋春秋》，诸葛亮为求南方长治久安而非单纯征服，以七擒七纵的攻心战术使孟获最终心悦诚服，誓不再反。后世以此比喻善于运用策略使对方心服口服，是"攻心为上"军事智慧的经典体现。在《我是猫》中，猫戏弄螳螂时自称采用"七擒七纵孔明的军略"以兵家典故描写猫捉虫的儿戏，极尽幽默谐谑之能事。
  书中原文: |
    七擒七縦孔明の軍略で攻めつける。
  网络来源: |
    https://baike.baidu.com/item/%E4%B8%83%E7%BA%B5%E4%B8%83%E6%93%92/6856775

- 名词: 孔明
  分类: 人物
  解释: |
    孔明（こうめい），即诸葛亮（181—234），字孔明，号卧龙，三国时期蜀汉丞相。琅琊阳都（今山东沂南）人。辅佐刘备建立蜀汉，提出"隆中对"，促成孙刘联盟赢得赤壁之战，后受托孤之重任，平定南中、五次北伐中原。著有《出师表》《诫子书》等名篇，被后世誉为"智圣"。陈寿《三国志》评其为"识治之良才"。在《我是猫》中，猫追捕螳螂时竟以"七擒七纵孔明的军略"自居，将孔明运筹帷幄的军事智慧降格为猫捉虫的儿戏，是漱石雅语俗用的典型讽刺手法。
  书中原文: |
    七擒七縦孔明の軍略で攻めつける。
  网络来源: |
    https://baike.baidu.com/item/%E8%AF%B8%E8%91%9B%E4%BA%AE/23460

- 名词: 羅甸語
  分类: 概念·观念
  解释: |
    羅甸語（らてんご），日本历史上对拉丁语（Latin）的汉字音译表记。"羅甸"二字为"Latin"的当て字（音译），是日本独自的译法（中国译作"拉丁"）。明治时期在学术文献中广泛使用，与"英語""独逸語""仏蘭西語"等并列。现代日语中已改用片假名"ラテン語"为标准表记。在《我是猫》中，猫将蝉逃避天敌时撒尿的举动比作乌贼吐墨、贝兰梅露出刺青、主人摆弄罗甸语（拉丁语）等行为，归入同一个"纲目"（范畴），以生物学分类术语来调侃人类卖弄学问的习惯。
  书中原文: |
    烏賊の墨を吐き、ベランメーの刺物を見せ、主人が羅甸語を弄する類と同じ綱目に入るべき事項となる。
  网络来源: |
    https://zh.wiktionary.org/zh-hans/%E7%BE%85%E7%94%B8%E8%AA%9E

- 名词: 烏賊の墨
  分类: 生物·自然
  解释: |
    烏賊の墨（いかのすみ），即乌贼（墨鱼）喷出的墨汁，是头足类动物（乌贼、章鱼等）最重要的防御机制。当遭遇捕食者攻击时，乌贼会喷出墨团作为"诱饵"（decoy），吸引捕食者攻击墨团而自身借机逃脱。研究表明墨汁中还含有麻痹捕食者嗅觉的成分。在《我是猫》中，猫以乌贼吐墨为类比来思考蝉在飞逃前撒尿的行为：这到底是因为"绝望"还是为了创造逃跑余裕的"方便"？猫将蝉尿、乌贼墨、贝兰梅的刺青、主人卖弄拉丁语归入同一类"防御手段"，以幽默的学术口吻进行"生物学"讨究，暗讽人类学术研究中的牵强附会。
  书中原文: |
    烏賊の墨を吐き、ベランメーの刺物を見せ、主人が羅甸語を弄する類と同じ綱目に入るべき事項となる。
  网络来源: |
    https://link.springer.com/article/10.1007/s10164-020-00640-8

- 名词: 右往左往
  分类: 概念·观念
  解释: |
    右往左往（うおうさおう），日语四字熟语，意为慌乱地四处奔走、狼狈不堪的样子。原为佛教用语，描述众生在迷妄中奔波的状态。在《我是猫》中，猫描述被它捉弄的螳螂被逼得走投无路、拼命逃窜的样子时使用了此语："ただ右往左往へ逃げ惑うのみである"，生动刻画了螳螂在猫爪下徒劳挣扎的滑稽局面，也暗讽了人们在困境中盲目奔走的窘态。
  书中原文: |
    ただ右往左往へ逃げ惑うのみである。
  网络来源: |
    https://www.zdic.net/hans/%E5%8F%B3%E5%BE%80%E5%B7%A6%E5%BE%80
