- 名词: 蛇足
  分类: 事件·典故
  解释: |
    中文成语"画蛇添足"的略称，典出《战国策·齐策二》。故事讲楚国有人祭祀后赏门客一壶酒，众人约定画地为蛇、先成者饮。一人先画成，左手持卮右手继续添画蛇足，结果被另一人夺酒："蛇固无足，子安能为之足？"最终添足者失酒。比喻多此一举、做了多余无益之事。后世以"蛇足"形容多余、无用的添加，在文学批评中尤指赘笔。
  书中原文: |
    焼芋を食うも蛇足だ、割愛しよう
  网络来源: https://baike.baidu.com/item/%E7%94%BB%E8%9B%87%E6%B7%BB%E8%B6%B3
- 名词: 行雲流水
  分类: 概念·观念
  解释: |
    四字成语，字面意为"流动的云、流淌的水"。典出北宋苏轼《与谢民师推官书》："大略如行云流水，初无定质，但常行于所当行，常止于所不可不止。"原指诗文、书法等艺术作品自然流畅、不受拘束的风格境界，后也用于形容人生态度随缘自在、不执著于事物。在《我是猫》中，迷亭借用此语评价苦沙弥的文章，属半真半假的恭维。
  书中原文: |
    苦沙弥君の文は行雲流水のごとしとありましたよ
  网络来源: https://baike.baidu.com/item/%E8%A1%8C%E4%BA%91%E6%B5%81%E6%B0%B4/3323
- 名词: 文人画
  分类: 概念·观念
  解释: |
    中国绘画史上重要的流派，指士大夫（文人）以抒发胸中逸气为目的、不追求工细形似而重笔墨意趣的绘画风格。讲究"诗书画印"四绝合一。宋代苏轼提出"士人画"概念，明代董其昌以"南北宗论"确立文人画正统地位。文人画在江户时代传入日本，发展为"南画"（Nanga），代表人物有池大雅、与谢芜村等。《我是猫》中苦沙弥自嘲在稿纸上随手画了"下手な文人画の蘭"（拙劣的文人画兰花）。
  书中原文: |
    筆を十文字に揮って原稿紙の上へ下手な文人画の蘭を勢よくかく
  网络来源: https://baike.baidu.com/item/%E6%96%87%E4%BA%BA%E7%94%BB
- 名词: 草双紙
  分类: 物件·工艺
  解释: |
    日本江户时代中期至明治初期流行的通俗木版插图小说，属于"戯作"的一种。以假名文字为主、图文并茂，主要面向妇女儿童读者。按封面颜色可分为赤本（童话）、黑本（武勇传）、青本（戏剧梗概）、黄表纸（成人讽刺滑稽）及合卷（长篇化）。代表作家有恋川春町、山东京传、式亭三马等，葛饰北斋、歌川国芳等浮世绘师曾担任插图。草双纸被视为现代日本漫画的源流之一。
  书中原文: |
    昔しの草双紙にある猫又に似ていますよ
  网络来源: https://zh.wikipedia.org/wiki/%E8%8D%89%E5%8F%8C%E7%BA%B8
- 名词: 猫又
  分类: 概念·观念
  解释: |
    日本传说中著名的妖怪，最显著的特征是尾巴分叉为两条。通常认为家猫饲养超过十年（一说五十年）会成精变为猫又，体型可大如小牛。传说中猫又能直立行走、说人话、变化人形（常扮美女或老妪）、操纵尸体。最早见于平安时代《日本灵异记》，江户时代鸟山石燕《画图百鬼夜行》中有描绘。日本民间曾有切短小猫尾巴以防止其化为猫又的习俗。
  书中原文: |
    昔しの草双紙にある猫又に似ていますよ
  网络来源: https://baike.baidu.com/item/%E7%8C%AB%E5%8F%88/53724
- 名词: 丸善
  分类: 地点
  解释: |
    日本最古老的西式书店兼出版社，由早矢仕有的于1869年（明治二年）在横滨创立，后迁至东京日本桥。全称丸善株式会社，是日本第一家近代株式会社企业，福泽谕吉曾参与其经营制度设计。丸善专营进口洋书、医学书籍、文具及文房具，是明治时期知识人吸收西洋文化的重要窗口。夏目漱石、芥川龙之介、梶井基次郎等作家均与丸善关系密切。梶井基次郎名作《柠檬》即以丸善京都支店为舞台。
  书中原文: |
    勝手に丸善へ行っちゃ何冊でも取って来て、月末になると知らん顔をしているんですもの
  网络来源: https://baike.baidu.com/item/%E4%B8%B8%E5%96%84/12660996
- 名词: 唐人
  分类: 概念·观念
  解释: |
    原指唐朝时期的中国人。因唐朝国力鼎盛、文化远播，唐代以后日本及东南亚诸国长期沿用"唐人"称呼全体中国人。日本江户时代将来自中国的商人和移民称为"唐人"或"唐人之"，长崎设有唐人屋敷（中国人聚居区）。该词在日本文学和历史文献中广泛使用。《明史·外国真腊传》记载："唐人者，诸番呼华人之称也。凡海外诸国尽然。"至今海外华人聚居区仍称"唐人街"。
  书中原文: |
    私は唐人の名なんかむずかしくて覚えられませんわ
  网络来源: https://baike.baidu.com/item/%E5%94%90%E4%BA%BA/77879
- 名词: 力石
  分类: 物件·工艺
  解释: |
    日本传统民俗文化中用于比试力气的石头，广泛分布于全国各地的神社和寺院中。江户时代，青年男子和力士们在农闲期或祭礼时举行举石力比试（力競べ），将举起过的石头奉纳于神社并刻上姓名、重量和年号。石头重量从数十公斤到两百公斤以上不等。东京佃浪除稻荷神社、香取神社、元三岛神社等地至今保存着大量力石，部分被指定为有形民俗文化财产。力石是日本力量崇拜与神社信仰结合的独特民俗遗产。
  书中原文: |
    本堂の裏手へ力石のように抛り出して置くんだね
  网络来源: https://cn.chuo-kanko.or.jp/pages/other_details/119678
- 名词: 居士
  分类: 概念·观念
  解释: |
    佛教术语，梵语grha-pati（迦罗越）的汉译，原意为"家之主人"。佛教中指在家修行佛法的信徒，即不出家而受持三皈五戒的男性修行者。在中国和日本，"居士"也发展为一种用于戒名中的荣誉称号，通常为中间等级的位号（低于大居士，高于信士）。宋代以来，"居士"更常被文人用作别号（如李白号"青莲居士"、苏轼号"东坡居士"），表示隐居不仕或寄情佛道之意。《我是猫》中"天然居士"即作者虚构的戒名式称号。
  书中原文: |
    主人はまた天然居士に取り懸る
  网络来源: https://baike.baidu.com/item/%E5%B1%85%E5%A3%AB/635190
- 名词: 戒名
  分类: 习俗·仪式
  解释: |
    日本佛教中，人死后由寺院僧人授予的佛教式死后名，相当于佛教法名，刻于位牌和墓碑上。戒名起源于印度佛教，经中国传入日本后，在日本室町时代发展出独特的等级体系。完整的戒名由院号（或院殿号）、誉号、道号、戒名本体和位号五部分构成，字数越长等级越高。位号男最高为"大居士"、次为"居士"、再"信士"；女对应"大姊"、"姊"、"信女"。安倍晋三的戒名"紫雲院殿政誉清浄晋寿大居士"即属最高等级。在日本，无论生前是否信佛，家属往往花钱请僧人为逝者取戒名。
  书中原文: |
    天然居士と云うなあやはり偶然童子のような戒名かね
  网络来源: https://baike.baidu.com/item/%E6%B3%95%E5%90%8D/718289
- 名词: タークイン・ゼ・プラウド
  分类: 人物
  解释: |
    英语Tarquin the Proud的音译，指罗马王政时代第七任末代国王卢基乌斯·塔奎尼乌斯·苏培布斯（Lucius Tarquinius Superbus，约前535年—前509年在位）。他以暴政闻名，最终因其子塞斯图斯强奸贵族妇女鲁克丽丝引发民变，被布鲁图斯领导的起义推翻，罗马从此进入共和国时代。在《我是猫》中，迷亭纠正女主人将Tarquin误说成"樽金"的笑话，并引出西比拉之书（Sibylline Books）的典故——即女主人讲述的九册预言书被焚三册而价格不减的罗马传说。
  书中原文: |
    ええお待ちなさいよ羅馬の七代目の王様ですね、こうっとたしかには覚えていないがタークイン・ゼ・プラウドの事でしょう
  网络来源: https://baike.baidu.com/item/%E5%8D%A2%E4%BF%AE%E6%96%AF%C2%B7%E5%A1%94%E5%85%8B%E6%96%87%C2%B7%E8%8B%8F%E4%BD%A9%E5%B8%83
