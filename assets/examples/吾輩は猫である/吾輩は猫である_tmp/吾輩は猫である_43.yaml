- 名词: 四つ目垣
  分类: 物件·工艺
  解释: |
    日本传统庭园中常见的竹篱笆，属于"透篱"（透かし垣）中最基础的一种。用圆形立柱（亲柱·间柱）支撑，将竹材纵横向稀疏编组，形成方形网格状空隙，四角形的空洞即为"四目"得名由来。兼具隔断与通风功能，因竹间有缝可透景，具有一定观赏性。在《我是猫》中，猫主人以为凭此方孔栅栏即可防学生闯入，实为迟钝自欺。
  书中原文: |
    諸君は四つ目垣とはいかなる者であるか御承知であろう。風通しのいい、簡便な垣である。吾輩などは目の間から自由自在に往来する事が出来る。
  网络来源: https://mazii.net/zh-TW/search/word/jatw/%E5%9B%9B%E3%81%A4%E7%9B%AE%E5%9E%A3

- 名词: 張世尊
  分类: 人物
  解释: |
    清末的中国魔术师/奇术师，全名张世尊，在明治时期的日本以"清国奇术师"之名广为人知。其表演以穿越狭小空间的"缩骨术"等杂技闻名，在日本巡演期间受到瞩目。夏目漱石在《我是猫》中引用其名，比喻四目栅栏的方孔极其狭小，就连以身体柔软著称的张世尊也无法穿越，以此讽刺主人公的掩耳盗铃。
  书中原文: |
    清国の奇術師張世尊その人といえどもむずかしい。
  网络来源: https://zh.wikipedia.org/wiki/%E5%A4%8F%E7%9B%AE%E6%BC%B1%E7%9F%B3

- 名词: 清国
  分类: 地点
  解释: |
    日本对清朝统治下中国的历史称呼。1644年至1912年清朝统治时期，日本及西方列强称中国为"清国"。明治时期日本在中日甲午战争（1894-1895）中战胜清国，两国的国际地位发生逆转。"清国"一词在当时日本文献中广泛使用，至1912年清朝灭亡后逐渐被"中国"或"支那"等称呼取代。在《我是猫》的写作年代（1905-1906），"清国"是日本对中国的标准称呼。
  书中原文: |
    清国の奇術師張世尊その人といえどもむずかしい。
  网络来源: https://www.zdic.net/hans/%E6%B8%85%E5%9B%BD

- 名词: 柔術
  分类: 物件·工艺
  解释: |
    日本传统徒手武术体系，以"柔克刚"（柔よく剛を制す）为核心理念，通过投技、固技、绞技、当身技等技术，利用对手的力量和动作将其制服。起源于战国时代的"鎧組討"，江户时代发展为数百个流派。明治十五年（1882年）嘉纳治五郎统合起倒流与天神真杨流创立讲道馆柔道，柔术的竞技化由此开始。作品中用以比喻人们通过"欺负比自己弱的人"来证明自身优越的心理冲动。
  书中原文: |
    柔術使が時々人を投げて見たくなるのと同じ事である。柔術の怪しいものは、どうか自分より弱い奴に、ただの一返でいいから出逢って見たい。
  网络来源: https://baike.baidu.com/item/%E6%9F%94%E6%9C%AF/2772084

- 名词: 鰹節
  分类: 物件·工艺
  解释: |
    日本传统保存食品，将鲣鱼（鰹）经煮熟、烟熏、干燥、霉菌发酵等多道工序加工而成，是世界上最坚硬的食物之一。削成薄片后即"木鱼花"（削り節），与昆布同熬可制出"出汁"（だし），是日本料理中"旨味"（鲜味）的核心来源。起源于奈良时代，江户时代纪州（和歌山）发展出薪燻法后普及全国。谚语"猫に鰹節"（给猫鲣鱼干）比喻危险状态。作品中用以调侃那些想听理论就要带束脩来学的态度。
  书中原文: |
    聞きたければ鰹節の一折も持って習いにくるがいい、いつでも教えてやる。
  网络来源: https://kamatiam.org/%E5%BE%9E%E9%B0%B9%E7%AF%80%E5%88%B0%E6%9F%B4%E9%AD%9A%E8%87%BA%E7%81%A3%E7%9A%84%E6%97%A5%E6%9C%AC%E6%BB%8B%E5%91%B3/

- 名词: 後架
  分类: 物件·工艺
  解释: |
    日语中对厕所（便所）的古老称呼，原为禅宗寺院用语，指僧堂后方设置的盥洗架，后转指厕所。与"厠"（かわや）、"雪隠"（せっちん）、"憚り"（はばかり）等同为日语中厕所的雅称或隐语。明治时代虽仍是日常用语，但现已成为古语。在《我是猫》中，主人公苦沙弥先生多次利用后架（厕所）的窗户暗中观察落云馆学生的动静，成为猫叙述中一处带有滑稽色彩的军事要地。
  书中原文: |
    後架の窓から垣根越しに眺めるよりほかに仕方がない。
  网络来源: https://zh.m.wiktionary.org/zh/%E5%BE%8C%E6%9E%B6

- 名词: 扁鵲
  分类: 人物
  解释: |
    中国春秋战国时期（约公元前407-前310年）的传奇名医，本名秦越人，渤海郡鄚（今河北省任丘市）人。被誉为"医祖"，位列中国五大名医之首。据《史记·扁鹊仓公列传》记载，扁鹊得长桑君秘传后能隔墙视人五脏，精通四诊法（望闻问切），虢国太子"起死回生"、齐桓侯"讳疾忌医"等典故流传千古。在《我是猫》中，猫将扁鹊与欧洲的盖伦、帕拉塞尔苏斯并列为旧派权威，以幽默口吻讨论逆上（血涌上头）的病理。
  书中原文: |
    この点に関してはゲーレンもパラセルサスも旧弊なる扁鵲も異議を唱うる者は一人もない。
  网络来源: https://www.kingnet.com.tw/news/single?newId=22139

- 名词: パラセルサス
  分类: 人物
  解释: |
    菲利普斯·奥雷奥卢斯·特奥夫拉斯图斯·邦巴斯图斯·冯·霍恩海姆（1493/94-1541），通称帕拉塞尔苏斯（意为"超越塞尔苏斯"），瑞士-德意志裔医生、炼金术师，被誉为"医学界的路德""毒理学之父"。他公开焚毁盖伦与阿维森纳的医学经典，以德语取代拉丁语授课，主张三原质（盐·硫磺·水银）取代四元素说，率先将化学应用于医学（化学医学/iatrochemistry）。名言"万物皆毒，唯剂量使之非毒"被视为现代毒理学的基石。在《我是猫》中，与盖伦、扁鹊一同被列为旧时代医学权威。
  书中原文: |
    この点に関してはゲーレンもパラセルサスも旧弊なる扁鵲も異議を唱うる者は一人もない。
  网络来源: https://pubmed.ncbi.nlm.nih.gov/8153971/

- 名词: ゲーレン
  分类: 人物
  解释: |
    克劳狄乌斯·盖伦（Galen，129-约200/216年），古希腊-罗马医师、解剖学家、哲学家，小亚细亚帕加马（今土耳其贝尔加马）人。继希波克拉底之后古代医学的最权威人物，其医学理论统治西方医学长达1400余年。通过动物解剖发现神经、心脏瓣膜等结构，提出三大元气（动物精、生命精、自然精）与四气质说（多血质·胆汁质·忧郁质·黏液质），著有约500部著作（现存约150部）。在《我是猫》中，猫以其名与帕拉塞尔苏斯、扁鹊并列，调侃古今医学权威对"逆上"现象并无异议。
  书中原文: |
    この点に関してはゲーレンもパラセルサスも旧弊なる扁鵲も異議を唱うる者は一人もない。
  网络来源: https://baike.baidu.com/item/%E7%9B%96%E4%BC%A6/4802514

- 名词: 怒液
  分类: 概念·观念
  解释: |
    四体液说中的"黄胆汁"，希腊医学中四种体液之一，对应火元素，属热性。在古典的四体液病理学中，黄胆汁（choleric humor）被认为由肝脏生成，储存于胆囊。当其在体内失衡或"逆上"（异常上升）时，导致人易怒暴躁，对应"胆汁质"（多血质·胆汁质·忧郁质·黏液质四大气质之一）。在《我是猫》中，猫以幽默口吻介绍欧洲传统医学的四液学说——"怒液"即其一，逆上则怒火发作。
  书中原文: |
    古来欧洲人の伝説によると、吾人の体内には四種の液が循環しておったそうだ。第一に怒液と云う奴がある。これが逆かさに上ると怒り出す。
  网络来源: https://www.britannica.com/science/humor-ancient-physiology

- 名词: 鈍液
  分类: 概念·观念
  解释: |
    四体液说中的"黏液"（phlegm），希腊医学中四种体液之一，对应水元素，属寒性。在古典的四体液理论中，黏液（phlegmatic humor）被认为由脑部生成，在体内起冷却和润滑作用。当黏液过多或"逆上"时，表现为迟钝、冷漠、思维迟缓，对应"黏液质"气质。在《我是猫》中，猫按照正文中的用词用"鈍液"称呼这一体液，逆上则神经迟钝。日语中"鈍液"为夏目漱石对该体液的直译表达。
  书中原文: |
    第二に鈍液と名づくるのがある。これが逆かさに上ると神経が鈍くなる。
  网络来源: https://www.britannica.com/science/humor-ancient-physiology

- 名词: 憂液
  分类: 概念·观念
  解释: |
    四体液说中的"黑胆汁"，希腊医学中四种体液之一，对应土元素，属干性。在古典的四体液理论中，黑胆汁（melancholic humor）被认为由脾脏生成。当黑胆汁过多时，导致人焦虑、阴郁、多思，对应"忧郁质"气质。在《我是猫》中，猫引用四体液说，称"憂液"使人阴郁。该词是夏目漱石在小说中对"黑胆汁"的独特日文译法。
  书中原文: |
    次には憂液、これは人間を陰気にする。
  网络来源: https://www.britannica.com/science/humor-ancient-physiology

- 名词: 傷寒論
  分类: 事件·典故
  解释: |
    全称《伤寒杂病论》，东汉末年"医圣"张仲景（约150-219年）所著的经典医书，与《黄帝内经》《神农本草经》《难经》并称中医四大经典。原书在战乱中散佚，后经晋代王叔和整理编次为《伤寒论》与《金匮要略》两部分。确立"六经辨证"与"八纲辨证"的辨证论治体系，载方113首（伤寒部分），被尊为"方书之祖"。在《我是猫》中，猫引用《伤寒论》"头寒足热"的养生观点来调侃主人公用湿毛巾敷头暖脚的方法。
  书中原文: |
    頭寒足熱は延命息災の徴と傷寒論にも出ている通り、濡れ手拭は長寿法において一日も欠くべからざる者である。
  网络来源: https://wjw.ah.gov.cn/ztzl/zyygljzt/zyyztsy/yswh/56968161.html

- 名词: 頭寒足熱
  分类: 概念·观念
  解释: |
    日本传统养生理念，字面意为"头凉脚热"，主张保持头部凉爽、足部温暖的状态以维持健康。其理论基础源自中医阴阳调和思想，与江户时代儒医贝原益轩的《养生训》一脉相通。《伤寒论》中亦有"头寒足热为延命息灾之征"的类似论述。日本现代"排寒疗法"倡导者进藤义晴继承并推广了这一理念，主张多穿袜子、半身浴、上半身少穿等实践。在《我是猫》中，猫听闻主人已故先父曾用"湿毛巾敷头坐暖炉"的土法治逆上，视为长寿妙法。
  书中原文: |
    頭寒足熱は延命息災の徴と傷寒論にも出ている通り、濡れ手拭は長寿法において一日も欠くべからざる者である。
  网络来源: https://edh.tw/articles/6qyrEL3

- 名词: 一所不住
  分类: 概念·观念
  解释: |
    佛教禅宗用语，意为"不执著停留于任何一处"。源于"無住"概念——心不执著于善恶、有无、内外等一切二元对立，不住于空亦不住于不空，达到自由无碍的境界。《金刚经》云"应无所住而生其心"，《六祖坛经》以"无念为宗、无相为体、无住为本"。在日语中，"一所不住"亦指修行僧人不固定居于一寺，而是云游四方修行，与"雲水"（旅僧）同义。在《我是猫》中，猫提及此语作为治疗逆上的药方——效仿云水僧四处云游的做派。
  书中原文: |
    一所不住の沙門
  网络来源: https://zh.wikisource.org/zh-hant/%E4%BD%9B%E5%AD%B8%E5%A4%A7%E8%BE%AD%E5%85%B8/%E4%BD%8F%E7%84%A1%E4%BD%8F%E8%99%95

- 名词: 沙門
  分类: 概念·观念
  解释: |
    佛教术语，梵语"Śramaṇa"的音译，意为"勤息"（勤修善法、止息恶行），指出家修行者（僧侣）的总称。源自古代印度出家修行传统，佛教兴起后成为僧侣的通用名称。沙门须遵守戒律、剃发染衣、乞食为生，以解脱轮回为最终目标。《四十二章经》曰："辞亲出家，识心达本，解无为法，名曰沙门。"在《我是猫》中提到"一所不住の沙門"，指不居一处的云水行脚僧，以示治疗逆上可效仿僧人行脚散心。
  书中原文: |
    一所不住の沙門
  网络来源: https://zh.wikisource.org/zh/%E4%BD%9B%E5%AD%A6%E5%A4%A7%E8%BE%9E%E5%85%B8/%E6%B2%99%E9%96%80

- 名词: 膃肭臍
  分类: 物件·工艺
  解释: |
    日语中海狗（北海狮/海狗）的名称，读音为"オットセイ"。汉字"膃肭臍"源自中药名"腽肭脐"（海狗鞭，即海狗的阴茎与睾丸，被视为强精壮阳药材），江户时代从中国传入日本后逐渐被当作动物本身的称呼。词源也可能受阿伊努语"オンネㇷ゚"（海中的大型动物）影响。现代日语中一般用片假名"オットセイ"书写。在《我是猫》中，猫用膃肭臍比喻落云馆学生在北侧空地上悠哉晒太阳的样子，随即被密猟船（偷偷赶来的教师）惊散。
  书中原文: |
    膃肭臍がひなたぼっこをしているところへ密猟船が向ったような者だ。
  网络来源: https://zh.m.wiktionary.org/zh-hant/%E8%86%83%E8%82%AD%E8%87%8D

- 名词: 桐
  分类: 物件·工艺
  解释: |
    泡桐（Paulownia），日本文化中具有重要象征意义的树木。桐纹是日本仅次于菊花纹的高贵家纹，约140种以上变体。五七桐花紋现为日本政府及内阁总理大臣的徽章，亦见于500日元硬币图案。源于中国传说"凤凰非梧桐不栖"，自平安时代起被皇室用作副纹，后由天皇下赐给足利尊氏、丰臣秀吉等权臣。江户时期约22%的武家使用桐纹。在《我是猫》中，落云馆学生特意徘徊在桐树附近以吸引教师注意，显示了桐树在校园中的标志性位置。
  书中原文: |
    必ず桐の木の附近を徘徊してわざと主人の眼につくようにする。
  网络来源: https://zh.m.wikipedia.org/wiki/%E4%BA%94%E4%B8%83%E6%A1%90

- 名词: 馬鹿大名
  分类: 概念·观念
  解释: |
    日语词组，意为"愚蠢的大名（封建领主）"。大名是日本江户时代领有万石以上知行的地方领主。"馬鹿大名"并非正式历史分类，而是对愚昧无能、骄奢淫逸的领主的揶揄称呼。"馬鹿"一词的来源有秦代赵高"指鹿为马"典故说和梵语"moha"（愚痴）说等。在《我是猫》中，猫将热衷于捉弄他人取乐者类比为因极度无聊而胡闹的"馬鹿大名"，讽刺其以此排遣退屈的愚蠢行径。
  书中原文: |
    からかうと云う娯楽に耽るものは人の気を知らない馬鹿大名のような退屈の多い者、もしくは自分のなぐさみ以外は考うるに暇なきほど頭の発達が幼稚で、しかも活気の使い道に窮する少年かに限っている。
  网络来源: https://baike.baidu.com/item/%E9%A9%AC%E9%B9%BF/14681896

- 名词: 交番焼打
  分类: 事件·典故
  解释: |
    指1905年（明治38年）9月发生的日比谷纵火事件（日比谷焼打事件）。日俄战争结束后，《朴茨茅斯条约》因未获得战争赔款引发国民极大不满，民众在日比谷公园召开反和约国民大会后暴动化，袭击并焚烧内务大臣官邸、国民新闻社以及约219处派出所（交番），占全东京派出所的约七成。政府颁布戒严令加以镇压，死17人、伤500余人，拘捕2000余人。在《我是猫》中，猫引用该事件来比喻体内血液集中逆行时的状态——如同交番警察悉数集合于总部、街区空无一人。
  书中原文: |
    ちょうど交番焼打の当時巡査がことごとく警察署へ集って、町内には一人もなくなったようなものだ。
  网络来源: https://baike.baidu.com/item/%E6%97%A5%E6%AF%94%E8%B0%B7%E7%87%92%E6%89%93%E4%BA%8B%E4%BB%B6/2496072

- 名词: 呑舟の魚
  分类: 事件·典故
  解释: |
    中国古代典故，出自《庄子·庚桑楚》《列子·杨朱》《史记·酷吏列传》等多部典籍，字面意为"能吞下船的巨大鱼"。比喻极其巨大的存在——既可指伟大的人物或贤者，也可指罪恶滔天的重犯（"网漏吞舟之鱼"指法网疏漏致大恶人逃脱）。《庄子》云"吞舟之鱼，砀而失水，则蚁能苦之"，以巨鱼离水不如蚂蚁的对比阐述环境的重要性。在《我是猫》中，猫将此语比喻主人公逻辑中比四目栅栏洞孔更大的漏洞——"呑舟の魚をも洩らすべき大穴"。
  书中原文: |
    この垣よりも大いなる穴がある。呑舟の魚をも洩らすべき大穴がある。
  网络来源: https://baike.baidu.com/item/%E5%90%9E%E8%88%9F%E4%B9%8B%E9%B1%BC

- 名词: 遊弋
  分类: 事件·典故
  解释: |
    原为军事用语，指舰船在某一海域内巡航、巡逻警戒。出自中国南北朝时期的史书《南史·樊毅传》"于白下游奕（弋）"，清代文献亦记载英国军舰于闽浙洋面"游弋"。近代日语中沿用此词，用于描写舰队在海上巡逻警戒的军事行动，也可引申为自由游荡。在《我是猫》中，猫用"遊弋"一词形容落云馆学生们在北侧空地悠然徘徊、边警戒边活动的状态，赋予日常以军事诙谐色彩。
  书中原文: |
    捕えらるる危険のない所で遊弋をしている。
  网络来源: https://baike.baidu.com/item/%E6%B8%B8%E5%BC%8B/6041881

- 名词: 逆上
  分类: 概念·观念
  解释: |
    日语词，读作"ぎゃくじょう"，指因极度愤怒或兴奋导致"血冲上头"、失去冷静的精神状态。源于日语动词"逆上せる（のぼせる）"，字面义为"向上逆行"。在夏目漱石笔下，逆上被置于西方四体液说的框架中来解读——血液全身仅五升五合（约合1升），当全部逆行集中到头部时，其他部位便缺血发冷，引发暴怒或亢奋。在《我是猫》中，猫以大量篇幅戏谑地分析"逆上"的病理机制，并将由此引发的主人愤怒与学生冲突视为一个核心喜剧动力。
  书中原文: |
    教師が職業であるか、戦争が本務であるかちょっと分らないくらい逆上して来た。この逆上の頂点に達した時に下の事件が起ったのである。
  网络来源: https://zh.m.wiktionary.org/zh/%E9%80%86%E4%B8%8A

- 名词: 奔命
  分类: 事件·典故
  解释: |
    源自古代汉语成语"疲于奔命"，出自《左传·成公七年》。春秋时期，楚国申公巫臣因族人被子重、子反杀害而怀恨在心，逃至吴国训练吴军，教其车战射法，唆使吴国连年袭击楚国边境，致使子重、子反一年之中奉命率军往返奔波七次之多，精疲力竭——"余必使尔罢于奔命以死"。后泛指为完成使命而四处奔走、疲惫不堪。在《我是猫》中，猫以此形容主人在教室与后架之间来回奔波却抓不到学生的狼狈之态。
  书中原文: |
    奔命に疲れるとはこの事である。
  网络来源: https://www.jswmb.cn/article/4107/19906.html

- 名词: 密猟船
  分类: 物件·工艺
  解释: |
    指非法捕捞（偷猎）海兽的船只。明治时期（1870-1880年代），千岛列岛周边海域常有外国船只非法猎捕海獭、海豹等海兽（主要用于获取珍贵毛皮），日本开拓使对此类"密猟船"屡禁不止。在《我是猫》中，猫用"密猟船"来比喻悄悄靠进、试图抓学生的教师——正如膃肭臍（海狗）在晒太阳时遭遇偷猎船一拥而上的窘境，学生们的"阵地"也面临教师的搜捕。
  书中原文: |
    膃肭臍がひなたぼっこをしているところへ密猟船が向ったような者だ。
  网络来源: https://gjs.ioc.u-tokyo.ac.jp/ja/events/post/20170710_gjs_seminar/

- 名词: 落雲館
  分类: 地点
  解释: |
    夏目漱石小说《我是猫》中虚构的中学校名，其原型一般认为是位于东京都文京区的郁文馆中学（现郁文馆中等学校·高等学校）。郁文馆成立于1889年（明治22年），夏目漱石曾居住在其邻接地（早稻田南町），透过自家窗户可观察到学校的日常。漱石以这座学校为蓝本创造了"落雲館"这一地名，并在小说中将之设定为主人公苦沙弥先生授课学校的邻校，其学生时常翻越栅栏来捉弄教师。落雲館也是作品中猫视角下教师与学生"战争"的主要舞台之一。
  书中原文: |
    主人は教師である。落雲館の教師ではないが、やはり教師に相違ない。
  网络来源: https://baijiahao.baidu.com/s?id=1766832955523161850

- 名词: 四寸角
  分类: 物件·工艺
  解释: |
    日本传统尺贯法中的尺寸，四寸见方（约12厘米×12厘米）的方形空间。寸是尺贯法的基本长度单位，1寸约3.03厘米。四寸角即约12厘米见方的孔洞。在日本木造建筑中，"四寸角"也指120毫米见方的角柱料。在《我是猫》中，指四目栅栏（四つ目垣）的竹编方孔，猫称其孔之小连以身体柔软著称的清国奇术师张世尊也无法穿越——但学生们根本无需钻洞，只需一跃而过即可翻越栅栏，辛辣讽刺了主人自以为是的逻辑。
  书中原文: |
    この竹をもって組み合せたる四寸角の穴をぬける事は、清国の奇術師張世尊その人といえどもむずかしい。
  网络来源: https://www.homemesh.com.tw/item/17463/3

- 名词: 君子
  分类: 概念·观念
  解释: |
    儒家经典中的核心道德人格概念，指具有高尚品德的人。孔子将"君子"从西周时期指称贵族（有位者）的身份概念革新为以道德为标准的理想人格——"君子喻于义，小人喻于利"。《论语》中"君子"共出现107次，涵盖仁、义、礼、智、勇、中庸等德目，追求"文质彬彬"的内外兼修。在日语中"君子"沿用此意。在《我是猫》中，猫讽刺落云馆校长声称建四目栅栏是防止学生翻入其庭院，实为培养"君子"——但君子绝不会翻墙潜入，言外之意这些学生根本不是君子。
  书中原文: |
    自分が養成する君子が潜られんために、わざわざ職人を入れて結い繞らせたのである。
  网络来源: https://www.aisixiang.com/data/126244.html
