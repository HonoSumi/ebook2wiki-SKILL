- 名词: 笊蕎麦
  分类: 物件·工艺
  解释: |
    日本传统冷荞麦面料理，将煮好的荞麦面用冷水冲洗沥干后盛放在竹编笊篱（笊/ざる）上，配以切海苔，蘸取特制酱汁（つゆ）食用。与"盛り蕎麦"（もりそば）的区别在于是否撒海苔——笊蕎麦撒有海苔，而盛り蕎麦没有。起源于江户时代中期，某店铺将荞麦面盛于竹笊上以防水分积聚影响口感，这一做法广受欢迎。明治时期，为与盛り蕎麦区分，笊蕎麦开始添加海苔并使用加入味醂的高级酱汁，成为更具格调的料理。作品中迷亭自费订购笊蕎麦送到苦沙弥家，展示其讲究的吃法。
  书中原文: |
    御三が御客さまの御誂が参りましたと、二個の笊蕎麦を座敷へ持って来る。
  网络来源: |
    https://www.foodinjapan.org/zh/%e6%97%a5%e6%9c%ac/%e6%9c%ad%e9%ad%af%e8%95%8e%e9%ba%a5%e9%ba%b5/
    https://www.mgcic.com/articles/961

- 名词: 蒸籠
  分类: 物件·工艺
  解释: |
    日本传统竹制蒸笼（Seiro），通常以木框和芦苇编织的底部构成，置于锅上用于蒸制食材。在荞麦面文化中，"蒸籠"也指用于盛放荞麦面的小竹笼屉（此时写为"せいろ"），是盛り蕎麦中的标准容器。蒸笼起源于中国，经由朝鲜半岛传入日本，江户时代随荞麦面文化的兴盛而普及。作品中迷亭打开蒸笼的盖子开始吃荞麦面。
  书中原文: |
    と云って蒸籠の蓋をとる。
  网络来源: |
    https://www.edrdg.org/jmwsgi/entr.py?svc=jmdict&sid=&e=2007075

- 名词: 杉箸
  分类: 物件·工艺
  解释: |
    用日本柳杉（杉/すぎ）木材制作的一次性筷子，属于日本传统"割箸"（わりばし，即一次性筷子）的一种。杉木质地轻柔，带有天然清香，表面未经涂漆而保留木材纹理，摩擦力较大，特别适合夹取滑溜的荞麦面、素面和汤豆腐等料理。日本茶圣千利休（千利休）在款待宾客时亲手削制杉木筷子，后演变为"利休箸"的传统。杉箸体现了日本料理"一期一会"的文化精神——每次款待都是独一无二的，用即弃。作品中迷亭用杉箸挑起长长的荞麦面，展示其独特的吃面方式。
  书中原文: |
    と云いながら杉箸をむざと突き込んで出来るだけ多くの分量を二寸ばかりの高さにしゃくい上げた。
  网络来源: |
    https://jlearn.net/dictionary/%E6%9D%89%E7%AE%B8
    https://web.archive.org/web/20141017170837/http://news.ltn.com.tw/news/opinion/paper/789653

- 名词: 山葵
  分类: 物件·工艺
  解释: |
    日本原产的一种辛辣调味植物（学名：Eutrema japonica），中文常误称为"芥末"。其食用部位为地下茎，磨碎后产生独特的芳香和辛辣感，与鱼类和荞麦面等料理搭配使用。山葵对生长环境要求极高——需清澈流动的溪水灌溉、夏季水温不超过16°C，栽培难度大，静冈县和长野县是主要产地。最早在飞鸟时代即作为药用植物被记录，江户时代开始人工栽培，19世纪初普及于握寿司。山葵具有强力的杀菌防腐作用，因此常与生鱼片搭配。作品中迷亭在食用荞麦面时加入大量山葵，被主人苦沙弥提醒会太辣。
  书中原文: |
    君そんなに山葵を入れると辛いぜ
  网络来源: |
    https://www.kinjirushi.co.jp/schinese/wasabi/history/
    https://web-japan.org/niponica/niponica13/zh/feature/feature07.html

- 名词: 薬味
  分类: 概念·观念
  解释: |
    日本料理中用于增添风味、去除腥膻而少量添加的芳香性调味料总称。"薬味"一词由"薬"（药材）和"味"（味道）组成，源于药食同源的中药哲学。荞麦面和乌冬面的代表薬味包括：青葱、生姜、山葵、大叶（紫苏）、七味唐辛子、白萝卜泥等。江户时代随着荞麦面文化的盛行，薬味的使用更加多样化，生药铺和神社门前开始销售七味唐辛子等复合薬味。作品中迷亭将薬味倒入酱汁中胡乱搅拌，展示其不拘小节的性格。
  书中原文: |
    薬味をツユの中へ入れて無茶苦茶に搔き廻わす。
  网络来源: |
    https://allabout-japan.com/zh-tw/article/23/
    https://www.jstage.jst.go.jp/article/jjhp/51/1/51_11/_article/-char/ja

- 名词: 饂飩
  分类: 物件·工艺
  解释: |
    日本传统小麦粉面条（Udon），中文音译为"乌冬面"。面条粗而圆滑，通常直径在1.7毫米以上，口感柔软而有弹性。根据日本农林规格（JAS），圆面直径1.7mm以上、角面宽度1.7mm以上方被定义为饂飩。起源于奈良时代从中国传入的"索饼"和"餺飥"等面食，经空海大师（弘法大师）从唐朝带回制面技术后在赞岐（今香川县）发展，江户时代酱油普及后成为大众饮食文化的重要组成部分。日本三大乌冬面为赞岐乌冬面、稻庭乌冬面和冰泽乌冬面。作品中主人苦沙弥说自己喜欢饂飩，被迷亭调侃"饂飩是马夫吃的东西"。
  书中原文: |
    「僕は饂飩が好きだ」「饂飩は馬子が食うもんだ」
  网络来源: |
    https://zh.wikipedia.org/zh-hans/%E7%83%8F%E9%BE%8D%E9%BA%B5
    https://www.roomie.tw/posts/65454

- 名词: 馬子
  分类: 人物
  解释: |
    日本江户时代以马匹承载货物和乘客的运输业者，亦称"馬方"或"馬借"。江户幕府在五街道的驿站（宿場）设置"傳馬問屋"，配备马匹和人夫，以接力方式运送人员和物资，形成维持全国交通命脉的"傳馬制度"。马子这一职业随着大八车（货运大板车）的出现而衰落。日语谚语"馬子にも衣装"（马子穿上好衣裳也像样）由此职业而来。作品中迷亭以"饂飩是马子吃的东西"来贬低乌冬面，抬高荞麦面的地位，反映了江户时代以来"关东吃荞麦、关西吃乌冬"的饮食文化差异和阶层趣味。
  书中原文: |
    「僕は饂飩が好きだ」「饂飩は馬子が食うもんだ」
  网络来源: |
    https://zh.m.wiktionary.org/zh/%E9%A6%AC%E5%AD%90
    http://digitalmuseum.city.nonoichi.ishikawa.jp/3_tc/cms/modules/plist2/index.php?page=detail&lid=67&seq=40&orderby=lidA&mode=0&show=500&min=0

- 名词: アーキミジス
  分类: 人物
  解释: |
    古希腊数学家、物理学家及发明家阿基米德（Archimedes，约公元前287—前212年）的日语译名之一。"アーキミジス"源于希腊语"Ἀρχιμήδης"（Arkhimēdēs）的直接音译，与经由拉丁语传入的标准日语译名"アルキメデス"有所区别。小说中迷亭将阿基米德原理（浮力原理）幽默地应用于荞麦面蘸酱汁的场景——正如阿基米德所说，浸入水中的物体排开与自身体积相等的水，面条浸入酱汁后酱汁体积也随之增加，导致碗中溢出。这是漱石擅长的将古典学术知识与日常琐事相联系的谐谑手法。
  书中原文: |
    アーキミジスの理論によって、蕎麦の浸った分量だけツユの嵩が増してくる。
  网络来源: |
    https://www.edrdg.org/jmwsgi/entr.py?svc=jmdict&e=2236922
    https://zh.wiktionary.org/wiki/%D0%90%D1%80%D1%85%D0%B8%D0%BC%D0%B5%D0%B4

- 名词: 蛙の眼球
  分类: 概念·观念
  解释: |
    《我是猫》中角色寒月（理学士）的博士论文研究主题，全称为"蛙の眼球の電動作用に対する紫外光線の影響"（紫外线对青蛙眼球的电动作用的影响）。这是夏目漱石对明治时期学院派学术研究中脱离现实、追求细枝末节的倾向所进行的讽刺。该研究主题极度专业化且显得滑稽可笑——寒月为了做实验还需要亲手打磨一个完美的玻璃球体来代替青蛙的眼球晶状体，而打磨过程本身就需要十年以上。迷亭更以此取笑寒月，称其为"磨球博士"。这一情节也是漱石对当时知识阶层"为学问而学问"、脱离社会实际的风气的典型揶揄。
  书中原文: |
    「蛙の眼球の電動作用に対する紫外光線の影響と云うのです」
  网络来源: |
    https://book.douban.com/people/46655563/annotation/26410730/

- 名词: 硝子の球
  分类: 物件·工艺
  解释: |
    小说中寒月为其博士论文实验而制作的玻璃球体。寒月试图制造一个完全符合几何定义的理想球体，以替代青蛙眼球晶状体进行光学实验。然而完美球体在现实中不可能实现，他不断打磨却陷入恶性循环——修正一侧半径则另一侧变长，修正后整体又扭曲变形。从最初苹果大小逐渐磨到草莓大小、再到大豆大小，已报废六个玻璃球。寒月预计完成需要十年乃至二十年。这一情节是夏目漱石对当时知识界过度追求形式完美的讽刺——学者耗费毕生精力追求纯粹理论上的精确，却与现实生活完全脱节。
  书中原文: |
    まず丸い硝子の球をこしらえてそれからやろうと思っています
  网络来源: |
    http://datongshuhua.cn/page101?article_id=1316&pagenum=63

- 名词: 新撰蒙求
  分类: 物件·工艺
  解释: |
    小说中角色迷亭虚构的一部书名，讽刺性地模仿唐代李翰编纂的中国童蒙教育经典《蒙求》。《蒙求》是中国古代以历史典故编成四字对句的启蒙教材，宋代徐子光加注后广为流传。该书在平安时代传入日本，江户时代成为寺子屋和藩校中汉文教育的标准教科书，日本学者如冈白驹、佐佐木向阳等为其作笺注并出版"和刻本"。迷亭提议将寒月的磨玻璃球和老梅发疯等丑事编入"新撰蒙求"，作为好坏典型教育的反面教材，是漱石借古典教材之名行当代讽刺之笔的文学手法。
  书中原文: |
    老梅君と君とは反対の好例として新撰蒙求に是非入れたいよ
  网络来源: |
    https://catalog.princeton.edu/catalog/SCSB-13132645
    https://mbook.kongfz.com/518801/9897735343/

- 名词: 老梅
  分类: 人物
  解释: |
    夏目漱石《我是猫》中的配角人物，全名立町老梅，是苦沙弥和迷亭的旧相识。性格贪吃，被朋友戏称为"猪仙"（猪の仙人）。后来精神失常，自称"天道公平"（亦写为"孔平"），以"替天行道、普度众生"为己任。曾给苦沙弥寄去用清国红色信封写就的长信，内容颠三倒四——"那棵松树下没有飞来炸肉排吗""鱼糕坐在木板上游泳"等荒诞无稽的段落，苦沙弥起初郑重阅读，得知是疯人所写后懊恼不已。最终被关入巢鸭疯人院。老梅是漱石用来讽刺明治时期脱离现实、言行怪诞的知识分子形象群的一员。
  书中原文: |
    偶然老梅君に出逢ったのさ。あの男が卒業後図書館に足が向くとはよほど不思議な事だと思って
  网络来源: |
    https://wapbaike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392

- 名词: 脱兎
  分类: 概念·观念
  解释: |
    日语四字熟语，意为"如惊逃的兔子般极其迅速的动作"。源出中国古代兵法书《孙子·九地篇》："始如处女，敌人开户；后如脱兔，敌不及拒"（始めは処女の如く、後は脱兎の如し）。原指军事上先以静弱示敌使其松懈，后以雷霆之势突袭使之无法防备的战术，后转义为形容动作极为迅捷。小说中用于描写迷亭以极快的速度将超长的荞麦面一口吞下的场面，是漱石以古典军事典故谐谑日常琐事的典型笔法。
  书中原文: |
    たちまち脱兎の勢を以て、口を箸の方へ持って行ったなと思う間もなく、つるつるちゅうと音がして咽喉笛が一二度上下へ無理に動いたら箸の先の蕎麦は消えてなくなっておった。
  网络来源: |
    https://baike.baidu.com/item/%E8%84%B1%E5%85%94/1018563
    http://www.jmdict.org/jmwsgi/entr.py?svc=jmdict&sid=&disp=jel&e=2097706
