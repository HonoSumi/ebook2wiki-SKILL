- 名词: "古毛布"
  分类: "物件·工艺"
  解释: "古旧的毛织毯子。\"毛布\"（もうふ）在日语中指毛毯、绒毯，\"古毛布\"即旧毛毯。明治时期日本进口西洋毛织品，毛毯成为家庭常见用品。在作品中，主人苦沙弥将古毛布扔进书房，后被阴士（盗贼）用来包裹盗品。"
  书中原文: "主人が書斎へ放り込んだ古毛布である"
  网络来源: "https://baike.baidu.com/item/%E6%AF%9B%E6%AF%AF/11033852"

- 名词: "唐桟"
  分类: "物件·工艺"
  解释: "江户时代从印度经中国传入日本的棉织条纹布。名称来源于印度港口\"圣多默\"（São Tomé），日语读作\"とうざん\"。以细密纵条纹为特征，多用红、蓝、白、黄等色，江户后期至明治时代在庶民中广泛流行，常被用于制作半缠（和服短外套）。具有丝绸般的光泽，被称为\"绵的丝绸\"。"
  书中原文: "唐桟の半纏に"
  网络来源: "https://baike.baidu.com/item/%E5%94%90%E6%A1%9F/10956882"

- 名词: "半纏"
  分类: "物件·工艺"
  解释: "日式短外套，和服的一种，无衬里或加棉，长至腰臀。汉字的\"袢纏\"\"半纏\"通用，起源于江户时代，最初为庶民和职人的劳动服。明治以后作为日常和服外套广泛使用。其特征是前襟交叉，以细带系结，袖口较窄便于活动。作品中盗贼身穿唐桟布制的半缠。"
  书中原文: "唐桟の半纏に"
  网络来源: "https://www.wikiwand.com/zh-tw/articles/%E5%8D%8A%E7%BA%8F"

- 名词: "御納戸"
  分类: "物件·工艺"
  解释: "日本传统色之一，深蓝中带微绿的沉静色调，江户时代极为流行。\"御納戸\"（おなんど）语源来自纳户（储藏室），因纳户帘幕使用此色而得名。江户时代男性着物最喜好的色系之一，后也用于女性衣物。在作品中指御纳户色的博多带。"
  书中原文: "御納戸の博多の帯を尻の上にむすんで"
  网络来源: "https://zh.wikipedia.org/zh-cn/%E6%97%A5%E6%9C%AC%E4%BC%9C%E7%B5%B1%E8%89%B2"

- 名词: "博多帯"
  分类: "物件·工艺"
  解释: "福冈博多地区生产的传统绢织腰带，属于博多织的一种。起源于镰仓时代，南宋僧人将织造技术带回博多。江户时代黑田长政将其作为献上品进贡将军家，故称\"献上博多带\"。以\"独钴(佛具)\"\"华皿\"\"縞(条纹)\"三种纹样为特征，质地厚实硬挺，系结后不易松缓，是日本最具代表性的和服腰带之一。"
  书中原文: "御納戸の博多の帯を尻の上にむすんで"
  网络来源: "https://www.crossroadfukuoka.jp/cn/spot/12610"

- 名词: "皮癬病"
  分类: "概念·观念"
  解释: "日语\"皮癬病\"（ひぜんびょう）即皮肤癣菌病，俗称金钱癣、环状癣，由真菌感染引起的皮肤病，症状为圆形红斑、瘙痒、脱屑。在作品中，猫形容主人抓痒的动作\"像患皮癣般抓挠\"，生动刻画了主人苦沙弥不拘小节、粗俗的形象。"
  书中原文: "黒い腕を皮癬病みのようにぼりぼり搔く"
  网络来源: "https://baike.baidu.com/item/%E7%9A%AE%E7%99%A3/10085165"

- 名词: "柳行李"
  分类: "物件·工艺"
  解释: "用柳条（杞柳的枝条）编成的带盖箱形容器，日语读作\"やなぎごうり\"。柳条经水浸泡软化后编织而成，轻便牢固，用于收纳衣物、小物或旅行时搬运。明治至昭和初期是日本家庭常见的收纳用具，中文称\"柳条包\"或\"柳条箱\"。在作品中，柳行李被置于六叠房间的角落。"
  书中原文: "柳行李の辺から吾輩の頭の上を越えて壁の半ばが真黒になる"
  网络来源: "http://jc.newdu.com/214076.html"

- 名词: "肥前国"
  分类: "地点"
  解释: "日本古代令制国之一，属西海道，领域相当于现在的佐贺县和长崎县本土部分。与肥后国（现熊本县）相对，取\"肥之国\"的前后之分。肥前国是日本西南的重要地区，唐津是其港口城市之一。明治废藩置县后被分割为佐贺县和长崎县。"
  书中原文: "肥前の国は唐津の住人多々良三平君"
  网络来源: "https://zh.wikipedia.org/zh-cn/%E8%82%A5%E5%89%8D"

- 名词: "唐津"
  分类: "地点"
  解释: "日本佐贺县西北部的港口城市，面向玄界滩。历史上是肥前国的重要贸易港口，因与中国唐朝最早接触的港口而得名。江户时代为唐津藩的城下町，以唐津城为中心发展。唐津焼（陶瓷）是日本著名传统工艺品。作品中多々良三平是唐津出身的住人。"
  书中原文: "肥前の国は唐津の住人多々良三平君"
  网络来源: "https://baike.baidu.com/item/%E5%94%90%E6%B4%A5/22109253"

- 名词: "多々良三平"
  分类: "人物"
  解释: "夏目漱石《我是猫》中登场的重要人物之一。原为苦沙弥家的书生，后毕业于法科大学，在某公司矿山部任职，是新兴实业家的代表。性格圆滑世故、善于社交，与大资本家金田之女结婚，最终导致猫溺死的啤酒就是由他带来。与苦沙弥、迷亭等清高迂腐的知识分子形成鲜明对比，是漱石用以批判明治物质主义、实利主义的反面角色。"
  书中原文: "多々良三平君はもとこの家の書生であったが今では法科大学を卒業してある会社の鉱山部に雇われている"
  网络来源: "https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392"

- 名词: "山の芋"
  分类: "物件·工艺"
  解释: "日语中指山药、薯蓣，日本原产的一种山芋，属于 Dioscorea 属。比市售的长芋更黏稠、风味更浓，可生吃或磨成泥做とろろ汁。在作品中，唐津出身的乡人多々良三平作为土特产带来山芋一箱，放置在女主人枕边。后盗贼将此箱山芋误当作贵重物品偷走，成为令人啼笑皆非的幽默情节。"
  书中原文: "山の芋を枕元へ飾って寝るのはあまり例のない話しではあるが"
  网络来源: "https://baike.baidu.com/item/%E5%B1%B1%E8%8D%AF/18958343"

- 名词: "三盆"
  分类: "物件·工艺"
  解释: "日本传统精制砂糖，全称\"和三盆\"（わさんぼん），产于香川（赞岐）和德岛（阿波）。原料为\"竹糖\"品种的甘蔗，经压榨、熬煮后在盆中手工反复研磨三次而得名。色泽淡黄，颗粒细腻，口感温润甘甜，入口即化。江户时代起用于高级和果子制作，与粗糖相对。作品中女主人将三盆糖收进衣柜，暗示其不讲究收纳的糊涂性格。"
  书中原文: "煮物に使う三盆を用簞笥へ入れるくらい場所の適不適と云う観念に乏しい女である"
  网络来源: "https://baike.baidu.com/item/%E5%92%8C%E4%B8%89%E7%9B%86/15609240"

- 名词: "箪笥"
  分类: "物件·工艺"
  解释: "日式衣橱、衣柜，汉字写作\"箪笥\"，读作\"たんす\"。日本传统家具，用木材或竹材制成，带抽屉，用于收纳衣物、小物。是日本家庭必备的收纳家具。江户时代后期逐渐定型为现代样式，明治时代随着生活西化，箪笥的设计与功能也相应发展。作品中讽刺女主人不懂收纳，将三盆糖放进箪笥。"
  书中原文: "煮物に使う三盆を用簞笥へ入れるくらい場所の適不適と云う観念に乏しい女である"
  网络来源: "https://baike.baidu.com/item/%E7%A8%9E%E7%AC%97/11027398"

- 名词: "兵古帯"
  分类: "物件·工艺"
  解释: "日语\"兵児帯\"（へこおび），一种柔软的筒状腰带，用布直接缝制而不加芯材，不打折。原为男性或儿童用的轻便腰带，因质地柔软、系结方便而广泛使用。不同于正式场合用的硬质角带，兵古带属休闲和服带。在作品中，盗贼用女主人遗落的丝绸兵古带来捆绑山芋箱。"
  书中原文: "陰士は山の芋の箱をこの帯でしっかり括って"
  网络来源: "http://jc.newdu.com/194902.html"

- 名词: "ちゃんちゃん"
  分类: "物件·工艺"
  解释: "亦称\"ちゃんちゃんこ\"，日式幼儿穿的无袖或短袖棉袄外套，通常加棉保暖，是日本传统儿童服装的一种。在作品中，盗贼将小孩的\"ちゃんちゃん\"两件塞入主人衣物中盗走。"
  书中原文: "小供のちゃんちゃんを二枚"
  网络来源: "https://baike.baidu.com/item/%E5%92%8C%E6%9C%8D/179108"

- 名词: "めり安"
  分类: "物件·工艺"
  解释: "日语\"メリヤス\"（莫大小/目利安）的汉字表记，来自葡萄牙语 meias，指南蛮贸易传入日本的针织品。最初指针织袜，后泛指编织物、针织布。明治时代发展为日本近代纺织业的重要品类，用于制作内衣、袜子等。在作品中指主人苦沙弥的针织腿套（股引）。"
  书中原文: "主人のめり安の股引の中へ押し込むと"
  网络来源: "https://zh.m.wiktionary.org/zh-hant/%E7%9B%AE%E5%88%A9%E5%AE%89"

- 名词: "股引"
  分类: "物件·工艺"
  解释: "日语读作\"ももひき\"，日本传统男性下装，形似紧身裤，从腰部包裹至脚踝。原为劳动用或武士的防具内衬，江户末期至明治时代成为庶民日常衣着，尤其用于防寒。在现代日本祭典活动中仍能看到。在作品中盗贼将股引系在脖子上，滑稽可笑。"
  书中原文: "股のあたりが丸く膨れて青大将が蛙を飲んだような"
  网络来源: "https://baike.baidu.com/item/%E5%92%8C%E6%9C%8D/179108"

- 名词: "青大将"
  分类: "物件·工艺"
  解释: "日本锦蛇（学名 Elaphe climacophora），日本特有的大型无毒蛇，全长可达2米。体色以褐色、青灰色为主。常见于山林、农田甚至人类住宅附近，以鼠类为食，被视为益蛇。日语汉字名\"青大将\"因其青灰色体色和威武的形态。在作品中用于比喻盗贼腰部鼓起的滑稽模样——像青大将吞了青蛙。"
  书中原文: "股のあたりが丸く膨れて青大将が蛙を飲んだような"
  网络来源: "https://www.wikiwand.com/zh/articles/%E6%97%A5%E6%9C%AC%E9%8C%A6%E8%9B%87"

- 名词: "紬"
  分类: "物件·工艺"
  解释: "日语读作\"つむぎ\"，用紬丝（野蚕丝或废茧丝纺成的粗丝）织成的平纹丝织物。比普通绢织物更厚实耐磨，风格质朴，是日本传统丝织品中的日常实用类别。因质地结实、价格适中，明治时期广泛用于制作日常和服。著名的紬产地有结城、大岛等。在作品中指主人的紬质外褂。"
  书中原文: "主人の紬の上着を大風呂敷のように拡げて"
  网络来源: "https://baike.baidu.com/item/%E7%B4%AC%E7%BB%87/10829939"

- 名词: "羽織"
  分类: "物件·工艺"
  解释: "日式传统外套，穿着在和服之上，长至腰臀或膝上。前开襟，用细带（羽织紐）系结。江户时代原为武士的正式外套，后普及至庶民。明治时代成为男性正式和服的重要组成部分，搭配纹付羽织袴则是最高的正式装束。在作品中盗贼将主人的羽织和腰带等一起用紬外褂包裹盗走。"
  书中原文: "細君の帯と主人の羽織と繻絆とその他あらゆる雑物を奇麗に畳んでくるみ込む"
  网络来源: "https://baike.baidu.com/item/%E7%BE%BD%E7%BB%87/23377395"

- 名词: "繻絆"
  分类: "物件·工艺"
  解释: "日语\"襦袢\"（じゅばん）的汉字表记，即和服内衣。穿在长着物和肌襦袢之间，主要功能是防止汗渍和皮脂污染外衣，只有领口部分露在外衣外面作为装饰。语源来自葡萄牙语 gibão（短上衣）。明治时代随着和服西化改良而普及。在作品中指盗贼一并盗走的和服内衣。"
  书中原文: "細君の帯と主人の羽織と繻絆とその他あらゆる雑物"
  网络来源: "https://zh.m.wiktionary.org/zh-hant/%E3%81%98%E3%82%85%E3%81%B0%E3%82%93"

- 名词: "帯上げ"
  分类: "物件·工艺"
  解释: "和服配件之一，穿在腰带（帯）上方束紧的细带或装饰带，用以提升和固定腰带的位置，同时也作为腰带装饰的一部分露出在外。原是男性用的实用束带，后来女性用带上げ演化出丰富的色彩和装饰性。在作品中盗贼将带上げ和しごき连接起来捆绑包裹。"
  书中原文: "細君の帯上げとしごきとを続ぎ合わせてこの包みを括って片手にさげる"
  网络来源: "https://baike.baidu.com/item/%E5%B8%A6%E4%B8%8A%E3%81%92/10706487"

- 名词: "しごき"
  分类: "物件·工艺"
  解释: "和服男带的一种，细长柔软的筒状束带，用于系在和服腰带外侧起到固定和装饰作用。也称\"しごき帯\"。原为武士或男性的实用束带，明治以后作为文士和服的配件之一。在作品中盗贼将带上げ和しごき连接起来作为捆绑包裹的绳子使用。"
  书中原文: "細君の帯上げとしごきとを続ぎ合わせてこの包みを括って片手にさげる"
  网络来源: "https://baike.baidu.com/item/%E3%81%97%E3%81%94%E3%81%8D/10657428"

- 名词: "袂"
  分类: "物件·工艺"
  解释: "和服袖子的下垂部分，即袖兜。日语读作\"たもと\"。和服袖口以下宽绰下垂的部分呈袋状，可以存放小物（如手帕、钱包等），因而\"袂\"也引申指\"袖中口袋\"。在作品中盗贼将朝日新闻的纸袋发现后\"ちょっと袂へ投げ込む\"，即随手塞进袖兜。"
  书中原文: "主人の頭の先に「朝日」の袋があるのを見付けて、ちょっと袂へ投げ込む"
  网络来源: "https://baike.baidu.com/item/%E8%A2%82/2752490"

- 名词: "ホヤ"
  分类: "物件·工艺"
  解释: "日语\"火屋\"的读音，指油灯、煤油灯上覆盖火焰的玻璃灯罩（lamp chimney）。明治时代随着西洋煤油灯的普及而进入日本，用于防风、稳定燃烧和扩散光线。乳白色的玻璃灯罩（乳色ホヤ）能柔化光线，营造温馨氛围。在作品中描写盗贼点烟时烟雾缭绕乳白色灯罩的情景。"
  书中原文: "旨まそうに深く吸って吐き出した煙りが、乳色のホヤを繞ってまだ消えぬ間"
  网络来源: "https://zh.m.wiktionary.org/wiki/%E7%81%AB%E5%B1%8B"

- 名词: "巡査"
  分类: "历史·事件"
  解释: "日本警察官的一种，相当于巡查/巡警。明治时代自1871年（明治4年）建立近代警察制度，1875年将\"逻卒\"改称\"巡查\"，后成为警察最基层的阶位。由被称为\"日本警察之父\"的川路利良主导建设，参照欧洲特别是法国模式。明治时期巡查身穿制服，配置于全国交番（派出所），是民众最常接触的警察官。"
  书中原文: "勝手口に主人夫婦が巡査と対談をしている時であった"
  网络来源: "https://baike.baidu.com/item/%E5%B7%9D%E8%B7%AF%E5%88%A9%E8%89%AF/5891610"

- 名词: "盗難告訴"
  分类: "概念·观念"
  解释: "盗难（盗窃案）被害者向司法机关提出的控诉。日本明治时代根据1882年施行的治罪法建立近代刑事告诉制度。被害者可以书面或口头向警察、检事或预审判事提出告诉，需署名捺印，受理后由司法警察官调查、检事搜查、预审判事审理。在作品中有对该制度的幽默描写。"
  书中原文: "品物は一々かくんですか。ええ羽織何点代価いくらと云う風に表にして出すんです"
  网络来源: "https://www.faxin.cn/lib/Flwx/FlqkContent.aspx?gid=F244688"

- 名词: "黒繻子"
  分类: "物件·工艺"
  解释: "黑色绸缎织物。\"繻子\"（しゅす）是日语中缎子的名称，指经浮组织（经线浮在纬线上）的丝绸织品，表面光滑有光泽。黑色缎子质地厚重、光泽优雅，明治时代常被用于制作女性礼服用腰带。在作品中女主人描述被盗的腰带是\"黑绳子和丝绸的腹合せ带（黑缎和缩缅拼接腰带）\"。"
  书中原文: "黒繻子と縮緬の腹合せの帯一筋"
  网络来源: "https://baike.baidu.com/item/%E7%BC%8E%E5%AD%90/10101337"

- 名词: "糸織"
  分类: "物件·工艺"
  解释: "丝织品的通称，特指用茧丝织成的平纹或斜纹面料。日语\"糸織\"（いとおり）指丝线织成的布，质地上乘。明治时代日本丝织品是重要出口产业。在作品中女主人称被偷的羽织是\"糸織\"，且强调是河野叔母的遗物，质地不同于现在的产品，暗示明治时代丝织品质量的变迁。"
  书中原文: "糸織の羽織です、あれは河野の叔母さんの形身にもらったんで"
  网络来源: "https://baike.baidu.com/item/%E4%B8%9D%E7%BB%87/10812546"

- 名词: "黒足袋"
  分类: "物件·工艺"
  解释: "黑色足袋，日本传统分趾袜。足袋（たび）是日本穿木屐或草履时配套的袜子，大脚趾与其他四趾分开。黑色的足袋是明治时代普及的男性用正式足袋，常用于礼仪场合或制服搭配。在作品中女主人报告被盗物品中有一双黑色的足袋，价值二十七钱。"
  书中原文: "黒足袋が一足。御前のか。あなたんでさあね。代価が二十七銭"
  网络来源: "https://baike.baidu.com/item/%E8%B6%B3%E8%A2%8B/10706493"

- 名词: "とろろ汁"
  分类: "物件·工艺"
  解释: "日本传统料理，将山药（特别是自然薯/野生山芋）磨成泥状，加入高汤、酱油、味醂等调味制成的黏稠汤汁。通常浇在米饭上食用（とろろかけご飯），营养丰富、口感滑润。是日本山间乡土料理的代表之一。在作品中主人调侃说，盗贼偷山药可能是准备做とろろ汁食用。"
  书中原文: "山の芋まで持って行ったのか。煮て食うつもりか、とろろ汁にするつもりか"
  网络来源: "https://baike.baidu.com/item/%E5%B1%B1%E8%8D%AF%E6%B1%81/10228459"

- 名词: "オタンチン・パレオロガス"
  分类: "概念·观念"
  解释: "夏目漱石在《我是猫》中创造的著名无意义短语/胡言乱语。原是苦沙弥用来揶揄妻子不识逻辑的随口胡诌之词。该短语模仿西方人名或学术术语的读音，实则毫无含义。\"オタンチン\"可能来自\"御団珍\"，\"パレオロガス\"则模仿\"paleologus\"（古语学者/古生物学）一类学术词发音。在作品中，夫妻围绕这一短语展开的争论成为经典的幽默桥段——妻子穷追不舍要求解释含义，而苦沙弥固执地不肯承认这是胡言乱语。"
  书中原文: "オタンチン・パレオロガスだよ。何ですそのオタンチン・パレオロガスって云うのは。何でもいい"
  网络来源: "https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392"

- 名词: "草廬"
  分类: "地点"
  解释: "草庐，茅草盖的简陋房屋，引申为隐士或穷书生的居所。在日语和汉语中都指代贫寒的住所。\"草廬\"在作品中指苦沙弥的家。三平君因过去与主人的关系，\"時々旧先生の草廬を訪問して\"，即时常访问昔日师长的简陋居所。这是漱石对苦沙弥作为清贫知识分子的生活环境的一种定位。"
  书中原文: "三平君は以前の関係から時々旧先生の草廬を訪問して"
  网络来源: "https://baike.baidu.com/item/%E8%8D%89%E5%BB%90/2785001"

- 名词: "法科大学"
  分类: "历史·事件"
  解释: "明治时代日本大学中的法学部。东京帝国大学法科大学是当时最著名的法科大学之一，培养了大批司法官、行政官和实业家。明治时期法科大学是精英教育的重要组成部分，\"法科大学を卒業した\"被视为极高的学历。在作品中多々良三平\"法科大学を卒業して\"，表明其学历背景。"
  书中原文: "多々良三平君はもとこの家の書生であったが今では法科大学を卒業して"
  网络来源: "https://baike.baidu.com/item/%E6%B3%95%E7%A7%91%E5%A4%A7%E5%AD%A6/10506217"

- 名词: "鉱山部"
  分类: "历史·事件"
  解释: "明治时代日本近代化过程中，矿山（矿业）产业受到政府高度重视，大型公司常设有矿山部门来经营管理矿山业务。日本在明治时期通过官营→払下（出售给民间）的方式推动了足尾铜山等大规模矿山开发，成为近代工业化的支柱之一。作品中三平毕业后在某公司的矿山部任职，体现其作为实业家的身份定位。"
  书中原文: "法科大学を卒業してある会社の鉱山部に雇われている"
  网络来源: "https://baike.baidu.com/item/%E6%97%A5%E6%9C%AC%E7%9F%BF%E4%B8%9A%E5%8F%B2/10429877"

- 名词: "とん子"
  分类: "人物"
  解释: "《我是猫》中苦沙弥的长女，家中的活泼女孩。与妹妹すん子一起出场，性格较为主动。在三平来访时，とん子立刻想起\"御寿司\"的约定并当面催促。中文译本中常译为\"珍野斗子\"或\"小斗\"。与妹妹すん子一样，是作品中天真无邪的儿童角色，与大人世界的虚伪和复杂形成鲜明对比。"
  书中原文: "多々良さん、今日は御寿司を持って来て？と姉のとん子は先日の約束を覚えていて"
  网络来源: "https://zh.wikipedia.org/zh-hant/%E6%88%91%E6%98%AF%E7%8C%AB"

- 名词: "すん子"
  分类: "人物"
  解释: "《我是猫》中苦沙弥的次女，比姐姐とん子年幼。性格跟随姐姐，看到姐姐说话便模仿姐姐说同样的话。中文译本中常译为\"珍野静子\"或\"小静\"。姐妹俩在三平来访时的对话场景、以及模仿\"いやーだ\"的幼稚举动，展现了儿童的纯真可爱，也为作品增添了温馨的家庭气息。"
  书中原文: "いやーだ、と姉が云うと妹もすぐ真似をして「いやーだ」とつける"
  网络来源: "https://zh.wikipedia.org/zh-hant/%E6%88%91%E6%98%AF%E7%8C%AB"

- 名词: "唐津訛"
  分类: "概念·观念"
  解释: "唐津方言，佐贺县唐津地区的口音。属九州方言中的肥筑方言，特征包括：形容词终止形式用\"〜か\"（如\"よか\"代替\"よい\"），使用\"ばってん\"（けれども）、\"ばい/たい\"（〜だよ）等助词，主格助词用\"の\"等。在作品中多々良三平讲唐津方言口音（\"唐津訛りか何か\"），用\"〜ばってん\"\"〜ばい\"等语尾。"
  书中原文: "奥さん。よか天気でござります、と唐津訛りか何かで"
  网络来源: "https://www.wikiwand.com/zh-hans/articles/%E8%82%A5%E7%AD%91%E6%96%B9%E8%A8%80"

- 名词: "立て膝"
  分类: "概念·观念"
  解释: "日语中单膝跪地、另一膝立起的坐姿。\"立て膝をつく\"指呈跪姿时将一侧膝部立起、另一侧膝部贴地的动作。在日本传统和室中的一种较为随意的坐法，介于正座和盘腿坐之间，常见于男性不拘礼节时的姿势。在作品中三平君在女主人面前以这种姿势坐下，体现其朴实、不拘小节的书生出身的性格。"
  书中原文: "唐津訛りか何かで細君の前にズボンのまま立て膝をつく"
  网络来源: "https://www.edrdg.org/jmwsgi/entr.py?svc=jmdict&sid=&q=1339340"

- 名词: "権柄ずく"
  分类: "概念·观念"
  解释: "日语的副词/形容动词，读作\"けんぺいずく\"，意为\"倚仗权势、蛮横地、专横地\"。由\"権柄（权力权势）\"与接尾词\"〜ずく（尽く、全凭）\"组合而成，意为\"全凭权势压人\"。常用搭配有\"権柄ずくな態度\"（专横的态度）、\"権柄ずくの口をきく\"（以蛮横的口吻说话）。作品中女主人抱怨丈夫用这种专横的语气命令她。"
  书中原文: "あら厭だ、さあ云えだなんて、そんな権柄ずくで誰が云うもんですか"
  网络来源: "https://tw.ichacha.net/jp/%E6%AC%8A%E6%9F%84%E3%81%9A%E3%81%8F.html"

- 名词: "ばってん"
  分类: "概念·观念"
  解释: "九州方言（特别是博多弁、佐贺弁等肥筑方言）中的逆接接续助词，相当于标准语的\"けれども\"（然而、但是）。此外，\"ばってんが\"的形式也作为转折用语使用。\"ばってん\"是九州方言中最具代表性的特征词汇之一。在作品中多々良三平使用唐津方言时用\"ばってんが\"，体现其地方出身。"
  书中原文: "そればってんが……と言い掛けた三平君は"
  网络来源: "https://hinative.com/questions/21958217"
