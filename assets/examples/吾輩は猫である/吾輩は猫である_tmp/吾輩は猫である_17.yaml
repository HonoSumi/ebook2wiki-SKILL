- 名词: アイソクラチス
  分类: 人物·历史
  解释: |
    伊索克拉底（Isocrates，前436—前338），古希腊雅典著名演说家、修辞学教育家，被列为"阿提卡十大演说家"之一。创办修辞学校，培养大量演说家和政治家，强调演说与道德的结合。其教育思想对后世修辞学与古典教育影响深远。代表作有《斥智者》《交换法》《节庆演说》等。相传在喀罗尼亚战役后听闻希腊战败，悲愤绝食而死，享年约98岁。
  书中原文: |
    昔しアイソクラチスと云う人は九十四歳で大著述をした。
  网络来源: https://zh.wikipedia.org/wiki/%E4%BC%8A%E7%B4%A0%E5%85%8B%E6%8B%89%E5%BA%95

- 名词: ソフォクリス
  分类: 人物·历史
  解释: |
    索福克勒斯（Sophocles，约前496—前406），古希腊三大悲剧作家之一，生于雅典西北郊科罗诺斯。一生创作约123部剧本，现存7部完整悲剧，包括《俄狄浦斯王》《安提戈涅》《埃阿斯》等。首创引入第三位演员，使戏剧对话更加丰富。参加过约30次戏剧竞赛，赢得24次胜利。被亚里士多德誉为悲剧创作的典范，对西方戏剧发展影响深远。
  书中原文: |
    ソフォクリスが傑作を出して天下を驚かしたのは、ほとんど百歳の高齢だった。
  网络来源: https://zh.wikipedia.org/wiki/%E7%B4%A2%E7%A6%8F%E5%85%8B%E5%8B%92%E6%96%AF

- 名词: シモニジス
  分类: 人物·历史
  解释: |
    西摩尼得斯（Simonides of Ceos，约前556—前468），古希腊抒情诗人、警句作者，出生于凯奥斯岛，被亚历山大里亚学者列入九大抒情诗人之列。以挽歌和墓志铭最为著名，为温泉关之战殉国斯巴达将士所作墓志铭举世传诵。作品庄重凝练，善于激发爱国热情。传说他凭借惊人记忆力辨认出宴会坍塌事故中的死者，被认为是位置记忆法（Loci Method）的起源。
  书中原文: |
    シモニジスは八十で妙詩を作った。
  网络来源: https://baike.baidu.com/item/%E8%A5%BF%E6%91%A9%E5%B0%BC%E5%BE%97%E6%96%AF

- 名词: 鉄扇
  分类: 物件·工艺
  解释: |
    日本武士使用的一种铁制扇子武器（Tessen），字面意为"铁扇"。外侧扇骨由厚重的铁板制成，外观伪装成普通折扇，可在不允许携带刀剑的场所作为防身兵器携带。用途包括格挡刀剑、投掷攻击、以及在水中作为手蹼使用。战场上军官也用作指挥信号。使用铁扇的武术技法称为"鉄扇術"（Tessenjutsu），柳生新阴流等流派包含铁扇术训练。
  书中原文: |
    外出する時には、きっと鉄扇をもって出るんですがね／例の鉄扇を持ち……／死んだら棺の中へ鉄扇だけは入れてやろうと思っているよ
  网络来源: https://zh.wikipedia.org/wiki/%E6%97%A5%E6%9C%AC%E6%88%98%E6%89%87

- 名词: ちょん髷
  分类: 概念·观念
  解释: |
    丁髷（Chonmage），日本传统的男性发型，江户时代在武士阶层中非常普遍。特点是将头顶前部到头顶中央的头发剃光（月代），保留侧面和后部头发并束成圆髻。明治时代1871年发布散发脱刀令后迅速减少。现代仅相扑力士在训练和比赛中保留此发型，时代剧和落语等传统文化演出中也能见到。
  书中原文: |
    頭にちょん髷を頂いて生きてるんだから恐縮しまさあ。
  网络来源: https://zh.wikipedia.org/wiki/%E4%B8%81%E9%AB%B7

- 名词: 山高帽子
  分类: 物件·工艺
  解释: |
    山高帽，即西洋的 bowler hat（圆顶硬礼帽）或 silk hat（丝织高礼帽）。明治时代文明开化背景下从西方传入日本，成为上流阶层和知识分子的时尚标志。1896年静冈县浜松市创立了帝国正帽株式会社，开始国产化生产。夏目漱石本人也曾用《我是猫》的稿费购买巴拿马帽，可见西洋帽子在明治日本社会的流行程度。
  书中原文: |
    突然手紙を寄こして山高帽子とフロックコートを至急送れと云うんです。
  网络来源: https://www.metmuseum.org/art/collection/search/648189

- 名词: フロックコート
  分类: 物件·工艺
  解释: |
    福乐克外套（Frock coat），19世纪至20世纪初西洋男性正式礼服之一，特征是及膝长度的合身外套，前襟双排扣或单排扣。明治时代随西洋文化传入日本，成为官公厅仪式、社交场合的正式礼装。与羽织袴并列为日本近代礼装的两大规范。在《我是猫》中，迷亭的伯父为参加祝捷会而特意要求寄送此服装，反映了明治时期洋服在日本的普及情况。
  书中原文: |
    突然手紙を寄こして山高帽子とフロックコートを至急送れと云うんです。
  网络来源: https://catalog.princeton.edu/catalog/9996753343506421

- 名词: 大丸
  分类: 物件·工艺
  解释: |
    大丸（Daimaru），日本历史悠久的连锁百货公司，发源于近畿地区。1717年（享保2年）下村彦右卫门正启在京都伏见开设吴服店"大文字屋"，为创业起点。1728年在名古屋首次使用"大丸屋"名称。1907年公司化，1912年京都大丸以百货公司形式开业。2007年与松坂屋合并成立J. Front Retailing集团，成为日本第二大百货集团。经营理念为"先义后利"。
  书中原文: |
    寸法を見計らって大丸へ注文してくれ……
  网络来源: https://zh.wikipedia.org/wiki/%E5%A4%A7%E4%B8%B8

- 名词: 静岡
  分类: 地理·地名
  解释: |
    静冈县（Shizuoka），位于日本本州岛中部，面临太平洋。古代分属远江国、骏河国、伊豆国。战国时代为今川氏、德川家康的根据地，家康隐居于骏府（今静冈市）并开展"大御所政治"。东海道五十三次中有22个宿场位于此地。现代以茶（静冈茶）、柑橘、樱花、模型（田宫）、乐器（雅马哈、河合、罗兰）产业闻名，被称为"日本的缩影"。
  书中原文: |
    静岡に生きてますがね
  网络来源: https://baike.baidu.com/item/%E9%9D%99%E5%86%88%E5%8E%BF

- 名词: 聖堂
  分类: 建筑物·场所
  解释: |
    汤岛圣堂（Yushima Seido），位于东京都文京区汤岛，是日本最著名的孔子庙。1690年由德川幕府第五代将军德川纲吉建造。1797年设立官学昌平坂学问所，成为幕府最高学府。明治维新后成为日本学校教育发祥地，为东京大学前身之一。1922年被指定为日本国家史迹，1923年关东大地震烧毁后于1935年重建。现在由公益财团法人斯文会管理，每年举办孔子节（释奠礼）。
  书中原文: |
    若い時聖堂で朱子学か、何かにこり固まったものだから
  网络来源: https://zh.wikipedia.org/wiki/%E6%B9%AF%E5%B2%9B%E5%9C%A3%E5%A0%82

- 名词: 朱子学
  分类: 概念·观念
  解释: |
    朱子学（Shushigaku），指南宋大儒朱熹（1130—1200）集大成的宋明理学体系。镰仓时代随禅宗传入日本，江户时代被德川幕府奉为官学，成为统治意识形态。藤原惺窝被视为日本朱子学开山祖师，其弟子林罗山推动朱子学官学化。日本朱子学带有庶民化、重"气"倾向及神儒结合等特色。元禄以后，阳明学、古学派等反朱子学思潮也随之兴起，形成了江户思想史的多元格局。
  书中原文: |
    若い時聖堂で朱子学か、何かにこり固まったものだから
  网络来源: https://baike.baidu.com/item/%E6%9C%B1%E5%AD%90%E5%AD%A6

- 名词: 漢学者
  分类: 概念·观念
  解释: |
    汉学者（Kangakusha），即日本从事中国古典（汉学）研究的学者。江户时代，汉学以朱子学为中心成为幕府官学，涌现出藤原惺窝、林罗山、荻生徂徕、伊藤仁斋等众多学派。明治以后"儒学"改称"汉学"，确立了以实证主义、文献学为主的研究方法。代表流派有京都学派（狩野直喜、内藤湖南）和东京学派。现代的日本中国学研究在出土文献、思想史等领域仍具世界影响力。
  书中原文: |
    なあに漢学者でさあ
  网络来源: https://baike.baidu.com/item/%E7%8B%A9%E9%87%8E%E7%9B%B4%E5%96%9C

- 名词: 祝捷会
  分类: 概念·观念
  解释: |
    祝捷会（Shukushoukai），即庆祝胜利的大会。在《我是猫》的语境中指日俄战争（1904—1905）后日本各地举行的战胜庆祝活动。日俄战争以日本胜利告终，日本国内举行了大规模的凯旋仪式和庆祝活动。然而1905年9月5日《朴茨茅斯和约》签订当天，东京日比谷公园却爆发了不满条约内容的大规模骚乱（日比谷烧打事件），反映出战时举国狂热与战后现实之间的巨大落差。
  书中原文: |
    二十三日に静岡で祝捷会があるからそれまでに間に合うように、至急調達しろと云う命令なんです。
  网络来源: https://zh.wikipedia.org/wiki/%E6%97%A5%E9%9F%93%E5%90%88%E5%B9%B6

- 名词: 金剛石
  分类: 物件·工艺
  解释: |
    金刚石（Kongouseki），即钻石（diamond）的汉语名称。"金刚"意为极其坚硬（如佛教中的金刚杵般不可摧毁），"石"即矿物，合称"最硬的石头"。现代日语日常多用外来语"ダイヤモンド"，但在矿物学和工业领域仍正式使用"金刚石"一词（如人造金刚石、金刚石工具等）。在《我是猫》中用作比喻，形容有价值的知识若无法传达则如同埋于土中的钻石不反射阳光。
  书中原文: |
    土中にある金剛石の日を受けて光らぬと同じ事で
  网络来源: https://baike.baidu.com/item/%E9%87%91%E5%89%9B%E7%9F%B3

- 名词: 中庸
  分类: 概念·观念
  解释: |
    中庸，儒家核心思想之一，语出《礼记·中庸》篇，相传为孔子之孙子思所作。后被朱熹编入"四书"，成为科举考试必读经典。"中"即不偏不倚，"庸"即恒常不变，中庸之道追求"执两用中""时中"与"权变"，强调审时度势、因时因地制宜。在《我是猫》中，猫以"公平を好み中庸を愛する"自许，体现了猫将自己行动正当化的幽默表述。
  书中原文: |
    公平を好み中庸を愛する天意を現実する天晴な美挙だ。
  网络来源: https://baike.baidu.com/item/%E4%B8%AD%E5%BA%B8

- 名词: 牧山翁
  分类: 人物·文学
  解释: |
    牧山翁，夏目漱石《我是猫》中迷亭的伯父。迷亭在金田夫人面前谎称自己是牧山男爵的侄子。被揭穿后讲述的真实伯父形象十分滑稽：静冈在住的汉学者，67岁，头上仍留着丁髻，常携铁扇，认为人睡四小时即足。曾为参加祝捷会而写信让迷亭代购山高帽和福乐克外套，但因尺寸不合最后帽子归了迷亭自己。这个人物集中体现了明治时代新旧文化并存的荒诞感。
  书中原文: |
    牧山翁は珍らしくフロックコートにて、例の鉄扇を持ち……
  网络来源: https://book.douban.com/subject/2374136/

- 名词: 甘木
  分类: 人物·文学
  解释: |
    甘木先生，夏目漱石《我是猫》中登场的医生角色，主人公苦沙弥先生（猫的主人、中学英语教师）的家庭医生。性格温和沉稳，总是笑眯眯的。曾为苦沙弥诊病、尝试催眠术（失败），也曾应请求给猫看病。他还曾出诊为苦沙弥治疗恶寒头晕，但因到得太晚导致苦沙弥错过带夫人去歌舞伎座看戏的时间，招致夫人不满。是小说中少数正面职业人士之一。
  书中原文: |
    甘木さんへ行って聞いて見ろ
  网络来源: https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB

- 名词: 鼻子
  分类: 人物·文学
  解释: |
    鼻子（Hanako/Biko），《我是猫》中登场人物，是资本家金田夫人派来苦沙弥家打探消息的女使者。鼻子奇大，被迷亭等人刻薄嘲笑为"鼻が顔の中央に陣取って乙に構えている"。她以寒月友人的名义来访，实际目的是刺探寒月的情况，同时又要求对方对自己的来访保密。猫称她为"鼻子"。她的登场成为引发猫前往金田家侦察的契机。
  书中原文: |
    鼻子はこれで寒月に関する大抵の質問を卒えたものと見えて
  网络来源: https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB

- 名词: 角屋敷
  分类: 建筑物·场所
  解释: |
    角屋敷，即位于街角的宅邸，在《我是猫》中指实业家金田家的豪华住宅。金田是作品中的资本家，住在苦沙弥家附近的转角处。角屋敷与苦沙弥寒酸的住宅形成鲜明对比，象征着明治时代资本家的财富与权势。猫从未踏足此地，但听闻鼻子夫人的谈话后，决定前往这座"敌城"侦察，成为推动故事发展的重要转折点。
  书中原文: |
    角屋敷の金田とは、どんな構えか見た事は無論ない。
  网络来源: https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB

- 名词: 車屋
  分类: 概念·观念
  解释: |
    車屋（Kurumaya），指人力车夫或马车车夫，明治时代日本都市交通的代表性职业之一。1869年人力车在横滨诞生后迅速普及，车夫成为当时底层民众最常见的谋生手段之一。在《我是猫》中，"車屋"被用作社会地位的参照物——苦沙弥不满金田夫人将他视同车夫一般对待，反映了明治时代知识分子与资本家之间的阶层冲突与微妙关系。
  书中原文: |
    裏の車屋くらいに心得ているのさ。
  网络来源: https://baike.baidu.com/item/%E4%BA%BA%E5%8A%9B%E8%BD%A6

- 名词: 義俠心
  分类: 概念·观念
  解释: |
    義俠心（Gikyoushin），即侠义之心、扶弱抗强的正义精神。指不计个人得失、为正义而行动的勇气与气概。与"任侠""男気"等词近义。在《我是猫》中，猫听闻寒月君被金田家暗中调查后，激发了自己的义侠心，决心冒险前往金田邸侦察。猫自称虽为猫却非普通之猫（读过埃皮克提图），以此义侠行为自许，是作品中最具喜剧效果的自我正当化段落之一。
  书中原文: |
    この冒険をあえてするくらいの義俠心は固より尻尾の先に畳み込んである。
  网络来源: https://mazii.net/zh-CN/search/word/jacn/%E4%BE%A0%E4%B9%89

- 名词: 猿智慧
  分类: 概念·观念
  解释: |
    猿智慧（Sarujie），也写作"猿知恵"，日语惯用语，意为"小聪明""鬼聪明"。指看似聪明但实际上浅薄、只顾眼前利益的狡猾智慧。带有贬义和讽刺色彩。在《我是猫》中，迷亭评价鼻子夫人的谎言时说："あの女のは、みんな魂胆があって、曰く付きの噓ですぜ。たちが悪いです。猿智慧から割り出した術数と、天来の滑稽趣味と混同されちゃ……"，将鼻子夫人的心计之术与自己纯粹的幽默加以区分。
  书中原文: |
    猿智慧から割り出した術数と、天来の滑稽趣味と混同されちゃ
  网络来源: https://www.sohu.com/a/128819883_124836

- 名词: 滑稽趣味
  分类: 概念·观念
  解释: |
    滑稽趣味，夏目漱石文学理论中的重要概念，与"低徊趣味"密切相关。指以余裕和幽默的态度观察人生与社会，通过讽刺和笑来揭示事物本质的创作态度。在《我是猫》中达到巅峰——以猫的视角，将明治知识分子的自命不凡、资本家的唯利是图以诙谐笔法一一呈现。漱石的"滑稽"不仅是单纯的笑料，更包含自嘲、讽刺、苦笑等多重层次，是日本近代讽刺文学的典范。
  书中原文: |
    天来の滑稽趣味と混同されちゃ、コメディーの神様も活眼の士なきを嘆ぜざるを得ざる訳に立ち至りますからな
  网络来源: https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB
