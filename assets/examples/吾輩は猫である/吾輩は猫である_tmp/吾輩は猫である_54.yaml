- 名词: 吉原
  分类: 地点
  解释: |
    日本江户时代最著名的官方游廓（红灯区），位于现今东京都台东区千束。1617年设立于日本桥人形町附近，地名源于原为芦苇丛生之地，称为"葭原"，后雅化为"吉原"。1657年明历大火后迁至浅草以北，称为"新吉原"。吉原四周以深约2米、宽3至9米的壕沟（齿黑沟）围绕，仅设一个出入口"大门"，形成封闭式管理。内部道路呈棋盘式布局，游女按等级分为花魁（太夫）、大见世、中见世、小见世等。吉原不仅是红灯区，更是江户文化的发源地，浮世绘、歌舞伎、文学的重要灵感源泉。1958年伴随公娼制度废止正式走入历史，现代转变为泡泡浴（Soapland）集中地。
  书中原文: |
    「吉原だよ」「あの遊廓のある吉原か？」
  网络来源: https://baike.baidu.com/item/%E5%90%89%E5%8E%9F/10675121
- 名词: 読心術
  分类: 概念
  解释: |
    指不通过言语交流而直接洞察他人内心的技术或能力。广义上可指心理学中通过观察微表情、肢体语言等非言语信息来推测他人心理状态的方法，狭义上则指超自然意义上的心灵感应。在学术心理学中，与之对应的概念称为"心智理论"（Theory of Mind）或"心理化"（mentalising），指理解他人心理状态的能力。在作品中，自称"会读心术"的猫声称通过将自己的柔软皮毛贴在人类腹部，利用产生的电流感应来知晓人类内心的想法，并以识破主人想用猫皮做背心的危险念头为例证。
  书中原文: |
    吾輩はこれで読心術を心得ている。いつ心得たなんて、そんな余計な事は聞かんでもいい。ともかくも心得ている。
  网络来源: https://baike.baidu.com/item/%E8%AF%BB%E5%BF%83%E6%9C%AF/2250547
- 名词: 豚的幸福
  分类: 概念
  解释: |
    夏目漱石在《我是猫》中创造的讽刺性概念，指像猪一样对自身处境的真实评价毫不知觉、仅因无知而获得的虚假幸福感。在原文中，主人公苦沙弥因为顽固地坚持己见而自认为战胜了迷亭，但实际上其人格价值已随之贬低。漱石讽刺道：这种人至死都以为自己在世人面前保全了面子，却对被人轻视的事实浑然不觉，这种幸福就是"猪的幸福"。该词以猪喻人，辛辣讽刺那些顽固不化、自我感觉良好但实质上在不断贬值却毫不自知的愚人，是漱石对近代知识分子盲目自满的深刻社会批判。
  书中原文: |
    幸福なものである。こんな幸福を豚的幸福と名づけるのだそうだ。
  网络来源: https://book.douban.com/subject/35412102/blockquotes?sort=score&start=240
- 名词: 遊廓
  分类: 地点
  解释: |
    日本历史上由官方认可并集中设置妓院（游女屋）的特定区域，周围以围墙或水沟包围进行封闭式管理。起源于安土桃山时代（16世纪末至17世纪初），丰臣秀吉时代在大阪道顿堀首次设置，江户幕府出于治安管理目的大规模推行制度化。最著名的三大官方游廓为江户吉原、京都岛原、大阪新町。游廓内部拥有独特的等级文化：高级游女称"太夫"或"花魁"，需精通歌舞茶道；见习者称"新造"；学徒称"秃"。1946年盟军政策下公娼制度废止，1958年卖春防止法施行后游廓制度正式走入历史。该词在作品中与吉原相关联，是构成故事时代背景的重要社会制度。
  书中原文: |
    「あの遊廓のある吉原か？」
  网络来源: https://baike.baidu.com/item/%E6%B8%B8%E5%BB%93/12602531
- 名词: カイゼル髭
  分类: 物件
  解释: |
    一种将口髭两端用力向上翘起的胡须造型，因仿效德意志皇帝威廉二世（Kaiser Wilhelm II）的胡须风格而得名。"カイゼル"（Kaiser）在德语中意为"皇帝"。该造型由柏林理发师哈比（Haby）于1887年为威廉二世设计后迅速风靡德国乃至欧洲，鼎盛时期德国约90%的男性模仿此胡须。第一次世界大战期间，因妨碍防毒面具佩戴而逐渐被"卫生胡"（牙刷胡，亦即后来的希特勒胡）取代。在作品中，作者以此形容主人公苦沙弥蓄有八字髯的外貌特征，暗示其刻意模仿西洋威仪但实际却连狂人与常人都无法区分的凡庸。
  书中原文: |
    彼はカイゼルに似た八字髯を蓄うるにもかかわらず狂人と常人の差別さえなし得ぬくらいの凡倉である。
  网络来源: https://baike.baidu.com/item/%E5%8D%AB%E7%94%9F%E8%83%A1/10703311
- 名词: 瘋癲院
  分类: 概念
  解释: |
    日本近代对精神病院的旧称，亦写作"癲狂院"。明治时期开始出现近代化精神病院，1879年设立"东京府癫狂院"（后迁至巢鸭更名为东京府巢鸭病院，即今东京都立松泽病院的前身）。1900年《精神病者监护法》颁布后，精神医疗体系逐渐制度化。该词在现代已成废词，正式改称"精神科病院"。在作品中，主人公苦沙弥在思考"疯癫"与"正常"的界限时使用了该词，他大胆推论：被关进疯癫院的也许才是正常人，而在院外横行霸道的反而是真正的狂人，表达了对社会常态与权力结构的深刻质疑。
  书中原文: |
    その中で多少理窟がわかって、分別のある奴はかえって邪魔になるから、瘋癲院というものを作って、ここへ押し込めて出られないようにするのではないかしらん。
  网络来源: https://baike.baidu.com/item/%E7%B2%BE%E7%A5%9E%E7%97%85/18493549
- 名词: 頓珍漢
  分类: 概念
  解释: |
    日语形容动词与名词，形容事物前后矛盾、不合逻辑、不着边际、支离破碎的状态。汉字"頓珍漢"为根据发音后补的当て字（借字），与单个汉字的本义无关。语源来自铁匠铺的锻造声——熟练铁匠打铁的节奏整齐规律，而徒弟打出的声音"トン·チン·カン"（ton-chin-kan）零乱不齐，由此引申出"前后矛盾、不合拍、离题万里"之意。在作品中用于形容世间经常发生的不合逻辑却又确实存在的怪现象。
  书中原文: |
    世の中にはこんな頓珍漢な事はままある。
  网络来源: https://jpmemo.com/37/japanese-tonchinkan/
- 名词: 八字髯
  分类: 物件
  解释: |
    指上唇两侧的胡须呈"八"字形分向左右的胡须样式。在日本亦常称为"仁丹胡"（じんたんひげ），因制药公司"森下仁丹"自明治末期以来长期使用该胡须造型作为商标和产品标识而广为人知。八字髯在日本传统中常被视为上品、有格调的胡须样式，与身份地位相关联。在作品中，主人公苦沙弥蓄有八字髯，被作者形容为酷似德皇威廉二世的卡伊泽胡须，但旋即讽刺其外表与内在的巨大反差——即使蓄着如此威风的胡须，依然连狂人与常人的区别都无法分辨。
  书中原文: |
    彼はカイゼルに似た八字髯を蓄うるにもかかわらず狂人と常人の差別さえなし得ぬくらいの凡倉である。
  网络来源: https://baike.baidu.com/item/%E4%BB%81%E4%B8%B9%E8%83%A1%E5%AD%90/7102284
