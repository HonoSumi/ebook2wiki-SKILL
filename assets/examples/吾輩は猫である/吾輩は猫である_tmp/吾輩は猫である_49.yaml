- 名词: 浅草の観音様
  分类: 地点·建筑
  解释: |
    浅草寺的俗称，正式名称为金龙山浅草寺，位于东京都台东区，是东京最古老的佛教寺院。本尊为圣观世音菩萨，通称"浅草观音"。传说推古天皇36年（628年），桧前兄弟在隅田川捕鱼时网获一尊黄金观音像，后由土师中知将其宅邸改建为寺。江户时代被德川幕府指定为祈愿所，成为江户文化的中心。1945年东京大空袭中本堂、五重塔被烧毁，战后重建。现为圣观音宗总本山，雷门的大提灯是东京的标志性景观。
  书中原文: |
    うちは玉のような男子であったと云っている。浅草の観音様で西洋人が振り反って見たくらい奇麗だったなどと自慢する事さえある。
  网络来源: https://baike.baidu.com/item/%E6%B5%85%E8%8D%89%E5%AF%BA

- 名词: 小川町の勧工場
  分类: 地点·建筑
  解释: |
    指明治时代位于东京神田小川町的"勧工場"。勧工場是明治时代日本特有的商业设施，在同一建筑内聚集众多小零售商，可视为现代百货商场的前身。明治11年（1878年）东京永楽町设立首家"府立第一勧工場"，最盛期的1902年东京有27家之多。勧工場随着20世纪初百货店的兴起而逐渐衰退。
  书中原文: |
    その場所は小川町の勧工場であるか、上野の公園であるか、ことごとく彼の日記につけ込んである。
  网络来源: https://tw.tokuhain.chuo-kanko.or.jp/detail.php?id=1323

- 名词: 上野の公園
  分类: 地点·建筑
  解释: |
    位于东京都台东区的都市公园，正式名称为上野恩赐公园。原为德川幕府宽永寺的寺域，1873年被指定为日本最早的公园之一，1924年由宫内省赐予东京市。园内有上野动物园、东京国立博物馆、国立西洋美术馆、上野东照宫、不忍池等众多文化设施，是日本最大的文化设施聚集地之一，尤以春季樱花闻名。
  书中原文: |
    その場所は小川町の勧工場であるか、上野の公園であるか、ことごとく彼の日記につけ込んである。
  网络来源: https://baike.baidu.com/item/%E4%B8%8A%E9%87%8E%E5%85%AC%E5%9B%AD

- 名词: 喇叭節
  分类: 习俗·仪式
  解释: |
    明治时代流行的一种大众歌谣（流行唄），由被誉为"演歌始祖"的添田哑蝉坊于明治37年（1904年）创作。歌曲具有模仿军号（喇叭）旋律的轻快曲风，末尾带有"トコトットット"的特色吆喝声。诞生于日俄战争时期，以幽默讽刺的笔调描绘了当时的世态，是明治时代大众娱乐文化的重要代表。
  书中原文: |
    それより英書でも質に入れて芸者から喇叭節でも習った方が遥かにましだとまでは気が付いたが。
  网络来源: http://jc.newdu.com/216260.html

- 名词: 結跏
  分类: 习俗·仪式
  解释: |
    全称"結跏趺坐"，佛教禅定中最正式的坐法。做法是将两脚足背分别置于左右大腿上，足心向上。据传释迦牟尼在菩提树下悟道时即采用此坐法。结跏趺坐分为"降魔坐"（先右后左，禅宗传承）和"吉祥坐"（先左后右）。此坐法可使身体安稳、心不散乱，被认为是诸坐法中最安稳的姿势，自古以来在佛教禅修中备受重视。
  书中原文: |
    禅家などでは一七日を限って大悟して見せるなどと凄じい勢で結跏する連中もある事だから。
  网络来源: https://baike.baidu.com/item/%E7%BB%93%E8%B7%8F

- 名词: メリンス
  分类: 物件·工艺
  解释: |
    来自荷兰语"merinos"的日语音译，指使用美利奴（Merino）羊毛织成的细幅毛织物。江户末期至明治时代大量进口至日本，主要用于洋服布料、披肩、座布团等。作为当时的高级进口纺织品，推动了日本近代毛纺织业的发展。在西方织物流入日本的背景下，曾与"羅紗"、"キャラメル"等并列为明治时期流行的进口毛织物种类。
  书中原文: |
    机の前には薄っぺらなメリンスの座布団があって、煙草の火で焼けた穴が三つほどかたまってる。
  网络来源: https://www.jstage.jst.go.jp/article/sehs/67/4/67_KJ00003579508/_article/-char/ja/

- 名词: 兵児帯
  分类: 物件·工艺
  解释: |
    日本传统和服腰带的一种，最初特指鹿儿岛地方年轻男性使用的"扱き帯"。用柔软的棉布等材料制成，比一般的袋带或名古屋带更细更轻，易于打结。名称中的"兵児"（へこ）在鹿儿岛方言中指年轻男子。现代已广泛用于男女老少的浴衣和日常和服，特别是儿童和服的场合很常见。其柔软轻便的特性使其在现代和装中依然广受欢迎。
  书中原文: |
    鼠色によごれた兵児帯をこま結びにむすんだ左右がだらりと足の裏へ垂れかかっている。
  网络来源: http://jc.newdu.com/194902.html

- 名词: 甎を磨
  分类: 概念·观念
  解释: |
    中国禅宗著名的公案，出自唐代南岳怀让禅师与马祖道一之间的问答。马祖道一在南岳衡山终日坐禅，怀让禅师便取一片瓦（甎）在石上磨。道一问磨瓦作什么，答曰磨作镜。道一问瓦岂能磨成镜，怀让即反问："磨砖既不成镜，坐禅岂得成佛？"以此点破拘泥于坐禅形式之弊，指出禅不在于坐卧形式，而在于心的觉悟。此公案是禅宗"触类是道"思想的经典体现。
  书中原文: |
    和尚両肌を抜いで甎を磨しておられた。何をこしらえなさると質問をしたら、なにさ今鏡を造ろうと思うて一生懸命にやっておるところじゃと答えた。
  网络来源: https://www.buddhistdoor.org/news/%E9%A6%AC%E7%A5%96%E9%81%93%E4%B8%80%E7%A6%AA%E5%B8%AB%E5%9C%93%E5%AF%82%E7%B4%80%E5%BF%B5%E6%97%A5%E7%A3%A8%E7%A3%9A%E4%BD%9C%E9%8F%A1%E7%9A%84%E5%85%AC%E6%A1%88%E5%95%9F%E7%99%BC%E4%BA%86%E5%BE%8C%E4%B8%96%E7%84%A1%E6%95%B8%E8%A1%8C%E8%80%85/

- 名词: 離魂病
  分类: 概念·观念
  解释: |
    日本江户时代民间认知中的一种疾病概念，指人的灵魂脱离肉体的状态。现代医学可对应为梦游症（somnambulism）或自像幻视（autoscopy）。与"生灵"（生霊）的民间信仰密切相关，认为活人的怨念或强烈情感可使灵魂离体对他者产生影响。日本古典文学如《源氏物语》中六条御息所的生灵故事即体现了这一观念。夏目漱石在此处以此词戏谑地描述镜子"灵魂出窍"来到了书房。
  书中原文: |
    風呂場にあるべき鏡が、しかも一つしかない鏡が書斎に来ている以上は鏡が離魂病に罹ったのかまたは主人が風呂場から持って来たに相違ない。
  网络来源: https://zh.wikipedia.org/zh-tw/%E7%94%9F%E9%9D%88

- 名词: 天然痘
  分类: 自然·生物
  解释: |
    由天花病毒引起的高度传染性疾病，在日本历史上俗称"疱瘡"（ほうそう）。日本首次有记录的大流行是奈良时代天平年间（735-737年），导致当时人口约25-35%死亡。明治政府推行强制种痘制度，使感染率大幅下降。WHO于1980年宣布全球根除。夏目漱石在文中以此指称主人苦沙弥脸上的麻子（痘痕），这些麻子正是幼年罹患天然痘留下的疤痕。
  书中原文: |
    私は頭蓋骨の上まで天然痘にやられましたよと吹聴する必要はあるまい。
  网络来源: https://baike.baidu.com/item/%E5%A4%A9%E8%8A%B1/251578

- 名词: 穴守稲荷
  分类: 地点·建筑
  解释: |
    位于东京都大田区羽田的神社，正式名称为穴守稲荷神社。创立于1804年（文化元年），当时羽田浦的海堤因风浪出现大洞，村民为守护田地而建祠祭祀稻荷大神。明治18年（1885年）开放公众参拜，后因温泉发现发展为一大观光地。1945年二战结束后，因美军扩建羽田机场被强制迁至现址。今以航空安全、旅途平安的信仰闻名，JAL和ANA的机组人员常前往参拜。
  书中原文: |
    この間さる人が穴守稲荷から河豚の提灯をみやげに持って来てくれたが、ちょうどあの河豚提灯のようにふくれている。
  网络来源: https://anamori.jp/yuisho.html

- 名词: 河豚提灯
  分类: 物件·工艺
  解释: |
    日本山口县下关市的传统工艺品，河豚的一种加工品。将河豚皮完整剥离后填充稻谷壳使其干燥定型，制成河豚鼓胀时的形态，再装上眼球等装饰。下关是日本著名的河豚产地，河豚提灯作为当地代表性乡土玩具和吉祥物，寓意招福纳财。价格从普通尺寸的5000日元到大型作品的10万日元以上不等。现仅在下关的老铺"酒井商店"以手工方式制作传承。
  书中原文: |
    ちょうどあの河豚提灯のようにふくれている。あまりふくれ方が残酷なので眼は両方共紛失している。
  网络来源: http://japan.people.com.cn/n/2015/1113/c35469-27813675.html

- 名词: べっかんこう
  分类: 习俗·仪式
  解释: |
    日本儿童传统的鬼脸动作，与"あかんべ"（赤ん目）同义。做法是用手指将下眼睑向下拉露出眼内侧的红色黏膜，有时配合吐舌头，用以嘲笑或挑衅对方。词源来自"赤い目"（红眼睛）的音变。这个动作被夏目漱石在本书中生动地记录下来，说明主人苦沙弥在镜前做出此动作以研究自己的麻子脸。后来也有一位日本著名插画家以"べっかんこう"作为笔名。
  书中原文: |
    右眼の下瞼を裏返して、俗に云うべっかんこうを見事にやって退けた。
  网络来源: https://en.wikipedia.org/?curid=18339791

- 名词: 解脱
  分类: 概念·观念
  解释: |
    佛教核心概念之一，梵文vimoksha/vimukti的意译，意为"解放"、"脱离束缚"。指从烦恼、执着、无明中彻底解放出来，脱离生死轮回的苦海。即通过智慧（般若）洞见"诸行无常、诸法无我"的真理，断除对"我"的执着而达到的究竟自由的境地。佛教四圣谛中"灭谛"即指向涅盘解脱。在文本中，猫认为没有经历过真正苦难的人无法达到解脱的境界。
  书中原文: |
    苦労人でないととうてい解脱は出来ない。主人もここまで来たらついでに「おお怖い」とでも云いそうなものであるがなかなか云わない。
  网络来源: https://www.shidianguji.com/zh/mingju/7494425302631137290

- 名词: 一七日
  分类: 习俗·仪式
  解释: |
    佛教中阴七七法要的首次忌日，即人去世后的第7天（以去世当天为第1日算起），也称"初七日"、"所願忌"。佛教认为死者识体（中阴身）每7日有一次转生机缘，故每7日举行一次法要，共7次（49日）。这49日期间称为"中阴"，初七日是其中第一个重要节点。禅宗修行中也有一七日为期限精进修行的传统。文中提及"禅家以一七日为限期待大悟"即指此意。
  书中原文: |
    禅家などでは一七日を限って大悟して見せるなどと凄じい勢で結跏する連中もある事だから。
  网络来源: https://www.cangfokeng.com/dict/74578.html

- 名词: 和尚
  分类: 人物·组织
  解释: |
    佛教中对僧侣的尊称，原为梵文upadhyaya的意译，意为"亲教师"、"力生"。在日语中读作"おしょう"或"かしょう"，特指具备一定修为和地位的僧侣，也作为对佛教僧侣的一般性敬称。本文中指代禅宗公案中磨瓦的南岳怀让禅师。夏目漱石在文中以轻松笔调引用怀让禅师磨瓦成镜的典故，将主人对照镜子行为作类比。
  书中原文: |
    和尚両肌を抜いで甎を磨しておられた。何をこしらえなさると質問をしたら、なにさ今鏡を造ろうと思うて一生懸命にやっておるところじゃと答えた。
  网络来源: https://zh.wikisource.org/zh/%E5%9B%9B%E5%AE%B6%E8%AA%9E%E9%8C%84/%E9%A6%AC%E7%A5%96%E9%81%93%E4%B8%80%E7%A6%AA%E5%B8%AB%E5%BB%A3%E9%8C%84

- 名词: 洋行帰り
  分类: 概念·观念
  解释: |
    幕末至明治时期，赴欧美留学或考察后返回日本的人士。这一群体在日本的近代化进程中发挥了决定性作用。1863年长州藩秘密派遣伊藤博文、井上馨等"长州五杰"留学英国，开启了日本海外留学的先河。明治维新后，政府大量派遣留学生赴欧美学习西方制度、技术、文化，归国后成为各领域的领军人物。福泽谕吉、涩泽荣一等均属广义的"洋行帰り"。
  书中原文: |
    せんだってある洋行帰りの友人が来た折なぞは、「君西洋人にはあばたがあるかな」と聞いたくらいだ。
  网络来源: https://www.bbc.com/zhongwen/simp/uk/2013/07/130703_ucl_japan_choshufive

- 名词: 枯野に蛍
  分类: 概念·观念
  解释: |
    夏目漱石在《我是猫》中创造的文学比喻，并非已有的习惯用语或谚语。字面意为"在原野枯草间放飞萤火虫"，在文中用于形容苦沙弥脸上的麻子——犹如枯野中星星点点的萤火。枯野（秋冬意象）与萤（夏季意象）的季节错位，营造出一种介于幽玄与滑稽之间的独特美感，也暗示主人试图掩饰却无法掩盖的瑕疵。映照出漱石高超的比喻技巧。
  书中原文: |
    いくら撫でても、さすってもぽつぽつがとれない。枯野に蛍を放ったようなもので風流かも知れないが、細君の御意に入らんのは勿論の事である。
  网络来源: https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/460415
