- 名词: 公徳
  分类: 概念·观念
  解释: |
    明治时代由福泽谕吉在《文明论之概略》（1875年）中首次定义的道德概念，指个人在与外界接触和社交行为中应遵守的道德规范，如廉耻、公平、正直、勇敢等。与"私德"（内心活动的道德）相对。明治维新后，因西方人对日本公德现状的批评，日本社会掀起了广泛的公德讨论与教育运动，被视为近代市民社会建设的重要理念。
  书中原文: |
    で公徳と云うものは大切な事で、あちらへ行って見ると、仏蘭西でも独逸でも英吉利でも、どこへ行っても、この公徳の行われておらん国はない。またどんな下等な者でもこの公徳を重んぜぬ者はない。悲しいかな、我が日本に在っては、未だこの点において外国と拮抗する事が出来んのである。で公徳と申すと何か新しく外国から輸入して来たように考える諸君もあるかも知れんが、そう思うのは大きな誤りで、昔人も夫子の道一以て之を貫く、忠恕のみ矣と云われた事がある。この恕と申すのが取りも直さず公徳の出所である。
  网络来源: https://www.cssn.cn/zx/llyy/202210/t20221027_5555788.shtml

- 名词: 仏蘭西
  分类: 地点·建筑
  解释: |
    日本对法国的汉文表记，源自中国汉语音译"佛蘭西／法兰西"。日本明治时代以汉字音译西洋国名之风盛行，"仏"取"フ"音、"蘭"取"ラン"音、"西"取"ス／シ"音，合为"フランス"。现代日语中通常写为片假名"フランス"，但简称为"仏"（如"日仏協会"）仍广泛使用。
  书中原文: |
    で公徳と云うものは大切な事で、あちらへ行って見ると、仏蘭西でも独逸でも英吉利でも、どこへ行っても、この公徳の行われておらん国はない。
  网络来源: https://zh.wiktionary.org/zh/%E4%BD%9B%E5%85%B0%E8%A5%BF

- 名词: 独逸
  分类: 地点·建筑
  解释: |
    日本对德国的汉文表记，明治时代创作的和制汉语音译。"独"取"ド"音、"逸"取"イツ"音，合为"ドイツ"。源自德语"Deutsch"或荷兰语"Duits"的发音。现代日语中通常写为片假名"ドイツ"，但简称为"独"（如"独語""日独関係"）仍广泛使用。韩国语也沿用此汉文表记读作"독일（獨逸）"。
  书中原文: |
    で公徳と云うものは大切な事で、あちらへ行って見ると、仏蘭西でも独逸でも英吉利でも、どこへ行っても、この公徳の行われておらん国はない。
  网络来源: https://zh.wiktionary.org/wiki/%E7%8B%AC%E9%80%B8

- 名词: 英吉利
  分类: 地点·建筑
  解释: |
    日本对英国的汉文表记，源自中国汉语音译"英吉利（Yīngjílì）"。最初由葡萄牙语经中国传入日本，经历了"諳厄利亚→英機黎→英吉利"的演变。"英"字有"精华、优秀"的正面含义，被认为不仅是音译，也暗含对英国的褒扬。现代日语中通常写为"イギリス"或"英国"。
  书中原文: |
    で公徳と云うものは大切な事で、あちらへ行って見ると、仏蘭西でも独逸でも英吉利でも、どこへ行っても、この公徳の行われておらん国はない。
  网络来源: https://zh.wiktionary.org/zh/%E8%8B%B1%E5%90%89%E5%88%A9

- 名词: 夫子
  分类: 人物
  解释: |
    中国古代对男子的尊称，在《论语》中特指孔子，是孔门弟子对孔子最常见的敬称。"夫子"一词本义为古代对学者、老师的尊称，《论语·学而》中多处可见此称呼。后世"孔夫子"成为孔子的代名词，象征儒家思想的创始人与最高权威。在明治时代的知识分子语境中，引用"夫子"即指孔子及其学说。
  书中原文: |
    昔人も夫子の道一以て之を貫く、忠恕のみ矣と云われた事がある。
  网络来源: https://www.ccdi.gov.cn/lswh/wenhua/wyzd/201511/t20151117_156199.html

- 名词: 忠恕
  分类: 概念·观念
  解释: |
    孔子儒家思想的核心概念，出自《论语·里仁篇》。曾子概括孔子之道为"夫子之道，忠恕而已矣"。"忠"即"尽己"——以诚心待人；"恕"即"推己"——以己心推度他人，即"己所不欲，勿施于人"。忠恕是实现"仁"的具体方法（行仁之方），被后世视为儒家伦理的黄金法则，在世界范围也被评价为普世伦理原则。
  书中原文: |
    昔人も夫子の道一以て之を貫く、忠恕のみ矣と云われた事がある。
  网络来源: https://www.shidianguji.com/zh/mingju/7503422855050526747

- 名词: 恕
  分类: 概念·观念
  解释: |
    儒家核心道德概念之一，与"忠"并称"忠恕"。出自《论语·卫灵公篇》："其恕乎！己所不欲，勿施于人。"字义为"如心"——以自己的心推度他人的心，即推己及人、将心比心。朱熹解释为"推己及人为恕"。恕被视为"仁"的实践入口，孟子称"强恕而行，求仁莫近焉"。
  书中原文: |
    この恕と申すのが取りも直さず公徳の出所である。
  网络来源: https://www.rujiazg.com/index.php/article/26962

- 名词: 唐詩選
  分类: 概念·观念
  解释: |
    中国唐代诗歌的精选集，特指明人李攀龙编选的《唐诗选》。全书收录128位诗人的465篇名诗，以盛唐诗人王维、李白、杜甫等为中心。江户时代传入日本后成为最受欢迎的汉诗入门书，被广泛诵读和模仿。日本文人吟诵"唐诗选"被视为风雅之事，也是明治时代知识分子汉学素养的体现。
  书中原文: |
    自分が唐詩選でも高声に吟じたら気分が晴々してよかろうと思う時ですら、もし自分のように迷惑がる人が隣家に住んでおって、知らず知らずその人の邪魔をするような事があってはすまんと思うて、そう云う時はいつでも控えるのである。
  网络来源: https://baike.baidu.com/item/%E5%94%90%E8%AF%97%E9%80%89/10559511

- 名词: 沙河
  分类: 事件·战争
  解释: |
    沙河会战（Battle of Shaho，1904年10月5日—17日），日俄战争中的大型陆战。发生于中国奉天以南沙河沿岸（今沈阳苏家屯区），俄军约21—22万人对决日军约12—17万人。日军在炮兵战术上占据优势，最终迫使俄军退守沙河北岸。此战后双方均因伤亡惨重（日军伤亡约2万人、俄军约4万人）而转入对峙，是日俄战争的重大转折之一。
  书中原文: |
    普通の人は戦争とさえ云えば沙河とか奉天とかまた旅順とかそのほかに戦争はないもののごとくに考えている。
  网络来源: https://zh.m.wikipedia.org/zh-tw/%E6%B2%99%E6%B2%B3%E4%BC%9A%E6%88%98

- 名词: 奉天
  分类: 事件·战争
  解释: |
    奉天会战（Battle of Mukden，1905年2月20日—3月10日），日俄战争中最后也是规模最大的陆上决战。日军约25万人在大山岩元帅指挥下，对决俄军约37万人。日军通过迂回包抄战术迫使俄军总司令库罗帕特金下令撤退，日军于3月10日占领奉天（今沈阳）。此战俄军伤亡约9万人、日军约7万人，战后双方均无力继续大规模进攻，直接促成日俄和谈。
  书中原文: |
    普通の人は戦争とさえ云えば沙河とか奉天とかまた旅順とかそのほかに戦争はないもののごとくに考えている。
  网络来源: https://zh.wikipedia.org/zh-hans/%E6%97%A5%E4%BF%84%E6%88%98%E4%BA%89

- 名词: アキリス
  分类: 人物
  解释: |
    古希腊神话中最伟大的英雄，特洛伊战争中希腊联军的最强战士，海洋女神忒提斯与英雄佩琉斯之子。荷马史诗《伊利亚特》的核心人物。出生时被母亲提着脚踵浸入冥河而获得刀枪不入之身，唯脚踵为致命弱点。因与统帅阿伽门农的争执而退出战斗，后因挚友帕特罗克洛斯被赫克托尔杀死而重返战场击杀赫克托尔。最终被帕里斯射中脚踵而死。"阿喀琉斯之踵"比喻唯一弱点流传至今。
  书中原文: |
    少し詩がかった野蛮人になると、アキリスがヘクトーの死骸を引きずって、トロイの城壁を三匝したとか、燕人張飛が長坂橋に丈八の蛇矛を横えて、曹操の軍百万人を睨め返したとか大袈裟な事ばかり連想する。
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E5%96%80%E7%90%89%E6%96%AF/2204883

- 名词: ヘクトー
  分类: 人物
  解释: |
    古希腊神话中特洛伊王子，特洛伊王普里阿摩斯与赫卡柏的长子，特洛伊军总司令。在荷马史诗《伊利亚特》中，他是特洛伊方面最勇敢的英雄，被描绘为"和平仁爱、思深虑远、大胆无畏"的理想形象。与希腊英雄阿喀琉斯决战被杀，其遗体被阿喀琉斯用战车拖绕特洛伊城墙。在中世纪欧洲被列为"九伟人"之一。
  书中原文: |
    少し詩がかった野蛮人になると、アキリスがヘクトーの死骸を引きずって、トロイの城壁を三匝したとか、燕人張飛が長坂橋に丈八の蛇矛を横えて、曹操の軍百万人を睨め返したとか大袈裟な事ばかり連想する。
  网络来源: https://baike.baidu.com/item/%E8%B5%AB%E5%85%8B%E6%89%98%E5%B0%94/3503664

- 名词: トロイ
  分类: 地点·建筑
  解释: |
    古希腊神话与荷马史诗《伊利亚特》中的传奇城市，特洛伊战争的发生地。位于小亚细亚西北部（今土耳其希萨利克）。1870年代由海因里希·施里曼发掘证实其历史真实性，拥有9层文化堆积（特洛伊I—IX层），其中特洛伊VI和VII层与史诗所述的青铜时代晚期的攻城战年代相符。现代考古学认为荷马史诗中的特洛伊战争是多个战争记忆的融合。
  书中原文: |
    少し詩がかった野蛮人になると、アキリスがヘクトーの死骸を引きずって、トロイの城壁を三匝したとか、燕人張飛が長坂橋に丈八の蛇矛を横えて、曹操の軍百万人を睨め返したとか大袈裟な事ばかり連想する。
  网络来源: https://www.ted.com/talks/einav_zamir_dembin_did_ancient_troy_really_exist

- 名词: 張飛
  分类: 人物
  解释: |
    中国三国时期蜀汉名将，字益德（一作翼德），涿郡人。与关羽并称"万人敌"。正史《三国志》载其于长坂坡率二十骑断后，据水断桥，瞋目横矛大喝"身是张益德也，可来共决死"，使曹军无人敢近。《三国演义》中其形象更为夸张—大喝一声使夏侯杰惊死。后为部下张达、范强暗杀。后世被尊为"桓侯"，是勇猛武将的象征。
  书中原文: |
    少し詩がかった野蛮人になると、アキリスがヘクトーの死骸を引きずって、トロイの城壁を三匝したとか、燕人張飛が長坂橋に丈八の蛇矛を横えて、曹操の軍百万人を睨め返したとか大袈裟な事ばかり連想する。
  网络来源: https://baike.baidu.com/item/%E5%BC%A0%E9%A3%9E/19650086

- 名词: 長坂橋
  分类: 地点·建筑
  解释: |
    位于今湖北省当阳市的长坂坡附近的一座古桥，因208年（建安十三年）曹操追击刘备时，张飞率二十骑在此据水断桥、大喝退敌而闻名。此战为赤壁之战的前哨战，张飞以孤身挡曹军的表现成就了千古名将的威名。后世"长坂桥"成为忠勇孤胆的象征，《三国演义》进一步将其演绎为张飞喝断桥梁的经典场景。
  书中原文: |
    少し詩がかった野蛮人になると、アキリスがヘクトーの死骸を引きずって、トロイの城壁を三匝したとか、燕人張飛が長坂橋に丈八の蛇矛を横えて、曹操の軍百万人を睨め返したとか大袈裟な事ばかり連想する。
  网络来源: https://zh.wikipedia.org/wiki/%E9%95%BF%E5%9D%82%E6%A1%A5

- 名词: 丈八の蛇矛
  分类: 物件·工艺
  解释: |
    中国古典小说《三国演义》中张飞使用的标志性武器，长度约一丈八尺（约4米），矛头呈蛇形弯曲。但据正史《三国志》记载，张飞仅用"矛"而未指定具体形制。"丈八蛇矛"最早出现于《晋书》载陈安使用此武器，比张飞年代更晚。因此张飞持丈八蛇矛的形象主要源于后世文学创作，尤其是《三国演义》的广泛传播使其成为定说。
  书中原文: |
    少し詩がかった野蛮人になると、アキリスがヘクトーの死骸を引きずって、トロイの城壁を三匝したとか、燕人張飛が長坂橋に丈八の蛇矛を横えて、曹操の軍百万人を睨め返したとか大袈裟な事ばかり連想する。
  网络来源: https://baike.baidu.com/item/%E4%B8%88%E5%85%AB%E8%9B%87%E7%9F%9B/64437

- 名词: 曹操
  分类: 人物
  解释: |
    东汉末年杰出的政治家、军事家、文学家（155—220年），字孟德，沛国谯县人。在东汉末年的乱世中"挟天子以令诸侯"，统一北方，官至魏王。曹丕建立曹魏后追尊为魏武帝。他推行屯田制、唯才是举，奠定了曹魏政权的基础。精兵法、善诗文，开创了建安文学流派，代表作有《短歌行》《观沧海》等。在《三国演义》中被塑造为多疑奸雄的形象。
  书中原文: |
    燕人張飛が長坂橋に丈八の蛇矛を横えて、曹操の軍百万人を睨め返したとか大袈裟な事ばかり連想する。
  网络来源: https://baike.baidu.com/item/%E6%9B%B9%E6%93%8D/183393

- 名词: 左氏
  分类: 人物
  解释: |
    即左丘明，春秋末期鲁国史官，相传为《左传》（《春秋左氏传》）的作者。《左传》是中国第一部详细的编年体史书，记载了鲁隐公元年（前722年）至鲁悼公十四年（前453年）共259年的历史，是儒家十三经之一。其叙事文笔简练而精彩，长于描写战争和外交辞令，对后世史学和文学影响极深。《左传》与《公羊传》《穀梁传》并称"春秋三传"。
  书中原文: |
    左氏が鄢陵の戦を記するに当ってもまず敵の陣勢から述べている。古来から叙述に巧みなるものは皆この筆法を用いるのが通則になっている。
  网络来源: https://baike.baidu.com/item/%E6%98%A5%E7%A7%8B%E5%B7%A6%E6%B0%8F%E4%BC%A0/23578895

- 名词: 鄢陵の戦
  分类: 事件·战争
  解释: |
    春秋时期晋楚争霸的关键战役，发生于公元前575年，地点在今河南省鄢陵县。晋厉公率军迎战楚共王率领的楚郑联军。晋军采纳楚亡臣苗贲皇的建议，先攻楚左右军再包围王族亲兵，战斗中晋将吕锜射伤楚共王一目。最终楚军因司马子反醉酒误事而夜遁。此战是继城濮之战、邲之战后晋楚第三次主力决战，也是两国最后一次正面大规模会战。
  书中原文: |
    左氏が鄢陵の戦を記するに当ってもまず敵の陣勢から述べている。古来から叙述に巧みなるものは皆この筆法を用いるのが通則になっている。
  网络来源: https://zh.wikipedia.org/zh-tw/%E9%84%A2%E9%99%B5%E4%B9%8B%E6%88%98

- 名词: ニュートン
  分类: 人物
  解释: |
    艾萨克·牛顿（1643—1727），英国物理学家、数学家、天文学家，近代科学革命的集大成者。1687年出版《自然哲学的数学原理》（《原理》），提出万有引力定律和三大运动定律，奠定了经典力学的基础。与莱布尼茨各自独立发明微积分，在光学领域发明反射望远镜、发现白光色散。被誉为"近代物理学之父"，其理论统治了自然科学界200余年。
  书中原文: |
    ニュートンの運動律第一に曰くもし他の力を加うるにあらざれば、一度び動き出したる物体は均一の速度をもって直線に動くものとす。もしこの律のみによって物体の運動が支配せらるるならば主人の頭はこの時にイスキラスと運命を同じくしたであろう。
  网络来源: https://baike.baidu.com/item/%E8%89%BE%E8%90%A8%E5%85%8B%C2%B7%E7%89%9B%E9%A1%BF/1119240

- 名词: イスキラス
  分类: 人物
  解释: |
    埃斯库罗斯（约前525/524—前456/455），古希腊三大悲剧诗人之一，被誉为"悲剧之父"。他首次将演员由一人增至两人，创造了真正的戏剧对话，确立了悲剧的三部曲形式。参加过马拉松战役和萨拉米斯海战。代表作有《被缚的普罗米修斯》《波斯人》《七将攻忒拜》以及唯一完整传世的三部曲《俄瑞斯忒亚》。传说中被老鹰丢下的乌龟砸中秃头而死。
  书中原文: |
    ニュートンの運動律第一に曰くもし他の力を加うるにあらざれば、一度び動き出したる物体は均一の速度をもって直線に動くものとす。もしこの律のみによって物体の運動が支配せらるるならば主人の頭はこの時にイスキラスと運命を同じくしたであろう。
  网络来源: https://baike.baidu.com/item/%E5%9F%83%E6%96%AF%E5%BA%93%E7%BD%97%E6%96%AF/19903811

- 名词: ライプニッツ
  分类: 人物
  解释: |
    戈特弗里德·威廉·莱布尼茨（1646—1716），德国哲学家、数学家，与笛卡尔、斯宾诺莎并称17世纪三大理性主义哲学家。与牛顿各自独立创立微积分，其记法（∫、d等）沿用至今。倡导二进制、发明机械计算机。哲学上提出"单子论"（Monadology）和"预定和谐"说，认为世界由无数不可分的精神实体"单子"构成，万物处于预定和谐之中。其"空间是共存现象的可能秩序"定义被夏目漱石在《我是猫》中引用。
  书中原文: |
    ライプニッツの定義によると空間は出来得べき同在現象の秩序である。いろはにほへとはいつでも同じ順にあらわれてくる。
  网络来源: https://baike.baidu.com/item/%E5%93%88%E5%BE%B7%E5%AF%8C%E2%82%8E%E5%A8%81%E5%BB%89%C2%B7%E8%8E%B1%E5%B8%83%E5%B0%BC%E8%8C%A8/1783541

- 名词: ダムダム弾
  分类: 物件·工艺
  解释: |
    达姆弹（Dum-dum bullet），一种在人体内容易扩张或扁平的子弹。原产于英属印度加尔各答附近的达姆达姆兵工厂（Dum Dum Arsenal）。其弹头露铅或中空结构，击中人体后如"蘑菇状"变形，造成远超常规子弹的严重创伤。1899年海牙宣言（IV,3）明确禁止在战争中使用此类子弹，国际刑事法院罗马规约将其使用列为战争罪。在《我是猫》中被用来比喻落云馆学生打来的棒球。
  书中原文: |
    当分のうち頭も禿げずにすむ、逆上は一時に直らんでも時機さえくれば漸次回復するだろう、濡れ手拭を頂いて、炬燵にあたらなくとも、樹下石上を宿としなくとも大丈夫だろうと鑑定したから、にやにやと笑ったのである。……これからダムダム弾を発射する方法を紹介する。
  网络来源: https://ihl-databases.icrc.org/zh/customary-ihl/v1/rule77

- 名词: ベースボール
  分类: 概念·观念
  解释: |
    棒球。1872年（明治5年）由美国教师霍勒斯·威尔逊在东京开成学校（东京大学前身）首次传授给日本学生。明治时代作为"文明开化"的象征迅速在精英学生阶层中普及。正冈子规（俳人）和同学中马庚将"Baseball"译为"野球"，子规还贡献了"打者""走者""飞球"等现代沿用术语。至夏目漱石写作《我是猫》的1905年前后，棒球已成为日本中学以上学校最流行的运动之一。
  书中原文: |
    ある人の説によるとこれはベースボールの練習であって、決して戦闘準備ではないそうだ。吾輩はベースボールの何物たるを解せぬ文盲漢である。しかし聞くところによればこれは米国から輸入された遊戯で、今日中学程度以上の学校に行わるる運動のうちでもっとも流行するものだそうだ。
  网络来源: https://zh.wikipedia.org/zh-my/%E6%97%A5%E6%9C%AC%E6%A3%92%E7%90%83

- 名词: 落雲館
  分类: 地点·建筑
  解释: |
    夏目漱石《我是猫》中虚构的中学名称，其实物原型为位于东京都文京区的郁文馆中学（创立于1889年）。漱石1903—1906年居住在郁文馆隔壁，以该校学生日常的喧闹为素材创作了苦沙弥先生与邻校学生的"战争"故事。作品中"落云馆"学生向苦沙弥家的院子打棒球、翻墙捡球、故意挑衅等情节，是小说后半部分的重要冲突来源。
  书中原文: |
    して見ると臥竜窟主人の苦沙弥先生と落雲館裏八百の健児との戦争は、まず東京市あって以来の大戦争の一として数えてもしかるべきものだ。
  网络来源: https://baijiahao.baidu.com/s?id=1766832955523161850

- 名词: いろはにほへと
  分类: 概念·观念
  解释: |
    《伊吕波歌》的首句，日本最著名的全字母诗（pangram）。平安时代（10—11世纪）创作的七五调短歌，用47个假名不重复地组成。内容咏唱佛教无常观——"色は匂へど散りぬるを／我が世誰ぞ常ならむ"（花虽芬芳终会凋零，此世谁能恒常不变）。传为空海作但被现代学界否定。作为假名排列顺序的"伊吕波顺"，在日本法令编号、字典排列等领域沿用至今，是日本文化的基础之一。
  书中原文: |
    ライプニッツの定義によると空間は出来得べき同在現象の秩序である。いろはにほへとはいつでも同じ順にあらわれてくる。柳の下には必ず鰌がいる。蝙蝠に夕月はつきものである。
  网络来源: https://zh.wikipedia.org/zh/%E4%BC%8A%E5%91%82%E6%B3%A2%E6%AD%8C

- 名词: 柳の下に鰌
  分类: 概念·观念
  解释: |
    日本谚语，完整形式为"柳の下にいつも泥鰌はいない"。源自中国典故"守株待兔"（《韩非子》），比喻偶然的幸运不会重复发生——在柳树下偶然抓到一条泥鳅，但不可能每次都在同一地点等到泥鳅。告诫人们不要因一次成功而固守相同方法，应当不断努力而非依赖侥幸。在《我是猫》中夏目漱石以此调侃主人期待万事按惯例发展的心态。
  书中原文: |
    ライプニッツの定義によると空間は出来得べき同在現象の秩序である。いろはにほへとはいつでも同じ順にあらわれてくる。柳の下には必ず鰌がいる。蝙蝠に夕月はつきものである。垣根にボールは不似合かも知れぬ。
  网络来源: https://jlearn.net/dictionary/%E6%9F%B3%E3%81%AE%E4%B8%8B%E3%81%AB%E3%81%84%E3%81%A4%E3%82%82%E6%B3%A5%E9%B0%8C%E3%81%AF%E3%81%84%E3%81%AA%E3%81%84

- 名词: 蝙蝠に夕月
  分类: 概念·观念
  解释: |
    日本俳句与文学中常见的季语搭配，表现黄昏时刻的寂寥美感。江户俳人与谢芜村有咏蝙蝠的名句"蝙蝠に夕月昔の友鳥か"（蝙蝠与夕月，可是昔日友鸟乎？）。蝙蝠既非鸟亦非兽的暧昧身份，与黄昏昼夜交织的朦胧氛围相映成趣，赋予此搭配独特的诗意。在《我是猫》中被夏目漱石用来戏仿"理所当然"的固定搭配模式。
  书中原文: |
    ライプニッツの定義によると空間は出来得べき同在現象の秩序である。いろはにほへとはいつでも同じ順にあらわれてくる。柳の下には必ず鰌がいる。蝙蝠に夕月はつきものである。垣根にボールは不似合かも知れぬ。
  网络来源: https://allpoetry.com/A-bat-flits

- 名词: 大日本国帝都
  分类: 概念·观念
  解释: |
    大日本帝国首都的称谓。大日本帝国是1889年《大日本帝国宪法》颁布后的日本正式国号，至1947年为止。"帝都"指天皇所在的都市，即东京。1868年明治天皇颁布"江户改称东京诏书"后，东京成为事实上的首都。在《我是猫》的写作背景（1905年前后）下，正值日俄战争期间，日本民族主义高涨，"大日本国帝都"这一表述体现了明治中后期的国家意识和帝都东京作为帝国中心的权威感。
  书中原文: |
    しかし太平の今日、大日本国帝都の中心においてかくのごとき野蛮的行動はあり得べからざる奇蹟に属している。いかに騒動が持ち上がっても交番の焼打以上に出る気遣はない。
  网络来源: https://baike.baidu.com/item/%E5%A4%A7%E6%97%A5%E6%9C%AC%E5%B8%9D%E5%9B%BD/6257844

- 名词: 吶喊
  分类: 事件·战争
  解释: |
    日语读作"とっかん"，指战斗时齐声呐喊、叫喊着突击敌阵的行为，即"鬨の声（ときのこえ）"。"吶"意为声音出不来的样子，与"喊"（大声叫）组合，表示一种威吓性的战吼。日本近代战争文学中常用此词描写冲锋场面。中文的"吶喊"含义较为宽泛，指大声叫喊、声援，鲁迅有同名短篇小说集《吶喊》。
  书中原文: |
    これから先は縦隊総がかりとなって吶喊の声を揚げる。縦隊を少し右へ離れて運動場の方面には砲隊が形勝の地を占めて陣地を布いている。
  网络来源: https://tangorin.com/words?search=%E5%90%B6%E5%96%8A
