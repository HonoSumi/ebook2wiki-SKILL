- 名词: クリシッパス
  分类: 人物
  解释: |
    克律西波斯（Chrysippus of Soli，约前280—前207），古希腊斯多葛学派哲学家，斯多葛学派第三代领袖，被誉为"斯多葛哲学的第二创建者"。生于小亚细亚索利（今土耳其南部），后在雅典师从克莱安忒斯。他在逻辑学、认识论、伦理学和自然哲学方面著述甚丰（约705部），奠定了斯多葛体系的理论基础。关于他的死因有著名传说：他看到一头驴从银碗中吃无花果，觉得太过滑稽而大笑不止，最终笑死。这一"笑死"逸事在西方哲学史上广为流传，《我是猫》中主人引用此典故反驳铃木的"笑门福来"之说。
  书中原文: |
    「昔し希臘にクリシッパスと云う哲学者があったが、君は知るまい」「知らない。それがどうしたのさ」「その男が笑い過ぎて死んだんだ」「へえー、そいつは不思議だね、しかしそりゃ昔の事だから……」「昔しだって今だって変りがあるものか。驢馬が銀の丼から無花果を食うのを見て、おかしくってたまらなくって無暗に笑ったんだ。ところがどうしても笑いがとまらない。とうとう笑い死にに死んだんだあね」
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%85%8B%E5%BE%8B%E8%A5%BF%E6%B3%A2%E6%96%AF

- 名词: 催眠術
  分类: 概念·观念
  解释: |
    催眠术，明治时代日本经历了一场空前的催眠术热潮。1903年（明治36年）前后，催眠术相关书籍、通信教育团体大量涌现，被视为对"物质万能主义"的反动，追求精神层面的慰藉。东京帝国大学心理学教授福来友吉（1869—1952）于1905年出版日本首部系统催眠术研究著作《催眠心理学概论》，并于1906年凭"催眠术之心理学研究"获博士学位。然而无资格者滥用催眠术导致社会问题，1908年日本制定《警察犯处罚令》限制"无故实施催眠术"的行为。在《我是猫》中，苦沙弥因长期肝火旺盛而请甘木医生尝试催眠治疗，但最终催眠失败，医生也无法将其催眠。
  书中原文: |
    「先生、せんだって催眠術のかいてある本を読んだら、催眠術を応用して手癖のわるいんだの、いろいろな病気だのを直す事が出来ると書いてあったですが、本当でしょうか」と聞く。「ええ、そう云う療法もあります」「今でもやるんですか」「ええ」「催眠術をかけるのはむずかしいものでしょうか」「なに訳はありません、私などもよく懸けます」
  网络来源: https://www.ndl.go.jp/kaleido/e/entry/13/1.html

- 名词: 多勢に無勢
  分类: 概念·观念
  解释: |
    日本谚语，读作"たぜいにぶぜい"，意为"寡不敌众、众寡悬殊"。由"多勢"（人数众多）与"無勢"（人数稀少）对比构成，指少数方无法与多数方抗衡。本句出自日语古语表达"众寡敌せず"（しゅうかてきせず），在日本战国时代、源平合战等历史军记物语中频繁使用，如楠木正成在多势无势中奋战、源为朝寡不敌众等典故。在《我是猫》中，铃木藤十郎用此谚语劝说顽固的苦沙弥不要与金田家等实业家势力对抗。
  书中原文: |
    「そりゃ結構です。いくら威張っても多勢に無勢ですからな」
  网络来源: https://zh.wiktionary.org/zh-hant/%E5%A4%9A%E5%8B%A2%E3%81%AB%E7%84%A1%E5%8B%A2

- 名词: 意気銷沈
  分类: 概念·观念
  解释: |
    四字熟语，读作"いきしょうちん"，意为"意气消沉、灰心丧气"。由"意気"（气概、精神）与"銷沈"（消失、沉落）构成，形容人的精神气力消失、意志消沉的状态。现代日语通常写作"意気消沈"，是表达失意、沮丧情绪的标准书面语。在《我是猫》中，铃木与车夫的对话中提到，顽固的苦沙弥受到实业家势力打压后"意气销沉"的样子值得一看，暗指苦沙弥面对金田势力时终于失去了往日的倔强。
  书中原文: |
    「面白いでしょう、あの頑固なのが意気銷沈しているところは、きっと見物ですよ」
  网络来源: https://dictionary.goo.ne.jp/word/%E6%84%8F%E6%B0%97%E6%B6%88%E6%B2%88/

- 名词: 冥頑不霊
  分类: 概念·观念
  解释: |
    四字熟语，读作"めいがんふれい"，意为"愚昧顽固、冥顽不灵"。原为中国成语，出自唐代韩愈《祭鳄鱼文》："不然，则是鳄鱼冥顽不灵，刺史虽有言，不闻不知也。"韩愈贬为潮州刺史时，当地鳄鱼为患，他写此文祭告鳄鱼，称若鳄鱼"冥顽不灵"则刺史虽言也无用。"冥顽"指愚昧顽固，"不灵"指不聪慧、不通事理。在《我是猫》中，猫以此词形容自己的主人苦沙弥，说他冥顽不灵、不知变通，面对金田等实业家的势力时仍顽固不化。
  书中原文: |
    それにしても冥頑不霊の主人も今度は少し悟らずばなるまい。これでも冥頑不霊で押し通す了見だと危ない。
  网络来源: https://baike.baidu.com/item/%E5%86%A5%E9%A1%BD%E4%B8%8D%E7%81%B5/2006433

- 名词: 笑う門には福来る
  分类: 概念·观念
  解释: |
    日本谚语，读作"わらうかどにはふくきたる"，意为"笑门福来、和气生财"。意指经常充满欢声笑语的家庭或人，自然会招来幸福和好运。源自中国成语"笑门福来"或"打开笑门福自来"，在日本战国时代至安土桃山时代（16世纪）的文献中已见记载。作为日本最广为人知的谚语之一，常作为座右铭使用，也衍生出四字熟语"笑门来福"（しょうもんらいふく）。《我是猫》中，铃木藤十郎用此谚语劝说苦沙弥保持开朗心态，但苦沙弥引用古希腊哲学家克里西波斯笑死的典故进行反驳。
  书中原文: |
    「笑う門には福来るさ」
  网络来源: https://zh.wiktionary.org/zh-hant/%E7%AC%91%E3%81%86%E9%96%80%E3%81%AB%E3%81%AF%E7%A6%8F%E6%9D%A5%E3%82%8B

- 名词: 骨折り損の草臥儲け
  分类: 概念·观念
  解释: |
    日本谚语，读作"ほねおりぞんのくたびれもうけ"，意为"劳而无功、徒劳一场"。由"骨折り損"（白费力气）与"草臥儲け"（只赚到一身疲惫）组成，指费尽力气却一无所获，唯一得到的就是疲惫不堪，是一种充满讽刺意味的表达。其变体"骨折り損のくたびれ儲け"也广泛使用。该谚语出现于江户时代的"伊吕波歌留多"中，是"ほ"（ほねおりぞん）的代表札。在《我是猫》中，铃木以此劝诫苦沙弥：一味固执己见只会妨碍自己的工作和学习，最终落得个"骨折り損の草臥儲け"的下场。
  书中原文: |
    「頑固もいいが、立て通すつもりでいるうちに、自分の勉強に障ったり、毎日の業務に煩を及ぼしたり、とどのつまりが骨折り損の草臥儲けだからね」
  网络来源: https://zh.wiktionary.org/zh-hant/%E9%AA%A8%E6%8A%98%E3%82%8A%E6%90%8D%E3%81%AE%E3%81%8F%E3%81%9F%E3%81%B3%E3%82%8C%E5%84%B2%E3%81%91

- 名词: 窮措大
  分类: 概念·观念
  解释: |
    汉语词汇，读作"きゅうそだい"，指贫穷的读书人、寒酸的知识分子。"措大"一词最早见于五代王定保《唐摭言·贤仆夫》，是唐宋以来对贫寒书生的蔑称。苏轼《东坡志林》等宋人笔记中经常出现此词。清人考证认为"措大"亦写作"醋大"，以醋酸比喻穷书生的寒酸气。另有说法认为"措"乃"能措大事"之省，本含褒义，后转为嘲讽穷酸文人的贬称。在《我是猫》中，猫以此自嘲（或以第三人称视角将此词用于主人苦沙弥），指自己一直被不识时务的穷书生（苦沙弥）家豢养，不知实业家之"御利益"。
  书中原文: |
    今まではわからずやの窮措大の家に養なわれて実業家の御利益を知らなかったのは、我ながら不覚である。
  网络来源: https://baike.baidu.com/item/%E7%A9%B7%E6%8E%AA%E5%A4%A7/9903775

- 名词: 御利益
  分类: 概念·观念
  解释: |
    读作"ごりやく"，佛教用语，指神佛给予人的恩惠、灵验、保佑。由敬语前缀"御"与佛教术语"利益"（りやく，梵语artha，意为"善果"或"功德带来的好处"）组合而成。在佛教语境中，"利益"指由于信仰、修行或善行而得到的福报和恩惠。在现代日语中，"ご利益"已成为常用词，参拜神社寺院求取"ご利益"（如健康、财运、考试合格等）是日本日常宗教文化的一部分。此词也用于世俗语境，意为从某人或某事物那里获得的实际好处。在《我是猫》中，猫感叹自己一直住在穷书生（苦沙弥）家，不曾知晓"实业家之御利益"。
  书中原文: |
    今まではわからずやの窮措大の家に養なわれて実業家の御利益を知らなかったのは、我ながら不覚である。
  网络来源: https://en.wiktionary.org/wiki/%E5%BE%A1%E5%88%A9%E7%9B%8A

- 名词: 功力
  分类: 概念·观念
  解释: |
    读作"くりき"，佛教术语，指通过修行或虔敬行为所积累的功德之力。"功"指功德（善行积累的果报），"力"指由此产生的力量（效力）。在佛教经典中，"功力"指修行者通过精进修行而获得的灵性力量，能够产生感应、实现愿望。该词也用于世俗语境中泛指某种事物或手段的效力与功用。在《我是猫》中，猫探讨金钱的力量时使用了此词——"この金の功力を心得て"（懂得这金钱的功力），以佛教"功力"的概念来形容金钱改变世界的巨大作用力，在修辞上将金钱的力量比作宗教修行带来的灵验之力。
  书中原文: |
    この金の功力を心得て、この金の威光を自由に発揮するものは実業家諸君をおいてほかに一人もない。
  网络来源: https://jisho.org/word/%E5%8A%9F%E5%8A%9B-1
