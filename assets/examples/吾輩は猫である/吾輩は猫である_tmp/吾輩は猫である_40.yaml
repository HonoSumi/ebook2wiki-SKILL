- 名词: 天水桶
  分类: 物件·工艺
  解释: |
    日本传统木造建筑中置于屋顶或屋檐处的雨水储水桶，用于收集雨水。其主要用途为防火防灾——江户时代木造建筑密集，火灾频发，天水桶作为重要的初期灭火水源被广泛设置于民宅与商家屋顶。现代建筑中仍可见其作为传统防災设施或环保雨水收集装置的遗存。
  书中原文: |
    天水桶はこのくらいにして、白い湯の方を見るとこれはまた非常な大入で、湯の中に人が這入ってると云わんより人の中に湯が這入ってると云う方が適当である。
  网络来源: https://www.mojidict.com/details/i176fb2bf3f807586

- 名词: 岩見重太郎
  分类: 人物
  解释: |
    安土桃山时代至江户初期的传奇剑客，本名薄田兼相（すすきだ かねすけ），官位为隼人正。曾是小早川隆景家臣，后仕于丰臣秀吉。在1614年大坂冬之阵中因醉酒失守博劳渊砦，被嘲为"橙武者"。翌年大坂夏之阵道明寺之战中，持三尺三寸大太刀决死奋战，壮烈战死，洗刷污名。其斩杀山贼、天桥立复仇等事迹在讲谈和草双纸中广为流传。
  书中原文: |
    岩見重太郎が大刀を振り翳して蟒を退治するところのようだが、惜しい事に未だ竣功の期に達せんので、蟒はどこにも見えない。
  网络来源: https://baike.so.com/doc/9833804-10180710.html

- 名词: 和唐内
  分类: 人物
  解释: |
    近松门左卫门创作的人形净瑠璃《国姓爷合战》（1715年初演）的主人公，以明末清初的历史人物郑成功为原型。"和唐内"之名蕴含深意——"和"代表日本、"唐"代表中国、"内"（ない）谐音"非"，合意为"非日非唐人"，象征郑成功中日混血的身份。剧中描写和唐内从中日两地起兵反清复明的故事，是江户时代最受欢迎的净瑠璃作品之一。
  书中原文: |
    和唐内の時にゃ無かったね。和唐内はやはり清和源氏さ。
  网络来源: https://zh.wikipedia.org/zh-hans/%E5%9C%8B%E6%80%A7%E7%88%BA%E5%90%88%E6%88%B0

- 名词: 清和源氏
  分类: 概念·观念
  解释: |
    日本武家氏族中最著名的一支，以第56代清和天皇的孙子源经基为始祖。其后裔建立了日本历史上三个幕府政权——源赖朝开创镰仓幕府、足利尊氏开创室町幕府、德川家康开创江户幕府（自称新田氏支流），支配日本武家政治近700年。主要分支有河内源氏、摄津源氏、甲斐源氏（武田氏）等，在日本历史中占有极其重要的地位。
  书中原文: |
    和唐内はやはり清和源氏さ。なんでも義経が蝦夷から満洲へ渡った時に、蝦夷の男で大変学のできる人がくっ付いて行ったてえ話しだね。
  网络来源: https://zh.wikipedia.org/zh-my/%E6%B8%85%E5%92%8C%E6%BA%90%E6%B0%8F

- 名词: 薬湯
  分类: 习俗·仪式
  解释: |
    日本从江户时代延续至今的药浴文化，在温泉和钱汤（公共浴场）中尤为盛行。传统药汤使用"五木八草"等药草入浴，具有治疗疾病、促进健康之效。冬至的柚子汤、端午的菖蒲汤等节气药浴至今仍是日本生活文化的一部分。现代钱汤常设有日替或周替的药汤浴槽，被视为介于普通洗澡与温泉治疗之间的日常养生方式。
  书中原文: |
    「なあにこれがちょうどいい加減です。薬湯はこのくらいでないと利きません。わたしの国なぞではこの倍も熱い湯へ這入ります」と自慢らしく説き立てるものがある。
  网络来源: https://news.allabout.co.jp/articles/o/116902/

- 名词: 十六むさし
  分类: 概念·观念
  解释: |
    日本传统棋盘游戏，又称"十六武蔵""十六六指"。使用5×5（带斜线）的棋盘，一方执1枚"武蔵"（亲石），另一方执16枚"军官"（子石），武蔵通过跳入两敌之间夹取而消灭对方。别称还有"牛追い""弁慶むさし"等，起源于中国古棋"八道行成"，在江户时代作为庶民游戏广泛流行。在《我是猫》第40章的澡堂场景中，"十六むさし"被用来比喻患者背部的皮肤病变排列。
  书中原文: |
    その左右に十六むさしに似たる形が四個ずつ行儀よく並んでいる。その十六むさしが赤く爛れて周囲に膿をもっているのもある。
  网络来源: https://educalingo.com/zh/dic-ja/shiuroku-musashi

- 名词: 苦沙弥先生
  分类: 人物
  解释: |
    夏目漱石《我是猫》中的核心人类角色，全名珍野苦沙弥（ちんの くしゃみ），职业为中学英语教师，是叙述者"吾辈"（猫）的主人。他自命清高、迂腐固执、安于清贫，与资本家金田夫妇形成鲜明对照。小说围绕他的家庭生活与社交圈子展开，通过他的视角讽刺明治时期的知识分子与金钱至上的社会风气。
  书中原文: |
    左の隅に圧しつけられて苦沙弥先生が真赤になってすくんでいる。可哀そうに誰か路をあけて出してやればいいのにと思うのに誰も動きそうにもしなければ、主人も出ようとする気色も見せない。
  网络来源: https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/56131448

- 名词: 三介
  分类: 人物
  解释: |
    江户时代钱汤（公共浴场）中工作的男性服务员。负责烧热水、为客人搓背、管理客人的私人木桶等。江户初期混浴风气盛行时钱汤中还设有"汤女"（女性服务员），幕府虽多次发布禁令但效果有限。"三介"的形象在川柳中亦多有吟咏，是江户庶民文化中极具特色的职业形象。
  书中原文: |
    坊主が石壁を向いてしゃがんでいると後ろから、小坊主がしきりに肩を叩いている。これは師弟の関係上三介の代理を務めるのであろう。本当の三介もいる。
  网络来源: https://jlearn.net/dictionary/%E4%B8%89%E5%8A%A9

- 名词: 桶屋
  分类: 物件·工艺
  解释: |
    日本传统木工职人，专门制作和修理木桶、木樽等圆形木器。使用曲刨（まげかんな）、指矩（さしがね）等特制工具，将木板拼接成形并以竹箍或铁箍固定。江户时代桶屋是重要的生活产业，产品涵盖水桶、澡盆、酱油桶、酒樽等。谚语"桶屋が儲かる"（桶屋赚钱）的说法源于"风が吹けば桶屋が儲かる"（风刮得大，桶屋就赚钱——起因是风大扬尘多，盲人增多，盲人弹三弦需猫皮，猫减少则老鼠增多，老鼠咬坏木桶，木桶需求上升），是一则著名的因果连锁故事。
  书中原文: |
    白銀町にも古い人が亡くなってね、今じゃ桶屋の元さんと煉瓦屋の大将と親方ぐれえな者だあな。
  网络来源: https://readingpass.openbook.org.tw/article/p-71129

- 名词: 手拭
  分类: 物件·工艺
  解释: |
    日本传统棉质手巾，长约90厘米、宽约35厘米，用于擦手、擦脸、洗澡、包头等日常用途。江户时代随着木棉普及而广泛使用，钱汤中客人常将手拭盖在头上或搭在肩上。现代手拭作为日本传统工艺品，常印有精美的和柄图案，也被用作礼品或室内装饰。与毛巾相比，手拭质地较薄、干得快，是日本独特的日常用品。
  书中原文: |
    「一体この湯は何に利くんでしょう」と手拭を畳んで凸凹頭をかくした男が一同に聞いて見る。
  网络来源: https://zh.wikipedia.org/zh-hans/%E6%89%8B%E6%8B%AD

- 名词: 近江屋
  分类: 地点
  解释: |
    日本历史上由近江（今滋贺县）出身的商人经营的商号名。近江商人是日本三大商人之一，活跃于江户至明治时期，在江户日本桥等地开设店铺，经营烟草、麻布、吴服等。"近江屋"这一商号在江户时代分布广泛，明治17年（1884年）在东京神田创立的"近江屋西式點心店"至今仍在营业。在《我是猫》的澡堂场景中，被提及为遭受小偷光顾的店家。
  书中原文: |
    ゆうべ、近江屋へ這入った泥棒は何と云う馬鹿な奴じゃの。あの戸の潜りの所を四角に切り破っての。そうして何も取らずに行んだげな。
  网络来源: https://tabelog.com/tw/tokyo/A1310/A131002/13000337/dtlrvwlst/B502685183/

- 名词: 坊主
  分类: 人物
  解释: |
    日语中指佛教僧侣，也用于称呼光头之人。在澡堂场景中，一位身穿浅黄棉布和服、约七十岁的僧侣出现，向所有入浴的客人行礼致意、寒暄问暖，随后与带孩子的客人交谈并提及夜间的盗贼事件。此场景生动展现了江户时代以来钱汤作为一个社区社交场所的功能——僧侣、工匠、商人等各色人等在此自然交流。
  书中原文: |
    浅黄木綿の着物をきた七十ばかりの坊主がぬっと見われた。坊主は恭しくこれらの裸体の化物に一礼して「へい、どなた様も、毎日相変らずありがとう存じます。今日は少々御寒うございますから、どうぞ御緩くり——どうぞ白い湯へ出たり這入ったりして、ゆるりと御あったまり下さい。
  网络来源: https://zh.wikipedia.org/zh-hans/%E5%83%A7%E4%BE%B6
