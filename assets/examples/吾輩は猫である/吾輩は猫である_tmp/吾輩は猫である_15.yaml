- 名词: 迷亭
  分类: 人物
  解释: |
    夏目漱石《我是猫》中的主要登场人物。身份为美学家，是主人公苦沙弥的好友兼常客。性格幽默风趣、爱恶作剧、喜欢信口胡诌，时常以滑稽的故事捉弄他人。戴金边眼镜、戴巴拿马帽子，追求西洋新风尚，是聚会中的意见领袖。代表了明治时期乐观向上、追求个性解放的知识分子形象。
  书中原文: |
    迷亭はこんなところへくると急に元気が出る。「本当に死に損いだな」と主人まで浮かれ出す。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/56131448
    https://www.sohu.com/a/312517951_99931577

- 名词: 苦沙弥
  分类: 人物
  解释: |
    夏目漱石《我是猫》的主人公。全名珍野苦沙弥（ちんのくしゃみ），是一位中学英语教师，也是叙述者"猫"的主人。性格顽固迂腐、自命清高、安于贫困，患有胃病。对文人雅士敬重，对资本家等现实势力不屑一顾。一般认为苦沙弥身上有夏目漱石本人的影子。
  书中原文: |
    「どうだい苦沙弥などはちと釣って貰っちゃあ、一寸延びたら人間並になるかも知れないぜ」と迷亭が主人の方を向くと、主人は案外真面目で「寒月君、一寸くらい背が延びて生き返る事があるだろうか」と聞く。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/56131448
    https://zh.wikipedia.org/zh-tw/%E6%88%91%E6%98%AF%E7%8C%AB

- 名词: 寒月
  分类: 人物
  解释: |
    夏目漱石《我是猫》中的登场人物，全名水島寒月（みずしま かんげつ），身份为理学士（物理学大学院生）。是苦沙弥的学生兼友人。曾研究"首吊りの力学"等滑稽课题。金田家曾欲将女儿富子嫁给他，但他最终在故乡与别的女性结婚。与迷亭、苦沙弥共同构成明治知识分子的群像。
  书中原文: |
    演説の続きは、まだなかなか長くあって寒月君は首縊りの生理作用にまで論及するはずでいたが、迷亭が無暗に風来坊のような珍語を挟むのと、主人が時々遠慮なく欠伸をするので、ついに中途でやめて帰ってしまった。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/56131448
    https://www.sohu.com/a/602035364_100026890

- 名词: 越智東風
  分类: 人物
  解释: |
    夏目漱石《我是猫》中的登场人物，是一位诗人兼戏剧表演爱好者。属于苦沙弥友人中的"附庸风雅"类型。作品中提到他在高轮泉岳寺用德语与德国夫妇交谈最终陷入窘境的趣事。叙述者猫讽刺地评价他十年后才会意识到自己胡乱献诗有多么可笑。
  书中原文: |
    「君、越智東風の高輪事件を聞いたかい」と旅順陥落の号外を知らせに来たほどの勢を示す。「きょうはその東風子の失策物語を御報道に及ぼうと思って忙しいところをわざわざ来たんだよ」
  网络来源: |
    https://book.douban.com/review/15300219/
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/56131448

- 名词: 金田
  分类: 人物
  解释: |
    夏目漱石《我是猫》中的登场人物，大资本家，靠高利贷起家。信奉"三缺"哲学——缺义理、缺人情、缺廉耻，即金钱至上。住豪华西洋馆，与苦沙弥的破旧居所形成鲜明对比。因妻子被苦沙弥冷待而怀恨在心，用金钱手段对苦沙弥进行报复。是作品中拜金主义的象征、主要的反面角色。
  书中原文: |
    「あの大きな西洋館の倉のあるうちですか、道理であすこには金田と云う標札が出ていますな」と主人はようやく金田の西洋館と、金田の倉を認識したようだが金田夫人に対する尊敬の度合は前と同様である。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/56131448
    https://www.jianshu.com/p/a581335adafa

- 名词: 金田夫人
  分类: 人物
  解释: |
    夏目漱石《我是猫》中的登场人物，大资本家金田之妻。因拥有极其巨大的鼻子而被叙述者猫戏称为"鼻子（鼻子）"。猫以夸张讽刺的笔法描写其鼻子犹如"偷了别人的鼻子安在自己脸上"。她的巨鼻与金田的塌鼻形成滑稽对比。为女儿富子的婚事奔忙，是推动作品中知识分子与资本家冲突的关键角色。
  书中原文: |
    かの鋭どい声の所有主は縮緬の二枚重ねを畳へ擦り付けながら這入って来る。年は四十の上を少し超したくらいだろう。……鼻だけは無暗に大きい。人の鼻を盗んで来て顔の真中へ据え付けたように見える。……吾輩はこの偉大なる鼻に敬意を表するため、以来はこの女を称して鼻子鼻子と呼ぶつもりである。
  网络来源: |
    https://wapbaike.baidu.com/tashuo/browse/content?id=7192586efdd268352a1a5155
    https://xyz.xdf.cn/201504/10239229.html

- 名词: 高輪
  分类: 地点·建筑
  解释: |
    东京都港区南部的地名，位于都心与郊外的边界丘陵地带。历史上是江户时代各藩的下屋敷所在地，也是东海道的沿线。地名源自"高繩原"（意为高地上的直路）。日本第一条铁路（新桥—横滨）在此经过，设有品川站。现代为高级住宅区，2020年JR山手线新站"高輪Gateway站"启用。作品中的泉岳寺位于此区域。
  书中原文: |
    「この前の日曜に東風子が高輪泉岳寺に行ったんだそうだ。この寒いのによせばいいのに――第一今時泉岳寺などへ参るのはさも東京を知らない、田舎者のようじゃないか」
  网络来源: |
    https://zh.wikipedia.org/zh-hans/%E9%AB%98%E8%BC%AA
    https://japantravel.navitime.com/zh-cn/area/jp/destinations/A02130016/overview/

- 名词: 泉岳寺
  分类: 地点·建筑
  解释: |
    位于东京都港区高轮的曹洞宗寺院，山号万松山。1612年由德川家康命门庵宗关创建，1641年烧毁后由六家大名重建。因"元禄赤穗事件"闻名，寺内安葬着赤穗四十七义士及主君浅野长矩。每年12月举行"义士祭"，有义士行列游行。寺内设有赤穗义士纪念馆和义士木像馆，是日本知名度最高的历史寺庙之一。
  书中原文: |
    「この前の日曜に東風子が高輪泉岳寺に行ったんだそうだ。……あの寺内に義士遺物保存会と云う見世物があるだろう。君知ってるか」
  网络来源: |
    https://baike.baidu.com/item/%E6%B3%89%E5%B2%B3%E5%AF%BA/917350
    https://matcha-jp.com/tw/4575

- 名词: 義士遺物保存会
  分类: 组织·机构
  解释: |
    泉岳寺内设立的展示赤穗义士遗物的组织或展览机构。作品中被称为"见世物"（展览），展示与元禄赤穗事件相关的遗物和资料。赤穗义士（四十七士）于1702年为主君浅野长矩复仇后全部切腹，其后人及敬仰者保存其遗物以供后人瞻仰。该会所管理的文物现已成为研究江户时代武士道精神的重要史料。
  书中原文: |
    「あの寺内に義士遺物保存会と云う見世物があるだろう。君知ってるか」「うんにゃ」「知らない？……その展覧場へ東風が這入って見物していると、そこへ独逸人が夫婦連で来たんだって。」
  网络来源: |
    https://baike.baidu.com/item/%E6%B3%89%E5%B2%B3%E5%AF%BA/917350
    https://matcha-jp.com/cn/4575

- 名词: 招魂社
  分类: 地点·建筑
  解释: |
    明治政府为祭奠戊辰战争等历次内战中官军战死者而设立的神社。1869年设立"东京招魂社"，1879年改称靖国神社。全国各地也设立了类似的招魂社。作品中将金田夫人巨大的鼻子比作"招魂社的石灯笼"，暗示其突兀不协调的感觉，体现了夏目漱石巧妙的讽刺手法。
  书中原文: |
    三坪ほどの小庭へ招魂社の石灯籠を移した時のごとく、独りで幅を利かしているが、何となく落ちつかない。その鼻はいわゆる鍵鼻で……
  网络来源: |
    https://www.nippon.com/cn/in-depth/a02402/
    https://m.thepaper.cn/wifiKey_detail.jsp?contid=3084491

- 名词: 天然居士
  分类: 人物
  解释: |
    夏目漱石的好友米山保三郎的居士号（佛教法号），由镰仓圆觉寺高僧今北洪川所赠。米山保三郎是漱石第一高等中学时期的同窗，醉心禅学，对漱石影响极大——曾促使漱石从建筑学转向文学，并引荐漱石至圆觉寺参禅。在《我是猫》中，主人公苦沙弥被描述为"纯然たる天然居士の再来"，意为其沉浸在自我世界、不谙世事的态度与天然居士别无二致。
  书中原文: |
    「おんなし事だ」と主人は嘯いている。純然たる天然居士の再来だ。
  网络来源: |
    https://keguanjp.com/kgjp_shehui/kgjp_sh_bestseller/pt20200907000001.html
    https://www.fx361.com/page/2017/0304/1004460.shtml

- 名词: 独逸人
  分类: 事件·习俗
  解释: |
    日本历史上对德国人的称呼，源自荷兰语"Duits"。江户锁国时期，日本主要通过荷兰获取西方知识，因此经由荷兰语引入的"独逸"一词逐渐固定下来。"独逸"是日本独立创造的汉字音译词（非经中国传入），这在西方国名译词中较为罕见。现代日语中一般用片假名"ドイツ人"，但"独逸人"在明治至昭和初期的文学作品中频繁出现。
  书中原文: |
    そこへ独逸人が夫婦連で来たんだって。それが最初は日本語で東風に何か質問したそうだ。ところが先生例の通り独逸語が使って見たくてたまらん男だろう。そら二口三口べらべらやって見たとさ。
  网络来源: |
    https://cir.nii.ac.jp/crid/1050002213399892864
    https://zh.m.wiktionary.org/zh-hans/%E7%8D%A8%E9%80%B8

- 名词: 蒔絵
  分类: 物件·工艺
  解释: |
    日本传统漆器装饰技法，在漆器表面涂漆后撒上金、银等金属粉描绘图案。"蒔"意为撒播。起源于奈良时代，平安时代形成"研出蒔絵"技法，江户时代达到全盛，代表匠人有尾形光琳、本阿弥光悦等。英语"Japan"一词曾兼指漆器，可见其国际影响力。技法分为研出蒔絵、平蒔絵、高蒔絵、肉合蒔絵等多种。
  书中原文: |
    独逸人が大鷹源吾の蒔絵の印籠を見て、これを買いたいが売ってくれるだろうかと聞くんだそうだ。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/%E8%92%94%E7%B9%AA
    https://baike.baidu.com/item/%E8%8E%B3%E7%BB%98/159667

- 名词: 印籠
  分类: 物件·工艺
  解释: |
    日本传统小型容器，原为收纳印章之用，后发展为武士挂在腰带上的药盒兼装饰品。江户时代因和服无口袋而成为随身必需品。通常以木、竹为胎，施加精美的蒔絵或螺鈿装饰，配以根付（固定纽扣）使用。小小的表面凝聚了漆工艺的精华，兼具实用性与艺术性。作品中的德国人欲购买印笼的场景，反映了西方人对日本工艺品的浓厚兴趣。
  书中原文: |
    独逸人が大鷹源吾の蒔絵の印籠を見て、これを買いたいが売ってくれるだろうかと聞くんだそうだ。その時東風の返事が面白いじゃないか、日本人は清廉の君子ばかりだから到底駄目だと云ったんだとさ。
  网络来源: |
    https://bkso.baidu.com/item/%E5%8D%B0%E7%AC%BC/254504
    https://www.hk01.com/%E8%97%9D%E6%96%87/644730

- 名词: 石灯籠
  分类: 物件·工艺
  解释: |
    日本庭园中的石制灯笼，起源于中国佛前供灯，经朝鲜半岛随佛教传入日本。最初用于寺院，安土桃山时代因茶道兴起而成为茶庭露地的景观装饰要素。基本结构包括宝珠、笠、火袋、中台、竿、基础六个部分。种类有春日灯笼、雪見灯籠、織部灯籠、徽軫灯籠等。已成为日本庭园文化的象征性元素。
  书中原文: |
    三坪ほどの小庭へ招魂社の石灯籠を移した時のごとく、独りで幅を利かしているが、何となく落ちつかない。
  网络来源: |
    https://baike.baidu.com/item/%E7%9F%B3%E7%81%AF%E7%AC%BC
    https://www.byodoin.or.jp/ch1/learn/garden/

- 名词: 掛矢
  分类: 物件·工艺
  解释: |
    日本传统的建筑用大型木槌，柄长、锤头大，需双手握持使用。主要用于房屋大木作施工中梁柱等大型构件的榫卯组装，利用重力敲击使构件紧密接合。与金属制的金槌（铁锤）不同，挂矢为木质锤头，不会损伤木构件表面。江户时代的大工具备多种槌具分工使用，挂矢是其中不可或缺的重要工具。
  书中原文: |
    たまに分るかと思うと鳶口や掛矢の事を聞かれる。西洋の鳶口や掛矢は先生何と翻訳して善いのか習った事が無いんだから弱わらあね。
  网络来源: |
    https://www.jstage.jst.go.jp/article/dougukan/3/0/3_0302/_article/-char/en
    http://www.silkroads.org.cn/portal.php/portal.php/portal.php?mod=view&aid=22672

- 名词: 鳶口
  分类: 物件·工艺
  解释: |
    日本传统的工具兼消防器具，形状如其名，长柄前端装有铁制钩形刃，形似鸢（老鹰）的喙。江户时代由"町火消"（城镇消防队）广泛用于拆毁房屋以防火势蔓延，也用于建筑工地钩拉木材等作业。是鳶職（建筑高空作业者）的象征性工具。现代日本的传统消防表演中仍可见其使用。
  书中原文: |
    たまに分るかと思うと鳶口や掛矢の事を聞かれる。西洋の鳶口や掛矢は先生何と翻訳して善いのか習った事が無いんだから弱わらあね。
  网络来源: |
    https://mazii.net/zh-TW/search/word/jacn/%E9%B3%B6%E5%8F%A3
    https://tw.tokuhain.chuo-kanko.or.jp/detail.php?id=5360
