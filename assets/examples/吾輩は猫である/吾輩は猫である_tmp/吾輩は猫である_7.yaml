- 名词: 春慶塗
  分类: 物件·工艺
  解释: |
    日本传统漆器技法之一，以飞驒（岐阜县高山市）和伊势（三重县）为代表产地。约400年前江户时代初期发祥，特点是不施金银彩绘，以黄蘗或弁柄着色后上多层透明漆，最大限度展现木纹之美。因色泽似陶工加藤景正所制茶罐"飞驒春庆"而得名。
  书中原文: |
    主人の手あぶりの角を見ると春慶塗りの巻煙草入れと並んで越智東風君を紹介致候水島寒月という名刺がある
  网络来源: https://kougeihin.jp/zh-TW/craft/0516/

- 名词: 西洋料理
  分类: 概念·观念
  解释: |
    明治时期传入日本的西餐统称。1871年肉食禁令事实上废除后，西洋料理作为"富国强兵"国策的一环被引入，先在政商阶层流行，后经"和洋折衷"改造演变为日本独有的洋食文化。代表作包括咖喱饭、炸猪排、可乐饼等，成为日本国民饮食的重要组成部分。
  书中原文: |
    その西洋料理へ行って午飯を食うのについて趣向があるというのですか
  网络来源: https://baike.baidu.com/item/%E6%B4%8B%E9%A3%9F/57762955

- 名词: 天明調
  分类: 概念·观念
  解释: |
    日本江户后期天明期（1781-1789年）的文学艺术样式。俳谐方面以回归松尾芭蕉蕉风为特征，追求风雅质素；狂歌方面以大田南亩等人为代表，以洒脱机智、滑稽讽刺见长。天明期是町人文化成熟的时期，与元禄期并称江户文坛两大高峰。
  书中原文: |
    君仏蘭西や英吉利へ行くと随分天明調や万葉調が食えるんだが、日本じゃどこへ行ったって版で圧したようで
  网络来源: https://japanknowledge.com/introduction/keyword.html?i=2033

- 名词: 万葉調
  分类: 概念·观念
  解释: |
    日本最古和歌集《万叶集》（8世纪成书）所代表的诗歌风格，亦称"ますらをぶり"（益荒男振）。特点为率直雄浑、感情真挚，与后世《古今和歌集》的纤巧优美形成对比。代表歌人有柿本人麻吕、山部赤人、山上忆良、大伴旅人等。
  书中原文: |
    君仏蘭西や英吉利へ行くと随分天明調や万葉調が食えるんだが、日本じゃどこへ行ったって版で圧したようで
  网络来源: https://zh.wikipedia.org/wiki/%E4%B8%87%E5%8F%B6%E9%9B%86

- 名词: 洋行
  分类: 事件·典故
  解释: |
    日本明治时期对海外渡航、尤其赴欧美留学和考察的称呼。明治政府为推行"富国强兵"政策，大量派遣官员和留学生赴欧美学习法律、军事、技术、医学等。洋行是日本近代化进程中知识精英吸收西方文明的重要途径，许多明治时期的思想家、政治家均有洋行经历。
  书中原文: |
    何迷亭が洋行なんかするもんですか、そりゃ金もあり、時もあり、行こうと思えばいつでも行かれるんですがね
  网络来源: https://www.jstage.jst.go.jp/article/jeigakushi1969/1994/26/1994_26_159/_article/-char/en

- 名词: 横浜
  分类: 地点
  解释: |
    日本神奈川县的主要港口城市，1859年（安政6年）开港，是最早对外开放的日本港口之一。开港后迅速成为生丝贸易中心和国际化城市，设有日本最大的中华街。1889年设市，1956年成为政令指定都市，现为东京都市圈的重要交通与商业枢纽。
  书中原文: |
    亀屋へ行っても横浜の十五番へ行っても買われませんから当分の間は御生憎様で
  网络来源: https://zh.wikipedia.org/zh-cn/%E6%A8%AA%E6%BB%A8%E5%B8%82

- 名词: 俳人
  分类: 概念·观念
  解释: |
    创作俳句或俳谐的诗人。俳句由五、七、五共17音节构成，是世界上最短的定型诗之一。自松尾芭蕉（被尊为"俳圣"）将俳谐提升为高雅艺术后，历经与谢芜村、小林一茶，至明治时期正冈子规将"发句"独立为"俳句"。俳人是日本文学史上的重要创作群体。
  书中原文: |
    材料は日本派の俳人だろうと先生が押し返して聞くとボイはへえさようで
  网络来源: https://zh.wikipedia.org/wiki/%E4%BF%B3%E4%BA%BA

- 名词: 名刺
  分类: 物件·工艺
  解释: |
    日语对"名片"的称呼，源自中国古代"刺"（竹木简上书姓名）。日本名刺文化自唐代传入，江户时期用于身份表明，明治时期随近代商业发展而普及至一般民众。名刺交换在日本商务礼仪中具有重大意义，被视为个人信用与身份的象征，交换时有严格的礼仪规范。
  书中原文: |
    水島寒月という名刺があるので、この客の名前も、寒月君の友人であるという事も知れた
  网络来源: https://baike.baidu.com/item/%E5%90%8D%E5%88%BA/5857241

- 名词: 袴
  分类: 物件·工艺
  解释: |
    日本传统和服的下裳，原指裤装，后也涵盖裙裤状服饰。起源可追溯至平安时代武家装束，正面五褶象征儒教五常（仁、义、礼、智、信）。明治时期教育家下田歌子发明女性用行灯袴，使之成为女学生的标准装束。现代多用于毕业典礼、弓道、神道仪式等正式场合。
  书中原文: |
    木綿の紋付の羽織に小倉の袴を着けて至極真面目そうな書生体の男である
  网络来源: https://zh.wikipedia.org/zh-cn/%E8%A2%B4_(%E5%92%8C%E6%9C%8D)

- 名词: メンチボー
  分类: 物件·工艺
  解释: |
    即"メンチカツ"（炸肉饼），日本洋食的代表之一。将牛肉或猪肉馅与洋葱末混合，裹面包糠油炸而成。名称源自英语"minced meat cutlet"，明治末至大正时期在东京浅草的洋食店诞生，后扩散至全日本。常搭配伍斯特酱食用，也是家常料理和便当的常见菜品。
  书中原文: |
    ボイがメンチボーですかと聞き直しましたが、先生はますます真面目な貌でメンチボーじゃないトチメンボーだと訂正されました
  网络来源: https://baike.baidu.com/item/%E7%82%B8%E8%82%89%E9%A5%BC/17177008

- 名词: 献立
  分类: 概念·观念
  解释: |
    日本料理中指完整的菜品计划和配膳顺序，远不止"菜单"之意。以"一汁三菜"（饭、汤、三道菜）为基本结构，综合考虑季节感、食材搭配、烹饪方法和上菜节奏。起源于平安时代末期，在怀石料理和会席料理中发展至极致，是日本饮食文化中体现季节性与美学意识的核心概念。
  书中原文: |
    献立を見ながらいろいろ料理についての御話しがありました
  网络来源: https://zhuanlan.zhihu.com/p/19840879

- 名词: 洒落
  分类: 概念·观念
  解释: |
    日语中指机敏风趣的言谈，尤指利用同音异义进行的双关语语言游戏。起源于古代和歌中的修辞技巧，江户时代在町人文化中高度发展，形成了"洒落本"这一独特的文学体裁。"洒落"体现日语中细腻的语言感觉和幽默精神，巧妙者为"洒落"，拙劣者则称"駄洒落"（冷笑话）。
  书中原文: |
    大方これから行くつもりのところを、過去に見立てた洒落なんでしょう
  网络来源: https://zh.wikipedia.org/wiki/%E6%B4%92%E8%90%BD%E6%9C%AC

- 名词: 月並
  分类: 概念·观念
  解释: |
    原意为"每月"，指江户时代每月定期举办的俳谐句会（月並俳諧）。明治时期正冈子规为推行俳句革新，激烈批判旧派俳谐千篇一律、陈腐守旧，将此词赋予"平凡、俗套、毫无新意"的贬义并固定下来。反映了日本近世文学史上革新与传统的对抗，是词义发生重大转折的典型案例。
  书中原文: |
    そんな月並を食いにわざわざここまで来やしないとおっしゃるんで
  网络来源: https://zh.wiktionary.org/zh-hant/%E6%9C%88%E4%B8%A6

- 名词: 日本新聞
  分类: 物件·工艺
  解释: |
    1889年（明治22年）2月11日由陆羯南在东京创刊的日刊报纸，简称《日本》。标榜"国民主义"，批判明治政府的盲目欧化政策，主张守护日本国民精神与固有文化，对明治中期的舆论和思想界产生深远影响。与《东京日日新闻》《朝日新闻》等并列为明治时期的重要言论机关。
  书中原文: |
    私しも仕方がないから、懐から日本新聞を出して読み出しました、するとボイはまた奥へ相談に行きましたよ
  网络来源: https://baike.baidu.com/item/%E9%99%86%E7%BE%AF%E5%8D%97/1303390
