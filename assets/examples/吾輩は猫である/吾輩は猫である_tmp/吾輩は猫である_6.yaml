- 名词: 餅
  分类: 物件·工艺
  解释: 日本传统食品，由糯米加工制成，口感软糯黏韧。在日本常作为节日供品和庆典食物，新年时尤其常见，可烤食或煮食，是日本年菜雑煮的重要原料。与中文的"饼"含义不同。
  书中原文: ようやくの事これは前足の助けを借りて餅を払い落すに限ると考え付いた。
  网络来源: https://zh.wikipedia.org/zh-mo/%E9%BA%BB%E7%B3%AC

- 名词: 羽子板
  分类: 物件·工艺
  解释: 日本传统木板拍，用于正月游戏"羽根突き"（类似羽毛球）。室町时代从中国传入，原为驱邪仪式，江户时代演变为女子的游乐工具，并出现装饰精美的押绘羽子板。现代东京浅草寺每年12月举办"羽子板市"。
  书中原文: 羽根も羽子板も打ち遣って勝手から「あらまあ」と飛込んで来る。
  网络来源: https://zh.m.wikipedia.org/zh-tw/%E7%BE%BD%E5%AD%90%E6%9D%BF

- 名词: 縮緬
  分类: 物件·工艺
  解释: 日本传统丝绸织物，表面有细密凹凸纹路（绉纹），由强捻纬线织造后精炼收缩而成。江户中期丹后地区创制，质地柔软温暖，是高级和服的代表性面料，广泛用于友禅染等染色工艺。
  书中原文: 細君は縮緬の紋付で「いやな猫ねえ」と仰せられる。
  网络来源: https://baike.baidu.com/item/%E7%BC%A9%E7%BC%85/1040386

- 名词: 紋付
  分类: 物件·工艺
  解释: 日本男性正式礼服，即在黑色羽织和服上加家纹（纹章），搭配袴（裤裙），为第一礼装。源自江户武家社会，明治时期经太政官令定为官吏通常礼服，至今用于冠婚葬祭、毕业典礼等正式场合。
  书中原文: 細君は縮緬の紋付で「いやな猫ねえ」と仰せられる。
  网络来源: https://bkso.baidu.com/item/%E7%BA%B9%E4%BB%98%E7%BE%BD%E7%BB%87%E8%A2%B4/4047374

- 名词: 天璋院
  分类: 人物
  解释: 江户幕府第13代将军德川家定的正室，萨摩藩岛津家出身，本名篤姫（あつひめ）。幕末时期以江户城无血开城和德川宗家存续做出重要贡献，是幕末大奥的核心人物。
  书中原文: 何でも天璋院様の御祐筆の妹の御嫁に行った先きの御っかさんの甥の娘なんだって。
  网络来源: https://zh.wikipedia.org/zh-hk/Atsuhime

- 名词: 御祐筆
  分类: 概念·观念
  解释: 日本中世至近世武家机构中的书记官职，负责文书起草与记录管理。在江户幕府和宫廷中，御祐笔（右笔）分为表右笔（行政文书）和奥右笔（机密文书），大奥内部亦有女中担任此职。
  书中原文: 何でも天璋院様の御祐筆の妹の御嫁に行った先きの御っかさんの甥の娘なんだって。
  网络来源: https://baike.baidu.com/item/%E7%A5%90%E7%AD%86

- 名词: 天祐
  分类: 概念·观念
  解释: 源自中国古典思想的"上天佑助"观念，最早见于《尚书》与《周易》。在中国哲学中，天佑与天命思想密不可分，强调上天保佑有德者、顺天应人者，主张先自助而后得天助的理性主义精神。
  书中原文: 「危きに臨めば平常なし能わざるところのものを為し能う。之を天祐という」
  网络来源: https://baike.baidu.com/item/%E5%A4%A9%E4%BC%91/62489
