- 名词: トチメンボー
  分类: 物件·工艺
  解释: |
    栃木县传统食品"栃麺"的制作工具——栃麺棒（栃面棒），也可指代该食品。栃麺是将栃（日本七叶树）果实粉末混入小麦粉中制成的面条，因栃麺比普通面更容易断裂，制作时需要快速擀制和切割，因而派生出了"とちめんぼうを踏む"（慌乱失措·失败）的惯用语。文中出现在迷亭恶作剧式的手信中，与孔雀之舌并列为虚拟的豪华盛宴。
  书中原文: |
    トチメンボー及び孔雀の舌の御馳走も可相成
  网络来源: https://jlearn.net/dictionary/%E6%A0%83%E9%BA%BA%E6%A3%92
- 名词: 孔雀の舌
  分类: 物件·工艺
  解释: |
    古代罗马盛宴中的顶级珍馐，每只孔雀仅有一舌，产量极少。罗马帝国全盛时期，孔雀之舌被视为穷奢极欲的象征，常与鸜鵒舌、红鹤舌等珍味并列出现在豪宴上。诗人贺拉斯（Horatius）曾评论其味与鸡无异，说明其价值在于稀有性而非美味本身。夏目漱石通过迷亭之笔戏仿罗马式奢靡，将之与托奇面棒并列，形成诙谐对比。
  书中原文: |
    トチメンボー及び孔雀の舌の御馳走も可相成
  网络来源: https://m.sohu.com/a/402265362_115635
- 名词: 天璋院
  分类: 人物
  解释: |
    江户幕府第13代将军德川家定的正室（御台所），本名笃姬（1836-1883），萨摩藩岛津家出身。1856年嫁入大奥，1858年家定去世后落饰为尼，法号天璋院。戊辰战争中拒绝返回萨摩藩，与胜海舟等人共同促成"江户无血开城"，以己命保全德川家与江户百万市民免遭战火。作品中的猫感叹"天璋院様"一词风雅，非寻常人家可使用。
  书中原文: |
    やはり天璋院様の何とかの何とかでなくては使えない、はなはだ雅であると感心した。
  网络来源: https://zh.wikipedia.org/zh-tw/%E7%AF%A4%E5%A7%AC
- 名词: 御維新
  分类: 概念·观念
  解释: |
    即"明治维新"，为当时日本人的口语说法，亦称"御一新"。源自《诗经·大雅·文王》"周虽旧邦，其命维新"。1868年日本推翻江户幕府，以天皇为中心推行版籍奉还、废藩置县、地租改正、学制颁布、富国强兵等一系列改革，使日本从封建社会迅速转型为近代工业国家。文中御师匠以"御維新前"为时间基准，批评维新后世风不古。
  书中原文: |
    御維新前は中間でも草履取りでも相応の作法は心得たもので、屋敷町などで、あんな顔の洗い方をするものは一人もおらなかったよ
  网络来源: https://zh-yue.m.wikipedia.org/wiki/%E6%98%8E%E6%B2%BB%E7%B6%AD%E6%96%B0
- 名词: 中間
  分类: 概念·观念
  解释: |
    江户时代武家奉公人的一种身份，位于足轻之下、小者之上。主要职责为平日宅邸杂务，战时搬运兵粮和武器。非世袭制，多为百姓或町人子弟短期就职，薪酬较低，属"卒"（非武士阶层）。中间虽非士分，但比一般百姓更接近权力中枢，是介于武士与庶民之间的社会身份。文中御师匠以中间和草履取为例，批评维新后礼仪崩坏。
  书中原文: |
    御維新前は中間でも草履取りでも相応の作法は心得たもので、屋敷町などで、あんな顔の洗い方をするものは一人もおらなかったよ
  网络来源: http://jc.newdu.com/148006.html
- 名词: 大燈国師
  分类: 人物
  解释: |
    临济宗禅僧宗峰妙超（1282-1337）的国师号，京都大德寺的开山祖师。播磨国（今兵库县）出身，师从南浦绍明（大应国师）获印可。1326年开山龙宝山大德寺，获后醍醐天皇赐"兴禅大灯国师"、花园上皇赐"高照正灯国师"号。其书法被誉为"镰仓禅林第一"，7件作品被指定为国宝。文中写苦沙弥以"大燈国師の遺誡を読むような声"朗读，讽刺其装模作样。
  书中原文: |
    主人は禅坊主が大燈国師の遺誡を読むような声を出して読み始める。
  网络来源: https://baike.baidu.com/item/%E5%AE%97%E5%B3%B0%E5%A6%99%E8%B6%85/0
- 名词: 山陽
  分类: 人物
  解释: |
    赖山阳（1781-1832），江户时代后期的历史学家、儒学家、汉诗人。大坂出生，广岛藩儒学者赖春水之子。代表作《日本外史》（22卷）以汉文纪传体叙述源平至德川幕府的武家兴衰，贯穿尊王斥霸思想，被攘夷志士奉为思想指南，吉田松阴等人深受其影响。文中迷亭引用赖山阳赞扬马夫借条为名文的逸话，以调侃苦沙弥的审美。
  书中原文: |
    昔しある人が山陽に、先生近頃名文はござらぬかといったら、山陽が馬子の書いた借金の催促状を示して近来の名文はまずこれでしょうと云ったという話があるから、君の審美眼も存外たしかかも知れん。
  网络来源: https://zh.wikipedia.org/zh-mo/%E8%B3%B4%E5%B1%B1%E9%99%BD
- 名词: 第二読本
  分类: 物件·工艺
  解释: |
    明治时期日本小学国语教育使用的国定教科书。1886年文部省导入教科书审阅制度后编纂，《寻常小学读本》国定教科书系列中的第二册，供二年级程度使用。1904年国定教科书制度确立后由文部省统一编纂。文中苦沙弥将英文课本《第二読本》中的课文当作"名文"认真翻译，闹出"巨人引力"的笑话，成为迷亭调侃他的绝佳素材。
  书中原文: |
    第二読本？ 第二読本がどうしたんだ」「僕の翻訳している名文と云うのは第二読本の中にあると云う事さ」
  网络来源: https://ndlsearch.ndl.go.jp/en/books/R100000109-I000018128
- 名词: ペスト
  分类: 概念·观念
  解释: |
    鼠疫（黑死病），由鼠疫耶尔森菌（Yersinia pestis）引起的急性传染病。历史上造成三次世界大流行：第1次6世纪地中海地区约1亿人死亡；第2次14世纪欧洲约2500万人死亡（占人口1/4）；第3次18-19世纪波及32国。日本在明治开国后也面临传入威胁。文中出现在御师匠与女仆的对话中，反映了明治时期民众对新兴外来传染病的普遍不安。
  书中原文: |
    この頃のように肺病だのペストだのって新しい病気ばかり殖えた日にゃ油断も隙もなりゃしませんのでございますよ
  网络来源: https://jscdc.cn/jscdc/jkfw_1691/jbjs/pxzm/S/201011/t20101122_21041.html
- 名词: 肺病
  分类: 概念·观念
  解释: |
    肺结核的旧称，日本传统亦称"労咳"。明治至昭和初期被称为日本的"国民病"，与脚气并称两大疾病。1935-1945年间高居日本人死因首位。明治时期工业化与城市化带来的密集居住和恶劣卫生条件使结核菌广泛传播。文中御师匠将肺病与ペスト并列为"新しい病気"，反映了明治开放后西方传染病随交流传入日本的历史背景。
  书中原文: |
    この頃のように肺病だのペストだのって新しい病気ばかり殖えた日にゃ油断も隙もなりゃしませんのでございますよ
  网络来源: https://pubmed.ncbi.nlm.nih.gov/16130906/
- 名词: 金唐皮
  分类: 物件·工艺
  解释: |
    明治时期日本发展起来的装饰工艺，在皮革或和纸上施以金色压花（エンボス）加工，也称"金唐革"或"金唐紙"。最初仿制欧美进口的金唐革壁纸用于西式建筑内装，后形成日本独自的技法。一度失传，1983年由上田尚复原，2005年被指定为"国家选定保存技术"。文中迷亭从"金唐皮の煙草入"取烟，暗示其考究的审美与追求风雅的性格。
  书中原文: |
    迷亭先生は金唐皮の煙草入から煙草をつまみ出す。
  网络来源: https://cn.edotokyokirari.jp/brands/life/kinkarakami-institute/
