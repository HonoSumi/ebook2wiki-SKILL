- 名词: 書生
  分类: 概念·观念
  解释: |
    明治时代，以帮佣家务为代价寄宿于他人家中并刻苦求学的学生。特指明治·大正时期，吸收西方学问、逐步形成新兴知识阶层的年轻人。"書生"一词随着日本高等教育的制度化逐渐被"学生"取代，是日本近代化过渡期的重要社会角色。坪内逍遥的《当世书生气质》、夏目漱石的《我是猫》等文学作品均描绘了书生的形象。
  书中原文: |
    吾輩はここで始めて人間というものを見た。しかもあとで聞くとそれは書生という人間中で一番獰悪な種族であったそうだ。
  网络来源: https://zh.wikipedia.org/zh-cn/%E7%95%B6%E4%B8%96%E6%9B%B8%E7%94%9F%E6%B0%A3%E8%B3%AA
- 名词: タカジヤスターゼ
  分类: 物件·工艺
  解释: |
    日本科学家高峰让吉（Jokichi Takamine）于1894年从清酒酿造用的麹菌（Aspergillus oryzae）中提取的消化酶制剂，是世界上第一种微生物酵素药物。名称由"Takamine（高峰）"与"diastase（淀粉酶）"组合而成。高峰让吉以此为基础创立了三共株式会社（现第一三共），该药作为家庭常备肠胃药风靡一时。
  书中原文: |
    大飯を食った後でタカジヤスターゼを飲む。
  网络来源: https://baike.baidu.com/item/%E9%AB%98%E5%B3%B0%E8%AE%A9%E5%90%89/8150142
- 名词: 炬燵
  分类: 物件·工艺
  解释: |
    日本传统冬季取暖用具，中文常译为"暖桌"或"被炉"。由矮桌、棉被和发热器组成，人们将腿伸入桌下取暖。起源于室町时代的"火闥"，最初为地面挖坑放入炭火的"掘炬燵"，二战后发展为使用红外线加热的电动式。炬燵是日本冬季最具代表性的生活场景之一，象征着家庭团聚。
  书中原文: |
    朝は飯櫃の上、夜は炬燵の上、天気のよい昼は椽側へ寝る事とした。
  网络来源: https://zh.wikipedia.org/zh-hans/%E7%82%AC%E7%87%B5
- 名词: 椽側
  分类: 物件·工艺
  解释: |
    日本传统木造房屋中，介于室内与庭院之间的半户外走廊。通常铺设木地板，高于地面约45厘米，设有檐廊。它是连接室内与自然的"中间领域"（建筑家黑川纪章称之为"灰空间"），人们可在此坐观庭景。常见表记还有"縁側"，是日本建筑中极具特色的空间元素。
  书中原文: |
    天気のよい昼は椽側へ寝る事とした。
  网络来源: https://zh.m.wikipedia.org/wiki/%E7%B7%A3%E5%81%B4
- 名词: 俳句
  分类: 概念·观念
  解释: |
    日本传统定型短诗，由五·七·五共17个音节组成，是世界上最短的诗歌形式之一。必须包含表示季节的"季语"和使用"切字"。起源于江户时代俳谐连歌的首句，经松尾芭蕉等发扬光大，明治时代正冈子规将其革新独立为"俳句"。代表作家有松尾芭蕉、与谢芜村、小林一茶等。
  书中原文: |
    俳句をやってほととぎすへ投書をしたり、新体詩を明星へ出したり。
  网络来源: https://zh.wikipedia.org/zh-tw/%E4%BF%B3%E5%8F%A5
- 名词: ほととぎす
  分类: 概念·观念
  解释: |
    日本最具权威和历史的俳句专业杂志，由正冈子规与高滨虚子于1897年1月创刊。最初在松山市发行，次年迁至东京由高滨虚子主编。杂志倡导"客观写生"与"花鸟讽咏"的俳句理念，长期占据俳坛主流。夏目漱石的《我是猫》最初就是在《杜鹃》（ホトトギス）上连载发表的。
  书中原文: |
    俳句をやってほととぎすへ投書をしたり、新体詩を明星へ出したり。
  网络来源: https://zh.wikipedia.org/zh-tw/%E6%9D%9C%E9%B5%91%E9%9B%9C%E8%AA%8C
- 名词: 新体詩
  分类: 概念·观念
  解释: |
    明治时代受西方诗歌影响而诞生的日本新形式诗歌。以1882年出版的《新体诗抄》（外山正一、矢田部良吉、井上哲次郎编）为发端，摆脱了和歌·俳句的传统定型，采用七五调等新格律，题材扩展到社会、人生、科学等领域。新体诗是日本近代诗歌的起点，后发展为浪漫主义诗歌和口语自由诗。
  书中原文: |
    俳句をやってほととぎすへ投書をしたり、新体詩を明星へ出したり。
  网络来源: https://dbpedia.org/page/Shintaishi
- 名词: 明星
  分类: 概念·观念
  解释: |
    明治时期日本最重要的浪漫主义诗歌杂志之一，由与谢野铁干（与谢野宽）于1900年创刊，作为"东京新诗社"的机关刊物。1908年停刊，共发行100期。与谢野晶子、岛崎藤村、森鸥外、石川啄木等众多文人参与，引领了明治30年代的浪漫主义诗歌运动。与谢野晶子在杂志上发表的反战诗《你不要赴死》引起巨大社会反响。
  书中原文: |
    新体詩を明星へ出したり。
  网络来源: https://www.zgbk.com/ecph/words?SiteID=1&ID=195995&Type=bkzyb&SubID=50118
- 名词: 謡
  分类: 习俗·仪式
  解释: |
    日本传统能乐剧中的歌唱部分，即能乐台本（词章）中带旋律的演唱。由"地谣"合唱队伴唱，与舞、囃子（笛·小鼓·大鼓·太鼓）共同构成能乐表演。謡曲作为日本古典表演艺术的核心要素，具有独特的幽玄美学。2001年能乐被联合国教科文组织列为世界无形文化遗产。
  书中原文: |
    時によると弓に凝ったり、謡を習ったり、またある時はヴァイオリンなどをブーブー鳴らしたりする。
  网络来源: https://zhuanlan.zhihu.com/p/46225569
- 名词: 平の宗盛
  分类: 人物
  解释: |
    日本平安时代末期的武将，平氏政权末代首领。平清盛嫡子，在其兄平重盛去世后继承平家。1181年清盛病逝后正式掌权，但缺乏政治手腕，在源平合战中屡战屡败。1185年坛之浦之战平家惨败，其投海未遂被俘，后在押送途中被斩首。作品中的"平の宗盛にて候"是能乐中的一句唱词。
  书中原文: |
    やはりこれは平の宗盛にて候を繰返している。みんながそら宗盛だと吹き出すくらいである。
  网络来源: https://baike.baidu.com/item/%E5%B9%B3%E5%AE%97%E7%9B%9B
- 名词: アンドレア・デル・サルト
  分类: 人物
  解释: |
    意大利文艺复兴盛期至后期的重要画家（1486-1530），生于佛罗伦萨。本名安德烈亚·达尼奥洛，"德尔·萨尔托"意为"裁缝之子"。融合了达芬奇的晕涂法与拉斐尔的和谐构图，以色彩丰富、技法精湛著称。代表作《哈比斯的圣母》《圣萨尔维的最后的晚餐》等。其画论"绘画应直接描绘自然"被作品中的友人引用。
  书中原文: |
    昔し以太利の大家アンドレア・デル・サルトが言った事がある。画をかくなら何でも自然その物を写せ。
  网络来源: https://www.britannica.com/biography/Andrea-del-Sarto
- 名词: 写生
  分类: 概念·观念
  解释: |
    直接观察实物或自然景物进行描绘的绘画方法。原为中国五代北宋花鸟画概念，强调捕捉对象生命力。明治时代引入西方写实主义后，该词被赋予"如实描绘"的含义。正冈子规将写生理念应用于俳句与短歌创作，推动了日本文学的写实主义运动。作品中友人以安德烈亚·德尔·萨尔托的画论劝主人公外出写生。
  书中原文: |
    どうだ君も画らしい画をかこうと思うならちと写生をしたら。
  网络来源: https://www.jstage.jst.go.jp/article/hikaku/39/0/39_7/_article/-char/ja/
- 名词: 代言
  分类: 概念·观念
  解释: |
    日本明治时期对律师的旧称。1872年司法职制定制创设"代言人"制度，规定代言人是在法院陈述诉讼主旨并进行辩论的职业。1893年旧律师法制定后，"代言人"正式改称为"弁護士"，成为现代律师制度的基础。作品中提到的"三毛君は代言の主人を持っている"暗示了三毛猫的主人是一位律师。
  书中原文: |
    白君は軍人の家におり三毛君は代言の主人を持っている。
  网络来源: https://www.thepaper.cn/newsDetail_forward_29880310
