- 名词: 本因坊
  分类: 概念
  解释: 日本围棋史上最重要的称号。原为江户时代围棋四大家之首本因坊家的家名，源自京都寂光寺的塔头"本因坊"，始祖为日海（算砂）。现代则指日本三大围棋头衔战之一的"本因坊战"，获胜棋士可袭名"本因坊"并改称号。
  书中原文: 禅坊主の碁にはこんな法はないかも知れないが、本因坊の流儀じゃ、あるんだから仕方がないさ
  网络来源: https://baike.sogou.com/m/fullLemma?lid=65468235

- 名词: 生霊
  分类: 概念
  解释: 日本民间信仰中活着的人的魂魄脱离肉体的现象，或因强烈的怨恨、嫉妒、爱执等情感而脱离肉体去附身或加害他人的魂魄。与"死灵"相对。在《源氏物语》中六条御息所化为生灵折磨葵之上是最著名的文学例证。
  书中原文: 出来た暁にはもう少し生霊の機微に触れた妙音が出ます
  网络来源: https://zh.wikipedia.org/zh-tw/%E7%94%9F%E9%9D%88

- 名词: おがら
  分类: 物件
  解释: 剥去表皮的麻（大麻）的茎干。在日本宗教仪式中用于盂兰盆节（お盆）的迎火与送火仪式，将麻干放在素烧陶皿上点燃，以引导祖先之灵来去。也用于神道仪式中的祓具等。亦写作"麻幹"。
  书中原文: 生霊はおがらを焚いて迎え奉るものと思ってたが
  网络来源: http://jc.newdu.com/46444.html

- 名词: 吐月峰
  分类: 物件
  解释: 日本烟管（kiseru）所用灰吹（烟灰容器）的一种。源自连歌师宗长在静冈柴屋寺竹林取竹制作并命名"吐月峰"（"月を吐く峰"），后成为灰吹的代名词，也指一种唾壶。文中指印有吐月峰印记的高级灰吹。
  书中原文: 吐月峰の印のある灰吹きを買いに出たところが
  网络来源: http://jc.newdu.com/161097.html

- 名词: 待った
  分类: 概念
  解释: 日本围棋中将已落下的棋子取回重下的行为（悔棋）。源自动词"待つ"的命令形用法，意为"请等一下"。正式比赛中禁止，但业余对局中有时经双方同意可允许。相扑中亦用"待った"表示仕切直し。
  书中原文: 君さっきから、六返待ったをしたじゃないか
  网络来源: https://zh.m.wiktionary.org/zh/%E5%BE%85%E3%81%A3%E3%81%9F
