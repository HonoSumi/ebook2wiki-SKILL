- 名词: 活動紙幣
  分类: 概念·观念
  解释: |
    夏目漱石《我是猫》中迷亭讽刺大资本家金田的比喻性词汇。"活动钞票"意为"行走的纸币"，指金田这个人除了金钱之外毫无人格与教养，不过是纸币被贴上眼鼻的怪物。这是迷亭对拜金主义者的痛烈批判，与后文形容寒月的"活动图书馆"形成鲜明对比——金钱的化身 vs 知识的化身。
  书中原文: |
    金田某は何だい紙幣に眼鼻をつけただけの人間じゃないか、奇警なる語をもって形容するならば彼は一個の活動紙幣に過ぎんのである。
  网络来源: |
    https://www.thepaper.cn/newsDetail_forward_16326652

- 名词: 活動図書館
  分类: 概念·观念
  解释: |
    夏目漱石《我是猫》中迷亭评价寒月的比喻。"活动图书馆"意指寒月如同行走的图书馆，是知识的化身。迷亭还用"用知识铸造的二十八珊的子弹"来形容寒月，与形容金田的"活动纸币"相对，突出知识精英与拜金主义者的截然对立。
  书中原文: |
    迷亭一流の喩をもって寒月君を評すれば彼は活動図書館である。智識をもって捏ね上げたる二十八珊の弾丸である。
  网络来源: |
    https://www.thepaper.cn/newsDetail_forward_16326652

- 名词: 鈴木藤十郎
  分类: 人物
  解释: |
    夏目漱石《我是猫》中登场的人物。苦沙弥的旧友，但后来投身实业界，成为大资本家金田的手下。信奉"极乐主义"（不抵抗、顺从权势以得安逸），以"义理缺、人情缺、廉耻缺"的三缺术为处世哲学。他是明治时期知识分子向金钱势力屈服的典型写照，与坚守清贫的苦沙弥形成鲜明对比。为了金田的委托前来游说苦沙弥撮合寒月与富子的婚事。
  书中原文: |
    鈴木君は利口者である。いらざる抵抗は避けらるるだけ避けるのが当世で、無要の口論は封建時代の遺物と心得ている。人生の目的は口舌ではない実行にある。
  网络来源: |
    https://book.douban.com/review/16795811/

- 名词: 極楽主義
  分类: 概念·观念
  解释: |
    夏目漱石《我是猫》中铃木藤十郎信奉的人生哲学。"极乐主义"指避免一切不必要的冲突、抗争和口舌之争，以最少的阻力使事件按照自己的意愿推进，从而获得安逸快乐。漱石借此讽刺明治社会中一部分知识分子放弃原则、趋炎附势的处世态度。这种"极乐主义"与苦沙弥的固执耿直形成对照。
  书中原文: |
    自己の思い通りに着々事件が進捗すれば、それで人生の目的は達せられたのである。苦労と心配と争論とがなくて事件が進捗すれば人生の目的は極楽流に達せられるのである。
  网络来源: |
    http://www.shsjcb.com/SJCB/bkview.aspx?bkid=271558&cid=806080

- 名词: サントブーヴ
  分类: 人物
  解释: |
    夏尔·奥古斯坦·圣伯夫（Charles Augustin Sainte-Beuve，1804—1869），法国文学批评家，被誉为"近代文艺批评之父"。首创传记批评法（肖像批评），通过研究作家的生平、性格、心理来理解作品。代表作有《波尔-罗瓦亚尔史》《星期一漫谈》等15卷。1844年当选法兰西学院院士。普鲁斯特后来在《驳圣伯夫》中批判其方法。作品中苦沙弥引用圣伯夫在巴黎大学被学生攻击时随身携带匕首防身的轶事，来反驳他人的嘲讽。
  书中原文: |
    サントブーヴは古今独歩の評論家であるが巴里大学で講義をした時は非常に不評判で、彼は学生の攻撃に応ずるため外出の際必ず匕首を袖の下に持って防禦の具となした事がある。
  网络来源: |
    https://wapbaike.baidu.com/item/%E5%A4%8F%E5%B0%94%C2%B7%E5%A5%A5%E5%8F%A4%E6%96%AF%E5%9D%A6%C2%B7%E5%9C%A3%E4%BC%AF%E5%A4%AB/22877246

- 名词: ブルヌチェル
  分类: 人物
  解释: |
    费迪南·布吕纳介（Ferdinand Brunetière，1849—1906），法国文学批评家、文学史家。曾任《两世界杂志》（Revue des deux mondes）主编，主张以实证主义和历史主义方法研究文学史。在德雷福斯事件中站在反德雷福斯派一边，与左拉对立。在作品中，苦沙弥引用布吕纳介在巴黎大学攻击左拉小说的轶事，来佐证自己"学者遭遇反对是常态"的观点。
  书中原文: |
    ブルヌチェルがやはり巴里の大学でゾラの小説を攻撃した時は……
  网络来源: |
    https://www.musee-orsay.fr/en/ressources/artists-personalities-catalog/ferdinand-brunetiere-203212

- 名词: 活版の睡眠剤
  分类: 概念·观念
  解释: |
    夏目漱石《我是猫》中猫观察主人苦沙弥的读书习惯后创造的独特比喻。"活版印刷的安眠药"意指对主人来说，书籍不是用来阅读的，而是用来诱导睡眠的工具。苦沙弥每晚必从书房带书到枕边，却从未连续读过两页以上，有时甚至一字未读。这一细节生动刻画了苦沙弥作为知识分子的滑稽侧面——学问的象征沦为催眠的器械。
  书中原文: |
    主人も書物を枕元に置かないと眠れないのであろう、して見ると主人に取っては書物は読む者ではない眠を誘う器械である。活版の睡眠剤である。
  网络来源: |
    https://book.douban.com/subject/2374136/blockquotes

- 名词: 竜頭蛇尾
  分类: 概念·观念
  解释: |
    四字成语，亦作"龙头蛇尾"。比喻事物的开头声势浩大，结尾却草草了事、软弱无力。语出宋代朱熹《朱子语类》卷一百三十，朱熹评苏轼为欧阳修文集所作序言"开头说得天大，结尾却不过如此，实乃龙头蛇尾"。在作品中，迷亭在激昂地赞美寒月后，一时找不到合适的形容词收尾，被猫评為"龙头蛇尾"。
  书中原文: |
    迷亭はここに至って迷亭一流と自称する形容詞が思うように出て来ないので俗に云う竜頭蛇尾の感に多少ひるんで見えたが
  网络来源: |
    https://baike.baidu.com/item/%E9%BE%99%E5%A4%B4%E8%9B%87%E5%B0%BE/5745645

- 名词: 木枯
  分类: 概念·观念
  解释: |
    日语"木枯らし"（Kogarashi），指晚秋至初冬吹来的寒冷北风。因吹落树叶、使树木枯萎而得名。日本的国字"凩"（风+木）即为此意。在俳句中属于冬季季语，象征着冬天的来临和萧瑟寂寥的氛围。作品中用木枯的呼啸声衬写客人离去后家中的寂静。
  书中原文: |
    鈴木君と迷亭君の帰ったあとは木枯しのはたと吹き息んで、しんしんと降る雪の夜のごとく静かになった。
  网络来源: |
    http://jc.newdu.com/88868.html

- 名词: 歯軋り
  分类: 概念·观念
  解释: |
    日语"歯軋り"（ Hagishiri），即磨牙、咬牙。医学上称为"ブラキシズム"（ Bruxism），指人在睡眠或清醒时无意识地上下牙齿摩擦或咬紧。常见原因包括精神压力、焦虑、睡眠障碍等。在作品中，猫听到远处女佣的磨牙声，由此引发了一段关于"做了坏事却不自知的人"的哲学式讽刺论述。
  书中原文: |
    ただ聞えるものは柱時計と細君のいびきと遠方で下女の歯軋りをする音のみである。この下女は人から歯軋りをすると云われるといつでもこれを否定する女である。
  网络来源: |
    https://www.merckmanuals.com/home/mouth-and-dental-disorders/symptoms-of-oral-and-dental-disorders/teeth-grinding

- 名词: 猿
  分类: 概念·观念
  解释: |
    哺乳纲灵长目动物的通称。在《我是猫》中，"猿"作为比喻性词汇出现在苦沙弥等人讨论进化论和相关话题的语境中，用以衬托明治时期知识分子对西方科学思想的引用方式。在猫的视角中，人类的行为有时与猿类无异，构成了作品独特的讽刺视角。
  书中原文: |
    第一天井から鼠の糞でも落ちた時危険である。
  网络来源: |
    https://baike.baidu.com/item/%E7%8C%BF/4364287

- 名词: スタビリチー
  分类: 概念·观念
  解释: |
    英语 stability（安定性、稳定性）的外来语变体表记。在《我是猫》中，迷亭用此词形容寒月"日夜研究橡子的稳定性"。这是漱石对当时日本知识分子热衷于用生僻的外来学术用语研究琐碎课题的讽剌。寒月这位高学历的理学士埋头于"橡子的稳定性"这一荒唐无用的课题，正是对明治学术界脱离现实的风气的辛辣批判。
  书中原文: |
    日夜団栗のスタビリチーを研究し、それでもなお満足する様子もなく、近々の中ロード・ケルヴィンを圧倒するほどな大論文を発表しようとしつつあるではないか。
  网络来源: |
    https://www.sohu.com/a/341123040_754657

- 名词: ロード・ケルヴィン
  分类: 人物
  解释: |
    开尔文勋爵（Lord Kelvin，本名威廉·汤姆逊，William Thomson，1824—1907），英国著名数学物理学家、工程师。在热力学领域贡献卓著，提出了绝对温标（开尔文K），确立了热力学第二定律的开尔文表述，与焦耳合作发现焦耳-汤姆逊效应。还领导铺设了首条大西洋海底电缆。在作品中，迷亭夸张地说寒月即将发表"压倒开尔文勋爵"的大论文，以此揶揄寒月的研究徒有虚名。
  书中原文: |
    近々の中ロード・ケルヴィンを圧倒するほどな大論文を発表しようとしつつあるではないか。
  网络来源: |
    https://baike.baidu.com/tashuo/browse/content?id=446bcbc9a763bbeec244b21d

- 名词: 団栗
  分类: 物件·工艺
  解释: |
    日语"団栗"（Donguri），即橡子、橡实，壳斗科植物的果实。是日本秋季的代表性风物，常见于童谣和童话中。在《我是猫》中，寒月日夜研究"团栗的稳定性"（どんぐりのスタビリチー），这一荒诞的题目是漱石对脱离现实的学究式研究的讽剌——连最普通的橡果，也要用最夸张的学术措辞来研究。
  书中原文: |
    日夜団栗のスタビリチーを研究し、それでもなお満足する様子もなく、近々の中ロード・ケルヴィンを圧倒するほどな大論文を発表しようとしつつあるではないか。
  网络来源: |
    https://book.douban.com/review/4915528/

- 名词: 百獣
  分类: 概念·观念
  解释: |
    "百獣"（Hyakujū），意为"百种野兽"或"所有的野兽"，其中"百"表示数量之多、种类之全。常用于"百獣の王"（百兽之王，即狮子）等成语中。语出唐代《酉阳杂俎》等中国古典文献。在作品中，迷亭用"百兽之中最聪慧的大象与最贪婪的小猪结婚"的比喻，来说明寒月与金田之女富子之间的不般配。
  书中原文: |
    百獣の中でもっとも聡明なる大象と、もっとも貪婪なる小豚と結婚するようなものだ。
  网络来源: |
    https://www.japanesepod101.com/forum/viewtopic.php?p=18819

- 名词: 大象
  分类: 概念·观念
  解释: |
    即大象。在《我是猫》中，迷亭使用"百兽之中最聪慧的大象"这一比喻来形容寒月——知识渊博、品格高尚。与后文的"最贪婪的小猪"（金田之女富子）形成鲜明对比，以此强调两人在智识和品格上的巨大差距，表达了迷亭对这门婚事的强烈反对态度。
  书中原文: |
    百獣の中でもっとも聡明なる大象と、もっとも貪婪なる小豚と結婚するようなものだ。
  网络来源: |
    https://www.japanesepod101.com/forum/viewtopic.php?p=18819

- 名词: 小豚
  分类: 概念·观念
  解释: |
    即小猪。在《我是猫》中，迷亭将金田之女富子比喻为"最贪婪的小猪"，与前面形容寒月的"最聪慧的大象"形成两极化对比。这一尖刻的比喻表达了迷亭对金田家族拜金主义本性的极度轻蔑——富子在迷亭眼中不过是贪婪的化身，与寒月完全不匹配。
  书中原文: |
    百獣の中でもっとも聡明なる大象と、もっとも貪婪なる小豚と結婚するようなものだ。
  网络来源: |
    https://www.japanesepod101.com/forum/viewtopic.php?p=18819

- 名词: 明治の紳士
  分类: 概念·观念
  解释: |
    "明治绅士"指明治时代（1868—1912）兼具西洋教养与传统精神的理想知识人形象。明治时期大量翻译西洋礼仪书，塑造了"绅士"这一象征西洋化与近代化的理想人格。福泽谕吉等启蒙思想家将知识人比喻为"雁奴"——先天下之忧而忧的精英。在作品中，猫讽刺道"发明极乐主义的是明治绅士，实行极乐主义的是铃木藤十郎"，暗示所谓"绅士"的虚伪性。
  书中原文: |
    極楽主義を発明したものは明治の紳士で、極楽主義を実行するものは鈴木藤十郎君で、今この極楽主義で困却しつつあるものもまた鈴木藤十郎君である。
  网络来源: |
    https://cir.nii.ac.jp/crid/1050282810779042688

- 名词: 実業家
  分类: 人物
  解释: |
    实业家，指经营实业（工商业、金融业等）的企业家。在《我是猫》中，大资本家金田是"实业家"的典型代表。金田靠高利贷起家，信奉"缺义理、缺人情、缺廉耻"的三缺主义，为了女儿婚事不择手段。作品中"实业家"常与"知识人"形成对立，象征着明治社会中金钱势力的崛起与传统知识分子的没落。
  书中原文: |
    せんだってあの鼻の主が来た時の容子を見たらいかに実業家贔負の尊公でも辟易するに極ってるよ
  网络来源: |
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392

- 名词: 仲見世
  分类: 地点
  解释: |
    仲见世（Nakamise），特指浅草寺雷门至宝藏门之间参道两侧的商店街，是日本最古老的商业街之一。起源于江户时代（17世纪），当时在浅草寺负责清扫的附近居民被授予了在参道营业的特权。全长约250米，现约有89家店铺，以人形烧、雷おこし（雷米花糖）、煎饼等传统商品闻名。作品中迷亭调侃苦沙弥说"去仲见世买个玩具气枪背着走"。
  书中原文: |
    仲見世へ行っておもちゃの空気銃を買って来て背負ってあるくがよかろう。
  网络来源: |
    https://asakusa-nakamise.jp/china01/

- 名词: 空気銃
  分类: 物件·工艺
  解释: |
    空气枪（Air Gun），利用压缩空气或气体为动力发射弹丸的枪械，不使用火药。起源于15世纪的欧洲，18世纪曾作为军用武器（奥地利军队曾配备连发空气枪）。现代主要用于奥林匹克射击竞技、狩猎和休闲射击。在作品中，迷亭戏谑地建议苦沙弥去仲见世买玩具空气枪背在身上，以此调侃苦沙弥随身携带匕首的做法。
  书中原文: |
    仲見世へ行っておもちゃの空気銃を買って来て背負ってあるくがよかろう。愛嬌があっていい。
  网络来源: |
    https://baike.baidu.com/item/%E6%B0%94%E6%9E%AA/4362560

- 名词: 俳諧
  分类: 概念·观念
  解释: |
    日本传统文艺形式之一，起源于平安时代末期的"俳谐连歌"。室町时代发展为独立形式，江户时代经松永贞德（贞门）、西山宗因（谈林）等发展，后由松尾芭蕉确立"蕉风俳谐"，提升为高雅艺术。明治时代正冈子规将俳谐连歌的"发句"（首句）独立为"俳句"。《我是猫》中提及"世间有所谓猫的恋爱这一俳谐趣味的现象"，借用俳谐一词形容猫在春天的躁动。
  书中原文: |
    ほのかに承われば世間には猫の恋とか称する俳諧趣味の現象があって
  网络来源: |
    https://baike.baidu.com/item/%E6%9D%BE%E5%B0%BE%E8%8A%AD%E8%95%89/3283668

- 名词: ジュピター
  分类: 概念·观念
  解释: |
    拉丁语Juppiter的音译，即罗马神话中的主神朱庇特（对应希腊神话的宙斯），掌管天空与雷霆，是众神之王。在作品中，猫引用"上至在天之神朱庇特，下至土中鸣叫的蚯蚓、蝼蛄"来表现恋爱是宇宙性的活力，一切生物无不为之所动。这一典故被猫用来解释春天猫为何会躁动不安。
  书中原文: |
    そもそも恋は宇宙的の活力である。上は在天の神ジュピターより下は土中に鳴く蚯蚓、おけらに至るまでこの道にかけて浮身を窶すのが万物の習いである
  网络来源: |
    https://baike.baidu.com/item/%E6%9C%B1%E5%BD%BC%E7%89%B9/3811806

- 名词: 蚯蚓
  分类: 概念·观念
  解释: |
    蚯蚓，环节动物门贫毛纲陆栖无脊椎动物，在日语中称为"ミミズ"。雌雄同体，以土壤中的有机物为食，被誉为"生态系工程师"，其排泄物能改善土壤团粒结构、增加通气性和保水性。在作品中，猫以"从在天之神朱庇特到土中鸣叫的蚯蚓"作为两端的对比，说明恋爱是万物共通的宇宙规律。
  书中原文: |
    上は在天の神ジュピターより下は土中に鳴く蚯蚓、おけらに至るまでこの道にかけて浮身を窶すのが万物の習いである
  网络来源: |
    https://zh.moegirl.org.cn/%E8%9A%AF%E8%9A%93

- 名词: 三毛子
  分类: 人物
  解释: |
    《我是猫》中登场的雌猫，因毛色为三色（白、黑、茶）而得名"三毛子"。是附近一位二弦琴师傅所养的猫。主人公（无名猫）曾对她怀有爱慕之情，但三毛子后来因感冒去世。猫在作品第25章中回忆"回顾起来，我吾辈也曾对三毛子朝思暮想"，并将其作为恋爱是宇宙普遍规律的一个例证。
  书中原文: |
    回顧すればかく云う吾輩も三毛子に思い焦がれた事もある。
  网络来源: |
    https://www.lap.c.u-tokyo.ac.jp/zh/special_lectures/160316/351/

- 名词: 阿倍川の富子
  分类: 人物
  解释: |
    《我是猫》中大资本家金田的女儿。"阿倍川"指静冈县的安倍川，以安倍川饼（一种撒有黄豆粉和糖的年糕）闻名。富子因特别喜爱安倍川饼，故被称作"阿倍川的富子"。在作品中，她是金田家婚事风波的核心人物：金田夫妇希望她嫁给理学士寒月，但寒月最终在老家另娶他人，富子则嫁给了苦沙弥的学生多多良三平。
  书中原文: |
    三角主義の張本金田君の令嬢阿倍川の富子さえ寒月君に恋慕したと云う噂である。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/60895828

- 名词: 三角主義
  分类: 概念·观念
  解释: |
    在《我是猫》的语境中，"三角主义"指金田一家所信奉的多角婚姻策略。金田作为大资本家，同时为女儿富子物色多个可能的结婚对象（寒月、多多良三平等），形成"三角"乃至多角的婚姻博弈关系。这一措辞讽刺了金田家将婚姻视为商业交易的冷酷理性，以及拜金主义渗透到家庭关系中的丑态。
  书中原文: |
    三角主義の張本金田君の令嬢阿倍川の富子さえ寒月君に恋慕したと云う噂である。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/60895828

- 名词: 煩悩
  分类: 概念·观念
  解释: |
    佛教用语，梵语kleśa的汉译。指扰乱身心、妨碍觉悟的一切精神作用，包括贪、瞋、痴、慢、疑、恶见等。佛教认为人有108种烦恼（百八烦恼），年末敲钟108次即为除去烦恼之意。在作品中，猫说自己对春天满天下的雌猫雄猫狂乱奔走"丝毫没有用烦恼、迷惘、轻蔑等念头加以轻视的想法"，体现了猫虽为旁观者却不妄加评判的态度。
  书中原文: |
    千金の春宵を心も空に満天下の雌猫雄猫が狂い廻るのを煩悩の迷のと軽蔑する念は毛頭ないのであるが
  网络来源: |
    https://baijiahao.baidu.com/s?id=1661311280520936656

- 名词: 迷
  分类: 概念·观念
  解释: |
    佛教用语，"迷"（Māyā / Moha），与"悟"相对。指因烦恼（贪、瞋、痴等）的作用而无法认清事物真实面貌的精神状态。是众生在六道中轮回流转的根本原因。在《我是猫》中，猫说"烦恼之迷"一词，是佛教式表达，意指为世俗欲望所困而产生的迷惘状态。
  书中原文: |
    満天下の雌猫雄猫が狂い廻るのを煩悩の迷のと軽蔑する念は毛頭ないのであるが
  网络来源: |
    https://www.edrdg.org/jmwsgi/entr.py?q=1641170&svc=jmdict

- 名词: 軽蔑
  分类: 概念·观念
  解释: |
    意为"轻蔑、鄙视、看不起"，指认为对方或事物没有价值而予以轻视。日语中同义词有"侮蔑""蔑視""見下す"等，反义词为"尊敬""尊重"。在作品中，猫表示自己对春天猫类因本能而狂乱奔走的行为"毫无轻蔑之意"，体现了猫作为叙事者超然物外、包容万物的态度。
  书中原文: |
    千金の春宵を心も空に満天下の雌猫雄猫が狂い廻るのを煩悩の迷のと軽蔑する念は毛頭ないのであるが
  网络来源: |
    https://zh.m.wiktionary.org/zh/%E8%BB%BD%E8%94%91

- 名词: ウェブスターの大字典
  分类: 物件·工艺
  解释: |
    诺亚·韦伯斯特（Noah Webster，1758—1843）编纂的《美国英语词典》（An American Dictionary of the English Language），初版于1828年，收录7万词条。韦伯斯特被誉为"美国学术和教育之父"，其词典确立了美式拼写（color/colour, center/centre等），是现代Merriam-Webster词典的起源。在作品中，猫观察主人的习惯——每晚把"韦伯斯特大词典"抱到卧室，却从不阅读，以此讽刺主人以书为安眠药的习惯。
  书中原文: |
    せんだってじゅうは毎晩ウェブスターの大字典さえ抱えて来たくらいである。思うにこれは主人の病気で贅沢な人が竜文堂に鳴る松風の音を聞かないと寝つかれないごとく、主人も書物を枕元に置かないと眠れないのであろう
  网络来源: |
    https://baike.baidu.com/item/%E8%AF%BA%E4%BA%9A%C2%B7%E9%9F%A6%E4%BC%AF%E6%96%AF%E7%89%B9/4993692

- 名词: 竜文堂
  分类: 物件·工艺
  解释: |
    龙文堂，日本京都的著名铁器堂号，创始于江户时代后期，是日本最早制作铁瓶（铁壶）的工坊之一，位列"京都铁瓶四大堂号"之首。以脱蜡法（失蜡法）铸造闻名，每把铁壶都是独一无二的艺术品。龙文堂铁瓶以铜盖为特色，兼具茶道美学与实用价值。在作品中，猫以"龙文堂松风声"作比喻——挑剔的人听不到龙文堂铁壶煮水时松风般的声音就睡不着。
  书中原文: |
    贅沢な人が竜文堂に鳴る松風の音を聞かないと寝つかれないごとく、主人も書物を枕元に置かないと眠れないのであろう
  网络来源: |
    https://baike.baidu.com/item/%E9%BE%99%E6%96%87%E5%A0%82/6894665

- 名词: ニッケルの袂時計
  分类: 物件·工艺
  解释: |
    镍制袖兜怀表。"袂時計"（Tamotodokei）指放在和服袖子（袂）口袋中的怀表。镍（Nickel）材质相比金银更为廉价耐用，明治后期普及品级的怀表多采用镍或洋白合金。在作品中，猫注意到苦沙弥枕边放着镍制怀表，在春夜中泛着与季节不相称的寒光。这一细节烘托出苦沙弥家清贫、朴素的氛围。
  书中原文: |
    赤い本と並んで例のごとくニッケルの袂時計が春に似合わぬ寒き色を放っている。
  网络来源: |
    https://zh.wiktionary.org/zh-hans/%E6%87%90%E4%B8%AD%E6%99%82%E8%A8%88

- 名词: ズーズー
  分类: 概念·观念
  解释: |
    日语中东北方言的俗称，语言学上称为"一假名方言"（一つ仮名弁）。其特点为"し"与"す"、"ち"与"つ"、"じ"与"ず"等四组假名的发音合流，听起来带"ズー"音，因而得名。主要分布在东北地区和山阴地区。在作品中，猫提到"北方的人因懒惰而尽量不用嘴，结果用鼻子说话似的，变成了ズーズー腔"。这是猫对人类语言习惯差异的观察。
  书中原文: |
    北の方へ行くと人間が無精になってなるべく口をあくまいと倹約をする結果鼻で言語を使うようなズーズーもあるが、鼻を閉塞して口ばかりで呼吸の用を弁じているのはズーズーよりも見ともないと思う。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/%E4%B8%9C%E5%8C%97%E6%96%B9%E8%A8%80_(%E6%97%A5%E6%9C%AC)

- 名词: 柩
  分类: 概念·观念
  解释: |
    柩（Hitsugi），即棺材、灵柩，指盛装遗体的容器。在《我是猫》中，该词出现在与死亡相关的隐喻语境中，是猫对人类生死问题的哲学思索的一部分。漱石的作品常以猫的视角对死亡进行冷澈的观察，柩这一意象象征着生命的终局。
  书中原文: |
    枕を外している。およそ人間において何が見苦しいと云って口を開けて寝るほどの不体裁はあるまいと思う。
  网络来源: |
    https://baike.baidu.com/item/%E6%9F%A9/30201

- 名词: 天真爛漫
  分类: 概念·观念
  解释: |
    四字熟语，意为性情直率、天真无邪、毫不做作。语出南宋画家龚开的诗《高马小儿图》："天真烂熳好容仪"。在日语中"天真爛漫"常用于形容儿童或少女纯真自然的姿态。在作品中，猫描写春夜的灯火照在苦沙弥家人睡姿上的情景——虽然天真烂漫却毫无风雅情趣，以此暗讽人类在睡眠中毫无防备的滑稽模样。
  书中原文: |
    さすがに春の灯火は格別である。天真爛漫ながら無風流極まるこの光景の裏に良夜を惜しめとばかり床しげに輝やいて見える。
  网络来源: |
    https://baike.baidu.com/item/%E5%A4%A9%E7%9C%9F%E7%88%9B%E6%BC%AB/827956

- 名词: 柱時計
  分类: 物件·工艺
  解释: |
    挂钟，即挂在墙壁或柱子上的摆钟。日本自明治改历（1873年）后，西洋式时钟迅速普及。明治初期大量进口美国制挂钟，1892年服部金太郎创立精工舍（Seikosha）开始国产化柱时计的量产。在作品中，夜深人静时猫听到的只有"挂钟、妻子的鼾声和远处女佣的磨牙声"，柱时计的声响烘托了深夜家中的静谧氛围。
  书中原文: |
    何時だろうと室の中を見廻すと四隣はしんとしてただ聞えるものは柱時計と細君のいびきと遠方で下女の歯軋りをする音のみである。
  网络来源: |
    https://www.city.matsumoto.nagano.jp/soshiki/143/5639.html

- 名词: 下女
  分类: 人物
  解释: |
    日语中指女性佣人、女仆、女用人。江户时代至昭和初期，农村女性流入城市做住家女佣是普遍现象。下女从事扫除、炊事、洗衣等家务劳动，社会地位较低。在作品中，猫描写深夜家里的声音时提到了"远处女佣的磨牙声"，并由此展开一段讽刺——女佣坚决否认自己磨牙，猫借此讽刺现实中那些做了坏事却自以为善良的人。
  书中原文: |
    ただ聞えるものは柱時計と細君のいびきと遠方で下女の歯軋りをする音のみである。この下女は人から歯軋りをすると云われるといつでもこれを否定する女である。
  网络来源: |
    https://wap.cnki.net/touch/web/Dissertation/Article/1017813674.nh.html

- 名词: 強情
  分类: 概念·观念
  解释: |
    日语词汇，读作"ごうじょう"，意为固执、倔强、顽固不化。指坚持己见、不肯改变。常用搭配有"強情を張る"（固执己见）。在作品中，女佣被指出磨牙时"强情"地否认，坚持说"从出生至今从未有过磨牙的记忆"。猫借此进行讽刺——"做了坏事却始终自以为是好人的人，毕竟事实不会因为天真无辜就消失"。
  书中原文: |
    私は生れてから今日に至るまで歯軋りをした覚はございませんと強情を張って決して直しましょうとも御気の毒でございますとも云わず、ただそんな覚はございませんと主張する。
  网络来源: |
    https://zh.m.wiktionary.org/wiki/%E5%BC%B7%E6%83%85
