- 名词: 仏国革命
  分类: 事件·典故
  解释: |
    指1789年至1799年发生在法兰西王国的资产阶级革命，推翻了波旁王朝的君主专制统治，发表了《人权宣言》，建立了法兰西第一共和国。书中以法国大革命时期有人发明改良断头台（首きり器械）为例，类比最先制造镜子的人可能也造了孽。
  书中原文: |
    仏国革命の当時物好きな御医者さんが改良首きり器械を発明して飛んだ罪をつくったように、始めて鏡をこしらえた人も定めし寝覚のわるい事だろう。
  网络来源: |
    https://baike.baidu.com/item/%E6%B3%95%E5%9B%BD%E5%A4%A7%E9%9D%A9%E5%91%BD

- 名词: 天保銭
  分类: 物件·工艺
  解释: |
    日本江户时代末期（1835年）开始铸造的椭圆形铜钱，正式名称为天保通宝，面值百文，但因劣质而实际按80文流通。书中用天保钱中央有方孔来形容主人公苦沙弥的心思有漏洞，像天保钱一样看似面值大却不通用。
  书中原文: |
    彼の心は天保銭のごとく穴があいているから、彼の眼もまた天保銭と同じく、大きな割合に通用しないに違ない。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/%E5%A4%A9%E4%BF%9D%E9%80%9A%E5%AF%B6

- 名词: 独逸皇帝
  分类: 人物
  解释: |
    指德意志第二帝国皇帝威廉二世（Wilhelm II，1859-1941），1888年至1918年在位。他以标志性的向上翘起的胡须（髯）闻名，并热衷于军事扩张和世界政策。书中主人公想模仿威廉二世蓄养向上翘起的胡须，体现其对威严形象的向往。
  书中原文: |
    彼のアムビションは独逸皇帝陛下のように、向上の念の熾な髯を蓄えるにある。
  网络来源: |
    https://baike.baidu.com/item/%E5%A8%81%E5%BB%89%E4%BA%8C%E4%B8%96/2731987

- 名词: 華族
  分类: 概念·观念
  解释: |
    日本明治维新后至二战结束期间（1869-1947）存在的贵族阶层。1869年废除公家、大名称号统一为华族，1884年颁布《华族令》确立公爵至男爵五等爵位制度。书中苦沙弥收到署名华族的募捐信，但吝啬的他并不打算响应。
  书中原文: |
    差し出し人は華族様である。主人は黙読一過の後直ちに封の中へ巻き納めて知らん顔をしている。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E8%8F%AF%E6%97%8F_(%E6%97%A5%E6%9C%AC)

- 名词: 凱旋祝賀会
  分类: 习俗·仪式
  解释: |
    指日俄战争（1904-1905）后日本各地为欢迎凯旋官兵而举办的大型庆祝活动。文中引用的信件提到某区计划为一千余名出征将士举办凯旋祝贺会并慰问遗族，反映了日俄战争后日本社会的庆祝热潮。
  书中原文: |
    本会は来る二十五日を期し本区内一千有余の出征将校下士卒に対し本区民一般を代表し以て一大凱旋祝賀会を開催し兼て軍人遺族を慰藉せんが為め熱誠之を迎え聊感謝の微衷を表し度
  网络来源: |
    https://www.sohu.com/a/250239450_184756

- 名词: 臥薪甞胆
  分类: 事件·典故
  解释: |
    中国著名成语典故，出自春秋时期越王勾践的故事。勾践被吴王夫差打败后，睡在柴草上、每日尝苦胆以提醒自己不忘耻辱，最终励精图治灭吴称霸。比喻刻苦自励、发愤图强。书中缝田针作引用此成语表明自己为筹集校舍资金所下的苦功。
  书中原文: |
    深く自ら警むる所あり臥薪甞胆其の苦辛の結果漸く茲に独力以て我が理想に適するだけの校舎新築費を得るの途を講じ候
  网络来源: |
    https://baike.baidu.com/item/%E5%8D%A7%E8%96%AA%E5%B0%9D%E8%83%86

- 名词: 親鸞
  分类: 人物
  解释: |
    日本镰仓时代（1173-1263）的佛教僧侣，净土真宗的开山祖师。初于比叡山学习天台宗，后师从法然专修念佛，因遭迫害被流放越后。主张绝对他力、恶人正机说，允许僧人娶妻食肉，对日本佛教世俗化影响深远。书中用来比喻敢吃海鼠之人的胆识可与高僧媲美。
  书中原文: |
    海鼠を食えるものは親鸞の再来にして
  网络来源: |
    https://baike.baidu.com/item/%E4%BA%B2%E9%B8%BE

- 名词: 日蓮
  分类: 人物
  解释: |
    日本镰仓时代（1222-1282）的佛教僧侣，日莲宗（法华宗）的创始人。专奉《法华经》，主张唱念"南无妙法莲华经"即可得救，曾因激烈批判其他宗派而遭多次迫害与流放。其法系衍生出创价学会等现代宗教团体。书中用来比喻敢吃河豚之人的勇气如日莲化身。
  书中原文: |
    河豚を喫せるものは日蓮の分身なり。
  网络来源: |
    https://baike.baidu.com/item/%E6%97%A5%E8%8E%B2/11041138

- 名词: 河豚
  分类: 物件·工艺
  解释: |
    日语读作ふぐ（fugu），是一种含有剧毒（河豚毒素）但被广泛食用的高级鱼类。日本有严格的河豚处理师资格认证制度。河豚料理包括刺身（てっさ）、火锅（てっちり）、炸河豚等。历史上丰臣秀吉时期曾颁布禁食令，至明治时代才逐步解禁。书中将最早吃河豚的人誉为勇者。
  书中原文: |
    始めて河豚を喫せる漢は其勇気に於て重んずべし。
  网络来源: |
    https://web-japan.org/trends/cn/food/jfd202101_fugu_cn.html

- 名词: 増上慢
  分类: 概念·观念
  解释: |
    佛教术语，为七种傲慢（七慢）之一。指尚未证得殊胜功德或圣果，却妄称自己已经证得（未得谓得、未证谓证）。《法华经》等经典中多有提及，是修行人容易犯的过失。书中引用此概念说明傲慢自大的人最终会害人害己。
  书中原文: |
    昔から増上慢をもって己を害し他を戕うた事蹟の三分の二はたしかに鏡の所作である。
  网络来源: |
    https://baike.baidu.com/item/%E5%A2%9E%E4%B8%8A%E6%85%A2

- 名词: 八分体
  分类: 物件·工艺
  解释: |
    中国书法中隶书的一种重要书体，又称八分书。特征是笔画左右分布、波磔分明，形如"八"字向两侧张开。起源于秦末汉初，成熟于东汉，代表碑刻有《曹全碑》等。唐代以后与隶书逐渐混同。书中用来形容信封上收件人名字的字体风格。
  书中原文: |
    珍野苦沙弥先生虎皮下と八分体で肉太に認めてある。
  网络来源: |
    https://baike.baidu.com/item/%E5%85%AB%E5%88%86%E4%BD%93

- 名词: 干瓢
  分类: 物件·工艺
  解释: |
    日本传统干燥食品，将葫芦（瓢箪）的果实削成带状后经天日干燥制成。常用于寿司卷（干瓢巻き）、煮物等日本料理中。江户时代已成为近江水口等地的特产品，歌川广重的浮世绘中也描绘过干瓢制作场景。书中用苦沙弥只懂得吃干瓢的醋味噌来讽刺其见识有限。
  书中原文: |
    苦沙弥先生の如きに至っては只干瓢の酢味噌を知るのみ。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/%E5%B9%B2%E7%93%A2

- 名词: 海鼠
  分类: 物件·工艺
  解释: |
    日文读作なまこ（namako），即海参。在日本是冬季传统食材，常以醋渍生食。干燥品（煎海鼠、いりこ）从8世纪起就被作为贡品，江户时代更成为对华重要出口商品。海参肠的盐渍品（このわた）被视为高档珍味。书中将最早吃海参的人誉为胆识过人。
  书中原文: |
    始めて海鼠を食い出せる人は其胆力に於て敬すべく
  网络来源: |
    https://www.jstage.jst.go.jp/article/ffij/220/3/220_263/_article/-char/en
