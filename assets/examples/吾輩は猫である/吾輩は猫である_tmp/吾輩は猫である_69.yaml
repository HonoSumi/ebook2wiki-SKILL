- 名词: 鉄牛面の鉄牛心
  分类: 概念
  解释: |
    禅宗用语，意为面容和内心都像铁牛一样坚固不动摇。比喻彻底不为外境所动的禅者境界。"铁牛"在禅宗中象征不惧任何外界刺激、坚固不动的信念。"铁牛面"指毫无动摇的表情，"铁牛心"指如铁般不被任何事物扰乱的心。
  书中原文: |
    禅語に鉄牛面の鉄牛心、牛鉄面の牛鉄心と云うのがある
  网络来源: |
    禅宗文献（庞居士诗偈"鐵牛不怕師子吼"、释咸杰"即心即佛，鐵牛無骨"、释绍昙"吐出鐵心肝，掛起鐵面具"等）

- 名词: アーサー・ジョーンス
  分类: 人物
  解释: |
    亨利·阿瑟·琼斯（Henry Arthur Jones，1851-1929），英国剧作家。代表作《银王》（The Silver King）、《说谎者》（The Liars）等，共创作60余部戏剧，擅长社会剧与情节剧。与王尔德、萧伯纳同时代。
  书中原文: |
    アーサー・ジョーンスと云う人のかいた脚本のなかにしきりに自殺を主張する哲学者があって……
  网络来源: |
    https://baike.baidu.com/item/亨利·阿瑟·琼斯

- 名词: コルドヴァ
  分类: 地点
  解释: |
    科尔多瓦（Córdoba），西班牙南部安达卢西亚的历史名城。曾为罗马帝国贝提卡行省首府，后成为后倭马亚王朝首都，10世纪时与巴格达、君士坦丁堡并称世界三大文化都市。以清真寺—大教堂（梅斯基塔）著称，1984年被列为世界文化遗产。
  书中原文: |
    昔しスペインにコルドヴァと云う所があった……
  网络来源: |
    https://wapbaike.baidu.com/item/科尔多瓦/62357

- 名词: 狩野法眼元信
  分类: 人物
  解释: |
    狩野元信（1476-1559），日本室町后期画家，狩野派创始人狩野正信之子。开创"和汉融合"画风，融合水墨画与大和绘技法，奠定狩野派基础。获僧位"法眼"，故称"古法眼"。代表作有大德寺大仙院《四季花鸟图襖绘》等。
  书中原文: |
    狩野法眼元信の幅を六百円ただし月賦十円払込の事で売渡す
  网络来源: |
    https://emuseum.nich.go.jp/detail?langId=zh&webView=0&content_base_id=100267

- 名词: 一念万年、万年一念
  分类: 概念
  解释: |
    禅宗用语，出自《信心铭》（僧璨）"宗非促延、一念万年"。意为短暂的一念之中包含万年之久，万年时光浓缩于当下的一念。超越时间长短的相对性，表达消除二元对立、心物不二的悟道境界。与《华严经》"一念无量劫、无量劫一念"相通。
  书中原文: |
    一念万年、万年一念。短かくもあり、短かくもなしだ
  网络来源: |
    https://baike.baidu.com/item/一念万年/5271667

- 名词: 燕雀焉んぞ大鵬の志を知らんや
  分类: 概念
  解释: |
    中国古典成语，源自《史记·陈涉世家》。原句为"燕雀安知鸿鹄之志哉"，意为燕子麻雀之类的平凡小鸟，无法理解大鹏（鸿鹄）的远大志向。比喻平庸之人无法理解英雄豪杰的抱负。是中日两国通用的谚语。
  书中原文: |
    燕雀焉んぞ大鵬の志を知らんやですね
  网络来源: |
    https://en.m.wiktionary.org/wiki/燕雀安んぞ鴻鵠の志を知らんや

- 名词: 半襦袢
  分类: 物件
  解释: |
    和服半身内衣（日语：はんじゅばん）。长度到胯部或大腿的上衣式衬衣，穿在长襦袢或肌襦袢外层、和服内层。源自葡萄牙语"gibão"。作用是保护外衣不被身体弄脏，同时领口半衿外露形成层次美感。
  书中原文: |
    半襦袢、半股引の服装でざぶりざぶりと水の中へ飛び込んだ
  网络来源: |
    https://zh.m.wikipedia.org/zh-hans/中衣

- 名词: 半股引
  分类: 物件
  解释: |
    和服半截裤装内衣（日语：はんももひき）。长度至膝盖的短款下穿裤，较长的"股引"短。原本是江户时代消防员和工匠的装束，祭典时与法被搭配穿着。也称"半だこ"。夏装和传统祭礼服饰的组成部分。
  书中原文: |
    半襦袢、半股引の服装でざぶりざぶりと水の中へ飛び込んだ
  网络来源: |
    https://jlearn.net/dictionary/半股引き
