- 名词: 山の芋
  分类: 物件·工艺
  解释: |
    山芋（自然薯），日本佐贺县唐津市的著名特产。与普通长芋不同，唐津产的山芋（自然薯）黏性极强、风味浓郁，在明治时代被视为高级食材。作品中三平君从家乡唐津带来山芋作为礼物送给苦沙弥家，却遭小偷盗窃，成为众人笑谈。夏目漱石借此展现了人物之间的幽默对话和唐津的地方特色。
  书中原文: |
    寿司は持って来んが、山の芋は上げたろう。御嬢さん喰べなさったか
  网络来源: https://www.karatsu-kankou.jp/cn/guide/products

- 名词: 唐津
  分类: 地名·场所
  解释: |
    日本佐贺县西北部的港口城市，位于东松浦半岛，面向玄界滩。名称源于古代遣唐使出航的港口（"唐"指中国，"津"意为港口）。以唐津城、虹之松原、唐津烧（陶器）闻名。每年11月举行的唐津宫日祭（唐津くんち）被联合国教科文组织列为非物质文化遗产。作品中三平君（多々良）出身于唐津，带有浓重的九州方言。
  书中原文: |
    唐津の山の芋は東京のとは違ってうまかあ
  网络来源: https://baike.baidu.com/item/%E5%94%90%E6%B4%A5%E5%B8%82/1512519

- 名词: 多々良
  分类: 人物
  解释: |
    夏目漱石《我是猫》中的登场人物，全名多々良三平（たたら さんぺい）。苦沙弥先生在中学任教时的学生，毕业后取得法学士学位，进入六つ井物産公司任职。出身唐津，操九州方言（ズーズー弁）。性格圆滑世故、追名逐利，代表明治时期新兴的实业家阶层。后攀附资本家金田家，娶金田之女为妻。与苦沙弥等清高知识分子形成鲜明对比，是作者讽刺拜金主义的角色。
  书中原文: |
    下等な書生のうちには猫を食うような野蛮人がある由はかねて伝聞したが、吾輩が平生眷顧を辱うする多々良君その人もまたこの同類ならんとは今が今まで夢にも知らなかった
  网络来源: https://bkso.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392

- 名词: オタンチン・パレオロガス
  分类: 概念·观念
  解释: |
    《我是猫》中苦沙弥夫人编造的一个戏谑性"英语"词汇，用来指代"秃头"。其中"オタンチン"是日语俗语，意为"笨蛋"或源自"御多福"的变体，又双关"凸"（秃顶）；"パレオロガス"则是拜占庭帝国末代王朝帕列奥列格王朝（Palaiologos）的日语音译。夫人煞有介事地解释"オタンチン是秃字，パレオロガス是头"，实际上是一个杜撰的词，讽刺了当时日本人盲目崇拜西洋、生造伪英语的社会风气。
  书中原文: |
    オタンチン・パレオロガスと云うんです。オタンチンと云うのが禿と云う字で、パレオロガスが頭なんでしょう
  网络来源: https://bkso.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392

- 名词: 法学士
  分类: 概念·观念
  解释: |
    日本明治时期大学法科（法学部）毕业生被授予的学士学位称号。1877年东京大学设立后，于1879年开始授予"学士"称号，"法学士"随之诞生。1887年《学位令》颁布后正式制度化。在明治时代，法学士是高级知识分子的身份象征，许多政治家、官僚和法官出自这一群体。作品中多々良三平是一名法学士，在六つ井物産会社担任要职。
  书中原文: |
    卒業の日は浅きにも係わらず堂々たる一個の法学士で、六つ井物産会社の役員であるのだから
  网络来源: https://hr.edu.cn/xueshu/202301/t20230103_2269268.shtml

- 名词: 六つ井物産会社
  分类: 物件·工艺
  解释: |
    夏目漱石《我是猫》中虚构的公司名称，是多々良三平任职的企业。一般认为该名称为日本实际存在的巨型财阀"三井物産"（Mitsui Bussan）的戏仿——将"三"翻倍为"六"。这一命名体现了漱石对明治时期资本主义和财阀社会的讽刺。作品中多々良三平以该公司役员（董事）的身份劝诱苦沙弥先生弃教从商。
  书中原文: |
    堂々たる一個の法学士で、六つ井物産会社の役員であるのだから
  网络来源: https://bkso.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392

- 名词: 綿入
  分类: 物件·工艺
  解释: |
    日本传统冬季防寒和服，在表里布料之间夹入真丝绵（绢绵）并加以绗缝固定。属于"袷"（有里布的和服）的一种加厚变体，比普通袷更加保暖，在寒冬时节穿着。江户时代至明治时代是庶民重要的防寒衣物。作品中苦沙弥先生被盗走所有衣物，前一天还穿着两件綿入，今天只能穿袷和半袖衬衫，暗示了家境的贫寒。
  书中原文: |
    昨日までは綿入を二枚重ねていたのに今日は袷に半袖のシャツだけで
  网络来源: https://baike.baidu.com/item/%E5%92%8C%E6%9C%8D/17921966

- 名词: 袷
  分类: 物件·工艺
  解释: |
    日本传统和服中一种有里衬的二重构造样式，表地与里地缝合为一整体。与"单衣"（无里衬，夏季用）相对，袷主要在春秋季至初冬穿着（一般为10月至次年5月）。是日本传统服饰文化中按季节区分的重要穿着形式。作品中苦沙弥因衣物被盗、仅剩袷可穿，暴露了他经济上的窘迫。
  书中原文: |
    昨日までは綿入を二枚重ねていたのに今日は袷に半袖のシャツだけで
  网络来源: https://baike.baidu.com/item/%E8%A2%B7/10859575

- 名词: 外濠線
  分类: 地名·场所
  解释: |
    明治末期至昭和初期在东京运行的市区路面电车线路，由东京电气铁道（外濠線）于1904年至1905年间分段开通运营，沿江户城的外护城河（外濠）运行。后经合并成为东京市电车（都电）的一部分，于1960年代末至1970年代初废止。线路沿途经过新桥、虎之门、四谷、御茶之水等地。作品中多々良三平向女主人推荐购买外濠线的股票，声称数月后价格将翻倍，反映了明治末年的炒股热潮。
  书中原文: |
    奥さん小遣銭で外濠線の株を少し買いなさらんか、今から三四個月すると倍になります
  网络来源: https://zh.m.wikipedia.org/wiki/%E9%83%BD%E9%9B%BB

- 名词: 超然主義
  分类: 概念·观念
  解释: |
    夏目漱石在《我是猫》中赋予主人公苦沙弥的一种人生态度，意指超脱世俗事务、不为名利所动的处世哲学。然而漱石以讽刺笔调揭示：苦沙弥虽标榜超然，实际上对金钱并非无动于衷，只是固守清贫的教员生活。这一矛盾是作品对明治时期知识分子"伪超然"的深刻讽刺——他们表面上超凡脱俗，实则内心充满俗念与贪欲。
  书中原文: |
    主人のような超然主義の人でも金銭の観念は普通の人間と異なるところはない
  网络来源: https://bkso.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392

- 名词: 一狐裘
  分类: 概念·观念
  解释: |
    "十年一狐裘"的略语，出自中国古典《礼记·檀弓下》"晏子一狐裘三十年"的典故。春秋时期齐国名相晏婴（晏子）一件狐裘穿了三十年，成为清廉节俭的象征。作品中多々良三平引用此典故讽刺苦沙弥身为英文讲师（リーダー専門）多年却依然清贫，意在劝其弃教从商。该词在日语中亦用来形容固守清贫而不求改变。
  书中原文: |
    先生はリーダー専門で十年一狐裘じゃ馬鹿気ておりますなあ
  网络来源: https://baike.baidu.com/item/%E6%99%8F%E5%AD%90%E8%A3%98/10606445

- 名词: 盆暮
  分类: 习俗·仪式
  解释: |
    日语词汇，指代日本传统中最重要的两个节日时期——"盆"（盂兰盆节，通常在8月，祭祀祖先的佛教节日）和"暮"（岁末/年终）。在日本商业文化中，这两个时期是企业发放奖金（配当）和进行礼尚往来的重要节点。作品中多々良三平介绍铃木藤十郎的薪资时提到"盆暮に配当がつく"，指的是除月薪外，在盆节和年末还有额外分红，是当时一流企业待遇的体现。
  书中原文: |
    月給が二百五十円で盆暮に配当がつきますから、何でも平均四五百円になりますばい
  网络来源: https://zh.m.wiktionary.org/zh-hant/%E7%9B%86%E6%9A%AE%E3%82%8C

- 名词: 工学士
  分类: 概念·观念
  解释: |
    日本明治时期大学工科（工学部）毕业生被授予的学士学位称号。随着1871年工部大学校的设立和1886年帝国大学工科大学的成立，日本开始系统培养工学领域的高级技术人才。工学士在明治·大正时期被视为产业近代化的中坚力量，多进入政府担任技术官僚或进入大型企业。作品中铃木藤十郎拥有工学士学位，在九州煤矿工作后调任东京，月薪高达250日元。
  书中原文: |
    先生あの鈴木藤十郎と云う工学士を知ってなさるか
  网络来源: https://hr.edu.cn/xueshu/202301/t20230103_2269268.shtml

- 名词: 炭坑
  分类: 物件·工艺
  解释: |
    日语中指煤矿（炭鉱）的坑道及采掘场所。九州地区（尤其是福冈县筑丰炭田和佐贺县、长崎县）是日本近代最重要的产煤区，在明治至昭和年间为日本的工业革命提供了主要能源。作品中铃木藤十郎曾在九州炭坑工作，后被调回东京总部任职，反映了明治时期技术人员从地方矿山调往中央的职业路径。
  书中原文: |
    今まで九州の炭坑におりましたが、こないだ東京詰になりました
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%B1%B1%E6%9C%AC%E4%BD%9C%E5%85%B5%E8%A1%9B

- 名词: 枯坐
  分类: 概念·观念
  解释: |
    汉语及日语中的文学词汇，意为"无精打采地独坐"、"呆坐"，指心无所寄、百无聊赖地坐着的样子。"枯"字取枯槁、无生气的意象。作品中使用该词描绘苦沙弥先生被盗后因缺少衣物御寒、无法活动而枯坐室内的窘态——血液循环不畅、手脚冰冷，反映了明治时期底层知识分子的清贫生活。
  书中原文: |
    朝から運動もせず枯坐したぎりであるから、不充分な血液はことごとく胃のために働いて手足の方へは少しも巡回して来ない
  网络来源: https://baike.baidu.com/item/%E6%9E%AF%E5%9D%90
