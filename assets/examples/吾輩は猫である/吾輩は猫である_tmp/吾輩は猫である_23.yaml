- 名词: 三角術
  分类: 概念·观念
  解释: |
    夏目漱石《吾辈は猫である》中出现的讽刺性商业概念。铃木藤十郎转述某实业家的说法，称赚钱必须使用"三角术"——即舍弃义理（义理をかく）、舍弃人情（人情をかく）、舍弃羞耻（恥をかく），三者形成三角。这是漱石对明治时代拜金主义资本家的辛辣批判。
  书中原文: |
    金を作るにも三角術を使わなくちゃいけないと云うのさ——義理をかく、人情をかく、恥をかくこれで三角になるそうだ面白いじゃないかアハハハハ
  网络来源: |
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392

- 名词: パスカル
  分类: 人物
  解释: |
    布莱兹·帕斯卡（Blaise Pascal，1623-1662），法国数学家、物理学家、哲学家。作品中迷亭引用其《思想录》中的名言"克利奥帕特拉的鼻子"，以此论证鼻子的大小可能改变历史进程，反驳对金田夫人大鼻子的嘲笑。
  书中原文: |
    パスカルがこんな事を云っている「もしクレオパトラの鼻が少し短かかったならば世界の表面に大変化を来したろうと」
  网络来源: |
    https://baike.baidu.com/item/%E5%B8%83%E8%8E%B1%E5%85%B9%C2%B7%E5%B8%95%E6%96%AF%E5%8D%A1

- 名词: クレオパトラの鼻
  分类: 事件·典故
  解释: |
    帕斯卡《思想录》中著名的历史偶然性典故："如果克利奥帕特拉的鼻子更短一些，整个世界的面貌就会改变。"意指重大历史转折可能被微小的偶然事件所左右。作品中迷亭引用此典来论证不可轻视鼻子的大小，反击对金田夫人大鼻子的嘲笑。
  书中原文: |
    もしクレオパトラの鼻が少し短かかったならば世界の表面に大変化を来したろうと
  网络来源: |
    https://baike.baidu.com/item/%E5%B8%95%E6%96%AF%E5%8D%A1/4587

- 名词: 以心伝心
  分类: 概念·观念
  解释: |
    佛教禅宗用语，意为不借助语言文字，以心传心、师徒间直接以心灵感悟传递佛法真谛。源自释迦牟尼"拈花微笑"的典故。作品中猫观察到迷亭闯入后三人沉默的微妙场面，将之比作禅宗的无言问答和以心传心。
  书中原文: |
    禅家で無言の問答をやるのが以心伝心であるなら、この無言の芝居も明かに以心伝心の幕である。すこぶる短かいけれどもすこぶる鋭どい幕である。
  网络来源: |
    https://zh.wikipedia.org/zh-mo/%E4%BB%A5%E5%BF%83%E4%BC%A0%E5%BF%83

- 名词: 藤村の羊羹
  分类: 物件·工艺
  解释: |
    日本东京本乡（东京大学附近）的老字号和果子名品，以藤紫色的羊羹著称。历史可追溯至丰臣秀吉时代，曾是御用果子。夏目漱石常光顾此店，作品中迷亭来访时毫不客气地抓起藤村羊羹大口吃，展现了这家店在明治文坛的名气。
  书中原文: |
    藤村の羊羹を無雑作に頰張る
  网络来源: |
    https://storystudio.tw/article/gushi/%E7%82%BA%E4%BB%80%E9%BA%BC%E7%BE%8A%E7%BE%B9%E8%A3%8F%E9%9D%A2%E6%B2%92%E6%9C%89%E7%BE%8A/

- 名词: 金田の娘
  分类: 人物
  解释: |
    夏目漱石《吾辈は猫である》中的人物，大资本家金田的独生女，本名富子。被迷亭讽刺为"活动支票"。金田夫妇希望将她嫁给水岛寒月，并开出了必须获得博士学位的条件。作品中铃木藤十郎前来传达金田家的意向，称该女子对寒月有意。
  书中原文: |
    娘その人とは没交渉の沙汰と云わねばならぬ。娘には恩も恨みもなくて、寒月は自分が実の弟よりも愛している門下生である。
  网络来源: |
    https://www.jianshu.com/p/a581335adafa

- 名词: 実業家
  分类: 概念·观念
  解释: |
    明治时代日本资本主义发展过程中崛起的实业家/资本家阶层。作品中主人公苦沙弥坦言"从学生时代就讨厌实业家"，而金田和铃木藤十郎作为实业家代表被刻画为拜金、缺乏道德感的形象。体现了漱石对明治资本主义社会"金钱至上"风气的批判态度。
  书中原文: |
    僕は実業家は学校時代から大嫌だ。金さえ取れれば何でもする、昔で云えば素町人だからな
  网络来源: |
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392

- 名词: 無言劇
  分类: 概念·观念
  解释: |
    即哑剧（pantomime），不用台词仅靠肢体动作和表情表演的戏剧形式。作品中猫看到迷亭突然闯入后三人沉默的微妙场面，认为无声剧完全可以成立，且比有声音更尖锐深刻，暗示沉默中蕴含丰富的情感交流。
  书中原文: |
    吾輩はこの瞬時の光景を椽側から拝見して無言劇と云うものは優に成立し得ると思った。
  网络来源: |
    https://baike.baidu.com/item/%E5%93%91%E5%89%A7

- 名词: 博士論文
  分类: 概念·观念
  解释: |
    博士学位申请论文。作品中金田家提出以寒月获得博士学位作为嫁女儿的条件，既为保全在世俗社会的面子，也为提升家族声望。反映了明治时代学历崇拜与门第观念，以及新兴资本家阶层对学术头衔的功利追求。
  书中原文: |
    博士論文でも呈出して、博士の学位を受けるような運びには行くまいか。なあに——金田だけなら博士も学士もいらんのさ、ただ世間と云う者があるとね、そう手軽にも行かんからな
  网络来源: |
    https://baike.baidu.com/item/%E5%8D%9A%E5%A3%AB%E8%AE%BA%E6%96%87

- 名词: 禅家
  分类: 概念·观念
  解释: |
    禅宗佛教的修行者或禅宗流派。禅宗以"不立文字、教外别传、直指人心、见性成佛"为宗旨，强调超越语言文字的直观觉悟。作品中猫将迷亭、铃木、主人三人沉默的戏剧性场面与禅家的无言问答相类比。
  书中原文: |
    禅家で無言の問答をやるのが以心伝心であるなら、この無言の芝居も明かに以心伝心の幕である。
  网络来源: |
    https://baike.baidu.com/item/%E7%A6%85%E5%AE%97

- 名词: 水島寒月
  分类: 人物
  解释: |
    夏目漱石《吾辈は猫である》中的人物。苦沙弥（主人）最喜爱的门生，理学士，钻研物理学。以独特的博士论文题目闻名。金田家选中的女婿候选人，金田夫人提出以博士称号作为结婚条件。其原型被认为是物理学家寺田寅彦，曾以"尺八的音响学研究"取得博士学位。
  书中原文: |
    寒月は自分が実の弟よりも愛している門下生である。もし当人同志が好いた仲なら、間接にもこれを妨害するのは君子のなすべき所作でない。
  网络来源: |
    https://www.jianshu.com/p/a581335adafa

- 名词: 金田の細君
  分类: 人物
  解释: |
    夏目漱石《吾辈は猫である》中的人物。大资本家金田的妻子，以异常巨大的鼻子为标志性特征，被迷亭等人戏称为"鼻子夫人"。她曾亲自拜访苦沙弥打听寒月的情况，但由于迷亭在场捣乱未能达成目的，后委托铃木藤十郎再次前往。她的鼻子被迷亭用作俳体诗的创作题材。
  书中原文: |
    鼻だよ、大きな鼻の事を云ってるんだ。せんだって僕はあの鼻について俳体詩を作ったがね
  网络来源: |
    https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392

- 名词: 鈴木藤十郎
  分类: 人物
  解释: |
    夏目漱石《吾辈は猫である》中的人物。苦沙弥和迷亭的旧同学，后成为小资本家。信奉以"三角术"为代表的拜金主义哲学，充当金田家的走卒，受命前来打探寒月的婚姻态度。性格圆滑世故，与直言不讳的苦沙弥形成鲜明对比，是明治世俗实业家的典型形象。
  书中原文: |
    鈴木君の挨拶は少々曖昧である。実は寒月君の事だけ聞いて復命さえすればいいつもりで、御嬢さんの意向までは確かめて来なかったのである。
  网络来源: |
    https://www.jianshu.com/p/a581335adafa

- 名词: シャーレマン
  分类: 人物
  解释: |
    查理曼大帝（Charlemagne，742-814），又称卡尔大帝，法兰克国王，中世纪欧洲的重要统治者，加洛林帝国建立者。其传记作者艾因哈德记载其鼻子略长。作品中迷亭在关于鼻子的讨论中询问铃木是否知道查理曼鼻子的形状。
  书中原文: |
    君シャーレマンの鼻の恰好を知ってるか
  网络来源: |
    https://baike.baidu.com/item/%E6%9F%A5%E7%90%86%E6%9B%BC%E5%A4%A7%E5%B8%9D

- 名词: エルリントン
  分类: 人物
  解释: |
    夏目漱石《吾辈は猫である》中迷亭提及的历史或军事人物。据迷亭所言，此人的部下因其大鼻子而给他起了"鼻鼻"（鼻々）的绰号。在讨论历史人物鼻子的话题中与查理曼大帝并列出现，具体所指人物因缺乏明确记载而有多种推测。
  书中原文: |
    エルリントンは部下のものから鼻々と異名をつけられていた。君知ってるか
  网络来源: |
    未检索到明确的网络资料

- 名词: 電車株
  分类: 概念·观念
  解释: |
    明治时代日本的电气铁路（路面电车）股票。作品中铃木藤十郎自称持有六十股街铁（市区铁路）股票，显摆自己的经济实力。迷亭则调侃说自己曾持有八百八十八股半但被虫蛀了。反映了明治后期新兴铁路产业带动的股票投机热潮。
  书中原文: |
    今日は諸君からひやかされに来たようなものだ。なんぼ田舎者だって——これでも街鉄を六十株持ってるよ
  网络来源: |
    http://www.sosekiproject.org/iamacat/iamacat04b-131.html
