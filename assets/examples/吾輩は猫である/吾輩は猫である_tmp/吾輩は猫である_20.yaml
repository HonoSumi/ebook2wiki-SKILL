- 名词: ウィルヒョウ
  分类: 人物·历史
  解释: >
    鲁道夫·魏尔啸（Rudolf Virchow，1821-1902），德国病理学家、人类学家、政治家，被誉为"病理学之父"。1858年出版《细胞病理学》，提出"Omnis cellula e cellula"（一切细胞来自细胞）的命题，奠定了现代病理学的基础。文中苦沙弥引用其学说来论述遗传问题。
  书中原文: >
    公式にウィルヒョウ、ワイスマン諸家の説を参酌して考えて見ますと
  网络来源: https://www.britannica.com/biography/Rudolf-Virchow

- 名词: ワイスマン
  分类: 人物·历史
  解释: >
    奥古斯特·魏斯曼（August Weismann，1834-1914），德国进化生物学家，弗莱堡大学教授。提出"种质学说"（Germ Plasm Theory），主张遗传信息仅通过生殖细胞传递，体细胞变化不能遗传，即"魏斯曼屏障"。通过断尾实验否定了拉马克学说，与达尔文理论结合形成新达尔文主义。
  书中原文: >
    公式にウィルヒョウ、ワイスマン諸家の説を参酌して考えて見ますと
  网络来源: https://www.britannica.com/biography/August-Weismann

- 名词: 熊坂長範
  分类: 人物·传说
  解释: >
    日本平安时代末期（约12世纪）传说中的著名盗贼。传说他企图抢劫前往奥州的金商吉次一行，但被随行的牛若丸（即后来的源义经）击败。该故事收入《义经记》，成为能乐（谣曲《熊坂》）、歌舞伎、浮世绘等传统艺术的常见题材。文中以熊坂长范比喻蛮横不讲理的强者。
  书中原文: >
    もし世間が熊坂長範ばかりになったらいかなる盛徳の君子もやはり吾輩のような態度に出ずるであろう
  网络来源: https://collections.mfa.org/objects/496313

- 名词: 阿倍川餅
  分类: 食物·文化
  解释: >
    安倍川饼（あべかわもち），静冈县静冈市的传统乡土点心，以麻糬撒上黄豆粉和砂糖（或黑蜜）制成。名称源自流经静冈的安倍川。据传德川家康品尝后赐名，江户时代《东海道中膝栗毛》亦有记载，自古为东海道名物。文中金田富子小姐食用此饼，暗示其富家千金的身份。
  书中原文: >
    富子令嬢が阿倍川餅を無暗に召し上がらるる事
  网络来源: https://fujinokuni.shokunomiyako-shizuoka.pref.shizuoka.jp/zh-TW/culture/article/1789

- 名词: サヴェジ・チー
  分类: 文学·语言
  解释: >
    "Savage Tea"是《我是猫》中苦沙弥将"番茶"误译成的英文。英语教师苦沙弥不知如何翻译"番茶"（粗茶），自作聪明地直译为"Savage tea"（野蛮的茶）。漱石借此讽刺当时知识分子的虚荣心和半吊子英语水平，是日本文学史上著名的笑谈。文中邻居少年以此嘲笑苦沙弥。
  书中原文: >
    「ワハハハハハサヴェジ・チーだ、サヴェジ・チーだ」と口々に罵しる
  网络来源: https://www.zhihu.com/question/53687280

- 名词: 如是観
  分类: 佛教·哲学
  解释: >
    佛教术语，源自《法华经》"十如是"概念，指以"如是"（如实/如其所是）的态度观照一切现象。语出《金刚经》"一切有为法，如梦幻泡影，如露亦如电，应作如是观"。天台宗智者大师将其发展为"一念三千"教理。文中猫以此表明遵循如实观照的哲学态度，为其自由出入他人宅邸提供理论依据。
  书中原文: >
    如是観によりて、如是法を信じている吾輩はそれだからどこへでも這入って行く
  网络来源: https://www.sokaglobal.org/cht/resources/study-materials/buddhist-concepts/the-ten-factors-of-life.html

- 名词: 如是法
  分类: 佛教·哲学
  解释: >
    佛教术语，《法华经》"十如是"概念之一，指诸法本身即为"如是"（如其本然的真实）。法华经以十如是（相、性、体、力、作、因、缘、果、报、本末究竟等）阐明一切存在的真实面貌。"如是法"强调超越语言概念的绝对真理。文中猫自称"信如是法"，为其行为寻求哲学正当性。
  书中原文: >
    如是観によりて、如是法を信じている吾輩はそれだからどこへでも這入って行く
  网络来源: https://www.sokaglobal.org/cht/resources/study-materials/buddhist-concepts/the-ten-factors-of-life.html

- 名词: 狆
  分类: 动物·文化
  解释: >
    日本狆（Japanese Chin），日本传统小型玩赏犬。祖先可追溯至约2700年前的中国西藏猎鹬犬，公元732年经朝鲜传入日本宫廷，长期为皇室和贵族豢养。1853年佩里舰队访日后传入西方。体型小巧、机警活泼，像猫一样用爪子洗脸。文中金田家养的狆与金田夫人的大鼻子形成滑稽对照。
  书中原文: >
    眼鼻が顔の中心に痙攣的に密着している狆君
  网络来源: https://baike.baidu.com/item/%E6%97%A5%E6%9C%AC%E7%8B%86

- 名词: 蔭弁慶
  分类: 语言·惯用句
  解释: >
    日语惯用语，亦作"阴弁庆"。源自平安末期僧兵武将武藏坊弁庆的典故，"荫"指背后、暗中，合为"只在背地里像弁庆一样勇猛"。与更常用的"内弁庆"（家里横）同义，讽刺在无人处嚣张而在公共场合怯懦的人。现代衍生出"网络弁庆"等新用法。文中邻居以此嘲笑苦沙弥。
  书中原文: >
    「御気の毒だが、いくら威張ったって蔭弁慶だ」と大きな声をする
  网络来源: https://zh.m.wiktionary.org/wiki/%E9%99%B0%E5%BC%81%E6%85%B6

- 名词: 逆鱗
  分类: 语言·惯用句
  解释: >
    典出《韩非子·说难》。传说龙喉下有逆生鳞片，触及者必遭龙怒杀。韩非以此比喻君主也有不可触犯的禁忌。后引申为"触怒上级"的惯用语。"逆鳞に触れる"意为触怒上位者。文中"大に逆鱗の体"描写苦沙弥被嘲笑后勃然大怒的样子。
  书中原文: >
    主人は大に逆鱗の体で突然起ってステッキを持って、往来へ飛び出す
  网络来源: https://baike.baidu.com/item/%E9%80%86%E9%B3%9E/3174

- 名词: 鼻子
  分类: 文学·人物
  解释: >
    《我是猫》中猫给金田夫人起的绰号。金田夫人有着异常巨大的鹰钩鼻，被猫形容为"硬是把别人的鼻子抢来安在自己脸上"。她傲慢骄横，利用金钱权势压迫苦沙弥。漱石通过夸张的鼻子描写讽刺资本家的丑恶。与金田先生的塌鼻子形成鲜明对比，夫妇二人一高一低，相映成趣。
  书中原文: >
    鼻子夫人が顔を洗うたんびに念を入れて鼻だけ拭く事
  网络来源: https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392

- 名词: 車屋の黒
  分类: 文学·人物
  解释: >
    《我是猫》中住在人力车夫家的健壮黑猫。"车屋"指人力车夫，"黑"因其毛色得名。性格粗犷豪放，与主人公猫（敏感的教师家的猫）形成鲜明对比。初次见面时充满敌意，后逐渐成为知己。中文译本常译为"老黑"或"阿黑"。文中猫以车屋の黒遭遇天秤棒为例说明弱者无法与强者讲理。
  书中原文: >
    車屋の黒のごとく不意に肴屋の天秤棒を喰う恐れがある
  网络来源: https://www.douban.com/group/topic/86114854/

- 名词: 築山
  分类: 文化·建筑
  解释: >
    日本庭园中人工堆土建造的假山，与平庭相对。筑山庭常配池泉、石组、树木，模拟自然山水。江户时代的回游式筑山泉池庭园最为著名（如六义园、兼六园）。文中金田邸的筑山是猫暗中观察金田家动静的常用据点，猫常伏在筑山草坪上窥探客厅内的情况。
  书中原文: >
    例の築山の芝生の上に顎を押しつけて前面を見渡すと
  网络来源: https://www.aisf.or.jp/~jaanus/deta/t/tsukiyama.htm

- 名词: リードル
  分类: 教育·文化
  解释: >
    英语"riddle"（谜语）的明治时期日语音译。当时存在《英学捷解一名リードル独学》等以谜语式阅读法教授英语的教材。文中客人称苦沙弥为"十年一日のごとくリードル専門の教師"，讽刺他十年如一日只会用老套的谜语法教英语，暗示其教学方法的僵化与迂腐，反映了明治英语教育的一个侧面。
  书中原文: >
    十年一日のごとくリードル専門の教師をしているのでも大体御分りになりましょう
  网络来源: https://www.abaa.org/book/1472072887

- 名词: 弥生
  分类: 文化·历法
  解释: >
    日本旧历（太阴太阳历）三月的和风月名。语源为"木草弥や生ひ月"（草木愈发茂盛的月份）。旧历三月对应新历约三月下旬至五月中旬，正值樱花盛开时节。现代日本仍广泛使用此称，亦是常见女性名。文中"弥生の春に明け放って"描写金田家客厅在阳春三月敞开的景象。
  书中原文: >
    十五畳の客間を弥生の春に明け放って
  网络来源: https://zh.m.wiktionary.org/zh-hans/%E5%BC%A5%E7%94%9F

- 名词: 胡麻塩
  分类: 语言·文化
  解释: >
    本义是将黑芝麻与白盐混合的日本传统调味料，撒在米饭上食用。因其黑白相间的外观，比喻花白头发（黑发与白发混杂交织）。"胡麻塩頭"（gomashio atama）指花白头发，相当于英语"salt and pepper hair"。文中以"胡麻塩色の口髯"描写金田先生花白的胡须。
  书中原文: >
    ただ胡麻塩色の口髯が好い加減な所から乱雑に茂生している
  网络来源: https://jlearn.net/dictionary/%E3%81%94%E3%81%BE%E5%A1%A9%E9%A0%AD

- 名词: 艶罪
  分类: 文学·语言
  解释: >
    夏目漱石在《我是猫》中创造的造词兼同音双关语。寒月说拒绝婚事后怕金田小姐因此生病"那就是我的罪过了"，迷亭接口说"那就是艳罪（えんざい）"。利用与"冤罪"同音的双关效果——"艶"意为情爱风流，"艶罪"即"情罪/风流罪"，同时暗含"冤枉"之意，是漱石机智文风的典型体现。
  书中原文: >
    「ハハハハハ艶罪と云う訳だ」
  网络来源: https://riyutool.com/article/1406/

- 名词: 唐変木
  分类: 语言·惯用句
  解释: >
    日语骂人惯用语，由"唐"（外国）、"変"（古怪）、"木"（木头）组成，字面意为"古怪的外国木头"，比喻头脑顽固如木头、不谙人情世故、愚钝不化的人。源于中世日本对异国事物的蔑称，带有古风和较强侮辱色彩。文中邻居以此嘲笑苦沙弥。
  书中原文: >
    一人が「高慢ちきな唐変木だ」と云うと
  网络来源: https://en.wiktionary.org/wiki/%E5%94%90%E5%A4%89%E6%9C%A8
