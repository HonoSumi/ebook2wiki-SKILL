- 名词: Hoover carts
  分类: 物件·工艺
  解释: |
    大萧条时期美国农村出现的简易畜力车，由拆除发动机的汽车底盘改装而成，用骡子或马牵引。因时任总统赫伯特·胡佛被民众认为应对经济危机负责而得名，反映了当时农村的贫困和民众的政治不满情绪。加拿大类似车辆被称为"Bennett buggy"（以总理理查德·贝内特命名）。
  书中原文: |
    bony mules hitched to Hoover carts flicked flies in the sweltering shade of the live oaks on the square.
  网络来源: |
    https://en.wikipedia.org/wiki/Bennett_buggy

- 名词: collards
  分类: 物件·工艺
  解释: |
    羽衣甘蓝的一种，美国南方饮食文化中的标志性蔬菜，在非洲裔美国人烹饪传统中具有深厚历史根基。通常与熏肉或火腿一起慢煮至软烂，搭配玉米面包食用。在新年传统中与黑眼豌豆一起食用，象征财富和好运。其耐寒易生长的特性被视作非裔美国人坚韧精神的象征。
  书中原文: |
    Sitting down, he wasn't much higher than the collards.
  网络来源: |
    https://www.ncpedia.org/collards
