- 名词: Second Battle of the Marne
  分类: 事件·典故
  解释: |
    第一次世界大战西线的重要战役，发生于1918年7月15日至8月6日，是德军最后一次大规模进攻。协约国军队在法国元帅福煦的指挥下成功发起反攻，德军被迫撤退。此役标志着德军战略进攻的终结，协约国随后展开百日攻势，最终导致同年11月德国的投降和一战结束。
  书中原文: |
    If she found a blade of nut grass in her yard it was like the Second Battle of the Marne: she swooped down upon it with a tin tub and subjected it to blasts from beneath with a poisonous substance she said was so powerful it'd kill us all if we didn't stand out of the way.
  网络来源: |
    https://www.britannica.com/event/Second-Battle-of-the-Marne

- 名词: scuppernongs
  分类: 物件·工艺
  解释: |
    一种大型青铜色麝香葡萄品种，属于圆叶葡萄，原产于美国东南部。名称来源于北卡罗来纳州的斯卡珀农河，阿冈昆语原意"甜月桂树"。这是美国最早栽培的葡萄品种，早在16世纪即被欧洲探险家记录。在美南文化中具有重要地位，常用于酿酒和制作果酱，是北卡罗来纳州的官方州果。
  书中原文: |
    Our tacit treaty with Miss Maudie was that we could play on her lawn, eat her scuppernongs if we didn't jump on the arbor, and explore her vast back lot, terms so generous we seldom spoke to her, so careful were we to preserve the delicate balance of our relationship.
  网络来源: |
    https://en.wikipedia.org/wiki/Scuppernongs

- 名词: Old Testament
  分类: 概念·观念
  解释: |
    基督教圣经的第一部分，继承自希伯来圣经（塔纳赫），共39卷（新教）。主要包括律法书（摩西五经）、先知书和圣文集三大类，内容涵盖从创世记到公元前5世纪的犹太民族历史、律法、诗歌和预言。基督教称其为旧约，与新约相对，其正典在公元1世纪前后基本定型。书中引用其形容灾祸之严重程度。
  书中原文: |
    Miss Maudie's face likened such an occurrence unto an Old Testament pestilence.
  网络来源: |
    https://www.britannica.com/topic/biblical-literature/Old-Testament-canon-texts-and-versions
