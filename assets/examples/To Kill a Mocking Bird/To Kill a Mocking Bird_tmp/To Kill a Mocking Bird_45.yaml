- 名词: Snow-on-the-Mountain
  分类: 物品
  解释: "Snow-on-the-Mountain（雪山茶花）是山茶花的一个栽培品种，学名 Camellia sasanqua 'Mine-no-yuki'，原产日本。它是一种常绿灌木，开纯白色半重瓣花朵，花期在秋季至初冬，因其花瓣洁白如雪覆山而得名。在故事中，Mrs. Dubose 去世前留给 Jem 一朵雪山茶花作为和解与勇气的象征。"
  书中原文: "Inside, surrounded by wads of damp cotton, was a white, waxy, perfect camellia. It was a Snow-on-the-Mountain."
  网络来源: "https://www.gardenia.net/plant/camellia-sasanqua-mine-no-yuki"

- 名词: sit-down strike
  分类: 事件
  解释: "静坐罢工（sit-down strike）是工人占据工作场所、静坐不走的一种罢工形式，旨在阻止雇主雇佣破坏罢工者（工贼）或搬走生产设备。1930年代美国大萧条时期，该策略被广泛使用，最著名的是1936-37年密歇根州弗林特市通用汽车工厂的静坐罢工，最终迫使通用汽车承认联合汽车工人工会（UAW）。美国最高法院在1939年裁定静坐罢工为非法侵入。"
  书中原文: "there were sit-down strikes in Birmingham"
  网络来源: "https://en.wikipedia.org/wiki/Sitdown_strike"

- 名词: Birmingham
  分类: 地点
  解释: "伯明翰是美国亚拉巴马州最大的城市，成立于1871年重建时期，以英国工业城市伯明翰命名，意图打造南方的钢铁工业中心。因附近富藏铁矿、煤矿和石灰岩三种炼钢原料而飞速发展，绰号\"魔法之城\"和\"南方匹兹堡\"。大萧条时期遭受重创，后在民权运动中成为关键战场，1963年马丁·路德·金在此领导了著名的伯明翰运动并写下《伯明翰狱中书简》。"
  书中原文: "there were sit-down strikes in Birmingham; bread lines in the cities grew longer, people in the country grew poorer."
  网络来源: "https://www.britannica.com/place/Birmingham-Alabama"

- 名词: bread line
  分类: 概念
  解释: "bread line（领面包队伍）指大萧条时期失业者排队领取慈善机构或施粥所免费食物（通常是面包或汤）的长队。到1932年，美国约1300万人失业（占劳动力的25%），仅纽约市每日就有约85000人靠面包队维生。该词后来进入日常用语，\"on the breadline\"意为生活在贫困线附近。"
  书中原文: "bread lines in the cities grew longer, people in the country grew poorer."
  网络来源: "https://www.pbs.org/wgbh/peoplescentury/episodes/breadline/description.html"

- 名词: tapeworm
  分类: 生物
  解释: "绦虫（tapeworm）是一种扁平的、带状寄生蠕虫，寄生于包括人类在内的动物肠道内。它通过头节附着在肠壁上吸收宿主消化后的营养物质。人类感染绦虫主要通过食用未煮熟的受污染肉类（牛肉、猪肉或鱼肉）。常见治疗药物为吡喹酮（Praziquantel）。在故事中，Scout 以为 Jem 食欲大增是因为长了绦虫。"
  书中原文: "Reckon he's got a tapeworm?"
  网络来源: "https://www.mayoclinic.org/diseases-conditions/tapeworm/symptoms-causes/syc-20378174"
