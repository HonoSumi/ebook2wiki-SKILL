- 名词: Court as great levelers
  分类: 法律
  解释: |
    阿提克斯·芬奇在结案陈词中提出的核心理念——法院是伟大的平等器，它能使穷人与洛克菲勒平等、愚者与爱因斯坦平等、无知者与大学校长平等。这是美国司法制度理想主义的经典表达，认为法庭是消除社会不平等的最后堡垒。
  书中原文: |
    '...in this country our courts are the great levelers, and in our courts all men are created equal.'
  网络来源: |
    https://www.americanrhetoric.com/MovieSpeeches/moviespeechtokillamockingbird.html

- 名词: Jury system
  分类: 法律
  解释: |
    阿提克斯在结案陈词中为陪审团制度辩护，称其是"活生生的现实"而非理想。他认为法院的健全取决于陪审团，而陪审团的健全取决于其组成人员，表达了普通公民参与司法的重要性。
  书中原文: |
    "'I'm no idealist to believe firmly in the integrity of our courts and in the jury system- that is no ideal to me, it is a living, working reality.'"
  网络来源: |
    https://www.enotes.com/topics/to-kill-a-mockingbird/questions/atticus-s-closing-statement-s-impact-on-racism-3133564

- 名词: Mr. Underwood
  分类: 人物
  解释: |
    全名布拉克斯顿·布拉格·安德伍德，梅科姆镇地方报纸《梅科姆论坛》的老板、编辑和印刷工。他性格尖刻、愤世嫉俗，公开持有种族偏见，但在汤姆·罗宾逊的审判中，他在监狱对面用猎枪暗中保护阿提克斯。在汤姆死后，他撰写社论将汤姆的死比作"无辜鸣鸟的屠杀"。
  书中原文: |
    "'I know where they are, Atticus. They're right up yonder in the colored balcony- been there since precisely one-eighteen P.M.'"
  网络来源: |
    https://www.sparknotes.com/lit/mocking/character/mr-underwood/

- 名词: Jem Finch
  分类: 人物
  解释: |
    全名杰里米·阿提克斯·芬奇，斯库特的哥哥，在小说中从10岁成长到13岁。他是斯库特的保护者和玩伴，充满理想主义和对正义的信念。汤姆·罗宾逊的有罪判决对他造成了毁灭性打击，标志着他童真的丧失和对司法制度幻灭的开始。他梦想成为像父亲一样的律师。
  书中原文: |
    "'We've won, haven't we?' ... 'You think they'll acquit him that fast?'"
  网络来源: |
    https://www.sparknotes.com/lit/mocking/character/jem-finch/

- 名词: Alexandra Finch
  分类: 人物
  解释: |
    全名亚历山德拉·芬奇·汉考克，阿提克斯的姐姐，斯库特和杰姆的姑妈。她代表旧南方的传统保守价值观，注重家族名望和社会地位。她在审判期间来到芬奇家，试图给斯库特提供"女性影响"，与阿提克斯的平等主义理念形成鲜明对比。
  书中原文: |
    "'She says my children are missing, haven't turned up since noon...'"
  网络来源: |
    https://www.litcharts.com/lit/to-kill-a-mockingbird/characters/aunt-alexandra

- 名词: O.K. Cafe
  分类: 地点
  解释: |
    梅科姆镇广场北侧的一家简朴餐馆，在镇上被视为不太体面的场所。杜博斯太太曾用"你将来会在O.K. Cafe端盘子"来侮辱斯库特，暗示她缺乏淑女风范和前途。该地点象征着梅科姆镇的社会阶层分化。
  书中原文: |
    "'...they'd overrun the drugstore, the O.K. Cafe and the hotel...'"
  网络来源: |
    https://gfknew.blogspot.com/2011/04/on-which-pages-are-there-references-to.html

- 名词: In the name of God, do your duty
  分类: 文学
  解释: |
    阿提克斯·芬奇在结案陈词的最后一句公开呼吁，他恳请陪审团以上帝之名履行其职责，超越种族偏见，根据证据做出公正裁决。这既是宗教性呼吁，也是道德命令，在南方圣经地带具有极强的说服力。
  书中原文: |
    "'In the name of God, do your duty.'"
  网络来源: |
    https://www.americanrhetoric.com/MovieSpeeches/moviespeechtokillamockingbird.html

- 名词: In the name of God, believe him
  分类: 文学
  解释: |
    阿提克斯在结案陈词结束后转身离开陪审团时几乎自言自语的一句话。斯库特没有听清，杰姆以为他说的是"以上帝之名，相信他"。这句话比公开的陈词更加私人化，更像是一个祈祷或恳求，表达了阿提克斯对陪审团能相信汤姆·罗宾逊证词的绝望希望。
  书中原文: |
    "'In the name of God, believe him,' I think that's what he said."
  网络来源: |
    https://www.americanrhetoric.com/MovieSpeeches/moviespeechtokillamockingbird.html

- 名词: Verdict
  分类: 法律
  解释: |
    在《杀死一只知更鸟》中，汤姆·罗宾逊案的陪审团经过约六小时商议（对当时梅科姆镇而言异常漫长），最终裁定汤姆有罪。这是该县历史上陪审团首次在涉及黑人的案件中花费如此长时间——其中一名坎宁安家族成员坚持要求无罪释放，但最终未能改变结果。
  书中原文: |
    "'The jury might be out and back in a minute, we don't know...'"
  网络来源: |
    https://www.enotes.com/topics/to-kill-a-mockingbird/questions/during-trial-how-long-did-jury-deliberate-319180

- 名词: Miss Rachel
  分类: 人物
  解释: |
    全名雷切尔·哈弗福德小姐，迪尔·哈里斯的姑妈，芬奇家的隔壁邻居。迪尔每年暑假来梅科姆镇时就住在她家。她性格焦虑、喜欢八卦、有早上喝威士忌的习惯，但对迪尔关怀备至。当迪尔从家中逃跑藏在斯库特床下时，她严厉训斥但也允许他留下。
  书中原文: |
    "'You all call Miss Rachel right now and tell her where you are,' she told him. 'She's run distracted lookin' for you...'"
  网络来源: |
    https://www.litcharts.com/lit/to-kill-a-mockingbird/characters/miss-rachel-haverford

- 名词: Supreme Court of the United States
  分类: 法律
  解释: |
    美国联邦最高法院，美国司法体系的最高机构。在阿提克斯的结案陈词中，他将其与"最卑微的治安法庭"并列，用以论证无论法庭级别高低，都应当是"伟大的平等器"，所有人在法庭面前生而平等。这一修辞手法强调了司法平等的普世理想。
  书中原文: |
    "'It can be the Supreme Court of the United States or the humblest J.P. court in the land, or this honorable court which you serve.'"
  网络来源: |
    https://www.americanrhetoric.com/MovieSpeeches/moviespeechtokillamockingbird.html

- 名词: J.P. court
  分类: 法律
  解释: |
    治安法庭（Justice of the Peace court）的缩写，是美国司法体系中最基层、最非正式的法庭，负责处理小额民事纠纷、交通案件和初步听证。阿提克斯在结案陈词中将其与美国最高法院对比，说明所有法院无论级别高低都应该是平等的场所。
  书中原文: |
    "'It can be the Supreme Court of the United States or the humblest J.P. court in the land...'"
  网络来源: |
    https://ashland.news/chris-honore-harper-lee-and-the-supreme-court/

- 名词: Justice of the Peace court
  分类: 法律
  解释: |
    治安法庭，美国最低级别的法院，由治安法官主持。在阿提克斯的演讲中与J.P. court同义，指代最基层的司法机构。阿提克斯用它来强调即使是最不起眼的法庭也具有平等对待所有人的神圣职责，与高高在上的最高法院形成对照。
  书中原文: |
    "'It can be the Supreme Court of the United States or the humblest J.P. court in the land...'"
  网络来源: |
    https://ashland.news/chris-honore-harper-lee-and-the-supreme-court/

- 名词: Atticus's closing argument
  分类: 事件
  解释: |
    阿提克斯·芬奇在汤姆·罗宾逊案中的结案陈词，是美国文学史上最著名的法庭演讲之一。他运用逻各斯（缺乏医学证据、汤姆的左手残疾）、精神气质（个人诚信）和悲情（上帝之名）的修辞策略，指出控方"没有一丝一毫的医学证据"，揭露"所有黑人都撒谎"的邪恶假设，并呼吁法庭成为真正的"伟大平等器"。尽管演讲令人信服，全白人陪审团仍然判定汤姆有罪。
  书中原文: |
    "'I'm no idealist to believe firmly in the integrity of our courts and in the jury system- that is no ideal to me, it is a living, working reality.'"
  网络来源: |
    https://www.americanrhetoric.com/MovieSpeeches/moviespeechtokillamockingbird.html
