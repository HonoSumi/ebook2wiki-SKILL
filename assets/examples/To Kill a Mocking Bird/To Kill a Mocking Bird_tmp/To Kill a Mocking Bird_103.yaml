- 名词: divinity
  分类: 物件·工艺
  解释: |
    一种源自美国南部的牛轧糖状甜品，以打发蛋清、玉米糖浆和糖制成，口感轻盈如棉花糖与蛋白霜的结合，常加入美洲山核桃。因对湿度极为敏感而难以制作成功，在美国南方常作为圣诞节等节庆的传统手工糖果。
  书中原文: |
    We each bought a sack of Mrs. Judge Taylor's homemade divinity.
  网络来源: |
    https://en.wikipedia.org/wiki/Divinity_(confectionery)
- 名词: Mississippi Territory
  分类: 地点
  解释: |
    美国历史上一个建制合并领土，存在于1798年至1817年。1795年西班牙根据《圣洛伦索条约》将此地割让给美国，最初涵盖今密西西比州和亚拉巴马州的南部区域。1817年西部以密西西比州身份加入联邦，东部成为亚拉巴马领地。
  书中原文: |
    She chanted mournfully about Maycomb County being older than the state, that it was a part of the Mississippi and Alabama Territories
  网络来源: |
    https://en.wikipedia.org/wiki/Mississippi_Territory
