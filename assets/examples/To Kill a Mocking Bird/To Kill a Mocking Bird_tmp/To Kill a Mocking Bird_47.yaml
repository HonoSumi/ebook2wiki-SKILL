- 名词: Garden of Gethsemane
  分类: 地点
  解释: |
    客西马尼园，位于耶路撒冷橄榄山脚下、汲沦溪对岸的一个花园，在基督教传统中被认为是耶稣在受难前夜祷告并被犹大出卖的地点。其名源自亚兰语"油榨"，因该地曾设有橄榄榨油设施。园内现存多棵古橄榄树，部分经碳-14测定树龄超过900年。
  书中原文: |
    "At each seat was a cheap cardboard fan bearing a garish Garden of Gethsemane, courtesy Tyndal's Hardware Co. (You-Name-It-We-Sell-It)."
  网络来源: https://en.wikipedia.org/wiki/Garden_of_Gethsemane

- 名词: The Light of the World (painting)
  分类: 物品
  解释: |
    《世界之光》是英国拉斐尔前派画家威廉·霍尔曼·亨特（William Holman Hunt）于1851-1854年间创作的 allegorical 油画，描绘耶稣手持灯笼敲击一扇长满杂草、久未开启的门，寓意《启示录》3:20"看哪，我站在门外叩门"。画面中门无外部门把手，象征人心必须从内部开启。该画有三个版本，分别藏于牛津基布尔学院、曼彻斯特美术馆和伦敦圣保罗大教堂。
  书中原文: |
    "Behind the rough oak pulpit a faded pink silk banner proclaimed God Is Love, the church's only decoration except a rotogravure print of Hunt's The Light of the World."
  网络来源: https://en.wikipedia.org/wiki/The_Light_of_the_World_(Hunt)

- 名词: Lining out
  分类: 概念
  解释: |
    即"逐行领唱"或"诗行领唱"，是一种无伴奏赞美诗演唱方式：领唱者（clerk 或 precentor）吟唱或诵读每一行赞美诗，会众随后重复或应答演唱。此方式起源于17世纪英国，因当时识字率低且书籍昂贵。被非洲裔美国人吸收后，与非洲音乐传统中的呼应模式相结合，深刻影响了后来的福音音乐、灵歌和爵士乐。在《杀死一只知更鸟》中，Zeebo 采用此方式引导会众唱诗。
  书中原文: |
    "Zeebo rose from his pew and walked down the center aisle... He cleared his throat and read in a voice like the rumble of distant artillery: 'There's a land beyond the river.'"
  网络来源: https://en.wikipedia.org/wiki/Lining_out

- 名词: First Purchase African Methodist Episcopal Church
  分类: 组织
  解释: |
    "首次购置非洲 Methodist Episcopal 教堂"是哈珀·李小说《杀死一只知更鸟》中虚构的教堂名称。命名含义深刻："First Purchase"指解放后的非裔美国人用获得自由后的第一笔集体收入购买的第一块产业，即这座教堂建筑；"African M.E."指非洲 Methodist Episcopal 教会（AME），这是美国第一个由黑人独立创办的新教教派，由理查德·艾伦（Richard Allen）于1816年在费城创立。这座教堂在小说中是梅科姆镇非裔社区的精神中心，也是 Scout 和 Jem 体验种族隔离下黑人社区生活的重要场景。
  书中原文: |
    "First Purchase was unceiled and unpainted within... Reverend Sykes shuffled some papers, chose one and held it at arm's length. '...You all know of Brother Tom Robinson's trouble. He has been a faithful member of First Purchase since he was a boy.'"
  网络来源: https://brainly.com/question/39046111
