- 名词: corncribs
  分类: 物件·工艺
  解释: |
    Corncrib（玉米仓）是一种传统农用通风式谷仓，专门用于储存和干燥带穗玉米。其墙壁通常由木条或金属网制成，留有缝隙以促进空气流通，底部架空以防范啮齿动物。这种建筑最早由美洲原住民使用，后被欧洲殖民者采纳。20世纪中期以后，随着联合收割机和人工谷物干燥机的普及，传统玉米仓逐渐被金属圆筒粮仓取代。
  书中原文: |
    "They don't eat up people's gardens, don't nest in corncribs, they don't do one thing but sing their hearts out for us."
  网络来源: |
    https://en.wikipedia.org/wiki/Corncrib

- 名词: Jew's Harp
  分类: 物件·工艺
  解释: |
    Jew's Harp（犹太竖琴/口簧琴）是一种古老的弹拨体鸣乐器，被认为是人类最古老的乐器之一。演奏时将其置于唇间，用手指拨动簧片，通过口腔形状变化调节音高。该乐器起源于亚洲，在4世纪的中国绘画中已有出现，后传入欧洲并在中世纪广泛流行。其英文名称的来源并无定论，可能与犹太商人贩卖该乐器有关，但乐器本身与犹太教并无直接关联。在奥地利，犹太竖琴演奏已被联合国教科文组织列为非物质文化遗产。
  书中原文: |
    "Did you know he can play a Jew's Harp?"
  网络来源: |
    https://en.wikipedia.org/wiki/Jew%27s_harp

- 名词: breastworks
  分类: 物件·工艺
  解释: |
    Breastwork（胸墙）是一种临时性的野战防御工事，通常用泥土、沙袋或可获得的材料匆忙构筑，高度约至成人胸部（4-5英尺），使防守者可以站立射击并在胸墙后获得掩护。与永久性的石砌城防工事不同，胸墙强调快速建造和临时性。在第一次世界大战中，胸墙被广泛用于地下水位高的战壕区域，有时高达7-8英尺。
  书中原文: |
    "I returned to the front yard and busied myself for two hours erecting a complicated breastworks at the side of the porch, consisting of a tire, an orange crate, the laundry hamper, the porch chairs, and a small U.S. flag Jem gave me from a popcorn box."
  网络来源: |
    https://en.wikipedia.org/wiki/Breastwork_(fortification)

- 名词: Providence
  分类: 概念·观念
  解释: |
    Providence（天意/神意/天道）是基督教神学中的一个核心概念，指上帝对其所造世界的持续眷顾、保守和引导。该词源自拉丁语 providentia（预见）。神意论认为，上帝不仅创造了世界，还主动维系、指引并安排万物走向其预定目的，涉及保守、治理、协同和预知四个层面。在基督教传统中，神意分为普遍神意（涵盖一切受造之物）和特殊神意（针对信徒的引导与眷顾）。
  书中原文: |
    "But I must say Providence was kind enough to burn down that old mausoleum of mine, I'm too old to keep it up."
  网络来源: |
    https://www.britannica.com/topic/Providence-theology