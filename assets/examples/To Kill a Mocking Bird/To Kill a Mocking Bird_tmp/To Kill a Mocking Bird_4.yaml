- 名词: flivver
  分类: 物件·工艺
  解释: |
    20世纪初美国俚语，指廉价、破旧的小汽车，尤指福特T型车（Ford Model T）的绰号。该词约1905-1910年间进入美国俚语，最初泛指任何廉价或劣质物品，1914年后与福特T型车紧密关联。后逐渐被jalopy一词取代，成为汽车文化早期的历史俚语。
  书中原文: |
    One night, in an excessive spurt of high spirits, the boys backed around the square in a borrowed flivver, resisted arrest by Maycomb's ancient beadle, Mr. Conner, and locked him in the courthouse outhouse.
  网络来源: |
    https://en.wikipedia.org/wiki/Flivver

- 名词: beadle
  分类: 概念·观念
  解释: |
    历史上英国教区中的低级官员，担任教堂执事、秩序维护者、济贫法执行代理等职务。起源于古英语bydel（传令官），后逐渐演变为教区的传令员和执法者，负责维持教堂秩序、驱赶流浪者、扣押流浪牲畜等。在狄更斯《雾都孤儿》中， pompous的班布尔先生（Mr. Bumble）是文学中最著名的beadle形象。在美国南部乡村，这一职务延续为一种低级执法官员。
  书中原文: |
    One night, in an excessive spurt of high spirits, the boys backed around the square in a borrowed flivver, resisted arrest by Maycomb's ancient beadle, Mr. Conner, and locked him in the courthouse outhouse.
  网络来源: |
    https://en.wikipedia.org/wiki/Beadle

- 名词: probate judge
  分类: 概念·观念
  解释: |
    主管遗嘱认证法院（probate court）的法官，负责处理遗产继承、遗嘱认证、未成年人监护、精神病人收容等法律事务。在美国各州，probate judge通常是选举产生的县级官员，除司法职能外还承担颁发结婚证、监督选举、管理出生证明等行政职责。在19世纪末至20世纪初的美国南方，这一职位在维护家庭法和地方秩序中扮演重要角色。
  书中原文: |
    The judge asked Mr. Conner why he included the last charge; Mr. Conner said they cussed so loud he was sure every lady in Maycomb heard them. The judge decided to send the boys to the state industrial school, where boys were sometimes sent for no other reason than to provide them with food and decent shelter: it was no prison and it was no disgrace.
  网络来源: |
    https://en.wikipedia.org/wiki/Probate_court

- 名词: state industrial school
  分类: 概念·观念
  解释: |
    19世纪末至20世纪美国为少年犯设立的改造学校，也称为教养院（reform school）。基于"国家作为父母"（parens patriae）的法律原则，旨在通过劳动训练和纪律教育改造失足青少年，而非单纯惩罚。实际操作中，这些学校条件参差不齐，有时沦为变相监狱。在《杀死一只知更鸟》所描述的1930年代美国南方，这类学校被认为比监狱体面，甚至能为贫困儿童提供食物和住宿。
  书中原文: |
    The judge decided to send the boys to the state industrial school, where boys were sometimes sent for no other reason than to provide them with food and decent shelter: it was no prison and it was no disgrace.
  网络来源: |
    https://en.wikipedia.org/wiki/Reform_school

- 名词: stumphole whiskey
  分类: 物件·工艺
  解释: |
    美国阿巴拉契亚山区俚语，指非法私酿的威士忌（moonshine），因蒸馏器常藏匿于密林中挖空的大树桩（stump hole）内而得名。这种未经陈化的玉米威士忌酒精度极高，通常清澈透明，在美国禁酒令时期及之前的南方乡村地区广泛流行，是当地重要的非正规经济和民间文化的一部分。
  书中原文: |
    They did little, but enough to be discussed by the town and publicly warned from three pulpits: they hung around the barbershop; they rode the bus to Abbottsville on Sundays and went to the picture show; they attended dances at the county's riverside gambling hell, the Dew-Drop Inn & Fishing Camp; they experimented with stumphole whiskey.
  网络来源: |
    https://en.wikipedia.org/wiki/Moonshine

- 名词: Tuscaloosa
  分类: 地点
  解释: |
    美国阿拉巴马州西部城市，以乔克托族酋长Tuskaloosa命名，意为"黑武士"。该城于1819年建市，1826至1846年间曾为阿拉巴马州首府。1831年成立的阿拉巴马大学位于该市。在内战期间，联邦军队烧毁了大学大部分建筑。1960年代民权运动中，该市发生了著名的"血腥星期二"事件和华莱士州长"堵校门"事件。书中提到的"去Tuscaloosa待一季"指当时阿拉巴马州立精神病院所在地。
  书中原文: |
    Miss Stephanie said old Mr. Radley said no Radley was going to any asylum, when it was suggested that a season in Tuscaloosa might be helpful to Boo. Boo wasn't crazy, he was high-strung at times.
  网络来源: |
    https://en.wikipedia.org/wiki/Tuscaloosa,_Alabama

- 名词: Auburn
  分类: 地点
  解释: |
    指奥本大学（Auburn University），美国阿拉巴马州的一所公立赠地研究型大学。1856年特许成立，最初名为东阿拉巴马男子学院，1872年成为阿拉巴马州第一所赠地大学，先后更名为阿拉巴马农工学院和阿拉巴马理工学院，1960年正式定名为奥本大学。作为全美少数同时拥有land-grant、sea-grant和space-grant三重称号的研究型大学之一，奥本大学以工程和农业学科闻名。
  书中原文: |
    The other boys attended the industrial school and received the best secondary education to be had in the state; one of them eventually worked his way through engineering school at Auburn.
  网络来源: |
    https://en.wikipedia.org/wiki/Auburn_University
