- 名词: Mayella Ewell
  分类: 人物
  解释: |
    梅科姆镇的19岁白人女孩，鲍勃·尤厄尔的长女。她是汤姆·罗宾逊案中的原告，但实际上是她主动勾引汤姆被拒后，因羞愧和恐惧而诬告汤姆强奸。她生活在极端的贫困和虐待之中，照顾七个弟妹，被父亲殴打。她是书中典型的悲剧与罪恶交织的角色——既是环境受害者，也是诬告者。斯库特评价她"可能是世界上最孤独的人"。
  书中原文: |
    "I got somethin' to say an' then I ain't gonna say no more. That nigger yonder took advantage of me an' if you fine fancy gentlemen don't wanta do nothin' about it then you're all yellow stinkin' cowards, stinkin' cowards, the lot of you."
  网络来源: |
    https://www.sparknotes.com/lit/mocking/character/mayella-ewell/

- 名词: Tom Robinson's disability
  分类: 概念
  解释: |
    汤姆·罗宾逊的左臂在童年时被轧棉机夹伤，导致肌肉从骨头上撕裂，左臂比右臂短约12英寸且完全残废。这一身体缺陷是案件的关键证据——因为梅耶拉的伤在脸的右侧，说明攻击者是左撇子，而汤姆的左臂根本无法发力。这一证据有力地证明汤姆不可能实施强奸，真正的施暴者应是左撇子的鲍勃·尤厄尔。
  书中原文: |
    "Thomas Robinson reached around, ran his fingers under his left arm and lifted it. He guided his arm to the Bible and his rubber-like left hand sought contact with the black binding. As he raised his right hand, the useless one slipped off the Bible and hit the clerk's table."
  网络来源: |
    https://www.enotes.com/topics/to-kill-a-mockingbird/questions/tom-robinson-s-fate-in-to-kill-a-mockingbird-3133537

- 名词: Judge Taylor
  分类: 人物
  解释: |
    约翰·泰勒法官，梅科姆县的主审法官，负责汤姆·罗宾逊案的庭审。他外表懒散随意，经常在庭上嚼雪茄、看似打瞌睡，实际上极其精明，对法庭有绝对掌控。斯库特称他为"沉睡的老鲨鱼"。他特意指派阿提克斯·芬奇（而非缺乏经验的新律师）为汤姆辩护，这是他暗中支持公正的方式。他曾在家中持霰弹枪防备鲍勃·尤厄尔的报复。
  书中原文: |
    "Judge Taylor might look lazy and operate in his sleep, but he was seldom reversed, and that was the proof of the pudding."
  网络来源: |
    https://www.sparknotes.com/lit/mocking/character/judge-taylor/

- 名词: Mr. Gilmer
  分类: 人物
  解释: |
    霍勒斯·吉尔默先生，梅科姆县的检察官，在汤姆·罗宾逊案中代表控方。他是一名四十至六十岁之间的秃顶、无须的律师。他在法庭上与阿提克斯表面上保持礼貌关系，但在交叉询问汤姆·罗宾逊时表现得粗鲁轻蔑，称汤姆为"boy"。他的态度让迪尔十分不安和难过，揭示了当时司法体系中的种族偏见。
  书中原文: |
    "Mr. Gilmer seemed to be prosecuting almost reluctantly; witnesses had been led by the nose as asses are, with few objections."
  网络来源: |
    https://www.enotes.com/topics/to-kill-a-mockingbird/questions/who-mr-gilmer-kill-mockingbird-310565

- 名词: Braxton Underwood
  分类: 人物
  解释: |
    布拉克斯顿·布拉格·安德伍德，梅科姆论坛报的老板、编辑和唯一撰稿人。他以邦联将军布拉克斯顿·布拉格命名。他公开表示"鄙视黑人"，但当私刑团伙来到监狱时，他却架起猎枪保护阿提克斯和汤姆。汤姆死后，他在报纸上发表社论，将汤姆的死亡比作"猎人和儿童对鸣禽的无谓屠杀"，呼应了小说核心的"知更鸟"隐喻。他是道德矛盾性的体现——种族主义者却坚持基本正义。
  书中原文: |
    "Mr. Braxton Underwood, who had been sitting quietly in a chair reserved for the Press, soaking up testimony with his sponge of a brain, allowed his bitter eyes to rove over the colored balcony, and they met mine."
  网络来源: |
    https://www.sparknotes.com/lit/mocking/character/mr-underwood/

- 名词: Reverend Sykes
  分类: 人物
  解释: |
    赛克斯牧师，梅科姆镇第一购买非洲人卫理公会教堂的牧师，卡尔珀尼亚所在的教堂。他是黑人社区中受人尊敬的精神领袖。在汤姆·罗宾逊审判期间，他带着斯库特、杰姆和迪尔到有色人种专座区观看庭审。他的名言"琼·路易丝小姐，站起来。你父亲要过去了"是小说中最经典的一幕之一，表达了黑人社群对阿提克斯的深切敬意。
  书中原文: |
    "Reverend Sykes wiped his face on his hat. The temperature was an easy ninety, he said."
  网络来源: |
    https://www.sparknotes.com/lit/mocking/character/reverend-sykes/

- 名词: Colored balcony
  分类: 地点
  解释: |
    梅科姆县法院二楼的有色人种专用座位区，像一个环绕三面墙的二层走廊。在种族隔离的吉姆·克劳时代，黑人观众只能在这上面观看庭审。当斯库特、杰姆和迪尔在一楼找不到座位时，赛克斯牧师带他们到 balcony，四名黑人观众主动让出前排座位。孩子们坐在黑人中间观看审判，这不仅象征他们超越种族的道德立场，也为他们提供了观察庭审的全新视角。
  书中原文: |
    "Four Negroes rose and gave us their front-row seats. The Colored balcony ran along three walls of the courtroom like a second-story veranda, and from it we could see everything."
  网络来源: |
    https://www.enotes.com/topics/to-kill-a-mockingbird/questions/where-do-children-end-up-sitting-courtroom-46007

- 名词: Maycomb Tribune
  分类: 事物
  解释: |
    梅科姆镇的本地报纸，由布拉克斯顿·安德伍德拥有和经营。报社位于法院广场的西北角，紧邻监狱。在小说中，它最重要的作用是刊登了安德伍德关于汤姆·罗宾逊之死的社论，谴责杀害残疾人的行为，将其比作"无谓地屠杀鸣禽"。安德伍德还在监狱暴民事件中从报社二楼窗口持枪保护阿提克斯。斯库特提到布·拉德利曾"坐在客厅里剪梅科姆论坛报上的东西贴到剪贴簿里"。
  书中原文: |
    "'That's okay. He won't tell Atticus, he'll just put it on the social side of the Tribune.'"
  网络来源: |
    https://www.al.com/entertainment/2014/04/the_ineffectual_power_of_the_p.html

- 名词: Disorderly conduct
  分类: 概念
  解释: |
    汤姆·罗宾逊过去曾被判犯有"妨害治安行为"罪——他在与另一名男子的斗殴中卷入，对方试图用刀砍他。他因此被判处30天监禁（因无力支付罚款）。阿提克斯主动在法庭上提起此事，以展示汤姆的诚实——他没什么可隐瞒的。但控方吉尔默先生利用这一点暗示汤姆有暴力倾向。这反映了当时司法体系中对黑人的偏见，以及诚实面对过去反而可能被利用的悲剧。
  书中原文: |
    "Tom was twenty-five years of age; he was married with three children; he had been in trouble with the law before: he once received thirty days for disorderly conduct."
  网络来源: |
    https://www.enotes.com/topics/to-kill-a-mockingbird/chapter-summaries/chapter-19-summary-analysis

- 名词: Proof of the pudding
  分类: 概念
  解释: |
    英文谚语"Proof of the pudding is in the eating"（布丁好不好，吃了才知道）的简称，意为事物的真正价值只能通过实际检验来证明。语中"proof"取古义"测试"（如proofreader校对者检查测试稿）。该谚语最早出现在1615年约翰·泰勒的诗中。在小说中，阿提克斯用这句话向斯库特解释：泰勒法官虽然看似懒散、庭审时像在睡觉，但他很少被上级法院推翻判决——这才是检验法官能力的真正标准。
  书中原文: |
    "Judge Taylor might look lazy and operate in his sleep, but he was seldom reversed, and that was the proof of the pudding."
  网络来源: |
    https://www.wordorigins.org/big-list-entries/proof-of-the-pudding

- 名词: Spittoon
  分类: 事物
  解释: |
    痰盂（又称吐壶），金属或陶瓷制成的容器，供嚼烟草者吐痰用。在美国南方旧式法庭中常见。小说中泰勒法官在休庭后返回审判席，从背心口袋取出雪茄，咬掉一端，精准地将残端吐入痰盂，发出响亮的水声。迪尔见状低声评论"我打赌他当年扔纸团肯定很厉害"。这一细节生动刻画了泰勒法官随性、乡土气的法庭风格，与他内在的精明公正形成对比。
  书中原文: |
    "Judge Taylor disposed of the severed end by propelling it expertly to his lips and saying, 'Fhluck!' He hit a spittoon so squarely we could hear it slosh. 'Bet he was hell with a spitball,' murmured Dill."
  网络来源: |
    https://www.litcharts.com/lit/to-kill-a-mockingbird/characters/judge-taylor
