- 名词: L & N Railroad
  分类: 概念·观念
  解释: |
    路易斯维尔和纳什维尔铁路（Louisville and Nashville Railroad），美国东南部的一级铁路公司，1850年由肯塔基州特许成立，1859年建成连接肯塔基州路易斯维尔与田纳西州纳什维尔的线路。在内战期间因跨越南北双方控制区而具有重要战略地位，战后迅速扩张至14个州，总里程超过10,000英里，因服务稳定获得"老可靠"（The Old Reliable）的绰号。1982年被海岸系统铁路吸收，最终并入CSX运输公司。在美国铁路史上具有重要地位，也被写入多首乡村歌曲中。
  书中原文: |
    Dill's father was taller than ours, he had a black beard (pointed), and was president of the L & N Railroad.
  网络来源: |
    https://en.wikipedia.org/wiki/Louisville_and_Nashville_Railroad
- 名词: Rover Boys
  分类: 概念·观念
  解释: |
    美国作家爱德华·斯特拉特迈耶（Edward Stratemeyer）以笔名阿瑟·M·温菲尔德创作的系列少年冒险小说，全称为《罗弗兄弟少年美国系列》（The Rover Boys Series for Young Americans）。该系列从1899年出版至1926年，共30卷，销量超过500万册，是斯特拉特迈耶的第一个系列作品，也成为后来斯特拉特迈耶集团旗下《哈迪 Boys》、《南希·德鲁》等系列的标准模板。故事围绕汤姆、萨姆和迪克三兄弟的冒险经历展开。
  书中原文: |
    Dill wanted the Rover Boys because there were three respectable parts.
  网络来源: |
    https://en.wikipedia.org/wiki/Rover_Boys
- 名词: Hot Steams
  分类: 概念·观念
  解释: |
    美国南方民间传说中的一种鬼魂或灵体，指无法进入天堂的灵魂，只能在偏僻道路上徘徊游荡。据传如果行人穿越一个Hot Steam，死后也会变成同样的游魂，并在夜间吸取他人的呼吸。小说中杰姆告诉迪尔，遇到Hot Steam时可以念诵咒语"Angel-bright, life-in-death; get off the road, don't suck my breath"来保护自己。这一迷信在小说中象征儿童的纯真想象和南方民间文化传统，也暗示了孩子们逐渐成熟、失去童真的过程。
  书中原文: |
    "A Hot Steam's somebody who can't get to heaven, just wallows around on lonesome roads an' if you walk through him, when you die you'll be one too, an' you'll go around at night suckin' people's breath-"
  网络来源: |
    https://www.enotes.com/topics/to-kill-a-mockingbird/questions/in-to-kill-a-mockingbird-according-to-the-kids-2579805
