- 名词: War Between the States
  分类: 历史
  解释: '美国内战（American Civil War）在美国南部的一种替代称谓，强调冲突是两个主权州（美国联邦与美利坚联盟国）之间的战争，而非同一国家内部的"内战"。该术语在战后由南方邦联退伍军人组织和"南方失落事业"运动推动普及。'
  书中原文: "Although Maycomb was ignored during the War Between the States, Reconstruction rule and economic ruin forced the town to grow."
  网络来源: "https://www.journalofthecivilwarera.org/2018/09/what-the-name-civil-war-tells-us-and-why-it-matters/"

- 名词: Reconstruction era
  分类: 历史
  解释: '重建时期（1865-1877），美国内战后联邦政府试图重新统一南北、解决近400万新获自由的非裔美国人地位问题的历史阶段。包括总统重建与激进重建两个阶段，通过了第十三、十四、十五修正案，最终因1877年妥协而结束。'
  书中原文: "Although Maycomb was ignored during the War Between the States, Reconstruction rule and economic ruin forced the town to grow."
  网络来源: "https://kids.britannica.com/kids/article/Reconstruction/353700"

- 名词: Caste system
  分类: 社会
  解释: '种姓制度/等级制度——一种封闭的社会分层体系，地位由出生决定（先赋地位），终身不变。特征是内婚制、世袭职业、不同等级间的交往限制。在小说中，梅科姆镇存在一种非正式但根深蒂固的家族等级体系。'
  书中原文: "There was indeed a caste system in Maycomb, but to my mind it worked this way: the older citizens, the present generation of people who had lived side by side for years and years, were utterly predictable to one another."
  网络来源: "https://www.britannica.com/topic/caste-social-differentiation"

- 名词: Lydia E. Pinkham
  分类: 历史
  解释: '莉迪亚·E·平卡姆（1819-1883），美国专利药制造商。她于1873年在自家厨房创制了"莉迪亚·平卡姆蔬菜复合物"，主打治疗"女性不适"（如痛经、更年期症状），含15-22%酒精。她的肖像成为美国广告史上最著名的形象之一，是19世纪末专利药产业的标志性人物。'
  书中原文: "if Mrs. Grace Merriweather sips gin out of Lydia E. Pinkham bottles it's nothing unusual- her mother did the same."
  网络来源: "https://americanhistory.si.edu/collections/object/nmah_716071"

- 名词: Changeling
  分类: 文化
  解释: '调换儿——欧洲民间传说中，被精灵、仙女或妖精偷偷替换的人类婴儿。妖精留下自己的后代（通常是丑陋、多病或难以抚养的）代替被掳走的人类孩子。该传说在古代被用来解释猝死、发育障碍、精神疾病等不明医学现象。'
  书中原文: "I so often wondered how she could be Atticus's and Uncle Jack's sister that I revived half-remembered tales of changelings and mandrake roots that Jem had spun long ago."
  网络来源: "https://www.britannica.com/art/changeling-folklore"

- 名词: Mandrake
  分类: 自然
  解释: '曼德拉草（Mandragora officinarum），茄科多年生草本植物，原产地中海地区。其根部分叉、形似人形，因而围绕着丰富的民间传说：拔出时发出致命尖叫、可用于催情/麻醉/巫术。含有托烷生物碱（莨菪碱、东莨菪碱），历史上被用作麻醉剂和致幻剂。'
  书中原文: "I so often wondered how she could be Atticus's and Uncle Jack's sister that I revived half-remembered tales of changelings and mandrake roots that Jem had spun long ago."
  网络来源: "https://en.wikipedia.org/wiki/Mandrake"

- 名词: Flintlock
  分类: 科技
  解释: '燧发枪——17世纪至19世纪中期主导的火器点火机构。原理是燧石撞击钢制击砧产生火花，引燃火药池中的底火药，火焰通过传火孔点燃枪管中的主装药。燧发手枪在小说中被卡什·圣克莱尔（Cousin Joshua）使用但因炸膛而失效。'
  书中原文: "Said he tried to shoot him with an old flintlock pistol, only it just blew up in his hand."
  网络来源: "https://en.wikipedia.org/wiki/Flintlock_mechanism"

- 名词: Redbug
  分类: 自然
  解释: '红虫/恙螨——蛛形纲恙螨科（Trombiculidae）幼虫的俗称。体型极小（0.2-0.4毫米），呈橙红色。叮咬时并非吸血，而是注入消化酶溶解皮肤组织形成取食管（stylostome），吸取液化组织。叮咬引起剧烈瘙痒。在美国南部地区常见于草丛和灌木丛中。'
  书中原文: "Atticus paused, watching me locate an elusive redbug on my leg."
  网络来源: "https://en.wikipedia.org/wiki/Red_bug"
