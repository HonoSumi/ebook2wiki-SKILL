- 名词: foot-washing
  分类: 习俗·仪式
  解释: |
    基督教中的一种宗教仪式，源于耶稣在最后的晚餐中为十二门徒洗脚（《约翰福音》13:1-15）的典故。该仪式象征谦卑、服务与洁净，在历史上是古近东地区常见的待客习俗。如今，罗马天主教在濯足节（圣周四）举行此仪式，东正教、路德宗、圣公会以及再洗礼派（如阿米什人和门诺会）等新教宗派也将其作为常规礼仪或教义性条例践行。
  书中原文: |
    Apparently deciding that it was easier to define primitive baptistry than closed communion, Miss Maudie said: "Foot-washers believe anything that's pleasure is a sin. Did you know some of 'em came out of the woods one Saturday and passed by this place and told me me and my flowers were going to hell?"
  网络来源: |
    https://www.britannica.com/topic/foot-washing
- 名词: closed communion
  分类: 概念·观念
  解释: |
    基督教中的一种圣餐领受制度，指仅限本教会或本宗派的合格成员参与圣餐（圣体圣事）。与之相对的是开放圣餐（open communion），即允许所有基督徒领受。罗马天主教、东正教以及部分路德宗和浸信会宗派实行此制度，其神学依据在于圣餐象征着教义上的合一，不宜与信仰不一致者同领。在本书语境中，莫迪小姐向斯库特解释"洗脚派"与"封闭圣餐"的区别——前者认为享乐即罪恶，后者则限制非成员参加圣餐礼。
  书中原文: |
    "But we can't have communion with you all-" / "We do. At home in the bathtub." / "But we can't have communion with you all-" / Apparently deciding that it was easier to define primitive baptistry than closed communion, Miss Maudie said: "Foot-washers believe anything that's pleasure is a sin."
  网络来源: |
    https://en.wikipedia.org/wiki/Closed_communion
