- 名词: Lane cake
  分类: 物件·工艺
  解释: |
    美国南方传统多层白色蛋糕，由阿拉巴马州的Emma Rylander Lane于1890年代发明，因此得名。蛋糕以波本威士忌浸泡的葡萄干、山核桃、椰子和蛋奶馅层层夹心，表面覆盖白色糖霜。Lane cake在2016年被正式指定为阿拉巴马州官方蛋糕。
  书中原文: |
    Soon as I can get my hands clean and when Stephanie Crawford's not looking, I'll make him a Lane cake.
  网络来源: |
    https://en.wikipedia.org/wiki/Lane_cake
