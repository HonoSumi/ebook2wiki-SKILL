- 名词: Let the dead bury the dead
  分类: 概念
  解释: |
    出自《圣经·马太福音》8:22的典故。耶稣对一位说要先回去埋葬父亲的门徒说："任凭死人埋葬他们的死人，你跟从我吧。"此处的"死人"有两层含义：前者指灵性上死去的人（未信神的人），后者指肉体上死亡的人。耶稣以此强调跟随主的紧迫性，不可因任何世俗义务而延迟追随。在小说中，警长赫克·塔特借用这句话，劝说阿提克斯·芬奇让这起死亡事件就此了结，不再追究——鲍勃·尤厄尔死在自己的刀上这个说法本身就是真相，因为将其相公开只会伤害无辜的布·拉德利。
  书中原文: |
    "Let the dead bury the dead this time, Mr. Finch. Let the dead bury the dead."
