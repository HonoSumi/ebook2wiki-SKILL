- 名词: Blackstone's Commentaries
  分类: 作品
  解释: |
    全称《英国法释义》（Commentaries on the Laws of England），是英国法学家威廉·布莱克斯通（Sir William Blackstone）于1765–1769年间出版的四卷本法学巨著，首次以系统化的方式向非专业读者阐释了英国普通法体系，对英美法系产生了深远影响，是美国建国初期律师和法官的必读经典。
  书中原文: |
    "Blackstone's Commentaries." / "You mean you taught Zeebo outa that?" / "Why yes sir, Mister Jem." Calpurnia timidly put her fingers to her mouth. "They were the only books I had. Your grandaddy said Mr. Blackstone wrote fine English-"
  网络来源: https://en.wikipedia.org/wiki/Commentaries_on_the_Laws_of_England

- 名词: Finch's Landing
  分类: 地点
  解释: |
    芬奇庄园，是哈珀·李小说《杀死一只知更鸟》中芬奇家族的祖宅庄园，位于亚拉巴马河畔，由斯库特的祖先西蒙·芬奇在19世纪初建立。阿提克斯·芬奇在此长大，后离家前往蒙哥马利学习法律，其兄杰克前往波士顿学医，妹妹亚历山德拉则留守庄园。该地象征着芬奇家族的历史根基与社会地位。
  书中原文: |
    "Were you from the Landing?" Jem asked. "You never told us that." / "I certainly am, Mister Jem. Grew up down there between the Buford Place and the Landin'. I've spent all my days workin' for the Finches or the Bufords, an' I moved to Maycomb when your daddy and your mamma married."
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/chapter-1

- 名词: code-switching
  分类: 概念
  解释: |
    语码转换，指在多语或多方言环境中，说话者根据不同的社交场合、听者身份或语境，主动在不同的语言或语言变体之间切换的现象。在语言学中，它被认为是一种正常的、自然的双语交际行为，而非语言能力不足的表现。在本章中，卡尔珀尼亚在白人家庭和黑人教堂使用不同语言变体的行为即是典型例证。
  书中原文: |
    That Calpurnia led a modest double life never dawned on me. The idea that she had a separate existence outside our household was a novel one, to say nothing of her having command of two languages. / "It's not necessary to tell all you know. It's not ladylike- in the second place, folks don't like to have somebody around knowin' more than they do. It aggravates 'em. You're not gonna change any of them by talkin' right, they've got to want to learn themselves, and when they don't want to learn there's nothing you can do but keep your mouth shut or talk their language."
  网络来源: https://en.wikipedia.org/wiki/Code-switching
