- 名词: cross-examination
  分类: 法律制度
  解释: 交叉询问，是英美法系庭审中，一方律师对对方传唤的证人进行的质询程序。与直接询问不同，交叉询问允许使用诱导性问题，旨在检验证人证词的真实性、揭露矛盾或质疑证人可信度。被法学家Wigmore誉为"迄今为止为发现真相而发明的最伟大的法律引擎"。
  书中原文: "Never, never, never, on cross-examination ask a witness a question you don't already know the answer to, was a tenet I absorbed with my baby-food."
  网络来源: https://dictionary.findlaw.com/definition/cross-examination.html

- 名词: relief checks
  分类: 历史事件
  解释: 救济支票，指美国大萧条时期（1930年代）罗斯福新政下联邦政府向贫困家庭发放的现金救助。主要由联邦紧急救济署（FERA, 1933年成立）管理，资金拨付给各州后直接发给符合条件的家庭，以维持基本生活。在小说故事发生的1930年代阿拉巴马州，这是许多贫困家庭的重要收入来源。
  书中原文: "How do you think I sign my relief checks?"
  网络来源: https://www.cambridge.org/core/books/abs/great-depression/new-deal-economic-policy-and-the-problem-of-recovery/4ADD0DFDC715DCC2D306F7C96B66D3F5

- 名词: court reporter
  分类: 法律制度
  解释: 法庭记录员（又称速记员），是负责在庭审、听证会、宣誓作证等法律程序中逐字记录所有口头陈述的专业人员。他们使用速记机或语音书写技术，以每分钟225词以上的速度记录，随后制作经认证的正式笔录，成为案件记录的一部分。
  书中原文: "He went to the court reporter, said something, and the reporter entertained us for some minutes by reading Mr. Tate's testimony as if it were stock-market quotations."
  网络来源: https://www.law.cornell.edu/wex/court_reporter

- 名词: fountain pen
  分类: 科学技术
  解释: 钢笔（自来水笔），是一种内置储墨装置的书写工具，通过毛细作用将墨水引导至笔尖。1884年美国人Lewis Waterman发明了首支实用型钢笔，解决了墨水流量和气压平衡问题。在20世纪中期圆珠笔普及之前，钢笔是主要的日常书写工具。小说中Atticus使用钢笔的场景体现了1930年代的时代特征。
  书中原文: "He unscrewed the fountain-pen cap and placed it gently on his table. He shook the pen a little, then handed it with the envelope to the witness."
  网络来源: https://en.wikipedia.org/wiki/Fountain_pen
