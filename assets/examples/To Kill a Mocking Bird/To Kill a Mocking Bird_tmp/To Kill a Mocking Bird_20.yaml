- 名词: kudzu
  分类: 物件·工艺
  解释: |
    葛藤（学名 Pueraria montana var. lobata），原产于东亚的多年生藤本植物，1876年作为观赏植物引入美国后在美国南部疯狂蔓延，被称为"吞噬南方的藤蔓"。其生长速度可达每天30厘米，能覆盖并窒息原生植被，对美国南部生态系统造成严重破坏，同时也成为美国南方文化中一个标志性的象征符号。
  书中原文: |
    At first we saw nothing but a kudzu-covered front porch, but a closer inspection revealed an arc of water descending from the leaves and splashing in the yellow circle of the street light, some ten feet from source to earth, it seemed to us.
  网络来源: |
    https://en.wikipedia.org/wiki/Kudzu_in_the_United_States

- 名词: bob-white
  分类: 物件·工艺
  解释: |
    北美鹑（Northern Bobwhite，学名 Colinus virginianus），一种原产于北美洲的地栖鸟类，因其标志性的口哨声听起来像"bob-white"而得名。它是美国东部唯一本土鹑类物种，常见于农田边缘和林地，是重要的狩猎鸟类。由于栖息地丧失，其种群数量自1966年以来下降了约85%。
  书中原文: |
    Jem whistled bob-white and Dill answered in the darkness.
  网络来源: |
    https://en.wikipedia.org/wiki/Northern_bobwhite
