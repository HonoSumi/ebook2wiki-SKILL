- 名词: Dewey Decimal System
  分类: 概念·观念
  解释: |
    由美国图书馆员梅尔维尔·杜威（Melvil Dewey）于1873年发明、1876年首次出版的图书馆图书分类体系，将人类知识分为10个基本大类（000-999），以十进制数字标记每本书的学科归属。它是全球最广泛使用的图书馆分类法之一，被至少135个国家的约20万所图书馆采用。
  书中原文: |
    What Jem called the Dewey Decimal System was school-wide by the end of my first year, so I had no chance to compare it with other teaching techniques.
  网络来源: |
    https://en.wikipedia.org/wiki/Dewey_decimal_system
- 名词: Group Dynamics
  分类: 概念·观念
  解释: |
    由社会心理学家库尔特·勒温（Kurt Lewin）开创的研究领域，指社会群体内部成员之间相互作用的行为模式、态度和心理过程，包括群体形成、领导风格、群体凝聚力、从众行为、群体决策等。该概念后被广泛应用于教育、组织管理和心理治疗等领域。
  书中原文: |
    miles of construction paper and wax crayon were expended by the State of Alabama in its well-meaning but fruitless efforts to teach me Group Dynamics.
  网络来源: |
    https://en.wikipedia.org/wiki/Group_dynamics
- 名词: Time magazine
  分类: 物件·工艺
  解释: |
    美国最具影响力的新闻周刊之一，由布里顿·哈登（Briton Hadden）和亨利·卢斯（Henry Luce）于1923年创办，是世界上第一份每周新闻杂志。以红色边框封面、简洁的专题报道以及年度「时代年度风云人物」（Person of the Year）评选闻名。
  书中原文: |
    I knew nothing except what I gathered from Time magazine and reading everything I could lay hands on at home.
  网络来源: |
    https://en.wikipedia.org/wiki/Time_(magazine)
- 名词: flagpole
  分类: 事件·典故
  解释: |
    指1920年代至1930年代初在美国风靡一时的「旗杆静坐」耐力热潮（flagpole sitting），由曾为水手的特技演员阿尔文·"沉船"·凯利（Alvin "Shipwreck" Kelly）在1924年引发。参与者爬上旗杆顶端的小平台，连续坐数日甚至数周，以此挑战纪录。这一热潮与大萧条后逐渐消退，成为爵士时代特有的社会奇观。
  书中原文: |
    gravely reading columns of print about a man who sat on a flagpole for no discernible reason, which was reason enough for Jem to spend the following Saturday aloft in the treehouse.
  网络来源: |
    https://en.wikipedia.org/wiki/Pole_sitting
- 名词: live oaks
  分类: 物件·工艺
  解释: |
    指美国南部的标志性常绿橡树（学名：Quercus virginiana），俗称南方活橡树。其树冠宽阔舒展，枝干上常挂满西班牙苔藓，是美国南方景观的典型象征。木质极其坚硬耐腐，历史上曾用于建造海军舰船（如美国宪法号「老铁甲」）。
  书中原文: |
    Two live oaks stood at the edge of the Radley lot; their roots reached out into the side-road and made it bumpy.
  网络来源: |
    https://en.wikipedia.org/wiki/Southern_live_oak