- 名词: Franklin stove
  分类: 物件·工艺
  解释: |
    本杰明·富兰克林于1742年发明的铸铁取暖炉，最初称为"宾夕法尼亚壁炉"。其设计包含后挡板以改善空气流动，使热量向四周辐射，比传统壁炉更高效节能、产烟更少。富兰克林拒绝申请专利，将设计无偿贡献给公众。该炉具是美国家庭取暖史上的重要发明，体现了富兰克林作为科学家和发明家的贡献。
  书中原文: |
    An old Franklin stove sat in a corner of the porch; above it a hat-rack mirror caught the moon and shone eerily.
  网络来源: |
    https://ushistory.org/franklin/science/stove.htm
