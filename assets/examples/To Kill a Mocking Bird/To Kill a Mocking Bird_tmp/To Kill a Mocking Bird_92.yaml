- 名词: J. Grimes Everett
  分类: 人物
  解释: |
    小说中一位被提及但从未出场的传教士角色，在梅科姆县的传道会茶会上被讨论。他在非洲的Mruna部落从事传教工作，被梅里韦瑟太太描绘为圣洁勇敢的人物。哈珀·李通过这个角色揭露了梅科姆白人女性的虚伪——她们对远在非洲的黑人表达深切关怀，却对自己社区中的黑人充满蔑视。
  书中原文: |
    "Mrs. Merriweather's large brown eyes always filled with tears when she considered the oppressed. 'Living in that jungle with nobody but J. Grimes Everett,' she said. 'Not a white person'll go near 'em but that saintly J. Grimes Everett.'"
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/j-grimes-everett-and-the-mrunas-in-to-kill-a-3133455

- 名词: Mrunas
  分类: 组织
  解释: |
    哈珀·李为小说虚构的一个非洲部落。在第二十四章中，梅科姆传道会的女士们讨论"可怜的Mrunas人"，募集资金支持J. Grimes Everett的传教工作。她们描绘该部落生活在"罪恶与肮脏"之中，缺乏家庭观念。这一虚构部落被用作文学手法，揭露白人女性的虚伪——她们关心遥远的非洲人，却对身边黑人的苦难视而不见。
  书中原文: |
    "Oh child, those poor Mrunas," she said, and was off. Few other questions would be necessary.
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/j-grimes-everett-and-the-mrunas-in-to-kill-a-3133455

- 名词: Mrs. Grace Merriweather
  分类: 人物
  解释: |
    梅科姆县最"虔诚"的白人女性，丈夫是Mr. Merriweather。她在第二十四章的传道会茶会上主导了关于Mrunas部落和传教士J. Grimes Everett的讨论。她对自己的黑人女佣Sophy和整个黑人社区充满蔑视，在汤姆·罗宾逊审判后抱怨黑人工人"闷闷不乐"，并隐晦批评阿提克斯·芬奇的辩护。她也是学校万圣节庆典话剧的编写者和导演，将斯库特扮成火腿角色。
  书中原文: |
    "Mrs. Grace Merriweather sat on my left, and I felt it would be polite to talk to her. ... Mrs. Merriweather was the most devout lady in Maycomb."
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/chapter-24#summary-177044

- 名词: Maycomb Alabama Methodist Episcopal Church South
  分类: 组织
  解释: |
    梅科姆县的白人卫理公会在第二十四章中，梅里韦瑟太太声称"梅科姆阿拉巴马南部分立卫理公会教堂的女士们百分之百支持"J. Grimes Everett在非洲的传教工作。小说通过这座教堂与卡尔珀尼亚参加的第一购买非洲卫理公会教堂形成鲜明对比，揭露白人教会表面的虔诚与实际的虚伪。
  书中原文: |
    "I said to him, 'Mr. Everett,' I said, 'the ladies of the Maycomb Alabama Methodist Episcopal Church South are behind you one hundred percent.'"
  网络来源: https://americanliterature.com/author/harper-lee/book/to-kill-a-mockingbird/part-two-chapter-24/summary

- 名词: Nome just a lady
  分类: 概念
  解释: |
    斯库特·芬奇在第二十四章中的经典回应。当斯特凡妮·克劳福德小姐问她长大后是否想当律师时，斯库特在莫迪小姐的鼓励下回答"Nome, just a lady"（不，只是个淑女）。这句话标志着斯库特性别认同和成长的重要转折——她开始接受自己的女性身份，并重新定义"淑女"的含义。
  书中原文: |
    "Miss Maudie's hand touched mine and I answered mildly enough, 'Nome, just a lady.'"
  网络来源: https://www.supersummary.com/to-kill-a-mockingbird/major-character-analysis/

- 名词: Sophy
  分类: 人物
  解释: |
    梅里韦瑟太太的黑人女佣。在第二十四章的传道会茶会上，梅里韦瑟太太抱怨Sophy在汤姆·罗宾逊审判后"闷闷不乐"，破坏了她的心情。梅里韦瑟太太教训Sophy"要做基督徒"，而Sophy恭顺地回答"耶稣从不发牢骚"。这段对话是小说中最尖锐的虚伪揭露之一——梅里韦瑟太太对远在非洲的Mrunas人充满同情，却对自己家中黑人的痛苦毫无怜悯。
  书中原文: |
    "I said, 'Sophy,' I said, 'you simply are not being a Christian today. Jesus Christ never went around grumbling and complaining,' and you know, it did her good. She took her eyes off that floor and said, 'Nome, Miz Merriweather, Jesus never went around grumblin'.'"
  网络来源: https://www.shmoop.com/study-guides/to-kill-a-mockingbird/grace-merriweather-quotes.html

- 名词: Tom Robinson's wife
  分类: 人物
  解释: |
    汤姆·罗宾逊的妻子海伦（Helen Robinson），小说中的次要角色。汤姆被诬告强奸梅耶拉·尤厄尔后，海伦因丈夫的罪名而找不到工作。第一购买教堂为她募捐，白人农场主林克·迪斯雇佣了她。汤姆死后，鲍勃·尤厄尔在她上班路上骚扰恐吓她。在第二十四章中，梅里韦瑟太太提到她时用轻蔑的称呼"那个黑鬼的老婆"。
  书中原文: |
    "May-? No, child. That darky's wife. Tom's wife, Tom-" ... "Robinson, ma'am."
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/characters/link-deas
