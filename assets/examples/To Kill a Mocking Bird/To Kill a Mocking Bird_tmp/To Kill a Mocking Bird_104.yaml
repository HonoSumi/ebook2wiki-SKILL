- 名词: Dixie
  分类: 物件·工艺
  解释: |
    美国南北战争时期南部邦联的非正式国歌，由北方俄亥俄州作曲家丹尼尔·埃米特于1859年为纽约的黑人游唱剧团创作的歌曲。1860年后被南方分离主义者采用，在杰斐逊·戴维斯就职典礼上演奏，成为南方邦联文化的标志性曲目。"迪克西"同时也是美国南部各州的代称，其名称可能来源于梅森-迪克森线（南北分界线）或路易斯安那州银行发行的10元法文券。该曲在近代因与奴隶制和种族主义历史的关联而颇具争议。
  书中原文: |
    I must have heard her in my sleep, or the band playing Dixie woke me, but it was when Mrs. Merriweather triumphantly mounted the stage with the state flag that I chose to make my entrance.
