- 名词: hookworms
  分类: 概念·观念
  解释: |
    一种肠道寄生虫感染，由钩虫幼虫穿透皮肤（通常通过赤脚接触被污染的土壤）引起，
    会导致严重贫血、疲劳、发育迟缓和认知障碍。20世纪初，钩虫病在美国南部农村极为
    普遍，约750万人感染，与贫困、缺乏卫生设施和赤脚行走密切相关。该病曾被称作
    "懒惰病"，加剧了对南方穷人的刻板印象。洛克菲勒卫生委员会在1909-1915年间
    发起了大规模的钩虫病根除运动，大幅降低了感染率。
  书中原文: |
    Walter Cunningham's face told everybody in the first grade he had hookworms. His absence of shoes told us how he got them. People caught hookworms going barefooted in barnyards and hog wallows.
  网络来源: |
    https://en.wikipedia.org/wiki/Hookworm

- 名词: entailment
  分类: 概念·观念
  解释: |
    英国普通法中的一种财产继承制度（又称限定继承/fee tail），指土地或不动产只能
    由特定直系后代继承，不得出售、转让或遗赠给继承人之外的人。这一制度始于1285年
    的《威斯敏斯特第二法案》，旨在保持家族地产的完整不分割。持有者仅拥有终身权益，
    土地必须传给指定的继承人。在文学作品中，《傲慢与偏见》中班内特家的地产限定
    继承是最著名的例子。1925年《财产法》在英国废除了限定继承作为法定产权的地位。
  书中原文: |
    After a dreary conversation in our livingroom one night about his entailment, before Mr. Cunningham left he said, "Mr. Finch, I don't know when I'll ever be able to pay you."
  网络来源: |
    https://en.wikipedia.org/wiki/Fee_tail

- 名词: WPA
  分类: 概念·观念
  解释: |
    公共事业振兴署（Works Progress Administration，1939年更名为Work Projects
    Administration），是美国大萧条时期富兰克林·罗斯福总统"新政"下创建的最大
    就业救济机构，于1935年5月成立。WPA雇佣了约850万失业人员从事公共基础设施
    建设项目，修建了超过65万英里的公路、12.5万座公共建筑、7.5万座桥梁等。
    其下属的"联邦一号项目"还雇佣艺术家、作家、音乐家和演员从事文艺创作。
    WPA于1943年因二战期间失业率降低而解散。
  书中原文: |
    If he held his mouth right, Mr. Cunningham could get a WPA job, but his land would go to ruin if he left it, and he was willing to go hungry to keep his land and vote as he pleased.
  网络来源: |
    https://en.wikipedia.org/wiki/Works_Progress_Administration

- 名词: scrip stamps
  分类: 物件·工艺
  解释: |
    大萧条时期在美国广泛使用的替代货币或信用凭证。当银行大量倒闭、官方货币短缺时，
    地方政府、企业和慈善机构发行scrip（临时凭证）供穷人兑换基本生活物资。其中
    "stamp scrip"是一种特殊形式，要求使用者定期粘贴邮票以保持其有效，以此鼓励
    货币流通而非囤积。在小说语境中，Scout用"no scrip stamps"来说明Cunningham
    一家即使极度贫困也拒绝接受任何形式的救济，体现了他们的骄傲和自立。
  书中原文: |
    The Cunninghams never took anything they can't pay back- no church baskets and no scrip stamps. They never took anything off of anybody, they get along on what they have.
  网络来源: |
    https://en.wikipedia.org/wiki/Prosperity_certificate
