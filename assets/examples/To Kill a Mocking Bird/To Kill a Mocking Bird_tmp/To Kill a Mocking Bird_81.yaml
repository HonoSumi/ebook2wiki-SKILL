- 名词: closing argument
  分类: 法律
  解释: |
    法庭辩论中的结案陈词，是律师在审判最后阶段向陪审团或法官所做的总结性陈述，旨在概括证据、阐述法律观点并说服裁决者作出有利于己方的判决。阿提克斯·芬奇的结案陈词是美国文学史上最著名的法庭演讲之一。
  书中原文: |
    "One more thing, gentlemen, before I quit. Thomas Jefferson once said that all men are created equal..."
  网络来源: https://www.americanrhetoric.com/MovieSpeeches/moviespeechtokillamockingbird.html

- 名词: Thomas Jefferson
  分类: 人物
  解释: |
    托马斯·杰斐逊（1743-1826），美国第三任总统，《独立宣言》主要起草人。他在《独立宣言》中写下了"人人生而平等"的著名宣言，这句话被阿提克斯在结案陈词中引用，用以挑战法庭上基于种族的双重标准。
  书中原文: |
    "Thomas Jefferson once said that all men are created equal, a phrase that the Yankees and the distaff side of the Executive branch in Washington are fond of hurling at us."
  网络来源: https://www.history.com/articles/writing-of-declaration-of-independence

- 名词: all men are created equal
  分类: 概念
  解释: |
    "人人生而平等"是《美国独立宣言》（1776年）中最著名的语句，源于启蒙思想家约翰·洛克的自然权利哲学。阿提克斯在结案陈词中引用这句话并非简单地重复，而是通过重新诠释来挑战陪审团——他承认人们在才能、财富和机会上并不平等，但强调法庭应该是"伟大的均衡器"，在法律面前人人平等。
  书中原文: |
    "We know all men are not created equal in the sense some people would have us believe—some people are smarter than others, some people have more opportunity because they're born with it, some men make more money than others, some ladies make better cakes than others—some people are born gifted beyond the normal scope of most men."
  网络来源: https://www.loc.gov/classroom-materials/declaration-of-independence-created-equal/

- 名词: Jim Crow
  分类: 历史
  解释: |
    吉姆·克劳法是指美国南方各州在1870年代至1960年代实施的种族隔离和歧视性法律体系，旨在剥夺非裔美国人的公民权利。这一名称源自19世纪一档黑人模仿秀中的种族主义角色。在本章中，阿提克斯的结案陈词所挑战的正是这一制度所植根的种族主义假设——"所有黑人都撒谎，所有黑人在本质上都是不道德的"。
  书中原文: |
    "...confident that you gentlemen would go along with them on the assumption—the evil assumption—that all Negroes lie, that all Negroes are basically immoral beings, that all Negro men are not to be trusted around our women, an assumption one associates with minds of their caliber."
  网络来源: https://en.wikipedia.org/wiki/Jim_Crow

- 名词: circumstantial evidence
  分类: 法律
  解释: |
    间接证据，指不能直接证明主要事实，但通过推理可以从已知事实推断出待证事实的证据。阿提克斯在结案陈词中运用间接证据的逻辑——指出梅耶拉·尤厄尔是被一个主要使用左手的人殴打的，而汤姆·罗宾逊的左手是残疾的，从而暗示鲍勃·尤厄尔才是施暴者。
  书中原文: |
    "...there is circumstantial evidence to indicate that Mayella Ewell was beaten savagely by someone who led almost exclusively with his left."
  网络来源: https://www.law.cornell.edu/wex/circumstantial_evidence

- 名词: "1935"
  分类: 历史
  解释: |
    1935年是小说故事发生的时间，也是美国大萧条（1929-1941）期间的关键年份。这一年罗斯福总统签署了《社会保障法》和《瓦格纳法案》，启动了第二轮"新政"（第二新政）。小说中梅科姆县的贫困——尤厄尔家族的处境、汤姆·罗宾逊一家以及整个社区的经济状况——都深受大萧条的影响。
  书中原文: |
    "There is a tendency in this year of grace, 1935, for certain people to use this phrase out of context, to satisfy all conditions."
  网络来源: https://depts.washington.edu/depress/everyday_life.shtml

- 名词: reasonable doubt
  分类: 法律
  解释: |
    合理怀疑是刑事案件中的最高证明标准，要求检方证明被告有罪至"排除合理怀疑"的程度。如果陪审团对被告的罪行存在合理怀疑，则必须宣判无罪。这一标准源于美国宪法第五修正案的正当程序条款，体现了"宁可放纵一千个罪犯，也不可冤枉一个无辜者"的法治原则。
  书中原文: |
    "I have nothing but pity in my heart for the chief witness for the state, but my pity does not extend so far as to her putting a man's life at stake, which she has done in an effort to get rid of her own guilt."
  网络来源: https://www.law.cornell.edu/wex/reasonable_doubt

- 名词: unmitigated temerity
  分类: 文化
  解释: |
    "unmitigated"意为"完全的、十足的"，"temerity"意为"鲁莽、大胆"；两词合意为"十足的大胆/放肆"。这是阿提克斯在结案陈词中使用的辛辣反讽——汤姆·罗宾逊仅仅因为"同情"一位白人妇女，在当时的南方种族社会就被视为犯下了滔天罪行，因为黑人对白人表达同情被视作打破了种族等级秩序。
  书中原文: |
    "And so a quiet, respectable, humble Negro who had the unmitigated temerity to 'feel sorry' for a white woman has had to put his word against two white people's."
  网络来源: https://www.verbalworkout.com/u/u101/u315001.htm

- 名词: distaff side
  分类: 文化
  解释: |
    "distaff side"是古语表达，指女性的方面或女性的家族分支。"distaff"原指纺纱杆（纺纱工具），因纺纱传统上是女性的工作，故用该词代指女性。阿提克斯在结案陈词中使用这个词来指代华盛顿行政当局中的女性成员，带有一种老派的讽刺意味。
  书中原文: |
    "...a phrase that the Yankees and the distaff side of the Executive branch in Washington are fond of hurling at us."
  网络来源: https://www.dictionary.com/browse/distaff

- 名词: God-fearing
  分类: 文化
  解释: |
    "敬畏上帝的"一词描述那些虔诚信仰宗教、努力遵循道德规则生活的人。该词在圣经中出现多次，核心含义是对上帝的敬畏与尊崇（而非恐惧）。阿提克斯用这个词来形容鲍勃·尤厄尔——一个"敬畏上帝的、坚忍不拔的、受人尊敬的白人"——带有明显的反讽意味，因为实际上尤厄尔是一个种族主义者、酒鬼和虐待子女的人。
  书中原文: |
    "...he did what any God-fearing, persevering, respectable white man would do under the circumstances—he swore out a warrant, no doubt signing it with his left hand..."
  网络来源: https://www.merriam-webster.com/dictionary/God-fearing

- 名词: rigid and time-honored code
  分类: 文化
  解释: |
    阿提克斯在结案陈词中使用的表述，指南方社会中不成文的种族—性道德准则，严格禁止白人与黑人之间的跨种族接触。梅耶拉·尤厄尔正是违反了这一准则——她吻了一个黑人——然后试图通过诬告汤姆·罗宾逊来掩盖自己的"罪行"。阿提克斯一针见血地指出，她并没有犯下法律上的罪行，只是打破了这条"严格而由来已久的准则"。
  书中原文: |
    "She has committed no crime, she has merely broken a rigid and time-honored code of our society, a code so severe that whoever breaks it is hounded from our midst as unfit to live with."
  网络来源: https://www.imdb.com/title/tt0056592/quotes/?item=qt0425291
