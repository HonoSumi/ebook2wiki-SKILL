- 名词: Sir Walter Scott
  分类: 人物
  解释: 19世纪初苏格兰小说家、诗人，被誉为历史小说之父。代表作包括《艾凡赫》《威弗利》《湖上夫人》等，对后世文学影响深远。
  书中原文: 'a month later Jem was ploughing his way through Sir Walter Scott, as Jem called him, and Mrs. Dubose was correcting him at every turn'
  网络来源: https://www.britannica.com/biography/Walter-Scott

- 名词: Morphine
  分类: 概念
  解释: 吗啡，一种从鸦片中提取的强效麻醉性镇痛药，主要作用于中枢神经系统的阿片受体以阻断疼痛信号，具有高度成瘾性。
  书中原文: '"Mrs. Dubose was a morphine addict," said Atticus. "She took it as a pain-killer for years."'
  网络来源: https://www.drugwise.org.uk/morphine/

- 名词: Morphine addiction
  分类: 概念
  解释: 吗啡成瘾，指对吗啡产生生理和心理依赖的状态，表现为耐受性增加、戒断症状（焦虑、失眠、呕吐等）以及难以自控的药物渴求。
  书中原文: 'She said she was going to leave this world beholden to nothing and nobody. ... She said she meant to break herself of it before she died, and that is what she did.'
  网络来源: https://recovered.org/opioids/morphine

- 名词: Snow-on-the-Mountain
  分类: 其他
  解释: 一种山茶花品种，学名 Camellia sasanqua 'Snow on the Mountain'（日文名 Mine-no-yuki，意为峰顶之雪），开纯白色重瓣花朵，盛花期如白雪覆枝。
  书中原文: '"Thought you could kill my Snow-on-the-Mountain, did you? Well, Jessie says the top is growing back out."'
  网络来源: http://onlineplantguide.com/Plant-Details/405

- 名词: Rose Bowl
  分类: 事件
  解释: 玫瑰碗，美国历史最悠久的大学橄榄球碗赛，始于1902年，每年1月1日在加州帕萨迪纳的玫瑰碗体育场举行，被称为所有碗赛之祖。
  书中原文: 'Alabama might go to the Rose Bowl again this year, judging from its prospects, not one of whose names we could pronounce.'
  网络来源: https://www.britannica.com/sports/Rose-Bowl-football-game

- 名词: Alabama
  分类: 地点
  解释: 阿拉巴马州，美国东南部的一个州，首府蒙哥马利，1819年成为第22个州。是美国民权运动的重要舞台，也是《杀死一只知更鸟》的故事发生地。
  书中原文: 'Alabama might go to the Rose Bowl again this year, judging from its prospects'
  网络来源: https://www.history.com/articles/alabama
