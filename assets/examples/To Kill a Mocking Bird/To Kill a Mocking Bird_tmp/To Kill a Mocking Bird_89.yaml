- 名词: "Cunningham family"
  分类: "群体与组织"
  解释: |
    坎宁安家族是梅科姆县的贫穷但骄傲的农民家族。他们以极度的自立和诚实著称，拒绝接受任何无法回报的施舍。这个家族的核心价值观是尊严和感恩——一旦赢得他们的尊重，他们会全力支持你。家族成员包括老沃尔特·坎宁安（Walter Cunningham Sr.）和他的儿子小沃尔特（Walter Cunningham Jr.）。
  书中原文: |
    He said the Cunninghams hadn't taken anything from or off of anybody since they migrated to the New World. He said the other thing about them was, once you earned their respect they were for you tooth and nail.
  网络来源: |
    https://www.gradesaver.com/to-kill-a-mockingbird/q-and-a/what-details-in-scouts-description-suggest-that-the-cunninghams-are-people-of-principle-chapter-2-258802

- 名词: "double first cousin"
  分类: "主题与象征"
  解释: |
    双重第一代表亲是一种亲缘关系术语，指两个人同时通过父亲和母亲两边都有亲缘关系。具体来说，当两姐妹分别嫁给两兄弟时，她们的孩子就是双重第一代表亲——他们同时继承了两边的祖父母基因。在小说的上下文中，这是阿提克斯对陪审团中一位坚持无罪的坎宁安家族成员与沃尔特·坎宁安之间关系的解释。
  书中原文: |
    "Let's see now," he droned to himself. "I've got it. Double first cousin." "How can that be?" "Two sisters married two brothers."
  网络来源: |
    https://www.enotes.com/topics/to-kill-a-mockingbird/questions/who-was-one-of-the-men-on-the-jury-in-to-kill-a-279579

- 名词: "our kind of folks"
  分类: "主题与象征"
  解释: |
    这是亚历山德拉姑姑用来表达社会阶层区分的核心短语。她承认坎宁安家族是"好人"（good folks），但坚称他们不是"我们这类人"（our kind of folks），反映了旧南方贵族对家族血统和社会地位的执着。这种分类体系基于家族历史、财富和教育背景，而非个人品德，是小说对阶级歧视批判的重要主题之一。
  书中原文: |
    She looked at me over her sewing glasses. "Jean Louise, there is no doubt in my mind that they're good folks. But they're not our kind of folks."
  网络来源: |
    https://www.bartleby.com/essay/Examples-Of-Social-Class-In-To-Kill-A26A1F7E03915464

- 名词: "yap/tacky"
  分类: "主题与象征"
  解释: |
    这是杰姆用来描述坎宁安家族社会地位低于芬奇家族的俚语词汇。"yap"原指小犬尖叫声，引申为乡下人或喋喋不休的人；"tacky"是南方俚语，意为廉价、俗气、缺乏品位的人。这两个词反映了梅科姆镇严格的社会等级制度——杰姆实际上是在转述亚历山德拉姑姑对坎宁安家族的歧视性评价。
  书中原文: |
    Jem says, "She means they're yappy, Scout." "What's a yap?" "Aw, tacky. They like fiddlin' and things like that."
  网络来源: |
    https://www.answers.com/fiction/What_does_the_word_yap_mean_in_to_kill_a_mockingbird

- 名词: "Finch women"
  分类: "人物与角色"
  解释: |
    亚历山德拉姑姑口中的"芬奇家的女人"代表了她对南方淑女和家族声誉的传统观念。她认为芬奇家的女人应当举止优雅、注重社会身份、只与"合适"的人交往，并且要维护家族名誉。这与斯库特的男孩气性格和自由天性形成鲜明对比，也是亚历山德拉试图改造斯库特、让她符合传统淑女规范的核心理念。
  书中原文: |
    "Besides, there's a drinking streak in that family a mile wide. Finch women aren't interested in that sort of people."
  网络来源: |
    https://www.enotes.com/topics/to-kill-a-mockingbird/questions/aunt-alexandra-s-influence-hypocrisy-and-3133650

- 名词: "Calpurnia's house"
  分类: "地点与场景"
  解释: |
    卡尔珀尼亚的家是斯库特一直好奇想去拜访的地方。这代表了斯库特对跨种族理解和卡尔珀尼亚个人生活的真诚好奇心——她想了解这个抚养她长大的黑人女性在芬奇家之外的真实生活。亚历山德拉姑姑对此坚决反对，反映了当时严格的种族隔离社会规范。斯库特后来确实访问了卡尔珀尼亚的家（第12章），这成为她认识种族隔阂的重要经历。
  书中原文: |
    I was absorbed with plans to visit Calpurnia's house- I was curious, interested; I wanted to be her "company," to see how she lived, who her friends were. I might as well have wanted to see the other side of the moon.
  网络来源: |
    https://www.cliffsnotes.com/literature/t/to-kill-a-mockingbird/summary-and-analysis/part-2-chapters-1416

- 名词: "choose friends vs family"
  分类: "主题与象征"
  解释: |
    这是杰姆在反驳亚历山德拉姑姑的阶级偏见时引用的阿提克斯的教诲。核心思想是：你可以自由选择朋友，但无法选择家人；否认家人只会让自己显得愚蠢。这句话体现了阿提克斯教导孩子的价值观——友谊建立在个人选择而非社会阶层之上，而家人无论贫富贵贱仍然是家人。这是小说对血缘关系与人际选择之间张力的深刻探讨。
  书中原文: |
    Atticus says you can choose your friends but you sho' can't choose your family, an' they're still kin to you no matter whether you acknowledge 'em or not, and it makes you look right silly when you don't.
  网络来源: |
    https://simplehelpnotes.blogspot.com/2014/09/where-in-harper-lee-to-kill-mockingbird.html

- 名词: "social class Maycomb"
  分类: "主题与象征"
  解释: |
    梅科姆镇的社会等级制度是小说核心主题之一。杰姆将镇上的人分为四类：普通人家（芬奇家等）、坎宁安家那样的农民、尤厄尔家那样的垃圾白人，以及黑人。在这种等级中，种族凌驾于经济地位之上——即使最穷的白人也比所有黑人社会地位高。阿提克斯教导孩子以个人品格而非阶级出身评价他人，与亚历山德拉的阶级观念形成鲜明对比。
  书中原文: |
    "There's four kinds of folks in the world. There's the ordinary kind like us and the neighbors, there's the kind like the Cunninghams out in the woods, the kind like the Ewells down at the dump, and the Negroes."
  网络来源: |
    https://www.ipl.org/essay/Examples-Of-Social-Hierarchy-In-To-Kill-158595A031F31C44

- 名词: "Aunt Alexandra's values"
  分类: "主题与象征"
  解释: |
    亚历山德拉姑姑的核心价值观包括：家族血统至上、严格的社会等级观念、传统南方淑女身份、注重社会声誉。她认为一个人的价值由其家族历史决定，坚信芬奇家族是梅科姆最高贵的家族。她搬到芬奇家是为了给斯库特提供"女性影响"，试图将她塑造成符合传统规范的小淑女。她的价值观与阿提克斯的平等、包容理念形成剧烈冲突。
  书中原文: |
    "I didn't say not to be nice to him. You should be friendly and polite to him, you should be gracious to everybody, dear. But you don't have to invite him home."
  网络来源: |
    https://www.bbc.co.uk/bitesize/guides/z2n2dxs/revision/3

- 名词: "gratitude and respect Cunninghams"
  分类: "主题与象征"
  解释: |
    阿提克斯对坎宁安家族的深刻理解：一旦你赢得他们的尊重，他们会毫无保留地支持你。尽管沃尔特·坎宁安曾参与针对汤姆·罗宾逊的私刑暴民团伙，但经过斯库特在监狱外的天真对话后，他对芬奇家产生了新的尊重。这种尊重甚至延伸到了陪审团——一位坎宁安亲戚成为唯一主张汤姆无罪的陪审员，使陪审团长时间无法达成一致。
  书中原文: |
    Atticus said he had a feeling, nothing more than a suspicion, that they left the jail that night with considerable respect for the Finches. Then too, he said, it took a thunderbolt plus another Cunningham to make one of them change his mind.
  网络来源: |
    https://www.answers.com/Q/What_are_the_Cunningham%27s_feelings_towards_the_Finchs_in_Chapter_23_of_To_Kill_a_Mockingbird

- 名词: "hung jury"
  分类: "事件与情节"
  解释: |
    悬而未决的陪审团（hung jury）是指陪审团无法达成一致裁决而陷入僵局的情况。在第23章中，阿提克斯透露如果暴民中有两位坎宁安家族的人，陪审团将会陷入僵局（hung jury），无法定罪汤姆·罗宾逊。实际上确实有一位坎宁安家族成员是唯一坚持无罪的陪审员，使得陪审团拖延了很长时间才最终做出有罪判决，这在当时种族歧视严重的南方已属难得。
  书中原文: |
    "If we'd had two of that crowd, we'd've had a hung jury."
  网络来源: |
    https://www.sparknotes.com/lit/mocking/section11/
