- 名词: Rabies
  分类: 科学/技术
  解释: '狂犬病是一种由狂犬病病毒（Lyssavirus属）引起的急性病毒性脑脊髓炎，几乎100%致命。病毒通过感染动物的唾液传播，通常经由咬伤进入人体。潜伏期通常为30-90天，一旦出现临床症状（如恐水症、畏风、狂躁、麻痹），死亡率接近100%。全球每年约5.5-6万人死于狂犬病，主要集中在亚洲和非洲。1885年路易斯·巴斯德研制出首个狂犬病疫苗，暴露后及时接种疫苗可有效预防发病。'
  书中原文: '"He''s got it all right, Mr. Finch." / "I thought mad dogs foamed at the mouth, galloped, leaped and lunged at throats, and I thought they did it in August." / "He''s lookin'' for a place to die." / "he''s in the twitchin'' stage"'
