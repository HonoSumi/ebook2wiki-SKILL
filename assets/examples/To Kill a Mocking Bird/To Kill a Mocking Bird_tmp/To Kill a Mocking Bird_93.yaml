- 名词: Mrs. Merriweather
  分类: 人物
  解释: 梅科姆镇"最虔诚的女士"，传教士圈的核心成员，典型的伪善人物。她一边哀叹非洲"姆鲁纳人"的苦难并捐款传教，一边对自己家中的黑人女佣Sophy充满蔑视和种族歧视，甚至在Atticus家中一边吃他的食物一边批评他为Tom Robinson辩护。
  书中原文: |
    "Gertrude," she said, "I tell you there are some good but misguided people in this town. Good, but misguided. Folks in this town who think they're doing right, I mean."
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/chapter-24

- 名词: Mrs. Farrow
  分类: 人物
  解释: 梅科姆镇"第二虔诚的女士"，身材健壮，眼睛淡色，小脚，有着灰色紧密卷发。她说话前习惯发出轻柔的咝声。在传教士茶会上，她附和Mrs. Merriweather，抱怨教育黑人和让他们成为基督徒是"打不赢的仗"，暗示黑人威胁镇上女士的安全。
  书中原文: |
    "S-s-s Grace," she said, "it's just like I was telling Brother Hutson the other day. 'S-s-s Brother Hutson,' I said, 'looks like we're fighting a losing battle, a losing battle.'"
  网络来源: https://www.gradesaver.com/to-kill-a-mockingbird/q-and-a/characterize-grace-merriweather-and-mrs-farrow-describe-them-332229

- 名词: Missionary Society
  分类: 事件
  解释: 梅科姆镇白人女性组成的传教士团体（也称Missionary Circle），定期在成员家中聚会。第24章中在Aunt Alexandra家中举行茶会，表面上讨论支持J. Grimes Everett在非洲向姆鲁纳人传教的事工，实际上暴露了这群女士的虚伪：她们关心远方的异教徒却对身边黑人社区的苦难毫无同情。
  书中原文: |
    Mrs. Merriweather nodded wisely. Her voice soared over the clink of coffee cups and the soft bovine sounds of the ladies munching their dainties.
  网络来源: https://www.cram.com/essay/How-Does-The-Missionary-Society-Symbolize-In/B6F6127ABBE803C6

- 名词: Hypocrisy
  分类: 主题
  解释: 《杀死一只知更鸟》的核心主题之一，尤其体现在宗教和社会层面。传教士茶会上的女士们自称虔诚基督徒，为远方异教徒捐款，却对本镇黑人充满歧视和恐惧。Scout以孩子天真的视角敏锐地察觉到这种矛盾，为读者揭露了梅科姆社会道德虚饰下的种族偏见。
  书中原文: |
    "Hypocrites, Mrs. Perkins, born hypocrites," Mrs. Merriweather was saying.
  网络来源: https://beta.sparknotes.com/lit/mocking/themes/

- 名词: Eleanor Roosevelt
  分类: 人物
  解释: 美国前第一夫人（富兰克林·罗斯福总统之妻），以民权和社会正义Activism著称。在第24章中Mrs. Merriweather批评她"完全疯了"，因为她来到阿拉巴马州伯明翰试图与黑人坐在一起。这一引用体现了南方白人至上主义者对罗斯福夫人支持种族平等的强烈反感。
  书中原文: |
    "I think that woman, that Mrs. Roosevelt's lost her mind- just plain lost her mind coming down to Birmingham and tryin' to sit with 'em."
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/allusions-and-their-meanings-in-to-kill-a-3133726

- 名词: Birmingham Alabama
  分类: 地点
  解释: 阿拉巴马州最大城市，在小说第24章中被Mrs. Merriweather提及，作为Eleanor Roosevelt试图与黑人同坐的地点。伯明翰在20世纪60年代民权运动中成为关键战场，哈珀·李通过这一引用映射了当时南方种族隔离的尖锐现实。
  书中原文: |
    "coming down to Birmingham and tryin' to sit with 'em. If I was the Mayor of Birmingham I'd-"
  网络来源: https://tvnews.vanderbilt.edu/broadcasts/841998

- 名词: Maycomb Alabama
  分类: 地点
  解释: 哈珀·李创作的虚构小镇，是《杀死一只知更鸟》的主要故事背景。其原型是作者的家乡Monroeville, Alabama。小说中描绘它为一座"疲惫的老城"，经济萧条，种族隔离森严，社会阶层分明。镇上有著名的Radley Place、法院大楼和Finch's Landing等地标。
  书中原文: |
    "She was the second most devout lady in Maycomb."
  网络来源: https://www.britannica.com/topic/To-Kill-a-Mockingbird-film-1962

- 名词: Great Depression
  分类: 概念
  解释: 1929年华尔街股灾后席卷全球的经济大萧条，在小说中构成故事的经济背景（1933-1935年）。梅科姆镇居民普遍贫困，Cunningham家以实物支付律师费，Ewell家住垃圾场旁。Mrs. Merriweather提到她留着女佣Sophy的唯一原因是"大萧条还在，她需要每周拿到的一美元二十五美分"。
  书中原文: |
    "It's never entered that wool of hers that the only reason I keep her is because this depression's on and she needs her dollar and a quarter every week she can get it."
  网络来源: https://www.supersummary.com/to-kill-a-mockingbird/background/
