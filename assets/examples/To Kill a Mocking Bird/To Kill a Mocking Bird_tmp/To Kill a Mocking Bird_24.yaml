- 名词: hoo-dooing
  分类: 习俗·仪式
  解释: |
    美国南方非裔美国人的民间魔法与灵性传统，又称 hoodoo、conjure 或 rootwork，融合了中非和西非的宗教元素、基督教象征以及北美本土植物知识。信徒通过符袋、草药、蜡烛、十字路口仪式等方式进行祈福、保护或施加影响。在小说中，Scout 看到树洞里出现的肥皂雕像时，一度以为是 hoo-doo 巫术，吓得将其扔掉。
  书中原文: |
    Before I remembered that there was no such thing as hoo-dooing, I shrieked and threw them down.
  网络来源: |
    https://en.wikipedia.org/wiki/Hoodoo_(folk_magic)
