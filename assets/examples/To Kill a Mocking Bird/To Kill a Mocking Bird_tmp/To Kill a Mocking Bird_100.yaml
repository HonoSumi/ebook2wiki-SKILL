- 名词: Ladies' Law
  分类: 概念
  解释: |
    亚拉巴马州一项历史法律，禁止在女性面前使用 abusive（辱骂性）、insulting（侮辱性）或 obscene（猥亵性）语言，违者可处以最高 200 美元罚款及/或最高六个月的监禁。在小说中，Link Deas 威胁 Bob Ewell 将依据此法起诉他，以制止他对 Helen Robinson 的言语骚扰。
  书中原文: |
    "You don't have to touch her, all you have to do is make her afraid, an' if assault ain't enough to keep you locked up awhile, I'll get you in on the Ladies' Law, so get outa my sight! If you don't think I mean it, just bother that girl again!"
  网络来源: |
    https://www.courtlistener.com/opinion/6636872/golson-v-state/

- 名词: Cotton Tom Heflin
  分类: 人物
  解释: |
    詹姆斯·托马斯·"棉花汤姆"·赫夫林（James Thomas "Cotton Tom" Heflin，1869–1951），美国民主党政治家，曾任亚拉巴马州联邦众议员（1904–1920）和联邦参议员（1920–1931）。他因积极维护棉花农民利益而获绰号"棉花汤姆"，但同时也是种族隔离主义者、三K党成员，并强烈反对天主教。在小说中，Atticus Finch 用此名字自嘲，告诉 Scout 自己与 Cotton Tom Heflin 一样"激进"，实为讽刺。
  书中原文: |
    He said, "You tell Cecil I'm about as radical as Cotton Tom Heflin."
  网络来源: |
    https://en.wikipedia.org/wiki/J._Thomas_Heflin

- 名词: Judge John Taylor
  分类: 人物
  解释: |
    《杀死一只知更鸟》中 Maycomb 县的主审法官，外貌为白发、面色微红、和蔼可亲。他表面上看似漫不经心（常在法庭上打瞌睡或修指甲），实则精明敏锐，掌控法庭秩序。他特意指派 Atticus Finch 为 Tom Robinson 辩护，以确保被告获得最佳辩护，体现了其公正与进步性。Bob Ewell 在报复中曾试图闯入他的住宅，幸被其狗警觉而未受伤。
  书中原文: |
    But why should he try to burgle John Taylor's house? He obviously didn't know John was home or he wouldn't've tried. Only lights John shows on Sunday nights are on the front porch and back in his den...
  网络来源: |
    https://www.sparknotes.com/lit/mocking/character/judge-taylor/
