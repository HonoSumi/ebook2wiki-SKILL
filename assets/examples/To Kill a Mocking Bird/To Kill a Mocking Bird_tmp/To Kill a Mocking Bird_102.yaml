- 名词: haints
  分类: 文化背景
  解释: >
    美国南方民间传说中的鬼魂或幽灵，源自Gullah Geechee文化。
    "haint"是"haunt"（闹鬼）的南方方言变体，通常指带有恶意的超自然存在。
    在南方民俗中，人们会将门廊天花板涂成浅蓝色（称为"Haint Blue"）来驱赶这些鬼魂，
    因为鬼魂会将蓝色误认为是水或天空从而绕道而行。
  书中原文: "Haints, Hot Steams, incantations, secret signs, had vanished with our years as mist with sunrise."
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/in-to-kill-a-mockingbird-according-to-the-kids-2579805

- 名词: ham costume
  分类: 物品
  解释: >
    斯考特在万圣节表演中穿的腌火腿造型戏服。
    由Crenshaw夫人用铁丝网和棕色布料制作而成，外形像一只带腿的火腿。
    这套戏服虽然笨重、闷热且让斯考特感到尴尬，但在关键时刻救了她的命：
    当Bob Ewell在黑暗中袭击时，戏服的铁丝网框架挡住了刀锋，刺穿戏服但未伤及斯考特。
  书中原文: "Jem squeezed me into my costume, stood at the livingroom door, called out 'Po-ork,' exactly as Mrs. Merriweather would have done, and I marched in."
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/what-was-scouts-costume-halloween-pageant-was-72127

- 名词: pageant
  分类: 事件
  解释: >
    梅科姆镇学校举办的万圣节表演，名为Maycomb County: Ad Astra Per Aspera
    （拉丁语：历经艰辛，抵达星空），由Mrs. Grace Merriweather编写。
    表演展示了梅科姆县的历史和农产品，学生们扮演各种农作物（火腿、花生、黄油豆等）。
    斯考特扮演火腿，因错过上场时机而在尴尬中跑上舞台，成为她最后离开学校的原因之一，
    这间接使她与杰姆在回家途中遭遇袭击。
  书中原文: "When Halloween came, I assumed that the whole family would be present to watch me perform, but I was disappointed."
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/chapter-28

- 名词: mockingbird
  分类: 象征
  解释: >
    小说的核心象征，代表无辜和善良。
    知更鸟不会伤害任何事物，只为人类歌唱。
    阿提克斯对孩子们说"杀死一只知更鸟是犯罪"，莫迪小姐解释原因：
    知更鸟不破坏花园，不在玉米仓筑巢，只是用心歌唱。
    在小说中，汤姆·鲁滨逊和布·拉德利是两只"知更鸟"——被社会偏见伤害的无辜者。
    第28章中，"a solitary mocker"在拉德利家的树上歌唱，象征着布·拉德利即将在关键时刻出现保护孩子们。
  书中原文: "High above us in the darkness a solitary mocker poured out his repertoire in blissful unawareness of whose tree he sat in."
  网络来源: https://www.mytutor.co.uk/answers/19289/GCSE/English/In-your-opinion-what-does-the-mockingbird-symbolise-in-To-Kill-a-Mockingbird-by-Harper-Lee/

- 名词: Poor Will
  分类: 文化背景
  解释: >
    哈珀·李在第28章中使用的拟声词，指反舌鸟模仿三声夜鹰
    （Eastern Whip-poor-will）的叫声。
    三声夜鹰的鸣叫听起来像"whip-poor-WILL"，Lee简化为"Poor Will"。
    在美国民间传说中，三声夜鹰的叫声被视为死亡和不祥之兆，
    出现在华盛顿·欧文《沉睡谷传奇》、H.P.洛夫克拉夫特《敦威治恐怖事件》
    和斯蒂芬·金的多部作品中。小说中这一"悲哀的挽歌"预示着孩子们即将遭遇Ewell的袭击。
  书中原文: "to the sad lament of Poor Will, Poor Will, Poor Will."
  网络来源: https://theconversation.com/the-whip-poor-will-has-been-an-omen-of-death-for-centuries-what-happened-to-this-iconic-bird-of-american-horror-240873

- 名词: bluejay
  分类: 象征
  解释: >
    蓝松鸦在小说中是反舌鸟的对比象征，代表攻击性、偏见和恶意的力量。
    阿提克斯说："想打多少蓝松鸦随你的便"，意味着蓝松鸦是可以消灭的目标。
    蓝松鸦好斗、吵闹、欺负其他鸟类，对应小说中像Bob Ewell这样的恶人——他们无端攻击无辜者。
    在第28章中，反舌鸟模仿了蓝松鸦的叫声（"irascible qua-ack"），预示Ewell对孩子们的袭击。
  书中原文: "plunging from the shrill kee, kee of the sunflower bird to the irascible qua-ack of a bluejay."
  网络来源: https://www.markedbyteachers.com/gcse/english/symbolism-in-to-kill-a-mockingbird-3.html

- 名词: Halloween
  分类: 文化背景
  解释: >
    万圣节是第28章的核心背景设定，也是全书高潮发生的时间点。
    在这个无月的漆黑夜晚，斯考特和杰姆步行去学校参加万圣节表演，
    之后在回家途中遭遇Bob Ewell的袭击。
    万圣节的传统（黑暗、鬼怪、恐惧）与章节氛围完美融合——
    孩子们曾经害怕布·拉德利像"鬼怪"，但如今已不再恐惧。
    这种节日的"恐惧游戏"与真正的危险形成鲜明对比，
    暗示现实世界中的邪恶远比想象中的鬼魂可怕。
  书中原文: "The weather was unusually warm for the last day of October. We didn't even need jackets. The wind was growing stronger, and Jem said it might be raining before we got home. There was no moon."
  网络来源: https://www.gradesaver.com/to-kill-a-mockingbird/q-and-a/how-does-the-mood-of-the-story-change-from-the-halloween-pageant-to-the-walk-home-352109

- 名词: sunflower bird
  分类: 文化背景
  解释: >
    哈珀·李在第28章中使用的诗意名称，并非真实存在的鸟类物种，
    而是反舌鸟模仿的一种叫声。该叫声被描述为"shrill kee, kee"，
    可能指代某种小型鸣禽的高音调叫声。
    评论家认为这是反舌鸟曲目中明亮、欢快的部分，
    与后面蓝松鸦的暴躁叫声和"Poor Will"的悲哀挽歌形成对比。
    三者构成一个从欢快到暴躁再到悲伤的递进序列，
    象征小说情绪从节日欢愉逐渐转向危险的黑暗转折。
  书中原文: "plunging from the shrill kee, kee of the sunflower bird to the irascible qua-ack of a bluejay, to the sad lament of Poor Will, Poor Will, Poor Will."
  网络来源: https://www.allgreatquotes.com/to-kill-a-mockingbird-quote-240/
