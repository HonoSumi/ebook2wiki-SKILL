- 名词: Big Mules
  分类: 概念·观念
  解释: |
    美国阿拉巴马州政治史上的专有名词，指以伯明翰钢铁业和工业巨头为代表的经济精英阶层。1926年由州长竞选人比布·格雷夫斯首创，后由民粹派州长"大吉姆"福尔松推广，用以抨击主宰州政的工业与种植园利益联盟。
  书中原文: |
    North Alabama was full of Liquor Interests, Big Mules, steel companies, Republicans, professors, and other persons of no background.
  网络来源: |
    https://encyclopediaofalabama.org/article/black-belt-big-mule-coalition/

- 名词: catawba worms
  分类: 物件·工艺
  解释: |
    美国南部民间对梓蚕蛾幼虫的俗称（实为毛虫而非虫），因栖息于梓树（Catalpa tree）而得名。在美国南方被珍视为钓鲶鱼的极佳饵料，其坚韧的皮和特殊气味使其在水中极具吸引力。南方家庭常种植梓树作为天然的饵料来源。
  书中原文: |
    By the time Mrs. Cat called the drugstore for an order of chocolate malted mice the class was wriggling like a bucketful of catawba worms.
  网络来源: |
    https://thegardeningnook.com/catawba-worms-natures-secret-fishing-bait-treasure/

- 名词: The Mobile Register
  分类: 物件·工艺
  解释: |
    美国阿拉巴马州莫比尔市历史最悠久的报纸，创刊于1813年，是阿拉巴马州连续出版时间最长的报纸。该报在19世纪是州内重要的政治发声平台，亦是《杀死一只知更鸟》中阿提克斯·芬奇每日阅读的报纸。2023年2月26日停止印刷版，全面转向数字出版。
  书中原文: |
    ...the stock-market quotations from The Mobile Register aloud, she discovered that I was literate and looked at me with more than faint distaste.
  网络来源: |
    https://encyclopediaofalabama.org/article/the-mobile-press-register/

- 名词: union suit
  分类: 物件·工艺
  解释: |
    19世纪末至20世纪初流行的一种连体式内衣，覆盖躯干、手臂和腿部，通常由红色法兰绒制成。前襟从上到下有一排纽扣，臀部处有可开合的后裆盖以便如厕。最初作为女性服装改革的产物（替代紧身胸衣），后成为男性劳动阶层的标准穿着。
  书中原文: |
    ...reading was something that just came to me, as learning to fasten the seat of my union suit without looking around, or achieving two bows from a snarl of shoelaces.
  网络来源: |
    https://en.wikipedia.org/wiki/Union_Suit

- 名词: Lorenzo Dow
  分类: 人物
  解释: |
    美国著名的巡回传教士和福音派布道家（1777-1834），以其古怪的外表（长发、乱须、破衣）和戏剧化的布道风格闻名，绰号"疯洛伦佐"。他曾三次赴爱尔兰和英格兰布道，将帐篷布道会引入英国。其自传《洛伦佐·道的生平、旅行、劳作与著作》曾是全美仅次于《圣经》的畅销书。
  书中原文: |
    ...the diaries of Lorenzo Dow—anything Atticus happened to be reading when I crawled into his lap every night.
  网络来源: |
    https://en.wikipedia.org/wiki/Lorenzo_Dow

- 名词: the Dewey Decimal System
  分类: 概念·观念
  解释: |
    由美国图书馆学家梅尔维尔·杜威于1876年创立的图书分类体系，将人类知识分为十大类（000-999），每类以三位数字表示，可通过小数无限扩展。该体系以相对位置取代固定书架位置，使读者能按主题浏览藏书，至今仍被全球广泛使用。
  书中原文: |
    "I'm just trying to tell you the new way they're teachin' the first grade, stubborn. It's the Dewey Decimal System."
  网络来源: |
    https://www.britannica.com/science/Dewey-Decimal-Classification
