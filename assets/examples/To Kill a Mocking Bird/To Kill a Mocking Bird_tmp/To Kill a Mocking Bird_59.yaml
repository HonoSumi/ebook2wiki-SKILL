- 名词: Maycomb jail
  分类: 地点
  解释: 梅科姆县监狱，小说中的虚构地点，被描述为一座微型哥特式建筑，仅一个牢房宽、两个牢房高，配有城齿和飞扶壁。在汤姆·罗宾逊审判前夕，阿提克斯·芬奇坐在监狱门口保护汤姆，阻止了私刑暴徒。
  书中原文: "The Maycomb jail was the most venerable and hideous of the county's buildings. Atticus said it was like something Cousin Joshua St. Clair might have designed. It was certainly someone's dream. Starkly out of place in a town of square-faced stores and steep-roofed houses, the Maycomb jail was a miniature Gothic joke one cell wide and two cells high, complete with tiny battlements and flying buttresses."
  网络来源: https://www.britannica.com/topic/To-Kill-a-Mockingbird

- 名词: Flying buttresses
  分类: 概念
  解释: 飞扶壁是哥特式建筑中典型的 masonry 结构，由一段倾斜的半拱从墙体上部"飞越"至远处的扶壁柱，将拱顶的侧推力传递到外部支撑。这项革命性工程技术使得教堂可以建得更高、墙面可以开大面积彩色玻璃窗，被誉为"哥特式的精髓"。
  书中原文: "The Maycomb jail was a miniature Gothic joke one cell wide and two cells high, complete with tiny battlements and flying buttresses."
  网络来源: https://www.britannica.com/technology/flying-buttress

- 名词: Battlements
  分类: 概念
  解释: 城齿（又称垛口或雉堞）是城堡和防御工事顶部的一种防御性建筑特征，由交替的实心部分（merlon，城齿）和缺口（crenel，射孔）组成。守军可通过缺口射箭，利用实心部分掩护。后来也成为装饰性建筑元素。
  书中原文: "The Maycomb jail was a miniature Gothic joke one cell wide and two cells high, complete with tiny battlements and flying buttresses."
  网络来源: https://www.britannica.com/technology/battlement

- 名词: Monkey-puzzle
  分类: 物品
  解释: 智利南洋杉（Araucaria araucana），又称猴谜树，是一种常绿针叶树，原产于智利南部和阿根廷西部安第斯山脉。其枝条坚硬、叶片尖锐呈鳞片状紧密排列，维多利亚时代得名"猴谜树"，寓意猴子也难以攀爬。被IUCN列为濒危物种，在智利被宣布为自然纪念碑。
  书中原文: "Giant monkey-puzzle bushes bristled on each corner, and between them an iron hitching rail glistened under the street lights."
  网络来源: https://www.britannica.com/plant/monkey-puzzle-tree

- 名词: Victorian privy
  分类: 物品
  解释: 维多利亚式户外厕所（privy），是19世纪维多利亚时期典型的卫生设施。通常为后院独立小木屋，内设木制座位和坑洞，下方连接砖砌粪池。工人阶级家庭多使用共用设施，卫生条件恶劣常导致疾病传播；富裕家庭则建造隐蔽精巧的私人厕所。
  书中原文: "Its detractors said it looked like a Victorian privy; its supporters said it gave the town a good solid respectable look, and no stranger would ever suspect that it was full of niggers."
  网络来源: https://environment.uwe.ac.uk/conweb/house_ages/services/section3.htm
