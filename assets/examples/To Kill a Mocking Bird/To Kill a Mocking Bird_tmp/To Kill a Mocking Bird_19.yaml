- 名词: poundcake
  分类: 物件·工艺
  解释: |
    一种传统的英式重油蛋糕，得名于其原始配方中使用各一磅（pound）的面粉、黄油、鸡蛋和糖。最早见于1747年汉娜·格拉斯（Hannah Glasse）的烹饪书《The Art of Cookery》，后传入法国成为"Quatre-Quarts"（四分之一蛋糕），再传入美国成为南方家庭烘焙的经典。其质地紧密、黄油味浓郁，适合作为水果蛋糕和 wedding cake 的基底。
  书中原文: |
    "Gracious child, I was raveling a thread, wasn't even thinking about your father, but now that I am I'll say this: Atticus Finch is the same in his house as he is on the public streets. How'd you like some fresh poundcake to take home?"
  网络来源: |
    https://en.wikipedia.org/wiki/Poundcake
- 名词: Nova Scotia
  分类: 地点
  解释: |
    加拿大东南部的一个省份，拉丁语意为"新苏格兰"。首府为哈利法克斯。早期是法国殖民地阿卡迪亚（Acadia）的一部分，1713年通过《乌得勒支条约》转归英国。1755-1764年间发生了大规模驱逐阿卡迪亚人的事件（Le Grand Dérangement）。1848年成为大英帝国第一个实现责任政府的殖民地，1867年作为四个创始省份之一加入加拿大联邦。
  书中原文: |
    Among other things, he had been up in a mail plane seventeen times, he had been to Nova Scotia, he had seen an elephant, and his granddaddy was Brigadier General Joe Wheeler and left him his sword.
  网络来源: |
    https://en.wikipedia.org/wiki/Nova_Scotia
- 名词: Brigadier General Joe Wheeler
  分类: 人物
  解释: |
    美国历史人物（1836-1906），全名约瑟夫·惠勒（Joseph Wheeler），昵称"战斗乔"。南北战争期间是南方邦联骑兵将领，以勇猛善战著称，参与约200场战斗，三次负伤，十六次坐骑被击毙。战后曾任八届阿拉巴马州联邦众议员。1898年美西战争中以61岁高龄志愿参战，指挥包括西奥多·罗斯福"莽骑兵"在内的骑兵师，成为唯一曾在联邦军和邦联军中均获准将衔的人。安葬于阿灵顿国家公墓。
  书中原文: |
    Among other things, he had been up in a mail plane seventeen times, he had been to Nova Scotia, he had seen an elephant, and his granddaddy was Brigadier General Joe Wheeler and left him his sword.
  网络来源: |
    https://en.wikipedia.org/wiki/Joseph_Wheeler
