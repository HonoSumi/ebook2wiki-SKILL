- 名词: widow's walk
  分类: 物件·工艺
  解释: |
    美国新英格兰沿海地区房屋屋顶上的一种带栏杆的平台或眺望台。根据民间传说，海员的妻子们常站在上面眺望大海，等待丈夫的船只归来，由此得名"寡妇步道"。但历史学家普遍认为这一浪漫说法缺乏证据，其实际功能更可能是用于消防灭火或作为建筑装饰。这一结构在新英格兰18至19世纪的沿海建筑中较为常见，成为该地区独特的建筑文化符号。
  书中原文: |
    a widow's walk was on the roof, but no widows walked there- from it, Simon oversaw his overseer, watched the river-boats, and gazed into the lives of surrounding landholders.
  网络来源: |
    https://www.laphamsquarterly.org/roundtable/widows-walk

- 名词: Yankees
  分类: 概念·观念
  解释: |
    美国文化中具有多重含义的称谓，起源尚无定论，较通行的说法认为源自荷兰语。18世纪中期英国军官将其用作对美洲殖民地居民的蔑称，独立战争后美国人将其转化为自豪的象征。在美国南方，该词指代北方人（尤其是内战时期的联邦士兵）；在美国以外，则泛指所有美国人。该词也衍生出"扬基精神"（Yankee ingenuity，指美国式的实用创造力和自力更生精神）等文化概念。
  书中原文: |
    There went with the house the usual legend about the Yankees: one Finch female, recently engaged, donned her complete trousseau to save it from raiders in the neighborhood.
  网络来源: |
    https://www.americanheritage.com/why-do-we-say-0

- 名词: trousseau
  分类: 习俗·仪式
  解释: |
    新娘为结婚而准备的服装、内衣、床单、毛巾等个人物品和家用织物的总称。该词源自法语，意为"小包裹"。这一传统可追溯至圣经时代和古希腊，在19世纪西方社会尤为盛行。新娘通常从年幼时就开始积攒嫁妆物品，存放于嫁妆箱中。随着20世纪女权运动兴起和社会观念变迁，这一传统逐渐弱化，现代往往被结婚礼品登记册所取代。
  书中原文: |
    one Finch female, recently engaged, donned her complete trousseau to save it from raiders in the neighborhood.
  网络来源: |
    https://www.theknot.com/content/bridal-trousseau

- 名词: invisible ink
  分类: 物件·工艺
  解释: |
    一种书写后肉眼不可见、需通过加热或化学试剂处理才能显现的特殊墨水。其历史可追溯至古罗马时期，诗人奥维德曾建议情人们用牛奶书写秘密情书，牛奶干后不可见，加热后方可显现。隐形墨水在间谍活动和秘密通信中发挥了重要作用，第一次和第二次世界大战期间，情报机构和战俘广泛使用柠檬汁、牛奶、淀粉等日常物质作为简易隐形墨水传递信息。
  书中原文: |
    He's gonna make me some invisible ink, and I'm gonna write to Dill in it.
  网络来源: |
    https://www.bbc.com/news/world-us-canada-13141473.amp
