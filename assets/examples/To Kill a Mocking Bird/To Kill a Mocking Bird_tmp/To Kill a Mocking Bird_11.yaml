- 名词: cooties
  分类: 概念·观念
  解释: |
    北美儿童文化中的俚语，指一种假想的高度传染性"病菌"，儿童之间以此相互标记和排斥，是常见的社交排斥游戏。该词起源于第一次世界大战期间士兵对体虱的称呼，战后由退伍军人传入民间，1950年代后在儿童文化中演变为性别隔离的虚构传染病概念，男孩称女孩携带"女孩虱子"，反之亦然。这一现象在民俗学中被视为儿童群体处理性别认同和社会边界的方式。
  书中原文: |
    "To get rid of the- er, cooties. You see, Burris, the other children might catch them, and you wouldn't want that, would you?"
  网络来源: |
    https://en.wikipedia.org/wiki/Cooties

- 名词: lye soap
  分类: 物件·工艺
  解释: |
    使用碱液（通常由木灰浸出制成）与动物脂肪或植物油混合，通过皂化反应制成的传统手工肥皂。其制作历史可追溯至约四千年前的古巴比伦。在殖民地时期和拓荒时代的美国，碱液肥皂是家庭日常必需品，用于洗衣、洗澡和清洁等多种用途。因其强碱性具有杀菌和去污能力，也常被用作民间偏方治疗头虱等皮肤问题。
  书中原文: |
    "I want you to go home and wash your hair with lye soap. When you've done that, treat your scalp with kerosene."
  网络来源: |
    https://en.wikipedia.org/wiki/Lye

- 名词: truant officer
  分类: 概念·观念
  解释: |
    美国公立学校系统中负责调查和处理学生无故缺勤（逃学）的专职人员，也称出勤官（attendance officer）。该角色起源于19世纪末各州通过强制义务教育法之后，最初具有执法权，可上门查找逃学学生并将其带回学校。20世纪初，在进步主义教育改革推动下，这一角色逐渐从惩罚性执法转向社会工作和根源性干预，关注导致逃学的贫困、家庭问题等深层原因。
  书中原文: |
    "The truant lady gets 'em here 'cause she threatens 'em with the sheriff, but she's give up tryin' to hold 'em."
  网络来源: |
    https://en.wikipedia.org/wiki/Truancy
