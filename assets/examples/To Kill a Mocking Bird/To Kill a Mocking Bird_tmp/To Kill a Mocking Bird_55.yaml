- 名词: Dill
  分类: 人物
  解释: 查尔斯·贝克·"迪尔"·哈里斯，杰姆和斯考特的暑假玩伴，来自密西西比州梅里迪安，住在姑妈雷切尔·哈弗福德家。他是个想象力丰富、爱讲故事的小男孩，对布·拉德利充满好奇，敏感而富有同情心。人物原型是哈珀·李的童年好友杜鲁门·卡波特。
  书中原文: '"God Almighty." Jem''s voice was reverent. We watched Dill emerge by degrees. He was a tight fit. He stood up and eased his shoulders, turned his feet in their ankle sockets, rubbed the back of his neck. His circulation restored, he said, "Hey."'
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/characters/charles-baker-harris-dill

- 名词: Charles Baker Harris
  分类: 人物
  解释: 迪尔的全名，即查尔斯·贝克·哈里斯。杰姆和斯考特的暑假玩伴，一个富有想象力、爱夸大其词的小男孩，暑假从梅里迪安来到梅科姆镇与姑妈同住。他是作品中最具童真和道德敏感性的角色之一。
  书中原文: '"I''m ''bout to perish," said Dill. "Got anything to eat?" In a dream, I went to the kitchen. I brought him back some milk and half a pan of corn bread left over from supper. Dill devoured it, chewing with his front teeth, as was his custom.'
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/characters/charles-baker-harris-dill

- 名词: Meridian Mississippi
  分类: 地点
  解释: 密西西比州梅里迪安，美国密西西比州东部劳德代尔县县城，是该州第八大城市。19世纪因铁路交汇而兴起，曾是密西西比州最大城市（1890-1930年）。在小说中是迪尔的家乡。
  书中原文: '"He had taken thirteen dollars from his mother''s purse, caught the nine o''clock from Meridian and got off at Maycomb Junction."'
  网络来源: https://en.wikipedia.org/wiki/Meridian,_Mississippi

- 名词: Atticus Finch
  分类: 人物
  解释: 阿提克斯·芬奇，斯考特和杰姆的父亲，梅科姆镇的律师，小说中的道德核心人物。他受命为被诬告强奸白人女性的黑人汤姆·罗宾逊辩护，以其正直、智慧和同理心著称，是美国文学史上最受尊敬的虚构人物之一。人物原型是哈珀·李的父亲阿马萨·科尔曼·李。
  书中原文: '"Atticus," his voice was distant, "can you come here a minute, sir?" Beneath its sweat-streaked dirt Dill''s face went white. I felt sick. Atticus was in the doorway.'
  网络来源: https://en.wikipedia.org/wiki/Atticus_Finch_(character)

- 名词: cotton wagon
  分类: 物品
  解释: 棉花马车，19世纪美国南部用于运输棉花的马拉货车。通常车身长而高，两端倾斜，由5-6匹马牵引，覆盖帆布或棉布遮篷。棉花从田间采摘后被装上这种马车，运往轧棉厂或火车站，是前工业化时代南方棉花经济的标志性运输工具。
  书中原文: '"He had walked ten or eleven of the fourteen miles to Maycomb, off the highway in the scrub bushes lest the authorities be seeking him, and had ridden the remainder of the way clinging to the backboard of a cotton wagon."'
  网络来源: https://www.mediastorehouse.com.au/fine-art-finder/artists/arthur-fitzwilliam-tait/cotton-wagon-oil-canvas-22247082.html

- 名词: Maycomb Junction
  分类: 地点
  解释: 梅科姆枢纽站，小说中虚构的火车站/铁路枢纽，位于艾伯特县（毗邻梅科姆县的虚构县），是前往梅科姆镇的主要交通站点。人物在此乘火车抵达或离开，再从该站坐出租车往返梅科姆镇（约14英里路程）。
  书中原文: '"He had taken thirteen dollars from his mother''s purse, caught the nine o''clock from Meridian and got off at Maycomb Junction."'
  网络来源: https://www.verbalworkout.com/u/u101/u317735.htm

- 名词: Miss Rachel Haverford
  分类: 人物
  解释: 雷切尔·哈弗福德小姐，迪尔的姑妈，住在芬奇家隔壁。她是一个爱闲聊的中老年妇女，对迪尔既关爱又严格。她不赞同阿提克斯为汤姆·罗宾逊辩护，代表了梅科姆镇中常见的种族偏见态度。有小狗和饮酒的习惯。
  书中原文: '"Miss Rachel Haverford''s excuse for a glass of neat whiskey every morning was that she never got over the fright of finding a rattler coiled in her bedroom closet, on her washing, when she went to hang up her negligee."'
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/characters/miss-rachel-haverford

- 名词: rattlesnake
  分类: 物品
  解释: 响尾蛇（Crotalus属），美洲特有的剧毒蝮蛇，以其尾端由角质环组成的响器著称。遇险时尾部快速震动发出警示声。体长从50厘米到超过150厘米不等，具有颊窝（热感应器官）和血循毒液。小说中出现在雷切尔小姐讲述的轶事中。
  书中原文: '"Miss Rachel Haverford''s excuse for a glass of neat whiskey every morning was that she never got over the fright of finding a rattler coiled in her bedroom closet, on her washing, when she went to hang up her negligee."'
  网络来源: https://en.wikipedia.org/wiki/Rattlesnake

- 名词: negligee
  分类: 物品
  解释: 女用薄纱睡衣/晨袍（源自法语neglige，意为"随意/疏忽"），一种轻薄透明的女性就寝服装，通常由丝绸、尼龙等薄纱制成，饰有蕾丝、缎带。18世纪起源于法国，最初指宽松的日常便服，20世纪30年代后演变为性感内衣的代名词。
  书中原文: '"Miss Rachel Haverford''s excuse for a glass of neat whiskey every morning was that she never got over the fright of finding a rattler coiled in her bedroom closet, on her washing, when she went to hang up her negligee."'
  网络来源: https://www.etymonline.com/word/negligee
