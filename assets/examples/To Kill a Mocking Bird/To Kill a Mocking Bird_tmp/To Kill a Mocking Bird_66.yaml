- 名词: Champertous connivance
  分类: 法律
  解释: |
    包揽诉讼性质的串通——"Champerty"（包揽诉讼）是普通法中的一项古老原则，指与诉讼无关的第三方出资支持他人诉讼，并约定从胜诉所得中分取利益的行为。"Champertous connivance"（包揽串通）则指诉讼双方暗中勾结、合谋制造诉讼以谋取私利。此短语在《杀死一只知更鸟》中由泰勒法官幽默地引用于法律语境，用来驳斥坎宁安家族与康宁汉家族之间毫无意义的地产诉讼。
  书中原文: |
    "Judge Taylor said, 'Champertous connivance,' and declared he hoped to God the litigants were satisfied by each having had their public say."
  网络来源: |
    https://dictionary.justia.com/champerty

- 名词: Circuit solicitor
  分类: 法律
  解释: |
    巡回公诉律师——美国南卡罗来纳州对地区首席检察官（即地方检察官）的特定称谓。南卡罗来纳州将全州46个县划分为16个司法巡回区，每个巡回区选举一名circuit solicitor，负责该辖区内刑事案件的起诉工作，任期四年。该职位与大多数州的District Attorney（地方检察官）职能相同，但名称独特。在《杀死一只知更鸟》中，吉尔莫先生即担任此职。
  书中原文: |
    "He was sitting forward in the witness chair, his hands clasped between his knees, listening attentively to the circuit solicitor."
  网络来源: |
    https://law.justia.com/codes/south-carolina/2017/title-1/chapter-7/section-1-7-310/
