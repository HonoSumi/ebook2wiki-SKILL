- 名词: Radley Place
  分类: 地点·地理
  解释: |
    拉德利宅院，梅科姆镇上芬奇家以南三户处的一座阴森破败的老房子。小说中描述为石板灰色、屋顶盖着朽烂的木瓦、院子杂草丛生（长满约翰逊草和烟草草），宅前有一棵大橡树。这座宅院是布·拉德利隐居的地方，由于镇上流传的各种恐怖传说，成为斯库特和杰姆童年探险和恐惧的中心。拉德利家的宅院代表了小镇对未知事物的恐惧与偏见，同时也象征着布·拉德利被囚禁的孤独生活。
  书中原文: |
    "The Radley Place had ceased to terrify me, but it was no less gloomy, no less chilly under its great oaks, and no less uninviting."
  网络来源: https://www.ipl.org/essay/What-Is-The-Radleys-House-In-To-PJZYXMZP8AB

- 名词: Arthur Radley
  分类: 人物
  解释: |
    亚瑟·拉德利，绰号"布"(Boo)，小说中的隐居邻居和核心象征人物之一。因少年时期与同伴惹上法律麻烦后被父亲囚禁在家中长达15年以上，镇上人对他充满迷信式的恐惧。实际上他是一个善良、温柔、孩子气的人，通过树洞秘密向杰姆和斯库特赠送礼物（口香糖、印第安头便士、肥皂雕像等）。在小说高潮部分，他从鲍勃·尤厄尔手中救出了两个孩子。他是小说"知更鸟"隐喻的主要代表——一个无害而纯真、不应受到伤害的灵魂。
  书中原文: |
    "I sometimes felt a twinge of remorse, when passing by the old place, at ever having taken part in what must have been sheer torment to Arthur Radley- what reasonable recluse wants children peeping through his shutters, delivering greetings on the end of a fishing-pole, wandering in his collards at night?"
  网络来源: https://tokillamockingbird.fandom.com/wiki/Boo_Radley

- 名词: Nathan Radley
  分类: 人物
  解释: |
    内森·拉德利，布·拉德利的哥哥。在老拉德利先生去世后从彭萨科拉回来接管拉德利宅院。他继承了父亲的做法，将布继续关在屋内，与外界隔绝。他曾在夜间向潜入院子的孩子们开枪警告，最突出的行为是用水泥封死了橡树上的树洞——布与孩子们唯一的联络通道，谎称树生病了。他代表了隔绝、恐惧和社会偏见，是布与外界联系的阻碍者。
  书中原文: |
    "Mr. Nathan Radley could still be seen on a clear day, walking to and from town; we knew Boo was there, for the same old reason- nobody'd seen him carried out yet."
  网络来源: https://www.sparknotes.com/lit/mocking/character/nathan-radley/

- 名词: Mrs. Henry Lafayette Dubose
  分类: 人物
  解释: |
    亨利·拉斐特·杜博斯太太，芬奇家以北两户的一位年迈寡妇。她以暴躁刻薄的性格闻名，整天坐在前门走廊的轮椅上向路过的孩子（尤其是芬奇家的孩子们）吼叫辱骂，曾因阿提克斯为汤姆·罗宾逊辩护而攻击他。杰姆曾因受她侮辱而愤怒捣毁了她的山茶花丛。作为惩罚，杰姆被迫每天下午为她朗读一个月。杜博斯太太去世后，阿提克斯揭示了她实际上是吗啡上瘾者，利用杰姆的朗读作为戒断过程中的分心。阿提克斯称她为"我所认识的最勇敢的人"，因为她决心在死前戒掉毒瘾，成为"不欠任何人和任何事的自由之身"。
  书中原文: |
    "In a way, it was like the era of Mrs. Henry Lafayette Dubose, without all her yelling."
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/characters/mrs-henry-lafayette-dubose

- 名词: Current Events period
  分类: 概念·观念
  解释: |
    时事分享课，斯库特所在三年级班级每周一次的课堂活动。每个学生需从报纸上剪下一篇新闻，理解内容后在班上口头讲述。该活动旨在培养学生的站姿仪态、语言表达能力、记忆力和团队归属感。在本章中，塞西尔·雅各布斯在课上提到了希特勒迫害犹太人的新闻，而斯库特后来发现她的老师盖茨小姐在课堂外对黑人持有种族歧视态度，揭示了梅科姆成人世界的虚伪——一面谴责纳粹的迫害行径，一面又参与对本地黑人的不公对待。
  书中原文: |
    "Once a week, we had a Current Events period. Each child was supposed to clip an item from a newspaper, absorb its contents, and reveal them to the class."
  网络来源: https://brainly.com/question/3591171

- 名词: Indian-head pennies
  分类: 物件·工艺
  解释: |
    印第安头便士，美国1859至1909年间发行的一美分硬币，正面为戴羽毛头饰的印第安女性侧面头像。在小说中，布·拉德利将这些硬币（一枚1900年、一枚1906年）装在小天鹅绒盒子里，放在树洞中作为给杰姆和斯库特的礼物。杰姆视其为幸运币。这些礼物是布与外界建立联系的方式，证明了他的善良与慷慨。
  书中原文: |
    "And yet I remembered. Two Indian-head pennies, chewing gum, soap dolls, a rusty medal, a broken watch and chain."
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/what-were-7-items-found-tree-337419

- 名词: chewing gum
  分类: 物件·工艺
  解释: |
    口香糖，布·拉德利在树洞中为芬奇孩子们留下的第一批礼物之一。斯库特首先发现了两块包在锡纸里的箭牌双薄荷口香糖，后来在树洞中又出现一整包口香糖。当她第一次吃下时，杰姆担心有毒逼她吐掉。这些平凡的小礼物体现了布对孩子们的友善和渴望交流的心意，与外界的恐惧传闻形成鲜明对比。
  书中原文: |
    "And yet I remembered. Two Indian-head pennies, chewing gum, soap dolls, a rusty medal, a broken watch and chain."
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/what-were-7-items-found-tree-337419

- 名词: soap dolls
  分类: 物件·工艺
  解释: |
    肥皂雕像，布·拉德利用肥皂雕刻的两个小人像——一个男孩和一个穿裙子的女孩，酷似杰姆和斯库特。这是他在树洞中留给孩子们的最为个人化、最感人的礼物，证明他一直在默默观察着这两个孩子，并且具备雕刻艺术才能。斯库特最初被吓到（以为是巫毒），但后来理解了其中的善意。这尊雕像象征着布与孩子们之间双向的关注与情感连接，也体现了布被压抑的温柔人性。
  书中原文: |
    "And yet I remembered. Two Indian-head pennies, chewing gum, soap dolls, a rusty medal, a broken watch and chain."
  网络来源: https://visionotes.blogspot.com/2016/09/in-novel-to-kill-mockingbird-why-did.html

- 名词: rusty medal
  分类: 物件·工艺
  解释: |
    生锈的奖牌，布·拉德利留在树洞中的礼物之一，是一枚拼写比赛奖牌，可能来自布自己的童年时代。这枚奖牌暗示布曾经是一个正常、聪明的孩子，在被迫与社会隔绝之前也曾取得过学业成就。它是将布从"鬼怪"还原为有血有肉的人的重要物件，揭示了隐藏在外界谣言背后的真实人性。
  书中原文: |
    "And yet I remembered. Two Indian-head pennies, chewing gum, soap dolls, a rusty medal, a broken watch and chain."
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/what-were-7-items-found-tree-337419

- 名词: broken watch and chain
  分类: 物件·工艺
  解释: |
    坏掉的怀表和表链，布·拉德利留在树洞中的最后一批礼物之一，附有一把小铝刀。阿提克斯说如果表还能走的话值十美元。杰姆曾试图修好它，并像父亲一样把表链挂在身上。这是布留给孩子们最私人的物品之一，象征着他将自己珍视的童年记忆分享给两个孩子的愿望。斯库特在小说的结尾深情回忆了这些礼物："他给了我们两块肥皂雕像、一块坏掉的怀表和表链、一对幸运币，还有我们的生命。"
  书中原文: |
    "And yet I remembered. Two Indian-head pennies, chewing gum, soap dolls, a rusty medal, a broken watch and chain."
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/what-were-7-items-found-tree-337419

- 名词: cement patch
  分类: 物件·工艺
  解释: |
    水泥补丁，内森·拉德利封堵橡树树洞时填入的水泥。当杰姆和斯库特准备给树洞的主人写感谢信时，发现树洞已被水泥填满。内森谎称树生病了需要填补，但阿提克斯检验后告诉杰姆树很健康。树洞的水泥补丁象征着布与外界联系的被切断，也是杰姆成长中的失望时刻——他意识到成人世界中存在无故的残忍。斯库特在路过时观察到树干上的水泥补丁正在变黄。
  书中原文: |
    "I stopped and looked at the tree one afternoon: the trunk was swelling around its cement patch. The patch itself was turning yellow."
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/mr-nathan-radley-fills-the-knothole-in-the-tree-3112195

- 名词: football water buckets
  分类: 概念·观念
  解释: |
    橄榄球水桶搬运工，杰姆在中学时的差事。由于他刚上中学（七年级），身材瘦小，不能真正参加校队比赛，只能负责为球员搬运水桶。杰姆对此充满热情，几乎每天下午都练到天黑才回家。他还按照教练的建议拼命吃香蕉牛奶增重，梦想在两年后能真正上场打球。这个细节展现了杰姆进入青春期后的成长变化——他有了自己的生活和追求，与斯库特的相处时间减少，兄妹关系也在悄然变化。
  书中原文: |
    "He went out for football, but was too slender and too young yet to do anything but carry the team water buckets. This he did with enthusiasm; most afternoons he was seldom home before dark."
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/why-couldnt-jem-play-football-1193961

- 名词: third grade
  分类: 概念·观念
  解释: |
    三年级，斯库特在小说后半部分就读的年级。进入三年级后，斯库特和杰姆的学校生活有了很大不同——她只能早晨和杰姆一起步行上学，吃饭时才能见到他。斯库特的三年级老师是盖茨小姐（Miss Gates），班级活动包括每周的时事分享课。这个阶段标志着斯库特的进一步成长：她不仅在学业上进步，更开始思考成人世界的复杂道德问题，尤其是注意到梅科姆种族双重标准下的虚伪。
  书中原文: |
    "I was now in the third grade, and our routines were so different I only walked to school with Jem in the mornings and saw him at mealtimes."
  网络来源: https://americanliterature.com/author/harper-lee/book/to-kill-a-mockingbird/part-two-chapter-26/flashcards

- 名词: state legislature
  分类: 概念·观念
  解释: |
    州议会，阿提克斯·芬奇在亚拉巴马州议会担任议员。在小说中，斯库特提到尽管阿提克斯为汤姆·罗宾逊辩护而备受争议和批评，镇上人仍然一如既往地无对手竞选将他连任到州议会。这个细节揭示了梅科姆社区复杂的社会态度——一方面不赞同阿提克斯为黑人辩护，另一方面仍尊重他的品格和能力。阿提克斯偶尔需要前往州首府蒙哥马利参加议会会议，曾在第十二章中因为议会特别会议而每天往返通勤两周。
  书中原文: |
    "in spite of Atticus's shortcomings as a parent, people were content to re-elect him to the state legislature that year, as usual, without opposition."
  网络来源: https://www.gradesaver.com/to-kill-a-mockingbird/q-and-a/what-happened-when-atticus-came-up-for-re-election-what-might-this-mean-about-the-town-360282

- 名词: re-elect
  分类: 概念·观念
  解释: |
    连任，指阿提克斯·芬奇在汤姆·罗宾逊案后无对手竞选连任州议会议员。这是小说中一个值得玩味的细节——尽管镇上很多人对他为黑人辩护感到不满，但没有人提出候选人挑战他的席位。斯库特对此感到困惑，最终归结为"人们就是很古怪"。这种看似矛盾的现象体现了梅科姆社会微妙的价值观：选民们可能不赞同阿提克斯的具体行为，但认可他长期服务的品格；或者如一些评论所说，镇上没有人真正想要这份工作。无论如何，阿提克斯在政治舞台上得以继续服务于社区。
  书中原文: |
    "people were content to re-elect him to the state legislature that year, as usual, without opposition."
  网络来源: https://www.gradesaver.com/to-kill-a-mockingbird/q-and-a/what-happened-when-atticus-came-up-for-re-election-what-might-this-mean-about-the-town-360282
