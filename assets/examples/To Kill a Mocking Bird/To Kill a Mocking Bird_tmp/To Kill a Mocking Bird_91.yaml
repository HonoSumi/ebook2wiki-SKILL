- 名词: Missionary circle
  分类: 社会背景
  解释: |
    20世纪30年代美国南方教会妇女的定期聚会组织，以海外传教募捐和社区慈善为名义，但也成为白人女性社交和展示道德优越感的场合。在小说中，亚历山德拉姑姑主办的传道会茶会表面讨论非洲Mrunas部落的传教工作，实则暴露了白人中产阶级妇女的虚伪——她们关心远方的"异教徒"，却对身边的黑人同胞毫无同情。
  书中原文: |
    "Today Aunt Alexandra and her missionary circle were fighting the good fight all over the house."
  网络来源: |
    https://www.coursehero.com/lit/To-Kill-a-Mockingbird/chapter-24-summary/

- 名词: charlotte
  分类: 物品
  解释: |
    夏洛特甜点（Charlotte Russe），一种源自法国的经典冷冻甜点，在20世纪30年代的美国南方非常流行。由手指饼干或蛋糕条围边，填入巴伐利亚奶油（whipped cream慕斯加吉利丁定型），通常冷藏过夜后食用。在小说中，卡尔珀尼亚为传道会茶会制作的这款精致甜点体现了南方家庭的待客之道和她的厨艺。
  书中原文: |
    "Calpurnia wore her stiffest starched apron. She carried a tray of charlotte."
  网络来源: |
    https://www.southernliving.com/food/desserts/what-is-a-charlotte-russe

- 名词: Mrunas
  分类: 概念
  解释: |
    哈珀·李在小说中虚构的一个非洲部落。由传教士J·格里姆斯·埃弗雷特在梅科姆的传道会上介绍，被描述为"愚昧落后"的族群。这个虚构的部落具有重要的主题意义——梅科姆的白人女士们对遥远的非洲部落表现出极大的同情和关心，却对身边黑人社区遭受的不公视而不见，深刻揭露了她们的虚伪和选择性同情。
  书中原文: |
    "Mrs. Grace Merriweather giving a report in the livingroom on the squalid lives of the Mrunas"
  网络来源: |
    https://www.enotes.com/topics/to-kill-a-mockingbird/questions/j-grimes-everett-and-the-mrunas-in-to-kill-a-3133455

- 名词: Tangee Natural
  分类: 物品
  解释: |
    20世纪20至40年代风靡美国的经典口红品牌，由药剂师George W. Luft于1920年左右创立，品牌名源自"tangerine"（橘子）。其标志性特点是"变色配方"：口红在管中呈橘色，涂抹后根据个人肤色变成玫瑰红，创造出自然效果。1930年代售价约为1美元，是好莱坞明星Joan Blondell、Jean Harlow等人喜爱的品牌。在小说中象征南方女士的精致妆容和时代审美。
  书中原文: |
    "the only lipstick in the room was Tangee Natural."
  网络来源: |
    https://www.worthpoint.com/dictionary/p/textiles-clothing-accessories/luxury-brands-and-fashion-designers/tangee-cosmetics-brand

- 名词: Cutex Natural
  分类: 物品
  解释: |
    成立于1911年的美国指甲油品牌，由Northam Warren Company创立，1917年推出了第一款液体指甲油（源自汽车漆配方）。Natural（自然色）是该品牌的经典色号，是一种淡粉色或米色的低调指甲油，符合1930年代推崇的自然优雅审美。在小说中，梅科姆女士们手指上闪耀的Cutex Natural指甲油与Tangee Natural口红一起，勾勒出时代女性的精致外表。
  书中原文: |
    "Cutex Natural sparkled on their fingernails, but some of the younger ladies wore Rose."
  网络来源: |
    https://www.worthpoint.com/dictionary/p/textiles-clothing-accessories/luxury-brands-and-fashion-designers/cutex-nail-care-brand

- 名词: Grace Merriweather
  分类: 人物
  解释: |
    梅科姆镇最虔诚的教会女士，传道会的核心成员。斯库特形容她为"Maycomb最虔诚的女士"。在第24章的传道会茶会上，她主导了关于Mrunas部落的传教报告，言语中充满对远方"异教徒"的同情，但随即抱怨自家黑人女佣Sophy"闷闷不乐"，并间接批评阿提克斯为汤姆·罗宾逊辩护。莫迪小姐用"His food doesn't stick going down, does it?"尖锐地揭露了她的虚伪。她还编写导演了学校的万圣节话剧。
  书中原文: |
    "Mrs. Grace Merriweather giving a report in the livingroom on the squalid lives of the Mrunas"
  网络来源: |
    https://www.edurev.in/t/129691/Grace-Merriweather-Characters--To-Kill-a-Mockingbi

- 名词: Barker's Eddy
  分类: 地点
  解释: |
    小说中虚构的一个河湾游泳地，位于梅科姆镇外的Meridian高速公路附近。eddy（回流区）指溪流中障碍物下游形成的水潭，孩子们常去那里游泳。杰姆在这里教迪尔游泳。斯库特在第3章曾威胁说要跳进Barker's Eddy淹死自己让卡尔珀尼亚后悔。据考证，其现实原型是Monroeville附近Limestone Creek上的Parker's Eddy。
  书中原文: |
    "Jem had discovered with angry amazement that nobody had ever bothered to teach Dill how to swim... They had spent two afternoons at the creek"
  网络来源: |
    http://leepeacock2010.blogspot.com/2023/11/was-fictional-swimming-hole-in-to-kill.html

- 名词: dewberry tarts
  分类: 物品
  解释: |
    露莓塔，一种美国南方传统甜点。露莓（dewberry）是一种与黑莓近似的野生浆果，比黑莓更酸更多汁，在南方初夏成熟。将新鲜露莓加糖填入酥皮塔壳中烤制而成。在小说中，作为传道会茶会的点心之一，展现了南方家庭聚会的精致饮食传统和卡尔珀尼亚出色的烘焙手艺。
  书中原文: |
    "who'd've thought of little dewberry tarts... Calpurnia?... who'da thought it"
  网络来源: |
    https://www.cookbookfundraiser.com/recipe/2979454/dewberry-tart.html
