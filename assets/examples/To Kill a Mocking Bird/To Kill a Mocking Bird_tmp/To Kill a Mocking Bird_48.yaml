- 名词: lined-out hymnody
  分类: 概念
  解释: |-
    一种基督教圣歌演唱方式，由领唱者逐行朗诵或吟唱赞美诗的每一句歌词，然后会众以应和的方式跟唱。这种被称为"Dr. Watts"的演唱方式在非裔美国人教会中尤为盛行，融合了西非音乐元素——应答模式、切分节奏和蓝调音符，成为美国黑人灵歌、福音音乐甚至灵魂乐和爵士乐的源头之一。
  书中原文: |-
    "Miraculously on pitch, a hundred voices sang out Zeebo's words. The last syllable, held to a husky hum, was followed by Zeebo saying, 'That we call the sweet forever.' Music again swelled around us; the last note lingered and Zeebo met it with the next line: 'And we only reach that shore by faith's decree.'"
  网络来源: https://en.wikipedia.org/wiki/Lining_out

- 名词: spite fence
  分类: 概念
  解释: |-
    一种恶意建造的栅栏或类似结构，其唯一或主要目的是为了骚扰、伤害或激怒相邻的邻居，而对建造者本人没有任何合理或有益的用途。美国多个州有专门的法律将其界定为"私人妨害"(private nuisance)，受害邻居可向法院申请拆除令或索赔。
  书中原文: |-
    "she had erected the only spite fence in the history of the Quarters."
  网络来源: https://www.law.cornell.edu/wex/spite_fence

- 名词: bootlegger
  分类: 概念
  解释: |-
    指非法制造、分销或销售违禁商品（尤其是酒精饮料）的人。该词源自1880年代美国中西部，当时人们将酒瓶藏在高筒靴(boot)的顶部与印第安人进行违禁交易。在美国禁酒时期(1920–1933)，私酒贩子通过加拿大和墨西哥边境走私、伪造医用处方、蒸馏私酿等方式牟取暴利，也催生了如阿尔·卡彭等有组织犯罪集团。
  书中原文: |-
    "Bootleggers caused enough trouble in the Quarters, but women were worse."
  网络来源: https://www.britannica.com/topic/bootlegging

- 名词: On Jordan's Stormy Banks
  分类: 作品
  解释: |-
    一首经典的基督教赞美诗，由英国浸信会牧师塞缪尔·斯坦内特(Samuel Stennett, 1727–1795)创作，1787年首次出版。歌词以圣经中以色列人渡过约旦河进入迦南应许之地的故事为隐喻，象征信徒从尘世走向天国的旅程。该诗在美国边疆露营复兴运动中极为流行，副歌"I am bound for the promised land"广为人知。
  书中原文: |-
    "Zeebo lined On Jordan's Stormy Banks, and church was over."
  网络来源: https://www.umcdiscipleship.org/resources/history-of-hymns-on-jordans-stormy-banks-i-stand

- 名词: papoose
  分类: 物品
  解释: |-
    源自纳拉甘西特语(阿尔冈昆语系)对"婴儿"的称呼，早期殖民者误将其指代北美原住民使用的婴儿背板(cradleboard)。这是一种将婴儿紧紧包裹并固定在扁平木板上的传统携带方式，可以背在背上、靠在身边或挂在马鞍上。现代语境中也指软结构的婴儿背带或医疗中固定儿童的约束板。
  书中原文: |-
    "Those unable to sit were strapped papoose-style on their mothers' backs, or resided in extra cotton bags."
  网络来源: https://www.dictionary.com/browse/papoose
