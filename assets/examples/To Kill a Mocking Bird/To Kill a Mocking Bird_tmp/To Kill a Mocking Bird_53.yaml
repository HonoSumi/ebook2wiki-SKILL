- 名词: Hoover cart
  分类: 物品
  解释: 大萧条时期的一种自制交通工具，将汽车的发动机和车窗拆除，后轮连接成推车状，用马或骡子牵引。因民众将经济困境归咎于时任总统赫伯特·胡佛（Herbert Hoover）而得名，象征着大萧条时代的普遍贫困。
  书中原文: "Or two dumpy countrywomen in straw hats sitting in a Hoover cart."
  网络来源: https://library.ecu.edu/specialcollections/2009/06/19/hoover-days-cart-2/#main

- 名词: Cousin Joshua
  分类: 人物
  解释: 全名 Joshua S. St. Clair，是阿提克斯·芬奇的远房表亲。他曾就读于西瓦尼大学（Sewanee），后精神失常，试图用一把老式燧发手枪射杀大学校长，结果枪炸伤了自己的手，被长期关押，后成为一名下水道检查员。姑姑亚历山德拉试图将他作为家族荣耀，但孩子们知道他的真实故事。
  书中原文: "Get more like Cousin Joshua every day, don't I? Do you think I'll end up costing the family five hundred dollars?"
  网络来源: https://www.gradesaver.com/to-kill-a-mockingbird/q-and-a/in-chapter-13-of-to-kill-a-mockingbird-what-did-cousin-joshua-do-and-how-does-he-become-a-wedge-between-aunt-alexandra-and-atticus-290818

- 名词: carnal knowledge
  分类: 概念
  解释: 源自拉丁语 carnalis（肉体的），指性交行为，通常要求至少存在某种程度的插入。它是许多性犯罪（包括强奸、猥亵儿童、法定强奸）的必要法律构成要件。在美国法典中定义为阴茎与阴部或肛门的接触，包括任何轻微的插入。
  书中原文: "He sighed, and said rape was carnal knowledge of a female by force and without consent."
  网络来源: https://www.law.cornell.edu/wex/carnal_knowledge

- 名词: Maycomb Drugstore
  分类: 地点
  解释: 梅科姆镇（Maycomb）的一家本地药店，是镇上商业区的一部分。小说中斯库特和杰姆在镇上行走时曾看到农民在此橱窗前研究灌肠袋。这家药店与西蒙·芬奇（Simon Finch）作为药剂师的家世背景相呼应，是哈珀·李描绘南方小镇生活的重要场景元素。
  书中原文: "we would see only a couple of farmers studying the enema bags in the Mayco Drugstore window."
  网络来源: https://www.twinkl.ro/homework-help/english-homework-help/classic-literature/to-kill-a-mockingbird

- 名词: First Purchase Church
  分类: 地点
  解释: 全称 First Purchase African M.E. Church（第一购买非洲卫理公会教堂），位于梅科姆镇外的黑人聚居区"The Quarters"。该教堂以解放后的奴隶用第一笔收入购买而得名，条件简陋破旧，没有钱买赞美诗集，大多数教友不识字，采用"领唱"（lining）方式唱圣歌。卡尔珀尼亚带斯库特和杰姆在此参加礼拜，是小说中展现种族隔离和黑人社区生活的重要场景。
  书中原文: "You all were coming back from Calpurnia's church that Sunday?"
  网络来源: https://www.sparknotes.com/lit/mocking/section6/
