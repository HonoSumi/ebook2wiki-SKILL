- 名词: Mennonites
  分类: 文化
  解释: |
    门诺派是基督教中的一个再洗礼派分支，以门诺·西蒙斯命名，主张成人洗礼、和平主义、非暴力抵抗和简朴生活，历史上曾因拒绝婴儿洗礼而遭受迫害。门诺派教徒分散在全球87个国家，以非洲和北美人口最为集中。
  书中原文: |
    "Yonder's some Mennonites," Jem said to Dill. "They don't have buttons."
  网络来源: |
    https://en.wikipedia.org/wiki/Mennonite

- 名词: Prohibition
  分类: 事件
  解释: |
    美国禁酒时期（1920-1933）是指美国通过宪法第十八修正案和沃尔斯特德法案在全国范围内禁止酒精饮料的生产、运输和销售的历史时期。该政策导致有组织犯罪猖獗，最终被第二十一修正案废除，是美国历史上唯一被废除的宪法修正案。
  书中原文: |
    Mr. Tensaw Jones voted the straight Prohibition ticket
  网络来源: |
    https://en.wikipedia.org/wiki/Prohibition_in_the_United_States

- 名词: William Jennings Bryan
  分类: 人物
  解释: |
    威廉·詹宁斯·布莱恩（1860-1925）是美国著名的政治家、演说家，曾任美国众议员和国务卿。他是民主党和平民党的领袖，三次竞选总统均告失败，以"黄金十字架"演讲闻名，晚年参与斯科普斯"猴子审判"（进化论争议案）。
  书中原文: |
    "you'd think William Jennings Bryan was speakin'."
  网络来源: |
    https://en.wikipedia.org/wiki/William_Jennings_Bryan

- 名词: Nehi Cola
  分类: 文化
  解释: |
    Nehi是一种水果味碳酸软饮料品牌，1924年由克罗德·哈彻在美国乔治亚州哥伦布市推出，名称是"knee-high"的双关语，指其高瓶身设计。该品牌曾是Nehi公司的主打产品，现归Keurig Dr Pepper所有，主要在美国南方销售。
  书中原文: |
    "the Negroes sat quietly in the sun, dining on sardines, crackers, and the more vivid flavors of Nehi Cola."
  网络来源: |
    https://en.wikipedia.org/wiki/Nehi

- 名词: thoroughbred
  分类: 自然
  解释: |
    纯血马是一种以赛马性能著称的马品种，起源于17-18世纪的英格兰，由本地母马与从阿拉伯、巴巴里和土库曼引进的公马杂交培育而成。所有现代纯血马的血统都可追溯至三匹著名的种公马：拜尔利土耳其、达利阿拉伯和高多芬阿拉伯。
  书中原文: |
    Mr. Dolphus Raymond lurched by on his thoroughbred.
  网络来源: |
    https://en.wikipedia.org/wiki/Thoroughbred

- 名词: foot washing
  分类: 文化
  解释: |
    洗脚礼是基督教中的一项宗教仪式，源于《约翰福音》第13章中耶稣在最后的晚餐上为门徒洗脚并命令他们效仿的记载。许多基督教派别（如天主教在濯足节、门诺派、再洗礼派、基督复临安息日会等）将其作为谦卑和服务的象征来实践。
  书中原文: |
    I guess that the foot-washers thought that the Devil was quoting Scripture for his own purposes
  网络来源: |
    https://en.wikipedia.org/wiki/Foot_washing

- 名词: subpoena
  分类: 法律
  解释: |
    传票是政府机构（通常是法院）签发的一种法律文书，强制证人出庭作证或提交证据，违者将受到处罚。该词源自拉丁语"sub poena"，意为"在处罚之下"，分为两种类型：出庭作证令（subpoena ad testificandum）和提交物证令（subpoena duces tecum）。
  书中原文: |
    "Better be careful he doesn't hand you a subpoena."
  网络来源: |
    https://en.wikipedia.org/wiki/Subpoena
