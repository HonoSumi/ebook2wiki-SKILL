- 名词: "Ku Klux Klan"
  分类: "制度/组织"
  解释: "三K党，美国历史上最具臭名昭著的种族主义恐怖组织。成立于1865年，由南方邦联退伍军人在田纳西州普拉斯基创建，旨在通过暴力恐吓手段推翻重建时期政策、恢复白人至上主义。1920年代达到鼎盛时期，成员超过400万，目标扩展至天主教徒、犹太人、移民和劳工组织。小说中杰姆提到三K党曾迫害天主教徒，阿提克斯则描述1920年代梅科姆镇的三K党更像政治组织而非恐怖团伙。"
  书中原文: "\"Ku Klux got after some Catholics one time.\" / \"Way back about nineteen-twenty there was a Klan, but it was a political organization more than anything. Besides, they couldn't find anybody to scare.\""
  网络来源: "https://www.britannica.com/topic/Ku-Klux-Klan"

- 名词: "Linotype"
  分类: "科技/工具"
  解释: "莱诺整行铸排机，19世纪末由德裔美国发明家奥特马尔·默根塔勒（Ottmar Mergenthaler）于1884年发明的革命性排版机器。它能通过键盘操作一次性铸造整行铅字（称为slug），极大提升了印刷效率，使报纸和书籍出版速度大幅提高。Linotype 这个名称源自line o' type（一整行铅字）。在小说中，安德伍德先生整日坐在他的莱诺铸排机前，还时不时从一加仑的樱桃酒壶中喝上几口。"
  书中原文: "\"His days were spent at his linotype, where he refreshed himself occasionally from an ever-present gallon jug of cherry wine.\""
  网络来源: "https://www.britannica.com/technology/Linotype"

- 名词: "Nearer My God to Thee"
  分类: "文化概念"
  解释: "《与主更亲近》，19世纪著名基督教赞美诗，由英国诗人莎拉·弗劳尔·亚当斯（Sarah Flower Adams）于1841年作词。歌词灵感源自《圣经·创世纪》第28章中雅各梦见天梯的故事。该赞美诗最著名的关联事件是1912年泰坦尼克号沉没时，船上乐队据报曾演奏此曲。小说中阿提克斯在教堂礼拜时哼唱此曲，但比其他人慢了几个音节。"
  书中原文: "\"I heard him rumble, 'Nearer my God to thee,' some notes behind the rest of us.\""
  网络来源: "https://en.wikipedia.org/wiki/Nearer,_My_God,_to_Thee"
