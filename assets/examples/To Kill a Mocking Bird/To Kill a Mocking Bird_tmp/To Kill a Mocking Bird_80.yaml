- 名词: simple hell people give other people
  分类: 主题与象征
  解释: Dolphus Raymond对Scout和Dill说的关于种族偏见的著名台词，指出白人给黑人带来的苦难往往是「不经思考」的，反映了小说中种族偏见的无意识性和根深蒂固性。
  书中原文: "Cry about the simple hell people give other people—without even thinking. Cry about the hell white people give colored folks, without even stopping to think that they're people, too."
  网络来源: https://www.sparknotes.com/lit/mocking/quotes/theme/prejudice/

- 名词: Atticus Finch's closing argument
  分类: 情节事件
  解释: Atticus Finch在Tom Robinson审判中发表的结案陈词，是美国文学中最著名的法庭演讲之一。他论证缺乏医学证据、物理上不可能性、证人矛盾，并呼吁陪审团超越种族偏见实现司法公正。
  书中原文: "I shall be brief, but I would like to use my remaining time with you to remind you that this case is not a difficult one... but it does require you to be sure beyond all reasonable doubt as to the guilt of the defendant."
  网络来源: https://www.sparknotes.com/lit/mocking/section10/

- 名词: beyond all reasonable doubt
  分类: 法律与制度
  解释: 「排除一切合理怀疑」是英美法系中刑事案件的证明标准，要求检方举证使陪审团确信被告有罪且无合理怀疑。Atticus在结案陈词中用此标准指出控方未能履行举证责任。
  书中原文: "...it does require you to be sure beyond all reasonable doubt as to the guilt of the defendant."
  网络来源: https://genius.com/Harper-lee-to-kill-a-mockingbird-atticus-finchs-closing-speech-annotated

- 名词: case is as simple as black and white
  分类: 主题与象征
  解释: Atticus的经典双关语。字面上指案件事实清楚明了(Tom无罪)，同时也暗指种族对立。讽刺的是陪审团正是从「黑白」种族角度而非事实角度做出判决。
  书中原文: "To begin with, this case should never have come to trial. This case is as simple as black and white."
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/atticus-says-trial-this-case-simple-black-white-277205

- 名词: no iota of medical evidence
  分类: 法律与制度
  解释: Atticus指出控方没有提供任何医学证据证明强奸罪行的发生。这是他的辩论策略核心，强调控方完全依赖两个证人的证词而这些证词在交叉询问中已被严重质疑。
  书中原文: "The state has not produced one iota of medical evidence to the effect that the crime Tom Robinson is charged with ever took place."
  网络来源: https://www.imdb.com/title/tt0056592/quotes/?item=qt0425303

- 名词: cheatin' a colored man is ten times worse than cheatin' a white man
  分类: 主题与象征
  解释: Scout转述Atticus的教诲——欺骗黑人比欺骗白人恶劣十倍。因为社会已对黑人极不公，利用特权剥削本就处于劣势的人更加道德败坏，体现了Atticus的道德教育和种族正义观。
  书中原文: "Atticus says cheatin' a colored man is ten times worse than cheatin' a white man... Says it's the worst thing you can do."
  网络来源: https://www.savemyexams.com/igcse/english-literature/edexcel/16/revision-notes/modern-prose/to-kill-a-mockingbird/to-kill-a-mockingbird-key-text-quotations/

- 名词: Maycomb County Courthouse balcony
  分类: 场景与设定
  解释: 梅科姆县法院内的隔离座位区即「有色人种 balcony」，沿法庭三面墙壁延伸。审判期间黑人观众只能在此就座。Scout、Jem和Dill由Reverend Sykes带领在此观看审判，获得了观察审判的独特视角。
  书中原文: "The Colored balcony ran along three walls of the courtroom like a second-story veranda, and from it we could see everything."
  网络来源: https://americanliterature.com/author/harper-lee/book/to-kill-a-mockingbird/part-two-chapter-16

- 名词: 5th Judicial Circuit Court
  分类: 场景与设定
  解释: 小说中审判Tom Robinson的法院正式名称，Scout在思考是去听Dolphus Raymond说话还是回到法庭时提及。基于Harper Lee家乡阿拉巴马州Monroeville的真实Monroe County Courthouse。
  书中原文: "Between two fires, I could not decide which I wanted to jump into: Mr. Raymond or the 5th Judicial Circuit Court."
  网络来源: https://www.studocu.com/en-us/document/capital-high-school/english/trial-script-tkm/72669810

- 名词: Atticus wasn't a thunderer
  分类: 角色分析
  解释: Scout观察到Atticus向陪审团陈词时风格冷静克制不咄咄逼人。「thunderer」指声音洪亮气势汹汹试图用音量压倒陪审团的律师。Atticus的反常规风格体现了他的自信——相信事实本身的力量不需要虚张声势。
  书中原文: "He walked slowly up and down in front of the jury, and the jury seemed to be attentive... I guess it was because Atticus wasn't a thunderer."
  网络来源: https://digital.library.unt.edu/ark:/67531/metadc504305/m1/71/?rotate=90

- 名词: run-of-the-mill man
  分类: 角色分析
  解释: Dolphus Raymond对Scout说「你爸爸不是普通人」，认识到Atticus不同于Maycomb其他白人——他具备道德正直、勇气和对所有人的平等尊重，强调了Atticus作为小说道德核心的独特地位。
  书中原文: "Miss Jean Louise, you don't know your pa's not a run-of-the-mill man, it'll take a few years for that to sink in."
  网络来源: https://www.markedbyteachers.com/index.php/gcse/english/mr-dolphus-raymond-tells-scout-your-pa-s-not-a-run-of-the-mill-man-how-far-do-you-agree-with-this-description-of-atticus-finch.html

- 名词: Atticus unbuttons his vest and coat
  分类: 情节事件
  解释: Atticus发表结案陈词前做了一个前所未有的举动——解开马甲、解开领口、松开领带、脱下外套。对Scout和Jem来说如同看到父亲赤裸。象征着他卸下职业盔甲以真实的人的身份与陪审团对话。
  书中原文: "he unbuttoned his vest, unbuttoned his collar, loosened his tie, and took off his coat... this was the equivalent of him standing before us stark naked."
  网络来源: https://www.gradesaver.com/to-kill-a-mockingbird/q-and-a/why-did-atticus-remove-his-coat-loosen-his-tie-and-unbutton-his-vest-131387

- 名词: Tom Robinson trial
  分类: 情节事件
  解释: 小说的核心事件——Tom Robinson被错误指控强奸白人女性Mayella Ewell。尽管Atticus证明Tom的左臂残疾使其无法实施犯罪且证据指向Bob Ewell，全白人陪审团仍判定Tom有罪，揭示了梅科姆深刻的种族偏见和司法不公。
  书中原文: "The state has not produced one iota of medical evidence to the effect that the crime Tom Robinson is charged with ever took place."
  网络来源: https://www.bbc.co.uk/bitesize/guides/z8jyxsg/revision/2
