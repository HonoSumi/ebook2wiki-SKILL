- 名词: Missouri Compromise
  分类: 事件·典故
  解释: |
    1820年美国国会通过的一项联邦立法，旨在暂时解决蓄奴州与自由州之间的领土争议。该妥协案允许密苏里以蓄奴州身份加入联邦，同时允许缅因以自由州身份加入，并在路易斯安那购地领土的北纬36度30分线以北禁止奴隶制（密苏里除外）。该法案由亨利·克莱促成，但最终被1854年的《堪萨斯-内布拉斯加法案》实质上废除，并于1857年的"德雷德·斯科特案"中被最高法院裁定违宪，成为美国内战的重要前奏。
  书中原文: |
    "Tell you, Atticus," Cousin Ike would say, "the Missouri Compromise was what licked us, but if I had to go through it agin I'd walk every step of the way there an' every step back jist like I did before an' furthermore we'd whip 'em this time..."
  网络来源: |
    https://en.wikipedia.org/wiki/Missouri_Compromise
- 名词: Stonewall Jackson
  分类: 人物
  解释: |
    托马斯·乔纳森·"石墙"·杰克逊（1824–1863），美国内战期间南方邦联最著名的将领之一。他在第一次马纳萨斯战役（第一次牛奔河战役）中率部坚守阵地，被友军将领称为"像石墙一样屹立"，因而获得"石墙"绰号。他以快速行军和突袭战术闻名，曾在1862年的谢南多厄河谷战役中以少胜多。1863年5月在钱斯勒斯维尔战役中被己方士兵误伤，因肺炎去世。罗伯特·李将军痛惜道："我失去了右臂。"
  书中原文: |
    "now in 1864, when Stonewall Jackson came around by- I beg your pardon, young folks. Ol' Blue Light was in heaven then, God rest his saintly brow...."
  网络来源: |
    https://en.wikipedia.org/wiki/Stonewall_Jackson
- 名词: Yankees
  分类: 概念·观念
  解释: |
    在美国历史上具有多重含义的称谓。在美国内战时期（1861–1865），南方邦联支持者用该词贬指北方联邦士兵及所有北方人。该词可能源自荷兰语"Janke"（约翰的昵称），18世纪中期开始被用来指代新英格兰地区的殖民者，后在美国独立战争期间通过歌曲《扬基歌》流传开来。在美国以外，该词（或缩写"Yank"）常被用来泛指美国人。
  书中原文: |
    "This time we aren't fighting the Yankees, we're fighting our friends. But remember this, no matter how bitter things get, they're still our friends and this is still our home."
  网络来源: |
    https://en.wikipedia.org/wiki/Yankee
- 名词: General Hood
  分类: 人物
  解释: |
    约翰·贝尔·胡德（1831–1879），美国内战期间南方邦联将领，以激进勇猛而又常导致巨大伤亡的指挥风格闻名。他毕业于西点军校，曾指挥著名的"得克萨斯旅"。在葛底斯堡战役和奇克莫加战役中受重伤（左臂永久损伤，右腿截肢）。33岁时晋升为临时上将军衔，成为内战中双方最年轻的军团指挥官。在亚特兰大战役中替代约瑟夫·约翰斯顿，发动多次代价高昂的攻势未能阻挡谢尔曼的推进，后在富兰克林战役和纳什维尔战役中几乎全军覆没。书中提到的"General Hood type beard"即指其标志性的长而浓密的胡须。
  书中原文: |
    He wore a General Hood type beard of which he was inordinately vain.
  网络来源: |
    https://en.wikipedia.org/wiki/John_Bell_Hood
