- 名词: Dill Harris
  分类: 人物
  解释: |
    全名查尔斯·贝克·哈里斯，斯库特和杰姆的暑期玩伴，来自密西西比州梅里迪安。他比斯库特大一年级但个子更矮，拥有一头雪白的头发和丰富的想象力，常激发孩子们对怪人拉德利的种种探险。他的角色原型是哈珀·李的童年好友杜鲁门·卡波特。
  书中原文: |
    "That wasn't it, he- they just wasn't interested in me."
  网络来源: https://en.m.wikipedia.org/wiki/Dill_Harris

- 名词: Atticus Finch
  分类: 人物
  解释: |
    斯库特和杰姆的父亲，梅科姆镇的律师，亚拉巴马州议会议员。他是一位鳏夫，以正直、宽容和勇气著称，被指派为汤姆·鲁滨逊辩护。在本章中，他以一贯的冷静和幽默处理迪尔离家出走的事件，展现出父亲的智慧与温和。
  书中原文: |
    "Whoa, son," said Atticus. "Nobody's about to make you go anywhere but to bed pretty soon."
  网络来源: https://en.wikipedia.org/wiki/List_of_To_Kill_a_Mockingbird_characters

- 名词: Miss Rachel Haverford
  分类: 人物
  解释: |
    迪尔的姨妈，斯库特家的邻居，独自居住在梅科姆镇。她性格爱操心，有锁门的习惯和早晨喝威士忌的嗜好，对迪尔既严厉又关爱。当迪尔离家出走后，她虽大声斥责但仍允许他留宿。
  书中原文: |
    He bore with fortitude her Wait Till I Get You Home, Your Folks Are Out of Their Minds Worrin', was quite calm during That's All the Harris in You Coming Out.
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/characters/miss-rachel-haverford

- 名词: Aunt Alexandra
  分类: 人物
  解释: |
    全名亚历山德拉·芬奇·汉考克，阿提克斯·芬奇的姐姐，居住于芬奇庄园种植园。她传统保守，重视家族声誉和淑女礼仪，对斯库特的男孩气感到不满。在本章中她沉默寡言，仅说了一句"你父亲累了"。
  书中原文: |
    "Your father's tired," said Aunt Alexandra, her first words in hours, it seemed.
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/characters/aunt-alexandra
