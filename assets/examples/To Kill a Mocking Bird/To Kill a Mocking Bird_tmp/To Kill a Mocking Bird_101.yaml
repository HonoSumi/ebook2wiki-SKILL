- 名词: National Recovery Act
  分类: 组织
  解释: "美国《国家工业复兴法案》（NIRA），1933年由富兰克林·罗斯福总统签署，是\"新政\"的核心立法之一。该法案设立了国家复兴管理局（NRA），通过行业公平竞争法规来稳定经济、减少失业、设定最低工资和最高工时。1935年被最高法院在\"谢克特家禽案\"中裁定违宪。"
  书中原文: "I asked Atticus why, and he said it was because the National Recovery Act was dead. I asked who killed it: he said nine old men."
  网络来源: https://guides.loc.gov/national-recovery-administration/introduction

- 名词: nine old men
  分类: 概念
  解释: "指1930年代美国最高法院的九位大法官（多数年逾七旬），这一称呼因记者德鲁·皮尔森和罗伯特·艾伦1936年的畅销书而流行。当时这些大法官多次裁定罗斯福新政立法违宪，导致罗斯福在1937年提出\"法院改组计划\"（court-packing plan），试图增加大法官人数以改变法院立场。"
  书中原文: "I asked Atticus why, and he said it was because the National Recovery Act was dead. I asked who killed it: he said nine old men."
  网络来源: https://www.newyorker.com/magazine/2010/05/24/activism-v-restraint

- 名词: Maycomb Halloween
  分类: 事件
  解释: "梅科姆镇的万圣节传统。在小说中，万圣节原本是孩子们自由搞恶作剧的夜晚，没有任何组织活动。直到前一年孩子们将巴伯姐妹家所有家具藏入地窖的恶作剧太过分，成年人才决定组织有监管的万圣节庆典，包括在高中礼堂举办文艺汇演和游戏活动。"
  书中原文: "Until then, Halloween in Maycomb was a completely unorganized affair. Each child did what he wanted to do, with assistance from other children if there was anything to be moved, such as placing a light buggy on top of the livery stable."
  网络来源: "https://www.gradesaver.com/to-kill-a-mockingbird/q-and-a/what-was-the-purpose-of-the-halloween-pageant-what-practical-joke-had-persuaded-the-grown-ups-to-have-an-organized-event-329872"

- 名词: Miss Tutti Barber
  分类: 人物
  解释: "原名莎拉·巴伯（Sarah Barber），昵称Tutti，是梅科姆镇的两位老处女姐妹之一。她和妹妹弗鲁蒂来自阿拉巴马州克莱顿，是共和党人，在镇上被视为有\"北方佬作风\"。图蒂耳聋但拒绝承认，生活在一片寂静中。前一年的万圣节之夜，孩子们的恶作剧将她们家所有家具搬进了地窖。"
  书中原文: "Misses Tutti and Frutti Barber were maiden ladies, sisters, who lived together in the only Maycomb residence boasting a cellar."
  网络来源: "https://www.enotes.com/topics/to-kill-a-mockingbird/questions/in-chapter-27-of-to-kill-a-mockingbird-what-111099"

- 名词: Miss Frutti Barber
  分类: 人物
  解释: "原名弗朗西丝·巴伯（Frances Barber），昵称Frutti，是梅科姆镇的老处女之一，与姐姐图蒂·巴伯同住。她不欲错过任何事物，使用一个巨大的耳喇叭（杰姆称之为\"狗牌维克多牌留声机的喇叭\"）。前一年万圣节恶作剧中，孩子们将她们家所有家具藏入地窖，她坚称能辨认出梅科姆人的声音。"
  书中原文: "Miss Frutti, not about to miss anything, employed an ear trumpet so enormous that Jem declared it was a loudspeaker from one of those dog Victrolas."
  网络来源: "https://www.enotes.com/topics/to-kill-a-mockingbird/questions/what-is-the-point-of-the-misses-tutti-and-frutti-barber-story-125305"

- 名词: ear trumpet
  分类: 物品
  解释: "耳喇叭，19世纪至20世纪初使用的机械助听装置，呈漏斗状，通过收集声波并将其导入耳道来放大声音。它无电子放大功能，最大增益约30分贝。耳喇叭通常由镀镍银、象牙、铜或锡制成，著名的使用者包括贝多芬。弗鲁蒂小姐使用了一个巨大的耳喇叭。"
  书中原文: "Miss Frutti, not about to miss anything, employed an ear trumpet so enormous that Jem declared it was a loudspeaker from one of those dog Victrolas."
  网络来源: https://www.embs.org/pulse/articles/hearing-aid-history-from-ear-trumpets-to-digital-technology/

- 名词: bloodhounds
  分类: 物品
  解释: "寻血猎犬，以其卓越的嗅觉追踪能力著称的犬种。在美国南方历史中，寻血猎犬曾被用于追踪逃跑的奴隶，成为种族压迫的工具。小说中，赫克·塔特警长调用县里的寻血猎犬追踪恶作剧的孩子们，但猎犬只是跑到房子后面对着地窖门嚎叫，暴露了家具被藏在地窖里的真相。"
  书中原文: "Mr. Tate started them off at the Misses Barber's front steps, but all they did was run around to the back of the house and howl at the cellar door."
  网络来源: https://www.ocregister.com/2016/08/23/vehicles-of-terror-csuf-researcher-looks-at-dogs-used-against-minorities/

- 名词: Ad Astra Per Aspera
  分类: 概念
  解释: "拉丁语短语，意为\"历经艰辛，抵达星辰\"或\"逆境通向星辰\"。它是堪萨斯州的官方格言，源自罗马诗人维吉尔的《埃涅阿斯纪》。在小说中，梅里韦瑟太太将她的梅科姆县文艺汇演命名为Maycomb County: Ad Astra Per Aspera，暗含通过困难走向光明的寓意，为随后鲍勃·尤厄尔的袭击埋下伏笔。"
  书中原文: "Mrs. Grace Merriweather had composed an original pageant entitled Maycomb County: Ad Astra Per Aspera, and I was to be a ham."
  网络来源: https://simple.wikipedia.org/wiki/Per_aspera_ad_astra

- 名词: ham costume
  分类: 物品
  解释: "斯库特在万圣节文艺汇演中穿的火腿costume，由当地女裁缝克林肖太太用铁丝网和棕色布料制作而成。这个火腿形状的服装几乎垂到斯库特的膝盖，上面留有两个窥视孔。它虽让斯库特感到尴尬，却在回家路上意外地救了她的命——鲍勃·尤厄尔的刀刺在铁丝网上被挡住。"
  书中原文: "Mrs. Crenshaw took some chicken wire and bent it into the shape of a cured ham. This she covered with brown cloth, and painted it to resemble the original."
  网络来源: "https://www.enotes.com/topics/to-kill-a-mockingbird/questions/what-was-scouts-costume-halloween-pageant-was-72127"

- 名词: Victrola
  分类: 物品
  解释: "维克多牌留声机，由维克多谈话机器公司（Eldridge R. Johnson创立）于1906年推出的家用留声机。其创新之处在于将唱盘和放大喇叭隐藏在木制柜体内，使其看起来像家具而非机器。完全机械驱动，需手摇上弦，转速78 RPM。小说中杰姆将弗鲁蒂小姐的耳喇叭比作维克多留声机的喇叭。"
  书中原文: "Jem declared it was a loudspeaker from one of those dog Victrolas."
  网络来源: https://en.m.wikipedia.org/wiki/RCA_Victrola

- 名词: Clanton Alabama
  分类: 地点
  解释: "阿拉巴马州克莱顿市，奇尔顿县县治，位于该州中部。1868年由阿尔弗雷德·贝克建立，最初称为\"鹅塘\"，1870年沿路易斯维尔和纳什维尔铁路规划，1873年正式建市。以美墨战争和内战邦联准将詹姆斯·霍尔特·克兰顿命名。以桃子产业闻名，现产阿拉巴马州80%以上的桃子。巴伯姐妹据称于1911年从克莱顿迁至梅科姆。"
  书中原文: "The Barber ladies were rumored to be Republicans, having migrated from Clanton, Alabama, in 1911."
  网络来源: https://encyclopediaofalabama.org/article/clanton/

- 名词: Maycomb County pageant
  分类: 事件
  解释: "梅科姆县万圣节文艺汇演，由梅里韦瑟太太创作并担任旁白，题为Maycomb County: Ad Astra Per Aspera。孩子们扮成县里的农产品：塞西尔·雅各布斯扮成奶牛、艾格尼丝·布恩扮成青豆角、斯库特扮成火腿。当梅里韦瑟太太喊\"猪肉！\"时是斯库特登场的提示。汇演以全体合唱和梅里韦瑟太太举着州旗登台作为终场。"
  书中原文: "Mrs. Grace Merriweather had composed an original pageant entitled Maycomb County: Ad Astra Per Aspera, and I was to be a ham."
  网络来源: https://newhelpnotes.blogspot.com/2015/10/in-chapter-27-of-to-kill-mockingbird.html

- 名词: cellar
  分类: 物品
  解释: "地窖，房屋地下的储藏空间。在美国南方，完整的地下室并不常见，因为气候较温和、霜冻线较浅；但一些房屋有用于储存根茎类蔬菜的\"根菜地窖\"。小说中巴伯姐妹的房子拥有梅科姆唯一的地窖，孩子们将她们所有的家具搬进地窖藏匿，猎犬找到地窖门时狂吠不止。"
  书中原文: "Misses Tutti and Frutti Barber were maiden ladies, sisters, who lived together in the only Maycomb residence boasting a cellar."
  网络来源: https://link.springer.com/article/10.1007/s41636-021-00287-3

- 名词: chicken wire costume
  分类: 物品
  解释: "铁丝网服装，指用六边形铁丝网制作骨架再覆以布料的戏剧服装制作工艺。铁丝网轻便、柔韧且价格低廉，是剧院服装制作中用于塑造大型立体造型的常见材料，源自爱德华时代女帽制作中的金属丝框架技术。小说中斯库特的火腿costume就是用鸡笼铁丝网弯成火腿形状再覆以棕色布料制成的。"
  书中原文: "Mrs. Crenshaw took some chicken wire and bent it into the shape of a cured ham. This she covered with brown cloth, and painted it to resemble the original."
  网络来源: https://www.rsc.org.uk/blogs/out-of-the-spotlight/jewellery-and-millinery

- 名词: Sarah Barber
  分类: 人物
  解释: "莎拉·巴伯，昵称\"图蒂\"（Tutti），梅科姆镇的老处女之一，与妹妹弗朗西丝同住。她是共和党人，1911年从克莱顿迁至梅科姆，生活方式被当地人视为\"北方佬作风\"。她耳聋但否认这一事实。前一年的万圣节之夜，她家所有家具被孩子们藏入地窖，她坚信是路过的叙利亚毛皮贩子所为。"
  书中原文: "Misses Tutti and Frutti (their names were Sarah and Frances), aside from their Yankee ways, were both deaf."
  网络来源: "https://www.gradesaver.com/to-kill-a-mockingbird/q-and-a/what-happened-to-misses-tutti-and-frutti-the-previous-year-on-halloween-299706"

- 名词: Frances Barber
  分类: 人物
  解释: "弗朗西丝·巴伯，昵称\"弗鲁蒂\"（Frutti），梅科姆镇的老处女之一，与姐姐莎拉同住。她使用巨大的耳喇叭来辅助听力，杰姆将其比作维克多留声机的喇叭。恶作剧发生后，她坚称自己能辨认出梅科姆人的声音，声称那晚在客厅里没有梅科姆口音，从而支持了外来者作案的说法。"
  书中原文: "Misses Tutti and Frutti (their names were Sarah and Frances), aside from their Yankee ways, were both deaf."
  网络来源: "https://www.gradesaver.com/to-kill-a-mockingbird/q-and-a/what-is-the-point-of-the-misses-tutti-and-frutti-barber-story-125305"

- 名词: Halloween pageant
  分类: 事件
  解释: "万圣节文艺汇演，20世纪30年代美国学校与社区的一种传统活动。当时万圣节逐渐从无组织的恶作剧之夜转变为有组织的社区庆典，由学校和市民俱乐部主办，包括化装游行、比赛、篝火和戏剧表演。小说中梅科姆镇的万圣节汇演正是在这种背景下为约束孩子们的恶作剧而组织的。"
  书中原文: "So the Maycomb ladies said things would be different this year. The high-school auditorium would be open, there would be a pageant for the grown-ups; apple-bobbing, taffy-pulling, pinning the tail on the donkey for the children."
  网络来源: https://www.dvhd.org/blog/2025/10/2/hauntingly-historic-a-peek-at-halloween-in-america-victorian-era-1930s

- 名词: livery stable
  分类: 地点
  解释: "马车出租行，19世纪美国城镇中提供马匹寄养、马车出租、马匹买卖等服务的商业场所，相当于现代的汽车租赁公司加停车场。客户可按日、周、月寄养马匹，或租用马车、轻便车。小说中孩子们将轻便车放到马车出租行车顶上是他们万圣节恶作剧的常见方式之一。"
  书中原文: "Each child did what he wanted to do, with assistance from other children if there was anything to be moved, such as placing a light buggy on top of the livery stable."
  网络来源: https://www.truewestmagazine.com/article/what-were-frontier-livery-stables-like/
