- 名词: Tom Robinson's death
  分类: 事件
  解释: 汤姆·罗宾逊在被错误定罪后，被送往恩菲尔德监狱农场等待判决。在放风期间，他试图翻越围栏逃跑，但因左臂残疾(童年被轧棉机夹伤)无法快速攀爬，被狱警连开17枪打死。阿提克斯认为这是执法人员的过度反应，汤姆的逃跑源于对司法制度的绝望。
  书中原文: "Typical of a nigger to cut and run. Typical of a nigger's mentality to have no plan, no thought for the future, just run blind first chance he saw."
  网络来源: https://www.bbc.co.uk/bitesize/guides/z8jyxsg/revision/2

- 名词: Helen Robinson
  分类: 人物
  解释: 海伦·罗宾逊是汤姆·罗宾逊的妻子，与汤姆育有三个孩子。在汤姆被捕后，镇上没有人愿意雇用她。林克·迪斯最终给她提供了工作。在得知汤姆死讯时，她当场昏倒在地。鲍勃·尤厄尔后来在她上班路上骚扰她。
  书中原文: "Helen said, ''evenin', Mr. Finch, won't you have a seat?' But she didn't say any more. Neither did Atticus. ... she just fell down in the dirt. Just fell down in the dirt, like a giant with a big foot just came along and stepped on her."
  网络来源: https://www.shmoop.com/study-guides/to-kill-a-mockingbird/helen-robinson.html

- 名词: B. B. Underwood
  分类: 人物
  解释: B.B.安德伍德是《梅科姆论坛报》的老板、编辑、出版商兼印刷工。他是个矛盾的复杂人物:一方面公开歧视黑人，另一方面却在关键时保护阿提克斯(第15章在办公室窗口架起猎枪保护监狱前的阿提克斯)。汤姆死后，他撰写了尖锐的社论，将汤姆之死比作猎人和孩子残忍地屠杀鸣禽。
  书中原文: "Mr. B. B. Underwood was at his most bitter, and he couldn't have cared less who canceled advertising and subscriptions."
  网络来源: https://quizlet.com/explanations/questions/who-is-mr-underwood-in-harper-lees-to-kill-a-mockingbird-e7b3729f-8f211825-8853-41ab-b29d-0e9dbdf6f0ea

- 名词: The Maycomb Tribune
  分类: 组织媒体
  解释: 《梅科姆论坛报》是梅科姆镇唯一的报纸，由B.B.安德伍德独自拥有和经营。斯库特描述安德伍德对任何组织都没兴趣，除了《梅科姆论坛报》。他在排字机旁工作，偶尔从一加仑樱桃酒壶里喝上一口。第25章中，该报刊登了安德伍德为汤姆·罗宾逊之死撰写的社论。
  书中原文: "There was a brief obituary in the Colored News, but there was also an editorial. Mr. B. B. Underwood was at his most bitter, and he couldn't have cared less who canceled advertising and subscriptions."
  网络来源: https://www.al.com/entertainment/2014/04/the_ineffectual_power_of_the_p.html

- 名词: secret courts of men's hearts
  分类: 概念主题
  解释: 人心的秘密法庭是斯库特在第25章中的反思性叙述，指代人们内心深处根深蒂固的种族偏见——这种偏见是任何法庭证据或法律辩论都无法克服的。公共法庭是阿提克斯所说的使穷人与洛克菲勒平起平坐的人类机构，而人心的秘密法庭则是基于种族偏见的隐蔽内心审判。汤姆·罗宾逊在梅耶拉·尤厄尔开口尖叫的那一刻就已经被判了死刑。
  书中原文: "Atticus had used every tool available to free men to save Tom Robinson, but in the secret courts of men's hearts Atticus had no case. Tom was a dead man the minute Mayella Ewell opened her mouth and screamed."
  网络来源: https://www.gradesaver.com/to-kill-a-mockingbird/q-and-a/why-is-in-the-secret-courts-of-mens-hearts-atticus-had-no-case-relevant-with-repsect-to-the-theme-or-symbolism-in-this-book-251762

- 名词: Bob Ewell's threats
  分类: 事件
  解释: 鲍勃·尤厄尔在汤姆·罗宾逊死后公开威胁说干掉一个，还剩两个左右。这句话通过斯蒂芬妮·克劳福德小姐传遍全镇。一个指已死的汤姆·罗宾逊，两个普遍被认为是指阿提克斯·芬奇或斯库特和杰姆。杰姆要求斯库特不要告诉阿提克斯，认为尤厄尔不过是说大话。这一威胁为后来尤厄尔在万圣节夜袭击孩子们埋下伏笔。
  书中原文: "Mr. Ewell said it made one down and about two more to go."
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/what-remark-did-mr-ewell-make-upon-hearing-of-tom-546046

- 名词: Colored News
  分类: 组织媒体
  解释: 《梅科姆论坛报》中刊登黑人社区新闻的专栏。汤姆·罗宾逊的死讯在该专栏中有一条简短的讣告，但同时安德伍德也在报纸上发表了社论。这反映了20世纪30年代美国南方报纸的种族隔离现实——黑人的新闻被归入独立且通常不平等的专栏。
  书中原文: "There was a brief obituary in the Colored News, but there was also an editorial."
  网络来源: https://www.inglesessencial.com/videos-free/tkam25

- 名词: The Montgomery Advertiser
  分类: 组织媒体
  解释: 《蒙哥马利广告报》是阿拉巴马州首府蒙哥马利的真实报纸，创刊于1829年，是该州最古老的报纸。在小说中，梅科姆镇的人认为安德伍德的社论写得富有诗意，足以被《蒙哥马利广告报》转载，暗示了社论的高质量。哈珀·李生长于阿拉巴马州门罗维尔，对该报十分熟悉。
  书中原文: "Maycomb thought he was trying to write an editorial poetical enough to be reprinted in The Montgomery Advertiser."
  网络来源: https://bonmot.ca/kansas/HarperLee/film.html

- 名词: Mayella Ewell's scream
  分类: 事件
  解释: 梅耶拉·尤厄尔的尖叫是小说的转折点。斯库特意识到，从梅耶拉开口尖叫指控汤姆·罗宾逊强奸的那一刻起，汤姆就已经是个死人了。在吉姆·克劳法时代的南方，无论证据如何，一个黑人男子的命运在一位白人妇女提出指控的那一刻就已经决定了。这一叫声象征了种族主义对司法公正的毁灭性影响。
  书中原文: "Tom was a dead man the minute Mayella Ewell opened her mouth and screamed."
  网络来源: https://quotepark.com/quotes/1938897-harper-lee-tom-was-a-dead-man-the-minute-mayella-ewell-opened/

- 名词: cripples killing sin
  分类: 概念主题
  解释: 安德伍德社论的核心观点:杀害残疾人是一种罪恶，无论他们是站立、坐着还是逃跑。汤姆·罗宾逊的左臂是残疾的(童年被轧棉机夹伤)，使他无法翻越监狱围栏。安德伍德将汤姆的死比作猎人和孩子残忍地屠杀鸣禽，直接呼应了小说中杀死一只知更鸟是罪恶的核心隐喻——伤害无辜、无助的人是一种道德罪恶。
  书中原文: "Mr. Underwood simply figured it was a sin to kill cripples, be they standing, sitting, or escaping. He likened Tom's death to the senseless slaughter of songbirds by hunters and children."
  网络来源: https://www.gradesaver.com/to-kill-a-mockingbird/q-and-a/what-does-mr-underwood-write-in-his-editorial-352101
