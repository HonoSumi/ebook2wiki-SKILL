- 名词: Rabies
  分类: 生物
  解释: 狂犬病是一种由狂犬病毒引起的致命性人畜共患传染病，通过感染动物的唾液传播，主要影响中枢神经系统。患病动物（如狗）会出现行为异常、流涎、吞咽困难、瘫痪等症状，最终导致死亡。在美国南方历史上，狂犬病是常见的公共卫生威胁。"疯狗"（mad dog）是民间对狂犬病患犬的俗称。小说中蒂姆·约翰逊（Tim Johnson）在二月出现狂犬病症状，引发社区居民的恐慌，因为狂犬病通常在夏季更为常见，二月出现狂犬病例令居民感到异常。
  书中原文: "\"who'da thought of a mad dog in February? Maybe he wadn't mad, maybe he was just crazy.\" — Miss Stephanie Crawford"
  网络来源: https://en.wikipedia.org/wiki/Rabies

- 名词: Montgomery, Alabama
  分类: 地点
  解释: 蒙哥马利是美国阿拉巴马州的首府和第三大城市，位于该州中南部。该城于1819年建市，1846年取代塔斯卡卢萨成为州首府。1861年曾短暂作为美利坚联盟国（南方邦联）的首都。20世纪中期，蒙哥马利是美国民权运动的核心地点——1955年罗莎·帕克斯被捕事件引发了著名的蒙哥马利巴士抵制运动。小说中提到将疯狗蒂姆·约翰逊的头颅送到蒙哥马利进行狂犬病检测，反映了当时阿拉巴马州通过首府的实验室进行公共卫生检测的实践。
  书中原文: "\"they'd send his head to Montgomery.\" — Miss Maudie"
  网络来源: https://en.wikipedia.org/wiki/Montgomery,_Alabama

- 名词: Marksmanship
  分类: 概念
  解释: 枪法（Marksmanship）指使用枪械等投射武器精确命中目标的技术和艺术。该词1823年首次出现在英语中，由marksman（神枪手）加后缀-ship构成。历史上，射击比赛可追溯到15世纪的巴伐利亚。小说中阿提克斯·芬奇（Atticus Finch）年轻时被誉为"神枪手芬奇"（Ol' One-Shot Finch），是梅科姆县最准的射手。莫迪小姐解释阿提克斯后来放弃打猎的原因——他认为神枪天赋是上帝赐予的不公平优势，因此只在必要时才使用。这一情节揭示了阿提克斯谦逊、克制的品格。
  书中原文: "\"Marksmanship's a gift of God, a talent — oh, you have to practice to make it perfect, but shootin's different from playing the piano or the like.\" — Miss Maudie"
  网络来源: https://www.etymonline.com/search?q=Marksmanship
