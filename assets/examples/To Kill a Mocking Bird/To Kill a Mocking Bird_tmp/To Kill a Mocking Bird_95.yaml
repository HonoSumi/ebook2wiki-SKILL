- 名词: roly-poly
  分类: 生物
  解释: |
    一种小型陆生甲壳动物（Armadillidium vulgare，俗称球鼠妇/西瓜虫），属于等足目卷甲虫科。它不是昆虫，而是与虾、蟹亲缘关系更近的甲壳动物。当受到惊扰时，它会将身体卷成一个紧密的灰球（conglobation），因此得名"roly-poly"（滚球虫）。在小说中，杰姆阻止斯库特碾死一只roly-poly，体现了他经历汤姆·罗宾逊审判后的道德成长——他对所有生命的脆弱都产生了新的敬畏。
  书中原文: |
    "A roly-poly had found his way inside the house; I reasoned that the tiny varmint had crawled up the steps and under the door. ... The creatures are no more than an inch long, and when you touch them they roll themselves into a tight gray ball. ... 'Why couldn't I mash him?' I asked. 'Because they don't bother you,' Jem answered in the darkness."
  网络来源: https://en.wikipedia.org/wiki/Pill_woodlouse

- 名词: Meridian highway
  分类: 地理
  解释: |
    小说中连接梅里迪安（Meridian, Mississippi）与虚构的梅科姆县（Maycomb, Alabama）的公路。这条公路在小说中出现多次：迪尔从梅里迪安乘火车到梅科姆中转站后沿着这条路搭便车或步行前往梅科姆；Barker's Eddy游泳场位于这条公路旁的一条土路尽头。在第二十四章中，杰姆和迪尔正是在这条公路边看见阿提克斯开车经过。Meridian是密西西比州东部的真实城市，也是迪尔（查尔斯·贝克·哈里斯）的家乡。
  书中原文: |
    "Barker's Eddy is at the end of a dirt road off the Meridian highway about a mile from town."
  网络来源: http://leepeacock2010.blogspot.com/2023/11/was-fictional-swimming-hole-in-to-kill.html
