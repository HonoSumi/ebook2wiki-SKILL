- 名词: Stoner's Boy
  分类: 人物
  解释: 《The Gray Ghost》系列中的角色，一个身着灰色服装的神秘少年强盗，最终被揭示并非真正的恶人。在《杀死一只知更鸟》结尾，斯库特将他与布·拉德利类比，表达"当最终了解一个人时，他其实是个好人"的主题。
  书中原文: "An' they all thought it was Stoner's Boy messin' up their clubhouse an' throwin' ink all over it an'... an' Atticus, when they finally saw him, why he hadn't done any of those things... Atticus, he was real nice...."
  网络来源: https://www.kentuckypress.com/9780813167916/stoners-boy/
- 名词: Three-Fingered Fred
  分类: 人物
  解释: 《The Gray Ghost》系列中的角色，一个与斯通纳男孩和灰影有关的麻烦制造者，属于Seckatary Hawkins冒险故事中的人物。
  书中原文: "'s about a ship an' Three-Fingered Fred 'n' Stoner's Boy...."
  网络来源: https://www.hfsbooks.com/books/the-gray-ghost-schulkers-schulkers-schulkers/
