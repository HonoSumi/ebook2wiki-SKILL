- 名词: Dill
  分类: 人物
  解释: "查尔斯·贝克·哈里斯（Charles Baker Harris）的昵称，来自密西西比州梅里迪安的一个富有想象力的男孩，每年夏天来梅科姆与姨妈雷切尔小姐同住。他是杰姆和斯各特的玩伴，性格活泼、爱讲故事，对布·拉德利充满好奇，是推动布·拉德利情节发展的催化剂。他的角色原型是哈珀·李的童年好友杜鲁门·卡波特。"
  书中原文: "\"Beautiful things floated around in his dreamy head. He could read two books to my one, but he preferred the magic of his own inventions.\""
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/characters/charles-baker-harris-dill

- 名词: Boo Radley
  分类: 人物
  解释: "亚瑟·拉德利（Arthur Radley），芬奇家的隐居邻居，因少年时期惹事被父亲关在家中长达15年以上。镇上流传着许多关于他的可怕谣言，孩子们视他为怪物，但他实际上是个善良温柔的人，暗中给孩子们留下小礼物，并在小说结尾救了杰姆和斯各特的命。他是小说中\"知更鸟\"象征的核心人物之一。"
  书中原文: "\"Why do you reckon Boo Radley's never run off?\" Dill sighed a long sigh and turned away from me. \"Maybe he doesn't have anywhere to run off to...\""
  网络来源: https://en.wikipedia.org/wiki/Boo_radley

- 名词: Aunt Alexandra
  分类: 人物
  解释: "亚历山德拉·芬奇·汉考克（Alexandra Finch Hancock），阿提克斯·芬奇的姐姐，杰姆和斯各特的姑妈。她传统守旧、注重家族声誉和淑女风范，在汤姆·罗宾逊审判期间来到芬奇家帮助照顾孩子。她试图将斯各特培养成一位\"淑女\"，与阿提克斯的教育方式形成鲜明对比。她代表了南方旧式贵族阶级的价值观。"
  书中原文: "\"Aunt Alexandra was in her chair in the corner, Atticus was in his; Jem and I were on the floor reading.\""
  网络来源: https://www.litcharts.com/lit/to-kill-a-mockingbird/characters/aunt-alexandra

- 名词: Atticus Finch
  分类: 人物
  解释: "阿提克斯·芬奇，小说主人公、芬奇家的父亲，梅科姆镇的律师，被指派为汤姆·罗宾逊辩护。他是一位正直、睿智、富有同情心的父亲，教导孩子们要设身处地为他人着想。尽管明知陪审团会因为种族偏见而判汤姆有罪，他仍竭尽全力辩护。他是美国文学中最著名的英雄形象之一，1962年电影中由格里高利·派克饰演。"
  书中原文: "\"Link, that boy might go to the chair, but he's not going till the truth's told.\" Atticus's voice was even. \"And you know what the truth is.\""
  网络来源: https://en.wikipedia.org/?curid=9560699

- 名词: Heck Tate
  分类: 人物
  解释: "赫克托·\"赫克\"·泰特，梅科姆县的警长。他身材高大瘦削，穿着靴子和伐木夹克。在小说中他负责将汤姆·罗宾逊转移到县监狱，并在疯狗事件中请阿提克斯开枪。在小说结尾，他决定隐瞒布·拉德利杀死鲍勃·尤厄尔的真相，称曝光布的行为\"就像杀死一只知更鸟一样是罪过\"。"
  书中原文: "\"...movin' him to the county jail tomorrow,\" Mr. Tate was saying, \"I don't look for any trouble, but I can't guarantee there won't be any...\""
  网络来源: https://en.wikipedia.org/wiki/Heck_Tate

- 名词: Link Deas
  分类: 人物
  解释: "林克·迪斯先生，梅科姆的一位地主和生意人，汤姆·罗宾逊的雇主。他连续八年雇用汤姆，并多次公开为汤姆的品行作证。在审判中他因当庭发言被泰勒法官赶出法庭。审判后，当鲍勃·尤厄尔骚扰汤姆的遗孀海伦时，他出面制止。他是小说中少数愿意公开支持黑人的白人角色之一。"
  书中原文: "\"Link, that boy might go to the chair, but he's not going till the truth's told.\" Atticus's voice was even."
  网络来源: https://www.sparknotes.com/lit/mocking/character/link-deas/

- 名词: Tom Robinson
  分类: 人物
  解释: "汤姆·罗宾逊，一位善良勤劳的黑人工人，被诬告强奸白人女子梅耶拉·尤厄尔。他左臂因童年事故而残废，但这反而成为证明他无罪的关键证据——因为梅耶拉脸上的伤是左撇子所为。尽管阿提克斯证明了事实真相，全白人陪审团仍判他有罪。他在试图越狱时被狱警开枪打死（身中17枪），成为小说中最重要的\"知更鸟\"象征。"
  书中原文: "\"Link, that boy might go to the chair, but he's not going till the truth's told.\" Atticus's voice was even. \"And you know what the truth is.\""
  网络来源: https://www.britannica.com/topic/To-Kill-a-Mockingbird

- 名词: change of venue
  分类: 概念
  解释: "法律术语，指将案件的审判地点从一个司法管辖区转移到另一个司法管辖区。在小说第15章中，林克·迪斯建议将汤姆·罗宾逊的审判移至其他城镇，以寻求更公正的陪审团。但泰特警长认为此举意义不大，因为南方各城镇都普遍存在种族偏见，改变地点无法改变审判结果。"
  书中原文: "\"Change of venue,\" said Mr. Tate. \"Not much point in that, now is it?\""
  网络来源: https://www.enotes.com/topics/to-kill-a-mockingbird/questions/conclude-why-mr-tate-said-change-venue-not-much-444226

- 名词: Henry W. Grady
  分类: 人物
  解释: "亨利·伍德芬·格雷迪（1850-1889），美国记者、演说家，佐治亚人，内战后\"新南方\"运动的代表人物。他主张南方工业化与南北和解，但同时维护白人至上主义和黑人的从属地位。在小说中，阿提克斯让杰姆阅读格雷迪的演说词作为教育内容，这也成为一些文学评论家质疑阿提克斯种族立场的重要依据。"
  书中原文: "\"Do you really think that, son? Then read this.\" Jem would struggle the rest of an evening through the speeches of Henry W. Grady."
  网络来源: https://en.wikipedia.org/wiki/Henry_W._Grady

- 名词: county jail
  分类: 地点
  解释: "梅科姆县监狱，位于镇广场西北角，介于廷达尔五金店和梅科姆论坛报社之间。小说描述它是一座\"迷你哥特式玩笑\"建筑，一单元格宽、两单元格高，带有城垛和飞扶壁。在汤姆·罗宾逊审判前夕，泰特警长将汤姆转移至此，阿提克斯坐在监狱门口彻夜守护，防止私刑暴徒接近汤姆——这是小说最经典的场景之一。"
  书中原文: "\"...movin' him to the county jail tomorrow,\" Mr. Tate was saying, \"I don't look for any trouble, but I can't guarantee there won't be any...\""
  网络来源: https://www.coursehero.com/lit/To-Kill-a-Mockingbird/chapter-15-summary/
