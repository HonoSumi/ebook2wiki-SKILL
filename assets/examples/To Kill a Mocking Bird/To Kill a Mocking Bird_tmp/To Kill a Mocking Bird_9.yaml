- 名词: entailment
  分类: 概念·观念
  解释: |
    英格兰普通法中的一种土地继承制度（亦称 fee tail），指通过契据或财产授予契约限制不动产的出售、继承或转让，迫使土地只能沿直系血亲（而非旁系亲属）代代相传。其目的是防止家族地产被分割或变卖，是英国贵族维系家族财富的主要手段。这一制度因简·奥斯汀《傲慢与偏见》中班纳特家的财产继承困境而广为人知。1925年《财产法》后英格兰已禁止设立新的限嗣继承，苏格兰则于1914年立法废除。
  书中原文: |
    Miss Scout, if you give me your attention I'll tell you what entailment is. Jem's definitions are very nearly accurate sometimes.
  网络来源: |
    https://en.wikipedia.org/wiki/Fee_tail
- 名词: Old Sarum
  分类: 地点
  解释: |
    英格兰威尔特郡的一座古老山堡遗址，位于索尔兹伯里以北约两英里。此地自铁器时代就有人类居住，诺曼征服后建有城堡和大教堂，1086年《末日审判书》可能在此呈交给征服者威廉。13世纪因教堂迁往新址而逐渐废弃。尽管几乎无人居住，Old Sarum 在 1832 年《改革法案》前一直拥有两名国会议员席位，是英国历史上最著名的"腐败选区"（rotten borough）之一，其土地所有者可以操控选举结果。
  书中原文: |
    "Your daddy Mr. Walter Cunningham from Old Sarum?" he asked, and Walter nodded.
  网络来源: |
    https://en.wikipedia.org/wiki/Old_Sarum
