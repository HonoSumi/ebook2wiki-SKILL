- 名词: chiffarobe
  分类: 物品
  解释: 一种组合家具，集衣柜（wardrobe）与抽屉柜（chest of drawers）于一体，源于美式英语词汇chiffonier（小抽屉柜）与wardrobe（衣柜）的合成。20世纪初通过西尔斯（Sears）商品目录推广，在美国南方尤为常见，因房屋常不设壁橱。Harper Lee的小说《杀死一只知更鸟》使其广为人知。
  书中原文: "there was this old chiffarobe in the yard Papa'd brought in to chop up for kindlin'"
  网络来源: https://en.m.wikipedia.org/wiki/Chifforobe

- 名词: geranium
  分类: 植物
  解释: 天竺葵属（Pelargonium）植物的通称，原产南非，常见园艺观赏花卉。花色丰富（红、粉、白等），花期春夏至秋季。在《杀死一只知更鸟》中，Mayella Ewell家门前的一排红色天竺葵象征她在贫困中仍试图维持体面与美的努力。
  书中原文: "I was reminded of the row of red geraniums in the Ewell yard"
  网络来源: https://www.britannica.com/plant/geranium-plant-genus-Geranium

- 名词: Sherlock Holmes
  分类: 文学
  解释: 英国作家阿瑟·柯南·道尔（Sir Arthur Conan Doyle）创作的虚构侦探角色，首次出现于1887年小说《血字的研究》。以卓越的观察力、演绎推理和 forensic science 著称，居住在伦敦贝克街221B。被吉尼斯世界纪录认定为影视作品中塑造最多的文学人物。
  书中原文: "Sherlock Holmes and Jem Finch would agree"
  网络来源: https://en.m.wikipedia.org/wiki/Sherlock_Holmes_and_Doctor_Watson_(duo)

- 名词: cross-examination
  分类: 法律
  解释: 在庭审或证据听证中，一方律师对对方传唤的证人进行的正式盘问。与直接询问（direct examination）相对，交叉询问允许使用诱导性问题（leading questions），旨在揭示证词矛盾、削弱证人可信度、获取有利于己方的事实。被法学界誉为"发现真相的最伟大法律引擎"。
  书中原文: "Nothing Atticus asked him after that shook his story, that he'd looked through the window, then ran the nigger off, then ran for the sheriff. Atticus finally dismissed him."
  网络来源: https://dictionary.law.com/default.aspx/Default.aspx?selected=408

- 名词: left-handedness
  分类: 生理
  解释: 左利手（sinistrality），指在执行书写、绘画等精细运动任务时优先使用左手的行为倾向。约占总人口10-13%，男性略多于女性。受遗传基因（如LRRTM1）和产前环境影响。在《杀死一只知更鸟》中，Bob Ewell的左撇子身份成为关键证据——Mayella的伤在面部右侧，暗示行凶者可能为左撇子。
  书中原文: "If her right eye was blacked and she was beaten mostly on the right side of the face, it would tend to show that a left-handed person did it."
  网络来源: https://www.britannica.com/science/handedness
