- 名词: ambrosia
  分类: 物件·工艺
  解释: |
    美国南部传统的圣诞水果沙拉/甜点，起源于19世纪60年代。最早的食谱记载于1867年的《Dixie Cookery》烹饪书中，最初仅由新鲜椰子丝、切片橙子和糖三种原料层叠而成。其名称源自希腊罗马神话中众神的食物"ambrosia"。随着佛罗里达柑橘产业的发展和横贯大陆铁路的开通，新鲜椰子和柑橘得以在全国流通，这道甜点逐渐成为美国南部圣诞晚餐的标志性菜肴。20世纪后，配方不断演变，陆续加入了菠萝、香蕉、棉花糖、鲜奶油等原料，现代的版本常使用Cool Whip、罐装水果鸡尾酒和樱桃来制作。这道菜在南方文化中具有深厚的传统地位，被视为圣诞餐桌上不可或缺的一部分。
  书中原文: |
    three kinds of meat, summer vegetables from her pantry shelves; peach pickles, two kinds of cake and ambrosia constituted a modest Christmas dinner.
