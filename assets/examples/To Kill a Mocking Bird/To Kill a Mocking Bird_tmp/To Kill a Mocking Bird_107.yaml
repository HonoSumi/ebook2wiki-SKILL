- 名词: smocking
  分类: 物件·工艺
  解释: |
    一种传统的刺绣工艺，通过在布料上缝制规则的褶皱图案来使服装具有弹性，并形成装饰性花纹。起源于中世纪英格兰，最初用于农工和牧羊人的工作服（smock），后广泛应用于儿童服装和女性服饰。在弹性材料发明之前，smocking是服装中实现伸缩功能的主要方式。
  书中原文: |
    "Yes sir, if it's a pink one with smockin'," I said.
  网络来源: |
    https://en.wikipedia.org/wiki/Smocking

- 名词: chinaberry
  分类: 物件·工艺
  解释: |
    一种原产亚洲的楝科植物（学名 Melia azedarach），又称苦楝、印度楝。其果实中的硬核种子被干燥抛光后用于制作念珠，在亚洲寺庙宗教仪式中使用。该树通过殖民贸易传入美国南部，曾广泛种植作为观赏树木，是美国南方乡村景观中具有代表性的树种。树皮可提取天然生物农药。
  书中原文: |
    Some of his rural clients would park their long-eared steeds under the chinaberry trees in the back yard.
  网络来源: |
    https://en.wikipedia.org/wiki/Melia_azedarach
