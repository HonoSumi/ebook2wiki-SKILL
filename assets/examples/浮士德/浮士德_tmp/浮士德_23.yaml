  解释: 环节动物，古代医学用于放血治疗。尼古拉采用水蛭在肛门部吸血的方法治疗他的幻视症，成为歌德在《浮士德》中讽刺的对象。
  书中原文: 后来在肛门部贴上水蛭（蚂蟥）放血后而得痊愈。
