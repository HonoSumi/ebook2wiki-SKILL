- 名词: 维兰
  分类: 人物
  解释: 指克里斯多夫·马丁·维兰（1733-1813），德国启蒙运动时期的作家和诗人，被认为是德国洛可可文学的代表人物。歌德在《浮士德》注释中提及他可能作为启蒙主义作家的代表被讽刺。
