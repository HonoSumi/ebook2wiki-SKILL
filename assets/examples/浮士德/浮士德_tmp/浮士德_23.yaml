- 名词: 下萨克森州
  分类: 地点
  解释: 德国北部的一个联邦州，哈尔茨山脉位于该州境内。布罗肯山是下萨克森州的最高峰。歌德在《浮士德》注释中作为哈尔茨山的所在位置提及。
