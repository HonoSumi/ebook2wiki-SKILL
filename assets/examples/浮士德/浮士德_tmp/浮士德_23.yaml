- 名词: 蛇发女妖
  分类: 人物
  解释: 即希腊神话中的戈耳工（Gorgon），三姐妹丝西娜、尤瑞艾莉和美杜莎，长有尖牙、头生毒蛇、身长羽翼。看到她们面容的人会化为石头。歌德在《浮士德》中借墨杜萨的形象象征死亡与毁灭。
  书中原文: 墨杜萨：希腊神话中蛇发女妖。见到她，就使人化为石头。后为珀耳修斯斩下她的首级。
