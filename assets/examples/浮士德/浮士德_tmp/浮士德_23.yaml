- 名词: 莉莉特
  分类: 人物
  解释: 希伯来拉比传说中的亚当第一任妻子，与亚当同时被创造，因不愿居于亚当之下而离开伊甸园，后成为夜之魔女。歌德在《浮士德·瓦尔普吉斯之夜》中将其描绘为以美丽头发诱惑青年的魔女形象。
  书中原文: 是莉莉特。是亚当的前妻。你要当心她那美丽的头发，这是她引以自豪的唯一的本钱。
  网络来源: https://wapbaike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7/61167062

- 名词: 亚当
  分类: 人物
  解释: 《圣经·创世记》中上帝创造的第一位人类，万物命名者。在犹太教传说中，亚当有两位妻子：先有莉莉特，后有夏娃（由亚当肋骨所造）。歌德在《浮士德》中借梅非斯特之口提及亚当的前妻莉莉特。
  书中原文: 是亚当的前妻。
  网络来源: https://zh.wikipedia.org/wiki/%E4%BA%9A%E7%95%B6

- 名词: 魔女
  分类: 概念
  解释: 欧洲民间传说中拥有超自然力量、与魔鬼勾结的女性，常在瓦尔普吉斯之夜骑扫帚飞往布罗肯山参加魔宴。歌德在《浮士德》中塑造了年轻魔女和老魔女等形象，参与瓦尔普吉斯之夜的狂欢舞蹈。
  书中原文: 从前我做过一个美梦；一棵苹果树出现在梦中，两个美丽的苹果亮光光，我被它吸引，爬到树上。
  网络来源: https://wapbaike.baidu.com/item/%E7%93%A6%E5%B0%94%E6%99%AE%E5%90%89%E6%96%AF%E4%B9%8B%E5%A4%9C/10226382

- 名词: 瓦尔普吉斯
  分类: 人物
  解释: 圣瓦尔普吉斯（约710-779年），出生于英国威塞克斯的本笃会修女，在德国埃希施台特任海登海姆修道院院长。卒于779年，被天主教会封为圣女和魔法的主保，瞻礼日为5月1日。德国民间将4月30日至5月1日之夜称为瓦尔普吉斯之夜。
  书中原文: 瓦尔普吉斯为出生于英国的修女，在德国传教，在埃希施台特任海登海姆修院（属本笃会）院长，卒于779年。成为天主教的圣女，魔法的主保。瞻礼日为5月1日。
  网络来源: https://wapbaike.baidu.com/item/%E7%93%A6%E5%B0%94%E6%99%AE%E5%90%89%E6%96%AF%E4%B9%8B%E5%A4%9C/10226382

- 名词: 乌良
  分类: 人物
  解释: 恶魔之别名，即魔王撒旦。在德语文学传统中"Herr Urian"或"Meister Urian"用以指代魔鬼或不速之客。歌德在《浮士德·瓦尔普吉斯之夜》中以乌良代指撒旦。
  书中原文: 乌良：恶魔之别名，此处即魔王撒旦。
  网络来源: https://en.wikipedia.org/?curid=3036428

- 名词: 保婆
  分类: 人物
  解释: 希腊神话中农耕女神得墨忒耳的乳母。得墨忒耳因女儿珀耳塞福涅被拐而愁闷时，保婆以淫猥之言给她解闷。歌德在《浮士德》中将其描绘为瓦尔普吉斯之夜骑母猪飞行的魔女。
  书中原文: 保婆：希腊神话中农耕女神得墨忒耳的乳母。得墨忒耳因女儿被拐而愁闷时，保婆以淫猥之言给她解闷。故在此处用作淫猥的魔女的名字。
  网络来源: https://oxfordre.com/classics/display/10.1093/acrefore/9780199381135.001.0001/acrefore-9780199381135-e-1072

- 名词: 伊尔森斯坦
  分类: 地点
  解释: 布罗肯山以北相距数英里的高岩，位于德国哈尔茨山脉伊尔森堡附近。歌德在《浮士德·瓦尔普吉斯之夜》中提到此岩石，作为魔女飞经之处的标志。
  书中原文: 伊尔森斯坦：布罗肯之北相距数英里的高岩。
  网络来源: https://en.wikipedia.org/?curid=35330247

- 名词: 福兰特公子
  分类: 人物
  解释: 中古高地德语中称呼恶魔的别名。歌德在《浮士德》中借梅非斯特之口自称福兰特公子，以示魔鬼的尊贵身份。
  书中原文: 福兰特公子：在中古高地德语中称呼恶魔之别名。
  网络来源: https://dict.youdao.com/result?word=Urian&lang=en

- 名词: 嘉德勋章
  分类: 物件
  解释: 英国最高勋位勋章，全称"最尊贵的嘉德勋章"。相传14世纪英王爱德华三世在一次舞会上见到情妇索尔士布利伯爵夫人掉落蓝色袜带，后于1348年创立此勋章。拜伦、莎士比亚诗中均常提到。歌德在《浮士德》中以袜带指代嘉德勋章。
  书中原文: 袜带指英国的嘉德勋章。相传14世纪时英王爱德华三世在一次舞会上，见到他的情妇索尔士布利伯爵夫人把左腿上的蓝色袜带掉落，国王给她拾起，闹了一场笑话。后于1348年创立这个勋章。
  网络来源: https://baike.baidu.com/item/%E5%98%89%E5%BE%B7%E5%8B%8B%E7%AB%A0

- 名词: 末日审判
  分类: 事件
  解释: 基督教神学概念，亦称最后审判。在世界终结之时，上帝将审判一切活人和死人，善人升入天堂，恶人堕入地狱。《浮士德》中梅非斯特以末日审判来威吓庸俗的评论家们。
  书中原文: 即末日审判或最后审判。
  网络来源: https://baike.baidu.com/item/%E6%9C%AB%E6%97%A5%E5%AE%A1%E5%88%A4

- 名词: 肛门幻视者
  分类: 人物
  解释: 歌德在《浮士德》中创造的角色，原型为德国启蒙主义评论家、作家克里斯托夫·弗里德里希·尼古拉（1733-1811）。尼古拉自称得过幻视症见到幽灵鬼怪，认为由于脑部淤血所致，后在肛门部贴水蛭放血后痊愈。歌德借此讽刺其过度理性主义的自大。
  书中原文: 肛门幻视者：该死的家伙！你们干什么胡闹？不是早已给你们证明，幽灵从没有正式的脚可停？你们却像我们人类般在跳！
  网络来源: https://en.wikisource.org/wiki/Page:Collected_Papers_on_Analytical_Psychology_(1916).djvu/358

- 名词: 启蒙
  分类: 概念
  解释: 18世纪欧洲思想文化运动，强调理性、科学和进步。普鲁士弗里德里希大王召见伏尔泰，提倡启蒙运动。歌德在《浮士德》中借肛门幻视者之口讽刺启蒙主义者的自以为是与刻板。
  书中原文: 我们已经启蒙！快给我滚！魔鬼的一帮，简直不顾法规。我们已开明，忒格尔还在闹鬼。
  网络来源: https://hallucinations.en-academic.com/1257/Nicolai%2C_Christoph_Friedrich

- 名词: 忒格尔
  分类: 地点
  解释: 柏林郊区地名。1797年洪堡尔特家族府邸中传说有幽灵出现，尼古拉在报告中曾加以评论。歌德在《浮士德》中借肛门幻视者之口提及此事。
  书中原文: 忒格尔在柏林郊区。1797年在该处洪堡尔特家族的府邸里传说有幽灵出现，尼古拉在报告中曾加以评论。
  网络来源: https://www.komoot.com/highlight/78882

- 名词: 墨杜萨
  分类: 人物
  解释: 希腊神话中的蛇发女妖，戈耳工三姐妹之一。看到她面容的人会化为石头。后被珀耳修斯斩下首级。歌德在《浮士德》中将其与格蕾辛的幻影联系，象征死亡与毁灭之美。
  书中原文: 你听说过墨杜萨的故事。那双眼睛确实是在她临终没亲人给她合上眼皮。
  网络来源: https://zh.wikipedia.org/wiki/%E6%88%88%E5%B0%94%E5%B7%A5

- 名词: 珀耳修斯
  分类: 人物
  解释: 希腊神话中的著名英雄，宙斯之子。他斩杀了蛇发女妖墨杜萨，从墨杜萨的脖颈中跳出飞马珀伽索斯。歌德在《浮士德》中借珀耳修斯斩下墨杜萨头颅的故事来解释格蕾辛幻影脖子上的红绳。
  书中原文: 她能把她的头挟在腋下；因为它已被珀耳修斯斩下。
  网络来源: https://zh.wikipedia.org/wiki/%E7%8F%80%E8%80%B3%E4%BF%AE%E6%96%AF

- 名词: 普拉特
  分类: 地点
  解释: 18世纪时维也纳郊外著名的游乐园，1766年向公众开放，包含摩天轮等游乐设施。歌德在《浮士德》中将瓦尔普吉斯之夜的热闹场景比作普拉特游乐园。
  书中原文: 普拉特：18世纪时维也纳郊外著名的游乐园。
  网络来源: https://baike.baidu.com/item/%E6%99%AE%E6%8B%89%E7%89%B9%E5%85%AC%E5%9B%AD

- 名词: 红色老鼠
  分类: 物件
  解释: 德国格林《德意志神话学》中记载从入睡的魔女口中有时跳出的红色老鼠。歌德在《浮士德》中描写浮士德与年轻魔女跳舞时，从她口中跳出一只红色老鼠，暗示魔女的内在丑陋与邪恶本质。
  书中原文: 唉！正在唱时，从她嘴里跳出一只红色的老鼠。
  网络来源: https://kwize.com/r/H.+B.+Cotterill%2C+The+Faust-Legend+and+Goethe%27s+%27Faust%27/

- 名词: 老磨坊
  分类: 概念
  解释: 比喻尼古拉经营出版事业的出版社。尼古拉曾将旧纸回炉，将过时的东西改头换面出版。他曾出版《德国百科丛书》，作为其文学批评的喉舌。歌德在《浮士德》中以此讽刺尼古拉。
  书中原文: 尼古拉经营出版事业，此处以老磨坊比喻他的出版社，言其将旧纸回炉，亦即将过时的东西，改头换面出版。
  网络来源: https://baike.baidu.com/item/%E5%B0%91%E5%B9%B4%E7%BB%B4%E7%89%B9%E4%B9%8B%E7%83%A6%E6%81%BC

- 名词: 乐园
  分类: 概念
  解释: 即《圣经·创世记》中的伊甸园，上帝为亚当和夏娃所设的完美花园。亚当和夏娃因偷吃禁果被逐出乐园。歌德在《浮士德》中借魔女之口提及乐园，以苹果象征诱惑。
  书中原文: 从乐园以来早就如此。
  网络来源: https://baike.baidu.com/item/%E4%BC%8A%E7%94%B8%E5%9B%AD

- 名词: 苹果
  分类: 物件
  解释: 在《圣经》传统中象征诱惑与知识，同时也是女性乳房的象征。歌德在《浮士德》中借浮士德与魔女的对话，以苹果树和苹果象征情欲与诱惑。
  书中原文: 一棵苹果树出现在梦中，两个美丽的苹果亮光光，我被它吸引，爬到树上。苹果是你们欢喜的东西，从乐园以来早就如此。
  网络来源: https://baike.baidu.com/item/%E7%A6%81%E6%9E%9C

- 名词: 鬼火
  分类: 概念
  解释: 民间传说中在夜间沼泽地出现的磷光火焰，又称"鬼火"或"磷火"。在《浮士德·瓦尔普吉斯之夜》中，梅非斯特召唤鬼火为他们照亮山路。
  书中原文: 梅非斯特召唤了一个鬼火来为他们照亮山路，鬼火回答说自己习惯之字形前进。
  网络来源: https://www.readbookonline.org/read/3243/13019

- 名词: 三块巨岩
  分类: 地点
  解释: 指德国哈尔茨山脉布罗肯山附近的花岗岩岩石地貌，位于希尔克附近。《浮士德》中浮士德和梅非斯特在攀登布罗肯山途中途经此处。
  书中原文: 希尔克附近的两座花岗岩岩石。
  网络来源: https://www.readbookonline.org/read/3243/13019

- 名词: 希尔克
  分类: 地点
  解释: 德国哈尔茨山脉布罗肯山以南的村庄，是攀登布罗肯山的起点之一。歌德在《浮士德·瓦尔普吉斯之夜》中以"哈尔茨山，希尔克与埃伦特区"为场景标题。
  书中原文: 希尔克与埃伦特为布罗肯山以南的两个邻近的乡村。
  网络来源: https://www.readbookonline.org/read/3243/13019

- 名词: 埃伦特
  分类: 地点
  解释: 德国哈尔茨山脉布罗肯山以南的村庄，与希尔克相邻。歌德在《浮士德·瓦尔普吉斯之夜》中以"哈尔茨山，希尔克与埃伦特区"为场景标题。
  书中原文: 希尔克与埃伦特为布罗肯山以南的两个邻近的乡村。
  网络来源: https://www.readbookonline.org/read/3243/13019

- 名词: 撒旦
  分类: 人物
  解释: 基督教和犹太教中的堕落天使、魔鬼之王。在《浮士德》中，乌良（Urian）是撒旦的别名，梅非斯特作为魔鬼使者，引导浮士德经历各种奇幻场景。
  书中原文: 乌良：恶魔之别名，此处即魔王撒旦。
  网络来源: https://baike.baidu.com/item/%E6%92%92%E6%97%A6

- 名词: 得墨忒耳
  分类: 人物
  解释: 希腊神话中的农业与谷物女神，掌管大地丰饶。其女珀耳塞福涅被冥王哈得斯掳走后，得墨忒耳悲伤不已，导致大地荒芜。保婆曾以淫猥之言为其解闷。
  书中原文: 保婆：希腊神话中农耕女神得墨忒耳的乳母。得墨忒耳因女儿被拐而愁闷时，保婆以淫猥之言给她解闷。
  网络来源: https://baike.baidu.com/item/%E5%BE%97%E5%A2%A8%E5%BE%92%E8%80%B3

- 名词: 尼古拉
  分类: 人物
  解释: 克里斯托夫·弗里德里希·尼古拉（1733-1811），德国启蒙思想家、出版人、评论家。自称因脑部淤血见到幽灵鬼怪，后以肛门贴水蛭放血治愈。曾模仿歌德《少年维特之烦恼》写《少年维特之喜乐》，遭歌德不满。歌德在《浮士德》中以"肛门幻视者"角色讽刺他。
  书中原文: 启蒙主义的评论家、作家尼古拉（1733—1811）于1799年在柏林学会上作过报告，说他得过幻视症，见到幽灵鬼怪，他认为这是由于脑部淤血而致，后来在肛门部贴上水蛭（蚂蟥）放血后而得痊愈。
  网络来源: https://muse.jhu.edu/article/8124/summary

- 名词: 蚂蟥
  分类: 物件
  解释: 即水蛭，环节动物，古代医学中用于放血治疗。尼古拉曾用蚂蟥在肛门部吸血治疗幻视症。歌德在《浮士德》中以蚂蟥讽刺尼古拉的荒唐疗法。
  书中原文: 如果有蚂蟥在他屁股上吸起血来，幽灵呀，心灵呀，就会全被治好。
  网络来源: https://hallucinations.en-academic.com/1257/Nicolai%2C_Christoph_Friedrich

- 名词: 克塞尼集
  分类: 概念
  解释: 歌德与席勒于1796年合著的讽刺短诗集，以两行体对当时文学界和社会现象进行辛辣讽刺。其名称源自希腊语"xenia"（待客的礼物），因该诗集的影响，该词在德语中获得了"讽刺短诗"的新义。
  书中原文: 歌德在讽刺短诗《克塞尼集》中也曾对他攻击。
  网络来源: https://baike.baidu.com/item/%E6%AD%8C%E5%BE%B7

- 名词: 维特
  分类: 人物
  解释: 指歌德著名小说《少年维特之烦恼》中的主人公维特。尼古拉曾模仿该作品写作《少年维特之喜乐》，引起歌德强烈不满，成为歌德在《浮士德》和《克塞尼集》中讽刺尼古拉的动机之一。
  书中原文: 尼古拉曾模仿歌德《少年维特之烦恼》写过一本《少年维特之喜乐》，颇使歌德不满。
  网络来源: https://baike.baidu.com/item/%E5%B0%91%E5%B9%B4%E7%BB%B4%E7%89%B9%E4%B9%8B%E7%83%A6%E6%81%BC

- 名词: 爱德华三世
  分类: 人物
  解释: 英格兰国王（1327-1377在位），百年战争的发动者。相传在一次舞会上为情妇拾起蓝色袜带，后于1348年创立嘉德勋章。歌德在《浮士德》注释中以此典故解释嘉德勋章的起源。
  书中原文: 相传14世纪时英王爱德华三世在一次舞会上，见到他的情妇索尔士布利伯爵夫人把左腿上的蓝色袜带掉落，国王给她拾起，闹了一场笑话。后于1348年创立这个勋章。
  网络来源: https://baike.baidu.com/item/%E7%88%B1%E5%BE%B7%E5%8D%8E%E4%B8%89%E4%B8%96

- 名词: 德国百科丛书
  分类: 概念
  解释: 尼古拉编辑出版的百科类丛书，他通过该丛书发表文学批评。歌德在《浮士德》注释中将尼古拉的出版社比喻为老磨坊，暗示其将过时内容改头换面重新出版。
  书中原文: 他曾出版《德国百科丛书》，40年间作为他的文学批评的喉舌。
