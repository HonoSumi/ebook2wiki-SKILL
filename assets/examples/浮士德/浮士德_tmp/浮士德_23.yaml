  网络来源: https://baike.baidu.com/item/%E7%BB%B4%E5%85%B0

- 名词: 亚当的前妻
  分类: 概念
  解释: 指莉莉特。根据希伯来拉比传说，《创世记》第1章第27节中上帝造男造女，这个女的名叫莉莉特，是亚当的第一任妻子。后因不从亚当而离开，变为鬼怪，被夏娃（由亚当肋骨所造）顶替。
  书中原文: 据希伯来拉比们的传说：《创世记》第1章第27节"上帝……照着他的形象造男造女"。这个女的名叫莉莉特，乃是亚当的前妻。
  网络来源: https://wapbaike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7/61167062

- 名词: 夏娃
  分类: 人物
  解释: 《圣经》中上帝用亚当肋骨造成的女性，亚当的第二任妻子。在伊甸园中受蛇诱惑偷吃禁果，导致人类被逐出乐园。在莉莉特传说中，夏娃顶替了莉莉特的位置。
  书中原文: 后来她被夏娃（她是上帝用亚当的肋骨造出的）顶替了位置，就变成了鬼怪，专事诱惑男人，伤害小孩。
  网络来源: https://zh.wikipedia.org/wiki/%E5%A4%8F%E5%A8%83

- 名词: 肋骨
  分类: 概念
  解释: 《圣经·创世记》中上帝用亚当的一条肋骨创造了夏娃。歌德在《浮士德》注释中以此解释夏娃的来历，说明莉莉特被夏娃顶替的原因。
  书中原文: 后来她被夏娃（她是上帝用亚当的肋骨造出的）顶替了位置。
  网络来源: https://zh.wikipedia.org/wiki/%E5%A4%8F%E5%A8%83

- 名词: 禁果
  分类: 物件
  解释: 《圣经·创世记》中分别善恶树上的果实，上帝禁止亚当和夏娃食用。夏娃受蛇诱惑偷食禁果，并与亚当同食，二人因此被逐出伊甸园。歌德在《浮士德》中借苹果象征禁果与诱惑。
  书中原文: 《创世记》中亚当在乐园中偷吃禁果。
  网络来源: https://baike.baidu.com/item/%E7%A6%81%E6%9E%9C

- 名词: 格林童话
  分类: 概念
  解释: 雅各布·格林和威廉·格林兄弟收集整理的德国民间童话集，是世界文学经典。雅各布·格林还著有《德意志神话学》，其中记载了从魔女口中跳出红色老鼠的民间信仰。歌德在《浮士德》注释中引用格林的发现。
  书中原文: 格林《德国神话》中记载从入睡的魔女口中有时跳出红老鼠。
  网络来源: https://baike.baidu.com/item/%E6%A0%BC%E6%9E%97%E7%AB%A5%E8%AF%9D

- 名词: 德意志神话
  分类: 概念
  解释: 雅各布·格林所著的《德意志神话学》（Deutsche Mythologie），系统研究古代日耳曼人的神话、民间信仰和习俗。其中记载了魔女口中跳出红色老鼠等巫术信仰。歌德在《浮士德》注释中引用该书。
  书中原文: 格林《德国神话》中记载从入睡的魔女口中有时跳出红老鼠。
  网络来源: https://en.wikipedia.org/wiki/Deutsche_Mythologie

- 名词: 布罗肯山
  分类: 地点
  解释: 德国哈尔茨山脉的最高峰（海拔1141米），德国北部最高峰。传说中魔女在瓦尔普吉斯之夜聚集于此举行魔宴。歌德在《浮士德》中将此作为瓦尔普吉斯之夜的核心场景。其云雾现象称为"布罗肯幽灵"。
  书中原文: 是夜，魔女们乘着扫帚柄、山羊、叉棍前往布罗肯山跟恶魔举行每年一次的夜会，跳舞作乐。
  网络来源: https://baike.baidu.com/item/%E5%B8%83%E7%BD%97%E8%82%AF%E5%B3%B0

- 名词: 哈尔茨山
  分类: 地点
  解释: 德国下萨克森州境内的山脉，布罗肯山为其最高峰。该地区以森林、矿藏和民间传说闻名。歌德在《浮士德·瓦尔普吉斯之夜》中以哈尔茨山脉为场景背景。
  书中原文: 哈尔茨山在德国下萨克森州。
  网络来源: https://baike.baidu.com/item/%E5%93%88%E5%B0%94%E8%8C%A8%E5%B1%B1

- 名词: 瓦尔普吉斯之夜
  分类: 习俗
  解释: 德国民间传说中每年4月30日至5月1日之间的夜晚，魔女们乘扫帚、山羊、叉棍飞往布罗肯山与恶魔举行夜会。该夜以圣瓦尔普吉斯的瞻礼日命名。歌德在《浮士德》中以这一夜为背景创作了著名的狂欢场景，成为该传说的经典文学展现。
  书中原文: 德国民间迷信，称4月30日至5月1日之间的一夜为瓦尔普吉斯之夜。是夜，魔女们乘着扫帚柄、山羊、叉棍前往布罗肯山跟恶魔举行每年一次的夜会，跳舞作乐。
  网络来源: https://wapbaike.baidu.com/item/%E7%93%A6%E5%B0%94%E6%99%AE%E5%90%89%E6%96%AF%E4%B9%8B%E5%A4%9C/10226382

- 名词: 梅非斯特
  分类: 人物
  解释: 即梅菲斯特（Mephistopheles），歌德诗剧《浮士德》中的魔鬼形象。他代表怀疑、否定与毁灭的精神，与浮士德订立契约，以侍奉浮士德为条件换取其灵魂。在瓦尔普吉斯之夜中，他引导浮士德参加魔女狂欢。
  书中原文: 梅非斯特，你不见有个苍白的美女独自站在远处？她慢吞吞地缓步向前，看上去就像戴着脚镣走路。
  网络来源: https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7/20411089

- 名词: 浮士德
  分类: 人物
  解释: 歌德同名诗剧的主人公，原型为16世纪德国真实存在的学者和术士。他追求无限知识与生命体验，与魔鬼梅非斯特订立契约，经历了知识、爱情、政治、艺术和事业等多重追求。悲剧第一部中他在瓦尔普吉斯之夜看到格蕾辛的幻影。
  书中原文: 浮士德：那个是谁？梅非斯特：你把她看个仔细！是莉莉特。
  网络来源: https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7/20411089
