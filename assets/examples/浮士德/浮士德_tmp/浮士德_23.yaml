- 名词: 贝蒂格
  分类: 人物
  解释: 卡尔·奥古斯特·贝蒂格（1760-1835），德国考古学家与古典学家，曾任魏玛文理中学校长、《豪华与流行之杂志》编者。歌德在《浮士德》中以"总管"（Servibilis）角色暗讽他。
  书中原文: 可能暗讽魏玛高等学校校长贝蒂格（1760—1835），他是《豪华与流行之杂志》的编者。
