- 名词: 洪堡尔特
  分类: 人物
  解释: 指德国洪堡尔特家族，其家族府邸位于柏林郊区忒格尔。1797年传说府邸中有幽灵出现。该家族的威廉·冯·洪堡是著名语言学家、教育改革家，其弟亚历山大·冯·洪堡是著名自然科学家。
  书中原文: 1797年在该处洪堡尔特家族的府邸里传说有幽灵出现，尼古拉在报告中曾加以评论。
  网络来源: https://baike.baidu.com/item/%E5%AE%8F%E5%A0%A1%E7%88%BE%E7%89%B9

- 名词: 维也纳
  分类: 地点
  解释: 奥地利首都，哈布斯堡王朝的文化中心。18世纪时维也纳郊外的普拉特是著名的游乐园。歌德在《浮士德》中借梅非斯特之口将瓦尔普吉斯之夜的热闹比作普拉特游乐园。
