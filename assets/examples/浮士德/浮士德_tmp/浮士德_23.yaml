- 名词: 本笃会
  分类: 概念
  解释: 天主教修会之一，由圣本笃于6世纪创立，以"祈祷与工作"为座右铭。圣瓦尔普吉斯所属的海登海姆修院即属本笃会。在《浮士德》注释中作为圣瓦尔普吉斯的宗教背景介绍。
  书中原文: 在埃希施台特任海登海姆修院（属本笃会）院长。
