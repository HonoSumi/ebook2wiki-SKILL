  解释: 叉状的长棍，欧洲民间传说中魔女飞行的骑乘工具之一。在瓦尔普吉斯之夜，魔女们骑着叉棍飞往布罗肯山。歌德在《浮士德》注释中提及。
  书中原文: 是夜，魔女们乘着扫帚柄、山羊、叉棍前往布罗肯山跟恶魔举行每年一次的夜会，跳舞作乐。
