  书中原文: 它是由业余作者编剧，演出的也是业余演员。
  网络来源: https://www.readbookonline.org/read/3243/13019

- 名词: 总管
  分类: 人物
  解释: 原文Servibilis，歌德创造的新词，相当于舞台监督或换布景者的角色。可能暗讽魏玛高等学校校长贝蒂格，他是《豪华与流行之杂志》的编者。
  书中原文: 总管：原文Servibilis，此字乃歌德创造之新字，相当于舞台监督或换布景者的角色。可能暗讽魏玛高等学校校长贝蒂格。
