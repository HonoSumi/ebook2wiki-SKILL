- 名词: 血签契约
  分类: 概念
  解释: 浮士德与魔鬼梅非斯特之间用血液签署的灵魂交易契约，是西方文学中"浮士德式交易"（Faustian bargain）的原型。在歌德《浮士德》中，梅非斯特要求浮士德用一滴血在契约上签名，并称"血是一种特别的液体"，象征灵魂契约的神圣与不可逆性。
  书中原文: "还要用一滴血签上你的大名。"
  网络来源: https://mooc1.chaoxing.com/mooc-ans/ztnodedetailcontroller/visitnodedetail?courseId=94806280&knowledgeId=94806296

- 名词: 小宇宙
  分类: 概念
  解释: 源于古希腊哲学的"微观宇宙"（Microcosm）概念，认为人作为小宇宙反映了大宇宙（Macrocosm）的结构与规律。在歌德《浮士德》中，梅非斯特讽刺性地称浮士德为"小宇宙先生"，暗指浮士德试图将人类各种高贵品质集于一身的野心，体现了文艺复兴时期人即宇宙缩影的世界观。
  书中原文: "我要称他为小宇宙先生。"
  网络来源: https://www.xiaoyuzhoufm.com/episode/695299842db086f897a73ff2

- 名词: 人类的冠冕
  分类: 概念
  解释: 浮士德追求的最高人生目标，象征人类智慧、力量与尊严的巅峰。德语原文为"Der Menschheit Krone"。浮士德渴望通过不断奋斗与探索，争取戴上这项冠冕，将小我扩展为人类的大我，体现了歌德笔下浮士德精神的核心——永不满足、永远进取的追求。
  书中原文: "我一心一意，无非是争取戴上人类的冠冕。"
  网络来源: https://www1.bartleby.com/lit-hub/hc/faust-part-i/faust-part-i-3

- 名词: 西班牙长靴
  分类: 物件
  解释: 中世纪欧洲宗教法庭使用的一种残酷刑具，由多块木板或铁片构成，包裹住受害者的腿部，通过敲入楔子逐渐增加压力以碾碎腿骨。在《浮士德》中，梅非斯特借该刑具比喻逻辑学对人的思维的限制与束缚——就像把腿套进西班牙长靴一样，使人无法自由思考。
  书中原文: "就像套进西班牙长靴。"
  网络来源: https://www.alexautographs.com/auction-lot/medieval-spanish-boot_83073F76D7

- 名词: 旧酵
  分类: 概念
  解释: 源自《圣经·哥林多前书》5:6-8的比喻，"酵"在犹太文化中象征罪恶与腐败，"旧酵"指人旧有的罪恶本性和腐败的旧生命。保罗教导信徒应当除去旧酵（罪恶），成为无酵的新面团。歌德在《浮士德》中借梅非斯特之口引用此典故，比喻人类与生俱来的原罪与无法消化的生存之苦。
  书中原文: "无人能将这团旧酵消化。"
  网络来源: https://www.bible.com/zh-CN/bible/3354/1CO.5.FEB
