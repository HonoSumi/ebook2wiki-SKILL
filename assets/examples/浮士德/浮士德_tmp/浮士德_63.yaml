- 名词: 荣光圣母
  分类: 人物
  解释: 荣光圣母（Mater Gloriosa）是歌德《浮士德》第二部结尾出现的至高神圣人物，象征天主教传统中的圣母玛利亚。在全剧终场，她飘荡而来，接受悔罪女们的祈祷，最终应允格蕾辛的请求，允许她引导浮士德的灵魂升天。在歌德笔下，荣光圣母被赋予了更广泛的人文主义内涵，代表着救赎、慈悲与永恒之爱，是"永恒的女性"（Das Ewig-Weibliche）理念的最高具象化。
  书中原文: （荣光圣母飘荡而来。）众悔罪女的合唱 你高高飘游／永恒的宇内，听我们祈求，你，无与伦比者，你，大慈大悲者！
  网络来源: https://wenku.baidu.com/view/8a52b8f5f342336c1eb91a37f111f18582d00c50

- 名词: 崇拜马利亚的博士
  分类: 人物
  解释: 崇拜马利亚的博士（Doctor Marianus，拉丁语意为"马利亚的学者"）是《浮士德》第二部第五幕终场"山谷"场景中出现的重要角色。他居于最高最清净的石室中，代表中世纪神秘主义传统中专注于圣母马利亚的学者/神学家（典型如明谷的伯尔纳）。他在终场中作为中介者向荣光圣母祈祷，发出"童女，圣母，女王，女神，请永远宠佑我们"的著名祷词，为浮士德灵魂得救铺路。
  书中原文: 崇拜马利亚的博士（在最高、最清净的石室中。）这边眺望很开阔，精神很高昂。那边有妇女经过，向上方飘荡。其中有一位贵妇，星冠多辉煌，从她的光辉看出，是天国女王。
  网络来源: https://li91-208.members.linode.com/book/9608/345172.htm

- 名词: 神秘的合唱
  分类: 概念
  解释: 神秘的合唱（Chorus Mysticus）是《浮士德》全剧结尾的著名合唱段落，也是全剧的最终升华与哲学总结。原文为："一切无常者，不过是虚幻；力不胜任者，在此处实现；一切无可名，在此处完成；永恒的女性，领我们飞升。"这八行诗概括了全剧的核心思想：现象世界的一切都是本质的映影（五彩折光），人虽不能凭自身力量达到伦理圆满，但在永恒之爱（以"永恒的女性"为象征）的引领下，最终得以飞升获救。
  书中原文: 神秘的合唱 一切无常者，不过是虚幻；力不胜任者，在此处实现；一切无可名，在此处完成；永恒的女性，领我们飞升。
  网络来源: https://m.fx361.com/news/2016/1229/13696556.html

- 名词: 升天童子
  分类: 人物
  解释: 升天童子（Selige Knaben / Blessed Boys，意为"极乐的童子"）是《浮士德》第二部第五幕终场中的童灵群体。他们是早夭而纯洁的灵魂，无需经历尘世漫长挣扎就已获得天恩。在终场中，他们绕着最高峰飞翔起舞，迎接浮士德的灵魂，将其比作处于蛹期的幼虫，帮助他剥下茧壳（尘世躯壳），逐步升向圆满之境。歌德这一形象受到斯威登堡神秘主义和克洛普斯托克《救世主》的影响。
  书中原文: 升天童子的合唱（绕着最高峰飞翔。）手跟手拉住，欢喜地围成圆形，来载歌载舞，歌唱神圣的感情。神灵的教导，你们要皈依，你们将见到敬信的神姿。
  网络来源: http://ia800508.us.archive.org/25/items/jstor-432409/10.2307_432409.xml

- 名词: 悔罪女
  分类: 人物
  解释: 悔罪女（Una Poenitentium，拉丁语"一位忏悔者"）是《浮士德》终场中赎罪女性群体的总称，其中最重要的一位即旧名格蕾辛（Gretchen）者。在《浮士德》第一部中，格蕾辛因被浮士德引诱而导致家庭悲剧，最终被判死刑，但因忏悔而得救。第二部终场中，她以悔罪女的身份升入天国，与众悔罪女一同围绕荣光圣母膝下，向圣母祈求允许她引导浮士德的灵魂升天。她是"永恒的女性"理念的尘世化身之一。
  书中原文: 悔罪女一人（旧名格蕾辛。）请你，请你，你，无与伦比者，你，充满光明者，仁慈地正视我的愉快。往日的爱人，不再是钝根，他已经回来。
  网络来源: https://read.cnki.net/web/Journal/Article/MZXS202121019.html

- 名词: 罪孽深重的女人
  分类: 人物
  解释: 罪孽深重的女人（Magna Peccatrix，拉丁语"大罪人"）是《浮士德》终场中出现的三位圣经悔罪女之一，原型出自《路加福音》第7章第36-50节。经文记载一个被视为罪人的女人在法利赛人家中用眼泪洗耶稣的脚、用头发擦干、并用香膏抹脚，耶稣对她说"她许多的罪都赦免了，因为她的爱多"。在《浮士德》终场中，她与其他悔罪女一同向荣光圣母祈祷，为浮士德灵魂代求，象征着因忏悔之爱而得赦免的神学主题。
  书中原文: 罪孽深重的女人（《路迦福音》第七章第三十六节）凭着我不顾法利赛人的嘲笑而让自己的眼泪算作香膏流到你的圣子脚上的那种深爱……
  网络来源: https://www.cliffsnotes.com/literature/f/faust-parts-1-and-2/summary-and-analysis/part-2-act-v-mountaingorges-forest-cliff-wilderness

- 名词: 撒玛利亚妇人
  分类: 人物
  解释: 撒玛利亚妇人（Mulier Samaritana）是《浮士德》终场中出现的三位圣经悔罪女之一，原型出自《约翰福音》第4章。经文记载耶稣在雅各井旁与撒玛利亚妇人对话，揭示自己就是"活水"之源，妇人因此信服并回城传道。在《浮士德》终场中，她凭古代亚伯兰饮过家畜的井泉、接触救主嘴唇的水罐、以及从那里涌出的永远澄清的泉源向荣光圣母祈祷，象征净化与救赎的力量。
  书中原文: 撒玛利亚妇人（《约翰福音》第四章。）凭着古代亚伯兰就已饮过家畜的那口井泉，凭着那只可以清凉地接触救主嘴唇的水罐……
  网络来源: http://www.guxuo.com/wgwx/ZPJ/gede/fsd/174.htm

- 名词: 埃及的马利亚
  分类: 人物
  解释: 埃及的马利亚（Maria Aegyptiaca）是《浮士德》终场中出现的三位圣经悔罪女之一，其事迹出自基督教圣徒传（《圣徒传》/《黄金传奇》）。据传她12岁离家至亚历山大城为妓，后往耶路撒冷朝圣时被神秘力量阻挡于圣十字架教堂门外，因而悔改，前往约旦河东沙漠独修47年，最终成圣。在《浮士德》终场中，她凭着主葬于圣地、在门口推开她的手臂、以及在沙漠中四十年的悔悟向荣光圣母祈祷，成为"通过悔改而得救赎"主题的核心象征。
  书中原文: 埃及的马利亚（《圣徒传》。）凭着人们把主的遗骸葬在那里的那块圣地，凭着在门口将我推开以警告我的那只手臂；凭着我在沙漠里面坚持四十年的悔悟……
  网络来源: https://musicweb-international.com/classRev/2014/Mar14/Schumann_Faust_NBD0015.htm
