- 名词: 墨涅拉俄斯
  分类: 人物
  解释: |
    希腊神话中的斯巴达国王，阿特柔斯之子，阿伽门农之弟，海伦的丈夫。海伦被特洛伊王子帕里斯诱拐后，墨涅拉俄斯与兄长阿伽门农召集希腊联军远征特洛伊，历时十年攻陷该城。战后携海伦返回斯巴达。在《浮士德》中，他先遣海伦回宫准备献祭，但未明言祭品为何，引起海伦的疑虑。
  书中原文: |
    我回来当他的妻子？还是当一位王后？或者当牺牲，偿还王上的激烈的痛苦，偿还希腊人长期忍受的不幸的灾难？
  网络来源: |
    https://baike.baidu.com/item/%E5%A2%A8%E6%B6%85%E6%8B%89%E5%A5%A5%E6%96%AF/6747470

- 名词: 库忒拉
  分类: 地点
  解释: |
    又译库忒瑞亚，希腊伯罗奔尼撒半岛南端的一个岛屿，是古希腊祭祀爱与美之神阿佛洛狄忒（罗马名维纳斯）的重要圣地。阿佛洛狄忒从海浪泡沫中诞生后首先靠近此岛，故得别名"库忒瑞亚"（Cytherea）。在《浮士德》中，海伦回忆自己曾去库忒拉的神殿朝拜。
  书中原文: |
    因为自从我轻快地跨出这座门坎，遵照神圣的义务，去朝拜库忒拉的神殿，却在那里被佛律癸亚的强人抢去。
  网络来源: |
    https://zh.wikipedia.org/zh-mo/%E5%BA%93%E5%BF%92%E7%91%9E%E4%BA%9A

- 名词: 佛律癸亚
  分类: 地点
  解释: |
    又译弗里吉亚（Phrygia），古代小亚细亚中西部的一个地区（今土耳其中西部），首府为戈尔迪乌姆。著名的神话传说包括弥达斯国王的点石成金和驴耳朵故事，以及亚历山大大帝斩断的戈尔迪乌姆之结。特洛伊战争期间佛律癸亚人支持特洛伊一方。"佛律癸亚的强人"指特洛伊王子帕里斯。
  书中原文: |
    却在那里被佛律癸亚的强人抢去，闹出许多事情，四面八方的人都爱道听途说。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E4%BD%9B%E5%BE%8B%E7%99%B8%E4%BA%9A

- 名词: 欧洛塔斯河
  分类: 地点
  解释: |
    又译埃夫罗塔斯河（Eurotas），希腊伯罗奔尼撒半岛南部的主要河流，发源于塔伊耶托斯山脉，全长约82公里，流经拉科尼亚平原，经过斯巴达城西侧，注入拉科尼亚湾。欧洛塔斯河是斯巴达城邦的生命之河，为河谷平原提供灌溉水源。神话中宙斯曾化作天鹅在此河与勒达相会。
  书中原文: |
    随后，我们的先行船驶进欧洛塔斯河深湾，几只船头刚刚靠上了岸边。你尽管继续前进，沿着这条神圣的欧洛塔斯河丰饶的河岸一直上去。
  网络来源: |
    https://baike.sogou.com/v54250567.htm

- 名词: 拉刻代蒙
  分类: 地点
  解释: |
    又译拉克代蒙（Lacedaemon），古希腊斯巴达城邦的正式名称。在希腊神话中，拉刻代蒙是宙斯与塔宇革忒之子，拉科尼亚地区的国王，该地区因而得名。对外关系中斯巴达人通常自称"拉刻代蒙人"。在《浮士德》中，墨涅拉俄斯吩咐海伦沿欧洛塔斯河前行，直到拉刻代蒙都城。
  书中原文: |
    在那一片美丽的平原，那儿，在严峻的群山环抱之中，原来是肥沃的旷野，建成了拉刻代蒙都城。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E6%96%AF%E5%B7%B4%E9%81%94

- 名词: 伊利俄斯
  分类: 地点
  解释: |
    又译伊利昂（Ilion / Ilium），特洛伊城在希腊语中的原始名称。其名来源于神话中的建城者伊洛斯（Ilus）。与"特洛伊"（源于祖先特罗斯Tros）为同一座城的两个名称，在荷马史诗中交替使用。荷马史诗《伊利亚特》（意为"伊利昂之歌"）即以该城命名。在《浮士德》中，海伦的侍女合唱队哀叹伊利俄斯被焚毁。
  书中原文: |
    但有一位神抓住了这位离乡者的手；从伊利俄斯废墟把她送回到这里，这焕然一新的、祖先的老家里。
  网络来源: |
    https://baike.so.com/doc/2263964-2395162.html

- 名词: 潘塔利斯
  分类: 人物
  解释: |
    希腊神话中海伦的侍女，在歌德《浮士德》第二部第三幕中被塑造为合唱队的队长。她带领被俘的特洛伊妇女组成的合唱队随侍海伦返回斯巴达。在剧终时，其他合唱队少女化为自然元素，而潘塔利斯选择返回冥界陪伴海伦，体现其忠诚的高贵品格。名字意为"百花盛开者"。
  书中原文: |
    潘塔利斯（担任合唱队长。）请你们离开喜气洋洋的歌唱之路，把你们的眼光转向门板那边！姊妹们，是怎么回事？我们的王后不是迈着急促的步伐又向我们走回？
  网络来源: |
    https://www.hellenicaworld.com/Greece/Mythology/en//Panthalis.html

- 名词: 格赖埃
  分类: 人物
  解释: |
    希腊神话中共用一只眼睛和一颗牙齿的三姐妹神灵，海神福耳库斯与刻托之女，戈耳工三姐妹的姊妹。名字意为"老妇人"或"灰巫女"。她们生来白发，三人轮流使用唯一的眼睛和牙齿。在珀尔修斯斩杀美杜莎的传说中，珀尔修斯夺走她们的眼睛迫使她们说出宁芙仙女的居所。在《浮士德》中，合唱队将出现的福耳库阿斯比作格赖埃姐妹。
  书中原文: |
    福耳库阿斯的女儿，你是其中的哪个？因为我把你比作她们的一族。你也许就是天生白发、以一只眼睛、一只牙齿互相交换使用的格赖埃中的一个？
  网络来源: |
    https://zh.m.wikipedia.org/wiki/%E6%A0%BC%E8%B5%96%E5%9F%83

- 名词: 福坡斯
  分类: 人物
  解释: |
    又译福玻斯（Phoebus），希腊神话中太阳神阿波罗的别名，意为"发光者"或"光辉灿烂的"。在《浮士德》中，海伦称"可怕的黑夜的产物总会被爱美的朋友福坡斯赶进洞中或者将她制服"，意指光明之神阿波罗能将黑夜的恐怖造物驱逐。福坡斯·阿波罗是奥林匹斯十二主神之一，司掌光明、预言、音乐、诗歌和医药。
  书中原文: |
    可怕的黑夜的产物总会被爱美的朋友福坡斯赶进洞中或者将她制服。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/%E7%A6%8F%E7%8E%BB%E6%96%AF

- 名词: 不和女神
  分类: 人物
  解释: |
    希腊神话中的纷争与不和女神厄里斯（Eris），罗马名为狄斯科蒂娅（Discordia）。据赫西俄德《神谱》，她是黑夜女神倪克斯之女。最著名的故事是"金苹果之争"：因未受邀参加珀琉斯与忒提斯的婚礼，厄里斯投下刻有"献给最美丽的女神"的金苹果，引发赫拉、雅典娜、阿佛洛狄忒三女神的争执，最终导致帕里斯裁决和特洛伊战争。
  书中原文: |
    在战尘滚滚、两军相接的呐喊声中我听到天神恐怖地叫喊，不和女神的黄铜的声音响遍战场，飘向城墙。
  网络来源: |
    https://wapbaike.baidu.com/item/%E5%8E%84%E9%87%8C%E6%96%AF/6822385

- 名词: 黑夜
  分类: 人物
  解释: |
    希腊神话中的黑夜女神倪克斯（Nyx），五大创世神之一，由混沌之神卡俄斯诞生。她身披黑衣，每日乘黑马拉的战车飞上夜空。与哥哥厄瑞玻斯（黑暗）生下太空之神埃忒耳和白昼女神赫墨拉。独自生育了死神塔纳托斯、睡神许普诺斯、不和女神厄里斯等众多拟人化神祇。在《伊利亚特》中，连宙斯也敬畏她三分。
  书中原文: |
    一般的恐怖不适合宙斯的女儿的身份，一时的轻度的恐吓也不能把她吓倒；可是从开辟之初，古老的黑夜的腹中升出的恐怖，如今又以种种的姿态，像从火山喷火口喷出的火云一样直冒出来。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/%E5%80%AA%E5%85%8B%E6%96%AF

- 名词: 献祭
  分类: 习俗
  解释: |
    古希腊宗教中最重要的仪式活动，核心流程包括净化、祈祷、宰杀牺牲、焚烧不可食部分献神、分食祭肉等步骤。牺牲通常为牛、羊、猪等家畜。献祭类型分为感恩祭、赎罪祭、祈求祭等。神话起源为普罗米修斯分祭肉的故事。在《浮士德》中，墨涅拉俄斯命海伦准备鼎、锅、柴薪和磨快的刀子等献祭用具，使海伦怀疑自己可能成为祭品。
  书中原文: |
    你就备齐你认为必要的数目的鼎以及献祭者为了举行神圣的祭典需要在手边具备的各种各样的容器。锅子，还有盘子以及平底的圆钵；你要把从神圣的泉水中汲来的净水贮在高口的壶里，此外你还要给我准备好一些容易引火的干燥的柴薪。最后，一把磨快的刀子也不可缺少。
  网络来源: |
    https://epaper.gmw.cn/zhdsb/html/2017-06/14/nw.D110000zhdsb_20170614_2-13.htm

- 名词: 合唱歌
  分类: 概念
  解释: |
    古希腊戏剧中穿插在剧情各场次之间的歌队演唱段落，拉丁文称Stasimon，意为"站立的歌"。合唱歌在古希腊戏剧中承担叙事、抒情、评论等功能，歌队通过歌唱和舞蹈表达对剧情的反应、预示未来或传达道德教诲。在《浮士德》第二部第三幕中，歌德继承古希腊戏剧传统，设置了由特洛伊女俘组成的合唱队，由潘塔利斯担任合唱队长。
  书中原文: |
    合 唱 将来的事难以逆料；王后，高高兴兴进去吧。一切祸福吉凶都是意想不到；即使有预告，我们也不信。特洛亚烧光了，我们不是亲眼看到屈辱的死亡；我们不是在这里陪着你，愉快地侍候你，看到天上耀眼的太阳和世间最美的都城，幸福的你和我们！
  网络来源: |
    https://m.thepaper.cn/baijiahao_22862938
