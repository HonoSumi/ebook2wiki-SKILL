- 名词: 忧愁
  分类: 人物
  解释: 歌德《浮士德》中的拟人化人物，代表人类无法逃避的焦虑、困苦与不确定性。在第五幕中，忧愁降临于年迈的浮士德面前，对其施加精神折磨，最终向浮士德的眼睛吹了一口气，使其失明。但浮士德的肉眼失明反而象征其心灵之眼的开启。
  书中原文: 忧愁：让你体会吧！我对你咒诅，很快离开你的身旁。人类一生一世总是盲目，浮士德，你结局也是这样！（对他吹了一口气。下。）
  网络来源: https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7/20411089

- 名词: 鬼怪
  分类: 人物
  解释: 原文源自拉丁语 Lemures，指古罗马宗教中的亡灵、鬼魂。在《浮士德》第二部第五幕中，梅非斯特召唤来这些鬼怪为浮士德挖掘坟墓。它们一边用铲锹挖土，一边唱着从年青恋爱到老年面对死亡的讽刺歌曲，构成全剧经典的黑色幽默与戏剧反讽。
  书中原文: 鬼怪（合唱）：我们赶快前来帮忙，我们听到个消息，正有一片广大的地方，要归入我们的手里。
  网络来源: https://book.douban.com/subject/1869786/blockquotes

- 名词: 尼普顿
  分类: 人物
  解释: 即罗马神话中的海神 Neptune（希腊神话中的波塞冬）。在《浮士德》第五幕中，梅非斯特以旁白方式提到海神尼普顿，讽刺浮士德的填海造陆工程最终不过是给海神准备了一场盛宴——大海终将吞噬一切人类造物。歌德本人也是地质学"水成论"（Neptunism）的信奉者。
  书中原文: 梅非斯特：（旁白）你筑大堤，你筑海塘，只是为我们鞠躬尽瘁；因为你已替水的魔鬼，尼普顿备好盛大的筵席。
  网络来源: https://www.guxuo.com/wgwx/zpj/gede/fsd/167.htm

- 名词: 失明
  分类: 事件
  解释: 浮士德晚年被拟人化的"忧愁"吹瞎眼睛的情节。在《浮士德》第五幕中，忧愁向浮士德吹了一口气使其双目失明，但浮士德却宣称"黑夜逼来，好像越来越深沉，可是心中却有光明在照耀"。失明象征浮士德从物质之眼到精神之眼的转变，肉眼的失明反而开启了内在的、心灵的眼睛。
  书中原文: 浮士德：（失明。）黑夜逼来，好像越来越深沉，可是心中却有光明在照耀；我所想的，要赶快将它完成，只有主人的话才算重要。
  网络来源: https://m.zhangyue.com/readbook/12944018/3.html

- 名词: 自由土地
  分类: 概念
  解释: 浮士德晚年填海造陆事业的核心理想——"自由的人民生活在自由的土地上"。浮士德认识到只有每天争取自由和生存的人，才配享有二者的权利。这一概念代表浮士德从个人欲望追求到为人类集体福祉奋斗的最终升华，也是全剧"智慧的最后总结"。
  书中原文: 浮士德：我为几百万人开拓疆土，虽不算安全，却可以自由居住。……我愿看到这样的人群，在自由的土地上跟自由的人民结邻！
  网络来源: https://xiaoshuo.qq.com/read/1000811061/27

- 名词: 停一停吧你真美丽
  分类: 概念
  解释: 德语原文"Verweile doch, du bist so schön!"，是《浮士德》全剧最著名的台词，也是全剧的灵魂关节。这句话具有双重性：第一次出现在第一部书斋赌约中——浮士德与魔鬼约定，一旦他对某个瞬间感到满足说出此话，灵魂即归魔鬼所有；第二次出现在第二部临终前——浮士德幻想自由土地建成时说出此话，随即倒地而死。
  书中原文: 浮士德：那时，让我对那一瞬间开口：停一停吧，你真美丽！我的尘世生涯的痕迹就能够永世永劫不会消逝。——我抱着这种高度幸福的预感，现在享受这个最高的瞬间。
  网络来源: https://www.zhihu.com/question/20416835

- 名词: 坟墓
  分类: 物件
  解释: 在《浮士德》第五幕中，梅非斯特指挥鬼怪（Lemures）为浮士德挖掘的墓穴。浮士德误以为挖掘声是民伕在开掘沟渠、围海造田，实际上却是鬼怪在为他掘墓。梅非斯特命令鬼怪"挖出一个长方形土坑"，并感叹"从宫殿走向这狭隘的住房，总归是这样一个糊涂的下场"。
  书中原文: 梅非斯特：个子最长的躺下来躺得直挺挺，其余的就把周围的草拔光；就像对待我们的先人，挖出一个长方形土坑！从宫殿走向这狭隘的住房，总归是这样一个糊涂的下场。
  网络来源: https://mwy.hxw.red/BK/5-104-265-0-925p52.html

- 名词: 宫中大院
  分类: 地点
  解释: 《浮士德》第二部第五幕第五场的场景名称，又称"宫中宽广的前庭"。这是全剧的高潮与终结场景所在，火炬照耀。年迈失明的浮士德在此走出宫殿，听到鬼怪挖掘声误以为是围海造田的工程声，说出"停一停吧，你真美丽"后倒地而亡。该场景是浮士德一生追求的终极时刻。
  书中原文: 第五场 宫中大院 火炬。梅非斯特（任督工，站在前方。）
  网络来源: https://book.douban.com/annotation/124534803/

- 名词: 火炬
  分类: 物件
  解释: 《浮士德》第五幕"宫中大院"一景的道具。原文标注"火炬"，点明了场景发生在夜晚，以火炬照明。这一黑暗中的光焰与浮士德的失明、心中光明等意象形成呼应。
  书中原文: 第五场 宫中大院 火炬。
  网络来源: https://www.guxuo.com/wgwx/zpj/gede/fsd/167.htm

- 名词: 掘墓
  分类: 事件
  解释: 梅非斯特指挥鬼怪（Lemures）为浮士德挖掘坟墓的行动。在《浮士德》第五幕中，浮士德失明后以为鬼怪是在开掘沟渠，但梅非斯特在旁白中揭穿——"没说起沟道，只说掘墓道"。掘墓与开渠的双重意象构成全剧最深刻的反讽。
  书中原文: 梅非斯特：（低声。）根据我所获得的报告，没说起沟道，只说掘墓道。
  网络来源: https://www.211cn.ca/book/faust/?c=52

- 名词: 围垦
  分类: 事件
  解释: 浮士德晚年最重要的工程——围海造田。浮士德打算通过筑堤将海洋与陆地分开，将沼泽等臭水浜加以排除，为几百万人开拓可以自由居住的疆土。围垦工程是浮士德从知识追求转向社会实践改造的最高体现。
  书中原文: 浮士德：铲锹的声音使我多么愉快！那是为我服役的民伕，将围垦地跟陆地连在一处，给波涛划出它的疆界，筑一带坚堤围住海洋。
  网络来源: https://book.douban.com/annotation/133134623/

- 名词: 沼泽
  分类: 地点
  解释: 《浮士德》第五幕中描述的自然地貌——"有一片沼泽横亘在山麓，污染了一切已开拓之地"。浮士德将其视为必须排除的"臭水浜"，将其视为"功亏一篑的大事"。排除沼泽、改良土地是浮士德晚年改造自然工程的重要组成部分。
  书中原文: 浮士德：有一片沼泽横亘在山麓，污染了一切已开拓之地；把这臭水浜加以排除，乃是功亏一篑的大事。
  网络来源: https://book.douban.com/annotation/133134623/

- 名词: 瞎子
  分类: 人物
  解释: 即失明后的浮士德。被忧愁吹瞎眼睛后，浮士德成为瞎子，但他不以肉眼的失明为意，反而宣称"心中却有光明在照耀"。这一形象化用语强调了浮士德精神的转变——肉眼虽盲，心灵之眼却更加明亮。
  书中原文: 浮士德：（失明。）黑夜逼来，好像越来越深沉，可是心中却有光明在照耀。
  网络来源: https://m.zhangyue.com/readbook/12944018/3.html

- 名词: 铲锹
  分类: 物件
  解释: 鬼怪和民伕使用的挖掘工具。在《浮士德》第五幕中，铲锹的挖掘声是连接真实与幻觉的关键意象——浮士德听到铲锹声，认为是民伕在为他围海造田、开掘沟渠；实际上这是鬼怪在为他挖掘坟墓。
  书中原文: 浮士德：（走出宫殿，扶住门框。）铲锹的声音使我多么愉快！那是为我服役的民伕，将围垦地跟陆地连在一处。
  网络来源: https://www.guxuo.com/wgwx/zpj/gede/fsd/167.htm

- 名词: 民伕
  分类: 人物
  解释: 被征募的劳工、民工。在《浮士德》第五幕中，浮士德听到铲锹声以为是"为我服役的民伕"在围海造田，便命令梅非斯特用酒饭和严规招募大批民伕。浮士德将民伕视为实现其自由土地理想的建设者，但实际上挖掘的是鬼怪而非民伕。
  书中原文: 浮士德：督工！梅非斯特：有！浮士德：你要想一切法子，前去招募大批民伕，用酒饭和严规加以鼓舞，出钱、诱骗或者压制！
  网络来源: https://book.douban.com/annotation/124534803/

- 名词: 坚堤
  分类: 物件
  解释: 浮士德围海造陆工程中修筑的坚固堤坝。浮士德命令筑一带"坚堤"围住海洋，以保护围垦地不受海涛侵蚀。这一意象体现了人类以工程手段征服自然、改造自然的雄心，也呼应了梅非斯特关于"为尼普顿备好筵席"的讽刺。
  书中原文: 浮士德：将围垦地跟陆地连在一处，给波涛划出它的疆界，筑一带坚堤围住海洋。
  网络来源: https://www.guxuo.com/wgwx/zpj/gede/fsd/167.htm

- 名词: 时钟停了
  分类: 事件
  解释: 浮士德倒地死亡时的标志性意象。在《浮士德》第五幕中，浮士德说出"停一停吧，你真美丽"后向后倒下死去，梅非斯特宣布"时钟停了"，合唱应和"停了！默然如在中宵。时针垂降。"时钟停止象征浮士德生命的终结，也呼应了第一部中浮士德与魔鬼赌约的条件。
  书中原文: 梅非斯特：时间胜利了，老人倒在砂地上。时钟停了——合唱：停了！默然如在中宵。时针垂降。
  网络来源: https://www.guxuo.com/wgwx/zpj/gede/fsd/168.htm

- 名词: 埋葬
  分类: 事件
  解释: 浮士德死后鬼怪们为其举行埋葬的仪式。在《浮士德》第五幕中，鬼怪一边挖土一边独唱合唱关于生命短暂的歌曲，梅非斯特则准备在埋葬后收取浮士德的灵魂——但天使最终降临，抢走了浮士德的灵魂。埋葬场景是浮士德尘世生涯的终结。
  书中原文: 鬼怪（独唱）：这间房子是谁用铲锹建造得如此粗糙？众鬼怪（合唱）：披麻衣的阴沉的过客，对你已可算太好。
  网络来源: https://www.guxuo.com/wgwx/zpj/gede/fsd/168.htm

- 名词: 血书的字条
  分类: 物件
  解释: 浮士德与梅非斯特立约时用血写下的契约字条。在《浮士德》第五幕浮士德死后，梅非斯特准备出示"血书的字条"以收取浮士德的灵魂，但感叹如今世人方法很多，从恶魔手里把灵魂抢走。血书契约象征着浮士德与魔鬼之间不可逆转的交易。
  书中原文: 梅非斯特：肉体躺下，灵魂却想逃走，我要赶快出示血书的字条；——可叹如今世人的方法真不少，从恶魔手里把灵魂抢走。
  网络来源: https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7/20411089

- 名词: 肉体
  分类: 概念
  解释: 与灵魂相对的物质生命载体。在《浮士德》第五幕中，浮士德死后，梅非斯特说"肉体躺下，灵魂却想逃走"，意指浮士德的肉体已死亡，但灵魂试图逃离魔鬼的控制。肉体的消亡与灵魂的争夺构成该幕的核心冲突。
  书中原文: 梅非斯特：肉体躺下，灵魂却想逃走，我要赶快出示血书的字条。
  网络来源: https://www.guxuo.com/wgwx/zpj/gede/fsd/168.htm

- 名词: 黑暗
  分类: 概念
  解释: 浮士德失明后遭遇的外部环境状态，也是忧愁加诸浮士德的精神状态。在《浮士德》第五幕中，忧愁宣称"永恒的黑暗笼罩住他，太阳不升起也不落下"。但浮士德失明后宣称"黑夜逼来，好像越来越深沉，可是心中却有光明在照耀"，体现了精神光明对物理黑暗的超越。
  书中原文: 忧愁：永恒的黑暗笼罩住他，太阳不升起也不落下，外部感觉虽属完全，内心却被黑暗侵占。
  网络来源: https://m.zhangyue.com/readbook/12944018/3.html

- 名词: 尘世
  分类: 概念
  解释: 即人间的、世俗的世界。在《浮士德》第五幕中，浮士德宣称"尘世的一切我已充分看穿，再不存什么指望要超升彼岸"。浮士德拒绝彼岸世界的幻想，坚持立足尘世、积极行动的人生态度。他的"尘世生涯的痕迹"不会消逝，体现了他对现世意义的肯定。
  书中原文: 浮士德：尘世的一切我已充分看穿，再不存什么指望要超升彼岸；蠢人才眨着眼睛向那边仰望，以为有他的同类在云端之上。
  网络来源: https://book.douban.com/subject/1869786/blockquotes

- 名词: 永恒
  分类: 概念
  解释: 超越时间的存在状态。《浮士德》中多次涉及"永恒"主题：浮士德追求精神的不朽与永恒的价值；梅非斯特则站在虚无主义的立场宣称"永恒的创造于我们何补！被创造的又使它复归于无！"。浮士德的灵魂最终升入永恒，使永恒战胜了虚无。
  书中原文: 梅非斯特：过去！一句蠢话！干嘛说过去？过去和全无是完全一样的同义语！永恒的创造于我们何补！被创造的又使它复归于无！
  网络来源: https://www.guxuo.com/wgwx/zpj/gede/fsd/168.htm

- 名词: 瞬间
  分类: 概念
  解释: 《浮士德》全剧的核心哲学概念。浮士德与魔鬼打赌的关键在于"瞬间"——如果浮士德对某一瞬间感到满足并说出"停一停吧，你真美丽"，他就输了赌约。浮士德宣称"在任何瞬间都不会满足"，体现了永不停止的追求精神。但临终前他终于在理想实现的幻觉中对"最高的瞬间"感到满足。
  书中原文: 浮士德：在任何瞬间都不会满足。……那时，让我对那一瞬间开口：停一停吧，你真美丽！我的尘世生涯的痕迹就能够永世永劫不会消逝。
  网络来源: https://www.zhihu.com/question/20416835
