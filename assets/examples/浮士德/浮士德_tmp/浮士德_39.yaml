- 名词: 俄狄浦斯
  分类: 人物
  解释: 希腊神话中忒拜（底比斯）的国王，因破解斯芬克斯之谜而闻名。出生时神谕预言他将"弑父娶母"，虽竭力逃避却终究应验，成为西方文学中最经典的命运悲剧人物。索福克勒斯据此创作了著名悲剧《俄狄浦斯王》。
  书中原文: 俄狄浦斯曾经面对过她们。
  网络来源: https://baike.baidu.com/item/%E4%BF%84%E7%8B%84%E6%B5%A6%E6%96%AF/1063470

- 名词: 尤利斯
  分类: 人物
  解释: 即奥德修斯（Odysseus）的拉丁文名Ulysses的中译。希腊神话中伊萨卡国王，特洛伊战争中的英雄，以木马计攻克特洛伊。战后漂泊十年才返回家乡，荷马史诗《奥德赛》即讲述其漂泊故事。
  书中原文: 尤利斯以麻绳自捆，逃避她们。
  网络来源: https://baike.baidu.com/item/%E5%A5%A5%E5%BE%B7%E4%BF%AE%E6%96%AF/83270

- 名词: 赫拉克勒斯
  分类: 人物
  解释: 希腊神话中最伟大的英雄，主神宙斯与凡女阿尔克墨涅之子。因发疯误杀妻儿，为赎罪完成了著名的十二项功绩（十二试炼），死后升天成为大力神，即罗马神话中的赫丘利（Hercules）。
  书中原文: 我们的末代被赫拉克勒斯杀害
  网络来源: https://baike.baidu.com/item/%E8%B5%AB%E6%8B%89%E5%85%8B%E5%8B%92%E6%96%AF/10737523

- 名词: 阿尔喀得斯
  分类: 人物
  解释: 又译阿尔喀德斯（Alcides），希腊神话英雄赫拉克勒斯出生时的原名。赫拉克勒斯因赫拉的诅咒发疯杀害自己的孩子后，前往德尔斐求问神谕，女祭司首次称他为"赫拉克勒斯"——在此之前他被称为阿尔喀得斯。
  书中原文: 阿尔喀得斯也无法射中
  网络来源: https://baike.baidu.com/item/%E8%B5%AB%E6%8B%89%E5%85%8B%E5%8B%92%E6%96%AF/426338

- 名词: 铁翅鸟
  分类: 概念
  解释: 希腊神话中的斯廷法利斯湖怪鸟（Stymphalian Birds），长着铁/铜质的翅膀、喙和利爪，抖落的羽毛如飞箭般致命。它们是战神阿瑞斯的宠物，后被赫拉克勒斯用铜钹巨响驱赶，作为其十二功绩中的第六项。
  书中原文: 它们乃是迅疾的铁翅鸟
  网络来源: https://baike.baidu.com/item/%E6%96%AF%E5%BB%B7%E6%B3%95%E5%88%A9%E6%96%AF%E6%B9%96%E6%80%AA%E9%B8%9F

- 名词: 勒耳那水蛇
  分类: 概念
  解释: 即勒拿九头蛇（Lernaean Hydra），希腊神话中栖息在勒拿沼泽的九头水蛇精怪，堤丰与厄喀德那所生。每砍掉一个头会再生出两个，赫拉克勒斯在侄子伊俄拉俄斯帮助下用火烧灼断颈才将其杀死，作为十二功绩中的第二项。后化为长蛇座。
  书中原文: 那些乃是勒耳那水蛇的头
  网络来源: https://baike.baidu.com/item/%E6%B5%B7%E5%BE%B7%E6%8B%89/80185

- 名词: 拉弥亚
  分类: 人物
  解释: 希腊神话中的女妖，上半身为美女、下半身为蛇身。原为利比亚女王，是宙斯的情妇，因天后赫拉嫉妒而失去了孩子，从此变成专门偷食他人孩子、吸吮少年鲜血的怪物，被视为西方最早的吸血鬼原型之一。
  书中原文: 那些拉弥亚，风流的荡妇
  网络来源: https://baike.baidu.com/item/%E6%8B%89%E5%AF%86%E4%BA%9A/6163672

- 名词: 羊人
  分类: 概念
  解释: 即萨提尔（Satyr），希腊神话中的森林之神，半人半羊形象——长着羊角、羊腿和尾巴。性格好色、嗜酒、狂欢，是酒神狄俄倪索斯的随从。古希腊悲剧演出后常加演轻松诙谐的"羊人剧"以调剂气氛。
  书中原文: 很讨羊人们的欢喜
  网络来源: https://baike.baidu.com/item/%E8%90%A8%E8%92%82%E5%B0%94/3418264

- 名词: 金字塔
  分类: 地点
  解释: 古埃及法老（国王）的陵墓，主要建于古王国时期（约公元前2686-前1786年），因外形似汉字"金"字而得名。最著名的是吉萨三大金字塔（胡夫金字塔、哈夫拉金字塔、门卡乌拉金字塔），其中胡夫金字塔为古代世界七大奇迹之一。
  书中原文: 我们坐在金字塔前
  网络来源: https://baike.baidu.com/item/%E9%87%91%E5%AD%97%E5%A1%94/2608533

- 名词: 珀涅俄斯河神
  分类: 人物
  解释: 希腊神话中塞萨利亚地区珀涅俄斯河的河神，大洋神俄刻阿诺斯与泰西斯之子。其女达佛涅（Daphne）被阿波罗追求时，珀涅俄斯将其变成月桂树，从此月桂成为阿波罗的圣树（桂冠的由来）。
  书中原文: 珀涅俄斯河下游河神珀涅俄斯为沼泽与水精们所围绕
  网络来源: https://www.theoi.com/Potamos/PotamosPeneios.html

- 名词: 菲吕拉
  分类: 人物
  解释: 希腊神话中的大洋神女（俄刻阿尼得斯），俄刻阿诺斯与泰西斯之女。与泰坦巨神克洛诺斯生下著名的半人马智者刻戎（Chiron），因见儿子半人半马的怪异模样而将其遗弃，后变为一棵椴树。
  书中原文: 是菲吕拉的有名的儿子
  网络来源: https://baike.baidu.com/item/%E8%8F%B2%E5%90%95%E6%8B%89/8905468

- 名词: 天鹅
  分类: 概念
  解释: 希腊神话中与宙斯化身相关的著名意象。宙斯为追求斯巴达王后丽达（Leda），化身为一只白天鹅，与其结合后生下两颗天鹅蛋，孵出了绝世美女海伦（特洛伊战争的导火索）和波吕克斯（双子座之一）等。西方艺术史上"丽达与天鹅"是反复描绘的经典题材。
  书中原文: 天鹅一群也从水湾处游到附近，姿态威严而且高雅。
  网络来源: https://baike.baidu.com/item/%E4%B8%BD%E8%BE%BE%E5%92%8C%E5%A4%A9%E9%B9%85/5000288
