- 名词: 代福玻斯
  分类: 人物
  解释: 希腊神话中的特洛伊王子，普里阿摩斯与赫卡柏之子，赫克托尔和帕里斯的兄弟。帕里斯死后娶海伦为妻。特洛伊沦陷时被墨涅拉斯残酷杀害（割去耳鼻等）。在《浮士德》中，福耳库阿斯以代福玻斯的悲惨遭遇警告海伦，墨涅拉斯会以同样手段对待她。
  书中原文: 你难道忘记王上对你的代福玻斯，战死的帕里斯的兄弟，闻所未闻地毁伤他形体？他硬要追求你这位寡妇，幸运地收你为侧室。他被割去了耳鼻，还有更甚的酷刑；真是惨不忍睹。
  网络来源: https://zh.wikipedia.org/zh-hant/%E5%BE%97%E4%BC%8A%E7%A6%8F%E7%8E%BB%E6%96%AF

- 名词: 廷达瑞俄斯
  分类: 人物
  解释: 希腊神话中的斯巴达国王，妻子勒达。被兄弟希波科翁篡位流亡，后由赫拉克勒斯帮助复位。其著名的"廷达瑞俄斯誓言"要求所有求婚者发誓保卫海伦的婚姻选择，这一誓言日后成为特洛伊战争的合法性依据。在《浮士德》中，福耳库阿斯提到"廷达瑞俄斯王宫周围的地方"以显示斯巴达的困境。
  书中原文: 如今廷达瑞俄斯王宫周围的地方是什么情况？四周的国土又是怎样？
  网络来源: https://www.wikiwand.com/zh/articles/%E5%BB%B7%E9%81%94%E6%9F%94%E6%96%AF

- 名词: 埃阿斯
  分类: 人物
  解释: 大埃阿斯（Ajax），希腊神话中忒拉蒙之子，特洛伊战争中的希腊猛将，仅次于阿喀琉斯。身材魁梧、作战勇猛，曾与赫克托耳单挑不分胜负。阿喀琉斯死后，因与奥德修斯争夺其铠甲失败而发狂自杀。在《浮士德》中，福耳库阿斯以其盾牌上的盘蛇纹章为例说明纹章的含义。
  书中原文: 就像埃阿斯画在盾牌上面的盘蛇，你们都曾经见过。
  网络来源: https://baike.baidu.com/item/%E5%A4%A7%E5%9F%83%E9%98%BF%E6%96%AF/1850567

- 名词: 欧洛塔斯河
  分类: 地点
  解释: 希腊伯罗奔尼撒半岛的一条河流，发源于塔宇革同山，流经斯巴达，注入拉科尼亚湾。全长约82公里，斯巴达城即位于其西岸。河岸以芦苇和天鹅闻名。在《浮士德》中，福耳库阿斯描述欧洛塔斯河流经山谷，沿岸繁殖天鹅。
  书中原文: 背倚塔宇革同山，有一条活泼的溪流、欧洛塔斯河流出，流经我们的山谷，沿着芦岸而下，繁殖着你们的天鹅。
  网络来源: https://baike.baidu.com/item/%E5%9F%83%E5%A4%AB%E7%BD%97%E5%A1%94%E6%96%AF%E6%B2%B3/4916261

- 名词: 塔宇革同山
  分类: 地点
  解释: 希腊伯罗奔尼撒半岛南部山脉，位于斯巴达以西，最高峰为先知埃利亚斯山。山脉得名于希腊神话中的普勒阿得斯姐妹之一塔宇革忒（宙斯所爱，生拉刻代蒙，即斯巴达的建立者）。在《浮士德》中，福耳库阿斯提到斯巴达北部高地背倚此山。
  书中原文: 在斯巴达的后面，往北方去的高地，有一片山谷，多年以来无人居住，背倚塔宇革同山，有一条活泼的溪流。
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%A1%94%E5%AE%87%E9%9D%A9%E5%BF%92

- 名词: 伊利俄斯
  分类: 地点
  解释: 特洛伊的别称，源自希腊语Ἴλιον（Ilion）。由特罗斯之子伊洛斯建立。荷马史诗《伊利亚特》之名即由此而来，意为"伊利昂之歌"。在《浮士德》中，福耳库阿斯提到墨涅拉斯围攻伊利俄斯十年，合唱队也提到伊利俄斯城堡因奸计沦陷。
  书中原文: 他围攻伊利俄斯，花了十年的时间；在他归航的路上，又不知耽搁了多久。
  网络来源: https://zh.wikipedia.org/zh-hant/%E4%BC%8A%E5%88%A9%E4%BA%9A%E7%89%B9

- 名词: 铿墨里人
  分类: 概念
  解释: 希腊神话中居住在永恒黑暗之地的神秘民族。荷马在《奥德赛》中描述他们生活在大洋河彼岸的世界尽头，终年被迷雾笼罩，阳光永远无法照耀——即"黑暗之国"。历史上也确有铿墨里人（Cimmerians），为黑海北岸的印欧游牧民族，公元前7世纪曾入侵小亚细亚。在《浮士德》中，福耳库阿斯说一个勇敢的种族从铿墨里人的黑暗之国侵入而定居。
  书中原文: 从铿墨里人的黑暗之国侵入而定居，他们筑起难以攀登的坚固的城堡。
  网络来源: https://pantheon.org/articles/c/cimmerians.html

- 名词: 金剪刀
  分类: 物件
  解释: 希腊神话中命运三女神之一阿特洛波斯（Atropos）手中的剪刀，用于剪断人的生命之线。在《浮士德》中，合唱队向命运女神祈求收起金剪刀（即不要剪断她们的生命线），以求得救。
  书中原文: 你这位命运女神中最尊贵、最明智的巫女，请先把金剪刀收起，指点我们光明和出路。
  网络来源: https://www.guxuo.com/wgwx/zpj/gede/fsd/131.htm

- 名词: 纹章
  分类: 概念
  解释: 欧洲中世纪发展起来的盾牌识别标记体系，广义上也指古希腊盾牌上的装饰图案。在《浮士德》中，福耳库阿斯向合唱队解释纹章，以埃阿斯盾牌上的盘蛇、七将攻忒拜时盾牌上的图样为例，描述城堡大厅中悬挂的狮子、老鹰、玫瑰等纹章图案。
  书中原文: 什么叫纹章？就像埃阿斯画在盾牌上面的盘蛇，你们都曾经见过。进攻忒拜的七将在他们的盾牌上也各自画上各种富有意义的图样。
  网络来源: https://www.wikiwand.com/zh-hans/articles/%E7%BA%B9%E7%AB%A0%E5%AD%A6

- 名词: 冥府
  分类: 地点
  解释: 希腊神话中死者灵魂居住的阴间，由冥王哈迪斯统治。位于西方大洋河彼岸，灵魂需经冥河由摆渡人卡戎运送，由三头狗刻耳柏洛斯看守。分为普通灵魂之地阿斯珀德罗斯、英雄福地厄吕西翁和惩罚之地塔耳塔洛斯。在《浮士德》中，合唱队在雾气中感到迷茫，担心被赫耳墨斯引回冥府。
  书中原文: 被不可捉摸的鬼影充满着、挤满着的、永远空虚的冥府？
  网络来源: https://www.qulishi.com/article/202103/489879.html

- 名词: 城堡
  分类: 地点
  解释: 《浮士德》第二部第三幕中福耳库阿斯向海伦描述的中世纪城堡，位于斯巴达以北的深山之中，由一个勇敢的种族（浮士德的势力）所建。城墙砌工精良、高耸云霄，内部有宽敞庭院、圆柱、拱顶、阳台和走廊，大厅悬挂纹章。海伦最终决定前往该城堡，城堡内院成为浮士德与海伦相遇结合的场景。
  书中原文: 再说他的城堡，请你们亲眼去瞧！它不同于你们这种粗笨的城墙...他砌的城墙，有直放，有平放，井井有条。从外表看它！它简直是高耸云霄，坚固，接缝很好，像钢一样光滑。
  网络来源: https://www.guxuo.com/wgwx/zpj/gede/fsd/133.htm

- 名词: 合唱队
  分类: 概念
  解释: 古希腊戏剧（尤其是悲剧）的重要组成部分，起源于酒神祭奠仪式。在《浮士德》第二部第三幕中，合唱队由被俘的特洛伊侍女组成，她们伴随海伦，以歌唱和舞蹈表达情感、评论剧情、烘托气氛。该幕中合唱队与福耳库阿斯对话，表达恐惧、希望和赞美，是推动剧情的重要元素。
  书中原文: 合唱队：耐心很足！我们听听就能活命。（以及全幕中合唱队的多段唱词）
  网络来源: https://www.chinawriter.com.cn/n1/2021/0706/c404090-32149481.html
