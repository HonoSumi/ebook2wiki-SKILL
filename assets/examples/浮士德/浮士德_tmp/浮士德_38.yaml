- 名词: 古典的瓦尔普吉斯之夜
  分类: 事件
  解释: 歌德《浮士德·第二部》第二幕第三场，全剧最长、最驳杂的一场（1483诗行）。与第一部中德国布罗肯山的中世纪哥特式女巫狂欢相对，古典的瓦尔普吉斯之夜发生在古希腊忒萨利亚地区，展示古希腊神话中的妖魔、精灵、神怪，是歌德晚年对古希腊文化"丑的美学"的探索，融合了滑稽剧、讽刺剧和轻歌剧形式。
  书中原文: "我忽然想起，现在正是古典的瓦尔普吉斯之夜；这样真是最好不过，送他前去适宜的场所。"
  网络来源: https://wap.cnki.net/touch/web/Journal/Article/MZXS202020070.html

- 名词: 荷蒙库路斯
  分类: 人物
  解释: 歌德《浮士德》中由瓦格纳用化学方法在烧瓶中制造的人造人（Homunculus），源自中世纪炼金术传说。他只有精神没有肉体，依靠玻璃瓶维持存在，能够看穿浮士德的梦境。在"古典的瓦尔普吉斯之夜"中，他担当引路人的角色，引导浮士德飞往希腊古典世界寻求海伦。最终他撞碎在爱琴海伽拉忒亚的贝车旁，通过"死和变"（Stirb und Werde）获得真实的生命。
  书中原文: "荷蒙库路斯　　这怎么会传到你的耳里？你知道的只不过是浪漫的妖精，真正的妖精也必需古典的才行。"
  网络来源: https://baike.baidu.com/item/%E8%8D%B7%E8%92%99%E5%BA%93%E9%B2%81%E6%96%AF/10815983

- 名词: 忒萨利亚的魔女
  分类: 人物
  解释: 古希腊忒萨利亚（Thessaly，又译色萨利、帖撒利亚）地区的女巫群体，以能够"拖下月亮"（draw down the moon）而闻名。忒萨利亚在古希腊被视为巫术和草药魔法的中心。最著名的忒萨利亚女巫是阿格莱奥妮丝（Aglaonice），她实际掌握了月食预测的天文知识，被时人视为女巫。在《浮士德》中，梅非斯特对忒萨利亚的魔女表现出浓厚的兴趣。
  书中原文: "忒萨利亚的魔女！她们正是我已打听了许久的人。"
  网络来源: https://en.wikipedia.org/wiki/Aglaonice

- 名词: 厄里克托
  分类: 人物
  解释: 古罗马文学中的著名女巫，最早出现在卢坎（Lucan）史诗《法撒利尔》（Pharsalia）第六卷中，来自希腊忒萨利亚地区，精通死灵术。在但丁《神曲·地狱篇》中也有提及。在歌德《浮士德·第二部》"古典的瓦尔普吉斯之夜"开场时，厄里克托是第一个说话的角色，以预言者身份出现在法尔萨洛斯战场上，当浮士德等人到达时她匆忙逃跑。
  书中原文: "今夜又是恐怖的节日，我一如既往，来到这里，我是阴森的厄里克托。"
  网络来源: https://zh.wikipedia.org/zh/%E8%89%BE%E5%88%A9%E5%85%8B%E6%89%98

- 名词: 安泰
  分类: 人物
  解释: 安泰俄斯（Antaeus），希腊神话中的巨人，海神波塞冬与大地女神盖亚之子。他力大无穷，只要与大地（母亲盖亚）保持接触，就能持续获取无限的力量。英雄赫拉克勒斯发现其秘密后将他举到空中，使其脱离大地最终扼死。在《浮士德》中，浮士德到达希腊后感叹自己像安泰一样从大地获得力量。现代常用来比喻精神力量不能脱离物质基础。
  书中原文: "我这沉睡者，焕发出新的精神，我就觉得像安泰一样站稳。"
  网络来源: https://baike.baidu.com/item/%E5%AE%89%E6%B3%B0%E4%BF%84%E6%96%AF/6381837

- 名词: 阿里马斯波族
  分类: 人物
  解释: 阿里马斯波人（Arimaspi），古希腊文献中记载的独眼民族，居住在北方阿尔泰山区。名称源自斯基泰语"arima"（一）+ "spou"（眼），意为"独目人"。传说他们与守护黄金的格里芬（狮鹫）不断交战以夺取黄金。最早见于公元前7世纪希腊诗人阿里斯忒阿斯的长诗《独目人》（Arimaspea）。在《浮士德》中出现在"古典的瓦尔普吉斯之夜"场景。
  书中原文: "却被阿里马斯波族人知道，被他们搬得老远，让他们讪笑。"
  网络来源: https://www.theoi.com/Phylos/Arimaspoi.html

- 名词: 独眼族人
  分类: 人物
  解释: 独眼巨人（Cyclops/库克罗普斯），希腊神话中额前正中长有一只眼睛的巨人种族。有两个版本：赫西俄德《神谱》中的三位初代独眼巨人（布戎忒斯、斯特洛珀斯、阿尔革斯）是工匠神，为宙斯锻造雷电；荷马《奥德赛》中的波吕斐摩斯则是野蛮食人的独眼巨人。现代学者认为传说可能源于古希腊人在西西里岛发现的矮象化石（鼻骨孔被误认为眼窝）。在《浮士德》中出现在古典的瓦尔普吉斯之夜。
  书中原文: "独眼族人　别在这自由欢乐的良宵。天亮以前全都会花掉，我们这次决不会失败。"
  网络来源: https://baike.baidu.com/item/%E7%8B%AC%E7%9C%BC%E5%B7%A8%E4%BA%BA/964189

- 名词: 恺撒
  分类: 人物
  解释: 盖乌斯·尤利乌斯·恺撒（Gaius Julius Caesar，公元前100年—前44年），罗马共和国末期的军事统帅、政治家、作家，被誉为罗马的"国父"。公元前49年率军渡过卢比孔河引发内战，公元前48年在法尔萨洛斯战役（Battle of Pharsalus）中以少胜多击败庞培，成为罗马的独裁官。在《浮士德》"古典的瓦尔普吉斯之夜"中，厄里克托提及恺撒在法尔萨洛斯战场彻夜守望，暗示这场决定性的历史战役。
  书中原文: "那边，恺撒彻夜守望过动摇的指针！胜负待分。世人都知道谁获得胜利。"
  网络来源: https://zh.wikipedia.org/zh-sg/%E6%B3%95%E8%90%A8%E5%8D%A2%E6%96%AF%E6%88%98%E5%BD%B9
