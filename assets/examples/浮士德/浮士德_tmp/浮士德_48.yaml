- 名词: 波路克斯
  分类: 人物
  解释: 希腊神话中的英雄，与孪生兄弟卡斯托耳合称狄俄斯库里兄弟（宙斯之子），是海伦的异父兄弟。波路克斯的父亲是宙斯，拥有永生；卡斯托耳的父亲是斯巴达国王廷达柔斯，为凡人。兄弟二人从忒修斯手中救出了年幼的海伦。死后化为双子座。在《浮士德》中，福耳库阿斯提及海伦被忒修斯拐走后不久被卡斯托耳和波路克斯救出。
  书中原文: 不久被卡斯托耳和波路克斯救出
  网络来源: https://baike.baidu.com/item/%E7%8B%84%E4%BF%84%E6%96%AF%E5%BA%93%E9%87%8C%E5%85%84%E5%BC%9F/0

- 名词: 帕特洛克罗斯
  分类: 人物
  解释: 希腊神话中的英雄，阿喀琉斯的挚友和伴侣。其父墨诺提俄斯是阿尔戈号船员之一，与阿喀琉斯一同师从半人马喀戎。特洛伊战争中，他穿上阿喀琉斯的盔甲代友出战，被特洛伊王子赫克托尔所杀，从而促使阿喀琉斯重返战场为其复仇。在《浮士德》中，海伦坦言帕特洛克罗斯因其酷似阿喀琉斯（珀利得斯）而获得她的欢心。
  书中原文: 那位酷似珀利得斯的帕特洛克罗斯，比别人更获得我的欢心
  网络来源: https://baike.baidu.com/item/%E5%B8%95%E7%89%B9%E6%B4%9B%E5%85%8B%E7%BD%97%E6%96%AF

- 名词: 珀利得斯
  分类: 人物
  解释: 古希腊语父名称谓，意为"佩琉斯之子"，是希腊神话英雄阿喀琉斯（Achilles）的史诗称号。阿喀琉斯是色萨利国王佩琉斯与海洋女神忒提斯之子，特洛伊战争中最著名的希腊主将，除脚踵外全身刀枪不入。在《浮士德》中，海伦提及帕特洛克罗斯酷似珀利得斯（即阿喀琉斯），因而获得她的倾心。
  书中原文: 那位酷似珀利得斯的帕特洛克罗斯，比别人更获得我的欢心
  网络来源: https://zh.wiktionary.org/zh-hant/%CE%A0%CE%B7%CE%BB%CE%B5%CE%AF%CE%B4%CE%B7%CF%82

- 名词: 赫耳弥俄涅
  分类: 人物
  解释: 希腊神话中斯巴达国王墨涅拉俄斯与海伦的独生女，斯巴达公主。特洛伊战争前被祖父廷达瑞俄斯许配给奥瑞斯特斯（阿伽门农之子），战争期间墨涅拉俄斯又将她许配给阿喀琉斯之子奈奥普托勒姆斯。奈奥普托勒姆斯死后，她与奥瑞斯特斯再婚，生子提萨墨诺斯。《哈利·波特》中赫敏（Hermione）的名字即来源于此。在《浮士德》中，海伦向福耳库阿斯述说与墨涅拉俄斯生下赫耳弥俄涅。
  书中原文: 我们在结婚以后生了赫耳弥俄涅
  网络来源: https://zh.wikipedia.org/zh-cn/%E8%B5%AB%E8%80%B3%E5%BC%A5%E4%BF%84%E6%B6%85

- 名词: 厄瑞玻斯
  分类: 概念
  解释: 希腊神话中的原始神祇之一，是永久黑暗的化身。由混沌神卡俄斯直接诞生，是其妹黑夜女神倪克斯的丈夫，生有太空之神埃忒尔和白昼女神赫墨拉。同时，厄瑞玻斯也指地下世界中介于大地与冥土之间的黑暗区域，亡灵必须穿越这片黑暗才能抵达冥界。在《浮士德》中，福耳库阿斯与合唱队相互辱骂时，合唱队员以"你父亲厄瑞玻斯，你母亲黑夜"来嘲讽福耳库阿斯的身世。
  书中原文: 谈谈你父亲厄瑞玻斯，你母亲黑夜
  网络来源: https://baike.baidu.com/item/%E5%8E%84%E7%91%9E%E7%8E%BB%E6%96%AF/4387658

- 名词: 斯库拉
  分类: 物件
  解释: 希腊神话中的女海妖，守护在墨西拿海峡一侧，与另一侧的大漩涡卡律布狄斯相对。她长有六个头、十二只脚、口中三排利齿，吞吃过往船只上的水手。原为水仙女，因女巫喀耳刻嫉妒而被变成怪物。英语习语"between Scylla and Charybdis"（进退两难）即源于此。在《浮士德》中，福耳库阿斯与合唱队互相辱骂时被称作"你的嫡亲堂房姐妹斯库拉"。
  书中原文: 谈谈你的嫡亲堂房姐妹斯库拉
  网络来源: https://baike.baidu.com/item/%E6%96%AF%E5%BA%93%E6%8B%89/4670156

- 名词: 忒瑞西阿斯
  分类: 人物
  解释: 希腊神话中底比斯的盲人预言家，拥有非凡的预言能力。曾因手杖击打交配中的蛇而先后变为女性和男性，后宙斯与赫拉争论男女欢爱快感时请他裁决，赫拉怒其回答而将他弄瞎，宙斯补偿他预言能力。在《俄狄浦斯王》中揭示了俄狄浦斯弑父娶母的真相。在《浮士德》中，福耳库阿斯与合唱队互相嘲讽时，合唱队员称"你去找忒瑞西阿斯老头谈情说爱"。
  书中原文: 你去找忒瑞西阿斯老头谈情说爱
  网络来源: https://baike.baidu.com/item/%E5%BF%92%E7%91%9E%E8%A5%BF%E9%98%BF%E6%96%AF/10504450

- 名词: 俄里翁
  分类: 人物
  解释: 希腊神话中的著名猎人，海神波塞冬之子，英俊高大的巨人，能在海面上行走。因追求墨洛珀被刺瞎双眼，后得太阳神阿波罗帮助复明。最终因多种说法而死（被蝎蛰死、被阿尔忒弥斯误杀等），死后化为猎户座。在《浮士德》中，福耳库阿斯与合唱队相互辱骂时，合唱队员称"俄里翁的奶妈乃是你的玄孙女"。
  书中原文: 俄里翁的奶妈乃是你的玄孙女
  网络来源: https://baike.baidu.com/item/%E4%BF%84%E9%87%8C%E7%BF%81/10526882

- 名词: 伊利俄斯
  分类: 地点
  解释: 特洛伊城在希腊神话中的别称，又译作伊利昂，得名于特洛伊建城者伊罗斯。在荷马史诗《伊利亚特》（即《伊利昂纪》）中为特洛伊城的核心称呼，史诗名称即来源于此。现代学者常以伊利俄斯指代特洛伊的卫城，与特洛伊城址互换使用。在《浮士德》中，福耳库阿斯提及海伦"前往由无数城楼环抱的伊利俄斯"享受爱情。
  书中原文: 你前往由无数城楼环抱的伊利俄斯
  网络来源: https://baike.baidu.com/item/%E4%BC%8A%E5%88%A9%E4%BA%9A%E7%89%B9

- 名词: 阿菲德诺斯
  分类: 地点
  解释: 希腊阿提卡地区的城镇阿菲德纳（Aphidna）的国王和同名英雄。忒修斯劫持年幼的海伦后，将她与自己的母亲埃特拉一同托付给阿菲德诺斯看管。海伦的兄长卡斯托耳和波路克斯攻破阿菲德纳，救出海伦并俘获埃特拉。在《浮士德》中，海伦回答福耳库阿斯关于忒修斯拐走她的提问时，说被"关在阿提卡地方阿菲德诺斯的城里"。
  书中原文: 关在阿提卡地方阿菲德诺斯的城里
  网络来源: https://referenceworks.brillonline.com/entries/brill-s-new-pauly/aphidnus-e127190

- 名词: 酒神狂女
  分类: 概念
  解释: 即迈那得斯（Maenads），古希腊宗教中侍奉酒神狄俄倪索斯的女性信徒团体。"迈那得斯"一词直译为"发狂的人"或"狂女"。她们头戴常春藤冠、身披鹿皮、手持酒神杖，在祭典中饮酒狂欢至迷狂状态，在山林中疯狂舞蹈，甚至撕裂野兽生食其肉。在《浮士德》中，福耳库阿斯斥责合唱队"像酒神狂女，醉醺醺似地吵吵闹闹"。
  书中原文: 你们是谁，竟敢在王上高贵的宫中像酒神狂女，醉醺醺似地吵吵闹闹？
  网络来源: https://baike.baidu.com/item/%E8%BF%88%E9%82%A3%E5%BE%97%E6%96%AF/7672666

- 名词: 幻身
  分类: 概念
  解释: 歌德在《浮士德》中借用的希腊神话概念，指海伦具有两个化身的传说——一个在特洛伊（伊利俄斯），一个在埃及。海伦在剧中自称"不过是幻象"，暗示古典美的虚幻性以及现代人无法真正回归古希腊的理想。这一概念源自欧里庇得斯等希腊作家的变体传说：真正的海伦从未到特洛伊，被赫尔墨斯带到埃及，一个幻影替身去了特洛伊引发战争。
  书中原文: 那是我的幻身跟他的幻身结合。那是一场梦而已，传说也是这样讲。我像要消逝，自己也像要变成幻身。
  网络来源: https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7/1895
