- 名词: 魔女的丹房
  分类: 地点
  解释: 歌德《浮士德》第一部第六场场景，即女巫的厨房/炼药房。浮士德在梅非斯特引导下至此，喝下魔女汤药返老还童，并在魔镜中看到完美女性形象，标志着浮士德从理性书斋走向感官世界的转折点。该场景充满荒诞混乱的象征元素（长尾猿、魔镜、魔锅等），是对中世纪炼金术和神秘主义的戏仿。
  书中原文: 第六场 魔女的丹房
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 魔镜
  分类: 物件
  解释: 歌德《浮士德》魔女丹房场景中的关键道具。浮士德在镜中看到天仙般的美女形象，被深深吸引，时而近前时而退后。魔镜象征着浮士德内心深处被压抑的欲望的投射，预示了后续与玛甘泪的爱情悲剧，以及浮士德从理性追求转向感官体验的转折。
  书中原文: 什么？一个天女的姿影映现在这面魔镜之中！
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 返老还童
  分类: 概念
  解释: 《浮士德》第六场的核心主题。梅非斯特为年迈的浮士德提供两种方案：一是到田间耕耘、过简朴劳动生活的天然良方，二是找魔女调制汤药的魔法途径。浮士德拒绝劳动生活而选择魔女汤药，饮后恢复青春。这一情节象征浮士德摆脱中世纪书斋禁锢、重新投入世俗人生与感官体验的重大转折。
  书中原文: 使你返老还童，自有天然良方
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 炼狱
  分类: 概念
  解释: 天主教教义中的重要概念，指人死后尚未完全净化的灵魂在进入天堂之前经历的一个暂时性炼净过程或状态。与地狱不同，炼狱是有限期的过渡阶段，其中的灵魂深知自己必然得救，在世信徒可通过祈祷、弥撒等方式帮助他们早日升天。在《浮士德》注释中用于对比说明地狱的概念。
  书中原文: 人死后，没有做尽补赎的灵魂受暂罚的处所称为炼狱。与地狱不同，地狱是魔鬼和恶人永远受苦的处所。
  网络来源: https://zh.wikipedia.org/wiki/炼狱

- 名词: 地狱
  分类: 概念
  解释: 天主教教义中魔鬼和恶人永远受苦的终极归宿，是与天主永远分离的永恒状态。地狱并非天主主动惩罚人的地方，而是人因自由意志选择拒绝天主之爱、永远与天主隔绝的结果。其最大痛苦在于永远不能面见天主。在《浮士德》中常被提及，梅非斯特作为地狱之火的友伴，火被视为恶魔的元素。
  书中原文: 地狱是魔鬼和恶人永远受苦的处所。
  网络来源: https://baike.baidu.com/item/地狱/173856

- 名词: 跳蚤歌
  分类: 事件
  解释: 歌德《浮士德》第一部第五场奥尔巴赫地下酒店中梅非斯特所唱的一首讽刺歌曲。讲述一位国王豢养一只大跳蚤，给它穿龙袍、封宰相，亲戚也都沾光升官。歌词以跳蚤影射封建宫廷中的宠臣弄臣，讽刺国王昏庸和佞臣政治。此歌后被穆索尔斯基等作曲家谱曲，成为世界经典声乐作品。
  书中原文: 与上文跳蚤歌中宫廷居官者的不自由相呼应。
  网络来源: https://wapbaike.baidu.com/item/跳蚤之歌/5325103

- 名词: 长尾猿
  分类: 人物
  解释: 《浮士德》魔女丹房场景中出现的猴子角色，包括雌长尾猿（在锅旁撇去浮泡）、雄长尾猿和小猿们。它们表演掷骰子、滚球（象征世界）、拿筛子、捧王冠等滑稽动作。长尾猿象征着低级、愚昧、原始的人类本能，是人类自身的滑稽镜像，暗示人类在追求知识、财富、爱情时往往同样可笑而盲目。
  书中原文: 雌长尾猿坐在锅旁撇去浮泡，防其沸溢。雄长尾猿和小猿们坐在旁边取暖。
  网络来源: https://book.qq.com/book-read/40527688/14
