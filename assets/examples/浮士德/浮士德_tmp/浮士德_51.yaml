- 名词: 涅斯托耳
  分类: 人物
  解释: 希腊神话中皮洛斯（皮罗斯）的国王，特洛伊战争期间希腊联军中最年长睿智的将领，以善于辞令和富有经验著称，曾调解阿伽门农与阿喀琉斯的争端。在西方文化中，"涅斯托耳"一名常代指经验丰富的长者。
  书中原文: 我们在皮罗斯登陆，老涅斯托耳已不在世上
  网络来源: https://baike.baidu.com/item/%E6%B6%85%E6%96%AF%E6%89%98%E5%B0%94/8197476

- 名词: 皮罗斯
  分类: 地点
  解释: 又译皮洛斯，古希腊伯罗奔尼撒半岛西南部麦西尼亚地区的港口城镇，是荷马史诗中涅斯托耳王国的所在地。该地以迈锡尼文明的宫殿遗址（"涅斯托耳的宫殿"）和1827年纳瓦里诺海战而闻名。
  书中原文: 我们在皮罗斯登陆，老涅斯托耳已不在世上
  网络来源: https://baike.baidu.com/item/%E7%9A%AE%E6%B4%9B%E6%96%AF/12755916

- 名词: 科林斯
  分类: 地点
  解释: 古希腊最重要城邦之一，位于伯罗奔尼撒半岛东北部，扼守科林斯地峡这一战略要冲。商业繁荣，创造了"科林斯柱式"，曾是阿佛洛狄忒崇拜中心。在《浮士德》中由日耳曼人筑垒防守。
  书中原文: 日耳曼人！科林斯海港由你们去筑垒防守
  网络来源: https://baike.baidu.com/item/%E7%A7%91%E6%9E%97%E6%96%AF/61980

- 名词: 阿开亚
  分类: 地点
  解释: 又译亚该亚，位于伯罗奔尼撒半岛北部的一个历史地区。在荷马史诗中常用"阿开亚人"统称全体希腊人。公元前4世纪该地城邦组成"亚该亚同盟"，罗马时期设亚该亚行省。在《浮士德》中由哥特人征战。
  书中原文: 多峡谷的阿开亚地方，哥特人，由你们去战斗
  网络来源: https://baike.baidu.com/item/%E4%BA%9A%E8%AF%A5%E4%BA%9A/8097317

- 名词: 厄利斯
  分类: 地点
  解释: 又译伊利斯、埃利斯，古希腊伯罗奔尼撒半岛西北部的一个地区及城邦。以其境内的奥林匹亚闻名——公元前776年首届古代奥林匹克运动会即在此创办，此后每四年举办一届。在《浮士德》中由法兰克人征伐。
  书中原文: 法兰克人开往厄利斯，墨塞涅由萨克森人应战
  网络来源: https://baike.baidu.com/item/%E4%BC%8A%E5%88%A9%E6%96%AF/1315337

- 名词: 墨塞涅
  分类: 地点
  解释: 又译美塞尼亚、麦西尼，古希腊伯罗奔尼撒半岛西南部的重要城邦。公元前369年由底比斯名将伊巴密浓达建立，拥有全希腊最精美的城墙。该地区曾经历三次美塞尼亚战争，被斯巴达征服，居民沦为希洛人。在《浮士德》中由萨克森人应战。
  书中原文: 墨塞涅由萨克森人应战
  网络来源: https://baike.baidu.com/item/%E9%BA%A6%E8%A5%BF%E5%B0%BC%E4%BA%9A%E5%B7%9E/6726733

- 名词: 阿耳戈利斯
  分类: 地点
  解释: 又译阿尔戈利斯，古希腊伯罗奔尼撒半岛东北部的一个历史地区，是迈锡尼文明的核心区域，拥有迈锡尼、梯林斯等著名遗址。荷马史诗中阿伽门农的都城迈锡尼即在此地。在《浮士德》中由诺尔曼人扩充地盘。
  书中原文: 诺尔曼人去歼灭水师，扩充阿耳戈利斯地盘
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E5%B0%94%E6%88%88%E5%88%A9%E6%96%AF%E5%B7%9E/6726561

- 名词: 半岛
  分类: 地点
  解释: 指伯罗奔尼撒半岛，位于希腊南部，以科林斯地峡与希腊大陆相连。是古希腊神话与历史的中心舞台，斯巴达、科林斯、阿尔戈斯等著名城邦均位于此。在《浮士德》中，浮士德将此地献给海伦作为女王领土。
  书中原文: 半岛啊，他们争着保卫你，你的四周波涛澎湃
  网络来源: https://baike.baidu.com/item/%E4%BC%AF%E7%BD%97%E5%AF%BB%E5%B0%BC%E6%92%92%E5%8D%8A%E5%B2%9B/3583229

- 名词: 日耳曼人
  分类: 概念
  解释: 古代欧洲中北部的一支民族群体，是今德意志、奥地利、英格兰、荷兰等日耳曼语族民族的祖先。在《浮士德》中，浮士德将日耳曼人分配到科林斯海港筑垒防守，象征北方日耳曼精神与南方古典文明的融合。
  书中原文: 日耳曼人！科林斯海港由你们去筑垒防守
  网络来源: https://baike.baidu.com/item/%E6%97%A5%E8%80%B3%E6%9B%BC%E4%BA%BA/10859511

- 名词: 哥特人
  分类: 概念
  解释: 古代日耳曼人的一支，起源于斯堪的纳维亚南部，后迁徙至东欧和南欧。公元3-5世纪多次入侵罗马帝国，最终导致西罗马帝国灭亡。在《浮士德》中，浮士德命哥特人前往多峡谷的阿开亚作战。
  书中原文: 多峡谷的阿开亚地方，哥特人，由你们去战斗
  网络来源: https://baike.baidu.com/item/%E5%93%A5%E7%89%B9%E4%BA%BA/2077860

- 名词: 法兰克人
  分类: 概念
  解释: 古代日耳曼人的一支，于公元5-6世纪建立法兰克王国，鼎盛时期（查理大帝时代）统治西欧大部分地区，是现代法兰西民族和德意志民族的重要渊源之一。在《浮士德》中，浮士德命法兰克人开往厄利斯。
  书中原文: 法兰克人开往厄利斯
  网络来源: https://baike.baidu.com/item/%E6%B3%95%E5%85%B0%E5%85%8B%E4%BA%BA/2054249

- 名词: 萨克森人
  分类: 概念
  解释: 古代日耳曼人的一支，原居北欧日德兰半岛及德国西北部。部分于5-6世纪渡海征服不列颠，形成盎格鲁-撒克逊人，是现代英格兰人的祖先；留在欧洲大陆的萨克森人后来形成德意志的重要支系。在《浮士德》中，浮士德命萨克森人应战墨塞涅。
  书中原文: 墨塞涅由萨克森人应战
  网络来源: https://baike.baidu.com/item/%E6%92%92%E5%85%8B%E6%A3%AE%E4%BA%BA/10680383

- 名词: 诺尔曼人
  分类: 概念
  解释: 又译诺曼人，指公元8-11世纪从北欧斯堪的纳维亚南下侵扰欧洲沿海的北方日耳曼人（维京人）。定居法国诺曼底后形成诺曼人，1066年威廉征服英格兰。在《浮士德》中，浮士德命诺尔曼人歼灭水师、扩充阿耳戈利斯地盘。
  书中原文: 诺尔曼人去歼灭水师，扩充阿耳戈利斯地盘
  网络来源: https://baike.baidu.com/item/%E8%AF%BA%E6%9B%BC%E4%BA%BA/6681695

- 名词: 牧神
  分类: 概念
  解释: 即希腊神话中的潘（Pan），半人半羊形象的山林之神，掌管森林、田地和羊群，居住在阿耳卡狄亚。以潘笛（排箫）为象征，英语"panic"（恐慌）一词源于其名。在《浮士德》阿耳卡狄亚场景中作为自然守护者出现。
  书中原文: 那里有牧神保护，活泼的水仙在谷间滋润、爽朗的林莽中栖身
  网络来源: https://baike.baidu.com/item/%E6%BD%98/4488121

- 名词: 阿耳卡狄亚场面
  分类: 事件
  解释: 《浮士德》第二部第三幕第三场的场景名称。阿耳卡狄亚（Arcadia）是希腊伯罗奔尼撒半岛中部的山区，在西方文学中成为田园牧歌理想国的代名词。此场面中舞台变为阿耳卡狄亚风光，浮士德与海伦在此享受乐园式自由，后生下欧福里翁。
  书中原文: 第三场 阿耳卡狄亚场面全部改变。有几座闭门的凉亭靠着一排岩洞。多荫的树林一直绵延到环绕四周的岩壁部分。看不到浮士德和海伦。合唱队四散地躺着睡觉。
  网络来源: https://book.douban.com/annotation/112412715/
