- 名词: 爱奥尼亚
  分类: 地点
  解释: |
    爱奥尼亚（Ionia，又译伊奥尼亚）是古希腊时代对小亚细亚（今土耳其）安纳托利亚西南海岸地区的称呼，其范围北端约至今伊兹密尔，南至哈利卡尔那索斯以北，还包括希俄斯岛和萨摩斯岛等爱琴海岛屿。名称源于古希腊四大部族之一的爱奥尼亚人（Ionians），约于公元前2000年后期从希腊中部阿提卡地区迁入定居。主要城邦包括以弗所、米利都、伊兹密尔、弗凯亚等，形成伊奥尼亚联盟。该地区是古希腊哲学、科学、史学的重要发源地，诞生了泰勒斯、阿那克西曼德、赫拉克利特等哲学家及历史之父希罗多德；伊奥尼亚柱式亦为古希腊建筑三大柱式之一。在歌德《浮士德》第二部第三幕中，合唱队借爱奥尼亚指代古希腊诗歌与神话的丰饶传统。
  书中原文: |
    你没听说过爱奥尼亚、也从没听说过赫拉斯远祖留传的丰富的神与英雄的传说？
  网络来源: |
    https://baike.baidu.com/item/%E4%BC%8A%E5%A5%A5%E5%B0%BC%E4%BA%9A/5089449

- 名词: 赫拉斯
  分类: 地点
  解释: |
    赫拉斯（Hellas，古希腊语Ἑλλάς）是古希腊人对希腊地区的自称，现代希腊人仍用此词称呼自己的国家（读作Ellas）。据希腊神话，Hellas得名于希腊人的共同始祖希伦（Hellen），他是普罗米修斯之孙、丢卡利翁之子。最初Hellas仅指色萨利南部弗提奥提斯的一小地名，荷马在《伊利亚特》中仅用以称呼阿喀琉斯麾下部众。古风时代以后，Hellas逐渐成为全体希腊人对其居住地的通称，进而扩展到所有希腊人居住的世界，包括小亚细亚、南意大利和西西里岛的希腊殖民地。中文译名"赫拉斯"为古希腊文Ἑλλάς音译；而"希腊"一词也源自Hellas的音译，而非英文Greece。在歌德《浮士德》中，合唱队提及赫拉斯以追忆古希腊神话与英雄传说的辉煌传统。
  书中原文: |
    也从没听说过赫拉斯远祖留传的丰富的神与英雄的传说？
  网络来源: |
    https://baike.baidu.com/item/%E5%B8%8C%E8%85%8A/9410

- 名词: 迈耶
  分类: 人物
  解释: |
    迈耶（Maeon，古希腊语Μαίων）是古希腊传说中的传奇人物，据古希腊文献记载被认为是伟大诗人荷马（Homer）之父。荷马在诗歌中常被称为"Maeonides"（迈耶之子），这个称呼在拉丁文学（贺拉斯、奥维德等）中成为荷马的代称。据传有一份完整的谱系将迈耶追溯至传奇歌手俄耳甫斯（Orpheus）的后裔。此外古希腊神话中还有另外几个同名人物：包括底比斯战士迈耶（海蒙之子、具有预言能力）、海蒙与安提戈涅之子迈耶，以及吕底亚国王迈耶等。在歌德《浮士德》第二部中，迈耶被引用为古代传说歌手的代表，合唱队将歌唱迈耶之子（即荷马）的故事称为"可爱的谎言，比事实还令人可信"，体现了诗歌超越史实的艺术力量。
  书中原文: |
    你所讲的故事还不及歌唱迈耶之子的可爱的谎言，它比事实还令人可信。
  网络来源: |
    https://en.wikipedia.org/wiki/Maeon

- 名词: 伯罗奔尼撒
  分类: 地点
  解释: |
    伯罗奔尼撒（Peloponnese）是希腊南部的一个大型半岛，通过科林斯地峡与希腊本土相连，科林斯运河将其与大陆分隔。名称来源于传说英雄帕罗普斯（Pelops）与希腊语"nisos"（岛屿），意为"帕罗普斯之岛"，古称摩里亚半岛。面积约21,439平方公里，最大城市为帕特雷。该地区是古希腊文明的核心区域之一：迈锡尼文明（荷马史诗中"多金的"迈锡尼）在此兴起；重要城邦包括斯巴达、科林斯、阿尔戈斯；伯罗奔尼撒战争深刻影响了古希腊历史进程；奥林匹亚（奥林匹克运动会发源地）位于半岛西部。在歌德《浮士德》中，欧福里翁站在高处俯瞰时指出自己位于伯罗奔尼撒中心，即海与陆的交汇之地。
  书中原文: |
    我看出我在何方！我就在岛国中央，伯罗奔尼撒中心，海与陆都是近亲。
  网络来源: |
    https://baike.baidu.com/item/%E4%BC%AF%E7%BD%97%E5%A5%94%E5%B0%BC%E6%92%92%E5%8D%8A%E5%B2%9B/1002732

- 名词: 赫淮斯托斯
  分类: 人物
  解释: |
    赫淮斯托斯（Hephaestus，又译赫菲斯托斯）是希腊神话中的火神、锻造之神、工匠之神，奥林匹斯十二主神之一，罗马神话中对应武尔坎努斯（Vulcan）。他是宙斯与赫拉之子（一说赫拉独自所生），出生时因相貌丑陋被赫拉从奥林匹斯山扔下，摔成瘸子，后被海洋女神忒提斯救起。他是诸神的工匠，打造了无数著名神器：宙斯的神盾、太阳神的日车、阿喀琉斯的甲胄、潘多拉及潘多拉之盒等。娶美神阿佛洛狄忒为妻，但阿佛洛狄忒与战神阿瑞斯私通，赫淮斯托斯以精巧金网当场捉奸。在歌德《浮士德》的古典场景中，赫尔墨斯幼年盗取众神之物的叙事提及他窃走"火神的火钳"，以展现赫尔墨斯的狡黠天性。
  书中原文: |
    又盗走日神的弓矢以及火神的火钳；如果不是他怕火，他还要偷去他父亲宙斯的闪电。
  网络来源: |
    https://baike.baidu.com/item/%E8%B5%AB%E8%8F%B2%E6%96%AF%E6%89%98%E6%96%AF/2604787

- 名词: 阿玛宗人
  分类: 人物
  解释: |
    阿玛宗人（Amazons，又译亚马逊人、亚马逊女战士）是古希腊神话中由全女性战士构成的民族。传说她们是战神阿瑞斯的后代，主要活动于小亚细亚、黑海沿岸地区，都城位于特弥斯库拉（今土耳其泰尔梅附近）。词源"Amazon"可能来自古伊朗语"战士"一词，一说意为"无乳"（传说为拉弓方便烧除右乳，但古希腊艺术品中从未体现）。每年与邻近部落男子交配，女婴留下培养为战士，男婴送还或杀死。希腊神话中阿玛宗人与多位英雄交锋：赫拉克勒斯夺取女王希波吕忒的腰带、忒修斯诱拐女王安提奥珀、阿喀琉斯击杀女王彭忒西勒亚。考古发现乌克兰及俄罗斯的斯基泰女性墓葬陪葬大量武器，证实女战士传说有一定历史依据。在歌德《浮士德》中，欧福里翁以战争口号号召妇女都成为阿玛宗人般英勇的战士。
  书中原文: |
    妇女都做阿玛宗人，孩子也个个成为勇士。
  网络来源: |
    https://baike.baidu.com/item/%E4%BA%9A%E9%A9%AC%E9%80%8A%E4%BA%BA/6752256

- 名词: 伊卡洛斯
  分类: 人物
  解释: |
    伊卡洛斯（Icarus，古希腊语Ἴκαρος）是希腊神话中著名的悲剧人物。他是雅典伟大的建筑师和发明家代达罗斯（Daedalus）之子。代达罗斯为克里特国王米诺斯建造囚禁牛头怪弥诺陶洛斯的迷宫后，父子一同被囚禁。为逃离克里特岛，代达罗斯用羽毛和蜡制作了两对翅膀，警告伊卡洛斯不可飞得太低（海水湿气使翅膀变重）也不可飞得太高（太阳热量融化蜡翼）。然而伊卡洛斯初次享受飞翔的自由，兴奋之下越飞越高，蜡翼被太阳烤化，羽毛散落，最终坠入爱琴海溺亡。那片海域因而得名伊卡利亚海，附近岛屿称为伊卡利亚岛。伊卡洛斯的故事寓意骄傲自满（hubris）导致毁灭，衍生出名谚"不要飞得离太阳太近"。在歌德《浮士德》中，欧福里翁（以拜伦为原型的形象）纵身跃入空中后坠落，合唱队悲呼"伊卡洛斯！伊卡洛斯！"以预示这位美少年的悲剧结局。
  书中原文: |
    伊卡洛斯！伊卡洛斯！真令人心伤。
  网络来源: |
    https://baike.baidu.com/item/%E4%BC%8A%E5%8D%A1%E6%B4%9B%E6%96%AF/7304

- 名词: 挽歌
  分类: 概念
  解释: |
    挽歌（Elegy，源自希腊语ἐλεγεία，意为"哀伤之歌"）是一种起源于古希腊的抒情诗体，以严肃语气和文词典雅为特征。形式上最初采用六音步诗行与五音步诗行交替组成的双行体（即哀歌体/埃勒格体），主要用于葬礼悼念表达对逝者的哀思。公元前7世纪，卡利诺斯被认为是哀歌体的创始者，此后提尔泰奥斯将战争元素融入，米姆奈尔摩斯拓展了爱情主题。哀歌的主题不仅限于悼亡，还包括战争叙事、爱情诗和哲理箴言。古罗马时期奥维德以哀歌体写情诗；后世著名作品包括托马斯·格雷《墓畔哀歌》和里尔克《杜伊诺哀歌》等。在歌德《浮士德》第二部中，欧福里翁坠落后，合唱队唱起挽歌哀悼他的陨落，标志着海伦与浮士德之子悲剧性的离去。
  书中原文: |
    （挽歌。）
  网络来源: |
    https://baike.baidu.com/item/%E5%93%80%E6%AD%8C/6724841
