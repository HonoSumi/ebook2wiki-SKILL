- 名词: 妖精
  分类: 概念
  解释: |
    欧洲民间传说和文学中的精灵，通常体型小巧、具有超自然能力。在《浮士德》第二部第一幕"幽雅的境地"中，一群形态娇小优美的妖精在爱丽尔（Ariel）的带领下，围绕沉睡的浮士德唱歌舞蹈，用忘川之水的露珠抚慰他的痛苦，帮助他从格蕾辛悲剧的愧疚中恢复，迎接新的一天。歌德笔下的妖精属北方神话中的空气之精，常替人出力、抚慰人类的痛苦。
  书中原文: |
    浮士德躺在百花如锦的草地上，疲倦、不安、思睡。黄昏时分。一群妖精　形态娇小而优美　在空中飘翔。
    矮小而有大志的妖精，急忙出来扶危济困；对不幸的人俱表同情，不分邪恶还是神圣。
  网络来源: |
    https://baike.baidu.com/item/%E7%B2%BE%E7%81%B5/6218

- 名词: 忘川
  分类: 概念
  解释: |
    希腊神话中冥界的河流勒忒（Lethe），亡灵饮其水后会忘却生前一切记忆。歌德在《浮士德》第二部第一幕中借用此典故：爱丽尔命令众妖精以"忘川之水的露珠"沐浴浮士德，使他忘却格蕾辛悲剧带来的痛苦与愧疚，从而获得精神上的重生，得以继续在第二部中追求更高的理想。忘川在此象征遗忘与治愈的力量。
  书中原文: |
    先让他的头靠在清凉的枕上，然后浴以忘川之水的露珠；只要他养精蓄锐，睡到天亮，他那僵化的四肢就会舒服；快把崇高的义务履行，把他还给神圣的光明。
  网络来源: |
    https://baike.baidu.com/item/%E5%BF%98%E5%B7%9D/64919121

- 名词: 时序女神
  分类: 概念
  解释: |
    希腊神话中掌管季节、时间和人间秩序的女神（Horae，又译"荷赖"），通常为三位：欧诺弥亚（秩序女神）、狄刻（正义女神）和厄瑞涅（和平女神），是宙斯与忒弥斯之女。在《浮士德》第二部第一幕"幽雅的境地"的结尾，太阳即将升起时，爱丽尔提到"时序女神的神风"，象征着新的一天、新的时代降临，也标志着浮士德精神重生的开始。
  书中原文: |
    听呀！时序女神的的神风！声响传进妖精的耳根，新的日子已经诞生。岩门呀然一声豁开，日神的车轮辚辚滚来，光的声响多么惊人！
  网络来源: |
    https://baike.baidu.com/item/%E8%8D%B7%E8%B5%96/262582

- 名词: 日神
  分类: 概念
  解释: |
    希腊神话中的太阳神，在《浮士德》中指驾驶太阳车的神明（阿波罗/赫利俄斯）。在第二部第一幕太阳升起的场景中，歌德以宏大的笔触描绘日神的车轮辚辚滚来、岩门豁然洞开的景象，象征光明与新生。日神意象贯穿《浮士德》始终，代表着光明、理性与神圣秩序，与浮士德不断追求光明与更高存在的主题相呼应。
  书中原文: |
    岩门呀然一声豁开，日神的车轮辚辚滚来，光的声响多么惊人！大的喇叭，小的喇叭，使你震耳，使你眼花，闻所未闻者实不可闻。
  网络来源: |
    https://baike.baidu.com/item/%E5%A4%AA%E9%98%B3%E7%A5%9E/10859511

- 名词: 彩虹
  分类: 概念
  解释: |
    《浮士德》第二部第一幕中的重要象征意象。浮士德在苏醒后远望瀑布，看到飞泉形成的彩虹，悟出"彩虹反映出人类的努力上进"这一哲理。歌德通过"万变之不变"（Wechsel-Dauer）的概念描绘彩虹——它在水雾中时刻变化却又持续存在。这一意象象征着人类精神在有限与无限、变化与永恒之间的奋斗，也标志着浮士德从追求超越转向拥抱尘世生活的转折点。
  书中原文: |
    可是从这种飞泉形成的彩虹，拱成万变之不变是多么悦目，时而分明，时而消逝在空中，在它的四周散作空蒙的凉雨。彩虹反映出人类的努力上进。细心揣摩，你就会更加领悟；要从多彩的映象省识人生。
  网络来源: |
    https://goethe-lexicon.pitt.edu/GL/article/view/54

- 名词: 皇帝
  分类: 人物
  解释: |
    《浮士德》第二部中的角色，一位神圣罗马帝国的皇帝。在第二部第一幕第二场"皇帝的宫城 金殿"中，皇帝升座召开御前会议，听取宰相、财政大臣等汇报帝国危机。梅非斯特化装成弄臣混入宫廷，以魔法治愈了皇帝的财政危机（制造纸币）。此后皇帝又命令浮士德召唤古希腊美女海伦来娱乐宫廷。皇帝代表了第二部中浮士德从个人情感世界进入社会政治领域的转折。
  书中原文: |
    内阁大臣们恭候皇帝上朝。喇叭声。各种朝臣，服饰华丽，上。皇帝升座，星士侍立右侧。
    最高的德行，仿佛圣人的圆光围住皇帝的头颅，只有皇上才能有效地加以发挥，这就是正义！
  网络来源: |
    https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7/1895

- 名词: 宰相
  分类: 人物
  解释: |
    《浮士德》第二部第一幕中出场的大臣角色，在皇帝的宫城金殿上主持朝议。他在御前会议上率先发言，论述"正义"是皇帝最高的德行，强调皇帝应当以正义治理国家。宰相代表了传统封建制度中的官僚与道德权威，他的发言揭示了帝国面临的深层次危机——虽有良善之心，却因制度腐朽而难以施政。这是歌德对当时神圣罗马帝国政治现实的影射。
  书中原文: |
    宰　　相　最高的德行，仿佛圣人的圆光围住皇帝的头颅，只有皇上才能有效地加以发挥，这就是正义！——万民无不酷爱，无不求之望之，不可失之，将此德施之于民，全在于皇帝。可是满脑子聪明，存心善良，动手想干，又有什么用场。
  网络来源: |
    https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7/1895

- 名词: 圆光
  分类: 概念
  解释: |
    原为佛教、基督教等宗教艺术中圣像头部周围的光环（nimbus/halo），象征神圣与庄严。在《浮士德》中，宰相在御前会议上用此比喻来赞颂皇帝的德行，说"最高的德行，仿佛圣人的圆光围住皇帝的头颅"，将皇帝的正义之德比作圣人的光环。这一比喻既体现了对君主的神化传统，也暗含了歌德对皇权神圣性的反思。
  书中原文: |
    最高的德行，仿佛圣人的圆光围住皇帝的头颅，只有皇上才能有效地加以发挥，这就是正义！
  网络来源: |
    https://baike.baidu.com/item/%E5%9C%86%E5%85%89/10551511

- 名词: 杜松子树
  分类: 物件
  解释: |
    格林童话《杜松子树》（The Juniper Tree）中的核心意象。该童话讲述一个继母将前娘的儿子烹煮给父亲吃，小妹妹收集骨殖葬在杜松子树下，骨殖化为小鸟唱歌复仇的故事。在《浮士德》第一部"监狱"场景的注释中，译者引用此童话来说明格蕾辛精神错乱时所唱民歌的来源——她因杀害了自己的孩子而产生负罪感，在疯癫中唱出这首与杜松子树相关的民歌，如同《哈姆雷特》中莪菲丽雅发疯后唱民歌一样。
  书中原文: |
    《格林童话》中《杜松子树》讲一个继母把前娘的儿子烹成肴馔端给她丈夫吃。小妹妹把骨殖收集起来，葬在杜松子树下面。骨殖化为一只小鸟，唱出此歌。格蕾辛在精神错乱中唱这首歌……是因为她联想到她曾杀害了自己的孩子。
  网络来源: |
    https://baike.baidu.com/item/%E6%9D%9C%E6%9D%BE%E6%A0%91/11012311
