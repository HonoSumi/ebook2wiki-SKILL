- 名词: 恶灵
  分类: 概念
  解释: |
    《浮士德》第一部第二十场"教堂"中出现在格蕾辛身后的形象，是格蕾辛良心谴责的象征。恶灵并非魔鬼梅非斯特，而是格蕾辛内心罪愆意识和自我审判的具象化，通过低语控诉其毒死母亲、哥哥被杀、溺死私生子等罪行，与合唱团演唱的《愤怒之日》（Dies Irae）交替出现，构成有声与无声的双重审判，导致格蕾辛在教堂中精神崩溃而昏厥。
  书中原文: |
    恶灵[1]在她身后。……你变了，格蕾辛，不像从前天真烂漫，来到祭台之前……你为你妈的灵魂祈祷？她因你而长眠，堕入长远、长远的痛苦。谁的血玷污你的门坎？——在你心脏下面不是已出现胎动，以他不祥的存在造成他自己和你的不安？
  网络来源: |
    https://www.fx361.com/page/2017/1114/10914809.shtml

- 名词: 愤怒之日
  分类: 概念
  解释: |
    拉丁文"Dies Irae"的中文翻译，又称"震怒之日"或"末日经"。13世纪时托马·德·塞拉努（Thomas of Celano，约1190-1260）所作的拉丁文圣诗（继叙咏），用于天主教追思弥撒（安魂弥撒）中。全诗共18节，生动描绘末日审判场景：号角响起、死者从坟墓中复活、案卷展开记录善恶、审判降临。在《浮士德》第一部第二十场"教堂"中，合唱团演唱此诗，与恶灵的控诉交织，营造神圣庄严的审判氛围。
  书中原文: |
    愤怒之日，彼日既临，世界都将化为灰烬。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/震怒之日

- 名词: 末日审判
  分类: 概念
  解释: |
    天主教/基督教末世论核心概念，亦称"公审判"或"最后审判"，指在世界末日之时，耶稣基督在光荣中再度来临，审判所有生者与死者，决定每个人的永恒命运——义人进入永生，恶人进入永罚。圣经依据主要为《玛窦福音》25:31-46（分开绵羊和山羊）。在《浮士德》教堂场景中，合唱团演唱的《愤怒之日》即围绕末日审判主题展开。
  书中原文: |
    愤怒之日指天主愤怒举行公审判之日，俗称末日审判。
  网络来源: |
    https://www.radiovaticana.va/cinesegb/catechism/1credo/73giudizio.html

- 名词: 狮子洋钱
  分类: 物件
  解释: |
    一种镌有狮子纹章的欧洲银币。在《浮士德》中由梅非斯特提及，称其藏有贵重的狮子洋钱。最著名的是荷兰狮子银币（Lion Dollar / Leeuwendaalder），1575年至1731年由荷兰各省铸造，正面为站立骑士与持盾立狮，背面为直立狮子图案。此币沿地中海、丝绸之路及海上贸易路线广泛流通，17-18世纪随荷兰商船大量流入中国福建漳州一带，被当地人称为"狮仔币"。
  书中原文: |
    我最近曾去瞟了一眼，里面有贵重的狮子洋钱。
  网络来源: |
    https://emuseum.colonialwilliamsburg.org/objects/45895/lion-daalder

- 名词: 齐特拉琴
  分类: 物件
  解释: |
    又称齐特尔琴、齐特琴，欧洲古老的民间拨弦乐器，号称奥地利最古老的乐器。德语"Zither"源自拉丁语"cithara"（古希腊拨弦乐器）。外形类似中国的古筝或扬琴，有扁平的木质共鸣箱，通常设5根旋律弦和30至40根和声弦。演奏时置于膝上或桌上，右手拇指戴拨片弹奏旋律。在《浮士德》中，梅非斯特弹齐特拉琴唱歌以诱惑格蕾辛。
  书中原文: |
    （弹齐特拉琴而唱。）卡德林辛，天刚刚黎明，干什么事情来到情郎的家门？
  网络来源: |
    https://wapbaike.baidu.com/item/齐特尔琴

- 名词: 卡德林辛
  分类: 人物
  解释: |
    梅非斯特在《浮士德》中所唱歌曲中提到的虚构少女名字，为"卡特琳"（Katharina）的昵称形式。歌词讲述卡德林辛在黎明时分到情郎家，被警告"进去是闺女，出来就不是女儿身"，是一首关于贞洁与警惕的民谣式歌曲。该歌根据莎士比亚《哈姆雷特》第四幕第五场中奥菲莉亚所唱的歌改编而来。在剧中，梅非斯特以此歌从外部迷惑格蕾辛，同时预示其不幸命运。
  书中原文: |
    卡德林辛，天刚刚黎明，干什么事情来到情郎的家门？你不要糊涂！他让你进去，进去是闺女，出来就不是女儿身。
  网络来源: |
    https://book.douban.com/subject/1866992/blockquotes?sort=score&start=540

- 名词: 安眠药
  分类: 物件
  解释: |
    能诱导睡眠的药物。在《浮士德》中，格蕾辛的母亲因服用安眠药（过量）死去，临死前没有办理临终圣事（告解、领圣体、领终傅），因此灵魂要入炼狱受长远的痛苦。这是格蕾辛背负的重要罪愆之一，也是恶灵在教堂场景中控诉她的核心罪行。历史上最早的合成安眠药是1903年由德国化学家费歇尔（Emil Fischer）合成的巴比妥（Veronal）。
  书中原文: |
    格蕾辛的母亲因服安眠药死去，临死前没有办理临终圣事（告解、领圣体、领终傅），故要入炼狱受长远的痛苦。
  网络来源: |
    https://www.be-md.ncbi.nlm.nih.gov/pmc/articles/PMC2424120/

- 名词: 公审判
  分类: 概念
  解释: |
    天主教末世论核心概念，与末日审判、最后审判同义。指世界末日时天主（耶稣基督）在光荣中再度来临，对所有复活之人进行最终公开的审判，决定其永恒命运——永生或永罚。与"私审判"（个人死后灵魂即刻接受审判）相对：私审判仅涉及灵魂，公审判在世界末日发生，灵魂与复活的身体一同接受审判。神学辞典定义为"天主成为整个人类决定性善恶的标准或历史价值的判断"。
  书中原文: |
    愤怒之日指天主愤怒举行公审判之日，俗称末日审判。
  网络来源: |
    https://ccccn.org/book/html/131/7005.html
