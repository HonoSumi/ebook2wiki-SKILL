- 名词: 浮士德
  分类: 人物
  解释: |
    欧洲中世纪传说中的著名人物，原为15至16世纪德国的一位炼金术师和占星家。传说中浮士德与魔鬼订立契约，以自己的灵魂换取知识和力量。这一传说后来被歌德改编为诗剧《浮士德》，成为世界文学经典。浮士德从此成为西方文化中追求无限知识、永不满足的象征。
  书中原文: |
    这部悲剧中的主人公浮士德，原来是十五六世纪德国的炼金术师，在传说中有二人，因为浮士德的拉丁文写法Faustus含有"幸福的"之义，故为炼金术师和魔术师爱用作姓氏。
  网络来源: |
    https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7/20411089
- 名词: 歌德
  分类: 人物
  解释: |
    约翰·沃尔夫冈·冯·歌德（1749—1832），德国最伟大的文学家、思想家，与荷马、但丁、莎士比亚并称世界四大文豪。他出身于法兰克福的富裕家庭，早年创作《少年维特的烦恼》轰动欧洲，后应魏玛公爵邀请从政，与席勒共创魏玛古典主义。其毕生巨著《浮士德》耗时近60年完成。
  书中原文: |
    《浮士德》是歌德毕生的大作，从二十五岁开始着手，到八十二岁完成，花了近六十年的时间。
  网络来源: |
    https://baike.baidu.com/item/%E7%BA%A6%E7%BF%B0%C2%B7%E6%B2%83%E5%B0%94%E5%A4%AB%E5%86%88%C2%B7%E5%86%AF%C2%B7%E6%AD%8C%E5%BE%B7
- 名词: 荷马
  分类: 人物
  解释: |
    约公元前9至8世纪的古希腊盲诗人，被认为是史诗《伊利亚特》和《奥德赛》的作者，合称《荷马史诗》。荷马史诗是西方文学最古老的奠基之作，具有"永久的魅力"，对后世西方文学、宗教、文化产生了深远影响。荷马与维吉尔、但丁、弥尔顿并称欧洲四大史诗诗人。
  书中原文: |
    评论家把它和荷马的史诗、但丁的《神曲》、莎士比亚的戏剧并称为世界文学中最伟大的作品。
  网络来源: |
    https://baike.baidu.com/item/%E8%8D%B7%E9%A9%AC/84187
- 名词: 但丁
  分类: 人物
  解释: |
    但丁·阿利吉耶里（1265—1321），意大利中世纪诗人，现代意大利语的奠基者，文艺复兴的先驱。代表作《神曲》分为《地狱》《炼狱》《天堂》三篇，以第一人称游历三界的叙事结构，融合神学、哲学、历史与政治，被恩格斯誉为"中世纪的最后一位诗人，新时代的最初一位诗人"。
  书中原文: |
    评论家把它和荷马的史诗、但丁的《神曲》、莎士比亚的戏剧并称为世界文学中最伟大的作品。
  网络来源: |
    https://baike.baidu.com/item/%E4%BD%86%E4%B8%81%C2%B7%E9%98%BF%E5%88%A9%E5%90%89%E8%80%B6%E9%87%8C
- 名词: 莎士比亚
  分类: 人物
  解释: |
    威廉·莎士比亚（1564—1616），英国文艺复兴时期最杰出的戏剧家、诗人，被誉为"人类文学奥林匹斯山上的宙斯"。一生创作37部戏剧、154首十四行诗，代表作包括四大悲剧《哈姆雷特》《奥赛罗》《李尔王》《麦克白》以及《罗密欧与朱丽叶》等。其作品被翻译成80多种语言，表演次数远超其他任何剧作家。
  书中原文: |
    评论家把它和荷马的史诗、但丁的《神曲》、莎士比亚的戏剧并称为世界文学中最伟大的作品。
  网络来源: |
    https://baike.baidu.com/item/%E5%A8%81%E5%BB%89%C2%B7%E8%8E%8E%E5%A3%AB%E6%AF%94%E4%BA%9A
- 名词: 马洛
  分类: 人物
  解释: |
    克里斯托弗·马洛（1564—1593），英国伊丽莎白时期最重要的剧作家之一，与莎士比亚同年出生，29岁时因斗殴被刺身亡。他创立了以无韵诗为标准的英国戏剧典范，代表作《浮士德博士的悲剧》取材于德国民间传说，讲述浮士德与魔鬼签订契约、最终灵魂被劫往地狱的故事，对歌德的《浮士德》产生了深远影响。
  书中原文: |
    英国剧作家马洛（1564—1593）根据这个故事改编成剧本《浮士德博士的悲剧故事》，于一五八八年出版，他把浮士德描写成为巨人式的人物，肯定知识是最伟大的力量。
  网络来源: |
    https://baike.baidu.com/item/%E5%85%8B%E9%87%8C%E6%96%AF%E6%89%98%E5%BC%97%C2%B7%E9%A9%AC%E6%B4%9B
- 名词: 莱辛
  分类: 人物
  解释: |
    戈特霍尔德·埃弗拉伊姆·莱辛（1729—1781），德国启蒙运动时期最重要的作家、文艺理论家，德国民族文学的奠基人。代表作包括戏剧《智者纳旦》《爱米丽雅·迦洛蒂》、美学论著《拉奥孔》和《汉堡剧评》。他第一个从哲学高度提出浮士德的拯救问题，对歌德的《浮士德》创作构思产生了重要启发。
  书中原文: |
    直到莱辛，才提出了浮士德的拯救问题，在他的《文学书简》第十七编中，他指出把浮士德作为戏剧的题材具有很大的价值。
  网络来源: |
    https://baike.baidu.com/item/%E6%88%88%E7%89%B9%E9%9C%8D%E5%B0%94%E5%BE%B7%C2%B7%E5%9F%83%E5%A4%AB%E8%8E%B1%E5%A7%86%C2%B7%E8%8E%B1%E8%BE%9B
- 名词: 席勒
  分类: 人物
  解释: |
    弗里德里希·席勒（1759—1805），德国伟大的诗人、剧作家，与歌德并称德国文学的"双子星"。代表作包括戏剧《强盗》《阴谋与爱情》《威廉·退尔》以及诗歌《欢乐颂》（被贝多芬谱入《第九交响曲》）。席勒与歌德建立了深厚友谊，共同开创了魏玛古典主义，他多次鼓励歌德完成《浮士德》的创作。
  书中原文: |
    以后又经过七八年的中断，其间受到席勒的再三鼓励，至一七九七年才下决心要将这部大作写完，于同年六月二十四日写出《献诗》。
  网络来源: |
    https://baike.baidu.com/item/%E7%BA%A6%E7%BF%B0%C2%B7%E5%85%8B%E9%87%8C%E6%96%AF%E6%89%98%E5%BC%97%C2%B7%E5%BC%97%E9%87%8C%E5%BE%B7%E9%87%8C%E5%B8%8C%C2%B7%E5%86%AF%C2%B7%E5%B8%AD%E5%8B%92
- 名词: 迦梨陀娑
  分类: 人物
  解释: |
    约公元4至5世纪古印度笈多王朝时期的梵语诗人和剧作家，被誉为"印度的莎士比亚"。代表作《沙恭达罗》是古印度梵文文学的最高典范，描写国王豆扇陀与净修女沙恭达罗的爱情故事。该剧通过威廉·琼斯的英译本和福斯特的德译本传入欧洲，对歌德等人产生了重要影响。
  书中原文: |
    仿印度诗人迦梨陀娑的戏剧《沙恭达罗》的序幕而作。这部印度名剧曾由德国诗人福斯特根据威廉·琼斯的英译本转译成德语，于一七九一年出版，颇受歌德称赏。
  网络来源: |
    https://baike.baidu.com/item/%E8%BF%A6%E6%A2%A8%E9%99%80%E5%A8%91
- 名词: 诺斯特拉达姆斯
  分类: 人物
  解释: |
    米歇尔·德·诺特雷达姆（1503—1566），法国犹太裔预言家、医生和占星家，以预言集《百诗集》（常误译为《诸世纪》）闻名于世。他在《浮士德》中被提及为浮士德打开其神秘书籍以观看大宇宙灵符的人物，反映了文艺复兴时期神秘主义和占星术对知识分子的吸引力。
  书中原文: |
    他于是先打开诺斯特拉达姆斯的神秘书，观看大宇宙的灵符，看到大自然的壮丽的奇观。
  网络来源: |
    https://baike.baidu.com/item/%E8%AF%BA%E6%9F%A5%E4%B8%B9%E7%8E%9B%E6%96%AF
- 名词: 别林斯基
  分类: 人物
  解释: |
    维萨里昂·别林斯基（1811—1848），俄国文学批评家、哲学家、革命民主主义者，俄国文学批评与文学理论的奠基人。他在短暂的一生中撰写了一千多篇评论文章，提出了"形象思维"、"典型性"、"人民性"等重要文学概念，为俄国批判现实主义文学奠定了理论基础。
  书中原文: |
    别林斯基说这部剧作就是歌德当时所处的德国社会全部生活的充分反映，尤其是第二部，把那从海伦直至拜伦的三千年历史，全都包括了进去。
  网络来源: |
    https://baike.baidu.com/item/%E7%BB%B4%E8%90%A8%E9%87%8C%E6%98%82%C2%B7%E5%88%AB%E6%9E%97%E6%96%AF%E5%9F%BA
- 名词: 拜伦
  分类: 人物
  解释: |
    乔治·戈登·拜伦（1788—1824），第六代拜伦男爵，英国浪漫主义诗人，代表作《唐璜》《恰尔德·哈罗尔德游记》。他塑造了著名的"拜伦式英雄"形象——高傲孤独、反抗权威、具有强烈的叛逆精神。拜伦本人投身希腊民族独立战争并病逝于军中，成为为自由理想战斗终身的文化符号。
  书中原文: |
    把那从海伦直至拜伦的三千年历史，中世纪和现代人的思想感情，全都包括了进去，洋洋大观，令人眼花缭乱。
  网络来源: |
    https://baike.baidu.com/item/%E6%8B%9C%E4%BC%A6
- 名词: 威廉·琼斯
  分类: 人物
  解释: |
    威廉·琼斯爵士（1746—1794），英国语言学家、东方学家，通晓28种语言，被称为"东方琼斯"。1784年在加尔各答创立孟加拉亚洲学会。1786年提出梵语与希腊语、拉丁语具有同源关系，成为历史比较语言学的奠基人。他翻译的梵文戏剧《沙恭达罗》轰动欧洲，对歌德等德国文豪产生了重要影响。
  书中原文: |
    这部印度名剧曾由德国诗人福斯特根据威廉·琼斯的英译本转译成德语，于一七九一年出版，颇受歌德称赏。
  网络来源: |
    https://baike.baidu.com/item/%E5%A8%81%E5%BB%89%C2%B7%E7%90%BC%E6%96%AF
- 名词: 卡尔·奥古斯特
  分类: 人物
  解释: |
    卡尔·奥古斯特（1757—1828），萨克森-魏玛-艾森纳赫公爵（后为大公），开明专制君主的典范。1775年邀请歌德到魏玛从政并委以重任，使魏玛成为德意志古典文化的中心，被后世称为"德意志的雅典"。1816年颁布德意志各邦国第一部自由主义宪法。他与歌德不仅是君臣，更是终生挚友。
  书中原文: |
    一七七五年歌德应魏玛大公卡尔·奥古斯特之聘，于十一月前往魏玛从政，由于工作繁忙，《浮士德》的写作中断了十二年。
  网络来源: |
    https://baike.baidu.com/item/%E5%8D%A1%E5%B0%94%C2%B7%E5%A5%A5%E5%8F%A4%E6%96%AF%E7%89%B9/49822790
- 名词: 约翰·施皮斯
  分类: 人物
  解释: |
    16世纪德国法兰克福的书商和出版家。1587年，他在美因河畔法兰克福出版了第一部系统整理浮士德传说的通俗故事书《魔术师浮士德博士传》（Historia von D. Johann Fausten），将浮士德塑造为一个不信神的反面典型。该书颇受读者欢迎并屡次再版，被译成多种外语，为后来的文学创作奠定了基础。
  书中原文: |
    最初把浮士德传说编成通俗故事书的是约翰·施皮斯，书名《魔术师浮士德博士传》，于一五八七年在美因河畔的法兰克福出版，这本书颇受读者欢迎，屡次再版，并且被译成外语。
  网络来源: |
    https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7
- 名词: 梅非斯特
  分类: 人物
  解释: |
    歌德诗剧《浮士德》中的魔鬼形象，又译靡菲斯特、墨菲斯托。他是否定的恶灵，代表"为成就大恶而行善的力量"。梅非斯特与上帝打赌，试图引诱浮士德堕落，但在歌德的笔下，他主观作恶、客观造善，反而成为激发浮士德不断向上的动力。这一形象是西方文学中最复杂、最深刻的魔鬼形象之一。
  书中原文: |
    接着是恶魔梅非斯特登场。他是否定的恶灵（否定一切），又是破坏的恶灵（打倒一切），他也是天主的仆人，但是却跟天主对抗，背道而驰。
  网络来源: |
    https://baike.baidu.com/item/%E9%BB%98%E8%8F%B2%E6%96%AF%E6%89%98%E8%8F%B2%E9%87%8C%E6%96%AF
- 名词: 地灵
  分类: 概念
  解释: |
    歌德《浮士德》第一部中出现的精灵，是支配地球上一切现象的生命力化身。浮士德在苦闷时召唤地灵，地灵自称"生命的浪潮，事业的狂风"。当浮士德认为自已与地灵相似时，地灵却给予当头棒喝："你肖似你所理解的精灵，不像我！"地灵的概念源自16世纪自然哲学和斯维登堡的思想。
  书中原文: |
    他于是转而乞灵于地灵。地灵是支配地球上一切现象的精灵，也隶属于天主，在歌德心目中，地灵乃是一切尘世的生命力和创造的精神威力的化身，他就是"生命的浪潮，事业的狂风"。
  网络来源: |
    https://webarchiveweb.wayback.bac-lac.canada.ca/web/20060913000000/http://en.wikipedia.org:80/wiki/Erdgeist
- 名词: 美因河畔的法兰克福
  分类: 地点
  解释: |
    德国第五大城市，黑森州最大城市，正式名称为美因河畔法兰克福。它是德国乃至欧洲最重要的金融中心、交通枢纽和会展之都，拥有欧洲中央银行总部和法兰克福证券交易所。法兰克福也是德国最伟大文学家歌德的出生地，拥有歌德故居、法兰克福大学（歌德大学）等重要文化机构。
  书中原文: |
    于一五八七年在美因河畔的法兰克福出版，这本书颇受读者欢迎，屡次再版，并且被译成外语。
  网络来源: |
    https://baike.baidu.com/item/%E6%B3%95%E5%85%B0%E5%85%8B%E7%A6%8F%E5%B8%82
- 名词: 威丁堡
  分类: 地点
  解释: |
    又译维滕贝格，正式名称为"路德城维滕贝格"，位于德国萨克森-安哈尔特州易北河畔。1517年，马丁·路德在此地城堡教堂大门上张贴《九十五条论纲》，拉开了宗教改革的序幕。这里是浮士德传说中主人公的居住地，也是威丁堡大学的所在地。1996年路德纪念地被列为联合国教科文组织世界文化遗产。
  书中原文: |
    其一为约翰尼斯·浮士德，生于斯瓦比亚的克纽特林根，住于威丁堡。
  网络来源: |
    https://baike.baidu.com/item/%E7%BB%B4%E6%BB%95%E8%B4%9D%E6%A0%BC
- 名词: 魏玛
  分类: 地点
  解释: |
    德国图林根州的一座小城，被誉为"德国的雅典"和德国古典文化的中心。歌德在此生活了57年，创作了《浮士德》等巨著；席勒也在此完成了重要作品。魏玛还曾是李斯特、巴赫、尼采等文化名人活跃之地。1919年德国第一部共和宪法在此制定，故称《魏玛宪法》，成立魏玛共和国。1998年"古典魏玛"被列入世界文化遗产。
  书中原文: |
    歌德应魏玛大公卡尔·奥古斯特之聘，于十一月前往魏玛从政，由于工作繁忙，《浮士德》的写作中断了十二年。
  网络来源: |
    https://baike.baidu.com/item/%E9%AD%8F%E7%8E%9B%E5%8F%A4%E5%9F%8E
- 名词: 斯瓦比亚
  分类: 地点
  解释: |
    又译施瓦本或士瓦本，德国西南部的一个历史、文化和语言区域，大致包括今巴登-符腾堡州南部和巴伐利亚州西南部。源自中世纪的斯瓦比亚公国，是神圣罗马帝国的五大部落公国之一。该地区的居民历史上被称为阿勒曼尼人，拥有独特的施瓦本方言和文化传统。
  书中原文: |
    其一为约翰尼斯·浮士德，生于斯瓦比亚的克纽特林根，住于威丁堡。
  网络来源: |
    https://baike.baidu.com/item/Swabia/53141056
- 名词: 纽伦堡
  分类: 地点
  解释: |
    德国巴伐利亚州第二大城市，中世纪时曾是神圣罗马帝国重要的帝国自由市和皇帝加冕地。著名画家丢勒的故乡，欧洲"玩具都城"。20世纪成为纳粹党年度党代会会址，二战后在此举行了对纳粹战犯的纽伦堡审判。城内有皇帝堡、日耳曼国家博物馆等著名历史遗迹。
  书中原文: |
    一六七四年，纽伦堡的医师普菲采将此书重新改作后出版。
  网络来源: |
    https://baike.baidu.com/item/%E7%BA%BD%E4%BC%A6%E5%A0%A1%E5%B8%82
- 名词: 奥艾尔巴赫地下酒室
  分类: 地点
  解释: |
    即莱比锡的奥尔巴赫酒窖（Auerbachs Keller），是德国最古老和最著名的酒馆之一，历史可追溯到1438年。歌德在莱比锡大学求学时常光顾此地，并在《浮士德》第一部中将其作为唯一真实存在的地点写入了剧本（"莱比锡奥艾尔巴赫地下酒室"一幕）。酒窖入口处有浮士德与梅非斯特的雕塑，是莱比锡重要的文化地标。
  书中原文: |
    一七八八年，从第二次游历罗马至归国后的一段时间内，写了《森林和山洞》、《魔女的丹房》、《莱比锡奥艾尔巴赫地下酒室》。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/%E5%A5%A5%E5%B0%94%E5%B7%B4%E8%B5%AB%E9%85%92%E7%AA%96
- 名词: 杜平根大学
  分类: 地点
  解释: |
    全称埃伯哈德·卡尔斯·蒂宾根大学，位于德国巴登-符腾堡州蒂宾根，成立于1477年，是德国最古老的大学之一。德国精英大学和U15大学联盟成员。知名校友包括黑格尔、谢林、荷尔德林、开普勒、教皇本笃十六世等，共产生9位诺贝尔奖得主。以人文科学、神学和医学研究著称。
  书中原文: |
    其后一五八八年，杜平根大学学生又将浮士德故事改编成韵文出版，并且被译成英、法、荷兰文，流传国外。
  网络来源: |
    https://baike.baidu.com/item/%E8%92%82%E5%AE%BE%E6%A0%B9%E5%A4%A7%E5%AD%A6
- 名词: 莱比锡
  分类: 地点
  解释: |
    德国萨克森州最大城市，以博览会、音乐和图书出版闻名于世，被歌德称为"小巴黎"。约翰·塞巴斯蒂安·巴赫在圣托马斯教堂担任乐长27年。莱比锡还是1989年东德和平革命的发源地。莱比锡大学成立于1409年，是德语区最古老的大学之一。歌德曾在此学习法律，并常去奥尔巴赫酒窖。
  书中原文: |
    一七八八年，从第二次游历罗马至归国后的一段时间内，写了《森林和山洞》、《魔女的丹房》、《莱比锡奥艾尔巴赫地下酒室》。
  网络来源: |
    https://baike.baidu.com/item/%E8%8E%B1%E6%AF%94%E9%94%A1%E5%B8%82
- 名词: 《神曲》
  分类: 概念
  解释: |
    意大利诗人但丁（1265—1321）创作的史诗，原名《喜剧》，后由薄伽丘冠以"神圣的"称号。全诗分为《地狱》《炼狱》《天堂》三篇，共100曲，14233行。以意大利托斯卡纳方言写成，奠定了现代意大利语的基础。作品融合神学、哲学、历史与政治，是欧洲文学史上最伟大的作品之一，常与《荷马史诗》《浮士德》《哈姆雷特》并称。
  书中原文: |
    评论家把它和荷马的史诗、但丁的《神曲》、莎士比亚的戏剧并称为世界文学中最伟大的作品。
  网络来源: |
    https://baike.baidu.com/item/%E7%A5%9E%E6%9B%B2
- 名词: 《旧约全书》
  分类: 概念
  解释: |
    基督教圣经的前半部分，原为犹太教经典，主要用希伯来文写成。基督新教共39卷，分为律法书（摩西五经）、历史书、诗歌智慧书和先知书四部分。记载从上帝创造天地到以色列民族回归重建的历史，时间跨度约1500年。"旧约"指上帝与以色列民族在西奈山所立的盟约。其中《约伯记》对歌德《浮士德》中上帝与恶魔打赌的结构构思有直接启发。
  书中原文: |
    这个打赌的构思，不用说，是受《旧约全书》的《约伯记》启发而来的。
  网络来源: |
    https://baike.baidu.com/item/%E5%9C%A3%E7%BB%8F
- 名词: 《约伯记》
  分类: 概念
  解释: |
    《圣经·旧约》中的一卷书，属于诗歌智慧书，全书共42章。探讨的核心神学问题是"义人为何受苦"（神义论）。故事讲述敬虔的富人在约伯接连失去财产、儿女和健康后，仍坚守信仰。上帝最终加倍赐福于他。《约伯记》中以撒但在上帝面前控告约伯并获准试探他的情节，直接启发了歌德《浮士德》中"天上序曲"的结构。
  书中原文: |
    这个打赌的构思，不用说，是受《旧约全书》的《约伯记》启发而来的。天主同意把浮士德交给恶魔，"听他安排"。
  网络来源: |
    https://baike.baidu.com/item/%E7%BA%A6%E4%BC%AF%E8%AE%B0/10482765
- 名词: 《约翰福音》
  分类: 概念
  解释: |
    《新约圣经》的第四部福音书，共21章，传统认为作者为使徒约翰，约公元90至100年间写成。与前三部福音书（对观福音）不同，《约翰福音》约92%的内容为独有资料，侧重耶稣的神性，以"太初有道"（In the beginning was the Word）开篇。在《浮士德》中，主人公翻译《约翰福音》时将"太初有道"改译为"太初有为"，体现其从抽象思辨转向能动实践的哲思转变。
  书中原文: |
    浮士德在书斋里将《新约全书》的《约翰福音》希腊原文翻译成他喜爱的德语，把"太初有道"译为"太初有为"，显示他对于抽象的思索感到不满足而想进入能动性的现实生活。
  网络来源: |
    https://baike.baidu.com/item/%E7%BA%A6%E7%BF%B0%E7%A6%8F%E9%9F%B3
- 名词: 《沙恭达罗》
  分类: 概念
  解释: |
    古印度梵语诗人迦梨陀娑创作的七幕戏剧，全称《凭信物与沙恭达罗团圆记》。描写国王豆扇陀与净修女沙恭达罗的爱情故事，情节扣人心弦、诗意盎然。1789年威廉·琼斯首次译为英文，后由福斯特转译为德文，歌德读后极为赞赏，并在创作《浮士德》时借鉴了其序幕形式。该剧是世界文学史上印度古典戏剧的代表作。
  书中原文: |
    仿印度诗人迦梨陀娑的戏剧《沙恭达罗》的序幕而作。这部印度名剧曾由德国诗人福斯特根据威廉·琼斯的英译本转译成德语，于一七九一年出版，颇受歌德称赏。
  网络来源: |
    https://baike.baidu.com/item/%E6%B2%99%E6%81%AD%E8%BE%BE%E7%BD%97/6542259
- 名词: 《浮士德博士的悲剧故事》
  分类: 概念
  解释: |
    英国剧作家克里斯托弗·马洛于1588年左右创作的戏剧，改编自德国民间故事书。讲述浮士德博士对传统学识感到厌倦，与魔鬼靡非斯特签订契约，以灵魂换取24年绝对权力，最终被拖入地狱的悲剧。马洛首创无韵诗体的戏剧形式，将浮士德塑造为巨人式的人文主义英雄，对后来歌德的《浮士德》以及整个西方文学中的"浮士德母题"产生了深远影响。
  书中原文: |
    英国剧作家马洛（1564—1593）根据这个故事改编成剧本《浮士德博士的悲剧故事》，于一五八八年出版，他把浮士德描写成为巨人式的人物，肯定知识是最伟大的力量，有了知识就能获得财富，征服自然，实现社会理想。
  网络来源: |
    https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7%E5%8D%9A%E5%A3%AB%E7%9A%84%E6%82%B2%E5%89%A7
- 名词: 瓦尔普吉斯之夜
  分类: 习俗
  解释: |
    每年4月30日晚至5月1日在中北欧国家（特别是德国）庆祝的传统节日。传说中女巫们会在德国哈尔茨山布罗肯峰举行盛大狂欢。该节日得名于英国传教士修女圣瓦尔普吉斯（约710—779年），融合了异教迎春习俗与基督教圣徒纪念日。歌德在《浮士德》中专门描写了这一场景，使其成为德国文学和文化中的经典符号。
  书中原文: |
    以后又经过七八年的中断，其间受到席勒的再三鼓励，至一七九七年才下决心要将这部大作写完，于同年六月二十四日写出《献诗》，接着写了《舞台序幕》、《天上序曲》、《城门外》、《书斋》、《瓦尔普吉斯之夜》、《夜》、《牢狱》等场。
  网络来源: |
    https://baike.baidu.com/item/%E7%93%A6%E5%B0%94%E6%99%AE%E5%90%89%E6%96%AF%E4%B9%8B%E5%A4%9C/10226382
- 名词: 科塔出版社
  分类: 概念
  解释: |
    德国历史上最负盛名的出版机构之一，由约翰·格奥尔格·科塔于1659年在蒂宾根创立。在德国古典时期达到世界性声誉，长期与歌德和席勒合作，出版了歌德的作品全集和《浮士德》。该社还出版了赫尔德、谢林、荷尔德林、克莱斯特等德国文学巨匠的作品。现以Klett-Cotta品牌继续运营。
  书中原文: |
    一八〇八年由科塔出版社出版《悲剧浮士德》（Faust Eine Tragödie），这就是后来的悲剧第一部。
  网络来源: |
    https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7
- 名词: 福斯特
  分类: 人物
  解释: |
    约翰·格奥尔格·亚当·福斯特（1754—1794），德国自然科学家、探险家、旅行作家、翻译家和革命家。曾参加库克船长的第二次太平洋航行，出版畅销游记。他将迦梨陀娑的《沙恭达罗》从英译本转译为德文，使歌德等德国文豪能够接触这部印度经典。他后来参与了美因茨共和国革命，在巴黎孤独去世，年仅39岁。
  书中原文: |
    这部印度名剧曾由德国诗人福斯特根据威廉·琼斯的英译本转译成德语，于一七九一年出版，颇受歌德称赏。
  网络来源: |
    https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7
- 名词: 《浮士德初稿》
  分类: 概念
  解释: |
    歌德约1772至1775年（狂飙突进时期）创作的《浮士德》最早版本，德文称Urfaust，共22幕1141行。内容主要围绕学者浮士德与少女格蕾辛的爱情悲剧展开，尚未加入后来版本中上帝与魔鬼打赌、正式缔约等核心框架。原稿一度失落，1887年才在魏玛宫廷女官葛希豪生的遗物中被发现并刊行。
  书中原文: |
    到一七七五年，写成了第一部初稿，即所谓《浮士德初稿》，亦即现在的《浮士德》第一部的前身。但这部原稿后来失落，未能发表。直到一八八七年一月，文学史家希密特发现她缮写的抄本，于是立即加以刊行。
  网络来源: |
    https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7
