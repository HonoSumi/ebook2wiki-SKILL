- 名词: 母亲们
  分类: 概念
  解释: |
    歌德《浮士德》第二部中神秘的女神群体，居于无涯之境、时间与空间尚未分化的原初状态。她们是一切生命形相（原型）的保存者与派遣者，代表宇宙本源的母性创造力，处于存在与虚无之间的本体论交界。浮士德必须下降到母亲们那里取得宝鼎，才能召唤海伦和帕里斯的幻影。
  书中原文: |
    凭你们名义，母亲们，你们君临无涯之境，永远寂寥凄清，而又合群。活动的生命的形相，但并无生命，在你们四周彷徨。在光与假象中存在过的一切，在那里蠢动；他们想永远不灭。
  网络来源: https://www.ceeol.com/search/article-detail?id=138365

- 名词: 宝鼎
  分类: 物件
  解释: |
    又称三足鼎（tripod），是浮士德从母亲们那里取回的魔法器物。用钥匙触碰宝鼎后，会产生迷蒙的雾气与缥缈的音乐，进而显现出帕里斯和海伦的幻影。宝鼎是连接冥界与凡尘的媒介法器，象征召唤古典美的艺术创造力。
  书中原文: |
    你凭着鼎光会看到那些母亲，她们在那里或坐或立或行，全都相时而动。……一旦你把宝鼎带到凡尘，就能从冥国召来英雄和美人。
  网络来源: https://courses.cit.cornell.edu/hd11/Helena.html

- 名词: 钥匙
  分类: 物件
  解释: |
    梅非斯特交给浮士德的魔法钥匙，用于前往母亲们所在之处并触碰宝鼎。钥匙在浮士德手中会发光变大，象征浮士德的意志与力量的延伸，是打通生死界限、召唤古代英雄与美人的媒介。
  书中原文: |
    好！我握紧它，就添上新的力量，去干大事，只觉得胸怀坦荡。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/097.htm

- 名词: 骑士大厅
  分类: 地点
  解释: |
    德语Rittersaal，是《浮士德》第二部第一幕中的场景，位于皇帝宫廷内。皇帝和廷臣们在此观看浮士德表演魔术，墙壁打开后显现出古代神殿，帕里斯和海伦的幻影在此登场。
  书中原文: |
    广阔的墙上挂着一些花毯，武器放满了每个角落和壁龛。我想这里用不着咒语帮忙；那些幽灵都会自己出场。
  网络来源: https://m.zhangyue.com/readbook/12803795/3.html

- 名词: 神殿
  分类: 地点
  解释: |
    通过魔术魔力在骑士大厅中显现的巍峨古代神殿。拥有圆柱排列、仿佛阿特拉斯擎天般的宏伟结构。其建筑风格引发了星士（赞美古典）与建筑师（推崇哥特式）之间的审美争论。
  书中原文: |
    一座非常雄伟的古代神殿，靠着奇迹的魔力在这里出现。好多圆柱排列成一行一行，仿佛阿特拉斯擎天一样；只要两根就能将大厦支住，要撑住沉重的岩石足足有余。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/094.htm

- 名词: 阿特拉斯
  分类: 人物
  解释: |
    希腊神话中的泰坦神，因反抗宙斯而被罚用肩膀支撑天空。在《浮士德》中被星士用作比喻，形容神殿圆柱的宏伟——"仿佛阿特拉斯擎天一样"，极言其高大雄壮、承载万钧之力。
  书中原文: |
    好多圆柱排列成一行一行，仿佛阿特拉斯擎天一样；只要两根就能将大厦支住，要撑住沉重的岩石足足有余。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/094.htm

- 名词: 三陇板
  分类: 概念
  解释: |
    古希腊建筑术语（Triglyph/Triglyphe），是多立克柱式檐壁上的特征构件，刻有三条竖向凹槽的长方形石板，与排档间饰（metope）交替排列。在《浮士德》中作为神殿建筑细节被提及，与圆柱一同在音乐中鸣响。
  书中原文: |
    圆柱、三陇板也都跟着鸣响，我觉得整个神殿都在歌唱。
  网络来源: https://www.zhihu.com/question/35580560

- 名词: 以同类治疗同类
  分类: 概念
  解释: |
    拉丁语similia similibus curantur，是顺势疗法的基本原则。在《浮士德》中，梅非斯特用此戏谑原则为棕色女郎治疗冻疮——用踩脚（制造疼痛）来治脚，声称"用脚医脚"。这反映了梅非斯特式黑色幽默与以毒攻毒的荒诞逻辑。
  书中原文: |
    以同类治疗同类，什么病都行！用脚医脚，其他部位都如此。
  网络来源: https://book.qq.com/book-read/823016/6

- 名词: 形相之国
  分类: 概念
  解释: |
    母亲们所在的领域，又称"被解放的形相之国"，是歌德融合柏拉图理型世界与自身形态学思想的创造。这里保存着一切曾经存在过之物的纯粹形相（原型），是动态的、不断生成与流变的本源空间，而非静止不变的理念世界。
  书中原文: |
    逃往被解放的形相之国！欣赏那种久已不复存在者；成群的虚影会像浮云般萦绕，请挥舞钥匙，把它们统统赶跑。
  网络来源: https://book.douban.com/annotation/115496371/

- 名词: 火刑柴堆
  分类: 物件
  解释: |
    梅非斯特为贵妇人治疗失恋痛苦时所使用的魔法木炭的来源。他声称木炭是从火刑柴堆（Scheiterhaufen）中拣来的，暗示其带有异教审判的黑暗力量，画出黑线可使变心的情郎回心转意。
  书中原文: |
    说话要懂得尊敬！要找这种木炭须走得很远，当初从火刑柴堆里面把它拣来，何等费劲。
  网络来源: https://baike.baidu.com/item/默菲斯托菲里斯/448207

- 名词: 金发女郎
  分类: 人物
  解释: |
    《浮士德》第二部第一幕中出现在皇帝宫廷的金发贵妇。她因夏天脸上会长褐色斑点（雀斑/黄褐斑）而向梅非斯特求药，梅非斯特给出荒诞的青蛙卵和蛤蟆舌药方。
  书中原文: |
    等等，先生！你瞧我的脸很光，到了讨厌的夏天却不是这样！那时就现出无数淡褐色红斑，把我白净的脸皮弄得很难看。开点药！
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/093.htm

- 名词: 棕色女郎
  分类: 人物
  解释: |
    《浮士德》第二部第一幕中出现在皇帝宫廷的棕发贵妇。她因脚上生冻疮妨碍跳舞行走而向梅非斯特求医。梅非斯特以"以同类治疗同类"为名踩了她一脚，她痛呼感觉像马蹄，冻疮遂被"治好"。
  书中原文: |
    我也要求医！脚上生着冻疮，走路跳舞，都使我受到妨碍，甚至跟人行礼，也不便当。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/093.htm

- 名词: 贵妇人
  分类: 人物
  解释: |
    《浮士德》第二部第一幕中出现在宫廷的一位贵妇。她因爱人变心、内心痛苦而向梅非斯特求助。梅非斯特给她一根从火刑柴堆拣来的木炭，教她在变心情郎的衣物上画黑线，对方便会后悔回头。
  书中原文: |
    让我过去！我的痛苦太大，我的内心像受到千刀万剐；昨天他还对我的秋波醉心，现在却背向着我，跟别人调情。
  网络来源: https://baike.baidu.com/item/浮士德/63083178

- 名词: 侍童
  分类: 人物
  解释: |
    《浮士德》第二部第一幕中出现在皇帝宫廷的年轻侍从。他因恋爱而苦恼，对方嫌他年纪太小。梅非斯特对他旁白说"年纪太轻的，不要去碰运气"，暗示在情场中年轻反而是劣势。
  书中原文: |
    我恋爱，她却以为我尚未成年。
  网络来源: https://m.zhangyue.com/readbook/12803795/3.html

- 名词: 建筑师
  分类: 人物
  解释: |
    《浮士德》第二部第一幕中皇帝宫廷的建筑师。当星士赞美古代神殿的宏伟时，建筑师批评古典风格"笨重而累赘"，推崇哥特式的细长支柱和尖形拱顶，认为后者更能振奋精神。这场争论反映了歌德时代古典主义与哥特式的审美之争。
  书中原文: |
    这就是古式！我难以表示赞同，这应该说是累赘而且笨重。粗野倒算作高贵，笨拙算雄大。我喜爱狭窄的扶壁，高耸无涯；尖形拱顶能够振奋精神；这样的建筑最能感化世人。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/094.htm

- 名词: 骑士
  分类: 人物
  解释: |
    《浮士德》第二部第一幕中出现在皇帝宫廷的骑士们。他们对召唤出的帕里斯幻影发表评论，认为帕里斯像个牧童而非贵公子，缺乏宫廷作风，并希望看到他披上戎装。骑士代表了宫廷中崇尚武勇与礼仪的保守派视角。
  书中原文: |
    我只觉得他像是一个牧童，没有贵公子以及宫廷的作风。瞧他半光着身子倒还漂亮，可是最好看到他披上戎装！
  网络来源: https://m.zhangyue.com/readbook/12803795/3.html
