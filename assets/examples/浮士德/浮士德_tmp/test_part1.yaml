- 名词: 卡柏洛神
  分类: 概念
  解释: 卡柏洛（Cabeiri）是古希腊神话中最古老的一组神祇，最初崇祀于萨摩特拉刻岛及其附近岛屿，可能为农神、土地神。其起源可能包含前希腊元素，与火神赫菲斯托斯的崇拜密切相关。卡柏洛神被奉为航海者的守护神，其神像形似瓦壶，是拙劣的泥像。
  书中原文: 卡柏洛：最古的一组神祇，有二位、三位或四位。最初崇祀于萨摩特拉刻岛及其附近诸岛，可能为农神、土地神，为最古的珀拉斯戈斯人的神。萨摩特拉刻的卡柏洛神密教仪式与厄琉西斯的密教仪式齐名。
  网络来源: https://baike.baidu.com/item/%E4%BC%97%E5%8D%A1%E6%AF%94%E6%B4%9B%E6%96%AF/20212385
- 名词: 福耳喀得斯
  分类: 人物
  解释: 福耳喀得斯（Phorcides），通称格赖埃（Graeae），是希腊神话中的三位白发老妪，为老海神福耳库斯和海妖刻托所生。三人共有一目一齿，要吃要看时互相借用。牙齿比野猪的獠牙还大，手是铜手。她们住在不见日光月光之处。
  书中原文: 老海神福耳库斯和海妖刻托所生，称福耳喀得斯，通称格赖埃，共有三人，名珀佛瑞多，厄倪俄，代诺；为白发老妪，三人共有一目一齿，要吃要看时互相借用。
  网络来源: https://baike.baidu.com/item/%E7%A6%8F%E8%80%B3%E5%BA%93%E6%96%AF/4386710
- 名词: 喀耳刻
  分类: 人物
  解释: 喀耳刻（Circe）是希腊神话中的巫术女神，太阳神赫利俄斯与大洋神女珀耳塞伊斯之女。她定居于埃埃亚岛，精通草药与魔药。在《奥德赛》中，她将奥德修斯的同伴变成猪，但奥德修斯在赫耳墨斯的帮助下抵抗了她的魔法。
  书中原文: 魔女喀耳刻曾将俄底修斯的同伴变成猪。见《奥德修纪》卷十。
  网络来源: https://baike.baidu.com/item/%E5%96%80%E8%80%B3%E5%88%BB/10471876
- 名词: 卡吕普索
  分类: 人物
  解释: 卡吕普索（Calypso）是希腊神话中的海之女神，擎天巨人阿特拉斯之女，居住在俄古吉亚岛。她救起遭遇海难的奥德修斯，用魔法将他留在岛上七年。最终宙斯派遣赫耳墨斯传令，命她释放奥德修斯。
  书中原文: 俄底修斯在魔女卡吕普索的岛上住了七年。见《奥德修纪》卷五。
  网络来源: https://baike.baidu.com/item/%E5%8D%A1%E5%90%95%E6%99%AE%E7%B4%A2/4381209
- 名词: 赫拉
  分类: 人物
  解释: 赫拉（Hera）是希腊神话中的第三代天后，奥林匹斯十二主神之一，宙斯的姐姐和正式妻子。她掌管婚姻、生育和妇女保护，象征物为孔雀、石榴和王冠。其罗马对应神为朱诺（Juno）。她以善妒著称。
  书中原文: 尤诺为宙斯之妻赫拉的罗马名称，帕拉斯即雅典娜女神，维纳斯为爱与美之女神。
  网络来源: https://baike.baidu.com/item/%E8%B5%AB%E6%8B%89/550771
- 名词: 雅典娜
  分类: 人物
  解释: 雅典娜（Athena）是希腊神话中的智慧女神、战争策略女神，奥林匹斯十二主神之一。她是从宙斯头颅中全副武装诞生的，代表防御性、策略性的战争，崇尚和平与智慧。其罗马对应神为密涅瓦（Minerva）。
  书中原文: 尤诺为宙斯之妻赫拉的罗马名称，帕拉斯即雅典娜女神，维纳斯为爱与美之女神。
  网络来源: https://baike.baidu.com/item/%E9%9B%85%E5%85%B8%E5%A8%9C/26005
- 名词: 冥王普路同
  分类: 人物
  解释: 冥王普路同（Pluto）是罗马神话中的冥界之神，对应希腊神话的哈迪斯（Hades），为克洛诺斯与瑞亚之子，宙斯与波塞冬的兄长。普路同源自希腊语ploutos，意为财富，因地下埋藏金银矿产。他同时也是财富之神。
  书中原文: 地球内部的火，因冥王普路同统治下界，故称冥王之火。
  网络来源: https://baike.baidu.com/item/%E6%99%AE%E9%B2%81%E6%89%98/3400148
- 名词: 埃俄罗斯
  分类: 人物
  解释: 埃俄罗斯（Aeolus）是希腊神话中的风神。在荷马《奥德赛》中，他是希波忒斯之子，居住在一个漂浮的小岛上，掌管诸风。他曾赠予奥德修斯一个装有除西风外所有风的风袋，但船员私自打开，狂风将船只吹回原地。
  书中原文: 幽禁在地球内部的气体，具有一种要急冲而出的爆炸力，此力受风神埃俄罗斯的控制。
  网络来源: https://baike.baidu.com/item/%E5%9F%83%E4%BF%84%E7%BD%97%E6%96%AF/10504411
- 名词: 罗得岛
  分类: 地点
  解释: 罗得岛（Rhodes）是希腊爱琴海东南部的一个岛屿。罗得岛北端的罗得港曾有一尊巨大的太阳神赫利俄斯青铜巨像，高达34米，为古代世界七大奇观之一。其原始民族精于铜铁匠技艺，曾为海神锻造三叉戟，也是最先将神像雕成人形的民族。
  书中原文: 居住在罗得岛的原始民族，塔拉萨（海）之后代，精于铜铁匠技艺。海神幼年时曾由他们抚养。他们为海神锻造过三叉戟。罗得岛北端的罗得港有一尊巨大的日神铜像，于公元前290年由建筑家卡瑞斯所造，高达34米，为古代世界七大奇观之一。
  网络来源: https://baike.baidu.com/item/%E7%BD%97%E5%BE%97/16009765
- 名词: 库普洛斯岛
  分类: 地点
  解释: 库普洛斯岛（Cyprus）即塞浦路斯岛，是地中海东部的一个岛屿。在希腊神话中是爱与美女神阿佛洛狄忒（维纳斯）的诞生地。岛上的帕福斯（Paphos）是维纳斯的圣地。鸽子是维纳斯的神禽。该岛历史上先后被多个外来异族征服。
  书中原文: 帕福斯是库普洛斯岛的城市，维纳斯的圣地。鸽子是维纳斯的神禽。各占领者的纹章和旗帜。雄鹰指罗马人，双翅狮指威尼斯人，十字架指基督徒，月亮指回教徒。
  网络来源: https://baike.baidu.com/item/%E5%A1%9E%E6%B5%A6%E8%B7%AF%E6%96%AF/129361
- 名词: 特洛亚战争
  分类: 事件
  解释: 特洛亚战争（Trojan War）是古希腊神话中最著名的战争事件，发生在公元前13或12世纪左右。特洛伊王子帕里斯劫走斯巴达王墨涅拉俄斯的妻子海伦，阿伽门农召集希腊联军远征特洛伊，战争持续十年。以荷马史诗《伊利亚特》和《奥德赛》为核心文学作品。
  书中原文: 帕里斯在离开希腊海岸时，涅柔斯曾对他预言特洛亚的浩劫。在贺拉斯《卡尔米那》第一卷第十五歌中曾加以叙述。
  网络来源: https://baike.baidu.com/item/%E7%89%B9%E6%B4%9B%E4%BC%8A%E6%88%98%E4%BA%89
- 名词: 阿耳戈号
  分类: 物件
  解释: 阿耳戈号（Argo）是希腊神话中伊阿宋率领英雄们前往科尔喀斯夺取金羊毛时所乘的大船。在女神雅典娜的帮助下建造，安装了来自多多那圣树的可预言未来的木板。随行英雄包括赫拉克勒斯、俄耳甫斯、忒修斯等五十位著名英雄。
  书中原文: 指阿耳戈号的英雄们，在伊阿宋的领导之下，航海前往科尔喀斯夺取金羊毛皮。
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E5%B0%94%E6%88%88%E8%88%B9%E8%8B%B1%E9%9B%84%E7%9A%84%E4%BC%A0%E8%AF%B4/12769071
- 名词: 金羊毛
  分类: 物件
  解释: 金羊毛（Golden Fleece）是希腊神话中的宝物，出自一只名为克律索马罗斯的神羊的金色羊毛。佛里克索斯将金羊毛赠予科尔喀斯国王埃厄忒斯，国王将它钉在战神阿瑞斯的圣林中，由一条永不睡眠的巨龙看守。伊阿宋率阿耳戈英雄在美狄亚帮助下取得金羊毛。
  书中原文: 指阿耳戈号的英雄们，在伊阿宋的领导之下，航海前往科尔喀斯夺取金羊毛皮。
  网络来源: https://baike.baidu.com/item/%E9%87%91%E7%BE%8A%E6%AF%9B
