- 名词: 古忒萨利亚妖婆
  分类: 概念
  解释: 古希腊传说中色萨利（忒萨利亚）地区的女巫，以精通巫术、能操控月亮而闻名。在《浮士德》中指代古希腊巫术传统，海伦的侍女们称自己摆脱了其精神枷锁。
  书中原文: 姑娘们，赶快！我们已经摆脱了魔术，古忒萨利亚妖婆的可怕的精神枷锁
  网络来源: https://zh.wikipedia.org/zh-cn/%E9%98%BF%E6%A0%BC%E8%8E%B1%E5%A5%A5%E5%A6%AE%E4%B8%9D

- 名词: 阿福花草地
  分类: 地点
  解释: 希腊神话中冥界的一部分，又称水仙平原，是那些生前既无伟大功绩也无重大罪孽的平凡灵魂所去之处。在《浮士德》中，合唱队描述自己身处阿福花草地的低僻之处。
  书中原文: 可是我们总是呆在阿福花草地的低僻之处，跟那些细长的白杨、不结实的柳树为伍
  网络来源: https://zh.wikipedia.org/zh-hk/%E6%B0%B4%E4%BB%99%E5%B9%B3%E5%8E%9F

- 名词: 狄俄倪索斯
  分类: 人物
  解释: 希腊神话中的酒神，奥林匹斯十二主神之一，宙斯与塞墨勒之子。他教导人类种植葡萄和酿酒，代表迷醉、狂喜与艺术创造力。罗马名称为巴克斯（Bacchus）。
  书中原文: 狄俄倪索斯酒神已经脱去神秘的外衣；跟着羊足男子、晃晃的羊足女子一同出现
  网络来源: https://zh.wikipedia.org/zh-tw/%E7%8B%84%E4%BF%84%E5%B0%BC%E7%B4%A2%E6%96%AF

- 名词: 塞勒诺斯
  分类: 人物
  解释: 希腊神话中的山林之神，酒神狄俄倪索斯的养父和导师，萨提尔之首。形象为秃顶、肥胖的老年男性，长有马或驴的耳朵和尾巴，以醉酒和智慧著称。
  书中原文: 塞勒诺斯的长耳兽也在发出尖锐的蛮叫
  网络来源: https://zh.wikipedia.org/zh-tw/%E8%B3%BD%E5%8A%9B%E7%B4%8D%E6%96%AF

- 名词: 赫利俄斯
  分类: 人物
  解释: 希腊神话中的太阳神，提坦神许珀里翁与忒亚之子。每日清晨驾驶四匹焰马拉动的太阳车穿越天空，被称为"全视者"。常被后世与阿波罗混同，但实际为不同神祇。
  书中原文: 只要一切天神，尤其是日神赫利俄斯，给以通风、湿润、温暖、热晒，使葡萄堆积如山
  网络来源: https://zh.wikipedia.org/zh-sg/%E8%B5%AB%E5%88%A9%E4%BF%84%E6%96%AF

- 名词: 迈安德洛斯河
  分类: 地点
  解释: 土耳其西南部的一条河流，现代名称为大门德雷斯河（Büyük Menderes）。以其极度蜿蜒曲折的河道闻名，英语词汇"meander"（蜿蜒）即源于此河之名。两岸分布着米利都等古希腊重要城邦。
  书中原文: 我们像迈安德洛斯河弯弯曲曲，愈流愈下，先是灌溉草地，其次牧场，然后屋外的庭园
  网络来源: https://en.wikipedia.org/wiki/Meander_(mythology)

- 名词: 潘神
  分类: 人物
  解释: 希腊神话中的牧神、自然之神，赫耳墨斯之子。半人半羊形象，长有羊腿、羊角和羊耳。掌管森林、田地和羊群，能引发恐惧（英语"panic"一词即源于其名）。擅长吹奏排箫（潘笛）。
  书中原文: 倾听一切万籁之声，或是鸟鸣，或是芦笛，或是潘神震恐之声，我们立即作出响应
  网络来源: https://zh.wikipedia.org/zh-hans/%E6%BD%98_(%E5%B8%8C%E8%85%8A%E7%A5%9E%E8%AF%9D)

- 名词: 挽歌
  分类: 概念
  解释: 源自古希腊文"ἔλεγος"，一种抒情诗体，最初以双行体（六音步+五音步交替）为格律形式。题材从悼亡扩展到战争、爱情、哲理、政治讽喻等。在《浮士德》中为欧福里翁之死而作。
  书中原文: （休止。）合唱（挽歌。）不会孤单！——不论去哪里，因为我们总会认识你
  网络来源: https://baike.baidu.com/item/%E5%93%80%E6%AD%8C/6724841

- 名词: 祥云
  分类: 概念
  解释: 中国传统文化中象征祥瑞的云气，传说中为神仙所驾的彩云。在《浮士德》中描述海伦的衣裳化为祥云，裹住浮士德将他飘入高空，具有从凡俗升入神圣境界的象征意义。
  书中原文: 海伦的衣裳化为祥云，裹住浮士德，将他飘入高空，带他一同飞去
  网络来源: https://wapbaike.baidu.com/item/%E7%A5%A5%E4%BA%91/990830

- 名词: 衣裳
  分类: 物件
  解释: 指海伦消失后留下的衣物，在《浮士德》中具有神圣的象征意义。福耳库阿斯告诫浮士德紧紧抓住，衣裳虽非失去的女神本身，却很神圣，可载浮士德脱离凡俗升入清空。
  书中原文: 紧紧抓住给你留下的一切。衣裳决不要放手。因为恶灵们已经拖住衣角
  网络来源: https://zh.wikipedia.org/zh-hans/%E6%B5%AE%E5%A3%AB%E5%BE%B7

- 名词: 七弦琴
  分类: 物件
  解释: 即古希腊里拉琴（Lyre），拨弦乐器，通常有七根弦，由共鸣箱、双臂和横杆构成U形框架。在《浮士德》中为欧福里翁的遗物，福耳库阿斯拾起后称可用以孝敬诗人。
  书中原文: 福耳库阿斯（从地上拾起欧福里翁的衣服、披风和七弦琴，走到舞台前部，高举着这些遗物而发言）
  网络来源: https://wapbaike.baidu.com/item/%E9%87%8C%E6%8B%89%E7%90%B4/2252055
