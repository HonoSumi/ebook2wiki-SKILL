- 名词: 库普里斯
  分类: 人物
  解释: 希腊爱与美女神阿佛洛狄忒（Aphrodite）的别称，意为"塞浦路斯的女士"。源于希腊神话中阿佛洛狄忒诞生于塞浦路斯岛附近海面泡沫之中的传说。在荷马史诗《伊利亚特》及欧里庇得斯悲剧中常用此名。生物学中"Cypris stage"（腺介期）一词亦来源于此。
  书中原文: 保卫库普里斯的车辆
  网络来源: https://www.theoi.com/Cult/AphroditeCult.html
- 名词: 四大（地水火风）
  分类: 概念
  解释: 佛教及古印度哲学中的四种构成物质世界的基本元素——地（坚固性）、水（湿性）、火（暖性）、风（动性）。佛教认为一切物质（色法）均由四大和合而成，四大分散则意味着死亡。古希腊亦有恩培多克勒提出的类似四元素说。在《浮士德》中，结尾合唱以"四大"统摄万物、歌颂自然。
  书中原文: 欢呼四大，地水火风！
  网络来源: https://baike.baidu.com/item/%E5%9B%9B%E5%A4%A7/23569182
- 名词: 普绪罗族
  分类: 概念
  解释: 古代北非利比亚地区的原住民柏柏尔部落，居住在大锡尔特湾沿岸。据希罗多德《历史》记载，该族因沙漠热风吹干水源而全体出征与风作战，结果被风沙活埋。老普林尼则称其在与纳萨莫尼斯人的战争中几乎灭绝。以天生对蛇毒免疫、擅长弄蛇术而闻名，传说屋大维曾征召其族人吸取克利奥帕特拉的蛇毒。
  书中原文: 普绪罗族和马耳西族
  网络来源: https://www.wikiwand.com/en/Psylli
- 名词: 马耳西族
  分类: 概念
  解释: 古代意大利中部的奥斯坎-翁布里亚语族部落，居住在富奇努斯湖东岸地区（今阿布鲁佐大区马尔西卡）。部落名称源于战神马尔斯（Mars），崇拜医护女神安齐蒂亚。公元前304年与罗马结盟，后在同盟者战争中与罗马作战，战后获罗马公民权。另有同名的日耳曼部落，在公元14—16年间被罗马击溃消失。
  书中原文: 普绪罗族和马耳西族
  网络来源: https://baike.baidu.com/item/%E9%A9%AC%E5%B0%94%E8%A5%BF%E4%BA%BA/619633
