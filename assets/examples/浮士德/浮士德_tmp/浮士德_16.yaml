- 名词: 魔女丹房
  分类: 地点
  解释: |
    歌德《浮士德》第一部第六场的场景名称，魔女调制返老还童药酒的地方。场景中设有矮灶、大锅、魔镜和各种怪异器具，猿猴作为仆役在场。浮士德在此饮下药酒恢复青春，并在魔镜中看到美女幻影（海伦的预兆）。该场景象征非理性、混乱、原始欲望的空间，与书斋的理性形成对立。
  书中原文: |
    这是魔女的九九口诀！欢迎，可爱的黄昏之光！你飘进了这座圣境。
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 药酒
  分类: 物件
  解释: |
    魔女在丹房中调制的返老还童药酒，浮士德饮下后恢复青春。此酒由魔女以荒诞的仪式调制，浮士德饮下时杯口迸发火焰。梅非斯特称喝了这种酒任何妇人都会被当作海伦，意味着药酒激发了浮士德的情欲。
  书中原文: |
    快把你的药酒拿出，把这只杯子斟得满到杯口；它对我的朋友不会有害。
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 丘比特
  分类: 人物
  解释: |
    罗马神话中的小爱神，在《浮士德》中梅非斯特用以暗示情欲。原文中梅非斯特对浮士德说不久将感到丘比特怎样跳来跳去不得安身，指药酒生效后浮士德将被情欲驱使。在第二部古典的瓦尔普吉斯之夜中，厄洛斯（丘比特的希腊原型）被作为宇宙生成的原动力受到赞颂。
  书中原文: |
    不久你就可以满怀高兴地感到：丘比特怎样跳来跳去不得安身。
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 玛加蕾特
  分类: 人物
  解释: |
    《浮士德》第一部中的女主人公，昵称格蕾辛（又译葛丽卿、甘泪卿）。她是出身平民阶层的纯洁少女，浮士德在街道上与她不期而遇后一见钟情。她先后经历误杀母亲、兄长被杀、溺婴悲剧，最终被处死但灵魂获得救赎。她是永恒之女性的第一层面——市民之爱的代表。
  书中原文: |
    美丽的小姐，我能否冒昧，伸手臂给您，护送您一回？我不是小姐，也不美丽，不要护送，也能去家里。
  网络来源: https://www.wikiwand.com/zh-cn/articles/%E6%B5%AE%E5%A3%AB%E5%BE%B7%E2%85%A0

- 名词: 格蕾辛
  分类: 人物
  解释: |
    玛加蕾特（Margarete）的昵称，德语亲昵爱称。中文又译作葛丽卿、甘泪卿、格雷琴。她是《浮士德》第一部中的女主人公，纯洁虔诚的平民少女，被浮士德引诱后经历爱情悲剧。她的命运在西方音乐中有深远影响，尤其是舒伯特的艺术歌曲《纺车旁的格蕾辛》。
  书中原文: |
    天呀，这孩子真是美丽！我从没见过这样的仙姿。
  网络来源: https://www.wikiwand.com/zh-cn/articles/%E6%B5%AE%E5%A3%AB%E5%BE%B7%E2%85%A0

- 名词: 街道
  分类: 地点
  解释: |
    《浮士德》第一部第七场的场景名称。浮士德在街道上遇见从教堂归来的玛加蕾特，被她美貌吸引而搭讪，但被对方拒绝。这场戏是玛加蕾特悲剧的开端，标志着浮士德从书斋走入了世俗生活。
  书中原文: |
    美丽的小姐，我能否冒昧，伸手臂给您，护送您一回？
  网络来源: https://book.qq.com/book-read/40527688/15

- 名词: 傍晚
  分类: 地点
  解释: |
    《浮士德》第一部第八场的场景名称，地点在玛加蕾特的小巧整洁的房间。浮士德在梅非斯特引导下潜入玛加蕾特的闺房，被房间的整洁、朴素和纯洁气氛深深打动，内心产生敬畏与羞愧。
  书中原文: |
    欢迎，可爱的黄昏之光！你飘进了这座圣境。
  网络来源: https://m.zhangyue.com/readbook/13020485/16.html

- 名词: 忏悔
  分类: 概念
  解释: |
    玛加蕾特在遇见浮士德之前刚从教堂向神父忏悔出来，表明她是一位虔诚的天主教徒。梅非斯特自称对纯洁无罪的她无能为力，因为她与神有约。忏悔在此处象征玛加蕾特的宗教虔诚，也预示她日后因罪孽而精神崩溃的悲剧。
  书中原文: |
    她从神父处回来，神父说她无罪可言；我偷偷走过她椅子旁边，这姑娘真正清白无辜，去忏悔真是无缘无故。
  网络来源: https://book.qq.com/book-read/40527688/15

- 名词: 药效咒语
  分类: 概念
  解释: |
    魔女在浮士德饮下药酒后给他的一个咒语，称经常哼唱可增强药效。此咒语与魔女念诵的女巫的九九表（Hexen-Einmaleins）有关，是一种增强魔药效力的歌谣。
  书中原文: |
    有一首歌！你如果常去哼哼，你会发觉具有特别的灵效。
  网络来源: https://li91-208.members.linode.com/book/9608/345147.htm

- 名词: 登徒子
  分类: 概念
  解释: |
    中文古典典故，出自宋玉《登徒子好色赋》，后世用以代指好色之徒。在《浮士德》中译本中，梅非斯特以此词嘲讽浮士德见到玛加蕾特后便急于占有，实为一种归化翻译。德语原文意为你说话已经像个法国人了，译者以登徒子替换了法国人风流多情的欧洲文化意象。
  书中原文: |
    你开口像个登徒子之流，什么鲜花都想弄到手，任何贞洁女子的芳心，满以为无不可以占领。
  网络来源: https://book.qq.com/book-read/40527688/15

- 名词: 南欧小说
  分类: 概念
  解释: |
    原文注释中指诲淫的法国小说或意大利小说。梅非斯特嘲讽浮士德急于得手时引用，暗示南欧小说中教导的循序渐进引诱女性的套路。这反映了18世纪欧洲文学中的地域刻板印象。
  书中原文: |
    乐趣不会有如此之大，除非先来个颠之倒之，通过各种滥调陈词，把小娃娃搓弄个停当，像南欧小说教导的那样。
  网络来源: https://book.qq.com/book-read/40527688/15

- 名词: 宝藏
  分类: 概念
  解释: |
    梅非斯特以地下宝藏引诱浮士德的工具之一。原文中梅非斯特提议用宝物（珠宝匣）引诱玛加蕾特，称知道许多美好的地方有从前埋下的宝藏。在第一部中特指梅非斯特寻找地下宝藏作为礼物送给玛加蕾特以获取其好感。
  书中原文: |
    我知道许多美好的地方，有许多从前埋下的宝藏；我定要稍许勘探一番。
  网络来源: https://book.qq.com/book-read/40527688/15

- 名词: 白砂
  分类: 习俗
  解释: |
    德国及北欧地区的一种传统家务习俗。在木地板上撒上干净的白色细沙，用扫帚将其扫出波纹状或装饰性图案，既起到清洁和防滑作用，也是一种朴素的装饰。浮士德在玛加蕾特房间中看到这种布置，感叹她的勤劳美德。
  书中原文: |
    教你把台布整整齐齐地铺好，还要把脚下的白砂撒成波纹。
  网络来源: https://book.douban.com/annotation/87989744

- 名词: 圣诞礼物
  分类: 事件
  解释: |
    圣诞节期间互赠礼物的基督教文化传统。浮士德坐在玛加蕾特祖父的皮椅上，想象小时候的玛加蕾特在圣诞节时为了感谢礼物而亲吻祖父干瘪的手，反映了玛加蕾特家庭生活的温馨与虔诚。
  书中原文: |
    也许她曾在这里用樱桃小口，为了对圣诞礼物表示谢恩，虔诚地吻过祖父的干瘪的手。
  网络来源: https://m.zhangyue.com/readbook/13020485/16.html

- 名词: 魔术
  分类: 概念
  解释: |
    浮士德在玛加蕾特房间中自省时使用的意象。我被魔术的妖雾罩住——这里的魔术的妖雾指情感的魔力，让原本为寻欢作乐而来的浮士德被房间中纯洁真挚的生活气息所打动，内心产生震撼与迷失，不是指梅非斯特的魔法。
  书中原文: |
    我被魔术的妖雾罩住？我本为寻欢作乐而来，如今却像在鸳梦之中融解！
  网络来源: https://book.qq.com/book-read/40527688/16

- 名词: 鸳梦
  分类: 概念
  解释: |
    鸳鸯梦的简称，比喻情侣的美梦或爱情幻境。浮士德在玛加蕾特房间中感叹自己本为寻欢作乐而来却像在鸳梦之中融解，表现了他从情欲冲动到内心情感被纯真氛围软化的心理转变。
  书中原文: |
    我本为寻欢作乐而来，如今却像在鸳梦之中融解！
  网络来源: https://book.qq.com/book-read/40527688/16

- 名词: 布施羹汤
  分类: 概念
  解释: |
    《浮士德》中讽刺内容浅薄、投合公众趣味的无聊作品的隐喻。原指修道院布施给贫民和乞丐的薄羹汤。歌德在1797年7月26日致席勒信中曾批评当时一部流行戏为真正的布施羹汤。恩格斯后来也在著作中引用此意象批评杜林哲学。
  书中原文: |
    修道院布施给贫民和乞丐的薄羹汤。此处讽刺内容浅薄、投合公众趣味的无聊作品。
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 命运如玻璃
  分类: 概念
  解释: |
    源自德国谚语"Glück und Glas, wie leicht bricht das"（幸福和玻璃，多么容易破碎）。在《浮士德》魔女丹房场景中，长尾猿滚着大球说这是世界，声如玻璃，容易破裂，里面是空心，以玻璃喻命运的脆弱无常。
  书中原文: |
    这是世界，上去，下来，滚转个不停；声如玻璃，容易破裂；里面是空心。
  网络来源: https://book.douban.com/subject/35999702/blockquotes

- 名词: 筛子盗贼
  分类: 习俗
  解释: |
    16-17世纪德国的一种民间巫术——筛卜（Coscinomancy），用筛子和剪刀侦查盗贼。做法是由女巫用两个中指夹住筛子念咒，逐一念出嫌疑人姓名，念到真犯时筛子旋转。《浮士德》中魔女丹房的公猿取下筛子说倘使你是个贼子我立即把你认识清楚。
  书中原文: |
    倘使你是个贼子，我立即把你认识清楚。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/031.htm

- 名词: 拂尘
  分类: 物件
  解释: |
    驱蝇拂尘，在《浮士德》中为梅非斯特使用的道具。魔鬼一名蝇主（别西卜，Lord of Flies），故执拂尘为笏。在魔女丹房场景中，梅非斯特用拂尘挡开魔女泼洒的火焰并击打坛坛罐罐，既可看作武器，也是其魔鬼身份的标志性用具。
  书中原文: |
    梅非斯特用手中拂尘挡回去，击打着坛坛罐罐。
  网络来源: https://baike.baidu.com/item/%E9%BB%98%E8%8F%B2%E6%96%AF%E6%89%98%E8%8F%B2%E9%87%8C%E6%96%AF/448207

- 名词: 破裂的王冠
  分类: 物件
  解释: |
    魔女丹房场景中，诸猿要求扮演国王的梅非斯特将破裂的王冠修好。此情节影射世间的国王靠人民的血汗保持王位，讽刺世俗权力的虚妄与脆弱。王冠在此象征权力与荣耀的虚幻空无，破裂暗示一切世俗权威终将崩塌。
  书中原文: |
    诸猿要求扮演国王的梅非斯特将破裂的王冠修好，影射世间的国王靠人民的血汗保持王位。
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 偶然得诗
  分类: 概念
  解释: |
    魔女丹房中诸猿坦白承认它们诗中的思想乃偶然得来。此处歌德借以讽刺雕琢词句、言之无物的诗人。猿猴的诗句看似深奥实则空洞，歌德以此批评那些追求表面华丽而缺乏真实思想的诗歌创作风气。
  书中原文: |
    因为诸猿坦白承认它们诗中的思想乃是偶然得来。此处讽刺雕琢词句、言之无物的诗人。
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 魔女被烧痛
  分类: 事件
  解释: |
    魔女丹房场景中的一个喜剧性桥段。雌猿忘了搅锅导致锅沸溢，烈焰喷向烟囱，魔女被烫伤，从烟囱中大叫着落下，咒骂猿猴并拿勺舀火焰泼向众人。此情节充满闹剧色彩，展现魔女的暴躁与魔女丹房的混乱气氛。
  书中原文: |
    哎唷！哎唷！哎唷！挨刀的畜生！瘟猪猡！烧坏了老娘，溢掉了锅！
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 马蹄足
  分类: 概念
  解释: |
    恶魔的传统标志性特征之一。梅非斯特在传说中有一只马蹄（马脚），但在《浮士德》中他着骑士装束将其遮掩。在魔女丹房场景中，魔女起初没认出梅非斯特，因为他以骑士打扮出现，但她本应对魔鬼的马蹄有所察觉。马蹄足象征魔鬼的兽性与堕落本质。
  书中原文: |
    恶魔有一只马蹄足。梅非斯特现在作骑士装束，故魔女没有注意到。
  网络来源: https://baike.baidu.com/item/%E9%BB%98%E8%8F%B2%E6%96%AF%E6%89%98%E8%8F%B2%E9%87%8C%E6%96%AF/448207

- 名词: 乌鸦信使
  分类: 概念
  解释: |
    源自北欧神话。主神奥丁（Odin，峨丁大神）有两只乌鸦，名Huginn（思想）和Muninn（记忆），每天飞往人间观察并回报奥丁。在民间传说中它们由神鸟转为恶魔之鸟（魔鸟），在《浮士德》中成为梅非斯特的信使和跟随。
  书中原文: |
    北欧神话中的峨丁大神，有两只乌鸦，名Huginn（思想）和Muninn（记忆），是他的信使和跟随，后来转为恶魔之鸟。
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 假腿肚
  分类: 习俗
  解释: |
    18世纪欧洲的一种时尚，爱打扮的人在裤脚管内装假腿肚以塑造良好体型。在《浮士德》中梅非斯特以此遮掩自己的马蹄足，假腿肚既是时尚潮流的体现，也是魔鬼伪装自己的手段，歌德借此对当时社会风尚进行了讽刺。
  书中原文: |
    当时爱打扮的人在裤脚管内装假腿肚。
  网络来源: https://book.douban.com/subject/11501768/blockquotes

- 名词: 弥撒仪式
  分类: 概念
  解释: |
    天主教的圣体圣事礼仪。歌德在魔女丹房场景中刻意模拟弥撒仪式——魔女画圈如圣坛、念咒如诵经、药酒如圣餐——以此戏仿和讽刺天主教的宗教仪式。梅非斯特更直接嘲讽三位一体教义。
  书中原文: |
    讽刺模拟天主教的弥撒仪式。
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 江湖医生
  分类: 人物
  解释: |
    魔女在丹房中的行径被刻画为江湖医生式的骗术。浮士德厌恶地说话，梅非斯特则说她做医生总要耍点手法。歌德借此讽刺中世纪炼金术士和江湖郎中以玄虚仪式蒙骗病人的行为。
  书中原文: |
    讽刺卖弄玄虚的江湖医生。
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 不劳而获
  分类: 概念
  解释: |
    魔女在丹房中以模拟教士口吻朗诵的咒语内容：唯弗思之徒，始能受赠与，彼将不劳而获之。讽刺那些不经过思考就能轻易获得知识或成果的人，也讽刺了宗教中因信称义等不需理性思辨即可获得救赎的教条。
  书中原文: |
    唯弗思之徒，始能受赠与，彼将不劳而获之。
  网络来源: https://book.qq.com/book-read/40527688/14

- 名词: 火焰
  分类: 概念
  解释: |
    在《浮士德》中火被视为恶魔的伴友和元素。浮士德举杯饮药时杯口迸发轻微火焰，梅非斯特说你和恶魔以尔我相称还要对火焰感到惊慌。火焰象征恶魔的力量和元素属性，也暗示浮士德与魔鬼结盟后已不再是人间的普通人。
  书中原文: |
    你跟恶魔以尔我相称，还要对火焰感到惊慌？
