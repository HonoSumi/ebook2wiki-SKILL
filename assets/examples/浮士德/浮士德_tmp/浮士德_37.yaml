- 名词: 学士
  分类: 人物
  解释: 歌德《浮士德》中的角色，在第一部中是一名初入大学的学生，曾向浮士德（实为梅非斯特假扮）求教。多年后以学士（Baccalaureus）身份归来，成为狂妄自大、蔑视一切权威的青年代表。他宣称"世界本不存在，得由我把它创造"，否定一切经验与传统，甚至说"如果我不愿意，魔鬼也不会存在"，代表了青年激进主义和极端主体性哲学的形象。
  书中原文: '"本没有世界，是我把它造成；我把太阳从大海里面捞起；月亮的盈亏完全自我而始；白昼在我的路上炫耀光华，大地迎迓我以万绿和百花。"'
  网络来源: https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7/20411089

- 名词: 荷蒙库路斯
  分类: 人物
  解释: 歌德《浮士德》中由瓦格纳在实验室中用化学方法制造的人工生命体（Homunculus），又称"瓶中小人"。他是一个装在玻璃烧瓶中的透明小人，是纯粹的精神存在，具有超凡的感知能力。他称瓦格纳为"爸爸"，称梅非斯特为"叔叔"，诞生后立即要求活动并引导浮士德前往希腊古典世界。此形象源自中世纪欧洲炼金术传统，尤以帕拉塞尔苏斯的记载最为著名。
  书中原文: '"荷蒙库路斯（在瓶中对瓦格纳说）：爸爸！你好？这并不是游戏。请你把我温柔地抱在你怀里，但不要太紧，以免压碎小瓶。"'
  网络来源: https://baike.baidu.com/item/%E8%8D%B7%E8%92%99%E5%BA%93%E9%B2%81%E6%96%AF/10815983

- 名词: 实验室
  分类: 地点
  解释: 《浮士德》第二部第二幕的场景，标题为"中世纪风格的实验室"。场景布置为中世纪式，有种种散乱的笨拙器械，供幻想的目的之用。瓦格纳在此进行人造人实验，通过数百种物质的调和与蒸馏，成功在长颈烧瓶中创造出荷蒙库路斯。梅非斯特在瓦格纳实验过程中来访并参与其中。
  书中原文: '"第二场 实验室。为中世纪式，有种种散乱的笨拙的器械，供幻想的目的之用。瓦格纳（在炉边）。"'
  网络来源: https://www.jianshu.com/p/3aeb00baf67d

- 名词: 烧瓶
  分类: 物件
  解释: 《浮士德》中瓦格纳创造荷蒙库路斯所使用的长颈玻璃烧瓶（retort/flask）。瓦格纳在瓶中调和数百种物质，经过蒸馏使团块由浊变清，最终结晶成一个优美的小人。荷蒙库路斯必须严格封闭在瓶中生存，一旦离开瓶子就会消亡。该烧瓶是炼金术传统中制造人造人的核心器具，也是精神与物质分离的象征。
  书中原文: '"在这长颈烧瓶里面，好像烧着有生命的火炭，又像辉煌的红玉一样，在黑暗中闪着电光；明亮的白光显现出来！"'
  网络来源: https://baike.baidu.com/item/%E8%8D%B7%E8%92%99%E5%BA%93%E9%B2%81%E6%96%AF/10815983

- 名词: 人造人
  分类: 概念
  解释: 指人类通过非自然方式创造的生命体。在《浮士德》中体现为瓦格纳在实验室中用化学方法合成的荷蒙库路斯（Homunculus）。该概念源自古希腊和中世纪炼金术传统，帕拉塞尔苏斯提出在烧瓶中用精液和马粪发酵制造人造人的方法。在文学史上，歌德的荷蒙库路斯是人工生命母题的重要里程碑，后来影响了玛丽·雪莱的《弗兰肯斯坦》等诸多作品。
  书中原文: '"一个人将被造成。以前流行的生殖方式，我们认为荒唐愚蠢……我们敢凭着理性将实验进行，自然一向把它们有机地组成，我们却使它们结晶。"'
  网络来源: https://baike.baidu.com/item/%E4%BA%BA%E9%80%A0%E4%BA%BA/3424346

- 名词: 经验
  分类: 概念
  解释: 《浮士德》中的核心哲学概念之一。学士在对话中猛烈抨击经验的价值，称"经验！就像泡沫和尘屑！它跟精神难以匹敌"，否定一切经验知识的可靠性。这一对话反映了歌德时代关于经验与理性、理论与实践的哲学争论。学士的极端立场与浮士德本人从书斋走向经验世界的选择形成鲜明对照，是《浮士德》中认识论主题的重要表达。
  书中原文: '"经验！就像泡沫和尘屑！它跟精神难以匹敌。承认吧！从来所知的一切，根本没有一知的价值……"'
  网络来源: https://www.chinafolklore.org/web/?NewsID=2975

- 名词: 理性
  分类: 概念
  解释: 《浮士德》中启蒙思想的核心概念。瓦格纳在制造人造人时宣称"人们对于自然的神秘常大加赞称，我们敢凭着理性将实验进行"，代表了启蒙时代对理性的绝对信心。然而歌德通过浮士德的探索之旅同时展示了理性的局限——理性不能穷尽生命的全部真理。学士对经验和传统的彻底否定也可以看作是理性走向极端的表现。理性与原欲的张力构成了浮士德"两个灵魂"冲突的本质。
  书中原文: '"人们对于自然的神秘常大加赞称，我们敢凭着理性将实验进行，自然一向把它们有机地组成，我们却使它们结晶。"'
  网络来源: https://wapbaike.baidu.com/tashuo/browse/content?id=1fc94913650d941d62aa392b

- 名词: 灵魂
  分类: 概念
  解释: 《浮士德》中最核心的概念之一，贯穿全剧。本段中瓦格纳提到"灵魂和肉体这样巧妙地调和，紧紧结合，好像永不要离分，却为什么每天总不能安分"，道出了灵与肉的永恒矛盾。浮士德著名的"两个灵魂"之叹揭示人心中崇高与世俗的冲突。灵魂在歌德笔下不是静态的不朽实体，而是在行动与追求中不断生成的动态存在——浮士德正是因为永不停歇的追求而最终获得拯救。
  书中原文: '"灵魂和肉体这样巧妙地调和，紧紧结合，好像永不要离分，却为什么每天总不能安分。"'
  网络来源: https://zh.m.wikipedia.org/zh-mo/%E6%B5%AE%E5%A3%AB%E5%BE%B7_(%E6%AD%8C%E5%BE%B7)

- 名词: 自然
  分类: 概念
  解释: 歌德自然哲学的核心概念。在《浮士德》的本段中，瓦格纳提到"人们对于自然的神秘常大加赞称"，荷蒙库路斯也说"自然物总是感到宇宙不宽"。歌德把自然视为一个有机的、充满生命力的整体，人既是自然的一部分，又试图通过理性超越自然。浮士德与梅非斯特的赌约本身就是关于人性自然与超越自然的哲学探讨。歌德本人的自然科学研究（植物学、解剖学、色彩学）也深刻影响了《浮士德》的创作。
  书中原文: '"自然物总是感到宇宙不宽，人工的产物却需要关闭的空间。"'
  网络来源: https://cjxs.whu.edu.cn/info/1391/4521.htm

- 名词: 结晶的人
  分类: 概念
  解释: 《浮士德》中梅非斯特对荷蒙库路斯的戏称，也指瓦格纳通过人工方式创造的生命体。梅非斯特以讽刺的口吻说"从前我在外面周游各处，也曾亲眼见过结晶的人"，暗示"结晶的人"即人造人/荷蒙库路斯。此概念借用了自然科学的比喻——正如物质可以通过结晶过程形成规则形态，瓦格纳也试图通过理性方法使生命"结晶"。这是歌德对启蒙理性主义试图用机械方法还原生命本质的批判性隐喻。
  书中原文: '"寿长的人阅历丰富，他看世事没有一件算得上奇闻，从前我在外面周游各处，也曾亲眼见过结晶的人。"'
  网络来源: https://www.douban.com/group/topic/298349269/?type=collect#sep

- 名词: 绝对主义
  分类: 概念
  解释: 《浮士德》中梅非斯特对学士的告诫用语。梅非斯特看到学士变得决断而泼辣，讽刺地提醒他"可别做绝对主义者回家"，意即不要过于武断专横、自以为是。此处的"绝对主义"指一种极端的主体性哲学立场——学士认为世界由自我创造，一切权威和传统都可以被否定。"绝对主义者"在这里暗讽了当时德国青年受费希特等哲学家影响的激进自我意识，即把自我视为一切真理的绝对起点和终点。
  书中原文: '"看来你倒颇有决断而泼辣，可别做绝对主义者回家。"'
  网络来源: https://www.70thvictory.com.tw/wenxue/shijiemingzhu/196107_2.htm

- 名词: 瑞典发式
  分类: 习俗
  解释: 《浮士德》中梅非斯特注意到学士模仿的一种流行发型。梅非斯特说"今天瞧你是瑞典发式"，以嘲讽的口吻评论学士的外表，暗示当时德国大学里受瑞典或北欧风格影响的某种时尚发型。歌德通过这一细节刻画了学士追逐时髦、自以为是的性格特征——他不仅在思想上激进，在外表上也刻意求新求变。这句台词也反映了16-17世纪德国与瑞典之间的文化交流。
  书中原文: '"今天瞧你是瑞典发式。看来你倒颇有决断而泼辣，可别做绝对主义者回家。"'
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/100.htm
