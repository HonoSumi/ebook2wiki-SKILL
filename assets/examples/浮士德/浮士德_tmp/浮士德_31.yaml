- 名词: 芳恩
  分类: 人物
  解释: |
    罗马神话中的森林与田野精灵，又译弗恩、法翁，对应希腊神话
    中的萨堤洛斯。形象为半人半鹿（或半人半羊），长有鹿腿、鹿耳
    和短尾，面容俊美，性情温和，喜欢音乐和舞蹈。在歌德《浮士德》
    第二部假面舞会场景中，芳恩们以橡叶为冠、细耳塌鼻的造型登场，
    与萨堤洛斯、土精等神话角色一同狂欢。
  书中原文: |
    芳恩一帮，跳舞狂欢，橡叶之冠，戴在头上，从头顶上的鬈发里面，
    露出耳朵，又细又尖，一副扁脸，装着塌鼻，并不妨碍跟妇女亲昵。
    只要他伸手，就是美女也不会拒绝跟他跳舞。
  网络来源: |
    https://baike.baidu.com/item/%E5%BC%97%E6%81%A9/4594743
- 名词: 萨堤洛斯
  分类: 人物
  解释: |
    古希腊神话中的森林之神，半人半羊形象，长有公羊角、羊腿和尾巴，
    是酒神狄俄尼索斯的随从。性格放纵不羁，喜好音乐、舞蹈和饮酒，
    象征创造力与原始生命力，也代表淫欲与恐慌。在歌德《浮士德》第
    二部中作为假面舞会角色登场，被描绘为细腿、羊脚、喜爱登山和自
    由的精灵。
  书中原文: |
    萨堤洛斯也跟着蹦跳，细细的腿，山羊的脚，腿要瘦小，筋骨要好，
    因为他爱像羚羊一样，登上山顶，东张西望。享受够了自由的空气，
    他就嘲笑男女和孩子，住在烟雾弥漫的谷底，居然也过得自鸣得意，
    不知山顶上的世界，归他独占，清净无碍。
  网络来源: |
    https://baike.baidu.com/item/%E8%90%A8%E8%92%82%E5%B0%94/3418264
- 名词: 土精
  分类: 人物
  解释: |
    欧洲神话中的土元素精灵，源自16世纪炼金术士帕拉塞尔苏斯的四大
    元素精灵体系（与火精、风精、水精并列）。土精（Gnome/诺姆/地精）
    居住于地下，守护矿藏，身形矮小，勤劳好动。在歌德《浮士德》第二
    部中，土精们以穿苔衣、持明灯的小人形象登场，自称"好小人"和
    "岩石郎中"，从山中开采金属矿物。
  书中原文: |
    一群小人轻快地走来，他们不喜欢成双作对；穿着苔衣，拿着明灯，
    乱糟糟地迅速前行，他们只顾埋头做事，仿佛成群的萤火蚂蚁；来来
    往往，多么辛勤，四面八方，忙个不停。和善的好小人乃是舍亲，我们
    做岩石郎中有名；我们会给高山放血，从饱满的脉管里抽吸。
  网络来源: |
    https://wapbaike.baidu.com/item/%e8%af%ba%e5%a7%86/9472376
- 名词: 巨人
  分类: 人物
  解释: |
    欧洲神话中的巨型生物，在歌德《浮士德》第二部假面舞会中作为登
    场角色出现，被描述为来自德国哈尔茨山的"野蛮的男人"——天生
    裸体、身强力壮，手持枞树棍子，系枝叶编成的围裙。巨人形象源自
    哈尔茨山地区的民间传说，与布罗肯峰的巫术传说和山中巨灵紧密相
    关。
  书中原文: |
    他们被叫做野蛮的男人，在哈尔茨山赫赫有名，天生的裸体，身强力
    壮，个个都是巨人模样。右手拿着枞树棍子，腰系胀鼓鼓的带子，枝
    叶编成的简陋围裙，教皇也没有这种卫兵。
  网络来源: |
    https://baike.baidu.com/item/%E5%B8%83%E7%BD%97%E8%82%AF%E5%B3%B0
- 名词: 水精
  分类: 人物
  解释: |
    即希腊神话中的宁芙（Nymph），又译水仙女、水精灵，是自然幻化
    的女性精灵，栖息于泉水、河流、海洋等水域，以美丽少女的形象出
    现，擅长歌舞。在歌德《浮士德》第二部假面舞会中，水精们以合唱
    团形式围绕大神潘歌唱，描写潘神入睡时万籁俱寂、水精不敢欢闹的
    场面。
  书中原文: |
    围着大神潘。他真个登场！——大千世界都表现在大神潘身上。快活的
    人，将他围住！在他四周轻歌曼舞！……如果他在中午时入梦，枝头的
    叶子就动也不动；默不作声的宁静的大气，充满旺盛的草木的香气；
    水精也都不敢欢闹，就在停留之处睡觉。
  网络来源: |
    https://baike.baidu.com/item/%E5%AE%81%E8%8A%99/4669931
- 名词: 三诫
  分类: 概念
  解释: |
    歌德《浮士德》第二部中土精们提到的道德概念，指代圣经十诫中与
    偷盗、奸淫、杀人相关的三条核心诫命。土精们感叹自己挖出的黄金
    被世人用于偷盗奸淫和杀戮，指出"凡是不守三诫的人，对其他诫命
    也不会遵循"。这一表述体现了歌德对物质财富与道德沦丧之间关系
    的批判性思考。
  书中原文: |
    可是我们挖出黄金，却供世人偷盗奸淫，提供凶器给傲慢之徒，图谋
    进行大量的屠戮。凡是不守三诫的人，对其他诫命也不会遵循。
  网络来源: |
    https://germanhistorydocs.org/en/the-holy-roman-empire-1648-1815/ghdi:document-3618
- 名词: 魔杖
  分类: 物件
  解释: |
    即占卜杖、寻宝杖，德语称Wünschelrute（愿望之杖），是一种用于
    寻找地下水源和矿脉的Y形或L形木杖。欧洲矿工传统中广泛使用，
    被认为能感应地下的矿藏。在歌德《浮士德》第二部中，土精代表提到
    "精明的魔杖"能够发现岩缝中隐藏的矿脉，为探矿者指示方向。
  书中原文: |
    光辉灿烂的丰富矿藏，在岩缝中形成矿脉，它只对那精明的魔杖，把
    它的迷路显示出来。
  网络来源: |
    https://baike.baidu.com/item/%E5%8D%A0%E5%8D%9C%E6%9D%96/3326966
- 名词: 御花园
  分类: 地点
  解释: |
    歌德《浮士德》第二部第一幕中的场景，即神圣罗马帝国皇帝行宫的
    御花园。在假面舞会的火灾平息之后，场景转入旭日初升的御花园，
    皇帝与众廷臣上朝，浮士德与梅非斯特更换装束后跪拜参见皇帝。在
    此场景中，浮士德和梅非斯特以纸币发行方案帮助皇帝解决帝国财政
    危机，是浮士德政治追求阶段的重要场景。
  书中原文: |
    御花园。旭日。皇帝、众廷臣。浮士德、梅非斯特装束入时，大方而
    不触目。两人俱跪下。
  网络来源: |
    http://www.guxuo.com/wgwx/ZPJ/gede/fsd/088.htm
- 名词: 岩石郎中
  分类: 概念
  解释: |
    歌德《浮士德》中土精们（Gnomes）的自称，德语对应Bergarzt（山医）。
    土精们将开矿采掘比喻为给高山做外科手术——"给高山放血，从饱满
    的脉管里抽吸"，将采矿行为诗意化为医治山体的医学行为。这一独特
    意象体现了歌德对自然资源开采双刃剑效应的思考：金银既造福人类，
    也带来贪婪与战争。
  书中原文: |
    和善的好小人乃是舍亲，我们做岩石郎中有名；我们会给高山放血，
    从饱满的脉管里抽吸；我们把金属堆积成山。
  网络来源: |
    http://bcc.blcu.edu.cn/show/101744892_2_2_7_8/1
