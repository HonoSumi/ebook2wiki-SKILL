- 名词: 园亭
  分类: 地点
  解释: 《浮士德》第一部第十二、十三场的场景名称，指花园中的凉亭或亭子。玛加蕾特在此处做卜花游戏（撕花瓣占卜爱情），后又与浮士德在此拥吻。该场景是浮士德与格蕾辛爱情发展的重要转折点。
  书中原文: "第十三场 园亭 玛加蕾特跳进亭中，躲在门后，将手指尖按在唇上，从门缝中窥视。"
  网络来源: https://book.douban.com/annotation/105949399/

- 名词: 森林和山洞
  分类: 地点
  解释: 《浮士德》第一部第十四场的场景名称。浮士德独自一人身处森林与山洞中，向地灵倾诉内心的矛盾与感恩之情。此场包含浮士德对自然的赞美、对良心的自省，以及梅非斯特如何用格蕾辛的思念来引诱他回去。该场景融入了歌德的泛神论自然哲学思想。
  书中原文: "第十四场 森林和山洞 浮士德独自一人。"
  网络来源: https://book.douban.com/annotation/124505892/

- 名词: 格蕾辛的住房
  分类: 地点
  解释: 《浮士德》第一部第十五场的场景名称。格蕾辛（Margarete）独坐在自己房间的纺车旁，因思念浮士德而心绪不宁，唱出著名的抒情诗《我失去安宁》（Meine Ruh' ist hin）。此场景后被舒伯特谱曲成为经典艺术歌曲《纺车旁的格丽卿》。
  书中原文: "第十五场 格蕾辛的住房 格蕾辛独坐在纺车旁。"
  网络来源: https://zh.wikipedia.org/zh-my/%E7%B4%A1%E8%BB%8A%E6%97%81%E7%9A%84%E8%91%9B%E9%BA%97%E5%8D%BF

- 名词: 玛加蕾特
  分类: 人物
  解释: 歌德《浮士德》中的女主角，全名为Margarete，昵称格蕾辛（Gretchen），中文旧译甘泪卿。她是一位出身平民家庭的纯真少女，被返老还童的浮士德追求并爱上。因误用安眠药毒死母亲、哥哥被浮士德误杀、未婚溺婴等悲剧被判处死刑。在狱中她拒绝浮士德的营救，最终灵魂得救，成为"永恒之女性"救赎力量的化身之一。
  书中原文: "玛 加 蕾 特  等我一会！……他爱我——不爱我。"
  网络来源: https://www.wikiwand.com/zh-sg/articles/%E6%B5%AE%E5%A3%AB%E5%BE%B7I

- 名词: 格蕾辛
  分类: 人物
  解释: 玛加蕾特（Margarete）的德语昵称，中文常音译为格蕾辛或格丽卿。在《浮士德》第十五场"格蕾辛的住房"中，该名称用于标示角色，她独坐在纺车旁吟唱思念浮士德的著名诗篇《我失去安宁》。格蕾辛是德语文学中最著名的悲剧女性形象之一。
  书中原文: "格 蕾 辛  我失去安宁，内心沉闷；要找回安宁，永远不能。"
  网络来源: https://searchworks.stanford.edu/articles/cmedm__21186683

- 名词: 玛尔太
  分类: 人物
  解释: 《浮士德》第一部中的角色，玛加蕾特的邻居，一位世故的中年妇女。其丈夫是一名水手，长期在外，据称已死在帕多瓦。梅非斯特利用与她调情的机会，为浮士德安排与玛加蕾特在其后花园约会。玛尔太的世俗世故与玛加蕾特的纯真形成鲜明对比，在剧中起到牵线人的作用。
  书中原文: "玛 尔 太  （上。）天色晚了。……我本想多留你们一会，可是，我们这地方实在不好。"
  网络来源: https://zh.wikipedia.org/zh-tw/%E6%B5%AE%E5%A3%AB%E5%BE%B7_(%E6%AD%8C%E5%8A%87)

- 名词: 卜花词
  分类: 习俗
  解释: 指用花瓣占卜爱情吉凶的民间习俗，源自西方少女撕花瓣念"他爱我/他不爱我"（he loves me / he loves me not）的爱情占卜游戏。在《浮士德》第十二场园亭中，玛加蕾特采一朵翠菊，将花瓣一片片剥下，口中念着"他爱我——不爱我"，最后一片花瓣结果为"他爱我"，她欣喜不已。浮士德将此视为天神的指示。
  书中原文: "让这句卜花词作为天神的指示。他爱你！你懂得这个意思？他爱你！"
  网络来源: https://book.douban.com/annotation/105949399/

- 名词: 翠菊
  分类: 物件
  解释: 菊科草本植物，学名Callistephus chinensis，又称江西腊。在《浮士德》园亭场景中，玛加蕾特采摘一朵翠菊用于花瓣占卜，以此试探浮士德是否爱她。这一意象成为文学史上爱情占卜的经典场景。
  书中原文: "（她采了一朵翠菊，把花瓣一片一片地剥下。）"
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/045.htm

- 名词: 纺车
  分类: 物件
  解释: 将纤维纺织成纱线或丝线的手工工具。在《浮士德》第十五场"格蕾辛的住房"中，格蕾辛独坐在纺车旁，因思念浮士德而无法平静。舒伯特将此诗谱曲为艺术歌曲《纺车旁的格丽卿》（Gretchen am Spinnrade, D.118），钢琴伴奏以重复音型模拟纺车转动声和格蕾辛的心跳声，成为艺术歌曲的奠基之作。
  书中原文: "第十五场 格蕾辛的住房 格蕾辛独坐在纺车旁。"
  网络来源: https://zh.wikipedia.org/zh-my/%E7%B4%A1%E8%BB%8A%E6%97%81%E7%9A%84%E8%91%9B%E9%BA%97%E5%8D%BF

- 名词: 阿尔卑斯草地
  分类: 地点
  解释: 阿尔卑斯山脉中的高山草甸地带。在《浮士德》第十四场中，浮士德在独白中将自己在尘世中不安定的漂泊与格蕾辛在阿尔卑斯草地小屋中宁静的家务生活进行对比，表达了自己的愧疚与矛盾心理。
  书中原文: "瞧她，在旁处，怀着漠然的童心，在阿尔卑斯草地的小屋子里，忙着一切家务事情，局限在她的小天地里。"
  网络来源: https://book.douban.com/annotation/124505892/

- 名词: 六天创世
  分类: 概念
  解释: 源自《圣经·创世记》中上帝用六天创造天地的神学概念。在《浮士德》第十四场中，浮士德在独白中称自己"以想象之力发掘大地的精髓，胸中深感六天创世的伟业"，表达了他通过地灵的启示获得类似创世者的感受，体现了浮士德追求超越凡人境界的雄心。
  书中原文: "以想象之力发掘大地的精髓，胸中深感六天创世的伟业。"
  网络来源: https://wap.cnki.net/touch/web/Journal/Article/HDCS200304012.html

- 名词: 《雅歌》
  分类: 概念
  解释: 《圣经·旧约》中的一卷书，又称《所罗门之歌》或《歌中之歌》，是圣经中唯一的爱情诗歌集，以男女对唱形式歌颂爱情。在《浮士德》第十四场中，梅非斯特引用《雅歌》第4章第5节的"双生鹿"意象来调侃浮士德。
  书中原文: "《雅歌》第4章第5节：'你的两乳，好像百合花中吃草的一对小鹿，就是母鹿双生的。'"
  网络来源: https://hzjh.hangzhouchurch.com/bible/song-of-songs_22_4.html

- 名词: 双生鹿
  分类: 概念
  解释: 出自《圣经·雅歌》第4章第5节的比喻意象："你的两乳，好像百合花中吃草的一对小鹿，就是母鹿双生的。"在《浮士德》第十四场中，梅非斯特引用此典故意有所指地调侃浮士德对格蕾辛的肉欲眷恋，原文注记路德的德译本《圣经》中将"百合花"译为"玫瑰"。
  书中原文: "想到在玫瑰花下吃草的双生鹿。"
  网络来源: https://hzjh.hangzhouchurch.com/bible/song-of-songs_22_4.html

- 名词: 我失去安宁
  分类: 概念
  解释: 格蕾辛在《浮士德》第一部第十五场纺车旁独唱的名诗首句，德文原文为"Meine Ruh' ist hin"。这首诗表达少女热恋中焦虑不安的心理，语言短促简洁，富有民歌风味。后被舒伯特谱曲为艺术歌曲《纺车旁的格丽卿》（Op. 2, D. 118），是舒伯特18岁时创作的成名作，也是德语艺术歌曲（Lied）体裁的奠基作品。
  书中原文: "我失去安宁，内心沉闷；要找回安宁，永远不能。"
  网络来源: https://zh.wikipedia.org/zh-my/%E7%B4%A1%E8%BB%8A%E6%97%81%E7%9A%84%E8%91%9B%E9%BA%97%E5%8D%BF

- 名词: 仙女
  分类: 概念
  解释: 指古希腊罗马神话和传说中半神半人的女性自然精灵，常出没于山林水泽之间。在《浮士德》第十四场中，浮士德在森林与山洞中冥想时，看到从潮湿丛林里浮现出"太古时代的银白色的仙姿"，那是太古神话时代便存在的精灵，译者注释指出此处指山精（山灵）和树精（树灵）。
  书中原文: "从潮湿的丛林里就浮现出太古时代的银白色的仙姿。"
  网络来源: https://book.douban.com/annotation/124505892/

- 名词: 太古时代的银白色的仙姿
  分类: 概念
  解释: 《浮士德》第十四场中浮士德在月光下的森林中所见的幻象，指太古神话时代便存在的自然精灵，在月光映照下呈现银白色。译者注指出此指"山精和树精"（山灵与树灵）。这一意象体现了歌德将古典神话元素融入德国浪漫主义自然描写的创作手法。
  书中原文: "从潮湿的丛林里就浮现出太古时代的银白色的仙姿。"
  网络来源: https://book.douban.com/annotation/124505892/

- 名词: 魔女丹房
  分类: 地点
  解释: 《浮士德》第一部中的场景，位于哈茨山中，女巫调制魔药的地方。梅非斯特带浮士德到此喝返老还童药水。丹房中有一面魔镜，浮士德从中看到绝美女子的影像（即格蕾辛的预示），这激发了他的爱欲，为格蕾辛的悲剧埋下伏笔。此场景标志着浮士德从精神追求转向感官享乐的转折点。
  书中原文: "魔女丹房中魔镜里现出的女像。"
  网络来源: https://zhuanlan.zhihu.com/p/404717030

- 名词: 山精
  分类: 概念
  解释: 又称山灵，指居住在山中的自然精灵。在《浮士德》第十四场中，浮士德在森林与山洞中看到的月光下的银色仙姿，译者注指出"山精和树精"，即太古神话中的山林自然精灵。这一意象源自日耳曼和希腊神话传统。
  书中原文: "从潮湿的丛林里就浮现出太古时代的银白色的仙姿。"
  网络来源: https://book.douban.com/annotation/124505892/

- 名词: 树精
  分类: 概念
  解释: 又称树灵，源自希腊神话中的Dryad（得律阿德斯），是栖居在树木中的自然精灵，与树木同生共死。在《浮士德》第十四场中，浮士德在月光下森林中所见的太古仙姿被注释为"山精和树精"，象征自然万物的灵性，体现了歌德泛神论的自然观。
  书中原文: "从潮湿的丛林里就浮现出太古时代的银白色的仙姿。"
  网络来源: https://book.douban.com/annotation/124505892/

- 名词: 圣体
  分类: 概念
  解释: 基督教圣事之一，即圣餐礼中的面饼（圣体），天主教认为经过祝圣后即化为基督的真实身体。在《浮士德》第十四场中，浮士德表达了对格蕾辛强烈的眷恋，称即使她的嘴唇接触天主的圣体，他也会感到嫉妒，足见其爱欲之深之烈。
  书中原文: "她的嘴唇接触天主的圣体，就在这时我也要感到嫉妒。"
  网络来源: https://www.wikiwand.com/zh-sg/articles/%E6%B5%AE%E5%A3%AB%E5%BE%B7I

- 名词: 《圣经》
  分类: 概念
  解释: 基督教的经典，分为《旧约》和《新约》。在《浮士德》中，《圣经》被多次引用和提及，包括《创世记》的六天创世、《雅歌》的双生鹿比喻、《约伯记》的天上赌约结构等。浮士德翻译《约翰福音》"太初有道"为"太初有为"是全书最著名的哲学转折之一。注释中还特别提到马丁·路德的德译本《圣经》译法。
  书中原文: "路德的德译本《圣经》中译作玫瑰。"
  网络来源: https://wap.cnki.net/touch/web/Journal/Article/HDCS200304012.html

- 名词: 玫瑰
  分类: 物件
  解释: 蔷薇科蔷薇属植物的通称，在西方文学中常象征爱情、美丽与神秘。在《浮士德》第十四场中，梅非斯特引用《雅歌》4:5时提到"在玫瑰花下吃草的双生鹿"，译者注指出，路德的德译本《圣经》中将"百合花"译作"玫瑰"。玫瑰也是《浮士德》第二部结尾"神秘合唱"中"永恒之女性"的象征意象之一。
  书中原文: "想到在玫瑰花下吃草的双生鹿。"
  网络来源: https://hzjh.hangzhouchurch.com/bible/song-of-songs_22_4.html

- 名词: 猫头鹰
  分类: 物件
  解释: 鸮形目鸟类的通称，在西方文化中常象征孤独、智慧和神秘。在《浮士德》第十四场森林与山洞中，梅非斯特嘲讽浮士德在山洞中孤寂度日"像只猫头鹰枯坐度日"，以此讽刺浮士德的隐居生活与学者习气。
  书中原文: "你干吗在山洞中、在岩隙里像只猫头鹰枯坐度日？"
  网络来源: https://book.douban.com/annotation/124505892/

- 名词: 蛤蟆
  分类: 物件
  解释: 两栖动物蟾蜍的俗称，在文学中常被用作贬义或丑恶的比喻。在《浮士德》第十四场中，梅非斯特嘲讽浮士德像蛤蟆一样从湿润的苔藓和石头上汲取营养，以此挖苦浮士德退隐山林的苦修生活。
  书中原文: "干吗从湿润的苔藓、滴水的石上像只蛤蟆汲取营养？"
  网络来源: https://book.douban.com/annotation/124505892/

- 名词: 瀑布
  分类: 物件
  解释: 河流从陡峭的山崖上倾泻而下的自然景观。在《浮士德》第十四场中，浮士德将自己不安的灵魂比喻为"像瀑布沿着一座一座的岩石飞奔，欲壑难填，一直掉进深渊"，形象地表达了他永不满足、不断追求又不断毁灭的生命状态。
  书中原文: "无目标、无宁息的莽汉，像瀑布沿着一座一座的岩石飞奔，欲壑难填，一直掉进深渊？"
  网络来源: https://book.douban.com/annotation/124505892/

- 名词: 城垣
  分类: 地点
  解释: 即城墙，古代城市的防御性建筑。在《浮士德》第十四场中，梅非斯特描述格蕾辛站在窗边思念浮士德时，提到她看见浮云在城垣上空移行，暗示格蕾辛被困在狭小的生活空间中，以此撩拨浮士德的愧疚与怜爱之情。
  书中原文: "她站在窗边，看朵朵的浮云在古城墙上空移行。"
  网络来源: https://www.wikiwand.com/zh-sg/articles/%E6%B5%AE%E5%A3%AB%E5%BE%B7I

- 名词: 古城墙
  分类: 地点
  解释: 历史悠久的老城墙。在《浮士德》第十四场中，梅非斯特向浮士德描述格蕾辛倚窗眺望的寂寞景象，古城的墙垣和飘浮的白云衬托出她等待心上人归来的焦灼与苦闷。
  书中原文: "她站在窗边，看朵朵的浮云在古城墙上空移行。"
  网络来源: https://www.wikiwand.com/zh-sg/articles/%E6%B5%AE%E5%A3%AB%E5%BE%B7I

- 名词: 故乡的小鸟
  分类: 概念
  解释: 指德国民歌《假使我化为小鸟》的首句意象，出自一首广为流传的德国民歌（"Wenn ich ein Vöglein wär'"，意为"假使我是一只小鸟"）。在《浮士德》第十四场中，梅非斯特引用此民歌来形容格蕾辛苦恋浮士德时的思念心境。
  书中原文: "假使我化为小鸟！她一整天唱个不停，唱到夜半。"
  网络来源: https://www.wikiwand.com/zh-sg/articles/%E6%B5%AE%E5%A3%AB%E5%BE%B7I
