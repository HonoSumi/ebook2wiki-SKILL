- 名词: 庇里透斯
  分类: 人物
  解释: 希腊神话中拉庇泰人（Lapiths）之王，以与雅典英雄忒修斯的深厚友谊闻名。曾与忒修斯一同从斯巴达拐走海伦，后因狂妄地企图绑架冥后珀耳塞福涅而被困冥府永不得脱。
  书中原文: 忒修斯和庇里透斯将海伦从斯巴达拐走，带到阿提卡交阿菲德诺斯看守。此人乃忒修斯之友。
  网络来源: https://zh.wikipedia.org/wiki/%E7%9A%AE%E7%91%9E%E8%8B%8F%E6%96%AF

- 名词: 刻耳柏洛斯
  分类: 物件
  解释: 希腊神话中看守冥界入口的三头犬，为堤丰与厄喀德娜所生。它允许死者灵魂进入冥界，但阻止任何人出去。赫拉克勒斯活捉它是其十二功绩之一。
  书中原文: 三头狗即看守地狱门之狗刻耳柏洛斯。
  网络来源: https://zh.wikipedia.org/wiki/%E5%9C%B0%E7%8D%84%E4%B8%89%E9%A0%AD%E7%8A%AC

- 名词: 忒勒玛科斯
  分类: 人物
  解释: 荷马史诗《奥德赛》中的人物，奥德修斯与珀涅罗珀之子。在父亲外出征战期间，他在女神雅典娜帮助下寻父，后与父亲合力杀死求婚者。
  书中原文: 借用荷马《奥德修纪》卷二十二的比喻。忒勒玛科斯将十二个不忠的女仆用一条绳子缚在厨房外的一排柱子上，并排吊着，她们在套索中挣扎，像罩在网中的鸫鸟（画眉）一样。
  网络来源: https://wapbaike.baidu.com/item/%E5%BF%92%E5%8B%92%E7%8E%9B%E7%A7%91%E6%96%AF

- 名词: 塔西陀《日耳曼尼亚》
  分类: 物件
  解释: 古罗马历史学家塔西佗于公元98年左右完成的重要著作，全名《论日耳曼人的起源和现状》，记述了公元1世纪日耳曼部落的地理、风俗、社会制度，具有极高的史学价值。
  书中原文: 塔西陀《日耳曼尼亚》第十五节说，古代的日耳曼人将他们的牛群或谷物的一部分自愿奉送给他们的首领。
  网络来源: https://baike.baidu.com/item/%E6%97%A5%E8%80%B3%E6%9B%BC%E5%B0%BC%E4%BA%9A%E5%BF%97

- 名词: 木马计
  分类: 事件
  解释: 古希腊特洛伊战争中的著名计策。希腊联军建造巨型空心木马藏匿士兵并佯装撤退，特洛伊人将木马运入城内，夜间希腊士兵里应外合攻陷特洛伊城。
  书中原文: 希腊人用木马计攻陷特洛亚城。
  网络来源: https://baike.baidu.com/item/%E6%9C%A8%E9%A9%AC%E8%AE%A1

- 名词: 天鹅之歌
  分类: 概念
  解释: 源于古希腊的传说，谓天鹅平素不唱歌，但在临死前会引颈高歌一曲，其歌声哀婉动听。后世用以比喻诗人、艺术家临终前的最后杰作或告别演出。
  书中原文: 古代传说：天鹅在临死以前，用动人的悲歌，预报它自己的死亡。
  网络来源: https://baike.baidu.com/item/%E5%A4%A9%E9%B9%85%E4%B9%8B%E6%AD%8C

- 名词: 得尔福
  分类: 地点
  解释: 位于希腊福基斯地区帕尔纳索斯山南麓的古城，古名皮托（Pytho），古希腊人认为这里是世界的中心。以阿波罗神庙和德尔斐神谕闻名，女祭司皮提亚传达神谕长达千年。
  书中原文: 希腊得尔福（古名皮托）阿波罗神庙作预言的女祭司。福耳库阿斯没有说她的名字，故海伦这样称她。
  网络来源: https://zh.wikipedia.org/wiki/%E5%BE%97%E5%B0%94%E7%A6%8F

- 名词: 所多玛苹果
  分类: 物件
  解释: 源于《圣经》所多玛城的传说。死海沿岸产有一种外表鲜艳的苹果，但一摘即化为灰烬，比喻外表华丽诱人而内在空洞无物的事物，与"金玉其外，败絮其中"意近。
  书中原文: 传说死海沿岸的罪恶城市所多玛产有一种苹果，外表很好看，摘下来就成灰。这里合唱队把年轻人的脸蛋比作所多玛苹果，寓有以色为戒之意，或怀疑他们跟自己一样也是虚幻的形象。
  网络来源: https://baike.baidu.com/item/%E6%AD%BB%E6%B5%B7%E6%9E%9C%E5%AD%90

- 名词: 押韵
  分类: 概念
  解释: 诗歌中在句末使用韵母相同或相近的字以增强节奏感和音乐性的修辞手法。古希腊诗歌不使用押韵，押韵是中世纪以后由东方传入欧洲的诗歌技巧。
  书中原文: 海伦听到林叩斯的诗句押韵，感到异样。因为古希腊诗不押韵。
  网络来源: https://www.zgbk.com/ecph/words?ID=448876

- 名词: 浮士德与海伦
  分类: 事件
  解释: 歌德《浮士德》中象征性的结合——浮士德代表追求无限精神的现代/北欧人，海伦代表古典希腊美的化身。两人的结合象征北欧（日耳曼）文化与古希腊文化的融合，通过押韵的诗歌形式表现出来。
  书中原文: 以上海伦和浮士德的八行对话用双行押韵。是以诗的形式暗示北欧文化和希腊文化的融合。
  网络来源: https://book.qq.com/book-read/811061/27

- 名词: 皮罗斯
  分类: 地点
  解释: 位于希腊伯罗奔尼撒半岛西南部墨塞涅地区的重要海港城市。在荷马史诗中，皮罗斯是睿智的老将涅斯托耳的王国所在地。
  书中原文: 皮罗斯是墨塞涅的海港。荷马史诗中的老将涅斯托耳就是皮罗斯的统治者。
  网络来源: https://baike.baidu.com/item/%E7%9A%AE%E6%B4%9B%E6%96%AF

- 名词: 涅斯托耳
  分类: 人物
  解释: 希腊神话中皮罗斯的国王，特洛伊战争中希腊联军最年长睿智的将领。以长于辞令、足智多谋著称，在荷马史诗中被描绘为"言语甜蜜的老人"，英语中"nestor"一词即指睿智长者。
  书中原文: 荷马史诗中的老将涅斯托耳就是皮罗斯的统治者。《伊利昂纪》第四歌："涅斯托耳，皮罗斯人的清晰的辞令家，他正在整顿部下，鼓励他们去作战。"
  网络来源: https://baike.baidu.com/item/%E6%B6%85%E6%96%AF%E6%89%98%E8%80%B3

- 名词: 欧罗塔斯河
  分类: 地点
  解释: 希腊伯罗奔尼撒半岛南部的一条河流，流经著名的斯巴达谷地。希腊神话中，海伦的母亲勒达在此河边被化身天鹅的宙斯亲近，生下了海伦。
  书中原文: 海伦从欧洛塔斯河岸上的天鹅蛋中破卵而出世。
  网络来源: https://baike.baidu.com/item/%E5%8B%92%E8%BE%BE

- 名词: 迈耶
  分类: 人物
  解释: 希腊神话中的女神，泰坦神阿特拉斯之女，普勒阿得斯七姐妹中的长姐。她在阿耳卡狄亚的库勒涅山与宙斯结合，生下了众神的信使赫耳墨斯。英语五月（May）据信以她命名。
  书中原文: 迈耶（希腊语意为母亲）是一个水精，为阿特拉斯之女。她跟宙斯生了赫耳墨斯。
  网络来源: https://zh.wikipedia.org/wiki/%E8%BF%88%E4%BA%9A_(%E5%B8%8C%E8%85%8A%E7%A5%9E%E8%AF%9D)

- 名词: 库勒涅山
  分类: 地点
  解释: 位于希腊伯罗奔尼撒半岛阿耳卡狄亚地区的高山（海拔约2374米），为伯罗奔尼撒第二高峰。希腊神话中赫耳墨斯诞生于此山的山洞中，故赫耳墨斯又名库勒尼俄斯。
  书中原文: 赫耳墨斯生于阿耳卡狄亚的库勒涅山中，故又名库勒尼俄斯。
  网络来源: https://en.wikipedia.org/wiki/Mount_Kyllini

- 名词: 伊卡洛斯
  分类: 人物
  解释: 希腊神话中工匠代达罗斯之子。父子被囚克里特岛时，代达罗斯用羽毛和蜡制成翅膀一同飞逃。伊卡洛斯因飞得太高，蜡翼被太阳融化，坠海而死。常被用作"狂妄自大导致失败"的警示象征。
  书中原文: 伊卡洛斯为代达罗斯之子。父子二人插上蜡制的翅膀飞行。他不听父亲的警告，飞得过高，逼近太阳，蜡翅融化，坠海而死。
  网络来源: https://zh.wikipedia.org/wiki/%E4%BC%8A%E5%8D%A1%E6%B4%9B%E6%96%AF

- 名词: 代达罗斯
  分类: 人物
  解释: 希腊神话中著名的工匠、发明家和建筑师。曾为克里特国王米诺斯建造囚禁弥诺陶洛斯的迷宫，后与儿子伊卡洛斯用蜡翼飞逃。被视为古希腊工匠和发明家的守护神。
  书中原文: 伊卡洛斯为代达罗斯之子。父子二人插上蜡制的翅膀飞行。
  网络来源: https://baike.baidu.com/item/%E4%BB%A3%E8%BE%BE%E7%BD%97%E6%96%AF

- 名词: 阿福花
  分类: 物件
  解释: 学名Asphodelus，又称金穗花、日光兰。在希腊神话中与冥界密切相关，《奥德赛》中描述亡魂居住在长满阿福花的草地上（阿福花平原），是冥后珀耳塞福涅和得墨忒耳的神花。
  书中原文: 阿福花：冥府的一种苍白的花（《奥德修纪》卷十一），为冥后珀耳塞福涅和得墨忒耳的神花。
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E7%A6%8F%E8%8A%B1

- 名词: 阿德墨托斯
  分类: 人物
  解释: 希腊神话中色萨利地区斐赖城的国王，阿尔戈英雄之一。阿波罗曾因受罚下凡为他牧羊，两人结下深厚情谊。阿波罗帮助他娶得阿尔刻提斯，其妻代死和赫拉克勒斯救妻的故事成为欧里庇得斯悲剧的素材。
  书中原文: 阿波罗在青年时曾在忒萨利亚为阿德墨托斯放牧。
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E5%BE%B7%E5%A2%A8%E6%89%98%E6%96%AF
