- 名词: 车童
  分类: 人物
  解释: 歌德《浮士德》第二部假面舞会中的角色，自称"慷慨豪奢"和"诗"，是诗的人格化象征。他驾乘普路托斯的龙车，向四周弹指抛撒珍珠、金冠、戒指等珍宝，但这些赠品随后化为甲虫、蝴蝶等幻象飞走。他代表诗歌的创造力和挥霍精神，与财神普路托斯相辅相成。
  书中原文: 我是慷慨豪奢，我就是诗；我是花光自己的家珍而完成我自己的诗人。
  网络来源: http://www.wreador.com/detial.php?catid=2&catname=%e7%bf%bb%e8%ad%af%e8%a9%a9&id=43021

- 名词: 阿瓦里蒂娅
  分类: 概念
  解释: 拉丁语Avaritia的音译，意为"贪吝"（阴性名词）。在《浮士德》假面舞会中，这是瘦子角色（梅菲斯特的假面）的旧名。他自述在旧时妇女勤俭持家时叫此名，后来社会风气变化，妇女转向奢侈浪费，他便改名为德语阳性名词"贪吝"（Geiz）。这一变化折射出歌德对道德相对性与社会变迁的讽刺。
  书中原文: 从前妇女管厨房当家，那时我叫阿瓦里蒂娅；那时家境非常富裕；收入很多，有进无出！
  网络来源: https://book.douban.com/annotation/115028448/

- 名词: 贪吝
  分类: 人物
  解释: 《浮士德》假面舞会中瘦子角色（梅菲斯特的化身）的新名。前身是阴性拉丁名"阿瓦里蒂娅"（Avaritia），后因社会风气变化，妇女不再节俭，他便改作阳性德语名"贪吝"（Geiz）。他在舞会上将黄金当作黏土捏成各种形状，用伤风败俗的噱头骚扰妇女，象征贪婪与吝啬的丑态。
  书中原文: 这使我越发看重黄金：我成为男性，改名贪吝！
  网络来源: https://book.douban.com/annotation/115028448/

- 名词: 司仪
  分类: 人物
  解释: 《浮士德》第二部假面舞会中的报幕人和主持人，负责介绍登场人物、引导剧情、维持秩序。他向观众宣告皇帝从罗马加冕归来并带回狂欢节习俗，为观众解说各色假面人物的身份和寓意。在董问樵译本中译为"报幕人"，在钱春绮译本中译为"司仪"。
  书中原文: 我看，你虽能把假面说明，但要透过外壳，追究核心，这不是你干司仪的专长，需要有更加犀利的眼光。
  网络来源: https://www.211cn.ca/book/faust/?c=30

- 名词: 杜卡登
  分类: 物件
  解释: 又译杜卡特（Ducat），中世纪欧洲最具影响力的金币之一，起源于1284年意大利威尼斯共和国。含金量约99.47%，重约3.545克。在《浮士德》假面舞会场景中，群众看到铜锅中滚出的金币时惊呼"就像跳出真的杜卡登"，表现了人们对财富的贪婪渴望。
  书中原文: 就像跳出真的杜卡登，使我心里非常兴奋——全是我所想望的钱财！
  网络来源: https://wapbaike.baidu.com/item/%e6%9d%9c%e5%8d%a1%e7%89%b9/4816285

- 名词: 龙
  分类: 物件
  解释: 《浮士德》假面舞会中为普路托斯拉车的神话生物。原文描述其"外被鳞甲的大口，喷出火焰"。普路托斯下车后一挥手，群龙便停止行动，并将装满黄金的大箱搬到地上。龙在此处象征财富的原始力量与贪婪的恐怖，同时借用了古典神话中龙或蛇常被用作神祇坐骑的传统意象。
  书中原文: 瞧那些狰狞可怕的怪物，激昂地舒展两对翅膀，赶走众人，将地盘占据。摇动外被鳞甲的大口，喷出火焰，不肯罢休。
  网络来源: http://guxuo.com/wgwx/zpj/gede/fsd/085.htm

- 名词: 化装舞会
  分类: 事件
  解释: 《浮士德》第二部第一幕的核心场景，发生在神圣罗马帝国皇帝的宫廷中。皇帝从罗马加冕归来，带回了意大利狂欢节的传统。舞会上各色假面人物依次登场——园丁姑娘、车童、普路托斯、贪吝等，场面光怪陆离。这场假面舞会是全剧最富戏剧性和象征性的场景之一，借狂欢节的假面隐喻人性、权力、财富与诗意的复杂交织。
  书中原文: 这只是化装舞会的玩笑。今夜不能有其他贪心；你们以为是真的黄金？
  网络来源: https://www.211cn.ca/book/faust/?c=30

- 名词: 棕榈树枝
  分类: 物件
  解释: 在西方古典传统中象征胜利与荣誉，源自古希腊罗马时期，胜利者常被授予棕榈枝。在《浮士德》中，车童对普路托斯说"我不是舒展过勇猛的羽翼，为你夺得棕榈树枝"，表明他作为诗的化身，曾为财富之神赢得胜利和荣耀。
  书中原文: 我不是舒展过勇猛的羽翼，为你夺得棕榈树枝？
  网络来源: http://www.wreador.com/speech/speech-fox.php?id=43044&rate=m

- 名词: 慷慨豪奢
  分类: 概念
  解释: 歌德《浮士德》中车童的自我称谓，也是他面具角色的本质——代表无度的施舍与挥霍。车童自称"慷慨豪奢"，与财神普路托斯的财富积累形成互补：普路托斯拥有财富，车童则负责挥洒和分配。这体现了歌德对诗歌创作本质的思考——诗人挥霍自我以完成创作。
  书中原文: 我是慷慨豪奢，我就是诗；我是花光自己的家珍而完成我自己的诗人。
  网络来源: http://www.wreador.com/detial.php?catid=2&catname=%e7%bf%bb%e8%ad%af%e8%a9%a9&id=43021

- 名词: 诗
  分类: 概念
  解释: 在《浮士德》假面舞会场景中，车童自称"我就是诗"，将诗歌人格化。诗被描绘为挥霍家珍的创造者，与财富之神普路托斯平起平坐。诗代表精神创造力和慷慨施予的力量，其赠品虽看似虚幻（化为甲虫蝴蝶），但实质上是更高层次的精神财富。这一设定体现了歌德对诗歌本质的深刻理解——诗是超越物质的精神创造。
  书中原文: 我是慷慨豪奢，我就是诗；我是花光自己的家珍而完成我自己的诗人。
  网络来源: http://www.wreador.com/detial.php?catid=2&catname=%e7%bf%bb%e8%ad%af%e8%a9%a9&id=43021

- 名词: 必然
  分类: 概念
  解释: 歌德《浮士德》中的哲学概念，出自普路托斯的台词"法令强有力，而'必然'却更加有力"。此处"必然"（Necessity/Notwendigkeit）指客观的、无可抗拒的力量，超越人为制定的法令。这句话呼应了拉丁谚语"Necessitas non habet legem"（必然无法令），表达了必然性作为宇宙终极法则的思想，反映歌德的自然哲学观。
  书中原文: 法令强有力，而"必然"却更加有力。
  网络来源: http://wap.sdpress.com.cn/News/4/109/NewsDetail_6771_1.html

- 名词: 法令
  分类: 概念
  解释: 歌德《浮士德》中与"必然"对举的概念，出自普路托斯的台词"法令强有力，而'必然'却更加有力"。法令（Law/Gesetz）代表人类社会制定的规则和秩序，虽具有强制力，但终究不及客观必然性（必然）强大。这体现了歌德对自然法则高于人为法律的哲学思考。
  书中原文: 法令强有力，而"必然"却更加有力。
  网络来源: http://wap.sdpress.com.cn/News/4/109/NewsDetail_6771_1.html

- 名词: 假面
  分类: 物件
  解释: 假面舞会中的面具，在《浮士德》中具有深刻的象征意义。司仪指出"要透过外壳，追究核心，这不是你干司仪的专长"。面具象征着表象与真实之间的张力、社会角色的伪装，以及人类在公共场合隐藏真实自我的普遍现象。普路托斯（浮士德）和贪吝（梅菲斯特）均以假面登场，暗示善恶并非外在对立，而是人内在的两面性。
  书中原文: 我看，你虽能把假面说明，但要透过外壳，追究核心，这不是你干司仪的专长，需要有更加犀利的眼光。
  网络来源: https://book.qq.com/book-read/811061/27

- 名词: 金冠
  分类: 物件
  解释: 《浮士德》假面舞会中车童向四周抛撒的珍宝之一，与梳子、耳环、戒指等并列。车童弹指间飞出珍珠、金冠、项链等贵重物品，群众争相抢夺，但这些金玉其外的赠品随后都化为幻影（甲虫、蝴蝶等），寓意物质财富的虚幻性。
  书中原文: 快取黄金的项链和耳环；梳子和金冠，毫无瑕疵。
  网络来源: http://www.wreador.com/speech/speech-fox.php?id=43021

- 名词: 戒指
  分类: 物件
  解释: 《浮士德》假面舞会中车童向四周抛撒的珍贵饰物之一，原文描述为"戒指镶着贵重的宝石"。戒指与其他宝物（金冠、项链、珍珠）一同被群众争抢，但最终都化为幻影，象征世俗财富和奢靡享受的虚空与不可靠。
  书中原文: 戒指镶着贵重的宝石。
  网络来源: http://www.wreador.com/speech/speech-fox.php?id=43021

- 名词: 珍珠
  分类: 物件
  解释: 《浮士德》假面舞会中车童弹指间飞出的珍宝之一。原文描绘"这里飞出了珍珠一串"，随之还有黄金项链、耳环、金冠、戒指等。群众争相抢夺这些宝物，但它们随后即化为甲虫、蝴蝶等幻象，体现了歌德对物质财富虚幻本质的批判——看似珍贵的珍珠不过是引人追逐的假象。
  书中原文: 这里飞出了珍珠一串。
  网络来源: http://www.wreador.com/speech/speech-fox.php?id=43021

- 名词: 黄金
  分类: 物件
  解释: 《浮士德》假面舞会中普路托斯宝箱中涌出的金汁和金器。原文描绘普路托斯的群龙将"装着黄金的大箱"搬到地上，铜锅中"熔解的黄金血一样沸腾起来"，金冠、戒指、链条在沸腾的金血中熔化。群众疯狂抢夺，但司仪指出这只是化装舞会的玩笑，黄金并非真实。黄金在此象征着物质财富的诱惑力与虚幻性。
  书中原文: 它们把装着黄金的大箱，连"贪吝"一起搬到地上，箱子放在他的脚边。
  网络来源: https://www.70thvictory.com.tw/wenxue/shijiemingzhu/196106_15.htm
