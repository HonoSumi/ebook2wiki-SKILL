- 名词: 希腊
  分类: 地点
  解释: 古希腊文明的核心地域，位于巴尔干半岛南部，爱琴海沿岸。希腊神话是欧洲最早的文学形式和西方文明的基石，对后世文学、艺术、哲学产生了深远影响。在《浮士德》中，希腊象征古典美的理想国度，浮士德追求海伦即追求希腊之美的象征。
  书中原文: 忒萨利亚不是海伦的生地，海伦没有到过这里，可是忒萨利亚却是希腊的国土。这里比喻浮士德一接触希腊土地，也添上新的力量。
  网络来源: https://wapbaike.baidu.com/item/希腊神话/63444

- 名词: 波塞冬
  分类: 人物
  解释: 希腊神话中的奥林匹斯十二主神之一，掌管大海、风暴、地震和马匹。他是克洛诺斯与瑞亚之子，宙斯和哈迪斯的兄弟，象征为三叉戟。在《浮士德》注解中，波塞冬与大地女神该亚生下巨人安泰。
  书中原文: 安泰为海神波塞冬和大地该亚所生，他是利比亚的巨人。
  网络来源: https://wapbaike.baidu.com/item/波塞冬/21434

- 名词: 该亚
  分类: 人物
  解释: 希腊神话中的大地女神，从混沌中诞生，是第一位超原始神明。她单性诞下天空之神乌拉诺斯、海神蓬托斯等，是众神之母、宙斯的祖母。在《浮士德》注解中，该亚与波塞冬生下巨人安泰。
  书中原文: 安泰为海神波塞冬和大地该亚所生，他是利比亚的巨人。他一接触母亲大地，就会获得力量而无敌于天下。
  网络来源: https://wapbaike.baidu.com/item/盖亚/33005

- 名词: 希罗多德
  分类: 人物
  解释: 古希腊历史学家，约公元前484年—约公元前425年，被西塞罗誉为"历史之父"。代表作《历史》是西方第一部完整流传下来的历史著作，记述希波战争及诸多民族的风俗地理。在《浮士德》注解中被引用于记载中亚巨种蚂蚁掘金之事。
  书中原文: 希罗多德《历史》第4章第27节和普利尼《博物志》第12章第31节曾记载聚集黄金的巨种蚂蚁，有狐狸大小，生活在中亚，在打洞时，把金沙扔出。
  网络来源: https://baike.baidu.com/item/希罗多德/683204

- 名词: 斯库提亚
  分类: 地点
  解释: 又译斯基泰、西徐亚，古代活跃于欧亚草原的游牧民族，约公元前8世纪至公元前3世纪活动于黑海北岸至中亚一带。以骑射闻名，被希罗多德记载于《历史》中。在《浮士德》注解中提及阿里马斯波族人住在斯库提亚的北方。
  书中原文: 希罗多德又记载阿里马斯波族人为一种独眼民族，住在斯库提亚的北方，他们要盗取鸟头狮守护的黄金，而发生战斗。
  网络来源: https://wapbaike.baidu.com/item/斯基泰人/9003296

- 名词: 塞壬
  分类: 人物
  解释: 希腊神话中的危险生物，最初形象为人首鸟身（美人鸟），以天籁般的歌声引诱水手导致航船触礁沉没。居住在西西里岛附近海域的岛屿上。荷马史诗《奥德赛》中记载了俄底修斯抵御塞壬歌声的故事。
  书中原文: 希腊名塞壬：最初只有头部为女首，全身都是鸟体。后来在神话中女体部分增多，最后只有脚和翅膀保存鸟形。她们共有三人，常栖息山岩，以美妙的歌声诱惑行船，使人遭难。
  网络来源: https://bkso.baidu.com/item/塞壬/32238

- 名词: 帕拉斯·雅典娜
  分类: 人物
  解释: 希腊神话中的智慧女神、战略女神、工艺女神，奥林匹斯十二主神之一。她是宙斯与墨提斯之女，从宙斯头颅中全副武装跃出。象征物为猫头鹰、橄榄枝和神盾。在《浮士德》注解中提及她曾化身门托耳指点忒勒玛科斯。
  书中原文: 帕拉斯·雅典娜女神曾化身为门托耳（俄底修斯的好友，又是他儿子忒勒玛科斯的师父）指点忒勒玛科斯去寻访父亲的下落，见荷马《奥德修纪》卷二。
  网络来源: https://wapbaike.baidu.com/item/雅典娜/26005

- 名词: 卡斯托耳
  分类: 人物
  解释: 希腊神话中的英雄，宙斯与勒达之子（一说为凡人），擅长骑术与驯马。与兄弟波吕丢刻斯合称狄奥斯库里兄弟（双子座）。参加了阿尔戈英雄远征。在《浮士德》注解中，卡斯托耳与波吕丢刻斯被提及为海伦的双胞胎兄弟。
  书中原文: 宙斯和勒达所生的双胞胎兄弟，即卡斯托耳和波吕丢刻斯。与海伦同胞。
  网络来源: https://zh.wikipedia.org/wiki/卡斯托尔耳和波鲁克斯

- 名词: 波吕丢刻斯
  分类: 人物
  解释: 希腊神话中的英雄，宙斯之子，拥有永生，擅长拳击。与卡斯托耳合称狄奥斯库里兄弟。宙斯将二人升为天上的双子座。参加了阿尔戈英雄远征。在《浮士德》注解中与卡斯托耳并提。
  书中原文: 宙斯和勒达所生的双胞胎兄弟，即卡斯托耳和波吕丢刻斯。与海伦同胞。
  网络来源: https://zh.wikipedia.org/wiki/卡斯托尔耳和波鲁克斯

- 名词: 伊阿宋
  分类: 人物
  解释: 希腊神话中的英雄，爱俄尔卡斯王国合法继承人。率领阿尔戈英雄乘阿尔戈号远征科尔喀斯夺取金羊毛，在美狄亚帮助下成功。后被美狄亚复仇死于悲剧。在《浮士德》注解中被提及为远征船上的带队。
  书中原文: 伊阿宋是远征船上的带队。
  网络来源: https://zh.m.wikipedia.org/zh-mo/伊阿宋

- 名词: 提瑞西阿斯
  分类: 人物
  解释: 希腊神话中忒拜城的盲人预言家。有从男变女再变回男的独特经历。因裁决宙斯与赫拉之争触怒赫拉而失明，宙斯补偿其预言能力。在《浮士德》注解中被提及为曼托之父。
  书中原文: 曼托是忒拜地方的预言盲人提瑞西阿斯之女，古代预言术与医术相接近，故歌德在这里把她说成是医神埃斯克勒庇俄斯之女。
  网络来源: https://wapbaike.baidu.com/item/忒瑞西阿斯

- 名词: 珀耳塞福涅
  分类: 人物
  解释: 希腊神话中的冥后，宙斯与德墨忒耳之女。被冥王哈迪斯强行掳至冥界为后，因吃了冥界的石榴籽而每年须返回冥界四个月，由此产生四季更替。在《浮士德》注解中提及她窃听阳世人捎信。
  书中原文: 珀耳塞福涅被冥王普路同抢到下界作冥后，她还留恋阳世，干犯冥王的禁令，窃听阳世人给她捎信问安（歌德杜撰之词）。
  网络来源: https://wapbaike.baidu.com/item/珀耳塞福涅/75915

- 名词: 勒托
  分类: 人物
  解释: 希腊神话中的提坦女神，司掌保育。宙斯的第六任妻子，生下双胞胎阿波罗和阿耳忒弥斯。因赫拉嫉妒被迫四处流浪，最终在提洛岛生下子女。在《浮士德》注解中被提及于得罗斯岛分娩的故事。
  书中原文: 勒托因宙斯得孕，嫉妒的赫拉咒她在世间找不到地方分娩。宙斯乃怂恿海神波塞冬从海中涌出得罗斯岛。勒托遂在该岛生下阿波罗和阿耳忒弥斯。
  网络来源: https://baike.baidu.com/item/勒托/4638690

- 名词: 阿耳忒弥斯
  分类: 人物
  解释: 希腊神话中的狩猎女神、月亮女神，奥林匹斯十二主神之一。宙斯与勒托之女，阿波罗的双胞胎姐姐（或妹妹）。三大处女神之一，以弓箭为武器。在《浮士德》注解中与勒托在得罗斯岛分娩的故事相关。
  书中原文: 勒托因宙斯得孕……勒托遂在该岛生下阿波罗和阿耳忒弥斯。
  网络来源: https://wapbaike.baidu.com/item/阿尔忒弥斯/662237

- 名词: 达克提利族
  分类: 概念
  解释: 希腊神话中住在伊达山的古老精灵族群，名字意为"手指"。与大母神瑞亚相关，被认为是铁器的发现者和最早的金属加工者，也发明了音乐韵律。被描述为侏儒形态的精怪。在《浮士德》注解中提及他们与皮格迈俄族被混同。
  书中原文: 神话中住在伊达山区搞金属制造工作的民族。希腊语daktylos意为手指，原指他们手指灵巧而言，并不是说他们是手指大小的小人。歌德在这里也把他们跟日耳曼神话中的大拇指小人混同。
  网络来源: https://www.wikiwand.com/zh-sg/articles/达克堤利

- 名词: 伊尔泽
  分类: 人物
  解释: 德国哈尔茨山民间传说中的公主，居住在布罗肯山附近的伊尔泽石中。据传说她每天在伊尔泽河中洗澡，谁碰到她就可以被她带去过国王般的生活。歌德在《浮士德》中提及这一人物。
  书中原文: 哈尔茨山民间传说中的人物，据说她本是一位公主。她每天在伊尔泽河中洗澡，谁碰到她，就可以被她带去过国王般的生活。布罗肯山有一座高岩以她命名称为伊尔森斯坦（伊尔泽之石）。
  网络来源: https://en.wikipedia.org/wiki/Ilsestein

- 名词: 俄林波斯山
  分类: 地点
  解释: 希腊北部最高山峰（海拔2917米），希腊神话中众神的居所。宙斯率领奥林匹斯十二主神在此统治世界，山上有金色宫殿。现代常译作奥林匹斯山。在《浮士德》注解中被提及为神山及通往冥府的入口之处。
  书中原文: 俄林波斯神山也有通往冥府的入口之处。
  网络来源: https://baike.baidu.com/item/奥林匹斯山/1811138

- 名词: 帕尔纳索斯山
  分类: 地点
  解释: 希腊中部的神山（海拔2459米），希腊神话中太阳神阿波罗和缪斯女神的居住地，是艺术与诗歌灵感的源泉。山麓有著名的德尔斐遗址。在西方文化中成为"诗坛"的代名词。在《浮士德》注解中被提及为阿波罗和缪斯女神所居之神山。
  书中原文: 在希腊中部，为阿波罗和缪斯女神们所居之神山。
  网络来源: https://baike.baidu.com/item/帕尔纳索斯山/7311385

- 名词: 腾珀
  分类: 地点
  解释: 希腊忒萨利亚北部的一条著名峡谷，夹在俄林波斯山与俄萨山之间，全长约10千米，皮尼奥斯河穿谷而过。古希腊诗人誉为"阿波罗和缪斯喜爱的去处"。在《浮士德》注解中提及庞培兵败后由腾珀往海路而逃。
  书中原文: 庞培兵败后，实际是由腾珀往海路而逃。
  网络来源: https://zh.wikipedia.org/zh-hant/坦佩谷

- 名词: 忒拜
  分类: 地点
  解释: 又译底比斯，希腊中部的古城邦，与雅典、斯巴达并称古希腊三大城邦。在希腊神话中是俄狄浦斯悲剧、七将攻忒拜等故事的发生地。在《浮士德》注解中被提及为人面狮和预言盲人提瑞西阿斯等相关的地点。
  书中原文: 希腊忒拜的人面狮为女首狮身而有翼的怪物。暗指忒拜的人面狮出一谜语"早四足，午二足，晚三足"，后由俄狄浦斯猜出其谜底为"人"。
  网络来源: https://baike.baidu.com/item/底比斯/10997973

- 名词: 路卡努斯
  分类: 人物
  解释: 古罗马诗人（公元39年—65年），全名马库斯·安奈乌斯·卢卡努斯。代表作《法沙利亚》（又名《内战记》），描写凯撒与庞培的内战。因卷入反尼禄阴谋被迫自杀。在《浮士德》注解中被引用于厄里克托的描述。
  书中原文: 路卡努斯说厄里克托居于死者的墓中，避免与活人接近。
  网络来源: https://wapbaike.baidu.com/item/卢卡努斯/12579638

- 名词: 沃当
  分类: 人物
  解释: 日耳曼神话中的最高神，对应北欧神话的奥丁（Odin）。司掌预言、王权、智慧、诗歌、战争等。独眼形象，手持永恒之枪冈格尼尔。星期三（Wednesday）即源于沃当之名。在《浮士德》注解中提及他从高空住处观看下界。
  书中原文: 日耳曼神话中沃当大神从高空的住处，通过窗子观看下界。梅非斯特在这里以大神自比。
  网络来源: https://wapbaike.baidu.com/item/奥丁/32493

- 名词: 俄底修斯
  分类: 人物
  解释: 希腊神话中的英雄，伊萨卡国王。以机智勇敢、足智多谋著称。献木马计攻破特洛伊，战后在海上漂泊十年才返回家乡。《奥德赛》的主角。罗马名尤利西斯。在《浮士德》注解中被提及用麻绳捆于桅杆以抵御塞壬歌声。
  书中原文: 俄底修斯用麻绳将自己捆在桅杆上，以蜡封耳，不让美人鸟的歌声将他迷住。见荷马《奥德修纪》。
  网络来源: https://wapbaike.baidu.com/item/奥德修斯/83270

- 名词: 伊俄拉俄斯
  分类: 人物
  解释: 希腊神话中的底比斯英雄，赫拉克勒斯的侄子和终身伙伴。协助赫拉克勒斯斩杀九头蛇许德拉（用火把灼烧断颈阻止蛇头再生），也是阿尔戈英雄之一。在《浮士德》注解中被提及在赫拉克勒斯诛灭勒耳那水蛇时相助。
  书中原文: 勒耳那沼泽中的水蛇，有九头，砍去一头，仍能再生。赫拉克勒斯靠伊俄拉俄斯之助，将它诛灭。
  网络来源: https://baike.baidu.com/item/Iolaus/58932271

- 名词: 阿瑞斯
  分类: 人物
  解释: 希腊神话中的战神，奥林匹斯十二主神之一，宙斯与赫拉之子。象征血腥战斗与暴乱，性格嗜血好战。罗马对应神为玛尔斯（火星）。在《浮士德》注解中被提及为战神身份。
  书中原文: 战神。
  网络来源: https://wapbaike.baidu.com/item/阿瑞斯/691

- 名词: 赫耳墨斯
  分类: 人物
  解释: 希腊神话中的神使，奥林匹斯十二主神之一，宙斯与迈亚之子。司掌商业、旅行、畜牧、雄辩、偷窃等，是亡灵接引者。脚穿插翼凉鞋，手持双蛇杖。发明了里拉琴。在《浮士德》注解中被提及为神的使者。
  书中原文: 神的使者。
  网络来源: https://baike.baidu.com/item/赫尔墨斯/2477152

- 名词: 欧律斯透斯
  分类: 人物
  解释: 希腊神话中的梯林斯和迈锡尼国王。因赫拉的诡计比赫拉克勒斯提前出生，抢先获得王位继承权，成为赫拉克勒斯必须服从的主人。命赫拉克勒斯完成十二项不可能的任务。在《浮士德》注解中被提及为赫拉克勒斯应叫他叔父。
  书中原文: 指欧律斯透斯，赫拉克勒斯曾奉彼之命完成十二件大功。实际上赫拉克勒斯应叫他叔父。
  网络来源: https://wapbaike.baidu.com/item/欧律斯透斯/10482261

- 名词: 翁法勒
  分类: 人物
  解释: 希腊神话中小亚细亚吕狄亚（吕底亚）的女王。赫拉克勒斯因杀害朋友被罚卖身为奴给她三年。期间赫拉克勒斯穿女装做女红，翁法勒则披狮皮持木棒，形成性别角色反转的经典情节。在《浮士德》注解中提及赫拉克勒斯曾为她服役。
  书中原文: 指吕狄亚女王翁法勒，赫拉克勒斯曾替她服役为奴，后来又被她招赘为夫。
  网络来源: https://baike.baidu.com/item/翁法勒

- 名词: 埃斯克勒庇俄斯
  分类: 人物
  解释: 希腊神话中的医神，太阳神阿波罗与科洛尼斯之子。从半人马喀戎学医，拥有起死回生之力。因复活太多人而被宙斯以雷电击毙，后升为蛇夫座。蛇杖是其标志，至今为世界卫生组织的标志。在《浮士德》注解中被提及为曼托之父。
  书中原文: 曼托是忒拜地方的预言盲人提瑞西阿斯之女，古代预言术与医术相接近，故歌德在这里把她说成是医神埃斯克勒庇俄斯之女。
  网络来源: https://wapbaike.baidu.com/item/阿斯克勒庇俄斯/7105384

- 名词: 哈耳皮埃
  分类: 概念
  解释: 希腊神话中的鸟身女妖，最初为风之精灵，后演变为丑陋怪物——长女人头却有秃鹫的身体、翅膀和利爪。名字意为"掠夺者"。在阿尔戈英雄传说中，它们折磨菲纽斯，被玻瑞阿代兄弟驱逐。在《浮士德》注解中被提及为折磨菲纽斯的鸟身女妖。
  书中原文: 北风神名玻瑞阿斯，其二子名仄忒斯和卡拉伊斯，长有翅翼。他们掌管划桨，曾援救菲纽斯，使其脱离哈耳皮埃（鸟身女妖）的折磨。
  网络来源: https://wapbaike.baidu.com/item/哈耳庇厄/7318435

- 名词: 恩浦萨
  分类: 人物
  解释: 希腊神话中一种变形吸血女妖/幽灵，属于冥界女神赫卡忒的侍从。标志性特征为一条驴腿、一条人腿。能变形为美女、动物等姿态，夜间诱惑男子并吸食其血液和尸体。在《浮士德》注解中提及她能变形。
  书中原文: 希腊传说中的恐怖的幽灵，其名Empusa有独脚之意，另一足为驴足、铁足或牛屎足，众说不一。能变形为木、石、牛、蛇、美女之类。
  网络来源: https://zh.m.wikipedia.org/wiki/恩普莎

- 名词: 酒神杖
  分类: 物件
  解释: 古希腊神话中酒神狄俄尼索斯及其追随者所持的仪式手杖。由巨型茴香杆制成，缠绕常春藤和葡萄蔓，顶端装饰松果。象征繁荣与丰产。在酒神节庆典中作为神圣法器使用。在《浮士德》注解中被提及。
  书中原文: 酒神杖又译薜荔杖，在酒神狄俄尼索斯节日，男女酒神伴侣均持此杖。杖为一长竿，缠绕常春藤与葡萄蔓，竿顶装一松实（松球，松果）。
  网络来源: https://baike.baidu.com/item/Thyrsus

- 名词: 古典的
  分类: 概念
  解释: 歌德文艺理论中的重要概念，与"浪漫的"形成对立。歌德在《格言与反省》中提出："古典的是健全的，浪漫的是病态的。"在《浮士德》注解中，古典的指古希腊式的理性、和谐、形式完美的艺术风格，象征健康与健全。
  书中原文: 歌德《格言与反省》："古典的是健全的，浪漫的是病态的。"
  网络来源: https://emus.cn/reviews/reviews_283.html

- 名词: 浪漫的
  分类: 概念
  解释: 歌德文艺理论中的重要概念，与"古典的"形成对立。在《浮士德》注解中，浪漫的指中世纪以来注重情感、幻想、个性的艺术风格。歌德认为浪漫的是"病态的"，而古典的是"健全的"。
  书中原文: 歌德《格言与反省》："古典的是健全的，浪漫的是病态的。"
  网络来源: https://emus.cn/reviews/reviews_283.html

- 名词: 变形
  分类: 概念
  解释: 歌德自然观中的重要基本概念。歌德在《植物变形记》中提出，花和果都不过是变形的叶子，动物和植物都存在一种"原形态"。他首创了"形态学"（Morphology）这一术语。在《浮士德》注解中被提及为歌德自然观的核心概念。
  书中原文: 变形为歌德自然观的重要的基本概念。例如在植物的变形方面，他认为花和果都不过是变形的叶子。
  网络来源: https://baike.baidu.com/item/形态学/1387536

- 名词: 马人
  分类: 概念
  解释: 又译半人马，希腊神话中半人半马的传说生物，上半身为人的躯干，下半身为马的身体。通常形象为粗野狂暴，但有例外——喀戎智慧博学，是众多希腊英雄的导师。在《浮士德》注解中提及刻戎为马人族。
  书中原文: 刻戎为马人族，上半身为人，下半身为马。精通医学、天文和音乐。希腊神话中许多英雄，如赫拉克勒斯、阿喀琉斯、伊阿宋等都曾拜他为师。
  网络来源: https://wapbaike.baidu.com/item/半人马/848099

- 名词: 侏儒
  分类: 概念
  解释: 日耳曼神话和希腊神话中矮小的精怪种族。在《浮士德》注解中，皮格迈俄族（希腊神话侏儒）被与日耳曼神话中挖掘地下金矿的侏儒混同。侏儒在德国民间传说中有特定形象，常出现在木偶戏和童话中。
  书中原文: 皮格迈俄族：神话中的侏儒族，荷马说他们住在俄刻阿诺斯河畔，每年有鹤群飞来和他们大战。歌德在这里把他们跟日耳曼神话中的挖掘地下金矿的侏儒混而为一。
  网络来源: https://baike.baidu.com/item/侏儒

- 名词: 亨利峰
  分类: 地点
  解释: 布罗肯山附近的一座山峰（Heinrichshöhe），海拔约1044米，是哈尔茨山的第二高峰。据传说古代撒克逊皇帝亨利曾和伊尔泽公主在她的岩宫中享乐。在《浮士德》注解中被提及。
  书中原文: 布罗肯山有一峰名亨利峰。据传说古代撒克逊皇帝亨利曾和伊尔泽在她的岩宫中享乐。
  网络来源: https://en.wikisource.org/wiki/1911_Encyclop%C3%A6dia_Britannica/Harz_Mountains

- 名词: 贫苦村
  分类: 地点
  解释: 德国哈尔茨山布罗肯山南面的村庄，德文名Elend（埃伦德），意为"贫困、苦难"。源自古高地德语"alia landa"（在土地之外），形容地处偏远荒凉。村旁有名为Sorge（忧虑）的村庄。在《浮士德》注解中被提及为鼾息岩附近的地点。
  书中原文: 贫苦村原文名埃伦特，为布罗肯山南面的乡村。
  网络来源: https://en.harzinfo.de/destinations/destinations-from-a-to-z/elend

- 名词: 伊甸园
  分类: 地点
  解释: 《圣经·创世记》中记载的上帝为人类始祖亚当和夏娃创造的乐园。园中有生命树和分别善恶的树。因亚当夏娃受蛇诱惑吃禁果被逐出。在《浮士德》注解中被提及与人类始祖的关系。
  书中原文: 《旧约·创世记》中人类的始祖，他受了女人夏娃的诱惑，吃了禁果而被逐出伊甸园。
  网络来源: https://wapbaike.baidu.com/item/伊甸园/802

- 名词: 安德洛墨达
  分类: 人物
  解释: 希腊神话中的埃塞俄比亚公主，国王克甫斯与王后卡西奥佩娅之女。因母亲炫耀其美貌触怒海神，被锁于礁石献祭海怪。英雄珀耳修斯斩杀美杜莎归来后救下她，娶其为妻。死后化为仙女座。在《浮士德》注解中被提及。
  书中原文: 安德洛墨达（在浮士德文本中作为希腊神话典故被提及）。
  网络来源: https://wapbaike.baidu.com/item/安德洛墨达/1851761

- 名词: 阿耳戈船
  分类: 物件
  解释: 希腊神话中伊阿宋率领阿尔戈英雄前往科尔喀斯夺取金羊毛所乘的大船。由阿尔戈斯在雅典娜帮助下建造，船首装有可预言的多多那圣树木板。有50把船桨。后化为天上的南船座。在《浮士德》注解中被提及为远征船。
  书中原文: 伊阿宋是远征船上的带队。在船上充当乐师的角色。
  网络来源: https://baike.baidu.com/item/阿尔戈船英雄/55555924

- 名词: 大洋神俄刻阿诺斯
  分类: 人物
  解释: 希腊神话中的提坦神，十二提坦神中的长兄，天神乌拉诺斯与地母盖亚之子。司掌环绕大地的"大洋河"。与妹妹泰西斯生下3000个河神和3000个海洋女神。英语"Ocean"一词即源于他的名字。在《浮士德》注解中被提及为刻戎之母的父亲。
  书中原文: 菲吕拉：刻戎之母，河神俄刻阿诺斯之女。
  网络来源: https://baike.baidu.com/item/俄刻阿诺斯/8922840

- 名词: 玻瑞阿斯
  分类: 人物
  解释: 希腊神话中的北风神，四大风神之一。父亲为星空神阿斯特赖俄斯，母亲为晨光女神厄俄斯。曾抢夺雅典公主俄瑞提亚为妻，生下仄忒斯和卡拉伊斯二子（合称玻瑞阿代，生有双翅，参加了阿尔戈英雄远征）。在《浮士德》注解中被提及。
  书中原文: 北风神名玻瑞阿斯，其二子名仄忒斯和卡拉伊斯，长有翅翼。他们掌管划桨，曾援救菲纽斯，使其脱离哈耳皮埃（鸟身女妖）的折磨。
  网络来源: https://wapbaike.baidu.com/item/波瑞阿斯

- 名词: 琉刻岛
  分类: 地点
  解释: 希腊神话中的"白岛"，位于黑海，现代称为蛇岛（属乌克兰）。据神话传说，阿喀琉斯死后被母亲忒提斯带至该岛获得永生，与帕特罗克洛斯等英雄的灵魂在此居住。岛上曾建有阿喀琉斯神庙。在《浮士德》注解中被提及为阿喀琉斯和海伦的结婚之地。
  书中原文: 斐赖：忒萨利亚的城市。据说在它的附近有通往下界（阴司）的入口处，故歌德在这里作为阿喀琉斯和海伦两个鬼魂的结婚之地。在神话上说海伦死后，跟阿喀琉斯在琉刻岛（该处为阿喀琉斯的坟墓所在地）结婚，生一子名欧福里翁。
  网络来源: https://pleiades.stoa.org/places/226677

- 名词: 阿提卡
  分类: 地点
  解释: 希腊中东部的一个半岛区域，伸入爱琴海。是雅典城邦的核心区域，古希腊文明的中心地带。历史可追溯至迈锡尼文明时期。在《浮士德》注解中被提及为海伦被忒修斯拐至的阿提卡海岸城市附近地区。
  书中原文: 希腊阿提卡海岸城市，在雅典西北。海伦于十岁时被忒修斯和珀里托俄斯从斯巴达拐至阿提卡，被她的两个哥哥救出。
  网络来源: https://wapbaike.baidu.com/item/阿提卡大区/8890645

- 名词: 皮得纳
  分类: 地点
  解释: 又译彼得那，马其顿王国境内的古城，位于今希腊北部。公元前168年在此发生的彼得那战役中，罗马军队在马其顿国王珀耳修斯被击败，马其顿王国灭亡，标志着希腊化时代的终结。在《浮士德》注解中被提及为马其顿王珀耳修斯战败之地。
  书中原文: 公元前168年马其顿王珀耳修斯被罗马执政官埃米利乌斯·泡路斯战败于皮得纳。
  网络来源: https://wapbaike.baidu.com/item/彼得那战役/12763608
