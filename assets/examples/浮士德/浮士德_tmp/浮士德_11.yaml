- 名词: 玛门
  分类: 概念
  解释: 玛门（Mammon）源自亚兰文，原意为"财富"、"财产"，在新约圣经《马太福音》6:24中被耶稣拟人化，指与上帝对立的金钱崇拜。中世纪后被神格化为代表贪婪的地狱恶魔，掌管七宗罪中的贪婪，弥尔顿《失乐园》中描写其为堕落天使，在地狱建造万魔殿。后世常作为拜金主义和物质崇拜的象征。
  书中原文: "我诅咒玛门[3]，他若用金钱诱我们从事大胆的事业"
  网络来源: https://baike.baidu.com/item/%E7%8E%9B%E9%97%A8/79919

- 名词: 帕拉塞尔苏斯
  分类: 人物
  解释: 帕拉塞尔苏斯（Paracelsus，约1493-1541），文艺复兴时期瑞士医生、炼金术士和占星师，本名德奥弗拉斯特·冯·霍恩海姆。他创立了医疗化学（Iatrochemistry），提出三元素理论（硫、汞、盐），被誉为"毒理学之父"。他反对传统医学权威，在巴塞尔大学首次用德语授课，当众焚烧盖仑和阿维森纳的著作，主张每种疾病都有特效的化学疗法。
  书中原文: "此处四大精灵的名称均根据帕拉塞尔苏斯而来。"
  网络来源: https://baike.baidu.com/item/%E8%8F%B2%E5%88%A9%E6%99%AE%E6%96%AF%C2%B7%E5%A5%A5%E9%87%8C%E6%AC%A7%E5%8B%92%E6%96%AF%C2%B7%E5%BE%B7%E5%A5%A5%E5%BC%97%E6%8B%89%E6%96%AF%E7%89%B9%C2%B7%E5%8D%9A%E5%A7%86%E5%B7%B4%E6%96%AF%E8%8C%A8%C2%B7%E5%86%AF%C2%B7%E9%9C%8D%E6%81%A9%E6%B5%B7%E5%A7%86

- 名词: 四大精灵
  分类: 概念
  解释: 四大精灵是西方神秘学中代表四种自然元素的精灵，由文艺复兴时期炼金术士帕拉塞尔苏斯系统分类：火精Salamander（沙罗曼达）、水精Undine（温蒂妮）、风精Sylphe（希尔芙）、土精Kobold（科波尔德/诺姆）。这些精灵由单一元素构成，生活在各自环境中，具有类似人类的特征但没有灵魂，寿命约300-1000年。这一体系广泛影响后世文学、游戏和流行文化。
  书中原文: "火精为Salamander，水精为Undene（＝Undine），风精为Sylphe，土精为Kobold。"
  网络来源: https://baike.baidu.com/item/%E5%85%83%E7%B4%A0%E7%B2%BE%E7%81%B5/5628850

- 名词: 别西卜
  分类: 人物
  解释: 别西卜（Beelzebub）源自希伯来语Ba'al Zəbûb，意为"苍蝇之主"，原为非利士人在以革伦崇拜的神祇。新约圣经中被称为鬼王，法利赛人指控耶稣靠别西卜赶鬼。后世恶魔学中将其列为仅次于路西法的堕落天使，对应七宗罪中的暴食。弥尔顿《失乐园》中描写其为撒旦的左右手，原为六翼炽天使。戈尔丁小说《蝇王》书名即源于此。
  书中原文: "后者在《马太福音》第10章译为别西卜，为鬼王之名。"
  网络来源: https://baike.baidu.com/item/%E5%88%AB%E8%A5%BF%E5%8D%9C/7268

- 名词: 阿里曼
  分类: 人物
  解释: 阿里曼（Ahriman），又称安哥拉·曼纽（Angra Mainyu），是琐罗亚斯德教（拜火教/祆教）中的恶界最高神，代表一切罪恶、黑暗、死亡与不洁之源。与善神阿胡拉·马兹达形成二元对立，双方持续斗争构成该教核心教义。据《班达喜兴》记载，善恶之争贯穿四个三千年循环，最终阿里曼将被击败、世界在火中净化。其统御六大恶魔和无数德弗（Daeva）。
  书中原文: "梅非斯特此处所说的恶魔的本质源于古代波斯宗教中的恶灵阿里曼，他是黑暗之主。"
  网络来源: https://baike.baidu.com/item/%E5%AE%89%E5%93%A5%E6%8B%89%E6%9B%BC%E7%BA%BD/9077955

- 名词: 逻各斯
  分类: 概念
  解释: 逻各斯（Logos）是古希腊哲学中的核心概念，源自希腊语动词"legein"（言说），本义为"言辞"、"理性"、"尺度"。赫拉克利特最早将其引入哲学，指支配宇宙万物的普遍规律与理性原则。斯多亚学派将其理解为宇宙理性，犹太哲学家斐洛视其为神圣智慧。基督教《约翰福音》开篇"太初有道"中的"道"即译自Logos，将基督视为逻各斯的化身。西方各学科词尾"-logy"均源于此。
  书中原文: "希腊文Logos，意义甚多，难以准确翻译，故在此译出各种不同的意义。"
  网络来源: https://baike.baidu.com/item/%E9%80%BB%E5%90%84%E6%96%AF/2090659

- 名词: 亚巴顿
  分类: 人物
  解释: 亚巴顿（Abaddon），希腊名亚玻伦（Apollyon），意为"毁灭者"，是圣经《启示录》第9章中掌管无底坑的天使，也是折磨人类的蝗虫大军的王。希伯来语意为"毁灭"或"毁灭之地"，在旧约《约伯记》《箴言》等书中指阴间或死者的领域。其身份有争议，一说为上帝执行毁灭的天使，一说为撒但或死亡天使，犹太教传统中常等同死亡天使萨麦尔。
  书中原文: "按着希伯来话，名叫亚巴顿，希利尼话，名叫亚玻伦。"
  网络来源: https://baike.baidu.com/item/%E4%BA%9A%E5%B7%B4%E9%A1%BF/81955

- 名词: 三位一体
  分类: 概念
  解释: 三位一体（Trinity）是基督教的核心教义，主张上帝独一但包含三个不同位格：圣父、圣子和圣灵，三者本质相同、同尊同荣、同为永恒。此词由拉丁教父特土良首次使用，325年尼西亚大公会议确立圣子与圣父同质，381年君士坦丁堡公会议完善教义。虽"三位一体"一词未直接出现于圣经，支持者援引《马太福音》28:19"奉父、子、圣灵的名施洗"等经文。天主教、东正教和新教均支持此教义。
  书中原文: "一种三角形的标记，象征基督教的三位一体，三面均有光芒散出，象征神圣之爱的圣火，它可以烧毁恶魔。"
  网络来源: https://baike.baidu.com/item/%E4%B8%89%E4%BD%8D%E4%B8%80%E4%BD%93/1757193

- 名词: 极乐岛
  分类: 地点
  解释: 极乐岛（Fortunate Isles / Isles of the Blessed），又称至福乐土（Elysium），是古希腊罗马神话中的幸福之地，位于大地极西尽头的大洋河沿岸，英雄和好人死后在此享福。荷马《奥德赛》描述此地无风雪暴雨、常年和风吹拂。赫西俄德说一年三次结实。普鲁塔克将其描述为两个气候温和、土壤肥沃的岛屿。法国香榭丽舍大街（Champs-Élysées）即源于此名。
  书中原文: "欧洲传说中的极乐岛，在极西大海之中，犹之我国诗中的蓬莱仙岛。"
  网络来源: https://zh.wikipedia.org/wiki/%E8%87%B3%E7%A6%8F%E4%B9%90%E5%9C%9F

- 名词: 所罗门
  分类: 人物
  解释: 所罗门（Solomon，约前990-前931），以色列联合王国第三位国王，大卫之子，以超凡智慧闻名。圣经记载他向神求智慧治理百姓，著名故事包括智断婴案。他在耶路撒冷建造了第一圣殿，统治时期是以色列的黄金时代。据犹太传统著有《箴言》《传道书》《雅歌》。晚年因娶外邦妃嫔敬拜偶像导致王国分裂。中世纪传说中他被当作魔术师，假托其名流传有多部魔法书。
  书中原文: "此书假托所罗门之名，因以色列王所罗门在中世纪传说中被当作一个魔术师。"
  网络来源: https://baike.baidu.com/item/%E6%89%80%E7%BD%97%E9%97%A8
