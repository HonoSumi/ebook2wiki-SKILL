- 名词: 雾带
  分类: 概念
  解释: 即Fata Morgana（复杂蜃景），一种出现在意大利西西里岛墨西拿海峡的复杂海市蜃楼现象。名称源自亚瑟王传说中的女巫摩根勒菲（Morgan le Fay），传说她会在墨西拿海峡上空制造空中城堡的幻象。在《浮士德》中，浮士德以此比喻战场上的奇异幻象，暗示战争中的魔法与欺骗。
  书中原文: 你可曾听说有一种雾带，飘浮在西西里海岸地带？在白日里，袅袅分明，它高高地飘在半空，映在独特的烟霭之中，显出一种奇妙的幻影：其中有城市忽隐忽露，其中有花园忽沉忽浮，像透过大气的一幅幅美景。
  网络来源: https://zh.wikipedia.org/zh-cn/%E8%A4%87%E9%9B%9C%E8%9C%83%E6%99%AF

- 名词: 双生子
  分类: 概念
  解释: 指希腊神话中的狄俄斯库里（Dioscuri）——卡斯托尔（Castor）与波鲁克斯（Pollux），宙斯的孪生儿子。他们是航海者的保护神，以圣埃尔摩之火的形式显现，救助遇难船员。在《浮士德》中，浮士德以此比喻战场上枪尖闪现的奇异火光，将其解释为古代神灵遗力的显现。
  书中原文: 请原谅，主上，这是往昔消逝了的神灵的遗迹，是双生子的回光返照，船夫都要向他们祈祷；他们在聚集最后的力量。
  网络来源: https://baike.baidu.com/item/%E7%8B%84%E4%BF%84%E6%96%AF%E5%BA%93%E9%87%8C%E5%85%84%E5%BC%9F

- 名词: 狮鹰
  分类: 概念
  解释: 即格里芬（Griffin），神话生物，前半身为鹰（头、喙、翅膀、前爪），后半身为狮（躯干、后腿、尾巴），传说中守护宝藏，象征力量与警觉。在《浮士德》中，狮鹰追赶雄鹰，浮士德将此天象解读为吉兆——狮鹰代表伪帝的叛乱势力，雄鹰代表皇帝一方，预示皇帝将获胜。
  书中原文: 一只雄鹰在天空高飞，一只狮鹰在后面猛追。浮士德：注意：我看这是个吉兆。狮鹰乃是幻想的禽鸟；它怎能如此不自量力，要跟真正的雄鹰为敌？
  网络来源: https://zh.wikipedia.org/wiki/%E7%8B%AE%E9%B9%AB

- 名词: 指挥棒
  分类: 物件
  解释: 元帅的权杖，象征军事指挥权。在《浮士德》中，元帅因不满皇帝依靠梅非斯特的魔法作战，认为魔术干不出好事，遂交出指挥棒辞去指挥职务。皇帝起初拒绝接受，后转交给梅非斯特代理指挥，但梅非斯特讽刺指挥棒与十字架有点相像而拒绝。
  书中原文: 这种战局我无力挽回；由他们开头，让他们收尾，我把指挥棒交还给你。皇帝：请暂时保存，时辰一到，说不定我们有好运临头。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/153.htm

- 名词: 乌鸦
  分类: 概念
  解释: 在《浮士德》中，梅非斯特的两只乌鸦充当其信使。乌鸦原为北欧大神奥丁（Wotan）的两个随从，后转义为魔鸟，为梅非斯特所有。梅非斯特派遣乌鸦前往水精处借水波之影制造假洪水，又派它们去侏儒的打铁场索取火种制造爆炸和混乱。浮士德明确指出：鸽子是为和平传书，乌鸦却是战争的信使。
  书中原文: 鸽子的事情你想必知道，它能从极远之地回巢，不忘它的雏鸟和粮食。重要的差异乃在于此处：鸽子是为和平传书，乌鸦却是战争的信使。
  网络来源: https://book.douban.com/annotation/70895777/

- 名词: 假水
  分类: 概念
  解释: 梅非斯特让乌鸦请水精们借出的水波影子，只是一种魔法幻象，并非真实的水。这种幻象使敌人以为被洪水淹没，惊慌失措地做出游泳姿势奔逃，实际上身处干燥的陆地。只有凡人的肉眼受它欺骗。这是梅非斯特利用魔法制造的心理战手段。
  书中原文: 我对这种假水毫无所见，只有凡人的肉眼受它欺骗，这种怪事使我颇感兴趣。他们东撞西闯，冲到一起，傻瓜们以为快要淹死，自由地身居陆地，却在喘气，可笑地做着游泳姿势奔驰。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/154.htm

- 名词: 空蜗牛壳
  分类: 概念
  解释: 梅非斯特召唤出来的古代幽灵骑士、国王、皇帝被比喻为空蜗牛壳。他们虽然穿着完整的盔甲，看似威风凛凛，但内里已是空壳，如同蜗牛舍弃的空壳。这一比喻讽刺封建旧秩序已失去实质内容，徒具其表，是中世纪幽灵的空洞再现。
  书中原文: 过去是骑士、国王、皇帝，如今只是空蜗牛壳而已；许多幽灵在其中乔装打扮，使中世纪栩栩如生地再现。
  网络来源: http://bcc.blcu.edu.cn/show/101804890_4_4_7_8/1

- 名词: 中世纪
  分类: 概念
  解释: 欧洲历史上的封建时代（约5世纪至15世纪）。在《浮士德》中，梅非斯特召唤出古代骑士的幽灵，使中世纪的情景栩栩如生地再现。这些幽灵穿着盔甲，仿佛尘世之主，歌德借此对中世纪骑士制度和封建王权进行历史批判。
  书中原文: 过去是骑士、国王、皇帝，如今只是空蜗牛壳而已；许多幽灵在其中乔装打扮，使中世纪栩栩如生地再现。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/149.htm

- 名词: 反逆皇帝的军帐
  分类: 地点
  解释: 《浮士德》第二部第四幕第三场的场景标题，即伪帝（虚假的帝国篡位者）的军帐。皇帝的宝座四周陈设华丽，场景开头即为"先下手。抢夺快。"，暗示伪帝阵营的贪婪与混乱。这是皇帝平定伪帝叛乱战争中的关键场景。
  书中原文: （管弦乐队奏出战嚣之声，最后转为轻松的军乐。）第三场 反逆皇帝的军帐。皇帝的宝座，四周陈设华丽。先下手。抢夺快。
  网络来源: https://book.douban.com/annotation/116931648/

- 名词: 方阵
  分类: 概念
  解释: 古代步兵密集队形战术，源自古希腊重步兵方阵（Phalanx）。在《浮士德》的战争场景中，我军密接方阵的长矛全有灵活的火花飞跳，方阵的坚固先锋向右方移动像电击长空，攻进敌人薄弱的地方。歌德在此融合了古典军事理论与近代战争经验。
  书中原文: 我军密接方阵的长矛，全有灵活的火花飞跳。我觉得全是妖异现象。...我军方阵的坚固的先锋向右方移动，像电击长空，攻进他们薄弱的地方。
  网络来源: https://ir.pku.edu.cn/handle/20.500.11897/621358

- 名词: 隘道
  分类: 概念
  解释: 狭窄险要的山道，战场上的战略要地。在《浮士德》的战争中，如果敌人占据隘道，皇帝的军队就将陷于困境。这是关系到战局胜负的关键地形。
  书中原文: 也许隘道已被占领，左道旁门的结果如此！你们的法术白费心思。...敌人已登上就近的高处，如果他们把隘道占据，我们就要陷于困境。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/153.htm

- 名词: 闪电之光
  分类: 物件
  解释: 战场上出现在长矛枪头的奇异电光，被皇帝视为妖异现象。浮士德解释这是古代神灵（双生子/狄俄斯库里）回光返照的遗迹，船夫都要向他们祈祷。这种超自然现象是梅非斯特魔法在战场上的体现。
  书中原文: 可是多奇怪！那些长枪，枪头全发出闪电之光；我军密接方阵的长矛，全有灵活的火花飞跳。我觉得全是妖异现象。
  网络来源: https://www.cidianwang.com/wenxue/shijiemingzhu/196109_6.htm

- 名词: 幻影
  分类: 概念
  解释: 由雾带（Fata Morgana）显现出的奇妙景象，包括城市忽隐忽露、花园忽沉忽浮。在《浮士德》中，浮士德以此解释战场上的奇异视觉现象，暗示梅非斯特利用海市蜃楼般的魔法迷惑敌军。幻影是整个第四幕战争场景中魔法与欺骗主题的重要意象。
  书中原文: 你可曾听说有一种雾带，飘浮在西西里海岸地带？在白日里，袅袅分明，它高高地飘在半空，映在独特的烟霭之中，显出一种奇妙的幻影：其中有城市忽隐忽露，其中有花园忽沉忽浮，像透过大气的一幅幅美景。
  网络来源: https://zh.wikipedia.org/zh-cn/%E8%A4%87%E9%9B%9C%E8%9C%83%E6%99%AF

- 名词: 吉兆
  分类: 概念
  解释: 好运的预兆。在《浮士德》中，浮士德将雄鹰击败狮鹰的天象解读为吉兆：狮鹰是幻想的禽鸟不自量力与真正的雄鹰为敌，结果被击败坠落山林。皇帝对此半信半疑，但愿吉兆能成真。这场天象对决预示皇帝一方将获胜。
  书中原文: 浮士德：注意：我看这是个吉兆。狮鹰乃是幻想的禽鸟；它怎能如此不自量力，要跟真正的雄鹰为敌？...皇帝：但愿像吉兆这样成功！虽然离奇，我也赞同。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/153.htm

- 名词: 双乌
  分类: 物件
  解释: 梅非斯特的两只乌鸦信使，也被称为双乌。原为北欧大神奥丁的两个随从胡金（Huginn）和穆宁（Muninn），后转义为魔鸟归梅非斯特所有。梅非斯特派遣它们执行多项魔法任务：向水精借水波之影、向侏儒锻铁场索取火种等。乌鸦的双乌身份凸显了其作为魔鬼使者的战争信使职能。
  书中原文: 我的双乌已经飞来，不知有什么消息带来？我很害怕，对我们不利。...请停在我耳朵的近旁。有你们保护，不会灭亡，因为你们的忠告很合理。
  网络来源: https://book.douban.com/annotation/70895777/

- 名词: 凌波仙子
  分类: 人物
  解释: 即水精（Nixen），德语中的女性水精灵。在《浮士德》中，梅非斯特派乌鸦去向水精们请求借出水波的影子制造假洪水。水精的法术能够将影子和实体分开，使人无法分辨真假。凌波仙子是欧洲民间传说中的水泽仙女，常与河流、湖泊相关联。
  书中原文: 我们的乌鸦对那些凌波仙子一定奉承得无微不至；那边已有水在流动。瞧那许多干燥、光秃的山岩正在涌出丰满、快速的清泉；敌人的胜利已被断送。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/154.htm

- 名词: 武库
  分类: 物件
  解释: 古代存放武器的仓库。在《浮士德》中，梅非斯特从武库中取出兵器，分发给召唤而来的幽灵骑士，使他们武装起来参加新的战争。武库象征着中世纪军事力量的遗存，梅非斯特清空武库的行动意味着将死去的过去重新注入战斗。
  书中原文: 出清四周围的武库；他们在那里或骑马、或徒步，好像还是尘世之主；过去是骑士、国王、皇帝，如今只是空蜗牛壳而已。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/149.htm

- 名词: 假像
  分类: 概念
  解释: 虚假的影像与幻象，是《浮士德》第四幕战争中的核心魔法主题。梅非斯特利用各种假像欺骗敌军：包括水精制造的水波影子（假水）、雾带显现的幻影、闪电之光的妖异现象等。假像意味着魔鬼的欺骗本质，与梅非斯特"永在否定的精灵"的身份相契合，体现了现象与本质的哲学对立。
  书中原文: 妇女的法术，看不出来，她们能把影子和实体分开，人人都以为那就是实体。...我对这种假水毫无所见，只有凡人的肉眼受它欺骗。
  网络来源: https://guxuo.com/wgwx/zpj/gede/fsd/154.htm
