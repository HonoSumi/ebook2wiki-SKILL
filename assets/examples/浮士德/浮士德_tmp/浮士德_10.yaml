- 名词: 所罗门锁钥
  分类: 物件
  解释: |
    指《所罗门之匙》（Key of Solomon），西方神秘学传统中最重要的魔法书之一，传说由以色列国王所罗门所著，实为中世纪术士假托其名撰写。书中记载了召唤与操纵恶魔精灵的方法、仪式道具制作、护身符绘制等内容，是欧洲仪式魔法的重要根源。
  书中原文: |
    《所罗门锁钥》会把你吓退。
  网络来源: |
    https://baike.baidu.com/item/%E6%89%80%E7%BD%97%E9%97%A8%E4%B9%8B%E5%8C%99/908421

- 名词: 因库布斯
  分类: 概念
  解释: |
    Incubus的音译，中文常译为"梦魔"或"男魅魔"，是西方民间传说中的男性形态恶魔。传说它在女性睡眠时降临，与之发生性关系，源自拉丁语 incubare（压在……上面），与医学上的"梦魇"现象相关。与之对应的女性形态恶魔称为Succubus（魅魔）。
  书中原文: |
    因库布斯！因库布斯！快出来把残局收拾。
  网络来源: |
    https://baike.baidu.com/item/incubus/747428

- 名词: 蝇主
  分类: 人物
  解释: |
    即别西卜（Beelzebub），原为非利士人的神祇，在犹太教和基督教传统中被视为鬼王。其名在希伯来语中意为"苍蝇之主"，新约圣经中将其称为鬼王。在基督教恶魔学中地位仅次于路西法，常对应七宗罪中的暴食。
  书中原文: |
    只要听人叫你们蝇主、破坏者、说谎精。
  网络来源: |
    https://baike.baidu.com/item/%E5%88%AB%E8%A5%BF%E5%8D%9C/7268

- 名词: 混沌
  分类: 概念
  解释: |
    源自希腊神话中的原始神卡俄斯（Chaos），赫西俄德《神谱》中将其描述为宇宙最初的虚空或裂隙，是一切存在诞生的起点。后经罗马诗人奥维德改造，演变为"无序混乱的物质"这一现代常见含义。
  书中原文: |
    混沌所生的古怪的儿子。
  网络来源: |
    https://baike.baidu.com/item/%E5%8D%A1%E4%BF%84%E6%96%AF/10724560

- 名词: 五角星
  分类: 物件
  解释: |
    又称五芒星，人类历史上最古老的符号之一，自美索不达米亚文明起已有五千年历史。古希腊毕达哥拉斯学派视为健康与知识的象征；中世纪神秘学中作为驱魔护符，可封印恶魔；倒置五角星则被黑魔法和撒旦教用作邪恶象征。歌德笔下浮士德用五角星困住梅非斯特。
  书中原文: |
    五角星使你很不自在？
  网络来源: |
    https://baike.baidu.com/item/%E4%BA%94%E8%A7%92%E6%98%9F/7724631

- 名词: 光明的岛上
  分类: 地点
  解释: |
    指希腊神话中的至福乐土（Elysium）或神佑群屿（Fortunate Isles / Isles of the Blessed），位于大地西端尽头大洋河畔的福地。英雄和受神眷顾者死后在此享受永生幸福，四季如春，不需劳作。这一概念后与现实中的加那利群岛、马德拉群岛等大西洋岛屿相联系。
  书中原文: |
    飞往那一片光明的岛上。
  网络来源: |
    https://baike.baidu.com/item/%E8%87%B3%E7%A6%8F%E4%B9%90%E5%9C%9F/10724560
