- 名词: 伊索寓言
  分类: 概念
  解释: 源自古希腊的一系列寓言故事集，相传由伊索（Aesop）创作，是世界上影响最大的寓言集。以动物为主角，通过拟人化手法讲述故事，每则故事末尾多附有劝谕性总结。代表作包括《龟兔赛跑》《农夫和蛇》《狐狸和葡萄》等。
  书中原文: 猫替猴子火中取栗，见《伊索寓言》。
  网络来源: https://baike.baidu.com/item/%E4%BC%8A%E7%B4%A2%E5%AF%93%E8%A8%80/16894482

- 名词: 神谕的没落
  分类: 概念
  解释: 普鲁塔克（Plutarch）的哲学对话录，拉丁文标题为《De Defectu Oraculorum》。探讨古希腊神谕（尤其是德尔斐神谕）为何逐渐衰微，提出人口减少、精灵中介说、自然呼气说等多种解释。文中包含著名的"大神潘死了"的故事。
  书中原文: 普鲁塔克《神谕的没落》中有一段记载："宇宙有183个世界，作三角形配列……"
  网络来源: http://penelope.uchicago.edu/Thayer/E/Roman/Texts/Plutarch/Moralia/De_defectu_oraculorum%2A.html

- 名词: 柏拉图理念世界
  分类: 概念
  解释: 柏拉图哲学中的核心概念，认为在可感知的现象世界之外，存在一个永恒、不变、完美的理念世界。现实世界是理念世界的投影或摹本。理念是客观存在的超验实体，如"美本身""正义本身"。这一理论开创了西方形而上学传统。
  书中原文: 歌德在这里描写的母亲之国也就是柏拉图的理念世界。柏拉图认为理念的世界是真实存在的世界，理念是永恒的、绝对的、不变的、可以不依赖时间和空间而存在。
  网络来源: https://zh.wikipedia.org/zh-hk/%E8%A7%80%E5%BF%B5%E8%AB%96

- 名词: 顺势疗法
  分类: 概念
  解释: 又称类似疗法或同类疗法，由德国医生萨穆埃尔·哈涅曼（Samuel Hahnemann）于18世纪末创立的一种替代医学体系。核心原则为"以同治同"（能引起某种症状的物质也能治愈该症状）和"无穷小定律"（反复稀释后疗效反而增强）。科学界普遍认为其疗效不优于安慰剂，属于伪科学。
  书中原文: 讽刺1810年问世的类似疗法（或译顺势疗法）。萨穆埃尔·哈涅曼（1755—1843）发明。原来的治疗方案是应用药物，此处所讲的以脚医脚，乃是恶魔故意歪曲。
  网络来源: https://baike.baidu.com/item/%E9%A1%BA%E5%8A%BF%E7%96%97%E6%B3%95

- 名词: 萨穆埃尔·哈涅曼
  分类: 人物
  解释: Samuel Hahnemann，德国医生（1755—1843），顺势疗法的创始人。他对当时盛行的放血、泻药等疗法极为反感，通过让健康人服用金鸡纳树皮的自身实验提出"以同治同"的理念，并于1790年正式确立顺势疗法理论体系。
  书中原文: 萨穆埃尔·哈涅曼（1755—1843）发明。原来的治疗方案是应用药物，此处所讲的以脚医脚，乃是恶魔故意歪曲。
  网络来源: https://baike.baidu.com/item/%E9%A1%BA%E5%8A%BF%E7%96%97%E6%B3%95

- 名词: 哥特式建筑
  分类: 概念
  解释: 兴盛于欧洲中世纪高峰与末期（约12—16世纪）的建筑风格，由罗曼式建筑发展而来。主要特点包括尖肋拱顶、飞扶壁、花窗玻璃、束柱和十字平面。第一座哥特式教堂为1143年建成的巴黎圣丹尼教堂，代表作有巴黎圣母院、科隆大教堂等。
  书中原文: 建筑师是哥特式建筑的支持者。歌德年轻时，看到斯特拉斯堡的大教堂，对哥特式建筑颇为赞美，后来却鄙为野蛮，专门崇拜古代样式。至晚年始对哥特式建筑获得再认识。
  网络来源: https://baike.baidu.com/item/%E5%93%A5%E7%89%B9%E5%BC%8F%E5%BB%BA%E7%AD%91/400790

- 名词: 忒修斯
  分类: 人物
  解释: 希腊神话中的雅典国王与英雄，父亲为雅典国王埃勾斯（一说海神波塞冬）。主要事迹包括：在前往雅典途中完成六次除害、进入米诺斯迷宫斩杀牛首人身怪物米诺陶洛斯、统一阿提卡地区建立泛雅典节。因忘记将黑帆换成白帆导致父亲投海而死，爱琴海因此得名。
  书中原文: 神话上说：海伦在十岁时就被忒修斯拐往阿提卡。南国妇女大多早熟。
  网络来源: https://baike.baidu.com/item/%E5%BF%92%E4%BF%AE%E6%96%AF/3398352

- 名词: 伊利昂纪
  分类: 概念
  解释: 又称《伊利亚特》，古希腊盲诗人荷马所作的长篇史诗，共15693行，分为24卷。叙述特洛伊战争第十年中51天内发生的故事，核心主题是"阿喀琉斯的愤怒"。与《奥德赛》合称《荷马史诗》，是西方文学最重要的源头之一。
  书中原文: 荷马《伊利昂纪》第三歌，特洛亚的老将、老臣们坐在西门城楼上，看到海伦走近时，称赞她"看上去简直就像是一位不死的女神"。
  网络来源: https://baike.baidu.com/item/%E4%BC%8A%E5%88%A9%E4%BA%9A%E7%89%B9/66177

- 名词: 万神庙
  分类: 地点
  解释: 又称万神殿、潘提翁，位于意大利罗马，是古罗马建筑技术的巅峰之作。初建于公元前27年，公元118—125年由哈德良皇帝重建。穹顶直径和高度均为43.3米，为世界上最大的无钢筋混凝土穹顶。顶部有直径8.9米的圆形开口"穹顶之眼"作为唯一自然采光源。米开朗基罗赞其为"天使的设计"。
  书中原文: 歌德想到雅典、罗马的万神庙等古代建筑。
  网络来源: https://baike.baidu.com/item/%E4%B8%87%E7%A5%9E%E5%BA%99/12109

- 名词: 吕西波斯
  分类: 人物
  解释: Lysippus，古希腊古典晚期著名雕刻家（约前395—前305年），与普拉克西特列斯和斯科帕斯并称为古希腊最杰出的三大雕刻家。创立了头与身体比例为1:8的人体美新标准，曾任亚历山大大帝的宫廷雕刻家。代表作包括《刮汗污的运动员》《法尔内塞的赫拉克勒斯》等，原作均已失传。
  书中原文: 讽刺当时许多人对古代雕塑的理想美人的批评。他们对希腊雕刻家吕西波斯的人体，对佛罗伦萨乌菲齐美术馆中收藏的梅迪奇家的维纳斯都认为头部太小。
  网络来源: https://baike.baidu.com/item/%E5%88%A9%E8%A5%BF%E6%99%AE%E6%96%AF

- 名词: 梅迪奇的维纳斯
  分类: 物件
  解释: 一尊公元前1世纪希腊化时期的大理石雕塑，高约1.53米，现藏于意大利佛罗伦萨乌菲兹美术馆。表现女神维纳斯以"羞怯的维纳斯"经典姿态站立——右手护胸、左手遮挡下身。原为金发红唇并佩戴耳环，是西方古典艺术中最具影响力的雕塑之一。
  书中原文: 他们对希腊雕刻家吕西波斯的人体，对佛罗伦萨乌菲齐美术馆中收藏的梅迪奇家的维纳斯都认为头部太小。
  网络来源: https://zh.wikipedia.org/zh-tw/%E7%BE%8E%E7%AC%AC%E5%A5%87%E7%B6%AD%E7%B4%8D%E6%96%AF

- 名词: 圣彼得
  分类: 人物
  解释: 原名西门，耶稣十二使徒之首，基督教早期重要领袖。耶稣为他改名彼得（意为"磐石"），天主教认为他是首任教宗。曾三次不认主，事后痛哭悔改。耶稣升天后成为初期教会领导人，后在罗马被倒钉十字架殉道。著作有《彼得前书》《彼得后书》。
  书中原文: 他独霸讲坛，光芒盖世，像圣彼得掌管着钥匙，打开上界下界的知识之窗。
  网络来源: https://baike.baidu.com/item/%E5%9C%A3%E4%BC%AF%E5%A4%9A%E7%A6%84/9894527

- 名词: 尼科得穆斯
  分类: 人物
  解释: Nicodemus，又译尼哥底母，圣经·新约中的人物，法利赛人，犹太公会议员。曾在夜间秘密拜访耶稣求问重生之道（约翰福音3章），后在公会中为耶稣辩护，耶稣受难后与亚利马太人约瑟一同安葬耶稣，带来约33公斤没药和沉香。代表寻求真理的知识分子形象。
  书中原文: 过来，朋友！——你叫尼科得穆斯。
  网络来源: https://baike.baidu.com/item/%E5%B0%BC%E5%93%A5%E5%BA%95%E6%AF%8D

- 名词: 俄瑞穆斯
  分类: 概念
  解释: 拉丁语"Oremus"的音译，意为"让我们祈祷"。拉丁语动词ōrō（祈祷）的虚拟式第一人称复数形式。在罗马天主教弥撒中常用于集祷经、奉献礼、天主经及领圣体后经之前，邀请会众祈祷。
  书中原文: 是的，尊敬的先生——俄瑞穆斯。
  网络来源: https://en.wikipedia.org/wiki/Let_us_pray

- 名词: 三脚香炉
  分类: 物件
  解释: 古希腊宗教仪式中的重要器物，尤其用于德尔斐阿波罗神庙。女祭司（皮媞亚）坐在安放在地裂缝隙上的三脚架上，吸入从地底升起的乙烯气体，进入通灵状态传达神谕。在希腊神话中自古即作为预言之力的象征。本书中作为母亲们的神力的象征。
  书中原文: 即三脚香炉，在这里作为母亲们的神力的象征，母亲崇拜的象征。在希腊神话中，自古即作为预言之力的象征。
  网络来源: https://www.worldhistory.org/Pythia/

- 名词: 恩狄弥翁
  分类: 人物
  解释: Endymion，希腊神话中的美男子与牧羊人（一说厄利斯国王）。月神塞勒涅（路娜）每夜到他沉睡的拉特摩斯山亲吻他。宙斯命他在死亡与永恒沉睡之间选择，他选择了后者。英国诗人济慈创作了著名长诗《恩狄弥翁》，开篇名句"美的事物是永恒的喜悦"即出自此诗。
  书中原文: 希腊神话中美貌的牧童。宙斯使他永远入睡，永葆青春。月神路娜每夜到拉特摩斯山吻他，这是美术上常见的题材。
  网络来源: https://baike.baidu.com/item/%E6%81%A9%E5%BA%95%E5%BC%A5%E7%BF%81/6382957

- 名词: 路娜
  分类: 人物
  解释: Luna，古罗马神话中的月亮女神，拉丁语中"Luna"即为月亮。对应希腊神话中的塞勒涅（Selene）。罗马的阿文提诺山上建有她的神庙。英语中lunar（月亮的）、lunatic（疯狂的）等词汇源自其名。经典传说：与凡间美少年恩狄弥翁相爱，每晚到他沉睡的山洞亲吻他。
  书中原文: 月神路娜每夜到拉特摩斯山吻他，这是美术上常见的题材。
  网络来源: https://baike.baidu.com/item/%E9%9C%B2%E5%A8%9C/4770

- 名词: 阿特拉斯
  分类: 人物
  解释: Atlas，希腊神话中的泰坦神族之一，擎天神。泰坦之战败于奥林匹斯神族后，被宙斯惩罚在世界最西端用双肩擎起天空。大西洋（Atlantic Ocean）意为"阿特拉斯之海"，地图集（atlas）以其命名。人体第一节颈椎（寰椎）也因其"托起"头部而得名。
  书中原文: 希腊神话中把天擎在肩上的巨人。
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E7%89%B9%E6%8B%89%E6%96%AF
