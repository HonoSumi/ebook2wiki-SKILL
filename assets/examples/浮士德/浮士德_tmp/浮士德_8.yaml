- 名词: 基督
  分类: 人物
  解释: |
    基督教的核心人物，亦称耶稣基督。基督教认为他是上帝的儿子、人类的救世主，在公元1世纪于巴勒斯坦地区传道，后被钉十字架，第三日复活。他是基督教信仰的根基，对西方文化、艺术、哲学产生了深远影响。在歌德《浮士德》中，基督的复活成为城门外民众庆祝的节日背景。
  书中原文: |
    基督"为此他作了新约的中保"。《哥林多前书》第11章第25节
  网络来源: |
    https://zh.wikipedia.org/zh-sg/Special:MyLanguage/%E5%9F%BA%E7%9D%A3

- 名词: 新约
  分类: 概念
  解释: |
    基督教《圣经》的后半部分，共27卷，包括四福音书、使徒行传、保罗书信、普通书信和启示录。内容记载耶稣基督的生平、死亡与复活，以及早期教会的发展。新约与旧约共同构成基督教的完整圣经。新约一词意指上帝通过耶稣基督与人类订立的新盟约。
  书中原文: |
    基督"为此他作了新约的中保"。《哥林多前书》第11章第25节
  网络来源: |
    https://baike.baidu.com/item/%E6%96%B0%E7%BA%A6%E5%9C%97%E7%BB%8F/7659897

- 名词: 哥林多前书
  分类: 概念
  解释: |
    《新约圣经》中的一卷书，相传为使徒保罗在公元53-57年间写给希腊哥林多城教会的一封信。全书共16章，内容涉及教会纷争、道德问题、复活真理等。第11章论及圣餐礼，第15章系统论述基督复活的神学意义，是基督教神学的重要文献。
  书中原文: |
    《哥林多前书》第11章第25节
  网络来源: |
    https://baike.baidu.com/item/%E6%96%B0%E7%BA%A6%E5%9C%A3%E7%BB%8F/7659897

- 名词: 马太福音
  分类: 概念
  解释: |
    《新约圣经》的第一卷书，以耶稣十二门徒之一的马太名义写成。全书共28章，详细记载了耶稣基督的家谱、降生、传道、受难与复活。第27章着重描写耶稣被钉十字架及受难的经过，包括抹大拉的马利亚等妇女在场观看的情节。其特色是强调耶稣应验了旧约先知的预言。
  书中原文: |
    《马太福音》第27章
  网络来源: |
    https://baike.baidu.com/item/%E6%96%B0%E7%BA%A6%E5%9C%A3%E7%BB%8F/7659897

- 名词: 抹大拉的马利亚
  分类: 人物
  解释: |
    圣经新约中的重要女性人物，来自加利利地区的抹大拉镇。耶稣曾从她身上赶出七个鬼，此后她成为耶稣忠实的追随者，用自己的财物资助耶稣传道。她在耶稣被钉十字架时守候在旁，并在复活清晨成为第一个见证耶稣空坟墓和复活的人，被早期教会称为"使徒中的使徒"。
  书中原文: |
    内中有抹大拉的马利亚，又有雅各和约西的母亲马利亚，并有西庇太两个儿子的母亲。
  网络来源: |
    https://baike.baidu.com/item/%E6%8A%B9%E5%A4%A7%E6%8B%89%E7%9A%84%E9%A9%AC%E5%88%A9%E4%BA%9A/6212621

- 名词: 西庇太
  分类: 人物
  解释: |
    圣经新约中的人物，加利利的渔夫，是耶稣十二门徒中雅各和约翰的父亲，妻子是撒罗米。他的家庭与耶稣有亲属关系，船上有雇工，说明渔业生意具有一定规模。当耶稣召唤雅各和约翰时，二人立即舍船跟随了耶稣。西庇太的名字在四福音书中多次作为雅各和约翰的父亲被提及。
  书中原文: |
    并有西庇太两个儿子的母亲
  网络来源: |
    https://baike.baidu.com/item/%E8%A5%BF%E5%BA%87%E5%A4%AA/13856218

- 名词: 瓦格纳
  分类: 人物
  解释: |
    歌德诗剧《浮士德》中的人物，浮士德的助手和学生。他是一位埋头书斋、笃信书本知识的典型学究，与浮士德形成了鲜明对比：浮士德渴望挣脱知识束缚、投身现实生活，而瓦格纳满足于在故纸堆中寻求学问。在第二部中，瓦格纳在实验室制造人造人，反映了对现代科学伦理的思考。
  书中原文: |
    （浮士德和瓦格纳。）
  网络来源: |
    https://baike.baidu.com/item/%E6%B5%AE%E5%A3%AB%E5%BE%B7/20106511

- 名词: 圣安得烈节前夕
  分类: 习俗
  解释: |
    指每年11月29日晚（圣安得烈节11月30日的前夕），在德语区被称为Andreasnacht。这是一个具有特殊魔法意义的夜晚，民间传说中年轻女性在这一夜举行各种仪式以预见未来丈夫的模样。常见占卜方式包括熔铅占卜、午夜摆设双人餐桌、抛木鞋等。这一习俗融合了天主教圣徒崇拜与古老的日耳曼民间魔法传统。
  书中原文: |
    虽然她曾在圣安得烈节前夕，让我目睹到未来的情人
  网络来源: |
    https://folktale.info/germanic-folktales/st-andrews-night/

- 名词: 基督的复活
  分类: 事件
  解释: |
    基督教信仰的核心事件，指耶稣基督在被钉十字架并埋葬后，于第三日从死里复活。四福音书均记载了复活清晨空坟墓的发现和耶稣向门徒显现的事迹。基督的复活被使徒保罗称为福音中"第一要紧的"，是基督教救恩论的基础。复活节是基督教最重要的节日，象征生命战胜死亡。
  书中原文: |
    他们要庆祝基督的复活
  网络来源: |
    https://www.tgccn.org/essay/bodily-resurrection-jesus

- 名词: 土耳其
  分类: 地点
  解释: |
    地跨亚欧两洲的国家，主要领土位于小亚细亚半岛。在《浮士德》创作的16至19世纪，奥斯曼土耳其帝国是欧洲的重要政治和军事力量，多次与欧洲各国发生战争。歌德在此处借市民之口提及土耳其的战争，反映了当时欧洲社会对奥斯曼帝国扩张的普遍关注。
  书中原文: |
    在遥远的土耳其那边，数国国民在大动刀兵
  网络来源: |
    https://baike.baidu.com/item/%E5%9C%9F%E8%80%B3%E5%85%B6/121784

- 名词: 菩提树
  分类: 物件
  解释: |
    德国民间文化中的核心象征之一，实际指椴树科的心叶椴。在德语中被误译为"菩提树"。椴树在德国文化中象征正义与法律（日耳曼人的露天法庭常在椴树下举行）、爱情与婚姻（心形叶片）、和平与家园，是村庄广场的村民聚会中心。著名的柏林"菩提树下大街"即以椴树命名。在歌德笔下，农民们聚在菩提树下跳舞唱歌，展现了典型的德国乡村生活场景。
  书中原文: |
    大家聚在菩提树旁
  网络来源: |
    https://www.naturpark-moor.eu/zh-TW/poi/wtm006-unter-linden

- 名词: 九柱戏
  分类: 习俗
  解释: |
    德国传统滚球游戏，德语称Kegelspiel或Kegeln，是现代保龄球的前身。起源于公元3至4世纪的德国，最初是天主教教堂内的宗教仪式，教徒用石头滚地击柱以象征赎罪消灾。14世纪演变为民间体育运动。游戏中竖立9根柱子（而非现代保龄球的10根），玩家以圆球滚击。至今在德国仍有正式赛事和文化传承。
  书中原文: |
    打九柱戏、拉琴、长啸
  网络来源: |
    https://www.cctv.com/recreation/20040114/101428.shtml
