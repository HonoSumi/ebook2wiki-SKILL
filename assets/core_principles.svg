  <text x="675" y="331" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#7C3AED">2</text>
  <text x="705" y="320" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">串行处理，质量优先</text>
  <text x="705" y="342" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#94A3B8">"慢就是快"，不急不躁，一个接一个</text>

  <path fill="#1E293B" stroke="#06B6D4" stroke-opacity="0.3" stroke-width="1" d="M150,380 H590 A10,10 0 0 1 600,390 V440 A10,10 0 0 1 590,450 H150 A10,10 0 0 1 140,440 V390 A10,10 0 0 1 150,380 Z" />
  <circle cx="175" cy="415" r="16" fill="#06B6D4" fill-opacity="0.2" />
  <text x="175" y="421" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#06B6D4">3</text>
  <text x="205" y="410" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">知识型条目优先</text>
  <text x="205" y="432" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#94A3B8">读者需要查资料的才提取</text>

  <path fill="#1E293B" stroke="#10B981" stroke-opacity="0.3" stroke-width="1" d="M650,380 H1130 A10,10 0 0 1 1140,390 V440 A10,10 0 0 1 1130,450 H650 A10,10 0 0 1 640,440 V390 A10,10 0 0 1 650,380 Z" />
  <circle cx="675" cy="415" r="16" fill="#10B981" fill-opacity="0.2" />
  <text x="675" y="421" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#10B981">4</text>
  <text x="705" y="410" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">互联网辅助，不做纯虚构</text>
  <text x="705" y="432" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#94A3B8">每个知识点结合书中原文和网络资料</text>

