  <text x="640" y="250" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF">核心原则</text>

  
  <path fill="#1E293B" stroke="#2563EB" stroke-opacity="0.3" stroke-width="1" d="M150,290 H590 A10,10 0 0 1 600,300 V350 A10,10 0 0 1 590,360 H150 A10,10 0 0 1 140,350 V300 A10,10 0 0 1 150,290 Z" />
  <circle cx="175" cy="325" r="16" fill="#2563EB" fill-opacity="0.2" />
  <text x="175" y="331" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#2563EB">1</text>
  <text x="205" y="320" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">禁止直接读取整本电子书</text>
  <text x="205" y="342" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#94A3B8">分块是硬性要求，避免上下文溢出</text>

  <path fill="#1E293B" stroke="#7C3AED" stroke-opacity="0.3" stroke-width="1" d="M650,290 H1130 A10,10 0 0 1 1140,300 V350 A10,10 0 0 1 1130,360 H650 A10,10 0 0 1 640,350 V300 A10,10 0 0 1 650,290 Z" />
