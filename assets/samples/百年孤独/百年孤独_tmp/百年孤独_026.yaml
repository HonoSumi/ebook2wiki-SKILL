- 名词: 圣灰星期三
  解释: |
    圣灰星期三（又称大斋首日、Ash Wednesday）是基督教教会年历中大斋期（四旬期）的起始日，位于复活节前第46天（不计主日则为第40天）。当日教会举行涂灰礼，用前一年棕枝主日祝圣过的棕枝烧成的灰，在信徒额头上画十字，作为悔改与生命短暂的象征，同时宣告"你本是尘土，仍要归于尘土"。大斋期共四十天，信徒通过斋戒、祈祷、善行预备心灵迎接复活节。
  书中原文: |
    到了圣灰星期三，在众人四散回到沿海各地之前，阿玛兰妲让他们穿上主日正装，陪他们去了教堂。他们更多是感到有趣而非出于虔诚，被领到祭坛围栏前，由安东尼奥·伊莎贝尔神甫用圣灰在前额上画上十字。
  网络来源: |
    https://baike.baidu.com/item/大斋首日
    https://baike.baidu.com/item/圣灰礼仪日

- 名词: 斗鸡
  解释: |
    斗鸡是一种传统血腥竞技活动，将两只雄鸡放入围栏中互相搏斗至一方死亡或重伤。由西班牙殖民者于16世纪传入拉丁美洲，在哥伦比亚、秘鲁、古巴、多米尼加、墨西哥等国广泛流行，常伴随赌博投注。尽管因虐待动物饱受争议，斗鸡在多个拉美国家仍被视为文化遗产和民间传统，部分地区甚至将其列为非物质文化遗产加以保护。
  书中原文: |
    连冷漠的何塞·阿尔卡蒂奥第二也为他们准备了一场斗鸡，但险些以悲剧结束，因为好几个奥雷里亚诺都是此中老手，一眼就看穿了安东尼奥·伊莎贝尔神甫传授的花招。
  网络来源: |
    https://www.chinanews.com/tp/news/photo_special/2012/06-26/26394.shtml
    https://news.sina.com.cn/w/2008-04-29/143215451287.shtml

- 名词: 手摇风琴
  解释: |
    手摇风琴（Barrel Organ / Organillo）是一种机械管乐器，由木箱内的风箱和音管构成，演奏者通过摇动曲柄驱动装有金属钉的木质滚筒来依次触发音符发声。流行于18至19世纪欧洲街头，常由街头艺人携带演奏，在拉丁美洲也曾是重要的民间音乐传播工具。与靠弦摩擦发声的绞弦琴（Hurdy-Gurdy）不是同一乐器。
  书中原文: |
    那些法国卖笑女郎带来唱机取代了过时的手摇风琴，令乐队的收入一度受到严重影响。
  网络来源: |
    https://baike.baidu.com/item/手摇风琴
    https://dictionary.cambridge.org/dictionary/english-portuguese/barrel-organ

- 名词: 留声机（手摇唱机）
  解释: |
    留声机（Gramophone / Phonograph）是早期声音记录和回放设备。1877年爱迪生发明蜡筒留声机（Phonograph），使用蜡制圆筒记录声音；1887年埃米尔·贝利纳发明盘式留声机（Gramophone），使用平盘唱片。早期留声机为纯机械手摇驱动，需手动摇动曲柄使唱盘旋转，唱针读取唱片刻槽发声。后发展为电动留声机（电唱机），奠定了现代黑胶唱片技术的基础。
  书中原文: |
    手摇唱机也遭遇了类似的命运。那些法国卖笑女郎带来唱机取代了过时的手摇风琴，令乐队的收入一度受到严重影响。
  网络来源: |
    https://www.zdic.net/hant/留聲機
    https://ethw.org/Gramophone

- 名词: 黄色火车
  解释: |
    《百年孤独》中黄色火车的文学意象源自真实历史：1899年成立的美国联合果品公司（United Fruit Company）在拉丁美洲修建铁路、控制种植园，形成"国中之国"。小说影射的1928年香蕉大屠杀中，哥伦比亚香蕉工人罢工遭政府军扫射，尸体被装上火车运走。黄色火车因此成为帝国主义经济侵略与历史创伤的象征，承载着现代化、剥削、暴力与遗忘的多重意涵。
  书中原文: |
    这列无辜的黄色火车注定要为马孔多带来无数疑窦与明证，无数甜蜜与不幸，无数变化、灾难与怀念。
  网络来源: |
    https://book.douban.com/review/12201466/
    https://www.douban.com/group/topic/179393488/

- 名词: 白镴
  解释: |
    白镴（Pewter，又称锡镴）是一种以锡为主要成分的传统合金，传统配方为锡与铅的合金，现代配方改用锡加锑、铜、铋等金属，不含铅，更加安全。其熔点较低（约170-300℃），质地柔软，呈银白色光泽，延展性好。中国传统"打镴"工艺历史悠久，用于制作酒壶、烛台、香炉、茶叶罐等器物，具有"盛水水清甜，贮酒酒香醇，储茶味不变，插花花长久"的美誉。
  书中原文: |
    费尔南达只得赶在自己仅存的昂贵餐具损失殆尽之前为他买来一套白镴餐具，但这些耐用的金属盘碟也很快釉彩剥落、扭曲变形。
  网络来源: |
    https://zh.m.wikipedia.org/zh-mo/白鑞
    https://baike.baidu.com/item/pewter/53069572

- 名词: 活动人影戏（早期电影）
  解释: |
    活动人影戏指19世纪末至20世纪初的早期电影放映技术。1895年卢米埃兄弟在巴黎首次公开放映电影后，世界各地观众初次接触电影时普遍经历过"震惊体验"——将银幕影像误认为真实情景。电影理论家汤姆·甘宁将此现象概括为"吸引力电影"（Cinema of Attractions），认为早期电影以视觉奇观和直接刺激为主，而非依靠叙事。文中马孔多观众因银幕上"死而复生"而愤怒砸椅的情节，正是这一历史现象的文学写照。
  书中原文: |
    生意兴隆的堂布鲁诺·克雷斯皮在他那狮头状售票窗的剧院里放映的活动人影戏，引发了市民的愤慨，因为他们刚刚为一个人物不幸死亡并被下葬而抛洒伤心之泪，转眼间那人又变成阿拉伯人，生龙活虎地出现在下一部影片里。
  网络来源: |
    https://mall.cnki.net/magazine/article/DYYS201206023.htm
    https://www.uchiyama-shoten.co.jp/smp/book/b355758.html

- 名词: 狂欢节
  解释: |
    狂欢节（Carnival，又称嘉年华）是拉丁美洲最重要的传统节日之一，通常在基督教四旬斋（大斋期）前举行，原与斋戒前的纵情狂欢传统有关。融合了欧洲天主教传统、非洲音乐舞蹈与原住民文化元素，表现形式包括华丽花车游行、特色音乐舞蹈（如巴西桑巴）、角色扮演等。巴西里约热内卢嘉年华、玻利维亚奥鲁罗狂欢节（联合国非物质文化遗产）、哥伦比亚黑白狂欢节（联合国非物质文化遗产）等均享有世界声誉。
  书中原文: |
    奥雷里亚诺第二没有放过款待堂兄弟们的机会，他打开香槟，拉起手风琴，大肆庆祝，算是补回了因纪念特典而未能尽兴的狂欢节。
  网络来源: |
    https://baike.baidu.com/item/奥鲁罗狂欢节
    https://www.ihchina.cn/project_details/11779

- 名词: 浮石
  解释: |
    浮石（Pumice，又称火山浮岩、搓脚石）是一种多孔、质轻的火山喷出岩，由岩浆快速冷却时气体逸出形成无数孔隙。因其独特的天然磨蚀特性，自古以来被广泛用作清洁与去角质工具——古罗马时期已用于皮肤护理和牙齿抛光。传统上湿润的浮石可用于去除脚部死皮和老茧；浮石粉末也被用作抛光剂和天然去角质剂，工业中还用浮石进行牛仔布石洗处理。
  书中原文: |
    他们试过清水与肥皂，试过泥土和瓜瓤，最后用上了浮石和碱液，仍然无法除去那痕迹。
  网络来源: |
    https://baike.baidu.com/item/浮石/63176
    https://baike.baidu.com/item/搓脚石/944916
