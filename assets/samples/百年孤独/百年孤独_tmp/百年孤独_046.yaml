- 名词: 圣奥古斯丁
  解释: |
    圣奥古斯丁（Aurelius Augustinus，354-430），古罗马帝国时期基督教思想家，
    欧洲中世纪基督教神学、教父哲学的重要代表人物。生于北非塔加斯特（今阿尔及利亚境内），
    早年信奉摩尼教，后皈依基督教，任希波主教。代表作《忏悔录》《上帝之城》。
    书中提及他在法袍内穿羊毛坎肩十四年不脱的轶事，源于中世纪关于他清苦修道的传说。
  书中原文: |
    他还知道一些本不该知道的隐秘，譬如圣奥古斯丁在法袍内穿了件紧身羊毛坎肩十四年不曾离身
  网络来源: |
    https://baike.baidu.com/item/奥古斯丁/81851
    https://zh.wikipedia.org/wiki/希波的奥古斯丁

- 名词: 阿尔纳多·德·比拉诺瓦
  解释: |
    阿尔纳多·德·比拉诺瓦（Arnaldus de Villa Nova，约1235-1313），
    13世纪著名的医生、炼金术士、占星家和宗教改革者。曾任阿拉贡国王御医，
    因预言世界末日被巴黎大学谴责为异端，著有《医学镜鉴》等。
    他是中世纪最早使用酒精作为消毒剂的医生。书中提及他幼年被蝎子蜇咬后不举的轶事。
  书中原文: |
    巫师阿尔纳多·德·比拉诺瓦幼年被蝎子蜇咬便从此不举
  网络来源: |
    https://en.wikipedia.org/wiki/Arnaldus_de_Villa_Nova
    https://www.catholic.com/encyclopedia/Arnaldus-Villanovanus

- 名词: 贺拉斯
  解释: |
    贺拉斯（Quintus Horatius Flaccus，前65-前8），古罗马著名诗人、批评家，
    与维吉尔、奥维德并称古罗马三大诗人。代表作《诗艺》《颂诗集》等，
    提出了"寓教于乐"和"黄金中道"等经典文艺理论命题，
    对文艺复兴和新古典主义影响深远。书中加泰罗尼亚智者让"贺拉斯见鬼去"，
    表达了对古典教条的戏谑态度。
  书中原文: |
    甚至劝说他们全都离开马孔多，忘掉他传授的一切世道人心知识，让贺拉斯见鬼去
  网络来源: |
    https://baike.baidu.com/item/贺拉斯/1544148
    https://zh.wikipedia.org/wiki/贺拉斯

- 名词: 塞内加
  解释: |
    塞内加（Lucius Annaeus Seneca，约前4-65），古罗马斯多葛学派哲学家、
    政治家、悲剧作家。曾任尼禄皇帝的老师兼顾问，后被赐自尽。
    代表作《道德书简》《论生命之短暂》《论愤怒》等，其伦理思想对
    基督教神学和后世哲学影响深远。书中加泰罗尼亚智者带孩子们读塞内加作品，
    体现了他传授古典人文教育的背景。
  书中原文: |
    他在他们还在上小学时就用书籍跟他们交换陀螺和风筝，又带他们读塞内加和奥维德
  网络来源: |
    https://baike.baidu.com/item/塞涅卡
    https://zh.wikipedia.org/wiki/塞內卡

- 名词: 奥维德
  解释: |
    奥维德（Publius Ovidius Naso，前43-17），古罗马诗人，与维吉尔、贺拉斯
    并称古罗马三大诗人。代表作《变形记》收录约250个神话传说，被誉为
    "古希腊罗马神话的百科全书"。另著有《爱的艺术》，因被认为有伤风化
    被奥古斯都流放至黑海之滨。书中加泰罗尼亚智者带孩子们阅读奥维德，
    体现了古典人文教育的内容。
  书中原文: |
    他在他们还在上小学时就用书籍跟他们交换陀螺和风筝，又带他们读塞内加和奥维德
  网络来源: |
    https://zh.wikipedia.org/wiki/奥维德
    https://baike.baidu.com/item/奥维德

- 名词: 拉伯雷
  解释: |
    弗朗索瓦·拉伯雷（Francois Rabelais，约1494-1553），文艺复兴时期
    法国最重要的人文主义作家之一，与但丁、莎士比亚、塞万提斯并称
    欧洲文学史上的文化巨人。代表作《巨人传》（又名《卡冈都亚和庞大固埃》），
    以夸张幽默的笔触反封建反教会，倡导"做你所愿做的事"的人文主义理想。
    书中加布列尔带着一套拉伯雷全集去巴黎，暗示其文学志向与拉伯雷精神的传承。
  书中原文: |
    带着两套换洗衣服、一双鞋和一套拉伯雷全集要去巴黎的时候
  网络来源: |
    https://baike.baidu.com/item/弗朗索瓦·拉伯雷
    https://zh.wikipedia.org/wiki/弗朗索瓦·拉伯雷

- 名词: 伦敦教务会议
  解释: |
    伦敦教务会议（Council of London，亦称威斯敏斯特宗教会议），指中古时期
    在英国伦敦（威斯敏斯特）召开的一系列天主教教务会议。其中1102年的会议由
    坎特伯雷大主教安瑟伦主持，颁布了若干教规（canon），涉及禁止圣职买卖、
    禁止神职人员结婚、反对鸡奸等内容。"第二十七条"的具体内容已难以考证，
    书中加泰罗尼亚智者以"去他的伦敦教务会议第二十七条"表达对宗教教条束缚的蔑视。
  书中原文: |
    "见鬼，"他恶狠狠地说道，"去他的伦敦教务会议第二十七条！"
  网络来源: |
    https://en.wikipedia.org/wiki/Council_of_London_(1102)
    https://en.wikisource.org/wiki/1911_Encyclop%C3%A6dia_Britannica/Westminster,_Synods_of

- 名词: 土耳其人大街
  解释: |
    土耳其人大街（Calle de los Turcos）是《百年孤独》中马孔多镇的一条重要街道，
    也是当地阿拉伯裔商人的聚居区。在拉丁美洲，"土耳其人"（turco）在历史上
    被用作对来自奥斯曼帝国移民的统称，这些人实际多为阿拉伯人（叙利亚人、
    黎巴嫩人等）。土耳其人大街是马孔多的商业中心，见证了小镇的兴衰变迁。
  书中原文: |
    昔日的土耳其人大街已沦为被遗忘的角落，最后一批阿拉伯人沿袭千年传统端坐在门口等待死亡的到来
  网络来源: |
    https://book.douban.com/subject/27107109/blockquotes
    （搜索"百年孤独 土耳其人大街"可获取更多背景信息）

- 名词: 卡塔赫纳方言
  解释: |
    卡塔赫纳方言（Espanol Costeno / 加勒比海岸西班牙语）是哥伦比亚卡塔赫纳
    及加勒比海岸地区使用的西班牙语方言变体。其特点是词尾辅音弱化、
    语速较快、受安达卢西亚方言和非洲语言影响显著。书中加泰罗尼亚智者
    操着卡塔赫纳方言对列车员恶言相向，体现了他流亡多年后融入当地语言文化。
  书中原文: |
    甚至操着卡塔赫纳方言对建议托运的列车员恶言相向
  网络来源: |
    https://blogs.transparent.com/spanish/the-sweet-sounds-of-caribbean-spanish/
    https://benjweinberg.com/2016/01/30/costenol/

- 名词: 缬草
  解释: |
    缬草（Valeriana officinalis），败酱科缬草属多年生草本植物，以其根和
    根茎入药，是中国传统镇静安神药材。性味辛、苦、温，归心、肝经，
    主治心神不安、心悸失眠、癫狂等症。在欧洲也被广泛用作膳食补充剂
    改善睡眠。书中描写药房中弥漫着瓷瓶和缬草的气息，营造出沉静安详的氛围。
  书中原文: |
    在瓷瓶和缬草气息的环绕间，加布列尔沉静的女友梅尔塞德斯所住的地方
  网络来源: |
    https://baike.baidu.com/item/缬草
    https://www.msdmanuals.cn/home/special-subjects/dietary-supplements-and-vitamins/valerian
