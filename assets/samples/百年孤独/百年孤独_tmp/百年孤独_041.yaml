- 名词: 方济各会
  解释: |
    天主教托钵修会之一，1209年由意大利阿西西的圣方济各创立，因会士着灰色会服，亦称"灰衣修士"。该会提倡过清贫生活，互称"小兄弟"，效忠教宗，重视学术研究和文化教育事业。13世纪即已来华传教，是最早进入中国的天主教修会之一。与多明我会并称中世纪四大托钵修会。
  书中原文: |
    方济各会(也译称为方济会，或译称为法兰西斯会)(德文Franziskaner，英文Franciscan，意大利文Ordine Francescano)是天主教托钵修会派别之一。其会士著灰色会服，故亦称"灰衣修士"。
  网络来源: |
    https://baike.baidu.com/item/方济各会/1182363
    https://zh.wikipedia.org/wiki/方济各会

- 名词: 三色堇
  解释: |
    堇菜科堇菜属草本植物，又名蝴蝶花、鬼脸花、猫脸花，因每朵花通常有紫、白、黄三色而得名。原产欧洲，是冰岛和波兰的国花。花语为"思念""思慕"，在西方常被视作表达爱意的花卉。在欧洲人看来，其花朵像一张思考的脸，故得英文名"pansy"（源自法语pensée，意为"思考"）。
  书中原文: |
    她穿着粉色的丝裙，左肩搭扣上别着一束小小的假三色堇
  网络来源: |
    https://baike.baidu.com/item/三色堇
