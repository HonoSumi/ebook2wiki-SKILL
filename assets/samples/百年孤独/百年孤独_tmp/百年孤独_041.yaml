    https://baike.baidu.com/item/诸世纪
    https://zh.wikipedia.org/wiki/诸世纪

- 名词: 点金术
  解释: |
    炼金术（Alchemy）的一部分，特指通过方术将铁、铅等普通金属转化为黄金或白银的技法，在中国道教语境中也称"黄白术"。炼金术是中世纪的一种化学哲学思想，是当代化学的雏形，起源于战国时期的中国金丹术，后传至阿拉伯和欧洲。其核心目标包括制造"贤者之石"（哲人石）和长生不老药。牛顿等著名科学家也曾痴迷于炼金术研究。
  书中原文: |
    鬼魔学的笔记，点金术的密钥
  网络来源: |
    https://baike.baidu.com/item/点金/929106
    https://baike.baidu.com/item/炼金术

- 名词: 鬼魔学
  解释: |
    又称魔鬼学（Demonology），是对魔鬼、邪灵及相关信仰进行系统研究的学科，是神学的一个传统分支。研究对象是一切超人的且非神的存在，广义上还包括不被或很少被人崇拜的灵体。"Demon"一词在荷马时代原指善意的灵体，但经过犹太教与基督教的发展，在现代西方语言中与邪恶联系起来。在西方神秘学传统中，它与点金术、占星术等常并列为一门隐秘知识。
  书中原文: |
    鬼魔学的笔记，点金术的密钥
  网络来源: |
    https://zh.wikipedia.org/wiki/魔鬼学
