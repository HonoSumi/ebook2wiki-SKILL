- 名词: 诺查丹玛斯
  解释: |
    16世纪法国犹太裔医生兼占星家（1503—1566），原名米歇尔·德·诺特雷达姆（Michel de Nostredame），以出版晦涩的四行体预言诗集《百诗集》（常误译作《诸世纪》）闻名于世。他曾是著名的瘟疫医生，后受法王亨利二世王后凯瑟琳·德·美第奇赏识。其预言语言模糊，可被后世附会到各种历史事件上，虽备受学术争议，但在流行文化中影响极大。
  书中原文: |
    诺査丹玛斯的《诸世纪》及其疫病研究
  网络来源: |
    https://baike.baidu.com/item/诺查丹玛斯/1242595
    https://zh.wikipedia.org/wiki/诺查丹玛斯

- 名词: 《诸世纪》
  解释: |
    法国预言家诺查丹玛斯所著的预言诗集，原名法语"Les Propheties"（意为"预言集"），中文常误译作《诸世纪》，亦有译作《百诗集》。第一版于1555年出版，原计划分12卷（即"世纪"），每卷100首四行诗，现存约942首。语言极为晦涩模糊，被认为是后世附会各种历史事件的依据。学界多将其视为文艺复兴时期的文学作品，而非真正的预言。
  书中原文: |
    诺査丹玛斯的《诸世纪》及其疫病研究
