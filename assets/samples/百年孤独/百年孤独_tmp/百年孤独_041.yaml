- 名词: 梵文
  解释: |
    梵语（Sanskrit，संस्कृतम्）是印欧语系最古老的语言之一，也是印度雅利安语的古代形式。汉传佛教称其为梵天所造，故名"梵文"。公元前约400年经大文法家波你尼系统规范后定型，字面意思为"完全整理好的"。梵语长期作为印度官方语言和文学用语，佛教和印度教的大量经典均以其写成。现存梵语文献数量仅次于汉语，远超希腊语和拉丁语。季羡林先生曾指出其作为语言学活化石的重要地位。
  书中原文: |
    "梵文。"他答道。因为羊皮卷须历时百年才可破译，在那之前奥雷里亚诺还有多年时间学习梵文。
  网络来源: |
    https://baike.baidu.com/item/梵语/1332676
    https://baike.baidu.com/item/梵文

- 名词: 瘫子赫尔曼
  解释: |
    赫尔曼（Hermannus Contractus，1013—1054），又称"赖兴瑙的赫尔曼"（Hermann of Reichenau），11世纪德国本笃会修士、编年史家、音乐家、数学家和天文学家。自幼患瘫痪性疾病，终身无法行走，故拉丁文名"Contractus"意为"残疾的"。尽管身体残疾，他凭借坚强意志成为当时最博学的学者之一，著有从基督诞生至1054年的世界编年史《编年史》（Chronicon），并创作了《Alma Redemptoris Mater》《Salve Regina》等著名拉丁圣歌。
  书中原文: |
    瘫子赫尔曼的研究大要
  网络来源: |
    https://www.britannica.com/biography/Hermann-von-Reichenau
    https://en.wikipedia.org/wiki/Hermann_of_Reichenau

- 名词: 《解放了的耶路撒冷》
  解释: |
    又译《被解放的耶路撒冷》《耶路撒冷的解放》，意大利文艺复兴晚期诗人托尔夸托·塔索（Torquato Tasso，1544—1595）的代表作。这是一部以第一次十字军东征（1096—1099年）为背景的叙事史诗，共分二十歌，讲述布永的戈弗雷统帅十字军攻占耶路撒冷的故事。诗中交织着战争、魔法、爱情与信仰的冲突，闪耀着人文主义的光辉，被誉为"意大利文艺复兴最后的艺术绝唱"。
  书中原文: |
    放在《解放了的耶路撒冷》和《弥尔顿诗集》之间的那本书买回来。
  网络来源: |
    https://baike.baidu.com/item/被解放的耶路撒冷/5680260
    https://baike.baidu.com/item/耶路撒冷的解放/57797200

- 名词: 托尔夸托·塔索
  解释: |
    意大利文艺复兴晚期著名诗人（1544—1595），生于那不勒斯索伦托。1565年起在费拉拉担任宫廷诗人，创作了代表作《耶路撒冷的解放》（又名《被解放的耶路撒冷》）。后因精神疾病被囚禁在圣安娜疯人院长达7年。其作品在17—19世纪欧洲被广泛阅读，对欧洲文学产生深远影响。歌德、拜伦、李斯特等均曾以塔索为题材进行创作。被誉为文艺复兴晚期与反宗教改革时期最具代表性的意大利诗人之一。
  书中原文: |
    《耶路撒冷的解放》 [意大利]托尔夸托·塔索所作，全书分成二十章，每章一百来节左右。
  网络来源: |
    https://baike.baidu.com/item/托尔夸托·塔索
    https://zh.wikipedia.org/wiki/托尔夸托·塔索

- 名词: 约翰·弥尔顿
  解释: |
    英国诗人、政论家、思想家（1608—1674），被公认为英国文学史上最伟大的诗人之一，与乔叟、莎士比亚齐名。代表作包括史诗《失乐园》《复乐园》和诗剧《力士参孙》以及政论文《论出版自由》。《失乐园》取材于《圣经·创世纪》，与荷马《荷马史诗》、但丁《神曲》并称西方三大诗歌。弥尔顿曾投身英国革命，任克伦威尔政府拉丁文秘书，因过度劳累双目失明。其自由主义思想深刻影响了后来的美国独立战争和法国大革命。
  书中原文: |
    《弥尔顿诗集》 / 约翰·弥尔顿（英语：John Milton，1608年12月9日－1674年11月8日），英国诗人，思想家。英格蘭共和国时期曾出任公务员。因其史诗《失乐园》和反对书报审查制的《论出版自由》而闻名于后世。
  网络来源: |
    https://baike.baidu.com/item/约翰·弥尔顿
    https://zh.wikipedia.org/wiki/约翰·弥尔顿

- 名词: 加泰罗尼亚
  解释: |
    位于伊比利亚半岛东北部的西班牙自治区，下辖巴塞罗那省、莱里达省、赫罗纳省和塔拉戈纳省，首府巴塞罗那。历史上曾为阿拉贡王国的核心地区，拥有独特的加泰罗尼亚语和深厚的文化传统，是西班牙最富裕、工业化程度最高的地区。以高迪建筑、毕加索博物馆、叠人塔传统和独立运动闻名于世。
  书中原文: |
    一位加泰罗尼亚智者开了家书店 / 加泰罗尼亚（加泰罗尼亚语：Catalunya；西班牙语：Cataluña）位于伊比利亚半岛东北部，是西班牙17个自治区之一……
  网络来源: |
    https://baike.baidu.com/item/加泰罗尼亚
    https://zh.wikipedia.org/wiki/加泰罗尼亚

- 名词: 里奥阿查
  解释: |
    哥伦比亚北部加勒比海沿岸城市，瓜希拉省首府，位于兰切里亚河入海口。1535年由德国裔征服者尼古拉斯·费德曼建立，殖民时期因大量珍珠资源成为重要港口城市。该地区主要居住着瓦尤（Wayuu）原住民。里奥阿查在加西亚·马尔克斯的多部作品中多次出现，包括《百年孤独》《霍乱时期的爱情》和《一桩事先张扬的凶杀案》，是其文学世界的重要地理坐标之一。
  书中原文: |
    要去投奔里奥阿查的一个表妹
  网络来源: |
    https://zh.wikipedia.org/wiki/里奥阿查
    https://baike.baidu.com/item/里奥阿查

- 名词: 加拉巴木果壳杯
  解释: |
    以加拉巴木（学名Crescentia cujete，又称葫芦树）的果实外壳制成的容器。加拉巴木是热带美洲原生树种，果实为大型圆葫芦状硬壳果，晒干后质地坚硬，被拉丁美洲原住民广泛用于制作碗、杯、瓢等容器以及乐器（如巴西的berimbau）。在西班牙语中，此类容器常被称为"jícara"或"guacal"。在《百年孤独》中，奥雷里亚诺·布恩迪亚上校的剃须膏便盛放在这种传统容器中。
  书中原文: |
    盛在加拉巴木果壳杯里的剃须膏
  网络来源: |
    https://baike.baidu.com/item/葫芦树
    https://en.wikipedia.org/wiki/Calabash

- 名词: 香蕉公司
  解释: |
    在《百年孤独》的语境中指联合果品公司（United Fruit Company），1899年成立的美国跨国农业企业，拥有"香蕉帝国"之称，鼎盛时期占据全球香蕉贸易的20%，控制美国市场80%的份额。该公司在拉丁美洲多国（洪都拉斯、危地马拉、哥伦比亚、哥斯达黎加等）经济上占据绝对主导地位，操纵当地政治，被称为"章鱼"和"绿色魔鬼"。1954年参与中情局策划的危地马拉政变。马尔克斯在《百年孤独》中借香蕉公司影射联合果品公司在哥伦比亚的历史，成为小说中殖民主义和帝国主义批判的核心符号。
  书中原文: |
    香蕉公司时期算命解梦的地方 / 特别是在香蕉公司时期，家里更像一座热闹的军营
  网络来源: |
    https://baike.baidu.com/item/联合果品公司
    https://zh.wikipedia.org/wiki/联合果品公司

- 名词: 十字军东征
  解释: |
    中世纪天主教以收复圣地耶路撒冷为号召发动的一系列军事远征活动（1096—1291年），因参战者衣服上缝有十字标记而得名。一般认为共有八次大规模东征。第一次十字军东征（1096—1099年）由教皇乌尔班二世在克莱蒙会议上发起，十字军于1099年攻占耶路撒冷，建立了耶路撒冷王国等四个十字军国家。第四次十字军东征（1204年）则攻陷了君士坦丁堡。该系列战争深刻影响了东西方文明之间的关系。
  书中原文: |
    全诗以十一世纪第一次十字军东征的历史事件为背景
  网络来源: |
    https://baike.baidu.com/item/十字军/18872
    https://zh.wikipedia.org/wiki/十字军东征
