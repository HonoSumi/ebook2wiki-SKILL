- 名词: 尼兰迪亚停战协定
  解释: |
    1902年10月24日在哥伦比亚加勒比沿岸埃尔兰迪亚庄园签署的停火协定，标志着千日战争（1899—1902）的基本结束。千日战争是哥伦比亚保守党与自由党之间长达三年的血腥内战，造成约十万人死亡。该协定仅为停战协议，未达成实质性政治和解。在《百年孤独》中，这一历史事件象征着奥雷里亚诺·布恩迪亚上校所领导革命的失败与虚无——战争结束后，他曾并肩作战的部下沦为被遗忘的老兵，在贫困和等待中老去。
  书中原文: |
    自从尼兰迪亚停战协定签订以来，奥雷里亚诺·布恩迪亚上校寄身于打造小金鱼的作坊，他却与直到战败仍忠心耿耿的部下保持着联系。
  网络来源: |
    https://baike.baidu.com/item/千日战争
    https://m.hujiang.com/es/p739204/

- 名词: 自由派与保守派（弥撒时间的政治讽刺）
  解释: |
    哥伦比亚两大传统政党的政治斗争是《百年孤独》的历史核心背景。自由派主张地方自治、政教分离；保守派主张中央集权、政教联合。小说中奥雷里亚诺·布恩迪亚上校晚年说出的这句话——"如今自由派和保守派的唯一区别就是，自由派去做五点的弥撒，而保守派去做八点的"——是全书最著名的政治讽刺之一，意指经过数十年血腥内战，两党之间的意识形态分歧已彻底消失，曾经你死我活的斗争沦为荒诞的形式主义差别。自由派本应反教权，如今却也去做弥撒，进一步强化了这种荒诞感。
  书中原文: |
    如今自由派和保守派的唯一区别就是，自由派去做五点的弥撒，而保守派去做八点的。
  网络来源: |
    https://book.douban.com/annotation/117981152/
    https://www.jssyzzx.cn/view-37883.html

- 名词: 猪尾巴（百年孤独中的乱伦象征）
  解释: |
    《百年孤独》中最核心的隐喻意象之一。布恩迪亚家族因近亲结婚受到诅咒，会生出长着猪尾巴的后代。这一意象首次出现在家族第一代近亲结婚的警告中；最终在小说末尾，第六代奥雷里亚诺与姑妈阿玛兰妲·乌尔苏拉乱伦，生下的女婴果然带着猪尾巴，随后被蚂蚁吞噬，家族也随之彻底毁灭。猪尾巴象征着乱伦禁忌被打破的罪恶之果、家族封闭循环的宿命，以及拉丁美洲因封闭落后而注定走向毁灭的历史隐喻。在本书文本中，乌尔苏拉回忆当年腹中的奥雷里亚诺·布恩迪亚上校发出哭声，她误以为那是猪尾巴的征兆。
  书中原文: |
    她浑身颤抖，确信这深沉的哭号正是那可怕的猪尾巴的最初征兆，恳求上帝让他死在腹中。
  网络来源: |
    https://baike.baidu.com/tashuo/browse/content?id=5822a6d1a57e533c135acfd1
    https://www.douban.com/group/topic/38412517/

- 名词: 卡斯蒂利亚语
  解释: |
    即西班牙语。卡斯蒂利亚语（Castellano）是西班牙语的标准名称之一，起源于西班牙北部卡斯蒂利亚地区。1492年，内布里哈出版了第一部《卡斯蒂利亚语语法》，使之成为最早规范化的欧洲现代语言。在拉丁美洲，"卡斯蒂利亚语"这一称呼比"西班牙语"更受部分国家青睐，因为它强调语言发源于卡斯蒂利亚而非整个西班牙，带有去殖民化的政治含义。在《百年孤独》中，这个词出现在布恩迪亚家族早期历史的回顾中，暗示马孔多早期与印第安原住民的语言接触与西班牙殖民同化过程。
  书中原文: |
    在阿玛兰妲和阿尔卡蒂奥忘掉印第安人的语言学会卡斯蒂利亚语之前家里又发生了多少事。
  网络来源: |
    https://baike.baidu.com/item/卡斯蒂利亚/131693
    https://baike.baidu.com/item/西班牙语/398390

- 名词: 土耳其商人丈量花布
  解释: |
    《百年孤独》中乌尔苏拉晚年的一句经典内心独白——"上帝还没让岁月缩水如同土耳其商人丈量花布时偷减尺寸"。在拉丁美洲民间语境中，"土耳其商人"（常泛指来自中东的移民商贩）以在卖布时暗中缩短尺寸欺骗顾客而闻名。乌尔苏拉用这一市井欺诈行为来比喻时间流逝的加速感：她感到上帝像一个偷奸耍滑的商人，暗中克扣了时间的长度，使得日子越过越快。这一比喻生动传达了她年老后对时光飞逝的困惑，拒绝承认自己的衰老，转而归咎于时代本身"偷工减料"，也是小说"时间加速崩坏"主题的缩影。
  书中原文: |
    她想起以前，上帝还没让岁月缩水如同土耳其商人丈量花布时偷减尺寸，那时候不像现在这样。
  网络来源: |
    https://book.douban.com/review/5569474/
    https://book.douban.com/subject/6082808/blockquotes?sort=...&start=3100

- 名词: 天使长圣拉斐尔
  解释: |
    天主教七位总领天使之一（与米迦勒、加百列并列），名字意为"神治愈了"。在圣经次经《多俾亚传》（Tobit）中，他乔装成青年阿匝黎雅，帮助多俾亚一路远行、驱除恶魔、并用鱼胆医治了父亲托彼特的眼睛，因此被视为旅行者和病人的守护者。在天主教传统中，他是药剂师、盲人、病人、旅行者和青年的主保圣人。其象征物包括鱼、手杖和药瓶。瞻礼日为9月29日（与米迦勒、加百列同一天）。在《百年孤独》中，乌尔苏拉利用圣像画教失明的自己分辨颜色，让孙子何塞·阿尔卡蒂奥描述天使长圣拉斐尔衣服的颜色。
  书中原文: |
    她对他说，告诉我天使长圣拉斐尔穿的衣服是什么颜色。
  网络来源: |
    https://baike.baidu.com/item/拉斐尔/8816905
    https://zh.wikipedia.org/wiki/拉斐尔_(天使)

- 名词: 圣约瑟石膏雕像
  解释: |
    圣约瑟（天主教称大圣若瑟）是圣母玛利亚的丈夫、耶稣的养父，在天主教中被尊为普世教会的主保、劳工主保和家庭主保。其雕像在拉丁美洲天主教家庭中十分常见，石膏（灰泥）材质因其廉价易塑，契合圣约瑟作为贫穷木匠的平民形象。在《百年孤独》的情节中，内战末期有三个人将一尊真人大小的圣约瑟石膏雕像寄存在布恩迪亚家，说等雨季过后来取，却再未出现。多年后雕像意外摔碎，里面竟藏有将近两百公斤的金币。这尊雕像成为小说中财富诅咒与家族命运的象征，也反映了拉丁美洲天主教文化中宗教圣物与世俗财富之间的奇妙交织。
  书中原文: |
    她四处碍事却又想事事插手，连外乡人也厌烦了她不停的询问，问他们在战争时期可曾寄存一尊圣约瑟石膏雕像，等过了雨季再取走。
  网络来源: |
    https://zh.wikipedia.org/wiki/聖若瑟
    https://baijiahao.baidu.com/s?id=1734670632061424822
