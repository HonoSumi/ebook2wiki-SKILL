- 名词: 古钢琴
  解释: |
    古钢琴是现代钢琴的前身，主要分为击弦古钢琴（Clavichord）和拨弦古钢琴（Harpsichord/羽管键琴）两大类。击弦古钢琴以金属楔槌击弦发声，音量纤细恬淡；拨弦古钢琴以禽类羽毛管拨弦发声，音色明亮清晰但无法控制强弱。古钢琴在巴洛克时期（1600-1750）达到鼎盛，是J.S.巴赫、D.斯卡拉蒂等作曲家的核心乐器。《百年孤独》中，古钢琴是费尔南达强加给女儿梅梅的旧贵族教育工具，象征着布恩迪亚家族与时代脱节的孤独。梅梅通过古钢琴换取母亲的信任和有限的自由，而意大利技师皮埃特罗·克雷斯皮的琴声则象征纯粹而不属于现世的爱情。
  书中原文: |
    到别人午休的时候，她练上两个小时古钢琴，知道每日作出这样一点儿牺牲能使费尔南达心情平静。
  网络来源: |
    https://baike.baidu.com/item/古钢琴/4625921
    https://zh.wikipedia.org/zh-cn/拨弦古钢琴

- 名词: 河狸油
  解释: |
    河狸油即中药"海狸香"，是河狸科动物（欧亚河狸及加拿大河狸）香囊的分泌物，与中国传统药材中的麝香、龙涎香、灵猫香并称动物药材"四大香"。在传统医药中，河狸油具有通窍活络、镇惊止痛、清热解毒的功效，常用于治疗肢体瘫痪、手足抽搐、小儿惊风等症。在《百年孤独》中，费尔南达给醉酒呕吐的梅梅服下河狸油，并将其作为当时民间家庭常见的一种传统药物使用，反映了拉丁美洲民间医药中沿用欧洲传统草药的历史现实。
  书中原文: |
    她给梅梅服下一小瓶河狸油，往腹部敷上药泥，在额头放上冰袋，还强追她遵照新来的古怪法国医生的要求，五天内节制饮食并足不出户。
  网络来源: |
    https://baike.baidu.com/item/海狸香/6673949
    https://m.dayi.org.cn/cmedical/1155857

- 名词: 法国女郎
  解释: |
    "法国女郎"在《百年孤独》中并非指某个具体人物，而是作为一类象征性的集体形象出现，指的是19世纪末至20世纪初随铁路、香蕉公司和外来者涌入拉丁美洲的法国妓女/交际花。在拉丁美洲历史中，法国交际花（French courtesans）被视为最受欢迎、报酬最高的性工作者，形成了一个跨越法国与美洲之间的性工作移民网络。在小说中，"法国女郎"象征着西方文明对马孔多的侵入：她们伴随现代化事物一同到来，代表着外来文化既令人向往又充满堕落的两面性，是马孔多从淳朴小镇走向腐败毁灭的重要转折标志之一。
  书中原文: |
    如同传言中法国女郎们所做的那样，也如同十二岁和十四岁的她看见皮埃特罗·克雷斯皮穿着紧身舞蹈长裤随着节拍器的拍子舞动魔杖时想要对他做的那样。
  网络来源: |
    https://wapbaike.baidu.com/tashuo/browse/content?id=cf1d6ae7ddb10bd971d36d56
    https://book.douban.com/subject/1768590/

- 名词: 通灵术
  解释: |
    通灵术（Spiritism，又称唯灵论、卡德克主义）是19世纪由法国教育家亚兰·卡甸（Allan Kardec，原名伊波利特·里瓦伊）系统化的哲学宗教体系。其核心教义包括灵魂永恒不灭、通过多次转世轮回不断进化、活人可通过灵媒与亡灵沟通。该学说在19世纪下半叶迅速传入拉丁美洲，尤其在巴西获得极大发展。巴西的唯灵论更强调灵性治疗（cura espiritual），衍生出灵媒外科手术等独特现象——自称被死者医生灵魂附身的灵媒使用普通刀具为病人实施手术。《百年孤独》中费尔南达与"隐身的医生"通信、对方运用通灵术为她诊断治疗，正是这一拉美文化现象在文学中的直接映射。
  书中原文: |
    他们诊断出她的大肠里有个良性肿瘤，正准备运用通灵术实施治疗。
  网络来源: |
    https://bkso.baidu.com/item/亚兰·卡甸/3568362
    https://wrldrels.org/2022/04/03/kardecism/

- 名词: 手风琴
  解释: |
    手风琴是哥伦比亚最具代表性的传统音乐类型——瓦莱纳托（Vallenato）的灵魂乐器。瓦莱纳托于2015年被联合国教科文列入人类非物质文化遗产代表作名录，融合了哥伦比亚北部本土文化、非洲奴隶颂歌与西班牙诗歌元素。19世纪中叶，德国商船将手风琴带入哥伦比亚瓜希拉地区，德国霍纳牌全音阶手风琴因音高匹配而成为主流。加西亚·马尔克斯本人是瓦莱纳托音乐的狂热爱好者，自称《百年孤独》是一部"400页的瓦莱纳托歌曲"。在小说中，奥雷里亚诺第二拉手风琴宴饮作乐的形象，正是哥伦比亚瓦莱纳托文化的文学化体现。
  书中原文: |
    再次拿出自己的手风琴，那琴上已经有些按键松动要用鞋带系住，但他仍不放过宴饮作乐的机会。
  网络来源: |
    https://www.bbc.com/ukchina/simp/vert-tra-43129987
    https://twh.boch.gov.tw/taiwan_non_material/intro.aspx?id=368&lang=zh_tw

- 名词: 弗吉尼亚火腿配菠萝片
  解释: |
    弗吉尼亚火腿（Virginia Ham/Smithfield Ham）是美国南部传统的干腌烟熏火腿，已有300多年制作历史，以肉质紧实、咸香浓郁著称。配菠萝片烤制是美国南部节日的经典做法，常见于感恩节、圣诞节、复活节等家庭聚餐：在火腿上用牙签固定菠萝片和樱桃，刷上红糖菠萝釉汁烤制而成。在《百年孤独》中，梅梅在美国人布朗先生家学会吃这道菜，象征着香蕉公司美国文化对马孔多年轻一代生活方式的影响与渗透，是20世纪初美国在拉丁美洲经济文化扩张的细节写照。
  书中原文: |
    还学会了打网球和吃弗吉尼亚火腿配菠萝片。
  网络来源: |
    https://www.edwardsvaham.com/recipes/grilled-ham-with-pineapple
    https://www.thespruceeats.com/baked-ham-with-pineapple-3051040
