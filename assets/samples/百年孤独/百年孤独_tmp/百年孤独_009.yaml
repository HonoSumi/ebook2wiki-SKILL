    https://baike.baidu.com/item/西班牙语
    https://zh.wikipedia.org/zh-hans/欧陆西班牙语

- 名词: 教皇通谕
  解释: |
    教皇通谕（Papal Encyclical）是天主教教宗写给全球天主教徒的正式牧函，源自拉丁文"encyclicus"，意为"普遍的"。通谕是教宗行使普通训导权的重要工具，内容涉及教义、伦理道德、社会问题等。通常以开头的两个拉丁字为正式名称，如教宗良十三世1891年发布的《新事通谕》（Rerum Novarum）被视为现代教会社会思想的奠基文件。通谕虽然在理论上并非"不能错误的"信理定断，但在天主教内具有高度权威，信徒应以敬重之心接受其教导。
  书中原文: |
    多年以后，面对行刑队，阿尔卡蒂奥将回想起梅尔基亚德斯为他朗读那一页页不可理解的文字时的颤抖，他自然是听不懂，但那铿锵的音调听起来仿佛教皇通谕的吟唱。
  网络来源: |
    https://baike.baidu.com/item/通谕
    https://zh.wikipedia.org/wiki/通谕

- 名词: 亚历山大·冯·洪堡
  解释: |
    亚历山大·冯·洪堡（Alexander von Humboldt，1769—1859），德国博物学家、自然地理学家，近代气候学、植物地理学、地球物理学的创始人之一，被誉为"现代地理学之父"。1799年至1804年历时五年考察南美洲，足迹遍及委内瑞拉、哥伦比亚、厄瓜多尔、秘鲁、墨西哥等地，记录超过6000种植物。他首创等温线概念，发现并命名秘鲁寒流（洪堡寒流），提出自然统一性思想，深刻影响了达尔文等后世科学家。其晚年巨著《宇宙》五卷本被誉为描述地球自然的百科全书。以他命名的物种、地点遍布全球。
  书中原文: |
    还有一个名字"亚历山大·冯·洪堡"。
  网络来源: |
    https://baike.baidu.com/item/亚历山大·冯·洪堡
    https://zh.wikipedia.org/wiki/亚历山大·冯·洪堡

- 名词: 自动钢琴
  解释: |
    自动钢琴（Player piano / Pianola）是一种能够自动演奏的钢琴，起源于19世纪末的欧洲。其核心原理是利用打孔的纸带（纸卷）控制气动机械装置驱动琴键发声。1897年美国工程师埃德温·沃蒂发明了名为"Pianola"的气动式自动钢琴并获得专利。20世纪初期极为盛行，1920年代达到顶峰，成为欧美家庭的重要娱乐设备。自动钢琴的出现使普通人无需学琴即可在家中欣赏钢琴音乐，甚至多位著名音乐家如拉赫玛尼诺夫、德彪西等曾为其录制过纸卷。后因留声机和无线电的兴起而衰落。
  书中原文: |
    乌尔苏拉眼含愤怒的泪水，诅咒自己动念购买自动钢琴的那个时刻，并取消了刺绣课程，下令进入没有死人的丧期，直到女儿们死心断念为止。
  网络来源: |
    https://baike.baidu.com/item/自动钢琴
    https://zh.wikipedia.org/zh-cn/自动演奏钢琴

- 名词: 土耳其人大街
  解释: |
    土耳其人大街（Calle de los Turcos）是《百年孤独》中马孔多镇上的商业街，也是加西亚·马尔克斯作品中反复出现的标志性地点。历史上的拉丁美洲城镇中确实常有被称为"Calle de los Turcos"的街区，这里的"土耳其人"实指19世纪末至20世纪初从奥斯曼帝国（今叙利亚、黎巴嫩等地）移民到拉丁美洲的阿拉伯商贩。他们被当地居民笼统地称为"turcos"（土耳其人），因为这些移民持有奥斯曼土耳其帝国的护照。这些阿拉伯移民以走街串巷叫卖小商品起家，后开设固定店铺，逐渐成为拉丁美洲商业网络中的重要组成部分。
  书中原文: |
    他开办了一家乐器和发条玩具店，就在当年阿拉伯人常常流连并用廉价的小玩意儿交换金刚鹦鹉的地方，也就是人们口中的土耳其人大街。
  网络来源: |
    https://www.douyin.com/video/7516418333287779599
    https://book.douban.com/subject/27107109/blockquotes

- 名词: 西班牙纸牌
  解释: |
    西班牙纸牌（Baraja espa&ntilde;ola）是西班牙和拉丁美洲传统使用的纸牌体系，其历史可追溯至14世纪。与通用国际扑克不同，西班牙纸牌的四种花色为：金杯（Copas，对应红心）、金元（Oros，对应方块）、宝剑（Espadas，对应黑桃）和棒棒/棍棒（Bastos，对应梅花）。每副通常40张（数字1至7加上三张人头牌：王Rey、骑士Caballo、武士Sota），也有48张版本。在《百年孤独》中，庇拉尔·特尔内拉使用西班牙纸牌为丽贝卡占卜未来，书中所提"金杯国王"（Rey de Copas）和"金元仆侍"（Sota de Oros）正是这套纸牌体系中的人头牌。
  书中原文: |
    她记起一位秃顶的先生，他身着亚麻衣裳，领口别着一粒金扣，但与金杯国王毫无相似之处。她记起一位非常年轻美貌的女士，双手温和芬芳，与金元仆侍那双似乎患了风湿病的手相去甚远。
  网络来源: |
    https://baike.baidu.com/item/西班牙扑克
    https://zh.wikipedia.org/wiki/西班牙牌

- 名词: 二分点
  解释: |
    二分点（Equinox）是天文学概念，指天球赤道与黄道的两个交点。太阳每年从南向北穿过天赤道的时刻为春分点（约3月21日），另一相对的交点为秋分点（约9月23日）。在春分和秋分时刻，太阳直射赤道，全球各地昼夜等长（各约12小时），故又称"昼夜平分点"。英文"equinox"源自拉丁文"aequi nox"（夜晚相等）。二分点与二至点（夏至点、冬至点）合称为"分至点"，是天文历法和季节划分的重要基准。
  书中原文: |
    实际上，他滔滔不绝说出的艰深话语中唯一能够辨别出来的，只是像锤击般不断重复的一个词"二分点二分点二分点"。
  网络来源: |
    https://baike.baidu.com/item/分至点
    https://zh.wikipedia.org/wiki/二分点

- 名词: 格兰德大妈
  解释: |
    格兰德大妈（Mam&aacute; Grande）出自加西亚·马尔克斯1962年出版的短篇小说集《格兰德大妈的葬礼》。格兰德大妈是马孔多镇上的女族长，统治整个地区长达两个世纪，她的去世与盛大葬礼成为当地标志性事件。在《百年孤独》中，作者以互文手法提及"一个世纪后格兰德大妈的葬礼或可与之媲美"，将两部作品放在同一个"马孔多宇宙"中。格兰德大妈这一形象常被解读为对拉丁美洲传统寡头统治和殖民势力的讽刺与隐喻，属于马尔克斯魔幻现实主义文学世界的重要组成部分。
  书中原文: |
    这是镇上第一次也是参与人数最多的葬礼，一个世纪后格兰德大妈的葬礼或可与之媲美。
