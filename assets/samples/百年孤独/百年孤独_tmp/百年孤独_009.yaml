- 名词: 炼金术
  解释: |
    炼金术（Alchemy）是中世纪的一种化学哲学思想及原始科学形态，被认为是现代化学的前身。其核心目标是将贱金属（如铅、铜）转化为贵金属（黄金），并寻求制造贤者之石和长生不老药。炼金术起源于希腊化时代的埃及，在阿拉伯世界得到系统发展，12世纪后传入欧洲。在《百年孤独》中，炼金术贯穿布恩迪亚家族的命运：何塞·阿尔卡蒂奥·布恩迪亚沉迷于炼金实验，试图通过倍金配方将财富翻倍，最终却将乌尔苏拉的金币熬成一坨油渣；奥雷里亚诺上校后来又在炼金室里反复制作小金鱼又熔掉，形成孤独而循环的宿命。炼金术在此成为人类对终极真理的渴求、文明幻灭以及循环时间的多重象征。
  书中原文: |
    他重新燃起遗忘多时的炼金炉，放上一锅水银煮沸，一旁的尸体渐渐充满蓝色的泡沫。
  网络来源: |
    https://baike.baidu.com/item/炼金术
    https://zh.wikipedia.org/wiki/炼金术
