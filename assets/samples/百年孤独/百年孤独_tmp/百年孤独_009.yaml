- 名词: 油椰
  解释: |
    油椰（Oil palm，学名 Elaeis guineensis），又称油棕、非洲油棕，属棕榈科油棕属，原产于热带西非。其果实含油量极高，单位面积产油量居所有油料作物之首，被誉为"世界油王"。油椰果实榨取的棕榈油广泛用于食用油、人造奶油、肥皂、化妆品和生物燃料等领域。在中国常被称为"油棕"而非"油椰"，书中译为"油椰"保留了原文的地域特色。油椰肥皂即以棕榈油为原料制成的传统肥皂，在拉丁美洲民间长期使用。
