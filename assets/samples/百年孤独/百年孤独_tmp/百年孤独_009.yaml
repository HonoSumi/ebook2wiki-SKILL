- 名词: 岩羚皮
  解释: |
    岩羚皮（Chamois leather）指以岩羚羊（学名 Rupicapra rupicapra，产于欧洲和西亚山区的羚羊）的皮经过油鞣工艺制成的柔软皮革。岩羚皮质地柔软、吸水性极强、表面呈细腻绒面效果，历史上主要用于制作高端靴鞋、擦拭精密仪器（如镜片、光学设备）以及汽车抛光布。由于动物保护限制，现代岩羚皮已改用绵羊、山羊等兽皮以油鞣工艺制作，但保留了"chamois leather"的名称。在19世纪至20世纪初，岩羚皮靴属于讲究身份的正装鞋履。
  书中原文: |
    何塞·阿尔卡蒂奥·布恩迪亚身着舞会那晚才穿过一次的深色呢料正装，系上赛璐珞硬领，套上岩羚皮靴，去蕾梅黛丝·摩斯科特家提亲。
