- 名词: 银版照相术
  解释: |
    银版照相术（Daguerreotype），又称达盖尔银版法，由法国发明家路易-雅克-芒代·达盖尔于1837年发明，是摄影史上第一种具有实用价值的摄影方法。其工艺以铜板覆银，经碘蒸气感光后曝光，再以加热的水银蒸气显影，影像细腻如镜。1839年8月19日法国科学院公布此项技术，这一天被公认为摄影术诞生的标志。银版照片每张独一无二、不可复制，影像左右颠倒，从不同角度观看会在正像与负像间变化。
  书中原文: |
    起初，何塞·阿尔卡蒂奥·布恩迪亚出于对新奇的银版照相术和诺查丹玛斯预言的热情，还常常帮他的忙。
  网络来源: |
    https://baike.baidu.com/item/银版法
    https://zh.wikipedia.org/zh-cn/银版摄影法

- 名词: 诺查丹玛斯
  解释: |
    诺查丹玛斯（Nostradamus，1503—1566），原名米歇尔·德·诺特雷达姆，法国预言家、瘟疫医生兼占星家。出身改信天主教的犹太家庭，曾就读医学院并长期行医对抗黑死病。晚年出版《百诗集》（常误译为《诸世纪》），收录约942首四行预言诗，语言高度晦涩模糊。后世频繁将其诗句附会为对法国大革命、两次世界大战、9·11事件等的"预言"。学术界普遍认为其所谓预言实为事后附会与巧合，但他作为西方神秘文化符号的影响力延续至今。
  书中原文: |
    起初，何塞·阿尔卡蒂奥·布恩迪亚出于对新奇的银版照相术和诺查丹玛斯预言的热情，还常常帮他的忙。
  网络来源: |
    https://baike.baidu.com/item/诺查丹玛斯
    https://zh.wikipedia.org/wiki/Nostradamus

- 名词: 加拉巴木
  解释: |
    加拉巴木（Calabash tree，学名 Crescentia cujete），原产美洲热带地区的乔木，果实坚硬如木，晒干掏空后制成瓢、碗、杯等容器，在拉丁美洲有着悠久的使用历史。西班牙语中称为"jicara"、"totuma"、"tapara"等。除作容器外，加拉巴木果壳还用于制作乐器（如巴西卡波耶拉的贝林巴琴、沙锤）和工艺品。书中梅尔基亚德斯用毛巾包着加拉巴木果壳瓢去河边洗澡，体现了这一传统器物在拉丁美洲日常生活中的实用价值。
  书中原文: |
    就这样过了很长时间，没人在家里见过他，除了那天晚上他令人感动地努力修理自动钢琴，以及他腋下夹着用毛巾包好的加拉巴木果壳瓢和油椰肥皂跟阿尔卡蒂奥去河里洗澡的时候。
  网络来源: |
    https://baike.baidu.com/item/葫芦树
    https://en.wikipedia.org/wiki/Crescentia_cujete

- 名词: 赛璐珞
  解释: |
    赛璐珞（Celluloid）是商业上最早生产的合成塑料，由硝酸纤维素加入约20%的樟脑作为增塑剂制成。1869年美国印刷工人约翰·海厄特为替代象牙制作台球而发明，被视为塑料工业的开端。赛璐珞材质轻巧、富有弹性，可模塑成形，但高度易燃。历史上曾广泛用于乒乓球、电影胶片、梳子、假牙托、钮扣等日用品，2014年后乒乓球改用醋酸纤维材料。在俚语中"Celluloid"至今仍代指电影胶片或电影产业。
  书中原文: |
    何塞·阿尔卡蒂奥·布恩迪亚身着舞会那晚才穿过一次的深色呢料正装，系上赛璐珞硬领，套上岩羚皮靴，去蕾梅黛丝·摩斯科特家提亲。
  网络来源: |
    https://baike.baidu.com/item/赛璐珞
    https://zh.wikipedia.org/zh-cn/赛璐珞

- 名词: 卡斯蒂利亚语
  解释: |
    卡斯蒂利亚语（Castellano）即西班牙语的别称，起源于西班牙中北部的卡斯蒂利亚（Castilla）地区。现代西班牙语正是以卡斯蒂利亚方言为基础形成。在西班牙境内（尤其加泰罗尼亚等双语地区），人们常用"卡斯蒂利亚语"以区别于加泰罗尼亚语、巴斯克语等地方语言；在南美洲多数国家也倾向于使用此称呼以强调自身的语言独立于西班牙本土。从语言学角度看，卡斯蒂利亚语与西班牙语本质上是同一种语言，名称差异主要涉及历史、政治和文化认同层面的考量。
  书中原文: |
    梅尔基亚德斯回应了这一沟通努力，不时吐出几个和现实毫不相干的卡斯蒂利亚语句子。
