- 名词: 黒甜郷
  解释: "源自中国文学的雅语，指熟睡中的梦境世界。语出北宋苏轼（苏东坡）诗《发广州》：'三杯软饱后，一枕黑甜余'，苏轼自注'俗谓睡为黑甜'。原为北方方言，经苏轼用于诗歌后升格为文学词汇。日语中用'黒甜郷（こくてんきょう）'代指酣睡状态。"
  书中原文: "いつの間にか眠くなって、つい黒甜郷裡に遊んだ。"
  网络来源: "https://www.zdic.net/hans/黑甜鄉"

- 名词: 鵯越
  解释: "位于今神户市的险峻山道，是源平合战（1184年）中源义经率领骑兵从悬崖上俯冲而下奇袭平家军的历史战场遗址。'鵯越の逆落とし'作为日本史上最著名的奇袭战术被广泛传颂。夏目漱石在此借猫之口将自己爬松树的身姿比作义经的鵯越，是一种幽默的自我夸耀。"
  书中原文: "君等は義経が鵯越を落としたことだけを心得て、義経でさえ下を向いて下りるのだから猫なんぞは無論下た向きでたくさんだと思うのだろう。"
  网络来源: "https://zh.m.wikipedia.org/wiki/鵯越"

- 名词: 羅甸語
  解释: "'罗甸'为拉丁语Latin的音译汉字，羅甸語即拉丁语。明治时代（尤其是医学教育）学术用语中广泛使用拉丁语，1876年颁布的《医制》中将拉丁语与德语列为必修科目。夏目漱石在文中讽刺主人（苦沙弥）作为英语教师却卖弄拉丁语，反映了明治知识分子崇尚西洋学术的时代风气。"
  书中原文: "主人が羅甸語を弄する類と同じ綱目に入るべき事項となる。"
  网络来源: "https://zh.wiktionary.org/zh-hant/羅甸語"

- 名词: 烏合の衆
  解释: "四字熟语，意为如乌鸦般临时聚集、缺乏组织和纪律的群体。出自中国春秋时期《管子》逸文'乌合之众，初虽有欢，后必相吐'，以及《后汉书·耿弇传》。日语中读作'うごうのしゅう'，是典型的贬义成语。夏目漱石在此引用该成语来形容三只乌鸦聚集在墙上的场景，一语双关。"
  书中原文: "諺にも烏合の衆と云うから三羽だって存外弱いかも知れない。"
  网络来源: "https://zh.m.wiktionary.org/zh-hant/烏合之眾"

- 名词: 天狗
  解释: "日本最具代表性的妖怪之一。形象为红脸高鼻、背生双翼、身着山伏装束、手持羽扇。起源可追溯至中国《山海经》，传入日本后经历从流星到狐狸型妖怪、鸟喙人身、怨灵到山神的复杂演变，江户时代形象定型。日语中'天狗になる'指骄傲自大。夏目漱石用'天狗の裔'（天狗的后代）来形容乌鸦尖尖的嘴喙。"
  书中原文: "口嘴が乙に尖がって何だか天狗の啓し子のようだ。"
  网络来源: "https://baike.baidu.com/item/天狗/652916"

- 名词: 最明寺
  解释: "镰仓时代（1256年）由镰仓幕府第五代执权北条时赖在其别邸建造的持佛堂。北条时赖在此出家，法号道崇。其后，北条时宗将其复兴为禅兴寺。现存的明月院（神奈川县镰仓市）继承其系谱，以紫阳花闻名。夏目漱石引用关于松树的传说'松は常磐にて最明寺の御馳走をしてから'，暗指能乐或民间故事中松树与最明寺的关联。"
  书中原文: "元来松は常磐にて最明寺の御馳走をしてから以来今日に至るまで、いやにごつごつしている。"
  网络来源: "https://baike.baidu.com/item/北条时赖/10679633"
