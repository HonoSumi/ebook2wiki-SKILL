- 名词: リードル
  解释: 指明治时代学校使用的英语读本（Reader）教科书。明治维新后日本大力推进西洋教育，英语成为重要学科，"リードル"即英语阅读教材的通称。文中苦沙弥被称为"十年一日のごとくリードル専門の教師"，形容他是常年只教英语读本的古板英语教师。这是明治教育制度西化的缩影。
  书中原文: 昔しから頑固な性分で——何しろ十年一日のごとくリードル専門の教師をしているのでも大体御分りになりましょう
  网络来源: https://www.jstage.jst.go.jp/article/jeigakushi1969/1998/30/1998_30_73/_article/-char/en

- 名词: ステッキ
  解释: 西洋手杖/文明棍。明治时代文明开化浪潮下，西洋式手杖成为日本绅士的时尚象征和身份标识。文中金田夫人抱怨苦沙弥用ステッキ追赶书生的粗暴行为，侧面反映了ステッキ作为当时男性随身物品的普及程度。
  书中原文: この間は罪もない、宅の書生をステッキを持って追っ懸けたってんです
  网络来源: https://collections.museumsvictoria.com.au/items/1452672

- 名词: 自炊
  解释: 指学生自行做饭的寄宿生活方式。明治时代大量外地学生赴东京求学，在寄宿屋内自己炊事以节省开支成为普遍现象。文中迷亭与苦沙弥昔年曾是"自炊の仲間"，说明他们年轻时一起在寄宿处搭伙做饭的同窗关系。这是明治学生文化的一个重要侧面。
  书中原文: あれも昔し自炊の仲間でしたがあんまり人を馬鹿にするものですから能く喧嘩をしましたよ
  网络来源: https://zh.wikipedia.org/zh-tw/%E8%B3%84%E5%BE%81%E4%BC%90

- 名词: 車夫
  解释: 人力车夫，明治至大正时期日本城市中最主要的短途交通工具从业者。人力车（俥）于明治2年（1869年）发明后迅速普及，车夫成为都市常见职业。文中金田夫人派"車夫"给苦沙弥送啤酒，反映了明治家庭中车夫兼做跑腿使唤的社会习俗。
  书中原文: 後で車夫にビールを一ダース持たせてやったんです
  网络来源: https://zh-classical.wikipedia.org/wiki/%E4%BA%BA%E5%8A%9B%E8%BB%8A

- 名词: 唐物屋
  解释: 舶来品商店。原指经营从中国进口物品的店铺，明治时代"唐物"含义扩大到包含欧美进口商品。文中写白毛布的来历——"製造元では白のつもりで織り出して、唐物屋でも白の気で売り捌いた"，即从制造到唐物屋销售的过程，说明明治时期舶来品商店在人们日常消费中的角色。
  书中原文: 製造元では白のつもりで織り出して、唐物屋でも白の気で売り捌いたのみならず
  网络来源: https://www.sohu.com/a/292886939_120005162

- 名词: 木魚
  解释: 木鱼，佛教法器，诵经时敲击以控制节奏的木制鱼形乐器。鱼象征精进不眠，故用于警醒修行者。文中"比丘尼が木魚の音を聞き分けるごとく"比喻猫能从椽下声音判断出那是金田的禿頭，就像尼姑能辨别木鱼声一样，说明木鱼是日常佛教生活中常见的法器。
  书中原文: 比丘尼が木魚の音を聞き分けるごとく、椽の下からでも音さえたしかであればすぐ禿頭だなと出所を鑑定する事が出来る
  网络来源: https://zh.wikipedia.org/zh-tw/%E6%9C%A8%E9%B1%BC

- 名词: 比丘尼
  解释: 佛教中受过具足戒的女性出家人，即尼姑。日语中读作"びくに"。明治时代初期因废佛毁释运动，尼僧曾遭受严重冲击，后随佛教复兴而重建尼僧教育制度。文中用"比丘尼が木魚の音を聞き分けるごとく"作比喻，可见比丘尼是当时日本社会日常生活中常见的宗教形象。
  书中原文: 比丘尼が木魚の音を聞き分けるごとく、椽の下からでも音さえたしかであればすぐ禿頭だなと出所を鑑定する事が出来る
  网络来源: https://baike.baidu.com/item/%E6%AF%94%E4%B8%98%E5%B0%BC

- 名词: 牡丹餅
  解释: 牡丹饼（又称御萩/おはぎ），日本传统和菓子。用糯米蒸熟后轻捣成团，外裹红豆馅。春季食用时称"牡丹餅"（因牡丹花开），秋季称"おはぎ"（因萩花开）。常用于彼岸（春分/秋分）期间的佛前供品。文中猫将自己的意外收获比作"御彼岸にお寺詣りをして偶然方丈で牡丹餅の御馳走になるような者"，意即如彼岸参拜时偶得方丈款待牡丹饼一般的意外之喜。
  书中原文: 御彼岸にお寺詣りをして偶然方丈で牡丹餅の御馳走になるような者だ
  网络来源: https://zh.wikipedia.org/wiki/%E7%89%A1%E4%B8%B9%E9%A4%85

- 名词: 御彼岸
  解释: 彼岸会，日本佛教的重要行事。以春分和秋分为中日（中心日），前后各加三日共七日，期间进行扫墓、供祖、诵经等法事。原为佛教活动，明治时代因神佛分离政策被官方改造为国家神道的"皇靈祭"，但民间仍保留佛事传统。文中"御彼岸にお寺詣り"即指此习俗。
  书中原文: 御彼岸にお寺詣りをして偶然方丈で牡丹餅の御馳走になるような者だ
  网络来源: https://www.japaholic.com/tw/article/detail/910318-%E6%97%A5%E6%9C%AC%E3%81%AE%E3%80%8C%E6%98%A5%E5%88%86%E4%B9%8B%E6%97%A5%E3%80%8D%E8%A6%81%E6%8E%83%E5%A2%93%EF%BC%9F%E4%B8%8D%E5%8F%AA%E6%9C%89%E7%9B%82%E8%98%AD%E7%9B%86%E7%AF%80%EF%BC%81%E8%AA%8D%E8%AD%98%E3%80%8C%E6%98%A5%E5%BD%BC%E5%B2%B8%E3%80%8D%E7%9A%84%E6%96%87%E5%8C%96
