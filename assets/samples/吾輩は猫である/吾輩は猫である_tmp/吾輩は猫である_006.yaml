- 名词: 天璋院
  解释: 天璋院（てんしょういん，1836-1883）是江户幕府第13代将军德川家定的正室（御台所），萨摩藩岛津家出身，幼名于一，后称笃姬。她在幕末政治中扮演重要角色，德川家定去世后落饰为尼，法号天璋院。戊辰战争期间，她以萨摩出身之身竭力促成江户城无血开城，维护德川宗家存续。
  书中原文: 何でも天璋院様の御祐筆の妹の御嫁に行った先きの御っかさんの甥の娘なんだって
  网络来源: https://zh.wikipedia.org/zh-tw/%E5%A4%A9%E7%92%8B%E9%99%A2

- 名词: 御祐筆
  解释: 御祐筆（おゆうひつ）是江户幕府大奥中女性职役之一，负责撰写公日志、起草发送各大名的书简、以及处理大奥内外文书往来。其职位相当于将军家的秘书官，属"御目见得"以上的高阶女中，须具备优秀的文笔能力。
  书中原文: 何でも天璋院様の御祐筆の妹の御嫁に行った先きの御っかさんの甥の娘なんだって
  网络来源: https://www.nippon.com/cn/japan-topics/c10803/

- 名词: 建仁寺
  解释: 建仁寺（けんにんじ）是位于京都市东山区的临济宗建仁寺派大本山，由镰仓幕府将军源赖家创建、荣西禅师开山，建于建仁2年（1202年），是京都最古老的禅寺，位列京都五山第三位。荣西禅师亦将从宋朝带回的茶种传入日本，被尊为"茶祖"。
  书中原文: 帰りに例の茶園を通り抜けようと思って霜柱の融けかかったのを踏みつけながら建仁寺の崩れから顔を出すと
  网络来源: https://zh.wikipedia.org/wiki/%E5%BB%BA%E4%BB%81%E5%AF%BA

- 名词: 春慶塗り
  解释: 春慶塗り（しゅんけいぬり）是日本传统漆器技法，产于岐阜县飞驒地方，约400年前江户初期诞生。其最大特色是使用透明漆涂刷木地，充分发挥木材天然的优美木纹。颜色以黄、红为主，经年使用后色泽愈加深沉。被指定为国家级传统工艺品。
  书中原文: 主人の手あぶりの角を見ると春慶塗りの巻煙草入れと並んで越智東風君を紹介致候水島寒月という名刺があるので
  网络来源: https://kougeihin.jp/zh-TW/craft/0516/

- 名词: 紋付羽織
  解释: 紋付羽織（もんつきはおり）是印有家族纹章的日本传统外套，与袴搭配构成日本男性第一礼装"紋付羽織袴"。江户时代为武家略礼装，明治四年（1872年）服制改革后成为官吏正式礼服，确立了五纹黑纹付羽织的标准形制，沿用至今。
  书中原文: 頭を奇麗に分けて、木綿の紋付の羽織に小倉の袴を着けて至極真面目そうな書生体の男である
  网络来源: https://baike.baidu.com/item/%E7%BA%B9%E4%BB%98%E7%BE%BD%E7%BB%87%E8%A2%B4/4047374

- 名词: 小倉袴
  解释: 小倉袴（こくらばかま）是使用小倉織制作的和服袴。小倉織发祥于江户初期丰前小仓藩（今福冈县北九州市），是一种经线密度约为纬线三倍的平织棉织物，质地厚实坚韧，表面具拨水性，经久使用会产生皮革般光泽。江户时代武士爱用，明治时期亦用于学生服。
  书中原文: 頭を奇麗に分けて、木綿の紋付の羽織に小倉の袴を着けて至極真面目そうな書生体の男である
  网络来源: https://zh.shokunin.com/archives/34770457.html

- 名词: 西洋料理
  解释: 西洋料理（せいようりょうり）在明治时代随"文明开化"政策大规模传入日本。明治天皇率先食用牛肉，肉食解禁。政府推行法国菜为外交料理，以"富国强兵"为目标提高国民体力。日本厨师将其改良为符合日人口味的"洋食"，如炸猪排、咖喱饭、蛋包饭等，逐渐普及至庶民。
  书中原文: その西洋料理へ行って午飯を食うのについて趣向があるというのですか
  网络来源: https://zh.wikipedia.org/wiki/%E6%B4%8B%E9%A3%9F

- 名词: 天明調
  解释: 天明調（てんめいちょう）指江户时代天明期（1781-1789）兴起的文学样式。一为俳谐领域回归松尾芭蕉蕉风的主张；二为大田南畝等人倡导的狂歌（滑稽讽刺短歌）风格。天明期也是町人文化鼎盛的时代，浮世绘、洒落本等庶民文艺繁荣。
  书中原文: 君仏蘭西や英吉利へ行くと随分天明調や万葉調が食えるんだが、日本じゃどこへ行ったって版で圧したようで、どうも西洋料理へ這入る気がしない
  网络来源: https://jlearn.net/dictionary/%e5%a4%a9%e6%98%8e%e8%aa%bf

- 名词: 万葉調
  解释: 万葉調（まんようちょう）指日本最古歌集《万叶集》所代表的歌风，亦称"ますらをぶり"（益荒男振），特征为雄浑质朴、率直真诚、感情直接表露。与后世《古今和歌集》的纤巧优雅"たをやめぶり"形成对比。江户国学家贺茂真渊推崇万叶调为和歌理想。
  书中原文: 君仏蘭西や英吉利へ行くと随分天明調や万葉調が食えるんだが、日本じゃどこへ行ったって版で圧したようで、どうも西洋料理へ這入る気がしない
  网络来源: http://japan.peopledaily.com.cn/BIG5/n/2014/0210/c374115-24312216.html
