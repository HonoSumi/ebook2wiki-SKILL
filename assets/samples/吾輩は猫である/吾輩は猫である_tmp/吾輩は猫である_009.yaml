- 名词: 世話物
  解释: 日本传统戏剧（人形净琉璃/歌舞伎）的一种题材分类，指以当代庶民社会现实生活为题材的作品，又称"社会剧"或"世态剧"。由剧作家近松门左卫门在元禄时代开创，代表作有《曾根崎心中》《冥途飞脚》《心中天网岛》等。与以历史传说为题材的"时代物"相对，世话物以町人（市民）为主人公，描写"义理"与"人情"的冲突，具有强烈的写实性。
  书中原文: それから僕が今度も近松の世話物をやるつもりかいと聞くと
  网络来源: https://www2.ntj.jac.go.jp/unesco/bunraku/sc/play/sewa2.html

- 名词: 金色夜叉
  解释: 尾崎红叶（1868-1903）创作的长篇小说，1897年至1902年在《读卖新闻》连载，是明治文学最著名的代表作品之一。故事讲述主人公间贯一因未婚妻阿宫被富豪之子夺走而堕落为高利贷者的悲剧，深刻揭露了明治时代的金权主义与爱情纠葛。作品因作者病逝而未完成，但成为明治时代最大畅销书之一，多次被改编为电影和电视剧。
  书中原文: いえこの次はずっと新しい者を撰んで金色夜叉にしましたと云うから
  网络来源: https://zh.wikipedia.org/wiki/%E9%87%91%E8%89%B2%E5%A4%9C%E5%8F%89

- 名词: バリー・ペーン
  解释: Barry Pain（1864-1928），英国作家、幽默文学作家，以《Eliza》系列幽默短篇小说闻名。毕业于剑桥大学，曾担任《To-Day》杂志主编。他的作品风格诙谐，同时也创作超自然题材小说，受到H.P.洛夫克拉夫特的赞赏。明治时代的日本知识分子广泛阅读西方文学，巴里·佩因的幽默作品也作为西洋文学的引入在日本知识阶层中流传。
  书中原文: 昼飯を食ってストーブの前でバリー・ペーンの滑稽物を読んでいるところへ
  网络来源: https://www.ebsco.com/research-starters/history/barry-pain

- 名词: 日露戦争
  解释: 日俄战争（1904年2月8日至1905年9月5日），是日本帝国与俄罗斯帝国为争夺朝鲜半岛和中国东北（满洲）势力范围而进行的战争。日本取得决定性胜利，经美国总统调解签订《朴茨茅斯条约》。日本获得库页岛南部、旅顺大连租借权，确立对朝鲜的指导权。这是近代史上亚洲国家首次击败欧洲强国，对亚洲民族独立运动产生深远影响，但也使日本军国主义势力崛起。
  书中原文: 露西亜と戦争が始まって若い人達は大変な辛苦をして御国のために働らいているのに
  网络来源: https://www.nippon.com/hk/japan-topics/g02174/

- 名词: 首懸の松
  解释: 位于江户（东京）土手三番町（现今千代田区一带）的一棵著名松树，流传着"来到此松下就会想要上吊"的民间传说。据说每年总有两三人吊死在这棵树上，而附近的其它松树则不会有人寻死。夏目漱石在《我是猫》中借迷亭之口讲述了这一带有灵异色彩的江户民间传说，将其描述为"死神附体"般的奇异体验。
  书中原文: 鴻の台のは鐘懸の松で、土手三番町のは首懸の松さ。なぜこう云う名が付いたかと云うと、昔しからの言い伝えで誰でもこの松の下へ来ると首が縊りたくなる。
  网络来源: https://book.qq.com/book-detail/34053915

- 名词: 鐘懸の松
  解释: 位于鸿之台（今千叶县市川市国府台地区）的一棵著名松树，传说曾用于悬挂寺庙的钟，因而得名。与土手三番町的"首悬之松"形成对比，是江户名所传说中具有地方特色的树木典故。夏目漱石在《我是猫》中通过人物对话，将两棵松树的传说并置讲述。
  书中原文: 鴻の台のは鐘懸の松で、土手三番町のは首懸の松さ。
  网络来源: https://www.wikiwand.com/zh-cn/articles/%E5%90%BE%E5%A6%BB%E6%A9%8B_(%E5%A2%A8%E7%94%B0%E5%8D%80)

- 名词: 鴻の台
  解释: 位于现今千叶县市川市北部的高地，历史上被称为"鸿之台"（こうのだい），后来汉字表记变为"国府台"。地名由来一说来自在此栖息的鹳鸟（鸿），另一说来自古代下总国国府所在地。战国时代曾发生"国府台合战"（后北条氏对阵里见氏）。江户时代为风景名胜地，歌川广重的浮世绘《名所江户百景》中也描绘了"鸿之台とね川风景"。
  书中原文: 首懸の松は鴻の台でしょう
  网络来源: https://zh.wikipedia.org/zh-tw/%E5%9C%8B%E5%BA%9C%E5%8F%B0%E8%BB%8A%E7%AB%99

- 名词: ゼームス
  解释: William James（威廉·詹姆斯，1842-1910），美国心理学家、哲学家，实用主义哲学和机能主义心理学的创始人。其著作《心理学原理》提出了"意识流"（stream of consciousness）等重要概念，对明治时代的日本知识界产生了深远影响。夏目漱石深受其影响，在创作中运用了"意识流"手法。"ゼームス"是明治时期特有的片假名音译（源自荷兰语/德语发音），现代日语通常写作"ジェームズ"。
  书中原文: ゼームスなどに云わせると副意識下の幽冥界と僕が存在している現実界が一種の因果法によって互に感応したんだろう
  网络来源: https://www.jstage.jst.go.jp/article/nihonbungaku/32/6/32_KJ00009971282/_article/-char/ja

- 名词: 空也餅
  解释: 东京银座的和果子老铺"空也"（くうや）制作的名物点心。空也创业于明治17年（1884年），最初在上野池之端开业，二战后迁至银座。其招牌商品为"空也最中"，另有冬季限定的"空也饼"——将蒸糯米捣碎包裹红豆粒馅制成。深受夏目漱石、谷崎润一郎等文豪喜爱，在《我是猫》中也有提及。店名取自平安时代的僧侣空也上人。
  书中原文: 主人はまたやられたと思いながら何も云わずに空也餅を頬張って口をもごもご云わしている。
  网络来源: https://kouinjp.com/ginza-kuya/

- 名词: 向島
  解释: 位于东京都墨田区，隅田川东岸的地区。江户时代以来便是赏樱名所和料亭街，德川吉宗曾在此大量种植樱花，形成"墨堤之樱"。明治时代发展成东京六大花街之一，建有"见番"（艺妓管理机构），料亭和置屋林立。同时，依托隅田川水运，近代工业也在此发展。著名景点包括向岛百花园（1804年开园）、牛岛神社、长命寺（长命寺樱饼发源地）。
  书中原文: その日は向島の知人の家で忘年会兼合奏会がありまして
  网络来源: https://zh.wikipedia.org/zh-hans/%E5%90%91%E5%B3%B6_(%E5%A2%A8%E7%94%B0%E5%8C%BA)

- 名词: 吾妻橋
  解释: 横跨东京隅田川的桥梁，连接台东区浅草与墨田区。1774年（安永3年）由六名商人出资建造，最初名为"大川桥"。1875-1876年（明治8-9年）重建时正式更名为"吾妻桥"，名称源自附近的吾嬬神社。1923年关东大地震后改建为铁桥。桥周边为隅田川花火大会的绝佳观赏点，朝日啤酒总部大楼（金色建筑）位于桥畔，是东京著名地标。
  书中原文: ただ蹌々として踉々という形ちで吾妻橋へきかかったのです。
  网络来源: https://livejapan.com/zh-cn/in-tokyo/in-pref-tokyo/in-asakusa/spot-lj0002104/

- 名词: 花川戸
  解释: 东京都台东区浅草的一个地区，分花川户一丁目和二丁目，位于隅田川西岸。地名由来："花"指樱花（这一带以樱花闻名），"川"指隅田川，"户"在日语中指临河或临海的区域。历史上曾是著名的鞋类批发街。隅田公园位于此区域，是著名的赏樱景点，每年七月举行隅田川花火大会。
  书中原文: 花川戸の方から人力車が一台馳けて来て橋の上を通りました。
  网络来源: https://zh.wikipedia.org/zh-hant/%E8%8A%B1%E5%B7%9D%E6%88%B6

- 名词: 札幌ビール
  解释: 日本最古老的啤酒品牌。前身为1876年（明治9年）北海道开拓使设立的"开拓使麦酒酿造所"，由赴德国学习酿造技术的中川清兵卫负责酿造，采用德国式下面发酵（拉格）工艺。1887年涩泽荣一等创立"札幌麦酒株式会社"。1906年与其他公司合并为"大日本麦酒株式会社"。二战后重组为现公司。札幌啤酒见证了明治维新的近代化进程和西洋文化的引入。
  书中原文: その提灯の火を見送っていると、だんだん小くなって札幌ビールの処で消えました。
  网络来源: https://zh.wikipedia.org/zh-cn/%E6%9C%AD%E5%B9%8C%E5%95%A4%E9%85%92

- 名词: 大神楽
  解释: 日本传统民间表演艺术，起源于江户时代，以狮子舞和杂技曲艺为主要内容，由街头艺人表演。又称"太神楽"（だいかぐら），源自伊势神宫的神乐。表演内容包括舞狮、抛球、平衡技巧等杂耍，是江户时代庶民文化的重要组成部分。明治时代延续为街头表演，一些神社至今仍保存大神乐的传统，被指定为无形民俗文化财产。
  书中原文: 迷亭が煙管を大神楽のごとく指の尖で廻わす。
  网络来源: https://www.edrdg.org/jmwsgi/entr.py?svc=jmdict&sid=&disp=jmne&e=1042212
