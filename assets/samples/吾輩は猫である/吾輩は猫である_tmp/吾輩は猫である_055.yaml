- 名词: 文明中学
  解释: 夏目漱石《吾輩は猫である》中主人公苦沙弥任教的中学名称。明治时代的中学教育制度下，中学分为寻常中学（五年制）和高等中学，是近代日本教育体系的重要组成部分。小说中苦沙弥在该校担任英语教师。该学校的现实原型被认为是以东京都文京区向丘的郁文馆中等学校为蓝本创作的。
  书中原文: 「これで文明中学二年生古井武右衛門とでもかいたのかい」「学校の名を書かないだけまあよかった。これで学校の名が出て見るがいい。それこそ文明中学の名誉に関する」
  网络来源: https://baijiahao.baidu.com/s?id=1766832955523161850

- 名词: 八犬伝
  解释: 全称《南総里見八犬伝》，是江户时代后期作家曲亭马琴（滝沢馬琴）花费28年完成的读本小说巨作。描写里见家与八位持有"仁・義・礼・智・忠・信・孝・悌"八德玉珠的犬士的传奇故事，是江户文学的代表作。在本书中，夏目漱石引用八犬传的虚构世界，讽刺现实社会中人际关系冷淡，若要期望超出人类本性的善行，只有等到八犬传中的理想人物走出小说搬到现实中来才有可能实现。
  书中原文: 「馬琴の小説から志乃や小文吾が抜けだして、向う三軒両隣へ八犬伝が引き越した時でなくては、あてにならない無理な注文である」
  网络来源: https://book.douban.com/annotation/85854986/
