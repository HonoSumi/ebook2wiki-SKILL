- 名词: 南無阿弥陀仏
  解释: 南无阿弥陀佛，源自梵语Namo Amitābha，是净土宗（日本净土宗和净土真宗）的核心念佛法门。"南无"意为归命（将自己的生命托付），"阿弥陀佛"意为无量光/无量寿佛。日本平安末期法然开创净土宗，亲鸾开创净土真宗，使称名念佛深入民间。明治时代初期废佛毁释运动中净土信仰受打击，僧侣被迫世俗化；后期各宗派恢复并近代化。夏目漱石创作《我是猫》的明治后期，南无阿弥陀佛作为民间佛教文化仍广泛存在。
  书中原文: 吾輩は死ぬ。死んでこの太平を得る。太平は死ななければ得られぬ。南無阿弥陀仏南無阿弥陀仏。ありがたいありがたい。
  网络来源: https://zh.wikipedia.org/zh-tw/%E5%8D%97%E7%84%A1%E9%98%BF%E5%BD%8C%E9%99%80%E4%BD%9B

- 名词: 甕
  解释: 日本传统的陶制大型容器，弥生时代从中国传入，主要用于储存水、粮食、味噌、酱油、清酒、腌渍物等。明治时代因洋风文化冲击和废藩置县导致传统窑业低迷，备前烧等名窑陷入最困难时期，甕的日用需求锐减；同时万国博览会推动美浓烧等陶器对外输出，为后来传统陶艺复兴奠定基础。小说中猫落入的甕是庭院中盛水的陶制水甕，边缘高出水面四寸余，猫因无法爬出而淹死。
  书中原文: 水から縁までは四寸余もある。足をのばしても届かない。飛び上っても出られない。呑気にしていれば沈むばかりだ。もがけばがりがりと甕に爪があたるのみで、あたった時は、少し浮く気味だが、すべればたちまちぐっともぐる。
  网络来源: https://zh.wikipedia.org/zh-hk/%E7%94%95
