- 名词: 狩野法眼元信
  解释: 狩野元信（1476-1559），日本室町时代后期画家，狩野派第二代掌门人，被誉为"狩野派三大画家"之一。他融合了中国水墨画与日本大和绘的技法，确立了狩野派的基本样式，对后世日本画影响深远。"法眼"是授予僧侣的位阶之一。
  书中原文: とど僕が狩野法眼元信の幅を六百円ただし月賦十円払込の事で売渡す
  网络来源: https://wapbaike.baidu.com/item/%E7%8B%A9%E9%87%8E%E5%85%83%E4%BF%A1

- 名词: 月賦
  解释: 月赋即按月分期付款的购买方式，是明治时代日本从西方引入的商业制度。小说中迷亭以卖画为背景，讲述了利用月赋制度、借人"习惯"之力骗取长期付款的欺诈故事，反映了明治时代新型消费方式的社会影响。
  书中原文: それじゃ月賦でいただきましょう、月賦も細く、長く、どうせこれから御贔屓になるんですから
  网络来源: https://searchworks.stanford.edu/view/10433005

- 名词: 行灯袴
  解释: 行灯袴是明治时代诞生的日本女性用袴（和服裤裙），形状为无裆的筒状裙式，因形似行灯（方形纸罩座灯）而得名。由女性教育家下田歌子改良男性马乘袴而成，便于女学生活动，成为明治女学生的标志性服装，常搭配束发穿着。
  书中原文: この妻が女学校で行灯袴を穿いて牢乎たる個性を鍛え上げて、束髪姿で乗り込んでくるんだから、とても夫の思う通りになる訳がない
  网络来源: https://zhuanlan.zhihu.com/p/95095616

- 名词: 異体同心
  解释: 异体同心是日本四字熟语，意为"身体虽不同，但心完全合一"，常用来形容夫妻之间的理想关系。源自中国唐代韩愈《河中府连理木颂》。小说中独仙以此批判旧式婚姻观念，认为传统夫妇女被当作"一人前"（一体），缺乏个体独立性。
  书中原文: 昔しなら文句はないさ、異体同心とか云って、目には夫婦二人に見えるが、内実は一人前なんだからね
  网络来源: https://zh.m.wiktionary.org/zh-hans/%E5%BC%82%E4%BD%93%E5%90%8C%E5%BF%83

- 名词: 偕老同穴
  解释: 偕老同穴源自中国《诗经》，"执子之手，与子偕老"与"死则同穴"的合称，意为夫妻共度一生、死后同葬一穴。同时也是深海玻璃海绵的名称，因一对俪虾终生生活其中而得名。小说中独仙以此批判旧式婚姻"死而同穴"的封建落后观念，视为野蛮。
  书中原文: それだから偕老同穴とか号して、死んでも一つ穴の狸に化ける。野蛮なものさ
  网络来源: https://m.thepaper.cn/baijiahao_5399118
