- 名词: 泰西文明
  解释: 日本明治时期对西方（欧美）文明的称呼。"泰西"意为"极西之地"，源自汉语，明治时代广泛用于指代欧洲和美国的文明、技术、制度和思想。明治维新后日本以"文明开化"为口号，积极吸收泰西文明，但也出现了盲目追求表面西化而忽视本质的倾向。
  书中原文: 泰西文明の御蔭で女の品行もよほど進歩したものだろうと断定するのだが
  网络来源: https://baike.baidu.com/item/%E6%B3%B0%E8%A5%BF%E4%B8%BB%E4%B9%89/55174119

- 名词: 伊勢源
  解释: 静冈县（旧静冈藩）的一家著名吴服（和服布料）店，是明治时期静冈最大的吴服店。据《吾辈是猫》描述，该店门面宽达十间（约18米），拥有五座仓库，位于静冈的油町与通町之间的二丁目拐角处，是当地代表性的商业老字号。
  书中原文: 伊勢源と云うのは間口が十間で蔵が五つ戸前あって静岡第一の呉服屋だ
  网络来源: https://zujuan.xkw.com/gzls/zsd47023/pt1g12o2?kf=42

- 名词: 雲照律師
  解释: 渡边云照（1827-1909），日本真言宗僧侣，戒律复兴运动的核心人物。出生于出云国（今岛根县），9岁出家，明治年间致力于复兴佛教戒律，曾上书请求改革僧团，创立种智院大学（种子院大学）前身，成立"十善会"推广戒律主义。在明治初年废佛毁释的浪潮中积极护教。
  书中原文: この初さんがまた雲照律師に帰依して三七二十一日の間蕎麦湯だけで通したと云うような青い顔をしている
  网络来源: https://prabook.com/web/risshi.unsho/3752428

- 名词: 人売り
  解释: 日本江户至明治时期存在的贩卖人口（尤其是幼女）的历史现象。贫困家庭将女儿通过中介卖到游郭或富户家中，形同商品交易。文中描述了明治初年静冈仍有小贩用天秤棒挑着装女孩子的笼子沿街叫卖的陋习。1872年明治政府颁布"娼妓解放令"试图禁止，但未能根绝。
  书中原文: 今日は人売りだけにしておこう
  网络来源: https://baijiahao.baidu.com/s?id=1643793336368705829

- 名词: 女学校
  解释: 明治时期为女性设立的中等教育机构。1899年《高等女学校令》颁布后正式制度化，以"良妻贤母主义"为教育理念。明治初期受文明开化思想影响开始重视女子教育，但课程以修身、裁缝等家政内容为主，与男子教育有明显区别。代表性的女学校有实践女学校（下田歌子创立）、女子英学塾（津田梅子创立）等。
  书中原文: この頃の女は学校の行き帰りや、合奏会や、慈善会や、園遊会で
  网络来源: https://www.crggcn.com/skwx_crgg/initDatabaseDetail?siteId=25&contentId=8882007&contentType=literature

- 名词: 合奏会
  解释: 明治时期兴起的西洋音乐合奏集会，是当时知识分子和新式学校学生的社交活动之一。随着西洋音乐在明治日本的传播，合奏会成为青年男女交流、展示教养的重要场合。文中寒月提到"意中の人と合奏をしたり"，反映了当时通过合奏进行社交的风气。
  书中原文: この頃の女は学校の行き帰りや、合奏会や、慈善会や、園遊会で
  网络来源: https://asia.si.edu/whats-on/blog/posts/from-court-to-concert-hall-the-origins-of-classical-music-in-japan/

- 名词: 慈善会
  解释: 明治时期日本引入的西方慈善活动模式。随着文明开化和近代化进程，日本出现了如博爱社（后改为日本赤十字社，1877年）、恩赐财团济生会（1911年）等慈善组织。慈善会成为上流社会及知识分子参与公益、社交往来的场合，也是当时女子教育中提倡的社会活动之一。
  书中原文: この頃の女は学校の行き帰りや、合奏会や、慈善会や、園遊会で
  网络来源: https://zh.wikipedia.org/zh-tw/%e6%b5%8e%e7%94%9f%e4%bc%9a

- 名词: 依託販売
  解释: 原文作"依托販売"，即委托销售、寄售。由卖方将商品委托他人代为销售的方式。文中寒月用此词讽刺当时女性在社交场合（学校、合奏会、慈善会等）自我推销的行为，将其比作低级的沿街叫卖，反映了明治时期知识青年对女性社交方式变化的观察与批评。
  书中原文: そんな八百屋のお余りを雇って、女の子はよしか、なんて下品な依托販売をやる必要はないですよ
  网络来源: https://mazii.net/zh-TW/search/word/jatw/%E5%A7%94%E8%A8%97%E8%B2%A9%E5%A3%B2

- 名词: 筒袖
  解释: 袖口呈直筒状的和服袖型，与振袖等传统宽袖不同。明治时期，随着女性参加体操、体育等活动以及家务劳动的便利需求，筒袖被引入女性服装中，尤其体现在割烹着（烹饪服）等实用着装中。文中描写女学生穿着筒袖进行体操锻炼，反映了明治女性服装的实用化变革。
  书中原文: 筒袖を穿いて鉄棒へぶら下がるから感心だ
  网络来源: https://www.muji.net/lab/zh-cn/clothes/140402.html

- 名词: 体操
  解释: 明治时期从西方引入的学校体育教育。1872年学制颁布后，小学开始设置"体术"（后称体操）。1878年设立体操传习所培养体育教师。初期采用美国式普通体操，1880年代后引入德国式兵式体操，后期以瑞典体操为主流。体操被纳入"智育、德育、体育"三育体系，是明治富国強兵政策的重要组成部分。
  书中原文: 僕は二階の窓から彼等の体操を目撃するたんびに古代希臘の婦人を追懐するよ
  网络来源: https://tyxk.scnu.edu.cn/a/20240803/3827.html

- 名词: 亜典
  解释: 明治时期日语中对希腊首都雅典（Athens）的汉字音译表记。类似的明治时期外国地名当て字（宛字）还有"英吉利"（英国）、"仏蘭西"（法国）、"独逸"（德国）、"亜米利加"（美国）等。现代日语已统一使用片假名"アテネ"，"亜典"这种汉字表记已不再使用。中国语中对Athens的译名为"雅典"。
  书中原文: 当時亜典の法律で女が産婆を営業する事を禁じてあった
  网络来源: https://zh.m.wiktionary.org/wiki/%E3%82%A2%E3%83%86%E3%83%8D

- 名词: 産婆
  解释: 日本传统上对助产士（接生婆）的称呼。明治时期，政府开始对产婆进行规范化管理。1899年（明治32年）颁布敕令第345号"产婆规则"，要求产婆必须通过资格考试并登记入册，满20岁以上的女性才能从业。这标志着产婆从传统的经验传承向近代医疗专业职业的转变。昭和时期改称"助产妇"。
  书中原文: 当時亜典の法律で女が産婆を営業する事を禁じてあった
  网络来源: https://cir.nii.ac.jp/crid/1050282813894300416

- 名词: 榊原健吉
  解释: 榊原键吉（1830-1894），幕末至明治时期的著名剑术家，直心影流男谷派传人。曾任幕府讲武所剑术教授，后在明治废刀令下仍坚持传统武艺。1873年组织"击剑会"救济贫困士族。1887年在明治天皇面前用名刀"同田贯"成功斩开明珍头盔，名声大噪，被称为"最后的剑客"。2003年入选全日本剑道连盟剑道殿堂。
  书中原文: 榊原健吉の内弟子としか思えない
  网络来源: https://zh.wikipedia.org/zh-sg/%E6%A6%8A%E5%8E%9F%E9%8D%B5%E5%90%89

- 名词: 内弟子
  解释: 日本传统的住家学徒制度，徒弟寄宿在师傅家中，边学习技艺边承担家务杂务。这是一种在武道、传统艺能（茶道、华道、落语）、相扑、围棋、职人（工匠）等领域广泛存在的教育传承模式。内弟子关系不仅是技术传授，更强调人格塑造和"拟似家族"式的师徒纽带。
  书中原文: 榊原健吉の内弟子としか思えない
  网络来源: https://zh.wikipedia.org/zh-my/%E4%BB%98%E4%BA%BA

- 名词: 新劇
  解释: 日本明治末期至大正时期兴起的现代戏剧运动。受欧洲近代戏剧影响，以坪内逍遥、岛村抱月的"文艺协会"和小山内薰、市川左团次的"自由剧场"为先驱，后经筑地小剧场（1924年创立）确立。新剧反对歌舞伎等旧剧的商业主义和形式主义，追求艺术性和现实主义，是日本戏剧近代化的重要标志。
  书中原文: 近頃は旧劇とか新劇とか大部やかましいから
  网络来源: https://zh.wikipedia.org/zh-hant/%E6%96%B0%E5%8A%87_(%E6%97%A5%E6%9C%AC)

- 名词: 講釈
  解释: 日本传统说唱艺术，起源于江户时代，最初为街头讲述《太平记》等军记物语（"辻讲釈"）。明治时期改称"讲谈"。表演者在高座（舞台上）用小桌和扇子（张扇）敲击节拍，讲述历史故事、武勇传、报仇故事等。明治至大正时期是讲谈的黄金时代，三游亭圆朝等名人大受欢迎。与落语并列为日本寄席（曲艺场）的主要节目。
  书中原文: まるで講釈見たようです事
  网络来源: https://baike.baidu.com/item/%E8%AE%B2%E8%B0%88/4266089

- 名词: 唐茄子
  解释: 日语中南瓜（かぼちゃ）的古称，也指番茄。"唐"表示外来（舶来品），"茄子"指其外形似茄子。战国时代葡萄牙船将南瓜传入日本后，江户时期用作观赏植物，后转为食用。文中以"唐茄子"比喻被装在笼子里沿街贩卖的女童，反映了明治初年仍存在的将女性物化买卖的陋习。
  书中原文: 女の子を唐茄子のように籠へ入れて天秤棒で担いで売ってあるいたもんだ
  网络来源: https://zh.wiktionary.org/wiki/%E5%94%90%E8%8C%84%E5%AD%90

- 名词: 一幕物
  解释: 日语戏剧用语，指由一幕（一场）构成的戏剧作品，相当于英语的one-act play（独幕剧）。与多幕剧相对，情节紧凑、篇幅短小。文中寒月将自己的俳剧作品设计为一幕物，体现了明治时期受西方戏剧影响的新式创作倾向。
  书中原文: あまり長たらしくって、毒悪なのはよくないと思って一幕物にしておいた
  网络来源: https://mazii.net/zh-CN/search/word/jatw/%E4%B8%80%E5%B9%95%E7%89%A9

- 名词: 無罪放免
  解释: 法律用语，指宣告无罪并释放当事人。文中迷亭讲述古希腊Agnodice的故事，提到雅典法庭因众多妇女联名请愿，最终将违反法律从事助产士职业的Agnodice"无罪放免"，并颁布法令允许女性从事产婆职业。这反映了明治时期日本知识界对古希腊法制历史的了解，以及通过此故事对日本近代司法变革的影射。
  书中原文: ついに当人は無罪放免、これからはたとい女たりとも産婆営業勝手たるべき事と云う御布令さえ出て
  网络来源: https://baike.baidu.com/item/%E6%97%A5%E6%9C%AC%E8%BF%91%E4%BB%A3%E5%88%91%E6%B3%95/1572890
