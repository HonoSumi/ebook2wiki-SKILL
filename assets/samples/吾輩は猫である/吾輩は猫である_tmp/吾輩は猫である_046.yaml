- 名词: 日露戦役
  解释: 日露戦役（にちろせんえき）是指1904年至1905年间日本帝国与俄罗斯帝国为争夺朝鲜半岛和满洲（中国东北）控制权而爆发的战争。日本最终获胜，并通过朴茨茅斯条约获得了对朝鲜的独占权以及南满铁路和旅顺、大连的租借权。此战是日本近代历史上最重要的对外战争之一，标志着日本正式跻身世界强国之列。
  书中原文: 回顧すれば日露の戦役は連戦連勝の勢に乗じて平和克復を告げ
  网络来源: https://www.nippon.com/hk/japan-topics/g02174/

- 名词: 凱旋祝賀会
  解释: 凱旋祝賀会（がいせんしゅくがかい）是指明治时期为欢迎日俄战争胜利归国的将士而举办的大型庆祝活动。1906年4月30日，东京举行了盛大的陆军凯旋观兵式，明治天皇亲自检阅，超过3万名士兵参加，数十万市民沿街观礼。政府通过一系列凯旋仪式来安抚因朴茨茅斯条约不满足的国民情绪，彰显军事威光。
  书中原文: 本会は来る二十五日を期し本区内一千有余の出征将校下士卒に対し本区民一般を代表し以て一大凱旋祝賀会を開催し
  网络来源: https://www.zhihu.com/question/31689132

- 名词: 義捐
  解释: 義捐（ぎえん）指明治时期为救灾或公共事业而进行的志愿捐款活动。文中提到主人此前为东北凶作捐出二三円后便四处抱怨被"取走了"钱，讽刺了当时部分人表面应酬捐款实则吝啬的社会风气。明治时期义捐活动是民间慈善的重要形式，常见于自然灾害救助、军事慰問等场合。
  书中原文: せんだって東北凶作の義捐金を二円とか三円とか出してから、逢う人毎に義捐をとられた、とられたと吹聴しているくらいである。
  网络来源: https://www.th.gov.tw/Epaper_Content/236/6773/

- 名词: 華族
  解释: 華族（かぞく）是1869年至1947年间日本明治政府设立的贵族阶层制度。1869年废除公卿和诸侯称号后统一改称华族，1884年颁布《华族令》将华族分为公爵、侯爵、伯爵、子爵、男爵五等。华族享有世袭爵位、贵族院议员资格等政治和经济特权，1947年随着日本国宪法施行被正式废除。文中写信劝捐的正是"華族様"。
  书中原文: 差し出し人は華族様である。
  网络来源: https://baike.baidu.com/item/%E5%8D%8E%E6%97%8F/2785443

- 名词: 東北凶作
  解释: 東北凶作（とうほくきょうさく）指日本东北地区因冷害、台风等气象灾害导致的农作物严重歉收。明治时期东北地方多次遭受冷夏（冷害）袭击，引发饥荒。文中提到主人为此捐出了义捐金，反映了明治时期东北农业的脆弱性以及社会对灾荒的救济机制。
  书中原文: せんだって東北凶作の義捐金を二円とか三円とか出してから
  网络来源: https://www.suruga-ya.com/zh-hant/product/BO4359410

- 名词: 出征将校下士卒
  解释: 出征将校下士卒（しゅっせいしょうこうかしそつ）是明治时期军事用语，指被派遣出征的所有军官（将校）和普通士兵（下士卒）。文中出现在凯旋祝贺会的邀请信中，体现了日俄战争后社会对出征军人的迎接和慰问。明治时期的军队等级制度严格，将校与士兵在待遇和社会地位上有明显区别。
  书中原文: 本区内一千有余の出征将校下士卒に対し本区民一般を代表し以て一大凱旋祝賀会を開催し
  网络来源: https://zh.wikipedia.org/wiki/%E5%9C%A8%E4%B9%A1%E5%86%9B%E4%BA%BA%E4%BC%9A

- 名词: 軍人遺族
  解释: 軍人遺族（ぐんじんいぞく）是指战死或伤病致死军人的家属。明治政府通过1890年《军人恩给法》建立了对军人遗族的扶助制度，包括扶助料（抚恤金）、铁道割引、学费免除等优待措施。文中邀请信中提及"慰藉"军人遗族，反映了日俄战争后社会对遗族的关怀和安抚政策。
  书中原文: 兼て軍人遺族を慰藉せんが為め熱誠之を迎え聊感謝の微衷を表し度
  网络来源: https://zh.wikipedia.org/wiki/%E5%9C%A8%E4%B9%A1%E5%86%9B%E4%BA%BA%E4%BC%9A

- 名词: 臥薪嘗胆
  解释: 臥薪嘗胆（がしんしょうたん）是中国春秋时期越王勾践的典故。勾践被吴王夫差击败后，睡在柴薪上、品尝苦胆以铭记耻辱，最终经过十年生聚十年教训成功复仇。此成语比喻刻苦自励、发奋图强的精神。文中缝田针作在募捐信中使用了此词，表示自己忍辱负重、艰苦奋斗以筹措校舍建设资金。
  书中原文: 臥薪甞胆其の苦辛の結果漸く茲に独力以て我が理想に適するだけの校舎新築費を得るの途を講じ候
  网络来源: https://zh.wikipedia.org/zh/%E5%8D%A7%E8%96%AA%E5%B0%9D%E8%83%86

- 名词: 裁縫秘術綱要
  解释: 裁縫秘術綱要（さいほうひじゅつこうよう）是明治时期出版的一本女子裁缝技术书籍，著者为小出新次郎，1905年（明治38年）由女子裁缝学院出版部刊行，共140页。内容涵盖领带、袖无被布、裆高长乘袴等裁剪制作方法。文中缝田针作将此书作为募捐的回报赠送给捐款者，反映了明治时期女子裁缝教育的盛行。
  书中原文: 別冊裁縫秘術綱要と命名せる書冊出版の義に御座候
  网络来源: https://commons.m.wikimedia.org/wiki/File:NDL848685_%E8%A3%81%E7%B8%AB%E7%A7%98%E8%A1%93%E7%B6%B1%E8%A6%81.pdf

- 名词: 八分体
  解释: 八分体（はっぷんたい）是中国书法中隶书的一种重要风格，起源于西汉末期，成熟于东汉。特点是笔画左右开张如"八"字，具有明显的波磔（蚕头雁尾），装饰性强。代表作品有《曹全碑》、《乙瑛碑》等。文中用来形容信封上"珍野苦沙弥先生虎皮下"的题字字体，显示出写信人（天道公平）的书法素养。
  书中原文: 八分体で肉太に認めてある
  网络来源: https://baike.baidu.com/item/%E5%85%AB%E5%88%86%E4%BD%93

- 名词: 干瓢の酢味噌
  解释: 干瓢の酢味噌（かんぴょうのすみそ）是日本传统菜肴。干瓢（かんぴょう）是将瓠瓜果肉切成细条晒干制成的食材，主产地为栃木县，常用于寿司卷和煮物。酢味噌（すみそ）是由味噌、醋和砂糖调制而成的调味酱，常用于凉拌菜（ぬた）。文中将主人苦沙弥贬称为"只知干瓢醋味噌的人"，讽刺其生活清贫、见识狭窄。
  书中原文: 苦沙弥先生の如きに至っては只干瓢の酢味噌を知るのみ。干瓢の酢味噌を食って天下の士たるものは、われ未だ之を見ず。
  网络来源: https://baike.baidu.com/item/%E5%B9%B2%E7%93%A2%E7%85%AE/3041745

- 名词: 海鼠
  解释: 海鼠（なまこ）即海参。在日本食文化中历史悠久，《古事记》（712年）中已有记载。江户时代干海参作为"俵物三品"之一大量出口到中国，是幕府的重要外汇来源。海参内脏制成的盐辛"このわた"被视为日本三大珍味之一。文中将第一个吃海参的人与亲鸾相提并论，赞誉其胆识。反映了海参在日本饮食文化中的特殊地位。
  书中原文: 始めて海鼠を食い出せる人は其胆力に於て敬すべく
  网络来源: https://zhuanlan.zhihu.com/p/88593531

- 名词: 河豚
  解释: 河豚（ふぐ）即河豚，在日本食文化中既是顶级美味也是剧毒食材。江户时代曾多次颁布禁止食用河豚的命令。1888年，伊藤博文在山口县下关的春帆楼品尝河豚后大为赞赏，促使山口县率先解禁。此后河豚料理逐渐普及，形成了河豚刺身（てっさ）、河豚锅（てっちり）等代表料理。文中将第一个吃河豚的人比作日莲，赞誉其勇气。
  书中原文: 始めて河豚を喫せる漢は其勇気に於て重んずべし
  网络来源: https://www.foodnext.net/life/culture/paper/5739705955

- 名词: 親鸞
  解释: 親鸞（しんらん，1173-1263）是日本镰仓时代佛教改革者，净土真宗的开祖。原为法然弟子，主张"恶人正机说"——恶人反而是阿弥陀佛救度的首要对象，强调绝对他力（靠佛力而非自力）的信仰。他打破僧侣不婚的戒律，娶妻生子，实践在家佛教。代表作《教行信証》。文中将第一个吃海参的人比作"亲鸾的再来"，极言其胆识非凡。
  书中原文: 海鼠を食えるものは親鸞の再来にして
  网络来源: https://baike.baidu.com/item/%E9%94%80%E5%80%9A/2785443

- 名词: 日蓮
  解释: 日蓮（にちれん，1222-1282）是日本镰仓时代佛教改革者，日莲宗（法华宗）的开祖。他主张《法华经》为唯一正法，倡导唱念"南无妙法莲华经"的题目修行。他激烈批判其他宗派，追求现世救国和理想社会的实现。文中将第一个吃河豚的人称为"日莲的分身"，意在称赞其勇气非同凡响。
  书中原文: 河豚を喫せるものは日蓮の分身なり
  网络来源: https://baike.baidu.com/item/%E6%97%A5%E8%8E%B2

- 名词: 道家
  解释: 道家（どうか）即道家/道教，是中国古代哲学流派之一，以老子和庄子为代表，主张"道法自然"、"无为而治"。其核心经典《道德经》和《庄子》对日本思想文化产生了深远影响。文中指出主人之所以尊敬那封晦涩的信，与道家尊崇《道德经》是同一个道理——因为看不懂而崇拜。
  书中原文: 道家で道徳経を尊敬し、儒家で易経を尊敬し、禅家で臨済録を尊敬すると一般で全く分らんからである。
  网络来源: https://baike.baidu.com/item/%E9%81%93%E5%AE%B6

- 名词: 道徳経
  解释: 道徳経（どうとくきょう）即《道德经》，又称《老子》，是中国道家思想的根本经典，相传为春秋时期老子（李耳）所著，共约五千字。内容围绕"道"与"德"展开，主张自然无为、柔弱胜刚强等哲学思想。该经典很早就传入日本，对日本的政治哲学和宗教思想产生了深远影响。
  书中原文: 道家で道徳経を尊敬し、儒家で易経を尊敬し、禅家で臨済録を尊敬すると一般で全く分らんからである。
  网络来源: https://baike.baidu.com/item/%E9%81%93%E5%BE%B7%E7%BB%8F

- 名词: 儒家
  解释: 儒家（じゅか）即儒家/儒教，是以孔子为始祖的中国传统思想流派，核心经典包括《论语》、《孟子》等。主张仁、义、礼、智、信等道德规范，强调君臣父子的人伦秩序。儒学在江户时代作为日本官学被幕府大力推崇，对日本的政治制度、道德观念和教育体系产生了极其深远的影响。
  书中原文: 儒家で易経を尊敬し
  网络来源: https://baike.baidu.com/item/%E5%84%92%E5%AE%B6

- 名词: 易経
  解释: 易経（えききょう）即《易经》（又称《周易》），是中国古代最古老的经典之一，儒家五经之首。最初为占筮之书，后发展出以阴阳八卦为核心的哲学体系。内容由六十四卦的卦象、卦辞和爻辞组成，阐述了宇宙万物的变化规律。该书传入日本后对日本的思想和学术发展产生了重要影响。
  书中原文: 儒家で易経を尊敬し
  网络来源: https://baike.baidu.com/item/%E6%98%93%E7%BB%8F

- 名词: 禅家
  解释: 禅家（ぜんけ）即禅宗，是大乘佛教的一个宗派，主张"不立文字，教外别传，直指人心，见性成佛"的修行方法。禅宗在镰仓时代由中国传入日本，形成临济宗和曹洞宗两大流派，对日本的文化艺术——茶道、花道、建筑、书法——产生了深刻的塑造作用。禅宗的语录如《临济录》是重要的修行指导书。
  书中原文: 禅家で臨済録を尊敬すると一般で全く分らんからである。
  网络来源: https://baike.baidu.com/item/%E7%A6%85%E5%AE%97

- 名词: 臨済録
  解释: 臨済録（りんざいろく）即《临济录》，是中国唐代禅宗高僧临济义玄（？-867）的语录集，由其后人编纂而成。该书是临济宗最重要的经典之一，收录了义玄的示众、勘辨、行录等内容，以其峻烈直截的禅风著称。文中指出禅家尊崇《临济录》却并不真懂其义，借以讽刺主人盲目崇拜难懂之物的心理。
  书中原文: 禅家で臨済録を尊敬すると一般で全く分らんからである。
  网络来源: https://baike.baidu.com/item/%E4%B8%B4%E6%B5%8E%E5%BD%95

- 名词: 巣鴨
  解释: 巣鴨（すがも）是东京都丰岛区的一个地区，以其悠久历史和"老奶奶的原宿"之称而闻名。1903年（明治36年）巣鴨站开业。地名由来有多种说法，最有力的说法是源自"菅面"（すがも，指湿地生长的菅草）。文中天道公平的信件落款为"在巣鴨"，表明其居住地，也使巣鴨作为东京著名地名在文学作品中留下了印记。
  书中原文: 在巣鴨　　天道公平再拝
  网络来源: https://www.nippon.com/hk/japan-topics/c13312/

- 名词: 床の間
  解释: 床の間（とこのま）是日本传统和室中设于墙角的一段抬高空间，用于悬挂挂轴、摆放插花或展示美术品。起源于安土桃山时代，由禅宗僧侣的佛坛演变而来。床之间前的座位是上座，床之内不得踏入。明治时代之后，随着身份制度的废除，床之间从武家上层普及到一般家庭。文中的老人坚持让主人坐在床之间前，体现了传统礼法。
  书中原文: 「さあどうぞあれへ」と床の間の方を指して主人を促がす
  网络来源: https://zh.wikipedia.org/zh-hk/%E5%87%B9%E9%96%93

- 名词: 上段の間
  解释: 上段の間（じょうだんのま）是日本书院造建筑中高出地面一层的空间，原是主君或上位者就座的席位，是身份等级的体现。文中提到主人以前对坐席位置不在意，但听了"床之间的讲释"后了解到上段之间是由上段之间演变而来、是上使所坐之处，从此再也不敢靠近床之间，反映了明治时期残留的座次礼法意识。
  书中原文: その後ある人から床の間の講釈を聞いて、あれは上段の間の変化したもので、上使が坐わる所だと悟って以来決して床の間へは寄りつかない男である。
  网络来源: https://projects.mcah.columbia.edu/jaanus/record/yukachigai

- 名词: 活版
  解释: 活版（かっぱん）即活字印刷技术。明治初期，本木昌造于1869年在长崎成功制作日本最早的近代和文铅活字，开启了日本近代活版印刷业。此后筑地活版制造所等机构大规模生产活字，推动了报纸、杂志、书籍的大量出版。文中指出三封信都是"活版"印刷品（而非手写），暗示寄信人批量发送募捐信，缺乏诚意。
  书中原文: 主人は第二信を取り上げたが「ヤ、これも活版だ」と云った。
  网络来源: https://wenku.baidu.com/view/6e232796f111f18582d05a3e.html

- 名词: 爵禄
  解释: 爵禄（しゃくろく）指爵位和俸禄。明治政府通过1884年《华族令》建立了近代爵位制度（公爵至男爵五等），并配套制定了华族世袭财产法等经济保障措施。爵禄是明治身份制度的核心组成部分。文中天道公平的信中写道"爵禄は一朝にして失うべし"，讽刺荣华富贵不可靠，表达了一种看破世俗的虚无主义态度。
  书中原文: 爵禄は一朝にして失うべし
  网络来源: https://baike.baidu.com/item/%E5%8D%8E%E6%97%8F/2785443

- 名词: 飴ん棒
  解释: 飴ん棒（あめんぼう）是一种棒状的传统日本糖果（駄菓子），由麦芽糖等原料制成，呈红白条纹状。文中用来形容第三封信的信封——红白条纹相间，如"飴ん棒の看板"般华丽。此外，"飴ん棒"也常被用作理发店旋转彩柱（サインポール）的俗称，因其红白蓝三色螺旋条纹与棒糖相似。
  书中原文: 状袋が紅白のだんだらで、飴ん棒の看板のごとくはなやかなる真中に
  网络来源: https://koolearn.com/japdict/wd_13094.html

- 名词: 朝鮮人参
  解释: 朝鮮人参（ちょうせんにんじん）即高丽人参，是原产于朝鲜半岛的珍贵药材，在日本传统医学中被视为滋补强身的珍品。江户时代通过朝鲜通信使等方式传入日本，在武士和上层社会中备受珍视。文中天道公平在信的末尾以讽刺口吻写道"朝鮮に人参多し先生何が故に服せざる"（朝鲜人参很多，先生为何不服食？），暗讽苦沙弥先生应该补补身体和头脑。
  书中原文: 朝鮮に人参多し先生何が故に服せざる
  网络来源: https://baike.baidu.com/item/%E9%AB%98%E4%B8%BD%E5%8F%82

- 名词: 西江の水
  解释: 西江の水（せいこうのみず）出自唐代诗人顾况的《古离别》："西江上，风动麻姑嫁时浪。西山为水水为尘，不是人间离别人。"诗中西江指江西省的盱江，麻姑是道教传说中的仙女，曾自述三次见到东海变为桑田。通过"西江之水"的意象，表达了自然变幻之宏大远超人间别离的意境。文中天道公平以此开头，抒发了一种超然物外的哲学感慨。
  书中原文: 若し我を以て天地を律すれば一口にして西江の水を吸いつくすべく
  网络来源: https://www.gushiwen.cn/mingju/juv_07f46497ebe2.aspx

- 名词: 陌上の塵
  解释: 陌上の塵（はくじょうのちり）意即田间小路上的尘土，比喻人世间渺小、微不足道的存在。与"西江の水"形成对仗——水代表浩大永恒，尘代表卑微短暂。文中天道公平写道"若し天地を以て我を律すれば我は則ち陌上の塵のみ"——如果以天地为标准来衡量我，我就不过是田间的一粒尘土而已，表现出一种道家庄子式的齐物思想。
  书中原文: 若し天地を以て我を律すれば我は則ち陌上の塵のみ
  网络来源: https://www.gushiwen.cn/mingju/juv_07f46497ebe2.aspx

- 名词: 大日本女子裁縫最高等大学院
  解释: 大日本女子裁縫最高等大学院（だいにほんじょしさいほうさいこうとうだいがくいん）是夏目漱石在小说中虚构的荒诞校名。校长缝田针作自称"大日本女子裁縫最高等大学院"校长，并以推销《裁縫秘術綱要》的方式筹集校舍建设费。漱石通过这一夸张命名讽刺了明治时期大量涌现的名不副实的私立学校和教育机构的浮夸风气——用宏大冠冕的名称掩盖内容的空虚。
  书中原文: 大日本女子裁縫最高等大学院　　　校長　　縫田針作九拝
  网络来源: https://baike.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392
