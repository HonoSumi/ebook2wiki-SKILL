- 名词: 叶卡捷琳娜
  解释: |
    指叶卡捷琳娜二世·阿列克谢耶芙娜（1729—1796），即叶卡捷琳娜大帝，
    俄罗斯历史上唯一被冠以"大帝"之名的女皇，在位34年（1762—1796）。
    她通过政变推翻丈夫彼得三世后即位，实行"开明专制"政策，与伏尔泰、
    狄德罗等启蒙思想家通信，同时三次参与瓜分波兰、两次对土耳其战争，
    将克里米亚和黑海出海口纳入俄国版图。文中"伟大的叶卡捷琳娜的孙子"
    指亚历山大一世，即叶卡捷琳娜二世之孙。
  书中原文: |
    波拿巴竟然同欧洲所有君主平起平坐，特别是同我们的皇上，伟大的叶卡捷琳娜的孙子，
    平起平坐，一想到这里他就受不了！
  网络来源: |
    https://baike.baidu.com/item/%E5%8F%B6%E5%8D%A1%E6%8D%B7%E7%90%B3%E5%A8%9C%E4%BA%8C%E4%B8%96
    https://zh.wikipedia.org/zh-hans/%E5%8F%B6%E5%8D%A1%E6%8D%B7%E7%90%B3%E5%A8%9C%E4%BA%8C%E4%B8%96

- 名词: 科季利翁舞
  解释: |
    科季利翁舞（Cotillion / Cotillon）是一种起源于18世纪法国的社交舞蹈，
    字面意为"衬裙舞"。最初由四对舞伴站成方形队形进行，19世纪演变为
    大型集体双人舞，由擅长舞蹈的一人做指挥，跳时不断更换舞伴，
    一般作为舞会的最后节目。在19世纪传入英国、德国和美国，
    在美国后来逐渐演变为指代正式的社交舞会或少女成人礼舞会。
  书中原文: |
    科季利翁舞，十九世纪一种大型集体双人舞，由擅长舞蹈的一人做指挥，
    跳时不断更换舞伴，一般作为舞会的最后节目。
  网络来源: |
    https://baike.baidu.com/item/cotillion/52734070
    https://en.wikipedia.org/wiki/Cotillion

- 名词: 圣经
  解释: |
    圣经（Bible）是犹太教与基督教最重要的经典，源自希腊语"τὰ βιβλία"，
    本义为"书"。基督教圣经由《旧约全书》和《新约全书》两部分组成，
    共66卷（新教），成书前后跨越约1300年，由约40位不同身份的作者写成。
    《旧约》用希伯来文写成，记载犹太民族的历史、律法和先知预言；
    《新约》用希腊文写成，记载耶稣基督及其使徒的言行。
    文中引用了《圣经·新约·马太福音》的多处经文。
  书中原文: |
    《圣经》传说讲：不劳动——安闲自在，是第一个人在没有堕落之前享福的条件。
    在堕落的人身上仍然有好逸恶劳的习性。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/Bible
    https://baike.baidu.com/item/%E5%9C%A3%E7%BB%8F

- 名词: 忏悔师
  解释: |
    忏悔师（духовник / spiritual father），在东正教传统中指听取信徒告解、
    引导信徒灵性生命的司铎（神父），也称作"属灵父亲"或"灵性导师"。
    忏悔师不仅听取信徒的忏悔，更帮助信徒在灵命上成长，走向谦卑与成圣之路。
    在东正教中，忏悔师通常由教会主教赋权、灵性成熟的神父担任。
    文中玛丽亚公爵小姐将她的打算告诉了"忏悔师修道士阿金菲神甫"。
  书中原文: |
    她把她这个打算只告诉了忏悔师修道士阿金菲神甫，忏悔师称赞她的志向。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E7%B2%BE%E4%BF%AE%E8%81%96%E4%BA%BA
    https://theological.asia/differences-between-spiritual-father-and-god-fathermother/

- 名词: 树皮鞋
  解释: |
    树皮鞋（лапти / bast shoes）是俄罗斯传统鞋履，用椴树、桦树、榆树
    等树木韧皮纤维编织而成。因材料廉价易得，历史上主要由贫困农民穿着，
    一直流行到20世纪初的俄罗斯乡村。树皮鞋制作简单但不耐用，
    现主要作为旅游纪念品或民族服装的一部分。俄语中"лапоть"
    也用作贬义词，指廉价物品或没受过教育的人。
    文中玛丽亚公爵小姐为巡礼储备了树皮鞋作为行装。
  书中原文: |
    托辞送给巡礼者礼物，玛丽亚公爵小姐储备了全套的巡礼者行装：
    粗布衬衫、树皮鞋、长袍和黑头巾。
  网络来源: |
    https://fushiyi.cn/39054.html
    https://en.wikipedia.org/wiki/Bast_shoe

- 名词: 铁链
  解释: |
    铁链（вериги）在东正教苦修传统中指修士为克制肉体、表示虔诚而
    自愿佩戴在身上的铁制链条或镣铐。这种苦修实践（подвиг ношения вериг）
    主要出现在中世纪俄罗斯东正教修道院中，著名的实践者包括鲍里索格列布斯克
    修道院的圣伊里纳尔赫（1548—1616）和萨罗夫的圣塞拉芬。
    文中女巡礼者费多秀什卡"脖子挂着铁链"，表明她长期从事苦修。
  书中原文: |
    有一个名叫费多秀什卡的女巡礼者，五十岁，小个子，沉默寡言，满脸麻子，
    她打着赤脚，脖子挂着铁链，已经巡行三十年了。
  网络来源: |
    https://obitel-minsk.org/en/the-precious-chains-of-apostle-peter
    https://www.mediastorehouse.co.uk/heritage-images/venerable-irinarkhs-cap-lash-fetters-38074864.html

- 名词: 俄瑞战争(1808—1809)
  解释: |
    1808—1809年的俄瑞战争，又称芬兰战争，是俄罗斯帝国与瑞典帝国之间
    为争夺芬兰地区而爆发的战争。1807年拿破仑与沙皇亚历山大一世签订
    《提尔西特和约》后，俄国要求瑞典加入大陆封锁体系遭拒，遂于
    1808年2月入侵瑞典属芬兰。经过一年多战斗，俄军最终获胜，
    1809年9月17日双方签订《弗雷德里克港和约》，
    瑞典将芬兰全境、奥兰群岛等地割让给俄国。
    俄国在其上建立芬兰大公国，由沙皇兼任大公。
  书中原文: |
    一八〇八年俄国与瑞典争夺芬兰的战争。
  网络来源: |
    https://baike.baidu.com/item/%E8%8A%AC%E5%85%B0%E6%88%98%E4%BA%89
    https://zh.wikipedia.org/zh-tw/%E8%8A%AC%E8%98%AD%E6%88%B0%E7%88%AD
