- 名词: 米绍
  解释: 亚历山大·弗朗采维奇·米绍（Alexandre Michaud de Beauretour，1771—1841），法裔俄国将军，伯爵。生于尼斯（当时属撒丁王国），原在撒丁军队任工程军官，后转入俄军服役，成为沙皇亚历山大一世的侍从武官兼军事顾问。1812年拿破仑入侵俄国期间，米绍以侍从武官身份随侍皇帝左右，参与了德里萨阵地的视察和军事会议。他多次执行沙皇的秘密外交使命，1825年曾作为亚历山大一世特使赴罗马与教皇利奥十二世谈判东西教会合并事宜。晚年退休居于巴勒莫。
  书中原文: >
    「这天早晨，米绍上校陪同皇帝视察德里萨工事，他向皇帝证明说，普弗尔所构筑的这个防御阵地，被认为是空前的战术杰作，它可以致拿破仑于死地，其实，这个阵地毫无意义，是俄国军队的坟墓。」「被邀请出席这次非正式会议的有：瑞典将军阿姆菲尔德，侍从武官沃尔佐根，温岑格罗德——就是拿破仑称之为法国逃亡者的那个人，米绍，托尔，完全不是军人的施泰因伯爵，最后是普弗尔本人」
  网络来源: https://en.wikipedia.org/wiki/Alexandre_Michaud_de_Beauretour

- 名词: 切尔内绍夫
  解释: 亚历山大·伊万诺维奇·切尔内绍夫（Александр Иванович Чернышёв，1786—1857），俄国骑兵上将、亲王，拿破仑战争期间杰出的情报官和骑兵指挥官。1805年参加奥斯特利茨战役，1808—1811年任俄国驻巴黎武官，实际负责对法情报工作，收买法国总参谋部文员定期获取法军兵力部署情报。1812年率1800人的机动支队深入华沙公国袭扰法军后勤。1813年成为第一个攻入柏林的俄军将领。战后历任陆军大臣（1827—1852）、国务会议主席（1848—1856），是尼古拉一世时期俄国军事体系的核心人物。克里米亚战争失败后解职。
  书中原文: >
    「皇帝的侍从武官长切尔内绍夫接待博尔孔斯基，对他说，皇帝带领贝尼格森和保罗西今天第二次视察德里萨阵地工事」「切尔内绍夫在一进门的房间里，坐在窗口看法国小说。这个房间从前大概是个大厅；屋里还有一架风琴，风琴上堆着一些地毯，墙角放着贝尼格森的副官的行军床。」
  网络来源: https://en.wikipedia.org/wiki/Alexander_Chernyshyov

- 名词: 托尔
  解释: 卡尔·威廉·冯·托尔伯爵（Karl Wilhelm von Toll，1777—1842），俄军步兵上将，波罗的海德意志贵族出身。曾参与苏沃洛夫1799年瑞士远征和1805年奥斯特利茨战役。1812年卫国战争期间任第一西方军团总军需官（相当于参谋长），参与斯摩棱斯克军事会议并坚持进攻主张，后指挥莫斯科撤退行动。1813年参加莱比锡战役。1829年俄土战争中任总参谋长，因库列夫恰战役胜利晋封伯爵。1833年任交通大臣，致力于交通工程学院建设。
  书中原文: >
    「年轻的上校托尔比别人都热烈地反对瑞典将军的意见，在争论的当儿，他从衣兜里掏出写满字迹的笔记本，请求让他念一遍。托尔从长篇大论的笔记中提出一个与阿姆菲尔德和普弗尔完全不同的作战计划。」
  网络来源: https://military-history.fandom.com/wiki/Karl_Wilhelm_von_Toll

- 名词: 沃尔孔斯基
  解释: 彼得·米哈伊洛维奇·沃尔孔斯基公爵（Пётр Миха́йлович Волко́нский，1776—1852），俄国陆军元帅，被称为「俄国总参谋部之父」。1805年奥斯特利茨战役中因夺回军旗和火炮获三级圣乔治勋章。1807年《蒂尔西特和约》后被亚历山大一世派往法国考察参谋体制，1810年回国后主持重建俄军总参谋部体系，创建军校培养参谋军官和军事地形图库。1812年卫国战争中建议放弃德里萨阵地，促成俄军成功撤退。1813年先后任库图佐夫的参谋长和亚历山大一世的参谋长，后参加维也纳会议。1815年任俄军首任总参谋长。1843年晋升陆军元帅。
  书中原文: >
    「彼得·米哈伊洛维奇·沃尔孔斯基公爵担任类似皇帝的参谋长的职务。」「他带着一卷地图从书房出来，走进客厅，把地图摊在桌上，转达了几个问题，想听听与会诸位对这些问题的意见。」「彼得·米哈伊洛维奇·沃尔孔斯基公爵、施泰因男爵跟着他走进去，把门带上。」
  网络来源: https://en.wikipedia.org/wiki/Pyotr_Volkonsky
