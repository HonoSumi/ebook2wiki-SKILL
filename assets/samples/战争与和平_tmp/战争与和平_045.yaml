- 名词: 皇帝万岁
  解释: |
    法语"Vive l'Empereur"的中文翻译，意为"皇帝万岁"，是拿破仑军队的标志性欢呼口号。
    在俄国历史背景中，这一口号象征着拿破仑的个人崇拜和法军的战争狂热。托尔斯泰在《战争与和平》
    中多次使用这一口号（保留法语原文"Vive l'Empereur"），以此表现拿破仑军队的集体狂热和战争
    的非理性本质。在本章中，罗斯托夫在奥斯特利茨战役前夜于侦察线上听到法军阵地上传来此起彼伏
    的"皇帝万岁"呐喊声和火光，这既预示了即将到来的大战，也让罗斯托夫感到莫名的激动。此后在
    涅曼河渡河场景、提尔西特和约签订场景中，托尔斯泰均以这一口号为切入点，反思战争的意义和
    个人在历史洪流中的无力感。
  书中原文: |
    "皇帝万岁，皇帝！"罗斯托夫现在已经听得很清楚了。
  网络来源: |
    https://zh.wikipedia.org/wiki/战争与和平
    https://www.bilibili.com/video/BV1nxD8ByEVm/
- 名词: 特维尔大街
  解释: |
    俄语Тверская улица，莫斯科最著名的核心街道之一，南起驯马场广场（靠近红场），向西北方向
    延伸至花园环路，全长约1.6公里，有"莫斯科的长安街"之称。早在12世纪就已形成道路，最初是
    通往特维尔公国的商道；17世纪成为莫斯科贵族的聚居地。1932年至1990年间曾更名为"高尔基大街"。
    在《战争与和平》中，特维尔大街作为莫斯科贵族活动的重要场所多次出现。本章中，罗斯托夫在
    阵前困倦时朦胧回忆起"留胡子的骠骑兵在特维尔大街上走，就在古里耶夫家对面"，这是典型的意识
    流写法，通过罗斯托夫的半梦半醒状态将前线与莫斯科日常生活的记忆交织在一起。特维尔大街也是
    托尔斯泰本人及其同时代作家（如契诃夫、普希金、布尔加科夫）笔下常出现的莫斯科地标。
  书中原文: |
    "那个留胡子的骠骑兵在特维尔大街上走，就在古里耶夫家对面，我还想到他呢……"
  网络来源: |
