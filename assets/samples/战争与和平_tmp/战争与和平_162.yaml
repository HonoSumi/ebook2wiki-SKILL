- 名词: 弗洛拉和拉夫拉
  解释: |
    弗洛拉（Florus/Флор）和拉夫拉（Laurus/Лавр）是公元2世纪的基督教殉道者，一对双胞胎兄弟，来自拜占庭，职业为石匠。在伊利里亚（今巴尔干地区）为信仰殉道，被投入枯井活埋。在东正教（尤其是斯拉夫传统）中，他们被尊为马匹和骑手的守护圣徒，有"马神"之称。纪念日为儒略历8月18日/公历8月31日，这一天在俄罗斯民间被称为"马节"（Конский праздник），农民会带马到教堂接受祝福，禁止让马干活。
  书中原文: |
    "主，耶稣·基督，圣徒尼古拉，弗洛拉和拉夫拉，主耶稣·基督，圣徒尼古拉！弗洛拉和拉夫拉，主耶稣·基督，怜悯我们，保佑我们！"他结束道，深深一鞠躬，站起来，叹了口气，又在干草上坐下。"弗洛拉和拉夫拉，是怎么回事？""当然得念啦，"普拉东很快地回答，"他们是马神，对牲畜也要怜悯。"
  网络来源: |
    圣弗洛拉和圣拉夫拉是东正教圣徒，被称为马匹守护神。8月31日为俄国民间"马节"（弗罗洛夫日），农民会带马到教堂接受洒圣水祝福。2014年起俄罗斯农业部将这一天定为兽医节。他们的圣像常描绘天使长米迦勒将马群托付给他们照管的场景。
