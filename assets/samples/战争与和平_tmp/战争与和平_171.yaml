- 名词: 谢尔比宁
  解释: >
    亚历山大·安德烈耶维奇·谢尔比宁（Александр Андреевич Щербинин），
    俄国军官，1812年卫国战争期间担任彼得·彼得罗维奇·科诺夫尼岑将军的
    副官。在《战争与和平》中作为配角出现，负责接收和传递军情。他在晚年
    对托尔斯泰的《战争与和平》提出批评，认为小说在许多方面歪曲了历史事实。
  书中原文: >
    "这个人是科诺夫尼岑的副官谢尔比宁。""找到了，找到了。"他又说。
    勤务兵打着了火，谢尔比宁在摸烛台。"咳，肮脏的东西。"他厌恶地说。
  网络来源: >
    谢尔比宁是四位公开对《战争与和平》发表评论的1812年战争老兵之一，
    其留下的笔记和信件收录于《莫斯科大学俄罗斯历史与古文献学会读物》。

- 名词: 斯塔埃尔夫人
  解释: >
    安娜·路易丝·日尔曼娜·德·斯塔埃尔-霍尔斯泰因
    （Anne Louise Germaine de Staël-Holstein，1766—1817），通称斯塔埃尔夫人，
    法国浪漫主义时期重要作家、政治思想家，著有《论文学》《论德国》《柯丽娜》等。
    因与拿破仑长期不合而被迫流亡，1812年经奥地利、波兰进入俄国，受到亚历山大一世
    接见。著有《十年流亡》记述在俄经历。
  书中原文: >
    "他和参谋人员谈话，他从塔鲁丁诺给斯塔埃尔夫人写信，读小说，颁发奖章，
    与彼得堡通信，等等，都是属于日常例行事务。"
  网络来源: >
    斯塔埃尔夫人是法国浪漫主义文学先驱，
    其《十年流亡》详细记录了1812年在俄国的经历。

- 名词: 穆顿
  解释: >
    乔治·穆顿（Georges Mouton，1770—1838），拿破仑时期的法国将军，
    后封洛博伯爵（Comte de Lobau）。1812年征俄战争中参与小雅罗斯拉维茨战役。
    在小雅罗斯拉维茨军事会议上，他直言"只有尽快逃跑"，点破了全军已意识到的绝境，
    促使拿破仑最终下令向斯摩棱斯克大路撤退。
    后在1815年滑铁卢战役中指挥帝国近卫军。
  书中原文: >
    "老实憨直的军人穆顿说出了大家心里的话——只有尽快逃跑，
    他这个最后的意见一下子堵住了大家的嘴，没有一个人，甚至拿破仑，
    都说不出什么来反对这个大家都意识到的真理。"
  网络来源: >
    穆顿在1812年小雅罗斯拉维茨会议上直言撤退，
    标志着拿破仑大军从战略进攻转向狼狈溃逃的转折点。

- 名词: 梅德内
  解释: >
    梅德内（Медынь / Medyn），今译梅登，俄罗斯卡卢加州北部城市，
    位于梅登卡河沿岸，距卡卢加西北约55公里。最早于1386年见于史籍，
    1776年正式设市。1812年卫国战争期间，10月13日
    （小雅罗斯拉维茨战役后次日），俄军哥萨克分队在此击败法军
    波尼亚托夫斯基军团先头部队，影响了拿破仑撤退路线的选择。
  书中原文: >
    "库图佐夫甚至想到拿破仑的军队可能退回梅德内和尤赫诺夫；
    但是他未能预见那件已经成为事实的事，那就是拿破仑在离开莫斯科的头十一天
    疯狂地、抽风似地、不停歇地逃窜"
  网络来源: >
    梅德内最早记载于1386年，1812年10月13日
    哥萨克在此击败法军先头部队。

- 名词: 别尔捷列米
  解释: >
    别尔捷列米（Бертельми / Berthelmi），法国方面派往俄军统帅部的信使
    或外交联络官，具体身份存在多种说法。在《战争与和平》中，他与洛里斯顿
    （Lauriston）并列，作为库图佐夫获取拿破仑军队动向情报的来源之一。
    拿破仑在占领莫斯科期间曾多次尝试与俄方和谈，
    先后派洛里斯顿等人前往俄军营地传递信件。
  书中原文: >
    "现在，根据洛里斯顿和别尔捷列米送来的情报，同时根据游击队的报告，
    库图佐夫差不多可以断定它是受了致命的伤。但是还需要证据，还要等一等。"
  网络来源: >
    别尔捷列米是拿破仑占领莫斯科期间派往俄军营地尝试和谈的使节之一，
    其具体身份在历史记载中较为模糊。
