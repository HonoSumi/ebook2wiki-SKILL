    https://baike.baidu.com/item/%E7%B1%B3%E5%93%88%E4%BC%8A%E5%B0%94%C2%B7%E7%B1%B3%E5%93%88%E4%BC%8A%E6%B4%9B%E7%BB%B4%E5%A5%87%C2%B7%E6%96%AF%E4%BD%A9%E5%85%B0%E6%96%AF%E5%9F%BA

- 名词: 孟德斯鸠
  解释: |
    夏尔·路易·德·塞孔达，拉布雷德与孟德斯鸠男爵（1689—1755），法国启蒙运动时期思想家、法学家，
    西方国家学说和法学理论的奠基人。与伏尔泰、卢梭并称"法国启蒙运动三杰"。
    代表作《论法的精神》（1748年）提出了"三权分立"学说，主张立法、行政、司法三权相互独立和制衡，
    该思想深刻影响了现代民主国家政治制度的构建。孟德斯鸠还认为君主政体的基础是荣誉。
  书中原文: |
    我是孟德斯鸠的崇拜者，安德烈公爵说，他的思想是君主政体的基础是荣誉，我觉得这是无可怀疑的。
    在我看来，贵族的某些权利和特权是支持这种荣誉感的手段。
  网络来源: |
    https://baike.baidu.com/item/%E5%AD%9F%E5%BE%B7%E6%96%AF%E9%B8%A0
    https://www.worldhistory.org/trans/zh/1-22386/

- 名词: 国务大臣
  解释: |
    指米哈伊尔·米哈伊洛维奇·斯佩兰斯基（1772—1839），俄国亚历山大一世时期最伟大的改革家，被称为"俄国自由主义之父"。
    他出身平民（乡村牧师之子），靠个人才能晋升为帝国最高官员。
    1808年起成为沙皇亚历山大一世的首席顾问，1810年推动成立国务会议并担任国务秘书，实际上是皇帝之下权力最大的官员。
    他主持了多项改革，包括文官考试制度、财政整顿、法律编纂等。
  书中原文: |
    这就是斯佩兰斯基，国务大臣，皇帝耳目，他在埃尔富特伴驾时，曾不止一次地与拿破仑会见和谈话。
  网络来源: |
    https://zh.wikipedia.org/zh-sg/%E7%B1%B3%E5%93%88%E4%BC%8A%E7%88%BE%C2%B7%E7%B1%B3%E5%93%88%E4%BC%8A%E6%B4%9B%E7%B6%AD%E5%A5%87%C2%B7%E6%96%AF%E4%BD%A9%E8%98%AD%E6%96%AF%E5%9F%BA
