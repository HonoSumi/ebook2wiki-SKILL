- 名词: 马格尼茨基
  解释: |
    米哈伊尔·列昂季耶维奇·马格尼茨基（1778—1855），俄国政治家，斯佩兰斯基改革时期的亲密助手和得力干将。
    他在亚历山大一世时期参与立法与教育改革工作，在小说中担任陆军条例委员会主任。1812年斯佩兰斯基被贬谪后，马格尼茨基也随之失势，被流放。
  书中原文: |
    陆军条例委员会主任马格尼茨基先生是我的好朋友，他说，他把每个音节每个字都说得很清楚，如果您愿意，我可以介绍您见见他。
  网络来源: |
