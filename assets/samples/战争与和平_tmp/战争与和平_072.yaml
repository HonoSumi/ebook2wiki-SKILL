- 名词: 荣誉团
  解释: |
    法国荣誉军团勋章（Légion d'honneur），由拿破仑·波拿巴于1802年5月19日创立，是法国政府颁授的最高荣誉勋位勋章。
    拿破仑设立此勋位，旨在建立新的荣衔制度以强化统治合法性，替代法国大革命后被废除的波旁王朝旧勋章。
    荣誉军团不分军职与文职，用以表彰对国家有功的军人或平民。其格言为"Honneur et patrie"（荣誉与祖国）。
    小说中斯佩兰斯基以此为例，论证以荣誉为竞赛原动力的制度对公务有益。
  书中原文: |
    这个维持荣誉、维持竞赛原动力的制度，类似伟大的拿破仑皇帝的荣誉团，对公务不惟无害，而且有益，不过不是一个阶层或宫廷内的特权罢了。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/%E6%B3%95%E5%9B%BD%E8%8D%A3%E8%AA%89%E5%86%9B%E5%9B%A2%E5%8B%8B%E7%AB%A0
    https://baike.baidu.com/item/%E6%B3%95%E5%9B%BD%E8%8D%A3%E8%AA%89%E5%86%9B%E5%9B%A2%E5%8B%8B%E7%AB%A0

- 名词: 宫中官阶
  解释: |
    指俄国彼得大帝于1722年颁布的《官秩表》（Табель о рангах），是一套系统性的官阶制度，涵盖军队、政府和宫廷三大领域，
    共14个等级。1809年亚历山大一世时期，斯佩兰斯基主持颁布了关于宫中官阶的新法令（即《宫廷高级侍从法》），
    规定宫廷侍从官衔必须从低级开始逐级晋升，不得凭出身直接获得高官厚爵。这一措施触犯了许多贵族利益，
    引发了大量闲言碎语和非难。安德烈公爵的父亲因此不愿让儿子利用特权从高级官衔开始服务。
  书中原文: |
    关于宫中官阶的新法令曾引起很多闲言碎语，而您并不因此把自己看作受了委屈的侍从。
  网络来源: |
    https://zh.wikipedia.org/zh-hk/%E5%AE%98%E7%A7%A9%E8%A1%A8

- 名词: 陆军条例委员会
  解释: |
    19世纪初俄国斯佩兰斯基改革时期设立的军法编纂机构，负责制定和修订俄国陆军军事法规。
    小说中阿拉克切耶夫将安德烈公爵的军事法规草案批转给该委员会，
    斯佩兰斯基随后介绍委员会主任马格尼茨基与安德烈公爵相识，
    安德烈公爵最终被任命为该委员会的委员（无薪俸）。
  书中原文: |
    交给陆军条例委员会，我并且推荐阁下当委员。不过没有薪俸。
  网络来源: |
    https://baike.baidu.com/item/%E7%B1%B3%E5%93%88%E4%BC%8A%E5%B0%94%C2%B7%E7%B1%B3%E5%93%88%E4%BC%8A%E6%B4%9B%E7%BB%B4%E5%A5%87%C2%B7%E6%96%AF%E4%BD%A9%E5%85%B0%E6%96%AF%E5%9F%BA

- 名词: 西拉·安德烈伊奇
  解释: |
    俄国陆军大臣阿拉克切耶夫伯爵（阿列克谢·安德烈耶维奇·阿拉克切耶夫，1769—1834）的绰号/戏称。
    "西拉"（Сила）在俄语中意为"力量"或"权力"，贵族圈中以这个绰号讽刺其以严苛、铁腕著称的作风。
    阿拉克切耶夫是沙皇亚历山大一世时期的实权人物，以残酷和保守闻名。
    在小说中，科丘别伊伯爵也用这个绰号称呼阿拉克切耶夫，带有含蓄的嘲讽意味。
  书中原文: |
    安德烈公爵听见"西拉·安德烈伊奇"这个绰号和"老头子要剋人的"这句话，老头子是指阿拉克切耶夫伯爵。
  网络来源: |
    https://zh.m.wikipedia.org/zh-mo/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8
