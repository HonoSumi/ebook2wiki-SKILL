- 名词: 英吉利饭店
  解释: |
    19世纪初莫斯科著名的豪华饭店和社交场所（俄语：Английская гостиница / Hotel Angleterre），位于莫斯科市中心，是贵族军官们经常聚会、宴饮和赌博的高档场所。在《战争与和平》中，多洛霍夫在此包下最阔绰的房间设宴赌局，设下圈套引诱尼古拉·罗斯托夫参赌，最终导致罗斯托夫输掉四万三千卢布的巨款，成为小说中揭示贵族奢靡堕落生活的重要场景。
  书中原文: |
    "由于您已知的原因，我不愿前往贵府，而且我即将归队，因此今晚特约友好数人，设宴话别，请即来英吉利饭店一晤。"
  网络来源: |
    https://wapbaike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/9134429

- 名词: 伊柳什卡
  解释: |
    小说中莫斯科著名的茨冈（吉卜赛）合唱团领唱和舞者。在19世纪初的俄国贵族文化中，茨冈歌舞是一种流行的贵族娱乐形式。伊柳什卡据书中人物设定曾在奥尔洛夫伯爵家跳舞，常被贵族邀请在宴饮和狂欢场合表演。在小说此章节中，多洛霍夫在英吉利饭店设赌局时邀请了伊柳什卡及其茨冈歌唱队前来助兴，烘托了莫斯科贵族放荡不羁的社交氛围。
  书中原文: |
    "好久不见，他说，谢谢你光临。我这就散完牌，一会儿伊柳什卡带着歌唱队也要来。"
  网络来源: |
    https://book.douban.com/review/15253782/
    https://wapbaike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/9134429

- 名词: 阿姆施特滕桥
  解释: |
    指1805年11月5日（俄历10月24日）发生在奥地利阿姆施特滕（Amstetten）附近的一场俄法后卫战，属于第三次反法同盟战争的一部分。当时库图佐夫率领俄军向维也纳方向撤退，巴格拉季昂将军率部在此阻击缪拉元帅指挥的法军。尼古拉·罗斯托夫曾在此参战。在小说此章节中，罗斯托夫在赌局中陷入绝境时回忆起他在阿姆施特滕桥上祈祷上帝的情景，将战场的生死考验与赌场的心理煎熬形成对照。
  书中原文: |
    "尼古拉顺从了他，他时而祈祷上帝，就像他在战场上、在阿姆施特滕桥上那样祈祷上帝，时而认为随便从桌子下面捡一张折坏的牌可以搭救他。"
  网络来源: |
    https://military-history.fandom.com/wiki/Battle_of_Amstetten
    https://www.jianshu.com/p/cd283b8edd6c
