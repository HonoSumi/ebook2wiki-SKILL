- 名词: 查理十二
  解释: 查理十二世（卡尔十二世，1682-1718），瑞典瓦萨王朝国王（1697-1718年在位），著名军事统帅，终身未婚。大北方战争初期连败丹麦、俄国、波兰-萨克森联军，1700年纳尔瓦战役以8000人大破俄军数万。1707年东征俄国，遭彼得一世坚壁清野战术，1709年在波尔塔瓦战役中惨败，逃亡奥斯曼帝国。1714年乔装潜回瑞典，1718年征挪威时阵亡，年36岁。伏尔泰曾为其作传。他的败亡使瑞典由北欧霸主沦为二流国家，俄国则崛起为欧洲列强。
  书中原文: "有一条查理十二选择的通到波尔塔瓦的路"
  网络来源: 百度百科 https://wapbaike.baidu.com/item/%E5%8D%A1%E5%B0%94%E5%8D%81%E4%BA%8C%E4%B8%96/2005281 | 维基百科 https://zh.wikipedia.org/zh-my/%E5%8D%A1%E7%88%BE%E5%8D%81%E4%BA%8C%E4%B8%96

- 名词: 波尔塔瓦
  解释: 波尔塔瓦（Poltava），乌克兰东部城市，位于沃尔斯克拉河畔。1709年6月27日（俄历）/7月8日（新历），彼得大帝率领的俄军在此大败查理十二世率领的瑞典军队，史称波尔塔瓦战役。此役俄军投入约7.5万人、102门火炮，瑞典军约3万人、34门火炮。战役以俄军决定性胜利告终，瑞典军阵亡约6900人，残部1.6万人投降。此战终结了瑞典的欧洲强国地位，标志着俄罗斯帝国崛起为欧洲列强，是大北方战争（1700-1721）的转折点。
  书中原文: "有一条查理十二选择的通到波尔塔瓦的路"
  网络来源: 百度百科 https://wapbaike.baidu.com/item/%E6%B3%A2%E5%B0%94%E5%A1%94%E7%93%A6%E4%BC%9A%E6%88%98/7095582 | Britannica https://www.britannica.com/event/Battle-of-Poltava

- 名词: 符腾堡
  解释: 符腾堡（Württemberg），德国西南部历史邦国，今属巴登-符腾堡州，首府斯图加特。约1080年建伯爵领地，1495年升为公国。1803年拿破仑战争中升为选侯国，1806年升为符腾堡王国。1871年以自治王国身份加入德意志帝国。1918年君主制垮台后成为自由州，1952年与巴登合并为巴登-符腾堡州。拿破仑战争时期，符腾堡因与法国结盟而领土扩张并升格为王国。书中拿破仑威胁要将亚历山大皇帝的符腾堡亲属赶出德国，暗指符腾堡国王弗里德里希一世是俄国皇室的姻亲。
  书中原文: "我一定把他的亲属、符腾堡的、巴顿的、魏玛的亲属统统从德国赶走"
  网络来源: 百度百科 https://wapbaike.baidu.com/item/%E7%AC%A6%E8%85%BE%E5%A0%A1 | 维基百科 https://zh.wikipedia.org/zh-hant/%E7%AC%A6%E9%A8%B0%E5%A0%A1%E7%8E%8B%E5%9C%8B

- 名词: 巴登
  解释: 巴登（Baden），德国西南部历史邦国，今属巴登-符腾堡州，首府卡尔斯鲁厄。12世纪由宰林根王朝建立为边区伯国。1803年升为选侯国，1806年升为巴登大公国，加入莱茵邦联。1815年加入德意志邦联，1871年加入德意志帝国。1918年君主制垮台后成为巴登共和国，1952年与符腾堡合并。书中"巴顿"为译者对"Baden"的音译。拿破仑战争期间，巴登大公国因与法国结盟而获得领土扩张，末代大公弗里德里希二世于1918年退位。
  书中原文: "我一定把他的亲属、符腾堡的、巴顿的、魏玛的亲属统统从德国赶走（书中巴顿即巴登）"
  网络来源: 百度百科 https://wapbaike.baidu.com/item/%E5%B7%B4%E7%99%BB/70220 | 维基百科 https://zh.wikipedia.org/zh-cn/%E5%B7%B4%E7%99%BB%E5%A4%A7%E5%85%AC%E5%9C%8B

- 名词: 魏玛
  解释: 魏玛（Weimar），德国图林根州城市，历史上为萨克森-魏玛公国都城。975年首见史册，1547年起成为公国都城。18-19世纪因歌德（1775年起在此生活57年）和席勒的创作活动而成为德国古典主义文学中心，史称"魏玛古典主义"。李斯特曾任宫廷乐长。1919年德国国民议会在魏玛通过《魏玛宪法》，建立魏玛共和国。同年包豪斯学校在魏玛成立。1998年"古典魏玛"被列入联合国教科文组织世界文化遗产，1999年获评欧洲文化之都。书中拿破仑威胁驱逐亚历山大皇帝的魏玛亲属，系指萨克森-魏玛-艾森纳赫大公卡尔·奥古斯特。
  书中原文: "我一定把他的亲属、符腾堡的、巴顿的、魏玛的亲属统统从德国赶走"
  网络来源: 百度百科 https://wapbaike.baidu.com/item/%E9%AD%8F%E7%8E%9B%E5%B8%82 | 维基百科 https://zh.wikipedia.org/zh-hant/Special:MyLanguage/%E5%A8%81%E7%91%AA

- 名词: 塞弗尔
  解释: 塞弗尔（Sèvres），法国巴黎西南郊城市，以塞弗尔国家陶瓷制造局闻名于世。该厂1740年创建于万塞讷，1756年迁至塞弗尔，路易十五国王和蓬巴杜夫人是重要推动者。1759年正式成为法国皇家陶瓷厂。以青金石蓝和天蓝釉色著称，洛可可风格瓷器享誉欧洲，裸瓷雕塑工艺独特。拿破仑时期新古典主义风格达到顶峰。至今仍在运营，与赵无极等国际艺术家合作，是代表法国瓷器工艺最高水准的国家级制造厂。书中"塞弗尔咖啡杯"是拿破仑宴请巴拉舍夫时使用的皇家瓷器。
  书中原文: "拿破仑坐下来，抚摸着塞弗尔咖啡杯，让巴拉舍夫坐在他身旁的椅子上。"
  网络来源: 维基百科 https://zh.m.wikipedia.org/zh-hk/%E5%A1%9E%E5%A4%AB%E5%B0%94%E5%9B%BD%E5%AE%B6%E5%88%B6%E9%80%A0%E5%8E%82 | 百度百科 https://www.zgbk.com/ecph/words?SiteID=1&ID=519277&Type=bkztb&SubID=875

- 名词: 布加勒斯特
  解释: 布加勒斯特（Bucharest），罗马尼亚首都和最大城市，位于罗马尼亚东南部瓦拉几亚平原，登博维察河畔。1459年首次见于文献。1659年成为瓦拉几亚公国首府。1862年成为统一的罗马尼亚国家首都。别称"小巴黎"，因典雅建筑风格得名。1812年拿破仑入侵俄国时，俄国元帅库图佐夫正驻军布加勒斯特（当时属奥斯曼帝国势力范围的瓦拉几亚地区），在此获知开战消息。同年5月28日俄土双方在此签订《布加勒斯特和约》，结束第六次俄土战争，使俄国能腾出手来对付拿破仑。
  书中原文: "一八一二年，同拿破仑开仗的消息传到布加勒斯特后（库图佐夫在那儿已经住了两个月，日夜和一个瓦拉几亚女人厮混）"
  网络来源: 百度百科 https://wapbaike.baidu.com/item/%E5%B8%83%E5%8A%A0%E5%8B%92%E6%96%AF%E7%89%B9/1832994 | 维基百科 https://baike.baidu.com/item/%E5%B8%83%E5%8A%A0%E5%8B%92%E6%96%AF%E7%89%B9/1832994

- 名词: 德里萨军营
  解释: 德里萨军营（Drissa camp / Dryssa camp），1812年拿破仑入侵俄国前夕，俄军在道加瓦河（西德维纳河）畔修建的筑垒兵营，位于今白俄罗斯上德文斯克附近。设计受威灵顿公爵在伊比利亚半岛使用的托里什韦德拉什防线启发，原计划作为阻击法军的坚固防线，掩护通往圣彼得堡的道路。1812年7月9日，巴克莱·德·托利率俄军第一西方面军撤退至此。但沙皇亚历山大一世和将领们发现该军营位置不佳、难以坚守，且拿破仑主力指向莫斯科而非圣彼得堡，遂决定放弃，继续向东撤退至斯摩棱斯克。德里萨的放弃标志着俄军从"固守抵抗"转向"纵深撤退"战略的关键转折。
  书中原文: "在未到达驻在德里萨军营的军队之前，安德烈公爵顺路到童山去一趟"
  网络来源: Britannica https://www.britannica.com/event/Battle-of-Poltava | Heritage Images https://www.mediastorehouse.co.uk/heritage-images/russian-attack-entrenched-camp-dryssa-15-july-14901150.html

- 名词: 蓝胡子
  解释: 蓝胡子（Bluebeard，法文原名 La Barbe bleue），法国诗人夏尔·佩罗（Charles Perrault，1628-1703）1697年收录于《鹅妈妈的故事》中的经典童话。故事讲述一位长着蓝色胡须的富有贵族屡次娶妻后均神秘失踪。他娶了一位小女儿后出远门，留下钥匙并禁止她打开城堡下最小的房间。妻子因好奇打开，发现里面吊挂着前几任妻子的尸体。蓝胡子回来后发现秘密，要杀死妻子，危急时刻妻子的两个兄弟赶到杀死蓝胡子。蓝胡子的创作原型一般认为是15世纪法国贵族吉尔·德·莱斯（曾随圣女贞德征战，后因虐杀儿童被处决）或英王亨利八世。该形象已成为乱娶妻妾、杀妻者的文化符号。
  书中原文: "安德烈公爵给他讲蓝胡子的故事"
  网络来源: 百度百科 https://wapbaike.baidu.com/item/%E8%93%9D%E8%83%A1%E5%AD%90/839138 | 维基百科 https://zh.wikipedia.org/wiki/%E8%93%9D%E8%83%A1%E5%AD%90
