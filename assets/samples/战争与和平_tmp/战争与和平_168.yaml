- 名词: 吾母之家
  解释: 拿破仑在1812年占领莫斯科后，为笼络民心，将莫斯科慈善院（育幼院）命名为"吾母之家"（法语：Maison de ma Mère），以纪念其母亲莱蒂西亚·波拿巴。托尔斯泰在《战争与和平》中以此细节讽刺拿破仑的自大与对俄国现实的误判。
  书中原文: 他吩咐在慈善院的建筑物上书写"吾母之家"的字样，这样就把做儿子的孝敬之情和浩荡的皇恩结合起来。
  网络来源: https://en.wikisource.org/wiki/Page:War_and_Peace.djvu/509

- 名词: 奥霍特内伊市场
  解释: 奥霍特内伊市场（俄语：Охотный Ряд，意为"猎人之市"）是莫斯科历史上著名的市场区域。17世纪时专售野味和活禽，1812年莫斯科大火后改建为石质商铺，19世纪成为莫斯科富足与丰裕的象征。现今为莫斯科市中心的一条重要街道（奥霍特内伊市场街），毗邻克里姆林宫和国家杜马大楼，莫斯科地铁亦有同名车站。
  书中原文: 自即日起，农民、庄户人以及莫斯科近郊的老百姓，可以将各种产品毫无危险地运至城内指定的两个粮店，其中一个在莫霍夫街，另一个在奥霍特内伊市场。
  网络来源: https://en.wikipedia.org/wiki/Okhotny_Ryad_(street)
