- 名词: 艾克米尔公爵
  解释: 即埃克米尔亲王（Prince d'Eckmühl），拿破仑授予其元帅路易·尼古拉·达武（Louis-Nicolas Davout）的封号。1809年达武在埃克米尔战役中以劣势兵力突破奥军包围，与拿破仑主力会合，立下赫赫战功，战后拿破仑封其为埃克米尔亲王。达武（1770—1823）是法兰西第一帝国最年轻的元帅，以军纪严苛、富于韬略著称，被称作"铁帅"。在拿破仑远征俄国期间，达武被任命为莫斯科总督，驻扎于谢尔巴托夫公爵府邸。
  书中原文: "这是谢尔巴托夫公爵的住宅，皮埃尔以前常来这儿做客，他从士兵谈话中知道，现在是元帅——艾克米尔公爵住在这儿。"
  网络来源: https://baike.baidu.com/item/路易·尼古拉·达武/2842797

- 名词: 圣母诞生节
  解释: 东正教十二大节之一，纪念圣母玛利亚的诞生。据教会传统，玛利亚的父母——义人约雅敬和安娜年迈无子，虔诚祈祷后蒙上帝应允，高龄生下玛利亚。该节日日期为儒略历9月8日（公历9月21日），被视为"救恩的开端"，在俄罗斯称为Рождество Богородицы。因东正教教会历以9月为岁首，圣母诞生节也是礼仪年的首个重大节日。
  书中原文: "钟声使皮埃尔想起今天是礼拜，是圣母诞生节。但是好像没有人庆祝这个节日：到处是火灾后的残破景象"
  网络来源: https://azbyka.ru/chinaorthodox/fuhuojie-he-shier-zhongda-jieri.html

- 名词: 谢尔巴托夫公爵
  解释: 俄国最古老的贵族家族之一，源于留里克王朝。其中最著名的是米哈伊尔·米哈伊洛维奇·谢尔巴托夫公爵（1733—1790），18世纪俄国著名历史学家、政论家，著有《俄罗斯通史》七卷，是俄国启蒙运动重要代表人物。1812年拿破仑占领莫斯科期间，其家族在圣母广场附近的府邸被法军征用，成为达武元帅的指挥部。该府邸位于今莫斯科圣母广场附近，原属谢尔巴托夫公爵家族。
  书中原文: "这是谢尔巴托夫公爵的住宅，皮埃尔以前常来这儿做客，他从士兵谈话中知道，现在是元帅——艾克米尔公爵住在这儿。"
  网络来源: https://en.wikipedia.org/wiki/Mikhail_Shcherbatov
