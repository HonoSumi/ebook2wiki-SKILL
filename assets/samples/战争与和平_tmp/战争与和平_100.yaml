- 名词: 特韦尔林荫道
  解释: 特韦尔林荫道（俄语：Тверской бульвар，又译特维尔林荫大道），莫斯科最古老的林荫大道，位于市中心，属林荫环路一部分。始建于1796年，连接尼基茨基大道与普希金广场。19世纪是上流社会散步场所和艺术家聚会地，被誉为莫斯科贵族的"绿色俱乐部"。列夫·托尔斯泰等多位俄罗斯文学巨匠曾在作品中描写过此街。苏联时期特维尔大街曾更名为高尔基大街。
  书中原文: "在特韦尔林荫道上有人呼唤他。"
  网络来源: https://zh.wikipedia.org/zh-hans/%E7%89%B9%E7%BB%B4%E5%B0%94%E5%A4%A7%E9%81%93

- 名词: 菩提花露
  解释: 菩提花露即椴树花纯露（Linden flower water），由欧洲椴（Tilia europaea）的花卉蒸馏而成。在传统中药中性辛微温，归肺经，具发汗解表、止痛镇痉功效，主治风寒感冒、头身疼痛。在芳疗领域被誉为"众纯露之母"，有镇静抗焦虑、抗氧化、抗炎镇痛等作用，常用于缓解焦虑、失眠、头痛及皮肤护理。注意：中文"菩提花"实为椴树花，并非佛教菩提树（Ficus religiosa）。
  书中原文: "玛丽亚·德米特里耶夫娜给她垫上枕头，盖上两床被子，亲自给她拿来菩提花露"
  网络来源: https://cloudtcm.com/herb/8569

- 名词: 海龙皮
  解释: 海龙皮即海獭皮（Sea Otter fur），一种极珍贵的皮草，产自北太平洋寒冷海域。19世纪俄罗斯贵族广泛用于高级服饰领口、帽饰等。清代通过中俄恰克图贸易进入中国，为皇室御用顶级皮草，一等海龙皮每张高达50两白银，普通官民严禁使用。《红楼梦》第105回中即有记载。在《战争与和平》中，海龙皮领是俄国贵族军官冬季服饰的标志性元素。
  书中原文: "海龙皮领围着下巴颏"
  网络来源: https://baijiahao.baidu.com/s?id=1684121585746462691

- 名词: 白羽饰
  解释: 白羽饰指帽子上的白色羽毛装饰，19世纪欧洲和俄罗斯贵族军官常见的帽饰。俄罗斯帝国时期，近卫军礼仪头盔和军官礼帽上常用白色羽缨装饰，象征高贵与身份。白色羽毛在宫廷和社交场合也是上流社会时尚的重要元素。《战争与和平》中阿纳托利歪戴白羽饰的帽子，展现其玩世不恭的纨绔子弟形象。
  书中原文: "歪戴着白羽饰的帽子"
  网络来源: https://cn.weitze.com/militaria/30/Zaristisches_Russland_Schirmmuetze_fuer_Offiziere_des_Leib_Garde_Kuerassier_Regiments__353130.html
