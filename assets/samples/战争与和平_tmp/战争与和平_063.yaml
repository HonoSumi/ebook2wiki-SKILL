- 名词: 波茨坦宫殿
  解释: |
    波茨坦（Potsdam）位于德国柏林西南，是普鲁士王国的宫殿和园林集中地。
    书中提到的"波茨坦宫殿"泛指波茨坦的普鲁士王宫群。1806年拿破仑在耶拿-
    奥尔斯泰特会战中击溃普军后，长驱直入波茨坦，登上普鲁士国王的宝座，
    象征性地宣示了对普鲁士的征服。波茨坦最著名的宫殿包括无忧宫
    （Sanssouci，腓特烈大帝的夏宫）和新宫（Neues Palais，普鲁士凡尔赛宫）。
    1990年波茨坦宫殿群被联合国教科文组织列为世界文化遗产。
  书中原文: |
    人类公敌全然不理会我们的花言巧语，它用毫不客气而且最野蛮的方式向
    普鲁士扑过去，竟然不给它留一点结束已经开始的检阅的时间，就打得它
    落花流水，然后登上波茨坦宫殿的宝座。
  网络来源: |
    https://wapbaike.baidu.com/item/%E6%B3%A2%E8%8C%A8%E5%9D%A6%E6%96%B0%E5%AE%AB/16550794
    https://zh.m.wikipedia.org/zh-cn/%E6%96%B0%E5%AE%AB_(%E6%B3%A2%E8%8C%A8%E5%9D%A6)

- 名词: 普图斯克战役
  解释: |
    普图斯克战役（Battle of Pułtusk）发生于1806年12月26日，是拿破仑战争
    期间第四次反法同盟战争中的一场战役。战场位于波兰的普乌图斯克
    （Pułtusk），交战双方为法兰西第一帝国与俄罗斯帝国。俄军由本尼格森
    将军指挥，法军由拉纳元帅和达武元帅率领。战役结果未分绝对胜负：
    俄军击退法军正面进攻后主动撤退。由于正值冬季、道路泥泞，法军无法
    有效追击。书中借比利宾之口讽刺说，以"谁退却谁就输了"的标准来看，
    普图斯克战役实际上是俄军吃了败仗。
  书中原文: |
    这就是被认为伟大胜利的普图斯克战役，不过据我看，完全不是那么回事。
    我们文职人员，您是知道的，判断战争的胜负有一个很坏的习惯。战斗结束
    时谁退却谁就是打输了，根据这个道理，所以我们说，普图斯克战役是
    我们吃了败仗。
  网络来源: |
    https://wapbaike.baidu.com/item/%E6%99%AE%E4%B9%8C%E5%9B%BE%E6%96%AF%E5%85%8B%E4%B9%8B%E6%88%98/23134006
    https://www.britannica.com/event/Napoleonic-Wars/The-winter-campaign-of-1806-07-Eylau

- 名词: 普罗佐罗夫斯基
  解释: |
    亚历山大·亚历山德罗维奇·普罗佐罗夫斯基（Александр Александрович
    Прозоровский，1732—1809），俄罗斯帝国陆军元帅。他参加过七年战争、
    第五次俄土战争，1790年曾任莫斯科驻军总司令，1806年晋升元帅并任
    多瑙河战区俄军总司令。他与苏沃洛夫有姻亲关系但关系不睦，与库图佐夫
    亦有矛盾。书中提到沙皇在普罗佐罗夫斯基和卡缅斯基之间选择总司令，
    最终选了年迈的卡缅斯基，反映出当时俄军高层指挥的人事困境。
  书中原文: |
    我们万事俱备，只欠一点小意思，即欠一个总司令。原来是这样，如果
    总司令不那么年轻，奥斯特利茨的胜利可能更有把握些，所以把八十来岁
    的将军们都评审一遍，在普罗佐罗夫斯基和卡缅斯基之间选了后者。
  网络来源: |
    https://baike.baidu.com/item/%E4%BA%9A%E5%8E%86%E5%B1%B1%E5%A4%A7%C2%B7%E4%BA%9A%E5%8E%86%E5%B1%B1%E5%BE%B7%E7%BD%97%E7%BB%B4%E5%A5%87%C2%B7%E6%99%AE%E7%BD%97%E4%BD%90%E7%BD%97%E5%A4%AB%E6%96%AF%E5%9F%BA/10077302

- 名词: 基辅省
  解释: |
    基辅省（Киевская губерния）是俄罗斯帝国的一个省份，1708年由彼得大帝
    设立，是帝国最早设立的八个省之一，1925年苏联行政改革时撤销。首府为
    基辅。1897年人口普查时约356万人，是当时俄罗斯帝国人口最多的省份之一，
    居民以乌克兰人为主（约占79%）。书中皮埃尔在加入共济会后，带着改革
    农庄的守则前往基辅省，那里有他的大部分农奴。
  书中原文: |
    皮埃尔在加入共济会之后不久，就带着他详细开列的在田庄应办事项守则，
    前往基辅省，那里有他的大部分农奴。
  网络来源: |
    https://wapbaike.baidu.com/item/%E5%9F%BA%E8%BE%85%E7%9C%81
    https://zh.wikipedia.org/zh-my/%E4%BF%84%E7%BE%85%E6%96%AF%E5%B8%9D%E5%9C%8B%E8%A1%8C%E6%94%BF%E5%8D%80%E5%88%92

- 名词: 科斯特罗马省
  解释: |
    科斯特罗马省（Костромская губерния）是俄罗斯帝国至苏联早期的一个
    省级行政区划，存在于1796年至1929年，首府为科斯特罗马市。面积约
    84,000平方公里，1897年人口约139万。科斯特罗马是俄罗斯罗曼诺夫王朝
    的发源地，17世纪末曾为俄罗斯第三大城市。书中总管建议皮埃尔出售
    科斯特罗马省的森林以偿还债务。
  书中原文: |
    总管不说解放农奴是完全不可能的；为达到这个目的，他建议出售科斯特
    罗马省的森林，出售低洼的土地和克里木的田庄。
  网络来源: |
    https://wapbaike.baidu.com/item/%E7%A7%91%E6%96%AF%E7%89%B9%E7%BD%97%E9%A9%AC%E7%9C%81
    https://zh.wikipedia.org/zh-hans/%E7%A7%91%E6%96%AF%E7%89%B9%E7%BE%85%E9%A6%AC%E7%9C%81

- 名词: 克里木
  解释: |
    克里木即克里米亚半岛（Крым），位于黑海北岸。1783年叶卡捷琳娜二世
    将克里米亚汗国并入俄罗斯帝国版图。书中总管向皮埃尔建议出售"克里木
    的田庄"以缓解财务压力，这是因为克里米亚被并入俄国后，许多俄国贵族
    在那里获得了田产。1853—1856年克里米亚战争即发生于此。1954年苏联
    将克里米亚划归乌克兰，2014年克里米亚公投后再次并入俄罗斯。
  书中原文: |
    总管不说解放农奴是完全不可能的；为达到这个目的，他建议出售科斯特
    罗马省的森林，出售低洼的土地和克里木的田庄。
  网络来源: |
    https://baike.baidu.com/item/%E5%85%8B%E9%87%8C%E7%B1%B3%E4%BA%9A%E5%8D%8A%E5%B2%9B
    https://baike.baidu.com/item/%E5%85%8B%E9%87%8C%E7%B1%B3%E4%BA%9A%E6%B1%97%E5%9B%BD
