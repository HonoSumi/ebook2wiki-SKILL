- 名词: 萨拉戈萨围城战
  解释: 1808—1809年拿破仑军队围攻西班牙萨拉戈萨城的战役，是半岛战争中最惨烈的战役之一。法军两次围攻该城：第一次（1808年6—8月）被西班牙守军击退；第二次（1808年12月—1809年2月）法军以巨大代价攻克该城。城中平民死亡约34,000人，战后人口从70,000锐减至12,000。萨拉戈萨的顽强抵抗成为拿破仑所说"西班牙溃疡"的典型例证。
  书中原文: "一八〇八年法军围攻西班牙萨拉戈萨城，该城防守了数月才被法军攻陷。"
  网络来源: https://zh.wikipedia.org/zh-sg/%E7%AC%AC%E4%BA%8C%E6%AC%A1%E8%96%A9%E6%8B%89%E6%88%88%E8%96%A9%E5%9C%8D%E5%9F%8E%E6%88%B0

- 名词: 高板床
  解释: 俄语称为"полати"，是俄国传统乡村木屋（изба）中搭建在炕炉与侧壁之间的固定木板床，位于屋顶下方。它是俄罗斯农村房屋中不可移动的固定家具，与房屋结构一体，主要用于白天放置被褥，也可作为睡铺。高板床与传统俄罗斯农舍中的炉灶（печь）、圣像角（красный угол）共同构成核心空间布局。
  书中原文: "高板床是俄国乡下木屋里，炕炉和侧壁之间搭的木板床。"
  网络来源: https://snowymelodie.livejournal.com/17668.html

- 名词: 奥古斯丁神父
  解释: 奥古斯丁（Августин，俗名阿列克谢·瓦西里耶维奇·维诺格拉茨基，1766—1819），莫斯科与科洛姆纳大主教。在1812年卫国战争中发挥重要的宗教和爱国领袖作用，组织宗教活动鼓舞士气，参与安排圣物撤离。他留下的讲道词和著作于1856年出版，是19世纪初俄罗斯东正教的重要人物。
  书中原文: "奥古斯丁神父（1766—1818），当时莫斯科大主教。"
  网络来源: https://id.loc.gov/authorities/names/n2016057418.html

- 名词: 度支部
  解释: 俄语"Камер-коллегия"，彼得一世（彼得大帝，1682—1725年在位）于1717—1721年行政改革中设立的财政管理机构，负责国家收入（税收）的征管。彼得一世仿效瑞典模式设立了12个"院"（коллегия）取代旧衙门体系，其中度支部主管国家岁入。同时期还设有预算审计委员会和商务委员会等机构。
  书中原文: "度支部是彼得一世时的财政部。"
  网络来源: https://www.csspw.com.cn/booksdetail_15923_2052111_0.jhtml

- 名词: 圣谢尔吉
  解释: 圣谢尔盖·拉多涅日斯基（Сергий Радонежский，约1314—1392），俄罗斯东正教最受敬仰的圣徒之一，被誉为"古罗斯最伟大的圣徒"和"俄罗斯的守护之神"。1337年在莫斯科郊外建立修道院（即后来的圣三一谢尔盖大修道院，世界文化遗产）。1380年为莫斯科大公德米特里·顿斯科伊祝福，预言俄军在库里科沃会战中战胜蒙古鞑靼军队，对俄罗斯民族精神的形成和统一有深远影响。
  书中原文: "主教向皇帝献圣谢尔吉依像时所写的一封信"
  网络来源: https://artsandculture.google.com/entity/m030wyh

- 名词: 维特根施泰因
  解释: 彼得·克里斯蒂安诺维奇·维特根施泰因（Пётр Христианович Витгенштейн，1769—1843），俄罗斯帝国陆军元帅，出身德国贵族家庭。1812年卫国战争中指挥第一独立步兵军，在克利亚斯季齐战役中击败法军乌迪诺元帅，迫使拿破仑放弃攻占彼得堡的计划，被誉为"彼得堡的救星"。后接替库图佐夫任俄军总司令（1813年），参加莱比锡战役等重大战役。
  书中原文: "维特根施泰因（彼得堡称他为彼得堡的英雄）所缴获的奥国旗帜"
  网络来源: https://zh.wikipedia.org/zh-my/%E5%BD%BC%E5%BE%97%C2%B7%E7%BB%B4%E7%89%B9%E6%A0%B9%E6%96%BD%E6%B3%B0%E5%9B%A0

- 名词: 莫斯科大火(1812)
  解释: 1812年9月14日拿破仑大军进入莫斯科后，15日至20日莫斯科全城燃起持续约五至七天的大火，烧毁约四分之三的建筑（原本3万幢房屋剩不到5,000幢）。起火原因有俄军焦土政策说、法军失火说、俄国爱国者纵火说等。大火使法军失去粮草和住所补给，加之严冬来临，拿破仑被迫于10月撤退，近60万大军最后仅剩约1—10万人撤回法国，成为拿破仑帝国由盛转衰的转折点。
  书中原文: 本章正文描写莫斯科大火中皮埃尔救人的场景，以及法军占领莫斯科后的混乱局面。
  网络来源: https://baijiahao.baidu.com/s?id=1608969838008591224

- 名词: 心绞痛
  解释: 心绞痛（angina pectoris）是一组由于心肌缺氧和供氧之间暂时失去平衡而发生心肌缺血的临床症候群，因冠状动脉供血不足导致心肌急剧的、暂时性的缺血与缺氧。典型表现为胸骨后压榨性、闷胀性或窒息性疼痛，可放射至左肩、左上臂等部位，一般持续1—5分钟，休息或含服硝酸甘油后缓解。
  书中原文: "听说可怜的伯爵夫人病得不轻。大夫说她得的是心绞痛。"
  网络来源: https://m.dayi.org.cn/disease/1141523
