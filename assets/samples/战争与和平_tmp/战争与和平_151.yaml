- 名词: 弗里德里希·施塔普斯
  解释: 弗里德里希·施塔普斯（Friedrich Staps，1792—1809），德意志爱国青年，新教牧师之子，生于瑙姆堡，曾在埃尔福特和莱比锡经商。1809年10月12日，他在维也纳美泉宫外假借递交请愿书接近拿破仑，企图用藏于衣中的大餐刀刺杀皇帝，被让·拉普将军识破逮捕。拿破仑亲自审问后曾给予宽恕机会，但施塔普斯拒绝悔过，声称若获释仍会再次行刺。1809年10月17日被行刑队枪决，遗言高喊"自由万岁！德意志万岁！处死暴君！"他被视为德意志民族主义萌芽时期的殉道者，其事迹被弗里德里希·黑贝尔写入诗歌。
  书中原文: 皮埃尔知道一八〇九年一名德国大学生在维也纳谋杀波拿巴的详细经过，也知道那个学生被枪毙了。
  网络来源: https://en.wikipedia.org/wiki/Friedrich_Staps

- 名词: 1809年刺杀拿破仑事件
  解释: 1809年10月12日发生于维也纳美泉宫的刺杀拿破仑未遂事件。时值第五次反法同盟战争末期，拿破仑与奥地利谈判签订《申布伦条约》期间。18岁的德意志青年弗里德里希·施塔普斯趁阅兵之际行刺，被侍从官拉普将军逮捕。该事件深刻触动了拿破仑，据信促使其加速建立世袭王朝（后与约瑟芬离婚、迎娶奥地利公主玛丽·路易莎）。托尔斯泰在《战争与和平》中借皮埃尔之笔提及此事，成为皮埃尔决定留在莫斯科刺杀拿破仑的动机之一。
  书中原文: 皮埃尔知道一八〇九年一名德国大学生在维也纳谋杀波拿巴的详细经过，也知道那个学生被枪毙了。
  网络来源: https://zh.wikipedia.org/zh-sg/Special:MyLanguage/%E7%94%B3%E5%B8%83%E5%80%AB%E6%A2%9D%E7%B4%84
