- 名词: 敷粉假发
  解释: |
    欧洲18世纪贵族男性流行的白色粉末假发（peruke/periwig）。起源于法国国王路易十三为遮盖秃顶而佩戴假发，路易十四将其推向全欧洲。敷粉（多用面粉、淀粉混合香料）的目的是掩盖假发的动物毛气味、吸汗并增添香气。法国大革命后，敷粉假发被视为贵族象征而衰落，但在英国法庭（法官、律师）中作为传统保留至今。
  书中原文: |
    老公爵一向是旧式装束：穿长衫，戴敷粉假发。
  网络来源: |
    https://www.ted.com/talks/stephanie_honchell_smith_why_did_people_wear_powdered_wigs?language=zh-CN

- 名词: 谱系图
  解释: |
    又称家谱图、世系图、家族树，是一种以树状结构描绘家族血缘与世系关系的图表。谱系图可追溯家族成员之间的亲缘关系、继承顺序和历史渊源。在贵族与王室中，谱系图尤为重要，用于证明血统的正统性和爵位继承的合法性。
  书中原文: |
    安德烈公爵在观看一副他以前没见过的金色大镜框，镜框里装着博尔孔斯基公爵家的谱系图。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E7%B3%BB%E8%AD%9C%E5%9C%96

- 名词: 戴冕肖像
  解释: |
    指贵族或君主佩戴冠冕（王冠、公爵冠等）的正式肖像画。在欧洲历史上，戴冕肖像象征着统治者的权威、血统与合法继承权。冠冕的样式因爵位等级而异（如公爵的花形冕、伯爵的缀珍珠冕等）。此类肖像画常用于宫廷、府邸大厅，以彰显家族的显赫地位。
  书中原文: |
    对面挂着一副同样大的镜框，装着一幅画笔拙劣的（想必出自家奴画师之手）当权公爵的戴冕肖像。
  网络来源: |
    https://baike.baidu.com/item/%E6%AC%A7%E6%B4%B2%E8%B4%B5%E6%97%8F

- 名词: 扑粉
  解释: |
    欧洲18世纪盛行的一种假发护理方式。将面粉、淀粉或高岭土磨成的细粉（常掺入薰衣草、茉莉等香料）撒在假发上，以吸收油脂和汗水、遮盖动物毛发的气味，同时使假发呈现流行的白色或浅灰色外观。扑粉过程通常在专用房间进行，英语"powder room"（化妆间/洗手间）一词即源于此。
  书中原文: |
    老头子正坐在更衣室里一张宽大的上等山羊皮面安乐椅里，披着敷粉披肩，把头伸给吉洪去扑粉。
  网络来源: |
    https://www.ted.com/talks/stephanie_honchell_smith_why_did_people_wear_powdered_wigs?language=zh-CN

- 名词: 战略
  解释: |
    军事术语，指筹划和指导战争全局的方略。根据对国际形势和敌我双方政治、军事、经济、地理等因素的分析判断，制定战略方针和计划，指导战争准备与实施。在《战争与和平》的语境中，老公爵用讽刺的口吻谈论欧洲各国针对拿破仑的新军事战略，体现出他对新式战争理论的不以为然。
  书中原文: |
    “德意志人怎么样教会你们用新的科学，就是用所谓战略来跟波拿巴作战。”
  网络来源: |
    https://js.bkzx.cn/itemcat/17284

- 名词: 等级森严
  解释: |
    成语，形容社会、组织或制度中等级划分极其严格、不可逾越的状态。在俄国贵族社会中，公爵对仆人、下级乃至省里的官员都保持着严格的等级区分。在书中，博尔孔斯基老公爵以严格著称，平时极少宴请省里高官，却破例邀请建筑师同桌入席，以刻意证明他"人人平等"的观念。
  书中原文: |
    公爵平时等级森严，就连省里的高官显要也很少请到家里吃饭。
  网络来源: |
    https://wapbaike.baidu.com/item/%E7%AD%89%E7%BA%A7%E6%A3%AE%E4%B8%A5/15572474

- 名词: 马尔布鲁去出征
  解释: |
    一首17-18世纪的法国传统民歌"Malbrough s'en va-t-en guerre"。主人公马尔布鲁（Malbrough）指的是英国名将约翰·丘吉尔，第一代马尔伯勒公爵。歌曲基于一个虚假谣言——传说马尔伯勒公爵战死沙场，法军编唱此歌以鼓舞士气。1785年玛丽·安托瓦内特王后喜爱此曲，使其在凡尔赛宫流行，传遍全欧洲。该旋律后来演变为英文歌曲"For He's a Jolly Good Fellow"。
  书中原文: |
    老头子用走腔的老嗓子唱起来：“马尔布鲁去出征，天晓得何时才归来。”
  网络来源: |
    https://en.wikipedia.org/wiki/Malbrough_s%27en_va-t-en_guerre

- 名词: 波将金
  解释: |
    格里戈里·亚历山德罗维奇·波将金（1739-1791），俄国政治家、陆军元帅，叶卡捷琳娜二世最著名的情人和宠臣。他在1768-1774年俄土战争中屡建战功，1783年成功吞并克里米亚，受封"塔夫里亚公爵"。他领导建设了黑海舰队，创建了塞瓦斯托波尔等南部城市。后世以"波将金村"（Potemkin village）的典故闻名，意指为制造假象而搭建的虚假工程。在《战争与和平》中，老公爵将波将金与苏沃洛夫并列为可与拿破仑对抗的俄国名将。
  书中原文: |
    他侥幸成功，只不过因为没有波将金或苏沃洛夫一类人跟他对抗罢了。
  网络来源: |
    https://baike.baidu.com/item/%E6%B3%A2%E5%B0%86%E9%87%91

- 名词: 莫罗
  解释: |
    让·维克多·马里·莫罗（1763-1813），法国大革命战争时期著名将领。1800年在霍恩林登战役中大败奥军，达到军事生涯巅峰。他曾协助拿破仑发动雾月政变，后因反对拿破仑独裁被流放美国。1813年受邀加入第六次反法同盟，任沙皇亚历山大一世顾问，在德累斯顿战役中被炮弹击中双腿，不治身亡。在《战争与和平》中，苏沃洛夫曾被莫罗的战术所困，而老公爵则轻蔑地称"莫罗算得什么"。
  书中原文: |
    “其实，就是苏沃洛夫不是也陷入莫罗的圈套脱不了身吗？”
  网络来源: |
    https://wapbaike.baidu.com/item/%E8%AE%A9%C2%B7%E7%BB%B4%E5%85%8B%E5%A4%9A%C2%B7%E8%8E%AB%E7%BD%97

- 名词: 腓特烈
  解释: |
    腓特烈二世（1712-1786），史称腓特烈大帝，普鲁士国王（1740-1786年在位）。杰出的军事家、政治家，发明了"斜行战斗序列"，七年战争中以弱胜强保住西里西亚，奠定了普鲁士的中欧强国地位。他同时也是启蒙思想的拥护者，与伏尔泰交好，擅长长笛演奏。在《战争与和平》中，老公爵将腓特烈与苏沃洛夫并列为仅有的两位真正军事天才，以此贬低拿破仑。
  书中原文: |
    “只有两个人：腓特烈和苏沃洛夫……莫罗算得什么！”
  网络来源: |
    https://baike.baidu.com/item/%E8%85%93%E7%89%B9%E7%83%88%E4%BA%8C%E4%B8%96/9079854

- 名词: 米哈伊尔·库图佐夫
  解释: |
    米哈伊尔·伊拉里奥诺维奇·库图佐夫（1745-1813），俄国陆军元帅，1812年卫国战争的最高统帅。他在博罗季诺战役中重创拿破仑后，做出放弃莫斯科的艰难决定，实施焦土战术和游击战，最终迫使拿破仑大军在俄国的严冬中溃败，60万大军仅剩2-3万人逃出俄国。拿破仑称其为"北方的老狐狸"。在《战争与和平》中，老公爵质疑库图佐夫能否应对拿破仑，实际上托尔斯泰在全书后半部将库图佐夫塑造成体现人民意志的英雄统帅。
  书中原文: |
    “苏沃洛夫既然对付不了他们，米哈伊尔·库图佐夫又怎么行呢！”
  网络来源: |
    https://baike.baidu.com/item/%E5%BA%93%E5%9B%BE%E4%BD%90%E5%A4%AB

- 名词: 帕伦
  解释: |
    彼得·路德维希·冯·德·帕伦伯爵（1745-1826），俄国骑兵上将，圣彼得堡军事总督（1798-1801）。出身于波罗的海德意志裔贵族家庭（von der Pahlen家族），是俄国宫廷中的显赫人物。1801年策划并参与了刺杀沙皇保罗一世。在《战争与和平》的语境中，老公爵提到"德意志人帕伦奉命到美国纽约找法国人莫罗"，指的是俄国试图邀请流亡美国的莫罗加入俄军对抗拿破仑的外交活动。
  书中原文: |
    “德意志人帕伦奉命到美国纽约找法国人莫罗去了。”
  网络来源: |
    https://en.wikipedia.org/wiki/Count_Pahlen

- 名词: 米切尔森
  解释: |
    伊万·伊万诺维奇·米切尔森（伊万·米赫尔松，1740-1807），俄国骑兵上将，波罗的海德意志裔将领。其最著名的功绩是1774年镇压普加乔夫起义，以少胜多击溃普加乔夫主力。1805年任俄国西部边境军队指挥官。在《战争与和平》中，老公爵向安德烈公爵询问"米切尔森的军队"，反映出1805年反法联盟时期的俄国军事部署。
  书中原文: |
    “我了解米切尔森的军队，也了解托尔斯泰的……同时登陆……南方的军队做什么呢？普鲁士中立，这我知道。”
  网络来源: |
    https://en.wikipedia.org/wiki/Johann_von_Michelsohnen

- 名词: 留里克
  解释: |
    留里克（约830-879），瓦良格人（北欧维京人）首领，古罗斯国家的奠基人。862年应邀统治诺夫哥罗德，建立了俄国历史上第一个王朝——留里克王朝（862-1598年）。该王朝统治俄国长达736年，经历了基辅罗斯的繁荣、蒙古入侵、莫斯科公国的崛起，直至末代沙皇费奥多尔·伊万诺维奇去世。留里克王朝奠定了俄罗斯、乌克兰、白俄罗斯三个东斯拉夫民族的历史基础。在书中，博尔孔斯基家族的祖先被认定为留里克的后裔，以彰显其显赫出身。
  书中原文: |
    这一定是留里克的后裔，也就是博尔孔斯基家的祖先。
  网络来源: |
    https://baike.baidu.com/item/%E7%95%99%E9%87%8C%E5%85%8B%E7%8E%8B%E6%9C%9D

- 名词: 施特拉尔松
  解释: |
    施特拉尔松德（Stralsund），德国东北部梅克伦堡-前波美拉尼亚州的城市，濒临波罗的海，被称为"吕根岛的门户"。1234年建城，曾是中世纪强大的汉萨同盟的重要成员。三十年战争后长期受瑞典统治，1815年归属普鲁士。老城中心为联合国教科文组织世界遗产。在《战争与和平》中，俄军计划在施特拉尔松与瑞典军队会师，共同对抗拿破仑。
  书中原文: |
    “这支军队的一部分将在施特拉尔松与瑞典军队会师。”
  网络来源: |
    https://baike.baidu.com/item/%E6%96%BD%E7%89%B9%E6%8B%89%E5%B0%94%E6%9D%BE%E5%BE%B7/9069611

- 名词: 波美拉尼亚
  解释: |
    中欧历史地区，位于波罗的海南岸，意为"沿海的国家"。现分属德国北部（梅克伦堡-前波美拉尼亚州）和波兰北部。历史上曾先后由波兰、神圣罗马帝国、条顿骑士团、瑞典、普鲁士统治。三十年战争后西波美拉尼亚归瑞典，东波美拉尼亚归勃兰登堡-普鲁士。在《战争与和平》中，安德烈公爵的作战计划涉及俄军跨过波美拉尼亚的军事行动。
  书中原文: |
    “瑞典怎么样？他们怎样跨过波美拉尼亚呢？”
  网络来源: |
    https://baike.baidu.com/item/%E6%B3%A2%E7%BE%8E%E6%8B%89%E5%B0%BC%E4%BA%9A/9581463

- 名词: 莱茵河
  解释: |
    西欧第一大河，发源于瑞士阿尔卑斯山北麓，流经瑞士、列支敦士登、奥地利、法国、德国、荷兰六国，在鹿特丹附近注入北海，全长约1232公里。罗马帝国时期曾以莱茵河为北部边界。中游以古堡和葡萄园闻名。是世界上最繁忙的内河航运通道之一。在《战争与和平》中，反法联军的作战计划中包括二十二万奥军与十万俄军在莱茵河上作战的部署。
  书中原文: |
    “二十二万奥军连同十万俄军，将在意大利境内和莱茵河上作战。”
  网络来源: |
    https://baike.baidu.com/item/%E8%8E%B1%E8%8C%B5%E6%B2%B3/20481

- 名词: 那不勒斯
  解释: |
    意大利南部第一大城市，坎帕尼亚大区首府，濒临第勒尼安海那不勒斯湾。由古希腊人于约公元前470年建立，原名尼亚波利斯（Neapolis，意为"新城"），已有超过2500年历史。先后历经希腊、罗马、拜占庭、诺曼、西班牙、波旁等王朝统治，1861年并入统一的意大利。历史中心为联合国教科文组织世界文化遗产，也是披萨的发源地。在《战争与和平》中，反法联军的计划包括五万俄军和五万英军在那不勒斯登陆。
  书中原文: |
    “五万俄军和五万英军，将在那不勒斯登陆。”
  网络来源: |
    https://baike.baidu.com/item/%E9%82%A3%E4%B8%8D%E5%8B%92%E6%96%AF/84812

- 名词: 纽约
  解释: |
    美国第一大城市，位于美国东北部哈德逊河口。1624年荷兰人建立新阿姆斯特丹，1664年被英国占领后改名纽约（New York，意为"新约克"）。1785-1790年曾为美国临时首都，1790年成为美国第一大城市。今为全球金融、商业、文化中心，联合国总部所在地。在《战争与和平》中，俄国派帕伦前往纽约邀请被拿破仑流放的法国将领莫罗加入俄军。
  书中原文: |
    “德意志人帕伦奉命到美国纽约找法国人莫罗去了。”
  网络来源: |
    https://baike.baidu.com/item/%E7%BA%BD%E7%BA%A6/6230
