- 名词: 伊兹梅尔战役
  解释: |
    1790年第六次俄土战争中的关键战役，俄军在苏沃洛夫指挥下（库图佐夫率第6纵队参与）
    以约31000人攻破号称"多瑙河最坚固堡垒"的伊兹梅尔要塞，全歼35000名土耳其守军。
    此战决定了俄土战争的结局，库图佐夫因英勇表现被苏沃洛夫赞扬，后晋升中将。
  书中原文: |
    "又一个伊兹梅尔战役的战友，"他说，"一个勇敢的军官！你对他满意吗？"
  网络来源: |
    https://baike.baidu.com/item/第六次俄土战争/9549583
    https://www.baike.com/wikiid/4329422694428664937
- 名词: 巴克斯
  解释: |
    罗马神话中的酒神与植物神，对应希腊神话中的狄俄尼索斯。
    司掌葡萄种植、酿酒与狂欢庆典。在书中库图佐夫以此称呼季莫欣上尉，
    暗示其有酗酒的缺点，是一种委婉风趣的调侃。
  书中原文: |
    "人人都免不了有缺点，"库图佐夫面带笑容离开他，说道，"他是巴克斯的信徒。"
  网络来源: |
    https://wapbaike.baidu.com/item/巴克斯/4353193
    https://zh.wikipedia.org/zh-tw/巴库斯
- 名词: 卡缅斯基
  解释: |
    指米哈伊尔·费奥多罗维奇·卡缅斯基（1738-1809），俄国元帅，
    参加过第五次和第六次俄土战争。士兵歌谣中"卡缅斯基爷爷"所唱的
    是在土耳其作战时期编的歌曲，在奥地利行军时改唱为"库图佐夫爷爷"，
    反映出俄军士兵对老一代统帅的怀念。
  书中原文: |
    弟兄们，光荣一定属于卡缅斯基爷爷和我们……
  网络来源: |
    https://wapbaike.baidu.com/item/米哈伊尔·费奥多罗维奇·卡缅斯基/7303182
    http://m.qulishi.com/mip/news/201409/18822.html
- 名词: 克罗地亚人卫队
  解释: |
    指拿破仑战争时期在奥地利军队中服役的克罗地亚边防轻骑兵（Grenzer）。
    这些部队源自哈布斯堡王朝在克罗地亚军事边境区组建的边防军，
    擅长轻骑兵侦察与护卫任务。书中描写他们作为奥地利将军的护卫随从，
    骑马奔驰在库图佐夫马车的后面，体现了当时俄奥联军中奥地利方面的仪仗随扈。
  书中原文: |
    骑马的随员们和克罗地亚人卫队在车后飞奔着。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/边防步兵_(哈布斯堡)
    https://www.britannica.com/biography/Mikhail-Illarionovich-Prince-Kutuzov
