- 名词: 一八一二年
  解释: 指1812年俄国卫国战争（Отечественная война 1812 года），拿破仑·波拿巴率约60万大军入侵俄罗斯帝国的战争。俄军采取战略撤退和焦土政策，在波罗金诺战役后放弃莫斯科，法军占领空城后因补给困难、严寒和游击队袭击而最终溃退，仅数万人逃回。这场战争是《战争与和平》的核心历史背景，也是俄国民族意识觉醒的重要转折点。
  书中原文: "他们不再谈论政治和社团，相反，倒是回忆起一八一二年来了，这是尼古拉最喜欢的话题。杰尼索夫开的头，皮埃尔也特别起劲，特别感兴趣。"
  网络来源: https://www.thepaper.cn/newsDetail_forward_31004738

- 名词: 西斯蒙第
  解释: 让·夏尔·莱昂纳尔·德·西斯蒙第（Jean Charles Léonard de Sismondi，1773—1842），瑞士裔历史学家和经济学家。早年信奉亚当·斯密的自由贸易理论，1818年访问英国目睹工业贫困后思想转变，成为批判古典政治经济学的先驱。著有《政治经济学新原理》，第一个论证资本主义制度必然发生经济危机（消费不足论），被称为经济浪漫主义的创始人。历史学方面著有《意大利共和国史》（16卷）和《法兰西人史》（31卷）。
  书中原文: "他收藏图书，而且立下一条规定，不把他所买的西斯蒙第、卢梭、孟德斯鸠的著作读完，决不再买新书"
  网络来源: https://zh.wikipedia.org/zh/让·夏尔·莱昂纳尔·德·西斯蒙第

- 名词: 坦波夫
  解释: 俄罗斯城市，坦波夫州首府，位于莫斯科东南约480公里的茨纳河畔。1636年建为军事要塞，用以保卫莫斯科公国南部边境。18世纪后发展为重要商贸中心，以肉类、蜂蜜和纯种马闻名。诗人杰尔查文曾任省长，规划了城市布局。1920—1921年曾爆发著名的安东诺夫农民起义。在《战争与和平》中，尼古拉的管家从坦波夫乡下带回有关庄园经营的报告。
  书中原文: "今天伊利亚·米特罗凡内奇（他的管家）从坦波夫乡下回来说，已经有人出八万卢布要买那片林子了。"
  网络来源: https://baike.baidu.com/item/坦波夫/2444066
