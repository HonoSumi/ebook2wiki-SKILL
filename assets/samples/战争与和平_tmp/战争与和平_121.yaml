- 名词: 放血
  解释: 一种古老的医疗手段，通过放出人体部分血液来预防或治疗疾病。起源于古埃及，在古希腊希波克拉底四体液学说和古罗马盖伦的系统化推动下，成为西方医学中延续两千余年的核心疗法。19世纪中叶后随着细胞病理学和循证医学的兴起而衰落，但在血色素沉着病、真性红细胞增多症等疾病中仍以治疗性静脉切开术的形式存在。
  书中原文: "请来的医生当天夜里给他放了血，声称公爵右半身中风瘫痪。"
  网络来源: https://pubmed.ncbi.nlm.nih.gov/10425902/

- 名词: 助祭
  解释: 此处指俄语дьячок，俄罗斯东正教会中的低级教堂职员（非正式受圣秩的神职人员），主要负责诵读经文、带领唱诗，以及承担乡村启蒙教育等社会职能。在俄国历史上，дьячок往往是一个村庄中受教育程度最高的人之一。广义上也指东正教中经祝圣的助祭（дьякон），协助司祭举行礼拜仪式。
  书中原文: "助祭坐在墙角读赞美诗"
  网络来源: https://baike.baidu.com/item/东正教教阶制度/9658474
