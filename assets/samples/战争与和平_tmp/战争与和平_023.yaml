- 名词: 茴香甜酒
  解释: |
    以茴香或八角茴香为主要风味原料的甜味烈酒。在俄国历史语境中，常指Allasch
    （阿拉斯克），一种源自俄罗斯帝国时期（1823年由波罗的海德意志贵族在利沃尼亚
    省创立）的葛缕子/茴香利口酒，酒精浓度约40%，曾风靡俄国与欧洲。书中涅斯维茨基
    在行军途中以此酒招待军官，反映出当时俄军军官的饮食风貌。
  书中原文: |
    涅斯维茨基请军官们吃油炸包子和真正的茴香甜酒。军官们兴致勃勃地围着他，有的跪
    在潮湿的草地上，有的像土耳其人那样盘腿坐着。
  网络来源: |
    https://en.wikipedia.org/wiki/Allasch
    https://baike.baidu.com/item/%E8%8C%B4%E9%A6%99%E9%85%92
- 名词: 保罗格勒团
  解释: |
    即帕夫洛格拉德骠骑兵团（Pavlograd Hussar Regiment），俄罗斯帝国陆军的一支
    著名骑兵部队，组建于1784年。在拿破仑战争期间表现突出，曾参加1805年往维也纳
    方向的撤退后卫战、申格拉本战斗、奥斯特利茨战役、1812年卫国战争等。书中的杰尼索夫、
    罗斯托夫等人物均隶属该团。
  书中原文: |
    您不在乎人家说："保罗格勒团的军官中有小偷！"我们可不是无所谓的。
  网络来源: |
    https://bbs.napolun.com/forum.php?mod=viewthread&tid=22400
    https://zh.wikipedia.org/wiki/%E5%B8%95%E5%A4%AB%C2%B7%E8%B5%AB%E9%87%8C%E6%96%AF%E6%89%98%E7%A6%8F%E7%BE%85%E7%B6%AD%E5%A5%87%C2%B7%E9%A6%AE%C2%B7%E8%91%9B%E6%8B%89%E5%BF%85
- 名词: 乌尔姆会战
  解释: |
    1805年9月25日至10月20日发生于德意志南部乌尔姆地区的战役，是第三次反法同盟
    战争的关键战役。拿破仑率法国大军团以战略大迂回包围并歼灭奥地利马克将军所部，
    迫使三万余名奥军投降。此战打开了通往维也纳的道路，为随后奥斯特利茨战役奠定基础。
    书中以"马克被俘，全军投降了"这一消息侧面交代了乌尔姆战役的结局。
  书中原文: |
    "进军，诸位。马克被俘，全军投降了。"
    "胡说！"
    "我亲眼看见他的。"
  网络来源: |
    https://baike.baidu.com/item/%E4%B9%8C%E5%B0%94%E5%A7%86%E6%88%98%E5%BD%B9
    https://zh.wikipedia.org/zh-hans/%E4%B9%8C%E5%B0%94%E5%A7%86%E6%88%98%E5%BD%B9
- 名词: 维也纳
  解释: |
    奥地利首都，位于多瑙河畔，是欧洲重要的政治、文化、音乐中心。在拿破仑战争时期
    为奥地利帝国（哈布斯堡王朝）的首都。1805年乌尔姆战役后，拿破仑于11月12日
    占领维也纳。书中库图佐夫率俄军向维也纳方向退却，沿途破坏桥梁以阻止法军追击，
    正是乌尔姆战败后俄奥联军战略撤退的历史写照。
  书中原文: |
    库图佐夫向维也纳方向退却，一路破坏身后的桥梁（因河上布劳瑙城的桥和特劳恩河上
    林茨城的桥）。
  网络来源: |
    https://baike.baidu.com/item/%E7%BB%B4%E4%B9%9F%E7%BA%B3/6412
    https://zh.wikipedia.org/wiki/%E7%B6%AD%E4%B9%9F%E7%B4%8D%E6%AD%B7%E5%8F%B2
- 名词: 因河
  解释: |
    多瑙河右岸主要支流之一，发源于瑞士阿尔卑斯山，全长约517公里，流经瑞士、奥地利
    和德国，在德国帕绍注入多瑙河。书中提到的"因河上布劳瑙城的桥"是库图佐夫撤退时
    下令破坏的桥梁之一。布劳瑙位于因河畔，是奥地利与德国交界处的重要城镇。
  书中原文: |
    库图佐夫向维也纳方向退却，一路破坏身后的桥梁（因河上布劳瑙城的桥和特劳恩河上
    林茨城的桥）。
  网络来源: |
    https://baike.baidu.com/item/%E5%9B%A0%E6%B2%B3
    https://zh.wikipedia.org/zh-tw/%E5%9B%A0%E6%B2%B3
- 名词: 林茨
  解释: |
    奥地利上奥地利州首府，全国第三大城市，位于多瑙河畔，是重要的工业、文化和交通
    枢纽。在拿破仑战争时期，林茨是奥地利的重要河防城市。书中提到的"特劳恩河上林茨城的桥"
    是库图佐夫撤退时下令破坏的桥梁之一，林茨恰好位于特劳恩河与多瑙河交汇处。
  书中原文: |
    库图佐夫向维也纳方向退却，一路破坏身后的桥梁（因河上布劳瑙城的桥和特劳恩河上
    林茨城的桥）。
  网络来源: |
    https://baike.baidu.com/item/%E6%9E%97%E8%8C%A8/2860920
    https://zh.wikipedia.org/zh-tw/%E6%9E%97%E8%8C%A8
- 名词: 恩斯河
  解释: |
    多瑙河右岸支流，发源于奥地利萨尔茨堡州的拉德施塔特陶恩山区，全长254公里，在
    毛特豪森注入多瑙河。书中描写俄军抢渡恩斯河的段落生动展现了1805年俄军战略撤退
    时的场景——军队、辎重和炮队从桥上通过恩斯城，后卫部队负责掩护并准备烧桥断后。
  书中原文: |
    十月二十三日，俄军抢渡恩斯河。当天中午，俄军的辎重队、炮队和士兵纵队分两路从
    桥上通过恩斯城。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/%E6%81%A9%E6%96%AF%E6%B2%B3
    https://baike.baidu.com/item/%E6%81%A9%E6%96%AF%E6%B2%B3
- 名词: 特劳恩河
  解释: |
    多瑙河右岸支流，全长153公里，发源于施泰尔马克州的托特斯山，流经奥地利上奥地利州
    著名的萨尔茨卡默古特湖区，在林茨附近注入多瑙河。书中"特劳恩河上林茨城的桥"是
    库图佐夫撤退时破坏的桥梁之一，该桥位于林茨城附近特劳恩河与多瑙河交汇处。
  书中原文: |
    库图佐夫向维也纳方向退却，一路破坏身后的桥梁（因河上布劳瑙城的桥和特劳恩河上
    林茨城的桥）。
  网络来源: |
    https://zh.wikipedia.org/zh/%E7%89%B9%E5%8B%9E%E6%81%A9%E6%B2%B3
