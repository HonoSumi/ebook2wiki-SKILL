- 名词: 米洛拉多维奇
  解释: |
    米哈伊尔·安德烈耶维奇·米罗拉多维奇（Mikhail Andreyevich Miloradovich，1771–1825），俄国步兵上将，
    拿破仑战争时期的杰出将领。1805年奥斯特利茨战役中任中将，在库图佐夫麾下指挥第四纵队，
    死守普拉岑高地。1812年卫国战争中表现突出，1818年起任圣彼得堡军事总督。
    1825年在十二月党人起义中于参政院广场试图劝降起义者时被枪击身亡。
  书中原文: |
    "现在已经有俄国人了：米洛拉多维奇和多赫图罗夫，本来还有第三个阿拉克切耶夫伯爵的，不过他这人的神经太脆弱了。"
  网络来源: |
    https://baike.baidu.com/item/米哈伊尔·安德烈伊奇·米罗拉多维奇
    https://baike.so.com/doc/110153-116219.html

- 名词: 朗热隆
  解释: |
    路易·亚历山大·安德罗·德·朗热隆伯爵（Louis Alexandre Andrault de Langeron，1763–1831），
    法国贵族出身的俄国步兵上将。法国大革命爆发后作为保王党人于1790年加入俄军，
    参加过苏沃洛夫攻占伊兹梅尔的战斗。奥斯特利茨战役中指挥俄奥联军左翼第二纵队，
    因作战不力联军惨败，战后被解职。后任新俄罗斯总督，对敖德萨发展贡献显著。
    敖德萨至今仍有朗热隆海滩（Ланжерон）。
  书中原文: |
    "朗热隆伯爵坐得离魏罗特尔最近，在整个朗读过程中，他那张法国南方人的面孔始终含着讥讽的微笑，眼睛看着那捏着绘有肖像的金质鼻烟壶的两角迅速转动的纤细手指。"
  网络来源: |
    https://www.napoleon.org/en/history-of-the-two-empires/biographies/langeron-count-louis-alexandre-andrault-de
    https://www.wikiwand.com/zh-sg/articles/Louis_Alexandre_Andrault_Langeron

- 名词: 普热贝舍夫斯基
  解释: |
    伊格纳齐·普热贝舍夫斯基（Ignacy Przybyszewski，1755–？），原为波兰军队军官，
    1793年转入俄军服役，1799年晋升中将。在1805年奥斯特利茨战役中指挥联军第三纵队，
    纵队在法军猛攻下被击溃，他本人被法军俘虏。战后因此被降职惩处，
    1810年被罚在一个团里当普通士兵一个月后退役。
  书中原文: |
    "普热贝舍夫斯基表情恭谨有礼，他对着魏罗特尔用一只手拢着耳朵，样子正像一个全神贯注的人。"
  网络来源: |
    http://nsfarchives.altervista.org/napoleon/forum/archive2016_config.pl@md=read%3Bid=173104.html

- 名词: 阿拉克切耶夫
  解释: |
    阿列克谢·安德烈耶维奇·阿拉克切耶夫（Alexei Andreyevich Arakcheyev，1769–1834），
    俄国炮兵上将，亚历山大一世晚年最有权势的权臣。1803年任炮兵总监，1808年任陆军大臣。
    1815–1825年其权力达到巅峰，史称"阿拉克切耶夫时期"（阿拉克切耶夫щина），
    以铁腕手段推行军事屯田制度，压制自由思想。在奥斯特利茨战役前夕曾任俄军将领，
    但因"神经太脆弱"未能参战。
  书中原文: |
    "已经有两个俄国人了：米洛拉多维奇和多赫图罗夫，本来还有第三个阿拉克切耶夫伯爵的，不过他这人的神经太脆弱了。"
  网络来源: |
    https://baike.baidu.com/item/阿列克谢·安德烈耶维奇·阿拉克切耶夫
    https://www.britannica.com/biography/Aleksey-Andreyevich-Graf-Arakcheyev

- 名词: 萨瓦里
  解释: |
    安尼·让·马里·雷尼·萨瓦里（Anne Jean Marie René Savary，1774–1833），法国将军，
    拿破仑的副官和亲信，洛维戈公爵（Duc de Rovigo）。最初是德塞将军的副官，
    马伦哥战役后继任拿破仑副官。1805年奥斯特利茨战役前夕持军使小旗奉命前往维绍
    求见俄国皇帝，假意提出和谈建议以诱敌深入，为法军最终的胜利创造条件。
    后任警务大臣、驻俄大使等要职。
  书中原文: |
    "十七日黎明，一个打着军使小旗求见俄国皇帝的法国军官从前哨被送到维绍城。这个军官名叫萨瓦里。"
  网络来源: |
    https://baike.baidu.com/item/安尼·让·马里·雷尼·萨瓦里
    https://www.britannica.com/biography/Anne-Jean-Marie-Rene-Savary-duc-de-Rovigo

- 名词: 温普芬
  解释: |
    马克西米利安·冯·温普芬男爵（Maximilian Freiherr von Wimpffen，1770–1854），奥地利将军，
    后晋升陆军元帅。参加了1788–1790年奥土战争和反法战争。在1805年奥斯特利茨战役中
    担任俄奥联军纵队指挥官，因表现英勇被授予玛丽亚·特蕾莎军事勋章。
    战后历任威尼斯总督区司令官、总参谋部军需总监、维也纳驻军司令等职。
  书中原文: |
    "除了你们的库图佐夫，所有纵队的长官没有一个俄国人。这些长官是：温普芬将军大人、朗热隆伯爵、利希滕施泰因公爵、霍恩洛厄公爵以及普尔什……一串波兰名字。"
  网络来源: |
    https://www.aeiou.at/aeiou.encyclop.w/w748546.htm
    https://austria-forum.org/af/AEIOU/Wimpffen%2C_Maximilian_Freiherr_von

- 名词: 霍恩洛厄
  解释: |
    路德维希·阿洛伊斯·霍恩洛厄-瓦尔登堡-巴滕施泰因亲王（Ludwig Aloys zu Hohenlohe-Waldenburg-Bartenstein，1765–1829），
    德国亲王，最初在奥地利军队服役，后成为联军将领。1805年奥斯特利茨战役中
    任俄奥联军纵队指挥官。1809年参加了埃克米尔、阿斯佩恩-埃斯林、瓦格拉姆等战役。
    波旁复辟后加入法军，1827年成为法国元帅。
  书中原文: |
    "除了你们的库图佐夫，所有纵队的长官没有一个俄国人。这些长官是：温普芬将军大人、朗热隆伯爵、利希滕施泰因公爵、霍恩洛厄公爵以及普尔什……一串波兰名字。"
  网络来源: |
    https://ipfs.io/ipfs/bafybeiemxf5abjwjbikoz4mc3a3dla6ual3jsgpdr4cjr3oz3evfyavhwq/wiki/Louis_Aloy_de_Hohenlohe-Waldenburg-Bartenstein.html
    https://zh.wikipedia.org/wiki/霍恩洛厄家族

- 名词: 利希滕施泰因
  解释: |
    约翰一世·约瑟夫（Johann I Joseph，1760–1836），列支敦士登亲王、奥地利骑兵将军，
    后晋升陆军元帅。1805年奥斯特利茨战役中指挥联军第五纵队（骑兵，约4600人），
    战后代表奥地利与拿破仑谈判并签署《普雷斯堡和约》。1809年参加埃克米尔、
    阿斯佩恩-埃斯灵、瓦格拉姆等战役。1810年因被认为外交能力不足而辞去军职，
    专注于列支敦士登的内政改革，使列支敦士登走向现代主权国家。
  书中原文: |
    "除了你们的库图佐夫，所有纵队的长官没有一个俄国人。这些长官是：温普芬将军大人、朗热隆伯爵、利希滕施泰因公爵、霍恩洛厄公爵以及普尔什……一串波兰名字。"
  网络来源: |
    https://en.wikipedia.org/wiki/Johann_I_Joseph,_Prince_of_Liechtenstein
    https://military-history.fandom.com/wiki/Johann_I_Joseph,_Prince_of_Liechtenstein

- 名词: 托尔斯泰伯爵
  解释: |
    彼得·亚历山德罗维奇·托尔斯泰伯爵（Pyotr Alexandrovich Tolstoy，1761–1844），
    俄国将军、外交家，属托尔斯泰贵族家族，是作家列夫·托尔斯泰的远房亲戚。
    1805年任内务大臣兼亚历山大一世私人代表，曾将库图佐夫对战败的担忧转告沙皇。
    1807–1808年任俄国驻巴黎大使，对拿破仑极其警惕，预言了法国入侵俄国。
    后任国务委员会成员和彼得堡总督。
  书中原文: |
    "我看要吃败仗，我把这话告诉了托尔斯泰伯爵，请他转告皇上。你猜他怎么回答我？亲爱的将军！我是管大米和肉丸子的，军事要由您来管。"
  网络来源: |
    https://baike.baidu.com/item/彼得·安德烈耶维奇·托尔斯泰
    https://encyclopedia2.thefreedictionary.com/Tolstoi,+Petr+Aleksandrovich

- 名词: 维利埃
  解释: |
    维利埃（Villiers，亦译作维利耶），沙皇亚历山大一世的御医。
    历史原型可能是苏格兰裔医生詹姆斯·怀利爵士（Sir James Wylie，1768–1854，
    俄文名雅科夫·瓦西里耶维奇·维利耶），他担任沙皇首席御医数十年，
    并在俄军中建立了系统的军医体系。在《战争与和平》中，1805年奥斯特利茨战役前夕，
    亚历山大一世在维绍因看见死伤士兵而心神不宁，数次召见维利埃探视。
  书中原文: |
    "次日皇上在维绍城驻跸下来。御医维利埃数次应召前去探视。大本营和附近的军队传闻圣体欠安。"
  网络来源: |
    https://pages.haomooc.com/index.php?s=book&c=extend&id=9815
    https://pmc.ncbi.nlm.nih.gov/articles/PMC6477556/

- 名词: 三皇大战
  解释: |
    即奥斯特利茨战役（Battle of Austerlitz），1805年12月2日发生于波希米亚的
    奥斯特利茨村（今捷克境内）。因法皇拿破仑一世、俄皇亚历山大一世、
    奥皇弗朗茨二世三位皇帝亲临战场指挥，故称"三皇大战"或"三皇会战"。
    此役法军约73000人击败约86000人的俄奥联军，是拿破仑军事生涯的巅峰之作，
    直接导致第三次反法同盟瓦解和神圣罗马帝国终结。
  书中原文: |
    "其结果仅仅是奥斯特利茨战役，即所谓三皇大战的失败，也就是世界历史的时针在人类历史的表盘上缓慢的移动。"
  网络来源: |
    https://baike.baidu.com/item/奥斯特利茨战役
    https://zh.wikipedia.org/wiki/三皇会战

- 名词: 维绍战役
  解释: |
    维绍战役（Battle of Wischau / Vyškov），1805年11月25日发生于摩拉维亚的
    维绍（今捷克维什科夫），是奥斯特利茨大会战前最后一次主要前哨冲突。
    俄军约12000–24000人在巴格拉季昂亲王指挥下击败法军约1400人的骑兵师，
    俄军获胜并缴获法军一面帝国鹰旗。此役的轻松胜利使联军误判法军脆弱可欺，
    助长了贸然决战的冒险心态，最终导致奥斯特利茨的惨败。
  书中原文: |
    "由维绍战役的胜利者多尔戈鲁科夫公爵代表陛下和萨瓦里一起前去与拿破仑谈判，如果谈判出乎意料真的具有讲和诚意的话。"
  网络来源: |
    https://military-history.fandom.com/wiki/Battle_of_Wischau
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/book-3-chapter-11.html
