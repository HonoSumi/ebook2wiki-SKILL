- 名词: 蒂尔西特
  解释: |
    蒂尔西特（Tilsit，今俄罗斯加里宁格勒州苏维埃茨克）是1807年6月底至7月初
    拿破仑一世与俄国沙皇亚历山大一世举行历史性会面的地点。两位皇帝在涅曼河
    中央的木筏上单独会谈，随后签署《蒂尔西特和约》，俄国加入大陆封锁体系
    对抗英国，法国则承认俄国对瑞典和奥斯曼帝国的利益。这次会面标志着法兰西
    第一帝国达到鼎盛，法俄结成表面同盟，但同盟本质脆弱，最终于1812年破裂。
  书中原文: |
    六月十三日，法、俄两国的皇帝在蒂尔西特会见。鲍里斯·德鲁别茨科伊向他
    所跟随的要人请求把他列入驻蒂尔西特的侍从。……鲍里斯是两位皇帝在涅曼
    会见的少数目击者之一；他看见带花字头的木筏，看见拿破仑在对岸从法国近卫军
    面前走过，看见亚历山大皇帝在涅曼河岸上一家小酒店里坐着等待拿破仑的时候，
    他那心事重重的脸色；看见两位皇帝上了船，拿破仑的船首先靠拢木筏，他快步
    走上前去迎接亚历山大，把手伸给他，于是两人一起进入大帐篷。
  网络来源: |
    https://zh.wikipedia.org/wiki/提尔西特条约
    https://baike.baidu.com/item/蒂尔西特和约

- 名词: 涅曼河
  解释: |
    涅曼河（Neman River，俄语：Неман，立陶宛语：Nemunas，德语：Memel）
    是东欧平原西部的重要河流，发源于白俄罗斯明斯克附近，流经白俄罗斯、
    立陶宛和俄罗斯加里宁格勒州，全长937公里，注入波罗的海的库尔斯潟湖。
    历史上涅曼河具有重要的战略意义，1807年拿破仑与亚历山大一世在涅曼河
    中央的木筏上举行会面并签订《蒂尔西特和约》。1812年拿破仑入侵俄国时
    也曾率大军渡过此河。在二战前，涅曼河被视为德语分布地区的东部界线。
  书中原文: |
    鲍里斯是两位皇帝在涅曼会见的少数目击者之一；他看见带花字头的木筏，
    看见拿破仑在对岸从法国近卫军面前走过，看见亚历山大皇帝在涅曼河岸上
    一家小酒店里坐着等待拿破仑的时候，他那心事重重的脸色。
  网络来源: |
    https://wapbaike.baidu.com/item/尼曼河/4469972
    https://zh.wikipedia.org/wiki/尼曼河

- 名词: 弗里德兰
  解释: |
    弗里德兰（Friedland，今俄罗斯加里宁格勒州普拉夫金斯克附近）是1807年
    6月14日拿破仑取得决定性胜利的战场。此战中，拿破仑以约8.6万法军击溃
    本尼格森伯爵率领的约7.6万俄军，俄军伤亡约2万人。弗里德兰战役直接
    导致第四次反法同盟瓦解，迫使俄皇亚历山大一世求和，一周后法俄两国皇帝
    在涅曼河会面并签订《蒂尔西特和约》。书中提到保罗格勒团队未参加此战役。
  书中原文: |
    十七六月间，在弗里德兰打了一仗，保罗格勒团队没有参加这次战役，
    接着宣布停战。
  网络来源: |
    https://zh.wikipedia.org/wiki/弗里德蘭戰役
    https://baike.baidu.com/item/弗里德兰战役/6955603

- 名词: 伤寒
  解释: |
    伤寒（Typhoid Fever）是由伤寒沙门氏菌引起的一种急性肠道传染病，通过
    被污染的水源或食物传播，主要症状包括持续高热（39-40℃）、腹痛、严重
    腹泻、玫瑰色斑疹等，如不及时治疗可致肠道出血或穿孔而死亡。在19世纪的
    战争中，伤寒是造成士兵死亡的主要原因之一——克里米亚战争中死于伤寒的
    士兵是因战伤死亡的10倍。当时伤寒疫苗尚未发明（直到1898年赖特才研制出
    伤寒疫苗），因此医院环境恶劣，极易交叉感染。
  书中原文: |
    “您干吗来了？是不是子弹没怎么样您，您来碰碰伤寒？这儿是传染病院，老兄。”
    “伤寒，老兄。谁进来，谁就是找死。只有我和马克耶夫在这儿磨蹭。我们当大夫的
    同行在这儿已经死了五六个了。新来的人要不了一个星期就完蛋大吉。”
  网络来源: |
    https://news.sciencenet.cn/htmlnews/2025/10/553847.shtm
    https://mooc1.chaoxing.com/mooc-ans/ztnodedetailcontroller/visitnodedetail?courseId=84166836&knowledgeId=84166870

- 名词: 俄磅
  解释: |
    俄磅（俄语：фунт，缩写：фн）是俄罗斯传统重量单位，自1747年起成为
    沙俄标准重量单位，一直使用到1918年苏联改用国际公制后才被废除。
    1俄磅约等于409.5克（较英制磅453.6克略小）。在俄制计量体系中，
    1普特（пуд）= 40俄磅 ≈ 16.38千克。书中普鲁士的太太小姐每月给
    医院寄两俄磅咖啡和两俄磅棉线团，约合819克。
  书中原文: |
    总算不错，普鲁士的太太小姐每月给我们寄两俄磅咖啡和两俄磅棉线团，
    不然我们更要命了。
  网络来源: |
    https://baike.baidu.com/item/俄磅/637422
    https://www.baike.com/wikiid/7605565318195920313

- 名词: 莫利坦
  解释: |
    莫利坦（Molitor）全名加布里埃尔·让·约瑟夫·莫利坦（Gabriel Jean Joseph
    Molitor，1770-1849），法国将军，后于1823年被封为法国元帅。在1807年
    第四次反法同盟战争期间，他主要在瑞典波美拉尼亚战线指挥作战，参与围攻
    施特拉尔松德（Siege of Stralsund），战后被任命为波美拉尼亚总督并获封
    伯爵。书中杰尼索夫即是在莫利坦指挥的战斗中负伤。
  书中原文: |
    “杰尼索夫少校，”罗斯托夫又说一遍，“他是在莫利坦受的伤。”
  网络来源: |
    https://en.wikipedia.org/wiki/Gabriel_Jean_Joseph_Molitor
    https://www.napoleon.org/en/history-of-the-two-empires/biographies/molitor-gabriel-jean-joseph/

- 名词: 保罗格勒团队
  解释: |
    保罗格勒团队（Pavlogradsky Hussar Regiment）全称帕夫洛格拉德骠骑兵团，
    是俄罗斯帝国陆军的一支著名骠骑兵部队，成立于1784年。该团在拿破仑战争
    中战功卓著，曾参与1805年申格拉本血战（以5000人对30000法军）获得圣乔治
    旗荣誉，以及奥斯特利茨战役、1812年卫国战争等。在1807年弗里德兰战役时，
    该团未直接参战。书中主人公尼古拉·罗斯托夫即隶属于保罗格勒团队。
  书中原文: |
    十七六月间，在弗里德兰打了一仗，保罗格勒团队没有参加这次战役，
    接着宣布停战。罗斯托夫由于朋友不在跟前很难过，自杰尼索夫走后，
    杳无音信，他很为朋友的案件和伤势担心，趁停战的机会，请准了假，
    到医院去探望杰尼索夫。
  网络来源: |
    https://bbs.napolun.com/thread-73324-1-6.html
    https://bbs.napolun.com/forum.php?mod=viewthread&tid=22400
