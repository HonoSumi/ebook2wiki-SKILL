- 名词: 穆齐·塞服拉
  解释: 穆齐·塞服拉（Gaius Mucius Scaevola），古罗马传说中的英雄。约公元前509年，罗马与伊特鲁里亚国王波尔塞纳作战，穆齐·塞服拉潜入敌营刺杀波尔塞纳未果，被捕后为表决心将右手伸入祭坛火焰中烧毁，面无惧色。波尔塞纳为其勇气所震撼，释放了他。穆齐·塞服拉因此得名"Scaevola"（拉丁语意为"左撇子"）。他的壮举成为古罗马坚毅与爱国精神的象征。
  书中原文: 穆齐·塞服拉烧掉了自己的手，可我生活中为什么就遇不到这种事呢？
  网络来源: https://baike.baidu.com/item/%E7%AB%9E%E6%8A%80%E5%A0%B4
- 名词: 基邦
  解释: 基邦（Edward Gibbon，1737—1794），通译爱德华·吉本，英国著名历史学家，启蒙时代史学代表。代表作《罗马帝国衰亡史》（六卷，1776—1788年），叙述从罗马帝国早期至1453年东罗马帝国灭亡近1300年历史。吉本将罗马衰亡归因于自由的丧失、蛮族入侵和基督教的兴起，其著作确立了"罗马帝国衰亡"范式，影响深远。
  书中原文: 从基邦到保克尔的现代史学家，虽然他们好像有所分歧，他们的观点貌似新颖，但是这两个古老的、无法避免的原则仍然是他们的全部著作的基础。
  网络来源: https://baike.baidu.com/item/%E7%88%B1%E5%BE%B7%E5%8D%8E%C2%B7%E5%90%89%E6%9C%AC/5215475
- 名词: 保克尔
  解释: 保克尔（Henry Thomas Buckle，1821—1862），通译亨利·托马斯·巴克尔，英国实证主义史学家。代表作《英国文明史》（1857—1861年），主张历史应像自然科学一样探求规律，认为人类社会受自然规律与精神规律共同支配，率先将统计学方法引入历史研究。其著作在20世纪初的中国曾出现两次传播高峰。
  书中原文: 从基邦到保克尔的现代史学家，虽然他们好像有所分歧，他们的观点貌似新颖，但是这两个古老的、无法避免的原则仍然是他们的全部著作的基础。
  网络来源: https://baike.baidu.com/item/%E4%BA%A8%E5%88%A9%C2%B7%E6%89%98%E9%A9%AC%E6%96%AF%C2%B7%E5%B7%B4%E5%85%8B%E5%B0%94/22869070
- 名词: 路易十四
  解释: 路易十四（Louis XIV，1638—1715），法国波旁王朝国王，号称"太阳王"，在位72年（1643—1715），是欧洲在位最久的独立主权君主。他亲政后不再设首相，推行绝对君主制，建造凡尔赛宫，将法国专制王权推向顶峰。其统治时期法国成为欧洲文化中心与头号强国，但连年战争和宗教迫害也为后来的衰落和大革命埋下伏笔。
  书中原文: 路易十四是一个非常骄傲自大的人；他有哪些哪些情人，有哪些哪些大臣，他没有把法国治理好。
  网络来源: https://baike.baidu.com/item/%E8%B7%AF%E6%98%93%E5%8D%81%E5%9B%9B/15294
- 名词: 路易十八
  解释: 路易十八（Louis XVIII，1755—1824），法国波旁王朝国王，路易十六之弟。1814年拿破仑战败退位后第一次复辟，颁布《1814年宪章》实行君主立宪制。后因拿破仑"百日王朝"流亡比利时，1815年滑铁卢战役后第二次复辟。他试图在旧贵族与新兴资产阶级间寻求平衡，但受制于极端保王派，改革未能深入推进。
  书中原文: 嗣后路易十八即位，此人一直不过是法国人和盟国人取笑的对象。
  网络来源: https://baike.baidu.com/item/%E8%B7%AF%E6%98%93%E5%8D%81%E5%85%AB/3799809
- 名词: 厄尔巴岛
  解释: 厄尔巴岛（Elba），意大利中部第勒尼安海中的岛屿，位于亚平宁半岛和科西嘉岛之间，面积223平方公里，为意大利第三大岛。盛产铁矿，属地中海气候。1814年拿破仑战败退位后根据《枫丹白露条约》被流放至此，保留皇帝头衔，居住了约300天后于1815年逃离并返回法国建立"百日王朝"。
  书中原文: 盟军战胜了拿破仑，进入巴黎，迫使拿破仑退位，把他流放到厄尔巴岛，并且不取消他的皇帝称号，对他表示各种敬意。
  网络来源: https://baike.baidu.com/item/%E5%8E%84%E5%B0%94%E5%B7%B4%E5%B2%9B
