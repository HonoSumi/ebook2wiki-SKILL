- 名词: 圣经会
  解释: 俄罗斯圣经公会（Russian Bible Society），1813年在沙皇亚历山大一世御准下成立于圣彼得堡，首任主席为亚历山大·戈利岑亲王。该会在1813—1826年间印制并分发超过50万本圣经，涵盖41种语言，推动了圣经译成现代俄语的工作。1826年被尼古拉一世关闭，1991年恢复。
  书中原文: "杰尼索夫不是这个家庭里的成员，他不明白皮埃尔为什么这样谨小慎微，同时，由于他对现状不满，因此很想知道彼得堡的情况，他不断地怂恿皮埃尔讲讲谢苗诺夫团刚刚发生的事，讲讲阿拉克切耶夫，讲讲圣经会。"
  网络来源: https://en.wikipedia.org/wiki/Russian_Bible_Society

- 名词: 戈斯涅尔
  解释: 约翰·埃万格利斯特·戈斯涅尔（Johann Evangelist Gossner，1773—1858），德国天主教神父后转路德宗牧师，宣教会创始人。1820—1824年在圣彼得堡传教，每次弥撒后宣讲福音派信息，吸引大量信徒。因东正教会高层嫉妒其影响力，被沙皇亚历山大一世驱逐出境。后返回柏林创立戈斯纳宣教会（Gossner Missionary Society），向印度等地宣教。
  书中原文: "戈斯涅尔，塔塔利诺娃，那都是疯子干的事，怎么样，他们还继续干吗？"
  网络来源: https://christianhistoryinstitute.org/dailystory/permalink/jealous-religious-leaders-kicked-gossner-out-of-russia

- 名词: 塔塔利诺娃
  解释: 叶卡捷琳娜·菲利波夫娜·塔塔利诺娃（Ekaterina Filippovna Tatarinova，1783—1856），俄国宗教神秘主义者，在圣彼得堡上层社会创立神秘主义社团，融合东正教神秘主义与民间信仰。她的社团吸引了许多贵族、军官甚至沙皇亚历山大一世的关注，是亚历山大一世时期俄国宗教神秘主义运动的重要代表人物。
  书中原文: "戈斯涅尔，塔塔利诺娃，那都是疯子干的事，怎么样，他们还继续干吗？"
  网络来源: https://www.galaxus.ch/en/s12/product/radlova-tatarinova-the-prophetess-of-s-german-2024-reference-books-43187794

- 名词: 克律德涅夫人
  解释: 芭芭拉·朱丽安妮·冯·克律德纳（Barbara Juliane von Krüdener，1764—1824），波罗的海德意志裔神秘主义者和作家。1804年出版半自传小说《Valérie》获得文名，后经历宗教皈依，投身千禧年主义。1815年在海尔布隆遇见沙皇亚历山大一世，畅谈三小时，沙皇伏案痛哭，称"找到了平安"。她随沙皇前往巴黎，被认为是神圣同盟（Holy Alliance）思想的提出者之一。1821年因预言亚历山大一世支持希腊独立被驱逐出圣彼得堡。
  书中原文: "过去不得不做德意志人，现在就得陪塔塔利诺娃和克律德涅夫人跳舞，读艾加特豪森那帮家伙的著作。"
  网络来源: https://en.wikipedia.org/wiki/Barbara_Juliana,_Baroness_von_Kr%C3%BCdener

- 名词: 艾加特豪森
  解释: 卡尔·冯·艾加特豪森（Karl von Eckartshausen，1752—1803），德国天主教神秘主义者、作家、哲学家。曾任慕尼黑图书馆审查官。其代表作《圣所之上的云》（The Cloud upon the Sanctuary）阐述自太初就存在的「无形天启教会」，对后来的黄金黎明协会和阿莱斯特·克劳利产生深远影响。另著有《上帝是最纯粹的爱》等，是19世纪初俄国神秘主义思潮的重要来源之一。
  书中原文: "过去不得不做德意志人，现在就得陪塔塔利诺娃和克律德涅夫人跳舞，读艾加特豪森那帮家伙的著作。"
  网络来源: https://sacred-texts.com/eso/cuts/cuts02.htm

- 名词: 道德联盟
  解释: Tugendbund（德语意为"美德联盟"），1808年6月成立于普鲁士柯尼斯堡的准共济会式秘密社团，正式名称为"科学道德协会"。其表面目的为教育性和道德修养，实际旨在复兴普鲁士民族意识、反抗拿破仑统治。成员约748人，主要为自由派贵族、知识分子和高级官僚。1809年被拿破仑下令取缔，同年12月由普鲁士国王腓特烈·威廉三世正式解散。
  书中原文: "道德联盟是一种美德的联盟，那就是爱，就是互助，就是基督在十字架上所宣扬的东西。"
  网络来源: https://www.wikiwand.com/EN/Tugendbund

- 名词: 施瓦茨(谢苗诺夫团)
  解释: 费奥多尔·施瓦茨上校（Colonel F.E. Schwartz），1820年时任谢苗诺夫近卫团团长，以治军极其严酷著称，残酷鞭打士兵。1820年10月因点名时队形散漫引发士兵哗变，士兵集体抗议其暴虐。沙皇亚历山大一世下令解散谢苗诺夫团，施瓦茨因"失职"被勒令退役。该事件促使许多温和军官转向激进，成为1825年十二月党人起义的重要催化剂。
  书中原文: "把谢苗诺夫团交给施瓦茨这样的大兵，成什么话？"
  网络来源: https://history.rsuh.ru/jour/article/view/1097?locale=en_US

- 名词: 普加乔夫
  解释: 叶梅利扬·伊万诺维奇·普加乔夫（Yemelyan Pugachev，约1742—1775），1773—1775年俄国最大规模农民起义（普加乔夫起义）的领袖。他自称被杀的沙皇彼得三世，以哥萨克人、农奴、乌拉尔工人和少数民族为核心，起义席卷俄国东南60余万平方公里，极盛时期兵力达10—12万人。1775年在莫斯科被处决。普希金以其事迹为背景创作了小说《上尉的女儿》。
  书中原文: "我们的目的是防止明天普加乔夫来杀害你我的子孙，防止我被送往屯垦区去。"
  网络来源: https://baike.baidu.com/item/%E6%99%AE%E5%8A%A0%E4%B9%94%E5%A4%AB%E8%B5%B7%E4%B9%89

- 名词: 屯垦(军事屯垦)
  解释: 俄国军事屯垦制度（Военные поселения），1810—1857年存在于俄罗斯帝国的兵农合一制度。拿破仑战争后为降低军费、保持后备军而设立。1816年起大规模推广，由阿拉克切耶夫伯爵任总监。军屯居民须穿军服、接受军训，生活服从严格军事纪律，7岁以上子女即接受军事教育。残酷压迫引发了1819年丘古耶夫团起义和1831年旧鲁萨起义。1857年被正式废除。
  书中原文: "我们的目的是防止明天普加乔夫来杀害你我的子孙，防止我被送往屯垦区去。"
  网络来源: https://en.wikipedia.org/wiki/Military_settlement
