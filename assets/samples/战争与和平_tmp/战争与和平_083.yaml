- 名词: 特列帕克舞
  解释: |
    特列帕克舞（Трепак / Trepak）是俄罗斯一种传统民间竞赛舞蹈，节奏为明快的2/4拍，情绪欢快奔放，以变幻、滑行、细碎的舞步为特点。该舞蹈常模仿动物形态表现人的性格，具有浓郁的民族乡土气息。俄罗斯作曲家柴可夫斯基在其芭蕾舞剧《胡桃夹子》中创作了著名的《特列帕克舞曲》，使这一民间舞蹈形式广为人知。
  书中原文: |
    罗斯托夫和巴索夫跳了一场特列帕克舞；酩酊大醉的军官们把罗斯托夫抛起来，拥抱他，然后放下；第三骑兵连的士兵们再一次抛起他，喊乌拉！然后他们把罗斯托夫放在雪橇里，一直护送他到第一个驿站。
  网络来源: |
    https://baike.baidu.com/item/特列帕克
    https://m.sohu.com/a/528582115_121296870

- 名词: 安娜勋章
  解释: |
    即圣安娜勋章（Order of Saint Anna），俄罗斯帝国时期重要的军事和民事勋章。1735年由荷尔斯泰因-戈托普公爵卡尔·弗里德里希为纪念妻子安娜·彼得罗芙娜（彼得大帝之女）而设立，1797年由保罗一世正式纳入俄罗斯帝国勋章体系。该勋章最初分为三级，1815年改为四级，绶带为红色带黄边，箴言为拉丁文"授予热爱真理、虔诚、忠心之人"。帝俄时期累计颁发数十万枚，是颁量最大的勋章之一。苏联成立后废止。
  书中原文: |
    不论是在他看来是多么难以想象和奇怪，在他没有知道司令部是否把他升为骑兵大尉（这是他特别感到兴趣的），或者他在最近几次演习是否获得安娜勋章的时候，他竟然走了。
  网络来源: |
    https://baike.baidu.com/item/圣安娜勋章
    https://www.wikiwand.com/zh/articles/Order_of_Saint_Anna

- 名词: 切尔克斯高顶帽
  解释: |
    切尔克斯高顶帽即高加索地区传统的毛皮高帽，俄语称"帕帕哈"（папаха）。这种帽子起源于高加索和中亚地区，被切尔克斯人、格鲁吉亚人、车臣人等众多高加索民族广泛使用，后为高加索哥萨克人采用，成为哥萨克骑兵的标志性装束。帽子呈圆柱形或圆台形，用棉或毛制成，在高加索文化中是骄傲和荣誉的象征，当地谚语云："戴帽子不是为了保暖，而是为了荣誉"。
  书中原文: |
    他在主人面前脱下切尔克斯高顶帽，轻蔑地望着他。这种轻蔑的态度并没有使主人觉得受辱：尼古拉知道，这个蔑视一切、高出一切的丹尼洛，仍然是他的奴仆和猎人。
  网络来源: |
    https://big5.cctv.com/gate/big5/jishi.cctv.com/2010/02/02/VIDE1355597609740645.shtml
    https://mzh.moegirl.org.cn/哥萨克帽

- 名词: 克列缅丘格
  解释: |
    克列缅丘格（Kremenchuk / Кременчук），又译克雷门丘克，乌克兰中部波尔塔瓦州城市，位于第聂伯河畔。1571年作为军事要塞建立，1635年获得城市自治权。现为乌克兰重要的工业城市和铁路枢纽，以汽车制造、道路机械制造和石油加工著称。城市名称据说来源于"kremen"（燧石），因其坐落于巨大的燧石板上。
  书中原文: |
    从克列缅丘格到基辅，走了途程的一半，正如常有的情形，罗斯托夫的思想还停留在后面，停留在骑兵连队；但是过了一半的路程后，他已经忘掉三匹黑鬃烈马，忘掉他的司务长和博尔若佐夫斯卡娅小姐，开始不安地问自己，到了奥特拉德诺耶将要看到什么，那儿的情形怎么样。
  网络来源: |
    https://baike.baidu.com/item/克列缅丘格
    https://zh.wikipedia.org/zh-hant/克列缅丘格
