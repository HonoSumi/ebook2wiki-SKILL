- 名词: 奥尔斯珀格
  解释: |
    奥尔斯珀格公爵（全名卡尔·威廉·菲利普·冯·奥尔斯珀格，Karl Wilhelm Philipp von Auersperg），是奥地利帝国的贵族和军事将领。在《战争与和平》中，法国元帅缪拉等人打着休战谈判的旗号来到维也纳附近的一座桥头，要会见奥尔斯珀格。他被法军的花言巧语迷惑，允许法军进入桥头堡，导致法军兵不血刃地占领了这座关键桥梁。书中描写他容易受骗、看重表面荣誉、缺乏军事警觉性。
  书中原文: |
    他假装惊讶（地地道道的牛皮匠），对奥尔斯珀格说：‘我真看不出举世闻名的奥地利军纪在哪儿，’他说，‘您竟让下级对您这样说话！’这简直是天才。奥尔斯珀格公爵感到受了侮辱，下令逮捕那个军士。
  网络来源: |
    http://datongshuhua.cn/page101?article_id=413&pagenum=26
    https://baike.baidu.com/item/奥尔斯珀格

- 名词: 魏罗特尔
  解释: |
    魏罗特尔（Franz von Weyrother，1755-1806），奥地利军队将军，在《战争与和平》中接替阵亡的施米特将军，担任俄奥联军参谋长。他是主战派的代表人物，在奥斯特里茨战役前主导制定了联军的作战计划。库图佐夫对这一计划持保留态度。最终奥斯特里茨战役以俄奥联军惨败告终，魏罗特尔也因此被认为是战败的主要责任人之一。
  书中原文: |
    库图佐夫跟巴格拉季翁和魏罗特尔一起在一家农舍里。魏罗特尔是接替阵亡的施米特的奥地利将军。
  网络来源: |
    https://www.jianshu.com/p/a7b714d5f605
    https://baike.baidu.com/item/魏罗特尔

- 名词: 奥尔米茨
  解释: |
    奥尔米茨（Olmütz，今捷克共和国境内的奥洛穆茨/Olomouc），摩拉维亚地区的重要城市。1805年拿破仑战争期间，俄奥联军在此集结，沙皇亚历山大一世和奥皇弗朗茨二世均驻扎于此。这里是联军指挥中枢所在地，也是决定发动奥斯特里茨战役的关键军事会议的召开地。在《战争与和平》中，奥尔米茨是俄奥联军的大本营和外交活动中心。
  书中原文: |
    据说是到奥尔米茨。奥尔米茨是个不错的城市。咱们俩坐着我的四轮马车平平安安地就走到了。
  网络来源: |
    https://baike.baidu.com/item/奥洛穆茨
    https://pages.haomooc.com/index.php?c=extend&id=9452&s=book

- 名词: 茨奈姆
  解释: |
    茨奈姆（Znaim，今捷克共和国境内的兹诺伊莫/Znojmo），是1805年拿破仑战争中的重要战略地点。法军越过维也纳大桥后，以强行军速度向茨奈姆推进，意图切断库图佐夫所率俄军的退路。库图佐夫派遣巴格拉季翁率领四千前卫部队赶往茨奈姆方向阻击，在霍拉布伦一带设防。这场前哨战即为申格拉本战役，为俄军主力撤退争取了宝贵时间。
  书中原文: |
    “总部在什么地方？”“咱们要在茨奈姆过夜。”
  网络来源: |
    https://www.wtxy.net/book/story.php?id=783
    https://pages.haomooc.com/index.php?s=book&c=extend&id=9436

- 名词: 正教军队
  解释: |
    "正教军队"指信奉东正教（正教）的俄国军队。东正教是俄罗斯的国教，在俄国军队中具有重要的精神凝聚作用。在《战争与和平》中，安德烈公爵看到俄军撤退时的混乱与抢掠，对比利宾讽刺俄军的话深有感触，遂以"正教军队"称呼之，带有讽刺意味，暗示这支号称虔诚信仰上帝的军队实际上纪律松弛、军容不整。小说多处描写东正教信仰在俄国军队中的角色，包括战前抬圣像巡行和祈祷仪式等。
  书中原文: |
    “瞧，这就是可爱的正教军队。”博尔孔斯基回忆比利宾的话，心中想道。
  网络来源: |
    https://book.douban.com/annotation/109993930/
    http://datongshuhua.cn/page101?article_id=413&pagenum=23

- 名词: 俄尺
  解释: |
    俄尺（俄语：аршин，arshin），俄国传统长度单位。18世纪彼得大帝将其标准化，1俄尺 = 0.7112米（约71.12厘米）。旧俄长度换算体系为：1俄里（верста）= 500沙绳（сажень）= 1500俄尺，1沙绳 = 3俄尺。该单位自16世纪起使用，直至1925年苏联采用公制后废止。俄语中有"以己度人"（Мерить на свой аршин）等衍生习语。
  书中原文: |
    安德烈公爵看了看库图佐夫，不由得注意到，离他半俄尺远是库图佐夫额角上那道洗得干干净净的、在伊兹梅尔战役中被子弹打穿了头骨留下的疤痕和那只失去眼球的眼睛。
  网络来源: |
    https://baike.baidu.com/item/verst
    https://zh.wiktionary.org/zh-hant/аршин
    https://en.wikipedia.org/wiki/Obsolete_Russian_units_of_measurement
