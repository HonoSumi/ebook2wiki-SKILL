- 名词: 历史哲学
  解释: 历史哲学（Philosophy of History）是哲学的一个分支学科，形成于历史学与哲学的交叉点上。该术语由法国启蒙思想家伏尔泰于1765年在其著作《历史哲学》中首次正式使用。历史哲学主要研究历史进程的模式与意义（历史本体论）、历史研究的性质与方法（历史认识论）以及历史写作的结构与规律（历史叙事论）。重要代表人物包括维科、康德、黑格尔、马克思、斯宾格勒、汤因比等。
  书中原文: 为了解决自由和必然性怎样结合和这两个概念的实质是什么的问题，历史哲学也可以、而且应当走一条与别的科学相反的道路。历史不应当先给自由意志和必然性这两个概念本身下定义，然后把生活现象列入那两个定义，历史应当从大量历史现象中引出自由和必然性这两个概念的定义，而那些现象总是与自由和必然相关联的。
  网络来源: https://wapbaike.baidu.com/item/%E5%8E%86%E5%8F%B2%E5%93%B2%E5%AD%A6/54853123

- 名词: 比较生理学
  解释: 比较生理学（Comparative Physiology）是生理学的一个分支学科，通过比较不同生物（尤其是动物）之间生理机能的相似性与差异性，研究它们在系统发生上的关系和生理功能在进化过程中的演变规律。该学科由德国学者缪勒（J. Müller）于19世纪初创建，由法国生理学家贝尔纳（C. Bernard）于1878年确立为独立学科。
  书中原文: 是不能用比较生理学和动物学来解决的，因为从青蛙、兔子和猴子身上，我们只能观察到筋肉和神经活动，但是从人身上，我们既能观察到筋肉活动和神经活动，也能观察到意识。
  网络来源: https://wapbaike.baidu.com/item/%E6%AF%94%E8%BE%83%E7%94%9F%E7%90%86%E5%AD%A6/263056

- 名词: 比较动物学
  解释: 比较动物学（Comparative Zoology）是动物学的一个分支学科，通过比较分析不同动物物种之间的结构、遗传和发育相似性来揭示进化演变规律。它以同源性（homology）为核心原则，研究物种间的共同祖先关系。脊椎动物比较解剖学是比较动物学中最常用的研究方法之一。
  书中原文: 是不能用比较生理学和动物学来解决的，因为从青蛙、兔子和猴子身上，我们只能观察到筋肉和神经活动，但是从人身上，我们既能观察到筋肉活动和神经活动，也能观察到意识。
  网络来源: https://www.bohrium.com/sciencepedia/feynman/keyword/comparative_zoology

- 名词: 博物学
  解释: 博物学（Natural History）是对自然界物种（动物、植物、矿物等）进行辨识、命名、分类、描述、搜集及展示的一类学问。在西方学术传统中，它与自然哲学相对，强调宏观观察、经验描述和分类整理。18世纪成为独立学科，后逐渐分化为各分支科学。托尔斯泰在此处借用该词批评那些试图仅凭自然科学方法解决自由意志问题的实证主义者。
  书中原文: 自以为能解决这个问题的博物学家和他们的信徒，正如这样一些灰泥匠：本来指定他们粉刷教堂的一面墙壁，可是他们趁着总监工不在，在一阵热情发作下，粉刷了窗子、神像、脚手架，以及还未加扶壁的墙壁，他们很高兴，从他们作灰泥匠的观点来看，一切都弄得又光又滑。
  网络来源: https://wapbaike.baidu.com/item/%E5%8D%9A%E7%89%A9%E5%AD%A6
