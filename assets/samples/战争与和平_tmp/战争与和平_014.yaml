- 名词: 波斯壁毯
  解释: |
    波斯壁毯即波斯地毯（Persian rug/carpet），是伊朗（波斯）最负盛名的手工艺品之一，拥有超过2500年历史，被誉为"地面上的艺术"。波斯地毯以纯手工编织、天然染料染色为特色，图案繁复绚烂，多用羊毛或真丝织成。自汉代张骞出使西域后，波斯地毯通过丝绸之路传入中国。在18—19世纪，俄罗斯是波斯地毯最重要的传统出口市场之一，波斯地毯大量销往俄国，供沙皇宫廷和贵族家庭使用，被视为财富和地位的象征。俄国皇室通过外交使节和商人获取珍贵的波斯地毯，莫斯科克里姆林宫博物馆至今收藏有大量波斯地毯珍品。
  书中原文: |
    皮埃尔非常熟悉这个大房间，房间里间隔着圆柱和拱门，四壁满挂了波斯壁毯。
  网络来源: |
    https://baike.baidu.com/item/%E6%B3%A2%E6%96%AF%E5%9C%B0%E6%AF%AF/9355990

- 名词: 神龛
  解释: |
    神龛（俄语：Киот，Kiot）指放置圣像的专用木制盒子或柜子，正面通常装有玻璃门，用于保护圣像并供祈祷时使用。在俄罗斯东正教传统中，圣像龛（киот）是家庭宗教生活的核心载体，放置在"红角"（красный угол，即家中东南角）之中，是家庭祭坛的象征，信徒在此进行日常祈祷。教堂中对应的则是圣像屏（иконостас），即分隔中殿与至圣所的整面圣像墙。神龛通常为木制，圣像本身常有金属保护边框（оклад），用银或镀金制成，有时镶嵌珐琅和宝石。
  书中原文: |
    圆柱后面，一边放着一张挂着绸帐子的红木高床，另一边是一个巨大的神龛，像做晚祷时的教堂似的，照得红光满屋。
  网络来源: |
    https://baike.baidu.com/item/%E7%A5%9E%E9%BE%9B/5506749

- 名词: 祭服
  解释: |
    祭服（俄语：Фелонь，斐隆/祭披）是基督教神职人员在礼拜仪式中穿着的专用礼服。在俄罗斯东正教传统中，司祭举行圣体圣事时穿着多层祭服，最外层为"斐隆"（фелонь），即无袖大祭披，象征基督被披上的赭袍。高级神职人员的祭服常用金银线织成，装饰珍珠绣和圣像绣，金光闪闪。金色（黄色）祭服主要用于基督节期（主的节日），象征基督的荣耀与神圣光辉。克里姆林宫兵器陈列馆收藏有15—19世纪俄罗斯高级僧侣的珍贵法衣，以金银线织就，代表东正教法衣的最高艺术水平。
  书中原文: |
    沙发前面站着几位神父，穿着肥大的、金光闪闪的祭服，长长的头发披散在祭服外面，手里拿着点燃的蜡烛，缓慢而庄严地念着祷文。
  网络来源: |
    https://baike.baidu.com/item/%E7%A5%AD%E6%9C%8D/9399509

- 名词: 中国细瓷茶杯
  解释: |
    中国细瓷茶杯是明清时期发展起来的薄胎白釉瓷质茶具，以"薄如纸、白似雪、小巧玲珑"为特色。清代闽南、潮汕地区工夫茶文化中的标志性茶器"若琛瓯"即为其经典代表，容水量约10—20毫升，以"小、浅、薄、白"四字诀著称。自17—18世纪起，中国瓷器通过外交与通商大量进入俄国宫廷和贵族家庭，彼得大帝对中国瓷器极度向往，俄国贵族家庭以陈设中国瓷器和丝绸为身份象征。艾尔米塔什博物馆（冬宫）收藏有大量中国瓷器，彼得大帝个人收藏中就有中国纹章瓷。书中的"不带把的中国细瓷茶杯"符合明清外销欧洲和俄国的中国茶杯形制——无把手的薄胎小杯。
  书中原文: |
    罗兰站在圆形小客厅的桌前，桌上摆着茶具和冷晚餐，他端着不带把的中国细瓷茶杯慢吞吞地喝着茶，一面抑制着兴奋的心情说。
  网络来源: |
    https://elsxk.hlju.edu.cn/info/1171/2838.htm
