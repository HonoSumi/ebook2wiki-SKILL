- 名词: 骑兵近卫军
  解释: |
    俄罗斯帝国最精锐的骑兵部队之一，最初由彼得大帝于1724年为妻子叶卡捷琳娜一世的加冕典礼临时组建，后改为常设部队。军官完全从高级贵族中招募，近卫军官兵的军衔比普通军人高两级。在拿破仑战争时期参与了奥斯特利茨、博罗季诺等重要战役。1917年俄国革命后被废除。在《战争与和平》中，老公爵询问阿纳托利是否在骑兵近卫军服役，反映了当时贵族子弟多在该部队服役的社会现实。
  书中原文: |
    “告诉我，亲爱的，您现在是在骑兵近卫军吗？”
  网络来源: |
    https://baike.baidu.com/item/近卫_(荣誉称号)
    https://bbs.napolun.com/thread-22885-1-1.html
- 名词: 沙皇
  解释: |
    俄罗斯君主的称号，源自拉丁语 Caesar（凯撒），经由古希腊语转写而来。1547年伊凡四世（伊凡雷帝）正式加冕为俄罗斯首位沙皇，国号改为沙皇俄国。1721年彼得大帝改称"皇帝"，但民间仍沿用"沙皇"称呼。1917年二月革命后末代沙皇尼古拉二世退位，沙皇制度终结。在《战争与和平》的故事背景（19世纪初拿破仑战争时期），沙皇亚历山大一世在位，小说中多次出现贵族谈论为沙皇和祖国服务的情节。
  书中原文: |
    “怎么样，亲爱的，您愿意为沙皇、为祖国服务吗？”
  网络来源: |
    https://baike.baidu.com/item/沙皇/7372
    https://zh.wikipedia.org/zh-cn/俄罗斯沙皇国
- 名词: 诵经士
  解释: |
    东正教会的下级服务人员，属于白神品体系中的最低一级，尚未取得正式神品（神职）。主要职责包括参加教堂唱诗班、诵读经文、辅助司祭举行圣事等。可以结婚，是教堂中最基层的侍奉人员之一，也是晋升更高神品的第一步。在《战争与和平》中，老公爵用"跟诵经士学认字"来比喻自己这一代人接受的传统基础教育的简朴方式，暗示与阿纳托利接受的西式教育形成对比。
  书中原文: |
    “不像我和你父亲，跟诵经士学认字。”
  网络来源: |
    https://baike.baidu.com/item/诵经士
    https://baike.baidu.com/item/东正教教阶制度/9658474
