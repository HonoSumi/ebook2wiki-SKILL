- 名词: 博里索夫
  解释: 白俄罗斯城市（Borisov，今鲍里索夫），位于别列津纳河畔，距明斯克约75公里。1102年由波洛茨克大公鲍里斯·弗谢斯拉维奇建立。1812年拿破仑从莫斯科撤退时，计划在此渡过别列津纳河，俄军奇恰戈夫上将先期攻占该城并烧毁桥梁，迫使拿破仑在北面上游架设浮桥渡河，法军损失惨重，史称别列津纳河战役。
  书中原文: 奇恰戈夫面红耳赤地说，他想证明他说的字字句句都是正确的，因而认为库图佐夫对他的话也很关注。库图佐夫露出了笑容，含蓄而洞察一切的笑容，他耸耸肩回答说：「我只是要说我刚才说过的话。」
  网络来源: https://baike.baidu.com/item/%E9%B2%8D%E9%87%8C%E7%B4%A2%E5%A4%AB/6712792

- 名词: 奥廖尔
  解释: 俄罗斯城市（Oryol/Орёл），奥廖尔州首府，位于奥卡河畔，莫斯科以南约382公里。1566年由沙皇伊凡雷帝下令修建要塞而建城。俄语意为「鹰」，城市标志为展翅欲飞的鹰。19世纪成为重要交通枢纽，也是屠格涅夫、蒲宁、列斯科夫等文学大师的故乡，有「俄罗斯第三大文学之都」之称。
  书中原文: 从俘虏中被释放以后，他来到奥廖尔，到后第三天，他打算去基辅，但是他病了，在奥廖尔躺了三个月；据医生说，他的病是胆热引起的。
  网络来源: https://baike.baidu.com/item/%E5%A5%A5%E5%BB%96%E5%B0%94/8684334

- 名词: 叶利茨
  解释: 俄罗斯城市（Yelets/Елец），位于利佩茨克州，索斯纳河畔。最早于1146年在文献中被提及，是中央黑土区最古老的城市之一。19世纪发展成为重要贸易中心，以叶列茨蕾丝花边手工艺著称。屠格涅夫、托尔斯泰等作家曾到访或提及该城。
  书中原文: 还有大公爵小姐，她一向在叶利茨皮埃尔的庄园里居住，听说皮埃尔得救和患病，是来侍候他的。
  网络来源: https://baike.baidu.com/item/%E5%8F%B6%E5%88%97%E8%8C%A8/10985325
