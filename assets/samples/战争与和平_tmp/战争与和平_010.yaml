- 名词: 维尔纳夫
  解释: |
    皮埃尔-夏尔·维尔纳夫（Pierre-Charles de Villeneuve，1763-1806），拿破仑战争时期的法国海军上将。1805年特拉法加海战中指挥法西联合舰队，被英国纳尔逊海军上将击败。维尔纳夫未能突破英军封锁掩护拿破仑入侵英国的计划，导致"布伦出征"流产，拿破仑转而向东与俄奥联军作战。
  书中原文: |
    "我看，出征很有可能。只要维尔纳夫不出差错！"
  网络来源: |
    https://zh.wikipedia.org/zh-my/%e7%9a%ae%e5%9f%83%e5%b0%94-%e5%a4%8f%e5%b0%94%c2%b7%e7%bb%b4%e5%b0%94%e7%ba%b3%e5%a4%ab

- 名词: 布伦
  解释: |
    布伦（Boulogne-sur-Mer），法国北部加莱海峡省港口城市。1803-1805年间，拿破仑在此建立庞大军营，集结约15万军队和数千艘平底登陆船，策划入侵英国，史称"布伦远征"或"布伦出征"。由于法国海军在特拉法加海战中战败，该计划最终放弃，布伦军营的部队转而东进攻打俄奥联军。
  书中原文: |
    "喂，您对布伦出征有何感想？拿破仑一渡过海峡，英国人就要倒霉了？"
  网络来源: |
    未检索到独立网络资料（检索结果主要为《战争与和平》相关页面）

- 名词: 麻雀山
  解释: |
    麻雀山（Воробьёвы горы / Sparrow Hills），莫斯科市区西南部的一座高地，坐落在莫斯科河畔。苏联时期曾改名列宁山，现已恢复原名。莫斯科大学主楼即坐落于此。托尔斯泰在《战争与和平》中多次提到这一地标，皮埃尔回忆童年时曾与雅科太太到此游玩。
  书中原文: |
    "您还记得咱们和雅科太太一块儿到麻雀山去吗……很久以前的事了。"
  网络来源: |
    未检索到独立网络资料（检索结果主要为《战争与和平》相关页面）

- 名词: 布伦出征
  解释: |
    布伦出征又称布伦远征（Boulogne Expedition），指拿破仑1803-1805年以法国北部港口布伦为基地策划的入侵英国军事计划。拿破仑在此集结号称"英格兰军团"（Armée d'Angleterre）的大军，并联合西班牙舰队，计划掩护大军横渡英吉利海峡。由于维尔纳夫指挥的法西联合舰队在特拉法加海战中被纳尔逊摧毁，该计划最终破产。这支军队随后更名为"大军团"（Grande Armée），转向东欧并在奥斯特里茨战役中大败俄奥联军。这一历史转折正是《战争与和平》开篇的时代背景。
  书中原文: |
    "喂，您对布伦出征有何感想？拿破仑一渡过海峡，英国人就要倒霉了？"
  网络来源: |
    https://bbs.napolun.com/forum.php?mod=viewthread&action=printable&tid=34787

- 名词: 遗嘱
  解释: |
    在《战争与和平》中，遗嘱指老别祖霍夫伯爵（基里尔·弗拉基米罗维奇·别祖霍夫）临终前关于财产继承的法律文件。伯爵病危之际，围绕其巨额财产——包括四万农奴和数百万家产——展开激烈争夺。瓦西里·库拉金公爵企图篡改遗嘱以谋取利益，而安娜·米哈伊洛夫娜则帮助伯爵的私生子皮埃尔争取继承权。皮埃尔最终成功继承全部遗产，一跃成为俄国最大富豪之一。
  书中原文: |
    "遗嘱会说明一切的，我的孩子；遗嘱也关系着我们的命运呢……"
  网络来源: |
    https://www.baike.com/wikiid/413812471170709480

- 名词: 敕令
  解释: |
    敕令（Указ），沙皇俄国时期皇帝颁布的最高法令或诏书。在《战争与和平》中，指俄国皇帝亚历山大一世就对拿破仑宣战和征兵所颁布的诏令。小说描写莫斯科贵族在书斋中议论已宣布的战争和征兵事宜，敕令作为法律依据成为贵族社交场合的重要话题。
  书中原文: |
    "还没有人看到敕令，但是大家都知道已经颁发了。"
  网络来源: |
    未检索到独立网络资料（检索结果主要为《战争与和平》相关页面）

- 名词: 武备中学
  解释: |
    武备中学（Кадетский корпус / военное училище），沙皇俄国的一种中等军事学校，主要招收贵族子弟，培养军事人才。1730年俄国设立第一所少年武备学校。1863年曾改制为军事中学，1882年恢复建制。普希金、莱蒙托夫等俄国名人都曾在武备中学求学。在《战争与和平》中，贝格中尉因调入近卫军而自诩官阶高出武备中学的同学。
  书中原文: |
    "贝格既没有看出人们在嘲笑，也没看出人们很冷淡，继续讲他由于调到近卫军，官阶就高出武备中学的同学们。"
  网络来源: |
    https://baike.baidu.com/item/%E5%86%9B%E4%BA%8B%E4%B8%AD%E5%AD%A6/23084561

- 名词: 琥珀烟嘴
  解释: |
    琥珀烟嘴是用波罗的海琥珀制作的烟嘴配件，在19世纪俄国贵族阶层中是一种流行且彰显身份的吸烟用具。琥珀（尤其是波罗的海琥珀）在俄國备受珍视。《战争与和平》中，罗斯托夫伯爵书房内的申申和贝格两人都叼着琥珀烟嘴抽烟，托尔斯泰通过这一细节生动刻画了两位客人的不同性格。
  书中原文: |
    "他盘腿坐在沙发上，像在自己家里一样随便，嘴角深深地噙着一支琥珀烟嘴，眯起眼睛，忽断忽续地吸烟。"
  网络来源: |
    未检索到独立网络资料（检索结果主要为《战争与和平》原文页面）

- 名词: 土耳其烟斗
  解释: |
    土耳其烟斗（Turkish pipe / chibouk），一种源自奥斯曼帝国的长管烟斗，通常配有琥珀烟嘴。19世纪初俄国上流社会崇尚东方风情，土耳其风格的物品在贵族中非常流行。托尔斯泰在《战争与和平》中描写罗斯托夫伯爵将男客领入书房，请他们欣赏他收藏的土耳其烟斗，以此展现伯爵的殷勤好客及当时的东方主义风尚。
  书中原文: |
    "伯爵把男客领到书房，请他们欣赏他收藏的土耳其烟斗。"
  网络来源: |
    未检索到独立网络资料（检索结果主要为《战争与和平》原文页面）

- 名词: 马德拉酒
  解释: |
    马德拉酒（Madeira），一种产自葡萄牙马德拉群岛的加强型葡萄酒，以其独特的氧化风味和耐久藏特性闻名。该酒在19世纪深受俄国沙皇和贵族喜爱，亚历山大三世皇帝尤其钟爱马德拉酒。《战争与和平》中，罗斯托夫伯爵在宴会上称赞用马德拉酒调味的松鸡菜肴味道极好，反映了当时俄国贵族宴饮中马德拉酒的流行地位。
  书中原文: |
    "好太太！调味汁加马德拉酒烧松鸡味道真好，我亲爱的！"
  网络来源: |
    https://madeirawine.ch/fr/post/9-favorite-wine-of-russian-czars-and-rasputin

- 名词: 松鸡
  解释: |
    松鸡（包括黑琴鸡、榛鸡、普通松鸡等），19世纪俄罗斯贵族餐桌上常见的野味。松鸡在当时的豪门宴席中作为小菜或烤肉出现，被视为高级食材。著名的奥利维尔沙拉原始配方中使用的正是松鸡肉。《战争与和平》中，罗斯托夫伯爵称赞用马德拉酒调味汁烧制的松鸡味道极好，展现了莫斯科贵族讲究饮食的生活风貌。
  书中原文: |
    "好太太！调味汁加马德拉酒烧松鸡味道真好，我亲爱的！我尝过了。"
  网络来源: |
    https://bashny.net/t/zh-CN/313110

- 名词: 波士顿牌
  解释: |
    波士顿牌（Boston），一种起源于18世纪美国波士顿的纸牌游戏，是惠斯特牌（Whist）的变体，通常需4人参与。19世纪传入欧洲并深受俄国贵族欢迎。游戏规则复杂，节奏优雅，被视为"有教养"的社交活动。在《战争与和平》中，托尔斯泰描写罗斯托夫伯爵最爱玩波士顿牌，并在打牌时故意让邻座赢钱，以此表现伯爵宽厚慷慨的性格。
  书中原文: |
    "他除了爱玩波士顿牌之外，最使他愉快的就是听人家争论了。"
  网络来源: |
    未检索到独立网络资料（检索结果主要为《战争与和平》原文页面）

- 名词: 守夜
  解释: |
    守夜在《战争与和平》中指俄罗斯东正教传统中，在临终者床前彻夜守护、祈祷的仪式。安娜·米哈伊洛夫娜在探望病危的老别祖霍夫伯爵后表示要去守夜，反映了她试图借此机会接近病榻、参与临终过程的意图。守夜是俄国贵族临终关怀的重要环节，包含祈祷、唱诗、点燃蜡烛等宗教内容。
  书中原文: |
    "不管付出多少代价，我都要尽到自己的责任。我一定来守夜。不能就这样撂下他不管。"
  网络来源: |
    https://www.baike.com/wikiid/413812471170709480

- 名词: 临终的仪式
  解释: |
    临终的仪式指俄罗斯东正教中为濒死者施行的终敷礼（Елеосвящение），又称病人傅油圣事。由神职人员将祝圣过的橄榄油涂抹在临终者额头、双手等部位，并诵念经文，祈求赦免罪过、赐予平安。东正教七大圣事之一。在《战争与和平》中，安娜·米哈伊洛夫娜希望能在老别祖霍夫伯爵临终前为他安排这一仪式，但当时尚未得到允许。
  书中原文: |
    "也许上帝能使我有办法给他做临终的仪式……"
  网络来源: |
    https://baike.baidu.com/item/%E7%97%85%E4%BA%BA%E5%82%85%E6%B2%B9%E5%9C%A3%E4%BA%8B
