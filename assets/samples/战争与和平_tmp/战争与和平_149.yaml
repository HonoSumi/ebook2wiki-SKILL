- 名词: "1812年俄国卫国战争"
  解释: "1812年俄国卫国战争（俄法战争/拿破仑征俄战争）是拿破仑一世于1812年6月24日至12月14日对俄罗斯帝国发动的军事远征。拿破仑集结约61万大军跨过涅曼河入侵俄国。俄军采取后退决战、坚壁清野的战略，在博罗季诺战役后主动放弃莫斯科，并烧毁全城。法军占领空城后被迫于10月撤退，在严冬、饥饿和俄军追击下几乎全军覆没，最终仅不到6万人逃回。此战终结了拿破仑不败的神话，成为拿破仑帝国由盛转衰的转折点。列夫·托尔斯泰的《战争与和平》即以这场战争为宏大历史背景。"
  书中原文: "很显然，如果在波罗金诺战役以后放弃莫斯科势在必行，或者说至少可能会放弃……在全体居民犹如一个人，抛弃自己的财产，潮水似的涌出莫斯科时（用这种消极的行动来表示最强烈的民族感情）"
  网络来源: "百度百科俄法1812年战争条目、维基百科俄法战争条目"

- 名词: "拿破仑一世"
  解释: "拿破仑一世（Napoleon I，1769-1821），原名拿破仑·波拿巴，法兰西第一帝国皇帝（1804-1814，1815），法国近代史上最杰出的军事家与政治家。生于科西嘉岛破落贵族家庭，法国大革命期间在土伦战役中崭露头角。1799年发动雾月政变建立执政府，1804年加冕称帝。他颁布《拿破仑法典》，改革行政与教育体系，通过一系列战争征服欧洲大陆大部分地区。1812年远征俄国惨败导致帝国崩溃。1814年退位流放厄尔巴岛，1815年重返巴黎建立百日王朝，在滑铁卢战役中彻底战败，被流放圣赫勒拿岛直至去世。其军事才能和政治改革对欧洲历史产生深远影响。"
  书中原文: "他背叛了沙皇和祖国，他效忠波拿巴，俄国人当中只有他一个人玷污了俄国人的名字，莫斯科是从他的手中毁掉的。（文中以波拿巴指代拿破仑一世）"
  网络来源: "百度百科拿破仑·波拿巴条目、维基百科拿破仑一世条目"
