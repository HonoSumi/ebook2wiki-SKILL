- 名词: 乌瓦罗夫
  解释: |
    费奥多尔·彼得罗维奇·乌瓦罗夫（Fyodor Petrovich Uvarov，1769—1824），俄罗斯帝国骑兵将军，亚历山大一世的侍从副官长。曾参与推翻保罗一世的宫廷密谋，深得亚历山大一世信任。在奥斯特利茨战役中，乌瓦罗夫指挥巴格拉季翁部右翼骑兵，以仅三个团的兵力阻击缪拉元帅的法国骑兵师，虽损失殆尽但阻止了俄军全面溃败，战后获三级圣乔治勋章。在本书中，罗斯托夫奉命传令时经过乌瓦罗夫的骑兵团驻地，此时俄军正在调动准备开火。
  书中原文: |
    然后他进入乌瓦罗夫的骑兵团驻地，这里已经可以看出军队在转移和准备开火的迹象。驰过乌瓦罗夫的骑兵团，他已经清晰地听见前面的炮声和枪声。
  网络来源: |
    https://www.rct.uk/collection/themes/exhibitions/russia-royalty-the-romanovs/the-queens-gallery-buckingham-palace/general-feodor-petrovich-uvarov-1769-1824
    https://en.topwar.ru/18413-kavaleriyskiy-general-fedor-petrovich-uvarov.html

- 名词: 霍斯蒂拉德克
  解释: |
    奥斯特利茨战役附近的一个村庄，捷克语名为 Hostěrádky，位于今捷克共和国南摩拉维亚地区。在奥斯特利茨战役中，俄军惨败后在此地重新集结。书中描写罗斯托夫在寻找库图佐夫和沙皇途中，经受伤军官指引来到霍斯蒂拉德克村，发现此地虽然秩序仍乱，但已远离法军炮火射程，部队的混乱程度有所缓解。
  书中原文: |
    那个军官指着霍斯蒂拉德克村，说完就往前走了。在霍斯蒂拉德克村里，从战场上撤下来的俄国军队虽然也很乱，但秩序已经好多了。法军的炮弹打不到这里，枪声听起来也遥远了。
  网络来源: |
    https://mapcarta.com/18495832
    https://www.britannica.com/event/Battle-of-Austerlitz

- 名词: 近卫重骑兵
  解释: |
    指俄国近卫骑兵团（Kavalergardski Polk / Chevaliers Garde），是沙皇亚历山大一世最钟爱的精锐重骑兵部队。该团成立于1796年，原为保罗一世的私人卫队，属于胸甲骑兵序列，在俄国上流社会子弟中极受欢迎。其标志性特征是身穿耀眼白色胸甲骑兵制服、猩红贴边，骑乘黑色高头大马。在奥斯特利茨战役中，近卫重骑兵首次参战即遭重创。书中描写罗斯托夫险些被冲锋中的近卫重骑兵撞倒，这支骑兵随后与法军骑兵激烈交战，伤亡惨重，过后听说只剩十八人。
  书中原文: |
    忽然在整个旷野上出现一大队身穿耀眼的白制服、一律骑黑马的骑兵，他们从左边斜刺里向他驰来。这是我们的近卫重骑兵正去迎战向他们驰来的法国骑兵。重骑兵一面奔跑，一面还勒着马。
  网络来源: |
    https://bbs.napolun.com/forum.php?mod=viewthread&tid=22885&extra=page%3D3&ordertype=2
    https://www.zhihu.com/question/55327027

- 名词: 枪骑兵
  解释: |
    指乌兰枪骑兵（Uhlans），起源于波兰的轻骑兵兵种，以长矛（骑枪）为主要武器。波兰被瓜分后，俄罗斯、普鲁士、奥地利都仿效建立了本国的乌兰枪骑兵团。俄国枪骑兵保留了波兰式的四角帽和军服风格，最初多招募波兰裔士兵。在拿破仑战争中，枪骑兵的长矛长于步兵的步枪加刺刀，对步兵方阵有较大威胁。书中描写罗斯托夫在传令途中遇见从前方溃退下来的俄国枪骑兵，队形混乱，表明俄军进攻已被击退。
  书中原文: |
    有几个骑兵迎面驰来。这是我们的枪骑兵，队形混乱，是从进攻中撤下来的。罗斯托夫从他们面前驰过，无意中看见其中有一个人挂了彩，他继续向前驰去。
  网络来源: |
    https://baike.baidu.com/item/%E6%9E%AA%E9%AA%91%E5%85%B5/1556538
    https://zh.wikipedia.org/zh-hans/%E6%A7%8D%E9%A8%8E%E5%85%B5
