- 名词: 圣谕
  解释: |
    圣谕指帝王发布的诰诫性诏令或训词。在《战争与和平》中，指沙皇亚历山大一世颁发的一道敕令（上谕），开头为"谢尔盖·库兹米奇！据各方呈报……"。瓦西里公爵在宴会上讲述维亚济米季诺夫宣读这道圣谕时因感动过度而泣不成声的故事，以此取乐。托尔斯泰借此场景讽刺上流社会空洞做作的爱国热情——众人为一道官样文章故作激动，而真正的感情（皮埃尔与海伦的爱情）反被忽略。
  书中原文: |
    圣谕的开头是："谢尔盖·库兹米奇！据各方呈报……"等等。
  网络来源: |
    https://baike.baidu.com/item/圣谕
    http://zdic.net/hant/%e5%9c%a3%e8%b0%95

- 名词: 维亚济米季诺夫
  解释: |
    小说中一位在宴会上被提及的人物，奉命宣读沙皇的上谕，但由于过度激动每次念到"谢尔盖·库兹米奇"就哽咽流泪，无法读完。其历史原型为谢尔盖·库兹米奇·维亚济米季诺夫（Sergei Kuzmich Vyazmitinov，1744—1819），俄国第一位陆军大臣（1802—1808），后任圣彼得堡总督。托尔斯泰引用此趣闻展现上流社会社交场合的谈笑氛围以及瓦西里公爵的谈吐风格。
  书中原文: |
    可怜的维亚济米季诺夫无论如何也读不下去了。
  网络来源: |
    http://online.flipbuilder.com/eeqi/leca/files/basic-html/page380.html
    https://www.rbth.com/arts/331759-how-russians-criticized-russian-literary

- 名词: 帕里斯
  解释: |
    希腊神话中特洛伊国王普里阿摩斯之子。因在"金苹果之争"中将刻有"献给最美者"的金苹果判给阿佛洛狄忒，获得帮助拐走斯巴达王后海伦，从而引发长达十年的特洛伊战争。在《战争与和平》中，皮埃尔自嘲面容不英俊的自己，却像帕里斯一样占有了海伦（海伦与特洛伊海伦同名），暗示皮埃尔以并不出众的外貌赢得了美貌的海伦。
  书中原文: |
    面孔长得不漂亮的他，却成为占有海伦的帕里斯。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/帕里斯
    https://wapbaike.baidu.com/item/帕里斯/7103919

- 名词: 保罗
  解释: |
    指俄罗斯帝国第九位沙皇保罗一世（Павел I Петрович，1754—1801），1796—1801年在位。他是叶卡捷琳娜二世之子、亚历山大一世之父。在位仅四年半，因推行普鲁士式军事制度、颁布大量法令限制贵族特权而招致不满，1801年在宫廷政变中被杀。在《战争与和平》中，"保罗和亚历山大两个新朝"指保罗一世和亚历山大一世两朝更迭之际，瓦西里公爵在这两个新朝中飞黄腾达。
  书中原文: |
    当瓦西里公爵在保罗和亚历山大两个新朝中飞黄腾达之后，更加看不起他了。
  网络来源: |
    https://baike.baidu.com/item/保罗一世/7786484
    https://zh.wikipedia.org/wiki/保罗一世_(俄罗斯)

- 名词: 亚历山大
  解释: |
    指俄罗斯帝国第十位沙皇亚历山大一世（Александр I Павлович，1777—1825），1801—1825年在位。保罗一世之子，幼年由祖母叶卡捷琳娜二世抚养。在位期间前期推行自由主义改革，后期趋于保守；最大功绩是领导俄国击败拿破仑入侵（1812年卫国战争），战后主导建立神圣同盟，被誉为"欧洲救世主"。其死因充满谜团，民间盛传其诈死隐居。在《战争与和平》中，"保罗和亚历山大两个新朝"指亚历山大一世继位后的新朝，瓦西里公爵在此时期获得升迁。
  书中原文: |
    当瓦西里公爵在保罗和亚历山大两个新朝中飞黄腾达之后，更加看不起他了。
  网络来源: |
    https://baike.baidu.com/item/亚历山大一世/64408055
    https://zh.wikipedia.org/wiki/亚历山大一世_(俄罗斯)
