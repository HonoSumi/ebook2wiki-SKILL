- 名词: 神灯
  解释: |
    东正教圣像前悬挂或摆放的油灯（俄语：лампада，希腊语：кандило），
    内装橄榄油，点燃后象征基督作为"世界之光"（约翰福音8:12）。
    在俄国贵族家庭中，通常会设专门的祈祷室或圣像角（красный угол），
    圣像前常燃此灯，代表信徒恒切的祈祷和不灭的信心。
  书中原文: |
    她注视着被神灯照亮了的大幅圣像的黑脸，双手交叉在胸前，这样在圣像面前站了几分钟。
  网络来源: |
    https://zhuanlan.zhihu.com/p/20017682
    https://baike.baidu.com/item/%E5%9C%A3%E5%83%8F%E7%81%AF

- 名词: 雪橇
  解释: |
    俄国传统冬季交通工具（俄语：сани），在19世纪是贵族出行的主要方式。
    俄国冬季漫长，雪橇在雪地和冰面上滑行比轮式马车更为平稳迅捷。
    贵族使用的出行雪橇通常配有彩绘雕花、熊皮毯等豪华装饰。
    三驾雪橇（тройка）更是俄罗斯文化的标志性象征。
  书中原文: |
    人们在故意洒满雪的路上吆喝着把他的马车和雪橇推到厢房那边。
  网络来源: |
    https://sports.sohu.com/a/840699410_162522
    https://finance.sina.com.cn/jjxw/2024-12-23/doc-ineamaix2840344.shtml
