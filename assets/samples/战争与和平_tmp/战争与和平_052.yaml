- 名词: 伏尔泰
  解释: |
    伏尔泰（Voltaire，1694—1778），本名弗朗索瓦-马利·阿鲁埃，法国启蒙运动的旗手，被誉为"法兰西思想之王"。他主张开明君主制、自然神论，抨击天主教会和封建专制，代表作包括《哲学通信》《老实人》《路易十四时代》等。在《战争与和平》中，贵族子弟申申善于戏谑模仿，常模仿伏尔泰的说辞方式发表议论，表现出当时俄国上流社会对法国启蒙思想的追崇。
  书中原文: |
    "如果没有巴格拉季翁，也要捏造一个出来。"滑稽家申申摹仿伏尔泰的话，说。
  网络来源: |
    https://baike.baidu.com/item/伏尔泰/5281
    https://zh.wikipedia.org/zh-cn/伏尔泰

- 名词: 拉斯托普钦
  解释: |
    费奥多尔·瓦西里耶维奇·拉斯托普钦（Фёдор Васильевич Ростопчин，1763—1826），俄国贵族，1812年卫国战争期间担任莫斯科总督（莫斯科卫戍司令）。在拿破仑入侵俄国时，他发布了大量公告试图鼓动民众抵抗，但在莫斯科弃守和火烧莫斯科事件中采取了矛盾态度。托尔斯泰在《战争与和平》中对其有大量讽刺性描写，认为他"根本不懂所发生的事件的意义"。
  书中原文: |
    同时也流传着拉斯托普钦的话：对待法国兵，须要用大话鼓舞士气；对待德国兵，要给他们说明道理，使他们相信逃跑比前进更危险；而对待俄国兵，非得劝阻他们："慢一点！"
  网络来源: |
    https://baike.baidu.com/item/拉斯托普钦
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/book-11-chapter-5.html

- 名词: 纳雷什金
  解释: |
    纳雷什金家族（Naryshkin family）是俄罗斯历史上著名的贵族世家。1671年家族成员纳塔利娅·纳雷什金娜嫁给沙皇阿列克谢·米哈伊洛维奇，生下了后来的彼得大帝，家族由此进入权力核心。亚历山大·利沃维奇·纳雷什金（1760—1826）曾任俄国宫廷总礼官、皇家剧院总管理，以奢华的生活方式闻名。在《战争与和平》中，纳雷什金在欢迎巴格拉季翁的宴会上与别克列绍夫分坐首席两侧。
  书中原文: |
    在第三个圈子里，纳雷什金在讲苏沃洛夫在一次奥地利军事委员会会议上回敬奥地利将军们的蠢话时，像公鸡似的叫起来。
  网络来源: |
    https://bkso.baidu.com/item/纳雷什金家族/22883167
    https://baike.baidu.com/item/纳雷什金家族

- 名词: 别克列绍夫
  解释: |
    亚历山大·安德烈耶维奇·别克列绍夫（Alexander Andreevich Bekleshov，1743—1808），俄罗斯帝国国务活动家、步兵上将，曾任俄帝国总检察长（保罗一世和亚历山大一世时期），1804至1806年担任莫斯科总督。他参与了1768—1774年俄土战争，属于保守派。在《战争与和平》中，欢迎巴格拉季翁的宴会上，别克列绍夫与纳雷什金坐在巴格拉季翁左右两侧的首席。
  书中原文: |
    和他一同来的别克列绍夫和费奥多尔·彼得罗维奇·乌瓦罗夫在门口停下来，想让他这位主要的客人走在他们前面。
  网络来源: |
    https://en.wikipedia.org/wiki/Alexander_Bekleshov
    http://www.russkije.lv/en/lib/read/alexander-bekleshov.html

- 名词: 泰塔斯
  解释: |
    泰塔斯（Titus，公元39—81年），即提图斯·弗拉维乌斯·维斯帕西亚努斯，古罗马弗拉维王朝第二位皇帝，公元79至81年在位。公元70年以主将身份攻破耶路撒冷、摧毁第二圣殿，声名大噪。在位期间虽短，但因宽厚仁政被誉为罗马贤君之一。在《战争与和平》的欢迎诗中，泰塔斯被用来比喻沙皇亚历山大一世，赞美他"居家如里费，阵前如凯撒"。
  书中原文: |
    光荣归于亚历山大保卫我们的泰塔斯皇帝他是伟大的领袖，善良的人，居家如里费，阵前如凯撒！
  网络来源: |
    https://baike.baidu.com/item/提图斯/10889988
    https://zh.wikipedia.org/zh-cn/提圖斯

- 名词: 苏沃洛夫远征意大利
  解释: |
    苏沃洛夫远征意大利指1799年第二次反法同盟期间，俄国元帅亚历山大·苏沃洛夫率领俄奥联军在意大利北部对抗法军的系列战役。年届七旬的苏沃洛夫连克卡萨诺、特雷比亚河、诺维等战役，一度收复拿破仑在1796年占领的伦巴底地区。后因同盟内部分歧，苏沃洛夫被调往瑞士，翻越阿尔卑斯山撤退。在《战争与和平》中，巴格拉季翁被选为欢迎英雄的原因之一，即他让人联想起苏沃洛夫远征意大利时代的俄国军人精神。
  书中原文: |
    欢迎他，也就是欢迎战斗的、普通的、没有人事关系和阴谋诡计的、引起人们回忆苏沃洛夫远征意大利的俄国军人。
  网络来源: |
    https://baike.baidu.com/item/苏沃洛夫/8155365
    https://zh.wikipedia.org/zh-cn/苏沃洛夫

- 名词: 波兰舞曲
  解释: |
    波兰舞曲（Polonaise，又译波罗乃兹、波洛涅兹），起源于16世纪波兰民间的三拍子舞蹈，16世纪末进入贵族宫廷，演变为庄重的仪式性行进舞蹈。18世纪以法文名称"Polonaise"传遍欧洲各国宫廷。在俄国宫廷和贵族舞会中波兰舞曲极为常见，常作为开场舞曲。在《战争与和平》的欢迎宴会上，餐厅奏响波兰舞曲，伴随《胜利的欢声如雷动》的旋律。
  书中原文: |
    门敞开了，从餐厅传来波兰舞曲的鸣响："胜利的欢声如雷动，欢乐吧，勇敢的俄罗斯。"
  网络来源: |
    https://baike.baidu.com/item/波洛涅兹舞曲/4836213
    https://www.britannica.com/art/polonaise-dance

- 名词: 胜利的欢声如雷动
  解释: |
    《胜利的欢声如雷动》（俄语：Гром победы, раздавайся!，又译《胜利的惊雷，响起来吧！》）是俄罗斯帝国最早的非正式国歌，创作于1791年，由诗人加甫里尔·杰尔查文作词、作曲家约瑟夫·科兹洛夫斯基作曲，采用波兰舞曲节奏。歌曲为纪念苏沃洛夫攻陷奥斯曼帝国要塞伊斯梅尔而创作，在18世纪末至1816年间广泛使用，1816年被《俄罗斯人的祈祷》取代。在《战争与和平》欢迎巴格拉季翁的宴会上，乐队多次奏响此曲。
  书中原文: |
    也就在这时，奏起了《胜利的欢声如雷动》的乐曲。大家都从座位上站起来，高呼"乌拉！"
  网络来源: |
    https://www.wikiwand.com/zh-sg/articles/胜利的惊雷，响起来吧！
    https://baike.baidu.com/item/胜利的惊雷，响起来吧！
