- 名词: 贞德
  解释: 圣女贞德（Jeanne d'Arc，1412—1431），法国民族英雄、军事家、天主教圣人。百年战争期间，她自称受神启指引，率法军解奥尔良之围并护送查理七世加冕。后被勃艮第人俘获，转交英军，以异端罪名被处以火刑，年仅19岁。1456年教廷平反，1920年封圣。
  书中原文: |
    "我？问得真奇怪。我走是因为……是因为大家都走，还因为我不是贞德，也不是亚马孙人。"
  网络来源: https://baike.baidu.com/item/%E8%B4%9E%E5%BE%B7/30395

- 名词: 亚马孙人
  解释: 古希腊神话中由女战士构成的民族，传说居住于黑海沿岸特弥斯库拉地区。以弓马骑射闻名，崇拜战神阿瑞斯和狩猎女神阿尔忒弥斯。神话中与赫拉克勒斯、提修斯、阿喀琉斯等英雄交战。现代考古发现黑海北岸草原斯基泰女性墓葬中有大量武器陪葬，证实女战士部族的历史原型。
  书中原文: |
    "我？问得真奇怪。我走是因为……是因为大家都走，还因为我不是贞德，也不是亚马孙人。"
  网络来源: https://zh.wikipedia.org/zh-hans/%E4%BA%9E%E9%A6%AC%E9%81%9C%E4%BA%BA

- 名词: 白采尔科维
  解释: 白采尔科维（Bila Tserkva，俄语意为"白色教堂"），乌克兰基辅州最大城市，位于罗斯河畔，基辅以南约84公里。始建于1032年（智者雅罗斯拉夫时期），曾为基辅罗斯要塞、立陶宛-波兰联邦领地，1795年并入俄罗斯帝国。哥萨克时代赫梅利尼茨基曾在此签订和约。19世纪发展为重要贸易市场。
  书中原文: |
    "他们在等小儿子呢，"皮埃尔说，"他参加了奥博连斯基的哥萨克部队，到白采尔科维去了。在那儿整编为团队。"
  网络来源: https://wapbaike.baidu.com/item/%E7%99%BD%E9%87%87%E5%B0%94%E7%A7%91%E7%BB%B4

- 名词: 维特根施泰因伯爵
  解释: 彼得·维特根施泰因（Peter Wittgenstein，1769—1843），俄军陆军元帅，德裔贵族出身。1812年俄法战争中任第1步兵军军长，负责圣彼得堡北线防御，在第二次波洛茨克战役大败法军圣西尔元帅部，被誉为"首都的救星"。库图佐夫去世后曾任反法联军总司令。其肖像悬挂于冬宫军事画廊。
  书中原文: |
    第二份传单是说我们的大本营是在维亚济马，维特根施泰因伯爵打败了法国人，但是由于许多居民愿意武装起来，所以军火库为他们准备了武器：军刀、手枪、长枪，这些武器将廉价卖给居民。
  网络来源: https://www.wikiwand.com/zh-hans/articles/%E5%BD%BC%E5%BE%97%C2%B7%E7%BB%B4%E7%89%B9%E6%A0%B9%E6%96%BD%E6%B3%B0%E5%9B%A0

- 名词: 奇吉林
  解释: 奇吉林（Chyhyryn，亦译奇希林），乌克兰切尔卡瑟州历史名城，位于佳斯明河畔。17世纪中叶哥萨克盖特曼博格丹·赫梅利尼茨基以此为首都，成为扎波罗热哥萨克的政治、军事和外交中心。1678年俄土战争中被炸毁，城市衰败。后划归俄罗斯帝国。今为小型历史城市，保留哥萨克要塞遗址。
  书中原文: |
    皮埃尔对着这些传单沉思起来。显然一场可怕的、孕育着暴风雨的乌云——他曾经以全部灵魂的力量呼唤、同时在他内心不由己地引起恐惧的乌云，显然已经临近了。……传单的口吻已经不像先前在奇吉林谈话中那样戏谑了。
  网络来源: https://wapbaike.baidu.com/item/%E5%A5%87%E5%90%89%E6%9E%97/1482485

- 名词: 列比赫
  解释: 弗兰茨·列比赫（Franz Leppich），德裔机械师/发明家。1812年受沙皇亚历山大一世委托，在莫斯科近郊沃罗佐沃村研制用于轰炸法军的可控热气球（鲸鱼形，可载40人及炸药）。项目耗资巨大（号称25万卢布）但最终失败，气球仅能离地十余米，被斥为"骗子"，1814年离开俄国。此事件是战争压力下伪科学项目的著名案例。
  书中原文: |
    一天，皮埃尔出门散散心，到沃罗佐沃村去看列比赫制造的用来消灭敌人的大气球，一只实验的气球要在第二天升起来。
  网络来源: https://warhistory.org/ja/@msw/article/air-blitz-at-borodino

- 名词: 沃罗佐沃村
  解释: 沃罗佐沃（Vorontsovo），莫斯科西南部历史村落，14世纪起为沃罗佐夫贵族家族领地。18世纪建有大庄园、池塘和伪哥特式塔楼。1812年卫国战争中庄园遭法军破坏，后重建。托尔斯泰在《战争与和平》中提及此村。1960年代并入莫斯科市区。
  书中原文: |
    一天，皮埃尔出门散散心，到沃罗佐沃村去看列比赫制造的用来消灭敌人的大气球，一只实验的气球要在第二天升起来。
  网络来源: https://en.wikipedia.org/?curid=36948130

- 名词: 沼泽广场
  解释: 博洛特纳亚广场（Bolotnaya Square，俄语意为"沼泽广场"），莫斯科历史广场，位于莫斯科河南岸，正对克里姆林宫。14世纪得名于低洼沼泽地形。历史上为公开处决场所——1671年哥萨克领袖斯捷潘·拉辛、1775年农民起义领袖普加乔夫均在此被处决。1958—1994年间曾更名列宾广场。
  书中原文: |
    皮埃尔在从沃罗佐沃村回家的路上，经过沼泽广场的时候，看见行刑台有一群人，他就停下来，下了车。这是一个被指控为奸细的法国厨子在受鞭刑。
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%8D%9A%E6%B4%9B%E7%89%B9%E7%B4%8D%E4%BA%9A%E5%BB%A3%E5%A0%B4

- 名词: 鲁比扬卡
  解释: 鲁比扬卡广场（Lubyanskaya Square），莫斯科中心广场之一，位于红场东北约900米。1480年由伊凡三世所建，因迁入的下诺夫哥罗德人以故乡区名命名。20世纪因契卡/克格勃/俄联邦安全局总部设于此而闻名（"卢比扬卡"成为克格勃代称）。广场地下曾有卢比扬卡监狱，大清洗期间关押大量政治犯。
  书中原文: |
    "你往哪儿走？"皮埃尔对正把车赶往鲁比扬卡去的车夫喊道。"您不是吩咐去见总司令吗？""傻瓜！畜生！"皮埃尔喊起来，他很少这样骂他的车夫，"我说过要回家；快走，糊涂虫。我今天就得离开。"
  网络来源: https://wapbaike.baidu.com/item/%E5%8D%A2%E6%AF%94%E6%89%AC%E5%8D%A1/5830281

- 名词: 莫扎伊斯克
  解释: 莫扎伊斯克（Mozhaysk），俄罗斯莫斯科州西部城市，莫斯科以西约110公里，位于莫扎伊斯克水库畔。1231年首见史载，曾为独立公国，1303年并入莫斯科公国。1812年波罗金诺战役（位于城西12公里处）期间为俄军后方枢纽和补给基地。二战中曾被德军占领三个月。2012年获授"军事荣誉之城"称号。
  书中原文: |
    次日黎明，皮埃尔到达莫扎伊斯克。莫扎伊斯克所有的房屋都驻了兵，皮埃尔的马夫和车夫在这儿的客栈迎接他，客栈也没有空房间：都住满了军官。
  网络来源: https://baike.baidu.com/item/%E8%8E%AB%E6%89%8E%E4%BC%8A%E6%96%AF%E5%85%8B/1459825

- 名词: 舍瓦尔金诺多面堡
  解释: 舍瓦尔金诺多面堡（Shevardino Redoubt），1812年波罗金诺战役前俄军在新斯摩棱斯克大道左翼前沿构筑的五角形野战工事。1812年9月5日（俄历8月24日），法军达武元帅部与俄军戈尔恰科夫亲王部在此激战至午夜，俄军损失约5000人后主动放弃。此战为波罗金诺会战的前哨战。
  书中原文: |
    八月二十四日，在舍瓦尔金诺多面堡打了一仗，二十五日，双方都没有开火，二十六日，波罗金诺战役打响了。
  网络来源: https://www.qulishi.com/article/201901/313441.html

- 名词: 舍瓦尔金诺战役
  解释: 舍瓦尔金诺战役（Battle of Shevardino），1812年9月5日（俄历8月24日）发生于莫斯科以西约125公里处，是波罗金诺大会战的前哨战。拿破仑命达武元帅和波尼亚托夫斯基攻占俄军左翼前沿的舍瓦尔金诺多面堡。战斗从黄昏持续到午夜，双方各伤亡约5000人。俄军虽退却但赢得了构筑主阵地的时间。
  书中原文: |
    八月二十四日，在舍瓦尔金诺多面堡打了一仗，二十五日，双方都没有开火，二十六日，波罗金诺战役打响了。
  网络来源: https://www.qulishi.com/article/201901/313441.html

- 名词: 佩尔胡什科夫
  解释: 佩尔胡什科夫（Perkhushkovo），俄罗斯莫斯科州奥金佐夫斯基区村庄，莫斯科以西约40公里，位于旧莫扎伊斯克大道上（拿破仑进军莫斯科的主要路线）。1812年9月皮埃尔离开莫斯科后在此换马，听闻舍瓦尔金诺战役的炮声。此处是俄军撤退和法军追击的必经之地，托尔斯泰在《战争与和平》中予以提及。
  书中原文: |
    当夜在佩尔胡什科夫换马的时候，皮埃尔听说那天傍晚打了一场大仗。人们都在讲，在佩尔胡什科夫这儿，地面都被炮声震得打颤。
  网络来源: https://mapcarta.com/N474981066
