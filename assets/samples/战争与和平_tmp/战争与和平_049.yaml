- 名词: 拉雷
  解释: |
    多米尼克·让·拉雷（Dominique Jean Larrey，1766—1842），法国外科医生，拿破仑一世时期的首席军医，被誉为"现代军事外科学之父"。他是野战医院和战伤救护车（"飞行救护车"Ambulances Volantes）系统的先驱，也是战伤检伤分类法（Triage）的发明者，主张不论军衔高低、不分国籍地救治伤员。拉雷跟随拿破仑参加了25次重大战役和超过400次战斗，包括奥斯特利茨战役、博罗季诺战役、滑铁卢战役等。拿破仑称他为"我所认识的最善良的人"。在《战争与和平》中，拿破仑在奥斯特利茨战役结束后命令将安德烈公爵等俄国伤员送到拉雷处检查伤口。
  书中原文: |
    "叫他们照顾这些先生们，把他们送到我的宿营地，叫御医拉雷检查他们的伤口。再见，列普宁公爵。"
