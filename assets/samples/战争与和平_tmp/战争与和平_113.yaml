- 名词: 贵族非常会议
  解释: 指1812年7月拿破仑入侵俄国期间，沙皇亚历山大一世在莫斯科斯洛博达宫（Слободской дворец）召集贵族和商人代表举行的非常会议。贵族表决通过"从每一千个农奴中献出十个全副装备的人"组建民团，商人当场筹集巨额捐款。这次会议成功动员了俄国社会各阶层力量，最终在16个中部省份组建了约20万人的民兵队伍，为1812年卫国战争提供了重要的人力物力支持。
  书中原文: "明天皇帝就要到……举行了贵族非常会议，据说，一千人中要抽十人去当兵"
