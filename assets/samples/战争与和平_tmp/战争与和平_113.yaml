- 名词: 视唱
  解释: 视唱（Solfeggio/Solfège）是一种使用固定音节（do、re、mi、fa、sol、la、si）进行音阶演唱的声乐训练方法，属于音乐识谱技能训练的核心内容，旨在培养看到乐谱即能准确演唱的能力。源自意大利语solfeggiare，18世纪后发展为系统的教学体系，包含音准训练、节奏训练、读谱训练和听觉训练等内容。在19世纪俄国贵族家庭中，视唱是女性音乐教育的常见内容。
  书中原文: "她在大厅练习视唱"
  网络来源:
    - https://baike.baidu.com/item/%E8%A7%86%E5%94%B1/0
    - https://baike.baidu.com/item/solfeggio
    - https://baike.baidu.com/item/solfege/53126663

- 名词: 奥博连斯基公爵
  解释: 奥博连斯基家族（Obolensky）是俄罗斯最古老显赫的贵族家族之一，为留里克王朝（Rurik Dynasty）后裔，家族名称源自莫斯科附近的奥博连斯克镇（Obolensk）。家族成员在帝俄时期拥有世袭的"公爵（Князь）"头衔，分支包括列普宁、多尔戈鲁科夫、谢尔巴托夫等家族。19世纪该家族与托尔斯泰伯爵家族等多有联姻。1917年革命后大部分成员流亡海外。托尔斯泰在《安娜·卡列尼娜》中的人物奥勃朗斯基（Облонский）即借鉴了该家族名称。
  书中原文: "他和同伴奥博连斯基秘密决定去当骠骑兵"
