- 名词: 奥斯特罗夫纳
  解释: 奥斯特罗夫纳（Ostrovno，俄语：Островно）是白俄罗斯维捷布斯克州的一个村镇。1812年俄法战争期间，在此发生奥斯特罗夫纳战役（1812年7月25日）。法军由欧仁·德·博阿尔内指挥的意大利军团向俄军奥斯特曼-托尔斯泰将军率领的部队发起进攻。俄军在此顽强阻击法军，为俄军主力向斯摩棱斯克撤退争取了时间。托尔斯泰在《战争与和平》中通过尼古拉·罗斯托夫的视角描绘了这场前哨战。
  书中原文: "司务长进来传达进驻奥斯特罗夫纳的命令。"
  网络来源: https://book.douban.com/annotation/141532234/
- 名词: 奥斯特曼-托尔斯泰
  解释: 亚历山大·伊万诺维奇·奥斯特曼-托尔斯泰（Alexander Ivanovich Osterman-Tolstoy，1770—1857），俄国步兵上将，出身托尔斯泰家族，后继承奥斯特曼伯爵姓氏。曾参加1788年俄土战争（伊兹梅尔攻城战）、拿破仑战争。1812年卫国战争中任第4步兵军军长，参加博罗季诺战役，负伤仍率部以刺刀反冲击。1813年库尔姆战役中失去左臂，成为"独臂英雄"，获二级圣格奥尔基勋章（第52号）。后与沙皇尼古拉一世争执，1834年被流放，1857年逝世于瑞士日内瓦。
  书中原文: "奥斯特曼-托尔斯泰伯爵的副官从维捷希斯克驰来，命令跑步前进。"
  网络来源: https://baike.baidu.com/item/亚历山大·伊万诺维奇·奥斯特曼·托尔斯泰
- 名词: 司务长
  解释: 司务长（俄语：фельдфебель，源自德语 Feldwebel）是沙俄军队中士官（军士）层级的正式军衔。1722年彼得大帝颁布《官级表》后设立，作为军士军衔的第二高位，地位高于上士、低于下级准尉。司务长通常负责连队的后勤、装备与内务管理，是骑兵部队中传达命令、管理日常事务的重要士官职务。在苏联时期废除军衔制后，司务长逐渐演变为连队职务名称，对应的大致军衔为大士或上士。
  书中原文: "两点多钟了，还没有人入睡，这时司务长进来传达进驻奥斯特罗夫纳的命令。"
  网络来源: https://baike.baidu.com/item/中士/17
