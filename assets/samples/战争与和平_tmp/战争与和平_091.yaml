- 名词: 伊韦尔教堂
  解释: 伊韦尔教堂（Иверские ворота и часовня，又称伊韦尔小礼拜堂、复活门）是莫斯科红场西北入口处的一座东正教小礼拜堂，供奉伊韦尔圣母像。原建筑建于1669年，1931年被苏联政府拆除以给阅兵车辆让路，1994-1995年原址重建。教堂前的地面上设有俄罗斯公路系统零公里标志。按莫斯科传统，任何人进入红场前都必须到小礼拜堂朝拜圣像。这座教堂出现在托尔斯泰、布宁、茨维塔耶娃等多位作家的作品中。
  书中原文: 当他周游全城时刚一看见金镂袈裟前面无数烛光的伊韦尔教堂、雪地还没有被轧脏的克里姆林广场、西夫采夫·弗拉若克的车夫和棚户的时候……
  网络来源: https://en.wikipedia.org/wiki/Iverskaya_Chapel

- 名词: 西夫采夫·弗拉若克
  解释: 西夫采夫·弗拉若克（Сивцев Вражек，Sivtsev Vrazhek Lane）是莫斯科中央行政区阿尔巴特区的一条历史小巷，长约1公里。地名字面意为"西夫卡溪流的沟壑"：历史上有一条名为西夫卡（Sivka）的小溪从此流过，冲刷出沟谷地形，"弗拉若克"（вражек）是俄语"沟壑"的指小形式。该溪流在18世纪被改为石砌水渠，19世纪转入地下排水系统。这条巷子是莫斯科最受欢迎的住宅区之一，曾居住过赫尔岑、托尔斯泰、茨维塔耶娃等文化名人。
  书中原文: 当他周游全城时刚一看见金镂袈裟前面无数烛光的伊韦尔教堂、雪地还没有被轧脏的克里姆林广场、西夫采夫·弗拉若克的车夫和棚户的时候……
  网络来源: https://en.wikipedia.org/wiki/Sivtsev_Vrazhek

- 名词: 马尔高酒
  解释: 马尔高酒（玛歌酒庄，Château Margaux）是法国波尔多左岸梅多克产区最著名的葡萄酒之一，在1855年波尔多分级中被评为五大一级庄之一。酒庄建于1590年，其正牌红酒以极致优雅细腻著称，被誉为"波尔多的皇后"。1787年美国第三任总统托马斯·杰斐逊将其评为波尔多四大名庄之首。小说中皮埃尔在莫斯科英国俱乐部喝的就是这种酒，反映了他优渥的上流社会生活。
  书中原文: 在喝完两瓶马尔高酒之后，他刚往沙发上一坐，人们便把他围将起来，于是开始了谈话、辩论、戏谑。
  网络来源: https://baike.baidu.com/item/%E7%8E%9B%E9%AB%98%E5%BA%84%E5%9B%AD/2194592

- 名词: 阿斯特列亚支会
  解释: 阿斯特列亚大支会（Великая Ложа «Астрея», Grand Lodge Astraea）是1815年在圣彼得堡成立的俄国最大共济会总会之一，鼎盛时期拥有24个分会。名称取自希腊神话中的正义女神阿斯特赖亚（Astraea），会徽包括鹰与八角星，格言为拉丁文"Per ardua ad astra"（历经艰辛，抵达星空）。1822年沙皇亚历山大一世敕令解散所有共济会后停止活动。20世纪初在梅贝斯领导下复兴，苏联时期遭镇压。2001年后在现代俄罗斯共济会中重新活动。
  书中原文: 他们为贫民捐款连一个卢布也不肯出，他们挑拨阿斯特列亚支会反对寻找吗哪派，为了一张真正的苏格兰地毯和一份谁也不需要的、连写它的人也不懂得其中意义的会章而整天奔忙。
  网络来源: https://en.wikipedia.org/wiki/G._O._Mebes

- 名词: 寻找吗哪派
  解释: 寻找吗哪派（ложа «Искатели манны», Seekers of Manna / Chosen Manna Lodge）是俄国共济会内部的一个玫瑰十字会支派组织。成立于1817年，由伊·阿·波兹杰耶夫下令创立，以将其支持者与诺维科夫派系区分开来。"吗哪"典出《圣经·出埃及记》，指上帝赐予以色列人的天粮，在此象征精神食粮与灵性滋养。1822年共济会被沙皇政府禁止后，该支派转入地下秘密活动，以"谈话会"形式继续组织集会，一直延续到20世纪初才停止活动。
  书中原文: 他们为贫民捐款连一个卢布也不肯出，他们挑拨阿斯特列亚支会反对寻找吗哪派，为了一张真正的苏格兰地毯和一份谁也不需要的、连写它的人也不懂得其中意义的会章而整天奔忙。
  网络来源: https://www.rhga.ru/izdaniya/vestnik-rhga/arhiv/statia.php?siteLang=en&ID=9893

- 名词: 苏格兰地毯
  解释: 苏格兰地毯（苏格兰仪式追踪板，Masonic Tracing Board / Master's Carpet）是共济会仪式中使用的一种教学图示工具，最初是在地板上用粉笔绘制，后来绘制在帆布或布料上。上面绘有全视之眼、彩虹拱门、棋盘格地板（黑白相间的马赛克拼花，象征人生的善恶交织）、三级台阶、圣经、角尺与圆规等大量共济会象征符号。在苏格兰共济会仪式中尤其常见，故称"苏格兰地毯"。皮埃尔在小说中用它来讽刺共济会内部为形式主义事务争执不休。
  书中原文: 他们为贫民捐款连一个卢布也不肯出，他们挑拨阿斯特列亚支会反对寻找吗哪派，为了一张真正的苏格兰地毯和一份谁也不需要的、连写它的人也不懂得其中意义的会章而整天奔忙。
  网络来源: https://scottishritenmj.org/blog/masonic-trestle-tracing-boards
