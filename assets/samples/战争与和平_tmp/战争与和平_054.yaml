- 名词: 莫里哀
  解释: |
    莫里哀（Molière，1622-1673），本名让-巴蒂斯特·波克兰（Jean-Baptiste Poquelin），17世纪法国喜剧大师、演员、戏剧活动家，与高乃依、拉辛合称"法国古典戏剧三杰"。他出身富商家庭，21岁创立"光耀剧团"，曾因剧团倒闭负债入狱，后在法国外省巡回演出长达13年。1658年返巴黎获路易十四赏识，此后创作了《伪君子》《唐璜》《吝啬鬼》《愤世者》《司卡班的诡计》等传世杰作。其喜剧以深刻的社会讽刺和性格刻画著称，塑造的答尔丢夫（伪君子）、阿巴公（吝啬鬼）等形象已成为法语中的代名词。1673年演完最后一部作品《无病呻吟》后咯血逝世，终年51岁。
    在本书中，皮埃尔反复自责"为什么对她说'我爱您'"，忽然想起莫里哀的台词"为什么要上那条船呢？"（原句出自《司卡班的诡计》：Que diable allait-il faire dans cette galère?），以此自嘲自己如同剧中人物一般，明知不该却上了婚姻的"贼船"。
  书中原文: |
    他忽然想起莫里哀的一句台词："为什么要上那条船呢？"[6]于是他嘲笑起自己来了。
