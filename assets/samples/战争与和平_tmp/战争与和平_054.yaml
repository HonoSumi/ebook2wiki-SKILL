- 名词: 罗伯斯庇尔
  解释: |
    马克西米连·罗伯斯庇尔（Maximilien Robespierre，1758-1794），法国大革命时期雅各宾派领袖，人称"不可腐蚀者"。他深受卢梭启蒙思想影响，主张建立以"美德"为核心的共和国，推行男性普选权、价格管制、废除殖民地奴隶制等激进政策。在1793-1794年雅各宾专政期间，面对内忧外患，他领导救国委员会实行革命恐怖（恐怖统治），颁布《惩治嫌疑犯条例》，最终在热月政变中被推翻并于1794年7月28日被送上断头台处死。罗伯斯庇尔是法国大革命中最具争议的人物——他廉洁自律却冷酷无情，既被赞为穷人的辩护人、共和国的守护者，也被斥为现代极权主义的先驱。
    在本书中，皮埃尔在决斗后陷入哲学沉思，从路易十六被处死联想到罗伯斯庇尔因专制而被处死，由此质疑是非对错的绝对性，表达了一种相对主义的历史观和人生观。
  书中原文: |
    路易十六被处死，人们说他卑鄙，有罪，从他们的观点看来是对的，而那些为他遭到惨死，视他为神圣的人们，也是对的。后来罗伯斯庇尔因为专制而被处死。谁是谁非？无所谓是非。
