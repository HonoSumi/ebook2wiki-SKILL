- 名词: 瓦西里萨·科日娜
  解释: 瓦西里萨·科日娜（约1780—约1840），俄国农妇，1812年俄法战争（卫国战争）期间率领由青少年和妇女组成的游击队抗击拿破仑军队的女英雄。她出生于斯摩棱斯克省瑟乔夫卡县，丈夫是该村村长。拿破仑军队入侵时家园被毁，丈夫被杀，她遂组织游击队，使用大镰刀、草叉、斧头等农具为武器，袭击撤退中的法军，俘获多名俘虏并移交俄军正规部队。因战功被授予奖章和500卢布奖金。1813年画家亚历山大·斯米尔诺夫为她绘制了唯一肖像画。她是俄国版画（卢布克）的常见题材，在俄罗斯文化中被视为爱国主义和人民抗战的象征。托尔斯泰在《战争与和平》中提及她的事迹。
  书中原文: 有一个村长的老婆瓦西里萨，打死几百名法国人。
