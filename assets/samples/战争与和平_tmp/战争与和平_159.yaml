- 名词: 弥撒
  解释: >
    基督教（天主教、东正教等）最重要的礼拜仪式，又称圣祭礼仪或圣体礼。仪式通常包括进堂式、圣道礼仪（诵读圣经及讲道）、圣祭礼仪（祝圣饼酒为基督体血）、领圣体礼和礼成式。东正教的弥撒仪式古老隆重，使用发酵饼，信徒可同时领受圣体和圣血，其礼拜仪式通常称为「圣礼仪」（Divine Liturgy）。在俄国东正教传统中，弥撒是周日及宗教节日的核心崇拜活动。
  书中原文: >
    「星期日做过弥撒以后，当仆人到客厅通报罗斯托夫伯爵来访时」；「她为此安排两个年轻人在做弥撒前在主教那儿会面」
  网络来源: 维基百科-弥撒; 中国百科网-圣餐; 俄罗斯国情网-东正教礼仪

- 名词: 感恩祈祷
  解释: >
    东正教传统中的一种特殊祈祷仪式（俄语：благодарственный молебен / Thanksgiving Moleben），是为感谢上帝的恩惠、庇佑或某一重大事件（如军事胜利、平安脱险等）而举行的礼拜。仪式通常在大教堂举行，包括诵经、唱圣歌、祈祷等环节。1812年俄法战争期间，俄国东正教会多次为国家军队的胜利举行感恩祈祷，是当时俄国社会动员和宗教生活的重要表现。
  书中原文: >
    「为了俄军的胜利，在大教堂举行了一次感恩祈祷，尼古拉也去参加了」；「当感恩祈祷完了的时候」
  网络来源: Eastern Orthodox Christian Trebnic (orthodox.net); 超星慕课-俄罗斯族东正教宗教事务
