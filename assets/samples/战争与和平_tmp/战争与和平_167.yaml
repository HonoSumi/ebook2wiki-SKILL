- 名词: 巴戈乌特
  解释: 卡尔·费多罗维奇·巴戈乌特（1761—1812），俄军中将，原为爱沙尼亚贵族出身。参加过俄土战争（1787—1792）、普图斯克战役、埃劳战役、弗里德兰战役等。1812年卫国战争初期任第二军军长，在博罗季诺战役中接替阵亡的图奇科夫指挥左翼。在塔鲁丁诺战役中率步兵纵队冲锋时被法军炮弹击中身亡。
  书中原文: "心情激动的勇敢的巴戈乌特冒着法国人的炮火向田野走去，也不考虑这时就进入战斗是否有益，就带着一师人直冲上去，把军队带到炮火下面。危险、炮弹、枪弹，正是处在愤怒中的他所需要的。在敌人的头几排枪弹中，一颗子弹把他打死了"
  网络来源: https://alchetron.com/Karl-Gustav-von-Baggovut

- 名词: 塞巴斯蒂安尼
  解释: 奥拉斯·弗朗索瓦·巴斯蒂安·塞巴斯蒂亚尼·德·拉波塔（1771—1851），法国军人、外交官、政治家，1840年获封法国元帅。科西嘉人，追随拿破仑参加雾月政变、马伦戈战役、奥斯特利茨战役。历任驻奥斯曼帝国大使、驻英国大使，曾任法国外交部长（1830—1832）、海军部长。1812年征俄战役中指挥骑兵师，是第一个进入莫斯科的法军指挥官。
  书中原文: "刚进莫斯科，拿破仑就严令塞巴斯蒂安尼将军注意俄国军队的行动，向各条道路派出兵团，命令缪拉寻找库图佐夫。"
  网络来源: https://en.wikipedia.org/wiki/Horace_Fran%C3%A7ois_Bastien_S%C3%A9bastiani_de_La_Porta

- 名词: 雅科夫列夫
  解释: 伊万·阿列克谢耶维奇·雅科夫列夫（1767—1846），俄国近卫军上尉，著名作家亚历山大·赫尔岑的父亲。1812年拿破仑占领莫斯科时未能及时撤离，被法军抓获。拿破仑利用他作为信使，托他携带一封致沙皇亚历山大一世的议和信前往彼得堡。
  书中原文: "拿破仑把那个遭到抢劫、服装破烂、不知怎样才能逃出莫斯科的雅科夫列夫叫来，向他详细说明他的全部政策和宽大为怀，并且写了一封给亚历山大皇帝的信，他在信中说他有责任告诉他的朋友和兄弟，拉斯托普钦在莫斯科工作做得很糟，然后就打发雅科夫列夫去彼得堡。"
  网络来源: https://www.guxuo.com/wgwx/ZPJ/test/zzyh/284.htm

- 名词: 图托尔明
  解释: 伊万·阿金菲耶维奇·图托尔明（1752—1815），俄国枢密院参赞。1812年拿破仑占领莫斯科时被法军俘虏。拿破仑于9月18日释放他，命其携带议和信件前往彼得堡，这是拿破仑占领莫斯科后三次求和尝试中的第一次，但遭到亚历山大一世断然拒绝。
  书中原文: "他又向图托尔明详细讲了他的想法和宽大政策，他又把这个老头子派往彼得堡去进行谈判。"
  网络来源: https://www.163.com/dy/article/HJPIK3SP05434E62.html

- 名词: 格列科夫
  解释: 季莫费·德米特里耶维奇·格列科夫（1770—1831），俄国顿河哥萨克少将，出身哥萨克贵族。1812年卫国战争中指挥哥萨克团，隶属奥尔洛夫-杰尼索夫伯爵麾下。在塔鲁丁诺战役中参与哥萨克对法军的拂晓突袭。1813—1814年率哥萨克旅参加莱比锡民族大会战等远征西欧战役，因功晋升少将。其肖像收藏于冬宫军事画廊。
  书中原文: "副官驰进树林去找格列科夫。当格列科夫回来的时候，奥尔洛夫－杰尼索夫伯爵由于这次尝试的被取消，由于老等不到步兵纵队的出现，还由于敌人近在咫尺，心情很激动"
  网络来源: https://app.fta.art/zh/artwork/76c5e3dcd9a58297afc0a2a41f1b4ac38ab3a4f4
