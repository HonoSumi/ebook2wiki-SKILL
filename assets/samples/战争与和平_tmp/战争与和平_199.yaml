- 名词: 俾斯麦
  解释: 奥托·冯·俾斯麦（Otto von Bismarck，1815—1898），普鲁士王国首相（1862—1890）兼德意志帝国首任宰相。以"铁血宰相"著称，通过普丹战争（1864）、普奥战争（1866）和普法战争（1870—1871）三次王朝战争完成德意志统一，建立德意志帝国。对内推行镇压社会主义运动的《反社会党人法》，同时创立现代社会保障制度（健康、工伤、养老保险）；对外实施"大陆政策"，通过德奥同盟、三国同盟等条约体系孤立法国，维护德国在欧洲的霸权地位。1890年因与威廉二世政见不合被解职。
  书中原文: "普鲁士国王和俾斯麦发布了命令，于是一支军队进入了波希米亚[15]。"
  网络来源: 奥托·冯·俾斯麦 - 维基百科 https://zh.wikipedia.org/wiki/%E5%A5%A5%E6%89%98%C2%B7%E5%86%AF%C2%B7%E4%BF%BE%E6%96%AF%E9%BA%A6

- 名词: 一八一二年战役
  解释: 指1812年拿破仑一世对俄国的远征（俄称"1812年卫国战争"）。拿破仑集结约61万大军于1812年6月24日越过涅曼河入侵俄国。俄军采取战略撤退与坚壁清野战术，在博罗季诺战役后弃守莫斯科。法军占领莫斯科后遭遇大火与补给断绝，10月被迫撤退，沿途遭俄军与严寒打击，最终仅约12万人幸存。该战役是拿破仑帝国由盛转衰的关键转折点，也是托尔斯泰《战争与和平》后半部的历史背景。书中以此战役为引，展开关于权力、自由意志与历史决定论的哲学论述。
  书中原文: "在拿破仑无数未被执行的命令中，关于一八一二年战役的那些命令被执行了，这并非因为那些命令与别的未被执行的命令有什么不同，只因为那一系列命令与导致法国军队进入俄国一系列事件相符合"
  网络来源: French invasion of Russia - Wikipedia https://en.wikipedia.org/wiki/French_invasion_of_Russia
