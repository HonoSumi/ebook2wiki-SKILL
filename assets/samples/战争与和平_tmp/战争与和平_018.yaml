- 名词: 土耳其手枪
  解释: |
    指奥斯曼帝国（土耳其）制造或使用的手枪。18-19世纪奥斯曼土耳其以制造精美的燧发手枪闻名，常采用大马士革花纹钢枪管，以银、象牙、珍珠母等材料镶嵌装饰，兼具实用性与艺术性。在俄土战争时期，土耳其手枪作为战利品被俄罗斯贵族收藏。
  书中原文: |
    只有一些随身带的东西还放在房里：一只小箱子、一只银制食品箱、两支土耳其手枪和一把佩刀——父亲的赠品，是从奥恰科夫城下带回来的。
  网络来源: |
    https://en.wikipedia.org/wiki/Miquelet
    https://www.metmuseum.org/art/collection/search/30605

- 名词: 银链
  解释: |
    东正教中用于悬挂胸前圣像画（Engolpion/Panagia）的银质链条。在东正教传统中，圣像常以银链系挂佩戴于胸前，作为信仰象征和祝福物。银链既是实用之物，也具有一定的宗教仪式意义。
  书中原文: |
    这个椭圆形的、黑脸银袍的神像古色古香，用一条精制的银链系着。
  网络来源: |
    https://baike.baidu.com/item/%E8%83%B8%E5%89%8D%E5%9C%A3%E5%83%8F%E7%94%BB%E9%A1%B9%E9%93%BE
    https://zh.wikipedia.org/zh-sg/%E8%83%B8%E5%89%8D%E8%81%96%E5%83%8F%E7%95%AB%E9%A0%85%E9%8D%8A

- 名词: 佩刀
  解释: |
    俄罗斯贵族和军官佩戴的刀剑武器，既是战斗用具也是身份地位的象征。19世纪俄国军官常佩戴"沙什卡"（Shashka）式高加索弯刀或制式军官佩剑，刀身常饰有国徽、花纹和铭文。佩刀常作为父辈传给子辈的家族纪念物。
  书中原文: |
    只有一些随身带的东西还放在房里：一只小箱子、一只银制食品箱、两支土耳其手枪和一把佩刀——父亲的赠品，是从奥恰科夫城下带回来的。
  网络来源: |
    https://cn.weitze.com/militaria/16/Kaiserliches_Russland_Dragoner_Schaschka_fuer_Offiziere_M_1881_mit_beidseitiger_Klingenaetzung__443216.html

- 名词: 火漆
  解释: |
    一种用于密封信函和文件的材料，加热融化后滴在信封口或文件折叠处，趁热加盖印章以作认证和防伪。火漆在17世纪末传入俄国，成为沙俄帝国官方文书、外交文件和贵族信函中不可或缺的保密与认证工具。俄语称为"сургуч"（sur-guch）。
  书中原文: |
    老头子用他那惯常的迅速动作继续叠信和封信，时而抓起火漆、印戳、信纸，时而又放下。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E7%81%AB%E6%BC%86
    https://link.springer.com/article/10.1134/S1995078020050109

- 名词: 印戳
  解释: |
    用于在火漆或文件上压制印记的工具，通常刻有家族纹章、姓名缩写或官职标识。在沙俄时期，贵族和官员使用私人印戳作为身份认证和信件保密的工具，类似于个人签名。印戳上的图案往往是家族徽记或双头鹰国徽。
  书中原文: |
    老头子用他那惯常的迅速动作继续叠信和封信，时而抓起火漆、印戳、信纸，时而又放下。
  网络来源: |
    https://cdmd.cnki.com.cn/Article/CDMD-10332-1021851582.htm

- 名词: 花体字
  解释: |
    指带有装饰性笔画的签名或书写风格，在西方和俄罗斯贵族中常用于签名或重要文件的落款。俄罗斯贵族常在信件末尾签署花体字（花押），既体现个人身份，也展示书写者的艺术审美。这种签名往往连笔流畅、装饰华丽。
  书中原文: |
    他把笔一挥，签了个花体字，猛然转身对儿子大笑。
  网络来源: |
    https://www.zhihu.com/question/267237344

- 名词: 画十字
  解释: |
    东正教信徒用手在身前划出十字形状的礼仪动作。东正教画十字的方式为：以右手拇指、食指、中指三指并拢（象征三位一体），按"前额—腹部—右肩—左肩"的顺序划十字。这是东正教徒祈祷、进入教堂、面对圣像时的基本礼仪，象征对三位一体上帝的信仰和祈求庇佑。
  书中原文: |
    她画过十字，吻过神像，然后把它递给安德烈。……安德烈明白过来，于是他画过十字，吻吻那个神像。
  网络来源: |
    https://baike.baidu.com/item/%E5%8D%81%E5%AD%97%E5%9C%A3%E5%8F%B7/3998334
    https://bkso.baidu.com/item/%E5%88%92%E5%8D%81%E5%AD%97/58360031

- 名词: 吻圣像
  解释: |
    东正教徒亲吻圣像（Icons）的传统礼仪行为，表示对圣像所代表的基督、圣母或圣徒的敬爱。东正教神学认为，亲吻圣像并非崇拜物质本身，而是通过圣像这一"窗口"敬礼其原型——即神圣者本人。此仪式在东正教教堂和家庭祈祷中都很常见。
  书中原文: |
    她画过十字，吻过神像，然后把它递给安德烈。……安德烈明白过来，于是他画过十字，吻吻那个神像。
  网络来源: |
    https://azbyka.ru/chinaorthodox/shengxiang-yu-shengtan.html
    https://www.saintjohnchurch.org/why-orthodox-christians-kiss-icons/

- 名词: 祝福礼
  解释: |
    东正教中通过祈祷、画十字、亲吻圣像等方式传递上帝赐福的礼仪行为。在《战争与和平》中，玛丽亚公爵小姐将祖传圣像交给哥哥安德烈，画十字并吻过圣像后为他祝福，请求他随身佩带以求上帝保佑。这是一种家庭中常见的祝福仪式，长辈或亲人用圣像为即将远行的人祝福。
  书中原文: |
    "安德烈，我用这圣像为你祝福，你答应我永远戴在身上……"……她郑重地把一个救主像双手捧到哥哥面前。……她画过十字，吻过神像，然后把它递给安德烈。
  网络来源: |
    https://baike.baidu.com/item/%E5%9D%9A%E4%BF%A1%E7%A4%BC/6045142
    https://m.hujiang.com/en_sijichengji/p443776/

- 名词: 报国至上
  解释: |
    将国家利益和报效祖国置于个人与家庭之上的价值观。在书中，老公爵博尔孔斯基以此称赞儿子没有被妻子和家庭牵绊，毅然从军报国的决定。这体现了19世纪初俄罗斯贵族阶层中盛行的爱国主义精神和军人荣誉感，是俄罗斯传统价值观的重要组成部分。
  书中原文: |
    "因为你不拖延时日，没有被女人的裙带绊住脚。报国至上。谢谢，谢谢！"
  网络来源: |
    https://m.thepaper.cn/newsDetail_forward_2691745
    https://www.news.cn/world/2015-08/21/c_128150992.htm

- 名词: 了解一切就会原谅一切
  解释: |
    法文为"Tout comprendre, c'est tout pardonner"，意为理解和宽容他人的缺点与处境。此语经由托尔斯泰在《战争与和平》中引用而广为人知。玛丽亚公爵小姐以此语劝诫哥哥安德烈对妻子丽莎要宽容体谅。该格言的思想源头一般追溯到法国作家斯塔尔夫人（Madame de Staël），并非托尔斯泰原创。
  书中原文: |
    应当为每个人设身处地想想。了解一切，就会原谅一切。
  网络来源: |
    https://www.sohu.com/a/413354878_500680
    https://www.xuemo.cn/showm.asp?id=16796

- 名词: 奥恰科夫围攻战
  解释: |
    指1788年俄土战争期间，俄罗斯帝国军队在格里戈里·波将金和亚历山大·苏沃洛夫率领下围攻奥斯曼帝国要塞奥恰科夫（今乌克兰奥恰基夫）的重要战役。经过数月围困，俄军于1788年12月6日强攻攻克该要塞，歼灭土军约2万人，为俄国最终赢得第六次俄土战争奠定了基础。此战是俄土战争中的关键转折点。
  书中原文: |
    只有一些随身带的东西还放在房里：一只小箱子、一只银制食品箱、两支土耳其手枪和一把佩刀——父亲的赠品，是从奥恰科夫城下带回来的。
  网络来源: |
    https://en.wikipedia.org/wiki/Siege_of_Ochakov_(1788)
    https://www.wikiwand.com/zh-sg/articles/Siege_of_Ochakov_(1788)

- 名词: 米哈伊尔·伊拉里奥诺维奇·库图佐夫
  解释: |
    全名米哈伊尔·伊拉里奥诺维奇·戈列尼谢夫-库图佐夫（1745—1813），俄罗斯帝国元帅，著名军事家、外交家。曾在奥恰科夫围攻战中负伤，失去右眼，得名"独眼将军"。在1812年俄法战争中担任俄军总司令，指挥博罗季诺战役，以焦土战术和战略撤退最终击退拿破仑大军，被誉为俄罗斯民族英雄。拿破仑称他为"北方的老狐狸"。
  书中原文: |
    你听我说：把这封信交给米哈伊尔·伊拉里奥诺维奇。我在信上说，希望他给你一个适当的位置，不要老叫你当副官：讨厌的职务！
  网络来源: |
    https://baike.baidu.com/item/%E7%B1%B3%E5%93%88%E4%BC%8A%E5%B0%94%C2%B7%E4%BC%8A%E6%8B%89%E9%87%8C%E5%A5%A5%E8%AF%BA%E7%BB%B4%E5%A5%87%C2%B7%E5%BA%93%E5%9B%BE%E4%BD%90%E5%A4%AB/14117369
    https://zh.wikipedia.org/zh/%E7%B1%B3%E5%93%88%E4%BC%8A%E5%B0%94%C2%B7%E5%BA%93%E5%9B%BE%E4%BD%90%E5%A4%AB

- 名词: 劳伦斯·斯特恩
  解释: |
    全名劳伦斯·斯特恩（Laurence Sterne，1713—1768），18世纪英国感伤主义文学代表作家，被誉为现代小说的先驱。代表作《项狄传》以打破传统叙事结构、采用意识流手法著称，书中出现黑页、空白页、符号等独特排版。《感伤旅行》则是感伤主义文学的代表作。托尔斯泰在《战争与和平》中借布里安小姐之口引用了斯特恩的名言："我们爱那些给过我们好处的人，远不如爱那些受过我们好处的人。"
  书中原文: |
    正如斯特恩所说，"我们爱那些给过我们好处的人，远不如爱那些受过我们好处的人。"
  网络来源: |
    https://baike.baidu.com/item/%E5%8A%B3%E4%BC%A6%E6%96%AF%C2%B7%E6%96%AF%E7%89%B9%E6%81%A9/10990184
    https://zh.wikipedia.org/zh-my/%E5%8A%B3%E4%BC%A6%E6%96%AF%C2%B7%E6%96%AF%E7%89%B9%E6%81%A9

- 名词: 祖博娃伯爵夫人
  解释: |
    指俄罗斯祖博夫（Зубов）贵族家族的伯爵夫人。祖博夫家族是叶卡捷琳娜二世时期的显赫贵族世家，核心人物普拉东·祖博夫是女皇晚年的宠臣。书中提到的"老伯爵夫人祖博娃"可能指纳塔利娅·亚历山德罗夫娜·祖博娃（苏沃洛夫元帅之女）或其他年长的祖博夫家族女性成员。小公爵夫人以调侃的语气谈论她的假发和假牙，以此取乐。
  书中原文: |
    他妻子在别人面前讲祖博娃伯爵夫人的那些话，以及那同样的笑声，安德烈公爵已经听过五六遍了。
  网络来源: |
    https://en.wikipedia.org/wiki/Zubov
    https://budarts.com/art/c5d765b6-a8c1-11e6-9b13-00163e005d08

- 名词: 奥恰科夫
  解释: |
    今名奥恰基夫（Очаків/Ochakiv），位于乌克兰南部尼古拉耶夫州，地处第聂伯河与布格河汇合入海口，战略位置极为重要。历史上先后归属立陶宛、克里米亚汗国和奥斯曼帝国。1788年俄军攻占后，根据1792年《雅西条约》正式划归俄罗斯帝国。该城在历史上是俄土争夺的焦点，也是俄土战争中的重要战场。
  书中原文: |
    只有一些随身带的东西还放在房里：一只小箱子、一只银制食品箱、两支土耳其手枪和一把佩刀——父亲的赠品，是从奥恰科夫城下带回来的。
  网络来源: |
    https://baike.baidu.com/item/%E5%A5%A5%E6%81%B0%E5%9F%BA%E5%A4%AB/1482923
