- 名词: 罗戈日城门
  解释: 罗戈日城门（俄语：Рогожская застава）是莫斯科历史上的一座城门/关卡，位于莫斯科东南部。它是18-19世纪莫斯科卡梅尔-科列日斯基瓦尔多夫斯基大堤（税收边界线）上的关卡之一，得名于罗戈日村。该地区自1771年起成为莫斯科旧礼仪派（旧信徒）的中心，建有代祷大教堂等宗教建筑群。19-20世纪该地区也发展为莫斯科重要的工业区。
  书中原文: 团队现在该到罗戈日城门了。
  网络来源: 罗戈日城门是莫斯科18-19世纪税收边界线上的重要关卡，自1771年起成为旧礼仪派中心，设有罗戈日旧礼仪派宗教中心，普京曾于2017年到此访问。

- 名词: 雅乌兹桥
  解释: 雅乌兹桥（俄语：Яузский мост，又称阿斯塔霍夫桥）是莫斯科的一座桥梁，跨建于莫斯科河的支流雅乌扎河之上。1804年首次建成石桥，1812年俄法战争中俄军撤退时曾经过此桥。1917年革命后为纪念遇难工人伊拉里翁·阿斯塔霍夫而更名为阿斯塔霍夫桥。1940年重建为钢筋混凝土单跨刚构桥，是莫斯科城市发展的重要见证者。
  书中原文: 那个军官仿佛在嘲笑自己，嘴角含笑直摇头，他在空空荡荡的大街上朝着雅乌兹桥几乎是跑着去追赶他的团队。
  网络来源: 雅乌兹桥始建于1804年，1812年俄军撤退时曾经过此桥，1917年更名为阿斯塔霍夫桥，1940年重建为钢筋混凝土桥。

- 名词: 瓦尔瓦尔卡大街
  解释: 瓦尔瓦尔卡大街（俄语：Улица Варварка）是莫斯科最古老的街道之一，位于红场附近，自1380年起已有记载。街道得名于圣芭芭拉（圣瓦尔瓦拉）大殉道者教堂。沿街建有英国庭院（莫斯科最古老的世俗建筑之一）、旧高斯基市场、罗曼诺夫贵族议事厅等众多历史建筑，拥有莫斯科所有街道中最多的教堂。苏联时期曾更名为斯捷潘·拉辛街。
  书中原文: 在瓦尔瓦尔卡大街有一座未竣工的楼房，下层是酒馆，从那里传出醉汉的喊叫和歌声。
  网络来源: 瓦尔瓦尔卡大街是莫斯科最古老的街道之一，自1380年起有记载，以圣芭芭拉教堂得名，拥有莫斯科最多的教堂建筑群，包括英国庭院、罗曼诺夫宫殿等历史建筑。

- 名词: 中国城(莫斯科)
  解释: 中国城（俄语：Китай-город，音译"基泰哥罗德"）是莫斯科市中心的一个历史街区，毗邻红场和克里姆林宫。其名称中的"Китай"与"中国"并无直接关联，可能源自古俄语"кита"（编织的绳索，指防御工事中的木结构）或突厥语"堡垒"之意。16世纪30年代由伊凡雷帝的母亲叶莲娜·格林斯卡娅摄政期间修建了城墙和塔楼，曾是莫斯科最重要的商业和金融中心。20世纪30年代城墙大部分被拆除，现保留部分遗迹和地铁站名。
  书中原文: 在中国城的城墙附近，有一小群人围着一个身穿厚呢大衣、手拿文件的人。
  网络来源: 中国城（Китай-город）是莫斯科市中心历史街区，毗邻红场和克里姆林宫，16世纪30年代修建城墙，曾是莫斯科商业金融中心。名称与"中国"无直接关联。

- 名词: 马罗谢卡街
  解释: 马罗谢卡街（俄语：Маросейка）是莫斯科历史中心的一条著名街道，位于中国城区域。名称源自"小俄罗斯"（Малороссия，即乌克兰）的旧称"Малороссейка"的变体。17世纪时街上设有"小俄罗斯驿站"，成为乌克兰文化与莫斯科交流的枢纽。苏联时期曾更名为博格丹·赫梅利尼茨基街，苏联解体后恢复原名。沿街保留了许多18-19世纪的贵族府邸和教堂等历史建筑。
  书中原文: 马罗谢卡街拐角，有一所挂着一块靴匠招牌、关着护窗板的大房子，对面站着二十几个穿工作服和破烂长外衣、面容消瘦而且疲倦的无精打采的靴匠。
  网络来源: 马罗谢卡街名称源自"小俄罗斯"（乌克兰），17世纪设有乌克兰驿站，是俄乌文化交流的重要枢纽，保留了大量18-19世纪历史建筑。
