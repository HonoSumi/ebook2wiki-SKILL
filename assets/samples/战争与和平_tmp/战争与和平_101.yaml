- 名词: 砒霜
  解释: 砒霜，化学名三氧化二砷（As₂O₃），白色无臭无味粉末，是历史上最著名的剧毒物之一。古代提炼粗糙常含硫杂质，故有"银针试毒"之说（银与硫反应变黑）。微量（口服20mg即可致死）即可致命，中毒症状包括呕吐、腹痛、抽搐、肝肾衰竭。在19世纪俄国（特别是乌拉尔地区），砒霜因无色无味、难以检测，常被用于刑事投毒，尤以女性在食物中下毒毒害丈夫最为常见。当时法医学鉴定手段有限，砷中毒症状常与霍乱、胃炎等混淆，凶手易于逃避制裁。同时，砒霜也有药用历史——中医古方外用蚀疮、内服劫痰，19世纪欧洲以Fowler液（亚砷酸钾）治疗白血病。现代医学中，三氧化二砷是治疗急性早幼粒细胞白血病（APL）的特效药（FDA批准药物Trisenox），使五年生存率从约25%跃升至约95%。
  书中原文: 就在向她说明阿纳托利已经结婚的那天夜里，她服了她偷偷弄到的砒霜。她吞了一点，就吓坏了，把索尼娅叫醒，对她说出她做了什么事。及时采取了解毒的措施，现在她已经脱离了危险。
