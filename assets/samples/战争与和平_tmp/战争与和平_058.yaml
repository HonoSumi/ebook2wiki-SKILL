- 名词: 史嘉本的诡计
  解释: |
    莫里哀（Moliere）创作于1671年的三幕喜剧，法文原名 Les Fourberies de Scapin，亦译作《司卡班的诡计》。剧中聪明机智的仆人史嘉本用种种诡计从两个吝啬的父亲手中骗取钱财，帮助小主人追求爱情。在《战争与和平》中，皮埃尔与妻子海伦闹翻后，引用该剧中吉隆特的台词"他为什么偏要上那条船呢？"（Que diable allait-il faire dans cette galere?）来自嘲自己的处境，暗示自己不该与海伦结婚。
  书中原文: |
    法语，这是莫里哀所著剧本《史嘉本的诡计》中一句台词。剧中吉隆特听说儿子被土耳其商船绑架了去，反复抱怨他不该上那条船。
  网络来源: |
    https://www.douban.com/review/16231718/
    https://mzk.chazidian.com/mip/wenxue/36394/

- 名词: 托尔若克刺绣
  解释: |
    俄罗斯特维尔州托尔若克镇的传统金线刺绣工艺（золотное шитьё / Torzhok goldwork embroidery），使用含5-8%黄金的金属线，在天鹅绒、呢绒或丝绸上刺绣，金线不穿过织物而用横向丝线固定于表面。起源于13世纪，18-19世纪达到鼎盛。经典图案为玫瑰花枝配以花蕾和卷叶。叶卡捷琳娜二世、亚历山大二世等曾定制礼服，普希金曾为妻子购买刺绣腰带和手套。今设有金线刺绣博物馆。在《战争与和平》中，皮埃尔途经托尔若克驿站时，有农妇向他兜售这种刺绣品。
  书中原文: |
    皮埃尔不改变两腿放到桌上的姿势，从眼镜上方瞅着他们，不明白他们要什么，不明白他们不解决他所想的那些问题，怎么能活下去。
    驿站长、站长妻子、仆人、卖托尔若克刺绣的农妇，都进来要为他效劳。
  网络来源: |
    https://www.sohu.com/a/315530366_495725
    https://www.homofaber.com/en/artisans/torzhok-goldwork-embroidery-embroidery-russian-federation
    https://eyzx.dlufl.edu.cn/info/1052/1682.htm

- 名词: 托尔若克
  解释: |
    俄罗斯特维尔州的历史古镇，位于特维尔察河畔，距特维尔市以西约60公里。其历史可追溯至1139年，因地处莫斯科至圣彼得堡的商道上而繁荣。以金线刺绣工艺闻名，拥有约400处历史景点，包括鲍里斯和格列布修道院、季赫温圣母像木制教堂等，被列为俄罗斯历史名城。在《战争与和平》中，皮埃尔与妻子闹翻后前往彼得堡，途经托尔若克驿站停留等待换马，在此陷入深刻的人生思考。
  书中原文: |
    皮埃尔和妻子闹翻以后，就动身去彼得堡。走到托尔若克，驿站没有备换的马，也许是驿站长不愿意给。皮埃尔只得等待。他和衣躺在圆桌旁的沙发上，把穿着厚毡靴的大脚伸到圆桌上，沉思起来。
  网络来源: |
    https://baike.baidu.com/item/托尔若克/221076
    https://www.britannica.com/place/Torzhok
    https://www.baike.com/wikiid/7659910376207647950

- 名词: 索科尔尼克
  解释: |
    莫斯科东北部的大型公园和森林区域（Парк Сокольники），是莫斯科最著名的休闲场所之一。在《战争与和平》中，这里是皮埃尔·别祖霍夫与多洛霍夫决斗的地点。皮埃尔因多洛霍夫与其妻海伦有染而提出决斗，在索科尔尼克森林的一片空地上进行。从未开过枪的皮埃尔先开枪击中了多洛霍夫，随后多洛霍夫未能击中皮埃尔。这场决斗成为皮埃尔精神探索的重要转折点，事后他反复回想此事，内心充满困惑与哲学思考。
  书中原文: |
    可是，自从那天在索科尔尼克松林决斗回来以后，那些问题就在他的心头萦绕着，使他度过了一个痛苦的不眠之夜；而现在，在孤寂的旅途中，这些问题更加强有力地占据着他。
  网络来源: |
    https://tieba.baidu.com/p/7095580047

- 名词: 船歌
  解释: |
    船歌（Barcarolle）起源于意大利威尼斯，原是贡多拉船夫所唱的民歌，后发展为古典音乐的一种体裁。音乐特点为6/8或12/8拍，节奏均匀晃动，模仿轻舟荡漾的意态。著名作品有奥芬巴赫歌剧《霍夫曼的故事》中的《船歌》、肖邦《升F大调船歌》、门德尔松《威尼斯船歌》、柴可夫斯基《六月·船歌》等。在《战争与和平》中，杰尼索夫喜爱船歌，索尼娅在钢琴上弹奏船歌前奏，娜塔莎随之演唱，歌声深深打动了因赌博输钱而痛苦不堪的尼古拉。
  书中原文: |
    索尼娅坐在琴旁，正在弹杰尼索夫特别喜爱的一首船歌的前奏。娜塔莎准备唱。杰尼索夫两眼充满喜悦的光芒望着她。
    ...但是娜塔莎一唱完船歌，现实又浮上心头。
  网络来源: |
    https://baike.baidu.com/item/船歌/82633
    https://zh.wikipedia.org/zh-tw/船歌

- 名词: 俄国婴儿洗礼习俗
  解释: |
    俄国东正教婴儿洗礼的古老仪式，包含剪发粘蜡投入圣水盆的独特环节。仪式中神父将婴儿浸入圣水盆三次，诵读"圣父、圣子、圣灵"之名；随后剪下婴儿的一小撮头发，与蜡烛上的蜡粘在一起，投入圣水盆中。如果头发和蜡沉底则为不祥之兆，浮起则为吉兆。剪发象征奉献与顺服，蜡象征基督之光，投入圣水表示将婴儿交托给神。仪式还包括圣油涂抹、佩戴十字架、按东正教圣徒日历取名等环节。在《战争与和平》中，这一习俗被作为注释提及。
  书中原文: |
    俄国习俗，剪下一撮小儿头发粘在蜡片上，投到圣水盆里，如果沉底，就是不祥之兆。
  网络来源: |
    https://baike.baidu.com/item/俄罗斯小孩的出生习俗/2326757
    https://baike.baidu.com/item/洗礼节
