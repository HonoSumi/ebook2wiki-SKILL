- 名词: 圣乔治十字勋章
  解释: |
    圣乔治十字勋章（Георгиевский крест）是俄罗斯帝国最高级别的军事勋章之一。
    1769年由女皇叶卡捷琳娜二世设立圣乔治勋章，1807年增设专门授予士兵和下级军官的变形版本——士兵圣乔治十字勋章。
    勋章以圣乔治屠龙形象为标志，绶带为橙黑相间的"圣乔治绶带"，后来成为俄罗斯军事荣誉的重要象征。
    在《战争与和平》描写的历史时期（1805-1812年），该勋章是俄国军人最重视的荣誉之一。
  书中原文: |
    他抖了抖系在军服滚绦上的士兵圣乔治十字勋章，指了指他那扎着绷带的胳膊，微笑着看了看贝格。
  网络来源: |
    https://zh.wikipedia.org/wiki/圣乔治勋章
    https://baike.baidu.com/item/圣乔治十字勋章

- 名词: 皇太子
  解释: |
    皇太子（俄语：Цесаревич，英语：Tsesarevich/Tsarevich）是俄罗斯帝国的皇储（王位法定继承人）称号。
    1797年保罗一世颁布皇室继承法后，特指皇位继承人，其他皇子则称"大公"（Grand Duke）。
    《战争与和平》中提到的皇太子指沙皇亚历山大一世的弟弟康斯坦丁·巴甫洛维奇大公（Grand Duke Constantine Pavlovich），
    他在1799年被封为皇储，1812年拿破仑入侵期间在军中担任要职。
  书中原文: |
    皇太子骑着马经常跟着我们的团，因此我们到处得到方便，占尽了便宜。在波兰受到多么好的招待，多么好的宴会和舞会——我简直无法向你形容！皇太子待我们军官好极了。
  网络来源: |
    https://en.wikipedia.org/wiki/Tsesarevich
    https://baike.baidu.com/item/沙皇太子

- 名词: 阿尔瑙人
  解释: |
    阿尔瑙人（Arnauts，土耳其语：Arnavut）是奥斯曼土耳其语中对阿尔巴尼亚人的称呼。
    在历史上，Arnauts也泛指在奥斯曼军队中服役的巴尔干雇佣兵。
    在《战争与和平》中，"阿尔瑙人"是皇太子康斯坦丁·巴甫洛维奇大公发怒时的口头语/骂人话，
    类似于一种斥责用语，用以训斥犯错的下属，并非字面意义上的民族称谓。
  书中原文: |
    盛怒的大公骑马来到他跟前，喊道："阿尔瑙人！"（"阿尔瑙人"是皇太子发怒时爱说的口头语），他要传见连长。
  网络来源: |
    https://en.wikipedia.org/wiki/Arnauts
    https://baike.baidu.com/item/阿尔巴尼亚人

- 名词: 我们在天上的父
  解释: |
    "我们在天上的父"是基督教最著名的祷文——主祷文（天主经）的开头句，源自《圣经·马太福音》第6章第9-13节。
    在东正教（俄国国教）传统中，主祷文是每日晨祷和晚祷的核心祈祷文，信徒自幼背诵，熟悉程度极高。
    小说中贝格用"背得像背'我们在天上的父'一样熟"来形容他对操典的记忆程度，
    体现了19世纪初俄国东正教文化背景下，这一祷文作为"人人烂熟于心"的基准比喻。
  书中原文: |
    发给本团的命令我记得滚瓜烂熟，操典也背得像背"我们在天上的父"一样熟。
  网络来源: |
    https://azbyka.org/chinaorthodox/womende-tianfu-zhuadaowen.html
    https://baike.baidu.com/item/主祷文

- 名词: 发配西伯利亚
  解释: |
    发配西伯利亚（俄语：каторга，卡托加）是沙皇俄国时期对罪犯的常见刑罚，
    指将囚犯流放到人烟稀少的西伯利亚及远东地区，强迫其从事采矿、伐木、修路等艰苦劳动。
    该制度始于16世纪末，1753年伊丽莎白女皇用苦役取代死刑后规模急剧扩大。
    1801-1917年间超过100万人被流放西伯利亚。十二月党人、陀思妥耶夫斯基等著名人物均曾遭受此刑。
    在《战争与和平》中，这是皇太子训斥下属时威胁使用的严厉处罚手段。
  书中原文: |
    又是"阿尔瑙人"，又是"鬼东西"，又是"发配西伯利亚"。
  网络来源: |
    https://zh.wikipedia.org/wiki/卡托加
    https://m.thepaper.cn/wifiKey_detail.jsp?contid=3812921

- 名词: 加利西亚
  解释: |
    加利西亚（Galicia，也称加里西亚）是中欧的历史地区，位于今波兰东南部和乌克兰西部。
    1772年奥地利在第一次瓜分波兰中获得该地区，成立"加利西亚及洛多梅里亚王国"，
    1867年后属于奥匈帝国（内莱塔尼亚部分），首府为伦贝格（今利沃夫）。
    在《战争与和平》的历史背景（1805-1812年拿破仑战争时期），加利西亚属于奥地利帝国，
    俄奥联军对法作战期间，俄国军官曾在加利西亚地区驻军或执行任务。
  书中原文: |
    他面带愉快的笑容说，盛怒的大公骑马来到他跟前，喊道："阿尔瑙人！"……他谈起他在加利西亚和大公有一场谈话，当时大公在各团巡视，为了一件犯规的行动暴跳起来。
  网络来源: |
    https://baike.baidu.com/item/加利西亚/9751485
    https://zh.wikipedia.org/wiki/加利西亚_(东欧)

- 名词: 大公
  解释: |
    大公（俄语：Великий князь，英语：Grand Duke）是俄罗斯帝国皇室成员的世袭爵位。
    1547年伊凡四世加冕沙皇后，"大公"从统治者称号转变为沙皇直系男性亲属（儿子、兄弟、孙子等）的专属头衔。
    其等级位于沙皇之下、其他所有贵族之上。女性称为女大公（Grand Duchess）。
    在《战争与和平》中，"大公"常指沙皇亚历山大一世的弟弟康斯坦丁·巴甫洛维奇大公（即皇太子），
    他在军中担任高级职务，经常巡视各团，以脾气暴躁著称。
  书中原文: |
    两个近卫军军人向罗斯托夫讲他们的行军，讲他们在俄国、在波兰、在国外受到怎样隆重的接待，讲他们的司令官大公的言行，讲他怎样仁慈和暴躁的笑话。
  网络来源: |
    https://en.wikipedia.org/wiki/Grand_duke
    https://baike.baidu.com/item/大公/10859511
