- 名词: 普卢塔赫
  解释: 普卢塔克（Plutarch，约46—120年），罗马帝国时期的希腊作家、哲学家、历史学家，以《希腊罗马名人传》（Parallel Lives）著称于世。该书开创西方纪传体史著先河，将希腊名人与罗马名人成对对比，附合论比较其德行与功过。另有《道德论集》（Moralia）存世。普卢塔克在文艺复兴时期深受欢迎，莎士比亚、蒙田、拉伯雷等均受其影响，常被与司马迁《史记》相提并论。
  书中原文: 在安娜·帕夫洛夫娜的圈子里却相反，对这种狂热倍加赞赏，像普卢塔赫讲到古代英雄似的谈论这种狂热。
  网络来源: https://wapbaike.baidu.com/item/%E6%99%AE%E9%B2%81%E5%A1%94%E5%85%8B

- 名词: 波罗金诺
  解释: 博罗季诺（Borodino），莫斯科以西约124公里的村庄，1812年9月7日在此爆发拿破仑战争中最为血腥的单日战役——博罗季诺战役。法军约13万人对阵俄军约15万人，双方伤亡合计超过6.6万人。法军取得战术胜利并最终占领莫斯科，但未能歼灭俄军主力，战略目标落空。此役标志着拿破仑大军团覆灭的开始，被托尔斯泰在《战争与和平》中作为核心战役进行浓墨重彩的描写。
  书中原文: 在到达离莫斯科一百一十二俄里的波罗金诺之前，俄军都未能应战。
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%8D%9A%E7%BE%85%E5%AD%A3%E8%AB%BE

- 名词: 约康德
  解释: 让·德·拉封丹（Jean de La Fontaine，1621—1695）《故事诗》（Contes et nouvelles en vers）中的首篇作品《若孔德》（Joconde），发表于1665年。该诗改编自意大利诗人阿里奥斯托《疯狂的罗兰》第28歌中的故事，讲述关于婚姻不忠的放荡主题，在当时的法国上流社会被视为轻浮香艳之作。托尔斯泰在《战争与和平》中以此比喻年轻小姐听到这种故事时的羞赧反应。
  书中原文: 据说，当人们对他说："皇上和祖国赐给您这个荣誉"时，他脸红得像小姐听到人家给她诵读《约康德》。
  网络来源: https://en.wikipedia.org/wiki/Contes_et_nouvelles_en_vers

- 名词: 金字塔
  解释: 指1798年7月21日拿破仑在埃及远征中的金字塔战役（Battle of the Pyramids）。拿破仑率3万余法军在开罗附近的恩巴贝以空心方阵战术击溃马穆鲁克骑兵，法军伤亡不到300人，马穆鲁克军死伤近万人。战后拿破仑发表著名演说："士兵们！从这些金字塔的顶端，四十个世纪的历史正在注视着你们！"此战奠定了拿破仑在军界的声望，也成为他"不朽的常胜将军"神话的重要组成部分。
  书中原文: 告诉这个顿河的孩子，和他谈话的就是皇帝本人，就是把他不朽的、常胜将军的名字写在金字塔上的那个皇帝本人。
  网络来源: https://baike.baidu.com/item/%E9%87%91%E5%AD%97%E5%A1%94%E5%A4%A7%E6%88%98/9472364

- 名词: 维亚济马
  解释: 维亚济马（Vyazma），俄罗斯斯摩棱斯克州西部城市，位于莫斯科以西约200公里。1812年拿破仑入侵俄国期间，拿破仑曾在此寻找战机但未能迫使俄军进行大会战。同年11月3日（俄历），拿破仑大军从莫斯科撤退途经维亚济马时，遭俄军前卫部队追击并爆发维亚济马之战，法军损失约6000人，标志着拿破仑大军灾难性撤退的开始。2021年法俄两国曾在维亚济马联合安葬1812年阵亡士兵遗骸。
  书中原文: 拿破仑先在多罗戈布日以西的维亚济马，然后又在察列沃－扎伊米希寻找战机；但结果由于无数情况的冲突，在到达离莫斯科一百一十二俄里的波罗金诺之前，俄军都未能应战。拿破仑在维亚济马下令，挥军向莫斯科长驱直入。
  网络来源: https://wapbaike.baidu.com/item/%E7%BB%B4%E4%BA%9A%E6%B5%8E%E9%A9%AC%E4%B9%8B%E6%88%98/23130039

- 名词: 察列沃-扎伊米希
  解释: 察列沃-扎伊米希（Tsaryovo-Zaymishche），俄罗斯斯摩棱斯克州维亚济马区的一个村庄，位于斯摩棱斯克通往莫斯科的古老道路上。1812年8月29日（俄历8月17日），库图佐夫在此地正式接管巴克莱·德·托利和巴格拉季翁率领的俄军指挥权，成为1812年卫国战争的重要转折点。库图佐夫在此短暂停留后决定继续后撤，最终在博罗季诺与拿破仑决战。村中现设有1812年卫国战争纪念碑。
  书中原文: 在维亚济马至察列沃－扎伊米希的行军途中，拿破仑骑一匹草黄色截尾溜蹄马，他的随从有近卫军、亲兵、少年侍从和副官。
  网络来源: https://en.topwar.ru/18149-othod-russkoy-armii-ot-smolenska-i-poiski-pozicii-dlya-generalnogo-srazheniya.html

- 名词: 洛普欣
  解释: 彼得·瓦西里耶维奇·洛普欣（Pyotr Vasilyevich Lopukhin，1753—1827），俄国贵族、政治家，曾任俄国司法大臣、枢密院成员、国务委员会成员。在1812年战争中参与8月8日委员会会议，与萨尔特科夫、阿拉克切耶夫、维亚济米季诺夫、科丘别伊共同讨论战局，委员会最终建议任命库图佐夫为俄军总司令。洛普欣家族是沙俄显赫贵族，叶夫多基娅·洛普欣娜（彼得一世首任皇后）即出自该家族。
  书中原文: 出席会议的有萨尔特科夫元帅、阿拉克切耶夫、维亚济米季诺夫、洛普欣和科丘别伊。委员会认为战事失利是由于指挥不统一，……仍然建议任命库图佐夫为总司令。
  网络来源: https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3/61321453
