- 名词: 米哈伊洛夫卡
  解释: 俄罗斯斯摩棱斯克州的一个村庄，位于斯摩棱斯克大道上。1812年俄法战争期间，巴格拉季翁公爵在此地设立司令部，并于1812年8月7日在此给阿拉克切耶夫伯爵写了一封关于斯摩棱斯克弃守的重要信件，信中批评了巴克雷·德·托利的撤退战略。
  书中原文: "八月七日，巴格拉季翁公爵在位于斯摩棱斯克大道米哈伊洛夫卡村的驻地写了如下一封信"
  网络来源: https://zh.wikipedia.org/wiki/%E4%BF%84%E6%B3%95%E6%88%98%E4%BA%89

- 名词: 圣徒传
  解释: 东正教重要宗教文献，全称《阅读月书》（Четьи-Минеи），按月份和日期编排的圣徒传记与宗教说教文集。最著名的版本由罗斯托夫的圣德米特里在17世纪末至18世纪初编纂，历时约20年（1684-1705年），至今仍为俄罗斯正教会广泛使用。另一重要版本是莫斯科都主教马卡里在16世纪主持编纂的《大阅读月书》（Великие Четьи-Минеи），共12卷、超过27,000页。
  书中原文: "阿尔帕特奇送走了家眷，一个人留在童山；他正坐在家里读《圣徒传》。"
  网络来源: https://en.wikipedia.org/wiki/Great_Menaion_Reader

- 名词: 斯摩棱斯克大火
  解释: 1812年8月16-18日，俄法战争中的斯摩棱斯克战役期间，该城遭受毁灭性大火。俄军指挥官巴克莱·德·托利下令撤退时实行焦土战术，主动烧毁弹药库和补给品，大火迅速蔓延全城。全城2250栋建筑中84%被毁，城中约15000居民仅剩约1000人。拿破仑虽占领了斯摩棱斯克，但未能歼灭俄军主力，也未能获得补给基地，是一场得不偿失的"皮洛士式胜利"。
  书中原文: "斯摩棱斯克的大火和该城的放弃，对于安德烈公爵是一个新纪元。对敌人的新仇使他忘掉个人的悲伤。"
  网络来源: https://zh.wikipedia.org/zh-mo/%E6%96%AF%E6%91%A9%E6%A3%B1%E6%96%AF%E5%85%8B%E6%88%B0%E5%BD%B9_(1812%E5%B9%B4)

- 名词: 皇家女子学校
  解释: 即斯莫尔尼贵族女子学院（Смольный институт），俄国第一所女子中等寄宿学校。1764年由叶卡捷琳娜二世在圣彼得堡斯莫尔尼修道院创办，最初称"贵族女子教育社"，招收200名6-18岁贵族女孩，教授外语、俄语、算术、地理、历史、舞蹈、音乐、社交礼仪等。1796年起转由玛丽亚·费奥多罗芙娜皇后管理部掌管。1917年十月革命后关闭。书中提到该学校在1812年战争期间准备迁往喀山避难。
  书中原文: "在这个圈子里，责备那些出这样主意的人——他们过于仓促地下令，让那受皇太后保护的皇家女子学校做好迁往喀山的准备。"
  网络来源: https://baike.baidu.com/item/%E6%96%AF%E8%8E%AB%E5%B0%94%E5%B0%BC%E8%B4%B5%E6%97%8F%E5%A5%B3%E5%AD%90%E5%AD%A6%E9%99%A2/6476947

- 名词: 英国风景园
  解释: 又称英式园林（English landscape garden），18世纪起源于英国的一种园林风格，以威廉·肯特、"能人"布朗等为代表。其核心特征是打破法国古典主义园林的几何对称布局，追求自然化的理想风景——蜿蜒湖泊、起伏草坪、树丛簇拥、古典神庙、哥特废墟等。1760年代起在欧洲大陆传播，1774年叶卡捷琳娜大帝在皇村（Tsarskoe Selo）引入该风格，其子保罗一世在巴甫洛夫斯克建造了俄国最典型的英式风景园。俄国贵族庄园在18世纪末至19世纪初广泛采用这一风格。
  书中原文: "花园的小径已经长满了杂草，牛犊和马在英国式的花园里游荡。"
  网络来源: https://en.wikipedia.org/wiki/English_landscape_garden
