- 名词: 普列奥布拉任斯基营
  解释: |
    即普列奥布拉任斯基近卫军团（Преображенский лейб-гвардии полк），
    由彼得大帝于17世纪末创立，是俄罗斯帝国历史最悠久、最精锐的近卫步兵团。
    该团名称来源于莫斯科郊外的普列奥布拉任斯科耶村，彼得大帝幼年曾在此组建少年军。
    在《战争与和平》描写的时代，该团是俄军最核心的部队之一，参与了包括奥斯特里茨战役、
    弗里德兰战役在内的拿破仑战争重大战役。在蒂尔西特和约签订后，该团官兵与法国近卫军
    共同参加宴会，体现法俄结盟的场面。
  书中原文: |
    普列奥布拉任斯基营的队列解散了，和法国近卫军混合在一起坐在给他们预备的餐桌上。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/普列奥布拉任斯基团
    https://baike.baidu.com/item/普列奥布拉任斯基团

- 名词: 埃尔富特
  解释: |
    埃尔富特（Erfurt，又译爱尔福特）是德国图林根州的首府，位于德国中部，
    是一座拥有1300多年历史的古城。742年首次见于历史记载，中世纪时期因菘蓝贸易
    而富甲一方，建有80多座教堂和36座修道院，素有"塔城"之称。马丁·路德曾在此
    大学求学并修行。1803年划归普鲁士管辖。在拿破仑战争期间，1808年拿破仑与沙皇
    亚历山大一世在此举行著名的埃尔富特会议。
  书中原文: |
    一八〇八年，亚历山大皇帝到埃尔富特再度会见拿破仑皇帝，关于这次隆重会见的壮观情景，彼得堡上流社会有很多的议论。
  网络来源: |
    https://baike.baidu.com/item/埃尔福特市
    https://zh.wikipedia.org/zh-hans/埃尔福特

- 名词: 埃尔富特会见
  解释: |
    指1808年9月27日至10月14日在德国埃尔富特举行的拿破仑一世与沙皇亚历山大一世
    的会谈（Congress of Erfurt）。此次会议旨在重新确认1807年《蒂尔西特条约》
    所确立的法俄联盟关系。其时拿破仑深陷西班牙半岛战争，需要确保俄国不会在后方
    制造麻烦。会议期间，法国外长塔列朗秘密提醒亚历山大一世抵制拿破仑的称霸野心，
    成为法俄同盟破裂的重要伏笔。这是拿破仑与亚历山大一世的最后一次会面，此后
    法俄矛盾激化，最终导致1812年拿破仑远征俄国。
  书中原文: |
    一八〇八年，亚历山大皇帝到埃尔富特再度会见拿破仑皇帝，关于这次隆重会见的壮观情景，彼得堡上流社会有很多的议论。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/埃尔福特会议
    https://www.britannica.com/event/Napoleonic-Wars/The-Peninsular-War-and-the-Congress-of-Erfurt-1808

- 名词: 梁赞省
  解释: |
    梁赞省（Рязанская губерния）是俄罗斯帝国的一个省份，存在于1796年至1929年，
    首府为梁赞市，位于莫斯科东南方向约196公里处。面积约36922平方公里，
    1897年人口约183万。梁赞地区在1521年并入莫斯科大公国，1796年正式设省。
    1929年撤销后并入莫斯科州，1937年重新设立梁赞州。在《战争与和平》中，
    安德烈公爵的儿子名下的田庄即位于梁赞省。
  书中原文: |
    一八〇九年春天，安德烈公爵前往梁赞省他儿子名下的田庄去视察，他是儿子的监护人。
  网络来源: |
    https://zh.wikipedia.org/zh-my/梁赞省
    https://baike.baidu.com/item/梁赞省

- 名词: 朝圣者
  解释: |
    指俄国东正教传统中的流浪朝圣者（странники/паломники），他们以宗教虔诚为
    驱动力，离开家乡踏上前往各圣地的朝拜之旅，如基辅、耶路撒冷等地。19世纪俄国
    社会中有大量这样的朝圣者，其中许多是残废、畸形或精神不健全的底层民众，依靠
    教徒的资助沿途朝拜一处处的"圣地"。这一现象在俄国文学中有广泛反映，
    如陀思妥耶夫斯基、列斯科夫等作家的作品中均有描写。
  书中原文: |
    俄国当时一种教派的朝圣者，其中有许多残废、畸形或精神不健全的人。他们往往靠教徒资助朝拜一处处"圣地"。
  网络来源: |
    https://slavica.indiana.edu/wanderer-pilgrims
    https://psst.jvolsu.com/index.php/en/archive-en/422-logos-et-praxis-2022-vol-21-3

- 名词: 基辅洞穴修道院
  解释: |
    基辅洞穴修道院（Києво-Печерська лавра，又称佩乔尔斯克修道院）位于乌克兰
    基辅，始建于1051年，由修道士圣安东尼和圣费奥多西创建。修道院因建在第聂伯河
    畔的山洞中而得名（печера意为洞穴），是东正教在古罗斯最古老的修道院之一，
    也是东正教的重要圣地。修道士涅斯托尔在此完成了基辅罗斯第一部编年史
    《往年纪事》。1990年被列入联合国教科文组织世界文化遗产。
  书中原文: |
    指基辅洞穴修道院的圣母。
  网络来源: |
    https://zh.wikipedia.org/wiki/基辅洞窟修道院
    https://baike.baidu.com/item/基辅佩切尔斯克修道院

- 名词: 代役租制
  解释: |
    代役租制（оброк）是俄国农奴制下的一种封建地租形式，指农奴以实物或货币
    代替劳役向地主缴纳租金。与劳役租（徭役制）并列为俄国封建晚期地主的两大
    剥削形式。在非黑土区（工商业较发达地区），代役租更为普遍；在黑土区则以
    劳役租为主。代役租制使农民人身依附关系相对松动，农民可暂时离开村庄进城
    务工经商。19世纪中叶代役租急剧增长，农民实际受剥削程度极大加重。
    1861年农奴制改革后，代役租逐步被废除。
  书中原文: |
    在一处田庄里，三百名农奴被解放了（这在当时俄国是首批范例之一），在另外一些田庄里，徭役制改为代役租制。
  网络来源: |
    http://euroasia.cssn.cn/kycg/elsls/201905/t20190510_4878676.shtml
    https://wiki.cnki.com.cn/HotWord/1624396.htm

- 名词: 徭役制
  解释: |
    徭役制（барщина，巴尔斯奇纳）是俄国农奴制下农奴无偿为地主劳动的强制劳役
    制度，又称劳役地租。农奴需自带农具在地主庄园中每周劳动3至4天，农忙时甚至
    要全天劳作。与代役租制（оброк）共同构成俄国农奴经济的两大支柱。1649年法典
    正式确立了这一制度。1797年保罗一世颁布法令将徭役限制为每周3天。
    1861年农奴制改革后，徭役制随农奴制的废除而终结。
  书中原文: |
    在一处田庄里，三百名农奴被解放了（这在当时俄国是首批范例之一），在另外一些田庄里，徭役制改为代役租制。
  网络来源: |
    https://book.qq.com/book-read/33706400/24
    https://www.rbth.com/arts/history/2017/04/17/from-serfdom-to-freedom-the-long-and-winding-road_744333

- 名词: 为普鲁士国王
  解释: |
    源自法语习语"travailler pour le roi de Prusse"（为普鲁士国王工作），
    意为"徒劳无功、白忙一场"。该习语起源于18世纪，有多种说法：一说讽刺
    普鲁士国王腓特烈二世（弗里德里希大帝）对雇佣兵极为吝啬；一说源自1757年
    歌曲嘲讽法国苏比斯亲王在罗斯巴赫战役中被普鲁士击败。在《战争与和平》的
    语境中，伊波利特公爵反复说这一短语，意在表达对法俄联盟及其战争目的的讽刺。
  书中原文: |
    原文为法语，在法语中，"为普鲁士国王"是一句成语，意为：徒劳无益。
  网络来源: |
    https://www.thelocal.fr/20230623/french-expression-of-the-day-travailler-pour-le-roi-de-prusse
    https://fastfrench.com.au/sayings-and-expressions/travailler-pour-le-roi-de-prusse
