- 名词: 罗马王
  解释: |
    罗马王（Roi de Rome）是拿破仑一世与其第二位皇后玛丽·路易莎（奥地利公主）的独生子拿破仑二世（1811—1832）的封号。他出生即被封为罗马王，成为法兰西第一帝国的皇位继承人。百日王朝末期（1815年6月22日—7月7日），拿破仑一世第二次退位时在诏书中宣布其为法国皇帝拿破仑二世，但实际从未执政。1814年拿破仑战败后被带到维也纳外祖父处，封号改为莱希斯塔德公爵。1832年因肺结核死于维也纳美泉宫，年仅21岁。1940年其遗骸被运回巴黎荣军院，安葬于拿破仑一世墓旁。
  书中原文: |
    这是日拉尔用鲜明的色彩画的一幅孩子的肖像，这是奥国公主为拿破仑生的儿子，不知为什么人们都管这个孩子叫罗马王。
    ……“罗马王，”他用优美的手势指着画像，说，“好极了！”
    ……他命令把肖像移到帐篷前面，让那些在他帐篷附近守卫的老近卫军也有观赏罗马王——他们所崇拜的皇帝的儿子和继承人的幸福。
  网络来源: |
    https://baike.baidu.com/item/%E6%8B%BF%E7%A0%B4%E5%B4%99%E4%BA%8C%E4%B8%96/2971271
    https://zh.wikipedia.org/zh-mo/%E6%8B%BF%E7%A0%B4%E4%BB%91%E4%BA%8C%E4%B8%96

- 名词: 西斯廷圣母像
  解释: |
    《西斯廷圣母》（Sistine Madonna）是意大利文艺复兴三杰之一拉斐尔·桑西（Raffaello Sanzio，1483—1520）于1512至1514年间创作的祭坛画，布面油画，尺寸265cm×196cm。该画受教皇朱利叶斯二世委托，为意大利皮亚琴察的圣西斯托教堂而作，因教堂得名。画面采用金字塔形构图，描绘圣母玛利亚怀抱圣婴耶稣从云端降下的神圣场景，两侧为教皇西斯廷二世和圣女圣芭芭拉，下方两个小天使成为艺术史上最经典的天使形象之一。画中圣婴耶稣的眼神深邃而成熟，似乎预知未来的苦难。该画现藏于德国德累斯顿茨温格博物馆历代大师画廊，被誉为文艺复兴时期宗教艺术的巅峰之作。
  书中原文: |
    这个非常俊秀，鬈发、眼睛具有西斯廷圣母像中基督的神情的孩子，正在玩一个球。
  网络来源: |
    https://zh.wikipedia.org/zh-tw/%E8%A5%BF%E6%96%AF%E5%BB%B7%E8%81%96%E6%AF%8D
    https://baike.baidu.com/item/%E8%A5%BF%E6%96%AF%E5%BB%B7%E5%9C%A3%E6%AF%8D/7769858

- 名词: 埃克米尔公爵
  解释: |
    埃克米尔公爵是中文对拿破仑麾下元帅路易·尼古拉·达武（Louis Nicolas Davout，1770—1823）封号的常见误称。达武在1809年埃克米尔战役中以劣势兵力杀出奥军包围并与主力会合，因功于1809年8月15日获封"埃克米尔亲王"（Prince d'Eckmühl），而非公爵（其公爵衔为"奥尔施泰特公爵"，1808年封）。达武是拿破仑二十六位元帅中最年轻的一位（34岁授衔），以治军严整、坚韧不拔著称，被誉为"铁帅"。参加过奥斯特利茨、奥尔施泰特、瓦格拉姆等重大战役，1815年滑铁卢战役期间留守巴黎担任陆军大臣。其名字刻于巴黎凯旋门之上。
  书中原文: |
    拿破仑听了那个被称为埃克米尔公爵的达乌关于迂回俄军左翼的建议后，说不需要那样做，但是不说明为什么不需要。
  网络来源: |
    https://baike.baidu.com/item/%E8%B7%AF%E6%98%93%C2%B7%E5%B0%BC%E5%8F%A4%E6%8B%89%C2%B7%E8%BE%BE%E6%AD%A6
    https://zh.wikipedia.org/wiki/%E8%B7%AF%E6%98%93%C2%B7%E5%B0%BC%E5%8F%A4%E6%8B%89%C2%B7%E8%BE%BE%E6%AD%A6

- 名词: 埃尔欣根公爵
  解释: |
    埃尔欣根公爵是拿破仑麾下元帅米歇尔·内伊（Michel Ney，1769—1815）的封号，1808年因在埃尔欣根战役中大获全胜而受封。内伊是拿破仑一世麾下十八名元帅之一，以骁勇善战著称，被称为"勇士中的勇士"（le Brave des Braves）。1805年在埃尔欣根战役中率部大败奥军，由此获得公爵封号。征俄期间担任后卫，以英勇著称。1815年滑铁卢战役中担任战场指挥。波旁复辟后以叛国罪被审判，1815年12月7日在巴黎卢森堡公园附近被行刑队枪决。内伊还曾获封"莫斯科亲王"（1813年）。
  书中原文: |
    那个所谓埃尔欣根公爵内伊斗胆指出，在树林里行动是危险的，可能弄乱全师的队形。
  网络来源: |
    https://zh.wikipedia.org/zh-tw/%E5%85%A7%E4%BC%8A
    https://baike.baidu.com/item/%E7%B1%B3%E6%AD%87%E5%B0%94%C2%B7%E5%86%85%E4%BC%8A

- 名词: 巴托洛缪之夜
  解释: |
    圣巴托洛缪之夜（又称圣巴托罗缪大屠杀）发生于1572年8月23日至24日夜间（圣巴托罗缪节前夜），是法国宗教战争期间最血腥的事件之一。在太后凯瑟琳·德·美第奇的推动下，法国国王查理九世下令处决胡格诺派领袖，天主教徒在巴黎大规模屠杀新教徒，随后蔓延至全国。死亡人数估计在1万至7万之间。大屠杀标志着法国宗教战争的转折点，胡格诺派政治势力被重创，引发了第四次宗教战争（1572—1573年）。伏尔泰等启蒙思想家后来将其视为宗教狂热的象征进行批判。大仲马的小说《玛戈王后》即以这一事件为背景。
  书中原文: |
    正如伏尔泰开玩笑（他自己也不知嘲笑什么）说，巴托洛缪之夜是由于查理九世肠胃失调引起的，这个结论同样是无可怀疑的。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E5%9C%A3%E5%B7%B4%E6%89%98%E7%BD%97%E7%BC%AA%E4%B9%8B%E5%A4%9C
    https://baike.baidu.com/tashuo/browse/content?id=c400d7cf0a5626d3051ad48d

- 名词: 查理九世
  解释: |
    查理九世（Charles IX，1550—1574），法国瓦卢瓦王朝第十二位国王，1560至1574年在位。十岁即位（1560年兄弗朗索瓦二世去世），由其母凯瑟琳·德·美第奇摄政，终生受其控制。1572年在母亲凯瑟琳的推动下，默许吉斯公爵策划了对胡格诺派新教徒的大规模屠杀，即圣巴托洛缪之夜大屠杀，导致数万新教徒丧生。查理九世本人因大屠杀深受心理创伤，陷入忧郁和精神失常，1574年因肺结核在万塞讷去世，年仅23岁，无合法子嗣，由其弟亨利三世继位。
  书中原文: |
    正如伏尔泰开玩笑（他自己也不知嘲笑什么）说，巴托洛缪之夜是由于查理九世肠胃失调引起的，这个结论同样是无可怀疑的。
  网络来源: |
    https://baike.baidu.com/item/%E6%9F%A5%E7%90%86%E4%B9%9D%E4%B8%96/75002
    https://zh.wikipedia.org/zh-tw/%E6%9F%A5%E7%90%86%E4%B9%9D%E4%B8%96_(%E6%B3%95%E5%85%B0%E8%A5%BF)

- 名词: 彼得大帝
  解释: |
    彼得一世·阿列克谢耶维奇（1672—1725），史称彼得大帝，俄罗斯罗曼诺夫王朝第四代沙皇（1682—1725），1721年起称俄罗斯帝国皇帝，被公认为俄国历史上最杰出的君主。1697年化名随"高级使团"赴西欧考察，回国后推行全面西化改革：设立参政院取代贵族杜马，颁布《官秩表》（论功晋升，打破门第观念），废除牧首制使教会服从国家；建立正规陆海军（20万陆军+48艘战船），开办军事学校；鼓励兴办手工工场，实行保护关税政策；简化俄文字母，创办第一份报纸，建立科学院；强制剪胡须、改穿西欧式短装；1712年将首都从莫斯科迁至新建的圣彼得堡。通过北方战争（1700—1721）击败瑞典，夺得波罗的海出海口，使俄国崛起为欧洲军事强国。
  书中原文: |
    一些史学家认为，俄国的缔造是由于一个人的意志——彼得大帝的意志，法国由共和变为帝制，法国的军队开进俄国，也是由于一个人的意志——拿破仑的意志。
  网络来源: |
    https://baike.baidu.com/item/%E5%BD%BC%E5%BE%97%E5%A4%A7%E5%B8%9D/18544106
    https://zh.wikipedia.org/wiki/%E5%BD%BC%E5%BE%97%E5%A4%A7%E5%B8%9D%E6%94%B9%E9%9D%A9

- 名词: 日拉尔
  解释: |
    弗朗索瓦·热拉尔（François Pascal Simon Gérard，1770—1837），法国新古典主义画家，男爵。生于罗马，14岁移居巴黎，16岁进入雅克-路易·大卫画室学习，成为其得意门生。先后为拿破仑一世、路易十八、查理十世担任首席御用画师。代表作有《雷卡米埃夫人像》（1802年成名作）、《爱之魂》（1797年）、《奥斯特利茨战役中的拿破仑》等。据统计创作了87幅全身像、超过200幅半身像及约30幅历史画，是19世纪初期欧洲最负盛名的肖像画大师之一。1812年受命为拿破仑之子（罗马王）绘制肖像，即《战争与和平》中拿破仑观看的那幅画像。
  书中原文: |
    这是日拉尔用鲜明的色彩画的一幅孩子的肖像，这是奥国公主为拿破仑生的儿子，不知为什么人们都管这个孩子叫罗马王。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E5%BC%97%E6%9C%97%E7%B4%A2%E7%93%A6%C2%B7%E7%83%AD%E6%8B%89%E5%B0%94
    https://baijiahao.baidu.com/s?id=1698299709464052743

- 名词: 内伊
  解释: |
    米歇尔·内伊（Michel Ney，1769—1815），法国帝国元帅，埃尔欣根公爵（1808年封），莫斯科亲王（1813年封）。拿破仑一世麾下十八名元帅之一，以骁勇无畏著称，被称为"勇士中的勇士"。1805年在埃尔欣根战役中大败奥军。1812年征俄期间负责后卫，在撤退中表现极为英勇，是最后离开俄国的法军将领。1814年作为元帅们的代表要求拿破仑退位，但在百日王朝期间再次加入拿破仑阵营。1815年滑铁卢战役中担任战场指挥。波旁王朝复辟后以叛国罪被审判，同年12月7日在巴黎卢森堡公园附近被行刑队枪决，拒绝蒙眼，遗言"我为法兰西打了一百次仗，没有一次调转枪对着她"。
  书中原文: |
    那个所谓埃尔欣根公爵内伊斗胆指出，在树林里行动是危险的，可能弄乱全师的队形。
  网络来源: |
    https://zh.wikipedia.org/zh-tw/%E5%85%A7%E4%BC%8A
    https://baike.baidu.com/item/%E7%B1%B3%E6%AD%87%E5%B0%94%C2%B7%E5%86%85%E4%BC%8A

- 名词: 康庞
  解释: |
    让-多米尼克·孔庞伯爵（Jean-Dominique Compans，1769—1845），法国拿破仑战争时期少将。原计划成为神职人员，法国大革命爆发后于1791年志愿参军。曾参加意大利战役（蒙特贝洛、马伦戈等）。1805年任内伊元帅第五军参谋长，在奥斯特利茨战役中负伤。后任苏尔特元帅第四军参谋长，在耶拿战役中表现出色。1812年征俄战役中指挥达武元帅第一军第5师，参加了斯摩棱斯克和博罗季诺战役（肩膀中弹负伤）。1813年参加吕岑、包岑和莱比锡战役。名字刻于巴黎凯旋门东柱。中文亦译作孔庞或孔潘。
  书中原文: |
    康庞将军（他负责进攻凸角堡）要率领他那一师穿过树林，拿破仑对这个建议表示同意。
    ……康庞将军通过树林夺取第一个堡垒。
  网络来源: |
    https://en.wikipedia.org/wiki/Jean_Dominique_Compans
    https://bbs.napolun.com/forum.php?mod=viewthread&tid=33094

- 名词: 弗里昂
  解释: |
    路易·弗里昂（Louis Friant，1758—1829），法国将军，帝国伯爵。拿破仑的姻亲（与达武元帅是连襟）。1781年加入法王近卫军，参加法国大革命战争。随德赛将军出征埃及，参加金字塔战役（1798年），后任亚历山大港总督。加入达武元帅的第三军后，训练出被称为"地球上最优秀的步兵师"的第2师。参加奥斯特利茨、耶拿-奥尔施泰特（达武以2.6万人击败普军6.3万，弗里昂师立大功）、埃劳、瓦格拉姆等重大战役。在博罗季诺战役（1812年）中重伤。1815年滑铁卢战役中率老近卫军掷弹兵进行最后一次冲击，再次负伤。以坚韧不拔、身先士卒著称，是帝国老近卫军的灵魂人物之一。
  书中原文: |
    ……第一团炮队司令佩尔涅提将军，率领康庞的三十尊大炮以及德塞和弗里昂两师的全部榴弹炮，向前推进，开火，用榴弹压倒敌人的炮兵阵地……
  网络来源: |
    https://en.wikipedia.org/wiki/Louis_Friant
    https://bbs.napolun.com/forum.php?mod=viewthread&tid=20824

- 名词: 莫朗
  解释: |
    夏尔-安托万·莫朗伯爵（Charles-Antoine-Louis-Alexis Morand，1771—1835），法国将军，帝国伯爵。原为律师，1792年志愿参军。参加埃及远征，在金字塔战役中作战。拿破仑战争时期成为达武元帅麾下"三杰"之一（与古丁、弗里昂并列），指挥第三军第1师。在奥斯特利茨战役中率部攻占普拉岑高地，晋升少将。在奥尔施泰特战役中发挥关键作用。1812年博罗季诺战役中被炮弹碎片击碎下颚，仍坚持指挥。1815年滑铁卢战役中指挥近卫军猎步兵师在普朗斯努瓦村抵御普鲁士军。名字刻于巴黎凯旋门东侧。被公认为拿破仑麾下最可靠的师长之一。
  书中原文: |
    莫朗师和总督师的狙击兵，一见右翼开始进攻，立即猛烈开火。
    ……协同莫朗和热拉尔两师直趋高地，总督率领这两个师进攻多面堡，并与其他部队进入战斗。
  网络来源: |
    https://en.wikipedia.org/wiki/Charles-Antoine_Morand
    https://bbs.napolun.com/forum.php?mod=viewthread&tid=32950

- 名词: 热拉尔
  解释: |
    艾蒂安·莫里斯·热拉尔伯爵（Étienne Maurice Gérard，1773—1852），法国将军、元帅（1830年获封），曾担任陆军部长和法国首相（1834年）。1791年加入法国革命军，长期担任让-巴蒂斯特·贝尔纳多特（后来的瑞典国王）的副官和参谋长。1812年征俄战役中接替阵亡的居丹将军指挥第三师，在博罗季诺战役后晋升少将。1813年参加吕岑、包岑、莱比锡等战役。1815年百日王朝期间担任北方军团第四军指挥官。滑铁卢战役当日力劝格鲁希元帅向炮声方向回援但被拒绝。七月王朝时期两次出任陆军部长，1834年短暂担任首相。拿破仑曾评价他是自己未来的元帅人选之一。名字刻于巴黎凯旋门东侧。
  书中原文: |
    总督要占领那个村子，然后越过三座桥，协同莫朗和热拉尔两师直趋高地，总督率领这两个师进攻多面堡，并与其他部队进入战斗。
  网络来源: |
    https://baike.baidu.com/item/%E8%89%BE%E8%92%82%E5%AE%89%C2%B7%E8%8E%AB%E9%87%8C%E6%96%AF%C2%B7%E7%83%AD%E6%8B%89%E5%B0%94/2402578
    https://bbs.napolun.com/thread-33186-1-7.html

- 名词: 佩尔涅提
  解释: |
    约瑟夫·玛丽·德·佩尔涅提（Joseph Marie de Pernety，1766—1856），法国炮兵将军，帝国男爵。出身里昂税务官家庭，1781年进入梅斯炮兵学校。与拿破仑同属拉费尔炮兵团。参加法国大革命战争和拿破仑战争，在马伦戈、乌尔姆、奥斯特利茨、耶拿等战役中指挥炮兵。1809年在瓦格拉姆战役中表现突出，获封帝国男爵。1812年征俄战役中担任大军团炮兵指挥官之一，在博罗季诺战役中他的炮兵部队摧毁了拉耶夫斯基棱堡，为该战役打响第一炮。后参与别列津纳河战役。晚年任炮兵委员会主席，1854年以88岁高龄被拿破仑三世任命为第二帝国参议员。名字刻于巴黎凯旋门南柱，巴黎有以他命名的佩尔涅提路和地铁站。
  书中原文: |
    第一团炮队司令佩尔涅提将军，率领康庞的三十尊大炮以及德塞和弗里昂两师的全部榴弹炮，向前推进，开火，用榴弹压倒敌人的炮兵阵地……
  网络来源: |
    https://en.wikipedia.org/wiki/Joseph_Marie_de_Pernety
    https://bbs.napolun.com/forum.php?mod=viewthread&tid=38449

- 名词: 索尔比埃
  解释: |
    让-巴泰勒莫·索尔比耶（Jean-Barthélemot Sorbier，1762—1827），法国炮兵将军，帝国伯爵。出身贵族，1782年加入皇家炮兵部队，与拿破仑同属拉费尔炮兵团。1797年晋升准将，1800年晋升少将任炮兵总监。1805年加入大军团，参加奥斯特利茨战役，后任意大利军团炮兵司令。1808年封为帝国伯爵。1809年接替拉里布瓦西埃将军担任近卫军炮兵司令。1812年征俄战役中指挥近卫军预备炮兵，参与斯摩棱斯克和博罗季诺会战。俄军大撤退期间，欧仁亲王任命其为大军团炮兵司令。1813至1814年参加莱比锡战役和法国保卫战。百日王朝期间重新加入拿破仑。名字刻于巴黎凯旋门东面。
  书中原文: |
    索尔比埃将军应做好准备，一接到命令，立即用近卫军的全部榴弹炮轰击敌人的任何一处防御工事。
  网络来源: |
    https://en.wikipedia.org/wiki/Jean-Barth%C3%A9lemot_Sorbier
    https://bbs.napolun.com/forum.php?mod=viewthread&tid=38449

- 名词: 富歇
  解释: |
    富歇将军（Général Foucher，全名不详）是拿破仑战争时期的法国炮兵少将，1812年征俄战役中担任内伊元帅第三军团的炮兵司令（général de division）。在博罗季诺战役中，他指挥一个由16门榴弹炮组成的大型炮群（包括第三军团的8门榴弹炮和第八军团的8门24磅榴弹炮），负责轰击俄军谢苗诺夫斯卡娅村和巴格拉季昂凸角堡。该炮群是法军炮兵体系的重要组成部分。注意：此人与拿破仑著名的警务大臣约瑟夫·富歇（Joseph Fouché）并非同一人。
  书中原文: |
    第三兵团炮兵司令富歇将军要把第三、第八兵团的榴弹炮，共计十六尊，安置在担任轰击敌人左方工事的炮兵阵地两侧。
  网络来源: |
    http://nsfarchives.altervista.org/napoleon/forum/archive2007_config.pl@md=read%3Bid=75207.html#Responses

- 名词: 德塞
  解释: |
    约瑟夫-马里·德赛伯爵（Joseph Marie Dessaix，1764—1834），法国拿破仑战争时期将军。原学医，在都灵获得医学博士学位后移居巴黎行医，法国大革命爆发后投笔从戎。1799年雾月政变时是五百人院中少数反对拿破仑夺权的人之一，但此后仍继续在军中任职。1809年瓦格拉姆战役中表现出色，拿破仑称其为"无畏者"，战后升为少将，1810年封为伯爵。1812年征俄战役中担任达武元帅第一军第4师师长，参加斯摩棱斯克战役，在博罗季诺战役中被葡萄弹击碎手臂，重伤致残。之后被任命为柏林司令。因在1814年保卫勃朗峰省中的英勇表现，被当地人民称为"勃朗峰的猛士"。名字刻于巴黎凯旋门。注意：此人与1800年马伦戈战役中阵亡的名将路易·德赛（Louis Desaix）并非同一人。
  书中原文: |
    ……第一团炮队司令佩尔涅提将军，率领康庞的三十尊大炮以及德塞和弗里昂两师的全部榴弹炮，向前推进，开火，用榴弹压倒敌人的炮兵阵地……
