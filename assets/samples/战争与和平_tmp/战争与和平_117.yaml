- 名词: 祖博夫
  解释: |
    普拉东·亚历山德罗维奇·祖博夫（Платон Александрович Зубов，1767—1822），
    俄罗斯帝国亲王，叶卡捷琳娜二世晚年（1789—1796）的最后一位、也是当时权势最大的宠臣。
    22岁时成为年过六旬的女皇的情人，在波将金去世后继任其权力，曾任新俄罗斯总督、
    黑海及亚速海舰队总司令等要职。他为人任性多变、品格不端，在女皇驾崩后因曾怠慢皇储
    保罗而遭保罗一世剥夺全部职务和财产，被迫流亡欧洲，最终在孤独中去世。
    他是叶卡捷琳娜二世宠臣制度盛极而衰的象征性人物。
  书中原文: |
    他眼前又出现那位矮胖的、胖脸蜡黄的皇太后，她第一次接见他时所说的亲切的话以及她那微笑，
    又想起在灵台上她的脸，想起当时在她的棺木前为了争着前去吻她的手同祖博夫发生的冲突。
