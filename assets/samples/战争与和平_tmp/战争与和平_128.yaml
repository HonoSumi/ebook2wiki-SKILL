- 名词: 科洛恰河
  解释: 科洛恰河（Колоча）是俄罗斯莫斯科州的一条河流，莫斯科河的支流，流经博罗季诺（波罗金诺）战场。1812年博罗季诺战役中，俄军右翼依托科洛恰河作为天然屏障，法军欧仁亲王第4军需在该河上架设浮桥才能攻击俄军中央的拉耶夫斯基多面堡。该河在战役中起到关键的防御作用。
  书中原文: "沿科洛恰选定了一个阵地，那条河穿过大路是成锐角，而不是成直角……这个阵地是以科洛恰河为掩护……拿破仑把他的军队移过科洛恰河"
  网络来源: https://bkso.baidu.com/item/博罗季诺战役/10997853

- 名词: 沃伊纳河
  解释: 沃伊纳河（Война）是俄罗斯莫斯科州的一条小河，为科洛恰河的支流，在博罗季诺战场附近汇入科洛恰河。两河交汇处的沼泽地带是博罗季诺战场的重要组成部分。托尔斯泰在《战争与和平》中通过皮埃尔的视角描写了该处的晨雾与战场景象。
  书中原文: "中心在波罗金诺，也就是在科洛恰和沃伊纳两河汇流的地方"
  网络来源: https://dili.chazidian.com/baike-22942/

- 名词: 格里德涅瓦战役
  解释: 格里德涅瓦战役（Battle of Gridneva / 或称格里德涅沃之战）是1812年俄法战争中的一场后卫战，发生在博罗季诺战役前夕。俄军后卫部队在此阻击法军追击，战斗于8月24日（俄历）晚间结束，随后法军进抵舍瓦尔金诺多面堡。此战直接导致了博罗季诺战役以俄军意料之外的方式展开。
  书中原文: "因为对我们的左翼进攻是在紧接着我们的后卫撤退的晚上，也就是在格里德涅瓦战役刚结束的晚上发生的"
  网络来源: https://bbs.napolun.com/forum.php?mod=viewthread&tid=35995

- 名词: 波尼亚托夫斯基
  解释: 约瑟夫·波尼亚托夫斯基公爵（Józef Antoni Poniatowski，1763—1813），波兰亲王、华沙大公国军事将领，拿破仑麾下第5军（波兰军）指挥官。1812年俄法战争期间，他率部向博罗季诺战场左翼的乌季察方向实施辅助突击。1813年莱比锡战役中在掩护法军撤退时溺死于埃尔斯特河。拿破仑曾称赞他为"真正的波兰国王"。
  书中原文: "波尼亚托夫斯基对乌季察的进攻"
  网络来源: https://www.qiuwenbaike.cn/zh/俄法战争

- 名词: 乌季察
  解释: 乌季察（Утица）是博罗季诺战场左翼的一个村庄，位于老斯摩棱斯克大道旁。1812年博罗季诺战役期间，波尼亚托夫斯基率领的法军第5军（波兰军）奉命向乌季察方向突击，企图迂回俄军左翼后方。俄军图奇科夫将军指挥约2万部队防守此地，成功阻止了法军的包抄企图。
  书中原文: "从波罗金诺到乌季察，也就是打仗的那个地方……乌季察、谢苗诺夫斯科耶和波罗金诺之间的平原上"
  网络来源: https://www.qiuwenbaike.cn/zh/俄法战争

- 名词: 谢苗诺夫斯科耶
  解释: 谢苗诺夫斯科耶（Семёновское）是博罗季诺战场左翼的一个村庄，俄军防御体系的核心地带。村西南方修建了三座著名的"巴格拉季昂棱堡"（或称巴格拉季昂钝角堡），法军与俄军在此反复争夺多达八次，战斗极为惨烈。俄军名将巴格拉季昂亲王在此率军反冲击时身负致命重伤。恩格斯称此处为"法国步兵的坟墓"。
  书中原文: "乌季察、谢苗诺夫斯科耶和波罗金诺之间的平原上，作为一个阵地，这块平原并不比俄国任何一块平原更有利"
  网络来源: https://bkso.baidu.com/item/博罗季诺战役/10997853

- 名词: 戈尔基
  解释: 戈尔基（Горки）是博罗季诺战场右翼的一个村庄，位于科洛恰河附近的高地上。1812年博罗季诺战役期间，俄军总司令库图佐夫的指挥部设在戈尔基村外的指挥所。从戈尔基高地可以俯瞰整个博罗季诺战场。此处配置了多个炮兵连（共32门火炮）。
  书中原文: "皮埃尔坐上车继续往前走，向戈尔基进发"
  网络来源: https://bbs.napolun.com/forum.php?mod=viewthread&tid=24485

- 名词: 塔塔里诺沃
  解释: 塔塔里诺沃（Татариново，亦译作鞑靼里诺沃）是博罗季诺战场附近的一个村庄。1812年博罗季诺战役期间，库图佐夫的司令部设在此处。该村接近俄军右翼阵地，是战役指挥的关键地点。注意区别于莫斯科以南的塔鲁季诺（Тарутино），后者是10月俄军反攻的营地所在。
  书中原文: "过了塔塔里诺沃，那儿有许多人挖战壕，您爬上那个高岗，就可以看见了"
  网络来源: https://bbs.napolun.com/forum.php?mod=viewthread&tid=24485

- 名词: 诺沃耶村
  解释: 诺沃耶村（Новое）是博罗季诺战场右翼附近的一个村庄。1812年博罗季诺战役中，俄军最初计划以诺沃耶村作为右翼端点，沿科洛恰河布防，阵地从诺沃耶村经博罗季诺延伸到舍瓦尔金诺。但由于舍瓦尔金诺多面堡在24日失守，俄军左翼被迫后撤，原定阵地未能实现。
  书中原文: "右翼靠近诺沃耶村……仍停留在诺沃耶村至乌季察这一带拉长了的阵地上"
  网络来源: https://bbs.napolun.com/thread-19108-1-48.html

- 名词: 瓦卢耶瓦
  解释: 瓦卢耶瓦（Валуево，亦译作瓦卢耶沃）是博罗季诺战场附近的一个村庄。1812年9月7日（俄历8月26日）博罗季诺战役期间，拿破仑在此设立指挥所，从这里向法军下达了总攻命令。24日拿破仑骑马来到瓦卢耶瓦视察俄军阵地，随即决定将法军主力转移到科洛恰河对岸。
  书中原文: "拿破仑二十四日骑马来到瓦卢耶瓦"
  网络来源: https://www.bilibili.com/video/BV1w4411u75L/
