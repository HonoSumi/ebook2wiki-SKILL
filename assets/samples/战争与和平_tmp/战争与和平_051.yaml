- 名词: 英国俱乐部
  解释: |
    英国俱乐部（Английский клуб）是19世纪初莫斯科贵族和绅士们最重要的社交场所，托尔斯泰在《战争与和平》中多次描绘这一地点。俱乐部自成立之日起就是莫斯科上流社会的核心聚会地，贵族们在此讨论政治、战争和社交话题。小说中老伯爵伊利亚·安德烈伊奇·罗斯托夫受俱乐部委托筹办欢迎巴格拉季翁公爵的盛大宴会，皮埃尔·别祖霍夫也成为俱乐部成员。俱乐部是当时莫斯科贵族社会的缩影，既是社交享乐的场所，也是政治舆论的发酵地。
  书中原文: |
    他常到英国俱乐部去，和经杰尼索夫介绍认识的四十岁的上校称兄道弟。
  网络来源: |
    https://williamlong.info/xiaoshuo/archives/359.html
    http://www.tingroom.com/lesson/famousbook/376727.html

- 名词: 玛祖卡舞
  解释: |
    玛祖卡舞（Mazurka）起源于16世纪波兰中部的玛佐夫舍地区，是一种波兰民间舞蹈，男女双人集体舞，音乐为3/4拍或3/8拍，节奏重音常落在第二或第三拍。18世纪起风靡全欧洲，成为各国宫廷和上层社会舞会中的常见舞蹈。在19世纪俄国社交舞会上，玛祖卡常作为一种展示性舞蹈，由男舞者主导，选择舞步花样并不断变换速度，女舞者以轻盈舞步围绕男舞伴。肖邦创作了约57首玛祖卡钢琴曲，使其成为古典音乐的重要体裁。
  书中原文: |
    他在阿尔哈罗夫家舞会上指挥玛祖卡舞，和卡缅斯基元帅谈战争问题，常到英国俱乐部去。
  网络来源: |
    https://www.britannica.com/art/mazurka
    https://wapbaike.baidu.com/item/玛祖卡/411248

- 名词: 圣乔治勋章
  解释: |
    圣乔治勋章（Орден Святого Георгия）是俄罗斯历史上最具声望的军事勋章，1769年由叶卡捷琳娜二世女皇创立，以基督教圣徒圣乔治命名。勋章刻有"За службу и храбрость"（为服役与勇敢）的座右铭。1856年起分为四个等级，专门授予在战斗中表现卓越英勇的军官和将军。1807年沙皇亚历山大一世设立了乔治十字勋章，专门授予英勇的士官和士兵。米哈伊尔·库图佐夫等著名将领曾获此勋章。2000年该勋章在俄罗斯联邦正式恢复。
  书中原文: |
    现在他是披着银丝镶边的披肩、戴着圣乔治勋章的骠骑军中尉，正在和年高望重的知名猎手们一起训练走马。
  网络来源: |
    https://baike.baidu.com/item/圣乔治勋章/702116
    https://wapbaike.baidu.com/item/圣乔治勋章/702116

- 名词: 茨冈人
  解释: |
    茨冈人（Цыгане）是俄罗斯和东欧地区对罗姆人（Romani，即吉普赛人）的传统称呼。该词源自拜占庭时期希腊语"阿金加诺"（atsinganoi），意为"不可接触者"。罗姆人自称"罗姆"（Rom），在罗姆语中意为"人"。俄国大诗人普希金著有长诗《茨冈》，描写其流浪生活。在《战争与和平》中，茨冈人常被邀请到贵族宴会上表演歌舞，是当时莫斯科贵族社交生活的一部分。
  书中原文: |
    还得来一个唱歌班，乐队我有，把那个茨冈人叫来，行不行？你们当兵的喜欢这玩艺儿。
  网络来源: |
    https://wapbaike.baidu.com/item/吉卜赛人/5098255
    https://baike.baidu.com/item/茨冈人

- 名词: 卡缅斯基元帅
  解释: |
    米哈伊尔·费奥多罗维奇·卡缅斯基（1738-1809），俄军元帅，1797年晋封伯爵。曾参加七年战争和多次俄土战争，1806年任俄军总司令。与苏沃洛夫在鲁缅采夫集团军中同为军长，两人激烈竞争，苏沃洛夫曾评价他"懂军事，但军事不懂他"。1806年第四次反法同盟战争中担任俄军总司令，因年老不适应新战术而称病离职。1809年被情妇勾结其子用斧头杀害。他被认为是《战争与和平》中老保尔康斯基公爵的原型之一。
  书中原文: |
    他在阿尔哈罗夫家舞会上指挥玛祖卡舞，和卡缅斯基元帅谈战争问题，常到英国俱乐部去。
  网络来源: |
    https://wapbaike.baidu.com/item/米哈伊尔·费奥多罗维奇·卡缅斯基/7303182
    https://en.m.wikipedia.org/wiki/Nikolay_Kamensky

- 名词: 亚历山大·帕夫洛维奇皇帝
  解释: |
    亚历山大一世·帕夫洛维奇（1777-1825），俄罗斯罗曼诺夫王朝第十四位沙皇，1801年至1825年在位。其父为保罗一世，由祖母叶卡捷琳娜二世抚养长大。在位期间领导反法同盟最终击败拿破仑一世，率军攻入巴黎（1814年），战后主导维也纳会议，组建神圣同盟，被称为"欧洲的救世主"、"北方的斯芬克斯"。因性格矛盾复杂，统治前期推行自由主义改革，后期转向保守，沉迷于神秘主义。
  书中原文: |
    他也完全有当时莫斯科人们对亚历山大·帕夫洛维奇皇帝的普遍崇拜，当时莫斯科人称他是"天使的化身"。
  网络来源: |
    https://wapbaike.baidu.com/item/亚历山大一世·帕夫洛维奇/62031971
    https://baike.sogou.com/v64851260.htm

- 名词: 拉斯托普钦伯爵
  解释: |
    费奥多尔·瓦西里耶维奇·拉斯托普钦（1763-1826），俄国贵族，1812年拿破仑入侵俄国时担任莫斯科总督。他以煽动性的爱国宣传和下令放火烧城而闻名。在《战争与和平》中，他是莫斯科社交圈的舆论权威人士之一。小说描写了他将商人韦列夏金交给暴民处死的残酷情节，以及他与库图佐夫在放弃莫斯科问题上的矛盾。托尔斯泰通过这一形象展现了行政长官在历史洪流中的渺小与无力。
  书中原文: |
    那些指导谈话方向的人们，如：拉斯托普钦伯爵、尤里·弗拉基米罗维奇·多尔戈鲁基公爵、瓦卢耶夫、马尔科夫伯爵、维亚泽姆斯基公爵等，都不在俱乐部露面。
  网络来源: |
    https://baijiahao.baidu.com/s?id=1745023071463628438
    https://book.douban.com/annotation/100336314/

- 名词: 多尔戈鲁基公爵
  解释: |
    尤里·弗拉基米罗维奇·多尔戈鲁基公爵，俄国贵族、将军，在《战争与和平》中是莫斯科社交圈的舆论权威人士之一。小说中另有彼得·彼得罗维奇·多尔戈鲁科夫公爵（1777-1806），他是俄军将领、亚历山大一世的亲信，曾作为特使与拿破仑谈判，属于主战派，主张主动进攻，批评库图佐夫的老成持重，代表了俄军高层中年轻、激进的军官集团，其自负轻敌也是导致奥斯特利茨战役失败的原因之一。
  书中原文: |
    那些指导谈话方向的人们，如：拉斯托普钦伯爵、尤里·弗拉基米罗维奇·多尔戈鲁基公爵、瓦卢耶夫、马尔科夫伯爵、维亚泽姆斯基公爵等，都不在俱乐部露面。
  网络来源: |
    https://www.banceo.com/article/38284.html
    https://yunshuwu.cn/chap/8529.html

- 名词: 瓦卢耶夫
  解释: |
    瓦卢耶夫（Valuev）是《战争与和平》中莫斯科上流社会的贵族人物，社交圈的核心成员之一。在小说中，他与拉斯托普钦伯爵、纳雷什金等人周围形成了几个大的社交圈子，是莫斯科贵族聚会中的舆论权威人士。他凭借财富和关系网在贵族群体中拥有重要位置，反映了19世纪初俄国贵族社会的交往方式与信息传播网络。
  书中原文: |
    那些指导谈话方向的人们，如：拉斯托普钦伯爵、尤里·弗拉基米罗维奇·多尔戈鲁基公爵、瓦卢耶夫、马尔科夫伯爵、维亚泽姆斯基公爵等，都不在俱乐部露面。
  网络来源: |
    https://www.marxists.org/archive/tolstoy/1869/war-and-peace/book-8-chapter-1.html
    https://yunshuwu.cn/chap/8675.html

- 名词: 马尔科夫伯爵
  解释: |
    阿尔卡季·伊万诺维奇·莫尔科夫（Морков，1747-1827），俄国伯爵、外交官，曾任俄国驻法国大使（1801-1803年）。在《战争与和平》中，他是莫斯科社交圈的舆论权威人士之一。小说中通过多尔戈鲁科夫公爵之口讲述了一则轶事：拿破仑有意在马尔科夫面前丢下手绢，期待马尔科夫为他拾起，而马尔科夫也丢下自己的手绢，拾起自己的而没有拾拿破仑的，以此表现他面对拿破仑时不卑不亢的态度。
  书中原文: |
    那些指导谈话方向的人们，如：拉斯托普钦伯爵、尤里·弗拉基米罗维奇·多尔戈鲁基公爵、瓦卢耶夫、马尔科夫伯爵、维亚泽姆斯基公爵等，都不在俱乐部露面。
  网络来源: |
    https://en.wikipedia.org/wiki/Arkady_Morkov
    https://book.qq.com/book-read/52511345/12

- 名词: 维亚泽姆斯基公爵
  解释: |
    彼得·安德烈耶维奇·维亚泽姆斯基公爵（1792-1878），19世纪俄国著名诗人、文学评论家，普希金的密友。曾参加1812年卫国战争和博罗季诺战役，被认为是《战争与和平》主人公皮埃尔·别祖霍夫的重要人物原型之一。其家族庄园奥斯塔菲耶沃被称为"俄罗斯的帕尔纳斯"，经常聚集普希金、茹科夫斯基等文人。在小说中，他是莫斯科社交圈的舆论权威人士之一。
  书中原文: |
    那些指导谈话方向的人们，如：拉斯托普钦伯爵、尤里·弗拉基米罗维奇·多尔戈鲁基公爵、瓦卢耶夫、马尔科夫伯爵、维亚泽姆斯基公爵等，都不在俱乐部露面。
  网络来源: |
    https://en.wikipedia.org/wiki/Pyotr_Vyazemsky
    https://baike.baidu.com/item/奥斯塔菲耶沃庄园/8796341

- 名词: 迪波尔
  解释: |
    路易·安托万·迪波尔（Louis Antoine Duport，1781-1853），19世纪法国著名舞蹈家、编舞家和芭蕾大师。1797年在巴黎歌剧院首演，以旋转的速度和舞蹈的活力著称。1808年因与拿破仑等人发生冲突而女扮男装逃离巴黎，先到维也纳，随后前往圣彼得堡并大获成功，在俄国贵族社交界风靡一时。后在维也纳、那不勒斯、伦敦等地演出和编舞。在《战争与和平》中，娜塔莎对迪波尔极为崇拜，甚至说自己"要当舞蹈家"。
  书中原文: |
    "你看见迪波尔了吗？""没有。""大名鼎鼎的迪波尔，舞蹈家，你没看见吗？那你就不了解了。你看我的。"
  网络来源: |
    https://www.oxfordreference.com/display/10.1093/oi/authority.20110803095735849
    https://www.britannica.com/biography/Charles-Didelot

- 名词: 哥萨克服
  解释: |
    哥萨克服是俄国哥萨克人的传统服装，融合了俄罗斯、高加索和草原民族的多重影响。男子典型装束包括：高筒剪绒皮帽（帕帕哈）、及膝束腰无领长外套（切尔克斯卡）、胸前两排火药用饰管（加济里）、蓝色镶红线马裤和高筒马靴。其中切尔克斯卡是高加索风格的标志性外衣，直接影响了19世纪俄军制服设计。在《战争与和平》中，茨冈人伊柳什卡穿白色哥萨克服跳舞。
  书中原文: |
    你在那儿找到茨冈人伊柳什卡，就是那个曾经在奥尔洛夫伯爵家跳舞的，你记得吧，穿白色哥萨克服的，你把他拖来见我。
  网络来源: |
    https://baike.baidu.com/item/顿河哥萨克
    https://www.take5tw.co/zh-hant/blog/posts/corssackjacketstory

- 名词: 双驾辕雪橇
  解释: |
    双驾辕雪橇是俄国传统的马拉雪橇交通工具，由两匹马并驾牵引。在19世纪的俄罗斯，雪橇被视为彰显身份的交通工具，比轮式马车行驶更为平稳。豪华的出行雪橇有护板和内饰，富人会使用熊皮毯。传统俄罗斯雪橇种类包括出行雪橇、波舍夫尼宽大雪橇、轿式雪橇等。小说中老伯爵让儿子驾双驾辕雪橇去别祖霍夫家取草莓和菠萝，为欢迎巴格拉季翁的宴会做准备。
  书中原文: |
    我说，你这回可跑不了啦！你马上驾上双驾辕雪橇，赶快到别祖霍夫那儿，你就说，伊利亚·安德烈伊奇伯爵派我来，向您要草莓和鲜菠萝。
  网络来源: |
    https://finance.sina.com.cn/jjxw/2024-12-23/doc-ineamaix2840344.shtml
    https://en.russia.ru/news/imperatorskie-sani-transport-kak-nacionalnyi-simvol-na-vystavke-uroki-geografii
