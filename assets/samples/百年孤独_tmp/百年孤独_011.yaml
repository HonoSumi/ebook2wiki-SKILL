- 名词: 圣维罗妮卡
  解释: |
    基督教传统中的一位公元1世纪犹太妇女，据传在耶稣背负十字架走向加尔瓦略山受难的苦路上，她因怜悯之心将自己的手帕递给耶稣擦拭脸上的血汗，手帕上奇迹般地印上了耶稣的圣容（即"维罗妮卡的面纱"）。此事未见于《圣经》正典福音书，最早见于约4世纪的伪经《比拉多大事录》。在苦路（十四处）中，第六处纪念的即是这一事件。"维罗妮卡"（Veronica）之名在中世纪被与拉丁文"Vera Icona"（真实图像）联系起来，意为"非人手所绘的真正基督面容"。此题材在西方艺术史上极为著名，梵蒂冈圣伯多禄大殿保存有相关圣物。
  书中原文: |
    维罗妮卡（Verónica）为公元1世纪的一名犹太妇女，据传她在耶稣受难路上曾为其擦去脸上的血污，后手帕上即留下耶稣圣容。
  网络来源: |
    https://www.wikiwand.com/zh-mo/articles/Saint_Veronica

- 名词: 十字架婴孩
  解释: |
    拉丁美洲民间信仰中的一种带有浓厚巫术色彩的护身符，西班牙语称"niños-en-cruz"。据民间传说，贴身携带并以自身鲜血定期饲喂此护符后，能令主人力大无穷、刀枪不入。在《百年孤独》中，何塞·阿尔卡蒂奥佩戴此物，与他的巨人般体格和神秘死亡（尸体无伤口却流血不止）形成呼应，暗示他与超自然力量签订了不可撤销的契约。这一意象体现了马尔克斯魔幻现实主义手法根植于真实的拉美民间信仰土壤——天主教圣物与印第安/非洲原始巫术的混合。
  书中原文: |
    右手腕上紧紧缠着"十字架婴孩"护符铜手链。
  网络来源: |
    https://book.douban.com/annotation/104959699/

- 名词: 维克多·休斯
  解释: |
    法国大革命时期加勒比海地区的真实历史人物（Victor Hugues，1762—1826），生于马赛，曾任瓜德罗普总督（1794—1798），执行废除奴隶制法令，组建多种族部队击败英国远征军，同时也以残暴手段处决异己并授权私掠船攻击英美商船，间接引发美法准战争。晚年任法属圭亚那官员。其在瓜德罗普的统治对法国在加勒比地区的殖民史产生了深远影响。在文学中，他是古巴作家阿莱霍·卡彭铁尔魔幻现实主义小说《爆炸大教堂》中的重要角色。马尔克斯在《百年孤独》中将其海盗船描写为被死亡阴风笼罩的幽灵船，赋予了历史人物以神话色彩。
  书中原文: |
    他在加勒比海见过维克多·休斯的海盗幽灵船，船帆被死亡的阴风扯得七零八落，桅杆被海蠊蛀蚀，它再也找不到瓜德罗普岛的方向。
  网络来源: |
    https://en.wikipedia.org/wiki/Victor_Hughes

- 名词: 银版照片
  解释: |
    即银版摄影术（达盖尔银版法，Daguerreotype），由法国发明家路易·达盖尔于1837年发明，是世界上第一种实用的摄影方法，1839年由法国科学院正式公布，标志着摄影术的诞生。其工艺为：以镀银铜板为基材，经碘蒸气处理形成碘化银感光层，曝光后以汞蒸气显影，再用盐水或硫代硫酸钠定影。银版照片影像清晰度极高、色调细腻，但每块银版只能生成唯一正像（不可复制），且影像左右相反。19世纪40—50年代风靡欧美，后被湿版火棉胶法取代。在《百年孤独》中，蕾梅黛丝去世后，家人将其银版照片摆在守灵处，系黑色饰带并点燃长明灯，体现了19世纪拉丁美洲引入摄影术初期的历史痕迹。
  书中原文: |
    并将一张蕾梅黛丝的银版照片摆在停放遗体守灵的地方，照片上斜系着一根黑色饰带，前面点起一盏长明灯。
  网络来源: |
    https://zh.wikipedia.org/zh-sg/%E9%8A%80%E7%89%88%E6%94%9D%E5%BD%B1%E6%B3%95
    https://wapbaike.baidu.com/item/%E9%93%B6%E7%89%88%E6%B3%95

- 名词: 鸦片酊
  解释: |
    鸦片酊（Laudanum）是一种将鸦片溶解于酒精中制成的酊剂，由16世纪瑞士-德国炼金术士帕拉塞尔苏斯首创。他发现鸦片中的生物碱在酒精中的溶解度远高于水，从而配制出这种效力更强的鸦片制剂。17世纪英国医生托马斯·西德纳姆改良配方，使其成为欧美最广泛使用的止痛药和家庭常备药，被当作万能药用于治疗头痛、失眠、腹泻、咳嗽乃至婴儿哭闹等。在维多利亚时代英国，鸦片酊价格低廉且随处可购，导致大量使用者成瘾，许多文化名流（如柯勒律治、狄更斯、南丁格尔）都曾使用。20世纪后各国逐步立法严格管制。在《百年孤独》中，阿玛兰妲原计划在婚礼前的咖啡中下鸦片酊以阻止婚礼，却误毒死了蕾梅黛丝。
  书中原文: |
    但仍以可怕的冷静作出决定：日期定在婚礼前最后一个星期五，方式是在咖啡中加一剂鸦片酊。
  网络来源: |
    https://www.etymonline.com/tw/word/laudanum

- 名词: 救难圣母像
  解释: |
    天主教著名的圣像画之一，全称"永援圣母像"或"永助圣母像"（Our Lady of Perpetual Help），是一幅13世纪拜占庭风格的木板圣像画，最初存放于克里特岛，后供奉于罗马圣阿尔丰索教堂。画中圣母玛利亚怀抱圣婴耶稣，两侧天使手持基督受难刑具（十字架、铁钉、长矛等），圣婴因预见苦难而紧握圣母右手。圣母的红袍象征童贞，蓝袍象征母性，金色背景象征天堂荣耀。此圣像在天主教内被视为"诸宠中保"，具有重要的神学意义和广泛的民间敬礼传统。在《百年孤独》中，何塞·阿尔卡蒂奥脖子上挂着救难圣母像归来，体现了他漂泊海外的经历中吸收了天主教信仰元素。
  书中原文: |
    他野牛似的脖子上挂着救难圣母像，双臂和胸前覆满神秘的刺青，右手腕上紧紧缠着"十字架婴孩"护符铜手链。
  网络来源: |
    https://baike.sogou.com/v184337088.htm
