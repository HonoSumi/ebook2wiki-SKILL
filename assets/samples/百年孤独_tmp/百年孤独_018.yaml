- 名词: 西班牙大帆船
  解释: |
    西班牙大帆船（Galleon，又译盖伦帆船、加利恩帆船）是15至17世纪西班牙
    广泛使用的大型三桅或多桅帆船，兼具商船和战舰功能，是西班牙殖民美洲的
    主要航海工具。典型排水量300-1000吨，船身修长，配有高耸的船首楼和船尾楼。
    在《百年孤独》中，何塞·阿尔卡蒂奥·布恩迪亚曾在丛林中发现一艘西班牙大帆船
    的残骸，象征着拉丁美洲大陆与殖民历史的隐秘联结。
  书中原文: |
    他曾在一处边界关卡半个多月，从那里通电全国宣告发动全面战争。他曾在一次远征中
    迷失于雨林三个月，异想天开地试图穿越一千五百多公里的原始森林直捣首都近郊。
    还有一次，他距马孔多不到二十公里，却在政府军巡逻队的威逼下退到山区，
    趋近他父亲多年前发现西班牙大帆船残骸的着魔之地。
  网络来源: |
    https://baike.baidu.com/item/%E8%A5%BF%E7%8F%AD%E7%89%99%E5%A4%A7%E5%B8%86%E8%88%B9
    https://zh.wikipedia.org/zh-tw/%E8%A5%BF%E7%8F%AD%E7%89%99%E5%A4%A7%E5%B8%86%E8%88%B9

- 名词: 里正
  解释: |
    译者范晔用中国古代官职名"里正"来翻译西班牙殖民官制中的"corregidor"
    （地方治安法官/督办官）。Corregidor一词源自西班牙语动词corregir（纠正），
    是西班牙帝国在美洲殖民地设立的基层行政长官，集行政、司法、警察职能于一身。
    范晔的翻译巧妙借用中国古代基层管理者的名号，既保留了"正"（纠正）的字面含义，
    又对应了殖民地的基层官员身份。
  书中原文: |
    战争结束后，奥雷里亚诺·布恩迪亚上校铤而走险，不断起事，而蒙卡达将军被任命为
    马孔多的里正。
  网络来源: |
    https://baike.baidu.com/item/%E9%87%8C%E6%AD%A3
    https://book.douban.com/subject/6082808/annotation

- 名词: 自由党
  解释: |
    哥伦比亚自由党（Partido Liberal Colombiano）成立于1848年，代表工商业资产阶级
    利益，受法国大革命思想影响，主张联邦制、政教分离、废除奴隶制、推行新闻自由
    和代议制民主。在《百年孤独》中，自由党与保守党之间的战争贯穿全书，奥雷里亚诺·
    布恩迪亚上校即为自由派军队的领袖之一。哥伦比亚历史上，自由党与保守党的争斗
    引发了多次内战，包括1860-1862年内战和1899-1902年的千日战争。
  书中原文: |
    里奥阿查，守军将当地最知名的十四个自由党人从床上拖出来枪决以示报复。
  网络来源: |
    https://baike.baidu.com/item/%E5%93%A5%E4%BC%A6%E6%AF%94%E4%BA%9A%E8%87%AA%E7%94%B1%E5%85%9A
    https://zh.wikipedia.org/zh/%E5%93%A5%E4%BC%A6%E6%AF%94%E4%BA%9A%E8%87%AA%E7%94%B1%E5%85%9A

- 名词: 保守党
  解释: |
    哥伦比亚保守党（Partido Conservador Colombiano，现为社会保守党）成立于1849年，
    代表大庄园主、天主教会和军事势力的利益，主张中央集权、维护教会特权和传统社会
    秩序。在《百年孤独》中，何塞·拉克尔·蒙卡达将军是保守党的代表人物，他虽为保守党
    将军却反军事主义，与奥雷里亚诺·布恩迪亚上校在战争期间结下友谊。19世纪至20世纪
    初，保守党与自由党交替执政，冲突不断，深刻影响了哥伦比亚的历史进程。
  书中原文: |
    "这个奥雷里亚诺，"蒙卡达将军说，"真可惜他不是保守党。"他的敬佩出自真心。
    像许多保守党人一样，何塞·拉克尔·蒙卡达为了捍卫自己的党派才参战，并在战场上
    获得了将军的头衔，但他无意成为职业军人。
  网络来源: |
    https://baike.baidu.com/item/%E5%93%A5%E4%BC%A6%E6%AF%94%E4%BA%9A%E8%87%AA%E7%94%B1%E5%85%9A
    https://zh.wikipedia.org/zh/%E5%93%A5%E4%BC%A6%E6%AF%94%E4%BA%9A%E8%87%AA%E7%94%B1%E5%85%9A

- 名词: 联邦派
  解释: |
    联邦派（Federalistas）是19世纪拉丁美洲独立后围绕国家体制形成的政治派别，
    主张各省高度自治、实行联邦制，反对中央集权。在哥伦比亚、阿根廷、委内瑞拉等
    国家，联邦派通常与自由党结盟，与主张中央集权的保守党（或一元派）对立。
    《百年孤独》中奥雷里亚诺·布恩迪亚上校"一心想要联合中美洲各地的联邦派力量，
    横扫从阿拉斯加到巴塔哥尼亚的一切保守党政权"，展现了拉丁美洲联邦主义运动的
    宏大背景。联邦制与中央集权制的斗争是19世纪拉丁美洲政治史的核心线索之一。
  书中原文: |
    奥雷里亚诺·布恩迪亚上校还活着，但似乎已放弃对本国政府的侵扰，加入了加勒比海
    其他共和国胜利在望的联邦派军队。
  网络来源: |
    https://baike.baidu.com/item/%E8%81%94%E9%82%A6%E6%88%98%E4%BA%89/22983678
    https://zh.wikipedia.org/wiki/%E8%81%AF%E9%82%A6%E9%BB%A8_(%E9%98%BF%E6%A0%B9%E5%BB%B7)

- 名词: 斗鸡
  解释: |
    斗鸡是拉丁美洲一项具有深厚历史传统的民间活动，16世纪由西班牙殖民者传入。
    在哥伦比亚、多米尼加、墨西哥、秘鲁等国尤为盛行。斗鸡不仅是一种赌博娱乐，
    更被视为男性气质的象征，与社会阶层和文化认同紧密相连。在《百年孤独》中，
    保守党将军蒙卡达"胃口好，爱斗鸡"，这一细节刻画了他作为传统拉美男性的形象；
    后来"一度获得市长本人支持的斗鸡比赛都被取消"，反映了战时政治对日常生活的
    渗透。
  书中原文: |
    他聪明和善，性格开朗，胃口好，爱斗鸡，一度成为奥雷里亚诺·布恩迪亚上校
    最可怕的对手。
  网络来源: |
    https://baike.baidu.com/item/%E6%96%97%E9%B8%A1
    https://www.sohu.com/a/230359214_391294

- 名词: 大泽区
  解释: |
    大泽区是哥伦比亚北部马格达莱纳省的城镇Ciénaga的中文翻译。Ciénaga在西班牙语中
    意为"沼泽"。该城位于加勒比海沿岸，毗邻圣玛尔塔内华达山脉和圣玛尔塔大沼泽
    （Ciénaga Grande de Santa Marta），是哥伦比亚最大的沿海湿地生态系统。此地也是
    诺贝尔文学奖得主加西亚·马尔克斯的故乡阿拉卡塔卡附近地区，《百年孤独》中
    马孔多的灵感来源于此。书中从大泽区来的老教师堂梅尔乔·埃斯卡洛纳以体罚方式
    管教学生，反映了当时的教育观念。
  书中原文: |
    学校也在那一时期重建，由堂梅尔乔·埃斯卡洛纳负责，他是一位从大泽区派来的
    老教师，让不用功的学生在院中石灰地面上跪着行走，让言语放肆的学生吃辣椒，
    家长们对此十分满意。
  网络来源: |
    https://baike.baidu.com/item/%E8%B0%A2%E7%BA%B3%E5%8A%A0/3083180

- 名词: 第一次联邦战争
  解释: |
    第一次联邦战争指哥伦比亚1860-1862年内战（Colombian Civil War 1860-1862），
    又称"联邦战争"。由考卡州州长托马斯·西普里亚诺·德·莫斯克拉领导的自由派
    （联邦派）对抗马里亚诺·奥斯皮纳·罗德里格斯总统领导的保守派政府。最终自由派
    获胜，1863年通过《里奥内格罗宪法》，成立哥伦比亚合众国，实行极端联邦制。
    《百年孤独》中科罗奈尔神甫被称为"新手"，即这场战争的老兵。这场战争是哥伦比亚
    19世纪联邦制与中央集权斗争的转折点，也奠定了小说中两党军事冲突的历史背景。
  书中原文: |
    尼卡诺尔神甫被肝病高热折磨得奄奄一息，已由科罗奈尔神甫取代，后者被人称作
    "新手"，是第一次联邦战争中的老兵。
  网络来源: |
    https://en.wikipedia.org/wiki/Colombian_Civil_War_(1860%E2%80%931862)
    https://baike.baidu.com/item/%E5%8D%83%E6%97%A5%E6%88%98%E4%BA%89/966451

- 名词: 教皇特许
  解释: |
    教皇特许（dispensa papal）是天主教教会法中的一项制度，指教宗在特定情况下
    豁免教会法对婚姻所设的限制或阻碍。近亲结婚（如姑侄通婚）在天主教教会法中
    属于婚姻阻碍（impediment），原则上禁止，但教宗有权在正当理由下给予豁免。
    在《百年孤独》中，奥雷里亚诺·何塞追求姑妈阿玛兰妲，阿玛兰妲以"除非有教皇的
    特许"为托词拒绝，既反映了天主教婚姻禁忌在拉美社会的约束力，也暗示了她内心
    的矛盾。
  书中原文: |
    "你是头野兽，"受他追逼的阿玛兰妲说，"不能对一个可怜的姑妈干这种事，除非有
    教皇的特许。"
  网络来源: |
    https://www.wikiwand.com/zh-hant/articles/Dispensation_(Catholic_canon_law)
    https://baike.baidu.com/item/%E5%AE%97%E5%BA%A7%E7%89%B9%E6%9D%83

- 名词: 猪尾巴孩子
  解释: |
    "猪尾巴孩子"是贯穿《百年孤独》全书的核心象征意象，反映拉丁美洲民间对近亲
    通婚导致后代畸形的禁忌观念。小说中布恩迪亚家族因惧怕近亲结婚生出长猪尾巴的
    孩子而背井离乡建立马孔多，最终第六代奥雷里亚诺与姑妈乱伦生下长猪尾巴的男婴，
    被蚂蚁吞噬，应验了百年前的诅咒。猪尾巴孩子象征着封闭循环、乱伦禁忌和家族
    宿命，是加西亚·马尔克斯笔下拉丁美洲社会封闭与孤独处境的文学隐喻。
  书中原文: |
    "不光是这个，"阿玛兰妲反驳道，"会生出猪尾巴孩子的。"
  网络来源: |
    https://www.163.com/dy/article/KMQ56FBA0556IGHX.html
    https://www.douban.com/group/topic/38412517/

- 名词: 金杯国王
  解释: |
    金杯国王（King of Cups，亦称圣杯国王）是塔罗牌中小阿卡纳圣杯牌组的一张牌。
    牌面描绘国王坐在海面宝座上，手持圣杯，神态平静，象征情感成熟、情绪管理、
    同理心与智慧。在《百年孤独》中，庇拉尔·特尔内拉用纸牌占卜，"金杯国王"是她
    期盼中高大黝黑男人的象征——即奥雷里亚诺·何塞。纸牌占卜在拉丁美洲民间文化中
    有着深厚传统，也是小说中预示人物命运的重要手法。
  书中原文: |
    在某种意义上，奥雷里亚诺·何塞就是半个世纪以来金杯国王向她允诺的那个高大黝黑
    的男人，他也像所有纸牌召唤来的男人一样，走进她内心时已经死星照命。
  网络来源: |
    https://baike.baidu.com/item/%E5%9C%A3%E6%9D%AF%E5%9B%BD%E7%8E%8B/63665140
    https://www.tarnote.com/blog/%E5%A1%94%E7%BE%85%E7%89%8C%E7%BE%A9%E8%81%96%E6%9D%AF%E5%9C%8B%E7%8E%8B-king-of-cups

- 名词: 古巴的圣地亚哥
  解释: |
    古巴的圣地亚哥（Santiago de Cuba）是古巴第二大城市，位于古巴东南部加勒比海
    沿岸，由西班牙殖民者迭戈·贝拉斯克斯于1514年建立，1522-1589年间曾为古巴首府。
    圣地亚哥被誉为古巴的"英雄之城"，是古巴独立战争和1959年革命的重要中心，
    菲德尔·卡斯特罗的骨灰即安葬于此。在《百年孤独》中，奥雷里亚诺·布恩迪亚
    上校流亡期间寄给乌尔苏拉的第一封亲笔信便寄自古巴的圣地亚哥，标志着他的
    活动范围已远离祖国。
  书中原文: |
    他离去几年后，乌尔苏拉第一次收到他的亲笔信，那封信寄自古巴的圣地亚哥，
    经过多人辗转传递已经皱皱巴巴、字迹模糊。
  网络来源: |
    https://baike.baidu.com/item/%E5%9C%A3%E5%9C%B0%E4%BA%9A%E5%93%A5/2756024
    https://zh.wikipedia.org/zh/%E5%9C%A3%E5%9C%B0%E4%BA%9A%E5%93%A5_(%E5%8F%A4%E5%B7%B4)

- 名词: 阿拉斯加到巴塔哥尼亚
  解释: |
    "从阿拉斯加到巴塔哥尼亚"是一个地理形象化表达，泛指整个美洲大陆的南北跨度。
    阿拉斯加位于北美洲最西北端（今美国阿拉斯加州），巴塔哥尼亚位于南美洲最南端
    （主要在今阿根廷和智利境内），两者之间的广阔区域涵盖了北美洲、中美洲和南美洲
    全境。在《百年孤独》中，奥雷里亚诺·布恩迪亚上校立志联合各地联邦派力量扫荡
    整个美洲大陆的保守党政权，这一表述生动体现了他超越国界的革命野心，也折射出
    19世纪拉丁美洲联邦主义运动的跨国性质。
  书中原文: |
    日后人们将会知道，当时的他一心想要联合中美洲各地的联邦派力量，横扫从阿拉斯加
    到巴塔哥尼亚的一切保守党政权。
  网络来源: |
    未检索到网络资料——该短语为地理表达，非独立条目
