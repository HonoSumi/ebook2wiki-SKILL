- 名词: 共济会
  解释: |
    起源于中世纪石匠兄弟会，现代共济会于1717年在英国伦敦正式成立，是世界上最大的兄弟会秘密组织之一。
    组织以"博爱、自由、慈善"为宗旨，会员分学徒、技工、导师三级，标志为圆规、方矩和字母G。
    历史上伏尔泰、歌德、华盛顿、富兰克林等名人曾为会员。在拉丁美洲独立运动中，共济会成员（如玻利瓦尔、圣马丁）发挥了重要作用。
  书中原文: |
    而奥雷里亚诺·布恩迪亚上校，愿他安息，竟然以他共济会会员的恶毒，放肆地质问她从哪儿来的这种特权，莫非她拉的不是粪便而是香草。
