- 名词: 弄蛇人
  解释: |
    一种以操控蛇进行表演的传统行业，在印度尤为盛行。
    印度弄蛇人被称为"萨佩拉"（Sapera），原为地位崇高的草药医师。表演时吹奏笛子引导眼镜蛇"起舞"，实为蛇跟随笛子摆动方向作出的防御姿态。
    1972年印度《野生动物保护法》禁止商业利用野生动物后，这一千年传统濒临失传，其衍生的卡尔贝利亚舞已被联合国教科文组织列为非物质文化遗产。
