- 名词: 阿尔瓦公爵
  解释: |
    西班牙最悠久的公爵封号之一（全称"阿尔瓦·德·托尔梅斯公爵"），源自阿尔瓦雷斯·德·托莱多家族，1472年升格为公爵。
    其中最著名的是第三代公爵费尔南多·阿尔瓦雷斯·德·托莱多（1507-1582），西班牙军事家、政治家，曾任尼德兰总督，以高压手段镇压尼德兰革命（设立"血腥委员会"），后率军占领葡萄牙，实现西葡合并。
  书中原文: |
    阿尔瓦公爵的教女，出身于连总统夫人都艳羡不已的名门望族、有着高贵血统的她有权在签名中列出十一个源自半岛的古老姓氏。
