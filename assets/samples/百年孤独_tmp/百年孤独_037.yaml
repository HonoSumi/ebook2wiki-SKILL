- 名词: 鞑靼
  解释: |
    最初指蒙古高原东部的塔塔儿部，后成为对欧亚草原上突厥-蒙古系统游牧民族的泛称。
    成吉思汗于1202年征服塔塔儿部，鞑靼人融入蒙古民族共同体。明代称退居蒙古高原的东蒙古为"鞑靼"。
    现代俄罗斯鞑靼人（约600万人）分布在鞑靼斯坦共和国等地，属突厥语族，多信仰伊斯兰教。
  书中原文: |
    他拿去给费尔南达看，她也看出了相似之处，认为那骑手不仅与上校一个人，甚至与家中所有成员都很相像，尽管那其实是一名鞑靼武士。
