- 名词: 甘汞
  解释: |
    即氯化亚汞（Mercurous Chloride, Hg₂Cl₂），一种白色无味的汞化合物。
    在西方医学史中，16世纪起被用作泻药和"排毒"药物，19世纪美国医生本杰明·拉什曾推崇其"英雄剂量"疗法。
    中医称"轻粉"，唐代《本草拾遗》首次记载，用于治疗疥癣、溃疡等，李时珍《本草纲目》详载其制备工艺。现代医学因汞的毒性已基本淘汰内服，仅限外用。
  书中原文: |
    乌尔苏拉合乎情理地得出结论，认为她的病与子宫无关而属于肠胃问题，建议空腹服用甘汞。
  网络来源: |
    https://baike.baidu.com/item/calomel/52732041
    https://www.britannica.com/science/calomel

- 名词: 尼兰迪亚协定
  解释: |
    1902年10月24日在哥伦比亚加勒比沿岸香蕉产区的埃尔兰迪亚庄园（Hacienda Neerlandia）签署的停火协议，标志着千日战争（1899-1902）走向终结的重要转折点。
    千日战争是哥伦比亚保守党与自由党之间的惨烈内战，造成约10万-12万人伤亡。最终和平协议于同年11月21日在美国军舰"威斯康辛号"上签署。
  书中原文: |
    牛车后面是尼兰迪亚协定签订后硕果仅存的老兵，全把裤腿挽起半截，有几人还赤着脚。
  网络来源: |
    https://baike.baidu.com/item/%E5%8D%83%E6%97%A5%E6%88%98%E4%BA%89/966451
    https://m.hujiang.com/es/p739204/

- 名词: 白坚木
  解释: |
    南美洲特有的极硬木材，西班牙语名"Quebracho"意为"折断斧头"。
    主要分布在巴西、巴拉圭、阿根廷等地，木质密度极高（约1205 kg/m³），是全世界最硬的木材之一。
    心材含20%-30%单宁酸，19世纪大量用于皮革鞣制。在南美民间也用于制作工具手柄、铁路枕木等。
  书中原文: |
    他们都在泥泞中扑腾着，一只手拄着白坚木手杖，另一只手拿着被雨淋得退色的纸花圈。
  网络来源: |
    https://baike.baidu.com/item/%E7%99%BD%E5%9D%9A%E6%9C%A8/3378511
    https://www.wood-database.com/quebracho/

- 名词: 罗德岛巨像
  解释: |
    古代世界七大奇迹之一，希腊罗德岛上的太阳神赫利俄斯巨型青铜雕像。
    公元前282年完工，高约33-34米，屹立在罗德市港口。公元前226年因地震从膝盖处倒塌，仅存世约56年，是七大奇迹中寿命最短的一个。
    公元654年阿拉伯人入侵后将残骸运往叙利亚，此后彻底消失。
  书中原文: |
    时间就这样在罗德岛巨像和弄蛇人之间流逝，直到妻子提醒他，谷仓里只剩下六公斤咸肉和一袋米。
