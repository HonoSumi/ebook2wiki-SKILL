- 名词: 飞毯
  解释: |
    又称魔毯、飞天魔毯，源出阿拉伯民间故事集《一千零一夜》（《天方夜谭》）。
    故事中印度苏丹侯赛因亲王所购的魔毯可载人飞行，是阿拉伯神话中最具代表性的奇幻交通工具之一，已成为奇幻、自由与冒险的文化符号。
  书中原文: |
    那时他还在梅尔基亚德斯的房间里读着飞毯和巨鲸吞食水手与航船的神奇故事。
  网络来源: |
    https://zh.wikipedia.org/wiki/%E9%AD%94%E6%AF%AF
    https://baike.baidu.com/item/%E9%A3%9E%E6%AF%AF

- 名词: 香蕪公司
  解释: |
    《百年孤独》中虚构的香蕉公司，其现实原型为美国联合果品公司（United Fruit Company）。
    该公司成立于1899年，垄断中美洲香蕉贸易，被称为"香蕉王国"或"绿色魔鬼"。
    在哥伦比亚历史上，1928年联合果品公司香蕉工人大罢工遭政府军镇压，数千工人被杀，这一事件被马尔克斯写入小说。
  书中原文: |
    但那时常有人带来有关暴雨的不幸消息，其中一个告诉她公司已经撤走医疗站，搬到了没下雨的地区，因此她的指望化为泡影——她只能一边期待雨天过去邮路恢复，一边自行设法缓解身上的暗疾，因为她宁死也不愿落在马孔多所剩唯一的医生，那个以驴草为食的古怪的法国人手里。
  网络来源: |
