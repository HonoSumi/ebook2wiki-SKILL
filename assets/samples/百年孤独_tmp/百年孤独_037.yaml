- 名词: 法利赛人
  解释: |
    第二圣殿时期（约公元前536年-公元70年）犹太教四大派别之一，源自希伯来语"分离"之意。
    法利赛人严格遵行摩西律法和口传律法，相信肉体复活、灵魂不朽和来世赏罚，深受中下层民众拥护。
    公元70年第二圣殿被毁后，法利赛派演变为拉比犹太教，成为后世正统犹太教的根基。在基督教《新约》中常被记载为与耶稣辩论的群体。
  书中原文: |
    总在背后说她的坏话，叫她假圣女，叫她法利赛人，叫她刁女人。
