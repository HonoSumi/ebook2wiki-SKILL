- 名词: 圣墓骑士团
  解释: |
    全称"耶路撒冷圣墓骑士团"（Ordo Equestris Sancti Sepulcri Hierosolymitani），天主教教宗骑士团之一。
    约1099年第一次十字军东征后创立，1113年获教宗巴斯加二世正式认可，专门保卫耶路撒冷圣墓教堂与圣地安全。
    现代已转变为荣誉性、慈善性的天主教骑士团，全球约30000名成员，总部设在罗马。
  书中原文: |
    特别是她父亲，毫无疑问，一位圣洁的男子，伟大的基督徒，圣墓骑士团的骑士，直接从上帝那里领受了死后肉身不朽的恩典。
