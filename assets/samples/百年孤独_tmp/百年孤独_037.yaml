- 名词: 圣灵降临节
  解释: |
    基督教重要节日，也称五旬节（Pentecost），在复活节后第50天庆祝。
    据《使徒行传》第2章记载，圣灵如火焰的舌头降临在门徒身上，他们得着能力说起方言，向众人传福音，彼得当日讲道约三千人信主。
    该节日被视为基督教会的诞生日，象征着三位一体上帝的临在。天主教称"圣神降临节"，崇拜颜色为红色。
  书中原文: |
    而她疯狂的丈夫领她出门时对一切劝诫和嘱托都满口应承，却将她带到这个热得令人窒息的低洼地狱，没等她结束圣灵降临节斋戒就径自拿着他的流动衣箱和浪荡子的手风琴去跟那个灾星女人姘居。
