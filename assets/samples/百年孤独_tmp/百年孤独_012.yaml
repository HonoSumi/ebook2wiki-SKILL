- 名词: 共济会
  解释: |
    起源于欧洲的兄弟会组织，带有秘密结社性质，强调会员互助、道德修
    养与启蒙思想。18至19世纪在拉丁美洲广泛传播，许多独立运动领袖如
    西蒙·玻利瓦尔均为其成员。自由派因主张限制教会权力、提倡世俗化
    改革，常被保守派攻击为"共济会分子"。
  书中原文: |
    自由派，他说道，都是些共济会分子，心术不正，主张绞死教士，实行
    世俗婚姻并允许离婚，承认私生子和婚生子享有同等权利，试图分裂国
    家建立联邦制以剥夺最高当局的权力。
  网络来源: |
    https://baike.baidu.com/item/%E5%85%B1%E6%B5%8E%E4%BC%9A
    https://baike.baidu.com/item/%E5%85%B1%E6%B5%8E%E4%BC%9A/%E5%8E%86%E5%8F%B2

- 名词: 自由派与保守派（哥伦比亚）
  解释: |
    哥伦比亚两大传统政党。自由党（Partido Liberal）成立于1848年，主
    张联邦制、政教分离、自由贸易、废除奴隶制；保守党（Partido
    Conservador）成立于1849年，主张中央集权、维护天主教会特权、保
    守传统秩序。两党在19世纪激烈对抗，引发多次内战（如1860-1862年
    内战、1899-1902年千日战争），是理解《百年孤独》政治背景的关键。
  书中原文: |
    自由派已决意开战。奥雷里亚诺那时还完全不明白自由派和保守派的区
    别，岳父为他作了简要介绍。自由派，他说道，都是些共济会分子，心
    术不正，主张绞死教士，实行世俗婚姻并允许离婚，承认私生子和婚生
    子享有同等权利，试图分裂国家建立联邦制以剥夺最高当局的权力。而
    保守派不同，他们直接从上帝那里获得天赋权柄，以维护公共秩序和家
    庭道德为己任。
  网络来源: |
    https://baike.baidu.com/item/%E5%93%A5%E4%BC%A6%E6%AF%94%E4%BA%9A%E8%87%AA%E7%94%B1%E5%85%9A
    https://baike.baidu.com/item/%E5%93%A5%E4%BC%A6%E6%AF%94%E4%BA%9A%E4%BF%9D%E5%AE%88%E5%85%9A
    https://colombiareports.com/liberal-party-colombia/

- 名词: 顺势疗法
  解释: |
    18世纪末由德国医生塞缪尔·哈内曼创立的一种替代医学体系，核心原
    则为"以同治同"（Like Cures Like），即能引起某种症状的物质经高
    度稀释后可治疗相同症状的疾病。书中以俗语"一钉入，一钉出"概括
    此意。该疗法在19世纪欧美颇为流行，但现代科学及世界卫生组织
    （WHO）将其认定为伪科学，认为疗效不优于安慰剂。
  书中原文: |
    ① One mail drives out another. 顺势疗法中"以毒攻毒"的原则。
    顺势疗法，是为了治疗某种疾病，需要使用一种能够在健康人中产生相
    同症状的药剂，顺势疗法是由塞缪尔·哈尼曼18世纪创立的。
  网络来源: |
    https://wapbaike.baidu.com/item/%E9%A1%BA%E5%8A%BF%E7%96%97%E6%B3%95
    https://www.msdmanuals.cn/home/special-subjects/integrative,-complementary,-and-alternative-medicine/homeopathy

- 名词: 维克多·休斯
  解释: |
    法国大革命时期真实历史人物（约1762-1826年），生于海地，后投身
    革命，作为雅各宾派代表被派往瓜德罗普岛推行革命政策，曾废除奴隶
    制，后因政治风向转变又恢复奴隶制。古巴作家阿莱霍·卡彭铁尔在其
    小说《光明世纪》（El siglo de las luces）中将其作为核心主人公，
    塑造为一个"普罗米修斯式"的启蒙者与革命弄潮儿，后理想破灭。
  书中原文: |
    维克多·休斯（Victor Hugues），古巴作家阿莱霍·卡彭铁尔的小说
    《光明世纪》中的人物。
  网络来源: |
    https://book.douban.com/review/13957837/
    https://baike.baidu.com/item/%E9%98%BF%E8%8E%B1%E9%9C%8D%C2%B7%E5%8D%A1%E6%93%8E%E9%93%81%E5%B0%94

- 名词: 海蠊
  解释: |
    一种滨海滩涂生长的小水产品，又名海瓜子，两广地区称为蚬、蚬仔。
    学名寻氏肌蛤（Musculus senhousei），外壳呈楔形，状如南瓜子。
    肉质鲜美，是广东潮汕地区传统海产，常用"金不换"（罗勒）爆炒。
    书中在描述人物病状时出现，系译者对原文中特殊海产名词的注释。
  书中原文: |
    海蠊，又名海瓜子，两广叫蚬、蚬仔，是一种在滨海滩涂生长的小水
    产品，因状如南瓜子而得名。
  网络来源: |
    https://baike.baidu.com/item/%E8%96%84%E6%AE%BC%E7%B1%B3/5110653

- 名词: 马尼拉大披巾
  解释: |
    又称马尼拉披肩（Mantón de Manila），实则原产于中国广州，是广绣
    （粤绣）的外销精品。16至19世纪通过"马尼拉大帆船贸易"航线运往
    欧洲——中国商品先运至菲律宾马尼拉中转，再经太平洋抵达墨西哥，
    最后转运西班牙和全欧洲。披巾呈方形，绣以花卉飞鸟，边缘配长流
    苏，后成为西班牙弗拉门戈舞的标志性服饰。
  书中原文: |
    出于对这一家人的尊敬，他在帽子上仍然系着黑纱，并很乐意亲近乌尔
    苏拉，为她带来异国礼物：葡萄牙沙丁鱼，土耳其玫瑰果酱，还有一次
    是一条精美的马尼拉大披巾。
  网络来源: |
    https://www.lifeweek.com.cn/article/99843
    https://news.qq.com/rain/a/20230102A04R0T00

- 名词: 库拉索
  解释: |
    加勒比海南部岛屿，靠近委内瑞拉海岸，面积444平方公里，首府威廉
    斯塔德。1634年被荷兰西印度公司占领，后成为大西洋奴隶贸易中心。
    岛上盛产柑橘，以库拉索橙酒闻名。1954年起为荷属安的列斯一部分，
    2010年成为荷兰王国的自治国。书中作为流亡者逃往的目的地出现。
  书中原文: |
    他是在参加联邦派的第一次起事时被捕的，后乔装改扮逃往库拉索，被
    迫披上他在这个世界上最憎恶的衣服——教士袍。
  网络来源: |
    https://wapbaike.baidu.com/item/%E5%BA%93%E6%8B%89%E7%B4%A2%E5%B2%9B
    https://willemstad.china-consulate.gov.cn/chn/lqjs/

- 名词: 里奥阿查
  解释: |
    哥伦比亚北部加勒比海沿岸城市，瓜希拉省首府。1535年由德裔探险家
    尼古劳斯·费德曼建立，殖民时期以丰富的珍珠资源闻名，屡遭海盗袭
    击。该城在加西亚·马尔克斯的多部作品中反复出现，除《百年孤独》
    外，亦是《霍乱时期的爱情》《一桩事先张扬的凶杀案》的重要背景地。
  书中原文: |
    他大受鼓舞登上走私贩的帆船，随身带着一瓶瓶纯由白糖制成的药丸和
    一张他自己伪造的莱比锡大学文凭，出现在里奥阿查。
  网络来源: |
    https://wapbaike.baidu.com/item/%E9%87%8C%E5%A5%A5%E9%98%BF%E6%9F%A5/1698516

- 名词: 莱比锡大学
  解释: |
    德国境内第二古老的大学，1409年创立，仅次于海德堡大学（1386年）。
    位于德国萨克森州的莱比锡市，六百余年来从未中断教学。著名校友包
    括歌德、尼采、莱布尼茨、蔡元培（曾任北京大学校长）、德国前总理
    默克尔等。书中冒牌医生伪造了该校文凭。
  书中原文: |
    他大受鼓舞登上走私贩的帆船，随身带着一瓶瓶纯由白糖制成的药丸和
    一张他自己伪造的莱比锡大学文凭，出现在里奥阿查。
  网络来源: |
    https://wapbaike.baidu.com/item/%E8%8E%B1%E6%AF%94%E9%94%A1%E5%A4%A7%E5%AD%A6/3656713
    https://zh.wikipedia.org/zh/%E8%8E%B1%E6%AF%94%E9%94%A1%E5%A4%A7%E5%AD%A6

- 名词: 联邦派
  解释: |
    19世纪拉丁美洲主张实行联邦制（各省高度自治）的政治力量。在哥伦
    比亚，联邦派主要为自由党中的激进派别，与主张中央集权的保守派对
    立。1863年联邦派曾推动通过《里奥内格罗宪法》，改国名为"哥伦比
    亚合众国"，给予各州近乎完全的自治权。1886年中央集权派重新掌权
    后，联邦制被废止。
  书中原文: |
    他是在参加联邦派的第一次起事时被捕的，后乔装改扮逃往库拉索，被
    迫披上他在这个世界上最憎恶的衣服——教士袍。
  网络来源: |
    https://country-studies.com/colombia/the-federalists.html
    https://zh.wikipedia.org/wiki/%E5%A4%A7%E5%93%A5%E4%BC%A6%E6%AF%94%E4%BA%9A%E5%85%B1%E5%92%8C%E5%9B%BD
