- 名词: 弗朗西斯·德雷克
  类别: 人物
  解释: |
    弗朗西斯·德雷克爵士（Sir Francis Drake，约1540年—1596年），英国伊丽莎白时代的私掠船长、航海家、探险家。他是继麦哲伦之后第二位完成环球航行的船长（1577—1580年），发现了以他命名的"德雷克海峡"。1588年作为海军中将参与击败西班牙"无敌舰队"。在英国被视为民族英雄和航海先驱，但在西班牙及拉丁美洲则被视作臭名昭著的海盗（西班牙语绰号"El Draque"，意为"龙"）。德雷克曾在1569年和1595年两次袭击并洗劫哥伦比亚北部城市里奥阿查（Riohacha）。《百年孤独》中，乌尔苏拉的曾祖母因德雷克袭击里奥阿查时的炮声受惊吓坐在火炉上，造成终身重伤，这一偶然事件成为布恩迪亚家族百年命运的开端。小说结尾将这一历史事件赋予宿命论色彩："当年弗朗西斯·德雷克袭击里奥阿查不过是为了促成他们俩在繁复错综的血脉迷宫中彼此寻找"。
  书中原文: |
    当年弗朗西斯·德雷克袭击里奥阿查不过是为了促成他们俩在繁复错综的血脉迷宫中彼此寻找，直到孕育出那个注定要终结整个家族的神话般的生物。
  网络来源: |
    https://baike.baidu.com/item/弗朗西斯·德雷克/23345
    https://wenwen.sogou.com/z/q852327718.htm

- 名词: 里奥阿查
  类别: 地点
  解释: |
    里奥阿查（Riohacha，西班牙语意为"斧头河"，瓦尤语称Süchiimma，意为"河流之地"），位于哥伦比亚北部加勒比海岸，是瓜希拉省（La Guajira）的首府。该城最初于1535年由德国探险家尼古劳斯·费德曼在Cabo de la Vela建立，后因珍珠资源丰富而成为西班牙殖民据点，也因此屡遭海盗袭击。1569年和1595年先后被英国海盗弗朗西斯·德雷克两次袭击洗劫并纵火烧毁。在《百年孤独》中，里奥阿查是布恩迪亚家族历史起点的关键地点：乌尔苏拉的曾祖母因德雷克袭击此城时受惊吓而终身残疾，导致家族迁徙和后续联姻。加西亚·马尔克斯在多部作品（《霍乱时期的爱情》《一桩事先张扬的凶杀案》）中也多次提及此城。
  书中原文: |
    当年弗朗西斯·德雷克袭击里奥阿查不过是为了促成他们俩在繁复错综的血脉迷宫中彼此寻找，直到孕育出那个注定要终结整个家族的神话般的生物。
