- 名词: 卡斯蒂利亚语
  类别: 概念·观念
  解释: |
    即西班牙语（Español），两者本质上是同一种语言。卡斯蒂利亚语（Castellano）得名于西班牙北部的卡斯蒂利亚地区（Castilla，意为"城堡之地"），起源于公元10世纪左右。随着卡斯蒂利亚王国在光复运动中向南扩张，该语言逐渐传播至整个伊比利亚半岛。1492年卡斯蒂利亚与阿拉贡联姻统一西班牙后，卡斯蒂利亚语被确认为官方语言，故亦称西班牙语。在西班牙的双语地区（如加泰罗尼亚、巴斯克地区），当地人更倾向于使用"卡斯蒂利亚语"这一称呼，以区别于本地的加泰罗尼亚语、巴斯克语等。在《百年孤独》中，梅尔基亚德斯的羊皮卷虽以梵文书写，但奥雷里亚诺破译时"仿佛那是用卡斯蒂利亚语写就"，意指他能像阅读母语一样毫不费力地读懂。
  书中原文: |
    他顾不得拿到光亮处，就站在原地，仿佛那是用卡斯蒂利亚语写就，仿佛他正站在正午明亮的光线下阅读，开始毫不费力地大声破译。
  网络来源: |
    https://baike.baidu.com/item/西班牙语/398390
    https://baike.baidu.com/item/卡斯蒂利亚/131693

- 名词: 梵文
  类别: 概念·观念
  解释: |
    梵语（Sanskrit，天城体：संस्कृतम्）是印欧语系最古老的语言之一，属于印度-雅利安语支，字面意为"完全整理好的语言"或"完美的语言"。汉传佛教因其被认为由造物神"梵天"所创，故称其为"梵文"。梵语分为吠陀梵语（约公元前1500年起）和经文法家波你尼（Pāṇini）标准化的古典梵语（约公元前5—4世纪起）。梵语最初为口头语言，无文字，后历经婆罗米文、笈多文、悉昙体至天城体（Devanāgarī）定型。梵语是印度宪法的22种官方语言之一，但现代日常使用者极少。梵语对东亚文化影响深远——佛经翻译、汉语音韵学中的反切注音法、以及"佛陀""菩提""涅槃""刹那"等词汇均源自梵语。在《百年孤独》中，梅尔基亚德斯以梵文书写羊皮卷，并将其作为加密的第一道防线。
  书中原文: |
    他以自己的母语梵文书写，偶数行套用奥古斯都大帝的私人密码，奇数行择取斯巴达的军用密码。
  网络来源: |
    https://baike.baidu.com/item/梵文/2134871
    https://baike.baidu.com/item/梵语

- 名词: 奥古斯都大帝
  类别: 人物
  解释: |
    奥古斯都大帝（Augustus，原名盖乌斯·屋大维·图里努斯，Gaius Octavius Thurinus，公元前63年—公元14年），罗马帝国的第一位皇帝（元首），元首政制的创始人。他是恺撒大帝的养子及继承人。公元前43年，他与马克·安东尼、雷必达结成"后三头同盟"，清洗共和派。公元前31年亚克兴海战中击败安东尼与埃及艳后克利奥帕特拉联军，成为罗马唯一主宰。公元前27年，他表面上"还政于元老院"，获封"奥古斯都"（意为"神圣""至尊"）尊号，创立元首制——以"第一公民"身份实际掌握军政大权，是为披着共和外衣的君主制。他建立了常备军、禁卫军，改革行省管理，缔造了长达200余年的"罗马和平"（Pax Romana），并大力赞助文学艺术，使拉丁文学进入鼎盛期。其称号"凯撒"和"奥古斯都"成为后世统治者的头衔（如德皇Kaiser、沙皇Tsars源于此）。在《百年孤独》中，奥雷里亚诺发现梅尔基亚德斯的羊皮卷偶数行套用了奥古斯都大帝的私人密码作为加密手段。
  书中原文: |
    他以自己的母语梵文书写，偶数行套用奥古斯都大帝的私人密码，奇数行择取斯巴达的军用密码。
  网络来源: |
    https://baike.baidu.com/item/盖乌斯·屋大维/1934636
    https://baike.baidu.com/item/奥古斯都

- 名词: 斯巴达的军用密码
  类别: 概念·观念
  解释: |
    指古希腊斯巴达人使用的密码棒（Scytale，希腊语：σκυτάλη，意为"棍棒"），被认为是人类历史上最早的军事密码器械之一，约公元前5世纪（伯罗奔尼撒战争时期）使用。其原理为换位密码（Transposition Cipher）：通信双方约定使用相同长度和粗细的木棒作为密钥，发送方将羊皮纸或皮带螺旋形缠绕在木棒上，横向书写明文信息；解开后字母顺序被打乱，呈现为杂乱无章的"天书"。接收方将皮带缠绕在相同尺寸的木棒上，字母重新对齐即可读出原文。若木棒尺寸不同，则无法正确还原。在《百年孤独》中，梅尔基亚德斯的羊皮卷使用了三层加密：梵文书写为基础，偶数行套用奥古斯都的私人密码，奇数行则择取斯巴达的军用密码。
  书中原文: |
    他以自己的母语梵文书写，偶数行套用奥古斯都大帝的私人密码，奇数行择取斯巴达的军用密码。
  网络来源: |
    https://baike.baidu.com/item/密码棒
