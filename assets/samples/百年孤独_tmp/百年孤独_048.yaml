- 名词: 教皇谕令
  类别: 概念·观念
  解释: |
    教皇谕令（又称教宗谕令、教皇诏书，拉丁文：Bulla apostolica）是天主教教宗（教皇）发布的最高级别正式文告。其名称源自拉丁文"bulla"（意为"沸腾"→"气泡"），指文书上使用的铅制封印。形制为深色羊皮纸配铅印（近代改用火漆），正面雕刻圣伯多禄和圣保禄头像。教皇谕令用于敕封圣徒、教义解释、召开大公会议等重大场合。著名的历史实例包括1493年亚历山大六世划定殖民势力范围的《Inter Caetera》诏书。在《百年孤独》中，奥雷里亚诺破译羊皮卷时，"逐字逐句高声朗读教皇谕令般的诗行"，形容他朗读羊皮卷时庄重、肃穆、一字不差的姿态，如同教皇宣读正式文告。
  书中原文: |
    奥雷里亚诺为这一发现激动不已，逐字逐句高声朗读教皇谕令般的诗行，当年阿尔卡蒂奥曾从梅尔基亚德斯口中听闻，却不知道那是关于自己死亡的预告。
  网络来源: |
    https://baike.baidu.com/item/教皇诏书/23146655
    https://zh.wikipedia.org/zh-mo/教宗詔書
