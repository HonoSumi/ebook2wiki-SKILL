- 名词: 马尔伯勒公爵
  解释: |
    第一代马尔伯勒公爵约翰·丘吉尔（John Churchill, 1650—1722），英国军事家、政治家，英国历史上最著名的军事统帅之一。他在西班牙王位继承战争中取得布伦海姆战役、拉米伊战役等一系列辉煌胜利，与纳尔逊、威灵顿并称英国三大军事英雄。在《百年孤独》中，奥雷里亚诺·布恩迪亚上校最初将其肖像置于座右，视作战争艺术的导师；后期上校陷入孤独与幻灭，对马尔伯勒公爵也产生敌视，象征其对战争意义和权力本质的彻底失望。
  书中原文: |
    他将马尔伯勒公爵置于座右，此人是教授他战争艺术的导师，以一身虎皮虎爪的华服让大人起敬、令小儿惊悚。
  网络来源: |
    https://baike.baidu.com/item/%E9%A9%AC%E5%B0%94%E4%BC%AF%E5%8B%92
    https://zh.wikipedia.org/wiki/%E7%AC%AC%E4%B8%80%E4%BB%A3%E9%A9%AC%E5%B0%94%E5%8D%9A%E7%BD%97%E5%85%AC%E7%88%B5%E7%BA%A6%E7%BF%B0%C2%B7%E4%B8%98%E5%90%89%E5%B0%94

- 名词: 自由派与保守派（哥伦比亚政治）
  解释: |
    哥伦比亚自由党（1848年成立）与保守党（1849年成立）是哥伦比亚两大传统政党，其斗争贯穿哥伦比亚近两百年历史。自由派主张联邦制、政教分离、自由贸易；保守派主张中央集权、维护教会特权。两党矛盾在1899至1902年爆发为惨烈的"千日战争"，造成约十万人死亡。这场战争正是《百年孤独》中奥雷里亚诺·布恩迪亚上校所参与的内战的历史原型。小说中自由派地主与保守派地主秘密勾结、政治代表提出妥协条件等情节，直接映射了千日战争后期的真实历史。
  书中原文: |
    最初支持革命的自由派地主已经与保守派地主签订秘密协定，以阻挠地产审查。
  网络来源: |
    https://baike.baidu.com/item/%E5%8D%83%E6%97%A5%E6%88%98%E4%BA%89/966451
    https://zh.wikipedia.org/wiki/%E5%8D%83%E6%97%A5%E6%88%98%E4%BA%89

- 名词: 马纳乌雷
  解释: |
    哥伦比亚真实存在的城镇（Manaure），位于瓜希拉省北部沿海，以巨大的天然盐滩闻名，坐落在加勒比海沿岸。在《百年孤独》中，奥雷里亚诺·布恩迪亚上校处决蒙卡达将军后首次到访马纳乌雷，前往完成死于己手的受害者的遗愿。小说将这一真实地名嵌入叙事，增强了历史真实感与地理空间的现实参照。
  书中原文: |
    他处决蒙卡达将军后第一次到马纳乌雷时，一刻也没延误，就去完成死于己手的受害者的遗愿。
  网络来源: |
    https://zh.db-city.com/%E5%93%A5%E4%BC%A6%E6%AF%94%E4%BA%9A--%E7%93%9C%E5%B8%8C%E6%8B%89%E7%9C%81--Manaure
    https://mapcarta.com/30690452

- 名词: 自动钢琴
  解释: |
    自动钢琴（Pianola / Player Piano）是一种通过打孔纸卷驱动气动装置自动演奏的机械钢琴，1895年由美国工程师埃德温·沃蒂发明，在20世纪初风靡欧美。演奏者通过脚踏板提供动力，纸卷上的孔位对应不同音符，实现无需人工弹奏即可发音。在《百年孤独》中，覆盖着白床单的自动钢琴摆放在马孔多闷热的客厅里，透出几分鬼气，象征着欧洲现代工业文明侵入这个封闭小镇后既华丽又格格不入的存在。
  书中原文: |
    在闷热的客厅里，覆着如裹尸布般白床单的自动钢琴透出几分鬼气，奥雷里亚诺·布恩迪亚上校就坐在钢琴旁，这回他周围没有副官用粉笔画的圆圈。
  网络来源: |
    https://www.britannica.com/art/player-piano
