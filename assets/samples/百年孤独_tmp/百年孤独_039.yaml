- 名词: 棕榈主日
  解释: |
    又称圣枝主日、棕枝主日、苦难主日，基督教重要节日，纪念耶稣基督骑驴荣进耶路撒冷，标志着圣周（受难周）的开始，在复活节前的星期日庆祝。据福音书记载，民众手持棕树枝铺在路上，高呼"和散那"迎接耶稣，故得名。棕树枝在犹太文化中象征胜利与尊荣。该节日兼具喜乐（迎接君王）与苦难（预示受难）的双重含义。在《百年孤独》中，棕榈主日是费尔南达去望弥撒的日子，也是乌尔苏拉被孩子们戏弄的背景时间。
  书中原文: |
    棕榈主日费尔南达去望弥撒的时候，他们来到卧室，一个抓脖子一个抄脚踝把乌尔苏拉抬了起来。
  网络来源: |
    https://baike.baidu.com/item/圣枝主日
    https://www.amdgchinese.org/?p=77150
    https://cdn-news.org/News.aspx?EntityID=News&PK=0000000000652e5951ed0632db044347aff8046296969600

- 名词: 圣星期四
  解释: |
    又称濯足日、团契日、设立圣餐日、Maundy Thursday，基督教圣周的第五天，复活节前的星期四。据圣经记载，耶稣在这一天与门徒共进最后的晚餐，设立了圣餐（以饼和杯象征身体和宝血），并为门徒洗脚，赐下"彼此相爱"的新命令。Maundy一词源自拉丁文mandatum（命令）。该日也是逾越节三日庆典的开始。在《百年孤独》中，乌尔苏拉正是在圣星期四一早去世。
  书中原文: |
    她死在圣星期四一早。
  网络来源: |
    https://wanyouzhenyuan.cn/index.php?m=news&a=content&id=49241
    https://www.chinagospeltimes.com/article/index/id/72935

- 名词: 复活主日
  解释: |
    即复活节（Easter Sunday），基督教最核心、最重要的节日，纪念耶稣基督在被钉十字架受难后第三日从死里复活。复活主日标志着圣周的结束和复活期的开始，其神学核心在于：耶稣的复活证实了祂是上帝之子、战胜了罪恶与死亡，是基督教信仰的基石。复活节与洗礼紧密相连，象征从死亡到生命、从黑暗到光明的转化。在《百年孤独》中，复活主日当天发生了飞鸟大量撞墙死亡的奇异事件。
  书中原文: |
    复活主日，年过百岁的安东尼奥·伊莎贝尔神甫在布道坛上断定是"流浪的犹太人"作祟造成飞鸟的死亡，说那个怪物他前一晚亲眼见到了。
  网络来源: |
    https://www.wanyouzhenyuan.cn/index.php?m=daily&stype=saint&date=2024-03-31
    https://kkp.org.hk/past/detail/44144

- 名词: 流浪的犹太人
  解释: |
    中世纪基督教传说人物，指因冒犯耶稣而被诅咒永世流浪直至世界末日的虚构形象。传说版本不一：一说耶稣背负十字架时在鞋匠门口休息遭驱赶，被诅咒永世流浪；一说是罗马总督彼拉多的门卫在押送时斥责耶稣"快走"而受诅咒。该人物在不同文化中有多个名字（亚哈随鲁、卡塔菲勒斯等），形象通常为拄拐杖、长须发、光脚的流浪者。在西方语言中，"流浪的犹太人"已成为漂泊者、无家可归者的代名词。在《百年孤独》中，神甫将飞鸟大量死亡归咎于此传说怪物。
  书中原文: |
    复活主日，年过百岁的安东尼奥·伊莎贝尔神甫在布道坛上断定是"流浪的犹太人"作祟造成飞鸟的死亡，说那个怪物他前一晚亲眼见到了。
  网络来源: |
    https://baike.baidu.com/item/流浪的犹太人/61797655
    https://zh.wikipedia.org/zh-my/流浪的犹太人
    https://www.britannica.com/topic/wandering-Jew

- 名词: 加拉巴木果
  解释: |
    指加拉巴木树（Calabash tree，学名Crescentia cujete）的果实，又称炮弹果、葫芦木，原产于热带美洲。果实为大型球形浆果，外壳坚硬木质化，直径可达50厘米。果壳挖空晒干后可制成碗、杯、瓢、勺等日用器皿，也可制作乐器（如沙锤）和装饰品。在中南美洲民间，加拉巴木果壳制成的容器是日常生活和传统文化中的重要器具。在《百年孤独》中，加拉巴木果壳杯失手掉落的情节与乌尔苏拉离世前的种种异象相关联。
  书中原文: |
    桑塔索菲亚·德拉·彼达猜到她随时会离开人世，因为这些天来已经观察到自然事物的异常：玫瑰发出土荆芥的气味；一个加拉巴木果壳杯失手掉落，鹰嘴豆和谷粒洒落在地排列出完美的几何图形，组成海星形状；一天晚上她还看见夜空中有一排发光的橙色圆盘飞过。
  网络来源: |
    https://www.britannica.com/plant/calabash-tree
    http://dict.youdao.com/w/calabash/

- 名词: 香蕉公司
  解释: |
    小说中影射美国联合果品公司（United Fruit Company），是《百年孤独》重要的历史背景元素。联合果品公司成立于1899年，曾垄断中美洲香蕉出口和基础设施，深度干预当地政治，导致多国形成依附型"香蕉共和国"经济。小说中香蕉公司的到来对应现实中的1928年哥伦比亚香蕉工人大罢工及镇压事件（又称谢纳加屠杀），数千罢工工人被军队机枪扫射致死。马尔克斯的故乡阿拉卡塔卡正是联合果品公司的势力范围，"马孔多"之名也源自附近一处香蕉种植园。这段历史是全书魔幻现实主义最核心的现实根基。
  书中原文: |
    人们最后一次帮她数算年龄是在香蕉公司时期，当时得出的结果在一百一十五到一百二十二岁之间。
  网络来源: |
    https://www.chinawriter.com.cn/n1/2024/0418/c404092-40218341.html
