- 名词: 昆比安巴舞
  解释: |
    即Cumbia（库姆比亚/空比亚），哥伦比亚最具代表性的民族舞蹈和音乐形式，起源于加勒比海沿岸地区，融合了非洲黑人、美洲原住民和西班牙欧洲三种文化元素。舞蹈为双人对舞形式，女性手持蜡烛、身着长裙，男性手持沙锤伴奏，步伐较小，以跨部环状律动为特征，表现男女之间的爱情追求。Cumbia也是巴兰基亚狂欢节的核心舞蹈，被联合国教科文组织列为"人类口头和非物质文化遗产"。
  书中原文: |
    这些宴席仿佛昔日盛况的寒酸翻版，也令奥雷里亚诺第二发现自己当年的活力荡然无存，昔日的昆比安巴舞高手雄风不再。
  网络来源: |
    http://hrwdw.com/html/wdzl/Folk/news_4_1/4647.html
    https://www.travelandtourworld.tw/新闻/文章/why-colombias-barranquilla-carnival-traditional-dances-are-a-must-see-for-every-traveler/
    https://webarchiveweb.wayback.bac-lac.canada.ca/web/20240305002223/https://en.wikipedia.org/wiki/Cumbia

- 名词: 西印度公司瓷器
  解释: |
    指经由荷兰西印度公司（Dutch West India Company, WIC）等特许贸易公司从中国或欧洲转运至美洲的瓷器。荷兰西印度公司成立于1621年，是荷兰在17—18世纪仿效东印度公司模式建立的殖民贸易公司，垄断西非和美洲之间的航运与贸易，其船队将欧洲货物运往非洲换取奴隶，再将奴隶贩运至美洲种植园，最后将美洲及东方的商品（包括瓷器）运回欧洲。西印度公司瓷器在拉丁美洲殖民地上层社会中是身份与财富的象征。
  书中原文: |
    不久，她又卖掉银餐具，买来陶瓷盘碟、白锱汤盆汤勺和镍银刀叉，使得那一向摆放西印度公司瓷器和波希米亚玻璃器皿的碗橱从此寒碜了许多。
  网络来源: |
    https://baike.baidu.com/item/荷兰西印度公司
    https://zh.wikipedia.org/zh-mo/荷兰西印度公司

- 名词: 波希米亚玻璃器皿
  解释: |
    指源自波希米亚（Bohemia，今捷克共和国西部）地区的玻璃工艺品。波希米亚玻璃工艺始于9世纪，以钾玻璃（森林玻璃）为基础，17世纪引入铜轮切割雕刻技术后达到鼎盛，巴洛克和洛可可时期风靡欧洲宫廷，与威尼斯玻璃并称为欧洲玻璃工艺的两大支柱。其特点是质地纯净通透、雕刻精美、彩色珐琅彩绘华丽，被誉为捷克国宝级工艺。在拉丁美洲殖民时期，波希米亚玻璃器皿是上层家庭彰显品味与财富的舶来奢侈品。
  书中原文: |
    不久，她又卖掉银餐具，买来陶瓷盘碟、白锱汤盆汤勺和镍银刀叉，使得那一向摆放西印度公司瓷器和波希米亚玻璃器皿的碗橱从此寒碜了许多。
  网络来源: |
    https://www.hnmuseum.com/sites/default/files/statics/tezhanhuimou/2014DecorativeArts/treasures10.html
