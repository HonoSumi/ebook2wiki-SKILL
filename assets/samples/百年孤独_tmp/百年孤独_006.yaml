- 名词: 卡斯蒂利亚语
  解释: |
    即西班牙语（Español），源自中世纪伊比利亚半岛卡斯蒂利亚王国（Castilla）的方言，属于罗曼语族。1492年西班牙统一后，卡斯蒂利亚方言上升为西班牙国语，随殖民扩张传播至拉丁美洲。在拉丁美洲部分国家（如阿根廷、哥伦比亚），人们更倾向于使用"卡斯蒂利亚语"（Castellano）这一名称，以区别于宗主国西班牙。书中丽贝卡作为外来孤儿，却能流利使用卡斯蒂利亚语和印第安土语，体现了马孔多作为文化交融之地的特征。
  书中原文: |
    不久家人又发现她的卡斯蒂利亚语说得和印第安土语一样流利，手头活计也干得出色，还会哼唱音乐钟奏出的华尔兹舞曲，配上滑稽的自编歌词。
  网络来源: |
    https://baike.baidu.com/item/西班牙语/398390
    https://zh.wikipedia.org/zh-cn/西班牙语

- 名词: 银版照相术
  解释: |
    又称达盖尔银版法（Daguerreotype），1839年由法国人路易·达盖尔（Louis Daguerre）发明，是人类历史上第一个具有实用价值的摄影方法。其原理是在镀银铜板上形成碘化银感光层，经曝光后用水银蒸汽显影，最终在金属版上形成独一无二的正像。1839年8月19日被公认为摄影术诞生日。银版照片影纹细腻、不可复制，但曝光时间长达15-30分钟。书中梅尔基亚德斯带着银版照相设备来到马孔多，为布恩迪亚全家拍摄了第一张，也是唯一一张全家福。
  书中原文: |
    何塞·阿尔卡蒂奥·布恩迪亚还从未听说过这一发明，他看到自己和全家人的形象在一块闪光的金属版上凝固成永恒，顿时惊诧得说不出话来。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/银版法
    https://baike.baidu.com/item/达盖尔照相法/4318454

- 名词: 诺查丹玛斯
  解释: |
    诺查丹玛斯（Nostradamus，1503-1566），法国文艺复兴时期的犹太裔星象家、医生和预言家，以四行诗体预言集《百诗集》（又称《诸世纪》）闻名于世。其预言诗句措辞模糊、语言混杂，后世常将其附会到重大历史事件（如法国大革命、拿破仑崛起、二战等）中。在文学作品中，诺查丹玛斯常作为神秘知识的象征出现。在《百年孤独》中，梅尔基亚德斯与何塞·阿尔卡蒂奥·布恩迪亚常就诺查丹玛斯的预言展开争论，体现了吉卜赛人的神秘主义世界观。
  书中原文: |
    他父亲和老吉卜赛人为诺查丹玛斯的预言大声争论，瓶子和托盘撞击作响，酸液不时在磕磕碰碰中打翻，溴化银到处流淌，而他仿佛置身于另一个时空。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/诺查丹玛斯
    https://baike.baidu.com/item/诺查丹玛斯

- 名词: 乌头
  解释: |
    乌头为毛茛科乌头属植物的干燥块根，是著名的中药，有大毒。其毒性成分为乌头碱（Aconitine），口服0.2mg即可中毒，2-5mg可致死。乌头经炮制、先煎久煎后可祛风除湿、温经止痛。在《百年孤独》中，乌尔苏拉从母亲那里学来草药的效用，熬制乌头汤试图治疗全家人的失眠症，这反映了拉丁美洲民间草药传统与土著医学知识的交融。在书中，这种传统的草药疗法对虚构的"失眠症"疫病无效，暗示了科学与魔幻、理性与神话之间的张力。
  书中原文: |
    乌尔苏拉从母亲那里学过各种草药的效用，熬制了乌头汤让所有人服下去，可他们仍然睡不着，整天醒着做梦。
  网络来源: |
    https://baike.baidu.com/item/乌头
    https://niohp.chinacdc.cn/zdyyjzt/zdcjwtjd/201405/t20140508_96628.htm

- 名词: 大黄
  解释: |
    大黄为蓼科植物掌叶大黄、唐古特大黄或药用大黄的干燥根和根茎，是中药中重要的泻下药，性味苦寒，归脾、胃、大肠经，有泻下攻积、清热泻火、凉血解毒等功效。因药性峻猛，被称为"将军"。《百年孤独》中，乌尔苏拉将橘汁兑上大黄制成药方，让有食土癖（一种异食癖症状）的丽贝卡空腹服下，配合皮带抽打，最终"治愈"了丽贝卡的食土恶习。这反映了民间用苦味药物"清肝火"的传统观念，也体现了乌尔苏拉作为家族权威人物的严厉与务实。
  书中原文: |
    乌尔苏拉在小锅里放入橘汁，兑上大黄晾了一整夜，次日让她空腹喝下。没人说过这就是治疗食土怪癖的特效药，但乌尔苏拉却相信任何苦味的食物进入空腹都会令肝脏产生反应。
  网络来源: |
    https://baike.baidu.com/item/大黄
    https://dayi.org.cn/qa/254546

- 名词: 纸牌算命
  解释: |
    纸牌算命（Cartomancy）是一种使用扑克牌或塔罗牌进行占卜的民间实践，起源于14-15世纪的欧洲。最初纸牌仅用于游戏，直至18世纪后期才被系统用于占卜。在拉丁美洲，纸牌算命融合了欧洲传统、土著信仰和非洲传统，成为民间文化的重要组成部分。书中庇拉尔·特尔内拉使用纸牌算命，甚至创新地将纸牌从"预测未来"的功能拓展到"追溯过往"，以帮助失眠失忆的马孔多居民在模糊的记忆中重建身份和家族历史。
  书中原文: |
    庇拉尔·特尔内拉在这场造梦运动中出力最多，她成功地将纸牌算命从推演未来应用到追溯过往。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/塔罗牌
    https://baike.baidu.com/item/塔罗牌/24457

- 名词: 阉鸡的故事
  解释: |
    "阉鸡的故事"是《百年孤独》中描写的一种无限循环口头叙事（circular folktale），属于民间"连环故事"（chain tale）中的循环式结构。其核心机制是：讲述者反复询问听众"要不要听阉鸡的故事"，无论听众回答"要"、"不要"、沉默还是离开，讲述者都能将问题原封不动地抛回，形成语言悖论式的死循环。这类"说不完的故事"在世界各地口头传统中均有类似形态，如中国藏族的《说不完的故事》、阿拉伯的《一千零一夜》框架叙事等。在书中，这一故事出现在马孔多居民集体患上失眠症后百无聊赖之时，象征着时间的停滞、意义的虚无，以及拉丁美洲历史"原地打转"的循环困境。
  书中原文: |
    那是一个讲不完的故事，讲故事的人问大家要不要听阉鸡的故事，如果大家说"要"，他就说没让大家说"要"，而是问大家要不要听阉鸡的故事，如果大家说"不要"，他就说没让大家说"不要"，而是问大家要不要听阉鸡的故事；如果大家都不说话，他就说没让大家不说话，而是问大家要不要听阉鸡的故事；而且谁也不许走，因为他没让人走，而是问大家要不要听阉鸡的故事。就这样继续下去，整夜整夜重复这一恶性循环。
  网络来源: |
    https://m.163.com/dy/article/E483H7R505460UD0.html
    https://baike.baidu.com/item/说不完的故事/3242813
