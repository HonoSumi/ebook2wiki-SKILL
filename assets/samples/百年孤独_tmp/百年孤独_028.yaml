- 名词: 九日祭
  解释: |
    九日祭（又称九日敬礼，拉丁文Novena，源自拉丁文"九"）是天主教连续九天的祈祷仪式。
    其起源可追溯至圣经新约：耶稣升天后，圣母玛利亚与宗徒在耶路撒冷连续九天同心合意
    恒切祈祷，等候圣神降临（《宗徒大事录》1:4,14）。数字"九"象征人类的不完美与对天主
    的依赖。九日敬礼分为哀悼、预备、祈求、大赦四大类，对象涵盖天主圣三、圣母、圣人
    和天使，共有32种正式被教会承认的形式。在《百年孤独》中，马孔多居民相信美人儿蕾梅
    黛丝升天是宗教奇迹，点蜡烛、念诵经文并举行九日祭。
  书中原文: |
    大多数人相信这一奇迹，甚至点起蜡烛念诵经文，举行九日祭。
  网络来源: |
    https://www.wanyouzhenyuan.cn/index.php?m=book&tm=3&id=prayer&item=day9-jieshao
    https://www.medjugorjechinese.org/zh-hans/our-lady/novena/
    https://saltandlighttv.org/chinese/our-lady-of-guadalupe-novena/

- 名词: 大丽花
  解释: |
    大丽花（Dahlia pinnata），菊科大丽花属多年生草本植物，原产墨西哥热带高原，是
    墨西哥国花。别名大丽菊、天竺牡丹、地瓜花、大理花、西番莲和洋菊。花色涵盖红、
    黄、橙、紫、白等几乎所有颜色，花径最大可达30-40厘米，全球培育品种超3万个。在
    阿兹特克文明中已被栽培作为食物（块根富含淀粉）和药用，墨西哥人视其为大方、富丽
    的象征，称其为"太阳之花"。花期持久，6-12月开花，温度适宜可全年开放。在《百年
    孤独》中，大丽花伴随美人儿蕾梅黛丝升天时的超现实场景出现（"和她一起离开金龟子
    和大丽花的空間"），增添了神秘与绚丽的意象。
  书中原文: |
    大丽花又叫大丽菊、天竺牡丹、地瓜花、大理花、西番莲和洋菊，是菊科多年生草
    本。……大丽花是墨西哥的国花。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E5%A4%A7%E9%BA%97%E8%8A%B1
