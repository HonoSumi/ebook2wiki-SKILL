- 名词: 尼兰迪亚停战协定
  解释: |
    尼兰迪亚停战协定（Tratado de Neerlandia）是哥伦比亚千日战争（La Guerra de los Mil
    Dias, 1899-1902）期间于1902年10月24日签署的停火协定。自由党与保守党之间长达三年的
    内战，最终以自由党领袖求和告终。该协定仅实现停火，未达成政治共识；同年11月21日，
    双方在美国军舰"威斯康星号"上签署《威斯康星协定》正式结束战争。千日战争最大后果是
    巴拿马于1903年在美国支持下脱离哥伦比亚独立。在《百年孤独》中，奥雷里亚诺·布恩迪亚
    上校签署该协定后深刻幻灭，感叹"我们打了那么多仗，就争取到没让人把房子漆成蓝色"。
    马尔克斯的外公曾亲身参与千日战争，这场战争是其创作的重要历史来源。
  书中原文: |
    自从尼兰迪亚停战协定签订以来，先后上任的都是些从马孔多温和乏味的保守派中
    选出的庸庸碌碌的市长、沦为摆设的法官。
  网络来源: |
    https://es.hujiang.com/new/p739204/
    https://cusp.hk/?p=7854
    https://www.bbc.com/zhongwen/trad/fooc/2016/08/160831_fooc_colombia_farc

- 名词: 香蕉公司
  解释: |
    小说中的"香蕉公司"影射现实中的美国联合果品公司（United Fruit Company），1899年
    成立，迅速垄断中美洲多国香蕉种植和出口产业，控制铁路、港口、电力等基础设施，被称
    为"绿色魔鬼"和"香蕉帝国"。该公司频繁干预所在国内政，最臭名昭著的是1954年游说美国
    CIA策动危地马拉政变。1928年哥伦比亚香蕉种植园工人大罢工遭军政府机枪扫射，数千人
    死伤，这一历史事件直接启发了《百年孤独》中香蕉公司大屠杀的描写。小说中香蕉公司的
    到来标志着马孔多被卷入全球资本主义体系，当地警察被手持砍刀的雇佣兵取代，奥雷里亚
    诺·布恩迪亚上校因此愤怒地高呼要"干掉这些该死的美国佬"。
  书中原文: |
    但自从香蕉公司到来，当地官员被外来势力取代，布朗先生还把他们接进电网鸡笼
    里生活，据他说是去那里享受与他们地位相称的待遇，不用再忍受酷热、蚊虫以及
    市镇上各种不便和匮乏。
  网络来源: |
    https://www.news.cn/20240616/4197951f3677438cb16c4d6763934fd7/c.html
    http://paper.people.com.cn/rmrbhwb/html/2024-06/20/content_26064559.htm
    https://ckxxapp.ckxx.net/pages/2026/03/03/58bfe9cf1cb34e449260542f56a76d86.html

- 名词: 圣灰星期三
  解释: |
    圣灰星期三（Ash Wednesday，又称圣灰礼仪日、大斋首日）是基督教大斋期（四旬期）的
    起始日，在复活节前第46天（即前六周的星期三）。当天神父将前一年圣枝主日祝圣过的
    棕枝烧成灰，祝福后涂在信友额头上画十字，诵念："人哪，你要记住，你原来是灰土，将
    来仍要归于灰土"或"你们要悔改、信从福音"。该仪式象征忏悔、谦卑与生命的脆弱。这一
    天也是天主教规定必须守大小斋的日子。在《百年孤独》中，安东尼奥·伊莎贝尔神甫拿着
    圣灰星期三的灰罐来到布恩迪亚家，想证明灰烬十字可以洗掉，但惨剧已造成恐惧，此后
    家族无人再在圣灰星期三跪于祭坛前。
  书中原文: |
    一天下午他拿着圣灰星期三的灰罐来到家里，要为全家画十字来证明那灰烬完全可
    以用水洗掉。
  网络来源: |
    https://zh.wikipedia.org/zh-cn/%E8%81%96%E7%81%B0%E6%98%9F%E6%9C%9F%E4%B8%89
