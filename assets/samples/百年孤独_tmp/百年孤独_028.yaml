- 名词: 土耳其人大街
  解释: |
    土耳其人大街（Calle de los Turcos）是《百年孤独》中马孔多的一条商业街道，这一称谓
    有真实历史背景：19世纪末至20世纪初，大量来自奥斯曼帝国（今叙利亚、黎巴嫩、巴勒斯
    坦等地）的阿拉伯移民手持奥斯曼帝国护照涌入拉丁美洲，被当地人统称为"Los Turcos"
    （土耳其人）。这一称呼最初带有排斥和歧视色彩，他们主要从事小本生意，聚居的商业街
    就被称为"土耳其人大街"。在小说中，这条街象征外来商业文明对封闭的马孔多的冲击，是
    香蕉公司时期外乡人聚集、重大事件发生的关键场所。如今在拉美，"Los Turcos"的歧视色
    彩已淡化，阿拉伯裔在拉美政界、商界、文艺界人才辈出。
  书中原文: |
    当晚，那男人在土耳其人大街吹嘘自己的勇气，炫耀自己的幸运，可几分钟后一匹
    马就从他胸前踏过，众多外乡人看着他在街上垂死挣扎，直到在自己吐出的鲜血里
    窒息。
  网络来源: |
    https://www.aa.com.tr/en/americas/descendants-of-ottomans-in-latin-america-los-turcos/2880098
    http://asc.zisu.edu.cn/info/1011/1621.htm
