- 名词: 好汉弗朗西斯科
  解释: |
    （Francisco el Hombre）哥伦比亚民间传说中的传奇游吟诗人，被视为哥伦比亚传统音乐瓦莱纳托（Vallenato）的鼻祖。传说他曾在月夜与魔鬼进行手风琴对歌决斗，最终通过背颂《使徒信经》击败魔鬼，获称"El Hombre"（好汉/真男人）。加西亚·马尔克斯在《百年孤独》中将其写入马孔多，塑造成一个将近两百岁、游走四方吟唱歌谣的江湖艺人，通过歌谣传递各地的消息与新闻。加西亚·马尔克斯曾将《百年孤独》形容为"一部四百页的瓦莱纳托歌谣"。
  书中原文: |
    数月后，好汉弗朗西斯科回来了，他是个将近两百岁的江湖艺人，常来马孔多吟唱自编的歌谣。
  网络来源: |
    https://wiki-gateway.eudic.net/wikipedia_en/Francisco_el_Hombre.html
    https://colombiareports.com/the-legend-of-vallenato-lives-on-in-francisco-el-hombre-festival/
    https://www.independent.co.uk/news/obituaries/rafael-escalona-singer-and-composer-who-inspired-one-hundred-years-of-solitude-1690654.html
    https://theworld.org/stories/2016/05/05/gabriel-garc-m-rquez-and-his-connection-vallenatos

- 名词: 即兴赛歌会
  解释: |
    拉丁美洲传统民间音乐中的即兴对歌竞技形式。在阿根廷、乌拉圭称为"payada"（巴亚达），表演者称为"payador"；在哥伦比亚瓦莱纳托音乐中称为"contrapunteo"（对位竞唱）或"piqueria"。歌手用吉他或手风琴伴奏，即兴编创诗句应答对方，比拼诗才与音乐技巧，可持续数小时。好汉弗朗西斯科正是在即兴赛歌会上以音乐战胜魔鬼而闻名。
  书中原文: |
    人们称他为好汉弗朗西斯科，是因为他曾在一次即兴赛歌会上击败魔鬼，至于其真名实姓则无人知晓。
  网络来源: |
    https://en.wikipedia.org/wiki/Payador
    https://remezcla.com/features/music/dancing-with-the-devil-how-el-diablo-shaped-colombias-sonic-imagination/

- 名词: 罗利爵士
  解释: |
    即沃尔特·雷利爵士（Sir Walter Raleigh，约1552—1618），英国探险家、作家、诗人，伊丽莎白一世宠臣。曾探索北美东海岸并建立弗吉尼亚殖民地，将马铃薯和烟草引入英格兰。1595年前往南美洲圭亚那地区寻找传说中的黄金城"埃尔多拉多"。后因詹姆斯一世猜忌被囚伦敦塔多年，最终被处死。书中提到他曾在圭亚那赠予一架古老手风琴。
  书中原文: |
    他用苍老走调的声音唱出世事变迁，以当年罗利爵士在圭亚那相赠的那架古老手风琴伴奏。
  网络来源: |
    https://baike.baidu.com/item/沃尔特·雷利/2689859
    https://zh.wikipedia.org/wiki/沃尔特·罗利

- 名词: 甘蔗酒
  解释: |
    西班牙语称"Aguardiente"（字面意为"火水"），拉丁美洲以甘蔗为原料的蒸馏烈酒，酒精度一般在29%—60%之间。在哥伦比亚，甘蔗酒常加入茴香（anise）调味，具有独特的甘草香气，酒精度约24%—29%，习惯纯饮。它是拉美民间社交和节日中的重要饮品，在小说中卡塔利诺以碗盛装向顾客兜售。
  书中原文: |
    卡塔利诺耳上别了一朵毡绒玫瑰，向听众兜售碗盛的甘蔗酒，并不失时机地靠近那些男人，将手放到不该放的地方。
  网络来源: |
    https://www.enjoycocktail.com/Cocktail_Details/wid/1636
    https://www.dictionary.com/browse/aguardiente

- 名词: 银版照相术
  解释: |
    即达盖尔银版法（Daguerreotype），1839年由法国人路易·达盖尔发明的世界上第一种商业上成功的摄影技术。工艺为在镀银铜板上用碘蒸气光敏化后曝光，再以汞蒸气显影。影像细腻逼真但不可复制。法国政府放弃专利将技术公之于众，1839年8月19日被公认为摄影术诞生日。小说中吉卜赛人梅尔基亚德斯用此技术在金属版上拍摄马孔多的景物。
  书中原文: |
    梅尔基亚德斯已经把马孔多所有可照的都照在金属版上，然后把银版照相术工作室让给了臆想联翩的何塞·阿尔卡蒂奥·布恩迪亚。
  网络来源: |
    https://zh.wikipedia.org/wiki/银版摄影法
    https://baike.baidu.com/item/银版摄影法/1603928

- 名词: 诺查丹玛斯
  解释: |
    诺查丹玛斯（Nostradamus，1503—1566），法国犹太裔预言家、医生和占星家，原名米歇尔·德·诺特雷达姆。曾在蒙彼利埃大学学医，行医期间对抗黑死病。1555年出版预言集《百诗集》（Les Propheties，常误译为《诸世纪》），收录942首四行体诗，语言晦涩模糊，后世常将其附会于重大历史事件。小说中梅尔基亚德斯致力于破解诺查丹玛斯的预言，从中读出马孔多的未来。
  书中原文: |
    梅尔基亚德斯在破解诺查丹玛斯预言方面取得了深入进展。
  网络来源: |
    https://baike.baidu.com/item/诺查丹玛斯/1242595
    https://zh.wikipedia.org/wiki/Nostradamus

- 名词: 里正
  解释: |
    西班牙语原文为"Corregidor"（原意为"纠正者"），是西班牙帝国在拉丁美洲殖民地设置的地方行政与司法官员。14世纪起源于卡斯蒂利亚，16世纪引入美洲殖民地。城市督办（corregidor de españoles）主管西班牙人聚居城市事务，乡村督办（corregidor de indios）管辖印第安人社区并征收赋税摊派劳役，常以腐败著称。18世纪波旁改革后被监政官（intendant）制度取代。中文译者借中国唐宋时期的基层官职"里正"来对应翻译。
  书中原文: |
    堂阿波利纳尔·摩斯科特，那位里正，已经悄无声息地来到马孔多。
  网络来源: |
    https://www.britannica.com/topic/corregidor-Spanish-official
    https://en.wikipedia.org/wiki/Corregidor_(position)

- 名词: 大泽区
  解释: |
    西班牙语原文为"la Ciénaga"，在哥伦比亚指代圣玛尔塔大沼泽地区（Ciénaga Grande de Santa Marta）及附近的城镇谢纳加（Ciénaga）。该地区是加勒比海沿岸的沼泽湿地，也是1928年联合果品公司香蕉大屠杀的发生地，这一真实历史事件被马尔克斯写入《百年孤独》成为香蕉公司大屠杀情节的素材。中文译者将其意译为"大泽区"。"Ciénaga"在西班牙语中本义即为"沼泽"。
  书中原文: |
    他通过这些歌谣不厌其详地讲述旅行途中的各地见闻，从马孔多直讲到大泽区的边界。
  网络来源: |
    https://baike.baidu.com/item/谢纳加/3083180
    https://www.swisscontact.org/en/news/natural-macondo-colombia-inspiration-cienaga-the-capital-of-magic-realism
