- 名词: 击弦古钢琴
  解释: |
    击弦古钢琴（Clavichord，又称小键琴、楔槌键琴）是一种历史悠久的键盘乐器，14至18世纪盛行于欧洲，是现代钢琴的重要前身。其发声原理独特——琴键末端的金属切线从下方敲击琴弦，手指不离键则切线持续抵住琴弦。音量极小（pp至mp），从未进入音乐厅或教堂，主要作为家庭乐器使用。它能够实现独特的"揉弦"效果（Bebung），通过改变手指压力使音高产生波动，是所有键盘乐器中最能表达细腻情感的乐器之一。1601年意大利传教士利玛窦曾将击弦古钢琴进献给明朝万历皇帝。
  书中原文: |
    三个月后，奥雷里亚诺第二和费尔南达把梅梅送到学校，带回一架击弦古钢琴代替了原先的自动钢琴。
  网络来源: |
    https://baike.baidu.com/item/击弦古钢琴
    https://zh.wikipedia.org/wiki/小键琴

- 名词: 香蕉公司（联合果品公司）
  解释: |
    联合果品公司（United Fruit Company）成立于1899年，是美国在拉丁美洲的跨国农业垄断企业，主要经营香蕉等热带水果的种植、运输与销售，鼎盛时期垄断世界约75%的香蕉市场。该公司在洪都拉斯、危地马拉、哥伦比亚、哥斯达黎加等国拥有广阔地产和铁路、电报、发电厂等基础设施，自订法律、自设军营，被称为"国中之国"，中美洲人民称之为"绿色魔鬼"或"章鱼"。1928年哥伦比亚香蕉种植园工人大罢工遭军政府机枪镇压，数千人死亡，这一事件是《百年孤独》中香蕉公司罢工 massacre 情节的历史原型，也是"香蕉共和国"一词的来源。1970年公司与AMK合并后更名为联合商标公司，1984年改名为金吉达品牌国际公司（Chiquita Brands International）。
  书中原文: |
    一直要等到多年以后香蕉公司离开时，昔日的生活才得以恢复。
  网络来源: |
    https://baike.baidu.com/item/联合果品公司
    https://zh.wikipedia.org/zh-hans/联合果品公司

- 名词: 昆比安巴舞
  解释: |
    昆比安巴舞（Cumbiamba）与哥伦比亚最具代表性的民族舞蹈昆比亚舞（Cumbia）密切相关。"Cumbiamba"一词既指昆比亚舞，也特指人们聚在一起演奏昆比亚音乐、点燃篝火、通宵跳舞欢庆的民间聚会形式。该舞蹈起源于哥伦比亚加勒比海沿岸地区，拥有超过400年历史，融合了非洲奴隶带来的节奏、土著印第安人的音乐元素和西班牙殖民者的影响。舞蹈特点是2/4拍节奏、小步拖曳式移动（源于奴隶时期脚镣限制）和跨部环状运动，表演时舞者常手持蜡烛或火把。词源源自西非班图语"nkumba"（肚脐，强调腰部动作）或"cumbe"（舞蹈）。有两种形式：粗犷的乡村昆比亚和类似波尔卡的舞会昆比亚。
  书中原文: |
    从车站回家的路上，他像跳昆比安巴舞时即兴邀请舞伴一样将所有碰见的人拉去赴宴，不管是本地人还是外乡人，认识的还是即将认识的，一概都在邀请之列。
  网络来源: |
    http://ilas.cssn.cn/sjk/gnwlmyjcgsjk/200810/t20081029_2296869.shtml
    https://www.westword.com/arts-culture/cumbiamba-my-lord-5093090/

- 名词: 斗鸡
  解释: |
    斗鸡是一种传统的民间血腥娱乐活动，在拉丁美洲（尤其是哥伦比亚、墨西哥、委内瑞拉、秘鲁等国）有着深厚的文化根基。斗鸡前需要经过繁琐的准备工序：装假鸡爪、消毒、拔除胸部以下的羽毛、上油、称重分级配对。在哥伦比亚，斗鸡至今仍在许多地区流行，每周有固定比赛日。斗鸡在拉丁美洲不仅是一种娱乐，更被视为传统文化的重要组成部分，但近年来因动物保护意识提升而面临争议，哥伦比亚已决定在2027年全面禁止斗牛活动。在《百年孤独》中，何塞·阿尔卡蒂奥第二曾拥有优异的斗鸡，后因加入香蕉公司而将斗鸡全部出售。
  书中原文: |
    连小叔子何塞·阿尔卡蒂奥第二，也成为她歧视之下的牺牲品，因为他早在第一波狂潮中就将自己优异的斗鸡全部出手，当上了香蕉公司的庄园监工。
  网络来源: |
    https://www.chinanews.com/tp/news/photo_special/2012/06-26/26394.shtml
    https://dictionary.chienwen.net/word/斗鸡

- 名词: 木薯
  解释: |
    木薯（Cassava/Yuca，学名Manihot esculenta）原产于亚马逊地区，拥有8000至10000年的种植历史，与马铃薯、甘薯并称世界三大薯类作物。木薯是拉丁美洲和加勒比地区重要的主食来源，但生木薯含有毒素（氢氰酸），必须经过去皮、磨碎、压榨去汁、加热等工序处理后方可食用。2024年12月，古巴、多米尼加、海地、洪都拉斯和委内瑞拉五国联合提名的"制作及食用木薯面包的传统知识与实践"被列入联合国教科文组织人类非物质文化遗产代表作名录。在巴西，木薯粉（Farinha/Farofa）是日常餐桌必备，北部地区常将木薯粉炒成配料撒在食物上。
  书中原文: |
    在最初的二十四小时里，奥雷里亚诺第二就着木薯、山药和烤香蕉吃掉一头牛，喝下一箱半香槟，对胜利充满信心。
  网络来源: |
    https://news.foodmate.net/2024/12/wap_704394.html
    https://baike.baidu.com/item/木薯

- 名词: 寿衣
  解释: |
    寿衣是为亡人入殓时穿戴的衣物，在拉丁美洲文化中具有深厚的象征意义。在《百年孤独》中，阿玛兰妲日复一日地织了拆、拆了织寿衣，这一行为成为小说的标志性意象之一。这一情节并非凭空虚构——马尔克斯的姨妈曾突然坐下织起寿衣，织好后躺下安详离世，家人用她自织的寿衣为其入殓。寿衣在小说中象征布恩迪亚家族的孤独宿命、时间的循环停滞，以及对死亡的从容接纳。阿玛兰妲的织寿衣与奥雷里亚诺上校反复熔铸小金鱼形成文学对称，共同揭示了"这个家族的历史不过是一系列无可改变的重复"的核心主题。
  书中原文: |
    正是在这个时候阿玛兰妲开始织起自己的寿衣。
  网络来源: |
    https://wap.cnki.net/touch/web/Journal/Article/ZXTB202312016.html
    https://www.gmw.cn/01ds/1998-07/29/GB/209%5eDS609.htm

- 名词: 灰烬十字
  解释: |
    灰烬十字源自天主教的圣灰礼仪（圣灰星期三/Ash Wednesday），是四旬期（大斋期）的第一天。神父用前一年棕枝主日祝圣过的棕枝焚烧成的灰烬，在信众额头上划十字记号，同时念诵"你原是灰土，将来还要归于灰土"或"你当远离罪恶，效忠基督"。这一礼仪源自《圣经·旧约》中的披麻蒙灰的忏悔传统，象征肉体的脆弱与死亡、对罪过的忏悔以及全心归向天主。在《百年孤独》中，阿玛兰妲"在前额上刻着代表贞洁的灰烬十字"，暗示她如同领受了圣灰礼仪一般，以示对世俗情感的弃绝和对孤独的持守。
  书中原文: |
    身材高挑痩削，神情高傲，总穿着宽松的泡泡纱裙，顽强地抗拒岁月流逝以及苦痛记忆的侵蚀，阿玛兰妲仿佛在前额上刻着代表贞洁的灰烬十字。
  网络来源: |
    http://www.chinagospeltimes.com/article/index/id/66578
    http://chinagospeltimes.com/article/index/id/78446

- 名词: 圣牌
  解释: |
    圣牌是天主教的重要宗教器物（属于"圣仪"Sacramentals），通常为金属制成的小牌子，上面刻有耶稣、圣母玛利亚或圣人的画像和铭文。圣牌本身不具"法力"，其功效源于佩戴者的信德和教会的祈祷，作用是提醒信徒效法圣人德行、激发信德、预备人领受圣事恩宠。常见的圣牌种类包括：显灵圣牌（1830年圣母在巴黎显现要求铸造）、圣本笃圣牌（具有驱魔意义，铭文包含"愿圣十字架是我的光""撒殚退去"等拉丁文缩写）、圣衣圣牌等。在《百年孤独》中，费尔南达佩戴的圣牌是其所继承的保守天主教传统的象征。
  书中原文: |
    对他妻子尤为不利的是，当她因颜色阴郁垂至脚踵的长袍、散发陈腐气息的诸多圣牌和不合时宜的高傲显得未老先衰，那位情妇却身裹华丽的真丝衣裙，眼中因旧情重燃漾出虎纹一样的光彩，像是再度焕发青春。
  网络来源: |
    https://baike.baidu.com/item/圣本笃圣牌
    https://ccccn.org/kuanpin/2010-06-17/7114.html

- 名词: 主教式华盖
  解释: |
    主教式华盖（Baldachin/Baldacchino）是天主教礼仪中的重要器物，是一种装饰性遮盖物，用于覆盖祭坛、主教宝座等，以彰显神圣尊荣。英文"Baldachin"一词源自产自巴格达（Baghdad）的华丽织锦"Baldacc"。在教堂中，主教宝座上的华盖标志着主教在地方教会中的牧职权威。最著名的华盖是贝尔尼尼1623-1634年间在罗马圣彼得大教堂建造的青铜华盖，高近30米、重约6吨。在《百年孤独》中，奥雷里亚诺第二为情妇佩特拉·科特斯购买了一张带有主教式华盖的婚床，这一细节讽刺性地将天主教的神圣器物挪用为世俗情欲的装饰。
  书中原文: |
    奥雷里亚诺第二从偷偷拜访法国女郎的几次经历中受到启发，为佩特拉·科特斯买了一张带主教式华盖的床，在窗前挂起天鹅绒窗帘，在天花板和墙壁上镶满水晶镜面。
  网络来源: |
    https://zh.wikipedia.org/zh-hk/宗座華蓋
    https://www.newadvent.org/cathen/03297c.htm

- 名词: 土耳其人（拉丁美洲西班牙语"Turco"的用法）
  解释: |
    在拉丁美洲西班牙语中，"Turco"（土耳其人）并非指真正的土耳其人，而是当地人对来自奥斯曼帝国移民（主要是叙利亚人、黎巴嫩人等阿拉伯人）的统称。19世纪末至20世纪初，大量阿拉伯人因逃避奥斯曼帝国的经济困窘和政治压迫而移民拉丁美洲，由于他们持有奥斯曼帝国（土耳其）护照，当地人便统称其为"Los Turcos"。这一称呼早期带有歧视色彩，后来逐渐中性化。许多著名的拉美政商界和文艺界名人都是"Turco"后裔，包括哥伦比亚歌手夏奇拉、萨尔瓦多总统布克尔、墨西哥富豪斯利姆等。《百年孤独》文本中以"土耳其人量一码细棉布时那样耍花招"来形容旧日商贩的诚实，反映的就是这种"Turco"行商的文化刻板印象。
  书中原文: |
    并不象土耳其人量一码细棉布时那样耍花招，所以那时的情况就和现在不一样。
  网络来源: |
    https://www.aa.com.tr/en/americas/descendants-of-ottomans-in-latin-america-los-turcos/2880098
    https://zhuanlan.zhihu.com/p/437940357

- 名词: 大泽区（谢纳加 / Ciénaga）
  解释: |
    大泽区（西班牙语Ciénaga，意为"沼泽"，中文又译作谢纳加）是哥伦比亚北部马格达莱纳省的一座城市和港口，位于加勒比海东南海岸，西邻圣玛尔塔大沼泽（Ciénaga Grande de Santa Marta，哥伦比亚加勒比海地区最大的沿海泻湖三角洲生态系统）。该地区是重要的香蕉产区，1928年12月6日在此发生了著名的香蕉种植园工人罢工及屠杀事件，这一历史事件成为加西亚·马尔克斯《百年孤独》中香蕉公司罢工情节的现实原型。曾有观点认为，谢纳加附近的阿拉卡塔卡（马尔克斯的故乡）是小说中马孔多的灵感来源。在书中，奥雷里亚诺第二的名声"越出大泽区的边界"，意指他的名声传遍了这一区域的周边。
  书中原文: |
    耸人听闻的贪食，一掷千金的豪气，无人可比的好客，他的名声越出大泽区的边界，吸引了沿海一带最知名的老饕。
  网络来源: |
    https://baike.baidu.com/item/谢纳加
    https://hero.epa.gov/reference/7327553/
