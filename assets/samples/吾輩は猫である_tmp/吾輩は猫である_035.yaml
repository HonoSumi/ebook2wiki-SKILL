- 名词: 洗湯
  解释: "日语中'洗湯'（せんとう）指公共澡堂，明治时期城市中广泛存在的平民洗浴设施。明治时代（1868-1912），随着城市人口增长和卫生观念提升，公共澡堂成为市民日常生活的必需场所。明治政府在'文明开化'政策下曾颁布禁止男女混浴令，以迎合西方文明标准。澡堂通常以高大烟囱（とよ竹）为标识，燃料为松木柴和石炭。夏目漱石在本段通过猫拟探索澡堂的过程，对明治时期汤屋文化进行了生动描绘。"
  书中原文: "横町を左へ折れると向うに高いとよ竹のようなものが屹立して先から薄い煙を吐いている。これ即ち洗湯である。"
  网络来源: "https://www.japanvisitor.com/japanese-culture/sento"

- 名词: 手拭
  解释: "手拭（てぬぐい）是日本传统棉质薄布手巾，尺寸约35cm×90cm，是明治时期日常生活的必备品。其历史可追溯至平安时代，最初用于宗教用途擦拭佛像；江户时代普及为平民随身用品；明治时代因注染（ちゅうせん）染色工艺的诞生，手拭的图案设计极大丰富，实现了量产，成为生活必需品。手拭用途多样，可用于擦手擦脸、包裹物品、扎头巾等，也是日本澡堂文化的标志性物品。在夏目漱石笔下，主人带着手拭和肥皂去澡堂，是明治知识分子的日常写照。"
  书中原文: "うちの主人は時々手拭と石鹼をもって飄然といずれへか出て行く事がある"
  网络来源: "https://craft.city.taito.lg.jp/center/tw/list/手拭tw/"

- 名词: 石鹼
  解释: "石鹼（せっけん）即肥皂，是明治时代从西方传入日本的清洁用品。'鹼'字为旧字体，意为碳酸钠（天然碱），战后汉字简化后变为'石鹸'。1873年（明治6年），堤磯右衛門在横滨创立日本最早的肥皂制造所并成功量产。1890年，花王（当时为长濑商店）开始销售'花王石鹼'。明治时期肥皂作为文明开化的象征之一逐渐普及，但价格较贵，普通家庭使用尚不普遍。文中主人携带手拭和石鹼去澡堂，反映了明治时期中产阶级的卫生习惯。"
  书中原文: "うちの主人は時々手拭と石鹼をもって飄然といずれへか出て行く事がある"
  网络来源: "https://zh.m.wiktionary.org/zh-hant/石鹼"

- 名词: 帝国ホテル
  解释: "帝国饭店（帝国ホテル）是日本最具历史意义的西洋式酒店之一，1890年（明治23年）11月3日正式开业。由涩泽荣一、大仓喜八郎等商界领袖筹建，最初作为迎接外国贵宾的'国家迎宾馆'，延续了鹿鸣馆的迎宾功能。第一代本馆由日本建筑师渡边让设计，为德国新文艺复兴风格的三层木骨砖造建筑。帝国饭店是明治文明开化政策的标志性产物，代表了日本近代化中西式建筑与餐饮服务的最高标准。夏目漱石在此藉猫之口讽刺穿礼服去帝国饭店炫耀的肤浅西化风气。"
  书中原文: "現にこの不合理極まる礼服を着て威張って帝国ホテルなどへ出懸けるではないか。"
  网络来源: "https://zh.m.wikipedia.org/zh-hant/帝國飯店"

- 名词: 呉服屋
  解释: "吴服屋（ごふくや）是日本传统和服面料的专营店铺。'吴服'一词源自古代日本对中国江南地区东吴的称呼，最初指从中国江南经朝鲜传入日本的丝织品。明治时代，随着洋服大量涌入日本，'和服'这一概念与'洋服'相对而诞生，吴服屋作为传统纺织品交易场所承担了保存和传承民族服饰文化的功能。著名的三越百货等大型百货公司最初也是从吴服店起家。文中提到吴服屋购买黑布用来遮盖裸体雕像，反映了明治时期对裸体的禁忌与遮掩。"
  书中原文: "呉服屋へ行って黒布を三十五反八分七買って来て例の獣類の人間にことごとく着物をきせた。"
  网络来源: "https://zh.wikipedia.org/zh-cn/吴服"

- 名词: 反
  解释: "反（たん）是日本传统布料计量单位。作为和服面料的基本单位，一反的标准尺寸约为宽度34-42cm、长度10-11米。这一长度大致相当于制作一件成人和服所需的布料量，因此和服布料统称为'反物'（たんもの）。文中提到的'三十五反八分七'是三十五反、八分、七厘之意，'分'和'厘'是小于'反'的辅助单位。这一传统计量体系在明治时代仍广泛使用，展现了西方米制普及前日本传统的度量衡制度。"
  书中原文: "呉服屋へ行って黒布を三十五反八分七買って来て例の獣類の人間にことごとく着物をきせた。"
  网络来源: "https://zh.wikipedia.org/zh-cn/吴服"

- 名词: 台湾の生蕃
  解释: "'生蕃'（せいばん）是日本殖民台湾时期（1895-1945）对台湾高山族原住民的歧视性分类用语，与'熟蕃'（已汉化的平埔族）相对。日本总督府将台湾居民分为内地人（日本人）、本岛人（闽南人、客家人）、熟蕃（平埔族）、生蕃（高山族）等级别。1935年后官方用语改为'高砂族'。夏目漱石在文中将澡堂里的裸体人群比喻为'台湾の生蕃'和'二十世紀のアダム'，反映了当时日本社会对台湾殖民地的认知以及对裸体的文化态度，是明治时期殖民话语在文学中的体现。"
  书中原文: "この硝子窓の中にうじゃうじゃ、があがあ騒いでいる人間はことごとく裸体である。台湾の生蕃である。二十世紀のアダムである。"
  网络来源: "https://ihc.cip.gov.tw/EJournal/EJournalCat/198"

- 名词: 紳士養成方
  解释: "《紳士養成方》（しんしようせいほう、全称《紳士養成方略》）是夏目漱石在《我是猫》中虚构的讽刺性书籍。书中猫自称在'绅士养成方'第二卷第一章第五页读到'聪明人都是从后门突袭'，以此为自己从澡堂后门潜入的行为辩护。这是漱石典型的讽刺手法——通过凭空捏造的权威典籍来讽刺明治时期知识分子追求表面绅士风度的伪善。明治时代社会盛行'绅士'观念，大批翻译过来的西方礼仪指南热销，漱石以此虚构的书名对这股浅薄的西化风潮进行了巧妙的嘲讽。"
  书中原文: "紳士養成方の第二巻第一章の五ページにそう出ているそうだ。"
  网络来源: "https://neodb.social/book/7JouQt5MYWRkEmMPlFLA8h"
