- 名词: ニコラス・ニックルベー
  解释: '英国作家查尔斯·狄更斯（Charles Dickens）的第三部长篇小说，全名为《The Life and Adventures of Nicholas Nickleby》。1838年至1839年以月刊连载形式出版。作品通过主人公尼古拉斯·尼克贝的遭遇，揭露了英国约克郡寄宿学校的虐待儿童问题，是狄更斯社会批判小说的代表作之一。'
  书中原文: 'せんだってある学生にニコラス・ニックルベーがギボンに忠告して彼の一世の大著述なる仏国革命史を仏語で書くのをやめにして英文で出版させたと言ったら'
  网络来源: https://www.britishlibrary.cn/zh-hk/works/nicholas-nickleby/

- 名词: ギボン
  解释: '爱德华·吉本（Edward Gibbon，1737–1794），18世纪英国最著名的历史学家，启蒙运动的代表人物。以巨著《罗马帝国衰亡史》（The History of the Decline and Fall of the Roman Empire，全6卷，1776–1788年出版）闻名，该书涵盖从2世纪五贤帝时期到1453年君士坦丁堡陷落约1300年的历史，被视为现代历史学的奠基之作。'
  书中原文: 'せんだってある学生にニコラス・ニックルベーがギボンに忠告して彼の一世の大著述なる仏国革命史を仏語で書くのをやめにして英文で出版させたと言ったら'
  网络来源: https://www.britannica.com/biography/Edward-Gibbon

- 名词: 仏国革命史
  解释: '全名为《The French Revolution: A History》，是英国作家、历史学家托马斯·卡莱尔（Thomas Carlyle，1795–1881）于1837年出版的三卷本历史著作。该书以独特的文学化叙事风格描写了法国大革命，对后世历史写作和文学（如狄更斯的《双城记》）产生了深远影响。原文中美学家的谎言说这是吉本的作品，实为卡莱尔所作。'
  书中原文: '彼の一世の大著述なる仏国革命史を仏語で書くのをやめにして英文で出版させたと言ったら'
  网络来源: https://www.britannica.com/topic/The-French-Revolution-by-Carlyle

- 名词: ハリソン
  解释: '弗雷德里克·哈里森（Frederic Harrison，1831–1923），英国法学家、历史学家、哲学家和作家。他是实证主义哲学的倡导者，主要著作包括《历史的意义》（The Meaning of History）、《奥利弗·克伦威尔传》以及历史小说《塞奥法诺：十世纪的十字军》（Theophano, the crusade of the tenth century, 1904）等。'
  书中原文: 'せんだって或る文学者のいる席でハリソンの歴史小説セオファーノの話しが出たから'
  网络来源: https://id.loc.gov/authorities/names/n50025870.html

- 名词: セオファーノ
  解释: '弗雷德里克·哈里森（Frederic Harrison）于1904年出版的历史小说，全名为《Theophano: The Crusade of the Tenth Century》。小说以10世纪东罗马帝国（拜占庭帝国）为背景，讲述了拜占庭公主塞奥法诺（Theophano, 958–991）被迫与神圣罗马皇帝奥托二世政治联姻的故事，是一部浪漫主义历史小说。'
  书中原文: '僕はあれは歴史小説の中で白眉である。ことに女主人公が死ぬところは鬼気人を襲うようだと評したら'
  网络来源: https://catalog.princeton.edu/catalog/SCSB-10913101

- 名词: レオナルド・ダ・ヴィンチ
  解释: '列奥纳多·达·芬奇（Leonardo da Vinci，1452–1519），意大利文艺复兴时期的全才型人物，集画家、雕塑家、建筑师、科学家、发明家于一身。代表作有《蒙娜丽莎》《最后的晚餐》等。书中提到他教导弟子观察寺院墙壁上的污渍来激发创作灵感，这源自达·芬奇笔记中的真实记载，是艺术史上关于"有意识的偶然性"的著名方法论。'
  书中原文: 'レオナルド・ダ・ヴィンチは門下生に寺院の壁のしみを写せと教えた事があるそうだ'
  网络来源: https://www.tate.org.uk/tate-etc/issue-21-spring-2011/deliberate-accident-art

- 名词: 雪隠
  解释: '日语中厕所的雅称和古语，读作"せっちん"。语源来自中国禅宗典故：宋代高僧雪窦重顕（明覚禅師）年轻时曾在杭州灵隐寺担任打扫厕所的"净头"之职三年，其间大彻大悟。取"雪窦"之"雪"和"灵隐"之"隐"合成"雪隐"。禅宗传入日本后，该词在茶道和日常用语中固定为厕所的雅称。'
  书中原文: 'なるほど雪隠などに這入って雨の漏る壁を余念なく眺めていると、なかなかうまい模様画が自然に出来ているぜ'
  网络来源: https://www.nabunken.go.jp/org/bunka/jgd/pages/Privy.html

- 名词: 山茶花
  解释: '山茶花（学名Camellia sasanqua），日语读作"サザンカ"，是日本固有种常绿灌木/小乔木，属于山茶科山茶属。花朵有香气，花瓣逐一散落（与椿花的整朵掉落不同）。花期在秋季至初冬（10月–12月），是日本俳句中的冬季季语。书中以山茶花凋零的描写暗示季节转换。'
  书中原文: 'つくばいに近く代る代る花弁をこぼした紅白の山茶花も残りなく落ち尽した'
  网络来源: https://www.flower-db.com/zh/flowers/camellia-sasanqua

- 名词: 征露
  解释: '日语词汇，读作"せいろ"，意为"征讨俄罗斯"。"露"是"露西亜"（Russia）的简称。该词在日俄战争（1904–1905年）期间广泛使用。著名的肠胃药"正露丸"原名即为"征露丸"，意思是为征讨俄国的士兵准备的药物，战后因外交考虑改为同音字"正露丸"。'
  书中原文: '今年は征露の第二年目だから大方熊の画だろうなどと気の知れぬことをいってすましているのでもわかる'
  网络来源: https://jlearn.net/dictionary/%e5%be%81%e9%9c%b2

- 名词: 椎茸
  解释: '香菇（学名Lentinula edodes），日语读作"しいたけ"。名称来源于其原生于"椎の木"（槠树、栲树）的枯木。东亚洲原产，是世界上最广泛栽培的食用菌之一。中国宋代（1209年）已有栽培记录，日本在1942年由森喜作博士发明"种驹"（菌种木块）技术，使稳定人工栽培成为可能。富含香菇多糖（Lentinan），具有免疫调节作用。'
  书中原文: 'ええ実はある所で椎茸を食いましてね。椎茸の傘を前歯で嚙み切ろうとしたらぼろりと歯が欠けましたよ'
  网络来源: https://en.wikipedia.org/wiki/Shiitake

- 名词: 木枯
  解释: '日语中"木枯らし"（读作"こがらし"），指晚秋至初冬吹的强烈寒冷北风。字面意为"使树木枯萎的风"。是日本俳句中的冬季季语，常用于表达冬天的到来和萧瑟氛围。汉字也写作"凩"，是日本自创的国字，由"木"与"凵"（风）合成。'
  书中原文: '三間半の南向の椽側に冬の日脚が早く傾いて木枯の吹かない日はほとんど稀になってから'
  网络来源: https://dictionary.cambridge.org/zht/%E8%A9%9E%E5%85%B8/japanese-english/%E6%9C%A8%E6%9E%AF%E3%80%85%E3%81%97
