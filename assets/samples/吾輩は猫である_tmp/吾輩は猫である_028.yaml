- 名词: 五分刈
  解释: 日本明治时代流行的短发发型之一。"刈"意为剪割，"五分"约合1.5厘米，指将头发剪得很短的发型。明治维新后，政府颁布"散髪脱刀令"废除传统丁髷（发髻），西洋式短发成为文明开化的象征。五分刈和三分刈等短发在军人、学生中尤为常见，体现了明治时期日本男性发型的西化变迁。
  书中原文: "このほか五分刈、三分刈、一分刈さえあると云う話だから、しまいには頭の裏まで刈り込んでマイナス一分刈、マイナス三分刈などと云う新奇な奴が流行するかも知れない。"
  网络来源: https://zh.m.wikipedia.org/zh-cn/%E6%95%A3%E9%AB%AE%E8%84%AB%E5%88%80%E4%BB%A4

- 名词: 七分三分
  解释: 日本明治时代至现代常见的男性发型，将头发按左三右七（或反之）的比例分界。明治时期，随着西洋短发文化的传入，日本男性不再梳传统丁髷，转而采用带分界的短发造型。七三分因左侧发量较少（因多数人发旋偏左，左发量自然较少）而得名，后来成为日本学界、政界人士标准发型。
  书中原文: "等分にしないと七分三分の割合で頭蓋骨の上へ人為的の区劃を立てる。"
  网络来源: https://blog.sina.com.cn/s/blog_48670cb20102em41.html

- 名词: 髷
  解释: 日本传统发髻，将头发束起盘在头顶或脑后，以簪固定的一种发型。江户时代武士和庶民普遍梳丁髷（ちょんまげ）。明治四年（1871年），政府颁布"散髪脱刀令"推动断发，传统发髻逐渐被洋式短发取代。夏目漱石在本段中以猫的视角嘲讽人类在发型上费尽心思的荒诞行为，髷作为传统发型被提及。
  书中原文: "髷の重みだけでも横になりたくなりますよ"
  网络来源: https://wapbaike.baidu.com/item/%e6%95%a3%e5%8f%91%e8%84%b1%e5%88%80%e4%bb%a4

- 名词: 暑中休暇
  解释: 日本明治时期引入近代学校制度后设立的暑假制度。明治五年（1872年）颁布学制，确立了近代教育体系，其中包含夏季休假。在明治时代，"暑中休暇"成为学校固定假期。文中主人（苦沙弥）正值暑中休暇后终日无所事事地睡午觉，反映了当时教师群体的假期生活状态。
  书中原文: "ことに暑中休暇後になってからは何一つ人間らしい仕事をせんので、いくら観察をしても一向観察する張合がない。"
  网络来源: https://cir.nii.ac.jp/crid/1050006662406633600?lang=en

- 名词: 棒鱈
  解释: 干鳕鱼，日本传统保存食品。将鳕鱼剖开晾干制成棒状，便于长期保存和运输。棒鱈是江户时代至明治时期的重要保存食，主要产地为北海道，通过北前船贸易运往全国各地。文中以"到来の棒鱈"比喻猫闲置不用的两条后腿，形容其像干鳕鱼一样无聊地悬挂着，生动展现了当时的日常食品文化。
  书中原文: "残る二本は到来の棒鱈のように手持無沙汰にぶら下げているのは馬鹿馬鹿しい。"
  网络来源: https://www.itabashi-trading.com/cn/fresh-fish/%e9%b1%88%e9%ad%9a%e5%b0%b1%e6%9c%83%e6%8b%9b%e4%be%86%e7%a6%8f%e6%b0%a3%e5%97%8e%e9%b1%88%e9%ad%9a%e7%9a%84%e9%ad%85%e5%8a%9b/

- 名词: 薩摩上布
  解释: 日本萨摩国（今鹿儿岛县）生产的优质麻织布料。"上布"指使用苎麻手工纺织的高级麻布，质地轻薄透气，适合夏季穿着。"薩摩上布"在江户至明治时期是萨摩藩的名产之一。文中的迷亭穿着萨摩上布登场，表现了明治知识分子在酷暑中穿着高级夏季衣料的生活景象。
  书中原文: "迷亭が薩摩上布を着て勝手な所へ陣取ってしきりに扇使いをしている。"
  网络来源: https://kougeihin.jp/zh-CN/craft/0135/

- 名词: 土用
  解释: 日本传统历法中的杂节之一，源自中国阴阳五行思想。指立春、立夏、立秋、立冬之前各约18天的时间段，一年中有四次。通常人们所说的"土用"多指夏季土用（立秋前），是一年中最炎热的时期。土用期间有"丑日吃鳗鱼"的习俗。文中迷亭和女主人的对话提及土用的天气反常现象。
  书中原文: "しかし土用中あんなに涼しくって、今頃から暑くなるのは不思議ですね"
  网络来源: https://www.sohu.com/a/159848123_509298

- 名词: 単衣
  解释: 日本和服的一种形式，指无内衬的单层衣物，主要在夏季穿着。与"袷（有内衬）"相对。明治时代，单衣使用絽、纱、罗等轻薄透气的面料制作。文中迷亭提到"昨日はね、屋根の上で玉子のフライをして見ましたよ"时提及自己穿着有关联的夏日装束。单衣是日本传统服装中重要的季节区分标志。
  书中原文: "せんだってじゅうは単衣では寒いくらいでございましたのに、一昨日から急に暑くなりましてね"
  网络来源: https://www.metmuseum.org/art/collection/search/894320

- 名词: 寄木細工
  解释: 日本神奈川县箱根地区传统木工工艺，起源于江户时代末期。将不同颜色的天然木材（不使用人工染色）削切成小块，拼接成几何图案后刨成薄片，再贴合于器物表面。代表作有"秘密箱"机关盒。文中主人使用的卷烟草盒为寄木细工制品，反映了明治时代文人日常生活中使用的传统工艺品。
  书中原文: "主人は無言のまま座に着いて寄木細工の巻煙草入から「朝日」を一本出してすぱすぱ吸い始めた"
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%AF%84%E6%9C%A8%E7%B4%B0%E5%B7%A5

- 名词: 帰天斎正一
  解释: 日本明治时代活跃的魔术师，本名波済菊太郎。明治初年曾赴欧洲学习西洋魔术，是将西洋舞台魔术引入日本的先驱之一。文中迷亭演示折叠巴拿马帽的杂技时，女主人将其比作帰天斎的魔术表演，表现了明治时代西洋魔术在日本民众中的普及。
  书中原文: "細君は帰天斎正一の手品でも見物しているように感嘆すると"
  网络来源: http://jc.newdu.com/68175.html

- 名词: パナマ帽
  解释: 巴拿马草帽，原产于厄瓜多尔，用托奎拉草编织的轻便夏季帽。明治时代后期随西洋文化传入日本，成为文明开化象征的时尚单品。因其轻便柔韧、可折叠不变形的特性受到喜爱。文中迷亭展示其巴拿马帽的柔韧耐用性，将其揉捏踩踏后仍能恢复原状，展示了明治时期日本人对西洋新型生活用品的欣赏。
  书中原文: "拳骨をかためてパナマの横ッ腹をぽかりと張り付けると、なるほど意のごとく拳ほどな穴があいた。"
  网络来源: https://collections.nmth.gov.tw/CollectionContent.aspx?a=132&rno=2013.020.0319

- 名词: 朝日煙草
  解释: 日本明治时期流行的卷烟品牌，由村井兄弟商会等生产。"朝日"（Asahi）是明治时代知名的日本国产香烟品牌之一，在市场上与"敷岛"、"云龙"、"凤凰"等品牌竞争。当时日本烟草原为专卖制度，国内品牌众多。文中主人从寄木细工烟盒中取出"朝日"香烟吸食，描写了明治男性知识分子吸烟时的日常场景。
  书中原文: "主人は無言のまま座に着いて寄木細工の巻煙草入から「朝日」を一本出してすぱすぱ吸い始めた"
  网络来源: https://www.eastobacco.com/ty/content/2008-04/24/content_1011586.html

- 名词: 希臘
  解释: 日本对希腊（Greece）的旧汉字表记，读作"ギリシャ"（Girisha）。该译名并非源自英语"Greece"，而是经由拉丁语"Graecia"或其他欧洲语言传入。明治时期日本主要通过英语文献获取西方知识，国名多按英语读音以汉字音译，但"希臘"属于较特殊的译例。文中迷亭以希腊神话典故讲述赫拉克勒斯的故事，女主人听到"希臘"才明白是西方典故，反映了明治时期普通日本人对西方古典知识的认知程度。
  书中原文: "あら希臘のお話しなの？　そんなら、そうおっしゃればいいのに"
  网络来源: https://www.jstage.jst.go.jp/article/newgeo1952/42/4/42_4_1/_article/-char/en
