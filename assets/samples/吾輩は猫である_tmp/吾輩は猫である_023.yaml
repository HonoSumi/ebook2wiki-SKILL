- 名词: サントブーヴ
  解释: 夏尔·奥古斯丁·圣伯夫（Sainte-Beuve，1804-1869），法国文学批评家，以"文学肖像"批评方法著称。他在巴黎大学讲课时曾遭到学生攻击，随身携带匕首自卫。在明治时代的日本文坛，圣伯夫作为西方文学批评的权威被知识分子广泛提及。
  书中原文: "サントブーヴは古今独歩の評論家であるが巴里大学で講義をした時は非常に不評判で、彼は学生の攻撃に応ずるため外出の際必ず匕首を袖の下に持って防禦の具となした事がある。"
  网络来源: https://en.wikipedia.org/wiki/Sainte-Beuve

- 名词: ブルヌチェル
  解释: 费迪南·布吕内蒂埃（Ferdinand Brunetière，1849-1906），法国文学批评家、文学史家，《两个世界评论》主编。他以进化论观点研究文学体裁演进史著称，曾在巴黎大学演讲中攻击左拉的自然主义小说。在明治日本的知识界，他是被引为谈资的西方批评家之一。
  书中原文: "ブルヌチェルがやはり巴里の大学でゾラの小説を攻撃した時は……"
  网络来源: https://en.wikipedia.org/wiki/Ferdinand_Bruneti%C3%A8re

- 名词: ゾラ
  解释: 埃米尔·左拉（Émile Zola，1840-1902），法国自然主义文学创始人，代表作《娜娜》《萌芽》等。1889年森鸥外在《读卖新闻》发表《出自医学说的小说论》，首次系统介绍左拉的自然主义。左拉对明治日本文学影响深远，日本自然主义文学由此诞生，后发展为独特的私小说传统。
  书中原文: "ブルヌチェルがやはり巴里の大学でゾラの小説を攻撃した時は……"
  网络来源: https://m.fx361.com/news/2015/0328/19718446.html

- 名词: 演芸矯風会
  解释: 明治时代日本成立的演艺改良组织，旨在整顿和改革传统演艺风俗。迷亭先生原话中提到要去日本桥参加此会的活动。这是明治时期"文明开化"背景下各种社会改良运动的一环，体现了当时知识阶层对演艺界风俗的批判与干预。
  书中原文: "僕はこれから日本橋の演芸矯風会に行かなくっちゃならんから、そこまでいっしょに行こう"
  网络来源: https://enpaku.w.waseda.jp/online-shimpa-tctop/shimpa-tc1/

- 名词: 写生文
  解释: 日本明治时期由正冈子规提倡的一种文学写作方法，核心是"如实描写所见所闻"，借鉴西洋绘画的"写生"概念应用于俳句、短歌及散文创作。1897年子规创办俳句杂志《杜鹃》（ホトトギス），成为写生文运动的核心阵地。夏目漱石的《我是猫》即为《杜鹃》杂志所写的写生文。文中猫自称"写生文を鼓吹する吾輩"（鼓吹写生文的吾辈），体现了漱石与这一文学运动的关联。
  书中原文: "いくら写生文を鼓吹する吾輩でもこれは到底猫の企て及ぶべからざる芸当と自白せざるを得ない。"
  网络来源: https://book.douban.com/review/13629959/

- 名词: 花曇り
  解释: 日本春季的季语（kigo），指樱花盛开时节薄云蔽日的天气。这个词不仅在描述天气，更蕴含日本人对樱花季节特有的审美感受——花期的短暂与天气的微妙变化相呼应，是日本传统诗文中富有情韵的季节表现。
  书中原文: "花曇りに暮れを急いだ日は疾く落ちて、表を通る駒下駄の音さえ手に取るように茶の間へ響く。"
  网络来源: https://mazii.net/zh-CN/search/word/jatw/%E8%8A%B1%E6%9B%87%E3%82%8A

- 名词: 駒下駄
  解释: 日本传统木屐的一种，台与齿由同一块木头雕刻而成，齿形似马蹄（"駒"即马）。其特色是齿矮而稳，穿着行走时发出的声响清脆。在明治时代，駒下駄是庶民日常穿着的履物，与草履、足袋并列为常见的日式 footwear。
  书中原文: "表を通る駒下駄の音さえ手に取るように茶の間へ響く。"
  网络来源: http://jc.newdu.com/92528.html

- 名词: 明笛
  解释: 一种横吹竹笛，1629年从中国传入日本，因源自明代而称"明笛"（みんてき），亦称清笛。用于明清乐合奏。有六个指孔，吹口与指孔间有一个用竹纸或薄纸蒙住的"响穴"，不塞此穴则无法发声。在明治时代的日本，明笛作为文人雅趣的一部分被吹奏，小说中邻家寄宿生吹奏明笛的声音穿透春夜传来。
  书中原文: "隣町の下宿で明笛を吹くのが絶えたり続いたりして眠い耳底に折々鈍い刺激を与える。"
  网络来源: https://en.wikipedia.org/wiki/Minteki

- 名词: 猫の恋
  解释: 日本俳句中的春季季语，指春天猫发情期求偶的行为和叫声。在俳谐传统中，松尾芭蕉有名句"猫の恋 やむとき閨の 朧月"（猫之恋停歇时 闺中望胧月）。猫在春夜大声嘶叫求偶的景象，是日本文学中表现春天生命力的经典意象。
  书中原文: "ほのかに承われば世間には猫の恋とか称する俳諧趣味の現象があって、春さきは町内の同族共の夢安からぬまで浮かれ歩るく夜もあるとか云うが、吾輩はまだかかる心的変化に遭逢した事はない。"
  网络来源: https://www.nippon.com/cn/japan-topics/b09615/

- 名词: 俳諧趣味
  解释: 日本俳谐（连歌式滑稽诗）所代表的审美情趣。俳谐本义为"滑稽、谐谑"，与传统的"雅"文学相对，崇尚从通俗、日常中发现美和滑稽，追求"用俗而离俗"的境界。在明治时代，俳谐趣味已经升华为一种接纳生活中幽默、不拘一格的美学态度。文中用此词形容猫在春天发情的现象，体现了俳谐特有的将俗事审美化的眼光。
  书中原文: "ほのかに承われば世間には猫の恋とか称する俳諧趣味の現象があって"
  网络来源: https://www.nippon.com/cn/japan-topics/b07229/

- 名词: 竜文堂
  解释: 日本著名铸铁壶（铁瓶）堂号，京都铁瓶四大堂号之一。初代四方安之助于19世纪初在京都创业，是日本最早在铁瓶制作中采用脱蜡法（lost-wax casting）的工坊。所铸铁瓶工艺精美，被大英博物馆、俄罗斯冬宫博物馆等收藏。文中"竜文堂に鳴る松風の音"指竜文堂铁壶煮水时发出的松风般声响，是日本茶道中备受珍视的听觉享受。
  书中原文: "思うにこれは主人の病気で贅沢な人が竜文堂に鳴る松風の音を聞かないと寝つかれないごとく、主人も書物を枕元に置かないと眠れないのであろう"
  网络来源: https://wapbaike.baidu.com/item/%E9%BE%99%E6%96%87%E5%A0%82/6894665

- 名词: 袂時計
  解释: 即怀表，也称"懐中時計"。日语"袂"指和服的袖兜，将表放在袖中携带故称"袂時計"。明治时代随着文明开化，西方钟表大量输入日本。1895年精工舍（服部金太郎创立）成功制造了日本第一块国产怀表。文中主人放在枕边的镍制袂时计，是明治知识分子生活中常见的西洋舶来品。
  书中原文: "赤い本と並んで例のごとくニッケルの袂時計が春に似合わぬ寒き色を放っている。"
  网络来源: https://baike.baidu.com/item/%E6%9C%8D%E9%83%A8%E9%87%91%E5%A4%AA%E9%83%8E/15709203

- 名词: 耶蘇教
  解释: 日本历史上对基督教的称呼，源自"耶稣"的汉字音译。此词在江户时代禁教期至明治初期广泛使用，但带有贬义色彩（视其为邪教）。明治中期以后逐渐被"キリスト教"或"基督教"取代。文中在讨论全知全能的哲学问题时提及耶苏教的神，反映了明治知识分子对西方宗教的认知方式。
  书中原文: "ことに耶蘇教の神は二十世紀の今日までもこの全智全能の面を被っている。"
  网络来源: https://zh.wiktionary.org/zh/%E8%80%B6%E8%98%87%E6%95%99

- 名词: ズーズー
  解释: 日语中对日本东北方言（东北方言）的俗称，因该方言中"し"与"す"、"ち"与"つ"、"じ"与"ず"等音节的发音不加区分而得名。明治时代随着标准语（以东京山手方言为基础）的推广，"ズーズー弁"被视为土气的方言受到排斥，文中也以略带调侃的口吻提及"鼻で言語を使うようなズーズー"（用鼻子说话的zuuzuu）。
  书中原文: "もっとも北の方へ行くと人間が無精になってなるべく口をあくまいと倹約をする結果鼻で言語を使うようなズーズーもあるが、鼻を閉塞して口ばかりで呼吸の用を弁じているのはズーズーよりも見ともないと思う。"
  网络来源: https://zh.wikipedia.org/zh-hk/%E4%B8%80%E5%81%87%E5%90%8D%E6%96%B9%E8%A8%80

- 名词: 仲見世
  解释: 指浅草寺雷门到宝藏门之间的参道商店街，日本最古老的商业街之一。江户时代起，附近居民被授予在参道营业的特权，逐渐形成商店街。明治18年（1885年）曾一度被东京府下令拆除，同年末以红砖洋风建筑重建，体现了"文明开化"对传统商业街的改造。文中迷亭开玩笑说让主人去仲见世买玩具空气枪来背。
  书中原文: "しかしそれにしても刃物は剣呑だから仲見世へ行っておもちゃの空気銃を買って来て背負ってあるくがよかろう。"
  网络来源: https://asakusa-nakamise.jp/china01/

- 名词: 懐剣
  解释: 日本武士随身携带的短刀，刃长约20-25厘米，通常收入黑漆鞘中藏于怀内（和服的怀中或袖袋）。武家女性也作为护身具携行，也是嫁妆的一部分。不同于常被误解的"胁差切腹"，实际切腹仪式中使用的是怀剑。文中迷亭警告主人不要模仿圣伯夫携带匕首，调侃说大学教师带怀剑已危险，中学教师只能带小刀。
  书中原文: "大変な見識だな。しかし懐剣をもって歩行くだけはあぶないから真似ない方がいいよ。大学の教師が懐剣ならリードルの教師はまあ小刀くらいなところだな。"
  网络来源: https://en.wikipedia.org/wiki/Kaiken_(dagger)

- 名词: 木枯し
  解释: 日本秋季到冬季的季语，指深秋至初冬刮的强烈冷风，日语中特指"木枯らし"——吹落树木叶子的寒风。在日本文学中，木枯し常被用来渲染寂寥、清冷的氛围。文中用它形容铃木和迷亭离去后家中突然安静下来的感觉。
  书中原文: "鈴木君と迷亭君の帰ったあとは木枯しのはたと吹き息んで、しんしんと降る雪の夜のごとく静かになった。"
  网络来源: https://www.weblio.jp/content/%E6%9C%A8%E6%9E%AF%E3%82%89%E3%81%97

- 名词: おけら
  解释: 日文"螻蛄"（okera），即蝼蛄，直翅目蝼蛄科的昆虫，穴居土中，前足发达适合掘土。在日本文化中，"おけらになる"是惯用句，意为变得身无分文（源自蝼蛄正面看像举起双手"投降"的姿态）。文中猫以宏大的宇宙视角列举从上天的朱庇特到地中虫蚁都受恋爱驱使，将蝼蛄作为万物本能的底层代表。
  书中原文: "上は在天の神ジュピターより下は土中に鳴く蚯蚓、おけらに至るまでこの道にかけて浮身を窶すのが万物の習いである"
  网络来源: https://mazii.net/zh-CN/search/word/jatw/%E8%9E%BB%E8%9B%84

- 名词: 柳行李
  解释: 用柳条编成的传统日本行李箱笼（行李）。主产地为兵库县丰冈市，以当地圆山川流域种植的行李柳为原料编成。因柳材含天然防虫成分、遇水膨胀可防水、强度高等特点，广泛用于衣物收纳和旅行。明治时代曾获巴黎万国博览会银奖。文中猫在贼人闯入时藏身于"襖と柳行李の間"（纸门与柳条箱之间）。
  书中原文: "襖と柳行李の間にしばしの間身を忍ばせて動静を窺がう。"
  网络来源: http://jc.newdu.com/214076.html
