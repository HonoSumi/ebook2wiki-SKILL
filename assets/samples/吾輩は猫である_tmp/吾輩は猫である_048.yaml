- 名词: 禅宗
  解释: 日本佛教的主要宗派之一，分为临济宗、曹洞宗、黄檗宗三大派。明治时代经历了废佛毁释的打击后，通过世俗化（僧侣肉食妻带许可）、近代化学术化（大学佛教学）、国际化（铃木大拙等向西方介绍）等变革而存续与发展。
  书中原文: 「一体禅とか仏とか云って騒ぎ立てる連中ほどあやしいのはないぜ」
  网络来源: https://m.thepaper.cn/wifiKey_detail.jsp?contid=2192597&from=wifiKey

- 名词: 円覚寺
  解释: 位于神奈川县镰仓市的临济宗圆觉寺派大本山，正式名称为瑞鹿山円覚興聖禅寺。1282年由北条时宗为悼念元寇战没者而创建，开山为南宋高僧无学祖元。是镰仓五山第二位，夏目漱石曾在此参禅，小说《门》亦以其为舞台。
  书中原文: 「円覚寺の前に汽車の踏切りがあるだろう」
  网络来源: https://zh.wikipedia.org/zh-hant/%E5%9C%93%E8%A6%BA%E5%AF%BA_(%E9%8E%8C%E5%80%89%E5%B8%82)

- 名词: 電光影裏に春風をきる
  解释: 著名的禅语，出自南宋禅僧无学祖元（后为圆觉寺开山）的偈颂。其含义为：在悟道的境界中，刀剑斩首也如同在闪电光影中斩春风一般虚幻不实，表达了"人空法空"、超越生死的禅悟境界。小说中独仙常吟诵此句。
  书中原文: 「うん電光影裏に春風をきるとか云う句を教えて行ったよ」
  网络来源: https://cn.rinnou.net/word_zen/0802.html

- 名词: 金剛不壊
  解释: 佛教术语，源自梵语vajra。"金刚"指钻石般坚硬、能破万物而不自坏的特质；"不坏"指不灭。在佛教中指法身、佛性、真如等绝对真理的永恒不灭性，而非肉身的不朽。小说中角色自称"金刚不坏之体"是夸张狂言。
  书中原文: 「火に入って焼けず、水に入って溺れぬ金剛不壊のからだだと号して」
  网络来源: https://www.lnanews.com/news/7/101612

- 名词: 警視庁
  解释: 日本东京都的警察本部。1874年（明治7年）1月15日由川路利良参照法国警察制度创设，初称"东京警视厅"。作为首都警察具有特殊地位，由内务省直接管辖。首任大警视（后称警视总监）为川路利良，被誉为"日本警察之父"。
  书中原文: 「その名刺には警視庁刑事巡査吉田虎蔵とある」
  网络来源: https://baike.baidu.com/item/%E8%AD%A6%E8%A7%86%E5%8E%85/261097

- 名词: 刑事巡査
  解释: 明治时期日本警察的职务分类之一，指担任刑事侦查工作的巡查（最下级警察官）。与现代专业刑事警察不同，当时巡查在基层执行职务的同时也承担侦查工作。小说中体现了明治警察制度中巡查兼管刑事工作的特征。
  书中原文: 「その名刺には警視庁刑事巡査吉田虎蔵とある」
  网络来源: https://zh.wikipedia.org/wiki/%E6%97%A5%E6%9C%AC%E8%AD%A6%E5%AF%9F

- 名词: 日本堤
  解释: 东京都台东区的地名。起源于1621年（江户时代元和6年）在浅草山谷堀两岸修筑的堤防道路，因"二本堤"（两条堤防）的读音讹变为"日本堤"。江户时代是前往吉原游廓的必经之路，十分热闹。小说中设有日本堤警察分署。
  书中原文: 「あしたね、午前九時までに日本堤の分署まで来て下さい」
  网络来源: https://zh.wikipedia.org/zh/%E6%97%A5%E6%9C%AC%E5%A0%A4

- 名词: 浅草警察署
  解释: 位于东京浅草地区的警察署，明治时期隶属于警视厅管辖。小说中提及的"日本堤分署"即为浅草警察署的下辖机构。浅草是江户以来的繁华街区，警察署的设置反映了明治时代首都圈警备体制的完善。
  书中原文: 「浅草警察署の管轄内の日本堤分署です」
  网络来源: https://zh.wikipedia.org/wiki/%E6%97%A5%E6%9C%AC%E8%AD%A6%E5%AF%9F

- 名词: 名主
  解释: 日本江户时代村庄的最高责任者，属村方三役（名主、组头、百姓代）之一。负责年贡征收、村政管理、水利、治安等。明治维新后随着大区小区制的实施而废弛，但旧名主阶层以"名望家"身份继续在地方自治中发挥影响力。
  书中原文: 「主人のおやじはその昔場末の名主であった」
  网络来源: https://zh.wikipedia.org/wiki/%E6%9D%91%E6%96%B9%E4%B8%89%E5%BD%B9

- 名词: 麦飯
  解释: 大米中掺入大麦一起烹煮的饭食。在禅宗寺院精进料理中，麦饭是僧侣（云水）的主食之一。大麦比米便宜且富含维生素B1，可预防脚气病。禅寺饮食简朴，麦饭配味噌汤和少量腌菜即为典型的一餐。
  书中原文: 「僧堂で麦飯や万年漬を食ったせいだから」
  网络来源: https://book.qq.com/book-read/914891/9

- 名词: 万年漬
  解释: 日本禅宗寺院精进料理中的一种传统腌菜，经长期腌制的蔬菜保存食品。"万年"寓意保存期长。在禅寺中，僧侣饮食极为简朴，万年漬是日常重要的副食之一。小说中提及在僧堂吃麦饭和万年漬导致腹膜炎的情节。
  书中原文: 「僧堂で麦飯や万年漬を食ったせいだから」
  网络来源: https://book.qq.com/book-read/914891/9

- 名词: 白雨
  解释: 日语中夏季傍晚骤然降下的雷阵雨，又称"夕立"（夕立）。是日本文学中重要的夏季季语（俳句用词），常用来表现夏日骤雨带来的清凉感或季节转换。语感比"夕立"更具文语色彩。
  书中原文: 「この間の白雨の時寺内へ雷が落ちて」
  网络来源: https://m.sohu.com/a/409248264_100184947/

- 名词: 石火の機
  解释: 禅宗用语，指如击石发火般瞬间生起的机用（灵机应变的心的作用）。比喻不经过分别思量、无心地直接应对的境界，是禅宗修行追求的高境界。与"电光石火"相通，强调迅速、直接、不假思索。
  书中原文: 「禅の機鋒は峻峭なもので、いわゆる石火の機となると怖いくらい早く物に応ずる事が出来る」
  网络来源: https://www.70thvictory.com.tw/mingju/3/b08881430273.htm

- 名词: 禅の機鋒
  解释: 禅宗术语。"机"指对方的心机/根机，"锋"指锋利。禅的机锋是指禅师与修行者之间以犀利迅捷的问答来勘验悟境深浅的手段，是禅宗特有的教学方式。其特征是峻峭激烈，不容思量分别。
  书中原文: 「禅の機鋒は峻峭なもので、いわゆる石火の機となると怖いくらい早く物に応ずる事が出来る」
  网络来源: https://www.70thvictory.com.tw/mingju/3/b08881430273.htm

- 名词: 請書
  解释: 日本传统文书的一种，表示接受某项要求或命令的书面承诺。在明治时期的官方事务中，领取被盗物品或处理公务时需提交请书作为凭证。反映了日本社会重视书面手续和印章确认的行政文化传统。
  书中原文: 「下げ渡したら請書が入るから、印形を忘れずに持っておいでなさい」
  网络来源: http://da.adm.thers.ac.jp/en/item/n0001-20230901-12525

- 名词: 印形
  解释: 日本社会使用的个人印章（判子/印鉴）。在明治时期，官方手续如领取被盗物品时需要携带印形以签署请书（收据）。日本印章文化源自中国，但在日本发展为独特的制度，具有与签名同等的法律效力。
  书中原文: 「印形を忘れずに持っておいでなさい」
  网络来源: https://baike.baidu.com/item/%E5%8D%B0%E7%AB%A0/10959511

- 名词: 格子
  解释: 日本传统建筑中由木条纵横交叉构成网格状的门窗构件，称为"格子"（こうし）。种类繁多，如平格子、菱格子、吹寄格子等。明治时代民宅广泛使用表格子（大格子门），兼具透光、通风与防盗功能，是日本建筑的重要特征。
  书中原文: 「折から表格子をあららかに開けて」
  网络来源: https://aisf.or.jp/~jaanus/deta/k/koushi2.htm

- 名词: 金箔
  解释: 将黄金锤打成极薄箔片的传统工艺。日本金箔产量99%以上来自石川县金泽市，起源可追溯到1593年。传统技法将金锤打到约0.1微米（万分之1毫米）的厚度。用于建筑装饰（如金阁寺）、工艺品、佛坛等。2020年"缘付金箔"被列入联合国教科文组织非物质文化遗产。
  书中原文: 「差出人が金箔つきの狂人であると知って」
  网络来源: https://web-japan.org/trends/cn/fashion/fas180412.html

- 名词: 禅学
  解释: 对禅宗的学术性研究。明治时代忽滑谷快天（1867-1934）将西方宗教学方法与日本传统禅学结合，开创了现代禅学研究。其代表作《禅学思想史》（1923-1925）系统梳理了中国禅宗六阶段发展史，是禅学研究的里程碑著作。
  书中原文: 「独仙の御蔭で大に禅学に凝り固まって鎌倉へ出掛けて行って」
  网络来源: https://wapbaike.baidu.com/item/%E5%BF%BD%E6%BB%91%E8%B0%B7%E5%BF%AB%E5%A4%A9/9134679

- 名词: 踏切り
  解释: 日语中铁路道口的称呼（平交道）。语源来自"踏む"（踩踏）+ "切る"（截断），意为踩着路面横穿铁道线。日本第一条铁路于1872年（明治5年）在新桥-横滨间开通，随铁路网扩张踏切随之出现。初期多为有人值守，由看守挥动红旗示意。
  书中原文: 「円覚寺の前に汽車の踏切りがあるだろう」
  网络来源: https://zh.wikipedia.org/wiki/%E8%B8%8F%E5%88%87
