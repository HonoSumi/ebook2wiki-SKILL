- 名词: 蒲鉾
  解释: 蒲鉾（かまぼこ），中文常译作鱼糕或鱼板，是日本传统鱼糜制品。将白身鱼（如鳕鱼、海鳗等）的肉糜调味后成型，经蒸、烤或炸制成。起源可追溯至平安时代（1115年《类聚杂要抄》），因最初串在竹棒上烤制的形状酷似香蒲穗而得名。是日本和食文化的重要组成部分，种类包括板蒲鉾、竹轮、鸣门卷、萨摩扬等。
  书中原文: 寒月君は面白そうに口取の蒲鉾を箸で挟んで半分前歯で食い切った。
  网络来源: https://zh.wikipedia.org/zh-mo/%E8%92%B2%E9%89%BE

- 名词: 旅順
  解释: 旅顺（Ryojun），即今中国辽宁省大连市旅顺口区。日俄战争（1904-1905）期间，旅顺是俄罗斯太平洋舰队的主要基地。日军第3军（乃木希典指挥）从1904年8月至1905年1月对旅顺要塞发动了长达五个多月的围攻战，最终以203高地的惨烈攻防战为转折点，于1905年1月2日迫使俄军投降。书中寒月以「旅順が落ちた」来邀主人出门散步，反映了当时日本社会对这一战事的普遍关注。
  书中原文: 旅順が落ちたので市中は大変な景気ですよ。
  网络来源: https://zh.wikipedia.org/zh-hans/%E6%97%A5%E4%BF%84%E6%88%98%E4%BA%89

- 名词: 桃川如燕
  解释: 桃川如燕（ももかわ じょえん，1832年-1898年），本名杉浦要助，日本幕末至明治时期的讲谈师（说书先生/讲释师）。以创作和表演猫怪谈故事而闻名，代表作有《猫怪传》，故得绰号「猫如燕」。其口演作品传世包括《新说晓天星五郎》《怪谈恋物语》等。文中猫将自己比作「桃川如燕以后的猫」，体现了桃川如燕在猫题材文艺中的地位。
  书中原文: 吾輩もこの頃では普通一般の猫ではない。まず桃川如燕以後の猫か、グレーの金魚を偸んだ猫くらいの資格は充分あると思う。
  网络来源: https://commons.wikimedia.org/wiki/File:NDL890374_%E6%96%B0%E8%AA%AC%E6%9B%81%E5%A4%A9%E6%98%9F%E4%BA%94%E9%83%8E_part2.pdf

- 名词: グレーの金魚
  解释: 指英国诗人托马斯·格雷（Thomas Gray）作品中所写的「偷金鱼的猫」。格雷在其诗作中描绘过一只金鱼被猫偷走的故事。夏目漱石在文中让猫自比为「グレーの金魚を偸んだ猫」，以之作为有资历的猫的典范。这是漱石借猫之口引用西方文学典故的一个例子，体现了其作品中东西方文化交融的特点。
  书中原文: 吾輩もこの頃では普通一般の猫ではない。まず桃川如燕以後の猫か、グレーの金魚を偸んだ猫くらいの資格は充分あると思う。
  网络来源: https://bearshosetsu.blogspot.com/2018/07/blog-post_27.html

- 名词: 結城紬
  解释: 结城紬（ゆきつむぎ），日本最高级的绢织物之一，产地主要在茨城县结城市和栃木县小山市。其特点是使用手工纺制的无捻丝线，经30多道全手工工序制造，质地轻暖而极其耐用，素有「可穿三代」之说。1956年被指定为日本重要无形文化财，2010年被联合国教科文组织列入无形文化遗产。与上田紬、大岛紬并称日本三大紬。文中主人穿的是已穿了二十年的结城紬棉袄。
  书中原文: やはり黒木綿の紋付羽織に、兄の紀念とかいう二十年来着古るした結城紬の綿入を着たままである。
  网络来源: https://www.tochigi-dentoukougeihin.info/och/textiles/yuki-tsumugi.html

- 名词: 師走
  解释: 师走（しわす），日语中对十二月（旧历十二月，现在也用于阳历十二月）的传统别称。关于语源的主流说法是「師馳す」——意为僧侣或御师（寺社服务人员）于岁末因诵经和各种年末事务而四处奔走忙碌。其他说法包括「四極月」（四季终结之月）或「年果つ」（一年终结）的音转。日本传统月份雅称体系为：睦月、如月、弥生、卯月、皐月、水無月、文月、葉月、長月、神無月、霜月、師走。
  书中原文: 主人の服装には師走も正月もない。
  网络来源: https://baike.baidu.com/item/%E5%B8%AB%E8%B5%B0/2984289

- 名词: エピクテタス
  解释: 爱比克泰德（Epictetus，约55年-约135年），古罗马斯多葛派（Stoicism）哲学家。出生于弗里吉亚（今土耳其）的奴隶家庭，师从斯多葛派教师鲁弗斯，后被释获自由，在罗马及尼科波利斯教授哲学。本人未留著作，其教义由弟子阿里安编纂为《语录》（Discourses）和《手册》（Enchiridion）。核心思想是区分可控与不可控之事，主张人应专注于自身的判断、欲望和态度，而非外物。其思想对后来的马可·奥勒留乃至现代认知行为疗法均有深远影响。文中主人读的就是他的书。
  书中原文: 主人はエピクテタスとか云う人の本を披いて見ておった。
  网络来源: https://baike.baidu.com/item/%E7%88%B1%E6%AF%94%E5%85%8B%E6%B3%B0%E5%BE%B7

- 名词: 根津
  解释: 根津（ねづ），东京都文京区东部的地名。地名源自地形——「根」（陆地与海的接根处）+「津」（港口），意为「陆地根部的港口」。根津与台东区的谷中、文京区的千驮木合称「谷根千」，以保留江户下町风情而闻名。根津神社（旧称根津权现）是著名的神社，在夏目漱石的文学作品中屡次出现。文中寒月与主人散步路线中经过此地。
  书中原文: 寒月と、根津、上野、池の端、神田辺を散歩。
  网络来源: https://zh.wikipedia.org/zh-mo/%E6%A0%B9%E6%B4%A5

- 名词: 上野
  解释: 上野（うえの），东京都台东区的地名，以文化设施和公园闻名。上野恩赐公园内有上野动物园、东京国立博物馆、国立西洋美术馆等众多文化机构，是日本的文教重镇。江户时代此处是宽永寺的广阔寺域，明治后改为公园。上野也是日暮里、谷中、根津等地下町地区的中心。文中散步路线经过此地。
  书中原文: 寒月と、根津、上野、池の端、神田辺を散歩。
  网络来源: https://zh.wikipedia.org/zh-mo/%E4%B8%8A%E9%87%8E

- 名词: 池の端
  解释: 池之端（いけのはた），东京都台东区的地名，位于上野不忍池的西畔，因此得名「池之端」（池边之意）。不忍池（しのばずのいけ）是上野公园内的大型天然池，历史悠久，名称起源一说来自地名「忍丘」，一说来自「忍ぶ」一词。江户时代是宽永寺境内的一部分，以莲花闻名。文中池之端设有「待合」（茶屋），是当时花街社交场所聚集的地区。
  书中原文: 寒月と、根津、上野、池の端、神田辺を散歩。
  网络来源: https://zh.wikipedia.org/wiki/%E4%B8%8D%E5%BF%8D%E6%B1%A0

- 名词: 神田
  解释: 神田（かんだ），东京都千代田区北部的地名，江户时代以来即以学问之街闻名。神田神保町是世界知名的古书街，集中了大量书店和出版社。同时神田也是大学区，明治大学、日本大学、共立女子大学等众多学府聚集于此。文中散步路线的终点站，主人在此与寒月共进了晚餐并饮了正宗酒。
  书中原文: 寒月と、根津、上野、池の端、神田辺を散歩。
  网络来源: https://zh.wikipedia.org/zh-mo/%E7%A5%9E%E7%94%B0_(%E5%8D%83%E4%BB%A3%E7%94%B0%E5%8C%BA)

- 名词: 待合
  解释: 待合（まちあい），亦称待合茶屋，是日本花街文化中的一种设施，主要功能是为客人安排艺妓（芸者）并提供宴席场所，但不提供料理。客人在待合茶屋中召请艺妓陪宴、表演。待合茶屋是明治至昭和时期日本社交文化的重要组成部分，也是政治家、文人、商人交际应酬的重要场所。文中池之端的待合前，有艺妓正在打羽子板。
  书中原文: 池の端の待合の前で芸者が裾模様の春着をきて羽根をついていた。
  网络来源: https://www.jstage.jst.go.jp/article/reportscpij/22/4/22_544/_article/-char/en

- 名词: 羽根つき
  解释: 羽根つき（はねつき），中文常译作板羽球或打毽子，是日本正月（新年）的传统游戏之一。使用木制羽子板（はごいた）击打带羽毛的球（羽根），羽根前端的黑色果实是无患子（むくろじ）的果实，寓意「无病息灾」。玩法有两人对打的追羽根和一人计数的扬羽根，输者脸上会被涂墨。起源于室町时代的毬杖游戏，江户时代在庶民中普及，尤以女孩的初正月赠羽子板为习俗。
  书中原文: 池の端の待合の前で芸者が裾模様の春着をきて羽根をついていた。
  网络来源: https://www.fun-japan.jp/tw/articles/9281

- 名词: 御成道
  解释: 御成道（おなりみち），指江户时代将军或大名出行时所使用的大道。其中最著名的是日光御成街道（又称岩槻街道），从东京文京区的本乡追分（中山道分岔点）通往埼玉县幸手宿，与日光街道合流，是德川将军参拜日光东照宫时使用的专用路线。书中主人和寒月散步后从池之端经御成道返回。现代的本乡通和国道122号大致沿用了旧日光御成街道的路线。
  书中原文: 懐手のまま御成道へ出た。
  网络来源: https://zh.wikipedia.org/wiki/%E6%97%A5%E5%85%89%E5%BE%A1%E6%88%90%E8%A1%97%E9%81%93

- 名词: 正宗
  解释: 正宗（せいしゅう/まさむね），日本清酒的一种代表性品牌或类别名称。文中特指某知名清酒品牌，源自兵库县滩五乡的「樱正宗」酒造（1625年创业），「正宗」之名取自日本名刀「正宗」，寓意口感锐利辛口。滩五乡是日本最大的清酒产地，出产约全国24%的清酒。正宗系清酒的特征是使用富含矿物质的「宫水」酿造，属于辛口「男酒」，口感刚烈。文中主人饮后感觉胃部舒适。
  书中原文: 久し振りで正宗を二三杯飲んだら、今朝は胃の具合が大変いい。
  网络来源: https://sake-jfoodo.jetro.go.jp/cn/trivia/4/index.html

- 名词: 按腹揉療治
  解释: 按腹揉疗治（あんぷくもみりょうじ），日本传统按摩疗法的一种，专注于腹部的按压与揉捏治疗。按腹疗法历史悠久，可追溯至奈良时代（710-794年），江户时代达到鼎盛，出现了大量腹诊和按腹专著，其中最具代表性的是大田晋斋1827年所著的《按腹图解》。日本传统医学认为「腹为保生之本」，通过腹部诊察和手法治疗可以调理全身。明治时期因西化改革而衰落，但在民间仍有传承。文中主人听了某人的推荐尝试此疗法。
  书中原文: ××に聞くとそれは按腹揉療治に限る。
  网络来源: https://mail.abaa.org/book/1045632229

- 名词: 皆川流
  解释: 皆川流（みながわりゅう），日本江户时期存在的一种古流按摩术流派，名字可能源自创立者「皆川」姓氏。文中描述为「皆川流という古流な揉み方」，是一种传统的揉捏式按摩手法，据说对胃病有根治效果。该流派在一般史料中记载较少，可能是一个极为专门的民间传承按摩流派，或已失传。作者安井息轩喜爱此按摩术，坂本龙马亦曾接受其治疗，说明此流派在当时知识人中有一定声望。
  书中原文: 皆川流という古流な揉み方で一二度やらせれば大抵の胃病は根治出来る。
  网络来源: https://mail.abaa.org/book/1045632229

- 名词: 安井息軒
  解释: 安井息轩（やすいそっけん，1799年-1876年），名衡，字仲平，号息轩，日本江户后期至明治初期的儒学家、考据学家。出身日向国（今宫崎县）飫肥藩，师从松崎慊堂，后任昌平坂学问所（昌平黌）教官，1862年任幕府儒官。明治初期被征召为明治天皇侍讲但辞退，时称「日本第一名儒」。代表作有《毛诗辑疏》《管子纂诂》《论语集说》《左传辑释》等。其著作在19世纪传入中国，受到清代学者高度评价。
  书中原文: 安井息軒も大変この按摩術を愛していた。
  网络来源: https://baike.baidu.com/item/%E5%AE%89%E4%BA%95%E6%81%AF%E8%BD%A9

- 名词: 坂本竜馬
  解释: 坂本龙马（さかもと りょうま，1836年-1867年），日本幕末时期最具影响力的志士、政治家。出身土佐藩（今高知县）乡士家庭，脱藩后拜胜海舟为师，转而主张开国。在长崎创立了日本第一家有限公司——龟山社中（后改名海援队），从事海运贸易。1866年成功说服萨摩藩与长州藩结成萨长同盟，成为倒幕运动的核心力量。1867年提出《船中八策》，为大政奉还和明治维新奠定方向。同年11月15日在京都近江屋遇刺，享年31岁。文中提到龙马也曾接受皆川流按摩疗法的治疗。
  书中原文: 坂本竜馬のような豪傑でも時々は治療をうけたと云うから、早速上根岸まで出掛けて揉まして見た。
  网络来源: https://zh.wikipedia.org/zh-tw/%E5%9D%82%E6%9C%AC%E7%AB%9C%E9%A6%AC

- 名词: 雑煮
  解释: 杂煮（ぞうに），日本正月（新年）的传统年糕汤料理。以年糕为主料，搭配鸡肉、蔬菜、鱼虾等食材一起煮制，在元旦早晨食用，象征祈求新年无病无灾、五谷丰登。核心文化含义是「神人共食」——将除夕供奉年神的镜饼取下煮食，分享神的力量。关东风用烤过的方形年糕和酱油清汤，关西风用未烤的圆形年糕和白味噌汤底。各地因地域食材不同而发展出多样变化。文中主人一早默默吃着杂煮。
  书中原文: 主人はだまって雑煮を食っている。
  网络来源: https://baike.baidu.com/item/%E9%9B%9C%E7%85%AE/1366322

- 名词: 宝丹
  解释: 宝丹（ほうたん），明治时期东京·下谷池之端仲町（今台东区池之端附近）实存的汉方药店——「宝丹本舗」，经营者为守田治兵卫，主打产品为「守田宝丹丸」。文中「宝丹の角を曲る」指主人和寒月散步时经过此药店拐角后遇见一位艺妓。宝丹作为当地知名的地标性药店出现在漱石的小说中，反映了明治时期东京下町市井风物的真实面貌。
  书中原文: 宝丹の角を曲るとまた一人芸者が来た。
  网络来源: https://newspaper.nmth.gov.tw/search/detail/R-04-000130-724524
