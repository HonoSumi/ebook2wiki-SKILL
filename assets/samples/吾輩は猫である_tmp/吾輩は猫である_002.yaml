- 名词: 車屋
  解释: |
    日本明治时代的职业，指驾驶或拉人力车（俥）的人，也称车夫。明治维新后人力车成为主要交通工具，车夫多为底层劳动者，体力消耗大但收入微薄。文中「車屋の黒」即指车夫家养的猫。
  书中原文: |
    車屋の黒はこの近辺で知らぬ者なき乱暴猫である。
  网络来源: |
    https://thegate12.com/cn/article/223
- 名词: 梧桐
  解释: |
    即青桐（学名 Firmiana simplex），锦葵科梧桐属落叶乔木，原产于中国、日本和台湾。树皮青绿色，树干端直。在中国传统文化中，梧桐是高贵树木，传说凤凰「非梧桐不栖」，常被诗人用来寄托相思与离愁。
  书中原文: |
    静かなる小春の風が、杉垣の上から出たる梧桐の枝を軽く誘ってばらばらと二三枚の葉が枯菊の茂みに落ちた。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E9%9D%92%E6%A1%90
- 名词: 小春
  解释: |
    日语中旧历十月（相当于公历11月左右）的别称，指晚秋至初冬时一段天气温暖如春的时期，也称「小春日和」。在俳句中被归类为冬季季语。英文对应 Indian summer。
  书中原文: |
    ある小春の穏かな日の二時頃であったが、吾輩は昼飯後快よく一睡した後、運動かたがたこの茶園へと歩を運ばした。
  网络来源: |
    https://baijiahao.baidu.com/s?id=1715128300623249554
- 名词: いたち
  解释: |
    即鼬（黄鼠狼），日本鼬（学名 Mustela itatsi）的日文名称。哺乳纲食肉目鼬科，体细长、腿短，夜行性，以捕食老鼠等小动物为生。肛门附近有臭腺，遇险时可喷射恶臭分泌物作为防御手段。
  书中原文: |
    一度いたちってえ奴は手に合わねえ。一度いたちに向って酷い目に逢った。
  网络来源: |
    https://zh.wiktionary.org/zh/%E3%81%84%E3%81%9F%E3%81%A1
- 名词: 交番
  解释: |
    日本特有的基层警察机构，即派出所（警岗）。明治7年（1874年）东京警视厅设立「交番所」，意为交替值班的哨所。交番遍布全国社区，兼具治安巡逻、接受报案、为民服务等功能，是日本治安良好的重要基石。
  书中原文: |
    交番じゃ誰が捕ったか分らねえからそのたんびに五銭ずつくれるじゃねえか。
  网络来源: |
    https://www.163.com/dy/article/EVTISIUQ05359IAJ.html
- 名词: 芸者
  解释: |
    日本传统的女性表演艺术工作者，以舞蹈、歌唱、演奏三味线等在宴席上为客人助兴。起源于江户时代，并非性工作者而是艺人。京都称「芸妓／芸子」，见习阶段称「舞妓」。艺伎被视为日本传统文化的象征。
  书中原文: |
    あの人の妻君は芸者だそうだ、羨ましい事である。
  网络来源: |
    https://zh.wikipedia.org/zh-mo/%E8%89%BA%E5%A6%93
- 名词: 通人
  解释: |
    江户时代至明治时期的概念，指对游里（花街）、艺能、风俗等城市享乐文化极为精通的人，即「风月场中的行家」。与「野暮」（俗人）相对，是当时町人阶层推崇的审美人格理想。夏目漱石在此借主人之口讽刺这种虚荣心态。
  书中原文: |
    なるほど通人らしい風采をしている。
  网络来源: |
    https://www.aisf.or.jp/~jaanus/deta/t/tsuu.htm
- 名词: 欄間
  解释: |
    日本传统建筑中的装饰性构件，安装于门槛（鸭居）与天花板之间的透空部分，兼具采光、通风和装饰功能。通常为木雕透雕或格子造型，是日本建筑「间」的美学体现。
  书中原文: |
    そこらに抛って置いたのを誰かが立派な額にして欄間に懸けてくれた夢を見た。
  网络来源: |
    https://zh.wiktionary.org/wiki/%E6%AC%84%E9%96%93
- 名词: 美学者
  解释: |
    指以美学（研究美、艺术及审美经验的哲学分支）为专业的研究者或学者。美学是哲学的一个分支，与认识论（真）、伦理学（善）并列为哲学的三大价值领域。日本近代受西方影响引入美学学科。
  书中原文: |
    例の金縁眼鏡の美学者が久し振りで主人を訪問した。
  网络来源: |
    未检索到网络资料
- 名词: 大掃除
  解释: |
    日本年末进行全屋彻底清扫的传统习俗，起源于平安时代宫中「煤払い」仪式。目的是扫除一年的积尘与秽气，以洁净的家迎接新年降临的「年神様」。江户时代后普及至民间，现已成为日本全民的年末习惯。
  书中原文: |
    去年の大掃除の時だ。うちの亭主が石灰の袋を持って椽の下へ這い込んだら
  网络来源: |
    https://zh.wikipedia.org/zh-mo/%E5%A4%A7%E6%89%AB%E9%99%A4
- 名词: 最後っ屁
  解释: |
    日语惯用语，指鼬（いたち）在穷途末路时从肛门臭腺喷射恶臭分泌物以自卫的行为。比喻穷途末路时使出的最后手段、拼命一搏。文中黑猫讲述被鼬攻击时遭遇其喷出臭液的经历。
  书中原文: |
    奴め最後っ屁をこきゃがった。臭えの臭くねえのってそれからってえものはいたちを見ると胸が悪くならあ
  网络来源: |
    https://mobile.moegirl.org.cn/%E9%BC%AC%E9%BC%A0%E5%A4%A7%E6%9A%B4%E5%8F%91
- 名词: 五銭
  解释: |
    日本明治时期发行的辅币单位，五銭即 1/20 日元。存在银质（龙纹）和白铜（菊纹/稻纹）等多种版别，1953年小额通货整理法后被废止。文中黑猫说交番每次给五銭作为捕鼠奖励。
  书中原文: |
    交番じゃ誰が捕ったか分らねえからそのたんびに五銭ずつくれるじゃねえか。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%97%A5%E6%9C%AC%E4%BA%94%E9%92%B1%E7%A1%AC%E5%B8%81
- 名词: 壱円五十銭
  解释: |
    日本明治时期的货币单位，「壱円」为一圆银币（龙银），「五十銭」为半圆银币，两者是不同的面额而非单一货币。文中黑猫说主人靠它捕鼠赚了约一圆五十钱，反映了当时底层劳动者的收入水平。
  书中原文: |
    うちの亭主なんか己の御蔭でもう壱円五十銭くらい儲けていやがる癖に
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E6%98%8E%E6%B2%BB%E9%80%9A%E5%AF%B6
