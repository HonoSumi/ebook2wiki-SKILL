- 名词: 華族
  解释: 日本明治维新时期建立的贵族阶层。1869年废除公卿和大名称号后统称华族，1884年《华族令》将华族分为公爵、侯爵、伯爵、子爵、男爵五等爵位。华族享有政治（贵族院议员）、经济（世袭财产保护）和教育（学习院入学）特权，1947年日本国宪法废除该制度。
  书中原文: 一面識もない華族の門前を通行した時
  网络来源: https://zh.wikipedia.org/zh-hant/%E8%8F%AF%E6%97%8F_(%E6%97%A5%E6%9C%AC)

- 名词: 文部大臣
  解释: 日本文部省的首长，相当于教育部长。明治初期称"文部卿"，1885年内阁制度建立后改称"文部大臣"，首任为森有礼（被誉为"日本现代教育之父"）。负责管理教育、学术、文化相关事务，包括帝国大学、中小学教育、留学生派遣、学位授予等。2001年改组为文部科学大臣。
  书中原文: 僕が文部大臣なら早速閉鎖を命じてやる
  网络来源: https://zh.wikipedia.org/zh-hant/%E6%96%87%E9%83%A8%E5%A4%A7%E8%87%A3

- 名词: 背広
  解释: 日语中对男士西装的称呼，诞生于1870年代（明治初期）。词源最主流的说法是来自伦敦萨维尔街（Savile Row）。明治政府推行文明开化政策后，正式以洋服取代传统礼服，西装成为日本官方礼服。现代日语中更多地使用"スーツ"（suit），"背広"则逐渐成为死语。
  书中原文: あまり合わない背広を無理にきると綻びる。喧嘩をしたり、自殺をしたり騒動が起るんだね。
  网络来源: https://zh.m.wiktionary.org/wiki/%E8%83%8C%E5%BA%83%E4%B8%8A%E4%B8%8B%E6%9C%8D

- 名词: 催眠術
  解释: 明治时代在日本掀起社会性热潮的精神技法。1903年前后爆发催眠术热潮，背景包括日露战争前社会不安、对物质万能主义的反动、科学咒术融合。东京帝国大学心理学家福来友吉等进行学术研究，1906年出版《催眠心理学概论》。1908年因滥用问题，《警察犯处罚令》开始限制无正当理由的催眠行为。
  书中原文: 先生、せんだって催眠術のかいてある本を読んだら、催眠術を応用して手癖のわるいんだの、いろいろな病気だのを直す事が出来ると書いてあったですが、本当でしょうか
  网络来源: https://www.ndl.go.jp/kaleido/e/entry/13/1.html#anchor1

- 名词: 肝癪
  解释: 江户至明治时代使用的日本传统病名，也写作"癇癪"。在東洋医学中，指肝气郁结导致的情绪不稳、易怒、焦躁等症状。明治时代随西洋医学的引入，该病名逐渐被"神经症"等西医诊断名取代，但作为日常用语"癇癪を起こす"（发脾气）沿用至今。
  书中原文: やはり肝癪を起しますか——起りますとも、夢にまで肝癪を起します
  网络来源: https://zh.m.wiktionary.org/zh/%E7%99%87%E7%99%AA
