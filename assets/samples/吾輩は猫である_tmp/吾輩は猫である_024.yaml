- 名词: ランプ
  解释: 明治时代主要的家庭照明工具，使用煤油（石油）为燃料。日本开国后从欧美进口，后经国产化改良为适合日式生活的「座敷ランプ」，带有高台底座可直接放置于榻榻米上，替代了江户时代的行灯和蜡烛。
  书中原文: またその袋の中から一本出してランプに翳して火を点ける。
  网络来源: https://museumcollection.tokyo/en/works/6286724/

- 名词: 巡査
  解释: 明治时代建立的近代警察制度中的基层警官。1874年（明治7年）设立东京警视厅，1875年将「逻卒」改称「巡査」。日本近代警察制度由川路利良主导建立，参照法国模式，形成中央集权的警察体系。
  书中原文: 「それでは、ここから這入って寝室の方へ廻ったんですな。あなた方は睡眠中で一向気がつかなかったのですな」「ええ」と主人は少し極りがわるそうである。「それで盗難に罹ったのは何時頃ですか」と巡査は無理な事を聞く。
  网络来源: https://baike.baidu.com/item/%E5%B7%9D%E8%B7%AF%E5%88%A9%E8%89%AF/5891610

- 名词: 朝日新聞
  解释: 日本代表性全国性报纸，1879年（明治12年）1月25日由村山龙平和木村滕在大阪创刊。早期为通俗小报，后确立「不偏不党」方针。1888年进东京创刊《东京朝日新闻》，逐步发展为日本五大报之一。
  书中原文: 主人の頭の先に「朝日」の袋があるのを見付けて、ちょっと袂へ投げ込む。
  网络来源: https://wapbaike.baidu.com/item/%E6%9D%91%E5%B1%B1%E9%BE%99%E5%B9%B3/4907868

- 名词: 国語
  解释: 明治时期人为建构的「国语」概念。明治政府以东京 educated 阶层的口音为基础，通过「言文一致运动」和学校教育强制推广标准语，以此作为国家统一和国民统合的意识形态工具。上田万年、森有礼等学者在其中发挥了关键作用。
  书中原文: 人間の用うる国語は全然模傚主義で伝習するものである。
  网络来源: https://baike.baidu.com/item/%E4%BD%9C%E4%B8%BA%E6%80%9D%E6%83%B3%E7%9A%84%E2%80%9C%E5%9B%BD%E8%AF%AD%E2%80%9D%EF%BC%9A%E8%BF%91%E4%BB%A3%E6%97%A5%E6%9C%AC%E5%AF%B9%E8%AF%AD%E8%A8%80%E7%9A%84%E8%AE%A4%E8%AF%86/62211607

- 名词: 聖書
  解释: 基督教圣经。明治初期（1873年）基督教解禁后，圣经的日语翻译和出版迅速推进，宣教士通过教育（mission school）和医疗活动传播基督教，对明治日本的近代化、教育制度和文化产生了深远影响。
  书中原文: 現に聖書とか云うものにはその通りと明記してあるそうだ。
  网络来源: https://read.cnki.net/web/Journal/Article/SHKX201010017.html

- 名词: 弘法大師
  解释: 空海（774-835）的谥号，日本真言宗开祖，平安时代书法大家。与嵯峨天皇、橘逸势并称「三笔」。其书法代表作《风信帖》为国宝。明治时期随着日本美术复兴运动，空海的书法重新受到高度评价。
  书中原文: 弘法大師に向って昨日書いた通りの筆法で空海と願いますと云う方がまるで書体を換えてと注文されるよりも苦しいかも分らん。
  网络来源: https://baike.baidu.com/item/%E5%BC%98%E6%B3%95%E5%A4%A7%E5%B8%88%C2%B7%E7%A9%BA%E6%B5%B7%E4%B8%8E%E4%B9%A6%E6%B3%95/12444934

- 名词: 肥前国
  解释: 日本古代令制国之一，属西海道。领域相当于现在的佐贺县全域和长崎县大部分地区。明治4年（1871年）废藩置县后，肥前国被分割为多个县，后经合并重组为佐贺县和长崎县。
  书中原文: これは肥前の国は唐津の住人多々良三平君が先日帰省した時御土産に持って来た山の芋である。
  网络来源: https://baike.baidu.com/item/%E8%82%A5%E5%89%8D%E5%9B%BD

- 名词: 唐津
  解释: 佐贺县北部的城市，江户时代为唐津藩城下町。明治4年废藩置县后一度设唐津县。唐津以近代建筑家辰野金吾（东京站设计师）闻名，也是陶瓷器「唐津烧」的产地。小说中作为多々良三平的家乡出现。
  书中原文: これは肥前の国は唐津の住人多々良三平君が先日帰省した時御土産に持って来た山の芋である。
  网络来源: https://www.saga-museum.jp/sagajou/navi/zh-s/22.html

- 名词: メリヤス
  解释: 源自葡萄牙语「meias」的日语词汇，指针织编织物（编物）。明治时代后期，以奈良县为中心，作为农村副业的袜子制造业（メリヤス工业）兴起。在小说中写为「めり安」，指针织布料制成的衣物。
  书中原文: 主人のめり安の股引の中へ押し込むと、股のあたりが丸く膨れて青大将が蛙を飲んだような
  网络来源: https://cir.nii.ac.jp/crid/1050282814027078656

- 名词: 博多帯
  解释: 福冈县博多地区生产的传统丝织腰带。始于镰仓时代，江户时代成为福冈藩对幕府的贡品，以「献上柄」（独鈷、花皿、亲子縞等纹样）闻名。明治时期因幕府消失而丧失贡品市场，转向民间消费并引入机械化生产。
  书中原文: 唐桟の半纏に、御納戸の博多の帯を尻の上にむすんで、生白い脛は膝から下むき出しのまま今や片足を挙げて畳の上へ入れる。
  网络来源: https://zh.shokunin.com/archives/34617255.html

- 名词: 紬
  解释: 用玉茧或废蚕丝纺成的粗纺丝线织成的丝织物，质地较普通绢织物更厚实、耐用。明治时期农村家庭工业发达，各地形成特色紬产地（如结城紬、大岛紬等），成为庶民日常穿着的传统面料。
  书中原文: 陰士は主人の紬の上着を大風呂敷のように拡げてこれに細君の帯と主人の羽織と繻絆とその他あらゆる雑物を奇麗に畳んでくるみ込む。
  网络来源: https://aisf.or.jp/~jaanus/deta/k/kasuriori.htm

- 名词: 和三盆
  解释: 日本传统高级砂糖，产于香川县（讃岐和三盆）和德岛县（阿波和三盆）。原料为竹蔗，经多次研磨精制而成，口感细腻甘甜。江户时代由松平赖恭命平贺源内等人研发，明治时期制糖技术继续发展，但战后受廉价精糖冲击而产量锐减。
  书中原文: 山の芋を枕元へ飾って寝るのはあまり例のない話しではあるがこの細君は煮物に使う三盆を用簞笥へ入れるくらい場所の適不適と云う観念に乏しい女である
  网络来源: https://www.nippon.com/cn/views/b04403/

- 名词: 沢庵漬
  解释: 日本传统腌菜，将萝卜晒干后用米糠和盐腌制而成。名称源自江户初期临济宗僧泽庵宗彭。由于米糠富含维生素B1，与精白米导致脚气的问题形成有趣的营养互补。明治以后大量生产，成为日本餐桌上常见的渍物。
  书中原文: 細君にとれば、山の芋は愚か、沢庵が寝室に在っても平気かも知れん。
  网络来源: https://www.sinyijapan.com/tw/news/meetjapan/news853930

- 名词: 御納戸
  解释: 日本传统色名，指深蓝～青绿色调。源自江户城负责仓库管理（纳户）的官吏所穿制服的颜色，江户时代中期作为「粋」的象征在男性羽织袴的里布中广泛流行。禁奢令下渋色受欢迎，「四十八茶百鼠」中的代表色之一。
  书中原文: 唐桟の半纏に、御納戸の博多の帯を尻の上にむすんで、生白い脛は膝から下むき出しのまま今や片足を挙げて畳の上へ入れる。
  网络来源: https://www.sohu.com/a/197874007_99946503

- 名词: ラファエル
  解释: 文艺复兴盛期意大利画家拉斐尔·桑齐奥（Raffaello Sanzio，1483-1520），与达芬奇、米开朗基罗并称文艺复兴三杰。明治时期随着西洋美术的引入，拉斐尔被日本画坛视为古典绘画的典范，日本画家下村观山于1905年（明治38年）曾模写拉斐尔的圣母像。
  书中原文: ラファエルに寸分違わぬ聖母の像を二枚かけと注文するのは、全然似寄らぬマドンナを双幅見せろと逼ると同じく、ラファエルにとっては迷惑であろう
  网络来源: https://www.nmwa.go.jp/en/exhibitions/raffaello2013.html

- 名词: マドンナ
  解释: 意大利语「Madonna」（圣母玛利亚）的日语表记。明治时期西洋美术被介绍到日本后，圣母像作为西方绘画的重要主题被日本画家所学习和借鉴。狩野芳崖1888年的《悲母观音》即是将圣母玛利亚的图素与佛教观音形象融合的代表作。
  书中原文: 全然似寄らぬマドンナを双幅見せろと逼ると同じく、ラファエルにとっては迷惑であろう
  网络来源: https://artplatform.go.jp/collections/W1019745

- 名词: パラドックス
  解释: 英语「paradox」的音译，意为「悖论」「逆说」。明治时期西洋哲学和逻辑学被系统介绍到日本，西周、井上哲次郎等学者通过《哲学字汇》（1881年）将大量西方哲学术语翻译为汉语。paradox被译为「逆说」「背理」。
  书中原文: こう云うのは明かにパラドックスである。
  网络来源: https://networks.h-net.org/node/11765/reviews/11877/refsing-howland-translating-west-language-and-political-reason

- 名词: 唐桟
  解释: 江户时代经中国商人和荷兰东印度公司进口到日本的印度产棉质条纹织物。原产地印度圣托梅，日语称「桟留縞」。江户后期天保改革禁止平民穿用丝绸后，日本工匠开发了国产仿制品「唐桟织」，明治时期国产唐桟作为「太物」（棉质和服）的一种被广泛使用。
  书中原文: 唐桟の半纏に、御納戸の博多の帯を尻の上にむすんで
  网络来源: http://jc.newdu.com/159081.html

- 名词: 古毛布
  解释: 旧的毛织毯子。明治时期随着近代羊毛工业的建立，毛毯（毛布）开始在日本生产和普及。1896年（明治29年）川西清兵卫等人创立日本毛织公司，在神户开始生产毛毯，最初以军需为主要市场。
  书中原文: 陰士は小脇になにか抱えている。見ると先刻主人が書斎へ放り込んだ古毛布である。
  网络来源: https://www.wikiwand.com/zh/articles/%E5%B7%9D%E8%A5%BF%E6%B8%85%E5%85%B5%E8%A1%9B

- 名词: 股引
  解释: 日本传统男性用紧腿裤，属袴的一种。从腰部至脚踝紧贴腿部的细筒型设计，主要用于劳动作业和防寒。江户时代农民和职人穿着，明治时期形态变化，也作为袴下的内衣或武道练习着普及。
  书中原文: 主人のめり安の股引の中へ押し込むと、股のあたりが丸く膨れて青大将が蛙を飲んだような
  网络来源: https://zh.m.wiktionary.org/zh/%E3%82%82%E3%82%82%E3%81%B2%E3%81%8D

- 名词: 羽織
  解释: 日本传统和服外套，穿在着物外面防寒和礼装用。起源于战国武将的「胴服」，江户时代发展为庶民的正装。明治5年（1872年）服制改革后，黑五纹羽织袴成为男性第一礼装，女性羽织也在此时期普及。
  书中原文: 主人の紬の上着を大風呂敷のように拡げてこれに細君の帯と主人の羽織と繻絆とその他あらゆる雑物を奇麗に畳んでくるみ込む。
  网络来源: https://baike.baidu.com/item/%E7%BE%BD%E7%BB%87/6132687

- 名词: 大風呂敷
  解释: 大型的风吕敷（日本传统四方布巾，用于包裹物品）。风吕敷起源于奈良时代，室町时代因将军足利义满的大浴室而确立名称。明治时期西洋皮包和纸袋传入后，风吕敷的使用急剧减少。大風呂敷也用来比喻「说大话、吹牛」。
  书中原文: 主人の紬の上着を大風呂敷のように拡げてこれに細君の帯と主人の羽織と繻絆とその他あらゆる雑物を奇麗に畳んでくるみ込む。
  网络来源: https://baike.baidu.com/item/%E9%A3%8E%E5%90%95%E6%95%B7/3084455

- 名词: 兵古帯
  解释: 柔软材质的男性和服腰带，源自萨摩藩的年轻武士（萨摩兵儿）。用缩缅或木棉制成，质地柔软易于系结。明治维新后随萨摩风俗扩散至全国，成为男性略礼装和浴衣用的常见腰带。西南战争中西乡军曾使用。
  书中原文: なにかからげるものはないかとあたりを見廻す。と、幸い主人が寝る時に解きすてた縮緬の兵古帯がある。
  网络来源: https://www.japanesewiki.com/culture/Heko%20obi.html

- 名词: 繻絆
  解释: 和服下穿的内衣（襦袢），穿在长着物与肌肤之间，用于防汗、调节体温和保持衣形。明治时期随着和服样式的定型化，繻絆也成为日常和服着装不可或缺的部分。
  书中原文: 主人の紬の上着を大風呂敷のように拡げてこれに細君の帯と主人の羽織と繻絆とその他あらゆる雑物を奇麗に畳んでくるみ込む。
  网络来源: https://zh.m.wiktionary.org/zh-hant/%E3%81%98%E3%82%85%E3%81%B0%E3%82%93

- 名词: 帯上げ
  解释: 和服腰带（带）上方的装饰及固定用布带，用于覆盖和固定带枕。江户时代末期随着女性带结的大型化和太鼓结的普及而出现，明治时期成为正式和装的标准配件。
  书中原文: それから細君の帯上げとしごきとを続ぎ合わせてこの包みを括って片手にさげる。
  网络来源: https://www.douban.com/note/494216556/

- 名词: しごき
  解释: 和服用语，与「帯上げ」同义，但主要用于京都花街（舞妓、艺妓）的装束中。词源自动词「しごく」（捋、勒紧），指系勒腰带的上方装饰带。明治时期随着花柳界的繁荣而成为固定用法。
  书中原文: それから細君の帯上げとしごきとを続ぎ合わせてこの包みを括って片手にさげる。
  网络来源: https://www.douban.com/note/494216556/

- 名词: ちゃんちゃん
  解释: 即「ちゃんちゃんこ」，日本传统儿童用棉袄，无袖背心式防寒衣物。起源于江户时代的半缠。明治时期成为儿童日常和节日（如お宮参り）的常见装束。亦有成人于还历（60岁）时穿红ちゃんちゃんこ的风俗。
  书中原文: それから小供のちゃんちゃんを二枚、主人のめり安の股引の中へ押し込むと
  网络来源: https://museumcollection.tokyo/en/works/6871853/
