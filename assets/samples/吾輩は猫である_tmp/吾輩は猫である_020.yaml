- 名词: 麩海苔
  解释: 一种红藻类海藻（ふのり），干燥后呈薄片状。明治时代女性常用其煮出的粘液作为天然洗发水和定型剂，用于清洗和固定日本发髻。
  书中原文: 「麩海苔と生卵でゴシゴシ洗濯せられた者と見えて癖のない奴を、見よがしに肩から背へ振りかけて」
  网络来源: https://baike.baidu.com/item/%E9%BA%B9%E6%B5%B7%E8%8B%94
- 名词: 唐縮緬
  解释: 明治时代对西洋进口轻薄毛织品（mousseline de laine/毛丝纶）的日文称呼。"唐"指外国，"縮緬"原指绉绸，此处指代西洋毛织物。
  书中原文: 「実はその洗髪を乾かすために唐縮緬の布団と針箱を椽側へ出して、恭しく主人に尻を向けたのである」
  网络来源: https://jlearn.net/dictionary/%E5%94%90%E7%B8%AE%E7%B7%AC
- 名词: 真宗
  解释: 即净土真宗（Jodo Shinshu），由亲鸾上人在镰仓时代创立的日本佛教宗派。明治时期分为西本愿寺派（本愿寺派）和东本愿寺派（大谷派）等支派。文中主人一家为真宗信徒，真宗有在家供奉豪华佛坛的传统。
  书中原文: 「彼の一家は真宗で、真宗では仏壇に身分不相応な金を掛けるのが古例である」
  网络来源: https://baike.baidu.com/item/%E5%87%80%E5%9C%9F%E7%9C%9F%E5%AE%97
- 名词: 御灯明皿
  解释: 佛坛上供奉灯明（蜡烛或油灯）时使用的金属或陶瓷承接碟。是佛坛三具足（香炉、烛台、花瓶）或五具足中烛台的一部分，象征智慧之光驱散烦恼之暗。
  书中原文: 「かの家伝来の仏壇に幾世となく飾り付けられたる御灯明皿である」
  网络来源: https://baike.sogou.com/v454730.htm
- 名词: 観音様の鳩
  解释: 指东京浅草寺（浅草观音）的鸽子。浅草寺供奉圣观音菩萨，寺内常年有大量鸽子栖息，被视为观音菩萨的使者，成为浅草一景。童谣"鸠ぽっぽ"也以此为主题。
  书中原文: 「この度は観音様の鳩の事を思い出す。観音様の鳩と細君の禿とは何等の関係もないようであるが、主人の頭では二つの間に密接な聯想がある」
  网络来源: http://bluemayle.blogspot.com/2016/09/blog-post.html
- 名词: 文久二つ
  解释: 指江户时代文久年间（1861-1864）铸造的"文久永宝"铜钱。"二つ"意为两文钱。文中用"文久二つ"表示鸽食的售价，是明治时代仍流通的前代货币。
  书中原文: 「豆は一皿が文久二つで、赤い土器へ這入っていた」
  网络来源: https://collections.nmth.gov.tw/CollectionContent.aspx?a=132&RNO=2009.012.0009
- 名词: 木菴
  解释: 即木庵性瑫（Mokuan Shōyū，1611-1684），明末清初渡日禅僧，黄檗宗第二祖。擅长书法绘画，与隐元、即非并称"黄檗三笔"。文中挂在苦沙弥家壁龛中的假画落款为"木菴"（"菴"为"庵"的异体字），被讥为赝品。
  书中原文: 「床に掛けた花開万国春とある木菴の贋物や、京製の安青磁に活けた彼岸桜などを一々順番に点検した」
  网络来源: https://cn.sowas-group.com/auctions/item/46672
- 名词: 京製安青磁
  解释: 京都制作的廉价青磁（celadon）陶瓷器。青磁是一种釉色呈青绿色的瓷器，由中国传入日本，京都为重要产地之一。"安"字意为价格低廉。
  书中原文: 「京製の安青磁に活けた彼岸桜などを一々順番に点検したあとで」
  网络来源: https://baike.baidu.com/item/%E9%9D%92%E7%A3%81
- 名词: 彼岸桜
  解释: 日本樱花的一种野生原种（江户彼岸樱，学名 Cerasus spachiana），在春分（彼岸）前后开花，故名。是染井吉野樱的重要亲本之一，寿命极长，日本三大名樱均属此系。
  书中原文: 「京製の安青磁に活けた彼岸桜などを一々順番に点検したあとで」
  网络来源: https://baike.baidu.com/item/%E6%B1%9F%E6%88%B7%E5%BD%BC%E5%B2%B8%E6%A8%B1
- 名词: 更紗
  解释: 一种色彩鲜艳的花纹染织棉布或丝绸，源于印度（英语 chintz），经东南亚传入日本。江户至明治时期发展为多种日本本土风格（和更紗），常用于座垫、包袱等。
  书中原文: 「下女が更紗の座布団を床の前へ直して、どうぞこれへと引き下がった」
  网络来源: https://baike.baidu.com/item/%E6%9B%B4%E7%B4%97
- 名词: 素町人
  解释: 江户时代武士对町人（商人、工匠）的蔑称，意为"下贱的市井之徒"。町人在士农工商等级中地位最低，但部分大商人经济实力雄厚。小说中苦沙弥用此词贬低实业家。
  书中原文: 「僕は実業家は学校時代から大嫌だ。金さえ取れれば何でもする、昔で云えば素町人だからな」
  网络来源: https://dict.asia/jc/%E7%B4%A0%E7%94%BA%E4%BA%BA
- 名词: 三角術
  解释: 小说中金田提出的赚钱秘诀，即"缺义理、缺人情、缺廉耻"三者构成三角形。是夏目漱石对明治时代资本主义金钱至上主义的尖锐讽刺。
  书中原文: 「金を作るにも三角術を使わなくちゃいけないと云うのさ――義理をかく、人情をかく、恥をかく これで三角になるそうだ」
  网络来源: https://bkso.baidu.com/item/%E6%88%91%E6%98%AF%E7%8C%AB/64392
- 名词: 金鎖り
  解释: 金制怀表链，明治时期洋装时尚的重要配饰。西装背心口袋中放入怀表，金链从扣眼穿出垂于胸前，是身份与财富的象征。
  书中原文: 「胸に金鎖りさえピカつかせている体裁、どうしても苦沙弥君の旧友とは思えない」
  网络来源: https://zh.wikipedia.org/wiki/%E6%98%8E%E6%B2%BB%E6%97%B6%E4%BB%A3
- 名词: トウィード
  解释: 即 tweed（粗花呢），起源于苏格兰的粗纺毛织品，表面有斜纹纹理，质地厚实耐磨。明治时代作为高级西装面料从英国进口，象征西化与时尚。
  书中原文: 「英国仕立のトウィードを着て、派手な襟飾りをして」
  网络来源: https://www.jstage.jst.go.jp/article/sehs/67/4/67_KJ00003579508/_article/-char/ja/
- 名词: 英国仕立
  解释: 指按英国裁缝工艺制作的西装。明治时代日本西化过程中，英国式西装剪裁（尤其是伦敦萨维尔街风格）被视为最高标准，是上流社会身份的象征。
  书中原文: 「英国仕立のトウィードを着て、派手な襟飾りをして、胸に金鎖りさえピカつかせている体裁」
  网络来源: https://zh.wikipedia.org/wiki/%E6%96%87%E6%98%8E%E5%BC%80%E5%8C%96
- 名词: 襟飾り
  解释: 明治时代对领带、领结等西洋颈部饰物的日语称呼。在ネクタイ（ necktie）这一外来语普及之前，"襟飾り"是通用的和制汉语词汇。
  书中原文: 「派手な襟飾りをして、胸に金鎖りさえピカつかせている体裁」
  网络来源: https://zh.wikipedia.org/wiki/%E6%96%87%E6%98%8E%E5%BC%80%E5%8C%96
- 名词: 床の間
  解释: 日式客厅（和室）中靠墙处略高的凹间，用于悬挂挂轴、摆放插花和装饰品。起源于安土桃山时代的书院造建筑，是和室中最神圣尊贵的空间，客人背对床之间而坐以示礼节。
  书中原文: 「下女が更紗の座布団を床の前へ直して、どうぞこれへと引き下がった」
  网络来源: https://zh.wikipedia.org/wiki/%E5%BA%8A%E4%B9%8B%E9%96%93
- 名词: 花開万国春
  解释: 挂轴上的题字，意为"百花盛开，万国皆春"。据传为黄檗宗僧人木庵性瑫的书法作品。文中苦沙弥家中挂有一幅落款为木菴的赝品，体现明治知识分子和洋杂糅的室内装饰趣味。
  书中原文: 「床に掛けた花開万国春とある木菴の贋物や、京製の安青磁に活けた彼岸桜などを一々順番に点検した」
  网络来源: https://cn.sowas-group.com/auctions/item/46672
