- 名词: 宿場女郎
  解释: 日本江户至明治时期，在东海道、中山道等街道的宿场（驿站）中，以"饭盛女"（提供膳食的女佣）名义实际从事性服务的私娼。幕府法规中称为"食売女"。明治时代后，公娼制度（游郭制度）正式确立，此类私娼逐渐减少。
  书中原文: "その風はなんだ、宿場女郎の出来損い見たようだ"
  网络来源: https://zh.wikipedia.org/zh/%E9%A5%AD%E7%9B%9B%E5%A5%B3

- 名词: 黒繻子
  解释: 黑色的繻子（shusu）织物，即黑色缎面（satin）丝绸。"繻子"是一种通过缎纹组织织造的光泽型丝织物，源于中国明代，后在日本广泛用于和服腰带（帯地）及礼装。明治时代，机械制织的引入推动了此类高级丝织物的量产。
  书中原文: "黒繻子と縮緬の腹合せの帯です"
  网络来源: https://catalog.princeton.edu/catalog/SCSB-14459511

- 名词: 腹合せの帯
  解释: 日本和服腰带的一种，表里使用不同颜色或不同质地的布料缝制而成，具有双面可用的功能，因此也称"昼夜带"。在明治时代，这种实用且富于变化的腰带在女性中较为流行。
  书中原文: "黒繻子と縮緬の腹合せの帯一筋"
  网络来源: https://jlearn.net/dictionary/%E8%85%B9%E5%90%88%E3%82%8F%E3%81%9B%E5%B8%AF

- 名词: 糸織
  解释: 日本传统丝织物的一种，特指以丝线织造的织物。明治时代是日本丝织业大发展的时期，生丝成为主要出口产品，传统手工织造与机械制织并存。结城䌷、大岛䌷等高级丝织物成为和服面料的代表。
  书中原文: "糸織の羽織です、あれは河野の叔母さんの形身にもらったんで、同じ糸織でも今の糸織とは、たちが違います"
  网络来源: https://www.douban.com/note/125732876/

- 名词: 法科大学
  解释: 明治时代帝国大学体制下的分科大学之一，相当于现在的法学部。1886年（明治19年）帝国大学令颁布后设立，分为法律学科和政治学科。法科大学是日本高级官僚和司法官的培养机构，毕业生可免试高等文官考试。1897年京都帝国大学成立后，东京帝国大学法科大学成为日本法学教育的最高学府。
  书中原文: "多々良三平君はもとこの家の書生であったが今では法科大学を卒業してある会社の鉱山部に雇われている"
  网络来源: https://jahis.law.nagoya-u.ac.jp/lawdb/l/119i0003

- 名词: 法学士
  解释: 日本近代学位制度中最早设立的学士学位之一。1877年东京大学创立后，法学部毕业生被授予"法学士"称号。1887年学位令正式确立学位制度后，帝国大学法科大学的毕业生成为法学士的主体。法学士享有高等文官考试免试等特权，是明治时代精英官僚和司法官的必经之路。
  书中原文: "すでに書生ではない、卒業の日は浅きにも係わらず堂々たる一個の法学士で"
  网络来源: https://hr.edu.cn/xueshu/202301/t20230103_2269268.shtml

- 名词: 鉱山部
  解释: 明治时代企业中负责矿山开采和矿物资源开发的部门。明治政府初期推行官营矿山现代化（如釜石矿山、生野矿山），引入西洋采矿技术，后逐步转向民间经营，三井、三菱等财阀的矿山部门迅速发展。矿山部门是明治工业化的重要支柱之一。
  书中原文: "法科大学を卒業してある会社の鉱山部に雇われている"
  网络来源: https://wapbaike.baidu.com/item/%E9%87%9C%E7%9F%B3%E7%9F%BF%E5%B1%B1/8484451

- 名词: 猫食い
  解释: 日本历史上食用猫肉的习俗。江户时代末期以前存在相关记录，明治时期部分下层民众（如书生出身的粗野之人）仍有此习俗。冲绳地区曾将猫肉作为肺病、支气管炎的药材使用。二次世界大战期间因粮食短缺亦曾出现。夏目漱石在本作中借猫之口讽刺了这种"野蛮人"的行为。
  书中原文: "下等な書生のうちには猫を食うような野蛮人がある由はかねて伝聞したが、吾輩が平生眷顧を辱うする多々良君その人もまたこの同類ならんとは今が今まで夢にも知らなかった"
  网络来源: https://zh.wikipedia.org/zh-hk/%E8%B2%93%E8%82%89

- 名词: 唐津訛り
  解释: 日本佐贺县北部唐津市周边地区使用的方言，属于九州方言中的肥筑方言一支。其特点包括使用"〜ばい""〜たい"等终助词以及独特的音调体系。明治时期，东京标准语尚未普及，各地出身的人在日常对话中常使用自己的乡土方言。
  书中原文: "「奥さん。よか天気でござります」と唐津訛りか何かで細君の前にズボンのまま立て膝をつく"
  网络来源: https://keguanjp.com/kgjp_shehui/kgjp_sh_quwei/pt20190416060001.html

- 名词: ウェブスター
  解释: 指诺亚·韦伯斯特（Noah Webster）编纂的《美国英语词典》（An American Dictionary of the English Language）。明治时代，该词典在日本的英语教育中被广泛使用，特别是长州藩等维新原动力地区的知识阶层将其视为重要的英语学习工具。研究文献有早川勇著《ウェブスター辞書と明治の知識人》。
  书中原文: "今に先生の書斎へ行ってウェブスターを引いて調べて上げましょう"
  网络来源: https://www.jstage.jst.go.jp/article/jeigakushi1969/1990/22/1990_22_147/_article/-char/ja

- 名词: オタンチン・パレオロガス
  解释: 夏目漱石在《吾辈是猫》中创造的无意义拟西方词汇，是主人公苦沙弥先生用来嘲弄妻子的伪学术造语。"オタンチン"在日语中可联想为"秃头"（おたんちん），"パレオロガス"模仿希腊-拉丁语后缀，整体构成一个滑稽的伪学术用语，讽刺了明治时代一部分知识分子滥用西方学术词汇装点门面的风气。
  书中原文: "オタンチン・パレオロガスだよ。何ですそのオタンチン・パレオロガスって云うのは。意味も何にもあるもんか"
  网络来源: https://baike.so.com/doc/7608517-7882612.html

- 名词: 国自慢
  解释: 日本传统文化中夸耀自己出身地（国）的风俗或话语行为。明治时代，随着交通发展和各地交流增加，来自不同藩国的人们聚集到东京等大城市，夸耀乡土特产、风土人情成为常见的社交行为。文中多々良三平夸耀唐津的山芋比东京的好吃便是一例。
  书中原文: "「まだ食いなさらんか、早く御母あさんに煮て御貰い。唐津の山の芋は東京のとは違ってうまかあ」と三平君が国自慢をすると"
  网络来源: http://www.dunjiaodu.com/dushu/2021-06-23/6867_2.html

- 名词: 盗難告訴
  解释: 明治时代日本的法律术语，指被害人就盗窃案件向司法机关提出正式控告。与单纯的"盗难届"（报案）不同，"告诉"是法律意义上的正式起诉请求。明治初期沿袭律令制下的"贼盗律"，后逐步引入法国法、德国法体系，建立了近代刑事告诉制度。文中主人坚持要写"告诉"而非"届"，反映了当时法律文书的严谨格式。
  书中原文: "主人は筆硯を座敷の真中へ持ち出して、細君を前に呼びつけて「これから盗難告訴をかくから、盗られたものを一々云え。さあ云え」"
  网络来源: https://commons.wikimedia.org/wiki/File:NDL864259_%E9%96%8B%E5%8C%96%E6%97%A5%E8%A6%81%E6%96%87%E7%AB%A0.pdf

- 名词: 六つ井物産会社
  解释: 夏目漱石在《吾辈是猫》中虚构的公司名，是对明治时代日本最大综合商社之一"三井物産"（Mitsui Bussan）的戏仿。"六"替换"三"（"六つ"意为六个，"三"意为三个）。作品借此反映了明治时代综合商社（商社）势力的兴起，以及实业家阶层在高等教育毕业生中日益重要的就业方向。
  书中原文: "いわんや同君はすでに書生ではない、卒業の日は浅きにも係わらず堂々たる一個の法学士で、六つ井物産会社の役員であるのだから"
  网络来源: https://baijiahao.baidu.com/s?id=1745294637412859815

- 名词: 山の芋
  解释: 即日本薯蓣（Dioscorea japonica），俗称自然薯（じねんじょ），是日本山野自生的山药。明治时代是重要的日常食材，可制作とろろ（山药泥）、とろろ汁、芋粥等料理。文中唐津（佐贺县）的山芋被视为比东京产的更美味的地方特产，反映了明治时期各地食材的流通和乡土自豪感。
  书中原文: "山の芋が一箱。唐津の山の芋は東京のとは違ってうまかあ"
  网络来源: https://www.flower-db.com/zh/flowers/dioscorea-japonica
