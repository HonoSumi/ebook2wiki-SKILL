- 名词: 猿股
  解释: 日本传统男性短裤型内衣，明治时代随近代化普及全国。与现代内裤不同，猿股是和服裙裤底下穿着的传统下着，名称来源于"猿の股"，形容像猴子般便于活动。江户至明治时期，猿股与褌（兜裆布）并列为日本男性主要内衣，日本军部曾视猿股为"软弱"的象征，推崇褌为"日本男儿"的标志。
  书中原文: "猿股の発明に十年を費やしたって車夫の智慧には出来過ぎると云わねばなるまい"
  网络来源: https://ja.wikipedia.org/wiki/猿股

- 名词: 薬湯
  解释: 日本传统的药浴文化，在热水中加入草药或矿物质以达到治疗保健效果。明治时代的钱汤（公共浴场）中常见薬湯服务，文中描述为"石灰を溶かし込んだような色に濁っている"的白色浴汤。这种在热水中添加药物成分的沐浴疗法是日本"汤治"文化的体现。
  书中原文: "白い湯が這入っている。何でも薬湯とか号するものだそうで、石灰を溶かし込んだような色に濁っている"
  网络来源: https://ja.wikipedia.org/wiki/薬湯

- 名词: 牛込
  解释: 东京都新宿区东北部地区，旧东京市牛込区。地名源于古代此处有牛牧场。江户时代为旗本、大名武家屋敷集中地。明治时代至战前，神乐坂成为山手地区代表性花街，夏目漱石、尾崎红叶等众多文人居住于此，印刷出版业发达。1947年与四谷区、淀桥区合并为新宿区。
  书中原文: "御維新前牛込に曲淵と云う旗本があって"
  网络来源: https://zh.wikipedia.org/zh-tw/%E7%89%9B%E8%BE%BC

- 名词: 岩見重太郎
  解释: 日本安土桃山时代至江户初期的传说性武艺者（剑客），与"橙武者"薄田兼相为同一人物。以天桥立复仇、狒狒退治等传说闻名于世，是江户时代草双纸、讲谈、绘草纸中广为流传的大众文化英雄。本作中将重太郎与蟒蛇搏斗的场景描画为刺青图案，是明治时代庶民文化中尚武精神的体现。
  书中原文: "岩見重太郎が大刀を振り翳して蟒を退治るところのようだが"
  网络来源: https://baike.so.com/doc/9833804-10180710.html

- 名词: 和唐内
  解释: 近松门左卫门的人形净瑠璃《国性爷合战》（1715年初演）的主人公，以明郑时期将领郑成功（国姓爷）为原型。名字"和唐内"寓意"和（日本）人亦非唐（中国）人"，象征其日本与中国混血的身份。该作品创下17个月连演纪录，后改编为歌舞伎，是江户时代最受欢迎的戏剧作品之一。文中角色以荒谬的历史叙述提及此名，反映了庶民阶层对历史的混乱认知。
  书中原文: "和唐内はやはり清和源氏さ。なんでも義経が蝦夷から満洲へ渡った時に"
  网络来源: https://zh.wikipedia.org/zh/國性爺合戰

- 名词: 清和源氏
  解释: 日本皇族赐姓贵族"源氏"的一支族，以第56代清和天皇为祖先，始祖为源经基。清和源氏是日本武家社会的核心氏族，源赖朝的鎌仓幕府（河内源氏）、足利尊氏的室町幕府（足利氏）、甚至德川家康的江户幕府（自称新田氏支系）均源于此系谱。文中角色将和唐内附会为清和源氏，体现了庶民历史故事中的错乱认知。
  书中原文: "和唐内はやはり清和源氏さ"
  网络来源: https://zh.wikipedia.org/wiki/%E6%B8%85%E5%92%8C%E6%BA%90%E6%B0%8F

- 名词: 蝦夷
  解释: 北海道的古称，也是日本古代对北方未开化民族（阿伊努人）的称呼。1869年（明治2年）明治政府发布太政官布告，将虾夷地正式改名为北海道，北虾夷地改为桦太（库页岛）。此名称出自探险家松浦武四郎的提议。文中角色讲述义经从虾夷渡满洲的荒谬故事，是当时民间对源义经传说加以演义的表现。
  书中原文: "義経が蝦夷から満洲へ渡った時に"
  网络来源: https://baike.baidu.com/item/%E8%99%BE%E5%A4%B7/1388006

- 名词: 女郎
  解释: 日本对娼妓、卖身女性的称呼之一，江户至明治时期广泛使用。明治五年（1872年）政府颁布"娼妓解放令"，表面上废除人身买卖，但公娼制度依然存在。明治三十三年（1900年）又颁布"娼妓取缔规定"。大量贫困家庭女性因债务被迫卖身进入游廓。文中角色在荒谬的历史故事中将女郎说成和唐内的母亲。
  书中原文: "その女郎に出来た子が和唐内さ"
  网络来源: https://ja.wikipedia.org/wiki/%E5%A5%B3%E9%83%8E

- 名词: 浅黄木綿
  解释: 浅黄色（浅葱色，日本传统色之一，呈淡黄绿色）染制的日本传统棉布。江户至明治时代，普通民众（尤其是僧侣、庶民阶层）常穿着此色棉布制作的和服或作务衣。文中描写一位七十多岁老僧身穿浅黄木绵的和服突然登场，体现了明治时代僧侣的朴素衣着风格。
  书中原文: "浅黄木綿の着物をきた七十ばかりの坊主がぬっと見われた"
  网络来源: https://zh.wikipedia.org/wiki/%E6%B5%85%E8%91%B1%E8%89%B2

- 名词: 十六むさし
  解释: 日本传统盘上游戏（盘游），又称"十六武蔵""十六六指"。棋盘中央放置一颗亲石，周围十六颗子石环绕，亲石通过夹击取子，子石则将其逼入角落。该游戏也是新年季语之一，常成为浮世绘（如歌川国贞的"浮世十六むさし"系列）的题材。江户末期至明治时代广泛流行于庶民阶层。
  书中原文: "その左右に十六むさしに似たる形が四個ずつ行儀よく並んでいる"
  网络来源: https://aisf.or.jp/~jaanus/deta/j/juurokumusashi.htm

- 名词: 白銀町
  解释: 东京都新宿区的町名，位于新宿区东北部，邻近神乐坂。原属旧牛込区，江户时代即有此地名。传说庆长筑城时，田安台的贫民移居此地，命名者期望此町如"白銀（しろがね）的长者"般繁荣。文中车夫提及"白銀町にも古い人が亡くなって"，反映了明治时代下层劳动者对市井生活的叙述。
  书中原文: "白銀町にも古い人が亡くなってね"
  网络来源: https://zh.wikipedia.org/wiki/%E7%99%BD%E9%8A%80%E7%94%BA_(%E6%96%B0%E5%AE%BF%E5%8C%BA)
