- 名词: 伊藤博文
  解释: 日本明治维新时期的重要政治家，长州藩出身。1885年出任日本第一任内阁总理大臣，主导制定大日本帝国宪法（明治宪法），创立立宪政友会。1906年就任首任韩国统监，1909年在哈尔滨被朝鲜独立运动家安重根刺杀。
  书中原文: 第一に眼にとまったのが伊藤博文の逆か立ちである。上を見ると明治十一年九月廿八日とある。
  网络来源: https://zh.wikipedia.org/zh-hk/%E4%BC%8A%E8%97%A4%E5%8D%9A%E6%96%87

- 名词: 大蔵卿
  解释: 日本明治初期太政官制下的大藏省长官，掌管国家财政、租税、货币、银行等事务。1885年内阁制度建立后改称大藏大臣（即后来的财务大臣）。小说中描写伊藤博文曾担任此职。
  书中原文: 大将この時分は何をしていたんだろうと、読めそうにないところを無理によむと大蔵卿とある。なるほどえらいものだ、いくら逆か立ちしても大蔵卿である。
  网络来源: https://zh.wikipedia.org/zh-hant/%E5%A4%A7%E8%97%8F%E7%9C%81_(%E5%BE%8B%E4%BB%A4%E5%88%B6)

- 名词: 韓国統監
  解释: 1905年日俄战争后，日本根据第二次日韩协约（乙巳条约）在朝鲜设立的殖民统治机构长官，统监府设于汉城。首任统监为伊藤博文，拥有外交权、内政建议权及驻朝日军指挥权。1910年日韩合并后改为朝鲜总督府。
  书中原文: 韓国統監もこの時代から御布令の尻尾を追っ懸けてあるいていたと見える。
  网络来源: https://wapbaike.baidu.com/item/%E9%9F%A9%E5%9B%BD%E7%BB%9F%E7%9B%91%E5%BA%9C/4768100

- 名词: 明治十一年
  解释: 即西元1878年，明治天皇在位第十一年。此年发生了竹桥事件（近卫炮兵反乱）、爱国社再兴、府县会（地方议会）制度设立等重要历史事件；是西南战争结束后的第二年，自由民权运动开始活跃的时期。
  书中原文: 上を見ると明治十一年九月廿八日とある。
  网络来源: https://zh.wikipedia.org/wiki/%E6%98%8E%E6%B2%BB

- 名词: 南蛮鉄
  解释: 16至17世纪室町末期至江户初期，由葡萄牙人、西班牙人（所谓"南蛮人"）经南蛮贸易带入日本的铁原料。据研究多为印度乌兹钢。被日本刀工用于制作刀剑，以越前康继最为著名。南蛮铁的高磷含量对刀剑锻接性有特殊影响。
  书中原文: とん子の顔は南蛮鉄の刀の鍔のような輪廓を有している。
  网络来源: https://cir.nii.ac.jp/crid/1390001205184707072

- 名词: 琉球塗
  解释: 即琉球漆器，冲绳县（旧琉球王国）的传统漆器工艺。14世纪由中国传入，15至16世纪琉球王国时代大为发展，以鲜红朱色和黑色对比为特征，技法包括堆锦、沉金、螺钿、箔绘等。1983年被指定为日本国家传统工艺品。
  书中原文: すん子も妹だけに多少姉の面影を存して琉球塗の朱盆くらいな資格はある。
  网络来源: https://zh.wikipedia.org/zh-hk/%E7%90%89%E7%90%83%E6%BC%86%E5%99%A8

- 名词: 長火鉢
  解释: 日本传统暖房器具火鉢的一种，为长矩形木箱或陶制容器，内铺灰烬放置炭火，用于室内取暖、煮水、燗酒。与固定于地面的围炉里不同，长火鉢可移动使用，在明治至大正时期的日本家庭中十分普及。
  书中原文: 長火鉢と云うと欅の如輪木か、銅の総落しで、洗髪の姉御が立膝で、長煙管を黒柿の縁へ叩きつける様を想見する諸君もないとも限らないが、わが苦沙弥先生の長火鉢に至っては決して、そんな意気なものではない。
  网络来源: https://www.edohakuarchives.jp/detail-171923.html

- 名词: 長煙管
  解释: 日本传统的吸烟用具烟管的一种，烟管（きせる）为16世纪由葡萄牙人传入日本。长烟管（ながぎせる）管身较长，江户后期出现长达1米以上的品种。烟管由火皿（雁首）、罗宇（管身）、吸口三部分组成，江户时代刀工转业制作烟管促使其发展为精致的工艺品。吉原游女曾用长烟管进行"诱い煙草"。
  书中原文: 洗髪の姉御が立膝で、長煙管を黒柿の縁へ叩きつける様を想見する諸君もないとも限らない。
  网络来源: https://zh.wikipedia.org/wiki/%E5%A4%A7%E7%85%99%E7%AE%A1

- 名词: 袋戸
  解释: 日本传统建筑和室中的收纳设施，也称袋棚或天袋，设置于床之间（壁龛）上方的小型吊柜。通常用两枚小型襖（拉门）闭合，与下部的"地袋"（落地收纳柜）配套使用，是书院造建筑的重要构成要素。
  书中原文: 下の方の戸棚は、布団の裾とすれすれの距離にあるから、起き直った主人が眼をあきさえすれば、天然自然ここに視線がむくように出来ている。見ると模様を置いた紙がところどころ破れて妙な腸があからさまに見える。…すでにだだっ子である以上は、喧嘩をする勢で、むっくと刎ね起きた主人が急に気をかえて袋戸の腸を読みにかかるのももっともと云わねばなるまい。
  网络来源: https://www.aisf.or.jp/~jaanus/deta/f/fukurodana.htm

- 名词: 活版摺
  解释: 以活字排版的印刷方式，即活版印刷。日本江户时代以木版印刷为主流，明治时期引进西方金属活字技术后，活版印刷逐渐普及，推动了报纸、杂志、教科书的大规模出版。1871年《横滨每日新闻》创刊是活版印刷需求增长的重要标志。
  书中原文: 腸にはいろいろなのがある。あるものは活版摺で、あるものは肉筆である。あるものは裏返しで、あるものは逆さまである。
  网络来源: https://www.douban.com/group/topic/318107615/

- 名词: 独乙皇帝
  解释: 明治时期日本对德国皇帝（德意志皇帝/ Kaiser）的汉字表记。"独乙"是明治时代ドイツ（Deutschland）的早期汉字音译，后标准表记变为"独逸"。明治日本以德国为近代化楷模，尤其在宪法制定和军事制度方面深受德国影响，小说中提及主人模仿独乙皇帝整列胡须，反映了当时日本知识界对德国的向往。
  书中原文: 昨日は鏡の手前もある事だから、おとなしく独乙皇帝陛下の真似をして整列したのであるが、一晩寝れば訓練も何もあった者ではない、直ちに本来の面目に帰って思い思いの出で立に戻るのである。
  网络来源: https://cir.nii.ac.jp/crid/1050002213399892864
