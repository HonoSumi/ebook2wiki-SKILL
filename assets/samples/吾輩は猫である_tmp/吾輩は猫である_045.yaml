- 名词: あばた（痘痕）
  解释: 天然痘（smallpox）治愈后在皮肤上留下的凹陷状疤痕。明治时代日本天然痘流行，许多人脸上留有痘痕，是当时常见的社会面貌特征。夏目漱石本人幼年患过天花，脸上也有痘痕，成为他容貌情结的原因之一。惯用语"痘痕も靨"（あばたもえくぼ）由此衍生，意为"情人眼里出西施"。
  书中原文: 彼のあばたは単に彼の顔を侵蝕せるのみならず、とくの昔しに脳天まで食い込んでいるのだそうだ。
  网络来源: https://zh.m.wiktionary.org/zh/あばた

- 名词: 五分刈・三分刈
  解释: 日本明治时代男子短发发型。一分为约3mm，"五分刈"即约15mm长度，"三分刈"约9mm。1871年明治政府颁布"散髪脱刀令"，鼓励男子剪掉传统丁髷（ちょんまげ）改留西洋式短发。此后"散切頭"成为文明开化的象征，军队和学校进一步推广了标准化的短髪，五分刈、三分刈由此普及为一般男子发型。
  书中原文: もし普通の人のように五分刈や三分刈にすると、短かい毛の根本から何十となくあばたがあらわれてくる。
  网络来源: https://zh.m.wikipedia.org/zh-hant/散髮脫刀令

- 名词: 甎を磨く
  解释: 禅宗著名公案"磨磚作鏡"。唐代禅僧南嶽懷讓见马祖道一终日坐禅，便取砖在石上磨。马祖问磨砖何用，怀让答"磨作镜"（磨砖作镜）。马祖说磨砖岂能成镜，怀让即言"坐禅岂得作佛"——点破执着于形式无法真正悟道。此公案在禅宗史上极为重要，后传入日本禅林广为流传。夏目漱石在此处引用该公案，讽刺主人苦沙弥对着镜子发呆的行为。
  书中原文: 昔し或る学者が何とかいう智識を訪うたら、和尚両肌を抜いで甎を磨しておられた。
  网络来源: https://www.buddhistdoor.org/news/馬祖道一禪師圓寂紀念日：磨磚作鏡的公案，啟發了後世無數行者⋯⋯

- 名词: 穴守稲荷
  解释: 位于东京都大田区羽田的神社，建于1818年（文政元年）。原址在羽田机场用地内，二战后因美军扩建机场而迁至现址。主祭稻荷神，以航空安全、旅行平安的守护闻名。京急空港线设有"穴守稲荷駅"，与羽田机场仅两站之隔。夏目漱石在小说中提到它，反映明治时代东京庶民生活中神社参拜和购买当地特产（河豚提灯）的风俗。
  书中原文: この間さる人が穴守稲荷から河豚の提灯をみやげに持って来てくれた。
  网络来源: https://you.ctrip.com/sight/tokyo294/1710661.html

- 名词: 河豚の提灯
  解释: 日本传统民间工艺品，以河豚（虎河豚为主）的皮干燥制成灯笼状装饰品。制作时将河豚背部开小孔取出内脏和肉，填入稻谷壳使其膨胀，干燥数周后取出谷壳，安装眼睛（白纽扣）完成。主产地为山口县下关市。因河豚在日语中与"福"（ふく）同音，被视为吉祥物，称"福提灯"。明治时代作为民间土特产常在神社周边贩卖。
  书中原文: この間さる人が穴守稲荷から河豚の提灯をみやげに持って来てくれた。
  网络来源: http://japan.people.com.cn/n/2015/1113/c35469-27813675.html

- 名词: べっかんこう
  解释: 日本传统的儿童调皮动作，即用食指将下眼睑向下拉开露出红色结膜，常伴随伸出舌头，表示轻蔑、拒绝或挑衅。语源为"赤い目"→"赤ん目（あかんめ）"→"あかんべ"的音变。"べっかんこう"是《吾輩は猫である》中使用的变体写法。文献上最早见于1909年田山花袋的小说《田舎教師》。明治至昭和时代是日本儿童间的常见动作，现代动漫中仍有使用。
  书中原文: それから主人は鼻の膏を塗抹した指頭を転じてぐいと右眼の下瞼を裏返して、俗に云うべっかんこうを見事にやって退けた。
  网络来源: https://web.archive.org/web/20220609055414/https://en.wikipedia.org/wiki/Akanbe

- 名词: 蒟蒻問答
  解释: 日语惯用语，指答非所问、牛头不对马嘴的对话。"蒟蒻"（konnyaku）与"答曰"（touetsu）或"翻译"等词发音相近而产生误听，导致对话双方各说各话。该词也暗含对禅宗问答中看似荒唐实则蕴含机锋的戏仿意味。夏目漱石在此处讽刺性地将主人照镜子的行为比作一场荒诞的禅问答，来表达"以善意曲解为禅机"的幽默。
  书中原文: もし善意をもって蒟蒻問答的に解釈してやれば主人は見性自覚の方便としてかように鏡を相手にいろいろな仕草を演じているのかも知れない。
  网络来源: https://mazii.net/zh-CN/search/word/jacn/蒟蒻問答

- 名词: 天保銭
  解释: 正式名称"天保通宝"，江户幕府于天保六年（1835年）开始铸造的铜钱。椭圆形，中央有方孔，正面书"天保通宝"、背面书"当百"（即面值100文）。材质为铜铅锡合金，重约20.6克。因铸造量大（约4.848亿枚），实际价值低于面值。明治时代虽已废除此币，但民间仍流通至1891年。夏目漱石用"天保銭のごとく穴があいている"来比喻主人公的头脑空洞无物，极具讽刺效果。
  书中原文: 彼の心は天保銭のごとく穴があいているから、彼の眼もまた天保銭と同じく、大きな割合に通用しないに違ない。
  网络来源: https://zh.wikipedia.org/zh-my/天保通寶

- 名词: 独逸皇帝
  解释: 指德意志帝国皇帝（Kaiser），特别是威廉二世（Wilhelm II，1888-1918在位）。他的标志性翘胡子（八字胡）在明治时代的日本成为时尚模仿对象。明治天皇和大正天皇也受其影响蓄留八字胡。夏目漱石在文中用"独逸皇帝陛下のように、向上の念の熾な髯を蓄える"来描写主人苦沙弥训练胡须的滑稽姿态，讽刺明治知识阶层对西洋权威的盲目模仿。
  书中原文: 彼のアムビションは独逸皇帝陛下のように、向上の念の熾な髯を蓄えるにある。
  网络来源: http://www.qulishi.com/article/201803/277237.html

- 名词: 柳の虫
  解释: 指柳树树干中寄生的天牛幼虫（柳蠹虫）。在日本传统民间疗法（汉方医学）中，柳蠹虫被认为有药用价值，常用于治疗小儿口疮、口腔疾患等。夏目漱石在文中提到主人幼时"だいぶ柳の虫や赤蛙の厄介になった"（受了不少柳虫和青蛙的折腾），反映明治时代日本家庭仍广泛使用民间偏方治疗儿童疾病的习惯。这与中国《本草纲目》记载的柳蠹虫入药传统一脉相承。
  书中原文: 小さい時分はだいぶ柳の虫や赤蛙の厄介になった事もあるそうだが、せっかく母親の丹精も、あるにその甲斐あらばこそ、今日まで生れた当時のままでぼんやりしている。
  网络来源: https://zhongyibaike.com/wiki/柳蠹虫

- 名词: 胎毒
  解释: 源自中国传统医学的概念，传入日本后成为漢方医学的术语之一。指母亲孕期体内积聚的热毒或邪毒传至胎儿，导致新生儿出生后出现湿疹、皮炎、黄疸等症状的理论。日本明治时代民间普遍相信此说，常用清胎毒的方剂（如消風散等）处理婴儿皮肤问题。现代医学认为所谓"胎毒"实为新生儿毒性红斑、脂溢性皮炎、婴儿湿疹等常见生理现象，并非真正的"毒素"。
  书中原文: これは胎毒のためだとも云うし、あるいは疱瘡の余波だとも解釈されて。
  网络来源: https://www.dayi.org.cn/disease/1155708

- 名词: 活版刷り
  解释: 即活版印刷（typography/letterpress printing）。明治维新后，西洋活版印刷技术正式引入日本。1871年《横浜毎日新聞》创刊标志着活版印刷在日本全面展开。明治政府推行教育改革后，大量教科书、报纸、杂志需要快速印刷，活版取代了江户时代的木版印刷成为主流。文中"第一信は活版ずり"指来信是用活版印刷的正式信函，反映明治时代活版印刷已成为常见通信和文书技术。
  书中原文: 第一信は活版ずりで何だかいかめしい文字が並べてある。
  网络来源: https://www.hk01.com/article/209527/書籍裝幀的藝術-關於西野嘉章的-裝訂考

- 名词: 六角時計
  解释: 六角形外壳的时钟，是一种特定造型的西洋钟表设计。明治时代西方钟表大量传入日本，六角形等非传统圆形设计也随之引入。夏目漱石用"水気になやんでいる六角時計"来比喻御三（おさん）生气时鼓胀的脸——像受潮变形的六角钟。这一比喻精妙地融合了明治时代新传入的西洋器物（六角钟）与日本传统的比喻手法，体现夏目漱石独特的幽默风格。
  书中原文: まるで水気になやんでいる六角時計のようなものだ。
  网络来源: https://www.iwatchome.net/article/theme/CO1500115
