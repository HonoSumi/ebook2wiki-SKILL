- 名词: 歌舞伎座
  解释: 位于东京银座，日本最具代表性的歌舞伎剧场。1889年（明治22年）开场的初代建筑为木造，此后历经火灾、关东大地震、二战等多次重建，现存建筑为2013年落成的第五代。作为歌舞伎艺术的殿堂，是明治文明开化时期东京的重要文化地标。
  书中原文: 歌舞伎座で悪寒がするくらいの人間だから聞かれないと云う結論は出そうもないぜ
  网络来源: https://baike.baidu.com/item/%E6%AD%8C%E8%88%9E%E4%BC%8E%E5%BA%A7

- 名词: 泉岳寺
  解释: 位于东京都港区高轮的曹洞宗寺院，由德川家康于1612年创建。元禄赤穗事件（1701-1702年）后，作为赤穗藩主浅野长矩的菩提寺，成为四十七义士的墓地所在地，是"忠臣藏"故事的核心舞台。每年12月14日举行义士祭。
  书中原文: この寒いのによせばいいのに——第一今時泉岳寺などへ参るのはさも東京を知らない、田舎者のようじゃないか
  网络来源: https://baike.baidu.com/item/%E6%B3%89%E5%B2%B3%E5%AF%BA/917350

- 名词: 義士遺物保存会
  解释: 明治至大正时期在泉岳寺内设立的、保存和展示赤穗四十七义士遗物的组织/展览设施。小说中迷亭将其称为"见世物"，反映了明治时期大众对赤穗义士的追捧已带有观光消费文化的色彩。
  书中原文: あの寺内に義士遺物保存会と云う見世物があるだろう。君知ってるか
  网络来源: https://baike.baidu.com/item/%E6%B3%89%E5%B2%B3%E5%AF%BA/917350

- 名词: 旅順陥落
  解释: 指日俄战争（1904-1905）中，日本军经过约222天的围攻，于1905年1月2日攻陷俄国占据的旅顺要塞。此役是日俄战争的决定性转折点，日本以巨大人命代价取胜。小说中迷亭以"旅顺陷落的号外"般的兴奋姿态来告知越智东风的事件，可见当时这一消息在日本的轰动程度。
  书中原文: 旅順陥落の号外を知らせに来たほどの勢を示す
  网络来源: https://zh.wikipedia.org/zh-hans/%E6%97%A5%E4%BF%84%E6%88%98%E4%BA%89

- 名词: 蒔絵
  解释: 日本传统漆器工艺的代表性技法，在漆器表面未干时撒布金粉、银粉等金属粉末以描绘图案。起源于奈良时代，平安时代后发展为独特的日本工艺。英文称为"Japan"漆器。小说中出现在德国游客欲购买的大鹰源吾印笼上，说明蒔絵印笼在明治时期已成为外国人眼中最具代表性的日本艺术品之一。
  书中原文: 大鷹源吾の蒔絵の印籠
  网络来源: https://baike.baidu.com/item/%E8%8E%B3%E7%BB%98

- 名词: 印籠
  解释: 日本传统小型收纳容器，原为存放印章之用，江户时代成为武士腰间必备的装身具。和服无口袋，故用印笼携带药物、印章等小物。通常由木、竹或漆器制成，常施以蒔絵、螺鈿等精美装饰，与中国结子（根付）、绪缔配套使用。明治以后虽不再日常使用，但作为工艺美术品备受珍视。
  书中原文: 大鷹源吾の蒔絵の印籠
  网络来源: https://baike.baidu.com/item/%E5%8D%B0%E7%AC%BC/254504

- 名词: 大鷹源吾
  解释: 赤穗四十七义士之一。小说中写作"大鷹源吾"，但历史上通常记为"大高源吾"。他是浅野家的家臣，参加了元禄十五年（1702年）十二月十四日的吉良邸讨入。小说中他的蒔絵印籠被一名德国游客看中，引发了越智东风与德国人之间一段滑稽的跨文化沟通故事。夏目漱石在此使用了"大鷹"这一异写。
  书中原文: 大鷹源吾の蒔絵の印籠を見て、これを買いたいが売ってくれるだろうかと聞くんだそうだ
  网络来源: https://baike.baidu.com/item/%E5%A4%A7%E9%AB%98%E6%BA%90%E5%90%BE

- 名词: 磔
  解释: 日本江户时代的死刑方式之一，将犯人绑在柱上以长枪刺死。与西方十字架刑不同，日本磔刑以刺穿而非钉死为手段。适用于弑主、弑亲、伪造货币等重罪。刑后尸体曝晒三日以儆效尤。1879年（明治12年）随着近代法体系整备而废止。小说中寒月在讨论绞刑历史时提及波斯人使用此刑。
  书中原文: 波斯人はどうかと申しますとこれもやはり処刑には磔を用いたようでございます
  网络来源: https://baike.baidu.com/item/%E7%A3%94%E5%88%91

- 名词: ヘロドタス
  解释: 即希罗多德（Herodotus，约前484-约前425），古希腊历史学家，被西塞罗称为"历史之父"。代表作《历史》（Historiai）记述了波斯战争及各地风土民情，是西方第一部完整传世的史书。小说中寒月在探讨绞刑的古代渊源时引用其说，体现了明治知识分子通过研读西方古典进行学术论证的风气。
  书中原文: ヘロドタスの説に従って見ますと猶太人はエジプトを去る以前から夜中死骸を曝されることを痛く忌み嫌ったように思われます
  网络来源: https://baike.baidu.com/item/%E5%B8%8C%E7%BD%97%E5%A4%9A%E5%BE%B7/683204

- 名词: オディセー
  解释: 即荷马史诗《奥德赛》（Odyssey），相传为古希腊盲诗人荷马所作，与《伊利亚特》并称古希腊两大史诗。叙述特洛伊战争后英雄奥德修斯十年漂泊归乡的故事。小说中寒月引用其第22卷中忒勒马科斯绞死十二名女仆的段落，作为绞刑处刑的早期文学例证，显示明治学者对西方古典文学的熟悉。
  书中原文: 真に処刑として絞殺を用いましたのは、私の調べました結果によりますると、オディセーの二十二巻目に出ております
  网络来源: https://baike.baidu.com/item/%E5%A5%A5%E5%BE%B7%E8%B5%9B/10959511

- 名词: ベオウルフ
  解释: 古英语史诗《贝奥武夫》（Beowulf），创作于约8世纪，全诗3182行，作者不详。现存唯一写本为10-11世纪之物，藏于大英图书馆。与法国《罗兰之歌》、德国《尼伯龙根之歌》并称欧洲三大英雄史诗。小说中寒月引用其中出现"galga"（绞首架）一词，作为绞刑在英国自古实行的语言学证据。
  书中原文: 英国へ移って論じますと、ベオウルフの中に絞首架即ちガルガと申す字が見えますから絞罪の刑はこの時代から行われたものに違ないと思われます
  网络来源: https://baike.baidu.com/item/%E8%B4%9D%E5%A5%A5%E6%AD%A6%E5%A4%AB/24730

- 名词: ブラクストーン
  解释: 威廉·布莱克斯通（Sir William Blackstone，1723-1780），18世纪英国法学家，代表作《英国法释义》（Commentaries on the Laws of England，1765-1769）是英美法系最重要的经典著作之一。明治时期日本引入西方法制时，布莱克斯通的著作被作为法学教育的必读书目。小说中寒月引用其关于绞刑的规定，展现了明治知识分子通过西方法学典籍进行学术考证的特点。
  书中原文: ブラクストーンの説によるともし絞罪に処せられる罪人が、万一縄の具合で死に切れぬ時は再度同様の刑罰を受くべきものだとしてあります
  网络来源: https://www.britannica.com/biography/William-Blackstone

- 名词: ピヤース・プローマン
  解释: 即《农夫皮尔斯》（Piers Plowman），14世纪英国诗人威廉·朗格兰（William Langland，约1332-约1400）所作的中英语宗教寓意头韵诗。以梦境幻象的形式探讨"行善"的三大境界。与乔叟《坎特伯雷故事集》并称14世纪英国文学的双璧。小说中寒月引用其中"假令凶汉でも二度绞める法はない"的诗句，展示了明治学者对中世英国文学的涉猎之广。
  书中原文: ピヤース・プローマンの中には仮令兇漢でも二度絞める法はないと云う句があるのです
  网络来源: https://baike.baidu.com/item/%E5%86%9C%E5%A4%AB%E7%9A%AE%E5%B0%94%E6%96%AF/5590582

- 名词: フロック
  解释: 即フロックコート（frock coat），19世纪西方男性的正式外套，长度及膝，前襟双排扣。明治时期日本推行文明开化，1872年太政官布告将フロックコート定为官员礼服。小说中寒月穿着"立派なフロック"来进行"演舌"（演讲），体现了明治知识分子在正式场合着西式礼服的时尚，也是当时"洋装化"社会风潮的缩影。
  书中原文: 例になく立派なフロックを着て、洗濯し立ての白襟を聳やかして
  网络来源: https://searchworks.stanford.edu/view/11855727
