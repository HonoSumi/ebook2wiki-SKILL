- 名词: トチメンボー
  解释: 橡面坊，明治时期俳句诗人安藤炼三郎的俳号（笔名）。在夏目漱石《我是猫》中被用作虚构的料理名，是一种文字游戏——其发音与英语"minceball"（肉丸）相似，迷亭故意用此名戏弄西洋料理店的侍者。
  书中原文: 近頃はトチメンボーの材料が払底で亀屋へ行っても横浜の十五番へ行っても買われませんから
  网络来源: https://book.douban.com/annotation/135779002/

- 名词: 日本新聞
  解释: 明治时代的重要报纸之一，1889年（明治22年）由陆羯南创办，以政论和文学评论著称，具有强烈的国粹主义色彩。夏目漱石本人也曾在该报发表作品。作中角色从怀中取出阅读。
  书中原文: 私しも仕方がないから、懐から日本新聞を出して読み出しました
  网络来源: https://book.qq.com/book-read/36681416/13

- 名词: 近松
  解释: 近松门左卫门（1653-1725），江户时代前期的净琉璃和歌舞伎剧作家，与井原西鹤、松尾芭蕉并称"元禄三文豪"，被誉为"日本的莎士比亚"。代表作有《曾根崎心中》《国姓爷合战》《心中天网岛》等，一生创作净琉璃剧本约110部。
  书中原文: せんだっては近松の心中物をやりました
  网络来源: https://baike.baidu.com/item/%E8%BF%91%E6%9D%BE%E9%97%A8%E5%B7%A6%E5%8D%AB%E9%97%A8

- 名词: 浄瑠璃
  解释: 净琉璃，日本传统说唱艺术，以三味线伴奏讲述故事。与木偶戏结合后形成"人形净琉璃"（文乐），是日本四大古典舞台艺术之一（与能乐、狂言、歌舞伎并列）。2003年被联合国教科文组织列为非物质文化遗产。
  书中原文: 近松？　あの浄瑠璃の近松ですか
  网络来源: https://baike.baidu.com/item/%E5%87%80%E7%91%A0%E7%92%83/8195553

- 名词: 芳原
  解释: 指吉原（Yoshiwara），江户幕府公認的遊廓（花街），位于浅草寺以北。1617年开设，1657年明历大火后迁至现东京台东区。是江户时代最大的红灯区，也是文学、浮世绘、歌舞伎等艺术作品的重要题材。明治以后继续存在，直至1957年卖春防止法实施后关闭。
  书中原文: その、船頭が御客を乗せて芳原へ行く所なんで
  网络来源: https://www.163.com/dy/article/FGEMBV1S05149FK0.html

- 名词: 花魁
  解释: 江户时代吉原遊廓中最上級的遊女（娼妓）。语源为"おいらの所の姉さん"。花魁需经过严苛的修行，精通琴棋书画、茶道香道等教养。见客需要三次会面才能亲近，费用极高。其华丽的"花魁道中"行列是江户文化的标志性景象。
  书中原文: 花魁が法学士のＫ君でしたが、口髯を生やして、女の甘ったるいせりふを使かうのですからちょっと妙でした
  网络来源: https://baike.baidu.com/item/%E8%8A%B1%E9%AD%81/4647

- 名词: 遣手
  解释: 吉原遊廓中的女性管理者，负责遊女的日常管理、教育以及接待客人的协调工作。通常由退休遊女或年长的女性担任，在客人与遊女之间充当牵线人和面试官的角色，是花街运营中的重要职务。
  书中原文: 花魁と仲居と遣手と見番だけですから
  网络来源: https://wapbaike.baidu.com/tashuo/browse/content?id=814b65ae6af6c8b758777620

- 名词: 見番
  解释: 花街（芸者文化）中负责芸妓派遣、管理、会计的中枢机构或人员。起源于1779年，原是政府为监控芸妓是否涉及卖淫而设的检查机构。在遊廓语境下则是指负责遊女演出预约和调度的事务所。
  书中原文: 見番と云うのは人間ですかまたは一定の場所を指すのですか、もし人間とすれば男ですか女ですか
  网络来源: https://www.guidoor.jp/zh-cn/spots/77

- 名词: 仲居
  解释: 日本传统料亭、旅馆或茶屋中负责接待客人的女服务员。在遊郭语境下，指隶属于茶屋的下级女侍，负责上菜、斟酒等杂务，地位低于花魁。
  书中原文: 仲居というのは娼家の下婢にあたるものですかな
  网络来源: https://upimg.baike.so.com/doc/26959102-28328177.html

- 名词: カステラ
  解释: 长崎蛋糕（Castella），源自16世纪葡萄牙传教士带到长崎的南蛮点心。名称来自西班牙的卡斯蒂利亚王国（Castilla）。以鸡蛋、面粉、砂糖为主要原料，口感绵密。江户时代为高级贡品，明治以后普及全国，成为长崎最具代表性的伴手礼。
  书中原文: 東風子は菓子皿の中のカステラをつまんで一口に頰張る
  网络来源: https://zh.wikipedia.org/zh-tw/%E5%8D%A1%E6%96%AF%E7%89%B9%E6%8B%89

- 名词: 歌留多
  解释: 日本纸牌游戏的总称，源自葡萄牙语"carta"。16世纪传入日本后本土化发展，主要种类有"百人一首歌留多"（竞技歌牌）、"花札""伊吕波歌留多"等。其中竞技歌牌使用《小仓百人一首》的和歌，被称为"榻榻米上的格斗技"。
  书中原文: 明日は某男爵の歌留多会、明後日は審美学協会の新年宴会
  网络来源: https://baike.baidu.com/item/%E6%AD%8C%E7%95%99%E5%A4%9A/2982780

- 名词: 朗読会
  解释: 朗読会（朗读会），明治时期知识阶层兴起的文学活动形式，由文学爱好者组织，定期集合朗读和研读文学作品。作中东风组织的朗读会采用"悬合"（分担角色）的方式演出净琉璃等作品，反映了明治时代西式文艺沙龙与日本传统结合的特色。
  书中原文: 同志だけがよりましてせんだってから朗読会というのを組織しまして、毎月一回会合してこの方面の研究をこれから続けたいつもりで
  网络来源: https://www.gltjp.com/zh-hant/directory/item/14072

- 名词: 書割
  解释: 歌舞伎舞台装置中绘制风景的平面背景画幕，与表现建筑物的"屋体"并列，是歌舞伎舞台美术的重要组成部分。这种二维绘景手法体现了歌舞伎独特的绘画性舞台美学。
  书中原文: ええ衣装と書割がないくらいなものですな
  网络来源: https://www2.ntj.jac.go.jp/unesco/kabuki/tc/production/scene1.html

- 名词: 小菊版
  解释: 日本纸张规格"菊判"的小型版。菊判全纸为636×939mm，书籍用菊判约为152×218mm。"小菊版"指比常规菊判更小的开本，常用于便携式笔记本、怀纸等。作中东风从紫色包袱中郑重取出的即是小菊版账簿。
  书中原文: 紫の風呂敷から大事そうに小菊版の帳面を出す
  网络来源: https://www.amazon.co.jp/-/zh/dp/B07F18YT2P

- 名词: 審美学協会
  解释: 日本明治时期的美学学术团体。明治维新后，西周于1872年发表《美妙学说》开创日本近代美学。该协会是明治知识阶层学习西方哲学美学、举办学术聚会的组织，代表了当时日本学界对西洋美学的接受与消化。
  书中原文: 明後日は審美学協会の新年宴会
  网络来源: https://wap.cnki.net/touch/web/Journal/Article/WYYJ200002019.html

- 名词: 謡曲
  解释: 谣曲，日本传统能剧的台本（歌词）及其演唱。室町时代由观阿弥、世阿弥父子完善。以"幽玄"为美学理念，在笛、鼓等乐器伴奏下吟唱。江户时代被武士阶级列为必修教养，明治以后仍作为传统艺术传承，现为联合国教科文组织非物质文化遗产。
  书中原文: 謡曲会、俳句会、短歌会、新体詩会等、会の連発にて当分の間は、のべつ幕無しに出勤致し候
  网络来源: https://zhuanlan.zhihu.com/p/46225569

- 名词: 蕪村
  解释: 与谢芜村（1716-1784），江户时代中期的俳人与画家。本姓谷口，师从早野巴人学习俳谐，一生崇敬松尾芭蕉。作为画家与池大雅并称"文人画双璧"。其俳风华丽浪漫，富有绘画性，代表作有《春風馬堤曲》等，被誉为明治新体诗的先驱。
  书中原文: 蕪村の春風馬堤曲の種類ですか
  网络来源: https://baike.baidu.com/item/%E4%B8%8E%E8%B0%A2%E8%8A%9C%E6%9D%91/0

- 名词: 春風馬堤曲
  解释: 《春風馬堤曲》，与谢芜村于1777年（安永6年）创作的韵文作品。采用自由诗形式，突破了传统定型俳谐的束缚，融入了浓厚的乡愁情结，被视为日本明治时代新体诗的先驱。作中主人询问东风的朗读会是否朗诵此作品。
  书中原文: 蕪村の春風馬堤曲の種類ですか
  网络来源: https://zh.wikipedia.org/zh-hans/%E8%88%87%E8%AC%9D%E8%95%AA%E6%9D%91

- 名词: 白楽天
  解释: 白居易（772-846），字乐天，号香山居士，中国唐代著名诗人。在日本以"白楽天"之名广为人知，对日本平安时代的文学（特别是《源氏物语》等）产生了深远影响。在明治时代的日本知识阶层中，白诗仍是文学教养的重要组成部分。
  书中原文: 古人の作というと白楽天の琵琶行のようなものででもあるんですか
  网络来源: https://baike.baidu.com/item/%E7%90%B5%E7%90%B6%E8%A1%8C/69544

- 名词: 琵琶行
  解释: 《琵琶行》，白居易于816年（唐元和十一年）所作的长篇叙事诗。以秋夜浔阳江头偶遇琵琶女为线索，抒发了"同是天涯沦落人"的感慨。诗中音乐描写极为精彩，"大珠小珠落玉盘""此时无声胜有声"等为千古名句。在日本文学教育中长期被传诵。
  书中原文: 古人の作というと白楽天の琵琶行のようなものででもあるんですか
  网络来源: https://baike.baidu.com/item/%E7%90%B5%E7%90%B6%E8%A1%8C/69544

- 名词: 孔雀の舌
  解释: 孔雀的舌头，古代罗马帝国全盛时期贵族宴席上的顶级珍馐。据记载，罗马美食家们推崇此菜为奢侈的极致。夏目漱石在《我是猫》中借迷亭之信戏谑地提及此典故，将其与"橡面坊"并列为荒唐美食，讽刺当时知识分子的附庸风雅。
  书中原文: 此孔雀の舌の料理は往昔羅馬全盛の砌り、一時非常に流行致し候ものにて、豪奢風流の極度と平生よりひそかに食指を動かし居候次第御諒察可被下候
  网络来源: https://book.douban.com/reading/94587566/

- 名词: 懸合
  解释: 悬合，日文"掛け合い"，指两人以上交替对话的表演形式。在朗读剧或戏剧中，多个演员分担角色、交互台词的方式称为"悬合"。作中东风的朗读会采用此法分配角色演出近松的作品。
  书中原文: 役を極めて懸合でやって見ました。その主意はなるべく作中の人物に同情を持ってその性格を発揮するのを第一として、それに手真似や身振りを添えます
  网络来源: https://www.edrdg.org/jmwsgi/entr.py?svc=jmdict&sid=&q=1821150.1

- 名词: レンブラント
  解释: 伦勃朗·范·莱因（1606-1669），荷兰黄金时代最伟大的画家，欧洲巴洛克绘画的代表人物。以明暗对比法（chiaroscuro）和深刻的心理刻画著称。代表作有《夜警》《杜普教授的解剖课》等。作中迷亭在信中提及伦勃朗所画宴席图中出现孔雀菜肴。
  书中原文: 有名なるレンブラントが画き候饗宴の図にも孔雀が尾を広げたる儘卓上に横わり居り候
  网络来源: https://zh.wikipedia.org/zh-hk/%E4%BC%A6%E5%8B%83%E6%9C%97
