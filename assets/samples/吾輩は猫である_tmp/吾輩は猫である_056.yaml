- 名词: 読売新聞
  解释: 日本最具影响力的全国性报纸之一，1874年（明治7年）11月2日由子安峻在东京创刊。其名称源于江户时代"瓦版"的贩卖方式——街头叫卖者边读边卖。明治时期的《读卖新闻》以"俗谈平话"为编辑方针，面向大众，大量刊登通俗小说，是明治文化的重要载体。
  书中原文: 傍にあった読売新聞の上にのしかかるように眼を落した。
  网络来源: https://zh.wikipedia.org/zh-mo/%E8%AE%80%E8%B3%A3%E6%96%B0%E8%81%9E

- 名词: 京焼
  解释: 京都地区生产的陶瓷器总称。明治时期，京烧在德国技师戈特弗里德·瓦格纳的指导下吸收外国技术，迅速发展成为日本主要出口产业。明治43年（1910年）日英博览会上，京烧的Art Nouveau风格受到国际关注。"京烧"主要指明治维新以前的京都陶瓷，而"清水烧"则多指明治以后的产品。
  书中原文: 京焼の安茶碗に番茶を浪々と注いで、アンチモニーの茶托の上へ載せて。
  网络来源: https://kougeihin.jp/zh-CHS/craft/0414/

- 名词: 理科大学
  解释: 指1886年（明治19年）《帝国大学令》颁布后，东京帝国大学下设的分科大学之一，即理学部的前身。帝国大学体制下设有法政、医科、文科、理科、工科五所分科大学。理科大学涵盖数学、物理、天文、化学、生物、地质等学科，是明治日本最高科学教育机构，位于上野公园附近。
  书中原文: あの鳴き声は昼でも理科大学へ聞えるくらいなんですから。
  网络来源: https://baike.baidu.com/item/%E5%B8%9D%E5%9B%BD%E5%A4%A7%E5%AD%A6/8428795

- 名词: 自転車
  解释: 自行车在江户末期（庆应年间）传入日本，明治3年（1870年）左右开始正式进口。明治时期自行车非常昂贵，是"西洋文明象征"和身份地位的标志，常以时间计价出租。漱石本人留学英国时也曾购买自行车并练习骑行，在作品『单車日記』中留下了相关记录。小说中寒月练习自行车导致裤子臀部磨损，反映了这一新兴交通工具在明治知识分子中的流行。
  书中原文: 近頃自転車の稽古を始めて局部に比較的多くの摩擦を与えるからである。
  网络来源: https://www.city.sakai.lg.jp/foreign-language/chinese/visitors/enjoying/traditional/bicycles.html

- 名词: 華厳滝
  解释: 位于栃木县日光市日光国立公园内的著名瀑布，高97米，宽7米，与那智瀑布、袋田瀑布并称"日本三大瀑布"。水源来自中禅寺湖。明治36年（1903年），第一高等学校学生藤村操在瀑布旁留下遗书"巌頭之感"后投瀑自杀，此事成为当时轰动社会的重大事件，华严瀑也因此成为知名的"自杀名所"。
  书中原文: 打ちゃって置くと巌頭の吟でも書いて華厳滝から飛び込むかも知れない。
  网络来源: https://zh.wikipedia.org/zh-hk/%E8%8F%AF%E5%9A%B4%E7%80%91%E5%B8%83

- 名词: 薩摩下駄
  解释: 日本萨摩国（今鹿儿岛县）地区制作的传统木屐。使用当地坚固木材制作，是萨摩藩武士和平民都广泛穿着的传统 footwear。明治时期随着萨摩藩在维新中扮演重要角色，萨摩下駄也成为识别萨摩出身者的标志之一。小说中武右卫门拖着萨摩下駄离开，暗示了他的粗犷性格和失意状态。
  书中原文: 武右衛門君は悄然として薩摩下駄を引きずって門を出た。
  网络来源: http://jc.newdu.com/d242267.html

- 名词: アンチモニー
  解释: 锑（antimony）是一种银白色类金属元素。明治至大正时期，日本工匠广泛使用锑（常与锡、铅制成合金）制作轻巧耐用的装饰品、小盒、花瓶等。锑制茶托等日用品作为西洋工艺的舶来品在明治中产阶级家庭中流行，反映了当时"文明开化"下西式器物渗透日常生活的文化现象。
  书中原文: 京焼の安茶碗に番茶を浪々と注いで、アンチモニーの茶托の上へ載せて。
  网络来源: https://www.objetdart-stuff.co.uk/post/the-history-and-antique-value-of-japanese-antimony-ware

- 名词: 紅塵万丈
  解释: 源自中国后汉班固《西都赋》"红尘四合，烟云相连"，原指都市繁华车马扬起的尘埃，后演变为形容名利纷扰、喧嚣烦恼的世俗世界。"万丈"极言其深广。明治时代知识分子常用此类汉文典故表达对近代都市文明喧嚣的厌倦和对自然隐逸的向往。
  书中原文: いつの間にか紅塵万丈の都会に住んでる気はなくなって、山の中へ迷い込んだような心持ちになるに相違ないです。
  网络来源: https://baike.baidu.com/item/%E7%BA%A2%E5%B0%98%E4%B8%87%E4%B8%88/6205898

- 名词: 魑魅
  解释: 中国古代文献中记载的山林精怪，常与"魍魉"并称。《左传》等典籍记载禹王铸九鼎使百姓识鬼神奸怪。魑魅原指山中如猛兽般的怪物，魅指草木精灵化身的惑人精怪。该概念随汉籍传入日本后，融入日本"百鬼夜行"妖怪文化体系。小说中寒月用此词形容深夜上野的恐怖氛围。
  书中原文: 四望人なく、鬼気肌に逼って、魑魅鼻を衝く際に……
  网络来源: https://baike.baidu.com/item/%E9%AD%91%E9%AD%89%E9%AD%8D%E9%AD%89

- 名词: 功徳
  解释: 佛教核心概念，指善行所带来的利益和福报。狭义上，"功"指利他的善行（布施等），"德"指这些善行内化为自身修行所得。与"福德"的区别在于是否无我执著——无执着的善行是"功德"，有执着的善行只是"福德"。小说中寒月劝说主人帮助武右卫门时说"救っておやりなさい。功徳になりますよ"，即以佛教功德观念来劝导行善。
  书中原文: 救っておやりなさい。功徳になりますよ。
  网络来源: https://baike.baidu.com/item/%E5%8A%9F%E5%BE%B7

- 名词: 時代思潮
  解释: 指某一特定时代社会中广泛流行的思想倾向和精神潮流。明治时代（1868-1912年）是日本思想最为多元激荡的时期，先后经历了文明开化（欧化主义）、自由民权、国粹主义、国家主义、社会主义等思潮的交错与碰撞。小说中寒月说自己"呑気な事を云う"是"時代思潮"，以当时的"时代思潮"为自己的洒脱态度辩护，反映了明治晚期知识分子对时代精神的自觉。
  书中原文: 何、これが時代思潮です、先生はあまり昔し風だから、何でもむずかしく解釈なさるんです。
  网络来源: http://www.nopss.gov.cn/BIG5/n1/2018/1120/c373410-30411557.html

- 名词: 鼠色
  解释: 日本传统色名，指灰色系色彩，因与老鼠体毛颜色相似而得名。江户时代幕府颁布奢侈禁令，庶民不得穿着鲜艳服饰，于是町人阶层发展出"四十八茶百鼠"的丰富灰色系配色文化，鼠色被视为"粋（いき）"审美意识的象征。九鬼周造在《"いき"の構造》中将其列为体现"媚态、意气、达观"三要素的重要色彩。
  书中原文: 例のごとく鼠色の、尻につぎの中ったずぼんを穿いている。
  网络来源: https://zh.wikipedia.org/zh-cn/%E9%BC%A0%E8%89%B2

- 名词: 巌頭の吟
  解释: 指明治36年（1903年）5月22日，东京第一高等学校学生藤村操（17岁）在日光华严瀑布旁的一棵树上刻下遗书"巌頭之感"后投瀑自杀的事件。其遗文充满厌世哲学，对当时以"立身出世"为美德的明治社会造成巨大冲击。此后4年间华严瀑自杀企图者达185人。小说中作者以讽刺口吻提到武右卫门可能学习此行为来威胁他人。
  书中原文: 打ちゃって置くと巌頭の吟でも書いて華厳滝から飛び込むかも知れない。
  网络来源: https://zh.wikipedia.org/zh-hk/%E8%8F%AF%E5%9A%B4%E7%80%91%E5%B8%83

- 名词: 動物園
  解释: 文中所指为"上野动物园"，全称"东京都恩赐上野动物园"，1882年（明治15年）3月20日开园，是日本最古老的动物园。最初作为农林省博物馆局下属博物馆（现东京国立博物馆）的附属设施开园，面积仅约1公顷。同年9月还开设了日本首个水族馆"观鱼室"。上野动物园是明治"文明开化"政策的产物，以欧洲动物园为范本建设。
  书中原文: たちまち動物園のうちで、虎が鳴くんです。
  网络来源: https://www.tokyo-zoo.net/zh-CHS/ueno/about/

- 名词: 清戯
  解释: 意为清雅高洁的娱乐、雅致的游戏。文中指围棋。围棋在中国自古被称为"雅戯"（高雅的游戏），《颜氏家训·杂艺》有"囲碁に手談・坐隠の目あり、頗る雅戯と為す"的记载。"清戯"与"雅戯"近义，强调围棋作为文人雅士精神修养方式的品格。小说中迷亭主张下棋应赌胜负，独仙则反对以赌注"俗了"清雅的游戏，体现了两种不同的娱乐观。
  书中原文: そんな事をすると、せっかくの清戯を俗了してしまう。かけなどで勝負に心を奪われては面白くない。
  网络来源: https://www.zdic.net/hant/%e9%9b%85%e6%88%8f

- 名词: 大僧
  解释: 原指受具足戒的正式比丘、或德高望重的老年僧侣，在佛教僧阶体系中常用于指代高位僧职如"大僧正""大僧都"。小说中寒月戏谑地将那些行为更恶劣却若无其事的人讽刺为"大僧共"，以佛教高位僧侣做反讽对比，暗示社会上真正该被追究的人反而逍遥自在。
  书中原文: もっと大きな、もっと分別のある大僧共がそれどころじゃない、わるいいたずらをして知らん面をしていますよ。
  网络来源: https://www.zdic.net/hant/%E5%A4%A7%E5%83%A7

- 名词: ずぼん
  解释: 日语中"裤子"的意思，源自法语"jupon"（衬裙）。明治时期随着洋服普及，该词在日本一般化。当时也使用"洋袴"的汉字表记。小说中寒月穿着臀部打补丁的鼠色裤子，因练习自行车导致磨损。这一细节生动反映了明治时期知识分子接受西方服饰文化，但生活清贫、衣着朴素的真实状态。
  书中原文: 例のごとく鼠色の、尻につぎの中ったずぼんを穿いている。
  网络来源: https://en.wiktionary.org/wiki/%E3%81%9A%E3%81%BC%E3%82%93

- 名词: 赤坂
  解释: 东京都港区的地名，位于皇居西南侧。江户时代为大名屋敷和旗本屋敷所在地。明治11年（1878年）东京实行郡区町村编制法，赤坂成为东京15区之一的"赤坂区"。明治时期赤坂以高级住宅区著称，聚集了大量官吏、军人和资产阶级的宅邸，同时也以高级料亭和旅馆闻名。
  书中原文: また赤坂かい。あの方面はもう御免だ。
  网络来源: https://zh.wikipedia.org/zh-hans/%E8%B5%A4%E5%9D%82
