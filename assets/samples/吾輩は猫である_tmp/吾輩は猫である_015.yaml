- 名词: ちょん髷
  解释: 日本江户至明治时期男性传统发型，将前额至头顶的头发剃光（月代），剩余头发在脑后束成髻。明治四年（1871年）政府颁布"散髪脱刀令"后，西洋发型逐渐普及，chonmage成为旧时代象征，现今仅相扑力士等传统职业保留此发型。
  书中原文: 頭にちょん髷を頂いて生きてるんだから恐縮しまさあ。帽子を被れってえと、おれはこの年になるが、まだ帽子を被るほど寒さを感じた事はないと威張ってるんです
  网络来源: https://zh.wikipedia.org/zh-cn/%E4%B8%81%E9%AB%B7

- 名词: 鉄扇
  解释: 日本武家使用的铁制折扇，外观与普通折扇无异，但扇骨为铁制，既可作为指挥信号用具，也可作为防身武器使用。明治九年（1876年）废刀令后，武士被禁止佩刀，鉄扇作为隐蔽性武器受到青睐，大日本武德会亦曾制作鉄扇。
  书中原文: それで外出する時には、きっと鉄扇をもって出るんですがね
  网络来源: https://zh.wiktionary.org/zh-hant/%E9%89%84%E6%89%87

- 名词: 山高帽子
  解释: 即西式top hat（丝质高顶礼帽），明治时期随西洋文明传入日本，成为官吏、华族、实业家等上流阶层男性正式场合的标配礼服配件。"山高"之名源于帽身高耸如山的日式称呼。明治中期至大正初期为鼎盛期。
  书中原文: 此の春突然手紙を寄こして山高帽子とフロックコートを至急送れと云うんです
  网络来源: https://catalog.digitalarchives.tw/item/00/6f/2e/1b.html

- 名词: フロックコート
  解释: 西式frock coat（长礼服），明治维新时期随西洋服装制度传入日本。1872年（明治五年）日本政府将燕尾服定为正式礼装，frock coat最初作为代用品被认可，后逐渐固定为日常礼服。鹿鸣馆时代（1880年代）的洋装化政策中，成为日本近代化进程中西洋服饰接受的象征之一。
  书中原文: 此の春突然手紙を寄こして山高帽子とフロックコートを至急送れと云うんです
  网络来源: https://searchworks.stanford.edu/view/11855727

- 名词: 大丸
  解释: 日本历史最悠久的百货公司之一。1717年（享保二年）从京都伏见的呉服店"大文字屋"起家，与越后屋、白木屋并称江户三大呉服店。明治四十年（1907年）正式设立合资公司"大丸呉服店"，明治四十五年（1912年）京都店以百货公司形态重新开幕，逐步发展为全国性大型百货企业。
  书中原文: 寸法を見計らって大丸へ注文してくれ
  网络来源: https://baike.baidu.com/item/%E5%A4%A7%E4%B8%B8/9679185

- 名词: 祝捷会
  解释: 意为"胜利庆祝会"，明治时期特别是日俄战争（1904-1905年）期间，日本全国各地为庆祝旅顺陷落、日本海海战等军事胜利而频繁举办的官方或民间庆祝活动。当时涌现大量"祝捷歌""祝捷军歌"，是明治国家动员民众、强化民族主义的重要手段之一。
  书中原文: 二十三日に静岡で祝捷会があるからそれまでに間に合うように、至急調達しろと云う命令なんです
  网络来源: https://opac.lib.hosei.ac.jp/opac/opac_details/?lang=0&amode=11&bibid=1020205354

- 名词: 文芸俱楽部
  解释: 博文馆发行的明治至昭和初期代表性综合文艺杂志。1895年（明治二十八年）创刊，1933年（昭和八年）停刊，共284号。刊载樋口一叶、泉镜花、田山花袋、尾崎红叶等明治代表作家的作品，附有水野年方、武内桂舟等绘制的木版彩色口绘，是明治文学的珍贵一次史料。
  书中原文: ちっと文芸俱楽部でも読んだらよさそうなものですがねえ
  网络来源: https://libraries.usc.edu/databases/bungei-kurabu-meiji-hen-wenyunjulebu-mingzhipian

- 名词: 旧暦
  解释: 指日本在明治改历前使用的传统太阴太阳历（天保历）。明治五年（1872年）十一月九日政府发布"改历诏书"，同年十二月二日（旧历）结束后，十二月三日即改为1873年1月1日（新历），正式采用格里高利太阳历。改历不仅出于财政原因（避免闰月多发薪俸），也是明治政府近代化、西洋化政策的一环，但旧历节日仍在民间长期保留。
  书中原文: 旧暦の歳の夜、山の狸が園遊会をやって盛に舞踏します
  网络来源: https://japanese.stackexchange.com/questions/45019/old-japanese-dates

- 名词: 羽衣
  解释: 日本神话传说中天女（天上女性）所穿的羽毛织就的衣裳，是"白鸟处女型"传说的核心母题。各地流传的天女羽衣传说中，渔夫或樵夫发现天女挂在树枝上的羽衣并藏匿，天女因而无法返回天上，被迫留在人间。其中最著名的是静冈三保松原舞台的能乐《羽衣》。日本各地（滋贺余吴湖、京都丹后、冲绳等）均有类似传说流传。
  书中原文: 見ると天女が羽衣を着て琵琶を弾いている
  网络来源: https://zh.wikipedia.org/zh-hans/%E5%A4%A9%E5%A5%B3_(%E6%97%A5%E6%9C%AC)

- 名词: アイソクラチス
  解释: 即古希腊著名修辞学家、教育家伊索克拉底（Isocrates，公元前436-前338年），雅典十大演说家之一，创办修辞学校，教授实用辩论术，培养众多政治家和历史学家。主张希腊城邦团结一致远征波斯（泛希腊主义）。这种西洋古典人物的引用反映了明治知识分子对西方古典学的接纳与崇尚。
  书中原文: 昔しアイソクラチスと云う人は九十四歳で大著述をした
  网络来源: https://www.britannica.com/biography/Isocrates

- 名词: ソフォクリス
  解释: 即古希腊三大悲剧诗人之一索福克勒斯（Sophocles，约公元前496-前406年），在戏剧中引入第三名演员，削弱歌队作用，深化人物刻画。《俄狄浦斯王》被亚里士多德誉为悲剧典范。其长寿（约90岁）与晚年创作力旺盛（《俄狄浦斯在科罗诺斯》为晚年作品）的形象被明治知识人所援引，以激励自身。
  书中原文: ソフォクリスが傑作を出して天下を驚かしたのは、ほとんど百歳の高齢だった
  网络来源: https://zh.wikipedia.org/zh/%E7%B4%A2%E7%A6%8F%E5%85%8B%E5%8B%92%E6%96%AF

- 名词: シモニジス
  解释: 即古希腊抒情诗人西摩尼得斯（Simonides of Ceos，约公元前556-前468年），以墓碑铭、胜利颂歌和哀歌闻名，温泉关战役斯巴达三百壮士的著名墓志铭为其所作。传说他发明了"位置记忆法"（记忆宫殿技法），也是被列入亚历山大里亚学者所定"九大抒情诗人"的重要诗人。明治知识分子常引其年高创作不辍的事迹。
  书中原文: シモニジスは八十で妙詩を作った
  网络来源: https://baike.baidu.com/item/%E8%A5%BF%E6%91%A9%E5%B0%BC%E5%BE%97%E6%96%AF
