- 名词: 本因坊
  解释: "日本江户时代围棋四大家（本因坊家、安井家、井上家、林家）之首，起源于京都寂光寺的塔头\"本因坊\"。开祖为僧侣本因坊算砂（日海），曾侍奉织田信长、丰臣秀吉、德川家康。本因坊家世袭共21世，江户时代10位围棋名人中有7位出自本因坊家。1938年21世本因坊秀哉引退后将\"本因坊\"名号让予日本棋院，此后成为围棋头衔战的名称。"
  书中原文: "\"禅坊主の碁にはこんな法はないかも知れないが、本因坊の流儀じゃ、あるんだから仕方がないさ\""
  网络来源: "https://wapbaike.baidu.com/item/%E6%9C%AC%E5%9B%A0%E5%9D%8A%E9%81%93%E7%AD%96"

- 名词: 定石
  解释: "围棋术语，指经过历代棋手长期经验积累而形成的、在角部局部对战中双方都能接受的固定下法（即最佳手顺组合）。日语称\"定石\"，中文也称\"定式\"。定石并非一成不变，而是随着围棋理论的发展不断更新，平均每十年约20%的定石会被刷新。在明治时代，围棋定石的研究在日本相当兴盛，形成了各流派独特的定石体系。"
  书中原文: "\"しからば謙遜して、定石にここいらから行こう\" / \"定石にそんなのはないよ\""
  网络来源: "https://zh.wiktionary.org/zh/%E5%AE%9A%E7%9F%B3"

- 名词: 禅機
  解释: "禅宗用语，指禅师在说法或接引学人时，运用蕴含机要秘诀的言辞、动作或事物来暗示教义，使对方触机而悟的方法。禅机常以含蓄、简短、形象生动的语言或棒喝等非言语手段呈现，目的在于截断学人的逻辑思维，启发其直接悟解。明治时代的知识分子中，参禅研究禅机颇为盛行，成为一种文化风尚。"
  书中原文: "\"呑気なる迷亭君と、禅機ある独仙君とは\""
  网络来源: "https://baike.baidu.com/item/%E7%A6%85%E6%9C%BA/2733210"

- 名词: 列仙伝
  解释: "中国第一部系统记述神仙人物的传记作品，旧题西汉刘向撰（作者存在争议），共二卷。收录从上古神农、黄帝时期至汉代的神仙人物70至72人，包括赤松子、宁封子、黄帝、老子、吕尚、彭祖等。该书开创了中国神仙传记的先河，对后世葛洪《神仙传》等影响深远。在日本江户至明治时代，《列仙传》作为汉学经典被广泛阅读，成为文人雅士的修养读物。"
  书中原文: "\"宛然たる列仙伝中の人物だね\""
  网络来源: "https://zh.wikipedia.org/zh-tw/%E5%88%97%E4%BB%99%E4%BC%A0"

- 名词: 無絃の素琴
  解释: "出自中国东晋诗人陶渊明（陶潜）的著名典故。据《宋书》《晋书》记载，陶渊明不通音律，却收藏一张没有琴弦的素琴，每当饮酒到酣畅时，便抚弄无弦之琴以寄托心意，并说\"但识琴中趣，何劳弦上声\"。这一典故象征得意忘言、不拘形迹的魏晋名士风度，体现道家\"大音希声\"的哲学思想，深受日本明治时代文人的欣赏与引用。"
  书中原文: "\"無絃の素琴を弾じさ\""
  网络来源: "https://baike.baidu.com/item/%E7%B4%A0%E7%90%B4/2174851"

- 名词: 鰹節
  解释: "日本传统食品，将鲣鱼（skipjack tuna）经煮熟、烟熏干燥、霉菌发酵而成的加工食品，是日本料理中最核心的高汤原料之一。制作工艺极其繁复，需经生切、煮熟、骨拔、焙干（6至15次反复烟熏）、整形、种霉（3至5次霉菌发酵熟成）等工序，最终重量仅为原料的六分之一，被吉尼斯世界纪录认定为\"世界最硬食品\"。产于日本鹿儿岛枕崎、静冈烧津等地。在明治时代作为名特产和送礼佳品广为流通。"
  书中原文: "\"実は四日ばかり前に国から帰って来たのですが、いろいろ用事があって……このおみやげを早く献上しないと心配ですから\" / \"ええ、国の名産です\""
  网络来源: "https://baike.baidu.com/item/%E9%B2%A3%E8%8A%82"

- 名词: 一剣天に倚って寒し
  解释: "禅宗著名偈颂，完整句式\"两头俱截断，一剑倚天寒\"。出自宋代明极楚俊禅师（后东渡日本）的公案，亦见于宋代释心月《偈颂一百五十首》、释道川《颂古二十八首》。意指用般若智慧之剑同时斩断\"生\"与\"死\"（或\"迷\"与\"悟\"等）的二元对立，达到超越一切对立、绝对自由的孤高境界。\"寒\"字象征断除情识烦恼后的清冷、孤高、澄明的心境。日本临济宗等禅门将此句作为重要公案。"
  书中原文: "\"一剣天に倚って寒し――ええ、面倒だ。思い切って、切ってしまえ\""
  网络来源: "https://www.70thvictory.com.tw/mingju/b/bda9f641535.htm"

- 名词: 薫風南より来って殿閣微涼を生ず
  解释: "原句为\"薰风自南来，殿阁生微凉\"，出自《旧唐书》卷一百六十五《柳公权传》。唐文宗李昂在夏日与学士联诗，文宗先吟\"人皆苦炎热，我爱夏日长\"，侍书学士柳公权续以\"薰风自南来，殿阁生微凉\"，文宗赞其\"辞清意足\"。宋代苏轼批评此句只写殿阁凉意而不念百姓之苦，遂补作\"一为居所移，苦乐永相忘。愿言均此施，清阴分四方\"。此句在日本禅宗中也极受重视，宋代大慧宗杲禅师闻此句而大悟。"
  书中原文: "\"薫風南より来って、殿閣微涼を生ず。こう、ついでおけば大丈夫なものだ\""
  网络来源: "https://cn.rinnou.net/word_zen/0507.html"

- 名词: 生死事大無常迅速
  解释: "禅宗著名法语，出自《六祖大师法宝坛经》\"机缘第七\"。永嘉玄觉禅师初见六祖慧能时，绕慧能三匝而不拜，慧能问其何来，玄觉答道\"生死事大，无常迅速\"，意谓生死是人生最重大的问题，世间万物的无常变化极为迅速，以此表明求道之急切。慧能遂与之机锋对答，玄觉由此彻悟。此八字在禅门中被视为修行者的座右铭，常贴在禅堂警示学人精进修行。"
  书中原文: "\"生死事大、無常迅速、あきらめるさ\""
  网络来源: "https://www.shidianguji.com/zh/mingju/7481201729288060966"

- 名词: 高等学校
  解释: "日本明治时代的旧制高等学校，是1886年《中学校令》颁布后建立的精英教育机构，为帝国大学输送预备人才。最初称\"高等中学校\"，1894年后改称\"高等学校\"。修业年限初为2年，后改为3年。1894年时全国仅五所：第一高等学校（东京）、第二高等学校（仙台）、第三高等学校（京都）、第四高等学校（金泽）、第五高等学校（熊本）。旧制高等学校实行全寄宿制，注重人格教育与自由学风，培养了大量明治至昭和时代的精英人才，1947年后学制改革中被新制大学吸收。"
  书中原文: "\"高等学校時代さ\" / \"高等学校時代に先生でもあってやり出したのかい\""
  网络来源: "https://baike.baidu.com/item/%E5%AD%A6%E6%A0%A1%E4%BB%A4/0"

- 名词: 麻裏草履
  解释: "日本传统草履的一种变体，在草履底面缝上麻绳以增加防滑性能，便于在坡道较多的地区工作行走。起源于爱知县濑户地区。明治时代，一般民众在日常生活中仍广泛穿用草履、草鞋等传统鞋类，随着明治后期西洋鞋的传入，传统草履逐渐从日常主流中淡出，但在地方上仍保留了生产传统。"
  书中原文: "\"その時分は高等学校生で西洋の音楽などをやったものはほとんどなかったのです。ことに私のおった学校は田舎の田舎で麻裏草履さえないと云うくらいな質朴な所でした\""
  网络来源: "https://m.sohu.com/a/420111748_671753/"

- 名词: 風流
  解释: "源于中国的美学概念，在日本发展出独特的内涵。日本美学中的\"风流\"（ふうりゅう）融合了\"物哀\"的悲调、\"幽玄\"的幽暗、\"侘寂\"的内省体验，其核心在于\"不风流处见风流\"——在清贫、苦难、残缺中发现并品味美。明治时代的知识阶层中，风流被视为文人雅士的重要修养，与茶道、俳谐、绘画等艺术形式密切相关，夏目漱石本人及正冈子规等文人都曾将病苦转化为风流美学。"
  书中原文: "\"それは風流だ。行く春や重たき琵琶のだき心と云う句もある\""
  网络来源: "https://baike.baidu.com/item/%E9%A3%8E%E6%B5%81%E7%BE%8E%E5%AD%A6/64242840"

- 名词: 釜中の章魚
  解释: "日文表达，直译为\"锅中的章鱼\"，比喻陷入困境、手脚被束缚无法自由行动的处境。夏目漱石在此处化用了日本惯用表达\"釜中の魚\"（锅中的鱼，比喻即将被烹煮而不自知的危险处境），将\"鱼\"换成\"章鱼\"，生动地描绘围棋对局中一方被彻底压制、动弹不得的状态。明治文人常以这类诙谐的造语来增强表现力，漱石是其中的代表作家。"
  书中原文: "\"相手が釜中の章魚同然手も足も出せないのだから\""
  网络来源: "https://japanese_english.en-academic.com/271436/%25E9%2587%259C%25E4%25B8%25AD"

- 名词: 彘肩
  解释: "语出《史记·项羽本纪》\"鸿门宴\"典故。\"彘肩\"指猪的前腿肩肉。樊哙闯入鸿门宴护卫刘邦，项羽赞其壮勇，命赐\"彘肩\"，部下故意给生彘肩，樊哙以盾为案、以剑切而食之，项羽更为赞叹。后世以\"彘肩斗酒\"形容英雄豪壮之气概。明治时代的知识分子多精通汉学，《史记》是必修经典，文中引用此典正体现了明治文人以汉文典故进行机智对谈的文化风尚。"
  书中原文: "\"臣死をだも辞せず、いわんや彘肩をや\""
  网络来源: "https://baike.baidu.com/item/%E5%BD%98%E8%82%A9%E6%96%97%E9%85%92"
