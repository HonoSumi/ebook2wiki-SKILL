- 名词: 小泉八雲
  解释: 小泉八云（Lafcadio Hearn，1850-1904），爱尔兰裔希腊人，后归化日本，是明治时代著名的作家、学者，以将日本怪谈故事介绍给西方世界而闻名。代表作《怪谈》（Kwaidan）收录了《雪女》《耳无芳一》等名篇。他曾在东京帝国大学讲授英国文学，与夏目漱石同时代活跃于文坛。
  书中原文: 故小泉八雲先生に話したら非常に受けるのだが
  网络来源: https://baike.baidu.com/item/%E5%B0%8F%E6%B3%89%E5%85%AB%E4%BA%91/7232871

- 名词: 越後国
  解释: 越后国，日本古代的令制国之一，属北陆道，领域大致相当于现在的新潟县本州部分。明治时代废藩置县后改为新潟县。文中迷亭讲述在越后国蒲原郡的蛸壶峠附近宿夜的经历。
  书中原文: 僕が越後の国は蒲原郡筍谷を通って、蛸壺峠へかかって
  网络来源: https://baike.baidu.com/item/%E8%B6%8A%E5%90%8E%E5%9B%BD

- 名词: 蛸壺峠
  解释: 蛸壶峠（たこつぼとうげ），位于越后国（今新潟县）的山岭通道。文中迷亭旅行途中在此遇风雪，投宿山中人家，经历了吃蛇饭等奇异遭遇，并用此经历铺陈他的"失恋"谈。该地名在现实中已难以确切考证，可能为夏目漱石虚构或借用的小地名。
  书中原文: 蛸壺峠へかかって、これからいよいよ会津領へ出ようとするところだ
  网络来源: https://jphoto.org/gallery/%e8%8d%92%e5%b7%9d%e3%81%a8%e6%9c%b3%e5%b7%ae%e5%b2%b3/

- 名词: 会津領
  解释: 会津领，江户时代至明治初期会津藩的领地，位于陆奥国西部（今福岛县西部）。会津藩在幕末时期是佐幕派的重要力量，经历过戊辰战争中的会津之战。明治废藩置县后编入福岛县。文中迷亭计划从越后翻岭进入会津领地。
  书中原文: これからいよいよ会津領へ出ようとするところだ
  网络来源: https://baike.baidu.com/item/%E4%BC%9A%E6%B4%A5%E8%97%A9

- 名词: 文金高島田
  解释: 文金高岛田，日本传统女性发型中最正式、最高格调的一种，属于"岛田髷"的变体。其特征为发髻根部梳得极高，造型华丽端庄，江户中期因货币"文金"（元文小判）改铸导致物价高涨、发髻也高高耸起而得名，明治以后被固定为新娘子正式婚礼的发型，搭配白无垢和角隐使用。
  书中原文: 文金の高島田に髪を結いましてね
  网络来源: https://ja.wikipedia.org/wiki/%E9%AB%98%E5%B3%B6%E7%94%B0

- 名词: 蛇飯
  解释: 蛇饭（へびめし），文中描述的一种山村乡土料理——将蛇与米一同放入锅中烹煮，蛇肉因受热而将头伸出锅盖的孔洞，食客抓住蛇头将骨肉分离后食用。这是夏目漱石笔下虚构的怪异饮食，用于突出迷亭故事中越后国山村的奇异民俗色彩。现实中虽无此名菜，但日本部分地区确有食用蛇肉的传统。
  书中原文: せっかくの御客さまだから蛇飯でも炊いて上げようと云うんです
  网络来源: https://read.cnki.net/web/Journal/Article/SZZZ198904018.html

- 名词: 泉鏡花
  解释: 泉镜花（Izumi Kyoka，1873-1939），本名镜太郎，明治至昭和时期的日本小说家，石川县金泽市出身。师从尾崎红叶，以浪漫幻想文学著称，代表作有《高野圣》《妇系图》《歌行灯》等。其文风华丽奇诡，擅长描写现实与异界交织的世界。迷亭引用镜花小说"雪中出蟹"来为自己的蛇饭故事辩护。
  书中原文: 鏡花の小説にゃ雪の中から蟹が出てくるじゃないか
  网络来源: https://baike.baidu.com/item/%E6%B3%89%E9%95%9C%E8%8A%B1/5426519

- 名词: 蝗
  解释: 蝗（いなご），即蝗虫/蚂蚱，日本传统上被用作食材，尤其是内陆地区的农村，常将蝗虫佃煮（酱油糖煮）作为下饭菜或下酒菜。在明治时代的农村，捕食蝗虫既是补充蛋白质的手段，也兼有驱除稻田害虫的实用意义。文中迷亭自称"恶者食之队长"，曾大量食用蝗虫、蛞蝓、赤蛙等。
  书中原文: 蝗、なめくじ、赤蛙などは食い厭きていたくらいなところだから
  网络来源: https://www.foodiedu.org/news/1444

- 名词: 赤蛙
  解释: 赤蛙（あかがえる），日本赤蛙，一种分布于东亚的蛙类。在日本传统农村饮食文化中，蛙类偶尔被作为食材料理（尤以山间地区为多）。文中迷亭将其列为"恶者食"的一种，与蝗虫、蛞蝓并提，意在表现其饮食经历的奇异和胆大，为其塑造独特的怪人形象服务。
  书中原文: 蝗、なめくじ、赤蛙などは食い厭きていたくらいなところだから
  网络来源: https://ja.wikipedia.org/wiki/%E3%83%8B%E3%83%9B%E3%83%B3%E3%82%A2%E3%82%AB%E3%82%AC%E3%82%A8%E3%83%AB

- 名词: 薬缶頭
  解释: 药缶头（やかんあたま），日语俗语，取"药缶（金属烧水壶）表面光滑锃亮"之意，比喻完全秃顶的头部。文中迷亭讲述山家女儿夜里梳着高高的岛田髻，次日清晨却变成秃头（药缶头），戴上假发又恢复岛田髻，令迷亭大失所望，成为其"失恋"的根源。
  书中原文: 薬缶はようやく顔を洗い了って、傍えの石の上に置いてあった高島田の鬘を無雑作に被って
  网络来源: https://zh.wiktionary.org/zh/%E8%96%AC%E7%BC%B6%E9%A0%AD

- 名词: 鬘
  解释: 鬘（かつら），即日本传统假发。在日本传统发型文化中，女性尤其是艺伎、新娘和参加正式场合的妇女会佩戴假发来完成复杂的高岛田等发型。文中讲述了山中女子清晨秃头（药缶头），戴上高岛田假发后又变为美人的反转情节。
  书中原文: 傍えの石の上に置いてあった高島田の鬘を無雑作に被って
  网络来源: https://ja.wikipedia.org/wiki/%E9%AB%AA%E3%81%AE%E5%81%BD%E9%AB%AA

- 名词: 東西館
  解释: 东西馆，明治时代静冈市的一家旅馆。文中老梅君（角色）旅行时投宿此处，当天即向女佣御夏求婚，随后又询问有无西瓜可吃，最后因吃太多西瓜腹痛求医，临走时追问求婚结果，被御夏以"静冈有西瓜有医生，但没有一夜就做成的妻子"婉拒。
  书中原文: 先生その昔静岡の東西館へ泊った事があるのさ
  网络来源: https://tw.trip.com/moments/theme/poi-tokaikan-18699632-thorough-guides-993136/

- 名词: 別嬪
  解释: 别嫔（べっぴん），日语中"美人""美女"的俗称。原为"别品"（特别好的物品、精品），后引申指容貌出众的女性，并借用汉字"嫔"（宫廷女官）表记。此词在大阪、京都等上方地区产生，明治时期普及至全国。文中将女佣御夏形容为"有名的别嫔"。
  书中原文: あの宿屋に御夏さんと云う有名な別嬪がいて
  网络来源: https://zh.wiktionary.org/zh-hant/%E3%81%B9%E3%81%A3%E3%81%B4%E3%82%93

- 名词: 水瓜
  解释: 水瓜（すいか），日语中"西瓜"的雅称/古称。现代日语通常用"西瓜"（すいか），"水瓜"为同义异写。文中御夏为老梅端上一大盘西瓜（水瓜），老梅全部吃完后腹痛，又询问静冈有无医生，成为笑谈。
  书中原文: なんぼ静岡だって水瓜くらいはありますよと、御盆に水瓜を山盛りにして持ってくる
  网络来源: https://ja.wikipedia.org/wiki/%E3%82%B9%E3%82%A4%E3%82%AB

- 名词: ミュッセ
  解释: 缪塞（Alfred de Musset，1810-1857），法国浪漫主义诗人、剧作家、小说家，与雨果、拉马丁、维尼并称法国浪漫派四大诗人。代表作《四夜诗集》《世纪儿的告白》。缪塞的戏剧和诗歌在明治时期的日本知识分子中广受欢迎，作为西方文学的样板被研读。苦沙弥引用缪塞剧作中的台词谈论女性。
  书中原文: せんだってミュッセの脚本を読んだらそのうちの人物が羅馬の詩人を引用してこんな事を云っていた
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E5%B0%94%E5%BC%97%E9%9B%B7%E5%BE%B7%C2%B7%E5%BE%B7%C2%B7%E7%BC%AA%E5%A1%9E/4861443

- 名词: 金縁の眼鏡
  解释: 金丝边眼镜，明治时代知识分子身份的象征。明治时期眼镜从西洋传入，金丝边眼镜（金缘眼镜）尤为昂贵，佩戴者多为教师、学者、官员等受过高等教育的人士。文中迷亭擦拭其金丝边眼镜，自称因蛇饭吃多上了火而变成近视眼。
  书中原文: この通りその時から近眼になりましたと金縁の眼鏡をとってハンケチで叮嚀に拭いている
  网络来源: https://ja.wikipedia.org/wiki/%E7%9C%BC%E9%8F%A1

- 名词: 千字文
  解释: 千字文（せんじもん），中国南朝梁代周兴嗣编纂的蒙学读物，由1000个不重复的汉字组成的韵文。早在飞鸟奈良时代即传入日本，长期作为寺子屋和藩校的汉字教育基础教材。明治时代虽引入西洋教育体系，但千字文仍在汉文教育和书法教育中被广泛使用。文中老梅请的医生名字被戏称为"偷千字文的"（天地玄黄）。
  书中原文: 天地玄黄とかいう千字文を盗んだような名前のドクトルを連れて来た
  网络来源: https://baike.baidu.com/item/%E5%8D%83%E5%AD%97%E6%96%87/107073
