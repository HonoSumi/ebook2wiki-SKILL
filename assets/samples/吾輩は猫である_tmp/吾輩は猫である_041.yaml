- 名词: ダムダム弾
  解释: ダムダム弾（达姆弹/Dum-dum bullet）是一种在人体内容易扩张或扁平的子弹，弹头尖端露出铅芯或带有切口。1890年代由英国在印度加尔各答附近的达姆达姆兵工厂开发，用于殖民地战争以增强杀伤力。1899年第一次海牙和平会议通过《海牙宣言(IV,3)禁止使用扩张性弹丸》，日本于1900年（明治33年）批准该条约。日俄战争（1904-1905）期间，日本曾指控俄军使用达姆弹。本篇中用作比喻，形容学生击打棒球的猛烈程度。
  书中原文: 「永久ダムダム弾の乱射を免がれるに相違ない」「ダムダム弾を発射する方法を紹介する」「ダムダム弾は近来諸所で製造するが随分高価なものである」
  网络来源: https://zh.wikipedia.org/zh-hant/%E9%81%94%E5%A7%86%E5%BC%B9

- 名词: ベースボール
  解释: 棒球（Baseball），明治时期由美国传入日本的新式运动。1872年（明治5年）美国教师霍勒斯·威尔逊（Horace Wilson）在东京开成学校（后东京大学）首次教授学生棒球。此后在旧制高中和大学中迅速普及，早稻田大学与庆应义塾大学的对抗赛（早庆战）成为日本最古老的体育赛事。1890年代，正冈子规和中马庚将Baseball译为野球，并创造了打者、走者、飞球等术语。本篇中学生们以练习棒球为名，实际上是在向主人家挑衅。
  书中原文: 「ある人の説によるとこれはベースボールの練習であって、決して戦闘準備ではないそうだ」「米国から輸入された遊戯で、今日中学程度以上の学校に行わるる運動のうちでもっとも流行するものだそうだ」
  网络来源: https://www.nippon.com/hk/japan-topics/g02195/

- 名词: 沙河
  解释: 沙河会战（沙河会戦/Battle of Shaho），日俄战争中的重要陆战。1904年10月5日至20日，在中国东北奉天以南的沙河地区（今辽宁省沈阳市苏家屯区）展开。日方指挥官为大山巌大将，俄方为库罗帕特金大将。日军约12万-17万对俄军约19.5万-22万，日军伤亡约2万人，俄军伤亡约4万人。双方战成胶着，此后转入对峙。本篇中作为战争的典型例子被提起。
  书中原文: 「普通の人は戦争とさえ云えば沙河とか奉天とかまた旅順とかそのほかに戦争はないもののごとくに考えている」
  网络来源: https://zh.wikipedia.org/zh-tw/%E6%B2%99%E6%B2%B3%E4%BC%9A%E6%88%98

- 名词: 奉天
  解释: 奉天会战（Battle of Mukden），日俄战争中最大规模的陆上决战。1905年2月20日至3月10日在中国奉天（今沈阳）周边展开。日军约25万人（大山巌元帅指挥）对俄军约32万-37万人（库罗帕特金指挥）。日军死伤约7万人，俄军死伤约9万人。最终日军占领奉天，俄军向北撤退。此战之后日俄双方均无力发动大规模进攻，成为日俄战争陆战的终局。本篇中作为战争的典型例子被提及。
  书中原文: 「普通の人は戦争とさえ云えば沙河とか奉天とかまた旅順とかそのほかに戦争はないもののごとくに考えている」
  网络来源: https://zh.wikipedia.org/zh-hans/%E6%97%A5%E4%BF%84%E6%88%98%E4%BA%89

- 名词: 交番の焼打
  解释: 指1905年（明治38年）9月发生的日比谷烧打事件（日比谷焼打事件）。日俄战争结束后，日本民众因讲和条约（朴茨茅斯条约）未获得赔款而极度不满。1905年9月5日约3万民众在东京日比谷公园召开反对媾和大会，与警察冲突后发展为大规模暴动，烧毁219个派出所（交番）、袭击内务大臣官邸、13座教堂等。政府发布戒严令出动近卫师团镇压，造成17人死亡、500余人受伤。本篇中作者用此事件作为衡量骚乱程度的上限参照。
  书中原文: 「いかに騒動が持ち上がっても交番の焼打以上に出る気遣はない」
  网络来源: https://baike.baidu.com/item/%E6%97%A5%E6%AF%94%E8%B0%B7%E7%87%92%E6%89%93%E4%BA%8B%E4%BB%B6/2496072

- 名词: 丹波の笹山
  解释: 起源于日本丹波国（今兵库县篠山市一带）的民谣。篠山地区最著名的民谣为「デカンショ節」（德坎肖节），名称来源于笛卡尔（デカルト）、康德（カント）、叔本华（ショウペンハウエル）三位西方哲学家名字的缩写，反映了明治时期文明开化背景下学生文化的影响。该民谣原为江户时代的盆踊歌，明治时期由篠山出身的学生传播至东京，因旋律简单易唱而在全国流行。现在每年8月在篠山城遗址举办祭典。本篇中用以形容学生们晒得黝黑健壮的体魄，仿佛昨夜才从丹波笹山来到东京。
  书中原文: 「丹波の国は笹山から昨夜着し立てでござると云わぬばかりに、黒く逞しく筋肉が発達している」
  网络来源: https://www.gov-online.go.jp/eng/publicity/book/hlj/html/201609/201609_13_ch.html
