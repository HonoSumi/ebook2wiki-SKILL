- 名词: 摂津大掾
  解释: 摂津大掾（せっつだいじょう）是明治时期活跃的义太夫节（人形净琉璃/文乐）太夫（语り手）的称号。本名二见金助，艺名南部大夫，明治35年（1902年）获小松亲王赐名"摂津大掾"。著有《义太夫の心得》（1911年），是明治时期语物文化的代表人物之一。"大掾"原是律令制下宫殿建造长官的官职名，后成为净琉璃太夫的最高称号之一。
  书中原文: 細君が御歳暮の代りに摂津大掾を聞かしてくれろと云うから
  网络来源: https://ndlsearch.ndl.go.jp/en/books/R100000002-I000000491617

- 名词: 鰻谷
  解释: 鰻谷（うなぎだに）是义太夫节（人形净琉璃）的演目（剧目），正式名称为《桜鍔恨鮫鞘》（さくらつばうらみのさめざや）。作品讲述游女阿参（おさん）与古手屋八郎兵卫（はちろべえ）的恋爱悲剧，因主人公八郎兵卫的店铺位于大阪心斋桥附近的"鰻谷"地名而得名。夏目漱石在《吾辈は猫である》中解释为"娼妓お参と鰻谷八郎兵衛との恋愛悲劇"。
  书中原文: 細君が新聞を参考して鰻谷だと云うのさ。鰻谷は嫌いだから今日はよそうとその日はやめにした
  网络来源: https://li91-208.members.linode.com/book/1819/50793.htm

- 名词: 堀川
  解释: 堀川（ほりかわ）是义太夫节（人形净琉璃）的演目（剧目），讲述阿俊（おしゅん）与传兵卫（でんべえ）的殉情故事（心中物）。夏目漱石在《吾辈は猫である》中解释为"浄瑠璃。哥うたふ阿俊と伝兵衛との殉情"，并在书中借主人公之口评价其为"三味线もので賑やかなばかりで実がない"（只是三味线热闹而没有实质内容）。
  书中原文: 今日は堀川だからいいでしょうと云う。堀川は三味線もので賑やかなばかりで実がないからよそうと云う
  网络来源: https://li91-208.members.linode.com/book/1819/50793.htm

- 名词: 三十三間堂
  解释: 三十三間堂（さんじゅうさんげんどう）是位于日本京都东山区天台宗的佛堂，正式名称为"莲华王院本堂"。1164年由后白河上皇敕命平清盛建造，现存建筑为1266年重建，是日本最长的木造建筑（长约120米），以34根立柱分隔成33间而得名。本尊为千手观音坐像，殿内供奉1001尊千手观音立像（国宝）。每年1月举办"通矢"远射节。在本书中也作为义太夫节的演目名称出现。
  书中原文: 今日は三十三間堂です、私は是非摂津の三十三間堂が聞きたい
  网络来源: https://zh.wikipedia.org/wiki/%E4%B8%89%E5%8D%81%E4%B8%89%E9%96%93%E5%A0%82

- 名词: 有為転変
  解释: 有為転変（ういてんぺん）是佛教用语。"有為"指因缘和合而生的一切现象（有为法），"転変"指不断变化迁移。合起来意为：因缘所生的一切现象都在不断地生、住、异、灭中变化流转，没有常住不变的事物。与"诸行无常"、"有為無常"意义相近，体现了佛教无常观的核心教义。在《金剛経》中有著名偈颂："一切有为法，如梦幻泡影，如露亦如电，应作如是观。"
  书中原文: 万一の事を考えると今の内に有為転変の理、生者必滅の道を説き聞かして
  网络来源: https://zh.m.wikisource.org/zh-hant/%E4%BD%9B%E5%AD%B8%E5%A4%A7%E8%BE%AD%E5%85%B8/%E6%9C%89%E7%82%BA%E8%BD%89%E8%AE%8A

- 名词: 生者必滅
  解释: 生者必滅（しょうじゃひつめつ）是佛教根本教义之一，意为"有生之物必定会灭亡"。出自《大般涅槃经》，与"会者定离"常成对使用。这句话表达了佛教无常观的核心思想：一切众生只要有出生，就必然有死亡，没有任何生命能够逃脱这一法则。与"盛者必衰"同义，是佛教经典中论述诸行无常时的常用语。
  书中原文: 万一の事を考えると今の内に有為転変の理、生者必滅の道を説き聞かして
  网络来源: https://zh.m.wikisource.org/zh-hant/%E4%BD%9B%E5%AD%B8%E5%A4%A7%E8%BE%AD%E5%85%B8/%E7%94%9F%E8%80%85%E5%BF%85%E6%BB%85

- 名词: 杏仁水
  解释: 杏仁水（きょうにんすい）是由苦杏仁（ bitter apricot kernel）经水蒸气蒸馏制成的药物，含有微量青酸（HCN），作为镇咳祛痰药使用。在明治时代作为家庭常备药广泛使用，属于汉方/民间医药体系。书中主人公感觉身体不适时想到喝杏仁水来缓解症状，反映了明治时期日常生活中对传统药物的依赖。现代中国药典中仍收载有杏仁水制剂。
  书中原文: 今杏仁水でも飲めば四時前にはきっと癒るに極っているんだが
  网络来源: https://baike.baidu.com/item/%E6%9D%8F%E4%BB%81%E6%B0%B4/980988

- 名词: 洒掃薪水
  解释: 洒掃薪水（さそうしんすい）是由"洒掃"（洒水扫地，即打扫）与"薪水"（薪柴与汲水，即炊事）组成的汉语词汇，合指日常家务劳动、杂役的总称。"洒掃"源于儒家经典中的"洒掃応対"（洒扫应对进退的礼节），"薪水"原指日常必需的薪柴与饮用水，后引申为家事劳动或生活费用。这是一组带有汉文训读风格的书面语表达。
  书中原文: 平生叱りつけたり、口を聞かなかったり、身上の苦労をさせたり、小供の世話をさせたりするばかりで何一つ洒掃薪水の労に酬いた事はない
  网络来源: https://zh.wiktionary.org/zh/%E7%81%91%E6%8E%83

- 名词: 門松
  解释: 門松（かどまつ）是日本新年（正月）期间摆放在家门口的装饰物，由松枝与竹子制成，是年神（岁神）降临人间的依代（神栖身之物），寓意迎接神灵、祈福纳吉。通常12月13日过后即可装饰，1月7日（松之内）后撤下。松树象征长寿与生命力，竹子象征健康成长。是日本正月最具代表性的传统装饰之一。
  书中原文: 門松注目飾りはすでに取り払われて正月も早や十日となったが
  网络来源: https://zh.wikipedia.org/zh-hant/%E9%97%A8%E6%9D%BE

- 名词: 注連飾り
  解释: 注連飾り（しめかざり）是日本新年期间悬挂在玄关等处的传统稻草装饰，由注連縄（神道中划分圣俗边界的绳结）简化而来。其作用是结界（划分神圣区域），迎接年神降临并驱除邪气。装饰上常配有橙（代代，象征家族延续）、裏白（象征清廉长寿）、紙垂（驱邪）等吉祥物。通常在12月13日至28日间装饰，1月7日至15日撤下。
  书中原文: 門松注目飾りはすでに取り払われて正月も早や十日となったが
  网络来源: https://zh.wikipedia.org/zh-hant/%E9%96%80%E6%9D%BE
