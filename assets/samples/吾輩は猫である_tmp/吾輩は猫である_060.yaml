- 名词: 無線電信
  解释: 即无线电报（Wireless Telegraphy）。日本最早的无线电报实验由志田林三郎于1886年在隅田川进行，比马可尼的实验还早约9年。明治时代，无线电报被视为先进的通信技术象征。1888年志田创立了日本电气学会。
  书中原文: "なにつき合わなくっても始終無線電信で肝胆相照らしていたもんだ"
  网络来源: https://jahis.law.nagoya-u.ac.jp/lawdb/l/204i0215/download

- 名词: 安宅の関
  解释: 安宅关，位于石川县小松市的古代关所。因源义经与弁庆的逃亡故事而闻名。歌舞伎名作《劝进帐》（1840年初演）即以此地为舞台，描写弁庆利用虚构的"劝进帐"骗过守将富樫左卫门、保护主君义经脱险的忠义智勇故事。是日本家喻户晓的传奇。
  书中原文: "いよいよ露見するか、しないか危機一髪と云う安宅の関へかかってるんだ"
  网络来源: https://zh.wikipedia.org/wiki/%E5%AE%89%E5%AE%85%E9%97%9C

- 名词: 詩吟
  解释: 日本传统的汉诗吟诵艺术。用日式读法吟咏汉诗（中国古诗）或日本人创作的汉诗，以七言绝句最为常见。江户末期风格确立，明治时代与剑舞（剣詩舞）相结合，成为武士精神与爱国教育的体现。吟诵时强调丹田运气，可配尺八或琴伴奏。
  书中原文: "町内中に響けとばかり詩吟をして来ます"
  网络来源: https://en.wikipedia.org/wiki/Shigin

- 名词: 姥子温泉
  解释: 位于箱根神山西北侧（海拔约880米）的古老温泉，为"箱根十七汤"之一。传说开汤约800年前，与金太郎（坂田金时）传说有关。泉质为单纯温泉/钙-硫酸盐泉，以对眼病有疗效著称。明治以后被开发为保养地与观光地，夏目漱石本人也曾到访。
  书中原文: "僕が昔し姥子の温泉に行って、一人のじじいと相宿になった事がある"
  网络来源: https://www.517japan.com/viewnews-46852.html

- 名词: 江戸趣味
  解释: 指江户时代（1603—1867年）形成的日本独特审美意识与文化样式，体现于浮世绘、光琳派绘画、陶器、染物等领域。以「粋（いき）」为核心概念，包含媚态、意気地、諦め三要素，强调洗练、简洁、淡雅。与上方（京阪）的优雅「粹」相对，江户趣味更重视气概与洒脱。
  书中原文: "そんなのが江戸趣味と云うのでしょうか"
  网络来源: https://www.nippon.com/cn/column/g00036/

- 名词: 邯鄲夢
  解释: 出自唐代沈既济传奇小说《枕中记》（黄粱一梦）。卢生在邯郸旅店遇道士吕翁，借枕入睡，梦中历尽荣华富贵，醒来时店主蒸的黄粱饭尚未煮熟，比喻人生如梦、荣枯无常。此故事传入日本后融入能乐《邯郸》、歌舞伎及近现代文学（三岛由纪夫《近代能乐集》等），成为日本文艺中"人生虚幻"的经典意象。
  书中原文: "邯鄲夢の枕と逆に吹いたり"
  网络来源: https://zh.m.wikipedia.org/zh/%E9%82%AF%E9%84%B2_(%E8%83%BD%E5%8A%87)
