- 名词: 笊蕎麦
  解释: 日本冷荞麦面的经典吃法，将煮好的荞麦面用冷水冲洗后盛在竹笊（笊）或蒸笼上，蘸特制酱汁食用。江户时代中期起源于深川洲崎的荞麦面店，明治时代成为东京代表料理。
  书中原文: 勝手から御三が御客さまの御誂が参りましたと、二個の笊蕎麦を座敷へ持って来る。
  网络来源: https://www.jpfood.jp/zh-cn/industry-news/2024/08/50.html

- 名词: 山葵
  解释: 日本山葵，又称山葵根、日本辣根。将新鲜山葵根部研磨成泥状，作为荞麦面、生鱼片等日本料理的调味佐料，具有独特的辛辣风味和抗菌作用。明治时期已是蕎麦的标准药味。
  书中原文: 君そんなに山葵を入れると辛らいぜ
  网络来源: https://www.mgcic.com/articles/961

- 名词: 杉箸
  解释: 用杉木（日本柳杉）制成的一次性筷子（割箸）。奈良吉野地区为主要产地，杉木特有的清香适合搭配精致料理。在日本筷子文化中，杉箸常用于日式料理及法式融合菜等高档用餐场景。
  书中原文: 杉箸をむざと突き込んで出来るだけ多くの分量を二寸ばかりの高さにしゃくい上げた。
  网络来源: https://zh.wikipedia.org/zh-mo/%E4%B8%80%E6%AC%A1%E6%80%A7%E7%AD%B7%E5%AD%90

- 名词: 饂飩
  解释: 乌冬面，日本传统小麦面条，以面粉、盐和水制成，面条粗而柔软。平安时代由中国传入，江户时代普及为庶民食物。明治时代与蕎麦并列为日本代表性面食。汉字"饂飩"源自中国"餛飩"。
  书中原文: 僕は饂飩が好きだ
  网络来源: https://zh.wikipedia.org/wiki/%E9%A5%82%E9%A3%A9

- 名词: 蒸籠
  解释: 日式竹蒸笼（せいろ），传统日本烹饪器具，用竹材或杉木制成，有屉层可叠放。在荞麦面文化中，蒸笼也用作盛放冷荞麦面的器皿，故"蒸籠蕎麦"成为冷荞麦面的别称。明治时期荞麦面店普遍使用。
  书中原文: 「打ち立てはありがたいな。蕎麦の延びたのと、人間の間が抜けたのは由来たのもしくないもんだよ」と薬味をツユの中へ入れて無茶苦茶に搔き廻わす。
  网络来源: https://www.nippon.com/cn/japan-topics/g00940/

- 名词: 簀垂れ
  解释: 竹帘（すだれ），在荞麦面制作中用作铺在蒸笼或竹笊底部的竹编沥水垫，用于盛放煮好的荞麦面时滤去多余水分。原本指竹或芦苇编成的遮阳帘，在荞麦道具中专指这种竹编沥水垫。
  书中原文: まだ十二三本の尾が蒸籠の底を離れないで簀垂れの上に纏綿している。
  网络来源: https://japanwithlovestore.com/zh-hk/products/fukui-craft-square-soba-sudare-mat-cream-japan-11-5cm

- 名词: 薬味
  解释: 日本料理中用于增添风味和促进消化的佐料统称，常见包括葱花、山葵泥、姜末、紫苏、白芝麻、海苔等。在荞麦面文化中，药味与酱汁配合使用，既有调味作用也有健康功效（如葱助维生素B1吸收、山葵抗菌）。
  书中原文: 薬味をツユの中へ入れて無茶苦茶に搔き廻わす。
  网络来源: https://noodleplanet.co.kr/zh-CN/%EC%86%8C%EB%B0%94%EB%A5%BC-%EC%95%8C%EA%B2%8C-%EB%90%98%EC%97%88%EC%9D%84-%EB%95%8C-%EB%B9%84%EB%A1%9C%EC%86%8C-%EB%B3%B4%EC%9D%B4%EB%8A%94-%EC%86%8C%EC%A4%91%ED%95%9C-%EA%B2%83%EB%93%A4/

- 名词: 蒙求
  解释: 唐代李瀚编纂的儿童启蒙教科书，全书592句四言韵文，以历史人物典故介绍各科知识。明治时代在日本被广泛用作汉文教育教科书，有多种注释本（如冈白驹《笺注蒙求校本》），是明治汉文教育的重要教材。
  书中原文: 老梅君と君とは反対の好例として新撰蒙求に是非入れたいよ
  网络来源: https://ctext.org/library.pl?if=gb&res=89069

- 名词: 新撰蒙求
  解释: 夏目漱石《我是猫》中虚构的书名。主人公迷亭调侃说要把寒月和"老梅"的好学与不好学对比写入"新撰蒙求"，作为学界的鉴戒。实际上历史上存在《笺注续蒙求校本》（1881年）、《明治蒙求》等续编类书，是明治时期汉文教育的延伸产物。
  书中原文: 老梅君と君とは反対の好例として新撰蒙求に是非入れたいよ
  网络来源: https://www.kongfz.cn/83814410/

- 名词: 大磯
  解释: 神奈川县中部的沿海城镇，相模湾沿岸的著名避暑地。1885年开设日本首个海水浴场，1887年东海道本线大矶站开通。首任首相伊藤博文在此建别邸后，众多政要在此建别墅，被称为"政界的奥座敷"，曾有8位首相在此拥有别墅，高峰期别墅达108栋（1907年）。
  书中原文: それでも金田さんは家族中残らず、先月から大磯へ行っていらっしゃるじゃありませんか
  网络来源: https://tc.keguanjp.com/kgjp_shehui/kgjp_sh_quwei/pt20220203000001.html

- 名词: 馬子
  解释: 日本传统职业，指以马匹运送旅客和货物的赶马人（马方），江户时代在街道和宿场町活跃，是支撑日本陆上运输的重要角色。成语"馬子にも衣装"（人靠衣装）即来源于此职业。
  书中原文: 饂飩は馬子が食うもんだ。蕎麦の味を解しない人ほど気の毒な事はない
  网络来源: https://zh.wiktionary.org/zh-hans/%E9%A6%AC%E5%AD%90

- 名词: 裸体写真
  解释: 明治时代日本西洋绘画和摄影中出现的裸体主题作品。黑田清辉引入西洋裸体画引发社会争议（腰卷事件），摄影领域野岛康三推动艺术写真发展。明治时期围绕"艺术还是猥亵"发生过激烈论争，反映传统道德与西洋艺术观念的冲突。
  书中原文: 実に奇麗です事、裸体の美人ですね
  网络来源: https://www.chinanews.com.cn/hb/2015/01-06/6941227.shtml

- 名词: 螺旋鋲
  解释: 螺丝钉的明治时期日文名称（现代称"ねじ""ボルト"）。明治时代随着西洋机械技术和西式建筑引入日本，螺丝制造技术从手工制作转向工业生产。日本螺丝工业始于1860年小栗上野介从美国带回螺丝，1884年大阪出现首家木螺丝作坊，是日本产业近代化的象征之一。
  书中原文: この先きを螺旋鋲の頭へ刺し込んでぎりぎり廻すと金槌にも使える。
  网络来源: https://cn.dougukan.jp/tools/32-2

- 名词: 麦藁帽子
  解释: 麦秆编成的帽子（ストローハット），明治时代日本文明开化的象征之一。埼玉县粕壁（现春日部市）的田中帽子店自1880年创业，将真田编麦秆出口欧洲。明治后期至大正时期，麦秆帽（白线帽）成为旧制高中学生夏季制服的标配略帽，"敝衣破帽"风格成为学生独立精神的象征。
  书中原文: だって苦沙弥君は立派な麦藁の奴を持ってるじゃありませんか
  网络来源: https://storystudio.tw/article/gushi/white-line-peaked-cap

- 名词: 自弁
  解释: 日语中意为"自费""自己负担费用"，由"自"（自己）和"弁"（供给、筹措）组成。源于"自辨"，即自己准备所需物品。在日本文化中体现自立精神和"不给他人添麻烦"的传统价值观，常见于"旅費は自弁""食料自弁"等表达。
  书中原文: 奥さんこれが僕の自弁の御馳走ですよ。ちょっと御免蒙って、ここでぱくつく事に致しますから
  网络来源: https://zh.wiktionary.org/zh-hans/%E8%87%AA%E5%BC%81

- 名词: 蛙の眼球の電動作用
  解释: 夏目漱石《我是猫》中虚构的寒月博士论文主题的一部分，全称为"蛙の眼球の電動作用に対する紫外光線の影響"（紫外线对青蛙眼球电动作用的影响）。讽刺明治时期日本学术界盲目追捧西方科学、沉迷于脱离实际的研究课题的风气。青蛙眼球实验在19世纪生理学中确有渊源（意大利生理学家Galvani的蛙腿实验等）。
  书中原文: 蛙の眼球の電動作用に対する紫外光線の影響と云うのです
  网络来源: https://www.dedao.cn/ebook/detail?id=qPKdG1m9B8MaveyJdxRzNnKYlqgVZ3kvbzWo5pL7E4m1r26kQjXDAPObGkYgJ4pN

- 名词: 紫外光線
  解释: 紫外线（ultraviolet rays），19世纪物理学和生理学研究的前沿概念。明治时期随着西方科学大量涌入日本，紫外线等近代物理概念被引入学术领域。夏目漱石在本段中将其作为寒月博士论文的组成部分，讽刺当时学界追逐新奇术语的风气。
  书中原文: 蛙の眼球の電動作用に対する紫外光線の影響と云うのです
  网络来源: https://www.dedao.cn/ebook/detail?id=qPKdG1m9B8MaveyJdxRzNnKYlqgVZ3kvbzWo5pL7E4m1r26kQjXDAPObGkYgJ4pN

- 名词: アーキミジスの理論
  解释: 阿基米德原理（アルキメデスの原理），古希腊数学家阿基米德发现的浮力定律。在《我是猫》中，迷亭吃蕎麦面时面条浸入酱汁使液面上升，被作者戏称为"阿基米德的理论"。展现了明治知识阶层将西方古典学术知识融入日常生活的幽默。日文中"アーキミジス"为阿基米德的旧译名。
  书中原文: 左手に受ける茶碗の中へ、箸を少しずつ落して、尻尾の先からだんだんに浸すと、アーキミジスの理論によって、蕎麦の浸った分量だけツユの嵩が増してくる。
  网络来源: https://www.dedao.cn/ebook/detail?id=qPKdG1m9B8MaveyJdxRzNnKYlqgVZ3kvbzWo5pL7E4m1r26kQjXDAPObGkYgJ4pN
