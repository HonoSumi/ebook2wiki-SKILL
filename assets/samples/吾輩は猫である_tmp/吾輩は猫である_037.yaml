- 名词: 柘榴口
  解释: |
    日本传统公共浴场（銭湯）中从更衣区通往洗浴区的低矮出入口，因开口形状似石榴（柘榴）的裂口而得名。这种设计的目的是为了保温——低矮的入口可以减少浴室内热空气的流失，保持浴场温度。入浴客需要弯腰才能通过。在江户至明治时代的銭湯中是非常典型的建筑特征。
  书中原文: |
    狭い柘榴口に一寸の余地もないくらいに化物が取りついて、毛のある脛と、毛のない股と入り乱れて動いている。
  网络来源: |
    http://www.edrdg.org/jmwsgi/entr.py?svc=jmdict&sid=&q=2590820.1
- 名词: 御台場
  解释: |
    东京湾（江户湾）中的一系列人工岛炮台，建于1853年（江户时代末期），是德川幕府为应对美国佩里舰队"黑船来航"威胁而紧急修筑的海防工事。原计划建11座，实际完成5座。明治时期以后逐渐废弃，但第三台场作为台场公园保存至今，成为国家史迹。现代东京的"台场"（お台場）临海副都心即得名于此。
  书中原文: |
    何でも昨日あたり御台場近辺でやられたに相違ない。
  网络来源: |
    https://zh.wikipedia.org/zh-hant/%E5%BE%A1%E5%8F%B0%E5%A0%B4
- 名词: 高山彦九郎
  解释: |
    日本江户中期（1747-1793）的尊王论者、思想家，本名高山正之。他与林子平、蒲生君平并称"宽政三奇人"。他游历三十余藩，狂热宣扬勤王思想，对幕末尊王攘夷运动产生了重大影响。因愤于幕吏横暴，在久留米自杀。在夏目漱石的小说中，主人苦沙弥的怒吼被猫比作"高山彦九郎叱责山贼"，暗示其气势中带有几分尊王志士的激昂。
  书中原文: |
    万人のうちに一人くらいは高山彦九郎が山賊を叱したようだくらいに解釈してくれるかも知れん。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/%E9%AB%98%E5%B1%B1%E5%BD%A6%E4%B9%9D%E9%83%8E
