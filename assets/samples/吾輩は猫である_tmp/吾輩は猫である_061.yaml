- 名词: 樟脳
  解释: 樟脑，由樟树的木材和枝叶蒸馏提取的白色结晶物。明治时代（特别是1895年领有台湾后）成为日本重要的战略出口产品，用于火药、塑料（赛璐珞）、香料、防腐剂等领域。1899年日本政府实施樟脑专卖制度，樟脑收入曾占台湾总督府年收入的10-20%，是日本近代工业发展的重要财源。
  书中原文: 池のまわりは三抱えもあろうと云う樟ばかりだ。山のなかだから、人の住んでる所は樟脳を採る小屋が一軒あるばかり
  网络来源: https://www.chinanews.com.cn/tw/tw-rwtw/news/2010/05-10/2273300.shtml

- 名词: コンノート殿下
  解释: 英国康诺特公爵殿下（Prince Arthur of Connaught）。1906年作为英王爱德华七世特使访问日本，向明治天皇授予最尊贵的嘉德勋章。此行是日英同盟（1902年缔结）背景下两国关系强化的重要外交事件，东京市民曾狂热欢迎。小说中以此比喻寒月讲述遭遇时脑中思绪的混乱。
  书中原文: コンノート殿下歓迎の当時における都人士狂乱の態度を以て脳裏をかけ廻る
  网络来源: https://museumcollection.tokyo/en/works/6445887/

- 名词: サンドラ・ベロニ
  解释: 英国维多利亚时代作家乔治·梅瑞狄斯（George Meredith）于1864年创作的小说，原名《Emilia in England》。主人公桑德拉·贝罗妮是一位出身贫寒的意大利孤女，后成为歌剧歌手。迷亭引用此角色，将寒月携小提琴登庚申山比作桑德拉·贝罗妮在月光下弹竖琴，讽刺二者高雅与滑稽的落差。
  书中原文: 僕は男子のサンドラ・ベロニが東方君子の邦に出現するところかと思って、今が今まで真面目に拝聴していたんだよ
  网络来源: https://victorianweb.org/victorian/authors/meredith/related.html

- 名词: 大死一番乾坤新なり
  解释: 禅宗著名的修行法语。意为"将一切执著、妄念、自我彻底灭尽（大死一番），天地便焕然一新（乾坤新）"。源自《碧岩录》中"大死底人、却活时如何"的公案。独仙在寒月讲到被怪声惊吓后说这句话，暗讽寒月受到惊吓反而可能是一种觉悟契机。同类表达还有"大死一番，大活现成"。
  书中原文: 大死一番乾坤新なりと独仙君は目くばせをする
  网络来源: https://www.buddhistdoor.org/mingkok/%E6%88%AA%E6%96%B7%E6%84%8F%E8%AD%98%E4%B9%8B%E6%B5%81%E8%A6%8B%E5%88%B0%E5%BF%83%E6%80%A7%E7%9A%84%E5%8F%A6%E4%B8%80%E7%A8%AE%E9%A2%A8%E5%85%89%E9%80%99%E5%B0%B1%E6%98%AF%E5%A4%A7%E6%AD%BB%E4%B8%80%E7%95%AA%E7%A6%AA%E7%9A%84%E6%82%9F%E5%A2%83%E4%B8%8A/

- 名词: 怪狸
  解释: 日本民间传说中的妖狸（妖怪化的狸/貉），具有变幻人形的能力。狸在日本妖怪文化中被视为喜欢恶作剧而非恐怖的妖怪，著名的有"隐神刑部"（松山八百八狸传说）、"文福茶釜"等。小说中寒月在山中听到怪声，迷亭调侃他为"怪狸"所吓，幽默地对比了崇高与滑稽的差距。
  书中原文: 君は古沼の怪狸におどろかされたので、際どいところで滑稽と崇高の大差を来たした
  网络来源: https://zh.wikipedia.org/zh/%E9%9A%B1%E7%A5%9E%E5%88%91%E9%83%A8

- 名词: 万朝
  解释: 即《万朝报》（万朝報），明治时代的著名报纸，1892年由黑岩泪香（日本推理小说先驱）创刊。以"简单、明了、痛快"为编辑方针，开日本黄色新闻之先河，曾聚集内村鉴三、幸德秋水、堺利彦等众多著名知识分子。小说中迷亭调侃说《万朝报》已在报道寒月与金田小姐的婚事传闻。
  书中原文: 現に万朝なぞでは花聟花嫁と云う表題で両君の写真を紙上に掲ぐるの栄はいつだろう
  网络来源: https://baike.baidu.com/item/%E9%BB%91%E5%B2%A9%E6%B6%95%E9%A6%99/1904827

- 名词: 星月夜
  解释: 日本俳句中秋天的季语。指没有月亮但星光璀璨照亮夜空的秋夜，表现秋日空气澄澈、繁星满天的美景。也作为日本传统"袭色目"（服装配色）之一使用。小说中寒月描述走出家门时"星月夜に柿落葉"的景象，营造了秋夜独自登山前的寂寥氛围。
  书中原文: 表へ出ると星月夜に柿落葉、赤毛布にヴァイオリン
  网络来源: https://www.douban.com/group/topic/100220086/

- 名词: 野分
  解释: 日语古典词汇，指台风、暴风。语源为"将野草吹分开"的强烈秋风。平安时代中期已使用，在《源氏物语》《枕草子》等古典文学中常见。现作为秋之季语用于俳句。小说中用"野分と共に渡った"形容怪声伴随风声传遍山林的恐怖氛围。
  书中原文: その声が遠く反響を起して満山の秋の梢を、野分と共に渡ったと思ったら、はっと我に帰った
  网络来源: https://zh.shokunin.com/archives/37983701.html

- 名词: 紙鳶
  解释: 日语中风筝的古典名称（亦可读作"たこ"）。从中国传入日本，平安时代已有记载。战国时代曾用于军事（测风向、侦察），江户时代演变为庶民娱乐，后因事故频发被幕府禁止，仅正月期间许可。小说中用"紙鳶のうなり"（风筝的呼啸声）比喻寒月因恐惧而双腿颤抖的样子，极为生动。
  书中原文: 両足が紙鳶のうなりのように震動をはじめる
  网络来源: https://zhuanlan.zhihu.com/p/2027355591832543864
