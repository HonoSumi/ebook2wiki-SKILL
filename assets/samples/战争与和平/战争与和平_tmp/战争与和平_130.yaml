- 名词: 克尼亚兹科沃
  解释: 位于莫斯科以西、波罗金诺战场附近的一个村庄。在1812年波罗金诺战役前夕（8月25日），安德烈·博尔孔斯基公爵率领的团驻扎在该村村边。战役结束后，皮埃尔·别祖霍夫也随士兵沿河谷向该村方向撤退，途中经过包扎站，目睹了战争的惨烈景象。该村是托尔斯泰在《战争与和平》中描写波罗金诺战役前后情景的重要地点之一。
  书中原文: "八月二十五日，晴朗的八月傍晚，安德烈公爵在克尼亚兹科沃村的一间破旧棚屋里支着臂肘躺着，他的团就驻在村边。"
  网络来源: 《战争与和平》第三卷第三部第二十四至二十五章；豆瓣读书《战争与和平》注释

- 名词: 图奇科夫
  解释: 俄国军人世家，图奇科夫四兄弟（尼古拉、谢尔盖、帕维尔、亚历山大）均为1812年卫国战争中的将领。小说中"图奇科夫的队伍"主要指大哥尼古拉·阿列克谢耶维奇·图奇科夫（1765—1812）指挥的俄军第3步兵军，部署在波罗金诺战场最左翼的乌季察村一带，负责掩护旧斯摩棱斯克大道，防止法军包抄。贝尼格森视察时批评部队未占据制高点，实际上这些部队是隐蔽起来准备打伏击的。尼古拉·图奇科夫在战役中亲率帕夫洛夫团反冲锋时胸部中弹，一个月后伤重去世。其四弟亚历山大·图奇科夫在巴格拉季昂凸角堡战斗中高举团旗率部冲锋阵亡。
  书中原文: "在这极左翼的地方，贝尼格森热烈地讲了很久，然后发出皮埃尔觉得重要的军事命令。在图奇科夫的队伍前面有一个高地。"
  网络来源: 维基百科"博罗季诺战役"词条；encyclopedia2.thefreedictionary.com Tuchkov词条；俄罗斯国立图书馆肖像资料

- 名词: 凸角堡
  解释: 一种开口朝后的箭头形或V字形野战防御工事（法文名flèche，意为"箭"），属于拿破仑战争时期俄军常用的野战筑城形式。通常以土垒构筑，面向敌军方向展开两至三面，用于掩护炮兵阵地和步兵。在波罗金诺战役中，俄军左翼构筑了多处凸角堡（通称"巴格拉季昂凸角堡"），由巴格拉季昂将军指挥的第二军团防守，是法军重点进攻区域，双方在此反复争夺，战斗极为惨烈。托尔斯泰在书中特别加注说明"凸角堡是一种防御工事"。
  书中原文: "贝尼格森在凸角堡停下来，向前眺望那昨天还是我们的舍瓦尔金诺多面堡，那儿看得见几个骑马的人。"
  网络来源: 《战争与和平》托尔斯泰自注；napolun.com拿破仑军事论坛；维基百科"博罗季诺战役"词条
