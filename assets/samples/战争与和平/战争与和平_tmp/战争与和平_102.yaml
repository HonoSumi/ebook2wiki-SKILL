- 名词: 吗哪
  解释: 吗哪（Manna）是《圣经·旧约》中记载的神赐食物，希伯来文意为"这是什么"。据《出埃及记》第16章记载，古以色列人出埃及后在旷野流浪40年，上帝每天早晨从天降下白色小圆物如芫荽子、滋味如蜜饼，供百姓拾取食用。每日收取定量，第六日可收双份以守安息日。吗哪在基督教神学中预表耶稣基督——"生命的粮"（《约翰福音》6:48-51）。现代学者提出自然解释（柽柳树蚜虫分泌物或地衣），但无法解释其规模与规律，故被视为神迹。
  书中原文: 阿斯特列亚支会和寻找吗哪派是彼得堡共济会内部的两个派别。吗哪，《圣经·旧约》曾记述古以色列人经过旷野时获得神赐食物。
  网络来源: https://zh.wikipedia.org/zh-hans/%E5%90%97%E5%93%AA | https://www.churchofjesuschrist.org/study/scriptures/gs/manna?lang=zhs | https://cdn-news.org/News.aspx?EntityID=News&PK=0000000000652e59c8ef895dfc44c043a89ef5a1298baa59

- 名词: 蒂尔西特和约
  解释: 蒂尔西特和约（Treaty of Tilsit）是1807年7月拿破仑在涅曼河畔的蒂尔西特分别与俄皇亚历山大一世（7月7日）和普鲁士国王腓特烈·威廉三世（7月9日）签订的和约总称。法俄和约规定两国结束战争、结成攻守同盟，俄国加入对英国的大陆封锁体系，承认华沙大公国成立。法普和约极其苛刻，普鲁士丧失约一半领土、军队削减至4万人并承担巨额赔款。该和约标志着拿破仑帝国达到欧洲霸权巅峰，法俄表面结盟实则矛盾迅速激化，最终导致1812年拿破仑入侵俄国。
  书中原文: 蒂尔西特和约是法俄、法普于一八〇七年七月七日在涅曼河畔的蒂尔西特签订的，按此约，法俄结成同盟，参加大陆封锁。
  网络来源: https://zh.wikipedia.org/zh-cn/%E6%8F%90%E7%88%BE%E8%A5%BF%E7%89%B9%E6%A2%9D%E7%B4%84 | https://baike.baidu.com/item/%E6%8F%90%E5%B0%94%E8%A5%BF%E7%89%B9%E5%92%8C%E7%BA%A6/1614069 | https://www.britannica.com/event/Treaties-of-Tilsit

- 名词: 大陆封锁
  解释: 大陆封锁（Continental Blockade / Continental System）是拿破仑为在经济上击垮英国而推行的全面封锁政策。1806年11月柏林敕令宣布封锁不列颠诸岛，禁止欧洲大陆各国与英国通商；1807年米兰敕令进一步扩大至中立国船只。俄国、普鲁士、奥地利等被迫加入（《蒂尔西特和约》后）。该政策短期打击了英国出口，但严重损害欧洲大陆各国经济利益（尤其是俄国，与英国传统贸易中断致外贸额一年减少1700万卢布），走私盛行。俄国自1810年起暗中恢复与英国贸易，成为拿破仑1812年入侵俄国的导火索之一，大陆封锁体系也随之崩溃。
  书中原文: 史学家满怀天真的自信说，其原因是奥尔登堡公爵的受辱，大陆体系的破坏，拿破仑的野心，亚历山大态度强硬，外交家的错误，等等。
  网络来源: https://zh.wikipedia.org/zh-tw/%E5%A4%A7%E9%99%B8%E5%B0%81%E9%8E%96 | https://baike.baidu.com/item/%E5%A4%A7%E9%99%86%E5%B0%81%E9%94%81%E6%94%BF%E7%AD%96 | https://ishare.ifeng.com/c/s/7kdcc8BMgEI

- 名词: 卡拉姆辛
  解释: 尼古拉·米哈伊洛维奇·卡拉姆津（Николай Михайлович Карамзин，1766—1826），俄国作家、历史学家，俄罗斯感伤主义文学奠基人。代表作《可怜的丽莎》（1792）描写贵族青年与农家女的爱情悲剧，开创俄国感伤主义小说先河。创办《莫斯科杂志》，引入日常口语革新俄语文学语言。1816年起出版12卷巨著《俄罗斯国家史》，是俄国第一部系统完整的正史，被沙皇授予"国家历史学家"称号。普希金评价其著作"唤起了俄罗斯人对本民族过往历程的兴趣"。曾游历西欧，在柯尼斯堡拜访过康德。
  书中原文: 《可怜的丽莎》是卡拉姆辛（1766—1826）的短篇小说，作者是俄罗斯文学感伤主义的奠基人。
  网络来源: https://baike.baidu.com/item/%E5%8D%A1%E6%8B%89%E5%A7%86%E6%B4%A5/4939899 | https://www.allhistory.com/detail/5910556155b542257a01e6e9 | https://m.hujiang.com/ru/p556550/

- 名词: 感伤主义
  解释: 感伤主义（Sentimentalism），又称"主情主义"或"前浪漫主义"，是18世纪中后期起源于英国的欧洲文艺流派。名称来源于英国作家劳伦斯·斯特恩的小说《感伤旅行》。其核心特征是排斥理性、崇尚感情，着重描写内心活动和自然景物，通过人物的不幸遭遇引起读者同情与怜悯。在俄国以卡拉姆津的《可怜的丽莎》为代表。主要体裁为日记、书信、游记等第一人称叙事小说。感伤主义是对古典主义理性教条的反抗，被视为浪漫主义文学运动的先驱，对19世纪欧洲文学影响深远。
  书中原文: 《可怜的丽莎》是卡拉姆辛（1766—1826）的短篇小说，作者是俄罗斯文学感伤主义的奠基人。
  网络来源: https://zh.wikipedia.org/wiki/%E6%84%9F%E4%BC%A4%E4%B8%BB%E4%B9%89 | https://baike.baidu.com/item/%E6%84%9F%E4%BC%A4%E4%B8%BB%E4%B9%89/2562171 | https://m.thepaper.cn/baijiahao_10122525

- 名词: 叶卡捷琳娜·谢苗诺娃
  解释: 叶卡捷琳娜·谢苗诺娃（Екатерина Семёнова，1786—1849），19世纪初俄国最杰出的悲剧女演员。1790年进入圣彼得堡戏剧学校，师从伊万·德米特列夫斯基。1797年首次登台，以美貌、深沉嗓音和充满激情的表演风格著称，是莎士比亚、拉辛、席勒及俄国作家奥泽罗夫剧作的主要诠释者。普希金曾将她写入诗歌。与法国女演员乔治小姐在俄国舞台形成竞争。1826年嫁给伊万·加加林公爵后逐步淡出舞台，只在私人剧院演出。她在俄国戏剧史上占有重要地位，被誉为当时最杰出的悲剧表演艺术家。
  书中原文: 叶卡捷琳娜·谢苗诺娃（1786—1849），十九世纪初俄国最著名的悲剧演员。
  网络来源: https://www.themoviedb.org/person/1095562-ekaterina-semyonova | http://encspb.ru/object/2803930416?lc=en

- 名词: 奥尔登堡公爵
  解释: 奥尔登堡公爵（Duke of Oldenburg）指彼得·弗里德里希·路德维希（Peter Friedrich Ludwig von Oldenburg，1755—1829），奥尔登堡公国摄政/公爵。奥尔登堡家族与俄国罗曼诺夫王朝有深厚姻亲关系（沙皇保罗一世娶了符腾堡公主索菲娅·多罗特娅，其家族与奥尔登堡有联姻）。1810年拿破仑为彻底实施大陆封锁体系，吞并了奥尔登堡公国，公爵流亡俄国。沙皇亚历山大一世要求归还公国遭拒，此事被视作1812年俄法战争的重要政治导火索之一。战后维也纳会议恢复奥尔登堡并升格为大公国。
  书中原文: 史学家满怀天真的自信说，其原因是奥尔登堡公爵的受辱，大陆体系的破坏，拿破仑的野心，亚历山大态度强硬，外交家的错误，等等。
  网络来源: https://www.britannica.com/place/Oldenburg-historical-state-Germany | https://page.sm.cn/blm/midpage-317/index?id=12_3f80842edbc401e6db57319ad59053c3

- 名词: 奥尔登堡公国
  解释: 奥尔登堡公国（Duchy of Oldenburg）是神圣罗马帝国西北部的一个邦国，由荷尔斯泰因-戈托普家族（奥尔登堡王朝分支）统治。1773年俄国女皇叶卡捷琳娜二世扶持其舅弗里德里希·奥古斯特为伯爵，1774年升格为公国。1806年拿破仑击败普鲁士后法军占领奥尔登堡；1807年《蒂尔西特和约》后短暂恢复；1808年被迫加入莱茵邦联成为法国附庸。1810年12月拿破仑为封锁北海沿岸而正式吞并公国。1814年维也纳会议恢复奥尔登堡并升格为大公国，延续至1918年德国革命。
  书中原文: 拿破仑拒绝把他的军队撤回维斯杜拉河左岸以及拒绝交还奥尔登堡公国，也是一个原因。
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%A5%A5%E5%B0%94%E7%99%BB%E5%A0%A1%E5%A4%A7%E5%85%AC%E5%9B%BD | https://baijiahao.baidu.com/s?id=1684116933564050216

- 名词: 梅特涅
  解释: 克莱门斯·冯·梅特涅（Klemens von Metternich，1773—1859），奥地利外交家、首相，19世纪欧洲保守主义的代表人物。1809年任奥地利外交大臣，撮合奥地利公主玛丽·路易莎与拿破仑联姻，为奥地利赢得喘息时间。拿破仑战败后主持维也纳会议（1814—1815），建立"梅特涅体系"（维也纳体系），推行大国均势政策。1821年升任奥地利首相，在国内实行高压统治，镇压自由民主运动，被称为欧洲的"消防队长"。1848年欧洲革命爆发后被迫流亡英国。其均势外交思想对后世影响深远。
  书中原文: 因此，只要梅特涅、鲁缅采夫或者塔列兰在朝见和招待晚会的时候，勤勤恳恳作一番努力和公文写得更巧妙些，或者拿破仑应当给亚历山大写一封信……战争就不会发生了。
  网络来源: https://baike.baidu.com/item/%E6%A2%85%E7%89%B9%E6%B6%85/3188058 | https://zh.wikipedia.org/zh-cn/%E5%85%8B%E8%8E%B1%E9%97%A8%E6%96%AF%C2%B7%E5%86%AF%C2%B7%E6%A2%85%E7%89%B9%E6%B6%85 | https://china.huanqiu.com/article/9CaKrnJkZif

- 名词: 塔列兰
  解释: 夏尔·莫里斯·德·塔列朗-佩里戈尔（Charles Maurice de Talleyrand-Périgord，1754—1838），法国外交家，历仕波旁王朝、法兰西第一共和国、拿破仑帝国、波旁复辟王朝、奥尔良王朝五朝而不倒，绰号"瘸腿魔鬼"。1797年任督政府外交部长，1799年协助拿破仑发动雾月政变。1807年因反对拿破仑穷兵黩武而辞官，暗中与俄奥通信。1814年维也纳会议上提出"正统主义原则"，成功保全法国领土完整，使战败的法国恢复大国地位。其姓氏在西方已成为"狡猾、玩世不恭的外交手腕"的代名词。
  书中原文: 因此，只要梅特涅、鲁缅采夫或者塔列兰在朝见和招待晚会的时候，勤勤恳恳作一番努力和公文写得更巧妙些，或者拿破仑应当给亚历山大写一封信……战争就不会发生了。
  网络来源: https://baike.baidu.com/item/%E5%A1%94%E5%88%97%E6%9C%97/5883031 | https://zh.wikipedia.org/zh-cn/%E5%A4%8F%E5%B0%94%C2%B7%E6%91%A9%E9%87%8C%E6%96%AF%C2%B7%E5%BE%B7%E5%A1%94%E5%88%97%E6%9C%97-%E4%BD%A9%E9%87%8C%E5%93%A5%E5%B0%94 | https://m.thepaper.cn/newsDetail_forward_3242179

- 名词: 一八一二年彗星
  解释: 1812年大彗星（正式编号C/1811 F1，实际于1811年3月被发现）是一颗极为明亮的彗星，1811年末至1812年间肉眼可见，拖着长长的白色尾巴划过夜空。欧洲民间普遍认为它预示着灾难、战争与世界末日——历史也确实在1812年发生了拿破仑入侵俄国。在《战争与和平》中，托尔斯泰赋予这颗彗星深刻的文学象征意义：皮埃尔在向娜塔莎表白爱意后仰望星空，看到这颗彗星不感恐惧，反觉"这颗彗星和他那颗生气勃勃地走向新生活、变得软化和振奋起来的心灵完全吻合"，将凶兆转化为灵魂觉醒与新生的象征。
  书中原文: 几乎是在这片天空的中央，在圣洁林荫道上方，悬着一颗巨大的明亮的一八一二年彗星，据说这是一颗预示着各种灾难和世界末日的彗星……皮埃尔觉得，这颗彗星和他那颗生气勃勃地走向新生活、变得软化和振奋起来的心灵完全吻合。
  网络来源: https://baike.baidu.com/item/%E5%A8%9C%E5%A1%94%E8%8E%8E%E3%80%81%E7%9A%AE%E5%9F%83%E5%B0%94%E5%92%8C1812%E5%B9%B4%E7%9A%84%E5%A4%A7%E5%BD%97%E6%98%9F/63965181 | https://book.douban.com/review/12215990/ | https://book.douban.com/annotation/113773316/

- 名词: 维斯杜拉河
  解释: 维斯杜拉河（Vistula，波兰语Wisła，又译维斯瓦河）是波兰最长的河流，全长1047公里，流域面积约19.2万平方公里（占波兰国土约三分之二），被称为"波兰的母亲河"。发源于波兰南部贝斯基德山脉（喀尔巴阡山脉北坡），自南向北流经克拉科夫、华沙、托伦等历史名城，在格但斯克附近注入波罗的海。历史上是重要的贸易通道（尤其是琥珀之路和粮食贸易），在中世纪和近代具有重要经济与军事战略地位。在拿破仑战争中，维斯杜拉河左岸是法军与俄军对峙的重要地理边界。
  书中原文: 拿破仑拒绝把他的军队撤回维斯杜拉河左岸以及拒绝交还奥尔登堡公国，也是一个原因。
  网络来源: https://baike.baidu.com/item/%E7%BB%B4%E6%96%AF%E7%93%A6%E6%B2%B3/8747885 | https://www.britannica.com/place/Vistula-River | https://baike.baidu.com/item/%E7%BB%B4%E6%96%AF%E6%9D%9C%E6%8B%89%E6%B2%B3/7003053

- 名词: 历史宿命论
  解释: 历史宿命论（Historical Fatalism / Historical Determinism）是托尔斯泰在《战争与和平》中系统阐述的历史哲学观点。其核心主张是：历史事件由无数原因交织而成，任何一个单一原因都不足以解释全局，因此事件"不得不发生"。托尔斯泰认为帝王/伟人是"历史的奴隶"，其意志的实现必须有无数的条件巧合，"人自觉地为自己生活，却不自觉地充当了达到历史的、全人类的各种目的的工具"。已知的称为必然规律，未知的称为自由意志。这一历史观否定"英雄创造历史"的史观，强调历史发展的客观必然性，是理解托尔斯泰思想的关键。
  书中原文: 为了解释这些不合理的历史现象（就是说，我们不理解这些现象的理性），必然得出宿命论。我们越是尽力合理地解释这些历史现象，我们就越觉得这些现象不合理和不可理解。
  网络来源: https://www.douban.com/group/topic/170353225/ | https://www.thepaper.cn/newsDetail_forward_31438218 | https://zhuanlan.zhihu.com/p/592706248
