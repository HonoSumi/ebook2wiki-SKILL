- 名词: 伊丽莎白·阿列克谢耶夫娜
  解释: 原名巴登的路易丝·玛丽·奥古斯特（1779—1826），俄罗斯帝国沙皇亚历山大一世的皇后，在位时间为1801年至1825年。她于1792年被叶卡捷琳娜二世选为长孙亚历山大·帕夫洛维奇大公的新娘，皈依东正教后取名为伊丽莎白·阿列克谢耶夫娜。她在拿破仑战争期间积极支持丈夫的政策，但在宫廷中地位相对边缘化，1825年亚历山大一世去世后不久亦病逝。
  书中原文: "两位皇后，一位是保罗皇帝的遗孀玛丽亚·费奥多罗夫娜，另一位是亚历山大一世的妻子伊丽莎白·阿列克谢耶夫娜。"
  网络来源: https://zh.wikipedia.org/wiki/%E4%BC%8A%E4%B8%BD%E8%8E%8E%E7%99%BD%C2%B7%E9%98%BF%E5%88%97%E5%85%8B%E8%B0%A2%E8%80%B6%E8%8A%99%E5%A8%9C

- 名词: 戴克里先
  解释: 全名盖乌斯·奥勒留·瓦莱利乌斯·戴克里先（约244—312），罗马帝国皇帝，284年至305年在位。他出身寒微，从军晋升，终结了三世纪危机，建立了君主专制（多米努斯制）和四帝共治制（Tetrarchy），将帝国分为东西两部。他进行了大规模的行政、军事、经济改革，并在统治后期发动了罗马历史上最严厉的基督教迫害（303年起）。305年主动退位，成为罗马史上唯一自愿退位的皇帝，隐居至去世。
  书中原文: "古罗马帝国戴克里先朝（284—305年）的殉道者弗罗拉斯和劳拉斯被列入东正教的圣徒，俄国农民尊为马神，并把他们的名字读走了音。"
  网络来源: https://zh.wikipedia.org/zh-hans/%E6%88%B4%E5%85%8B%E9%87%8C%E5%85%88

- 名词: 侧翼进军
  解释: 在军事中特指军队沿敌军侧翼方向进行的战略机动。在1812年俄法战争中特指俄军总司令库图佐夫放弃莫斯科后实施的"塔鲁丁诺机动"：俄军沿梁赞大路佯动东撤后突然转向西进，经红帕赫拉折向卡卢加大道，最终到达塔鲁丁诺村扎营。这一机动避开了法军主力，威胁法军通往斯摩棱斯克的交通线，为俄军赢得休整时间，成为1812年战争的转折点。
  书中原文: "史学家们把这一天才功勋的荣誉给予各种不同的人，并且争论，荣誉究竟属于谁。……那次著名的侧翼进军不过是，俄国军队在敌人进攻下径直往后退，在法国人的进攻停止后，就离开当初采取的径直路线，见到后面没有追击，就自然地转向给养充足的地区罢了。"
  网络来源: https://zh.wikipedia.org/wiki/%E5%A1%94%E9%B2%81%E4%B8%81%E8%AF%BA%E6%88%98%E5%BD%B9

- 名词: 塔鲁丁诺
  解释: 俄语Тарутино，卡卢加州的一个村庄，位于莫斯科西南约100公里处。在1812年俄法战争中，俄军总司令库图佐夫在放弃莫斯科后实施侧翼机动，于1812年9月底至10月在此地建立营地（塔鲁丁诺营地）。俄军在此获得了一个月的休整和补充，力量对比逆转。10月18日，俄军在此击败缪拉率领的法军（塔鲁丁诺战役），迫使拿破仑于次日下令撤离莫斯科，标志着俄军从战略防御转向战略反攻。
  书中原文: "史学家们认为，在一八一二年战争中，除了波罗金诺战役、莫斯科被敌人占领及其被烧毁以外，最重要的插曲就是俄国军队从梁赞大路进入卡卢日斯卡雅大路，然后直趋塔鲁丁诺营地的运动，即所谓越过红帕赫拉的侧翼进军。"
  网络来源: https://baike.baidu.com/item/%E5%A1%94%E9%B2%81%E4%B8%81%E8%AF%BA%E6%88%98%E5%BD%B9

- 名词: 红帕赫拉
  解释: 俄语Красная Пахра（亦称Красное），位于莫斯科州（今属莫斯科特罗伊茨克行政区）的一个历史庄园和村庄，地处帕赫拉河畔。在1812年俄法战争中具有重要战略意义：库图佐夫在实施塔鲁丁诺机动期间曾将俄军司令部设在此地的萨尔特科夫庄园内；法军从莫斯科撤退途中，拿破仑也在此停留过夜。红帕赫拉所在的卡卢加道路在1812年战争中发挥了决定性作用。
  书中原文: "史学家们认为，在一八一二年战争中，除了波罗金诺战役、莫斯科被敌人占领及其被烧毁以外，最重要的插曲就是俄国军队从梁赞大路进入卡卢日斯卡雅大路，然后直趋塔鲁丁诺营地的运动，即所谓越过红帕赫拉的侧翼进军。"
  网络来源: https://www.flickr.com/photos/abbsound/16982071277/

- 名词: 帕赫拉河
  解释: 俄语Пахра，莫斯科河右岸最大支流之一，全长135公里，流域面积约2580平方公里，流经莫斯科州及莫斯科直辖市。河流在11月至12月封冻，次年3月底至4月解冻，主要水源补给为融雪。沿岸重要城市有波多利斯克等。在1812年战争中，俄军的侧翼进军曾渡过此河转向卡卢加大道，法军亦曾在俄军渡帕赫拉河时有进攻机会。
  书中原文: "如果法国人在俄军渡帕赫拉河的时候大举进攻，那将会怎么样呢？"
  网络来源: https://zh.wikipedia.org/zh-hk/%E5%B8%95%E8%B5%AB%E6%8B%89%E6%B2%B3

- 名词: 奥卡河
  解释: 俄语Ока，伏尔加河右岸最大支流，全长约1500公里，流域面积24.5万平方公里，发源于中俄罗斯丘陵（奥廖尔以南），于下诺夫哥罗德附近汇入伏尔加河。主要支流包括莫斯科河、日兹德拉河、乌格拉河、莫克沙河等。沿岸重要城市有奥廖尔、卡卢加、科洛姆纳、梁赞、下诺夫哥罗德等。在1812年战争中，俄军的军粮给养主要集中在奥卡河沿岸的图拉和卡卢加省，这条河成为俄军战略机动的重要地理因素。
  书中原文: "兰斯科伊向总司令报告说，军队给养主要集中在奥卡河沿岸的图拉和卡卢加省，如果向下城撤退，给养存放地就要被宽阔的奥卡河隔断，而初冬季节河运是不通的。"
  网络来源: https://zh.wikipedia.org/zh-hans/%E5%A5%A5%E5%8D%A1%E6%B2%B3

- 名词: 兰斯科伊
  解释: 全名瓦西里·兰斯科伊（Vasily Lanskoy），俄国枢密官、枢密顾问，1812年俄法战争期间担任俄军军需总监（генерал-кригскомиссар/总粮秣官），负责全军后勤军需供应，属于库图佐夫统帅部的重要后勤官员。在菲利军事会议后，他向库图佐夫报告军队给养集中于奥卡河沿岸的图拉和卡卢加省，这一信息成为俄军决定转向南线而非沿下城大路东撤的关键因素之一。
  书中原文: "兰斯科伊向总司令报告说，军队给养主要集中在奥卡河沿岸的图拉和卡卢加省，如果向下城撤退，给养存放地就要被宽阔的奥卡河隔断，而初冬季节河运是不通的。"
  网络来源: https://www.scribd.com/document/31192310/Russian-order-of-battle-at-borodino1812

- 名词: 耶和华
  解释: 圣经中独一真神的专有名称，源自希伯来语四字词YHWH（יהוה），在《希伯来语经卷》（旧约）中出现约7000次。该名源自希伯来语动词"hayah"（成为/是），意为"他使……成为"。犹太人出于敬畏传统不直接读出此名，以"阿多奈"替代，致原始读音失传。现代学者多认为更可能的读音为"雅威"（Yahweh）。中文和合本圣经沿用了16世纪拼读而成的"耶和华"译法。
  书中原文: "耶和华吩咐亚当不可吃那分别善恶树上的果子。见《圣经·旧约·创世记》第二章。"
  网络来源: https://baike.baidu.com/item/%E4%B8%8A%E5%B8%9D%E7%9A%84%E5%90%8D%E7%A7%B0/53845699

- 名词: 亚当
  解释: 希伯来语意为"红土"或"属土的"，圣经记载中世界上第一个人类和第一个男人，由神耶和华用尘土创造（《创世记》2—5章）。与妻子夏娃同住伊甸园，因违背神命吃分别善恶树的果子而被逐出，人类由此"原罪"堕入尘世。亚当活了930岁，犹太教、基督教和伊斯兰教均视其为人类始祖。新约中保罗将亚当（旧时代的首领/死亡的开端）与基督（新时代的首领/生命的源泉）进行对比。
  书中原文: "耶和华吩咐亚当不可吃那分别善恶树上的果子。见《圣经·旧约·创世记》第二章。"
  网络来源: https://baike.baidu.com/item/%E4%BA%9A%E5%BD%93

- 名词: 创世记
  解释: 圣经旧约第一卷，也是摩西五经（妥拉）的第一卷，共50章。希伯来名Bereishit意为"起初"，希腊文Genesis意为"起源"。传统作者为摩西（约公元前1500—1400年）。内容分为两大部分：人类早期历史（宇宙创造、人类堕落、洪水、巴别塔，第1—11章）和以色列先祖历史（亚伯拉罕、以撒、雅各、约瑟的故事，第12—50章）。新约中引用60多次，奠定了整本圣经救赎历史的基础。
  书中原文: "耶和华吩咐亚当不可吃那分别善恶树上的果子。见《圣经·旧约·创世记》第二章。"
  网络来源: https://zh.wikipedia.org/zh-sg/%E5%89%B5%E4%B8%96%E8%A8%98

- 名词: 非利士人
  解释: 希伯来语P'lishtim，居住在迦南南部沿海（今加沙地带及以北地区）的古代民族。他们是"海上民族"的一部分，公元前12世纪从爱琴海地区东迁至迦南，建立迦萨、亚实基伦、亚实突、以革伦、迦特五大城邦。圣经中约250—300处提及，被描述为古代以色列人的主要敌人（参孙、大卫与歌利亚、扫罗王之死等故事）。"巴勒斯坦"地名即源于非利士人。公元前6世纪后该民族逐渐消失。
  书中原文: "迦特人歌利亚是非利士人的勇士，他身材高大，头戴铜盔，身穿重甲，作战时所向无敌，后被大卫用机弦甩石打死。见《圣经·旧约·撒母耳记》第十七章。"
  网络来源: https://zh.wikipedia.org/zh-my/%E9%9D%9E%E5%88%A9%E5%A3%AB%E4%BA%BA

- 名词: 阿耳忒弥斯
  解释: 希腊神话中的奥林匹斯十二主神之一，罗马对应神为狄安娜。她是宙斯与勒托之女，阿波罗的孪生姐姐，司掌月亮、狩猎、荒野、处女贞洁，亦被视为助产女神。与雅典娜、赫斯提亚并称希腊三大处女神，手持金弓金箭，常伴赤牝鹿或猎犬。在以弗所有著名的阿尔忒弥斯神庙（古代世界七大奇迹之一）。在《战争与和平》的注释中，她被提及为狄安娜的希腊对应神。
  书中原文: "狄安娜是罗马神话中月亮和狩猎女神，即希腊神话中的阿耳忒弥斯。"
  网络来源: https://zh.wikipedia.org/wiki/%E9%98%BF%E8%80%B3%E5%BF%92%E5%BC%A5%E6%96%AF

- 名词: 图拉兵工厂
  解释: 俄语Тульский оружейный завод（ТОЗ），1712年2月15日由沙皇彼得大帝在俄罗斯图拉市创立，是俄罗斯历史最悠久的武器制造商。18世纪为俄军生产燧发枪和冷兵器，19世纪发展艺术装饰武器。二战期间生产莫辛-纳甘步枪、SVT-40自动步枪等，27名员工获苏联英雄称号。冷战时期生产卡拉什尼科夫步枪、反坦克导弹等。现为Rostec旗下子公司，产品覆盖军用和民用武器，至今已逾300年历史。
  书中原文: "兰斯科伊向总司令报告说，军队给养主要集中在奥卡河沿岸的图拉和卡卢加省，如果向下城撤退，给养存放地就要被宽阔的奥卡河隔断，而初冬季节河运是不通的。这是第一个迹象，表明必须撇开那个最自然的直趋下城的想法。"
  网络来源: https://zh.wikipedia.org/zh-cn/%E5%9C%96%E6%8B%89%E5%85%B5%E5%B7%A5%E5%BB%A0

- 名词: 卡卢加
  解释: 俄语Калуга，俄罗斯卡卢加州首府，位于奥卡河畔，莫斯科西南约160—188公里。1371年首次见于文献记载，初为莫斯科大公国西南边境的边防堡垒。18—19世纪发展为重要的工业和商业中心。以"太空探索的摇篮"闻名——航天先驱康斯坦丁·齐奥尔科夫斯基在此居住并从事研究（1892—1935年），建有世界第一座太空探索主题博物馆。在1812年战争中，卡卢加省是俄军主要粮秣供给地，其战略位置决定了俄军侧翼进军的方向。
  书中原文: "兰斯科伊向总司令报告说，军队给养主要集中在奥卡河沿岸的图拉和卡卢加省……"
  网络来源: https://zh.wikipedia.org/zh-hans/%E5%8D%A1%E5%8D%A2%E5%8A%A0

- 名词: 图拉大路
  解释: 历史上连接莫斯科与图拉的古道，其路线基础可追溯至中世纪的克里米亚古道和穆拉夫斯克小道，是一条从莫斯科通往俄罗斯南部的重要商路和军事通道。19世纪被正式修建为公路，苏联时期成为M2"克里米亚"联邦公路的一部分（今欧洲E105公路）。在1812年俄法战争中，俄军沿梁赞大路撤退后转向此路以接近给养存放地，在《战争与和平》中被多次提及。在莫斯科保卫战（1941年）中也是德军进攻莫斯科的南线通道。
  书中原文: "神速地渡过帕赫拉河向图拉大路进发的时候，俄军的司令官们打算在波多尔斯克停下来，并没有考虑塔鲁丁诺阵地；但是，无数的情况……迫使我军更向南移，向给养所在地的交叉路口转移，从图拉大路转到卡卢日斯卡雅大路，然后直趋塔鲁丁诺。"
  网络来源: https://en.wikipedia.org/wiki/M2_highway_(Russia)

- 名词: 下城大路
  解释: 即通往"下城"（Нижний Новгород，下诺夫哥罗德）的大路。下诺夫哥罗德位于伏尔加河与奥卡河交汇处，是俄罗斯帝国重要的商业中心。在1812年俄法战争中，俄军放弃莫斯科后最初打算沿此路向东北方向撤退。然而军需总监兰斯科伊报告指出，军队给养集中在奥卡河沿岸的图拉和卡卢加省，若沿下城大路撤退，宽阔的奥卡河在初冬季节无法通航，将切断给养供应。这一因素促使俄军改道向南转向图拉和卡卢加大道，最终形成著名的侧翼进军。
  书中原文: "菲利的军事会议上俄军将领大都认为理所当然地沿着下城大路径直往后退却。……如果向下城撤退，给养存放地就要被宽阔的奥卡河隔断，而初冬季节河运是不通的。这是第一个迹象，表明必须撇开那个最自然的直趋下城的想法。"
  网络来源: https://zh.wikipedia.org/wiki/%E4%B8%8B%E8%AF%BA%E5%A4%AB%E5%93%A5%E7%BD%97%E5%BE%B7
