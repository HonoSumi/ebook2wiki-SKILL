- 名词: 涅韦罗夫斯基
  解释: |
    德米特里·彼得罗维奇·涅韦罗夫斯基（Dmitry Petrovich Neverovsky，1771—1813），俄军中将，1812年卫国战争中的重要将领。1811年底组建俄国第27步兵师，隶属巴格拉季翁的西线第2军团。1812年8月14日，他在克拉斯诺耶以约6—7千人阻击内伊元帅约2万法军先头部队，组成大型方阵边打边撤，成功为俄军主力集结斯摩棱斯克争取了宝贵时间。随后参加斯摩棱斯克保卫战、博罗季诺战役（在舍瓦尔金诺多面堡防守战中表现突出，负伤），同年11月晋升中将。1813年在莱比锡战役中腿部中弹，伤口坏疽，11月2日在哈雷去世。1912年7月，其遗骸迁葬至博罗季诺战场。
  书中原文: |
    正当在未来的战场问题上争吵不休和施展阴谋诡计的时候，正当我们寻找法军而弄错他们的所在地的时候，法军突破涅韦罗夫斯基的师团，抵达斯摩棱斯克城下。
  网络来源: |
    https://www.historyofwar.org/articles/people_neverovsky_d_p.html
    https://wapbaike.baidu.com/item/%E5%85%8B%E6%8B%89%E6%96%AF%E5%86%85%E6%88%98%E5%BD%B9/63131877

- 名词: 柳博米尔斯基
  解释: |
    波兰亲王家族，属波兰立陶宛联邦最古老的权贵世家，家族中有多人在俄国军队和政府任职。1812年拿破仑入侵俄国期间，柳博米尔斯基亲王担任沙皇亚历山大一世在俄军总部的副官。因在斯摩棱斯克战役前夕与布拉尼茨基、弗洛茨基等人公开指责总司令巴克莱·德·托利通敌，被巴克莱借口向皇上递送文件打发到彼得堡。此前柳博米尔斯基曾因无意中泄露俄军进攻计划（写信提醒住在因科沃的母亲躲避战火，结果信件被缪拉截获）引发司令部内部"叛徒"猜疑。托尔斯泰在《战争与和平》中将其作为波兰贵族在俄军司令部中复杂处境的缩影。
  书中原文: |
    柳博米尔斯基、布拉尼茨基、弗洛茨基之流的人物，吵得是这么凶，使得巴克莱借口给皇上递送文件，把这帮波兰高级侍从打发到彼得堡，然后对贝尼格森和大公进行一场公开的斗争。
  网络来源: |
    http://nsfarchives.altervista.org/napoleon/forum/archive2005_config.pl@md=read%3Bid=51406.html
    http://www.prlib.ru/en/item/1062228

- 名词: 布拉尼茨基
  解释: |
    弗瓦迪斯瓦夫·格热戈日·布拉尼茨基（Władysław Grzegorz Branicki，1783—1843），波兰贵族、俄军将军、枢密官。其母亚历山德拉·冯·恩格尔哈特据传为叶卡捷琳娜大帝的私生女，布拉尼茨基幼年即受女皇眷顾，刚出生即登记为禁卫军普列奥布拉任斯基团军官。1812年拿破仑入侵俄国期间，任沙皇亚历山大一世侍从武官，先后参加斯摩棱斯克战役、博罗季诺战役，因战功晋升上校。后参加莱比锡战役。他与柳博米尔斯基、弗洛茨基等波兰侍从武官一道，在斯摩棱斯克会师前后公开指责巴克莱·德·托利，加剧了俄军司令部内部的分裂，最终被巴克莱打发到彼得堡。晚年官至俄国帝国首席猎官，获伯爵称号。
  书中原文: |
    一群布拉尼茨基、温岑格罗德之流的人物越发搅坏了各司令之间的关系，结果更不统一了。
  网络来源: |
