- 名词: 羽毛褥子
  解释: |
    中国传统御寒卧具，又称鹅毛褥子、鸭绒褥子，用鹅毛或鸭毛的细软绒毛装填入布袋缝制而成，具有隔潮、隔热保暖、柔软舒适的特点。流行于北方农村，尤其在上世纪五六十年代的东北地区常见。在《战争与和平》的俄国贵族家庭中，羽毛褥子也是常见的床上用品，用于铺垫保暖。
  书中原文: |
    娜塔莎侧身坐在蓝色的羽毛褥子上，搂着女友哭着。
  网络来源: |
    https://baike.baidu.com/item/%E7%BE%BD%E7%BB%92%E8%A4%A5

- 名词: 扇子
  解释: |
    在19世纪俄国贵族社交中，扇子是贵族女性参加舞会时必不可少的配饰，不仅是纳凉工具，更是身份和教养的象征。当时欧洲流行"扇语"（扇子语言），通过扇子的不同拿法、开合动作传递无法言说的情感。扇子还可在背面临时记录舞伴名字，兼具记事功能。
  书中原文: |
    她手里拿一把扇子，这是一位小姐给她暂时拿着的。她摆出一副十足的交际家的姿态，她摇着扇子，隔着扇子露出笑容，和她的舞伴谈话。
  网络来源: |
    https://acdebernadac.com/zh/2022/08/22/%E5%B0%8F%E5%B0%8F%E4%B8%80%E6%8A%8A%E6%8A%98%E6%89%87%EF%BC%8C%E8%97%8F%E4%BA%86%E5%A4%9A%E5%B0%91%E7%A7%98%E5%AF%86%EF%BC%9F/

- 名词: 卜列格怀表
  解释: |
    "卜列格"是宝玑（Breguet）早期或较罕见的音译名称。宝玑是法国著名钟表品牌，由亚伯拉罕·路易·宝玑创立于1775年。在19世纪俄国贵族社会中，宝玑怀表是昂贵而精准的计时工具，象征着身份和地位。小说中罗兰医生用卜列格怀表看时间，体现了当时俄国上层社会使用欧洲奢侈品的风尚。
  书中原文: |
    医生看了看卜列格怀表。
  网络来源: |
    https://www.xbiao.com/breguet/48118.html

- 名词: 圣像
  解释: |
    东正教圣像（希腊文"eikon"，意为"像"）是东正教信仰中重要的宗教象征，描绘基督、圣母、圣徒等神圣人物。东正教徒在家中通常设"圣像角"（红角），面向东方摆放圣像，前面悬挂油灯，每日祈祷。圣像在俄罗斯文化和历史中具有深远影响，不仅是宗教用品，也是民族认同的象征。
  书中原文: |
    屋里半明半暗，圣像前只点着两盏小油灯。
  网络来源: |
    https://kamatiam.org/%E5%9F%BA%E7%9D%A3%E5%AE%97%E6%95%99%E8%81%96%E5%83%8F%E7%9A%84%E5%82%B3%E7%B5%B1%E5%92%8C%E8%AD%B0%E9%A1%8C/

- 名词: 神香
  解释: |
    神香是供神时所用的一种熏香，在宗教仪式中作为通神媒介，广泛用于东正教、佛教、道教等宗教活动。在东正教仪式中，神香（乳香）燃烧升腾的烟雾象征信徒的祈祷上达于天，同时具有净化空间、驱邪避秽的功能。小说中提到"神香和鲜花散发着馨香"，描绘了俄国贵族家庭圣像角前的宗教氛围。
  书中原文: |
    神香和鲜花散发着馨香。
  网络来源: |
    https://baike.baidu.com/item/%E7%A5%9E%E9%A6%99/9214629

- 名词: 油灯
  解释: |
    东正教传统中，圣像前通常会悬挂或放置一盏油灯，希腊语/斯拉夫语中称为Kandilo。这盏油灯是东正教家庭和教堂中不可或缺的礼仪用品，象征基督是世界之光（《约翰福音》8:12）、神的临在和祈祷之火。东正教家庭每天点燃圣像前的油灯，修剪灯芯保持燃烧，象征信徒对灵魂日常的照料。
  书中原文: |
    屋里半明半暗，圣像前只点着两盏小油灯。
  网络来源: |
    https://bigorski.org.mk/en/katehizis/why-do-we-light-the-oil-lamp-kandilo/

- 名词: 屏风
  解释: |
    屏风（俄语：ширма）是一种用于空间分隔的传统家具，起源于中国，后传入欧洲。在19世纪俄罗斯贵族家庭中，屏风是常见的室内陈设，用于房间功能分区和装饰。圣彼得堡甘布斯兄弟工坊（Gambs Brothers）制作的屏风是当时俄罗斯家具工艺的代表。小说中屏风后是公爵小姐的卧床，体现了屏风在私密空间中的分隔作用。
  书中原文: |
    屏风后可以看见垫着羽毛褥子的高床上铺着洁白的罩单。
  网络来源: |
    https://www.hermitagemuseum.org/wps/portal/hermitage/digital-collection/13.+Furniture/1150363

- 名词: 麻纱手绢
  解释: |
    麻纱（英文名：cambric）是一种布面呈现纵向细条织纹的轻薄织物，主要原料为纯棉纱或棉麻混纺纱，因挺爽如麻而得名。麻纱面料吸湿性强、透气性好、质地轻薄，非常适合制作手绢（手帕）。19世纪俄国贵族常用麻纱手绢作为随身物品，用于擦汗等日常用途。
  书中原文: |
    一对舞伴停下来，深深地喘着气，用麻纱手绢擦汗。
  网络来源: |
    https://baike.baidu.com/item/%E9%BA%BB%E7%BA%B1/1458782

- 名词: 诗稿
  解释: |
    诗稿指诗歌的手写稿。小说中尼古拉·罗斯托夫写了诗送给索尼娅，索尼娅将诗稿珍藏于怀中贴近胸骨的位置，极为珍视。这些诗是尼古拉表达对索尼娅爱慕之情的作品，但在当时贵族社交背景下，表亲之间的恋爱受到重重阻碍。
  书中原文: |
    索尼娅抖掉身上的绒毛，把诗稿藏在怀里颈下贴近胸骨的地方，迈开轻松愉快的脚步，满脸通红，跟着娜塔莎顺着走廊向起居室跑去。
  网络来源: |
    未检索到网络资料

- 名词: 默祷
  解释: |
    默祷（即内心祈祷）在东正教传统中是个人内在的、不断的祈祷实践，尤其是"耶稣祷文"（"主耶稣基督，上帝的儿子，可怜我吧"）的反复诵念。默祷传统可追溯到古埃及沙漠中的隐修士。东正教认为默祷是获得圣灵的途径之一。在小说中，默祷是为临终病人举行的宗教仪式的一部分，与圣餐礼一同进行。
  书中原文: |
    医生宣布复元无望，已经给病人做了默祷和圣餐礼，而且做了终敷礼的准备。
  网络来源: |
    https://azbyka.ru/chinaorthodox/qidao-jingwen.html

- 名词: 圣餐礼
  解释: |
    圣餐礼（东正教称"圣体礼"）是东正教七大圣事之一，通过祝圣饼和酒使之成为基督的身体和宝血，信徒领受以达到与神合一。圣餐礼是东正教礼仪生活的核心，源于《约翰福音》中"你们若不吃人子的肉，不喝人子的血，就没有生命在你们里面"的教导。在小说中是老别祖霍夫伯爵临终前举行的宗教仪式。
  书中原文: |
    医生宣布复元无望，已经给病人做了默祷和圣餐礼，而且做了终敷礼的准备。
  网络来源: |
    https://theological.asia/%E6%AD%A3%E6%95%99%E7%9A%84%E8%81%96%E7%A6%AE%E5%84%80%E4%BA%8C/

- 名词: 终敷礼
  解释: |
    终敷礼（也写作"终傅"）是东正教七大圣事之一，俄语称Елеосвящение（病人傅油），英语称Extreme Unction（终傅），是为临终或重病信徒举行的宗教仪式。神甫用经过祝圣的橄榄油（圣油）敷擦病人的耳、目、口、鼻和手、足（五官和四肢），同时诵念祈祷经文，相信能赦免罪过、减轻痛苦，使信徒安然离世。
  书中原文: |
    医生宣布复元无望，已经给病人做了默祷和圣餐礼，而且做了终敷礼的准备。
  网络来源: |
    https://baike.baidu.com/item/%E7%BB%88%E5%82%85/7514145

- 名词: 四重唱
  解释: |
    四重唱是一种由四个声部组成的声乐演唱形式，常见的有女声四重唱、男声四重唱和混声四重唱。在19世纪俄国贵族社交场合中，年轻人聚在一起演唱四重唱是常见的娱乐方式。小说中年轻人在客人请求下演唱了四重唱《小泉流水》，展现了战前和平生活中贵族青年的文艺娱乐场景。
  书中原文: |
    在客人们的请求下，年轻人唱了四重唱《小泉流水》，这曲子人人都爱听。
  网络来源: |
    未检索到网络资料

- 名词: 苏格兰舞
  解释: |
    苏格兰舞（Écossaise，法语意为"苏格兰的"）是一种苏格兰风格的对舞（contredanse），在18世纪末至19世纪初流行于法国、英国和俄国贵族社交场合。节拍为快速2/4拍，队形为男女面对面排成双行。在19世纪俄国贵族舞会中，苏格兰舞（埃科赛斯舞）是舞会固定舞蹈序列的一部分，传入俄国后成为贵族社交的流行舞蹈。
  书中原文: |
    当第三节苏格兰舞曲奏到一半的时候，客厅里传出移动椅子的声音。
  网络来源: |
    https://en.wikipedia.org/wiki/Ecossaise

- 名词: 英格兰舞
  解释: |
    英格兰舞（Anglaise，昂格莱兹舞）是一种源自英国的乡村对舞（English country dance / contradance），在18世纪末至19世纪初的俄国贵族舞会中极为流行。根据圣彼得堡百科全书，19世纪初俄国贵族舞会的固定舞蹈顺序就包括anglaise。《丹尼拉·库波尔》实际上是英格兰舞中的一个舞式（figure），在拿破仑战争时期深受俄国贵族喜爱。
  书中原文: |
    （其实《丹尼拉·库波尔》是英格兰舞的一节。）
  网络来源: |
    https://www.encspb.ru/object/2804016236

- 名词: 中风
  解释: |
    中风（医学上称脑卒中）是一种急性脑血管疾病，因脑部血管突然破裂或阻塞导致血液不能流入大脑而引起脑组织损伤。在《战争与和平》中，老别祖霍夫伯爵第六次发作中风，医生宣布复元无望。中风的主要症状包括肢体瘫痪、口眼歪斜、言语不清等，小说描写伯爵"一只胳膊不由自主地垂到后面"正是中风典型症状。
  书中原文: |
    别祖霍夫伯爵第六次发作了中风病。医生宣布复元无望，已经给病人做了默祷和圣餐礼，而且做了终敷礼的准备。
  网络来源: |
    https://www.douban.com/note/782879971/

- 名词: 特权许可
  解释: |
    指东正教会宗主教（总主教）对表亲婚姻的特许。在19世纪俄国，东正教会传统上禁止七亲等以内的旁系血亲结婚，表亲（堂表兄妹）属于被禁止的范围。但教会法中的"经济原则"（oikonomia）允许主教在特殊情况下给予豁免许可。索尼娅与尼古拉是表兄妹关系，因此需要总主教亲自颁发特权许可才能结婚。
  书中原文: |
    必须……总主教亲自许可，就是那样也不行。
  网络来源: |
    未检索到网络资料

- 名词: 小泉流水
  解释: |
    《小泉流水》是《战争与和平》中年轻人在罗斯托夫家演唱的一首四重唱歌曲。该曲在俄语原文中可能对应"Ключ"（泉水）或类似含义的歌曲，是当时俄国贵族青年中流行的音乐作品。小说中描绘了娜塔莎和索尼娅相约去唱《小泉流水》的场景，展现了战前和平生活中贵族青年的文艺娱乐。
  书中原文: |
    在客人们的请求下，年轻人唱了四重唱《小泉流水》，这曲子人人都爱听。
  网络来源: |
    未检索到网络资料

- 名词: 特烈帕克
  解释: |
    特烈帕克（Трепак / Trepak）是一种双拍子的俄罗斯民间舞蹈，情绪欢快奔放、节奏感强烈。最著名的特烈帕克舞曲出自柴可夫斯基的芭蕾舞剧《胡桃夹子》（第二幕糖果仙子的盛大宴会）。在《战争与和平》中，作者将《丹尼拉·库波尔》舞曲比作"欢乐的《特烈帕克》舞曲"，说明这两种舞蹈在节奏和气氛上具有相似性。
  书中原文: |
    刚一响起快乐的、吸引人的、像欢乐的《特烈帕克》舞曲的《丹尼拉·库波尔》舞曲，大厅门口忽然挤满了仆人的笑脸。
  网络来源: |
    https://baike.baidu.com/item/%E7%89%B9%E5%88%97%E5%B8%95%E5%85%8B

- 名词: 丹尼拉·库波尔
  解释: |
    丹尼拉·库波尔（俄语：Данила Купер / Daniel Cooper）是《战争与和平》中老罗斯托夫伯爵与玛丽亚·德米特里耶夫娜所跳的一种英格兰对舞（anglaise中的一节）。根据俄国回忆录作家维格尔的记载，这支舞因其创作者——一位名叫库珀（Cooper）的英国人而得名。在19世纪俄国贵族社交中极为流行，舞步快速、轻松活泼。
  书中原文: |
    "谢苗！你会奏《丹尼拉·库波尔》吗？"这是伯爵喜爱的一种舞蹈，他年轻时就跳过。（其实《丹尼拉·库波尔》是英格兰舞的一节。）
  网络来源: |
    http://barynya.blogspot.com/2007/04/daniel-cooper-dance-from-war-and-peace.html
