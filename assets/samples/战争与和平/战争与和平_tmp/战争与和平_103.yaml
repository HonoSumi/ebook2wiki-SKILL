- 名词: 大陆体系
  解释: 即大陆封锁体系（Continental System），拿破仑一世于1806年11月颁布《柏林敕令》后开始推行的对英国的大规模经济封锁政策，禁止法国及其盟国与英国进行任何贸易和通信。该体系是拿破仑在特拉法尔加海战失利、丧失渡海攻英可能后，转而采用经济战手段迫使英国屈服的战略。但由于走私泛滥、各国不满法国的不公平政策以及俄国于1810年退出等因素，该体系最终失败，并成为拿破仑1812年远征俄国的导火索之一。
  书中原文: 对违反大陆体系的指责；奥尔登堡公爵事件；向普鲁士进军（拿破仑以为他这样做不过是为了得到武力的和平）
  网络来源: 百度百科"大陆封锁政策"词条

- 名词: 奥尔登堡公爵事件
  解释: 1810年12月，拿破仑下令吞并奥尔登堡公国（位于今德国西北部），将其并入法兰西帝国。奥尔登堡公爵彼得一世与俄国皇室有密切姻亲关系，沙皇亚历山大一世认为这一吞并是对其家族荣誉的侮辱，违背了1807年《提尔西特和约》中法俄达成的默契。这一事件是导致法俄关系破裂的关键外交事件之一，也是1812年拿破仑入侵俄国的重要导火索。
  书中原文: 对违反大陆体系的指责；奥尔登堡公爵事件；向普鲁士进军（拿破仑以为他这样做不过是为了得到武力的和平）
  网络来源: 百度百科"奥古斯特一世"词条

- 名词: 玛丽亚·路易莎
  解释: 玛丽亚·路易莎（Marie Louise，1791–1847），奥地利女大公，1810年成为拿破仑一世的第二位皇后。她是奥地利皇帝弗朗茨一世的女儿，这场政治联姻旨在巩固奥地利与法国的关系。1811年她为拿破仑诞下独子"罗马王"（拿破仑二世）。拿破仑远征期间，她曾两次担任法国摄政王。拿破仑退位后，她回到奥地利，二人再未相见。根据《枫丹白露条约》，她获得帕尔马女公爵头衔，后来被认为是位有能力的统治者。
  书中原文: 温情地拥抱玛丽亚·路易莎皇后，据他的历史学家说，她和他离别时，似乎依依不舍，——她把他当做丈夫，虽然拿破仑在巴黎另有妻室。
  网络来源: 百度百科"玛丽·路易丝"词条

- 名词: 西徐亚
  解释: 西徐亚（Scythia），又译斯基泰、西古提，是公元前8世纪至公元3世纪活跃于东欧大草原至中亚的游牧民族（属印欧语系东伊朗语族），以骑兵和骑射技术闻名。古代波斯人称其为塞克人（Saka），中国《史记》《汉书》中记录为"塞种"。西徐亚人在公元前612年参与摧毁亚述帝国，公元前513年成功击退波斯王大流士一世的入侵。公元3世纪被哥特人灭亡。在西方古典传统中，西徐亚常被视为蛮族和遥远草原的象征。
  书中原文: 莫斯科圣城就在草原的中央，它是正像亚历山大·马其顿进入的西徐亚那样国家的首都
  网络来源: 百度百科"斯基泰人"词条

- 名词: 亚历山大·马其顿
  解释: 即亚历山大大帝（Alexander the Great，前356–前323），马其顿王国国王（前336–前323在位），世界古代史上最著名的军事征服者之一。师从亚里士多德，即位后迅速统一希腊，随后东征波斯帝国，先后征服小亚细亚、叙利亚、埃及、美索不达米亚、波斯本土和中亚，最远到达印度河流域（今巴基斯坦），建立了空前庞大的亚历山大帝国。在进入中亚时，曾与西徐亚（斯基泰）游牧部落交战并将其击败。其东征促进了希腊化时代的到来和东西方文化的融合。
  书中原文: 莫斯科圣城就在草原的中央，它是正像亚历山大·马其顿进入的西徐亚那样国家的首都
  网络来源: 百度百科"亚历山大大帝"词条

- 名词: 贝蒂埃
  解释: 路易-亚历山大·贝尔蒂埃（Louis-Alexandre Berthier，1753–1815），法国元帅，拿破仑的首席参谋长。出身测绘工程师家庭，曾参加美国独立战争。1796年起追随拿破仑，以卓越的参谋能力著称，能将拿破仑的口头命令精准转化为书面命令，被誉为近代战争参谋部制度的奠基者。1804年首批晋封帝国元帅，名列名单之首。1812年征俄战役中负责组织近50万大军，曾劝拿破仑在斯摩棱斯克停止进军。拿破仑曾感叹："倘若贝尔蒂埃在场，我就不会落得这般的境地。"
  书中原文: 这位穿灰色常礼服的小个子站起来，唤来贝蒂埃，同他一起在河岸上来回踱步，给他发指示，偶尔望望那分散他注意力的淹死的枪骑兵。
  网络来源: 百度百科"路易斯·亚历山大·贝尔蒂埃"词条

- 名词: 莫斯科维亚
  解释: 莫斯科维亚（Muscovy），西欧对莫斯科大公国（1283–1547）的拉丁化称呼，源自拉丁语Moscovia。莫斯科大公国以莫斯科为中心，历经约250年从小邦发展为统一国家，逐步"收集罗斯土地"并摆脱金帐汗国的统治。1547年伊凡四世加冕为沙皇，莫斯科大公国转型为沙皇俄国。在拿破仑战争时期的欧洲语境中，"莫斯科维亚"常被用来指代俄罗斯腹地或带有古风和蛮荒色彩的俄国。
  书中原文: 他早就形成一种信念：在世界任何地方，从非洲到莫斯科维亚草原，只要他在场，毫无例外地使人大大吃惊，舍己忘我地疯狂。
  网络来源: 百度百科"莫斯科大公"词条

- 名词: 巴拉舍夫
  解释: 亚历山大·德米特里耶维奇·巴拉舍夫（Alexander Dmitriyevich Balashov，1770–1837），俄国步兵上将，拿破仑战争时期的重要人物。1809–1810年任圣彼得堡军事总督，1810–1812年任俄罗斯帝国警察大臣。1812年拿破仑入侵俄国时，他在维尔纽斯前线，曾奉命将沙皇亚历山大一世的书信转交给拿破仑，并参与组织人民义勇军和遴选俄军总司令的特别委员会。在《战争与和平》中，他是将法军渡过涅曼河的消息带给亚历山大一世的关键人物。
  书中原文: 侍从武官巴拉舍夫向皇帝走去，违背宫廷的礼法，他在正和一个波兰贵妇说话的皇帝的近旁站住了。……巴雷舍夫刚一说话，皇帝的脸上就现出吃惊的表情。他挽起巴拉舍夫的臂膀，和他一起穿过大厅
  网络来源: Wikipedia "Alexander Balashov" 词条

- 名词: 扎克列特
  解释: 扎克列特（Zakret），位于维尔纳（今立陶宛维尔纽斯）附近的一处庄园/别墅，原为俄国将军贝尼格森（Levin August von Bennigsen）的领地。1812年6月13日（拿破仑军队渡过涅曼河的同一天），沙皇亚历山大一世在此出席侍从武官们举办的盛大舞会。正是在这场舞会上，巴拉舍夫带来了法军入侵的消息，亚历山大一世说出了"不宣战就进入俄国！只要有一个武装敌人留在我的国土上，我决不讲和"的名言。
  书中原文: 维尔纳省地主贝尼格森伯爵把他的郊外别墅供给晚会使用，于是定于六月十三日在贝尼格森伯爵的郊外别墅扎克列特举行舞会、宴会、赛船会和焰火会。
  网络来源: Look and Learn 历史图片资料"View of the palace of General Bennigsen in Zakret near Vilnius"

- 名词: 波托茨卡娅伯爵夫人
  解释: 安娜·波托茨卡伯爵夫人（Countess Anna Potocka，1779–1867），本名安娜·蒂什凯维奇，波兰贵族女性、回忆录作家和沙龙女主人。她的第二任丈夫曾担任拿破仑的贴身侍卫和副官。她撰写的《波托茨卡伯爵夫人回忆录》（Memoirs of Countess Potocka）是研究拿破仑时期历史的珍贵文献，记录了从1794年波兰第三次被瓜分到1820年间的历史事件。她是波兰末代国王斯坦尼斯瓦夫·奥古斯特·波尼亚托夫斯基的侄孙女。
  书中原文: 低声对海伦说，他想挑选好像已经到阳台上去的波托茨卡娅伯爵夫人，然后他就滑过镶木地板，向着门外的花园跑去
  网络来源: 《Memoirs of Countess Potocka》图书资料

- 名词: 玛祖尔卡
  解释: 玛祖尔卡（Mazurka，又译玛祖卡），波兰著名民间舞蹈与音乐形式，起源于波兰中部的玛佐夫舍地区，3/4或3/8拍，重音常落在第二或第三拍（与华尔兹不同）。约18世纪风靡全欧洲，成为各国宫廷和上流社会舞会中的常见舞蹈。在19世纪俄国上流社会中尤为流行，托尔斯泰在《战争与和平》和《安娜·卡列尼娜》中都有描写。肖邦创作了约58首玛祖卡钢琴曲，将其提升为世界性的艺术形式。
  书中原文: 海伦没有得到一个适当的舞伴，自动邀请鲍里斯跳玛祖尔卡舞。他们是第三对。……玛祖尔卡舞刚刚开始的时候，鲍里斯看见皇帝的亲信之一——侍从武官巴拉舍夫向皇帝走去
  网络来源: 百度百科"玛祖卡"词条

- 名词: 维尔纳
  解释: 维尔纳是立陶宛首都维尔纽斯（Vilnius）在俄语中的历史名称（Вильна），波兰语称Wilno（维尔诺）。在第三次瓜分波兰（1795年）后，该城被并入俄罗斯帝国，成为维尔纳省首府。1812年拿破仑入侵前夕，沙皇亚历山大一世曾在此驻留一个多月检阅军队和演习，举行各种舞会和庆祝活动。该城历史上是波兰-立陶宛联邦的重要文化中心，也是犹太文化的重镇。
  书中原文: 俄国皇帝这时在维尔纳检阅军队和演习，已经住了一个多月了。对于人人都料到的战争（皇帝就是为此从彼得堡来的），仍然毫无准备。
  网络来源: 百度百科"维尔纽斯"词条
