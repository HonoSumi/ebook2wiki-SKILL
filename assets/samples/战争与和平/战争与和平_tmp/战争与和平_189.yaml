- 名词: 瓦格拉木战役
  解释: 瓦格拉木战役（Battle of Wagram，1809年7月5日-6日）是拿破仑战争期间法军与奥地利军队在维也纳东北瓦格拉姆村进行的一场大规模会战。拿破仑率约17万法军击败卡尔大公率领的约15万奥军，双方伤亡总数超过7万人。此战是当时欧洲历史上规模最大的战役，也是拿破仑最后一次绝对性胜利。战后奥地利签订《申布伦条约》，割让领土并支付赔款。该战役中文译名有"瓦格拉木"和"瓦格拉姆"两种写法。
  书中原文: 俄国军队受到的损失比敌军先前从奥斯特利茨到瓦格拉木历次战争所受的损失还惨重
  网络来源: https://baike.baidu.com/item/%E7%93%A6%E6%A0%BC%E6%8B%89%E5%A7%86%E6%88%98%E5%BD%B9

- 名词: 埃尔富特会议
  解释: 埃尔富特会议（Congress of Erfurt，1808年9月27日-10月14日）是法国皇帝拿破仑一世与俄国沙皇亚历山大一世在德意志城市埃尔富特举行的高峰会晤。会议旨在重申《蒂尔西特和约》确立的法俄联盟关系。会议期间，法国外长塔列朗秘密背叛拿破仑，暗中建议亚历山大一世抵制拿破仑的扩张野心。双方最终签署《埃尔福特公约》，但法俄关系此后逐渐恶化，最终走向1812年的战争。这是两位皇帝的末次会面。
  书中原文: 这一切，都由他过去整个生活中的无数所谓偶然机会：教育、自由主义的创举、周围的顾问，以及奥斯特利茨战役、蒂尔西特会谈和埃尔富特会议等，作好了准备。
  网络来源: https://zh.wikipedia.org/zh-hans/%E5%9F%83%E7%88%BE%E7%A6%8F%E7%89%B9%E6%9C%83%E8%AD%B0

- 名词: 百日王朝
  解释: 百日王朝（法语：les Cent-Jours）指拿破仑一世1815年从厄尔巴岛流放地逃回法国、重建法兰西第一帝国的历史时期，时间跨度为1815年3月20日至7月8日（约110天）。拿破仑在儒昂湾登陆后不费一枪一弹进入巴黎，重登皇位，但最终在滑铁卢战役中被英普联军击败，第二次退位后被流放至圣赫勒拿岛。该名称由巴黎省长加斯帕尔·德·夏布洛尔在欢迎路易十八返回巴黎的致辞中首次使用。
  书中原文: 这个使法国遭到毁灭的人，没有施展阴谋手段，没有带士兵，只身回到巴黎来了。每个卫兵都可以把他抓起来；但是由于奇特的偶然机遇，不仅没有抓他，而且大家还热烈地欢迎这个一天前他们还在咒骂、一月后他们还要咒骂的人。
  网络来源: https://baike.baidu.com/item/%E7%99%BE%E6%97%A5%E7%8E%8B%E6%9C%9D
