- 名词: 奥普战争
  解释: 奥普战争（又称普奥战争、七星期战争）是1866年普鲁士与奥地利之间为争夺德意志领导权而爆发的战争。普鲁士在俾斯麦领导下，利用铁路和电报技术，在萨多瓦战役中决定性击败奥军。最终奥地利退出德意志邦联，普鲁士主导成立北德意志邦联，为1871年德意志帝国统一奠定基础。
  书中原文: 我们觉得，奥普战争[16]无疑是俾斯麦的诡诈以及其他诸如此类的事产生的后果。
  网络来源: https://baike.baidu.com/item/%E6%99%AE%E5%A5%A5%E6%88%98%E4%BA%89/594723

- 名词: 阿提拉
  解释: 阿提拉（约406年—453年）是匈人帝国的领袖，被称为"上帝之鞭"。他于公元433年与其兄布来达共同继承王位，约445年成为唯一统治者。他曾率军横扫巴尔干半岛，入侵高卢和意大利，迫使东罗马帝国纳贡求和。453年他突然暴毙，帝国迅速瓦解。其形象在欧洲历史上象征着野蛮征服的恐怖力量。
  书中原文: 至于各民族的迁徙，今天已经没有人会认为欧洲的复兴决定于阿提拉[17]的任意作为。
  网络来源: https://baike.baidu.com/item/%E9%98%BF%E6%8F%90%E6%8B%89/3162109

- 名词: 万有引力
  解释: 万有引力是牛顿在1687年《自然哲学的数学原理》中提出的基本物理定律，指出任何两个具有质量的物体之间都存在相互吸引力，引力大小与两物体质量的乘积成正比，与距离的平方成反比（F=G·m1·m2/r²）。万有引力定律统一了天体力学和地面力学，是经典力学的基石。1798年卡文迪许用扭秤实验测定了引力常数G。
  书中原文: 但是，正如人人都感觉到、而其自身却无法理解的万有引力一样，我们对它所服从的必然性法则知道多少（从一切物体都有重量这个起码的知识，到牛顿的定律），我们就对它了解多少。
  网络来源: https://wapbaike.baidu.com/item/%E4%B8%87%E6%9C%89%E5%BC%95%E5%8A%9B%E5%AE%9A%E5%BE%8B/101452

- 名词: 牛顿
  解释: 艾萨克·牛顿（1643—1727），英国物理学家、数学家、天文学家，被誉为"近代物理学之父"。他创立了经典力学体系（牛顿三大运动定律和万有引力定律）、发明了微积分（与莱布尼茨各自独立）、发现了光的色散现象并发明反射望远镜。其代表作《自然哲学的数学原理》（1687年）是科学史上最重要的著作之一，实现了自然科学史上第一次大统一。
  书中原文: 我们对它所服从的必然性法则知道多少（从一切物体都有重量这个起码的知识，到牛顿的定律），我们就对它了解多少。
  网络来源: https://baike.baidu.com/item/%E8%89%BE%E8%90%A8%E5%85%8B%C2%B7%E7%89%9B%E9%A1%BF/1119240
