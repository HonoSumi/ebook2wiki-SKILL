- 名词: 威尔逊日记
  解释: "指英国将军罗伯特·托马斯·威尔逊爵士（Sir Robert Thomas Wilson, 1777—1849）在1812—1814年拿破仑战争期间所写的私人日记。威尔逊作为英国军事委员配属俄军司令部，亲历了1812年拿破仑侵俄战争的全部重大战役。该日记于1861年由其侄子赫伯特·伦道夫整理出版，全名为《私人旅行日记、个人勤务与公共事件：1812、1813、1814年战役期间随欧洲军队执行使命与勤务之记录》。日记内容包含大量第一手观察，以及与沙皇亚历山大一世和俄军将领的通信，是研究1812年俄法战争的重要原始史料。托尔斯泰在创作《战争与和平》时曾引用该日记作为历史参考。"
  书中原文: "见威尔逊日记。——托尔斯泰注。（罗勃特·托马斯·威尔逊［1774—1849］，曾于一八一二至一八一四年在俄军司令部任英国军事委员。他的日记于一八六一年出版。）"
  网络来源: "威尔逊日记在Internet Archive有免费数字化版本，剑桥大学出版社也于2014年再版。"

- 名词: 波格丹诺维奇
  解释: "指莫杰斯特·伊万诺维奇·波格丹诺维奇（Modest Ivanovich Bogdanovich, 1805—1882），帝俄时期著名军事历史学家，官至中将。他生于乌克兰苏梅，1823年成为炮兵军官，参加过1831年波兰战役，后在帝国军事学院任教。其代表作《1812年卫国战争史》是俄军官方正史，基于俄国国家档案全面查阅并参考法文和德文史料写成，1861年获杰米多夫历史奖。该书长期仅有俄文版和德文版，2024年由Helion & Company出版英文首译本。中国译者评价他深受若米尼影响，堪称帝俄时代最为客观、优秀的官方军事史学家。托尔斯泰在《战争与和平》中引用波格丹诺维奇的著作作为历史依据。"
  书中原文: "见波格丹诺维奇所著一八一二年历史：《论库图佐夫及令人不满的克拉斯诺耶战役》。——作者注"
  网络来源: "Helion & Company 2024年出版英译本《The Russian Patriotic War of 1812: The Russian Official History》，共三卷。"

- 名词: 肖像室
  解释: "俄国贵族府邸中专门悬挂祖先肖像的房间，是18—19世纪俄罗斯贵族家庭文化的重要组成部分。贵族家族通常会请画家为每一代家族成员绘制肖像，代代相传，在肖像室中按辈分排列，形成家族谱系的视觉呈现。这种传统在莫斯科、彼得堡及外省贵族中均十分盛行。最著名的肖像室之一是冬宫的军功画廊（1812年卫国战争英雄肖像画廊），以及特列季亚科夫画廊中的名人肖像系列。肖像室不仅是家族荣耀的象征，也具有类似家族祠堂的文化功能，连接着家族的历史记忆与身份认同。"
  书中原文: "肖像室是贵族人家悬挂祖先肖像的房间。"
  网络来源: "俄罗斯国立历史博物馆2019年曾举办《18至20世纪初的俄罗斯贵族肖像》专题展览，展出120幅来自库拉金、戈利岑等贵族家族肖像画廊的作品。"

- 名词: 晚祷
  解释: "基督教晚间祈祷仪式的称谓，在东正教、天主教及部分新教宗派中均有施行。东正教晚祷（俄语：Вечерня）在日落时分举行，是东正教每日祈祷循环（日课）的重要组成部分。仪式内容包括公共祈祷、唱诗篇、赞美诗、应答轮唱、读经及颂唱《尊主颂》等。东正教还有更为隆重的彻夜晚祷（All-Night Vigil），包含晚祷和晨祷两部分，在周六晚或重要教会节日前举行。俄国贵族家庭中，晚祷是日常宗教生活的一部分，既有在家中面对圣像进行的个人祈祷，也有前往教堂参加的集体仪式。俄罗斯作曲家拉赫玛尼诺夫、柴可夫斯基等曾根据东正教晚祷仪轨创作著名的合唱音乐作品。"
  书中原文: "玛丽亚公爵小姐要去做晚祷，皮埃尔跟她们一起去了。"
  网络来源: "百度百科晚课词条；拉赫玛尼诺夫《彻夜晚祷》（Vespers, Op.37, 1915年）为基于此仪轨的著名音乐作品。"
