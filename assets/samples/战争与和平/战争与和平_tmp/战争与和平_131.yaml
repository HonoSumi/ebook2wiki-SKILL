- 名词: 克劳塞维兹
  解释: 卡尔·冯·克劳塞维茨（Carl von Clausewitz，1780—1831），普鲁士少将、军事理论家，著有《战争论》，被誉为"西方兵圣"。他提出"战争是政治的延续"这一经典定义，强调精神力量在战争中的决定性作用，最早系统阐述"人民战争"概念。1812年拿破仑征俄期间，他辞去普军职务加入俄军，参加了波罗金诺（博罗季诺）等会战。
  书中原文: 他们听见离棚屋不远的路上有马蹄的声音，安德烈公爵往那边一看，认出是沃尔佐根和克劳塞维兹[21]，一个哥萨克跟随着。
  网络来源: 卡尔·冯·克劳塞维茨——普鲁士军事理论家，《战争论》作者，被誉为"西方兵圣"，提出"战争是政治的延续"。

- 名词: 德波塞
  解释: 路易-弗朗索瓦-约瑟夫·德波塞-罗克福（Louis-François-Joseph de Bausset-Roquefort，1770—1833），拿破仑的皇宫长官（Prefet du Palais，即宫廷侍从长）。1812年波罗金诺战役前夕，他从巴黎赶到拿破仑在瓦卢耶瓦的驻地，带来皇后玛丽·路易莎赠送的礼物——拿破仑二世（罗马王）的画像。著有回忆录《拿破仑宫廷秘闻录》。
  书中原文: 八月二十五日，波罗金诺战役的前夜，法国皇宫长官德波塞先生和法布维埃上校前来拿破仑在瓦卢耶瓦的驻地觐见他们的皇帝，前者从巴黎来，后者从马德里来。德波塞先生换上朝服，吩咐把他带给皇帝的礼盒在他前面抬着，走进拿破仑的帐篷的头一个房间。
  网络来源: 德波塞（De Bausset），拿破仑的皇宫长官（宫廷侍从长），曾撰写关于拿破仑宫廷的回忆录，是研究拿破仑宫廷生活的重要史料来源。

- 名词: 法布维埃
  解释: 夏尔·尼古拉·法布维埃（Charles Nicolas Fabvier，1782—1855），法国军人、外交官。拿破仑时期官至上校，参加过乌尔姆战役、迪伦斯坦战役，曾任马蒙元帅的副官。1812年从西班牙萨拉曼卡战场赶来向拿破仑报告战况。后在希腊独立战争中成为传奇人物，率530人解救雅典卫城，被授予希腊荣誉公民称号。1830年七月革命后任巴黎军事长官，后升任中将、法国贵族院议员。
  书中原文: 法国皇宫长官德波塞先生和法布维埃上校前来拿破仑在瓦卢耶瓦的驻地觐见他们的皇帝，前者从巴黎来，后者从马德里来。……拿破仑严厉地皱着眉头，默默地听法布维埃讲述他的军队在欧洲的另一端萨拉曼卡作战如何勇敢和忠诚，只想不辜负他们的皇帝，唯恐不能讨他欢心。
  网络来源: 法布维埃（Charles Nicolas Fabvier，1782—1855），法国拿破仑时期上校，后成为希腊独立战争中的英雄人物，曾率530人解救雅典卫城。

- 名词: 萨拉曼卡
  解释: 西班牙西部城市，位于马德里西北约200公里。1812年7月22日，威灵顿公爵率英葡联军在此击败马尔蒙元帅指挥的法军，史称萨拉曼卡战役（亦称阿拉皮莱斯战役）。此战法军伤亡约7000人、被俘约7000人，英葡联军伤亡约5200人。此战是半岛战争的关键转折点，证明威灵顿不仅能打防御战，也能主动进攻，英军随后解放马德里。
  书中原文: 拿破仑严厉地皱着眉头，默默地听法布维埃讲述他的军队在欧洲的另一端萨拉曼卡作战如何勇敢和忠诚，只想不辜负他们的皇帝，唯恐不能讨他欢心。
  网络来源: 萨拉曼卡（Salamanca），西班牙城市。1812年威灵顿公爵在此击败法军马尔蒙元帅，赢得萨拉曼卡战役，是半岛战争的重要转折。

- 名词: 马德里
  解释: 西班牙首都及最大城市，位于伊比利亚半岛中部梅塞塔高原，海拔约667米，是欧洲地势最高的首都。1561年腓力二世将王廷从托莱多迁至马德里，使其成为西班牙事实上的首都。1808年拿破仑入侵西班牙，马德里人民于5月2日起义，遭法军残酷镇压，由此引发西班牙独立战争（1808—1814）。1812年萨拉曼卡战役后，英葡联军于8月6日解放马德里。
  书中原文: 前者从巴黎来，后者从马德里来。
  网络来源: 马德里，西班牙首都，自1561年腓力二世迁都后成为西班牙政治中心。1808—1814年西班牙独立战争期间曾被法军占领。

- 名词: 威斯特法利亚
  解释: 威斯特法利亚（Westphalia，又译威斯特伐利亚），德意志地区历史区域。1807年拿破仑在提尔西特和约后，将普鲁士、汉诺威、黑森等地部分领土合并创建威斯特法利亚王国，立其幼弟热罗姆·波拿巴为国王，首都卡塞尔。该王国推行《拿破仑法典》、废除农奴制等现代化改革，实为法国的附庸国，1813年莱比锡战役后瓦解。小说中安德烈公爵提及"拿破仑所率领的这些威斯特法利亚人"，即指随拿破仑征俄的威斯特法利亚军队。
  书中原文: 那时，拿破仑所率领的这些威斯特法利亚人和黑森人就不会跟随他到俄国来了。
  网络来源: 威斯特法利亚（Westphalia），拿破仑于1807年创建的附庸王国，封其弟热罗姆为国王，推行法语制和拿破仑法典，1813年瓦解。

- 名词: 黑森
  解释: 黑森（Hessen/Hesse），德意志地区历史悠久的邦国。拿破仑战争时期分裂为多个分支，其中黑森-卡塞尔于1803年升格为选侯国，黑森-达姆施塔特于1806年升格为黑森大公国并加入莱茵联邦。黑森-卡塞尔以输出雇佣兵闻名，北美独立战争中英国曾雇佣黑森士兵作战。小说中提到的"黑森人"即指随拿破仑征俄的黑森军队。
  书中原文: 那时，拿破仑所率领的这些威斯特法利亚人和黑森人就不会跟随他到俄国来了。
  网络来源: 黑森（Hesse），德意志历史邦国，拿破仑时期黑森-达姆施塔特升为大公国并加入莱茵联邦；黑森-卡塞尔以输出雇佣兵闻名。
