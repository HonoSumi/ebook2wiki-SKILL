- 名词: 沃罗涅日
  解释: |
    沃罗涅日（Воронеж），俄罗斯欧洲部分中部城市，沃罗涅日州首府，位于沃罗涅日河畔。
    1586年沙皇费奥多尔·伊万诺维奇下令在此修建军事城堡，以防御克里木鞑靼人入侵，被公认为建市之年。
    1696年彼得大帝在第一次亚速远征失败后选择沃罗涅日筹建俄罗斯海军舰队，在此建造军舰制造厂，
    沃罗涅日因此成为俄罗斯海军的诞生地。1696至1722年间，彼得一世共到此巡视13次，
    期间这里实际上相当于俄罗斯帝国的行政中心。
    18至19世纪，沃罗涅日发展为俄罗斯最大的呢料产地之一，并建立了军事学校和高等学校。
    二战期间城市几乎被夷为平地（92%的房屋被毁），战后获"军事荣耀城市"称号。
    在《战争与和平》中，沃罗涅日是玛丽亚公爵小姐与尼古拉·罗斯托夫初次相遇并产生感情的地方。
