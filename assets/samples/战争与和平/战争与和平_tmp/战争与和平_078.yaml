- 名词: 科季利翁
  解释: |
    科季利翁（Cotillion/Cotillon）是一种18至19世纪流行于法国和英国宫廷的社交舞蹈，
    由四对舞伴站成方形表演，舞伴间频繁交换，穿插各种几何花样动作。
    该词源自法语"cotillon"（小裙子/衬裙），因舞蹈动作会露出衬裙而得名。
    科季利翁是四对方舞（Quadrille）的前身，也是美式方舞（Square Dance）的源头之一。
    19世纪俄罗斯上流社会的舞会上常以此舞作为压轴节目。
  书中原文: |
    晚餐前跳欢乐的科季利翁[15]的时候，安德烈公爵又请娜塔莎跳舞。
  网络来源: |
    https://baike.baidu.com/item/cotillion/52734070
    https://pedia.cloud.edu.tw/Entry/Detail/?title=%E6%88%88%E8%92%82%E9%9B%8D%E8%88%9E

- 名词: 帝国会议
  解释: |
    帝国会议（又称国务会议/State Council）是1810年由沙皇亚历山大一世在改革家斯佩兰斯基
    推动下正式成立的俄罗斯帝国最高立法咨询机构，成员由皇帝亲自任命。
    它模仿法国拿破仑的国务委员会（Conseil d'État），主要负责协助皇帝开展立法工作，
    审议国家法律草案。小说中比茨基所说的"帝国会议"正是指这一机构。
    斯佩兰斯基在该机构中担任国务秘书。该会议是亚历山大一世宪政改革中唯一实际付诸实施的部分，
    其余大部改革因保守贵族反对而失败。
  书中原文: |
    他刚打听出今天早晨皇上召开的帝国会议的详情，于是就兴高采烈地谈起这件事。
  网络来源: |
    https://zh.wikipedia.org/zh-sg/%E7%B1%B3%E5%93%88%E4%BC%8A%E7%88%BE%C2%B7%E7%B1%B3%E5%93%88%E4%BC%8A%E6%B4%9B%E7%B6%AD%E5%A5%87%C2%B7%E6%96%AF%E4%BD%A9%E8%98%AD%E6%96%AF%E5%9F%BA
    https://baike.baidu.com/item/%E7%B1%B3%E5%93%88%E4%BC%8A%E5%B0%94%C2%B7%E7%B1%B3%E5%93%88%E4%BC%8A%E6%B4%9B%E7%BB%B4%E5%A5%87%C2%B7%E6%96%AF%E4%BD%A9%E5%85%B0%E6%96%AF%E5%9F%BA

- 名词: 参政院
  解释: |
    参政院（又称元老院/Правительствующий сенат）是俄罗斯帝国最高国家机构之一，
    1711年由彼得大帝下令设立，取代领主杜马（波雅尔杜马）。
    最初是立法、行政和司法三位一体的最高机构，至19世纪主要职能转变为最高司法和监督机关。
    参政院存在了206年（1711-1917），是俄罗斯帝国延续时间最长的中央机构。
    斯佩兰斯基的宪政改革方案中，参政院被定位为最高司法机关。
  书中原文: |
    皇上开门见山说，帝国会议和参政院都是国家等级；他说，行使职权不应独断专行，而是根据硬性的原则。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/%E5%85%83%E8%80%81%E9%99%A2_(%E4%BF%84%E7%BD%97%E6%96%AF%E5%B8%9D%E5%9B%BD)
    http://tsrus.cn/eshi/2013/03/05/171135_21657.html

- 名词: 罗马法典
  解释: |
    罗马法典通常指东罗马帝国皇帝查士丁尼一世主持编纂的《国法大全》
    （Corpus Juris Civilis，又称《查士丁尼民法大全》），是欧洲历史上第一部
    系统完整的法典汇编，由《查士丁尼法典》《法学阶梯》《学说汇纂》和《新律》
    四部分组成。罗马法是大陆法系的源头，确立了"法律面前人人平等""契约自由"
    "私有财产权不可侵犯"等基本原则。在小说中，安德烈公爵曾参与将罗马法典
    条文译成俄文的工作，这反映了他参与斯佩兰斯基法制改革活动的经历。
  书中原文: |
    他回忆起他的法律著作，回忆起他是如何精心地把罗马法典和法国法典的条文译成俄文，想到这里，他为自己的行为感到耻辱。
  网络来源: |
    https://baike.baidu.com/item/%E7%BD%97%E9%A9%AC%E6%B3%95%E5%85%B8/5384012
    https://zh.wikipedia.org/zh-mo/%E6%9F%A5%E5%A3%AB%E4%B8%81%E5%B0%BC%E6%B0%91%E6%B3%95%E5%A4%A7%E5%85%A8

- 名词: 法国法典
  解释: |
    法国法典指1804年由拿破仑颁布实施的《法国民法典》（又称《拿破仑法典》），
    是世界上第一部资产阶级民法典，共2281条，分为总则和三编（人法、物法、债法）。
    它确立了民事权利平等、私有财产神圣不可侵犯、契约自由等近代民法基本原则。
    拿破仑曾自豪地说："我的真正的光荣不在于打赢了40多场战役……但不会被任何
    东西抹去并且将永远存在的是我的民法典。"在小说中，安德烈公爵参与将法国法典
    条文译成俄文的工作，正是斯佩兰斯基主持俄国法制改革的一部分，意图借鉴
    拿破仑法典编纂俄国的成文法律体系。
  书中原文: |
    他回忆起他的法律著作，回忆起他是如何精心地把罗马法典和法国法典的条文译成俄文，想到这里，他为自己的行为感到耻辱。
  网络来源: |
    https://m.thepaper.cn/baijiahao_10626286
    https://paper.cntheory.com/html/2016-03/24/nw.D110000xxsb_20160324_2-A4.htm

- 名词: 立宪君主
  解释: |
    立宪君主（即君主立宪制）是指君主的权力受到宪法限制的政治制度，介于专制君主制
    与民主共和制之间。在小说中，亚历山大一世在帝国会议上的演讲被比茨基称为
    "只有立宪君主才能发表的演说"，这反映了亚历山大一世深受启蒙思想影响、
    试图推行有限宪政改革的历史背景。然而，亚历山大一世时期（1801-1825）的
    俄罗斯实际上仍然是绝对君主制，立宪改革计划（如斯佩兰斯基的方案）因保守
    贵族强烈反对而未能真正实现。俄罗斯直到1905年革命后才在形式上确立了
    二元君主立宪制。
  书中原文: |
    这是只有立宪君主才能发表的演说。
  网络来源: |
    https://www.marxists.org/chinese/lenin-cworks/10/034.htm
    https://bbs.napolun.com/forum.php?mod=viewthread&tid=32215
