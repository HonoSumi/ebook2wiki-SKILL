- 名词: 斯特罗加诺夫
  解释: |
    指帕维尔·亚历山德罗维奇·斯特罗加诺夫伯爵（Count Pavel Alexandrovich Stroganov，1774-1817），俄国贵族、中将，亚历山大一世的侍从将军（Adjutant General）。他是亚历山大一世即位初期"青年之友"（Негласный комитет / Privy Committee）的核心成员，参与起草了沙皇早期的政府改革方案。在《战争与和平》中，他出现在奥斯特利茨战役前夕，作为亚历山大一世的侍从之一随侍左右。斯特罗加诺夫家族是俄国著名的商人—工业家家族，自16世纪起在西伯利亚开发中发挥关键作用，后获封伯爵爵位，并成为著名的艺术赞助人。
  书中原文: |
    恰尔托里日斯基和诺沃西利采夫，博尔孔斯基公爵和斯特罗加诺夫，以及别的侍从，全是一些服装华贵、快快活活的青年人。他们骑着膘肥力壮、生气勃勃、微微冒汗的骏马停在皇上背后，面带笑容互相交谈着。
  网络来源: |
    https://en.wikipedia.org/wiki/Pavel_Alexandrovich_Stroganov
    https://www.britannica.com/topic/Stroganov-family

- 名词: 普拉茨
  解释: |
    奥斯特利茨（今捷克斯拉夫科夫）附近的一个村庄和关键高地。普拉茨高地（Pratzen Heights）是1805年奥斯特利茨战役中最重要的战略制高点。拿破仑主动放弃该高地以诱敌深入，待俄奥联军主力左移后，命苏尔特元帅率第四军借晨雾掩护夺回，在联军中央打入楔子，成为战役转折点。在《战争与和平》中，两位皇帝（亚历山大一世和弗朗茨二世）正是从普拉茨村方向驰来视察俄军。
  书中原文: |
    从普拉茨村出来的路上好像有一连服装华丽的骑兵在驰骋。其中有两个骑者在其余的人前头并肩大步疾驰。一个身穿黑制服，头戴白缨帽，骑着一匹剪尾枣红马，另外一个身穿白制服，骑着一匹大黑马。这是两位皇帝及其侍从。
  网络来源: |
    https://bbs.napolun.com/thread-5018-1-1.html
    https://en.wikipedia.org/wiki/Battle_of_Austerlitz

- 名词: 玛斯广场
  解释: |
    即玛尔斯广场（Марсово поле / Field of Mars），位于圣彼得堡市中心的大型广场，面积约9公顷。名称源自古罗马的战神广场（Campus Martius），与巴黎的战神广场（Champ de Mars）相呼应。最初为沼泽空地，称"大草地"；18世纪中叶改称"皇后草地"；1805年前后更名为"战神广场"，成为俄军主要阅兵操练场。在《战争与和平》中，托尔斯泰以此比喻俄皇的战马习惯于在阅兵场上接受检阅，如今却身处真实的战场。
  书中原文: |
    这匹在俄国就驮着皇上阅兵的马，在这奥斯特利茨战场上忍受着主人用左脚漫不经心的踢蹬，就像在玛斯广场上一样，一听到枪声就竖起耳朵，它既不懂得它所听到的枪声的意义，也不懂得弗朗茨皇帝所骑的黑马与它为邻的意义，也不懂得骑它的人今天说的话、想的事和感到的一切的意义。
  网络来源: |
    https://en.wikipedia.org/wiki/Field_of_Mars_(Saint_Petersburg)
    https://travel.qunar.com/p-oi10003704-zhanshenguangchang

- 名词: 皇后操场
  解释: |
    即"皇后草场"（Tsarina's Meadow / Царицын луг），圣彼得堡战神广场的旧称。18世纪中叶，因叶卡捷琳娜一世（或安娜女皇）在此附近修建夏宫，供皇室散步游憩，得名"皇后操场"。至保罗一世和亚历山大一世时期，此处转变为军事阅兵和训练场地。在《战争与和平》中，亚历山大一世以此词提醒库图佐夫当前是真正的战场而非和平时期的阅兵场，暗含对库图佐夫迟迟不发起进攻的不满。
  书中原文: |
    "要知道我们不是在皇后操场，米哈伊尔·伊拉里奥诺维奇，团队没有到齐就不能开始阅兵。"皇上说，他又看了看弗朗茨皇帝的眼睛，好像是请他来参与，或者至少听听他说的话。……"正是因此我才没有开始，陛下，"库图佐夫……响亮地说，"正是因为我们不是阅兵，不是在皇后操场上，所以才没有开始，陛下。"
  网络来源: |
    https://en.wikipedia.org/wiki/Field_of_Mars_(Saint_Petersburg)
    https://tmatic.travel/en/view/story/the-field-of-mars_KM3SC22/en

- 名词: 阿普舍龙团
  解释: |
    即第81阿普舍龙步兵团（81-й пехотный Апшеронский полк），俄罗斯帝国陆军的一支老牌步兵团。1724年由波斯远征中的多支部队抽调组建，最初称阿斯特拉巴德步兵团，1732年更名为阿普舍龙团，以纪念阿普舍龙半岛（今阿塞拜疆阿布歇隆半岛）。参加了七年战争（佐恩多夫、库纳斯多夫、攻克柏林）、俄土战争、1812年卫国战争和高加索征服等重大战役。在奥斯特利茨战役中，该团隶属于第四纵队（米洛拉多维奇部），共3个营参战，在小说中该团士兵以雄赳赳的步伐从两位皇帝面前走过。
  书中原文: |
    在阿普舍龙团的那个营走过的时候，红脸膛的米洛拉多维奇，他没有披外套，只穿着制服，佩着勋章，歪戴着大缨帽，英武地行着举手礼，迈着分列式步伐策马行进，走到皇上面前勒住了马。
  网络来源: |
    https://www.napoleon-series.org/military-info/battles/1805/Austerlitz/AusterlitzOOB/c_austerlitzoob6.html
    https://www.prlib.ru/en/node/958666

- 名词: 诺夫戈罗德团
  解释: |
    即诺夫哥罗德步兵团（Новгородский пехотный полк / Новгородский мушкетерский полк），俄罗斯帝国陆军的一支正规线列步兵团。该团隶属于基辅监察区，团级识别色为浅深红色。在奥斯特利茨战役中，诺夫戈罗德团隶属于第四纵队（米洛拉多维奇部），其先遣队（1个营）与阿普舍龙团的1个营共同组成莫纳赫京的前卫部队，另有2个营在主力纵队中。在《战争与和平》中，该团的2个营与阿普舍龙团的1个营一同在两位皇帝面前接受检阅，随即投入战斗。
  书中原文: |
    军队又动起来，诺夫戈罗德团的两个营和阿普舍龙团的一个营从皇上面前走过。
  网络来源: |
    https://www.napoleon-series.org/military-info/battles/1805/Austerlitz/AusterlitzOOB/c_austerlitzoob6.html
    https://www.napoleon-series.org/military-info/organization/Russia/Infantry/c_facings.htm

- 名词: 炮膛探帚
  解释: |
    拿破仑时代前装滑膛火炮装填流程中的关键工具，英文称sponge或sponge staff。为一根长柄木杆，一端装有蘸水羊皮或猪鬃包裹的木质刷头，用于每次射击后清刷炮膛以熄灭余烬、降温除渣，防止新装入的火药被残存火星引燃造成事故；另一端通常带有推弹杆（rammer），形成一头刷、一头推的组合工具。在小说描写的奥斯特利茨战役中，一名红发俄军炮兵与一名法国兵各执探帚一端互相争夺，展现了战场上近距离肉搏的惨烈。
  书中原文: |
    他已经清楚地看见一个高筒军帽歪到一边的红发炮兵的身形，他拖着炮膛探帚的一头，一个法国兵拖着另一头互相争夺。安德烈公爵已经清清楚楚地看见那两个人脸上露出惊慌失措和愤怒的表情，看样子，连他们自己也不知他们在干什么。
  网络来源: |
    https://k.sina.cn/article_3144909821_mbb7383fd033019yo0.html
    https://www.nps.gov/vick/planyourvisit/firing-the-12-pdr-napoleon.htm
