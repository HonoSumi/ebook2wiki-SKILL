- 名词: 贵族长
  解释: |
    俄国贵族长的俄文为предводитель дворянства，直译为"贵族首领"或"贵族领袖"，是俄国
    帝国时期由各省、县贵族会议选举产生的贵族自治机构的领导人。贵族长在地方事务中权力很大，
    负责召集贵族会议、协调贵族与沙皇政府的关系，并在战争时期承担组织民团（后备军）等重任。
    安德烈公爵虽被本地贵族推举为贵族长，但他因厌恶官场虚伪而推辞了这一职务。
  书中原文: |
    蒙本地区的贵族抬举，选我当贵族长，我好歹推辞掉了。
  网络来源: |
    https://baike.baidu.com/item/18世纪俄国的改革与贵族/16397337
    https://bkso.baidu.com/item/波耶/19897563

- 名词: 斯摩棱斯克
  解释: |
    斯摩棱斯克（Смоленск）是俄国西部斯摩棱斯克州的首府，位于第聂伯河畔，距莫斯科约
    400公里，历史上是通往莫斯科的"西大门"。1812年拿破仑入侵俄国时，斯摩棱斯克战役
    （1812年8月）是法军与俄军的第一次重大战役。俄军在巴克莱·德·托利指挥下主动焚城后有序
    撤退，虽战术上失利但保存了主力，为后来的博罗季诺会战和反攻奠定了基础。小说中安德烈公爵
    说即使拿破仑打到斯摩棱斯克，他也不回正规军服役。
  书中原文: |
    即使波拿巴打到跟前，打到斯摩棱斯克，威胁童山，我也不在俄国军队服役。
  网络来源: |
    https://baike.baidu.com/item/斯摩棱斯克战役/3771912
    https://zh.wikipedia.org/wiki/斯摩棱斯克战役_(1812年)

- 名词: 后备军
  解释: |
    俄文为ополчение，指1812年卫国战争期间俄国临时征集的地方民兵武装。沙皇亚历山大一世
    于1812年7月发布宣言，在毗邻战区的16个中部省份征集民团，由各省贵族长负责组织。
    官兵多由贵族的农奴组成，军官由本地贵族充任。托尔斯泰在小说中借安德烈之口提到后备军事务，
    反映战争逼近时俄国社会的全面动员。安德烈公爵的父亲老公爵被任命为第三军区总司令，负责
    督建后备军。
  书中原文: |
    现在又有后备军的事。我现在在后备军，家父是第三军区总司令，在他手下做事，这是我避免服役的唯一方法。
  网络来源: |
    https://cn.nbpublish.com/library_read_article.php?id=64714
    https://baike.baidu.com/item/杰尼斯·瓦西里耶维奇·达维多夫/15062394

- 名词: 农奴
  解释: |
    农奴（крепостной）是俄国农奴制（15世纪至1861年）下的封建依附农民，被束缚在地主
    的土地上，无人身自由。农奴须为地主服劳役或缴纳代役租，可随土地被转让。在《战争与和平》
    的背景下，俄国尚未废除农奴制（1861年改革在小说事件之后约50年）。安德烈公爵对皮埃尔
    谈及解放农奴的问题，认为解放农奴对农奴本人意义不大，更重要的是解放地主的精神负担——
    这是托尔斯泰借人物表达的对农奴制道德困境的深刻思考。
  书中原文: |
    你想解放农奴，这很好；但是这不是为了你，更不是为了农奴。解放农奴对于另外一些人才是需要的，他们在精神上陷于崩溃，内心郁积了很多悔恨，可是又极力压抑着，但由于有权实行公正和不公正的惩罚，而变得粗暴残酷。
  网络来源: |
    https://zh.wikipedia.org/wiki/俄国农奴制
    http://m.people.cn/n4/2017/0303/c2771-8500697.html

- 名词: 西伯利亚
  解释: |
    西伯利亚是俄国亚洲部分的广大地区，自16世纪末起成为沙皇政权流放罪犯和政治犯的主要场所，
    有"没有屋顶的大监狱"之称。在小说中，安德烈公爵提到农奴被流放到西伯利亚的惩罚方式，
    他认为流放西伯利亚对农奴本身并不比原来的生活更糟糕，真正被摧残的是行使惩罚权力的地主
    的良知。这种讽刺性议论反映了托尔斯泰对农奴制下权力异化的批判。
  书中原文: |
    从未把谁流放到西伯利亚，更不是为了农奴。如果他们遭到殴打，鞭笞，被流放到西伯利亚，我想，这对他们并没有什么不好。
  网络来源: |
    https://zh.wikipedia.org/wiki/西伯利亚历史
    https://www.thepaper.cn/newsDetail_forward_3812921

- 名词: 赫尔德
  解释: |
    约翰·戈特弗里德·冯·赫尔德（Johann Gottfried von Herder, 1744-1803），德国哲学家、
    文艺理论家、路德派神学家，狂飙突进运动的精神领袖。他主张历史主义与文化多元性，提出
    "民族精神"（Volksgeist）概念，认为每个民族都有其独特的文化与精神。在小说中，皮埃尔
    阐述关于宇宙中真理与神灵存在的泛神论观点时，安德烈公爵评论说"这是赫尔德的理論"，
    表明赫尔德的哲学思想在19世纪初俄国贵族知识分子中已有传播。
  书中原文: |
    是的，这是赫尔德的理論，可是，亲爱的，使我确切相信的不是这个，而是生和死。
  网络来源: |
    https://baike.baidu.com/item/约翰·戈特弗里德·冯·赫尔德/2083464
    https://zh.wikipedia.org/wiki/约翰·戈特弗里德·赫尔德

- 名词: 神亲
  解释: |
    神亲在《战争与和平》中文译本中特指东正教中那些四处流浪的朝圣者、苦行僧，俄文对应
    странники（意为"流浪者"或"行路人"）。他们主动抛弃世俗生活，以漂泊流浪本身作为灵性
    修行方式，在俄国民间被视为"上帝的子民"而受到款待。小说中玛丽亚公爵小姐不顾父亲反对，
    在家中秘密接待这些神亲，体现了她的虔诚与善良。
  书中原文: |
    这是玛丽亚的神亲，这是她唯一不服从父亲的事。
  网络来源: |
    https://zh.wiktionary.org/wiki/странник
    https://baike.baidu.com/item/教父母

- 名词: 巡礼者
  解释: |
    巡礼者即朝圣者，在《战争与和平》语境下指俄国东正教传统中长途跋涉前往圣地、修道院的
    宗教信徒。巡礼在俄国东正教中是一种重要的宗教实践，信徒通过巡礼朝圣来表达虔诚、祈求
    救赎。小说中安德烈公爵的父亲老公爵不赞成这些巡礼者，命令将他们赶走，但玛丽亚公爵小姐
    仍坚持接待他们，反映了宗教虔诚与世俗权威之间的冲突。
  书中原文: |
    他吩咐把这些巡礼者赶走，可是她还是接待他们。
  网络来源: |
    https://www.sklib.cn/booklib/databasedetail?SiteID=122
    https://zh.wikipedia.org/wiki/费奥多尔·库兹米奇

- 名词: 尤赫诺夫
  解释: |
    尤赫诺夫（Юхнов）是俄国卡卢加州西部的一座历史城市，位于乌格拉河畔，距莫斯科约
    190公里。始建于15世纪初（约1410年），1777年正式获得城市地位。在小说中，安德烈公爵
    提到父亲老公爵因一个书记官盗窃后备军物资而要将其绞死，老公爵的暴烈脾气由此可见一斑。
    尤赫诺夫是老公爵作为第三军区总司令管辖范围内的地点。
  书中原文: |
    两个星期前，如果我迟到两小时，他会把尤赫诺夫的一个书记官绞死的。
  网络来源: |
    https://baike.baidu.com/item/尤赫诺夫/7706810
    https://zh.wikipedia.org/wiki/尤赫诺夫
