- 名词: 格鲁津斯基公爵
  解释: 格鲁津斯基公爵家族是俄罗斯帝国时期的公爵家族，源自格鲁吉亚巴格拉季昂尼王朝（Bagrationi dynasty）。"格鲁津斯基"（Грузинский）俄语意为"格鲁吉亚的"。1724年，卡尔特利国王瓦赫坦格六世因奥斯曼帝国入侵流亡俄罗斯，其子孙获得此爵位。该家族分为老系（穆赫拉尼支系，1892年断绝）和少系（巴格拉季昂-格鲁津斯基，现存）。家族在莫斯科下诺夫哥罗德等地拥有庄园，格鲁津斯基公爵府第是莫斯科的一处著名宅邸。
  书中原文: "皮埃尔正沿着一条小路走过一边连接波瓦尔大街、另一边连接格鲁津斯基公爵府第的花园的一大片空地"
  网络来源: https://en.wikipedia.org/wiki/Alexander_Gruzinsky
- 名词: 莫斯科河外区
  解释: 莫斯科河外区（俄语：Замоскворечье，Zamoskvorechye，意为"莫斯科河对岸的地区"），是莫斯科中央行政区的一个历史区域，位于莫斯科河南岸，正对克里姆林宫。14世纪起有人定居，15世纪设皇家花园，1591—1592年沿花园环路修筑要塞墙，实行自由村制度。18世纪彼得大帝改革后自由村瓦解，成为商人和农民聚居区。19世纪工业化时期建起布罗姆利兄弟机械厂、斯米尔诺夫酒厂等知名企业。该地区保留了17世纪教堂、商人宅邸等多种建筑遗产，是莫斯科历史最悠久的街区之一。
  书中原文: "莫斯科城里各处都起了火。同时着火的地方有马车市场、莫斯科河外区、商场、波瓦尔大街、莫斯科河上的帆船和多罗戈米洛夫桥旁的木材场。"
  网络来源: https://en.wikipedia.org/wiki/Zamoskvorech'ye
