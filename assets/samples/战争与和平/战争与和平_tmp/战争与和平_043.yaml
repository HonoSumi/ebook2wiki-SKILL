- 名词: 恰尔托里日斯基
  解释: |
    亚当·耶日·恰尔托雷斯基亲王（Adam Jerzy Czartoryski，1770-1861），波兰-立陶宛贵族，
    俄国亚历山大一世时期的密友和外交大臣（1804-1806）。他主导了第三次反法同盟的组建，
    主张在俄罗斯保护下重建独立的波兰。在《战争与和平》所描绘的1805年历史背景中，
    他是俄国对外政策的关键决策者之一，参与了奥斯特利茨战役前后的外交活动。
    1815年维也纳会议后成为波兰王国参议院议长，1830年领导波兰十一月起义。
  书中原文: |
    "这是一个最了不起的、然而是我最讨厌的人。他是外交大臣亚当·恰尔托里日斯基公爵。"
    "就是这些人，"他俩走出宫廷时，博尔孔斯基不禁叹息说，"就是这些人决定民族的命运啊。"
    "听见他在走开的时候用法语对恰尔托里日斯基说：'战争是一件多么可怕的事，多么可怕的事！战争是一件多么可怕的事！'"
  网络来源: |
    https://zh.wikipedia.org/zh-tw/%E4%BA%9A%E5%BD%93%C2%B7%E8%80%B6%E6%97%A5%C2%B7%E6%81%B0%E5%B0%94%E6%89%98%E9%9B%B7%E6%96%AF%E5%9F%BA
    https://www.wikiwand.com/zh/articles/%E4%BA%9A%E5%BD%93%C2%B7%E8%80%B6%E6%97%A5%C2%B7%E6%81%B0%E5%B0%94%E6%89%98%E9%9B%B7%E6%96%AF%E5%9F%BA

- 名词: 马尔科夫
  解释: |
    阿尔卡季·伊万诺维奇·莫尔科夫（Arkady Ivanovich Morkov，1747-1827），
    俄罗斯帝国伯爵、枢密官、重要外交官。1801年至1803年担任俄国驻法国公使，
    期间签署了《巴黎和约》，结束了俄国在第二次反法同盟中的参与。在《战争与和平》中，
    多尔戈鲁科夫讲述了马尔科夫与拿破仑之间著名的"手绢故事"：拿破仑故意丢手绢试探马尔科夫，
    而马尔科夫也扔下自己的手绢并拾起自己的，故意不捡拿破仑的，以此展现俄国外交官的尊严与机智。
  书中原文: |
    "您知道他和马尔科夫伯爵的笑话吗？只有马尔科夫伯爵能对付他。您知道手绢的故事吗？妙极了！"
    "波拿巴有意在他面前丢一块手绢，然后停下来瞅着他，大概是期待马尔科夫为他效劳，而马尔科夫马上也把自己的手绢丢在旁边，他拾起自己的手绢，可是没有拾波拿巴的。"
  网络来源: |
    https://en.wikipedia.org/wiki/Arkady_Morkov
    https://www.wikiwand.com/en/Arkady_Morkov

- 名词: 奥斯特利茨战役
  解释: |
    又称"三皇会战"，发生于1805年12月2日，是拿破仑战争中最具决定性的战役之一。
    拿破仑以约7.5万法军击败了俄皇亚历山大一世和奥皇弗朗茨二世率领的约8.5万俄奥联军。
    拿破仑故意放弃普拉岑高地示弱，诱使联军主动进攻，随后以主力切断联军退路，
    联军伤亡被俘约3.6万人。此役被认为是拿破仑军事生涯的巅峰。在《战争与和平》中，
    安德烈公爵在此战中高举军旗冲锋受伤，仰望天空顿悟人生虚无，是全书最著名的哲学时刻之一。
    托尔斯泰借此战役批判英雄史观，展现战争的混乱与荒谬。
  书中原文: |
    "第二天军队出征了，直到奥斯特利茨战役结束，鲍里斯未能到博尔孔斯基那里，也未能到多尔戈鲁科夫那里，暂时仍在伊兹梅洛夫团队里待着。"
  网络来源: |
    https://baike.baidu.com/item/%E3%80%8A%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3%E3%80%8B/9134466
    https://zhuanlan.zhihu.com/p/185376681

- 名词: 申格拉本战役
  解释: |
    发生于1805年11月16日（俄历11月4日），是第三次反法同盟战争中的一场重要后卫战。
    库图佐夫率领俄军主力撤退时，命令巴格拉季昂将军率约5000-7300人在申格拉本村
    阻击追击的约3万法军（缪拉指挥）。俄军利用假和谈拖延时间，成功掩护主力撤退。
    在《战争与和平》中，托尔斯泰对此役有大量描写：图申上尉炮兵连的英勇奋战、
    安德烈公爵为图申辩护、尼古拉·罗斯托夫第一次感受战争的恐惧等。
    此役体现了库图佐夫的战略撤退智慧，也为随后的奥斯特利茨战役埋下伏笔。
  书中原文: |
    "我们在以前的战斗中，"他说，"比如在申格拉本，对法国人既然没有示弱，现在皇上亲临前线将会怎么样呢？我们全去赴死，甘愿为他赴死。"
  网络来源: |
    https://bbs.napolun.com/forum.php?mod=viewthread&tid=27924
    https://m.douban.com/movie/review/15131045/

- 名词: 维绍
  解释: |
    摩拉维亚地区的小镇（德语名Wischau，今捷克共和国维什科夫Vyškov）。
    1805年11月25日，巴格拉季昂率领的俄军在此击溃了法军前卫部队（约1400人），
    取得了一场小型胜利。这场轻松的胜利使俄奥联军产生了过度乐观的情绪，
    误判法军已疲惫不堪，间接导致了随后奥斯特利茨战役的惨败。
    在《战争与和平》中，沙皇亚历山大一世在维绍亲临前线，见到伤亡士兵后落泪，
    说出了"战争是一件多么可怕的事"的名言。尼古拉·罗斯托夫也在维绍见到了沙皇。
  书中原文: |
    "回来的士兵和军官谈论着辉煌的胜利、维绍城的攻占，以及整整一连法国骑兵被俘。"
    "在维绍这个德意志小城中，罗斯托夫又一次看见了皇上。"
    "前卫部队驻扎在维绍城前面，可以望见敌人的散兵线，整整一天，只要稍一接火，敌人就给我们让出地方。"
  网络来源: |
    https://en.wikipedia.org/wiki/Battle_of_Wischau
    https://military-history.fandom.com/wiki/Battle_of_Wischau

- 名词: 执政
  解释: |
    指法国执政府时期（1799-1804年）拿破仑·波拿巴的"第一执政"头衔。
    1799年雾月政变后，拿破仑推翻督政府，建立执政府，自任第一执政，掌握最高权力。
    1802年成为终身执政，1804年称帝建立法兰西第一帝国。
    在《战争与和平》中，俄国外交官们在讨论如何称呼拿破仑时面临外交礼仪难题：
    若称"皇帝"等于承认其帝位合法性，若不承认则只能称"执政"或"波拿巴将军"。
    比利宾戏谑地建议称"法国政府元首鉴"或"篡位的奸臣和人类的敌人"，
    反映了当时欧洲各国对拿破仑政权的矛盾态度。
  书中原文: |
    "如果不能称作执政，自然也不能称作皇帝，那么我觉得，可以称作波拿巴将军。"
    "他建议称他：'篡位的奸臣和人类的敌人。'"
    "法国政府元首鉴，法国政府元首鉴，"多尔戈鲁科夫公爵认真地高兴地说，"好得很，是吧？"
  网络来源: |
    https://zh.wikipedia.org/wiki/%E5%9F%B7%E6%94%BF%E5%BA%9C
    https://zh.wikipedia.org/wiki/%E6%B3%95%E5%85%B0%E8%A5%BF%E7%AC%AC%E4%B8%80%E5%85%B1%E5%92%8C%E5%9B%BD

- 名词: 阿尔萨斯
  解释: |
    法国东北部地区，西邻洛林，东隔莱茵河与德国相望，首府斯特拉斯堡。
    历史上长期为德法争夺之地：17世纪前属神圣罗马帝国，1648年《威斯特伐利亚和约》
    后归法国，1871年普法战争后割让给德国，一战后归还法国，二战期间被纳粹占领，
    1945年重归法国。当地传统使用阿尔萨斯语（德语方言）。
    在《战争与和平》中，被俘的法国龙骑兵是阿尔萨斯人，带着德语口音说法语，
    反映了阿尔萨斯地区德法文化交融的特点。
  书中原文: |
    "这个法国龙骑兵是一个挺好的小伙子，阿尔萨斯人，带着德语口音说法语。他激动得喘不过气来，脸通红，一听到法国话就对军官们——时而对这个时而对那个——滔滔地讲起来。"
  网络来源: |
    https://baike.baidu.com/item/%E9%98%BF%E5%B0%94%E8%90%A8%E6%96%AF%E5%A4%A7%E5%8C%BA
    https://www.163.com/dy/article/DN67TJ7G05238RDM.html
