- 名词: 奥斯特罗夫纳战役
  解释: 1812年拿破仑入侵俄国期间的一场重要战役，发生于1812年7月25日-27日（俄历7月13日-15日），地点在维捷布斯克附近的奥斯特罗夫纳（Ostrovna）。交战双方为法军（由拿破仑和欧仁·博阿尔内指挥）对阵俄军（由奥斯特曼-托尔斯泰将军指挥）。此战是法军向莫斯科推进过程中的一场激烈后卫战，为拿破仑入侵俄国初期的关键战役之一。
  书中原文: 在奥斯特罗夫纳战役之后，他首先被提升，把一营骠骑兵交给他指挥，在需要勇敢的军官的时候，他受到了信任。
  网络来源: https://book.douban.com/annotation/141532234/

- 名词: 穆德罗夫
  解释: 马特维·雅科夫列维奇·穆德罗夫（Matvey Yakovlevich Mudrov，1776-1831），19世纪俄罗斯著名内科医生，莫斯科大学教授。他被誉为俄罗斯临床医学和医学伦理学的奠基人之一。他率先在俄罗斯确立临床诊疗制度，倡导希波克拉底理念——"治病不只是治疾病，更要治病人"，是俄罗斯医学伦理学的先驱。
  书中原文: 假如他不能详细讲一讲梅蒂维埃和费勒如何不懂医道，弗里茨如何高明，而穆德罗夫如何诊断得更好。
  网络来源: https://medet.rsmu.press/archive/2026/1/7/abstract?lang=en

- 名词: 圣彼得斋戒日
  解释: 亦称使徒斋期或彼得保罗斋期，是东正教会（正教会）遵从的重要斋戒之一。斋期于东正教诸圣节后一日开始，因复活节日期变动而长短不一。该斋戒早在4世纪已被提及，是基督教最早的斋戒之一，纪念使徒彼得和保罗。斋戒期间禁止食用红肉、禽肉、蛋、乳制品等，但严格程度低于大斋期。
  书中原文: 刚过圣彼得斋戒日，罗斯托夫家在奥特拉德诺耶的女邻居阿格拉菲娜·伊万诺夫娜·别洛娃来莫斯科朝拜这儿的圣徒们。
  网络来源: https://zh.wikipedia.org/zh-sg/%E4%BD%BF%E5%BE%92%E6%96%8B%E6%9C%9F

- 名词: 领圣体
  解释: 基督教圣事之一，亦称为圣餐礼或圣体血。在东正教传统中，领圣体使用发酵面饼（象征复活的基督）与红酒混合，用圣匙舀取送至信徒口中。东正教持"变质说"，认为经过祝圣的饼和酒真实地、本质性地变成基督的身体和宝血。东正教徒（包括受洗儿童）均可领受。在《战争与和平》中，娜塔莎通过斋戒祈祷和领圣体寻求精神的慰藉与新生。
  书中原文: 领圣体，或者像阿格拉菲娜·伊万诺夫娜喜欢说的"领圣餐"，在娜塔莎心目中其幸福是那么伟大，她甚至觉得她活不到那极乐的礼拜日。
  网络来源: https://zh.wikipedia.org/zh-sg/%E5%9C%A3%E4%BD%93

- 名词: 阿尔巴特药房
  解释: 莫斯科阿尔巴特街（Arbat）地区的药房。阿尔巴特街是莫斯科最古老的街道之一，名称源自阿拉伯语，意为"郊区"。在19世纪，阿尔巴特地区存在多家私营药房。彼得大帝于1701年颁布法令允许开设私营药房后，莫斯科出现了首批私营药房。阿尔巴特广场附近曾有一座革命前作为"Keller and Co"制药公司营业场所的建筑，后在1930年代因广场改造被拆除。文中所指应为19世纪阿尔巴特街某家实际存在的药房。
  书中原文: 只要车夫到阿尔巴特药房去一趟，花一卢布七十戈比买一点用好看的盒子包装的药粉和药丸。
  网络来源: https://goaravetisyan.ru/en/otkrytie-pervyh-aptek-kak-poyavilis-pervye-apteki-gde/
