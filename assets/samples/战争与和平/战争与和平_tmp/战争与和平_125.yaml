- 名词: 西徐亚人战争
  解释: 西徐亚人（斯基泰人）是古代东欧草原的游牧民族，以其独特的游击战术闻名。1812年拿破仑入侵俄国时，俄军采取诱敌深入、坚壁清野的战术，主动烧毁斯摩棱斯克和莫斯科，不给法军留下补给。拿破仑震惊于俄军"自己烧毁家园"的决心，曾感叹"他们都是斯基泰人！"。后世的军事史家将这种"诱敌深入、坚壁清野、断敌补给、游击骚扰"的战争模式称为"西徐亚人战争"（斯基泰战术），这一战术曾成功对抗波斯帝国大流士一世、亚历山大马其顿以及拿破仑。
  书中原文: "简直是西徐亚人战争。这一切都很好，只是对那些代人背黑锅的不好。"
  网络来源: http://tsrus.cn/lishi/2021/05/03/672107

- 名词: 游击战争
  解释: 游击战争是一种非正规作战方式，以小规模、分散的武装力量在敌后或侧翼进行袭击、骚扰和破坏。在1812年俄法战争中，游击战发挥了关键作用。著名诗人兼军官杰尼斯·达维多夫率先提出并实践了游击战计划，率领由50名骠骑兵和130名哥萨克人组成的队伍袭击法军补给线和通讯设施。俄国民众也广泛参与，约有100万农民拿起武器。游击战与正规军配合作战，在法军撤退阶段发挥了决定性作用，使法军60余万大军最终仅约3万人退出国境。
  书中原文: "唯一的办法，就是打游击战争。"
  网络来源: https://baike.baidu.com/item/杰尼斯·瓦西里耶维奇·达维多夫/15062394

- 名词: 军需总监
  解释: 军需总监（俄语：генерал-квартирмейстер，英语：Quartermaster General）是俄国的军事职务，由彼得大帝于1702年正式设立，最初作为总司令的作战事务助理，负责部队的位置部署与调动。该职位的职能后来逐步演变为俄军总参谋部作战总局的核心职能。在1812年俄法战争时期，军需总监是军队后勤与作战协调中的高级职务。小说中杰尼索夫自称军需总监是其叔父。
  书中原文: "基里尔·安德烈耶维奇·杰尼索夫，军需总监是你什么人？"
  网络来源: https://zh.wikipedia.org/zh-my/俄罗斯联邦武装力量后勤部

- 名词: 科诺夫尼岑
  解释: 彼得·彼得罗维奇·科诺夫尼岑（俄语：Пётр Петрович Коновницын，1764—1822），俄国步兵上将，1812年俄法战争中的重要将领。他指挥第3步兵师担任后卫部队，擅长后卫战术，在维捷布斯克战役中成功阻滞法军一整天。博罗季诺战役中在巴格拉季昂亲王重伤后接替指挥，参加了决定是否放弃莫斯科的菲利村军事会议。战后曾任俄国陆军大臣（1815—1819），获颁圣乔治三级勋章。
  书中原文: "他向杰尼索夫点了点头，就转身伸手去拿科诺夫尼岑递来的文件。"
  网络来源: https://zh.wikipedia.org/zh-mo/维捷布斯克之战_(1812年)
