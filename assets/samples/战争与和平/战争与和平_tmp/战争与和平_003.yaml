- 名词: 昂吉安公爵
  解释: |
    昂吉安公爵路易·安托万（Louis-Antoine-Henri de Bourbon-Condé，1772—1804）是法国波旁王朝成员、孔代亲王的独子。法国大革命期间流亡国外。1804年，拿破仑怀疑波旁流亡贵族参与暗杀他的阴谋，派兵将其从巴登公国绑架回法国，经草率审判后在文森城堡处决，年仅31岁。此事在欧洲引发巨大震动，加速了第三次反法同盟的形成。拿破仑后来曾表示这是其政治生涯中"最严重的错误之一"。
  书中原文: |
    子爵娓娓动听地讲起当时流传的一段趣闻：昂吉安公爵秘密到巴黎去会乔治小姐，当场碰上也受到这位女演员垂青的波拿巴；拿破仑在遇见公爵的时候，突然犯昏厥症晕倒了，于是他就落入公爵手中，公爵并没有利用这个机会，但后来波拿巴却将公爵处死来报答公爵的宽宏大量。
  网络来源: |
    https://zh.m.wikipedia.org/wiki/昂吉安公爵路易·安托万

- 名词: 乔治小姐
  解释: |
    乔治小姐（Mademoiselle George，本名Marguerite-Joséphine Weimer，约1787—1867）是19世纪初法国最著名的舞台剧女演员之一，1802年在巴黎法兰西喜剧院首次登台。1802年至1804年间，她成为拿破仑·波拿巴的情妇。据说后来她与威灵顿公爵也有过恋情。书中子爵所讲的故事即围绕乔治小姐与拿破仑及昂吉安公爵之间的情场纠葛展开，属于当时流传的轶事趣闻。
  书中原文: |
    子爵娓娓动听地讲起当时流传的一段趣闻：昂吉安公爵秘密到巴黎去会乔治小姐，当场碰上也受到这位女演员垂青的波拿巴；拿破仑在遇见公爵的时候，突然犯昏厥症晕倒了，于是他就落入公爵手中，公爵并没有利用这个机会，但后来波拿巴却将公爵处死来报答公爵的宽宏大量。
  网络来源: |
    https://en.m.wikipedia.org/wiki/Mademoiselle_George

- 名词: 路易十五
  解释: |
    路易十五（Louis XV，1710—1774），被称为"被喜爱者"，是法国波旁王朝国王，路易十四的曾孙，1715年至1774年在位，在位约59年。他执政早期深受爱戴，但后期因无力改革君主制、对外战争（尤其是七年战争）失败、财政危机和宫廷生活糜烂而民心尽失。传说名句"我死后，哪怕洪水滔天"即出自路易十五。书中安娜·帕夫洛夫娜觉得自己说话腔调像路易十五，因而感到得意。
  书中原文: |
    "真的吗！子爵，讲给我们听听吧。"安娜·帕夫洛夫娜说，觉得这句话有点像路易十五的腔调，因此感到很高兴。
  网络来源: |
    https://wapbaike.baidu.com/item/路易十五/3799788

- 名词: 戈利岑公爵
  解释: |
    戈利岑家族（Голицыны）是俄国历史上最显赫的贵族世家之一，成员在17至20世纪初的俄国政治、军事和外交中扮演了重要角色。书中德鲁别茨卡娅公爵夫人被瓦西里公爵建议去找的"戈利岑公爵"，应指当时在朝中具有一定影响力的戈利岑家族成员。该家族多位成员曾任俄军元帅、驻外大使、国务大臣等要职，是俄国"西方派"贵族的典型代表。
  书中原文: |
    "请您相信，凡我能做到的，我一定做到，公爵夫人，"瓦西里公爵答道，"但是求皇上我有困难。我劝您最好通过戈利岑公爵去找鲁缅采夫，这么办比较明智。"
  网络来源: |
    https://baike.baidu.com/item/戈利岑家族

- 名词: 鲁缅采夫
  解释: |
    此处所指为尼古拉·彼得罗维奇·鲁缅采夫（1754—1826），俄国政治家、外交家，1807年至1814年任俄国外交大臣、总理及国务委员会第一主席。他是著名元帅彼得·鲁缅采夫之子。书中瓦西里公爵建议德鲁别茨卡娅公爵夫人通过戈利岑公爵找鲁缅采夫为儿子鲍里斯在近卫军中谋差事，反映了当时俄国官场通过权贵疏通关系的现实。鲁缅采夫卸任后致力于文化遗产保护，其藏品捐赠促成了俄国首个历史博物馆的建立。
  书中原文: |
    "请您相信，凡我能做到的，我一定做到，公爵夫人，"瓦西里公爵答道，"但是求皇上我有困难。我劝您最好通过戈利岑公爵去找鲁缅采夫，这么办比较明智。"
  网络来源: |
    https://baike.baidu.com/item/尼古拉·彼得罗维奇·鲁缅采夫/14814637

- 名词: 均势
  解释: |
    均势（Balance of Power，又称"势力均衡"）是国际关系中的核心概念，指通过实力均衡原则维持国际秩序，防止任何一国独霸。1713年《乌得勒支和约》首次以法律条文形式将"保持欧洲均势"写入国际条约。1815年维也纳会议建立的"欧洲协调"机制是其经典实践。书中意大利神甫大谈欧洲均势理论，主张由俄国领导联盟谋求欧洲均势，反映了19世纪初欧洲外交思想对俄国知识界的深刻影响。
  书中原文: |
    "办法是欧洲的均势和民权，"神甫说，"只要有俄国这样以野蛮落后闻名于世的强国，大公无私地出来领导以谋求欧洲均势为宗旨的联盟，全世界就有救了！"
  网络来源: |
    https://baike.baidu.com/tashuo/browse/content?id=7aed6f67362d56137b033b82

- 名词: 近卫军
  解释: |
    俄国近卫军由彼得大帝于1683年创立，最初从贵族子弟中挑选组建"少年军团"，后改编为普列奥布拉任斯基团和谢苗诺夫团，在北方战争中一战成名。近卫军是沙皇俄国的精锐部队，享有军衔比普通军人高级、薪水加倍等特权。19世纪初的近卫军已拥有多个步兵团、骑兵团、炮兵旅等，在拿破仑战争中表现出色。书中德鲁别茨卡娅公爵夫人希望为独生子鲍里斯在近卫军中谋差事，反映了当时俄国贵族阶层对近卫军的向往。
  书中原文: |
    您只要给皇上提一句，他就可以调到近卫军去了，这在您算不了什么。
  网络来源: |
    https://baike.baidu.com/tashuo/browse/content?id=b7a9e6fb02eed0bb99f1fe85

- 名词: 长柄眼镜
  解释: |
    长柄眼镜（Lorgnette）是一种带有手柄的眼镜，使用者手持手柄将其举到眼前，而非像普通眼镜那样挂在耳朵或鼻子上。该词源自法语lorgner（意为"斜视、窥视"）。它由英国人乔治·亚当斯发明，19世纪在欧洲上流社会极为流行，是淑女们优雅装扮的标志性配饰。卡地亚等珠宝商曾为其制作奢华款式。书中伊波利特公爵举长柄眼镜的动作，生动展现了他作为上流社会贵族矫揉造作的姿态。
  书中原文: |
    他在公爵夫人身旁坐下，连忙把长柄眼镜举到眼上，仿佛没有这副眼镜的帮助他就不能说话似的。
  网络来源: |
    https://www.sohu.com/a/559401180_99967797
