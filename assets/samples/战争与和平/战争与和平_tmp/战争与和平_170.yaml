- 名词: 卡卢日斯卡雅大路
  解释: |
    卡卢日斯卡雅大路（Большая Калужская улица）是莫斯科通往卡卢加方向的主要道路，位于莫斯科河南岸地区。在1812年卫国战争中具有重要战略意义：法军押送俘虏撤离莫斯科时经由此路，俄军主力也从梁赞大路经卡卢日斯卡雅大路转移到塔鲁丁诺营地。这场侧翼进军被历史学家称为"拯救了俄国并击败了拿破仑"的关键机动。现代对应列宁大街（Ленинский проспект）的一部分。
  书中原文: |
    右边，卡卢日斯卡雅大路经过涅斯库奇内转弯的地方，无穷无尽的部队和车队一直伸展到远方。
  网络来源: |
    https://pages.haomooc.com/index.php?s=book&c=extend&id=10034
    https://pages.haomooc.com/index.php?s=book&c=extend&id=10047

- 名词: 卡缅内桥
  解释: |
    卡缅内桥（Большой Каменный мост，意为"大石桥"）是莫斯科历史最著名的石桥，横跨莫斯科河，连接克里姆林宫与扎莫斯科沃列奇耶区。第一代石桥建于1687—1692年，是莫斯科第一座永久性石桥，长约170米。因造价极其昂贵，俄语中有谚语"比石桥还贵"（Дороже Каменного моста）。后经多次改建，1938年建成现今的单跨钢拱桥，长487米。在《战争与和平》中，内伊元帅的部队和车队通过此桥。
  书中原文: |
    后面在河岸上通过卡缅内桥的是内伊的部队和车队。
  网络来源: |
    https://EN.m.wikipedia.org/wiki/Bolshoi_Kamennyi_Bridge
    https://cn.gallerix.ru/pr/vystavka-bolshoy-kamennyy-most/

- 名词: 博加尔涅
  解释: |
    博加尔涅（即欧仁·德·博阿尔内，Eugène de Beauharnais，1781—1824）是拿破仑一世的继子，约瑟芬皇后与前夫之子。拿破仑将其收为养子，封为意大利亲王、意大利总督。1812年征俄战争中指挥第四军（意大利军团），参加博罗季诺战役和小雅罗斯拉维茨战役。拿破仑倒台后退居慕尼黑，获莱赫坦贝格公爵头衔。他被认为是波拿巴家族中最有才能的军事指挥官之一。中文旧译"博加尔涅"。
  书中原文: |
    这是先头部队博加尔涅兵团；后面在河岸上通过卡缅内桥的是内伊的部队和车队。
  网络来源: |
    https://artsandculture.google.com/entity/m0gxnv?hl=zh-TW
    https://tieba.baidu.com/p/2127567872

- 名词: 奥尔登卡大路
  解释: |
    奥尔登卡大路（Большая Ордынка）是莫斯科河南岸的一条历史街道，全长约1.73公里。名称"奥尔登卡"（Ордынка）源自"奥尔达"（Орда），意为"金帐汗国"，反映该区域历史上与蒙古统治的关联。该区域传统上是商人和手工业者聚居区，保留了许多19世纪古典主义建筑。在《战争与和平》中，内伊的先头部队由此路走出。
  书中原文: |
    内伊的先头部队已经走出了奥尔登卡大路的时候，而博加尔涅的车队还没有走出莫斯科进入卡卢日斯卡雅大路。
  网络来源: |
    https://mypacer.com/zh-hans/routes/110777/莫斯科-健走-小路-俄罗斯

- 名词: 福明斯克
  解释: |
    福明斯克（Фоминское，Fominskoye）是莫斯科西南方向的一个村庄，位于新卡卢加公路沿线。1812年10月，拿破仑大军从莫斯科撤退时先向此方向移动，拿破仑本人曾在此设立临时指挥部。俄军游击队长谢斯拉温在此侦察发现法军主力集结的动向，及时报告库图佐夫，成为小雅罗斯拉维茨战役的导火索。这一情报使俄军正确判断出拿破仑的真实撤退路线，最终迫使法军沿已被破坏的斯摩棱斯克老路撤退。
  书中原文: |
    在福明斯克出现布鲁西埃师的部队，这个师和其他部队失掉联系，很容易予以歼灭。
  网络来源: |
    https://en.topwar.ru/19887-korennoy-perelom-v-hode-otechestvennoy-voyny-srazhenie-pod-maloyaroslavcem-12-24-oktyabrya-1812-goda.html
    https://www.britannica.com/print/article/2097145

- 名词: 布鲁西埃
  解释: |
    布鲁西埃（让·巴蒂斯特·布鲁西耶，Jean Baptiste Broussier，1766—1814），法国帝国伯爵，拿破仑战争时期的少将。1791年加入革命军，1805年晋升少将。1812年征俄期间，指挥欧仁·德·博阿尔内第四军第14步兵师，参加奥斯特罗夫诺、博罗季诺、小雅罗斯拉维茨和克拉斯内等战役。他从征俄大撤退中幸存，1814年波旁复辟后被任命为默兹省驻军司令，同年因中风去世。其名字刻于巴黎凯旋门北柱。
  书中原文: |
    在福明斯克出现布鲁西埃师的部队，这个师和其他部队失掉联系，很容易予以歼灭。
  网络来源: |
    https://bbs.napolun.com/forum.php?mod=viewthread&tid=40354

- 名词: 菲格纳
  解释: |
    亚历山大·萨莫伊洛维奇·菲格纳（Александр Самойлович Фигнер，1787—1813），俄国1812年卫国战争中的著名游击队长。他擅长化装侦察和敌后突袭，经常与农民游击队联合作战，猛烈袭击法军后方和交通线。最著名的战例是与谢斯拉温、达维多夫等游击队联合发起的利雅科夫战役（Lyakhov），歼灭奥热罗将军的旅。他在1813年国外远征中阵亡。菲格纳以大胆果敢的作战风格闻名，是当时最令法军恐惧的俄国游击队指挥官之一。
  书中原文: |
    当时多赫图罗夫所指挥的除了多洛霍夫游击队，只有菲格纳和谢斯拉温两支不大的游击队。
  网络来源: |
    https://zh-cn.topwar.ru/183073-russkie-partizany-1812-goda-i-dorohov-d-davydov-v-dibich.html

- 名词: 谢斯拉温
  解释: |
    亚历山大·尼基季奇·谢斯拉温（Александр Никитич Сеславин，1780—1858），俄国1812年卫国战争中的著名游击队长和侦察英雄。炮兵出身，参加过1805—1807年对法战争和海尔斯贝格战役。1812年战争初期任巴克莱·德·托利的副官，后率飞行游击队独立行动。他最大的功绩是1812年10月爬上一棵大树侦察，发现拿破仑主力向福明斯克秘密移动并立即报告，直接促使俄军在小雅罗斯拉维茨拦截法军。他一生参加74场战斗、负伤9次，晋升至少将。
  书中原文: |
    当时多赫图罗夫所指挥的除了多洛霍夫游击队，只有菲格纳和谢斯拉温两支不大的游击队。
  网络来源: |
    https://zhuanlan.zhihu.com/p/474322879
    https://en.topwar.ru/18593-voenachalnik-i-partizan-aleksandr-nikitich-seslavin.html

- 名词: 博罗夫斯克
  解释: |
    博罗夫斯克（Боровск）是俄罗斯卡卢加州的一个历史名城，位于普罗特瓦河畔，距莫斯科西南约84公里。2000年被授予俄罗斯历史名城地位。1812年10月23日，拿破仑军队在撤离莫斯科途中进入博罗夫斯克，对城市大肆掠夺焚烧，摧毁了26座石砌建筑和848座木结构建筑，城内的帕夫努季耶夫修道院也遭严重破坏。俄军游击队长谢斯拉温在博罗夫斯克附近爬树侦察，发现拿破仑本人，为俄军提供了决定性的情报。
  书中原文: |
    当天晚上，从博罗夫斯克来了一个家奴，他说他看见大批军队进城。
  网络来源: |
    https://zh.m.wikipedia.org/wiki/博罗夫斯克
    https://www.izi.travel/zh/3036-mustached-angel-borovsk/en

- 名词: 洛里斯顿
  解释: |
    洛里斯顿（雅克·亚历山大·劳·劳里斯顿，Jacques Alexandre Law Lauriston，1768—1828），法国元帅、外交官，苏格兰血统。曾任法国驻俄大使。1812年拿破仑攻占莫斯科后，于10月4日派洛里斯顿前往俄军大营向库图佐夫递交和谈信。库图佐夫断然拒绝和谈，声称"如果把我看作任何和谈勾当的主谋，我就会受到咒骂。我国人民的意志就是这样。"此次和谈失败后，拿破仑被迫从莫斯科撤退。洛里斯顿后参加莱比锡战役被俘，波旁复辟后获封侯爵和法国元帅。
  书中原文: |
    库图佐夫对这封信的答复和对洛里斯顿带来的第一封信的答复一样：他说，和谈根本谈不上。
  网络来源: |
    https://zh.wikipedia.org/zh-tw/雅克·劳里斯顿
    https://yunshuwu.cn/chap/8762.html

- 名词: 旧卡卢日斯卡雅大路
  解释: |
    旧卡卢日斯卡雅大路（Старая Калужская дорога）是莫斯科通往卡卢加的古道，1812年战争中拿破仑和库图佐夫均曾使用此路。拿破仑从莫斯科撤退初期试图沿旧卡卢日斯卡雅大路向西南方向前进，以避开已被破坏的斯摩棱斯克老路。库图佐夫则通过塔鲁季诺机动将俄军主力秘密转移到此路，封锁了拿破仑的南撤通道。现代莫斯科仍保留有旧卡卢日斯卡雅大道（Старокалужское шоссе）。
  书中原文: |
    拿破仑已经到了离库图佐夫前面不远的旧卡卢日斯卡雅大路。
  网络来源: |
    https://encyclopedia2.thefreedictionary.com/Tarutino+Maneuver+of+1812
    https://www.britannica.com/print/article/2097145

- 名词: 新卡卢日斯卡雅大路
  解释: |
    新卡卢日斯卡雅大路（Новая Калужская дорога）是1812年拿破仑战争中一条重要的军事通道，位于旧卡卢加公路以西。拿破仑从莫斯科撤退时，欧仁·德·博阿尔内的第四军沿新卡卢日斯卡雅大路行进。法军全部主力突然向左转到新卡卢日斯卡雅大路，进入福明斯克地区，试图从西南方向突破俄军封锁。库图佐夫识破此意图后，在小雅罗斯拉维茨（位于新卡卢日斯卡雅大路沿线）堵截法军，迫使拿破仑改走已被破坏的斯摩棱斯克老路。
  书中原文: |
    忽然无缘无故地向左转到新卡卢日斯卡雅大路，进入原先只有布鲁西埃驻扎的福明斯克。
  网络来源: |
    https://www.rbth.com/special_projects/discovering_russia_1/2016/12/02/maloyaroslavets-where-napoleons-fate-was-sealed_653127
    https://encyclopedia2.thefreedictionary.com/Tarutino+Maneuver+of+1812

- 名词: 奥格斯特大坝
  解释: |
    奥格斯特大坝（奥格斯特堤坝）位于奥格斯特村（Aujest/Újezd u Brna）附近，是1805年奥斯特利茨战役中的关键地点。奥斯特利茨战役（三皇会战）中，俄奥联军惨败后拥挤通过此堤坝撤退，在狭窄的堤道上互相倾轧、死伤惨重。多赫图罗夫将军在此坚守到最后，收拢残部。奥格斯特大坝作为战役中溃退与坚持的象征场所，在《战争与和平》中被多次提及，成为托尔斯泰描写战争残酷与人性坚韧的重要场景。
  书中原文: |
    在奥斯特利茨战役中，全体官兵死的死，逃的逃，后卫连一个将军也没有了，他把军队集结起来，拯救那可以拯救的，在奥格斯特大坝坚守到最后。
  网络来源: |
    https://en.wikipedia.org/?curid=553201
    https://pages.haomooc.com/index.php?s=book&c=extend&id=9687

- 名词: 莫洛霍夫斯基城门
  解释: |
    莫洛霍夫斯基城门（Молоховские ворота）是斯摩棱斯克要塞的南大门，位于城市主干道南端，与北面的第聂伯罗夫斯基城门遥相对望。斯摩棱斯克要塞建于1596—1602年，由著名建筑师费奥多尔·孔设计，城墙总长6.5公里，原有40座塔楼。在1812年拿破仑战争中，俄军在此坚守斯摩棱斯克，多赫图罗夫在寒热病发作中被攻城炮声惊醒后继续指挥战斗。1812年10月法军撤退时炸毁了该城门及大部分城墙，此后未再重建。
  书中原文: |
    在斯摩棱斯克，在莫洛霍夫斯基城门，他在寒热病发作时刚刚昏睡过去，攻城的炮声把他惊醒了，斯摩棱斯克坚守了整整一天。
  网络来源: |
    https://geomerid.com/en/place/smolensk-fortified-walls-travel-attraction/overview/
    https://commons.wikimedia.org/wiki/Category:Memory_of_Smolensk_by_Dresden_Store

- 名词: 列塔舍夫卡
  解释: |
    列塔舍夫卡（Леташевка）是莫斯科西南方向的一个村庄，位于塔鲁丁诺附近。在1812年卫国战争中，库图佐夫将俄军大本营从塔鲁丁诺迁至此地，列塔舍夫卡成为俄军反攻的指挥中枢。从列塔舍夫卡的大本营，库图佐夫指挥俄军补充兵力和装备，组织游击队分遣队打击法军后方。小说中，信使博尔霍维季诺夫连夜骑马赶到列塔舍夫卡向总司令部报告"拿破仑在福明斯克"的关键情报。
  书中原文: |
    博尔霍维季诺夫换了两次马，在胶粘的泥路上一个半小时跑了三十俄里，凌晨一点多钟来到列塔舍夫卡。
  网络来源: |
    http://ed.mdict.net/k2193765.html
    http://euroasia.cssn.cn/elsgqw/egjs/egjs_ejjs/201005/t20100518_1865096.shtml

- 名词: 阿里斯托沃
  解释: |
    阿里斯托沃（Аристово）是俄罗斯的一个村庄，位于莫斯科至福明斯克途中。1812年10月10日，多赫图罗夫将军率部在此扎营，准备执行袭击福明斯克的命令。10月11日晚，谢斯拉温带着一名被俘的法国近卫军士兵到此见多赫图罗夫，该俘虏供认法军主力（包括拿破仑本人）已在福明斯克集结。这一情报使多赫图罗夫意识到形势已剧变，遂向库图佐夫急报，最终促成小雅罗斯拉维茨战役。
  书中原文: |
    十月十日，多赫图罗夫在去福明斯克的途中，在阿里斯托沃村停下来，准备正确地执行所接受的命令。
  网络来源: |
    https://literaturepage.com/read.php?titleid=warandpeace&abspage=1430&bookmark=1
    https://familypedia.fandom.com/wiki/Battle_of_Maloyaroslavets_(1812)

- 名词: 博尔霍维季诺夫
  解释: |
    博尔霍维季诺夫（Болховитинов）是1812年卫国战争中的一名俄军军官、信使。在《战争与和平》中，他被多赫图罗夫将军选派为紧急信使，在1812年10月11日深夜从阿里斯托沃出发，策马奔驰三十俄里前往列塔舍夫卡的俄军总司令部，向库图佐夫报告"拿破仑在福明斯克"这一至关重要的军事情报。他送到的情报直接促使俄军司令部迅速做出反应，成为小雅罗斯拉维茨战役和法军溃败的关键转折点。托尔斯泰在小说中详细描写了他泥泞夜行的场景。
  书中原文: |
    为此选派一名精干的军官博尔霍维季诺夫，他除了把书面报告递上去，还要口头把全部情况说清楚。
  网络来源: |
    https://pages.haomooc.com/index.php?s=book&c=extend&id=9688
    https://book1.haoshuku.com/book/94aa0d/575495/
