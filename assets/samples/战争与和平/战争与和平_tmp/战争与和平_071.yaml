- 名词: 斯佩兰斯基
  解释: |
    米哈伊尔·米哈伊洛维奇·斯佩兰斯基（1772—1839），俄国著名改革家，被誉为"俄国自由主义之父"。出身寒微，父亲为乡村牧师，凭借才华晋升至权力中心。1809年受亚历山大一世委托起草宪政改革方案（《国家法典绪论》），主张三权分立，拟设立国家杜马、改革枢密院、推行文官考试制度。1812年因改革触犯贵族利益被流放，晚年受尼古拉一世召回主持编纂《俄罗斯帝国法律全集》。本书所述时期即其声望巅峰期。
  书中原文: |
    这一年正是年轻的斯佩兰斯基的声望达到顶点的时候，也正是他大力推行他的改革计划的时候。
