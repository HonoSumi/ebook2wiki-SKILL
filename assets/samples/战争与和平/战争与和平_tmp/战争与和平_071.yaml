- 名词: 乡公所
  解释: |
    俄国乡村基层行政机构。俄国乡村行政分为村社（米尔）和乡两级：村社为基层自治单位，由村社大会选举社长等公职人员；乡由若干村社组成，设乡会、乡长和乡农民法庭，负责行政、司法、税收、兵役等事务。1861年农奴制改革后乡公所制度更加完备。斯佩兰斯基1809年改革方案拟整顿从中央枢密院到基层乡公所的整个行政体系。
  书中原文: |
    将改变上至枢密院下至乡公所现存俄国的司法、行政和财政制度。
