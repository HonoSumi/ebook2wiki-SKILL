- 名词: 宫中高级侍从
  解释: |
    俄罗斯帝国宫廷高级侍从官职的统称。根据彼得一世1722年颁布的《官秩表》，宫廷职分为14等。高级侍从包括侍从将军（贴身护卫）、特级宫廷侍从官（宫廷日常管理）、皇室典礼官（典礼礼仪）、宫廷侍从（Kammerherr）等。安德烈公爵以"宫中高级侍从"身份出入宫廷，意味着他拥有宫廷高级头衔，可参加皇帝朝觐。
  书中原文: |
    安德烈公爵到达不久，他以宫中高级侍从身份，出入宫廷，参加朝觐。
  网络来源: |
    https://baike.baidu.com/item/%E5%AE%98%E8%81%8C%E7%AD%89%E7%BA%A7%E8%A1%A8
