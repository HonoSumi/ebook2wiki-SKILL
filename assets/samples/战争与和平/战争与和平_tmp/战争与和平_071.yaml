- 名词: 社会救济委员会
  解释: |
    亚历山大一世戏称其"青年朋友"小圈子（恰托里日斯基、诺沃西利采夫、科丘别伊、斯特罗加诺夫）的绰号。该机构的正式名称为"非正式委员会"（Негласный комитет / Privy Committee / Unofficial Committee），1801—1803年运作，是亚历山大一世初期的非正式咨询机构，成员为沙皇青年时代的密友。该委员会策划了设立各部、改革枢密院、颁布《自由农民法令》等早期自由改革。
  书中原文: |
    他在实现这些理想时所依靠的助手本来是：恰托里日斯基、诺沃西利采夫、科丘别伊和斯特罗加诺夫等，这些人被他戏称作社会救济委员会。
