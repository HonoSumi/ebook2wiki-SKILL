- 名词: 宫内官阶
  解释: |
    俄国宫廷官职等级体系，源自彼得一世《官秩表》。宫内官阶涵盖从高级宫廷侍从长到低级宫廷侍从的多级头衔，许多仅为荣誉衔，并无实际职务。1809年斯佩兰斯基主导推动"废除宫内官阶"法令，旨在打击贵族挂名领俸的寄生现象，推动官僚体系专业化。此举触动了保守贵族利益，成为斯佩兰斯基失势导火索之一。
  书中原文: |
    关于废除宫内官阶和关于八等文官和五等文官考试的法令
