- 名词: 八等文官
  解释: |
    俄国《官秩表》文官系统八级官员（Коллежский асессор / Collegiate Assessor），处于14个等级的中层分界线。其最重要意义在于：非贵族出身者升至此等（1845年前）即可获得世袭贵族称号，故从九等升八等极其困难。1809年斯佩兰斯基推动法令规定八等以上文官须通过考试或具备大学学历方可任命，旨在提升官僚素质。
  书中原文: |
    关于废除宫内官阶和关于八等文官和五等文官考试的法令
