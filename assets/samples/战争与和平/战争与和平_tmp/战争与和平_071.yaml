- 名词: 恰托里日斯基
  解释: |
    即亚当·耶日·恰尔托雷斯基（Adam Jerzy Czartoryski，1770—1861），波兰贵族亲王。青年时代与未来的沙皇亚历山大一世结为密友，是亚历山大一世"青年朋友"小圈子的核心成员。1804—1806年任俄罗斯帝国外交大臣，主导反法同盟外交事务。后于1830年波兰十一月起义期间出任波兰民族政府总统。中文译名"恰托里日斯基"为 Czartoryski 的音译变体。
  书中原文: |
    他在实现这些理想时所依靠的助手本来是：恰托里日斯基、诺沃西利采夫、科丘别伊和斯特罗加诺夫等，这些人被他戏称作社会救济委员会。
