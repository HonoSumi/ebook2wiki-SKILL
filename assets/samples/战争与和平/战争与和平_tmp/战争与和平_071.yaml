- 名词: 枢密院
  解释: |
    俄国枢密院（Правительствующий сенат），又称元老院或参政院，1711年由彼得大帝设立，是俄罗斯帝国的最高立法、行政和司法机构，存续至1917年。成员由沙皇任命，早期权力极大，后叶卡捷琳娜二世将其拆分为六个局，削弱立法权，转为最高司法监督机构。在斯佩兰斯基1809年改革方案中，拟将枢密院改组为最高法院。
  书中原文: |
    将改变上至枢密院下至乡公所现存俄国的司法、行政和财政制度。
