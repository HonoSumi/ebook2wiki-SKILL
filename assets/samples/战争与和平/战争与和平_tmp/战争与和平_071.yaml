- 名词: 科丘别伊
  解释: |
    维克托·帕夫洛维奇·科丘别伊（Viktor Pavlovich Kochubey，1768—1834），俄国显赫贵族，出身乌克兰哥萨克世家。亚历山大一世"青年朋友圈"核心成员之一，参与策划初期自由主义改革。1802年主导创建俄国内务部并出任首任内务大臣，后历任国务会议主席、大臣委员会主席（相当于首相），1834年获封帝国宰相。在《战争与和平》中作为重要配角出现。
  书中原文: |
    他在实现这些理想时所依靠的助手本来是：恰托里日斯基、诺沃西利采夫、科丘别伊和斯特罗加诺夫等，这些人被他戏称作社会救济委员会。
  网络来源: |
    https://en.wikipedia.org/wiki/Viktor_Kochubey
    https://www.prlib.ru/en/node/678037
- 名词: 彼得宫
  解释: |
    即彼得霍夫宫（Peterhof），又称彼得大帝夏宫，位于圣彼得堡西南约30公里的芬兰湾南岸。1714年由彼得大帝下令建造，1723年竣工，仿法国凡尔赛宫风格，被誉为"俄罗斯的凡尔赛宫"。以壮观的喷泉群、金色雕像和巴洛克式宫殿闻名，属联合国教科文组织世界遗产。本书所述1809年亚历山大一世在此养伤三周，每日单独接见斯佩兰斯基密议改革。
  书中原文: |
    皇上从马车上跌下来，跌伤了脚，他在彼得宫中住了三个星期，每天只接见斯佩兰斯基一个人。
