- 名词: 哥白尼
  解释: 尼古拉·哥白尼（Nicolaus Copernicus，1473—1543），波兰天文学家，近代天文学奠基人。他创立了日心说（太阳中心说），推翻了统治欧洲1400余年的托勒密地心说，在其著作《天体运行论》中提出地球绕太阳运转的理论。这一发现开启了科学革命，为开普勒、伽利略和牛顿的后续工作奠定了基础。恩格斯称其著作为"自然科学的独立宣言"。
  书中原文: 自从哥白尼体系被发现和被证实以后，仅仅承认运转的不是太阳而是地球这一事实，就足以破除古人的全部宇宙观了。……在捍卫哥白尼和牛顿的法则的人们看来，例如在伏尔泰看来，似乎天文学的法则摧毁了宗教。
  网络来源: 百度百科 - 尼古拉·哥白尼

- 名词: 凯普勒
  解释: 约翰内斯·开普勒（Johannes Kepler，1571—1630，又译作刻卜勒），德国天文学家、数学家，被誉为"天空立法者"。他发现了行星运动三大定律：轨道定律（椭圆轨道）、面积定律（相等时间扫过相等面积）和周期定律（公转周期的平方与轨道半长轴的立方成正比），为牛顿万有引力定律奠定了运动学基础。著有《新天文学》《宇宙和谐论》等。
  书中原文: 假如有一个天体自由运行，那么凯普勒和牛顿的定律就不再存在了，任何天体运行的观念也不再存在了。
  网络来源: 百度百科 - 约翰内斯·开普勒；中国科学院科普网 - 开普勒

- 名词: 马克西米连
  解释: 斐迪南·马克西米利安·约瑟夫·冯·哈布斯堡-洛林（Ferdinand Maximilian Josef von Habsburg-Lothringen，1832—1867），奥地利大公，1864年至1867年间任墨西哥皇帝（称马西米连诺一世）。在法国皇帝拿破仑三世的支持下，他于1864年登基建立墨西哥第二帝国。推行自由主义改革，但在1866年法军撤出后失去支持，1867年被共和派胡亚雷斯领导的军队击败并枪决。
  书中原文: 一八六四年，在法军支持下，马克西米连取得了墨西哥王位。
  网络来源: 百度百科 - 马西米连诺一世

- 名词: 托勒美
  解释: 克劳狄乌斯·托勒密（Claudius Ptolemaeus，约公元100—168年，又译托勒密），古希腊天文学家、数学家、地理学家。他在著作《天文学大成》（又称《至大论》）中系统总结了地心说（托勒密体系），认为地球居于宇宙中心静止不动，日、月、行星和恒星均环绕地球运行。该学说统治西方天文学界约1400年，直至哥白尼日心说兴起。他还著有《地理学指南》，提出经度纬度概念。
  书中原文: 托勒美是古希腊学者、天文学家和地理学家，创立天动说。
  网络来源: 百度百科 - 克劳狄乌斯·托勒密

- 名词: 约书亚
  解释: 约书亚（希伯来文יהושע，意为"耶和华是拯救"），圣经·旧约中的重要人物，摩西的继承者，嫩的儿子。他率领以色列人渡过约旦河进入迦南应许之地，先后攻陷耶利哥城等迦南诸城。圣经中的《约书亚记》记载了他的事迹。据《约书亚记》第10章记载，约书亚曾祷告耶和华使日月停留在空中约一日之久，书中提到的"约书亚的神通"即指此事。
  书中原文: 嫩的儿子约书亚的神通。
  网络来源: 百度百科 - 约书亚记

- 名词: 自由意志
  解释: 自由意志（Free Will）是哲学核心概念之一，指人们依照自己的意愿进行价值判断并决定行动方向的能力。其核心问题在于：若一切事件均由先前原因必然决定（决定论），人是否还能为自己的行为承担道德责任？主要立场包括相容论（自由意志与决定论可共存）和不相容论（二者不能共存）。在《战争与和平》的尾声部分，托尔斯泰系统论述了历史必然性与自由意志的关系，认为历史科学的任务在于揭示人类生活的法则，而将自由意志视为"对我们已知的人类生活法则中未知的剩余部分的一种说法"。
  书中原文: 在历史方面，承认人的自由意志是一种能影响历史事件的力量，也就是一种不服从法则的东西，正如在天文学方面，承认天体运行是一种自由的力量一样。……就历史来说，自由意志不过是对我们已知的人类生活法则中未知的剩余部分的一种说法。
  网络来源: 百度百科 - 自由意志；斯坦福哲学百科全书

- 名词: 形而上学
  解释: 形而上学（Metaphysics）源自古希腊语"物理学之后"，是哲学的核心分支，研究超越经验感知的终极实在——如存在、本质、实体、因果、时间、空间等根本问题。亚里士多德称之为"第一哲学"。中文译名取自《易经·系辞》"形而上者谓之道，形而下者谓之器"。在《战争与和平》尾声部分，托尔斯泰将形而上学与历史科学对举，指出自由意志本身是形而上学研究的对象，而历史研究的是必然性的法则。
  书中原文: 而自由意志本身是形而上学研究的对象。……新旧观点在形而上学中进行了长期的、顽强的斗争。神学维护旧观点，指责新观点破坏了神的启示。但是当真理得到胜利的时候，神学同样牢固地建立在新的基础上。
  网络来源: 百度百科 - 形而上学；斯坦福哲学百科全书 - Metaphysics
