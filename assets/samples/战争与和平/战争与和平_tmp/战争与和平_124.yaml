- 名词: 公社 (俄国农村公社 / община / obshchina)
  解释: 俄国农村公社，又称"米尔"（мир），是19世纪俄国农村中由农民组成的土地共有、定期重分、集体负责的基层自治组织。土地归公社所有而非个人，定期按户或按男性人口重分；公社负责税收、兵役、治安等事务，实行连环保制度。它是俄国农奴制社会的基础单元，1861年农奴制改革后仍长期延续，直至斯托雷平改革和苏联集体化才逐步消亡。
  书中原文: |
    "老头们在开会，商量公社的事情。"那个农民回答，说着就走开了。 / "公社给你敲骨吸髓有多少年了？"卡尔普斥责他 / "我并不是公社的冤家对头。"德龙说。
