- 名词: 老近卫军
  解释: 拿破仑帝国卫队（Garde Impériale）中最精锐的组成部分，正式名称为"帝国近卫军"，其前身为1799年成立的执政近卫军。老近卫军特指其中的第一和第二掷弹兵团、第一和第二猎兵团等最资深的部队，入队条件极为苛刻：须年龄35岁以下、至少5年军龄、参加过至少3场重大战役。老近卫军以黑色熊皮帽为标志，平均身高约185cm，享有向皇帝当面抱怨的特权，被昵称为"老牢骚兵"（Les Grognards）。在1812年俄法战争的波罗底诺会战中，拿破仑面对战局困境，拒绝了一位将军提出的将老近卫军投入战斗的建议，他说："在远离法国三千二百俄里之外，我不能让我的近卫军去送死。"最终，老近卫军在1815年滑铁卢战役中以"近卫军宁死不降"的悲壮结局闻名于世。
  书中原文: "一个将军走到拿破仑面前，向他建议把老近卫军投入战斗。站在拿破仑身旁的内伊和贝蒂埃交换了眼色，对这位将军毫无意义的建议轻蔑地笑了笑。拿破仑低下头，沉默了很久。'在远离法国三千二百俄里之外，我不能让我的近卫军去送死。'他说，然后勒转马头，回舍瓦尔金诺去了。"
  网络来源: https://baike.baidu.com/item/%E8%80%81%E8%BF%91%E5%8D%AB%E5%86%9B

- 名词: 符腾堡公爵
  解释: 指符腾堡的亚历山大公爵（Duke Alexander of Württemberg，1771—1833），符腾堡国王腓特烈一世之弟，其姐姐玛丽亚·费奥多萝芙娜是沙皇保罗一世的皇后，因此他是沙皇亚历山大一世的舅父。亚历山大公爵在俄军中担任高级将领，1812年波罗底诺会战中，当巴格拉季翁公爵受伤后，库图佐夫曾命令他指挥俄军第一军，但随后又改派多赫图罗夫接替。他于1813年参与围攻但泽。在《战争与和平》中，他出现在波罗底诺会战的指挥场景中。
  书中原文: "库图佐夫惊叹一声，摇了摇头。'快去彼得·伊万诺维奇公爵那儿，详细探听一下，看看是怎么回事。'他对一个副官说，然后向站在他后面的符腾堡公爵转过身来。'请殿下指挥第一军，好吗？'公爵刚离开不大一会儿，可能还没走到谢苗诺夫斯科耶村，他的副官就回来向勋座报告说，公爵请求增援军队。库图佐夫皱了皱眉头，命令多赫图罗夫去指挥第一军，请公爵回到他这儿来。"
  网络来源: https://en.wikipedia.org/wiki/Duke_Alexander_of_W%C3%BCrttemberg_(1771%E2%80%931833)
