- 名词: 福音
  解释: |
    福音（Gospel）源自古英语 gōdspell，意为"好消息"，在基督教中指耶稣基督降世为人、
    受死与复活所成就的救恩信息。新约圣经前四卷——马太福音、马可福音、路加福音、
    约翰福音——合称"四福音书"，分别从君王、仆人、人子、神子四个角度记述耶稣生平。
    马太福音以犹太人为对象，强调耶稣是弥赛亚君王；马可福音面向罗马人，突出耶稣
    是神的仆人；路加福音面向希腊人，描写耶稣是完全的人子；约翰福音面向普世，
    宣告耶稣是道成肉身的神子。四卷书相辅相成，构成基督教信仰的核心经典。
    在《战争与和平》中，安德烈公爵临终时引用福音书经文"天上的飞鸟，也不种，
    也不积蓄在仓里，你们的天父尚且养活他"（马太福音6:26），体现托尔斯泰
    通过角色对基督教生命观的文学化诠释。托尔斯泰本人的"托尔斯泰主义"深受
    福音书中登山宝训的影响，强调博爱、不以暴力抗恶和道德自我完善。
  书中原文: |
    "玛丽，你可知道《福音》……"但他突然不作声了。

    天上的飞鸟，也不种，也不积蓄在仓里，你们的天父尚且养活他。
