- 名词: 科维扎尔
  解释: |
    让-尼古拉·科维扎尔（Jean-Nicolas Corvisart des Marets，1755—1821），
    法国医学家，拿破仑的御医，被誉为"现代心脏病学之父"。他出身贵族家庭，
    1798年结识拿破仑后成为其私人医生，1804年被任命为帝国第一御医，
    1808年封为帝国男爵。科维扎尔1806年出版《心脏与大血管疾病论》，
    奠定临床心脏病学基础；他重新发掘并推广了奥恩布鲁格发明的胸部叩诊法，
    倡导以病理解剖学为基础的循证临床医学。拿破仑曾有名言：
    "我不相信医学，但我相信科维扎尔"。
  书中原文: |
    科维扎尔给我这些药片，可是一点用也没有。他们能治什么？什么也治不了。
    我们的身体是一架活机器。身体是为了生命而构造的。让生命在身体里自由
    自在，别干预它，让它自己保护自己，它处理自身的事，比用药去妨害它
    要好得多。我们的身体就像钟表，它应当走一定的时间；钟表匠不能打开它，
    只能闭着眼睛瞎摸来修理它。我们的身体是一架活机器。如此而已。
  网络来源: |
    https://www.ncbi.nlm.nih.gov/m/pubmed.16418439/33711847/
    https://preview-www.nature.com/articles/148022a0
    https://e-memoire.academie-chirurgie.fr/en/ememoire/6533-i-dont-believe-the-medicine-but-i-believe-in-corvisart-napoleon-1804

- 名词: 拉普
  解释: |
    让·拉普（Jean Rapp，1771—1821），法国大革命战争及拿破仑战争时期的
    轻骑兵将领，拿破仑的副官。他出生于科尔马，作战极其勇敢，在其军事生涯中
    受伤20多次。1805年奥斯特利茨战役中，他率领近卫军骑兵粉碎了俄国皇家
    近卫军，亲自俘虏俄军将领，战后晋升少将。1812年入侵俄国时参加博罗季诺
    战役，身中4弹。百日王朝期间，他在1815年拉萨菲尔战役中以少胜多，赢得
    拿破仑战争期间法国的最后一次胜利。他虽战功赫赫却始终未被封为帝国元帅。
  书中原文: |
    "喂，拉普，你看咱们今天能打胜吗？"他问副官。"毫无疑问，陛下。"
    拉普回答说。……"陛下，您还记得您在斯摩棱斯克对我说过的话吗？
    瓶塞已经打开，就得把酒喝掉。"拉普说。……"但是近卫军，拉普，
    近卫军还完整吧？"他疑问地说。"是的，陛下。"拉普回答。……"拉普，
    您知道什么是军事艺术吗？"他问，"这是在一定的时间比敌人强的艺术。
    如此而已。"
  网络来源: |
    https://baike.baidu.com/item/%E8%AE%A9%C2%B7%E6%8B%89%E6%99%AE/10327481
    https://zh.m.wikipedia.org/zh-my/%E8%AE%93%C2%B7%E6%8B%89%E6%99%AE

- 名词: 潘趣酒
  解释: |
    潘趣酒（Punch），一种混合饮料，源于印度，"punch"一词来自梵语
    "pañc"（意为"五"），指传统配方中的五种基本原料：酒精、水、酸
    （柠檬）、糖和香料。17世纪早期由英国东印度公司传入欧洲，在18—19世纪
    欧洲社交文化中十分流行，尤其盛行于巴黎沙龙和英国上流社会。饮用时
    通常盛放在大碗（潘趣碗）中，由仆人舀给客人，象征分享与社交。
    拿破仑在波罗金诺战役前夜曾饮用潘趣酒，与其副官拉普和宫廷长官德波塞
    边饮边谈，体现了他大战前夕的镇定与从容。
  书中原文: |
    他吩咐给他拿潘趣酒，叫来德波塞，开始和他谈巴黎……喝完第二杯潘趣酒，
    拿破仑觉得明天有一桩严重的事情在等待着他，就休息去了。……仆人拿着
    潘趣酒进来。拿破仑吩咐给拉普一只杯子，然后默默地一口口饮他那一杯。
  网络来源: |
    https://baike.baidu.com/item/punch/19656099
    https://wap.cnki.net/touch/web/Journal/Article/MSGC202303035.html
