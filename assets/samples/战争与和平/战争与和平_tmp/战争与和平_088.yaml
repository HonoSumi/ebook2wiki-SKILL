- 名词: 菲尔德
  解释: |
    约翰·菲尔德（John Field，1782—1837），爱尔兰钢琴家、作曲家，钢琴"夜曲"（Nocturne）体裁的创始人。他长期居留圣彼得堡，创作了约18首夜曲，旋律如歌、抒情优美，深刻影响了肖邦、李斯特等浪漫主义作曲家，被誉为"夜曲之父"。
  书中原文: |
    "爱德华·卡尔雷奇，请您给弹一支我最喜爱的菲尔德先生的《夜曲》吧。"老伯爵夫人从客厅里发话了。
  网络来源: |
    https://baike.baidu.com/item/%E7%BA%A6%E7%BF%B0%C2%B7%E8%8F%B2%E5%B0%94%E5%BE%B7

- 名词: 夜曲
  解释: |
    夜曲（Nocturne）是浪漫主义音乐中一种钢琴特性曲体裁，通常具有安谧恬静的气质和沉思默想的性格。由爱尔兰作曲家约翰·菲尔德于1812年首创，后经肖邦发展到巅峰。常用慢速或中速，旋律歌唱性强，伴奏采用琶音式和弦，表现夜的沉静与人心的抒发。
  书中原文: |
    "爱德华·卡尔雷奇，请您给弹一支我最喜爱的菲尔德先生的《夜曲》吧。"老伯爵夫人从客厅里发话了。
  网络来源: |
    https://baike.baidu.com/item/%E5%A4%9C%E6%9B%B2/4889

- 名词: 暴风雨
  解释: |
    此处指19世纪初俄国流行的一首浪漫曲或歌曲（俄语"Буря"），是娜塔莎在吉他上弹奏的乐句之一。在当时的俄国贵族家庭中，音乐教育十分普及，这类抒情浪漫曲是日常家庭音乐生活的重要组成部分。
  书中原文: |
    "索尼娅，这是什么曲子？"娜塔莎叫住她，一边用手指拨弄着粗弦。"不知道。是不是《暴风雨》？"她胆怯地说，怕说错了。
  网络来源: |
    https://baike.baidu.com/item/%E6%9A%B4%E9%A3%8E%E9%9B%A8/2391

- 名词: 担水人
  解释: |
    指意大利作曲家路易吉·凯鲁比尼（Luigi Cherubini，1760—1842）的法语歌剧《两天》（Les Deux Journées），又名《担水人》（The Water-Carrier）。作于1800年，属于法国大革命时期"拯救歌剧"的重要代表作。该剧在19世纪风靡全欧洲，在俄国贵族中亦广为知晓，娜塔莎在家中弹唱的正是该剧中的合唱段落。
  书中原文: |
    "不对，这是《担水人》中的合唱，听见吗？"于是娜塔莎把合唱的曲子唱完，让索尼娅能听出来。
  网络来源: |
    https://baike.baidu.com/item/%E5%87%AF%E9%B2%81%E6%AF%94%E5%B0%BC

- 名词: 轮回论
  解释: |
    轮回论（梵语Saṃsāra）是一种关于灵魂或生命主体在死后依据生前行爲（业力）转生为另一种生命形态的学说，循环往复如车轮旋转。该思想最早见于古印度《奥义书》，爲婆罗门教和佛教的核心教义之一。古希腊哲学（毕达哥拉斯、柏拉图）中亦有类似观念。小说中索尼娅提到的埃及人的轮回信仰，即灵魂从前附在牲畜身上、将来又回到牲畜身上，属于古埃及的转世观念。
  书中原文: |
    "这是轮回论，"索尼娅说，她一向用功读书，而且什么都记得，"埃及人相信，我们的灵魂从前是附在牲畜身上的，将来又回到牲畜身上。"
  网络来源: |
    https://baike.baidu.com/item/%E8%BD%AE%E5%9B%9E%E8%AE%BA/8967029

- 名词: 箍骨裙
  解释: |
    19世纪西方女性使用的裙撑（hoop skirt / crinoline），用鲸骨、钢圈或藤条制成骨架，撑起庞大裙摆，形成钟形或鸟笼状轮廓。1856年法国人Milliet发明钢骨裙撑后大规模流行。这种裙摆宽大易燃，在明火照明时代曾造成大量伤亡。小说中尼古拉化装成穿箍骨裙的老太太，是俄国圣诞节化装舞会中的趣味装扮。
  书中原文: |
    半小时后，大厅里跳假面舞的人们中间，又增加了穿箍骨裙的老太太——这是尼古拉，土耳其女郎是彼佳，小丑是季姆勒，骠骑兵是娜塔莎……
  网络来源: |
    https://baike.baidu.com/item/%E5%85%8B%E9%87%8C%E8%AF%BA%E6%9E%97%E8%A3%99

- 名词: 切尔克斯人
  解释: |
    切尔克斯人（Circassians，又称契尔卡斯人）是西北高加索地区的 indigenous 民族，属于阿迪格人的分支，使用高加索语系阿布哈兹-阿迪格语族语言，信仰逊尼派伊斯兰教。历史上以身形高挑、相貌出众著称。19世纪沙俄吞并高加索后遭遇大规模驱逐，约70万人流散至奥斯曼帝国。小说中索尼娅用软木炭画上胡须和眉毛装扮成切尔克斯人的模样。
  书中原文: |
    还有一个用软木炭画的小胡子和眉毛的切尔克斯人，这是索尼娅。
  网络来源: |
    https://baike.baidu.com/item/%E5%88%87%E5%B0%94%E5%85%8B%E6%96%AF%E4%BA%BA/10810402

- 名词: 三驾雪橇
  解释: |
    三驾雪橇（俄语Тройка/Troika）是俄罗斯传统交通工具，由三匹马并排牵引的雪橇（无雪季节为马车）。三马呈扇形排列，中间辕马小跑、两侧边马大跑，时速可达45—50公里，是当时俄罗斯最快的陆上交通工具之一。果戈理《死魂灵》中曾将其比喻爲俄罗斯民族精神的象征。在俄国贵族生活中，乘三驾雪橇兜风是冬日的常见娱乐。
  书中原文: |
    尼古拉想用他的三驾雪橇载着他们几个人在平坦的大道上兜兜风，他提议另外带十个化装的家奴到大叔家去一趟。
  网络来源: |
    https://baike.baidu.com/item/%E4%B8%89%E5%A5%97%E9%A9%AC%E8%BD%A6

- 名词: 环舞
  解释: |
    环舞（俄语Хоровод/Khorovod）是东斯拉夫民族古老的环形舞蹈形式，已有上千年历史。参与者手拉手或勾小指围成圆圈，边舞蹈边合唱。圆圈象征围绕太阳移动，源于古代斯拉夫人的异教仪式，代表团结与友谊。在19世纪俄国，环舞是圣诞节等节庆活动中常见的娱乐形式。
  书中原文: |
    …先是有点拘束，然后就越来越快活、越和谐地唱歌，跳舞，跳环舞，做圣诞游戏。
  网络来源: |
    https://baike.baidu.com/item/%E5%8F%8B%E8%B0%8A%E8%88%9E

- 名词: 假面舞
  解释: |
    假面舞（化装舞会）是参与者穿着特殊服装、佩戴面具的社交舞会，在18—19世纪俄国宫廷和贵族社会中极为流行。彼得大帝于1718年引入俄国，叶卡捷琳娜二世时代达到鼎盛。每到冬季（尤其是圣诞节节期），贵族家庭常举办假面舞会，家奴们化装成狗熊、土耳其人、店主等各种角色，载歌载舞，是俄国冬日社交生活的重要传统。
  书中原文: |
    家奴们化装成狗熊、土耳其人、店主、太太等等，有的可怕，有的可笑…然后越来越快活、越和谐地唱歌，跳舞，跳环舞，做圣诞游戏。
  网络来源: |
    https://baike.baidu.com/item/%E5%8C%96%E8%A3%85%E8%88%9E%E4%BC%9A
