马尔维纳斯:
  解释: >-
    马尔维纳斯（Malvina）是苏格兰诗人詹姆斯·麦克弗森（James Macpherson）18世纪创作的《莪相诗集》（The Poems of Ossian）中的女性角色，
    托斯卡之女，莪相之子奥斯卡的恋人。她以美貌著称，同时也是一位吟游诗人，弹奏竖琴。莪相诗歌在18-19世纪风靡欧洲，深刻影响了浪漫主义文学。
    小说中尼古拉用"马尔维纳斯之流"比喻仅凭姿色被爱的女性，以此反驳妻子玛丽亚对自己容貌的担忧。
  书中原文: >-
    只有像马尔维纳斯之流的女人才因为姿色而被别人所爱；我爱我的妻子吗？不爱，我也不知道该怎么对你说。
  网络来源: >-
    Malvina from The Poems of Ossian by James Macpherson, 18th century Scottish epic poetry cycle.

卢梭思想:
  解释: >-
    卢梭（Jean-Jacques Rousseau, 1712-1778）是法国启蒙运动最激进的思想家，其核心思想包括社会契约论、人民主权、公意、自由平等、
    自然教育和文明批判。皮埃尔信奉的"卢梭思想"主要指卢梭在《爱弥儿》中倡导的自然教育理念，其中包括反对雇佣乳母、提倡母亲亲自哺乳，
    认为这种做法更符合自然法则和儿童身心健康。托尔斯泰本人深受卢梭影响，借皮埃尔之口体现了这些理念。
  书中原文: >-
    一次，皮埃尔把他信奉的卢梭思想讲给她听，说乳母哺乳不仅是反常的事，而且有害。于是在生第二个孩子的时候，娜塔莎不顾母亲、
    医生和丈夫极力反对她自己哺乳，因为这在当时不仅闻所未闻，而且他们认为这样有害。
  网络来源: >-
    Jean-Jacques Rousseau, 《爱弥儿》（Émile, ou De l'éducation, 1762）中提倡母亲亲自哺乳的自然教育理念。
