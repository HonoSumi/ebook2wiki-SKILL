- 名词: 卡尔·奥古斯特·哈登贝格
  解释: |
    卡尔·奥古斯特·冯·哈登贝格（1750—1822），普鲁士政治家、外交家、改革家。
    1810年至1822年任普鲁士首相（总理大臣），与施泰因并称普鲁士改革运动两大核心人物。
    内政方面推行农奴制赎买改革、1810年《工业赦令》打破行会垄断、1818年《新关税法》统一关税。
    外交方面促成1813年普俄结盟对抗拿破仑，代表普鲁士出席1814—1815年维也纳会议，
    为普鲁士争取到莱茵兰和萨克森北部等领土，后期参与神圣同盟的保守政策。
  书中原文: |
    卡尔·奥古斯特·哈登贝格（1750—1822），普鲁士政治活动家。一八一〇至一八二二年任总理大臣。
    他为巩固普鲁士君主制度，于一八一〇至一八一三年实行不彻底的资产阶级改革，
    允许农民在极苛刻的条件下赎买封建徭役，取消行会限制等。
    他曾代表普鲁士出席一八一四至一八一五年维也纳会议，以后几年中执行神圣同盟的反动政策。
  网络来源: |
    https://wapbaike.baidu.com/item/卡尔·奥古斯特·冯·哈登贝格/6213961
    https://zh.wikipedia.org/zh-my/奥古斯特·冯·哈登贝格
    https://www.britannica.com/biography/Karl-August-von-Hardenberg

- 名词: 卢梭
  解释: |
    让-雅克·卢梭（1712—1778），法国启蒙思想家、哲学家、教育家、文学家，
    启蒙运动代表人物之一，浪漫主义文学流派开创者。
    主要著作有《社会契约论》（旧译《民约论》）、《论人类不平等的起源和基础》、
    《爱弥儿》《忏悔录》等。核心思想包括社会契约论、人民主权、公意和平等，
    被誉为"18世纪法国大革命的思想先驱"，其思想深刻影响了法国大革命、
    美国《独立宣言》及后世政治哲学。
  书中原文: |
    指卢梭著《民约论》。
  网络来源: |
    https://baike.baidu.com/item/让-雅克·卢梭/7169222
    https://zh.wikipedia.org/zh-cn/让-雅克·卢梭

- 名词: 民约论
  解释: |
    《民约论》是卢梭著作《社会契约论》（Du Contrat Social）的旧时中译名，
    1762年出版，全称《社会契约论或政治权利原理》。
    全书共4卷48章，阐述"人是生而自由的，却无往不在枷锁之中"的核心命题，
    主张国家主权属于人民、法律是公意的体现、人民有权推翻违反契约的政府。
    该书被誉为现代民主制度的基石，与孟德斯鸠《论法的精神》、伏尔泰《哲学通信》
    合称"启蒙运动三书"，深刻影响了法国大革命和美国建国。
  书中原文: |
    指卢梭著《民约论》。
  网络来源: |
    https://baike.baidu.com/item/《社会契约论》/3854
    https://zh.wikipedia.org/zh/民约论

- 名词: 阿列克谢·奥尔洛夫伯爵
  解释: |
    阿列克谢·格里戈里耶维奇·奥尔洛夫伯爵（1737—1807），俄国政治活动家、海军上将。
    因参与1762年宫廷政变拥立叶卡捷琳娜二世登上皇位而显达。
    1770年任俄国舰队总司令，在切什梅海战（切什梅湾）中指挥俄军击溃土耳其舰队，
    战后获赐名号"切什梅斯基"，获一级圣乔治勋章。
    1775年退伍后以奢华好客著称。其家族在俄国政治中影响深远。
  书中原文: |
    阿列克谢·奥尔洛夫伯爵（1737—1807），俄国政治活动家，
    因参加一七六二年宫廷政变而显达。叶卡捷琳娜二世借这次政变登上王位。
    一七七〇年在切什梅海湾击溃土耳其舰队时，他任俄国舰队总司令。
    一七七五年退伍后以奢华好客著称一时。
  网络来源: |
    https://baike.baidu.com/item/切什梅海战/3183999
    https://www.britannica.com/event/Battle-of-Cesme

- 名词: 威廉·皮特
  解释: |
    小威廉·皮特（1759—1806），英国历史上最年轻的首相，1783年就任时仅24岁。
    第一任期1784—1801年，第二任期1804—1806年（任内去世）。
    他是反对法国大革命和拿破仑战争的核心人物，领导英国组建反法同盟，
    为筹措军费首次在英国开征所得税。
    1805年英国在特拉法加海战中重创法国海军。
    他还推动《1800年联合法令》使大不列颠与爱尔兰合并。
  书中原文: |
    威廉·皮特（1759—1806），一七八三至一八〇一年与一八〇四至一八〇六年任英国首相，
    是反对法国革命、反对拿破仑法国的欧洲国家联盟的主要组织者之一。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/小威廉·皮特
    https://baike.sogou.com/v687853.htm
    https://www.bbc.co.uk/history/historic_figures/pitt_the_younger.shtml

- 名词: 特烈帕克舞
  解释: |
    特烈帕克舞（俄语：Трепак），俄罗斯民间舞蹈，属双拍子（2/4拍），
    节奏快速活泼、情绪欢快奔放，以顿足跳为主要动作特点，
    包含蹲、跳、踢腿等竞技性舞步。与俄罗斯民间舞蹈中的"竞赛舞"类型相关联。
    最广为人知的出处是柴可夫斯基芭蕾舞剧《胡桃夹子》中的《特列帕克舞曲》。
    是俄罗斯传统民间舞蹈中非常流行的一种，与卡玛林斯卡雅舞、果帕克舞等同属一类。
  书中原文: |
    特烈帕克舞是俄罗斯的一种顿足跳的民间舞。
  网络来源: |
    https://baike.baidu.com/item/特列帕克
    https://baike.sogou.com/v451011.htm

- 名词: 普特
  解释: |
    普特（俄语：пуд，英文：Pood），沙皇时期俄国的主要重量单位。
    1普特 = 40俄磅 ≈ 16.38公斤（16.38千克）。
    更大单位：1贝尔科维茨 = 10普特；更小单位：1俄磅 ≈ 409.5克。
    起源自古俄罗斯的格里夫纳重量体系，在17—19世纪中俄"万里茶道"贸易中广泛使用。
    苏联时期仍用该单位统计粮食产量，1921年后逐渐被公制取代。
  书中原文: |
    1普特合16.38公斤。
  网络来源: |
    https://baike.baidu.com/item/普特
    https://www.zdic.net/hans/普特

- 名词: 腓特烈二世
  解释: |
    腓特烈二世（1712—1786），又称腓特烈大帝，普鲁士国王，1740—1786年在位，
    霍亨索伦王朝著名君主，欧洲"开明专制"的代表人物。
    军事上发明斜形战斗序列，通过西里西亚战争夺取奥地利富庶的西里西亚地区，
    在七年战争中以弱抗强保住领土，奠定了普鲁士的欧洲强国地位。
    内政上推行宗教宽容、司法改革、发展工商业和教育，修建无忧宫。
    与伏尔泰保持长期友谊，擅长演奏长笛并创作音乐作品。
    在其统治下普鲁士领土扩大1.6倍，人口从300万增至500万。
  书中原文: |
    可能指腓特烈二世，一七四〇至一七八六年的普鲁士国王，著名统帅。
  网络来源: |
    https://baike.baidu.com/item/腓特烈二世/9079854
    https://zh.wikipedia.org/zh-cn/腓特烈大帝

- 名词: 腊肠烧酒军事参议院
  解释: |
    这是小说中老公爵（尼古拉·博尔孔斯基公爵）给奥地利军事参议院起的诨名（绰号），
    带有戏谑和嘲讽的意味，反映了老公爵对奥地利军事指挥机构效率低下的轻蔑态度。
    在托尔斯泰的《战争与和平》中，老公爵常以这种讽刺口吻谈论时事和外国事务。
    未检索到独立的网络资料对此绰号进行专门解释。
  书中原文: |
    腊肠烧酒军事参议院是老公爵给奥地利军事参议院起的诨名。
  网络来源: |
    未检索到网络资料。

- 名词: 彼·帕伦
  解释: |
    彼得·阿列克谢耶维奇·帕伦伯爵（1745—1826），出身波罗的海德意志贵族，
    俄罗斯帝国宫廷重臣、将军。1798—1801年任圣彼得堡军事总督，
    深得沙皇保罗一世信任。他是1801年刺杀保罗一世的主要组织者和领导者之一。
    刺杀当晚亲自在场，见证了保罗一世被勒死的过程。
    新沙皇亚历山大一世即位后，帕伦于1801年4月被解职并流放回库尔兰领地，
    直至去世。
  书中原文: |
    彼·帕伦（1745—1826），彼得堡总督，刺杀保罗一世的组织者和参与者之一。
  网络来源: |
    https://en.wikipedia.org/wiki/Count_Pahlen

- 名词: 斯特恩
  解释: |
    劳伦斯·斯特恩（1713—1768），18世纪英国小说家，出生于爱尔兰。
    毕业于剑桥大学，做了23年约克郡牧师后开始文学创作。
    代表作《项狄传》（全名《绅士特里斯舛·项狄的生平与见解》）打破传统叙事时间顺序，
    包含黑页、白页、大理石纹页和各种符号图解，
    被视作意识流小说乃至现代派小说的先驱，被誉为"生活于18世纪的第一位后现代小说家"。
    另一作品《感伤的旅行》也很有影响。下启普鲁斯特、乔伊斯、伍尔夫等大师。
  书中原文: |
    斯特恩（1713—1768），英国作家。
  网络来源: |
    https://baike.baidu.com/item/劳伦斯·斯特恩
    https://zh.wikipedia.org/zh-my/劳伦斯·斯特恩

- 名词: 神圣同盟
  解释: |
    神圣同盟是1815年9月26日由俄国沙皇亚历山大一世发起，
    俄国、奥地利、普鲁士三国在巴黎签署的保守主义政治同盟。
    以基督教教义为旗号，宣称三国君主以"手足之情"互相救援，
    旨在维护维也纳会议建立的封建统治秩序，镇压资产阶级革命和民族独立运动。
    英国形式上未参加但赞同原则。同盟在1820年代镇压了意大利和西班牙革命，
    在1830年法国七月革命后开始瓦解，1848年欧洲革命浪潮中最终终结。
    沙皇俄国在其中扮演了"镇压欧洲革命的宪兵"角色。
  书中原文: |
    他曾代表普鲁士出席一八一四至一八一五年维也纳会议，以后几年中执行神圣同盟的反动政策。
  网络来源: |
    https://baike.baidu.com/item/神圣同盟/1613849
    https://zh.wikipedia.org/zh-my/神圣同盟

- 名词: 维也纳会议
  解释: |
    维也纳会议于1814年9月至1815年6月在奥地利维也纳召开，
    是拿破仑战败后欧洲列强重新划分政治版图的大规模国际外交会议。
    由奥地利首相梅特涅主持，主要参与国为俄、英、奥、普，后法国也参与核心决策。
    核心原则包括正统主义（恢复封建王朝）、补偿原则和均势原则（维持大国平衡）。
    决议包括：俄国获得华沙大公国大部、普鲁士获得萨克森北部和莱茵兰、
    奥地利获得意大利伦巴第和威尼斯、德意志邦联成立、瑞士成为永久中立国等。
    维也纳体系维持了欧洲近百年的总体和平，直至1918年一战结束。
  书中原文: |
    他曾代表普鲁士出席一八一四至一八一五年维也纳会议，以后几年中执行神圣同盟的反动政策。
  网络来源: |
    https://baike.baidu.com/item/维也纳会议/2777205
    https://zh.wikipedia.org/zh/维也纳会议

- 名词: 费迪南大公
  解释: |
    费迪南大公（Archduke Ferdinand Karl Joseph of Austria-Este，1781—1850），
    神圣罗马帝国/奥地利帝国的年轻大公，1805年乌尔姆战役中名义上的奥军总司令。
    实际指挥作战的是参谋长马克将军（Karl Mack von Leiberich）。
    拿破仑采取大迂回战术包围乌尔姆后，费迪南大公于1805年10月14日夜间
    率骑兵突围逃脱，狂奔约400公里逃至波希米亚，但部队损失惨重。
    乌尔姆战役为法军随后攻占维也纳和赢得奥斯特里茨战役奠定了基础。
    注意：此人与1914年遇刺引发一战的弗朗茨·斐迪南大公并非同一人。
  书中原文: |
    昨天，奥地利军事参议院有一名参议由维也纳来见库图佐夫，
    建议并要求俄军赶快跟费迪南大公及马克的军队会师。
  网络来源: |
    https://www.zhihu.com/question/66429697
    https://baike.baidu.com/item/斐迪南

- 名词: 马克
  解释: |
    卡尔·马克·冯·莱贝里希男爵（1752—1828），神圣罗马帝国（奥地利）骑兵元帅。
    1805年第三次反法同盟战争中任驻巴伐利亚奥军的实际司令官。
    在乌尔姆战役中因战略判断错误（认为法军主攻方向在意大利），
    被拿破仑以急行军迂回包围，1805年10月20日率约2.3万人在乌尔姆投降，
    奥军总计损失约6万人。后被军事法庭审判，剥夺军衔和勋章，判处两年监禁。
    1819年在施瓦岑贝格亲王的干预下恢复军衔和荣誉。
    乌尔姆战役被视为拿破仑战略迂回行动的经典范例。
  书中原文: |
    昨天，奥地利军事参议院有一名参议由维也纳来见库图佐夫，
    建议并要求俄军赶快跟费迪南大公及马克的军队会师。
  网络来源: |
    https://baike.baidu.com/item/马克·冯·莱贝里希
    https://zh.wikipedia.org/zh-tw/乌尔姆战役
    https://www.britannica.com/biography/Karl-Freiherr-Mack-von-Leiberich

- 名词: 察里津皇家草场
  解释: |
    察里津诺皇家庄园（俄语：Царицыно，意为"女皇村"）位于莫斯科南部，
    面积约116公顷，分布在上下察里津诺湖周围。
    1775年叶卡捷琳娜二世女皇巡游至此被美景吸引，买下并更名为"察里津诺"，
    下令修建皇家避暑行宫。建筑采用红砖白石的哥特式风格，
    是欧洲唯一的新哥特风格皇家园林。
    因女皇对建筑不满意，宫殿至其去世仍未完工。2007年普京总统出席重建落成典礼。
    如今是文化自然保护区博物馆，也是莫斯科市民休闲的热门去处。
  书中原文: |
    就是在察里津皇家草场接受检阅，也不会被赶出去的。
  网络来源: |
    https://baike.baidu.com/item/察里津诺皇家庄园
    https://www.meipian.cn/4uy0xow8

- 名词: 布劳瑙
  解释: |
    布劳瑙（Braunau am Inn，即因河畔布劳瑙），奥地利上奥地利州城市，
    位于奥德边境因河畔，距林茨约90公里，距萨尔茨堡约60公里。
    1260年获得城市宪章，是奥地利最古老的城市之一。
    中世纪因因河上的食盐贸易发展为要塞和重要贸易枢纽。
    1779年划归奥地利，1809—1816年间曾短暂回归巴伐利亚。
    地标为圣斯蒂芬教堂（87米尖塔是奥地利最高尖塔之一）。
    在《战争与和平》中，库图佐夫总司令的大本营在1805年10月设于布劳瑙。
  书中原文: |
    库图佐夫总司令的大本营也设在布劳瑙。
  网络来源: |
    https://baike.baidu.com/item/布劳瑙/4893525
    https://zh.wikipedia.org/zh-tw/因河畔布劳瑙
