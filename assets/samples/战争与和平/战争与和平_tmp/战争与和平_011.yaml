- 名词: 红宝石耳坠
  解释: |
    19世纪俄罗斯贵族女性佩戴的珍贵首饰，以红宝石为主要镶嵌宝石，常与钻石搭配，采用黄金或白金底座。在小说中，玛丽亚·德米特里耶夫娜赠送给娜塔莎一对"梨形的红宝石耳坠"作为命名日礼物，这一细节体现了当时贵族间馈赠珠宝的社会习俗。19世纪俄罗斯最著名的珠宝工坊为法贝热（Fabergé），自1885年起成为沙皇御用珠宝供应商，其作品以工艺精美著称。红宝石等彩色宝石主要来自西伯利亚和乌拉尔山脉矿区。
  书中原文: |
    她从大手提包里掏出一对梨形的红宝石耳坠，送给因过命名日而容光焕发、面颊绯红的娜塔莎，随后立刻朝皮埃尔转过身去。
  网络来源: |
    https://www.ad.tsinghua.edu.cn/info/1207/10650.htm

- 名词: 古钢琴
  解释: |
    古钢琴（Fortepiano）是18世纪末至19世纪初欧洲流行的键盘乐器，是现代钢琴的前身。其音域从约5个半八度逐步扩展到6个半八度，音色较现代钢琴更为轻盈清脆。19世纪初主要分为两大流派：维也纳式击弦机钢琴（触键轻、音色变化细微，适合莫扎特风格）和英国式击弦机钢琴（触键重、声音浑厚，适合克莱门蒂风格）。小说中饭后客人聚在古钢琴周围，表明古钢琴是19世纪初俄国贵族家庭客厅中常见的乐器，是贵族社交和家庭音乐生活的重要组成部分。
  书中原文: |
    年轻人在伯爵夫人的怂恿下，都聚在古钢琴和竖琴周围。
  网络来源: |
    https://zh.wikipedia.org/zh-hans/%E5%8F%A4%E9%92%A2%E7%90%B4

- 名词: 竖琴
  解释: |
    竖琴是世界上最古老的弹拨乐器之一，最早可追溯至公元前3500年的美索不达米亚。1810年法籍制琴师塞巴斯蒂安·埃拉德（Sebastien Erard）发明了双次动作踏板竖琴（Double-action Pedal Harp），使竖琴可以弹奏所有调性，标志着现代音乐会竖琴的诞生。在19世纪欧洲贵族社会中，竖琴是身份与阶级的象征，尤其受到贵族女性的喜爱。玛丽·安托瓦内特王后曾大力推动竖琴在贵族间的流行。小说中朱莉应大家请求用竖琴弹奏变奏短曲，反映了当时俄国贵族沙龙中竖琴演奏的社交风尚。
  书中原文: |
    朱莉应大家的请求第一个用竖琴弹了一支变奏短曲，她和别的姑娘们一起邀请以音乐天才闻名的娜塔莎和尼古拉唱支歌。
  网络来源: |
    https://baike.baidu.com/item/%E8%B1%8E%E7%90%B4/353057

- 名词: 甲鱼汤
  解释: |
    甲鱼汤（Turtle Soup）在19世纪的俄罗斯贵族餐桌上是一道源自西欧的奢侈菜肴。根据历史资料，沙皇尼古拉二世1896年加冕典礼的宴会菜单中就包含"英式甲鱼汤"（English Turtle Soup）。这道菜肴的做法是将甲鱼在牛肉汤中煮熟后切块，加入小牛肉、牛肉、火腿等一同煎制，再加入高汤和香料慢炖，最后用白葡萄酒（马德拉酒）调味。俄罗斯本土并不盛产甲鱼，甲鱼汤作为舶来的奢侈享受，象征财富和地位，体现了19世纪俄国贵族饮食文化深受法国和英国影响的特征。
  书中原文: |
    从两道汤中他所选定的甲鱼汤和馅饼，到松鸡，他没有放过任何一道菜。
  网络来源: |
    https://www.rbth.com/literature/2014/12/25/dining_with_nobility_in_the_heyday_of_the_russian_empire_42069.html

- 名词: 马迪拉酒
  解释: |
    马迪拉酒（Madeira Wine，也译作马德拉酒）是产自葡萄牙马德拉群岛的著名加强型葡萄酒。其历史可追溯至15世纪大航海时代，因长途航行中酒液在船舱高温下产生氧化，意外形成了独特的坚果、焦糖风味，被称为"不死之酒"。18世纪是马德拉酒的黄金时代，深受欧洲皇室和贵族青睐——托马斯·杰斐逊等美国开国元勋也是其爱好者。在19世纪俄国贵族宴会上，马德拉酒是常见的佐餐酒，小说中仆人在餐桌上为客人斟酒时报出"纯马迪拉酒"，体现了当时俄国贵族对进口高档葡萄酒的追求。
  书中原文: |
    当仆人拿着裹着餐巾的酒瓶从邻座背后悄悄走过来给他斟酒，一面报着酒名："纯马迪拉酒"。
  网络来源: |
    https://baike.baidu.com/item/%E9%A9%AC%E5%BE%B7%E6%8B%89%E9%85%92

- 名词: 匈牙利酒
  解释: |
    匈牙利酒（Hungarian wine）主要指匈牙利出产的葡萄酒，其中最负盛名的是托卡伊（Tokaji）贵腐酒，被誉为"酒中之王，王者之酒"。托卡伊于1730年建立了世界上第一个葡萄园分级制度，比波尔多1855年分级早了一百多年。沙俄皇室视托卡伊贵腐酒为至宝，甚至在匈牙利托卡伊产区租用葡萄园，酿成的酒由骑兵护送至圣彼得堡。19世纪俄国贵族的宴会上，匈牙利酒是与马德拉酒、莱茵酒并列的进口高档葡萄酒，也是主人身份和品位的象征。
  书中原文: |
    当仆人拿着裹着餐巾的酒瓶从邻座背后悄悄走过来给他斟酒，一面报着酒名："纯马迪拉酒"，或"匈牙利酒"，或"莱茵酒"。
  网络来源: |
    https://en.wikipedia.org/wiki/Hungarian_wine

- 名词: 莱茵酒
  解释: |
    莱茵酒（Rhine wine）指出产于德国莱茵河流域的白葡萄酒，以雷司令（Riesling）葡萄品种最为著名。德国葡萄酒生产历史可追溯至罗马帝国时期。莱茵高（Rheingau）产区是莱茵酒的核心产区，面积仅占德国葡萄酒产区的3%，但地位极高。到1850年代，德国雷司令葡萄酒价格曾高于波尔多和香槟。英国维多利亚女王1850年访问霍赫海姆后，雷司令酒在英国被称为"Hock"。在19世纪俄国贵族餐桌上，莱茵酒是与马德拉酒、匈牙利酒并列的进口名酒，代表了当时俄国上流社会对西欧高档葡萄酒的消费习惯。
  书中原文: |
    当仆人拿着裹着餐巾的酒瓶从邻座背后悄悄走过来给他斟酒，一面报着酒名："纯马迪拉酒"，或"匈牙利酒"，或"莱茵酒"。
  网络来源: |
    https://www.emeraldcruises.eu/blogs/the-history-of-riesling-wine

- 名词: 香槟酒
  解释: |
    香槟酒（Champagne）是产自法国香槟地区的起泡葡萄酒，自诞生起就与法国王室和贵族紧密相连。19世纪是香槟走向世界的黄金时代：1876年路易王妃香槟为沙皇亚历山大二世量身定制了透明瓶身的水晶香槟；凯歌夫人（Veuve Clicquot）发明转瓶法并大胆将香槟远销俄国，1815年拿破仑战争结束后第一船香槟运抵俄国仅两周便售罄。19世纪俄国贵族尤其偏爱残糖高达275-300克/升的甜型香槟。小说中在上冰激凌之前先上香槟酒，反映了当时俄国贵族宴会的餐饮礼仪。
  书中原文: |
    上冰激凌之前先上香槟酒。又奏起乐来，伯爵吻了吻伯爵夫人，所有的客人都起身向伯爵夫人道喜，隔着餐桌跟伯爵和孩子们碰杯，并且彼此碰杯。
  网络来源: |
    http://world.people.com.cn/n1/2018/1006/c1002-30326108-4.html

- 名词: 水晶玻璃酒瓶
  解释: |
    水晶玻璃酒瓶是欧洲贵族餐桌上重要的餐具和装饰品。1674年英国人乔治·雷文斯克夫特在玻璃中添加氧化铅，发明了铅水晶，标志着现代水晶玻璃的诞生。法国巴卡拉（Baccarat，1764年建厂）和捷克摩瑟（Moser，1857年创立）是欧洲最著名的水晶品牌，长期为各国皇室供应酒具。水晶玻璃因含氧化铅而具有更高的折射率和透明度，轻敲时有清脆金属声，被视为身份与品位的象征。小说中伯爵从水晶玻璃酒瓶和果盘后面观察妻子，反映了19世纪初俄国贵族家庭使用高档水晶餐具的社交场景。
  书中原文: |
    伯爵不时从水晶玻璃酒瓶和果盘后面看看妻子和她那打着蓝花结的高高耸起的帽子，殷勤地给邻座斟酒，同时也没有忘记给自己斟酒。
  网络来源: |
    https://m.wine-world.com/culture/pj/20220527103344172

- 名词: 大箱子
  解释: |
    大箱子（Chests / Сундуки）是俄罗斯传统家庭中必不可少的家具，用于收纳衣物、贵重物品、书籍、文件等。在17至19世纪的俄罗斯贵族家庭中，大箱子与从欧洲进口的桌子、柜子等家具混搭摆放。大的锻造箱子配有巨大的锁，专门存放贵重财产。在小说中，走廊的大箱子被描述为"罗斯托夫家少女们发泄悲哀的地方"，索尼娅因嫉妒而趴在大箱子上哭泣。这一细节生动展现了俄罗斯贵族家庭中一种特殊的空间使用习俗——大箱子不仅是储物家具，也是少女们私下发泄情感的场所。
  书中原文: |
    走廊的大箱子是罗斯托夫家少女们发泄悲哀的地方。索尼娅果然在大箱子上，脸朝下躺在保姆肮脏的条纹布羽毛褥子上，身上的粉红纱衫都揉皱了。
  网络来源: |
    https://patriarchs-palace.kreml.ru/?cmd=00800000000000000110000000000000000&cmdex=804000000000000000000

- 名词: 哥萨克
  解释: |
    哥萨克（Казак）一词源自突厥语，意为"自由人"。哥萨克是13至16世纪在东欧大草原上形成的特殊社会群体，以斯拉夫人为主体并融合了突厥等多族裔。他们以自由民身份起家，擅长骑射和战斗，后来成为沙俄帝国扩张的核心军事力量。哥萨克骑兵以勇猛善战著称，拿破仑曾评价："哥萨克是所有轻骑兵中的佼佼者。"在小说中，玛丽亚·德米特里耶夫娜亲昵地称呼活泼好动的娜塔莎为"哥萨克"，既是对她性格的生动概括，也反映了当时俄罗斯人对哥萨克"自由、勇猛、不羁"这一文化形象的普遍认知。
  书中原文: |
    "我的哥萨克好吗？（玛丽亚·德米特里耶夫娜管娜塔莎叫哥萨克。）"她说，抚摸着毫不畏缩、高高兴兴走过来吻她的手的娜塔莎，"我知道这丫头厉害，可是我喜欢她。"
  网络来源: |
    https://baike.baidu.com/item/%E5%93%A5%E8%90%A8%E5%85%8B/82308

- 名词: 熊的故事
  解释: |
    "熊的故事"指《战争与和平》中皮埃尔·别祖霍夫在彼得堡参与的一桩著名恶作剧事件：他将一名警察分局局长与一头熊捆绑在一起。这一情节在小说中作为背景故事被多次提及——宴会上的客人们都好奇地端详皮埃尔，想知道这个看起来老实温和的年轻人怎么会做出如此出格的事。这一事件生动展现了皮埃尔早期放荡不羁、性格莽撞的一面，与后来他在战争中的成长和转变形成鲜明对比。"把警察局长绑在熊背上"这一桥段在俄罗斯文学中非常著名，常被引为托尔斯泰塑造人物性格的经典手法。
  书中原文: |
    大部分客人都知道他那桩熊的故事，所以都好奇地端详这个身高体胖的老实人，奇怪这个颟顸、谦逊的汉子怎么会跟警察分局局长开那样的玩笑。
  网络来源: |
    https://book.qq.com/book-read/39451642/20

- 名词: 苏沃洛夫
  解释: |
    亚历山大·瓦西里耶维奇·苏沃洛夫（Alexander Suvorov，1730-1800），俄罗斯历史上最伟大的军事将领之一，俄国军事学术的奠基人。他一生指挥作战35次，从未有过败绩，被封为俄罗斯大元帅。其代表作《制胜的科学》提出了"观察、快速、猛攻"三大战术原则。1799年率军翻越阿尔卑斯山完成远征，被恩格斯誉为"史上最出色的阿尔卑斯山行军"。在小说中，申申引用苏沃洛夫的战败来质疑与拿破仑作战的前景，反映了1805年前后俄国社会对苏沃洛夫时代结束后的军事局面所抱有的复杂心态——既怀念这位不败将军，又对当前战事感到忧虑。
  书中原文: |
    "即使是苏沃洛夫又该如何——连他也被打得一败涂地，我们苏沃洛夫式的英雄好汉们如今安在？我问问您。"
  网络来源: |
    https://baike.baidu.com/item/%E4%BA%9A%E5%8E%86%E5%B1%B1%E5%A4%A7%C2%B7%E7%93%A6%E8%A5%BF%E9%87%8C%E8%80%B6%E7%BB%B4%E5%A5%87%C2%B7%E8%8B%8F%E6%B2%83%E6%B4%9B%E5%A4%AB/5924860

- 名词: 巴黎
  解释: |
    巴黎在19世纪是欧洲文化艺术的中心，对俄罗斯贵族阶层产生了深远影响。自彼得大帝1717年访问凡尔赛后，俄罗斯贵族开始崇尚法国文化。18至19世纪，法语成为俄国上流社会的通用语言，形成了长达百年的俄法双语共存的文化现象。许多俄罗斯贵族在家中用法语交流，甚至有人无法用俄语书写。在小说中，伯爵夫人询问刚从巴黎回国的皮埃尔，"您最近好像到过巴黎？我想一定很有意思。"这一对话反映了当时俄国贵族对巴黎文化生活的向往和推崇——对一个俄国贵族而言，游历巴黎被视为开阔眼界、增长见识的重要经历。
  书中原文: |
    "您最近好像到过巴黎？我想一定很有意思。"
  网络来源: |
    https://book.douban.com/annotation/112497880/

- 名词: 奥地利
  解释: |
    奥地利在19世纪初是欧洲政治舞台上的重要角色，哈布斯堡家族统治下的奥地利帝国在拿破仑战争中经历了多次惨败与屈辱。1805年奥斯特里茨战役（三帝会战）中俄奥联军被拿破仑击败，1806年神圣罗马帝国解散。小说创作的历史背景正是1805年前后，沙皇俄国决定加入反法同盟与拿破仑作战。申申说"他已经把奥地利的傲气打垮了"，指拿破仑此前对奥地利的军事胜利，反映了当时俄国社会对奥地利军事能力的怀疑——奥地利作为俄国的盟国，在与拿破仑的交战中屡战屡败，引发了俄国贵族对这场战争前景的争议。
  书中原文: |
    "真见鬼，为什么我们要和波拿巴打仗？"申申说，"他已经把奥地利的傲气打垮了，恐怕要临到我们头上了。"
  网络来源: |
    https://baike.baidu.com/item/%E5%A5%A5%E5%9C%B0%E5%88%A9%E5%B8%9D%E5%9B%BD/9932051
