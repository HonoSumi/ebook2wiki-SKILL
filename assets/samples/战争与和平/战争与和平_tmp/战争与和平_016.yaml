- 名词: 蓝沙发
  解释: |
    《战争与和平》中贵族社交场合常见的家具。蓝色沙发在19世纪俄罗斯贵族客厅中较为普遍，常作为亲友促膝谈心的场所。文中玛丽亚公爵小姐回忆与好友朱莉在书室蓝沙发上"倾吐衷肠"的场景，蓝沙发成为亲密友谊和心灵交流的象征。
  书中原文: |
    "为什么我们不能像去年夏天那样在您那宽敞的书室里聚会，坐在那蓝沙发上'倾吐衷肠'呢？"
  网络来源: |
    https://www.xxshihui.com/xxsh/Special/2022/03/1_8_3225.shtml

- 名词: 轿式马车
  解释: |
    19世纪俄罗斯贵族使用的封闭式四轮马车（俄语：карета），通常由2-6匹马牵引，是身份与财富的象征。在《战争与和平》中，轿式马车频繁出现在贵族出行、舞会、教堂等社交场合，配有穿制服的仆从。安德烈公爵携妻子返回童山时即乘坐轿式马车。
  书中原文: |
    "就在这时，一辆轿式马车和一辆小型四轮马车驶到大门口，安德烈公爵从轿式马车上下来，把娇小的太太扶下车，让她走在前面。"
  网络来源: |
    https://www.xxshihui.com/xxsh/Special/2022/03/1_8_3225.shtml

- 名词: 小型四轮马车
  解释: |
    19世纪俄罗斯贵族使用的轻便马车（俄语可能对应коляска/дрожки），比轿式马车更小巧灵活，常用于短途出行或随行。在《战争与和平》中，小型四轮马车与轿式马车同时出现，随行在安德烈公爵夫妇的车队中。
  书中原文: |
    "就在这时，一辆轿式马车和一辆小型四轮马车驶到大门口，安德烈公爵从轿式马车上下来，把娇小的太太扶下车，让她走在前面。"
  网络来源: |
    https://www.kuansang.com/book/119976.html?page=1

- 名词: 钢琴
  解释: |
    19世纪俄罗斯贵族家庭中必备的乐器，是贵族子女（尤其是小姐）文化修养的重要标志。在《战争与和平》中，钢琴多次出现在贵族家庭生活场景中，玛丽亚公爵小姐按作息制度每日练习钢琴，弹奏杜塞克奏鸣曲。钢琴教育是当时俄罗斯贵族社交技能的核心组成部分。
  书中原文: |
    "公爵小姐看了看钟，发现练习钢琴的时间已经过了五分钟，她神色惊慌地向起居室走去。按照作息表规定，十二时至下午二时之间，公爵休息，而公爵小姐弹钢琴。"
  网络来源: |
    https://www.fx361.com/page/2017/0515/1732399.shtml

- 名词: 壁镜
  解释: |
    镶嵌在墙壁上的穿衣镜，是19世纪俄罗斯贵族宅邸的常见陈设。在《战争与和平》中，玛丽亚公爵小姐读信时照壁镜的场景生动刻画了她对自己外貌的不自信——镜中映出"不漂亮的、孱弱的身影"，但小说随即点明她拥有一双深邃美丽的大眼睛。壁镜成为玛丽亚自我认知与内心挣扎的象征。
  书中原文: |
    "读到这里，玛丽亚公爵小姐叹了口气，向右边的壁镜看了看。镜子里映出一个不漂亮的、孱弱的身影和一副消瘦的面孔。一向脉脉含愁的眼睛这时特别失望地对着镜子端详自己。"
  网络来源: |
    http://datongshuhua.cn/page101?article_id=412&pagenum=47

- 名词: 遗产继承
  解释: |
    《战争与和平》开篇的重要情节之一。老别祖霍夫伯爵病危，其巨额遗产（四万农奴、几百万财产）引发激烈争夺。皮埃尔作为私生子本无继承权，但伯爵立遗嘱将全部财产留给他并请求沙皇承认其为嫡子。最终皮埃尔成功继承遗产，一跃成为俄罗斯最大富豪。托尔斯泰借此揭露了贵族社会在金钱面前的贪婪与虚伪。
  书中原文: |
    "轰动全莫斯科的重大新闻是老别祖霍夫伯爵的死和他的遗产继承问题，您想想看吧，三位公爵小姐所获无几，瓦西里公爵一无所得，而全部遗产的继承人却是皮埃尔。"
  网络来源: |
    https://baijiahao.baidu.com/s?id=1789163145538957064

- 名词: 择配
  解释: |
    指挑选配偶、选择婚姻对象。在19世纪俄罗斯贵族社会，择配往往涉及家族利益、财产门第的考量，而非纯粹的个人感情。文中朱莉抱怨莫斯科社交界拿她的婚事做文章，暗示贵族小姐的婚姻常被外界议论和安排，反映了当时贵族婚姻中的功利色彩。
  书中原文: |
    "由于这两年大家都拿我的择配寻开心（所提的对方多半是我不认识的），所以莫斯科婚姻大事纪，竟认定我将成为别祖霍娃伯爵夫人。"
  网络来源: |
    https://williamlong.info/xiaoshuo/archives/355.html

- 名词: 新兵征募
  解释: |
    19世纪俄罗斯帝国实行新兵招募制度（рекрутская повинность），由彼得大帝于1705年确立。规定每20户征召1名15-20岁士兵，服役期为终身（后缩短至25年）。贵族可出钱由他人代替服役。文中玛丽亚公爵小姐目睹新兵出征时亲人哭别的场景，反映了这一制度给普通民众带来的深重苦难。
  书中原文: |
    "那是从我们领地上征去从军的一队新兵……真应当看看那些出征的人们的母亲、妻子和儿女的情景，听听他们双方的痛哭！"
  网络来源: |
    http://tsrus.cn/lishi/2017/07/30/658447

- 名词: 作息制度
  解释: |
    指老博尔孔斯基公爵（尼古拉·安德烈耶维奇）在童山庄园执行的严格生活制度。他信奉"活动的首要条件是秩序"，将每日时间精确划分：上午写回忆录、演算数学、车削工艺品；十二时至下午二时午休，公爵小姐弹钢琴。即便儿子安德烈公爵远道归来，也不得打乱作息。这一制度体现了老公爵严苛刻板、一丝不苟的性格特征。
  书中原文: |
    "按照作息表规定，十二时至下午二时之间，公爵休息，而公爵小姐弹钢琴。"
  网络来源: |
    https://williamlong.info/xiaoshuo/archives/479.html

- 名词: 基督的仁爱宽恕
  解释: |
    基督教核心教义之一，强调爱邻人、爱仇敌、以善胜恶。托尔斯泰在《战争与和平》中通过安德烈公爵临终的宽恕、玛丽亚公爵小姐的虔诚信仰、普拉东·卡拉塔耶夫的淳朴之爱等情节反复表达这一主题。文中玛丽亚感叹人类在战争中忘记了救主教导的仁爱宽恕，将互相残杀当作美德，体现了托尔斯泰对战争的批判和对基督教和平主义的推崇。
  书中原文: |
    "仿佛人类已经忘记救主教导我们仁爱和宽恕的教规，而把互相残杀当作主要的美德。"
  网络来源: |
    https://ocfuyin.org/oc158-50/

- 名词: 基督的质朴精神
  解释: |
    托尔斯泰所推崇的基督教信仰本质——摒弃繁复的教条仪轨，回归单纯、真诚、朴素的爱与善良。在小说中，玛丽亚公爵小姐批评神秘主义书籍"养成夸张的性格，与基督的质朴精神背道而驰"，主张只读《使徒行传》和《福音书》即可。托尔斯泰认为真正的信仰不在远方，而在平凡的日常生活中，正如普拉东·卡拉塔耶夫所体现的淳朴信仰。
  书中原文: |
    "养成他们夸张的性格，这与基督的质朴精神完全背道而驰。"
  网络来源: |
    https://book.douban.com/subject/3076984/annotation?sort=time&start=20

- 名词: 上帝神圣的奥秘
  解释: |
    基督教神学中关于上帝的本质、旨意和救赎计划中超越人类理性认识的部分。在《战争与和平》中，玛丽亚公爵小姐认为，只要人还有肉体的躯壳，就无法认识上帝"可怕而神圣的奥秘"，主张不要过分探究上帝不愿让人知道的事，而应专注于遵循福音书的教导。这一观点反映了托尔斯泰笔下虔诚信仰者对理性神学持审慎态度的立场。
  书中原文: |
    "我们怎能认识上帝可怕而神圣的奥秘呢？我们最好只研究救主遗留给我们的作为人间指导的那些伟大法规。"
  网络来源: |
    https://book.douban.com/review/15655289/

- 名词: 宗教慰藉
  解释: |
    通过宗教信仰获得的精神安慰和内心安宁。在《战争与和平》中，玛丽亚公爵小姐是宗教慰藉最为坚定的人物——她面对父亲的苛责、亲人的死亡、战争的苦难，始终从基督教信仰中汲取力量。她对好友朱莉说"倘若没有宗教的慰藉，人生会变得多么悲惨"，将宗教信仰视为在苦难世界中支撑人生的根本力量。
  书中原文: |
    "哦，倘若没有宗教的慰藉，人生会变得多么悲惨。"
  网络来源: |
    https://wenku.baidu.com/view/2e256dfe30b765ce0508763231126edb6f1a76ea.html

- 名词: 灵魂得救
  解释: |
    基督教核心概念，指人的灵魂通过信仰耶稣基督而获得永生和救赎。《战争与和平》中有一段著名的祷告词："为了天上赐与的和平，为了拯救我们的心灵！"托尔斯泰通过安德烈公爵的临终彻悟、皮埃尔被俘后的精神觉醒、普拉东·卡拉塔耶夫的淳朴信仰等人物历程，探讨了灵魂如何在苦难、死亡和爱中获得救赎这一深刻主题。
  书中原文: |
    该关键词的具体原文未在当前文本块中出现，但小说中多次出现相关表述，如"为了升入天堂，为了我们的灵魂得救"等祈祷文句式。
  网络来源: |
    https://ebaomonthly.com/ebao/readebao.php?a=20090306

- 名词: 《使徒行传》
  解释: |
    《圣经·新约》中的一卷，记载耶稣升天后使徒们传道、建立早期教会的历史。在《战争与和平》中，玛丽亚公爵小姐向好友推荐阅读《使徒行传》和《福音书》，认为这些经典已足够指导人生，不必钻研那些神秘莫测的书籍。这体现了托尔斯泰笔下虔诚人物的圣经中心主义信仰观。
  书中原文: |
    "我们最好还是读读《使徒行传》和《福音书》吧。"
  网络来源: |
    https://news.qq.com/rain/a/20251110A01WJ100

- 名词: 《福音书》
  解释: |
    《圣经·新约》前四卷（马太福音、马可福音、路加福音、约翰福音）的总称，记载耶稣基督的生平、教训、受死与复活。在《战争与和平》中，《福音书》是人物精神探索的重要文本：皮埃尔在共济会入会仪式中见到《福音书》作为圣物；玛丽亚公爵小姐将其视为信仰指南。托尔斯泰本人晚年深受福音书精神影响，倡导"爱邻人、爱仇敌"的教义。
  书中原文: |
    "我们最好还是读读《使徒行传》和《福音书》吧。"
  网络来源: |
    https://podtail.com/podcast/90f900f8/--117/

- 名词: 别祖霍夫伯爵逝世
  解释: |
    叶卡捷琳娜女皇时代的巨富老别祖霍夫伯爵（基里尔·弗拉基米罗维奇·别祖霍夫）在小说第一卷第一部中病逝。临终前举行了东正教终傅礼（临终涂油礼）。围绕遗嘱爆发了激烈的争夺：瓦西里公爵与大公爵小姐卡季什密谋销毁有利于皮埃尔的遗嘱；安娜·米哈伊洛夫娜挺身保护皮埃尔的权益。伯爵的去世直接改变了皮埃尔的命运。
  书中原文: |
    "轰动全莫斯科的重大新闻是老别祖霍夫伯爵的死和他的遗产继承问题，您想想看吧，三位公爵小姐所获无几，瓦西里公爵一无所得，而全部遗产的继承人却是皮埃尔。"
  网络来源: |
    https://www.douban.com/note/762981192/

- 名词: 皮埃尔继承遗产
  解释: |
    皮埃尔·别祖霍夫是老伯爵的私生子，原无合法继承权。但老伯爵暗中立遗嘱将全部财产留给他，并向沙皇请求承认他为嫡子。在德鲁别茨卡娅公爵夫人的帮助下，皮埃尔最终成功继承全部遗产和伯爵爵位，一夜之间从受人轻视的私生子成为俄罗斯最大富豪。这一事件是小说中皮埃尔人生轨迹的重大转折点。
  书中原文: |
    "全部遗产的继承人却是皮埃尔，此外他还被承认为法定的嫡子，所以他现在是别祖霍夫伯爵和俄罗斯最大财产的所有者了。"
  网络来源: |
    https://baijiahao.baidu.com/s?id=1789163145538957064

- 名词: 莫斯科婚事传闻
  解释: |
    19世纪初莫斯科贵族社交圈对未婚男女婚姻动向的议论和八卦。在《战争与和平》中，朱莉在给玛丽亚公爵小姐的信中调侃说，莫斯科婚姻大事纪竟认定她将成为"别祖霍娃伯爵夫人"（即嫁给皮埃尔）。这些传闻反映了当时莫斯科上流社会对贵族联姻的高度关注，以及社交圈中真假难辨的各种流言。
  书中原文: |
    "莫斯科婚姻大事纪，竟认定我将成为别祖霍娃伯爵夫人。不过您是知道的，我对此事毫无兴趣。"
  网络来源: |
    https://www.williamlong.info/xiaoshuo/archives/349.html

- 名词: 新兵出征
  解释: |
    19世纪俄罗斯帝国征兵制度下，新兵被征召后离开家乡奔赴军营的过程。在《战争与和平》中，玛丽亚公爵小姐在童山附近的村庄目睹了新兵出征的场面：母亲、妻子和儿女痛哭告别，场面极为悲惨。此时正值1812年卫国战争前夕，大量农民被征召从军。与贵族青年志愿从军的浪漫情怀不同，普通农民的新兵出征意味着与亲人的生死离别。
  书中原文: |
    "那是从我们领地上征去从军的一队新兵……真应当看看那些出征的人们的母亲、妻子和儿女的情景，听听他们双方的痛哭！仿佛人类已经忘记救主教导我们仁爱和宽恕的教规，而把互相残杀当作主要的美德。"
  网络来源: |
    http://tsrus.cn/lishi/2017/07/30/658447

- 名词: 科西嘉
  解释: |
    地中海西部的一个岛屿，今为法国领土。拿破仑·波拿巴1769年出生于科西嘉岛阿雅克肖。在19世纪欧洲贵族语境中，称拿破仑为"科西嘉人"或"科西嘉怪物"常带有贬义，意在强调其外来者身份和暴发户色彩，否定其作为法国统治者的合法性。文中朱莉使用"科西加怪物"指称拿破仑，反映了当时俄国贵族对拿破仑的敌视态度。
  书中原文: |
    "但愿上帝保佑他能推翻这个扰乱欧洲安宁的科西加怪物。"（注：中译本中"科西加"即科西嘉）
  网络来源: |
    https://book.douban.com/people/261165686/annotation/36697692/

- 名词: 欧洲
  解释: |
    《战争与和平》以拿破仑战争时期的欧洲为宏大舞台，核心历史背景是拿破仑对欧洲大陆的征服与俄国、奥地利、普鲁士等国的反法同盟斗争。小说涵盖1805年奥斯特里茨战役、1812年拿破仑入侵俄国等重大欧洲历史事件。文中朱莉称拿破仑为"扰乱欧洲安宁的科西嘉怪物"，体现了当时俄国贵族视拿破仑战争为对整个欧洲秩序的威胁。
  书中原文: |
    "但愿上帝保佑他能推翻这个扰乱欧洲安宁的科西加怪物。"
  网络来源: |
    https://baike.baidu.com/item/%E6%88%98%E4%BA%89%E4%B8%8E%E5%92%8C%E5%B9%B3

- 名词: 杜塞克奏鸣曲
  解释: |
    捷克作曲家扬·拉迪斯拉夫·杜塞克（Jan Ladislav Dussek，1760-1812）创作的钢琴奏鸣曲。杜塞克是早期钢琴演奏炫技大师的代表人物，其作品在19世纪欧洲贵族家庭中颇为流行。在《战争与和平》中，玛丽亚公爵小姐反复练习杜塞克奏鸣曲中难奏的乐句，既反映了当时俄国贵族音乐教育的风尚，也刻画了她严谨认真的性格。
  书中原文: |
    "住宅的深处，隔着一道道关着的门，传来杜塞克奏鸣曲，那些难奏的乐句重复了二十来遍。"
  网络来源: |
    http://datongshuhua.cn/page101?article_id=412&pagenum=49

- 名词: 阿普拉克辛家
  解释: |
    阿普拉克辛家族（Apraksin/Апраксины）是俄罗斯历史上显赫的古老贵族家族，出过多位著名军事统帅（如彼得大帝近臣费奥多尔·阿普拉克辛元帅）。在《战争与和平》中，阿普拉克辛伯爵夫人作为次要角色出现，是俄国上流社会社交网络中的一员。文中朱莉提到母亲叫她去阿普拉克辛家赴宴，体现了贵族间频繁的社交活动。
  书中原文: |
    "第二页快写完了，妈妈派人来叫我到阿普拉克辛家去赴宴。"
