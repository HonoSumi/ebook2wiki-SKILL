- 名词: 化装赛会
  解释: 化装赛会（маскарад / costume ball / masquerade），即化装舞会，是18-19世纪俄国贵族社会中盛行的社交娱乐活动。参与者身着特殊服饰或面具参加舞会，是上流社会青年男女交往、调情的重要场合。彼得大帝时期开始效仿欧洲引入舞会制度，叶卡捷琳娜二世时期化装舞会尤为盛行，至亚历山大一世时期再度复兴，冬宫的公众化装舞会规模宏大，宾客可达数万人。1903年冬宫举办的罗曼诺夫王朝建立290周年化装舞会是帝国最后的盛大舞会，所有来宾均须穿着17世纪古罗斯传统服饰。
  书中原文: 他说，他突然像对一个早就认识的熟人似的说起来，"我们举办一次化装赛会；您最好能够参加：那一定很热闹。大家在阿尔哈罗夫家聚会。请您一定来，真的，好吗？"他说。……"伯爵小姐，您去参加化装赛会吧？一定去。"他说，伸手去摘她戴的花球，压低声音说："您会是最漂亮的。去吧，亲爱的伯爵小姐，把这个花球给我作为保证吧。"
  网络来源: 俄罗斯帝国首都的舞厅生活 (visit-petersburg.ru); 1903年沙俄冬宫化装舞会盛装照片 (sohu.com)

- 名词: 阿尔哈罗夫家
  解释: 阿尔哈罗夫家族（Архаровы / Arkharov family）是俄国贵族家族，其最著名的成员是尼古拉·彼得罗维奇·阿尔哈罗夫（1740-1814）。他出身贵族，早年服役于普列奥布拉任斯基团，1771年因平定莫斯科瘟疫暴乱有功而获提拔，1775年调查普加乔夫叛乱后升任莫斯科警察总监，以出色的侦缉能力闻名。后历任莫斯科总督、特维尔和诺夫哥罗德总督、圣彼得堡总督。其下属被民间称为"阿尔哈罗夫人"（архаровцы），该词后来在俄语中成为警察的戏称。在《战争与和平》中，阿尔哈罗夫家的舞会是莫斯科贵族社交圈的重要场所。
  书中原文: 他说，他突然像对一个早就认识的熟人似的说起来，"我们举办一次化装赛会；您最好能够参加：那一定很热闹。大家在阿尔哈罗夫家聚会。请您一定来，真的，好吗？"他说。
  网络来源: Wikipedia - Nikolai Arkharov (en.wikipedia.org)

- 名词: 马格达林
  解释: 马格达林（抹大拉的马利亚，Mary Magdalene）是《圣经·新约》中的重要人物，来自加利利海边的抹大拉镇（Magdala）。据《路加福音》记载，耶稣曾从她身上赶出七个鬼，她从此追随耶稣并用财物资助其传道。她是耶稣被钉十字架时守在旁边的忠实追随者之一，也是第一个见到耶稣复活的人，被教会尊称为"使徒中的使徒"（Apostolorum Apostola）。历史上，教宗大额我略（591年）曾错误地将她与路加福音中用香膏抹耶稣脚的"有罪女人"混淆，导致其长期被污名化为"悔改的妓女"；1969年天主教会已正式澄清此误解。托尔斯泰在《战争与和平》中借用"男马格达林"一语，化用《路加福音》7:47"她许多的罪都赦免了，因为她的爱多"，形容纵情享乐却自认为无罪的纨绔子弟。
  书中原文: 花天酒地的公子哥儿，这些男马格达林们，正如女马格达林们一样，都有一种自以为无罪的隐密感觉，所以有这种感觉，是因为有得到原谅的希望。"她许多的罪都赦免了，因为她的爱多；他的许多罪也都赦免了，因为他的享受多。"
  网络来源: 维基百科 - 抹大拉的马利亚 (zh.wikipedia.org); 百度百科 - 抹大拉的玛丽亚 (baike.baidu.com)
