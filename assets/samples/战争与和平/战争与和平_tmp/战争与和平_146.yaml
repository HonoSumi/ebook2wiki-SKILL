- 名词: 苏哈列夫塔楼
  解释: 苏哈列夫塔楼（Сухарева башня / Sukharev Tower）是莫斯科历史上著名的地标建筑，1692-1701年由彼得大帝下令修建，用以纪念1689年平定其同父异母姐姐索菲娅发动的射击军叛乱。塔楼以支持彼得的射击军上校拉夫连季·苏哈列夫命名，建筑风格为莫斯科巴洛克风格，高约63-66米。彼得大帝在此创办了俄罗斯第一所数学与航海学校，雅科夫·布鲁斯伯爵在塔楼顶层建立了俄罗斯第一座天文台。1934年，斯大林下令拆除该塔楼，众多知识分子曾请求保留但未成功。原址附近的地铁站至今仍命名为"苏哈列夫站"。
  书中原文: 绕过苏哈列夫塔楼时，娜塔莎好奇地、迅速地观看坐车和徒步的行人，她突然惊喜地叫起来。……就在皮埃尔穿上格拉西姆弄来的、蒸洗过的车夫的长衫，跟格拉西姆一起到苏哈列夫塔楼去买手枪的路上，遇见了罗斯托夫一家人。
  网络来源: https://zh.wikipedia.org/wiki/苏哈列夫塔
- 名词: 梁赞大路
  解释: 梁赞大路（Рязанская дорога / Ryazan Road）是莫斯科通往东南方向梁赞城的历史道路，在1812年俄法战争中具有极其重要的战略意义。博罗季诺战役后，库图佐夫下令俄军撤出莫斯科，首先沿梁赞大路向布龙尼茨方向撤退。随后俄军主力突然转向西南（塔鲁丁诺机动），而哥萨克后卫部队继续沿梁赞大路狂奔以制造假象，成功欺骗了缪拉元帅的法军，使其沿错误方向追击。这一战略欺骗为俄军赢得了宝贵的休整时间，为随后的反攻创造了条件。
  书中原文: 九月一日夜，库图佐夫发出命令：俄国军队经由莫斯科向梁赞大路撤退。
  网络来源: https://news.ifeng.com/c/80def3F6FlT
- 名词: 苏格兰教律
  解释: 苏格兰教律，即苏格兰礼（Scottish Rite / Rito Escocês），是共济会（Freemasonry）两大主要礼制体系之一（另一为约克礼），正式名称为"古老而公认的苏格兰礼仪"（Ancient and Accepted Scottish Rite，简称AASR/REAA）。尽管名为"苏格兰礼"，实际上起源于法国，最初仅25级，1801年在美国查尔斯顿成立第一个最高理事会后扩展至33级。核心文献为阿尔伯特·派克的《道德与教条》（Morals and Dogma，1871年），内容涵盖古埃及、希腊、波斯、犹太等多神话传统，融合神秘主义和启蒙运动价值观。
  书中原文: 皮埃尔在书房里走了一遍，来到一只藏手稿的书柜跟前，取出一件当年曾是非常重要的共济会的圣物。这是附有恩师注释的《苏格兰教律》真本。他在蒙上一层尘土的书桌旁坐下，把手稿摆在面前，时而打开、时而合上，终于把手稿推开，用手托着头，沉思起来。
  网络来源: https://baike.baidu.com/item/共济会核心组织/50611070
- 名词: 多罗戈米洛夫桥
  解释: 多罗戈米洛夫桥（Дорогомиловский мост / Dorogomilov Bridge）是莫斯科横跨莫斯科河的历史桥梁，位于多罗戈米洛沃区。1788年始建为木制浮桥，称多罗戈米洛夫斯基桥。1812年俄法战争中，库图佐夫率俄军撤退穿过莫斯科时，大量军队经由此桥涌向梁赞大路。拿破仑率法军进占莫斯科时，也从多罗戈米洛夫门进入。1868年重建后更名为博罗季诺桥（Borodinsky Bridge），1912年为纪念博罗季诺战役100周年再次重建，桥上至今保留着纪念1812年卫国战争的方尖碑和门廊。
  书中原文: 黎明时分，行进的部队来到多罗戈米洛夫桥头，一眼望去，前面拥挤着匆忙过河的军队，再往前，过了桥的军队挤满了大街小巷，在他们后面，大群的士兵密密麻麻望不见尽头。……大家都朝桥头拥来，抢着上桥，上浅滩，上渡船。
  网络来源: https://en.wikipedia.org/?curid=9370127
- 名词: 花园街
  解释: 花园街（Садо́вая у́лица / Sadovaya Street）是构成莫斯科花园环（Садовое кольцо / Garden Ring）的各条街道的总称。花园环全长约16公里，由17条名称各异的街道和15个广场组成，其路线大致对应17世纪时环绕莫斯科的土城墙位置。1812年莫斯科大火后，土墙被夷平、壕沟填埋，在原址修建了带有花园、林荫道的宽敞道路，沿街业主被要求在房前种植花园，因而得名"花园街"。现今花园环是莫斯科市中心重要的环形交通干道。
  书中原文: 在库德林诺，从尼基茨卡雅、普雷斯尼亚、波德诺文斯克街，发出几支与罗斯托夫家的车队相似的车队，来到花园街，两列大车和马车并排向前行进。
  网络来源: https://en.wikipedia.org/?curid=3114595
