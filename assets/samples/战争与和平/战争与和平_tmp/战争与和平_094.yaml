- 名词: 奥贝尔-夏尔姆
  解释: '19世纪初莫斯科的一家法国时装店（法文名可能为 Ober-Chalme 或 Aubert-Chalme），位于库兹涅茨克桥一带的时尚商业区，主要经营女装、帽饰等时装用品。在《战争与和平》的年代，莫斯科贵族女性常光顾法国时装店定制服饰。小说中玛丽亚·德米特里耶夫娜带娜塔莎和索尼娅到此店购买嫁衣。'
  书中原文: '"明天我带她们去伊韦尔小教堂，然后顺便到奥贝尔-夏尔姆时装店去一趟"／"玛丽亚·德米特里耶夫娜带两个姑娘去伊韦尔小教堂，然后到奥贝尔-夏尔姆太太那儿"'
  网络来源: '《战争与和平》刘辽逸译本注释及相关文学背景资料'

- 名词: 监护委员会
  解释: '全称为"玛丽亚皇后慈善机构管理署监护委员会"（Опекунский совет Ведомства учреждений императрицы Марии），18-19世纪俄罗斯帝国的官方慈善管理机构。1763年由叶卡捷琳娜二世创立莫斯科育婴堂时设立前身，1797年保罗一世将其划归玛丽亚·费奥多罗夫娜皇后管辖。该委员会管理育婴堂、孤儿院、医院、女子学校等慈善教育机构，同时还经营抵押贷款业务，信誉极高，被视为安全可靠的代名词。因此在当时俄语中有"像在监护委员会一样安全"的惯用语。'
  书中原文: '"在我这儿就像在监护委员会一样安全"'
  网络来源: '《战争与和平》刘辽逸译本注释；俄罗斯帝国历史资料'

- 名词: 弗兹德维仁卡街
  解释: '莫斯科最古老的街道之一，俄语名 Воздвиженка（沃兹德维任卡大街），因1450年修建的荣举十字圣架修道院而得名。东起亚历山大公园（毗邻克里姆林宫），西至阿尔巴特广场，全长约600米。自18世纪起即为莫斯科贵族聚居区，豪宅林立。苏联时期曾名共产国际大街（1934-1946）和加里宁大街（1946-1991），1991年后恢复原名。在《战争与和平》中，博尔孔斯基公爵家的宅邸即位于此街，现实中原型为沃尔孔斯基故居（现沃兹德维任卡大街9号）。'
  书中原文: '"他们驱车来到弗兹德维仁卡街一座阴郁、古老的宅第门前下了车"'
  网络来源: '百度百科"沃兹德维任卡大街"词条；维基百科"沃兹德维任卡大街"；《战争与和平》刘辽逸译本相关注释'
