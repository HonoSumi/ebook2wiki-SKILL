- 名词: 托尔马索夫
  解释: 亚历山大·彼得罗维奇·托尔马索夫（1752—1819），俄罗斯帝国骑兵上将，1816年受封伯爵。1812年俄法战争期间担任俄国南部第三集团军司令，保护巴格拉季翁第二军团的侧翼。他率先在科布林附近击败萨克森军队，取得重要胜利，随后在戈罗杰奇纳会战中成功挫败法军进攻。巴格拉季翁战死后接任第二军团司令，参与克拉斯内战役等关键战斗。库图佐夫去世后曾短暂代理俄军总司令，后担任莫斯科省省长。
  书中原文: 第一军由巴克雷·德·托利统率，第二军由巴格拉季翁统率，第三军由托尔马索夫统率。
  网络来源: 百度百科：亚历山大·彼得罗维奇·托尔马索夫

- 名词: 保罗西
  解释: 菲利波·保卢奇（Filippo Paulucci，1779—1849），意大利侯爵，中文亦称帕乌卢奇。先后效力于撒丁王国、奥地利、意大利王国和俄罗斯帝国。1807年以骑兵上校衔加入俄军，参加过俄土战争和芬兰战争。1812年拿破仑入侵前夕被任命为俄军总参谋长，但因与巴克雷·德·托利意见不合，数日后改任利沃尼亚总督（兼管库尔兰、爱沙尼亚和普斯科夫）。在里加任职期间主持城市重建，修建维尔曼花园，推动街道照明和房屋编号。1829年返回意大利，出任撒丁王国军队司令官。
  书中原文: 侍从武官长保罗西——撒丁亡命者
  网络来源: IPFS百科：Philip Osipovich Paulucci；维基百科相关条目

- 名词: 沃尔佐根
  解释: 路德维希·冯·沃尔佐根（Ludwig von Wolzogen，1773—1845），符腾堡出身的军事将领、参谋军官。最初试图加入普鲁士军队，结识军事改革家沙恩霍斯特。1807年转入俄罗斯帝国陆军任参谋军官。1812年晋升为上校，分配到巴克莱·德·托利的司令部担任参谋，全程参与拿破仑入侵俄国的作战行动。1813年被沙皇亚历山大一世任命为副官，因在莱比锡战役中发现施瓦岑贝格亲王的部署危险并及时发出警告，晋升为少将。战后返回普鲁士，以少将衔重新加入普鲁士陆军，参与军事改革，负责德意志皇帝威廉一世的军事教育。其回忆录是研究拿破仑战争的重要史料。
  书中原文: 和普弗尔一道的有一个沃尔佐根，他比普弗尔本人能用更明了易懂的方式表达普弗尔的思想：普弗尔是一个尖刻的、自信到目空一切的、书本上的理论家。
  网络来源: 维基百科：Ludwig von Wolzogen

- 名词: 叶尔莫洛夫
  解释: 阿列克谢·彼得罗维奇·叶尔莫洛夫（1777—1861），俄国步兵上将、炮兵上将。1812年俄法战争期间担任西第一集团军参谋长，在博罗季诺战役中，法军攻占拉耶夫斯基炮垒的危急时刻，他率军发起反冲击夺回阵地。在小雅罗斯拉韦茨战役中，他截断拿破仑军队向卡卢加撤退的道路，迫使法军折回遭到破坏的旧斯摩棱斯克大道，促成拿破仑军队的崩溃。反攻期间负责组织追击，后参加库尔姆战役和攻占巴黎。1816年起担任格鲁吉亚驻军总司令，主导俄罗斯征服北高加索的战争，对车臣等山地民族采取强硬政策，以"让车臣人听到我的名字就胆战心惊"的名言著称。
  书中原文: 他们都是俄罗斯人：巴格拉季翁，刚提高声望的叶尔莫洛夫和别的人。当时有一则广为流传的关于叶尔莫洛夫的笑话，说他曾经请求皇上恩典——封他为德国人。
  网络来源: 百度百科：阿列克谢·彼得罗维奇·叶尔莫洛夫

- 名词: 维捷布斯克
  解释: 维捷布斯克（Vitebsk），今白俄罗斯东北部城市，历史上是重要的交通枢纽和军事重镇，位于西德维纳河畔。1812年俄法战争期间，拿破仑与俄军在此发生维捷布斯克之战（1812年7月26—27日）。拿破仑试图在此迫使俄军主力进行决战，俄军指挥官巴克雷·德·托利本计划集中主力交战，但因得知巴格拉季翁的第二军团被达武元帅击退，下令撤退。俄军后卫部队成功阻滞法军，夜间燃起营火制造假象，主力安全撤向斯摩棱斯克与巴格拉季翁会合。此战法军战术胜利但未达成歼灭俄军主力的战略目标。
  书中原文: 我们放弃了维尔纳，放弃了维捷布斯克，我们还要放弃德里萨。
  网络来源: 维基百科：维捷布斯克之战 (1812年)
