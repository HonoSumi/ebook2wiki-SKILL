- 名词: 希什科夫
  解释: |
    亚历山大·谢苗诺维奇·希什科夫（Александр Семёнович Шишков，1754—1841），俄国国务活动家、保守派政治家与语言学家。1812年拿破仑入侵期间担任亚历山大一世的国务秘书，负责起草宣言和法令，激励爱国主义情绪。曾任俄罗斯科学院院长、教育部长等职，是俄国斯拉夫派思想先驱，主张清除俄语中的外来影响。
  书中原文: |
    皇帝从舞会回去后，凌晨两点钟，派人召来秘书希什科夫，叫他给军队写一道命令，并给大元帅萨尔特科夫公爵下一道上谕，他要求在命令中一定把"只要有一个武装的法国人留在俄国的土地上，决不讲和"这句话加进去。
  网络来源: |
    https://www.britannica.com/biography/Aleksandr-Semyonovich-Shishkov
- 名词: 萨尔特科夫
  解释: |
    尼古拉·伊万诺维奇·萨尔特科夫（Николай Иванович Салтыков，1736—1816），俄罗斯帝国陆军元帅，萨尔特科夫贵族家族成员。曾任陆军院院长（战争委员会主席，1791—1802），是亚历山大一世和康斯坦丁大公的老师。在亚历山大一世亲征期间负责代理国家事务。1814年被封为公爵。还曾代理亚历山大一世担任马耳他骑士团副大团长。
  书中原文: |
    皇帝从舞会回去后，凌晨两点钟，派人召来秘书希什科夫，叫他给军队写一道命令，并给大元帅萨尔特科夫公爵下一道上谕，他要求在命令中一定把"只要有一个武装的法国人留在俄国的土地上，决不讲和"这句话加进去。
  网络来源: |
    https://en.wikipedia.org/wiki/Nikolai_Saltykov_(1736%E2%80%931816)
- 名词: 洛里斯东
  解释: |
    雅克·亚历山大·伯纳德·劳，劳里斯顿侯爵（Jacques Alexandre Bernard Law, Marquis de Lauriston，1768—1828），法国军官、外交官，拿破仑战争期间陆军将官，1823年受封法国元帅。1811年被任命为法国驻俄罗斯大使，是在俄法战争前夕和战争期间的重要外交人物。其名字被镌刻在巴黎凯旋门第13列。
  书中原文: |
    第二天，他给拿破仑写了下面一封信。皇帝仁兄大人：虽然我对陛下所负的义务信守不渝，但是昨天我得悉您的军队已越过俄国边境，直到现在我才刚刚接到从彼得堡送来的通牒，洛里斯东在谈到这次进犯时，引通牒的话对我说，自从库拉金公爵申请护照的时候起，陛下就认为您和我已经进入战争状态了。
  网络来源: |
    https://zh.wikipedia.org/wiki/雅克·劳里斯顿
- 名词: 巴萨诺公爵
  解释: |
    于格-贝尔纳·马雷，巴萨诺公爵（Hugues-Bernard Maret, Duc de Bassano，1763—1839），法国政治家、外交官，拿破仑一世的亲信重臣。1811年4月至1813年11月出任法国外交大臣，负责与普鲁士和奥地利签订条约，为拿破仑征俄铺路。百日王朝期间仍任帝国秘书长，忠诚追随拿破仑。1834年曾短暂担任法国首相。
  书中原文: |
    巴萨诺公爵拒发护照所持的种种理由，使我万万想不到，我国大使申请护照这一行动竟成为入侵的借口。
  网络来源: |
    https://en.wikipedia.org/wiki/Hugues-Bernard_Maret,_duc_de_Bassano
- 名词: 达乌
  解释: |
    路易·尼古拉·达武（Louis-Nicolas Davout，1770—1823），奥尔施泰特公爵、埃克米尔亲王，法兰西第一帝国26位元帅之一，拿破仑最年轻的帝国元帅（34岁受封）。被誉为"钢铁元帅"，是拿破仑麾下唯一一位从未打过败仗的元帅。以奥尔施泰特战役中以劣势兵力大败普鲁士主力而闻名。1812年参加征俄战争，在博罗季诺战役中两次负伤仍坚持指挥。名字被镌刻在巴黎凯旋门上。
  书中原文: |
    达乌是拿破仑手下的阿拉克切耶夫——他虽然不像阿拉克切耶夫那么胆小，然而他却同样是那么一丝不苟，那么残酷，同样是那么不靠残酷就无法表现自己的忠诚。巴拉舍夫在一家农民的棚屋里见到达乌元帅，他坐在木桶上写字（在查账）。
  网络来源: |
    https://baike.baidu.com/item/路易·尼古拉·达武
- 名词: 杜伦伯爵
  解释: |
    杜伦伯爵（Comte de Turenne），拿破仑宫廷中的高级侍从，负责引导外国使节觐见皇帝。在《战争与和平》中，他负责引导俄国使节巴拉舍夫将军进入拿破仑的行宫。其历史原型为阿曼·德·杜伦（Armand de Turenne），拿破仑宫廷的侍从官。
  书中原文: |
    第二天，皇帝的侍从杜伦伯爵来见巴拉舍夫，对他说，拿破仑皇帝愿意接见他。
  网络来源: |
    https://pages.haomooc.com/index.php?s=book&c=extend&id=9927
- 名词: 杜罗克
  解释: |
    盖罗-克里斯托夫-米歇尔·杜罗克（Géraud-Christophe-Michel Duroc，1772—1813），弗留尔公爵，拿破仑的宫廷大元帅（Grand Maréchal du Palais），负责皇帝人身安全和皇宫管理。他是拿破仑最亲密的朋友和最信任的助手之一，被称作"拿破仑的影子"。参与意大利战役、埃及远征、奥斯特利茨战役和1812年征俄。1813年在包岑战役中被炮弹击中身亡，拿破仑对此极为悲痛。
  书中原文: |
    杜罗克说，拿破仑皇帝在散步前将接见俄国将军。
  网络来源: |
    https://www.britannica.com/biography/Geraud-Christophe-Michel-Duroc-duc-de-Frioul
- 名词: 马木留克鲁斯坦
  解释: |
    鲁斯坦·拉扎（Roustam Raza，约1783—1845），拿破仑的贴身马穆鲁克卫士。生于格鲁吉亚第比利斯，13岁被绑架卖为奴隶。1798年由开罗的酋长赠与拿破仑将军，从此成为其贴身侍卫，睡在拿破仑卧室门外，负责照料日常起居。1802至1806年间编入帝国卫队马穆鲁克骑兵队。1814年拿破仑在枫丹白露试图自杀时未随其前往厄尔巴岛，百日王朝期间未再被召回。其回忆录于1888年首次出版。
  书中原文: |
    此外还有恭候拿破仑出来的一队骠骑兵和枪骑兵，一群服饰华美的侍从武官、少年侍从以及将军们，这些人都站在阶前拿破仑的坐骑和他的马木留克鲁斯坦周围。
  网络来源: |
    https://en.wikipedia.org/wiki/Roustam_Raza
- 名词: 雷孔特村
  解释: |
    雷孔特村（Rykonty / Rykónty，波兰语：Rykonty），位于涅曼河右岸的一个村庄。在1812年拿破仑入侵俄国前夕，这里是法军前哨阵地。俄国使节巴拉舍夫将军前往送交亚历山大一世给拿破仑的信件时，首先在此地被法国骠骑兵哨兵拦截，随后被引见给那不勒斯王缪拉。
  书中原文: |
    六月十三日夜里，巴拉舍夫带一名号手和两名哥萨克出发了，天亮时到达涅曼河右岸法国前哨阵地雷孔特村。他被法国的骑哨拦住了。
  网络来源: |
    https://yunshuwu.cn/chap/8639.html
