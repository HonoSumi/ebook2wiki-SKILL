<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feFlood flood-color="#0F172A" flood-opacity="0.06" result="shadowColor" />
      <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow" />
      <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <linearGradient id="headerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#F8FAFC" />
  <rect x="0" y="0" width="1280" height="6" fill="url(#headerBg)" />

  <path fill="#7C3AED" d="M65,60 H135 A15,15 0 0 1 150,75 V75 A15,15 0 0 1 135,90 H65 A15,15 0 0 1 50,75 V75 A15,15 0 0 1 65,60 Z" />
  <text x="100" y="80" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">步骤 3</text>
  <text x="170" y="80" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E293B">Subagent 工作流程</text>

  
  
  <g filter="url(#cardShadow)">
    <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" d="M60,120 H410 A10,10 0 0 1 420,130 V245 A10,10 0 0 1 410,255 H60 A10,10 0 0 1 50,245 V130 A10,10 0 0 1 60,120 Z" />
    <circle cx="85" cy="145" r="18" fill="#2563EB" />
    <text x="85" y="150" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">1</text>
    <text x="120" y="150" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">阅读文本块</text>
    <text x="70" y="180" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">使用 Read 工具阅读文本块文件</text>
    <text x="70" y="203" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">全面理解该块的内容和上下文</text>
    <path fill="#EFF6FF" d="M74,230 H396 A4,4 0 0 1 400,234 V242 A4,4 0 0 1 396,246 H74 A4,4 0 0 1 70,242 V234 A4,4 0 0 1 74,230 Z" />
    <text x="75" y="242" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#2563EB">读取文件 → 理解内容 → 准备分析</text>
  </g>
  <polygon points="235,259 245,269 225,269" fill="#CBD5E1" />

  
  <g filter="url(#cardShadow)">
    <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" d="M60,275 H410 A10,10 0 0 1 420,285 V400 A10,10 0 0 1 410,410 H60 A10,10 0 0 1 50,400 V285 A10,10 0 0 1 60,275 Z" />
    <circle cx="85" cy="300" r="18" fill="#7C3AED" />
    <text x="85" y="305" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">2</text>
    <text x="120" y="305" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">识别知识条目</text>
    <text x="70" y="335" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">按六大类别筛选知识型条目</text>
    <text x="70" y="358" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">排除日常物品、叙事角色名、通用概念</text>
    <path fill="#F5F3FF" d="M74,385 H396 A4,4 0 0 1 400,389 V397 A4,4 0 0 1 396,401 H74 A4,4 0 0 1 70,397 V389 A4,4 0 0 1 74,385 Z" />
    <text x="75" y="397" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#7C3AED">评估 → 筛选 → 确定提取清单</text>
  </g>
  <polygon points="235,414 245,424 225,424" fill="#CBD5E1" />

  
  <g filter="url(#cardShadow)">
    <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" d="M60,430 H410 A10,10 0 0 1 420,440 V555 A10,10 0 0 1 410,565 H60 A10,10 0 0 1 50,555 V440 A10,10 0 0 1 60,430 Z" />
    <circle cx="85" cy="455" r="18" fill="#06B6D4" />
    <text x="85" y="460" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">3</text>
    <text x="120" y="460" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">互联网检索</text>
    <text x="70" y="490" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">使用 WebSearch 逐个查询每个条目</text>
    <text x="70" y="513" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">每次检索 1-2 个名词，避免频繁并发</text>
    <path fill="#ECFDF5" d="M74,540 H396 A4,4 0 0 1 400,544 V552 A4,4 0 0 1 396,556 H74 A4,4 0 0 1 70,552 V544 A4,4 0 0 1 74,540 Z" />
    <text x="75" y="552" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#06B6D4">查询 → 获取解释 → 记录来源 URL</text>
  </g>
  <polygon points="235,569 245,579 225,579" fill="#CBD5E1" />

  
  <g filter="url(#cardShadow)">
    <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" d="M60,585 H410 A10,10 0 0 1 420,595 V665 A10,10 0 0 1 410,675 H60 A10,10 0 0 1 50,665 V595 A10,10 0 0 1 60,585 Z" />
    <circle cx="85" cy="610" r="18" fill="#10B981" />
    <text x="85" y="615" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">4</text>
    <text x="120" y="615" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">撰写解释并输出 YAML</text>
    <text x="70" y="645" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">综合原文和检索结果，使用 Write 工具保存为 YAML 文件</text>
  </g>

  
  <g filter="url(#cardShadow)">
    <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" d="M482,120 H1218 A12,12 0 0 1 1230,132 V663 A12,12 0 0 1 1218,675 H482 A12,12 0 0 1 470,663 V132 A12,12 0 0 1 482,120 Z" />
    <text x="490" y="155" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">每个块的完整处理循环</text>

    
    <path fill="#EFF6FF" stroke="#2563EB" stroke-width="1" d="M498,175 H1202 A8,8 0 0 1 1210,183 V227 A8,8 0 0 1 1202,235 H498 A8,8 0 0 1 490,227 V183 A8,8 0 0 1 498,175 Z" />
    
  <g transform="translate(505.0, 192.0) scale(0.8333333333333334)" fill="none" stroke="#2563EB" stroke-width="2">
    <path d="M5 7l5 5l-5 5" />
    <path d="M12 19l7 0" />
  </g>
    <text x="540" y="208" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">1. 更新进度 &amp; 任务状态</text>
    <text x="540" y="226" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#64748B">标记为 processing，告知用户开始处理</text>

    <polygon points="850,240 865,250 835,250" fill="#2563EB" />

    <path fill="#F5F3FF" stroke="#7C3AED" stroke-width="1" d="M498,255 H1202 A8,8 0 0 1 1210,263 V307 A8,8 0 0 1 1202,315 H498 A8,8 0 0 1 490,307 V263 A8,8 0 0 1 498,255 Z" />
    
  <g transform="translate(505.0, 272.0) scale(0.8333333333333334)" fill="none" stroke="#7C3AED" stroke-width="2">
    <path d="M6 6a2 2 0 0 1 2 -2h8a2 2 0 0 1 2 2v4a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2l0 -4" />
    <path d="M12 2v2" />
    <path d="M9 12v9" />
    <path d="M15 12v9" />
