    <path d="M15 14l4 2" />
    <path d="M9 18h6" />
    <path d="M10 8v.01" />
    <path d="M14 8v.01" />
  </g>
    <text x="540" y="288" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">2. 启动 subagent 处理文本块</text>
    <text x="540" y="306" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#64748B">使用 Agent 工具，传入文本块和 prompt 模板</text>

    <polygon points="850,320 865,330 835,330" fill="#7C3AED" />

    <path fill="#ECFDF5" stroke="#06B6D4" stroke-width="1" d="M498,335 H1202 A8,8 0 0 1 1210,343 V387 A8,8 0 0 1 1202,395 H498 A8,8 0 0 1 490,387 V343 A8,8 0 0 1 498,335 Z" />
    
  <g transform="translate(505.0, 352.0) scale(0.8333333333333334)" fill="none" stroke="#10B981" stroke-width="2">
    <path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
    <path d="M9 12l2 2l4 -4" />
  </g>
    <text x="540" y="368" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">3. 等待 subagent 完成</text>
    <text x="540" y="386" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#64748B">阻塞等待，不启动下一个直到完成</text>

    <polygon points="850,400 865,410 835,410" fill="#06B6D4" />

    <path fill="#FFF7ED" stroke="#F59E0B" stroke-width="1" d="M498,415 H1202 A8,8 0 0 1 1210,423 V467 A8,8 0 0 1 1202,475 H498 A8,8 0 0 1 490,467 V423 A8,8 0 0 1 498,415 Z" />
    
  <g transform="translate(505.0, 432.0) scale(0.8333333333333334)" fill="none" stroke="#F59E0B" stroke-width="2">
    <path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
    <path d="M21 21l-6 -6" />
  </g>
    <text x="540" y="448" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">4. 验证 YAML 输出 &amp; 转换 JSON</text>
    <text x="540" y="466" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#64748B">确认 YAML 已生成 → 运行 yaml_to_json.py</text>

    <polygon points="850,480 865,490 835,490" fill="#F59E0B" />

    <path fill="#F0FDF4" stroke="#10B981" stroke-width="1" d="M498,495 H1202 A8,8 0 0 1 1210,503 V547 A8,8 0 0 1 1202,555 H498 A8,8 0 0 1 490,547 V503 A8,8 0 0 1 498,495 Z" />
    
  <g transform="translate(505.0, 512.0) scale(0.8333333333333334)" fill="none" stroke="#10B981" stroke-width="2">
    <path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
    <path d="M9 12l2 2l4 -4" />
  </g>
    <text x="540" y="528" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">5. 更新计划 &amp; 报告进度</text>
    <text x="540" y="546" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#64748B">标记为 completed，简短汇报完成情况</text>

    
    <path fill="#FEF2F2" stroke="#FECACA" stroke-width="1" d="M498,580 H1202 A8,8 0 0 1 1210,588 V647 A8,8 0 0 1 1202,655 H498 A8,8 0 0 1 490,647 V588 A8,8 0 0 1 498,580 Z" />
    
  <g transform="translate(505.0, 597.0) scale(0.8333333333333334)" fill="none" stroke="#EF4444" stroke-width="2">
    <path d="M19 20h-10.5l-4.21 -4.3a1 1 0 0 1 0 -1.41l10 -10a1 1 0 0 1 1.41 0l5 5a1 1 0 0 1 0 1.41l-9.2 9.3" />
    <path d="M18 13.3l-6.3 -6.3" />
  </g>
    <text x="540" y="613" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#991B1B">出错处理</text>
    <text x="540" y="635" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#7F1D1D">重试该块而不是跳到下一个。连续 3 次失败才跳过并在最终报告注明。</text>
  </g>

  <text x="1220" y="690" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#94A3B8">08</text>
