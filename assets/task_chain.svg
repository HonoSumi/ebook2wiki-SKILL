<svg xmlns="http://www.w3.org/2000/svg" viewBox="450 100 800 560" width="800" height="560">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#0F172A" flood-opacity="0.06" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#F8FAFC"/>

  <!-- Task chain visualization -->
  <g filter="url(#cardShadow)">
    <rect x="470" y="120" width="760" height="530" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="490" y="155" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">任务依赖链</text>

    <!-- Task 1 - completed -->
    <rect x="490" y="185" width="720" height="44" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
    <circle cx="515" cy="207" r="12" fill="#10B981"/>
    <text x="515" y="212" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">01</text>
    <text x="540" y="205" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1E293B">红楼梦_001.txt</text>
    <text x="540" y="220" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#64748B">5,234 字符</text>
    <rect x="1120" y="196" width="70" height="22" rx="11" fill="#10B981"/>
    <text x="1155" y="211" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">已完成</text>

    <!-- Arrow -->
    <polygon points="515,233 522,243 508,243" fill="#94A3B8"/>

    <!-- Task 2 - completed -->
    <rect x="490" y="248" width="720" height="44" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
    <circle cx="515" cy="270" r="12" fill="#10B981"/>
    <text x="515" y="275" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">02</text>
    <text x="540" y="268" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1E293B">红楼梦_002.txt</text>
    <text x="540" y="283" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#64748B">4,987 字符</text>
    <rect x="1120" y="259" width="70" height="22" rx="11" fill="#10B981"/>
    <text x="1155" y="274" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">已完成</text>

    <!-- Arrow -->
    <polygon points="515,296 522,306 508,306" fill="#94A3B8"/>

    <!-- Task 3 - processing -->
    <rect x="490" y="311" width="720" height="44" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
    <circle cx="515" cy="333" r="12" fill="#2563EB"/>
    <text x="515" y="338" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">03</text>
    <text x="540" y="331" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1E293B">红楼梦_003.txt</text>
    <text x="540" y="346" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#64748B">5,112 字符</text>
    <rect x="1112" y="322" width="78" height="22" rx="11" fill="#2563EB"/>
    <text x="1151" y="337" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">处理中...</text>

    <!-- Arrow (dashed via dasharray on polygon isn't supported, use solid) -->
    <polygon points="515,359 522,369 508,369" fill="#CBD5E1"/>

    <!-- Task 4 - pending -->
    <rect x="490" y="374" width="720" height="44" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="515" cy="396" r="12" fill="#CBD5E1"/>
    <text x="515" y="401" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">04</text>
    <text x="540" y="394" font-family="Consolas, Courier New, monospace" font-size="13" fill="#94A3B8">红楼梦_004.txt</text>
    <text x="540" y="409" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#CBD5E1">5,098 字符</text>
    <rect x="1112" y="385" width="78" height="22" rx="11" fill="#E2E8F0"/>
    <text x="1151" y="400" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#94A3B8">等待中</text>

    <!-- Arrow -->
    <polygon points="515,422 522,432 508,432" fill="#CBD5E1"/>

    <!-- Task 5 - pending -->
    <rect x="490" y="437" width="720" height="44" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="515" cy="459" r="12" fill="#CBD5E1"/>
    <text x="515" y="464" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">05</text>
    <text x="540" y="457" font-family="Consolas, Courier New, monospace" font-size="13" fill="#94A3B8">红楼梦_005.txt</text>
    <text x="540" y="472" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#CBD5E1">4,876 字符</text>
    <rect x="1112" y="448" width="78" height="22" rx="11" fill="#E2E8F0"/>
    <text x="1151" y="463" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#94A3B8">等待中</text>

    <!-- Arrow -->
    <polygon points="515,485 522,495 508,495" fill="#CBD5E1"/>

    <!-- Task ... -->
    <rect x="490" y="500" width="720" height="44" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="515" cy="522" r="12" fill="#CBD5E1"/>
    <text x="515" y="527" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">..</text>
    <text x="540" y="520" font-family="Consolas, Courier New, monospace" font-size="13" fill="#94A3B8">...</text>
    <text x="540" y="535" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#CBD5E1">共 42 个文本块</text>

    <!-- Usage tip -->
    <rect x="490" y="565" width="720" height="65" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
    <use data-icon="tabler-outline/circle-check" x="505" y="580" width="20" height="20" fill="#F97316"/>
    <text x="535" y="595" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#9A3412">输入 /tasks 即可随时查看处理进度和剩余任务</text>
    <text x="535" y="615" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#C2410C">每个 task 完成后自动触发下一个，无需手动干预</text>
  </g>
</svg>
