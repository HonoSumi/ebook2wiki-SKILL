<svg xmlns="http://www.w3.org/2000/svg" viewBox="30 85 1220 620" width="1220" height="620">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#0F172A" flood-opacity="0.06" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#F8FAFC"/>

  <!-- Card 1: Subagent failure -->
  <g filter="url(#cardShadow)">
    <rect x="50" y="100" width="380" height="280" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="50" y="100" width="380" height="55" rx="12" fill="#FEF2F2"/>
    <rect x="50" y="143" width="380" height="12" fill="#FEF2F2"/>
    <text x="105" y="133" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#991B1B">Subagent 处理失败</text>

    <rect x="70" y="170" width="340" height="90" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <text x="85" y="193" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1E293B">可能原因</text>
    <text x="85" y="218" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">· subagent 超时未返回</text>
    <text x="85" y="240" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">· YAML 格式错误导致无法解析</text>

    <text x="70" y="295" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">处理策略</text>

    <rect x="70" y="315" width="340" height="48" rx="8" fill="#F0FDF4" stroke="#A7F3D0" stroke-width="1"/>
    <text x="108" y="334" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#065F46">重试该块而不是跳到下一个</text>
    <text x="108" y="352" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#64748B">连续 3 次失败才跳过</text>
  </g>

  <!-- Card 2: Chunk script failure -->
  <g filter="url(#cardShadow)">
    <rect x="450" y="100" width="380" height="280" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="450" y="100" width="380" height="55" rx="12" fill="#FFF7ED"/>
    <rect x="450" y="143" width="380" height="12" fill="#FFF7ED"/>
    <text x="505" y="133" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#9A3412">分段脚本失败</text>

    <rect x="470" y="170" width="340" height="90" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
    <text x="485" y="193" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1E293B">可能原因</text>
    <text x="485" y="218" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">· 不支持的电子书格式</text>
    <text x="485" y="240" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">· 缺少依赖库（如 MOBI 需 calibre）</text>

    <text x="470" y="295" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">处理策略</text>

    <rect x="470" y="315" width="340" height="48" rx="8" fill="#F0FDF4" stroke="#A7F3D0" stroke-width="1"/>
    <text x="508" y="334" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#065F46">检查文件格式是否支持</text>
    <text x="508" y="352" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#64748B">提示用户转换格式</text>
  </g>

  <!-- Card 3: Merge failure -->
  <g filter="url(#cardShadow)">
    <rect x="850" y="100" width="380" height="280" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="850" y="100" width="380" height="55" rx="12" fill="#EFF6FF"/>
    <rect x="850" y="143" width="380" height="12" fill="#EFF6FF"/>
    <text x="905" y="133" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E40AF">合并脚本失败</text>

    <rect x="870" y="170" width="340" height="90" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="885" y="193" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1E293B">可能原因</text>
    <text x="885" y="218" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">· JSON 文件格式损坏</text>
    <text x="885" y="240" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">· 缺少必要的 JSON 字段</text>

    <text x="870" y="295" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">处理策略</text>

    <rect x="870" y="315" width="340" height="48" rx="8" fill="#F0FDF4" stroke="#A7F3D0" stroke-width="1"/>
    <text x="908" y="334" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#065F46">检查 JSON 文件是否完整</text>
    <text x="908" y="352" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#64748B">手动修复损坏的 JSON 后重试</text>
  </g>

  <!-- Bottom: Best practices -->
  <g filter="url(#cardShadow)">
    <rect x="50" y="410" width="1180" height="265" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="70" y="445" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">最佳实践</text>

    <rect x="70" y="465" width="360" height="95" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="85" y="490" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">增量处理</text>
    <text x="85" y="515" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">即使有几百个块，也保持串行节奏</text>
    <text x="85" y="538" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">质量面前，效率让步</text>

    <rect x="460" y="465" width="360" height="95" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="475" y="490" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">进度追踪</text>
    <text x="475" y="515" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">使用 /tasks 随时查看当前进度</text>
    <text x="475" y="538" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">中断后可恢复处理</text>

    <rect x="850" y="465" width="360" height="95" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="865" y="490" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">数据验证</text>
    <text x="865" y="515" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">合并完成后检查最终统计</text>
    <text x="865" y="538" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">验证去重效果和数据库完整性</text>

    <!-- Retry logic visual -->
    <rect x="70" y="580" width="1140" height="75" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <text x="640" y="605" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#991B1B">重试机制</text>
    <text x="640" y="630" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">Subagent 失败 → 立即重试 → 最多重试 2 次（累计 3 次） → 仍失败则跳过并在最终报告中注明</text>
    <text x="640" y="648" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#64748B">重试不会浪费上下文 — subagent 是独立的，每次重试都是全新的 subagent 调用</text>
  </g>
</svg>
