<svg xmlns="http://www.w3.org/2000/svg" viewBox="450 100 800 585" width="800" height="585">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#0F172A" flood-opacity="0.06" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#F8FAFC"/>

  <!-- YAML code example panel -->
  <g filter="url(#cardShadow)">
    <rect x="470" y="120" width="760" height="555" rx="12" fill="#1E293B"/>
    <!-- Terminal header -->
    <rect x="470" y="120" width="760" height="40" rx="12" fill="#0F172A"/>
    <rect x="470" y="148" width="760" height="12" fill="#0F172A"/>
    <circle cx="495" cy="140" r="6" fill="#EF4444"/>
    <circle cx="515" cy="140" r="6" fill="#F59E0B"/>
    <circle cx="535" cy="140" r="6" fill="#10B981"/>
    <text x="850" y="146" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#64748B">001_红楼梦_001.yaml</text>

    <text x="490" y="190" font-family="Consolas, Courier New, monospace" font-size="13" fill="#94A3B8"># 电子书知识提取 - YAML 输出示例</text>
    <text x="490" y="215" font-family="Consolas, Courier New, monospace" font-size="13" fill="#94A3B8"># 文件: 红楼梦_001.yaml</text>

    <text x="490" y="250" font-family="Consolas, Courier New, monospace" font-size="14" fill="#F59E0B">- 名词:</text>
    <text x="510" y="275" font-family="Consolas, Courier New, monospace" font-size="14" fill="#22D3EE">扎染</text>

    <text x="490" y="300" font-family="Consolas, Courier New, monospace" font-size="14" fill="#F59E0B">  解释:</text>
    <text x="510" y="325" font-family="Consolas, Courier New, monospace" font-size="14" fill="#E2E8F0">  |</text>
    <text x="530" y="350" font-family="Consolas, Courier New, monospace" font-size="13" fill="#E2E8F0">中国传统的手工染色技术之一，以绞扎、</text>
    <text x="530" y="373" font-family="Consolas, Courier New, monospace" font-size="13" fill="#E2E8F0">浸染为主要工艺。扎染的图案自然晕染，</text>
    <text x="530" y="396" font-family="Consolas, Courier New, monospace" font-size="13" fill="#E2E8F0">每件作品独一无二。</text>

    <text x="490" y="425" font-family="Consolas, Courier New, monospace" font-size="14" fill="#F59E0B">  书中原文:</text>
    <text x="510" y="450" font-family="Consolas, Courier New, monospace" font-size="14" fill="#E2E8F0">  |</text>
    <text x="530" y="475" font-family="Consolas, Courier New, monospace" font-size="13" fill="#E2E8F0">她穿着一件扎染的蓝布衣裳，在人群中</text>
    <text x="530" y="498" font-family="Consolas, Courier New, monospace" font-size="13" fill="#E2E8F0">显得格外与众不同，那衣裳上的花纹</text>
    <text x="530" y="521" font-family="Consolas, Courier New, monospace" font-size="13" fill="#E2E8F0">像是天上的云彩。</text>

    <text x="490" y="550" font-family="Consolas, Courier New, monospace" font-size="14" fill="#F59E0B">  网络来源:</text>
    <text x="510" y="575" font-family="Consolas, Courier New, monospace" font-size="14" fill="#E2E8F0">  |</text>
    <text x="530" y="600" font-family="Consolas, Courier New, monospace" font-size="13" fill="#60A5FA">https://baike.baidu.com/item/扎染</text>
    <text x="530" y="625" font-family="Consolas, Courier New, monospace" font-size="13" fill="#60A5FA">https://zh.wikipedia.org/wiki/扎染</text>

    <text x="490" y="655" font-family="Consolas, Courier New, monospace" font-size="12" fill="#64748B">YAML 书写规则：每条以 - 开头，缩进 2 空格，多行用 : |</text>
  </g>
</svg>
